  concept_automodding_hab_preference_desc:0 "Regular:\n- ['trait:trait_auto_dry_preference']\n- ['trait:trait_auto_wet_preference']\n- ['trait:trait_auto_cold_preference']\n\nSpecial:\n- ['trait:trait_auto_pc_nuked_preference']\n- ['trait:trait_auto_pc_gaia_preference']\n- ['trait:trait_auto_pc_hive_preference']\n\nArtificial:\n- ['trait:trait_auto_pc_city_preference']\n- ['trait:trait_auto_pc_relic_preference']\n- ['trait:trait_auto_pc_habitat_preference']\n- ['trait:trait_auto_pc_ringworld_habitable_preference']\n- ['trait:trait_auto_pc_cosmogenesis_world_preference']\n- ['trait:trait_auto_pc_alderson_slice_preference']"
  
  # Photoadaptive trait overwrites
  concept_trait_photoadaptive_stars_desc:99 "Some species gain $worker_and_simple_drone_cat_bonus_workforce_mult$ from stellar ['concept_star_luminosity']. \n\n- $pc_pulsar_plural$, $pc_neutron_star_plural$, or $pc_giga_o_star_plural$: §G+15%§! \n- $pc_b_star_short$, $pc_a_star_short$, or $pc_f_star_short$ Stars: §G+10%§! \n- $pc_g_star_short$ or $pc_k_star_short$ Stars: §G+5%§! \n- $pc_m_star_short$ or $pc_gigaignited_star_plural$: §R-5%§! \n- $pc_t_star_short_plural$, $pc_protostar_plural$, or $pc_black_hole_plural$: §R-15%§!"
  concept_star_luminosity_desc:99 "Luminosity is the measure of how much radiation and light a star emits, influencing stellar classification, system temperature, and habitability potential. \n\n§E$luminosity_0$§! \n- $pc_black_hole$ \n- $pc_t_star$ \n- $pc_protostar$ \n\n§E$luminosity_1$§! \n- $pc_m_star$ \n- $pc_m_giant_star$ \n- $pc_gigaignited_star$\n\n§E$luminosity_2$§! \n- $pc_g_star$ \n- $pc_k_star$ \n\n§E$luminosity_3$§! \n- $pc_b_star$ \n- $pc_a_star$ \n- $pc_f_star$ \n\n§E$luminosity_4$§! \n- $pc_neutron_star$ \n- $pc_pulsar$ \n- $pc_giga_o_star$ \n- $pc_core_quasar$"
  