  military_arkship_megastructure_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_kilostructure$ - $giga_list_category_special$\n§L$tech_military_arkship_desc$§!"
  
  dyson_gun_0:99 "$gc_mega$Stellar Cannon Construction Site"
  dyson_gun_0_MEGASTRUCTURE_DETAILS:99 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_weaponry$\n§LAllows us to shoot our energy stockpile at targeted systems§!"
  
  # Concept Override
