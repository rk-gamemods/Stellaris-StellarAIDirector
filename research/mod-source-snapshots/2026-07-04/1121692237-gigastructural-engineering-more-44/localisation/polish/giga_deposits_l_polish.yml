  ### Mega Deposits ######################
  #########################################
  
  d_small_natural_tunnel:99 "Tunnel of Boreas"
  d_small_natural_tunnel_desc:99 "A small natural tunnel connecting a large lake located in the middle of one the planet's continents to the ocean. Its existence seemingly defies all laws of nature and reason, leading the natives to believe that it was created by the gods themselves."
  
  
  #########################################
  ### Flavor Deposits #####################
  #########################################
  
  d_arcane_mineral_generator:99 "Arcane Transmutator"
  d_arcane_mineral_generator_desc:99 "An ancient device of arcane make that produces mineral resources seemingly out of thin air."
  
  d_giga_orbital_effects:99 "System Transport Network"
  d_giga_orbital_effects_desc:99 "The $name_giga_orbital$ in this system dominates local logistical planning."
  
  d_pcc_origin_blocker:99 "Decayed Conduit"
  d_pcc_origin_blocker_desc:99 "Large portions of the planet's huge processing arrays are currently unreachable from our research facilities due to damaged connections between computational subsections."
  
  d_giga_rogue_ai_relay_servers:99 "Rogue Processors Arrays"
  d_giga_rogue_ai_relay_servers_desc:99 "Vast arrays of processors and servers used by the Rogue AI to project its power onto the Planetary Computing Complex in order to fight us at every turn by sabotaging infrastructure and actively attempting to kill our colonists."
  
  d_giga_rogue_ai_corrupt_code:99 "Corrupt Code"
  d_giga_rogue_ai_corrupt_code_desc:99 "Large chunks of the Planetary Computing Complex's databanks are filled with dangerous bloatware code, actively impeding our scientific efforts on this planet."
  
  d_ringworld_capital_city:99 "The Great Capital"
  d_ringworld_capital_city_desc:99 "A great capital city build on the ringworld. This places serves as a central hub for the ringworld segment and provides the local population with various services."
  
  d_interstellar_ringworld_commerce_blocker:99 "Abandoned Infrastructure"
  d_interstellar_ringworld_commerce_blocker_desc:99 "As the ringworld offers nearly endless amount of space, little consideration was given to land re-development, leading to large swaths of land being filled with long-abandoned buildings. If these territories are cleared and re-developed, local business will be able to grow considerably, increasing the empire's wealth."
  
  d_great_ring_excavated_mountain:99 "Ringworld Self-Repair System Node"
  d_great_ring_excavated_mountain_desc:99 "An exposed node of the ringworld's automated self-repair system. It continuously generates matter needed to keep the megastructure in operation shape. And if we're careful, we can syphon some of that matter to be used for our own needs without compromising our artificial home."
  
  d_giga_arcane_generator:99 "$d_arcane_generator$"
  d_giga_arcane_generator_desc:99 "$d_arcane_generator_desc$"
  
  
  d_decrepit_tunnels_squareworld:99 "$d_decrepit_tunnels_1$"
  d_decrepit_tunnels_squareworld_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_predictable_solar_flares:99 "Predictable Solar Flares"
  d_predictable_solar_flares_desc:99 "The star our homeworld orbits around exhibits specific behavior preceding a solar flare, making energy extraction significantly easier."
  
  d_giga_decrepit_tunnels_1:99 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_1_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_giga_decrepit_tunnels_2:99 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_2_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_giga_decrepit_tunnels_3:99 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_3_desc:99 "$d_decrepit_tunnels_1_desc$"
  
  d_flusio_arcology_wreck:99 "Wrecked Megacities"
  d_flusio_arcology_wreck_desc:99 "Cities partially or completely destroyed in the fighting that occurred on the Flusio-Arcology."
  d_flusio_arcology_anarchy:99 "Flusionian Anarchy"
  d_flusio_arcology_anarchy_desc:99 "Large swathes of Flusion have fallen into complete anarchy as a result of collateral damage from the devastating fighting to dislodge the Kaiser from the planet."
  
  d_flusio_arcology_administration:99 "Flusio-Arcology Administration"
  d_flusio_arcology_administration_desc:99 "Administering the logistical nightmare that surrounds Flusion is no easy task. Due to the immense number of districts the Flusio-Arcology can support, more care must be taken to manage it properly."
  
  d_flusio_arcology_administration_tooltip:99 "[giga_flusion_administration_mechanics]"
  
  d_solaktropa_project:99 "Roqualtropa Project"
  d_solaktropa_project_desc:99 "The Roqualtropa Project creates vast quantities of useable land for the Katzens to build upon as well as tremendous quantities of water for agriculture, at the cost of disturbing Flusion's natural climate."
  
  d_solaktropa_project_wreck:99 "Roqualtropa Wreck"
  d_solaktropa_project_wreck_desc:99 "The destruction of the Roqualtropa Dam has caused untold quantities of devastation to Flusion and its inhabitants."
  
  d_katlantropa_project:99 "Katlantropa Project"
  d_katlantropa_project_desc:99 "The Katlantropa Project irrigates formerly desertic areas, rendering them suitable for agriculture and irrigation."
  
  d_katlantropa_project_wreck:99 "Katlantropa Desertification"
  d_katlantropa_project_wreck_desc:99 "The destruction of Katlantropa has reverted formerly arable areas into vast deserts."
  
  
  #########################################
  ### Birch Deposits ######################
  #########################################
  
  d_aeternum_gigantic_fission_reactor:99 "Colossal Fission Reactor"
  d_aeternum_gigantic_fission_reactor_desc:99 "An odd fission reactor built by Aeternum in the distant part, running off a gigantic chunk of uranium and producing vast amounts of electricity."
  
  d_exp_civ_primitive_preserve:99 "Primitive Civilization Birch Preserve"
  d_exp_civ_primitive_preserve_desc:99 "An entire primitive civilization resides on a chunk of the Birch World. Studying them represents incredible scientific potential."
  
  d_exp_civ_space_preserve:99 "Space-Age Civilization Birch Preserve"
  d_exp_civ_space_preserve_desc:99 "An entire space-age civilization resides on a chunk of the Birch World. Studying them represents incredible scientific potential."
  
  d_exp_civ_fe_preserve:99 "Precursor Civilization Birch Preserve"
  d_exp_civ_fe_preserve_desc:99 "An entire ancient precursor civilization resides on a chunk of the Birch World. Studying them represents incredible scientific potential."
  
  d_aeternum_decaying_hyperstructure:99 "Decaying Hyperstructure"
  d_aeternum_decaying_hyperstructure_desc:99 "Large swathes of this Birch World have fallen into disrepair after thousands of years of neglect. Repairing them would undoubtedly be a massive undertaking, but it would allow us to once again expand this Birch World's livable area.\n\nClearing this will grant us §G3§! $aeternum_tech_intel$."
  
  