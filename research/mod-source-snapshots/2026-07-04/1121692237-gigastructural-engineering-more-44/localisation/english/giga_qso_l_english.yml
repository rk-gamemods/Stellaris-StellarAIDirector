 giga_qso.002.name:0 "Quasi-Stellar Obliterator"
 giga_qso.002.desc:0 "This is the $name_quasistellar$ §ETarget Management Menu§!, here you can select countries to target based on their allegiance to the §Y[root.GetName]§!\n\n§RHostile§! targets typically include: ['concept_marauder_empires'], ['concept_endgame_crises'] and empires that we are at war with.\n\n§YNeutral§! targets typically include: ['concept_preftl_civilizations'], empires that we are at peace with but do not share a ['concept_subject_agreement'], a ['concept_federation'] or certain ['concept_diplomatic_pacts'] with.\n\n§GFriendly§! targets include: Owned systems within our own borders."
