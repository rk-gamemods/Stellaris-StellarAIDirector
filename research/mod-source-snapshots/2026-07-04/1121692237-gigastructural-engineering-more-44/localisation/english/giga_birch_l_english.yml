    zone_giga_birch_orykta_insula_minerals_desc:0 "Expanded transport channels and huge processing facilities, turning raw matter reclaimed from the $pc_core_black_hole$ into the building blocks of civilization."
    zone_giga_birch_orykta_insula_minerals_effect:0 "£job_giga_birch_orykta_manager£ §Y$job_giga_birch_orykta_manager_plural$§! $giga_birch_manager_replace$ §Y$job_giga_birch_orykta_manager_minerals_plural$§!\n\n$job_giga_birch_orykta_manager_minerals_effect_desc$"
