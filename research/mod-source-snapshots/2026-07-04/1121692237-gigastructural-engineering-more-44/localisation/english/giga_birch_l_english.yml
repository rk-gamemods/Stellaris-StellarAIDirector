    zone_giga_birch_orykta_insula_minerals_flavour:0 "Decompressor Array"
    zone_giga_birch_orykta_insula_minerals_flavour_desc:0 "This Insula hosts a high capacity connection to the event horizon below, where huge gravity drills extract matter from the $pc_core_black_hole$."

    zone_giga_birch_orykta_insula_minerals_refinery_flavour:0 "Deep Well Industrial Zones"
    zone_giga_birch_orykta_insula_minerals_refinery_flavour_desc:0 "This Insula hosts a direct connection to the event horizon below, where huge constructs extract matter from the $pc_core_black_hole$ and fuse it into heavier elements."

    zone_giga_birch_orykta_insula_minerals_dark_matter_flavour:0 "Wide-Band Matter Extractors"
    zone_giga_birch_orykta_insula_minerals_dark_matter_flavour_desc:0 "This Insula hosts a direct connection to the event horizon below, where huge constructs use gravity to extract all kinds of matter from the $pc_core_black_hole$, baryonic and otherwise."

    zone_giga_birch_orykta_insula_minerals_negative_mass_flavour:0 "Anisotropic Separators"
    zone_giga_birch_orykta_insula_minerals_negative_mass_flavour_desc:0 "This Insula hosts a direct connection to the event horizon below, where huge constructs peel apart the world-line of extracted matter to undo its sequestration in two ways at once."

