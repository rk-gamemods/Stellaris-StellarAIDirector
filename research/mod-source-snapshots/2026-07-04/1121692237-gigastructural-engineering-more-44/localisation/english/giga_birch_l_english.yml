l_english:

    name_birch:0 "Birch World"
    allow_birch:0 "§HUnlocks Megastructure:§! $name_birch$"
    desc_birch:0 "The Birch World is a truly gargantuan habitat built around a supermassive black hole, capable of housing a basically infinite amount of living beings."
    allow_district_birch_orykta:0 "§HUnlocks District:§! $name_birch$ $district_giga_birch_orykta$"
    desc_district_birch_orykta:0  "Allows $district_giga_birch_orykta_plural$ to be built on the $name_birch$"
    allow_district_birch_ktisma:0 "§HUnlocks District:§! $name_birch$ $district_giga_birch_ktisma$"
    desc_district_birch_ktisma:0  "Allows $district_giga_birch_ktisma_plural$ to be built on the $name_birch$"
    allow_district_birch_physma:0 "§HUnlocks District:§! $name_birch$ $district_giga_birch_physma$"
    desc_district_birch_physma:0  "Allows $district_giga_birch_physma_plural$ to be built on the $name_birch$"

    pc_birch:0 "$name_birch$"
    pc_birch_desc:0 "Comprising hundreds of concentric layers arranged around a supermassive black hole, the $pc_birch$ is the largest conceivable example of a Shell World - an artificial structure with multiple solid shells around a gravity source. With trillions of planets worth of usable land, it can support an effectively unlimited population."
    pc_birch_adj:0 "Birch"

    pc_origin_birch:0 "Decaying $pc_birch$"
    pc_origin_birch_desc:0 "$pc_birch_desc$\n\nThis particular $pc_birch$ is in a state of considerable disrepair, with most of its systems currently offline. The primary civilization of this world lives on a single artificial continent or Insula, and accesses space through a puncture in the outer shell."
    pc_origin_birch_adj:0 "Birch"

    pc_origin_dummy_birch:0 "$pc_origin_birch$"
    pc_origin_dummy_birch_desc:0 "$pc_origin_birch_desc$"
    pc_origin_dummy_birch_adj:0 "$pc_origin_birch_adj$"

    pc_giga_edge_of_eternity:0 "$pc_melted_frozen$"
    pc_giga_edge_of_eternity_desc:0 "A planet covered with oceans kilometers deep. Global storms rage across the surface, and incredibly tall waves are a common sight. This planet's environment would be too tumultuous to allow colonization, if not for an ancient arcology complex located near the planet's southern pole."
    pc_giga_edge_of_eternity_adj:0 "$pc_melted_frozen_adj$"

    giga_birch_dummy_system:0 "Echo"
    giga_birch_dummy_system_star:0 "$giga_birch_dummy_system$"
    giga_birch_dummy_system_planet_1:0 "$giga_birch_dummy_system_star$ I"
    giga_birch_dummy_system_planet_2:0 "$giga_birch_dummy_system_star$ II"
    giga_birch_dummy_system_planet_3:0 "$giga_birch_dummy_system_star$ III"
    giga_birch_dummy_system_planet_3_moon_1:0 "$giga_birch_dummy_system_planet_3$a"
    giga_birch_dummy_system_planet_3_moon_2:0 "$giga_birch_dummy_system_planet_3$b"
    giga_birch_dummy_system_planet_3_moon_3:0 "$giga_birch_dummy_system_planet_3$c"

    giga_birch_origin_critters:0 "Ancient Guardians"
    giga_birch_origin_critters_fleet:0 "Decrepit Watchers"
    giga_birch_origin_critters_ship:0 "Decaying Watcher"

    giga_birch_start_NAME:0 "Decaying Core"
    giga_birch_start_DESC:0 "Start in the galactic core with a $pc_origin_birch$."

