    origin_birch:0 "Decaying Birch World"
    origin_birch_desc:0 "This civilization's world view was shattered when a massive asteroid impact punctured a hole in their sky. Realizing that their world is a vast and ancient megastructure, they have turned inward in search of a way to save their decaying home."
    origin_birch_effects:0 "- Start with a §H$pc_origin_birch$§! in the §HGalactic Core§! as your homeworld.\n- The §HGalactic Core§! starts open to the galaxy.\n- Start with the §H\"$giga_situation_birch_origin$\"§! Situation.\n- Gain access to unique §H$district_giga_origin_birch_lab_plural$§! on your homeworld, which can be upgraded through §HExploration§!.\n- Unlock powerful modifiers for your homeworld through §HExploration§!.\n- The §H$pc_origin_birch$§! can be repaired, unlocking special §H$pc_birch$§! £district£ §HInsula§! and §HSector§! Districts.\n- Habitability Preference set to §H$trait_pc_birch_preference$§!, making settlement on most planets much harder.\n- A nearby planet may hold the key to further colonization.\n\n§RMultiple people cannot use this Origin. Any empires with this origin after the first will be generate with $origin_default$ instead.§!"

    #giga_birch_start_dialog:0 "We do not know what happened to our ancestors. Enemies, plague, civil war? They exist now as myths and legends, their knowledge and power lost. They somehow built this vast world around the black hole at the centre of our galaxy, now we live in the vast, echoing expanse designed to house a million times more people than are left.\nAs all but the last sections have fallen into disrepair and uselessness our people have been filled with a new sense of purpose: we must unite and take our place against in the stars, or we will be lost forever to history.\n\nOur first order of business will be to appoint a governor. Then we need to make sure we are working the right jobs:\n"
    
    #giga_start_screen_birch:0 "$giga_birch_start_dialog$We need a §Y$job_structure_manager$§! to stop the place falling to ruins.\n\nWe may have to make some people redundant from their preferred job to make that happen."

    #giga_start_screen_birch_hive:0 "$giga_birch_start_dialog$We need a §Y$job_structure_process$§! to stop the place falling to ruins."

    #giga_start_screen_birch_machine:0 "$giga_birch_start_dialog$We need a §Y$job_structure_process$§! to stop the place falling to ruins."

    giga_start_screen_birch:0 "We know precious little of our ancient past. Until a few centuries ago, we thought [GetHomeWorldName] was all there was - an impenetrable barrier beneath us, another held a thousand kilometers above by great spires, and the rollstars tracing a path along the sky to mark day and night.\n\nA massive asteroid impact shattered our assumptions by punching a hole straight through the upper barrier and showing us the universe outside. Using the closest spire for support, we built a tower to reach the breach and took our first faltering steps into the wider galaxy.\n\nThe ancient starports and drydocks we found on the outer surface changed everything. As our first spacecraft travelled outward, we realized that our home wasn't natural. Rather, it was a colossal artificial sphere, one which was clearly in a state of disrepair.\n\nFinding no more answers above, we are now planning a great expedition to hunt for a way to the theoretical layers below."

    giga_birch.title:0 "Core Hyperlanes Discovered"
    giga_birch.desc:0 "We have managed to get sensors working properly again and have discovered that we are not alone in the centre of the galaxy. There are a small number of systems that have been pulled closer than the main galactic ring by the black holes gravity.\n\nAt present there seems to be no connection to the rest of the galaxy. from our translation of log fragments we believe that the black holes gravity interferes with connections between the inner and the regular systems and that any hyperlanes between would be weakened and faded without tavel.\n\nWe have issued a §Yspecial project§! to locate and open them"

    giga_birch.003.name:0 "Galactic Core Connects to Galaxy"
    giga_birch.003.desc:0 "With a surge detectable on all our instruments hyperlanes have opened between the Galactic Core and the rest of the Galaxy.\n\nWe can leave. But what will we find waiting for us?"
    giga_birch.003.desc2:0 "With a surge detectable on all our instruments hyperlanes have opened between the Galactic Core and the rest of the Galaxy.\n\nThis wasn't caused by us, we are sure of it! The Galaxy is coming in."

    decision_giga_origin_birch_restore:0 "Restore $pc_birch$"
    decision_giga_origin_birch_restore_desc:0 "We are finally able to restore our home to its original glory."
    decision_giga_origin_birch_restore_tooltip:0 "Existing Planetary Features and Districts will be replaced."

    giga_birch_origin_motivated_explorers:0 "Inspired Explorers"
    giga_birch_origin_motivated_explorers_desc:0 "§LWith newly discovered information, our explorers are more capable than ever.§!"
    giga_birch_origin_motivated_explorers_effect:0 "Exploration Situation Monthly Progress: §G+25%§!"

