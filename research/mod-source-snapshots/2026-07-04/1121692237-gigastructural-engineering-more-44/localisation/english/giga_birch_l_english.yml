    ##############
	### Edicts ###
	##############

    edict_giga_migrate_birch_world:0 "Birch world: The Great Migration"
    edict_giga_migrate_birch_world_desc:0 "The vast expanses of the Birch World present unlimited opportunities. We should encourage our unemployed pops to live there instead."
    edict_giga_migrate_birch_world_tooltip:0 "Automatic Resettlement will be §Yvastly§! more likely to pick the Birch World as its destination.\nExtra job slots will be left open to encourage migration."

    #####################
    ### Megastructure ###
    #####################

    giga_mega.402.name:0 "Rising Energy Signatures"
    giga_mega.402.desc:0 "Previously dismissed as background noise, select signals emanating from the galactic core have begun to increase in strength, with their projected peak occurring in approximately §Y5 years§!.\n\nThese now properly distinguishable signals bear a striking resemblance to those emitted by hyperlanes following the use of hyperdrives, leading our more excitable physicists to believe that we may be witnessing the formation of §Ybrand-new hyperlane connections§!, an event we are yet to witness in real time.\n\nIf this \"new hyperlane\" theory holds true, we stand before an unprecedented opportunity for experimentation with the very thing that has made FTL travel possible, not to mention the possibility of having direct access to the very §Mheart of the galaxy§! and whatever bounties it contains."
    giga_mega.402.a:0 "$INCREDIBLE$"

    giga_discover_galactic_core_situation_type:0 "$giga_discover_galactic_core_situation$"
    giga_discover_galactic_core_situation:0 "Hyperlane Formation Study"
    giga_discover_galactic_core_situation_desc:0 "Energy signatures of increasing strength around the galactic core hint toward the formation of brand new hyperlanes. The opportunity to witness an event such as this in real time is a truly rare one - one that is sure to reward close attention with incredible insights into the underlying forces that shape the hyperlane network."
    giga_discover_galactic_core_situation_approach_hands_off:0 "$situation_a_rift_in_space_standard$"
    giga_discover_galactic_core_situation_approach_hands_off_desc:0 "We cannot afford to prioritize the hyperlane formation study at this time, so our §Y[GetPhysicistSwapPluralWithIcon]§! will maintain a hands-off approach.\n\nDespite the loss of more involved experimentation opportunities, this approach will allow us to collect data uncontaminated by [owner.species.GetName] interference."
    giga_discover_galactic_core_situation_approach_hands_off_tooltip:0 "Our §Y[GetPhysicistSwapPluralWithIcon]§! will maintain a hands-off approach, simply watching events unfold from afar.\n "
    giga_discover_galactic_core_situation_approach_hands_on:0 "Hands-On Investigation"
    giga_discover_galactic_core_situation_approach_hands_on_desc:0 "The insights we stand to gain from experimentation with hyperlanes as they form new connections between stars are simply too great to ignore."
    giga_discover_galactic_core_situation_approach_hands_on_tooltip:0 "Our §Y[GetPhysicistSwapPluralWithIcon]§! will engage directly with the newly-forming hyperlanes by exciting them with ultra-high energy tachyon beams.\n "
    giga_discover_galactic_core_situation_approach_delay:0 "Delay The Inevitable"
    giga_discover_galactic_core_situation_approach_delay_desc:0 "The implications of a freely accessible galactic core are gravely concerning. While we cannot prevent these hyperlanes from forming, we can buy time to prepare for whatever lies on the other side of them."
    giga_discover_galactic_core_situation_approach_delay_tooltip:0 "By applying principles learned through our research into §Y$tech_experimental_subspace_navigation$§!, we may be able to disrupt the hyperlane formation process.\n "

    giga_mega.403.name:0 "The Heart Of The Galaxy"
    giga_mega.403.desc.handsoff:0 "After much note-taking and theorising, our observation of the galactic core has come to a close, following the formation of several brand-new hyperlanes and the subsequent discovery of several new star systems! The insights we have gleaned from being able to observe the formation of new hyperlanes in real time have also proven to be invaluable.\n\nWith the formation of these new hyperlanes connecting opposite sides of the galaxy via the core cluster, the galaxy is now more interconnected than ever before, for better or worse.\n\nAll that remains now is to conduct more in-depth surveys. Who knows what we might find..."
    giga_mega.403.desc.handson:0 "After much theorising and experimentation, our observation of the galactic core has come to a close, following the formation of several brand-new hyperlanes and the subsequent discovery of several new star systems! The insights we have gleaned from being able to directly interact with hyperlanes as they form have also proven to be invaluable.\n\nWith the formation of these new hyperlanes connecting opposite sides of the galaxy via the core cluster, the galaxy is now more interconnected than ever before, for better or worse.\n\nAll that remains now is to conduct more in-depth surveys. Who knows what we might find..."
    giga_mega.403.desc.delay:0 "Despite our best efforts to delay the process, the formation of new hyperlanes connecting to the galactic core has ultimately proven to be inevitable, with several brand-new hyperlanes and previously unknown star systems now laid bare before us. \n\nWith the formation of these new hyperlanes connecting opposite sides of the galaxy via the core cluster, the galaxy is now more interconnected than ever before, for better or worse.\n\nAll that remains now is to conduct more in-depth surveys. Who knows what we might find..."
    giga_mega.403.a:0 "Amazing!"
    giga_mega.403.a.tooltip:0 "The §IGalactic Core§! can now be accessed\n "

    giga_dialog.4101.name:0 "Supermassive"
    giga_dialog.4101.desc:0 "After an arduous journey, the [Root.GetName] has finally reached the center of our galaxy.\nUpon entering the system, the crew was stunned by the sight of an absolutely massive §YInactive Supermassive Black Hole§!.\n\nThis gargantuan object weighs several billion stellar masses, and has a diameter of several hundreds astronomical units. A lone ocean planet was also spotted orbiting it, and one of the scientists speculated that it would certainly have gigantic waves due to the black hole's immense tidal forces.\nAlthough it is mere speculation for now, some of the wildest elements in the scientific community theorize that it would be possible to construct a massive sphere around this black hole, which could be inhabited by quadrillions of living beings."
    giga_dialog.4101.a:0 "Incredible!"

    giga_dialog.4102.name:0 "$name_birch$ Construction Site Complete!"
    giga_dialog.4102.desc:0 "The construction site for a future $name_birch$ has now been completed around our galaxy's central black hole. This scaffold will serve as a staging ground to begin building the actual structure itself, which will be a giant shell of superalloys right above the event horizon, where gravity is livable."
    giga_dialog.4102.a:0 "Great."

    giga_dialog.4103.name:0 "$name_birch$ Equatorial Frame Complete!"
    giga_dialog.4103.desc:0 "The first step in building our $name_birch$ is done. We have constructed a massive ring which wraps around the Black Hole, and will serve as a base to construct the rest of the structure's massive frame."
    giga_dialog.4103.a:0 "Marvelous."

    giga_dialog.4104.name:0 "$name_birch$ Frame Complete!"
    giga_dialog.4104.desc:0 "Our $name_birch$'s frame has been fully completed! A massive scaffold now surrounds the Black Hole, and we must now begin the hardest part: constructing the massive shell itself. It will be a long and arduous task, but once it is complete, we will have access to infinite living space."
    giga_dialog.4104.a:0 "We're getting close."

    giga_dialog.4105.name:0 "$name_birch$ Complete!"
    giga_dialog.4105.desc:0 "Today is an incredible day in Galactic History. Indeed, after decades of dangerous work, we have now completed the construction of an absolutely massive $name_birch$ around the Galactic Core. This massive shell is currently barren, but its immense surface area means that it can effectively house a virtually infinite amount of people. when colonized. With this project complete, we have definitely reached the pinnacle of habitat engineering, and this grand construct likely eclipses every other megastructure ever built in galactic history!\n\n§YThe $name_birch$ will automatically gain more districts slots as its population grows, up to an infinite amount.§!\n\nOnce we establish our colony, we will unlock an edict to begin §YThe Great Migration§! to populate this vast world."
    giga_dialog.4105.a:0 "Grandiose!"

    birch_world_0:0 "$gc_tera$$name_birch$ Construction Site"
    birch_world_0_DESC:0 "The construction site for a future $name_birch$, housing the necessary personnel and infrastructure to begin constructing a massive sphere around a supermassive Black Hole."
    birch_world_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_habitable_mega$\nConstructs a habitat around a §YSupermassive Black Hole§! with §YInfinite Districts§!\n§LA gigantic shell built around a Supermassive Black Hole, which can house infinite population. The ultimate Habitat.§!" #megalistentry BIRCH WORLD
    birch_world_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - The §YBirch World§! will gain §Y1 District Slot§! per §Y10000§! pops. Its districts are very powerful and provide a plethora of jobs. If §YAncient Caches of Technologies§! is enabled and §YVoid Spheres§! are unlocked, it can be upgraded into a §YVoid Sphere Birch World§!, the absolute most powerful habitat in existence"

    birch_world_1:0 "$name_birch$ Equatorial Frame"
    birch_world_1_DESC:0 "This massive ring circles the Black Hole's equator, and is the first step towards completing the $name_birch$'s massive frame."

    birch_world_2:0 "$name_birch$ Frame"
    birch_world_2_DESC:0 "A future $name_birch$'s frame built around a Supermassive Black Hole. We may now begin constructing the $name_birch$'s shell itself."

    birch_world_3:0 "$name_birch$"
    birch_world_3_DESC:0 "A completed $name_birch$ built around a Supermassive Black Hole. It is little more than a metal shell above the event horizon, but offers nearly infinite living space."

    ####################
    ### Technologies ###
    ####################

    giga_tech_birch_world_1:0 "The $name_birch$"
    giga_tech_birch_world_1_desc:0 "The $name_birch$ was only a theoretical artificial construct intended for the most expansive of habitations, but it is now a reality. Built around the largest of black holes, these spacious shell worlds are specially made as to be built upon the event horizon of said black holes, at which level the surface gravity is comparable to the gravity of our home world."

    giga_tech_birch_world_2:0 "Physma Construction"
    giga_tech_birch_world_2_desc:0 "The Physma Insula is a massive land dedicated to the things of nature. It is the place of agriculture, research and leisure."

    giga_tech_birch_world_3:0 "Ktisma Construction"
    giga_tech_birch_world_3_desc:0 "The Ktisma Insula is a massive land dedicated to the things of creation. It is the place of habitation and industry."

    giga_tech_birch_world_4:0 "Oryta Construction"
    giga_tech_birch_world_4_desc:0 "Living on a black hole means we can make a use of our decompressor and dark matter technologies to extract resources from its surface."

    ########################
    ### Void Birch Stuff ###
    ########################

    vsbw_begin:0 "An Infinite Expanse"
    vsbw_begin_desc:0 "It is time to transform this Birch World into the ultimate habitat. There shall be no-half measures, its entire surface shall be improved with the most advanced technologies known to our civilization."
    pc_void_birch:0 "Supermassive Birch Void Sphere"
    pc_void_birch_desc:0 ""
    pc_void_birch_adj:0 ""
    mod_pc_void_birch_habitability:0 "Birch Habitability"
    trait_pc_void_birch_preference:0 "Birch World Preference"
    trait_pc_void_birch_preference_desc:0 "The ultimate habitat for our population to live in. Legendary in every sense of the word."
    sc_void_birch_built:0 "$pc_void_birch$"

    d_giga_void_birch_mechanics:0 "Void Birch Core Systems"
    d_giga_void_birch_mechanics_desc:0 "$d_giga_birch_mechanics_desc$"

    district_giga_birch_void_structure:0 "Alpha Structure Operations"
    district_giga_birch_void_structure_desc:0 "The greatest leaders in our empire come together at the pinnacle of this marvelous construct, overseeing all operations."
    district_giga_birch_void_structure_plural:0 "$district_giga_birch_void_structure$"
    mod_district_giga_birch_void_structure_max_add:0 "Max $district_giga_birch_void_structure_plural$"

    district_giga_birch_void_orykta:0 "Alpha Extraction Operations"
    district_giga_birch_void_orykta_desc:0 "We shall exploit and explore this gargantuan black hole, for we have been inaugurated as the lords of the cosmos. The event horizon and other primitive concepts are no longer a concern for us."
    district_giga_birch_void_orykta_plural:0 "$district_giga_birch_void_orykta$"
    mod_district_giga_birch_void_orykta_max:0 "Max $district_giga_birch_void_orykta_plural$"

    district_giga_birch_void_ktisma:0 "Alpha Nidavellir Hypercomplex"
    district_giga_birch_void_ktisma_desc:0 "We are no longer bound by physical resource restraints. What we want, we shall get."
    district_giga_birch_void_ktisma_plural:0 "Alpha Nidavellir Hypercomplexes"
    mod_district_giga_birch_void_ktisma_max:0 "Max $district_giga_birch_void_ktisma_plural$"

    district_giga_birch_void_physma:0 "Alpha Matrioshka Facility"
    district_giga_birch_void_physma_desc:0 "Our universe still holds many secrets, and it is our duty to unveil the answers. We must always be pushing our civilisation forward, lest we stagnate and follow in the footsteps of the Fallen Empires."
    district_giga_birch_void_physma_plural:0 "Alpha Matrioshka Facilities"
    mod_district_giga_birch_void_physma_max:0 "Max $district_giga_birch_void_physma_plural$"

    vsbw.1.title:0 "It is done."
    vsbw.1.desc:0 "After 20 years of arduous gigascale construction, it is at last complete.\n[center_of_the_universe.GetName] has been successfully made into a Celestial Voidsphere encasing the entirety of the lightyear spanning hyperstructure.\n\nSome may call this project, which has effectively created the most largest and advanced habitat ever built in galactic history, madness.\n\nBut they are mere fools, for we prefer to call it what it really is.\n\nAmbition."

    vsbw.1.a:0 "My eyes hurt."
    
