    concept_giga_birch_manager_replacement_desc:0 "Insula Manager replacements are additive and will combine effects."

    zone_giga_birch_structure_ops_extra:0 "Structure Ops Expansion"
    zone_giga_birch_structure_ops_extra_desc:0 "Additional space allocated for Birch systems development."

    zone_giga_birch_structure_ops_aiondia:0 "Palace Complex"
    zone_giga_birch_structure_ops_aiondia_desc:0 "Grandeur. Opulence. Grace. Concepts embodied by the gigantic palace complex at the center of the Aeternite capital's hexagonal layout. Pristine in its surface appearance, visitors wandering off the beaten path will quickly find automated systems struggling to source materials for the structure's maintenance, its less visible walls honeycombed and hollow to keep up the veneer of superficial perfection."

