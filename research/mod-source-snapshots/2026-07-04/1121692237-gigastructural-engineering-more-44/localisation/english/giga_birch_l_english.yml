    d_giga_birch_mechanics:0 "Birch World Core Systems"
    d_giga_birch_mechanics_desc:0 "Staggeringly advanced machinery runs through every facet of this colossal construct."
    d_giga_birch_mechanics_tooltip:0 "This Planetary Feature manages many of the game functions of the $name_birch$ and is required for it to operate properly."

    # aiondia

    d_giga_aiondia_blocker_structure:0 "Abandoned Control Rooms"
    d_giga_aiondia_blocker_structure_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\nWithin the palace in the centre of §H$district_giga_birch_structure_aiondia_subtitle$§! there exists a control room of such staggering complexity that our experts have been entirely unable to make any sense of it. Either the systems controlling Aiondia's structural operations are on a level beyond our understanding, or we are the victims of a prank aeons in the making. Regardless of the reason for their baroque nature, if we ever want to expand our influence beyond the megacities we will need to decipher the controls for Aiondia's maintenance systems."

    d_giga_aiondia_blocker_orykta:0 "Mothballed Extractors"
    d_giga_aiondia_blocker_orykta_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\nEven during the height of the Aeternite golden age, Aiondia was never expected to be sustained by drawing all of its raw materials from the black hole below, with the extraction arrays designed to be a backup reserve in times of emergency. If we wish to make full use of these resources, we will need to bring those systems online and substantially expand their scope."
    slot_giga_birch_orykta_insula_clear_blocker_prereq:0 "Clear $d_giga_aiondia_blocker_orykta$"

    d_giga_aiondia_blocker_ktisma:0 "Malformed Works"
    d_giga_aiondia_blocker_ktisma_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\nHundreds of thousands of years of idling, punctuated by occasional and eccentric manufacturing requests, have left the systems controlling the factories and foundries of the $district_giga_birch_ktisma_plural$ with little to focus on. Over time this has led to the development of an unruly pseudo-ecosystem of mutated self-replicating machines. If we wish to make use of these facilities, we will need to make order from this chaos."
    slot_giga_birch_ktisma_insula_clear_blocker_prereq:0 "Clear $d_giga_aiondia_blocker_ktisma$"

    d_giga_aiondia_blocker_physma:0 "Collapsed Ecologies"
    d_giga_aiondia_blocker_physma_desc:0 "§P$d_aeternum_decaying_hyperstructure$§!\n\nWithout proper regulation, huge swathes of the $district_giga_birch_physma_plural$ have succumbed to ecological collapse and are little more than barren wastelands. If we wish to fully utilize this region, we must repair the environmental control systems which maintain it."
    slot_giga_birch_physma_insula_clear_blocker_prereq:0 "Clear $d_giga_aiondia_blocker_physma$"

    # origin insula stuff

    d_giga_birch_origin_home_insula:0 "Origin Insula"
    d_giga_birch_origin_home_insula_desc:0 "The cradle of civilization."

    d_giga_birch_origin_home_insula_restored:0 "Origin Insula"
    d_giga_birch_origin_home_insula_restored_desc:0 "Once the cradle of civilization, this region is now mostly depopulated and kept as a natural preserve."

    d_giga_birch_origin_home_farms:0 "Golden Fields"
    d_giga_birch_origin_home_farms_desc:0 "Prime agricultural land, this rich and fertile valley has long provided bountiful harvests."

    d_giga_birch_origin_home_catalytic_farms:0 "Mineralized Soils"
    d_giga_birch_origin_home_catalytic_farms_desc:0 "Tunnelling into the base of the Bottomless Mountain has allowed us to siphon a measure of the slurry within and expand our total arable land by a considerable margin."

    d_giga_birch_origin_home_mines:0 "The Bottomless Mountain"
    d_giga_birch_origin_home_mines_desc:0 "Ancient records tell of a mountain rising from the earth, teeming with inexhaustible mineral wealth. Modern analysis suggests that it originates from a ruptured conduit in the Structure's silt-rain system, with mineral slurry continually pushing the surface upwards and hardening over many years."

    d_giga_birch_origin_home_lithoid_mines:0 "Silt-rain Traps"
    d_giga_birch_origin_home_lithoid_mines_desc:0 "Wide areas enclosed by shallow dams let us concentrate the silt-rain which would partially drain to other regions. The reduced replenishment of eroded soils downstream is considered an acceptable trade for the additional minerals we can gather."

    d_giga_birch_origin_home_generators:0 "Generator Facilities"
    d_giga_birch_origin_home_generators_desc:0 "Accessible fuels and favorable conditions for power plant construction."

    d_giga_birch_origin_home_machine_generators:0 "Gas Fields"
    d_giga_birch_origin_home_machine_generators_desc:0 "Abundant gas deposits provide ample energy generation opportunities."

    d_giga_birch_origin_home_labs:0 "Ancient Ruins"
    d_giga_birch_origin_home_labs_desc:0 "Closely studied by our archaeologists, these ruins provided our first hints to the true nature of the Structure."

    # expedition rewards

    d_giga_birch_expedition_1_factory:0 "Abandoned Settlement - Factory"
    d_giga_birch_expedition_1_factory_desc:0 "The remains of an a city belonging to an unknown civilization. Local efforts are focusing on re-tooling their manufacturing facilities for our own use."

    d_giga_birch_expedition_1_miners:0 "Abandoned Settlement - Recycling"
    d_giga_birch_expedition_1_miners_desc:0 "The remains of an a city belonging to an unknown civilization. Local efforts are focusing on dismantling and recycling their structures."

    d_giga_birch_expedition_1_technicians:0 "Abandoned Settlement - Power Plant"
    d_giga_birch_expedition_1_technicians_desc:0 "The remains of an a city belonging to an unknown civilization. Local efforts are focusing on re-tooling their power generation facilities for our own use."

    d_giga_birch_expedition_1_farmers:0 "Abandoned Settlement - Farms"
    d_giga_birch_expedition_1_farmers_desc:0 "The remains of an a city belonging to an unknown civilization. Local efforts are focusing on growing crops in the outlying areas."

    d_giga_birch_expedition_1_restored:0 "Abandoned Settlement"
    d_giga_birch_expedition_1_restored_desc:0 "The remains of an a city belonging to an unknown civilization."


    d_giga_birch_expedition_2_exterminate:0 "Local Civilization - Silent Ruins"
    d_giga_birch_expedition_2_exterminate_desc:0 "The lands of a civilization native to the Structure, now silent after their complete extermination."

    d_giga_birch_expedition_2_trade:0 "Local Civilization - Trade Post"
    d_giga_birch_expedition_2_trade_desc:0 "The lands of a civilization native to the Structure, who engage in trade with outsiders."

    d_giga_birch_expedition_2_integrate:0 "Local Civilization - Semi-Autonomous Region"
    d_giga_birch_expedition_2_integrate_desc:0 "The lands of a civilization native to the Structure, semi-autonomous following its integration."

    d_giga_birch_expedition_2_conquer:0 "Local Civilization - Semi-Autonomous Region"
    d_giga_birch_expedition_2_conquer_desc:0 "The lands of a civilization native to the Structure, semi-autonomous following its conquest."

    d_giga_birch_expedition_2_sanctuary:0 "Local Civilization - Sanctuary Facility"
    d_giga_birch_expedition_2_sanctuary_desc:0 "The lands of a civilization native to the Structure, now an extensive sanctuary facility for organics."

    d_giga_birch_expedition_2_restored:0 "Local Civilization"
    d_giga_birch_expedition_2_restored_desc:0 "The lands of a civilization native to the Structure."


    d_giga_birch_expedition_3:0 "Industrial Level Outpost"
    d_giga_birch_expedition_3_desc:0 "An exploratory outpost by the spire connecting this machine-filled layer of the Structure back to home."

    d_giga_birch_expedition_3_restored:0 "Industrial Scavenging Outpost"
    d_giga_birch_expedition_3_restored_desc:0 "This outpost hosts explorers who retrieve machinery from the surrounding ancient industrial ruins."


    d_giga_birch_expedition_4:0 "Ancient Industrial Complex"
    d_giga_birch_expedition_4_desc:0 "Ancient auto-forges once again roar with flame, greatly expanding our industrial capabilities."

    d_giga_birch_expedition_4_restored:0 "Restored Industrial Complex"
    d_giga_birch_expedition_4_restored_desc:0 "Ancient auto-forges returned to the old glory, producing an endless stream of materials."


    d_giga_birch_expedition_5:0 "Regional Control Center"
    d_giga_birch_expedition_5_desc:0 "The command and control system for a sub-section of the structure including the capital."

    d_giga_birch_expedition_5_restored:0 "Regional Control Center"
    d_giga_birch_expedition_5_restored_desc:0 "The command and control system for a sub-section of the structure including the capital."


    d_giga_birch_expedition_6_farm:0 "Arctic Cavern Outpost - Lichen Farm"
    d_giga_birch_expedition_6_farm_desc:0 "Caves sheltered from the harsh conditions of the arctic layer, currently cultivating a nutritious strain of local lichen."

    d_giga_birch_expedition_6_generator:0 "Arctic Cavern Outpost - Gas Wells"
    d_giga_birch_expedition_6_generator_desc:0 "Caves sheltered from the harsh conditions of the arctic layer, with a power plant tapping a local gas well."

    d_giga_birch_expedition_6_restored:0 "Arctic Cavern Settlement"
    d_giga_birch_expedition_6_restored_desc:0 "A settlement in the sheltered caves of the arctic layer."


    d_giga_birch_expedition_7:0 "Sunken Observatory"
    d_giga_birch_expedition_7_desc:0 "An ancient scientific facility seemingly dedicated to the study of civilizations developing on the arctic layer."

    d_giga_birch_expedition_7_restored:0 "Sunken Observatory"
    d_giga_birch_expedition_7_restored_desc:0 "An ancient scientific facility, repaired and retooled for our own use."


    d_giga_birch_expedition_8:0 "Major Control Hub"
    d_giga_birch_expedition_8_desc:0 "A master control system for the Structure's systems, this facility is starved of energy and is currently unable to bring its full might to bear."

    d_giga_birch_expedition_8_restored:0 "Major Control Hub"
    d_giga_birch_expedition_8_restored_desc:0 "A major administrative center for the Structure, this facility regulates many of its systems."


    d_giga_birch_expedition_9_energy:0 "Extraction Apparatus - Energy Focus"
    d_giga_birch_expedition_9_energy_desc:0 "A huge structure suspended over the event horizon of the supermassive black hole at the Structure's core. Recent repair efforts have been focused on energy generation."

    d_giga_birch_expedition_9_minerals:0 "Extraction Apparatus - Mineral Focus"
    d_giga_birch_expedition_9_minerals_desc:0 "A huge structure suspended over the event horizon of the supermassive black hole at the Structure's core. Recent repair efforts have been focused on mineral extraction."

    d_giga_birch_expedition_9_dark_matter:0 "Extraction Apparatus - Dark Matter Focus"
    d_giga_birch_expedition_9_dark_matter_desc:0 "A huge structure suspended over the event horizon of the supermassive black hole at the Structure's core. Recent repair efforts have been focused on extracting usable dark matter."

    d_giga_birch_expedition_9_restored:0 "Extraction Apparatus"
    d_giga_birch_expedition_9_restored_desc:0 "Huge structures suspended over the event horizon of the supermassive black hole at the Structure's core, providing the Structure with effectively unlimited raw materials."

    # edge of eternity

    d_giga_birch_edge_of_eternity:0 "Oceanic Arcology Complex"
    d_giga_birch_edge_of_eternity_desc:0 "A series of huge structures built up from the ocean floor, providing livable conditions on this otherwise entirely water-covered world."

    d_giga_birch_edge_of_eternity_ruins:0 "£blocker£ Failing Surface Infrastructure"
    d_giga_birch_edge_of_eternity_ruins_desc:0 "Centuries of rough weather without maintenance have left these platforms in a state of decay."


    d_giga_birch_edge_of_eternity_farms:0 "Sea Farms"
    d_giga_birch_edge_of_eternity_farms_desc:0 "Tiered enclosures full of edible sea grasses and attendant wildlife."

    d_giga_birch_edge_of_eternity_farms_blocker:0 "£blocker£ Hostile Sea Life"
    d_giga_birch_edge_of_eternity_farms_blocker_desc:0 "Dangerous creatures prowl the sea grass towers, impeding harvesting operations."
