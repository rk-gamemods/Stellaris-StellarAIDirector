    zone_giga_birch_orykta_insula_energy_flavour:0 "Superradiant Collectors"
    zone_giga_birch_orykta_insula_energy_flavour_desc:0 "This insula hosts an augmented connection to the event horizon below, where upgraded colletor arrays extract huge amounts of energy from the $pc_core_black_hole$."

    zone_giga_birch_orykta_insula_energy_minerals_flavour:0 "Mass-Energy Extraction"
    zone_giga_birch_orykta_insula_energy_minerals_flavour_desc:0 "This Insula hosts an augmented connection to the event horizon below, where huge constructs extract matter and energy from the $pc_core_black_hole$ at a prodigious rate."

    zone_giga_birch_orykta_insula_energy_refinery_flavour:0 "Gravitic Fusion Extractors"
    zone_giga_birch_orykta_insula_energy_refinery_flavour_desc:0 "This Insula hosts a direct connection to the event horizon below, where huge constructs extract energy from the $pc_core_black_hole$ and fuse liberated matter into exotic materials."

    zone_giga_birch_orykta_insula_energy_dark_matter_flavour:0 "Particle Collection Arrays"
    zone_giga_birch_orykta_insula_energy_dark_matter_flavour_desc:0 "This Insula hosts a direct connection to the event horizon below, where huge constructs capture energy and dark matter from the $pc_core_black_hole$."

    zone_giga_birch_orykta_insula_energy_negative_mass_flavour:0 "Superradiant Lensing Array"
    zone_giga_birch_orykta_insula_energy_negative_mass_flavour_desc:0 "This Insula hosts a direct connection to the event horizon below, where huge constructs collect energy from the $pc_core_black_hole$ and focus it into $giga_sr_negative_mass$ converters."

