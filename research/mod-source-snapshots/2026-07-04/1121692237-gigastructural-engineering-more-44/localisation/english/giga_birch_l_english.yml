	### Districts ###
	#################

    district_giga_birch_structure:0 "Prime Insula"
    district_giga_birch_structure_plural:0 "Prime Insula" # deliberately singular
    district_giga_birch_structure_subtitle:0 "Structure Operations"
    district_giga_birch_structure_desc:0 "This small Insula is designed to house teams of expansion experts which can build Insulae to allow for more infrastructure on this $name_birch$."
    mod_district_giga_birch_structure_max:0 "Max $district_giga_birch_structure_plural$"

    district_giga_birch_structure_aiondia:0 "$district_giga_birch_structure$"
    district_giga_birch_structure_aiondia_plural:0 "$district_giga_birch_structure_plural$"
    district_giga_birch_structure_aiondia_desc:0 "The once radiant capital of the entire Aeternite sphere, the megacity of §H$district_giga_birch_structure_aiondia_subtitle$§! has seen better days. While still incredibly impressive by nearly any standard imaginable, closer observation shows subtle signs of degradation - buildings warped into nonsensical configurations in the absence of inhabitants, transport networks with phantom stops, and an oppressive sense of apathy in the minutia of daily life.\n\nWe can only imagine what it must have been like in its heyday."
    district_giga_birch_structure_aiondia_subtitle:0 "Elätyksenkaupunki"

    district_giga_birch_structure_info_title:0 "$giga_birch_insula_name$ Capacity"
    district_giga_birch_structure_info_value:0 "[GetGigaBirchInsulae]/[GetGigaBirchFinalInsulae]"
    district_giga_birch_structure_info_tooltip:0 "§HInsulae§!\nInsula Slots: §Y[GetGigaBirchFinalInsulae]§![GetGigaBirchMinInsulaePart1]\nFrom Modifiers: §G+[GetGigaBirchMaxInsulaeBase]§![GetGigaBirchInsulaeFromPops][GetGigaBirchMinInsulaePart2][GetGigaBirchNextInsulaFromPops]\n\nUsed Insula Slots: §Y[GetGigaBirchInsulae]§!\nFree Insula Slots: §Y[GetGigaBirchInsulaeFree]§!\n\n§W--------------§!\n§t$giga_birch_district_insula_tooltip$§!"
    district_giga_birch_structure_info_tooltip_per_pops:0 "\nFrom Pops: §G+[GetGigaBirchInsulaeFromPopsValue]§!"
    district_giga_birch_structure_info_tooltip_per_pops_next:0 "\n\nNext Insula Slot at §Y[GetGigaBirchNextInsulaFromPopsValue]§! £pop£ Pops"
    district_giga_birch_structure_info_tooltip_max_title:0 "\n\n§HBase Insula Slots:§! §Y[GetGigaBirchMaxInsulae]§!"
    district_giga_birch_structure_info_tooltip_min:0 "\n\n§H['concept_giga_birch_minimum_insulae', Minimum] Insula Slots:§! §Y[GetGigaBirchMinInsulaeModifier]§!\nFrom Modifiers: §G+[GetGigaBirchMinInsulaeModifier]§!"
    slot_giga_birch_structure_extra_prereq:0 "A total of §Y$@giga_birch_structure_extra_prereq|0$§! $giga_birch_insula_icon$$giga_birch_insula_name_plural$"

    concept_giga_birch_minimum_insulae:0 "Minimum Insulae"
    concept_giga_birch_minimum_insulae_desc:0 "Insula Capacity is always at least this value."

    giga_birch_manager_replace:0 "are ['concept_giga_birch_manager_replacement', replaced] with"
