    d_giga_birch_edge_of_eternity_generators:0 "Wave Energy Converters"
    d_giga_birch_edge_of_eternity_generators_desc:0 "Machines built to extract energy from the huge waves moving across the ocean surface."
   
    d_giga_birch_edge_of_eternity_generators_blocker:0 "£blocker£ Frozen Wave Array"
    d_giga_birch_edge_of_eternity_generators_blocker_desc:0 "Hard packed ice prevents these wave energy generators from doing any meaningful work."
    d_giga_birch_edge_of_eternity_generators_blocker_condition:0 "§R$MISSING_TECHNOLOGY$: $tech_massive_glacier$§!"


    d_giga_birch_edge_of_eternity_mines:0 "Seafloor Mining Tunnels"
    d_giga_birch_edge_of_eternity_mines_desc:0 "Boring down into the seabed to extract the minerals hidden below."

    d_giga_birch_edge_of_eternity_mines_blocker:0 "£blocker£ Volcanic Tunnel Collapse"
    d_giga_birch_edge_of_eternity_mines_blocker_desc:0 "Volcanic activity has caused a rupture in these tunnels, making the area unsafe for work."
    d_giga_birch_edge_of_eternity_mines_blocker_condition:0 "§R$MISSING_TECHNOLOGY$: $tech_volcano$§!"

