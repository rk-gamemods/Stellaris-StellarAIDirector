    job_giga_gas_extraction_manager_drone_desc:0 "Due to a rich atmosphere or other exotic environment property these administrators ensure our $job_technician_drone_plural$ exploit these resources to the maximum."
    giga_gas_extraction_manager_drone_wilderness_desc:0 "These soaring creatures release airborne hormones in response to atmospheric changes, signalling environmental conditions to nearby $job_photosymbiont_plural$."
