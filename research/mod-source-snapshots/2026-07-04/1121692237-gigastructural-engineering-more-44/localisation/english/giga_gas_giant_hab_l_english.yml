l_english:

    giga_gas_giant_home_system_NAME:0 "Gas Giant Home"
    giga_gas_giant_home_system_DESC:0 "Start on a habitable gas giant with your original homeworld destroyed."
    origin_gas_giant: "Gas Giant Liftoff"
    origin_gas_giant_desc: "During this empire's early space age their homeworld was struck by a stray comet. Already possessed enough infrastructure in space to survive temporarily, a gas giant mining station became their new home. Over the years the gas giant has fulfilled their needs many times over, bringing new insights into the various gases that occur in the galaxy. Due to an abundance of exotic gases during this empire's development, improved industrial techniques using these gases have been refined, albeit with a reliance on these gases for even the most basic industry."
    origin_gas_giant_robot: "Gas Giant Liftoff"
    origin_gas_giant_robot_desc: "During this empire's early space age their homeworld was struck by a stray comet. Already possessed enough infrastructure in space to survive temporarily, a gas giant mining station became their new home. Over the years the gas giant has fulfilled their needs many times over, bringing new insights into the various gases that occur in the galaxy. Due to an abundance of exotic gases during this empire's development, improved industrial techniques using these gases have been refined, albeit with a reliance on these gases for even the most basic industry."

    origin_gas_giant_effects: "- $HOMEWORLD$ ['concept_giga_habitable_gas_giant'] (Size: £planetsize£ 16-28)$NEW_LINE$- Species Trait:$TABBED_NEW_LINE$- ['trait:trait_giga_gas_giant_hab']$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- ['technology:tech_space_mining_1', £engineering_research£ $tech_space_mining_1$]$TABBED_NEW_LINE$- ['technology:tech_hydroponics', £society_research£ $tech_hydroponics$]"
    origin_gas_giant_effects_robot: "- $HOMEWORLD$ ['concept_giga_habitable_gas_giant'] (Size: £planetsize£ 16-28)$NEW_LINE$- Species Trait:$TABBED_NEW_LINE$- ['trait:trait_giga_gas_giant_hab_robot']$NEW_LINE$- $ADDITONAL_TECHNOLOGIES_STRING$ ['technology:tech_space_mining_1', £engineering_research£ $tech_space_mining_1$]"

    concept_giga_habitable_gas_giant: "$pc_habitable_gas_giant$"
    concept_giga_habitable_gas_giant_desc: "$pc_habitable_gas_giant_desc$"

    concept_giga_gas_worlds: "Gas World"
    concept_giga_gas_worlds_desc: "Habitable gas giants, planets with artificially gas flooded atmosphere, and even some slightly more habitable toxic worlds are categorized as \"Gas Worlds\"."

    building_giga_gas_giant_habitation_module: "Gas Giant Habitation Module"
    building_giga_gas_giant_habitation_module_desc: "Collection of facilities necessary to maintain a colony on a gas giant assembled by the original population of this planet. These facilities include reactors to provide power for the colony, docking bays to unload minerals collected from local moons and large climate-controlled hangars that can be used for hydroponic farms. In addition to that, these facilities serve as headquarters for resource distribution network and provide various services to the local populations."

    trait_giga_gas_giant_hab:0 "Exotic Gas Reliant"
    trait_giga_gas_giant_hab_desc:0 "§LOver centuries of exposure to exotic gases while living on a gas giant, this species has become somewhat dependent on them in their daily functions.§!"
    trait_giga_gas_giant_hab_tooltip:0 "§YScience§! and §YIndustrial§! Job Exotic Gas upkeep: §R+0.03§!\n    - Housing Usage on ['concept_giga_gas_worlds', §YGas§!] worlds: §G-10%§!\n    - £job_researcher£ $job_researcher$ upkeep on ['concept_giga_gas_worlds', §YGas§!] worlds: §G-10%§!\n    - Job Exotic Gas upkeep on ['concept_giga_gas_worlds', §YGas§!] worlds: §G-33%§!\n    - Housing Usage on non-['concept_giga_gas_worlds', §YGas§!] worlds: §R+30%§!\n    - Habitability on non-['concept_giga_gas_worlds', §YGas§!] worlds: §R-20%§!\n    - Job Exotic Gas upkeep on non-['concept_giga_gas_worlds', §YGas§!] worlds: §R+50%§!"
    trait_giga_gas_giant_hab_robot:0 "Exotic Gas-Fueled"
    trait_giga_gas_giant_hab_robot_desc:0 "§LSmall self-modifications over time has compounded into the near dependency of exotic gases to fuel these machines."
    trait_giga_gas_giant_hab_robot_tooltip:0 "$trait_giga_gas_giant_hab_tooltip$"

    giga_gas_giant_hab_colony_tt:0 "Considered a ['concept_giga_gas_worlds', §YGas§!] world for Gas Giant Liftoff Species."

    giga_gas_giant_hab_colony: "Flooded Atmosphere"
    giga_gas_giant_hab_colony_desc: ""

    decision_giga_flood_atmosphere:0 "Flood Planetary Atmosphere"
    decision_giga_flood_atmosphere_desc:0 ""

