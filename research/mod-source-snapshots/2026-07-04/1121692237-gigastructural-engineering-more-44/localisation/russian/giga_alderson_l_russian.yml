  pc_alderson_slice_gaia:0 "Часть мира Gaia Альдерсона"
  pc_alderson_slice_gaia_desc:0 "Гигантский кусок $name_alderson$, способный поддерживать поистине гигантское население. Этот срез отличается широким диапазоном климатов на разном расстоянии от звезды, и поэтому здесь обитают почти все виды."
  
  mod_pc_alderson_slice_gaia_shattered_habitability:0 "Жители Разрушенной Гайи Альдерсона"
  trait_pc_alderson_slice_gaia_shattered_preference:0 "Предпочтение Разрушенная Гайа Альдерсона"
  trait_pc_alderson_slice_gaia_shattered_preference_desc:0 "§LКлиматические предпочтения определяются на генетическом уровне эонами эволюции или умелыми манипуляциями.§!"
  
  mod_pc_alderson_slice_gaia_habitability:0 "Жители Gaia"
  trait_pc_alderson_slice_gaia_preference:0 "Предпочтение Gaia"
  trait_pc_alderson_slice_gaia_preference_desc:0 "§LКлиматические предпочтения определяются на генетическом уровне эпохами эволюции или умелыми манипуляциями.§!"
  
  trait_auto_pc_alderson_slice_preference:99 "$pc_alderson_slice_gaia$ Mutations"
