  building_automation_1_giga:99 "Giga-Automation Building"
  building_automation_1_giga_desc:99 "A city-sized plaque on the wall reads: 'It automates.'"
  mod_building_automation_1_giga_max:99 "Max Giga-Automation Building"
  
  building_automation_2_giga:99 "Giga-Optimization Building"
  building_automation_2_giga_desc:99 "Does it really optimize?"
  mod_building_automation_2_giga_max:99 "Max Giga-Optimization Building"
  
  building_automation_1_giga_alderson_tooltip:99 "Building Upkeep per Automated District: §R£energy£+$@automation_district_upkeep_1_alderson$§!"
  building_automation_2_giga_alderson_tooltip:99 "Building Upkeep per Automated District: §R£energy£+$@automation_district_upkeep_2_alderson$§!"
  
  
  district_alderson_logistics:99 "Logistical Hypersegment"
  district_alderson_logistics_desc:99 "Nestled within the frame and walls of this Alderson Slice, these logistical districts house much of the structure's governing systems while overseeing and optimizing its inner and outer workings. "
  district_alderson_logistics_plural:99 "Logistical Hypersegments"
  district_alderson_gaia:99 "Gaia Hypersegment"
  district_alderson_gaia_desc:99 "Mind-bogglingly large expanses of idyllic nature the size of whole solar systems ready for light urban or industrial development."
  district_alderson_gaia_plural:99 "Gaia Hypersegments"
  district_alderson_hive:99 "Hive Hypersegment"
  district_alderson_hive_desc:99 "Mind-bogglingly large expanses of hiveformed terrain the size of whole solar systems ready for light urban or industrial development."
  district_alderson_hive_plural:99 "Hive Hypersegments"
  district_alderson_machine:99 "Machine Hypersegment"
  district_alderson_machine_desc:99 "Mind-bogglingly large expanses of machine terrain the size of whole solar systems ready for light urban or industrial development."
  district_alderson_machine_plural:99 "Machine Hypersegments"
  district_alderson_ecu:99 "Ecumenopolis Hypersegment"
  district_alderson_ecu_desc:99 "Astronomical units of area engulfed in urbo-industrial sprawl of various nature capable of outproducing whole solar systems."
  district_alderson_ecu_plural:99 "Ecumenopolis Hypersegments"
  district_alderson_pcc:99 "Computing Hypersegment"
  district_alderson_pcc_desc:99 "A truly gargantuan computing complex similar to planetary ones, but stretched over an entire Alderson Slice. It is capable of untold processing power, and provides incredible buffs to research. Still cannot run Crysis."
  district_alderson_pcc_plural:99 "Computing Hypersegments"
  
  zone_alderson_energy:99 "Terascale Capacitors"
  zone_alderson_energy_desc:99 "Wrangling every last bit of energy from what physics allow."
  zone_alderson_food:99 "Alderson Hyperfarms"
  zone_alderson_food_desc:99 "Fields that could each engulf a world multiple times over grow peacefully under a bobbing sun."
  zone_alderson_housing:99 "Habitation Nexus"
  zone_alderson_housing_desc:99 "Endless spacious housing for a galaxy's worth of sapients. One could walk through these for a thousand years and still be on the same street."
  zone_alderson_minerals:99 "Bulk Matter Synthesizers"
  zone_alderson_minerals_desc:99 "Willing entire moons' worth of matter into existence through liberal application of mass-energy equivalence."
  
  zone_alderson_alloys:99 "Superheavy Forges"
  zone_alderson_alloys_desc:99 "Forges so grand and great they could cast an entire battleship in one singular piece."
  zone_alderson_cg:99 "Superheavy Fabricators"
  zone_alderson_cg_desc:99 "Billions of square kilometers dedicated entirely to the production of popular goods. Almost fast enough to keep up with modern trends."
  zone_alderson_factory:99 "Megasprawl Manufactories"
  zone_alderson_factory_desc:99 "Anything solid that has ever been engineered by the sapient mind can be found here, somewhere, amongst the millions and billions of towering exhaust stacks. Don't ask where."
  zone_alderson_fortress:99 "Solar Bulwark"
  zone_alderson_fortress_desc:99 "An impenetrable network of fortresses and barracks sustaining armies more populous than entire worlds."
  
  zone_alderson_research_physics:99 "Stellar Particle Accelerators"
  zone_alderson_research_physics_desc:99 "Finding ever-better ways to accelerate particles ever-faster."
  zone_alderson_research_society:99 "Societal Supersimulators"
  zone_alderson_research_society_desc:99 "Simulating social and biological interactions sixteen trillion times faster than a sapient in their cleaning apparatus."
  zone_alderson_research_engineering:99 "Gigaengineering Research Node"
  zone_alderson_research_engineering_desc:99 "Using big things to figure out how to build even bigger things."
  zone_alderson_research:99 "Solar Computing Complexes"
  zone_alderson_research_desc:99 "Futilely attempting to run Crysis."
  zone_alderson_unity:99 "Bureaucratic Gigaprocessors"
  zone_alderson_unity_desc:99 "Endless rows of processors dedicated solely to handling digital paperwork."
  zone_alderson_unity_spiritualist:99 "Sanctified Gigatemples"
  zone_alderson_unity_spiritualist_desc:99 "Endless buildings of worship dot the landscape, and the lines of pilgrims and worshipers stretch to the horizon."
  zone_alderson_unity_servitor:99 "Organic Gigasanctuary"
  zone_alderson_unity_servitor_desc:99 "Endless rows of skyscrapers packed to the brim with sapient organics, given any luxury they require in a perfect environment."
  zone_alderson_trade:99 "Ecologistical Omnipredictors"
  zone_alderson_trade_desc:99 "Overworked procressors handling logistical and economical predictions for our entire empire."
  
  zone_alderson_housing_optimization:99 "Housing Optimization"
  zone_alderson_housing_optimization_desc:99 "Resolving the inevitable inefficiencies with how housing is allocated on such a large structure, one citizen at a time."
  zone_alderson_infrastructure_optimization:99 "Infrastructure Optimization"
  zone_alderson_infrastructure_optimization_desc:99 "Figuring out how to not take teraseconds to move teratons across terameters."
  zone_alderson_pop_growth:99 "Population Optimization"
  zone_alderson_pop_growth_desc:99 "Overseeing and optimizing behavioral, societal and biological patterns."
  
  pc_alderson_slice_gaia_shattered:0 "Разрушенный гиперсегмент"
  pc_alderson_slice_gaia_shattered_desc:0 "Нефункциональный, колоссальный сегмент диска Альдерсона."
  pc_alderson_slice_gaia_shattered_adj:0 "опубликовать это в общем разговоре"
  
