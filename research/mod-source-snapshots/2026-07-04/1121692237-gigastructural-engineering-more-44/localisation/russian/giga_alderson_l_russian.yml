l_russian:
  origin_alderson:0 "Диск Альдерсона"
  origin_alderson_desc:0 "Вы остаток давно забытой цивилизации, живущий на бескрайних просторах диска Альдерсона, построенного вашими предками. В других секциях обитает разумная жизнь, однако их таинственные генераторы давно вышли из строя."
  origin_alderson_effects:0 "Начните с $pc_alderson_slice_gaia_shattered$, разрушенной части колоссального Диска Альдерсона.\n– Приспособленность установлена ​​на §L$pc_alderson_slice_gaia_shattered$§!.\n– §RПоблизости не будет систем с гарантированно обитаемыми мирами§!.\ n- Рядом с вами на Альдерсоне появятся две могущественные нации до сверхсветовой эпохи."
  
  giga_alderson_start_NAME:99 "$origin_alderson$"
  giga_alderson_start_DESC:99 "$origin_alderson_desc$"
  
  giga_start_screen_alderson:0 "Мы не знаем, что случилось с нашими предками. Враги, чума, гражданская война? Они существуют сейчас как мифы и легенды, их знания и сила утрачены. Они каким-то образом построили этот огромный диск, охватывающий всю гравитацию нашей звезды, и теперь мы живем на огромном, гулком пространстве, предназначенном для проживания в миллион раз больше людей, чем осталось.\n\nПоскольку все, кроме последнего фрагмента, пришли в негодность и бесполезность, наши люди были наполнены новым чувством цели: мы должны объединиться и занять свое место среди звезд, иначе мы навсегда потеряемся для истории.\n\nНам нужно заставить людей работать на рабочих местах §Y$job_miner$§! и §Y$job_technician$§!, прежде чем у нас закончатся ресурсы для расширения.\n\nЧтобы это произошло, нам, возможно, придется отстранить некоторых людей от их любимой работы.\n\n§RИИ не может использовать это происхождение. Любые сгенерированные предопределенные пользовательские империи ИИ с этим источником будут сгенерированы с помощью $origin_default$.§!"
  
  name_alderson:0 "Диск Альдерсона"
  allow_alderson:0 "§HОткрывает мегаструктуру:§! $name_alderson$"
  desc_alderson:0 "Диск Альдерсона - это колоссальный диск, построенный вокруг звезды, обеспечивающий огромное жизненное пространство."
  
  decision_repair_shattered_alderson:99 "Repair Hypersegment"
  decision_repair_shattered_alderson_desc:99 "Our ancestral home will not lie in indignant disrepair any longer. It is time to restore our heritage."
  decision_shattered_alderson_project_effects:0 "Восстанавливает этот гиперсегмент до §G$pc_alderson_slice_gaia$§!"
  
  alderson_shield:99 "Ancient Forcefield"
  alderson_shield_desc:99 "Whichever empire built this $name_alderson$ placed a vast network of shield projectors across the disk's surface. Many are beyond destroyed by now but the projectors on this disk seem to be functioning. Any attempt at bombardment will be severely slowed, necessitating a ground invasion."
  
  giga_tech_alderson_disk:0 "$name_alderson$"
  giga_tech_alderson_disk_desc:0 "$name_alderson$  - это массивный диск, охватывающий всю солнечную систему, на верхней поверхности которого можно жить. Такая конструкция была бы смехотворно дорогой и потребовала бы применения нескольких невероятно передовых технологий, чтобы предотвратить ее обрушение, но могла бы обеспечить неисчислимые объемы промышленных мощностей и пространства для зданий."
  
  dominion_defender:0 "Доминион Хищник"
  dominion_defender_desc:0 "Бесстрашные воины, часто встречаются большими группами."
  
  excognitor_defender:0 "Преторианец Экскогнитор"
  excognitor_defender_desc:0 "Совершенно измотанные, эти солдаты тренируются каждый час бодрствования."
  
