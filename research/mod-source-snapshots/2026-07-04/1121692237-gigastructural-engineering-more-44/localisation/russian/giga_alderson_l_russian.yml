  ##################################################
  # "miners"
  job_ald_matter_synthesizer:0 "Синтезатора материи Альдерсона"
  job_ald_matter_synthesizer_plural:0 "Синтезаторы материи Альдерсона"
  job_ald_matter_synthesizer_desc:0 "Огромное количество менеджеров и рабочих с целью получения полезных ископаемых из энергии. Объекты невозможно построить где-либо еще."
  mod_job_ald_matter_synthesizer_add:0 "Вакансии $job_ald_matter_synthesizer$"
  
  job_ald_matter_synthesizer_drone:0 "Дрон-синтезатор материи Альдерсона"
  job_ald_matter_synthesizer_drone_plural:0 "Дроны-синтезатор материи Альдерсона"
  job_ald_matter_synthesizer_drone_desc:0 "Огромное количество дронов с целью получения полезных ископаемых из энергии. Этот процесс требует тонны энергии и много места. Это все еще можно сделать."
  mod_job_ald_matter_synthesizer_drone_add:0 "Вакансии $job_ald_matter_synthesizer_drone$"
  
  # technicians
  job_ald_supergenerator:0 "Техник Альдерсона"
  job_ald_supergenerator_plural:0 "Техники Альдерсона"
  job_ald_supergenerator_desc:0 "Огромное количество менеджеров и рабочих с целью поддержания производства электроэнергии. Они чинят панели большей площади, чем целые планеты и реакторы, которых больше нигде не найти."
  mod_job_ald_supergenerator_add:0 "Вакансии $job_ald_supergenerator$"
  
  job_ald_supergenerator_drone:0 "Дрон-техник Альдерсона"
  job_ald_supergenerator_drone_plural:0 "Дроны-техники Альдерсона"
  job_ald_supergenerator_drone_desc:0 "Огромное количество дронов с целью поддержания производства энергии. Они ремонтируют колоссальные панели и гигантские реакторы."
  mod_job_ald_supergenerator_drone_add:0 "Вакансии $job_ald_supergenerator$"
  
  # farmers
  job_ald_superfarmer:0 "Крупный фермер"
  job_ald_superfarmer_plural:0 "Крупные фермеры"
  job_ald_superfarmer_desc:0 "Огромное количество менеджеров и рабочих с целью сохранения флоры и фауны. Некоторые из этих растений и животных могут месяцами кормить целые семьи!"
  mod_job_ald_superfarmer_add:0 "Вакансии $job_ald_superfarmer$"
  
  job_ald_superfarmer_drone:0 "Дрон-фермер Альдерсона"
  job_ald_superfarmer_drone_plural:0 "Дроны-фермеры Альдерсона"
  job_ald_superfarmer_drone_desc:0 "Огромное количество дронов с целью поддержания флоры и фауны. Некоторые из них требуют большого количества места, но имеют высокую урожайность."
  mod_job_ald_superfarmer_drone_add:0 "Вакансии $job_ald_superfarmer_drone$"
  
  # exotic gas refiners
  job_ald_gases:0 "Специалист по переработке"
  job_ald_gases_plural:0 "Специалисты по переработке"
  job_ald_gases_desc:0 "Большая группа менеджеров и техников, наблюдающих за огромными перерабатывающими заводами. Гипотетически эти здания позволили бы нам заменить целые атмосферы инертными газами."
  mod_job_ald_gases_add:0 "Вакансии $job_ald_gases$"
  
  job_ald_gases_drone:0 "Дрон-специалист Альдерсона по переработке"
  job_ald_gases_drone_plural:0 "Дроны-специалисты Альдерсона по переработке"
  job_ald_gases_drone_desc:0 "Большая группа дронов, предназначенных для наблюдения за огромными перерабатывающими заводами. Некоторые перерабатывающие заводы производят больше газа, чем может иметь целая планета."
  mod_job_ald_gases_drone_add:0 "Вакансии $job_ald_gases_drone$"
  
  # volatile motes chemists
  job_ald_motes:0 "Крупный химик"
  job_ald_motes_plural:0 "Крупные химики"
  job_ald_motes_desc:0 "Большая группа менеджеров и техников наблюдает за крупными химическими заводами. Эти объекты могли бы преобразовать массу целых планет, если бы у них было немного времени."
  mod_job_ald_motes_add:0 "Вакансии $job_ald_motes$"
  
  job_ald_motes_drone:0 "Дрон-химик Альдерсона"
  job_ald_motes_drone_plural:0 "Дрон-химик Альдерсона"
  job_ald_motes_drone_desc:0 "Большая группа дронов, предназначенных для наблюдения за крупными химическими заводами. Количество используемых материалов может быстро соперничать с массой целых планет."
  mod_job_ald_motes_drone_add:0 "Вакансии $job_ald_motes_drone$"
  
  # rare crystal translucers
  job_ald_crystals:0 "Кристальный смотритель"
  job_ald_crystals_plural:0 "Кристальные смотрители"
  job_ald_crystals_desc:0 "Большая группа менеджеров и техников, наблюдающих за огромными фабриками. Размер одной-единственной фабрики затмит большинство городов."
  mod_job_ald_crystals_add:0 "Вакансии $job_ald_crystals$"
  
  job_ald_crystals_drone:0 "Линзирующий дрон Альдерсона"
  job_ald_crystals_drone_plural:0 "Линзирующие дроны Альдерсона"
  job_ald_crystals_drone_desc:0 "Большая группа дронов, предназначенная для наблюдения за крупными фабриками. Размеры этих заводов возможны только в пространстве Альдерсона."
  mod_job_ald_crystals_drone_add:0 "Вакансии $job_ald_crystals_drone$"
  
  # metallurgists
  job_ald_hyperfoundry:0 "Крупный литейщик"
  job_ald_hyperfoundry_plural:0 "Крупные литейщики"
  job_ald_hyperfoundry_desc:0 "Большая группа кузнецов в массивных литейных цехах. Они используют гигантские инструменты и костюмы для производства невероятного количества наших драгоценных сплавов."
  mod_job_ald_hyperfoundry_add:0 "Вакансии $job_ald_hyperfoundry$"
  
  job_ald_hyperfoundry_drone:0 "Литейный дрон Альдерсона"
  job_ald_hyperfoundry_drone_plural:0 "Литейные дроны Альдерсона"
  job_ald_hyperfoundry_drone_desc:0 "Большая группа дронов управляет массивными литейными цехами. Большое количество очищенных металлов, которые они производят, является жизненной силой наших конструкций."
  mod_job_ald_hyperfoundry_drone_add:0 "Вакансии $job_ald_hyperfoundry_drone$"
  
  # artisans
  job_ald_hyperfactorio:0 "Крупный ремесленник"
  job_ald_hyperfactorio_plural:0 "Крупные ремесленники"
  job_ald_hyperfactorio_desc:0 "Большая группа фабричных рабочих на массивных фабриках. Они производят ошеломляющее количество предметов роскоши и товаров, используя очень большие инструменты."
  mod_job_ald_hyperfactorio_add:0 "Вакансии $job_ald_hyperfactorio$"
  
  job_ald_hyperartificer:0 "Великий Ремесленник"
  job_ald_hyperartificer_plural:0 "Великие Ремесленники"
  job_ald_hyperartificer_desc:0 "Большая группа чрезвычайно талантливых Ремесленников на больших фабриках. Они превращают производство обычных товаров в зрелище."
  mod_job_ald_hyperartificer_add:0 "Вакансии $job_ald_hyperartificer$"
  
  job_ald_hyperfactorio_drone:0 "Дрон-ремесленник Альдерсона"
  job_ald_hyperfactorio_drone_plural:0 "Дроны-ремесленники Альдерсона"
  job_ald_hyperfactorio_drone_desc:0 "Большая группа дронов управляет огромными заводами. Они производят товары, необходимые для того, чтобы «Жизнь» стоила жизни."
  mod_job_ald_hyperfactorio_drone_add:0 "Вакансии $job_ald_hyperfactorio_drone$"
  
  # researchers
  job_ald_megascience:0 "Аналитический центр"
  job_ald_megascience_plural:0 "Аналитические центры"
  job_ald_megascience_desc:0 "Колоссальная группа самых ярких умов. Хотя они не всегда согласны, все они вносят свой вклад в науку."
  mod_job_ald_megascience_add:0 "Вакансии $job_ald_megascience$"
  
  job_ald_megascience_mind:0 "Связанный разум"
  job_ald_megascience_mind_plural:0 "Связанные разумы"
  job_ald_megascience_mind_desc:0 "Колоссальная группа дронов, работающих как один. Они вкладывают каждую часть своих умственных сил в науку."
  mod_job_ald_megascience_mind_add:0 "Вакансии $job_ald_megascience_mind$"
  
  job_ald_megascience_robot:0 "Нейронная сеть Альдерсона"
  job_ald_megascience_robot_plural:0 "Нейронные сети Альдерсона"
  job_ald_megascience_robot_desc:0 "Колоссальная группа дронов, работающих как один. Каждую секунду они выполняют неисчислимое количество вычислений."
  mod_job_ald_megascience_robot_add:0 "Вакансии $job_ald_megascience_robot$"
  
  # duelist only
  job_ald_duelists:0 "Развлекательный батальон"
  job_ald_duelists_plural:0 "Развлекательные батальоны"
  job_ald_duelists_desc:0 "Целые батальоны используют широкие открытые пространства для развлечения. Огромный размер позволяет использовать ядерное оружие для шоу."
  mod_job_ald_duelists_add:0 "Вакансии $job_ald_duelists$"
  
  # not used
  job_ald_duelist_effect_desc:0 "£job_duelist£ $job_ald_duelists_plural$ превращают £alloys£ §Y$alloys$§! в £unity£ §Y$unity$§!, £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§! и £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!"
  
  # priests
  job_ald_priest:0 "Великий Жрец"
  job_ald_priest_plural:0 "Великие Жрецы"
  job_ald_priest_desc:0 "Обширная сеть ораторов и верующих. Священники работают не покладая рук, чтобы поддерживать традиции и основные убеждения."
  mod_job_ald_priest_add:0 "Вакансии $job_ald_priest$"
  
  job_ald_deathpriest:0 "Жрец прохождения"
  job_ald_deathpriest_plural:0 "Жрецы прохождения"
  job_ald_deathpriest_desc:0 "Обширная сеть мрачных проповедников и верующих. Эти жрецы читают людям конец, гарантируя, что жертва никогда не будет напрасной."
  mod_job_ald_deathpriest_add:0 "Вакансии $job_ald_deathpriest$"
  
  # culture workers
  job_ald_cultureworker:0 "Эксперт Альдерсона по культуре"
  job_ald_cultureworker_plural:0 "Эксперты Альдерсона по культуре"
  job_ald_cultureworker_desc:0 "Целые труппы, создающие, исполняющие и воссоздающие искусство. Музеи, отображающие историю. Художественные выставки становятся больше, чем целые города в нашей истории."
  mod_job_ald_cultureworker_add:0 "Вакансии $job_ald_cultureworker$"
  
  job_ald_corpmanager:0 "Региональный менеджер"
  job_ald_corpmanager_plural:0 "Региональные менеджеры"
  job_ald_corpmanager_desc:0 "Большие группы менеджеров среднего звена. Они безжалостно соревнуются, чтобы их часть диска приносила наибольшую прибыль."
  mod_job_ald_corpmanager_add:0 "Вакансии $job_ald_corpmanager$"
  
  job_ald_memorialist:0 "Писец смерти"
  job_ald_memorialist_plural:0 "Писцы смерти"
  job_ald_memorialist_desc:0 "Большие группы людей, посвятивших себя выживанию и отсутствию такового в галактике. Они используют свое пространство для воссоздания древних городов и достопримечательностей, чтобы лучше понять тех, кого они изучают."
  mod_job_ald_memorialist_add:0 "Вакансии $job_ald_memorialist$"
  
  # merchants
  job_ald_merchant:0 "Торговый барон"
  job_ald_merchant_plural:0 "Торговые бароны"
  job_ald_merchant_desc:0 "Невероятное количество сообразительных продавцов, способных проследить за продажей запасов на целую планету еще до обеда. Они контролируют большую часть земли и ее переходящих владельцев."
  mod_job_ald_merchant_add:0 "Вакансии $job_ald_merchant$"
  
  
  
  
