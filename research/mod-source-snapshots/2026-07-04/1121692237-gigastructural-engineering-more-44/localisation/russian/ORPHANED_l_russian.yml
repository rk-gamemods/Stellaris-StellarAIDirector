  district_giga_planet_wind:0 "Группа ветряных турбин"
  district_giga_planet_wind_plural:0 "Группа ветряных турбин"
  district_giga_planet_wind_desc:0 "Массивные группы ветряных турбин, плавающие в атмосфере газового гиганта, вырабатывают огромное количество энергии."
  district_giga_planet_solar:0 "Солнечная ферма"
  district_giga_planet_solar_plural:0 "Солнечные фермы"
  district_giga_planet_solar_desc:0 "Массивные поля солнечных панелей, простирающиеся по большей части поверхности."
  district_giga_planet_science:0 "Исследовательская лаборатория"
  district_giga_planet_science_plural:0 "Исследовательские лаборатории"
  district_giga_planet_science_desc:0 "Эти передовые исследовательские центры оснащены новейшим научным оборудованием и имеют чрезвычайно большой штат сотрудников."
  district_giga_planet_exotic:0 "Газоперекачивающий комплекс"
  district_giga_planet_exotic_plural:0 "Газоперекачивающие комплексы"
  district_giga_planet_exotic_desc:0 "Машины, которые могут извлекать газы из изолированных карманов в атмосфере этой планеты."
  mod_district_giga_planet_exotic_max:0 "Улучшенный $district_giga_planet_exotic$"
  district_giga_planet_leisure:0 "Район отдыха"
  district_giga_planet_leisure_plural:0 "Районы отдыха"
  district_giga_planet_leisure_desc:0 "Предлагают поистине захватывающие дух виды, а также невероятную возможность создать искусно спроектированную среду."
  allow_district_birch_extraction:0 "§HОткрывает район:§! $name_birch$ Районы добычи"
  desc_district_birch_extraction:0 "Позволяет строить районы добычи в $name_birch$"
  d_birch_structure:0 "Структурные операции"
  d_birch_structure_desc:0 "Этот небольшой остров предназначен для размещения групп экспертов по расширению, которые могут построить острова, чтобы обеспечить дополнительную инфраструктуру на этом $name_birch$."
  d_birch_extraction:0 "Операции по добыче"
  d_birch_extraction_desc:0 "Большие конструкции, предназначенные для извлечения материала и энергии из черной дыры. Довольно опасно, но нам нужны ресурсы."
  d_birch_start:0 "Центральное управление"
  d_birch_start_desc:0 "С небольшим населением и невероятно большим домом, нуждающимся в содержании, людям некогда быть разборчивыми в своей работе."
  d_birch_lost01:0 "Найти потерянные сообщества"
  d_birch_lost01_desc:0 "Поверхность настолько обширна, что целые сообщества живут изолированно, мы должны вернуть их в лоно."
  d_found_communities:0 "Найденные сообщества"
  d_found_communities_desc:0 "Экспоненциальный рост сопровождается экспоненциальными затратами. Тем не менее, мы рады их видеть."
  district_giga_birch_extraction_plural:0 "Операции по добыче"
  mod_district_giga_birch_extraction_max:0 "Улучшенные $district_giga_birch_extraction$"
  planet_infrastructure:0 "Вакансии в инфраструктуре"
  planet_bore:0 "Минеральные буровые вакансии"
  planet_penrose:0 "Вакансии с заданиями Пенроуз"
  jobs_structure_desc:0 "£job_structure_manager£ Островные менеджеры-конструкторы производят §G+10§! £engineering_research£ §YИнженерные исследования§!, §G+1§! £mod_planet_max_districts_add£ §YРайон§!, и §G+10§! £unity£ §YЕдинство§!, и предоставляют вакансии §G+4§! £job_structure_engineer£ §YОстровной инженер-конструктор§!.\n£job_structure_engineer£ Производство островных инженеров-конструкторов §G+5§! £engineering_research£ §YИнженерные исследования§!, §G+2§! £unity£ §YЕдинство§!, §G+25§! £amenities£ §YУдобства§!, и §G+30§! £housing£ §YЖилье§!."
  jobs_structure_process_desc:0 "£job_structure_process£ Островные подпроцессорные конструктора производят §G+10§! £engineering_research£ §YИнженерные исследования§!, §G+1§! £mod_planet_max_districts_add£ §YРайон§!, и §G+10§! £unity£ §YЕдинство§!, и предоставляют вакансии §G+4§! £job_structure_drone£ §YОстровной дрон-конструктор§!.\n£job_structure_drone£ островные дроны-конструкторы производят §G+5§! £engineering_research£ §YИнженерные исследования§!, §G+2§! £unity£ §YЕдинство§!, §G+25§! £amenities£ §YУдобства§!, и §G+30§! £housing£ §YЖилье§!."
  jobs_structure_mind_desc:0 "£job_structure_mind£ Островные трутни-конструкторы производят §G+10§! £engineering_research£ §YИнженерные исследования§!, §G+1§! £mod_planet_max_districts_add£ §YРайон§!, и §G+10§! £unity£ §YЕдинство§!, и предоставляют вакансии §G+4§! £job_structure_drone£ §YОстровной дрон-конструктор§!.\n£job_structure_drone£ островные дроны-конструкторы производят §G+5§! £engineering_research£ §YИнженерные исследования§!, §G+2§! £unity£ §YЕдинство§!, §G+25§! £amenities£ §YУдобства§!, и §G+30§! £housing£ §YЖилье§!."
  jobs_extraction_desc:0 "£job_bore_manager£ Менеджеры минерльных буров производят §G+50§! £engineering_research£ §YИнженерные исследования§! и предоставляют вакансии §G+8§! £job_bore_engineer£ §YИнженер минеральных буров§!.\n£job_penrose_manager£ Менеджеры процессов Пенроуз производят §G+50§! £physics_research£ §YФизические исследования§! и предоставляют вакансии §G+8§! £job_penrose_engineer£ §YИнженер процессов Пенроуз§! и вакансии §G+2§! £job_penrose_weaver£ §YТкач Темной Материи§!.\n£job_bore_engineer£ Инженеры минеральных буров производят §G+90§! £minerals£ §YМинералы§!.\n£job_penrose_engineer£ Инженеры процессов Пенроуз производят §G+90§! £energy£ §YЭнергия§!.\n£job_penrose_weaver£ Ткач темной материи использует §R-4§! £energy£ §YЭнергия§! и §R-4§! £minerals£ §YМинералы§! и производит §G+2§! £sr_dark_matter£ §YТемная материя§!."
  jobs_extraction_process_desc:0 "£job_bore_process£ Подпроцессоры минеральных буров производят §G+50§! £engineering_research£ §YИнженерные исследования§! и предоставляют вакансии §G+8§! £job_bore_drone£ §YДрон минеральных буров§!.\n£job_penrose_process£ Подпроцессоры процессов Пероуз производят §G+50§! £physics_research£ §YФизические исследования§! и предоставляют вакансии §G+8§! £job_penrose_drone£ §YДрон процессов Пенроуз§! и вакансии §G+2§! £job_penrose_weaver_drone£ §YДрон-ткач Темной Материи§!.\n£job_bore_drone£ Дрон минеральных буров производит §G+90§! £minerals£ §YМинералы§!.\n£job_penrose_drone£ Дроны процессов Пенроуз производят §G+90§! £energy£ §YЭнергия§!.\n£job_penrose_weaver_drone£ Дрон-ткач темной материи использует §R-4§! £energy£ §YЭнергия§! и §R-4§! £minerals£ §YМинералы§! и производит §G+2§! £sr_dark_matter£ §YТемная материя§!."
  jobs_extraction_mind_desc:0 "£job_bore_mind£ Трутни минеральных буров производят §G+50§! £engineering_research£ §YИнженерные исследования§! и предоставляют вакансии §G+8§! £job_bore_drone£ §YДрон минеральных буров§!.\n£job_penrose_mind£ Трутни процессов Пенроуз производят §G+50§! £physics_research£ §YФизические исследования§! и предоставляют вакансии §G+8§! £job_penrose_drone£ §YДрон процессов Пенроуз§! и вакансии §G+2§! £job_penrose_weaver_drone£ §YДрон-ткач Темной Материи§!.\n£job_bore_drone£ Дрон минеральных буров производит §G+90§! £minerals£ §YМинералы§!.\n£job_penrose_drone£ Дроны процессов Пенроуз производят §G+90§! £energy£ §YЭнергия§!.\n£job_penrose_weaver_drone£ Дрон-ткач темной материи использует §R-4§! £energy£ §YЭнергия§! и §R-4§! £minerals£ §YМинералы§! и производит §G+2§! £sr_dark_matter£ §YТемная материя§!."
