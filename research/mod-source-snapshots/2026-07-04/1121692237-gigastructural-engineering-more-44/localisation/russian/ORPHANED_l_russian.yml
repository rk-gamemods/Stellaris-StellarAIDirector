  d_alderson_ruined_crafters_cleared:0 "Механики: §G+5%§!\nОчистка всех заблокированных §Y$d_alderson_ruined_artisan$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
