  mod_pc_alderson_slice_hive_habitability:0 "Жители улья"
  trait_pc_alderson_slice_hive_preference:0 "Предпочтение Улей"
  trait_pc_alderson_slice_hive_preference_desc:0 "§LКлиматические предпочтения определяются на генетическом уровне эпохами эволюции или умелыми манипуляциями.§!"
  mod_pc_alderson_slice_machine_habitability:0 "Пригодность для машин"
  trait_pc_alderson_slice_machine_preference:0 "Предпочтение машины"
  trait_pc_alderson_slice_machine_preference_desc:0 "§LКлиматические предпочтения определяются на генетическом уровне эпохами эволюции или умелыми манипуляциями.§!"
  building_giga_planetary_shield_generator_1:0 "Гиперщитовой защитный экран"
  building_giga_planetary_shield_generator_1_desc:0 "Гиперщитовой защитный экран — это улучшенная версия классического генератора планетарного щита, в котором используется технология Гиперщита для значительного улучшения возможностей и эффективности генератора."
  district_giga_alderson_refineries:0 "Обработка гиперсегмента"
  district_giga_alderson_refineries_plural:0 "Обработка гиперсегментов"
  district_giga_alderson_refineries_desc:0 "Этот Гиперсегмент составляют многочисленные обширные объекты, превышающие размеры некоторых лун. Они позволяют обрабатывать простые материалы в гораздо более сложные формы в беспрецедентных масштабах."
  district_giga_alderson_city:0 "Жилой гиперсегмент"
  district_giga_alderson_city_plural:0 "Жилые гиперсегменты"
  district_giga_alderson_city_desc:0 "Здесь построены невероятно большие городские жилые массивы, простирающиеся на тысячи и тысячи километров во всех направлениях."
  district_giga_alderson_nexus:0 "Гиперсегмент Нексуса"
  district_giga_alderson_nexus_plural:0 "Гиперсегменты Нексус"
  district_giga_alderson_nexus_desc:0 "Огромные эффективные районы заполняют этот раздел и предоставляют места для обслуживания и ремонта дронов, прежде чем они будут развернуты для своих рабочих заданий."
  district_giga_alderson_hive:0 "Гиперсегмент улья"
  district_giga_alderson_hive_plural:0 "Гиперсегменты улья"
  district_giga_alderson_hive_desc:0 "Через эту секцию тянутся высокие шпили, чтобы дроны могли собираться, когда не работают, для омоложения и потребления питательных веществ."
  district_giga_alderson_generator:0 "Гиперсегмент солнечного генератора"
  district_giga_alderson_generator_plural:0 "Гиперсегменты солнечного генератора"
  district_giga_alderson_generator_desc:0 "Здесь построены гигантские комплексы солнечных панелей, вырабатывающих неисчислимое количество энергии от солнца, дополненные подземными термоядерными реакторами."
  district_giga_alderson_farming:0 "Гиперсегмент фермерского хозяйства"
  district_giga_alderson_farming_plural:0 "Гиперсегменты фермерского хозяйства"
  district_giga_alderson_farming_desc:0 "Колоссальный ландшафт, сочетающий в себе башни выращивания и более классические сельскохозяйственные угодья. Условия содержания скота варьируются от сгущенного до свободного выгула. Эти процессы в основном автоматизированы; Флора и фауна могут быть опасны для среднего фермера."
  district_giga_alderson_mining:0 "Гиперсегмент синтезатора материи"
  district_giga_alderson_mining_plural:0 "Гиперсегменты синтезатора материи"
  district_giga_alderson_mining_desc:0 "Колоссальный пейзаж, посвященный подстанциям размером с планету и сложным машинам для синтеза различных основных материалов."
  district_giga_alderson_commercial:0 "Комерческий гиперсегмент"
  district_giga_alderson_commercial_plural:0 "Комерческие гиперсегменты"
  district_giga_alderson_commercial_desc:0 "Гражданская промышленность и инфраструктура составляют этот гиперсегмент, посвященный торговле."
  district_giga_alderson_science:0 "Научный гиперсегмент"
  district_giga_alderson_science_plural:0 "научные гиперсегменты"
  district_giga_alderson_science_desc:0 "Этот гиперсегмент заполняется всевозможными исследовательскими центрами."
  district_giga_alderson_admin:0 "Административный гиперсегмент"
  district_giga_alderson_admin_plural:0 "Административные гиперсегменты"
  district_giga_alderson_admin_desc:0 "Посвящается повышению способности нашей империи управлять колониями."
  district_giga_alderson_consumer:0 "Индустриальный гиперсегмент"
  district_giga_alderson_consumer_plural:0 "Индустриальные гиперсегменты"
  district_giga_alderson_consumer_desc:0 "Мастерские, заполненные ремесленниками и гражданскими предприятиями, выстроились на улицах этого гиперсегмента."
  district_giga_alderson_alloys:0 "Литейный Гиперсегмент"
  district_giga_alderson_alloys_plural:0 "Литейные Гиперсегменты"
  district_giga_alderson_alloys_desc:0 "Этот экуменополистический гиперсегмент, ориентированный на военную промышленность, наполнен грохотом плавильных печей и лязгом металлургии."
  district_giga_alderson_leisure:0 "Гиперсегмент досуга"
  district_giga_alderson_leisure_plural:0 "Гиперсегменты досуга"
  district_giga_alderson_leisure_desc:0 "Где обитатели гиперсегмента расслабляются в часы досуга."
  district_giga_alderson_pop_growth:0 "Гиперсегмент роста улья"
  district_giga_alderson_pop_growth_plural:0 "Гиперсегменты роста улья"
  district_giga_alderson_pop_growth_desc:0 "Эти бассейны, за которыми ухаживают научные и бережные специалисты, стимулируют ускоренный рост нашего улья."
  district_giga_alderson_pop_assembly:0 "Гиперсегмент сборки"
  district_giga_alderson_pop_assembly_plural:0 "Гиперсегменты сборки"
  district_giga_alderson_pop_assembly_desc:0 "Огромные фабрики, предназначенные для сборки нашего населения."
  ap_slice_of_life:0 "Кусочек жизни"
  ap_slice_of_life_desc:0 "Миры-кольца, которые когда-то считались вершиной мегаинженерии, теперь не более чем прославленная среда обитания. Поэтому мы должны перейти к следующему этапу мегаинженерии, спроектировав новый тип среды обитания, который превосходит даже самый большой из кольцевых миров. $Name_alderson$, гигантский диск размером с Солнечную систему, построенный вокруг звезды, позволил бы нам разместить невообразимое количество людей и промышленности."
  add_research_options_alderson:0 "Полученные варианты исследования:\n£engineering£§Y$name_alderson$§!"
  ap_systemcraft:0 "Эзотерическое небесное оружие"
  ap_systemcraft_desc:0 "Мы уже можем превращать целые планеты в военные корабли, но некоторые из наших более амбициозных ученых считают, что каким-то образом можно было бы сделать еще больше. Целая солнечная система, собранная вместе, чтобы сформировать военный корабль невероятно огромных размеров. Эта грандиозная конструкция затмила бы даже могущественную $name_war_planet$, и, наконец, у нас, наконец, может быть достаточно дакки."
  add_research_options_systemcraft_base:0 "Полученные варианты исследования:\n£physics_research£§YКаркас: звездно-чешуйчатая силовая установка§!\nМы начнем работать над рядом технологий, чтобы в конечном итоге построить самое большое и грандиозное судно, которое когда-либо видела эта галактика или, возможно, даже вселенная."
  pc_alderson_slice_ecu:0 "Экуменополис Альдерсона"
  pc_alderson_slice_ecu_desc:0 "Поистине титанический город, раскинувшийся через всю солнечную систему. Полностью охваченный урбанистическим разрастанием, этот ломтик Олдерсона может унести на своей поверхности огромное количество предприятий и людей."
  pc_alderson_slice_hive:0 "Улей Альдерсона"
  pc_alderson_slice_hive_desc:0 "Весь этот кусок представляет собой гигантский живой организм, псионически связанный с разумом Улья, который его сформировал. Любые существа, не входящие в Улей, ступившие сюда, будут атакованы самой местностью."
  pc_alderson_slice_machine:0 "Машинный мир Альдерсона"
  pc_alderson_slice_machine_desc:0 "Покрыт искусственными конструкциями. Тонкая атмосфера состоит в основном из промышленных загрязнителей и не способна поддерживать биологическую жизнь."
  pc_alderson_slice_pc:0 "Компьютерный комплекс Альдерсона"
  pc_alderson_slice_pc_desc:0 "Поистине гигантский вычислительный комплекс, похожий на планетарный, но растянувшийся на весь участок Альдерсона. Он обладает невероятной вычислительной мощностью и дает невероятные преимущества для исследований. По-прежнему не удается запустить Crysis."
  tech_giga_planetary_shield_generator_1:0 "Гиперщитовой защитный экран"
  tech_giga_planetary_shield_generator_1_desc:0 "Открытия, сделанные при изучении Планеты-Растения-Мозга, привели к развитию искусственных квази-нейронных сетей. Это позволяет нам использовать альтернативные и неизвестные методы передачи данных и управления данными в различных областях применения."
  district_giga_alderson_industrial:0 "Промышленный гиперсегмент"
  district_giga_alderson_industrial_plural:0 "Промышленные гиперсегменты"
  district_giga_alderson_industrial_desc:0 "Колоссальный пейзаж, посвященный поистине титаническим гиперрельсам, массивным механическим костюмам и непонятным фабрикам. Здесь не место обычному рабочему."
  giga_blokkat.3351.a.tooltip:0 "Стоимость этой технологии составит §Y25M§!."
  giga_dialog.2501.title:0 "Специализация части Альдерсона"
  giga_dialog.2501.desc:0 "Пришло время решить, какой тип части Альдерсона мы хотим обновить до этого сегмента. Тип может быть изменен позже, когда сегмент будет завершен, путем терраформирования."
  giga_dialog.2505.title:0 "Компьютерный комплекс Альдерсона завершен!"
  giga_dialog.2505.desc:0 "Один из фрагментов нашего $name_alderson$ наконец-то готов! Эта колоссальная среда обитания охватывает несколько астрономических единиц и обеспечивает неисчислимое количество жизненного пространства для нашего населения и промышленности. Этот слой полностью покрыт слоями мощных компьютеров и процессоров. Он сможет предоставить нашим исследователям практически неограниченное количество вычислительных мощностей и мгновенный доступ к банкам данных нашей империи. Эта могущественная конструкция, несомненно, поможет нам разгадывать тайны вселенной с еще большей легкостью, чем раньше."
  giga_dialog.2505.a:0 "Замечательно! Можно ли на нем запустить Crysis?"
  giga_dialog.2505.a.tooltip:0 "Нет."
  giga_dialog.2506.title:0 "Экуменополис Альдерсона завершен!"
  giga_dialog.2506.desc:0 "Один из фрагментов нашего $name_alderson$ наконец-то готов! Эта колоссальная среда обитания охватывает несколько астрономических единиц и обеспечивает неисчислимое количество жизненного пространства для нашего населения и промышленности. Этот кусок полностью покрыт урбанистическим разрастанием, предлагая нашим гражданам гигантские промышленные мощности и жилье."
  giga_dialog.2506.a:0 "Замечательно!"
  giga_dialog.25061.title:0 "Улей Альдерсона завершен!"
  giga_dialog.25061.desc:0 "Один из фрагментов нашего $name_alderson$ наконец-то готов! Эта колоссальная среда обитания охватывает несколько астрономических единиц и обеспечивает неисчислимое количество жизненного пространства для нашего населения и промышленности. Весь этот кусок представляет собой гигантский живой организм, псионически связанный с разумом Улья, который его сформировал. Любые существа, не входящие в Улей, ступившие сюда, будут атакованы самой местностью."
  giga_dialog.25061.a:0 "Замечательно!"
  giga_dialog.25062.title:0 "Машинный мир Альдерсона завершен!"
  giga_dialog.25062.desc:0 "Один из фрагментов нашего $name_alderson$ наконец-то готов! Эта колоссальная среда обитания охватывает несколько астрономических единиц и обеспечивает неисчислимое количество жизненного пространства для нашего населения и промышленности. Этот срез полностью покрыт искусственными конструкциями. Тонкая атмосфера состоит в основном из промышленных загрязнителей и не способна поддерживать биологическую жизнь."
  giga_dialog.25062.a:0 "Замечательно!"
  giga_dialog.2507.title:0 "$name_alderson$ завешен!"
  giga_dialog.2507.desc:0 "Это было сделано! В системе [giga_system.GetName] нам удалось полностью собрать колоссальный диск, простирающийся от звезды до края системы. Эта гигантская гигантская структура затмевает все, что мы строили раньше, и является свидетельством нашего абсолютного превосходства над законами физики и инженерии."
  giga_dialog.2507.a:0 "Кто теперь может нам противостоять?"
  giga_mega.403.desc:0 "Отличные новости! После интенсивных исследований и составления карт наши ученые объявили, что были обнаружены точки прорыва в гиперпространстве, ведущие к центральному скоплению! Наши исследовательские группы использовали дальний тахионный луч, чтобы удаленно открывать эти точки прорыва, создавая тем самым новые гиперкоридоры. Это означает, что ядро ​​теперь доступно (как для нас, так и для всех остальных), и наши исследователи настоятельно рекомендуют отправить судно для его исследования."
  d_ehof_solar_array:0 "Безупречные солнечные коллекторы"
  tech_arcane_g_r:0 "Восстановление генератора таинственных разломов"
  tech_arcane_g_r_desc:0 "Секреты Вечноизменяющегося позволили нам контролировать загадочный Разумный Металл. С помощью него и умопомрачительной Негативной Массы мы теперь можем полностью вернуть Генератору Чародейских Разломов его прежнюю славу, что позволит нам использовать его в полной мере. "
  ehof_timetoresearch:0 "Скажите ученым, чтобы они изучили $tech_negative_pressure$!"
  allow_systemcraft_p6:0 "$allow_war_system$ Гиперпространственная стабилизация корпуса"
  desc_systemcraft_p6:0 "Открывает очередную ступень Systemcraft."
  giga_menu_presets_random:0 "Случайно"
  giga_menu_presets_01:0 "Оригинал 5"
  giga_menu_presets_02:0 "Соответствует названию мода"
  giga_menu_presets_03:0 "Меньше - лучше!"
  giga_menu_presets_04:0 "Слава кольцам"
  giga_menu_presets_05:0 "Опасные мегаструктуры"
  origin_orbital_arcology:0 "Орбитальная Аркология"
  origin_orbital_arcology_desc:0 "На протяжении всей эволюции этого вида в небе парило большое кольцо. Как только они совершили субсветовое космическое путешествие, они обнаружили, что это кольцо полностью покрыто жилой и пахотной землей."
  origin_orbital_arcology_effects:0 "Начните с орбитальной аркологии вокруг начальной планеты."
  giga_massive_planet:0 "Боевая Луна"
  giga_massive_planet_plural:0 "Боевые Луны"
  giga_war_moon_fe:0 "Древняя Боевая Луна"
  giga_war_moon_fe_plural:0 "Ядро"
  giga_planet_behemoth_fe:0 "Древняя $name_war_planet$"
  giga_planet_behemoth_fe_plural:0 "Древние $name_war_planet$"
  ancient_holy_behemoth_ship_mid_01_key:0 "Ядро"
  ancient_behemoth_ship_mid_01_key:0 "Ядро"
  SYSTEMCRAFT_FARMS:0 "Континентальная ферма"
  SYSTEMCRAFT_FARMS_DESC:0 "§GПродукция:\n30 Пища§!\nОгромная ферма размером с континент, построенная на планете Systemcraft."
  SYSTEMCRAFT_SHIPYARD:0 "Вспомогательный объект верфи"
  SYSTEMCRAFT_SHIPYARD_DESC:0 "§YСодержание:\n15 Сплавы§!\nДополнительная верфь Systemcraft для производства кораблей."
  INVESTIGATE_GALACTIC_CORE:0 "Обнаружение гипермаршрутов к Ядру Галактики"
  INVESTIGATE_GALACTIC_CORE_DESC:0 "Ядро Галактики в настоящее время скрыто от нас, но мы можем обнаружить слабые гиперпространственные маршруты, ведущие к нему. Доступ к ядру будет представлять собой как стратегическое, так и научное преимущество, поскольку центральные системы, вероятно, будут богаты ресурсами.\n\nЭтот проект может быть осуществлен в любое время, когда будете готовы."
  INVESTIGATE_GALACTIC_CORE_LINK:0 "Обнаружение гипермаршрутов из Ядра Галактики"
  INVESTIGATE_GALACTIC_CORE_LINK_DESC:0 "Наши прогнозы показывают, что между ядром и остальной частью галактики должны быть гипермаршруты. При достаточных исследовательских усилиях мы сможем найти и активировать их."
  decision_repaired_shattered_alderson:0 "Восстановить гиперсегмент"
  feeble_ai_mega_buff:0 "Слабый ИИ"
  feeble_ai_mega_buff_desc:0 "Небольшой толчок в правильном направлении"
  virtual_world:0 "Виртуальный мир"
  virtual_world_desc:0 "Этот мир полностью смоделирован невероятными процессорами $name_matrioshka_brain$. Таким образом, здесь невозможно производить минералы, а содержание популяции в стазисных капсулах довольно дорого."
  giga_tech_war_system_hull_booster:0 "Гиперпространственная стабилизация корпуса"
  giga_tech_war_system_hull_booster_desc:0 "$Name_war_system$ - могущественное судно, и поэтому добавление специализированных структур, закрепленных в более высоких измерениях, может гарантировать, что его колоссальный корпус не разрушится под действием собственной силы тяжести."
  giga_tech_particle_accelerator:0 "Ультраэнергетические коллайдеры частиц"
  giga_tech_particle_accelerator_desc:0 "Ускорение частиц друг против друга - эффективный способ узнать, как они взаимодействуют. Умение конструировать огромные ускорители, способные обернуть звезду, безусловно, пригодится."
  giga_dialog.1801.name:0 "Строительство $name_particle_accel$"
  giga_dialog.1801.desc:0 "Строительная площадка, расположенная рядом с [giga_system.GetName], завершена. Теперь мы можем начать работу над настоящим ускорителем частиц, который будет вращаться вокруг звезды, позволяя разгонять частицы до огромных скоростей."
  giga_dialog.1801.a:0 "Прекрасно."
  giga_dialog.1802.name:0 "$name_particle_accel$ построен"
  giga_dialog.1802.desc:0 "После месяцев и месяцев работы ускоритель элементарных частиц вокруг [giga_system.GetName] теперь готов и работает. Он обладает способностью ускорять частицы со скоростью, о которой даже не думали, что это возможно, что позволит нам немного узнать о частицах и о том, как они взаимодействуют друг с другом."
  giga_dialog.1802.a:0 "Отличная работа."
  giga_dialog.1803.name:0 "Разрушенный $name_particle_accel$"
  giga_dialog.1803.desc:0 "Наш научный корабль сделал невероятное открытие! В центре системы [from.GetName] находится массивный $name_particle_accel$, который теоретически может ускорять частицы, невероятно близкие к скорости света.\n\nК сожалению, он, похоже, получил невероятные повреждения и в настоящее время находится в состоянии ужасного запустения. Однако наши ученые уверены, что при правильных технологиях его можно вернуть в рабочее состояние."
  giga_dialog.1803.a:0 "Удивительно."
  giga_dialog.1804.name:0 "$name_particle_accel$ восстановлен!"
  giga_dialog.1804.desc:0 "Отличные новости! Нашим инженерам удалось вернуть испорченный $name_particle_accel$ в рабочее состояние! В настоящее время он работает и обеспечивает непрерывный поток физических исследований, а также многих экзотических частиц."
  giga_dialog.1804.a:0 "Невероятно."
  particle_accelerator_0:0 "Строительная площадка $name_particle_accel$"
  particle_accelerator_0_DESC:0 "На большой строительной площадке находится персонал и материалы, необходимые для постройки ускорителя частиц вокруг звезды."
  particle_accelerator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\nГенерирует £physics_research£ §YФизические исследования§! и увеличивает §YЗдоровье щитов§! на §Y2.5%§!\n§LЭтот колоссальный ускоритель частиц вращается вокруг звезды, разгоняя частицы до невиданных скоростей в исследовательских целях§!."
  particle_accelerator_1_DESC:0 "Чрезвычайно большой ускоритель элементарных частиц, построенный вокруг звезды. Он способен ускорять различные виды частиц до скоростей, почти равных скорости света, что позволяет нам значительно расширить наше понимание того, из чего они сделаны и как взаимодействуют."
  particle_accelerator_ruined:0 "разрушенный $name_particle_accel$"
  particle_accelerator_ruined_DESC:0 "Разрушенный $name_particle_accel$, построенный десятки тысяч лет назад неизвестной цивилизацией. Он получил невероятные повреждения, но основная рама все еще несколько цела. При наличии правильных технологий его потенциально можно было бы вернуть в рабочее состояние."
  particle_accelerator_restored_DESC:0 "Чрезвычайно большой ускоритель элементарных частиц, построенный вокруг звезды. Он способен ускорять различные виды частиц до скоростей, почти равных скорости света, что позволяет нам значительно расширить наше понимание того, из чего они сделаны и как взаимодействуют."
  giga_fallen_empire.101.name:0 "Обнаружено движение небесного тела!"
  giga_fallen_empire.101.desc:0 "Тревожные новости! Вскоре после пробуждения одной из падших империй датчики дальнего действия обнаружили, что несколько планет на их территории покинули свои орбиты. Из их коры появилось огромное скрытое оружие и двигатели, и теперь они превратились в грозные вооруженные планетоиды. Похоже, у этих древних цивилизаций было больше скрытого оружия, чем считалось ранее..."
  giga_fallen_empire.101.a:0 "Боевые станции!"
  giga_fallen_empire.102.name:0 "Святое Чудовище"
  giga_fallen_empire.102.desc:0 "Не секрет, что Пробужденные Империи обладают множеством видов древнего оружия, которое бездействовало тысячелетиями. Но никто не мог предсказать, что один из Святых Миров Святых Хранителей на самом деле не был обычным миром, а скорее был гигантским и бездействующим космическим кораблем размером с планету. И с их недавним пробуждением этот колоссальный космический корабль снова активизировался, и некогда первозданный мир Gaia превратился в колоссальную планету, оснащенную оружием, способную уничтожить все, что стоит на его пути. Кажется, они более подготовлены к защите своей веры, чем мы ожидали..."
  giga_fallen_empire.102.a:0 "Это плохо."
  giga_flusion.001.desc:0 "Наш научный корабль, исследующий примитивный мир Flusion, сделал удивительное открытие, так как, похоже, этот примитивный мир населен не одним, а несколькими разумными видами!\n\nЭкипажу удалось идентифицировать 5 основных видов: кошачьи Katzen, земноводные Zuspri, человекоподобные Roqualian и рачок Kronk; с пятым «флюзионным» видом, состоящим из десятков других трудно поддающихся классификации подвидов.\n\nНаши ученые до сих пор не уверены, как и почему так много видов оказались в одном мире, но это, безусловно, замечательная находка."
  giga_flusion.002.desc:0 "Наши находки Katzen и Zuspri на разных планетах, кажется, указывают на то, что мир, в который эти два вида сбежали после разрушения Katzenland, есть не что иное, как примитивная планета Flusion!\n\nХотя, во время их открытия на Flusion, оба вида казались резко упавшими технологически. Отсюда следует, что §YМеопианская экспедиция 1§! скорее всего потерпела крушение на планете, вынудив нескольких оставшихся людей восстановить практически всю свою технологическую базу.\n\nХотя это и не особо важное открытие, эти открытия, тем не менее, представляют большой интерес для наших планетарных биоархеологов. Это также показывает, что даже когда для цивилизации дела обстоят особенно ужасно, нельзя отказываться от возможности их чудесного выживания вопреки всему.\n\nЧто может быть одновременно воодушевляющим и ужасающим..."
  katzenartig_balance:0 "Балансировка Империума Катценартиг"
  katzenartig_balance_desc:0 "Чтобы придирчиво сфабриковать боевой пыл этих забавных представителей семейства кошачьих."
  giga_katzen.022.desc:0 "После долгой войны с Katzen нам, наконец, удалось подписать с ними мирный договор, положивший конец более чем десятилетнему конфликту.\n\nВраждебные отношения между нами и Империумом прекратились, и нынешние границы официально объявлены. Кайзер также может быть более открыт для переговоров теперь, когда война закончилась."
  katzenartig_splinter:0 "Ресурсы осколка империи"
  katzenartig_splinter_desc:0 "Чтобы избежать катастрофического обвала."
  giga_katzen.02021.desc:0 "Система Gatzo! Здесь наша древняя родина §YKatzenland§!, где наш вид чудом избежал исчезновения на борту корабля-колонии, когда безумный §YMeoпa§! уничтожил его поверхность в ядерном огне.\n\nКайзер готов подарить вашему виду §Y15000§! £energy£ в обмен на эту чрезвычайно ценную систему, которую мы считали бы священной, если бы были спиритуалистами.\n\nИтак, что вы скажете?"
  katzenartig_major_splinter:0 "Ресурсы основного состояния распада"
  katzenartig_major_splinter_desc:0 "Чтобы предотвратить катастрофический обвал."
  aet_intel_1:0 "Технологическая информация Aeternite"
  aet_intel_1_desc:0 "Наши знания о технологии Aeternite расширяют наши боевые возможности против них."
  giga_dismantle_accelerator_tooltip:0 "$giga_dismantle_mega$\n\nДемонтаж этого §YУскорителя звездных частиц§! вернет нам §Y3500§! £alloys£ обратно."
  giga_accelerator_ui_guide:0 "§YУскоритель звездных частиц§! это технологическое чудо, которое может разгонять поток частиц до релятивистских скоростей и вызывать столкновения частиц беспрецедентной силы благодаря своей огромной длине.\n\nПри наличии правильных технологий эти столкновения могут не только производить §Yотличные научные результаты§!, но также и немного других §Yэкзотических ресурсов§!, образующихся в ходе противоречащих физике реакций, происходящих внутри структуры.\n\nМы также можем §Bувеличить§! §Yинтенсивность§! столкновений, что, в свою очередь, увеличит §Yпроизводительность§! и §Yсодержание§! мегаструктуры.\n\nПроизводство §Yэкзотических ресурсов§! и увеличение §Yинтенсивности столкновений§! однако относительно §Rопасные§! процессы, которые приведут к повышенному риску возникновения §Rполомок§! внутри конструкции, и может потребоваться немедленное вмешательство, чтобы избежать §Rкатастрофического разрушения§!."
  giga_med_failure_risk:0 "Есть §Y20%§! шанс на §Rкатастрофическую поломку§! в течение следующих нескольких месяцев."
  giga_accelerator.2000.name:0 "Демонтаж §YУскорителя звездных частиц§!"
  giga_accelerator.2000.desc:0 "Вы уверены, что хотите разобрать этот §YУскоритель звездных частиц§!?\n\nМы вернем §Y3500§! £alloys£ обратно."
  giga_flavor.2000.yes:0 "Да, приступайте к демонтажу."
  giga_accelerator.2000.tooltip:0 "Этот §YУскоритель звездных частиц§! будет §Rдемонтирован§!."
  particle_accelerator_1_manage:0 "Управление мегаструктурой..."
  particle_accelerator_1_manage_DESC:0 "Открыть меню настроек этого §YУскорителя звездных частиц§!."
  giga_accelerator.110.name:0 "Структурные повреждения Ускорителя звездных частиц"
  giga_accelerator.110.desc:0 "Экипаж, работающий на §YУскорителе звездных частиц [giga_mega_event_system.GetName]§! сообщает, что некоторые части ускорителя получили серьезные структурные повреждения, скорее всего, из-за высоких энергозатрат в ходе экспериментов, проводимых внутри конструкции.\n\nХотя мегаструктура все еще функционирует, они советуют принять немедленные меры, чтобы исправить эту проблему и устранить повреждение, поскольку если оставить его без внимания, это может иметь ужасные последствия для целостности конструкции, если мы долго не примем меры."
  giga_accelerator.110.a:0 "Выключите его и отправьте §Y3000§! £alloys£, чтобы исправить его немедленно."
  giga_accelerator.110.a.tooltip:0 "Производительность §YУскорителя звездных частиц§! будет установлена на §BВыключено§! на §Y6 месяцев§!.\nБудет включен с настройками §BНормально§! после ремонта."
  giga_accelerator.110.b:0 "Выключите его на год и займитесь ремонтом."
  giga_accelerator.110.b.tooltip:0 "Производительность §YУскорителя звездных частиц§! будет установлена ​​на §BНизкая§! на §Y1 год§!.\nБудет включен с настройками §BНормально§! после ремонта.\n\n$giga_med_failure_risk$"
  giga_accelerator.110.c:0 "Неважно!"
  giga_accelerator.111.name:0 "Ремонт Ускорителя звездных частиц успешно завершен!"
  giga_accelerator.111.desc:0 "Экипаж нашего §YУскорителя звездных частиц§! в системе §Y[giga_mega_event_system_name.GetName]§! сообщает, что ремонт, проведенный на мегаструктуре, был успешным!\n\nМегоструктура была приведена в полное рабочее состояние и готова к полноценному использованию."
  giga_accelerator.111.a:0 "Чудесно!"
  giga_accelerator.112.name:0 "Ускоритель звездных частиц: §RКатастрофическая поломка§!"
  giga_accelerator.112.desc:0 "Поступают ужасные сообщения о том, что §YУскоритель звездных частиц§! в системе §Y[giga_mega_event_system_name.GetName]§!, к сожалению, не смог противостоять своему структурному повреждению.\n\nДействительно, во время недавнего эксперимента по столкновению частиц, структура не смогла должным образом сдержать катастрофическую энергию столкновения, которая впоследствии перегрузила хрупкую структуру ускорителя, вызвав цепную реакцию и §Rполный структурный коллапс§!.\n\nМегаструктура превратилась в массу космического мусора на солнечной орбите, которую мы могли бы восстановить при наличии достаточных ресурсов."
  giga_accelerator.112.a:0 "Проклятье!"
  giga_accelerator.112.a.tooltip:0 "§YУскоритель звездных частиц§! в системе §Y[giga_mega_event_system_name.GetName]§! становится §Rразрушенным§!."
  giga_accelerator.120.name:0 "Разлагающие общество страхи"
  giga_accelerator.120.desc:0 "Со всех концов нашей империи поступают сообщения о том, что после постройки и последующей активации §YУскоритель звездных частиц§!, некоторые из наших граждан начали выражать растущую озабоченность по поводу возможности того, что структура вызовет §YЛожный распад вакуума§!.\n\nДействительно, согласно некоторым теориям, чрезвычайно энергичные столкновения, происходящие внутри ускорителя, могут привести к так называемому §YВакуумному распаду§!, когда внезапный всплеск энергии в локальной точке пространства дестабилизирует одну из основных квантовых полей вселенных и впоследствии изменит законы физики.\n\nЭто приведет к цепной реакции, создавая расширяющуюся сферу, внутри которой другие законы физики, и, таким образом, в конечном итоге поглотит всю вселенную, разрушив все.\n\nОчевидно, что наши ведущие ученые отрицают эту теорию, заявляя, что она \"надумана и бессмысленна\", но страх, тем не менее, растет среди нашего населения, и проблема усугубляется тем, что несколько видных ученых решили поддержать это утверждение.\n\nМногие утверждают, что мегаструктура приведет к \"концу вселенной\", и теперь они призывают к демонтажу нашего §YУскорителя звездных частиц§!..."
  giga_accelerator.120.a:0 "Вложите ресурсы в проведение большого исследования, чтобы опровергнуть эту утверждение!"
  giga_accelerator.120.b:0 "Проведите цензуру в прессе и арестуйте любого, кто распространяет это утверждение."
  giga_accelerator.120.c:0 "Игнорируйте проблему. Это пройдет само."
  giga_accelerator.120.d:0 "Прислушайтесь и уничтожьте ускорители."
  giga_accelerator.120.d.tooltip:0 "Все §YУскорители звездных частиц§! в нашей империи §Rдемонтированы§!.\nМы получаем §Y3500§! £alloys£ за каждый разобранный ускоритель."
  giga_accelerator.120.b.tooltip:0 "Сначала люди будут возмущены, но со временем это пройдет.\n\n"
  giga_accelerator.120.a.tooltip:0 "Мы проведем грандиозное исследование, чтобы убедиться, что эта теория полностью опровергнута.\n\n"
  censored_vacuum_fears:0 "Цензура страхов о ложном вакууме"
  censored_vacuum_fears_desc:0 "Теория ложного вакуума по своей сути бессмысленна. Мы сделаем так, чтобы об этом больше никто не говорил."
  false_vacuum_fears:0 "Страхи о Ложном Вакууме"
  false_vacuum_fears_desc:0 "Наше население опасается теоретического распада ложного вакуума, который может быть вызван Ускорителем звездных частиц."
  conducting_false_vacuum_study:0 "Проведение исследования ложного вакуума"
  conducting_false_vacuum_study_desc:0 "Мы вкладываем все, что можем, в исследование, чтобы опровергнуть теорию ложного вакуума."
  giga_accelerator.121.name:0 "Пустые страхи"
  giga_accelerator.121.desc:0 "Потребовалось довольно много усилий, но, наконец, нашим ученым удалось полностью опровергнуть теорию ложного вакуума!\n\nИспользуя множество тезисов, теорий, экспериментов и публичных заявлений для демонстрации своих открытий, они смогли почти полностью устранить страх населения перед Ложным вакуумом, и хотя некоторые группы по-прежнему считают, что все это было прикрытием, мы сможем продолжать использовать наш §YУскоритель звездных частиц§! нетронутым.\n\nЭто исследование также помогло нам улучшить наше понимание Вселенной в целом, что, несомненно, принесет пользу нашим физическим исследованиям."
  giga_accelerator.121.a:0 "Ура!"
  giga_accelerator.122.name:0 "Настоящий вакуум"
  giga_accelerator.122.desc:0 "После нескольких лет упорных усилий наш ученый, которому было поручено изучить теорию ложного вакуума, наконец, пришел к выводу.\n\n§RЭто правда.§!\n\nЭто все правда! Действительно, он определил, что, хотя шансы на то, что это произойдет, бесконечно малы, действительно возможно, что достаточно большой ускоритель частиц вызовет ложный вакуум, который уничтожит всю галактику.\n\nДаже при том, что это невероятно маловероятное событие и Вселенная, вероятно, умрет сама по себе, прежде чем сформируется ложный вакуум, наше научное сообщество было встревожено этими открытиями, и многие также начинают просить нас демонтировать ускорители.\n\nНо есть и позитивное, вполне возможно, что это единственное хорошее, что из этого вышло, это исследование помогло нам улучшить наше понимание Вселенной в целом, но это может быть спорным, если мы в конечном итоге разрушим эту Вселенную."
  giga_accelerator.122.a:0 "Проводите цензуру в выводах и лгите населению."
  giga_accelerator.122.a.tooltip:0 "Это может иметь неприятные последствия.\nРезультаты с большей вероятностью просочатся, если мы §Yэгалитаристы§!, и наоборот, если мы §Yавторитаристы§!\n\n"
  giga_accelerator.122.b:0 "Просто объявите об этом. В конце концов, они со временем забудут об этом."
  giga_accelerator.122.c:0 "Демонтируйте ускорители."
  false_vacuum_study:0 "Исследование ложного вакуума"
  false_vacuum_study_desc:0 "Изучение возможности ложного вакуума расширило наше понимание Вселенной."
  giga_accelerator.123.name:0 "Утечка данных о ложном вакууме!"
  giga_accelerator.123.desc:0 "Тревожные новости! Похоже, что наши открытия относительно Ложного вакуума каким-то образом стали известны нашему населению.\n\nЭто имело катастрофические последствия, когда большая часть нашего населения впала в панику из-за разоблачений..."
  giga_accelerator.123.a:0 "Черт..."
  giga_accelerator.123.b:0 "Довольно! Просто демонтируйте ускорители и покончим с этим!"
  giga_accelerator.130.name:0 "Данные полученные при помощи Ускорителя звездных частиц"
  giga_accelerator.130.desc:0 "Сотрудники нашего §YУскорителя звездных частиц§! сообщают, что за последнее время они сделали ряд интересных открытий, которые, несомненно, принесут пользу нашим текущим физическим исследованиям."
  giga_accelerator.130.a:0 "Хорошо."
  giga_accelerator.130.b:0 "Дайте ученым повышение!"
  gave_accelerator_scientists_raise:0 "Повышенная заработная плата ученых"
  gave_accelerator_scientists_raise_desc:0 "Мы повышаем зарплату ученым на Ускорителе звездных частиц."
  giga_accelerator.140.name:0 "Излишек темной материи"
  giga_accelerator.140.desc:0 "Персонал нашего §YУскорителя звездных частиц§! сообщает, что недавние эксперименты по столкновению привели к появлению излишка экзотической §YТемной материи§!!\n\nОни сумели собрать ее с помощью специализированных электромагнитных сетей и впоследствии отправили ресурсы напрямую в наши запасы."
  giga_accelerator.140.a:0 "Чудесно!"
  giga_acc_intensity_up:0 "§YУвеличить§! мощность этой мегаструктуры."
  giga_acc_intensity_down:0 "§YУменьшить§! мощность этой мегаструктуры."
  mega_intensity_meaning:0 "Повышение интенсивности приведет к увеличению ежегодного §Rшанса поломки§!, что приведет к необходимости ремонта мегаструктуры во избежание §RКатастрофической поломки§! что может произойти."
  giga_acc_physics:0 "§YУскоритель звездных частиц§! может специализироваться на проведении §YФизических исследований§! путем столкновения различных частиц и наблюдения за результатами.\n\nБазовая производительность: §Y150§! £physics_research£"
  giga_acc_dm:0 "§YУскоритель звездных частиц§! может специализироваться на производстве §YТемной материи§! благодаря особым столкновениям частиц, которые генерируют следы темной материи.\n\nБазовая производительность: §Y100§! £physics_research£ §Y1§! £sr_dark_matter£\nБазовый шанс поломки: §R+5%§!"
  giga_acc_qnm:0 "§YУскоритель звездных частиц§! может специализироваться на производстве §YКвазиотрицательной массы§! благодаря эзотерическим и очень специфическим столкновениям частиц, создающим отрицательную материю.\n\nБазовая производительность: §Y80§! £physics_research£ §Y0.7§! £giga_sr_negative_mass£\nБазовый шанс поломки: §R+10%§!"
  giga_acc_intensity_5:0 "Текущая мощность:\n§BЭкстремальная§!\n\nЭффект:\n§G+50% Производительность мегаструктуры§!\n§R+100% Содержание мегаструктуры§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_4:0 "Текущая мощность:\n§BВысокая§!\n\nЭффект:\n§G+25% Производительность мегаструктуры§!\n§R+40% Содержание мегаструктуры§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_3:0 "Текущая мощность:\n§BНормальная§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_2:0 "Текущая мощность:\n§BНизкая§!\n\nЭффект:\n§R-40% Производительность мегаструктуры§!\n§G-60%% Содержание мегаструктуры§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_1:0 "Текущая мощность:\n§BВыключено§!\n\nЭффект:\n§R-100% Производительность мегаструктуры§!\n§G-100% Содержание мегаструктуры§!\n\n$mega_intensity_meaning$"
  giga_accelerator.150.name:0 "Черная дыра на свободе"
  giga_accelerator.150.desc:0 "Сотрудники нашего §YУскорителя звездных частиц§! §Y[accelerator_quasistar.GetName]§! сообщают, что в ускорителе недавно произошло невероятное событие.\n\nНесколько часов назад в результате эксперимента по столкновению частиц с необычно высокой энергией была создана §Yмикроскопическая черная дыра§!. Хотя обычно это не заслуживает внимания, поскольку эти черные дыры обычно испаряются всего через наносекунды после появления, кажется, что эта черная дыра была достаточно массивной, чтобы начать падать к звезде и ударить по раме ускорителя, тем самым давая ей возможность питаться и избежать испарения.\n\nЧерная дыра нанесла минимальный ущерб, поскольку она просто вырыла через ускоритель небольшой туннель шириной несколько микрометров. Однако затем она быстро покинула мегаструктуру и теперь падает к поверхности звезды.\n\nПо нашим оценкам, еq потребуется несколько дней, чтобы достичь звезды, и, скорее всего, она начнет наращивать свои внешние слои, прежде чем достигнет основной звезды. Наши ученые не уверены в том, что на самом деле произойдет дальше, но они советуют нам внимательно следить за этим... поскольку исследовательский потенциал неоспорим."
  giga_accelerator.150.a:0 "Это беспокоит. Мы будем следить за этой черной дырой."
  giga_accelerator.150.b:0 "Очаровательно! Научный потенциал неоспорим."
  giga_accelerator.151.name:0 "Пожираемая изнутри"
  giga_accelerator.151.desc:0 "Микроскопическая черная дыра, упавшая из §Y[accelerator_quasistar.GetName]§! достигла ядра звезды и согласно данным §YУскорителя звездных частиц§!, звездная плазма в ядре звезды начала падать в сингулярность, увеличивая ее размер, позволяя ей потреблять все больше и больше материи по мере ее увеличения.\n\nЭто фактически означает, что §Y[accelerator_quasistar.GetName]§! сжимается! Хотя в настоящее время это незаметно, скорость, с которой расходуется материя, будет только увеличиваться по мере того, как черная дыра в ее ядре со временем будет увеличиваться в размерах.\n\nК счастью для нас, сотрудники нашего ускорителя уверяют, что не стоит беспокоиться в обозримом будущем, и они, кажется, очень взволнованы перспективой изучения этого невероятного явления."
  giga_accelerator.151.a:0 "Это все еще звучит немного тревожно."
  studying_accelerator_black_hole_star:0 "Изучение внутризвездной черной дыры"
  studying_accelerator_black_hole_star_desc:0 "Наши ученые наблюдают, как звезда медленно поглощается изнутри искусственной черной дырой."
  studying_accelerator_black_hole_star_1:0 "Изучение внутризвездной черной дыры"
  studying_accelerator_black_hole_star_1_desc:0 "Наши ученые наблюдают, как звезда медленно поглощается изнутри искусственной черной дырой."
  giga_quasi_star:0 "Внутризвездная черная дыра"
  giga_quasi_star_desc:0 "Искусственная черная дыра пожирает эту звезду изнутри."
  giga_accelerator.152.name:0 "Ускорение кончины"
  giga_accelerator.152.desc:0 "Сотрудники Ускорителя звездных частиц §Y[accelerator_quasistar.GetName]§! сообщают, что внутренняя черная дыра звезды растет быстрее, чем ожидалось.\n\nДействительно, видимый радиус звезды начал заметно сокращаться в течение последних нескольких месяцев, что указывает на то, что рост сингулярности начинает ускоряться экспоненциально.\n\nВ результате светимость звезды медленно уменьшается, слегка охлаждая планеты системы.\n\nТем не менее, это все еще невероятная научная возможность, которая продолжает приносить пользу нашим физическим исследованиям."
  giga_accelerator.152.a:0 "Ой-ой."
  giga_accelerator.152.a.tooltip:0 "Все планеты в системе §Y[accelerator_quasistar.GetName]§! становится холоднее.\nЛюбые колонии в системе пострадают от §Yвысокого уровня эмиграции§!.\n\n"
  giga_quasi_star_cooling_planet:0 "Темнеющая звезда"
  giga_quasi_star_cooling_planet_desc:0 "Звезда этой планеты медленно тускнеет из-за поглощения ее массы черной дырой. В результате этот мир становится все холоднее."
  giga_quasi_star_cooling_planet_1:0 "Темнеющая звезда"
  giga_quasi_star_cooling_planet_1_desc:0 "Звезда этой планеты медленно тускнеет из-за поглощения ее массы черной дырой. В результате этот мир становится все холоднее."
  giga_accelerator.153.name:0 "Растущее потребление"
  giga_accelerator.153.desc:0 "Ужасные новости! Черная дыра внутри §Y[accelerator_quasistar.GetName]§! сейчас быстро поглощает звезду, которая значительно сократилась за последние несколько лет.\n\nПланеты системы стали заметно холоднее, и черная дыра продолжает расти внутри звезды, поглотив большой кусок звездного ядра.\n\nХотя она по-прежнему предоставляет огромное количество научных данных, последствия, которые это имеет для системы, с каждым днем ​​становятся все более печальными."
  giga_accelerator.153.a:0 "А это уже проблема!"
  giga_accelerator.153.a.tooltip:0 "Все планеты в системе §Y[accelerator_quasistar.GetName]§! станут еще холоднее.\nЛюбые колонии в системе пострадают от §Yвысокого уровня эмиграции§!.\n\n"
  giga_accelerator.155.name:0 "Равновесие"
  giga_accelerator.155.desc:0 "Из §Y[accelerator_quasistar.GetName]§! поступают удивительные сообщения о том, что сжимающаяся звезда перестала сокращаться!\n\nНаши ученые поначалу были сбиты с толку этим происшествием, но быстро поняли, что излучение, создаваемое каким-то звездным материалом, попадает в черную дыру на самом деле создает форму внешнего давления, которое противодействует гравитации и впоследствии предотвращает дальнейшее коллапсирование остальной части звезды.\n\nЭто фактически означает, что звезда все еще будет сжиматься, хотя и очень медленно, поскольку весь ее внешний слой теперь поддерживает излучение черной дыры, и хотя планеты системы все еще холоднее, чем были раньше, система больше не обречена на совершенно холодную смерть."
  giga_accelerator.155.a:0 "Интригующе."
  giga_accelerator.156.name:0 "Отскок"
  giga_accelerator.156.desc:0 "§Y[accelerator_quasistar.GetName]§! не перестает удивлять. В самом деле, неожиданно оказалось, что звезда полностью перестала сокращаться и даже начинает расти!\n\nДальнейшие исследования показали, что радиационное давление материала, падающего в черную дыру, на самом деле \"толкает\" внешнюю оболочку звезды, заставляя ее раздуваться и расширяться наружу.\n\nЭто также означает, что светимость звезды снова увеличивается, и планеты системы начинают нагреваться до своей исходной температуры."
  giga_accelerator.156.a:0 "Проблема, которая решится сама собой! Как мило."
  giga_accelerator.156.a.tooltip:0 "Все планеты в системе §Y[accelerator_quasistar.GetName]§! становятся горячее.\n\n"
  giga_accelerator.158.name:0 "Расширение вовне"
  giga_accelerator.158.desc:0 "Наши ученые сообщают, что §Y[accelerator_quasistar.GetName]§! теперь превысила свой первоначальный размер и продолжает увеличиваться до больших размеров из-за давления излучения черной дыры.\n\nТемпература планет системы вернулась к нормальным значениям, но теперь медленно увеличивается по мере того, как звезда расширяется.\n\nЭто продолжает открывать огромный научный потенциал, но расширяющаяся поверхность звезды начинает приближаться к §YУскорителю звездных частиц§!..."
  giga_accelerator.158.a:0 "Беспокоцные вести..."
  giga_accelerator.158.a.tooltip:0 "Все планеты в системе §Y[accelerator_quasistar.GetName]§! становятся горячее."
  giga_quasi_star_heating_planet:0 "Растущая звезда"
  giga_quasi_star_heating_planet_desc:0 "Звезда этой планеты становится ярче из-за того, что внутризвездная черная дыра сталкивается с ее внешними слоями. Хотя условия на поверхности стали менее благоприятными, это, безусловно, прекрасная возможность изучить экзотические процессы, происходящие внутри звезды и системы в результате появления черной дыры. Звезда также намного ярче, что резко увеличивает энергию, вырабатываемую солнечными фермами."
  giga_accelerator.160.name:0 "Ускоритель звездных частиц Destroyed!"
  giga_accelerator.160.a:0 "В следующий раз будьте осторожнее с ускорителями!"
  giga_accelerator.160.a.tooltip:0 "Все планеты в системе §Y[accelerator_quasistar.GetName]§! становятся горячее.\n\n§YУскоритель звездных частиц§! §Rуничтожен§!.\n\n"
  mod_shipsize_giga_massive_planet_hull_mult:0 "Здоровье Боевой Луны"
  mod_shipsize_giga_massive_planet_tracking_mult:0 "Отслеживание Боевых Лун"
  giga_flavor_systems.1101.desc:0 "Изучая систему §Y[from.GetName]§!, наши исследовательские группы обнаружили заброшенный §YПланетарный вычислительный комплекс§!, колоссальный компьютер размером с планету, мощность которого превосходит любое типичное вычислительное устройство.\n\nК сожалению, хотя сама планета явно необитаема, она вращается вокруг небольшого массива мощных и враждебных §Rоборонительных платформ§! которые открывают огонь по всему, что находится слишком близко к планете.\n\nКто или что установило эти платформы, неизвестно, хотя они, вероятно, являются древними единицами, которые пережили своих собственных создателей и теперь бессмысленно защищают пустой мир. В любом случае, победить их и захватить вычислительный комплекс для себя, несомненно, было бы невероятным благом для наших научных отделов."
  giga_flavor_systems.1101.a:0 "Интригующе."
  civic_eaw_crystals:0 "Кристаллическая инженерия"
  civic_eaw_crystals_desc:0 "Эта цивилизация широко использует особый энергетически заряженный кристалл в большинстве своих технологий, резко улучшая их характеристики, хотя и за счет снижения надежности."
  giga_fallen_empire_misc.1029.a.tooltip:0 "Каждая планета в галактике получает §R100 опустошения§!.\n§YСеть гиперкоридоров§! полностью перестраивается."
  ehof_contact_ehof:0 "\n\n§GСвязь с $ehof_ehof$§!"
  ehof_megastructure.018.b:0 "Нет, оставаться в изоляции гораздо круче."
  giga_penrose_system_NAME:0 "Вечный ковчег"
  giga_penrose_system_DESC:0 "Начните на Мире-кольце Пенроуза"
  origin_penrose_ring:0 "Мир-кольцо Пенроуза"
  origin_penrose_ring_desc:0 "Эта древняя сфера Пенроуза была построена вокруг одной из первых черных дыр в галактике неисчислимое количество лет назад. Эти таинственные предшественники с тех пор бесследно исчезли, и теперь на их наследии возникает новая цивилизация."
  origin_tooltip_penrose_ring_effects:0 "Начните на Мире-кольце Пенроуза.\n- Предпочитаемый мир §LМир-кольцо Пенроуза§!.\n- §RРядом не будет систем с гарантированно обитаемыми мирами§!.\n\n§RИИ не может использовать это происхождение. Любые сгенерированные предопределенные пользовательские империи ИИ с этим источником будут сгенерированы с помощью $origin_default$.§!"
  relic_penrose_sphere_1_DESC:0 "Эта древняя сфера Пенроуза находится на последнем издыхании и развалится в течение нескольких тысяч лет, если ее не отремонтировать. Однако некоторые из ее компонентов все еще функционируют, вырабатывая ничтожное количество энергии."
  relic_penrose_sphere_2:0 "Сфера Пенроуза"
  giga_ring_origins.101.name:0 "Реликтовая Сфера Пенроуза восстановлена"
  giga_ring_origins.101.desc:0 "После нескольких лет напряженной работы, реликтовая сфера Пенроуза в системе §L[relic_penrose_sphere.GetName]§! была восстановлена ​​в своей былой славе и снова генерирует большое количество энергии, используя сверхизлучение черной дыры. Пусть она защищает и лелеет нашу цивилизацию до конца вечности!"
  pc_giga_penrose_habitable_desc:0 "Массивная конструкция, окружающая плененную Черную дыру. $Name_penrose$ обеспечивает необходимую энергию для питания этого мира-кольца и позволяет жить на поверхности, свободной от ограничений и обыденности существования на планете. Также отсюда одни из лучших видов во вселенной."
  war_moon_scrap:0 "Разобрать на обломки §Y15000§! £alloys£ и §Y7500§! £minerals£"
  war_moon_scrap_DESC:0 "Разрушьте внешнюю инфраструктуру этого небесного боевого корабля в поисках сплавов, исследований и ценных минералов."
  war_planet_scrap:0 "Разобрать на обломки §Y80000§! £alloys£ и §Y40000§! £minerals£"
  war_planet_scrap_DESC:0 "Разрушьте внешнюю инфраструктуру этого небесного боевого корабля в поисках сплавов, исследований и ценных минералов."
  giga_titan_scrap:0 "Разобрать на обломки §Y2000§! £alloys£"
  giga_titan_scrap_DESC:0 "Разберите это судно на части и составляющие его сплавы."
  giga_juggernaut_scrap:0 "Разобрать на обломки §Y4000§! £alloys£"
  giga_juggernaut_scrap_DESC:0 "Разберите это судно на части и составляющие его сплавы."
  giga_battleship_scrap:0 "Разобрать на обломки §Y1800§! £alloys£"
  giga_battleship_scrap_DESC:0 "Разберите эти судна на части и составляющие их сплавы."
  giga_colossus_scrap:0 "СРазобрать на обломки §Y6000§! £alloys£"
  giga_colossus_scrap_DESC:0 "Разберите это судно на части и составляющие его сплавы."
  penrose_sphere_a2:0 "Незаряженная бомба искажения подпространства"
  penrose_sphere_a2_DESC:0 "Эта $name_penrose$ была переделана в бомбу. Теперь мы должны дать ей некоторое время накопить энергию, прежде чем взорвать ее."
  penrose_sphere_a3:0 "Бомба искажения подпространства"
  penrose_sphere_a3_DESC:0 "Большая зеркальная структура, построенная вокруг черной дыры, способная отражать излучение туда и обратно между своей внутренней поверхностью и эргосферой черной дыры, вызывая сверхизлучательное рассеяние и экспоненциально усиливая энергию излучения."
  penrose_sphere_a4:0 "Взорвать!"
  penrose_sphere_a4_DESC:0 "Отправьте ровно столько излучения, чтобы нарушить целостность зеркала и высвободить поток энергии!"
  penrose_sphere_a41:0 "Бомба искажения подпространства"
  penrose_sphere_a41_DESC:0 "Эта подпространственная искажающая бомба вот-вот взорвется!"
  penrose_sphere_a42:0 "Бомба искажения подпространства"
  penrose_sphere_a42_DESC:0 "Эта подпространственная искажающая бомба вот-вот взорвется!"
  penrose_sphere_b2_DESC:0 "Большое зеркало, построенное вокруг черной дыры. Излучения отражаются между внутренней поверхностью зеркала и эргосферой черной дыры, генерируя энергию."
  penrose_sphere_b3:0 "Стабилизированная $name_penrose$"
  penrose_sphere_b3_DESC:0 "Эта $name_penrose$ была стабилизирована специальными конструкциями, позволяющими удерживать большее количество излучения внутри зеркального шара без риска взрыва. Следовательно, она генерирует больше энергии."
  penrose_sphere_b4:0 "Мир-кольцо $name_penrose$"
  penrose_sphere_b4_DESC:0 "Части выхода энергии этой $name_penrose$ были перенаправлены на поддержку массивного и высокоразвитого мира-колец, построенного вокруг нее."
  gigablackhole_ring_world_2:0 "Каркас $name_penrose_ring$"
  gigablackhole_ring_world_2_DESC:0 "Этот скелетный каркас составляет примерно половину полной окружности мира-кольца. Теперь мы должны начать работу над настоящими местами обитания."
  gigablackhole_ring_world_3:0 "Сегмент $name_penrose_ring$"
  gigablackhole_ring_world_3_DESC:0 "Огромный кусок мира-кольца, состоящий из двух жилых сегментов и одного сегмента поддержки, питаемый от $name_penrose$."