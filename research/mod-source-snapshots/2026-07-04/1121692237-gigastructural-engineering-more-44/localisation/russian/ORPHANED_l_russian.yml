  d_alderson_ruined_agri_drone_cleared:0 "Дроны-фермеры: §G+5%§!\nОчистка всех заблокированных §Y$d_alderson_ruined_agri_drone_hive$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
  d_alderson_ruined_technician_hive:0 "Открытое ядро"
  d_alderson_ruined_technician_hive_desc:0 "Расчистка Альдерсона - задача гигантских размеров, но мы должны с чего-то начать."
