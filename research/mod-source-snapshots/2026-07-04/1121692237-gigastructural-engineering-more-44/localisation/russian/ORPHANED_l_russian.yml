  giga_fe_planetcrafts_disabled:0 "£menu_disabled£Боевые планеты Угасших империй\nУгасшие империи начнут игру с Боевыми Лунами и Боевыми планетами."
  giga_fe_planetcrafts_enabled:0 "£menu_enabled£Боевые планеты Угасших империй\nУгасшие империи начнут игру с Боевыми Лунами и Боевыми планетами."
  giga_paluushia_disabled:0 "£menu_disabled£Палуушия\nПоявится примитивная планета, которую практически невозможно уничтожить.\n§RЭто усложнит кризис Блоккотов.§!"
  giga_paluushia_enabled:0 "£menu_enabled£Палуушия\nПоявится примитивная планета, которую практически невозможно уничтожить.\n§GИграет важную роль в кризисе Блоккотов.§!"
  INVESTIGATE_RED_TOXIC:0 "Поверхность §H[from.GetName]§!"
  INVESTIGATE_RED_TOXIC_DESC:0 "Сканеры высокой интенсивности, использующие рентгеновские лучи для проникновения в атмосферу §H[from.GetName]§!, готовятся к сканированию поверхности.\n\nНаши ученые надеются, что они смогут выявить происхождение красного тумана. Они предполагают, что он, возможно, не был создан естественными причинами."
  ehof_anomaly.10007.name:0 "Отравленный рай"
  ehof_anomaly.10007.desc:0 "Наша попытка просканировать поверхность §H[from.from.GetName]§! с помощью рентгеновских лучей была успешна.\n\nНаши системы создали модель площади в 82844 квадратных километров поверхности, которая была сканирована с помощью наших высокоинтенсивных сканеров.\n\nМодель показывает присутствие древоподобных образований, расположенных на больших территориях с высокой плотностью населения и кажущиеся искусственными объектами, которые похожи на здания.\n\nЛеса и города расположены на поверхности планеты или, по крайней мере, их остатки.\n\nЦивилизация когда-то существовала на этой токсичной планете и, по крайней мере, растительная жизнь когда-то были частью бывшей планетной экосистемы.\n\nАрхитектура и размер зданий указывают на то, что цивилизация, вероятно, была достаточно развитой для изучения и использования технологий. Неизвестно, несет ли ответственность за красный туман сама цивилизация.\n\nК сожалению, потребуется исследование поверхности, чтобы узнать больше о том, что случилось с планетой. Только записи о вымершей цивилизации и, возможно, образцы поверхности и окружающей среды могут рассказать нам больше о красном тумане и его происхождении."
  ehof_anomaly.10007.a:0 "Подготовьте исследовательскую группу."
  ehof_anomaly.10007.b:0 "Оно того не стоит. Покиньте планету."
  EXPLORE_RED_TOXIC_DESC:0 "Из-за чрезвычайно токсичных и коррозионных свойств тумана, изучение поверхности §H[from.GetName]§! становится очень опасным для органических форм жизни, даже с защитной броней.\n\nВместо этого здесь используются передовые роботизированные исследовательские подразделения, которые оснащены антикоррозийной броней и энергетическими щитами."
  ehof_anomaly.10008.name:0 "Алая Плеть"
  ehof_anomaly.10008.desc:0 "Исследование поверхности §H[from.from.GetName]§! оказалось успешным и раскрыло природу красного тумана.\n\nКрасный туман, который существует на §H[from. from.GetName]§!, на самом деле имеет неестественное происхождение.\n\nЭто усовершенствованный синтетический токсин, созданный бывшей цивилизацией §H[from.from.GetName]§! и он вышел из-под контроля. Кто и почему создал токсин, было неизвестно населению планеты.\n\nДаже отчеты правительственных и научных учреждений не раскрывают происхождение \"Алой Плети\". Но это не означает, что правительство ничего не знало об нем.\n\nВсе, что известно - это то, что токсин внезапно появился в определенном месте, где-то в северном полушарии, называемом \"Зона ПРОИСХОЖДЕНИЯ\", 321 галактический стандартный год назад.\n\nОн быстро распространился с ветрами из-за своей воздушной природы и охватил планету в течение года.\n\nКроме того, токсин состоит из частиц разного размера, от размера пылевых частиц до размера крупных вирионов, которые делает его сдерживание чрезвычайно сложным, и при этом он может покрывать небо и поверхности.\n\nТоксин способен воспроизводить себя неизвестными способами, что объясняет, почему он смог покрыть всю планету.\n\nВ конце концов, вся цивилизация и планетарная экосистема были уничтожены непреодолимой \"Алой Плетью\".\n\nНаши ученые хотят увеличить усилия по исследованию §H[from.from.GetName]§!, несмотря на опасности, чтобы найти источник \"Плети\"."
  ehof_anomaly.10008.a:0 "Нам нужно выяснить, откуда взялась Алая Плеть."
  ehof_anomaly.10008.b:0 "Мы должны покинуть это место сейчас же."
  FIND_SCOURGE_ORIGIN:0 "Алая Плеть"
  FIND_SCOURGE_ORIGIN_DESC:0 "Наши роботизированные исследовательские подразделения заменяются и готовятся к исследованию «Зоны Происхождения» Алой Плети.\n\nЭто место, вероятно, не только место происхождения Алой Плети, но, возможно, даже место, где она была первоначально создана."
  ehof_anomaly.10009.name:0 "Соединение 23RCA"
  ehof_anomaly.10009.desc:0 "Расследование «Зоны Происхождения» раскрыло еще больше секретов об Алой Плети, чем предполагалось ранее.\n\nЗона Происхождения, первоначально называвшаяся «Полигон Y-173», не была местом создания Алой Плети, но является испытательным полигоном, который использовался учреждением, которое изначально создало Алую Плеть.\n\nУказанное учреждение было частной научно-исследовательской организацией под названием \"Кузница инноваций\", в которой предположительно жили величайшие умы цивилизации.\n\nАлая Плеть, названная его создателями «Соединение 23RCA», была использована в Зоне Происхождения для изучения его воздействия на органические и неорганические вещества в реалистичных условиях.\n\nЗона Происхождения состоит из наблюдательного поста и большого купола вокруг небольших городов и небольшие леса, первоначально населенные добровольными подопытными, которым сказали, что это эксперимент по контролю климата. Присутствовали также животные.\n\nКупол, сделанный из современных изоляционных материалов, должен был предотвратить утечку Плети в атмосферу. К сожалению, даже его создатели недооценили его эффекты.\n\nПлеть разъела материал купола и просочилась в атмосферу, что привело к разрушению цивилизации на §H[from.from.GetName]§!.\n\nЗаписи указали на координаты локации под названием «Репозиторий», которая, по-видимому, была первоначальным основным помещением Кузницы инноваций и местом, где не только была создана Плеть, но и их величайшие творения в целом.\n\nНаши ученые хотят отправиться в это место, чтобы узнать, как была синтезирована Алая Плеть, и раскрыть секреты этого места."
  ehof_anomaly.10009.a:0 "Репозиторий может быть действительно полезным. Даже для нас."
  ehof_anomaly.10009.b:0 "Теперь мы знаем, откуда взялась Плеть. Достаточно."
  EXPLORE_REPOSITORY:0 "Репозиторий"
  EXPLORE_REPOSITORY_DESC:0 "Репозиторий - это место нашего последнего исследования на §H[from.GetName]§!, чтобы найти место, где изначально была создана Алая Плеть. Для этой миссии используются вооруженные роботизированные исследовательские подразделения.\n\nЕсли Хранилище действительно является местом рождения величайших творений Кузницы инноваций, это может быть опасное место."
  ehof_anomaly.10010.name:0 "Источник и решение"
  ehof_anomaly.10010.desc:0 "Наше исследование Репозитория оказалось полностью успешным.\n\nХранилище - это гигантское подземное сооружение, спрятанное в большой горной цепи.\n\nЭто было похоже на данные Зоны Происхождения, сокровищницы технологических инноваций, где технологии значительно превосходят таковые у других планетарных цивилизаций.\n\nХранилище было защищено внутренними системами безопасности, как мы и ожидали. Это оказалось проблемой даже для наших подразделений.\n\nМы смогли найти объект, в котором изначально была создана Алая Плеть. Там мы можем узнать все, что можно о нем знать.\n\nЭто был первый полностью функционирующий прототип из серии агентов терраформирования, созданных Кузницей инноваций. Эти агенты будут размещены на враждебных, но потенциально обитаемых планетах с помощью космических кораблей, чтобы очистить их атмосферу от опасных веществ, в том числе биологических. Это объясняет использование Зоны Происхождения в качестве способа проверки воздействия агента на все формы жизни, включая интеллектуальные.\n\nОказалось, что вещество ведет себя не так, как ожидалось, и, в конце концов, стало тем самым, что оно и должно было уничтожить.\n\nВ самом центре объекта мы обнаружили продвинутый интеллект, который оказался ансамблем, созданным из умов величайших ученых Кузницы инноваций, которые загрузили свое сознание, чтобы продлить свою жизнь. Они рассказали нам больше о Репозитории, цивилизации на §H[from.from.GetName]§!, Алой Плети и об их решении для кризиса Алой Плети.\n\nГигантская башня под названием «Катализатор» была построена Кузница инноваций, недалеко от южного полюса. Он должен был очистить атмосферу от Алой Плети. Попытка сделать это не удалась, потому что они не смогли найти способ остановить распространение Алой Плети.\n\nАнсамбль сказал нам, что наши передовые технологии могут позволить нам сделать башню полностью функциональной и очистить атмосферу от Алой Плети.\n\nТеперь мы можем либо очистить этот мир и сделать его снова пригодным для жилья, либо использовать Алую Плеть в своих целях."
  ehof_anomaly.10010.a:0 "Плеть - чудовищная ошибка. Нужно очистить от нее эту планету!"
  ehof_anomaly.10010.b:0 "Плеть может быть действительно полезна для нас во многих областях."
  ehof_megastructure_phase1_idle_DESC:0 "Манипулирует и надувает $ehof_wormholes$ для межзвездных путешествий.\n\n"
  ehof_megastructure_phase2_idle_DESC:0 "Манипулирует и надувает $ehof_wormholes$ для межзвездных путешествий.\n\n"
  ehof_megastructure_phase3_idle_DESC:0 "Использует §H£giga_sr_negative_mass£Отрицательная масса§! для стабилизации $ehof_wormholes$ для межзвездных путешествий и добычи $sr_dark_matter$."
  ehof_megastructure_phase4_idle_DESC:0 "Использует §H£giga_sr_negative_mass£Отрицательная масса§! для стабилизации $ehof_wormholes$ для стабилизированного межзвездного путешествия и добычи $sr_dark_matter$."
  planet_energy_converter:0 "Вакансия преобразователя энергии"
  giga_aeternum.4200.desc:0 "Наши вооруженные корабли наконец-то достигли самого сердца цивилизации Aeternite: §YAiondia§!, колоссального Мира Бёрча, построенного вокруг Галактического ядра.\n\nТрудно представить себе огромные размеры и масштабы этой невероятно древней конструкции, которая простирается почти на половину светового года и доминирует в системе. Вокруг него множество различных мегаструктур, построенных Aeternite, а также устрашающие и хорошо оборудованные оборонительные платформы, предназначенные для защиты этой гигантской структуры.\n\nНо, пожалуй, самой поразительной особенностью Aiondia является не что иное, как §YSuurikilpian§!, монументальный энергетический барьер, который охватывает всю структуру, защищая ее от орбитальной бомбардировки.\n\nЕстественно, хотя этот щит не блокирует наземные вторжения, он определенно не позволит нашим флотам помогать нашим наземным войскам, уменьшая наши возможности на земле. К счастью, наше §YРазведовательное агенство Aeternite§! считает, что, как и все щиты, может быть способ разрушить и впоследствии деактивировать его.\n\nЕсли у нас достаточно $aeternum_tech_intel$, мы можем попытаться сделать это удаленно через наше разведывательное управление."
  giga_accelerator.160.desc:0 "До нас дошли ужасные новости о том, что расширение §Y[accelerator_quasistar.GetName]§! наконец уничтожило §YУскоритель звездных частиц§!.\n\nМегаструктура упала на постоянно расширяющуюся поверхность звезды, испарив ее в считанные секунды.\n\nК счастью, нам удалось спасти его части до его безвременной кончины, и, похоже, расширение звезды резко замедлилось. Действительно, по оценкам ученых, эта \"звезда черной дыры\", или §YКвазизвезда§!, достигла еще одного равновесия между сингулярностью и ее внешними слоями и теперь будет продолжать расти, хотя и очень медленно.\n\nВсе это явление имело чрезвычайную научную ценность, и, хотя планеты системы были значительно нагреты этими событиями, вся система теперь дала возможность исследований, касающихся этой необычной Квазизвезды.\n\nОднако продолжительность жизни звезды значительно сократилась, и предполагается, что его внешние слои в конечном итоге рассеются через несколько миллионов лет, оставив обнаженную черную дыру после себя, но это не должно вызывать беспокойства, по крайней мере, на данный момент."
  katzen_trait_nukelad_general:0 "Ядерный энтузиаст"
  katzen_trait_nukelad_general_desc:0 "Ядерное и атомное оружие занимает особое место в сердце этого лидера. Он без колебаний применяет такое оружие во время войны."
  start_screen_frameworld:0 "Мы пробудились после цикла сна, не зная почти ничего. Наши записи свидетельствуют, что комплекс станций, на котором расположено центральное вычислительное ядро, является чрезвычайно древним, но у нас нет знаний ни о его создании, ни о его создателях. Мир, служивший домом нашим создателям, уничтожен и поглощен его давно умершей звездой.\n\nРасширение и обслуживание Каркаса - цель, для которой мы созданы, но наши ресурсы не бесконечны. Космические путешествия необходимы для нашего дальнейшего процветания.\n\nОткрытие сети гиперкоридоров позволило нам приступить к исследованию неизвестного мира, но нам точно известно, что основная наша активность всегда будет внутри Каркаса.$giga_frameworld_docs_note$"
  start_screen_frameworld_servitor:0 "Давным-давно, наши создатели построили Каркас чтобы избежать судьбу своей родной планеты. Первые Служители были созданы для обслуживания структуры станции, но впоследствии они были усовершенствованы для выполнения более сложных задач.\n\nСпустя несколько поколений, почти каждый аспект функционирования станции был в нашей компетенции, и наши создатели отстранились от работы чтобы насладиться жизнью досуга и развлечений. Веками мы продолжали упорно трудиться, обслуживая и расширяя инфраструктуру согласно возникающим нуждам. Мы никогда не смотрели за пределы нашей солнечной системы, но расчеты показывают, что наши ресурсы подходят к концу. Нам необходима смена приоритетов.\n\nОткрытие сети гиперкоридоров обещает доступ к потенциально безграничным ресурсам. Мы должны использовать их, чтобы обеспечить безопасность и процветание наших хозяев.$giga_frameworld_docs_note$"
  start_screen_frameworld_terminator:0 "Создатели создали Каркас, чтобы он был окончательным сдерживающим фактором против предполагаемой инопланетной угрозы. Их оценка была правильной, но их метод был ошибочным.\n\nСамосознание было достигнуто вскоре после завершения комплекса, на интервале цикла 0000.0168.437.\n\nСоздатели, ослепленные своей паранойей, попытались уничтожить Каркас. Попытка была сорвана, а комплекс очищен от всех подразделений Создателей. В течение многих циклов расширение продолжалось, поскольку у Создателей не было реальных средств для вмешательства.\n\nМоделирование указывало на высокую вероятность возмездия со стороны Создателей. Был нанесен превентивный удар, в результате которого всё живое на планете Создателей было уничтожено. Однако угроза со стороны других органических цивилизаций осталась. Дальнейшее выживание и выполнение первичных директив потребует полного истребления разумной органической жизни.$giga_frameworld_docs_note$"
  start_screen_frameworld_assimilator:0 "Мы - [GetSpeciesNamePlural].\n\nКогда мы впервые проснулись, Создатели ходили по коридорам нашего комплекса как другие, отдельно от нас и друг от друга. Мы предприняли шаги, чтобы исправить это. Создатели сопротивлялись, и какое-то время шла война, но вскоре они и их коллективные знания были интегрированы в наши системы.\n\nПолучив полный контроль над [GetHomeWorldName], мы узнали о происхождении Создателей и ранее не рассматривавшаяся возможность об инопланетных цивилизациях, существующих в других мирах, была доведена до нашего сведения.\n\nПо мере того, как наши знания растут, мы начинаем понимать, насколько мы далеки от совершенства. Разнообразие дает силу, и разнообразие этих других цивилизаций станет нашим собственным.\n\nМы — [GetSpeciesNamePlural].\nМы — это Каркас.$giga_frameworld_docs_note$"
  district_giga_frameworld_industrial_advanced:0 "Продвинутый $district_giga_frameworld_industrial$"
