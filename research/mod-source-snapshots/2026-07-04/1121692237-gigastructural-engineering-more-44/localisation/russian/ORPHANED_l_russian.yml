  quasi_stellar_wormhole_01_key:0 "Квазизвездная червоточина"
  qso_intensity_verylow:0 "КП заряжается очень медленно, большая часть ее выходной мощности преобразуется в энергию."
  qso_intensity_veryhigh:0 "КП: Очень высокая зарядка"
  qso_intensity_veryhigh_desc:0 "КП перезаряжается, много энергии используется для увеличения ее мощности."
  qso_intensity_extremely:0 "КП: Экстремальная зарядка"
  qso_intensity_extremely_desc:0 "КП сильно перезаряжается, огромное количество энергии тратится на увеличение ее мощности."
  qso_intensity_insane:0 "КП: Безумная зарядка"
  qso_intensity_insane_desc:0 "КП безумно перегружен, для ее поддержания требуется огромное количество энергии."
  qso_intensity_physicslimits:0 "КП: 'Да' заряжена"
  qso_intensity_physicslimits_desc:0 "КП настолько перезаряжена, насколько это возможно."
  giga_tech_repeatable_academy_cap:0 "Протоколы управления Орбитальным бастионом"
  giga_tech_repeatable_academy_cap_desc:0 "Расширенные протоколы построения и обслуживания, позволяющие создавать и управлять дополнительными §YОрбитальными бастионами§! в границах нашей империи."
  giga_academy_capacity_increase_title:0 "§YОрбитальный бастион§! вместимость: §G+1§!"
  giga_academy_capacity_increase_desc:0 "Емкость Империи для §YОрбитальных бастионов§! увеличивается на §G+1§!"
  giga_tech_orbital_bastion:0 "Сверхмасштабные орбитальные военные бастионы"
  giga_tech_orbital_bastion_desc:0 "По мере того, как растет флот нашей империи, растут и его потребности. Одним из решений постоянно растущих потребностей флота является строительство массивных $name_orb_bastion$, в которых размещаются огромные массивы военной техники для поддержки нашего флота."
  orbital_bastion_desc:0 "Огромный военный комплекс, который помогает в управлении нашей армией."
  giga_dialog.601.name:0 "Строительная площадка $name_orb_bastion$ завершена"
  giga_dialog.601.desc:0 "Тренировочная зона и несколько казарм готовы. Можно начинать обучение.\nМы должны улучшить эту станцию, чтобы она принесла пользу нашей империи."
  giga_dialog.602.name:0 "$name_orb_bastion$ завершен"
  giga_dialog.602.desc:0 "Наши орбитальные казармы в системе [giga_system.GetName] теперь улучшены до бастиона! После завершения строительства мы можем более эффективно обучать большое количество персонала. Голографические симуляторы и арены с нулевым ускорением - прекрасное место для обучения наших пилотов и солдат."
  giga_dialog.603.name:0 "Штаб администрации завершен."
  giga_dialog.603.desc:0 "Бастион в [giga_system.GetName] был обновлен до административного штаба. С этим комплектом материально-технические требования вооруженных сил удовлетворены и даже расширены. Эта конструкция, в которой размещаются тысячи обученных солдат и пилотов, значительно улучшит наш военный потенциал."
  giga_dialog.604.name:0 "Штаб адмирала завершен."
  giga_dialog.604.desc:0 "Отличный день для наших военных. Наш административный штаб теперь превратился в штаб адмирала. После этого у одного из наших главных адмиралов появилась личная оперативная база. Включает в себя бесплатную систему внутренней связи, подключенную ко всем кораблям флота, для отличных возможностей приказа. Дает невероятные баффы нашим армадам."
  orbital_bastion_0:0 "Строительная площадка $name_orb_bastion$"
  orbital_bastion_0_DESC:0 "Просто ваша обычная тренировочная станция. Здесь нет ничего особенного. В настоящее время бонусов нет. Каркас для строительства военного бастиона."
  orbital_bastion_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_megastructure$ - $giga_list_category_military$\nУвеличивает §YВместимость флота§! и §YПредел управления флотом§!.\n§LБольшая орбитальная структура, в которой размещены различные объекты для улучшения возможностей нашего военного флота. Дает различные бонусы нашему флоту§!." #megalistcategory ORBITAL BASTION"
  orbital_bastion_1_DESC:0 "Здесь тренируются и базируются многочисленные подразделения войск со всем необходимым оборудованием, логистикой и административным персоналом. Бесплатные сержанты-инструкторы. Имеет несколько якорных стоянок для поддержки нашего флота."
  orbital_bastion_2:0 "Отделение военной администрации"
  orbital_bastion_2_DESC:0 "Огромный комплекс поддержки военно-космического флота и всех связанных с ним логистических требований."
  orbital_bastion_3:0 "Адмиралтейские операции"
  orbital_bastion_3_DESC:0 "Место главного военного офицера для удобства операций. Оснащенная десятками сухих доков и якорных стоянок, эта могучая структура помогает снизить нагрузку на управление галактической армадой."
  quasi_stellar_marker_cluster:0 "Маркер цели КП"
  quasi_stellar_marker_cluster_DESC:0 "Виртуальный маркер цели, который обозначает цель неудачника для КП."
  quasi_stellar_marker_cluster_MEGASTRUCTURE_DETAILS:0 "Наведите курсор на звезду, чтобы навести на нее КП."
  quasi_stellar_marker_cluster_open:0 "Червоточина КП"
  quasi_stellar_marker_cluster_open_DESC:0 "$name_quasistellar$ вот-вот выстрелит через эту червоточину."
  quasi_stellar_marker_cluster_firing:0 "Червоточина КП"
  quasi_stellar_marker_cluster_firing_DESC:0 "$name_quasistellar$ стреляет через эту червоточину."
  quasi_stellar_obliterator_firing_laser_big:0 "Луч КП"
  quasi_stellar_obliterator_firing_laser_big_DESC:0 "Луч чистого разрушения."
  quasi_stellar_marker_star:0 "Маркер цели КП"
  quasi_stellar_marker_star_DESC:0 "Виртуальный маркер цели, который обозначает цель неудачника для КП."
  quasi_stellar_marker_star_MEGASTRUCTURE_DETAILS:0 "Наведите курсор на звезду, чтобы навести на нее КП."
  quasi_stellar_marker_star_open:0 "Червоточина КП"
  quasi_stellar_marker_star_open_DESC:0 "$name_quasistellar$ вот-вот выстрелит через эту червоточину."
  quasi_stellar_marker_planet:0 "Маркер цели КП"
  quasi_stellar_marker_planet_DESC:0 "Виртуальный маркер цели, который обозначает цель неудачника для КП."
  quasi_stellar_marker_planet_MEGASTRUCTURE_DETAILS:0 "Поместите над планетой, чтобы навести на нее КП."
  quasi_stellar_marker_planet_open:0 "Червоточина КП"
  quasi_stellar_marker_planet_open_DESC:0 "$name_quasistellar$ вот-вот выстрелит через эту червоточину."
  giga_qso.500.name:0 "$name_quasistellar$: Параметры"
  giga_qso.500.desc:0 "Здесь вы можете настроить некоторые аспекты самой КП.\n\nИзменение скорости зарядки изменит выход £giga_sr_quasaric_energy£ гипероружия. Более низкая скорость зарядки будет генерировать меньше, но взамен даст некоторую £energy£, преобразованную из £giga_sr_quasaric_energy£. Более высокая ставка заряда приведет к большему количеству, но взамен потребует некоторой £energy£, так как необходимо перезарядить конструкцию.\n\nВы также можете сбросить некоторые ресурсы (£minerals£ £food£ £consumer_goods£ £alloys£ £pops£) в квазар. Ресурсы столкнутся с ярким аккреционным диском и сгенерируют каскад высокоэнергетических частиц, которые затем можно будет использовать для доставки еще некоторого количества £giga_sr_quasaric_energy£ в гипероружие."
  giga_qso.501.name:0 "$name_quasistellar$: Сброс ресурсов"
  giga_qso.501.desc:0 "Вы можете сбрасывать различные ресурсы в сверхмассивный квазар, чтобы подпитывать яркий аккреционный диск и генерировать энергию для преобразования в £giga_sr_quasaric_energy£\n\nПожалуйста, выберите, что вы хотите сбросить в квазар."
  giga_qso.1.panel:0 "Вернуться в Панель управления"
  giga_qso.500.dump:0 "Сброс ресурсов..."
  giga_qso.500.minerals:0 "Бросить 100k £minerals£ --> 25 £giga_sr_quasaric_energy£"
  giga_qso.500.alloys:0 "Бросить 50k £alloys£ --> 30 £giga_sr_quasaric_energy£"
  giga_qso.500.food:0 "Бросить 50k £food£ --> 30 £giga_sr_quasaric_energy£"
  giga_qso.500.goods:0 "Бросить 100k £consumer_goods£ --> 30 £giga_sr_quasaric_energy£"
  giga_qso.500.undesirable:0 "Бросить 25 §BНежелательные жители§! --> 5 £giga_sr_quasaric_energy£"
  giga_qso.500.undesirable.tooltip:0 "Мы сбросим в квазар 25 случайных жителей с нежелательным гражданством. Их составляющая энергия наконец-то пригодится для чего-то."
  giga_qso.500.increase:0 "§HУвеличить скорость зарядки§!"
  giga_qso.500.decrease:0 "§EУменьшить скорость зарядки§!"
  giga_qso.500.intensityphysicslimits:0 "§YТекущая скорость зарядки:§! §LО да!§! | 25 £giga_sr_quasaric_energy£ -22500 £energy£"
  giga_qso.500.intensityinsane:0 "§YТекущая скорость зарядки:§! §MБезумно высокая§! | 20 £giga_sr_quasaric_energy£ -15000 £energy£"
  giga_qso.500.intensityextremely:0 "§YТекущая скорость зарядки:§! §RЭкстремально высокая§! | 17 £giga_sr_quasaric_energy£ -10000 £energy£"
  giga_qso.500.intensityveryhigh:0 "§YТекущая скорость зарядки:§! §PОчень высокая§! | 14 £giga_sr_quasaric_energy£ -6000 £energy£"
  giga_qso.500.intensityhigh:0 "§YТекущая скорость зарядки:§! §HВысокая§! | 12.5 £giga_sr_quasaric_energy£ -3000 £energy£"
  giga_qso.500.intensitymed:0 "§YТекущая скорость зарядки:§! §YСредняя§! | 10 £giga_sr_quasaric_energy£ 0 £energy£"
  giga_qso.500.intensitylow:0 "§YТекущая скорость зарядки:§! §GНизкая§! | 5 £giga_sr_quasaric_energy£ 4000 £energy£"
  giga_qso.500.intensityverylow:0 "§YТекущая скорость зарядки:§! §BОчень низкая§! | 1.5 £giga_sr_quasaric_energy£ 8000 £energy£"
  giga_qso.500.intensitynone:0 "§YТекущая скорость зарядки:§! Нет | 0 £giga_sr_quasaric_energy£ 10000 £energy£"
  giga_qso.1.name:0 "Панель управления $name_quasistellar$"
  giga_qso.1.desc:0 "Добро пожаловать в панель управления $name_quasistellar$.\n\nЗдесь вы можете либо выбрать цель для гипероружия, либо настроить его параметры.\n\nВыбрав цель, вы сможете целиться либо в звезду, либо в планету либо во флот. Помните, что для стрельбы из КП требуется £giga_sr_quasaric_energy£ §YКвазарическая энергия§!, генерируемая самой мегаструктурой.\n\nПросмотр параметров позволит вам изменить скорость зарядки оружия, увеличивая или уменьшая количество £giga_sr_quasaric_energy£ §YКвазарическая энергия§! накопленную нашей КП.\n\n§BК этому меню также можно получить доступ напрямую через указ.§!"
  giga_qso.1.fire:0 "Выбрать цель"
  giga_qso.1.parameters:0 "Просмотр параметров"
  giga_qso.1.quit:0 "Выйти из панели управления"
  giga_qso.1.menu:0 "Вернутся в меню"
  giga_qso.10.name:0 "$name_quasistellar$: Выбор цели"
  giga_qso.10.desc:0 "Здесь вы можете выбрать, на что вы хотите нацелить КП. Прочтите, как правильно работает каждый метод целеуказания. Имейте в виду, что для уничтожения более крупных целей потребуется больше £giga_sr_quasaric_energy£ §YКвазарическая энергия§!."
  giga_qso.10.fleet:0 "Уничтожить §GФлот§!"
  giga_qso.10.planet:0 "Уничтожить §YПланету§!"
  giga_qso.10.star:0 "Уничтожить §HЗвездную систему§!"
  giga_qso.10.starcluster:0 "Уничтожить §RЗвездный кластер§!"
  giga_qso.200.name:0 "$name_quasistellar$: §GУничтожение флота§!"
  giga_qso.200.desc:0 "Вы выбрали целью вражеский флот с помощью $name_quasistellar$. Это будет стоить §Y20§ £giga_sr_quasaric_energy£\n\nСпециальный корабль, используемый для калибровки прицеливания КП, будет создан рядом со строением. Он оснащен специальным прыжковым приводом с неограниченным радиусом действия. Переместите этот корабль в систему, содержащую целевой флот, а затем снова откройте панель управления для подтверждения.\n\nКорабль должен будет оставаться в живых в течение §Y5 дней§!, пока гипероружие будет откалибровано, поэтому убедитесь, что он должным образом сопровождается или помогите ему уходить от атак вражеского флота.\n\nПо истечении этих 30 дней КП будет вести огонь через червоточину прямо по вражескому флоту еще 30 дней. Однако червоточину может разрушить вражеский огонь, поэтому не рекомендуется оставлять ее без присмотра.\n\nЕсли вы хотите отменить операцию, либо распустите корабль, либо воспользуйтесь панелью управления."
  giga_qso.200.yes:0 "Давайте продолжим."
  giga_qso.201.name:0 "Калибратор Квазарной Пушки собран"
  giga_qso.201.desc:0 "Наша КП собрал небольшой корабль Quasi-Stellar Calibrator. Он должен использоваться для правильной калибровки и наведения на червоточину, через которую будет стрелять гипероружие. Чтобы начать последовательность стрельбы, используйте его прыжковый двигатель, чтобы переместить его в систему, содержащую целевой флот."
  giga_qso.201.a:0 "Принято."
  giga_qso.202.name:0 "Калибратор Квазарной Пушки расформирован"
  giga_qso.202.desc:0 "Мы распустили наш калибратор КП. Процедура уничтожения отменена."
  giga_qso.202.a:0 "Принято."
  giga_qso.203.name:0 "Калибратор Квазарной Пушки уничтожен"
  giga_qso.203.desc:0 "Наш калибратор КП был уничтожен вражескими силами. Процедура уничтожения отменена."
  giga_qso.204.name:0 "$name_quasistellar$: §GУничтожение флота§!"
  giga_qso.204.desc:0 "Если вы поместили калибратор КП в правильную систему, выберите первый вариант. Защищать придется 5 дней. Если вы хотите отменить, выберите третий вариант, который отключит Калибратор."
  giga_qso.204.fire:0 "Начать калибровку! Стоимость: §Y20§! £giga_sr_quasaric_energy£"
  giga_qso.204.markers:0 "Калибратор еще не установлен."
  giga_qso.205.name:0 "Калибровка Квазарной Пушки"
  giga_qso.205.desc:0 "Наша $name_quasistellar$ начала калибровку своего оружия с помощью корабля Калибратор. Мы должны гарантировать, что он не будет уничтожен в течение 5 дней, после чего наше супероружие выпустит луч чистого разрушения на наших врагов. КП будет работать около 30 дней, после чего червоточина исчезнет, ​​и КП снова будет готова к использованию."
  giga_qso.205.a:0 "Отлично."
  giga_qso.206.name:0 "$name_quasistellar$: Калибровка завершена"
  giga_qso.206.desc:0 "Наша $name_quasistellar$ завершила калибровку своего гипероружия и червоточины и теперь обрушит свою ярость на несчастный флот, который мы обозначили как цель."
  giga_qso.206.a:0 "Превосходно. Пусть горят."
  giga_qso.400.name:0 "$name_quasistellar$: §RУничтожение звездного кластера§!"
  giga_qso.400.desc:0 "Вы решили уничтожить звезду и всех ее ближайших соседей по гиперкоридорам. Для этого используйте строительный корабль, чтобы построить §BМаркер цели КП§! над звездами, которые вы хотите уничтожить.\n\nОн строится мгновенно и не требует физического присутствия строительного корабля в системе.\n\n§RОднако система должна быть очищена от врагов.§!\nДля этого можно использовать функцию КП Уничтожение флота.\n\nКак только маркеры цели будут построены, вернитесь к КП и еще раз откройте панель управления, чтобы выстрелить из устройства.\n\n§BВзрыв будет настолько мощным, что он будет распространяться по гиперкоридорам, в результате чего целевая система вместе со всеми подключенными к ней системами будет полностью разрушена, а их гиперкоридоры будут удалены, не оставив ничего, кроме пустого пространства.§!"
  giga_qso.401.name:0 "§RУничтожение звездного кластера§!"
  giga_qso.401.desc:0 "Если вы нацелены на звезду в центре кластера, который хотите уничтожить, выберите первый вариант. Если вы хотите отменить, выберите третий вариант, который удалит маркер."
  giga_qso.401.fire:0 "Уничтожьте звездное скопление, огонь! Стоимость: §Y120§! £giga_sr_quasaric_energy£"
  giga_qso.401.markers:0 "Мы еще не нацелились на звезду."
  giga_qso.300.name:0 "$name_quasistellar$: §HУничтожение звездной системы§!"
  giga_qso.300.desc:0 "Вы решили уничтожить одну или несколько звезд и целые их планетные системы. Для этого используйте строительный корабль, чтобы построить маркер цели §BКП§! над звездами, которые вы хотите уничтожить.\n\nОн строится мгновенно и не требует физического присутствия строительного корабля в системе.\n\n§RОднако системы должны быть очищены от врагов.§!\nДля этого можно использовать функцию КП Уничтожение флота.\n\nВы можете нацелить до 4 звезд одновременно, каждая из которых добавляет 40 £giga_sr_quasaric_energy£ к общей стоимости стрельбы. Если в системе несколько звезд, вам нужно нацелиться только в одну из них.\n\nПосле создания маркеров цели вернитесь к КП и откройте панель управления еще раз, чтобы запустить устройство.\n\n§BВыделение энергии $name_quasistellar$ настолько велико, что может уничтожить нейтронные звезды, пульсары и даже черные дыры, поскольку поток энергии настолько велик, что само пространство-время буквально переворачивается наизнанку, а Черная дыра испаряется в ничто.\n\n§B Все гиперкоридоры, подключенные к системам, исчезнут, как только системы будут уничтожены.§!"
  giga_qso.301.name:0 "$name_quasistellar$: §HУничтожение звездной системы§!"
  giga_qso.301.desc:0 "Если вы выбрали целью все звезды, которые хотите уничтожить, выберите первый вариант. Если вы хотите отменить, выберите третий вариант, который удалит все маркеры."
  giga_qso.301.markers:0 "Нам все еще нужно нацелить больше звезд перед стрельбой."
  giga_qso.301.fire.1:0 "Уничтожьте 1 звездную систему, огонь! Стоимость: §Y40§! £giga_sr_quasaric_energy£"
  giga_qso.301.fire.2:0 "Уничтожьте 1 звездную систему, огонь! Стоимость: §Y80§! £giga_sr_quasaric_energy£"
  giga_qso.301.fire.3:0 "Уничтожьте 1 звездную систему, огонь! Стоимость: §Y120§! £giga_sr_quasaric_energy£"
  giga_qso.301.fire.4:0 "Уничтожьте 1 звездную систему, огонь! Стоимость: §Y160§! £giga_sr_quasaric_energy£"
  giga_qso.100.name:0 "$name_quasistellar$: §YУничтожение планеты§!"
  giga_qso.100.desc:0 "Вы выбрали уничтожение одной или нескольких планет. Для этого используйте строительный корабль, чтобы построить маркер цели §BКП§! над планетами, которые вы хотите уничтожить.\n\nОни строятся мгновенно и не требуют физического присутствия строительного корабля в системе. Убедитесь, что строительный корабль не находится в позиции уклонения.\n\nВы можете нацелить до 10 планет одновременно, каждая из которых добавляет 5 £giga_sr_quasaric_energy£ к общей стоимости стрельбы, максимум 50.\n\nПосле того, как маркеры цели были построены, вернитесь к КП и откройте панель управления еще раз, чтобы запустить устройство."
  giga_qso.101.name:0 "$name_quasistellar$: §YУничтожение планеты§!"
  giga_qso.101.desc:0 "Если вы выбрали целью все планеты, которые хотите уничтожить, выберите первый вариант. Если вы хотите отменить, выберите третий вариант, который удалит все маркеры."
  giga_qso.101.fire.1:0 "Уничтожить 1 планету, огонь! Стоимость: §Y5§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.2:0 "Уничтожить 2 планеты, огонь! Стоимость: §Y10§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.3:0 "Уничтожить 3 планеты, огонь! Стоимость: §Y15§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.4:0 "Уничтожить 4 планеты, огонь! Стоимость: §Y20§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.5:0 "Уничтожить 5 планет, огонь! Стоимость: §Y25§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.6:0 "Уничтожить 6 планет, огонь! Стоимость: §Y30§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.7:0 "Уничтожить 7 планет, огонь! Стоимость: §Y35§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.8:0 "Уничтожить 8 планет, огонь! Стоимость: §Y40§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.9:0 "Уничтожить 9 планет, огонь! Стоимость: §Y45§! £giga_sr_quasaric_energy£"
  giga_qso.101.fire.10:0 "Уничтожить 10 планет, огонь! Стоимость: §Y50§! £giga_sr_quasaric_energy£"
  giga_qso.101.markers:0 "Нам все еще нужно нацелить больше планет перед стрельбой."
  giga_qso.101.cancel:0 "Отменить все."
  giga_flavor_systems.2000.name:0 "Геоцентрический"
  giga_flavor_systems.2000.desc:0 "Один из наших кораблей исследующий систему §YBehemoth§!, наткнулся на действительно бросающую вызов физике планетарную систему.\n\nВокруг центрального Коричневого карлика системы вращается своеобразный континентальный мир, который, по общему мнению, не должен быть обитаемым из-за низкой выходной энергии Коричневого карлика. Однако каким-то образом миниатюрное солнцеподобное небесное тело вращается в непосредственной близости от указанного мира, обеспечивая его достаточным количеством тепла и энергии для поддержания стабильной гидросферы и жизни на его поверхности.\n\nКроме того, на планете появилось несколько разумных видов. , которые превратились в множество примитивных национальных государств, в настоящее время подвергающихся широкомасштабной индустриализации.\n\nДостаточно интересно, что сама планета необычайно богата кристаллическими материалами, и первобытные люди придумали изобретательные способы интеграции этих материалов в свои технологии и оружие, что привело к развитие необычайно мощных для столь ранней цивилизации вооруженных сил. Сама экосистема планеты потрясающе разнообразна, в ней обитает множество экзотических и эзотерических видов, которые, казалось бы, бросают вызов нашему пониманию эволюции и биологии в целом.\n\nНет никаких сомнений в том, что вся эта планетарная система противоречит большинству наших текущих знаний о развитии обитаемых миров, и ее изучение, несомненно, предоставит невероятную возможность для дальнейшего развития нашей научной базы."
  giga_flavor_systems.2000.a:0 "Как странно."
  giga_flavor_systems.2002.name:0 "Faust вступает в атомный век"
  giga_flavor_systems.2002.desc:0 "Отчеты показывают, что первобытные люди, населяющие своеобразный континентальный мир §YFaust§! в системе §Y[giga_eaw_system.GetName]§!, успешно построили и испытали ядерное устройство малой мощности.\n\nХотя на данный момент они остаются относительно редкими и дорогими, ожидается, что это оружие будет распространяться в геометрической прогрессии по мере совершенствования технологии и ее распространения в различных государствах планеты.\n\nИнтересно , вместо того, чтобы полагаться на обычное деление урана для получения энергии, это оружие использует энергию, содержащуюся в обильных кристаллических месторождениях планеты, для высвобождения огромной разрушительной силы, которую наш Наблюдательный Пост начал называть §Yядерно-магическими устройствами§!.\n\nОтныне, если на планете возникнет крупномасштабный конфликт, он обязательно будет значительно более разрушительным, чем когда-либо прежде."
  giga_flavor_systems.2002.a:0 "Интригующе."
  giga_flavor_systems.2004.name:0 "Faust погружается в ядерно-магическую войну"
  giga_flavor_systems.2004.desc:0 "Наш пост наблюдения §YFaust§! сообщает, что из-за чрезвычайно высокой напряженности на геополитической сцене планеты относительно незначительный инцидент с рыбацкой лодкой между двумя крупными державами на Faust перерос в крупномасштабный конфликт, в котором три основных континента планеты противостоят друг другу.\n\nК сожалению, ядерно-магическое оружие получило широкое распространение, и большинство крупных стран обладало значительным его арсеналом, а это означает, что конфликт быстро превратился в событие уровня исчезновения, поскольку различные наднациональные альянсы планеты начали бросать друг в друга большое количество ядерно-магических боеголовок.\n\nВсего потребовалось несколько дней, чтобы поверхность планеты была полностью поглощена катастрофической энергией, высвобождаемой устройствами, превращая когда-то зеленый мир в огромный кипящий шторм околомагических энергий, покрывающий всю планету.\n\nОрбитальное сканирование показывает, что, если не считать одного участка удивительно сопротивляющихся джунглей, которые, по-видимому, процветают за счет энергии, высвобождаемой ядерно-магическими устройствами, примитивная цивилизация была полностью уничтожена."
  giga_flavor_systems.2004.a:0 "Такой жестокий конец. Несчастные."
  giga_flavor_systems.2006.name:0 "Faust вступает в раннюю космическую эру"
  giga_flavor_systems.2006.desc:0 "Первобытные люди на §YFaust§! завершили еще один важный шаг в своей социальной эволюции, разработав первые орбитальные космические корабли, способные к межпланетным полетам.\n\nПриведенные в действие жидкими формами изобилующих кристаллов планеты, несколько таких космических кораблей были отправлены для исследования своей звездной системы, с их помощью первобытные люди начинают серьезно исследовать природу своей эзотерической планетной системы.\n\nС развитием все более и более мощных телескопов с кристаллическими линзами, вполне вероятно, что изучая более «стандартные» экзопланеты, первобытные люди узнали, что своеобразная астрогеография их планеты действительно является уникальной.\n\nНапряженность по всей планете начинает остывать, и несколько крупных держав предпринимают вполне реальные шаги к международному сотрудничеству, но еще неизвестно, принесут ли эти усилия плоды или закончатся катастрофическим вымиранием.\n\nНе пройдет много времени, прежде чем их особенные существа будут готовы присоединиться к нам среди звезд."
  giga_flavor_systems.2006.a:0 "Интересно."
  giga_flavor_systems.2012.name:0 "§YВеликое Фаустовское Собрание§! изобретает гипердвигатель"
  giga_flavor_systems.2011.desc.eawun:0 "Наш пост наблюдения  §YFaust§! показывает, что первобытные жители планеты, по крайней мере, придумали работающий сверхсветовой двигатель. Подобно большинству их технологий, он широко использует необычные и обильные кристаллы планеты, что делает их удивительно дешевыми в производстве, учитывая количество кристаллов, доступных в их родной системе.\n\nСама планета была объединена наднациональным образованием, известным как §YВеликое Фаустовское собрание§!, сформированном федерацией нескольких крупнейших демократических правительств планеты. Хотя эти правительства до некоторой степени все еще существуют, Собрание фактически взяло на себя роль межзвездной власти Faust и будет нести ответственность за руководство расширением цивилизации через звезды.\n\nУчитывая большие культурные и физические различия между различными видами планеты, мирная федерализация всей планеты в единое правительство рассматривается как поразительный подвиг как командой нашего аванпоста, так и большинством жителей планеты.\n\nОднако, поскольку мы владеем звездной базой системы, мы получили сообщение от их лидера, §YДжангл Трека III§! с просьбой передать им право собственности на звездную базу, чтобы жители Faust могли наконец начать свое межпланетное путешествие."
  giga_flavor_systems.2013.name:0 "§YИмперия Гриффона§! изобретает гипердвигатель"
  giga_flavor_systems.2011.desc.eawgriffon:0 "Наш Пост наблюдения §YFaust§! отмечает, что первобытные жители планеты, по крайней мере, придумали работающий сверхсветовой двигатель. Подобно большинству их технологий, он широко использует специфические и обильные кристаллы планеты, что делает их удивительно дешевыми в производстве, учитывая количество кристаллов, доступных в их родной системе.\n\nСама планета была объединена посредством войн и дипломатических маневров империалистической нацией, известной как §YИмперия Грифонов§!, которой удалось подчинить себе большинство бывших наций планеты либо путем прямого завоевания, либо путем установления своего экономического господства на остальная часть планеты.\n\nХотя не все довольны таким соглашением, не осталось ни одной иностранной державы, способной противостоять оккупации Империи Грифонов, и, таким образом, судьба планеты кажется решенной.\n\nПоскольку мы владеем звездной базой системы, мы получили сообщение от их лидера, §YГровера XI§! из §YДинастии Гроверов§! с просьбой передать им право собственности на звездную базу, чтобы Империя Грифонов могла быть признана независимой галактической нацией."
  giga_flavor_systems.2014.name:0 "§YОбщефаустовская Социалистическая Республика§! изобретает гипердвигатель"
  giga_flavor_systems.2011.desc.eawcommunist:0 "Наш Пост наблюдения §YFaust§! сообщает, что первобытные жители планеты, по крайней мере, придумали работающий сверхсветовой двигатель. Подобно большинству их технологий, он широко использует своеобразные и обильные кристаллы планеты, что делает их удивительно дешевыми в производстве, учитывая количество кристаллов, доступных в их родной системе.\n\nСама планета была относительно мирно объединена в §YОбщефаустовскую Социалистическую Республику§!, социалистическое правительство с подходящим названием, которое, благодаря нескольким слияниям с дружественными социалистическими союзниками и немалому количеству войн, сумело установить свой контроль над подавляющим большинством национальных государств Faust.\n\nХотя несколько наций остались независимы, они слишком незначительны, чтобы иметь значение против подавляющего превосходства нового социалистического правительства, которое обещает принести равенство и процветание всем существам, независимо от вида или происхождения.\n\nПоскольку мы владеем звездной базой системы, мы получили передача от их лидера, представителя их Верховного Совета, с просьбой передать им право собственности на звездную базу."
  giga_flavor_systems.2011.a:0 "На экран."
  giga_flavor_systems.2015.name:0 "[giga_eaw_country.GetName]"
  giga_flavor_systems.2015.desc.eawun:0 "Приветствую вас, звездные путешественники. Великое Фаустовское Собрание, наконец, получило необходимые технологии, чтобы плыть сквозь звезды.\n\nОднако мы заметили, что ваш вид претендует на нашу звездную систему. Таким образом, наш великий совет решил предложить вашей цивилизации финансовую компенсацию в размере §Y7500§! £energy£, полученной от наших величайших кристаллических реакторов, в обмен на полное владение системой §Y[giga_eaw_system.GetName]§!."
  giga_flavor_systems.2015.desc.eawgriffon:0 "Приветствую вас, внефаустовские существа. Империя Грифонов наконец-то приручила сами законы физики, позволив нам пересекать бескрайние пустоты между звездами.\n\nОднако мы заметили, что ваш вид претендует на нашу звездную систему. Таким образом, я, кайзер §YГровер XI§! хотел бы, чтобы ваш вид передал систему под наш контроль, поскольку мы населяли ее гораздо дольше, чем вы.\n\nЭто будет правильно."
  giga_flavor_systems.2015.desc.eawcommunist:0 "Приветствую вас, звездные путешественники. Самые яркие умы Общефаустовской Социалистической Республики разработали грандиозное устройство, способное достигать других звезд.\n\nОднако мы заметили, что ваш вид претендует на нашу звездную систему. Таким образом, наш высший совет решил предоставить вашей цивилизации финансовую компенсацию в размере §Y5000§! £energy£ и §Y2500§! наших лучших £consumer_goods£ в обмен на полное владение системой §Y[giga_eaw_system.GetName]§!.\n\nМы надеемся, что вы нас не подведете."
  giga_flavor_systems.2015.a:0 "Теперь у вас есть система."
  giga_flavor_systems.2015.a.response:0 "[giga_eaw_country.GetName] благодарит вас за сотрудничество."
  giga_flavor_systems.2015.a.tooltip:0 "Мы полностью отдадим систему §Y[giga_eaw_system.GetName]§! во владение §Y[giga_eaw_country.GetName]§!, включая любые другие колонии, которые могут быть в системе."
  giga_flavor_systems.2015.b:0 "У вас может быть система и ее непосредственные соседи."
  giga_flavor_systems.2015.b.tooltip:0 "Мы полностью отдадим систему §Y[giga_eaw_system.GetName]§!, а также §Yсоседние системы§! во владение §Y[giga_eaw_country.GetName]§!, включая любые другие колонии, которые могут быть у нас в этих системах.\n\n[giga_eaw_country.GetName], несомненно, будут вам благодарны."
  giga_flavor_systems.2015.b.response:0 "Действительно восхитительно! [giga_eaw_country.GetName] будут благодарны."
  giga_flavor_systems.005.c:0 "Просьба отклонена."
  giga_flavor_systems.005.c.tooltip:0 "Мы откажемся отдать им систему. Они могут отомстить нам."
  giga_flavor_systems.005.c.response:0 "Знайте, что мы не боимся конфликтов, [ROOT.GetName]."
  giga_flavor_systems.2007.name:0 "Faust сожжен"
  giga_flavor_systems.2007.desc:0 "Зажигание Коричневого карлика §YBehemoth§! сделало большинство планет в своей звездной системе гораздо более пригодными для жизни, чем раньше, но это произошло за счет полного испепеления первобытных людей, живущих в своеобразном континентальном мире §YFaust§!.\n\nПоверхность планеты была полностью уничтожена первоначальной ударной волной от зажигания звезды, мгновенно стерилизовавшей ее и уничтожившей все формы жизни на ее поверхности, за исключением очагов изолированных экстремофилов.\n\nПримитивная цивилизация, ранее населявшая планету, больше не существует, стертая в считанные мгновения нашей собственной безрассудностью."
  giga_flavor_systems.2007.xenophile:0 "Страшное преступление..."
  giga_flavor_systems.2007.xenophile.tooltip:0 "Из-за нашей этики наше население будет §Rнедовольно§!."
  giga_flavor_systems.2007.xenophobe:0 "Скатертью дорога!"
  giga_flavor_systems.2007.xenophobe.tooltip:0 "Благодаря нашей этике наше население будет §Gдовольно§!."
  giga_flavor_systems.2007.exterminator:0 "О, нет! С другой стороны..."
  giga_flavor_systems.2007.exterminator.tooltip:0 "Согласно нашим этическим нормам, это рассматривается как §Bвеликолепное событие§!."
  giga_flavor_systems.2007.other:0 "К сожалению..."
  giga_flavor_systems.2007.other.tooltip:0 "Это действие вызовет §Yнегативную реакцию§! среди нашего населения, но она должна утихнуть достаточно скоро."
  eaw_ignited_faust_modifier_good:0 "Истребленные примитивы"
  eaw_ignited_faust_modifier_good_desc:0 "Мы воспользовались своим правом на господство, испепелив жалких примитивов силой нашего технологического мастерства."
  eaw_ignited_faust_modifier_bad:0 "Сожженные примитивы"
  eaw_ignited_faust_modifier_bad_desc:0 "Наши действия привели к безвременной кончине миллиардов невинных душ. Это преступление не будет забыто нашим населением."
  giga_flavor_systems.2100.name:0 "Faust порабощен"
  giga_flavor_systems.2100.desc:0 "Нашим армиям удалось успешно подчинить себе подавляющее большинство вооруженных сил §YFaust§!, и хотя несколько отставшихся продолжают сопротивляться нашим солдатам в самых изолированных регионах Faust, теперь мы установили контроль над всеми крупными населенными пунктами планеты.\ n\nОднако Faust обладает необычайно разнообразным набором наций и культур, по крайней мере, с двумя различными основными видами, населяющими планету, и десятками подвидов, каждый со своей идеологией и верованиями.\n\nПо сути, это делает удивительно трудным сохранение недавно завоеванного населения под контролем, а в сочетании с тем фактом, что некоторые из вышеупомянутых видов, по-видимому, обладают псионическими способностями, это означает, что основные движения сопротивления уже организуются по всей планете.\n\nНет сомнений, что со временем мы сможем полностью подчинить себе первобытных фаустовцев, но пока следует ожидать крайне жесткого сопротивления нашему правлению на планете, поскольку жители Faust понимают неизбежную реальность своего нового статуса членов нашей цивилизации."
  giga_flavor_systems.2100.a:0 "С ними разберутся вовремя."
  giga_flavor_systems.2101.name:0 "Кристаллическое оружие"
  giga_flavor_systems.2101.desc:0 "Изучая покоренное население §YFaust§! и их технологии, наши солдаты заметили, что, несмотря на то, что они классифицируются как примитивная цивилизация, фаустовцы использовали удивительно мощное оружие для своего уровня технологического развития.\n\nДальнейшее расследование показало, что большая часть оружия фаустовцев основана на использовании экзотического типа §YРедкого Кристалла§!, встроенного в их технологии, которые были способны хранить и высвобождать огромное количество энергии. Эти кристаллы фактически действовали как «кристаллические батареи», снабжая их оружие почти бесконечным потоком энергии для использования.\n\nОни, по-видимому, тесно связаны с известными нам редкими кристаллами и, вероятно, были отложены на Faust веками ударов метеоритов из близлежащиего пояса кристаллических астероидов, возможно, свернутый в эту более экзотическую форму мощным магнитным полем Коричневого карлика.\n\nВ любом случае, наши ученые стремятся изучить эти необычные кристаллы и уже выдвинули несколько предложений по интеграции их в наше собственное оружие, чтобы еще больше укрепить мощь наших вооруженных сил.\n\nОдин ученый обратил внимание на тот факт, что, если бы такая цивилизация полностью использовала истинный потенциал ядерно-магического оружия, оно, несомненно, стало бы одной из самых угрожающих сил во всей галактике. К счастью, жители Faust использовали кристаллы больше как апгрейды своих «обычных» технологий, а не полностью полагались на них. Но ради нас самих мы должны надеяться, что ни одна цивилизация никогда не раскроет истинный потенциал этих эзотерических и практически «магических» технологий..."
  giga_flavor_systems.2101.a:0 "Интригующе."
  giga_flavor_systems.2016.name:0 "[giga_eaw_country.GetName] захватывают звездную базу системы [giga_eaw_system.GetName]!"
  giga_flavor_systems.2016.desc:0 "С вопиющим пренебрежением к нашему отклонению их требований, §Y[giga_eaw_country.GetName]§! провели операцию по захвату нашей звездной базы в системе §Y[giga_eaw_system.GetName]§!.\n\nХотя им удалось захватить саму звездную базу, по нашим оценкам, уничтожить их флоты и вернуть себе систему и планету не должно быть слишком сложно, но наше высшее командование предупреждает, что их наземные силы необычайно мощный для такой молодой цивилизации."
  giga_flavor_systems.2016.a:0 "Как они смеют? Раздавить их сразу!"
  giga_flavor_systems.2016.a.tooltip:0 "Мы §RОБЪЯВИМ ВОЙНУ§! против §Y[giga_eaw_country.GetName]§! и придется захватить §YFaust§!, чтобы закончить войну."
  giga_flavor_systems.2016.b:0 "У них может быть система, нам она все равно ничего не стоит."
  giga_flavor_systems.2016.b.tooltip:0 "Система §Y[giga_eaw_system.GetName]§! и все ее планеты отходят во владения  §Y[giga_eaw_country.GetName]§!."
  d_alderson_generator:0 "Волшебный генератор"
  d_alderson_generator_desc:0 "Эта древняя машина, кажется, отвечает нашим потребностям, производя ресурсы, необходимые для содержания некоторых наших районов."
  d_alderson_ruined_district:0 "Расчистка земли"
  d_alderson_ruined_district_desc:0 "Расчистка Альдерсона - задача гигантских размеров, но мы должны с чего-то начать."
  d_alderson_ruined_district_cleared:0 "Максимум районов: §G+1§!"
  d_alderson_lost01_cleared:0 "Получите §B1 £pops£Население§! на §Y[root.GetName]§!\nОчистка всех заблокированных §Y$d_alderson_lost01$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
  d_alderson_ruined_housing_cleared:0 "Жилье: §G+5%§!\nОчистка всех заблокированных §Y$d_alderson_ruined_housing$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
  d_alderson_ruined_police_cleared:0 "Силовики: §G+1§!\nОчистка всех заблокированных §Y$d_alderson_ruined_police$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
  d_alderson_ruined_patrol_drone:0 "Ветхая башня"
  d_alderson_ruined_patrol_drone_desc:0 "Расчистка Альдерсона - задача гигантских размеров, но мы должны с чего-то начать."
  d_alderson_ruined_patrol_drone_cleared:0 "Охотники-искатели: §G+1§!\nОчистка всех заблокированных §Y$d_alderson_ruined_patrol_drone$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
  d_alderson_ruined_miner_cleared:0 "Шахтеры: §G+5%§!\nОчистка всех заблокированных §Y$d_alderson_ruined_miner$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
  d_alderson_ruined_mining_drone:0 "Восстановление синтезатора материи"
  d_alderson_ruined_mining_drone_desc:0 "Расчистка Альдерсона - задача гигантских размеров, но мы должны с чего-то начать."
  d_alderson_ruined_mining_drone_cleared:0 "Дроны-шахтеры: §G+5%§!\nОчистка всех заблокированных §Y$d_alderson_ruined_mining_drone_hive$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
  d_alderson_ruined_farmer_cleared:0 "Фермеры: §G+5%§!\nОчистка всех заблокированных §Y$d_alderson_ruined_farmer$§! снизит стоимость §Y$d_alderson_ruined_district$§! на §G50%§!"
