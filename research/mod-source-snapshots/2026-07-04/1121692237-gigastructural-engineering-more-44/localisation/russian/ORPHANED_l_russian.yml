  alderson_disk_2_construction_machine:0 "Каркас Машинного мира Альдерсона"
  alderson_disk_2_construction_machine_DESC:0 "Колоссальный каркас, который будет использован для создания полного Машинного мира Альдерсона."
  giga_dialog.3408.title:0 "Действия $name_fusion_suppressor$"
  giga_dialog.3408.desc:0 "Пришло время выбрать окончательную судьбу системы [giga_system.GetName].\n\nМы можем сжать звезду в черную дыру, что приведет к огромному количеству физических исследований и заморозит каждую планету в системе.\nВ качестве альтернативы мы можем приказать $name_fusion_suppressor$ освободить гравитационное поле и проявить силу отталкивания, заставив сжатую звезду взорваться в разрушительной сверхновой, уничтожив $name_fusion_suppressor$. Любая планета меньше 5, а также астероиды будут уничтожены, а газовые гиганты будут лишены своей атмосферы. На выживших планетах появятся отложения йодизия - кристаллы, образованные искусственной сверхновой, врезавшейся в планеты с релятивистской скоростью. Эти кристаллы можно использовать для строительства мощных зданий на наших планетах.\n\nЧто мы делаем?"
  giga_dialog.3408.a:0 "Взорвать [giga_system.GetName]."
  giga_dialog.3408.b:0 "Коллапсировать [giga_system.GetName] в черную дыру."
  automated_stripmine_2_DESC:0 "Большая орбитальная конструкция, притягивающая большое количество минералов с планеты. Минералы добываются тысячами и тысячами буровых установок на поверхности планеты, отслаивая ее слой за слоем."
  giga_dialog.1207.desc:0 "Теперь, когда зеркальный каркас вокруг [giga_system.GetName] завершен, мы должны сделать выбор. Мы можем использовать $name_penrose$ как средство для генерации энергии или использовать его как бомбу.\n\nЕсли мы используем его для генерации энергии, его выход будет относительно посредственным (150 £energy£), но может быть можно стабилизировать ее, как только мы получим соответствующие технологии.\n\nЕсли мы решим использовать ее как бомбу, нам придется позволить ей накапливать энергию в течение нескольких лет, тогда она получит способность взорваться. Все в системе будет разрушено, а взрыв будет настолько мощным, что распространится по гиперкоридорам. Каждая планета в соседних системах будет сделана непригодной для проживания из-за потока энергии, и каждая планета на расстоянии двух прыжков будет облучена. Самое главное, он пошлет ударную волну через подпространство, нарушая и перестраивая гиперкоридоры на расстоянии до 4 прыжков!\n\nСфера Пенроуза не может быть использована в качестве оружия, если она построена в границах §YСоединенных систем§!."
  giga_dialog.1902.name:0 "Орбитальный аппарат $name_succ$ завершен"
  giga_dialog.1902.desc:0 "Наш орбитальный аппарат $name_succ$ был добавлен в систему [giga_system.GetName]. В этом массивном кольце есть все необходимое для сбора газов, пылинок и энергии из атмосферы планеты. Теперь мы должны приступить к работе с самими тяговыми балками."
  giga_dialog.1902.a:0 "Отлично."
  succ_2_DESC:0 "Полноценный и оперативный $name_succ_full$, постоянно собирающий огромное количество газов с газового гиганта. В термоядерных реакторах собранный водород используется для выработки огромного количества энергии."
  giga_pd_diamond_planet:0 "Алмазная планета"
  giga_pd_diamond_planet_desc:0 "Этот чудесный алмазный мир предоставляет невероятные возможности для добычи полезных ископаемых.\n\n§YПроизводство Автоматизированной шахты:§!\n§Y+50§! £minerals£ и §Y+15§! £rare_crystals£\n\n§YПроизводство Кристаллического Мегабура:§!\n§Y+50§! £minerals£ и §Y+25§! £rare_crystals£"
  giga_pd_ethane_planet:0 "Этановый океан"
  giga_pd_ethane_planet_desc:0 "Этот океан этана дает прекрасную возможность собирать все виды экзотических газов.\n\n§YПроизводство Автоматизированной шахты:§!\n§R-50§! £minerals£ и §Y+15§! £exotic_gases£"
  giga_pd_chthonian_planet:0 "Хтонская планета"
  giga_pd_chthonian_planet_desc:0 "Это бывшее ядро ​​газового гиганта богато редкими тяжелыми элементами и сплавами.\n\n§YПроизводство Автоматизированной шахты:§!\n§Y+100§! £minerals£ и §Y+75§! £alloys£"
  sm_ring_supertensiles_hub:0 "Координатор мегалогистических сетей"
  sm_ring_supertensiles_hub_desc:0 "Этот орбитальный объект помогает улучшить наши наземные молекулярные заводы, используя Живой металл для оптимизации производственных процессов, что приводит к увеличению общей производительности."
  negative_mass_buffs_1:0 "Отрицательный Масс импульс"
  negative_mass_buffs_2:0 "Отрицательное Масс Строительное ускорение"
  negative_mass_buffs_3:0 "Отрицательный Масс импульс строительного ускорения"
  building_giga_shroud_capacitor:0 "Конденсатор Покрова"
  building_giga_shroud_capacitor_desc:0 "Огромный псионический объект, который насильно извлекает энергию Покрова и перераспределяет ее по поверхности планеты, что значительно увеличивает телепатические способности и промышленность."
  giga_tech_psychic_hypersiphon_1:0 "Изучение энергии Покрова"
  giga_tech_psychic_hypersiphon_1_desc:0 "Изучение того, что именно составляет Покров, может улучшить нашу способность соединяться с нашими псионическими способностями и усовершенствовать наши системы распределения энергии с использованием прикладных знаний Покрова."
  giga_tech_psychic_hypersiphon_2:0 "Сеть глубокого Покрова"
  giga_tech_psychic_hypersiphon_2_desc:0 "Глубоко внутри нас всех связывает Покров. Если мы приспособим наши псионические способности к естественной связи Покрова, мы сможем достичь великих подвигов единства."
  giga_tech_psychic_hypersiphon_3:0 "Ритуалы призыва Покрова"
  giga_tech_psychic_hypersiphon_3_desc:0 "Если мы объединим псионические силы с технологиями, станет возможным материализовать сущности из энергии Покрова, которые затем можно будет контролировать и использовать в качестве армий. Однако эти сущности - не более чем бушующие шары энергии, поэтому у них низкое здоровье и высокая атака."
  giga_tech_psychic_hypersiphon_4:0 "Конденсаторы энергии Покрова"
  giga_tech_psychic_hypersiphon_4_desc:0 "Энергия может быть извлечена из Покрова с помощью мощных псионических способностей. Однако указанная энергия довольно непостоянна и вряд ли может образовать что-либо более сложное, чем шар псионных энергий. Если нам удастся стабилизировать энергию, мы сможем хранить ее и перераспределять по всей планете с гораздо большей эффективностью, чем раньше, что значительно повысит нашу промышленность."
  giga_tech_psychic_hypersiphon_5:0 "Прямые соединения с Покровом"
  giga_tech_psychic_hypersiphon_5_desc:0 "Покров - странное царство. Однако, объединив несколько технологий и огромную телепатическую силу, можно будет напрямую связать нашу реальность с таинственным измерением Покрова. Это может быть очень прибыльным, но может оказаться опасным, если мы не будем осторожны."
  giga_dialog.1403.name:0 "Шпиль $name_psy_siphon$ построен"
  giga_dialog.1403.desc:0 "Шпиль $name_psy_siphon$ готов. Это массивное оборудование вместе с портальными конденсаторами излучает мощный всплеск псионической энергии, достаточно мощный, чтобы разорвать пространство-время на части и открыть дыру в Покрове! Портал, очевидно, не будет достаточно устойчивым, чтобы обеспечить физический доступ к Покрову, но из него начнет выливаться много энергии, которую собирает шпиль. Осталось только включить..."
  giga_dialog.1403.a:0 "Превосходно!"
  psychic_hypersiphon_3_DESC:0 "Полностью рабочий и стабилизированный $name_psy_siphon$. Портал, соединяющий нашу реальность с Покровом, был полностью активирован, и эта связь с Покровом высвобождает чистую Сущность Покрова, которая значительно увеличивает наш псионический потенциал."
  asteroid_manufactory_1:0 "Добывающие аппараты Астероидной фабрики"
  asteroid_manufactory_1_DESC:0 "Первая часть астероидной фабрики, жилищная инфраструктура, используемая для добычи полезных ископаемых прямо с поверхности астероида, чтобы в конечном итоге преобразовать и переработать их в потребительские товары."
  giga_asteroid_industry.001.a:0 "Превосходно."
  giga_asteroid_industry.002.name:0 "Добывающие аппараты Астероидной фабрики завершена!"
  giga_asteroid_industry.002.desc:0 "Добывающие аппараты нашей Астероидной фабрики в системе [From.GetName] были завершены. Это большие кольца полностью обвивают астероид и содержат множество буровых установок и роботов-автоматов, которые будут непрерывно собирать с астероида материалы. Теперь мы должны приступить к работе над собственно производственной частью объекта."
  giga_asteroid_industry.002.a:0 "Отлично."
  giga_asteroid_industry.003.desc:0 "В системе [From.GetName] завершена Астероидная фабрика! Обернутая вокруг астероида, эта конструкция теперь постоянно собирает сырые ресурсы с астероида, прежде чем преобразовывать и очищать их во все виды продукции на специализированных заводах.\n\nЗатем эти продукты экспортируются в остальную часть нашей империи, где они будут распространяться среди нашего населения, чтобы удовлетворить их постоянно меняющиеся потребности. Это, безусловно, станет большим благом для нашей гражданской экономики."
  giga_asteroid_industry.003.a:0 "Восхитительно!"
  mod_frameworld_outposts_cost_mult:0 "$giga_frameworld_outpost$ Стоимость строительства"
  job_virtual_admin_cap:0 "Виртуальный бюрократ"
  job_virtual_admin_cap_plural:0 "Виртуальные бюрократы"
  job_virtual_admin_cap_desc:0 "Пребывание в виртуальном мире очень выгодно для толкачей бумаги."
  mod_job_virtual_admin_cap_add:0 "Виртуальный бюрократ"
  job_virtual_admin_cap_hive:0 "Виртуальный синаптический дрон"
  job_virtual_admin_cap_hive_plural:0 "Виртуальные синаптические дроны"
  job_virtual_admin_cap_hive_desc:0 "Пребывание в виртуальном мире очень выгодно для толкачей бумаги."
  mod_job_virtual_admin_cap_hive_add:0 "Виртуальный синаптический дрон"
  job_virtual_admin_cap_machine:0 "Виртуальный координатор"
  job_virtual_admin_cap_machine_plural:0 "Виртуальные координаторы"
  job_virtual_admin_cap_machine_desc:0 "Пребывание в виртуальном мире очень выгодно для толкачей бумаги."
  mod_job_virtual_admin_cap_machine_add:0 "Виртуальный координатор"
  tech_abstract_5:0 "Прикладная абстрактная физика"
  tech_abstract_5_desc:0 "Чрезвычайно эффективные подходы абстрактной физики хорошо помогают нам в объяснении даже самых абстрактных явлений Вселенной. Использование этих подходов для совершения новых революционных прорывов, о которых раньше никто не думал, может дать нам доступ к уникальным и мощным технологиям."
  giga_dialog.1001.name:0 "Строительство $name_orbital_artificial_eco$"
  giga_dialog.1001.desc:0 "Наши инженеры и биологи теперь готовы начать сборку $name_orbital_artificial_eco$ на орбите вокруг одной из планет [giga_system.GetName], на которой будут размещены как виды, импортированные с наших планет, так и полностью искусственные виды, созданные благодаря генной адаптации."
  giga_dialog.1001.a:0 "Отлично."
  giga_dialog.1002.name:0 "$name_orbital_artificial_eco$ построен"
  giga_dialog.1002.desc:0 "Наша $name_orbital_artificial_eco$ теперь готова. Он был наполнен множеством странной и захватывающей флоры и фауны, чтобы создать самые экзотические экосистемы, о которых мы только можем подумать. Это, несомненно, окажется очень полезным в наших будущих исследованиях природы жизни и экосистем."
  giga_dialog.1002.a:0 "Превосходно."
  giga_dialog.1004.name:0 "$name_orbital_artificial_eco$ восстановлена!"
  giga_dialog.1004.desc:0 "Разрушенная $name_orbital_artificial_eco$ была возвращена в рабочее состояние нашими инженерами и биологами.\n\nЗаполненная множеством странных форм жизни, некоторые из которых были клонированы из следов биологического вещества, найденного в обломках, эта недавно восстановленная космическая станция будет безусловно немного поможет исследованиям нашего общества."
  giga_dialog.1004.a:0 "Превосходно."
  orbital_artificial_eco_1_dismantle:0 "Демонтировать мегаструктуру"
  orbital_artificial_eco_1_dismantle_DESC:0 "Эта мегаструктура будет разобрана и сдана в металлолом."
  giga_dialog.4003.name:0 "$name_terraform_molten$ завершен!"
  giga_dialog.4003.desc:0 "Наш $name_terraform_molten$ теперь готов. С добавлением трех больших гипермасштабных охлаждающих лучей и лазерных буровых установок мы сможем охладить и стабилизировать геологическую активность в этом мире. Теперь мы должны начать собственно процесс терраформирования."
  giga_dialog.4003.a:0 "Мы сделаем это сразу."
  terraform_molten_2_DESC:0 "Полный $name_terraform_molten$, оснащенный набором больших орбитальных кулеров и лазерных сверл для охлаждения и стабилизации поверхности планеты. Все, что осталось сделать, это начать собственно процесс терраформирования."
  terraform_molten_3:0 "Начало терраформирования"
  terraform_molten_3_DESC:0 "Прикажите команде $name_terraform_molten$ начать преобразование расплавленной поверхности и тектонической структуры этой планеты во что-то, что может быть населено большинством форм жизни."
  giga_dialog.3803.name:0 "Атмосферный генератор $name_terraform_barren$ построен"
  giga_dialog.3803.desc:0 "Атмосферный генератор $name_terraform_barren$ только что был построен. Эта большая сетка, окружающая бесплодный мир, способна генерировать большое количество атмосферы и может изменять климат этой планеты по своему желанию.\nВсе, что осталось сделать, это фактически начать процесс терраформирования."
  giga_dialog.3803.a:0 "Хорошо."
  terraform_barren_2_DESC:0 "$name_terraform_barren$ теперь оснащен большим набором устройств для управления атмосферой, которые могут создать пригодную для дыхания атмосферу и воду по всей поверхности этого мира. Все, что осталось сделать, это начать процесс."
  terraform_barren_3:0 "Начало терраформирования"
  terraform_barren_3_DESC:0 "Прикажите команде $name_terraform_barren$ начать крупномасштабный процесс повторной активации магнитного поля этой планеты и впоследствии создать пригодную для дыхания атмосферу и стабильную гидросферу."
  giga_dialog.3903.name:0 "Макроманипуляторы $name_terraform_toxic$ построены"
  giga_dialog.3903.desc:0 "Макроманипуляторы $name_terraform_toxic$ готовы! Они состоят из двух массивных насосов, способных извлекать и закачивать огромное количество газов в атмосферу планеты и из нее.\n\nПосле того, как $name_terraform_toxic$ завершена, мы должны начать сам процесс терраформирования..."
  giga_dialog.3903.a:0 "Фантастика."
  terraform_toxic_2:0 "Макроманипуляторы $name_terraform_toxic$"
  terraform_toxic_2_DESC:0 "Этот $name_terraform_toxic$ был оборудован двумя массивными насосами, способными манипулировать атмосферой планеты, делая ее более или менее плотной и перераспределяя составляющие ее газы."
  terraform_toxic_3:0 "Начало терраформирования"
  terraform_toxic_3_DESC:0 "Прикажите команде атмосферного манипулятора начать преобразование атмосферы и гидросферы этой планеты во что-то, что может быть населено большинством форм жизни."
  giga_dialog.3502.name:0 "Главный концентратор $name_crystal_megabore$ завершен"
  giga_dialog.3502.desc:0 "Наши инженеры завершили создание главного концентратора нашего $name_crystal_megabore$ в системе [giga_system.GetName]. На этой огромной космической станции, вращающейся вокруг расплавленного мира, находятся кузницы и рудоперерабатывающие заводы, специализирующиеся на очистке расплавленной породы до редких кристаллов, что необходимо, если мы хотим эффективно собирать добычу в мире внизу."
  giga_dialog.3502.a:0 "Хорошо."
  giga_dialog.3503.name:0 "Гравигенератор $name_crystal_megabore$ завершен"
  giga_dialog.3503.desc:0 "Наш гравигенератор $name_crystal_megabore$ готов! Эта большая конструкция полностью окружает концентратор Мегабура и снабжает его энергией. Он также послужит катализатором для основной буровой установки Мегабура и значительно увеличит силу его гравитационного тянущего луча."
  giga_dialog.3503.a:0 "Прекрасно."
  crystal_megabore_2:0 "Гравигенератор $name_crystal_megabore$"
  crystal_megabore_2_DESC:0 "Гравигенератор играет решающую роль в добыче полезных ископаемых на планете внизу, поскольку он обеспечивает энергию и действует как катализатор для основной буровой скважины."
  crystal_megabore_3_DESC:0 "Полностью рабочий $name_crystal_megabore$, извлекающий огромное количество кристаллов и минералов прямо из расплавленного ядра планеты."
  giga_dialog.401.name:0 "Строительство $name_eng_test_site$"
  giga_dialog.401.desc:0 "Начато строительство большой $name_eng_test_site$ в системе [giga_system.GetName]. По завершении эта замечательная станция станет отличным местом для проверки многих инженерных разработок, от орбитальных станций до новых проектов космических кораблей. Планета, на которой она вращается, станет испытательным полигоном для новаторской инженерии."
  giga_dialog.401.a:0 "Хорошая работа."
  giga_dialog.402.name:0 "$name_eng_test_site$ построена"
  giga_dialog.402.desc:0 "$name_eng_test_site$ расположенная в системе [giga_system.GetName], теперь работает. Она послужит испытательной площадкой для самых сложных и потенциально смертоносных разработок наших инженеров, таких как космические корабли и здания. Эксперименты над планетой уже начинаются, и мы можем ожидать, что в ближайшем будущем произойдет еще много, что значительно ускорит наши инженерные исследования."
  giga_dialog.402.a:0 "Отлично."
  giga_dialog.404.name:0 "$name_eng_test_site$ восстановлена!"
  giga_dialog.404.desc:0 "Ранее разрушенная $name_eng_test_site$ была полностью отремонтирована нашими строительными бригадами.\n\n Теперь она полностью готова к работе, и мы можем начать использовать ее в научных целях."
  giga_dialog.404.a:0 "Превосходно."
  the_vat_menu_desc_02:0 "Чан - это, по сути, биологическая верфь."
  the_vat_menu_desc_03:0 "Каждый чан может выращивать только одну особь за раз."
  the_vat_menu_desc_04:0 "Что бы вы хотели вырастить?"
  REACTOR_LEVIATHAN:0 "Биореактор"
  REACTOR_LEVIATHAN_DESC:0 "Биологические существа переваривают пищу, смешивая ее с кислотами и ферментами в желудке, создавая глюкозу. Затем глюкоза попадает в кровоток и может использоваться в качестве энергии."
  REACTOR_SWARM:0 "Биореактор"
  REACTOR_SWARM_DESC:0 "Биологические существа переваривают пищу, смешивая ее с кислотами и ферментами в желудке, создавая глюкозу. Затем глюкоза попадает в кровоток и может использоваться в качестве энергии."
