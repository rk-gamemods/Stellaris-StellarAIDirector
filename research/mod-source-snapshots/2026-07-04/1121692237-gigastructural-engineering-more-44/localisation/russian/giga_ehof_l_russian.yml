  r_creator_shard_desc:0 "Энергетическое ядро, которое поддерживало работу $ehof_preservation_sphere$ все эти годы, подпитываемое силой Белой дыры, похоже, обладает неисчислимой энергией."
  creators_relic:0 "Осколок Создателя"
  creators_relic_desc:99 "We are utilising the $ehof_preservation_sphere$'s white hole power core to greatly boost our energy output."
  compound_end.002.name:0 "Осколок Создателя"
  compound_end.002.desc:0 "После уничтожения $ehof_preservation_sphere$ наши техники смогли восстановить ядро.\n\nЯдро может буквально удвоить нашу выработку энергии на временной основе."
  
  # Event chains
  giga_category_compound:99 "The Compound"
  compound_crisis_chain_title:99 "The $ehof_the_compound_text$"
  compound_crisis_chain_desc:0 "Неизвестная сила из-за пределов галактики угрожает всей жизни.\n\nМы должны найти способ остановить $ehof_the_compound$, поскольку они кажутся непобедимыми."
  darkmatter_worlds:0 "§HМиры, терраформированные§! $ehof_the_compound$"
  compound_killed_by_us:0 "§MСоединение§! §Hуничтоженных Нами судов§!"
  compound_killed_by_sa:0 "§MСоединение§! §Hсудов уничтожены§! $ehof_the_stellar_annihilator$"
  compound_killed_by_others:0 "§MСоединение§! §Hсудов уничтоженных другими§!"
  compound_killed:0 "§RСуда уничтоженные§! $ehof_the_compound$"
  
  compound_solution_chain_title:0 "§HТаинственное послание§!"
  compound_solution_chain_desc:0 "Наши сенсоры обнаружили невероятно короткое, но сильное подпространственное эхо, отправленное из неизвестного и необнаруживаемого источника.\n\nЭхо было такой огромной интенсивности, что сигнал, должно быть, можно было обнаружить по всей галактике!\n\nПодпространственное эхо невообразимой сложности, содержащее только одно короткое сообщение. Сообщение эха гласит:\n\n'Решение, которое вы ищете... находится в одной из систем... которая может быть достигнута только с помощью вашего $ehof_ehof$...'\n\nСообщение кажется загадочным, но ясным. Решение против $ehof_the_compound$ можно найти в системе $ehof_cohesive$.\n\nЭто то, чего мы ждали! Способ окончательно победить их!"
  sa_system:0 "$ehof_cohesive$ система найдена"
  solution_anomaly:0 "Подсказки решения"
  
  ###############################################
  ############### Compound Dialog ###############
  ###############################################
  compound_dialog.1.name:0 "Тьма выпущена"
  compound_dialog.1.desc:0 "Недавно мы обнаружили скопление черных дыр. Это очень необычно, поэтому мы начали процесс триангуляции точных координат, чтобы потенциально путешествовать туда или хотя бы наблюдать издалека.\n\nСпустя дни после первого наблюдения скопления черной дыры наши ученые заметили одну из самых дальних Звездные системы из нашей галактики, по-видимому, имели некую сферу Дайсона, и поэтому был сделан вывод, что в этой системе есть жизнь. В последующие дни чрезвычайно важно было узнать больше об этом кластере и жизни, которую он укрывал.\n\nСегодня мы узнали о рассматриваемой жизни. После дальнейшего исследования ближайшей черной дыры мы обнаружили большую структуру, охватывающую большую часть черной дыры, очень похожую на $ehof_ehof$. И, как и $ehof_ehof$, он, похоже, работает в подобном поместье, создавая червоточины на очень далеких звездах.\n\nОбнаруженные ранее формы жизни открыли червоточину в системе §Y[complex_invasion_entry.GetName]§!. Они уничтожили все во всей системе в одно мгновение, эти существа не пришли с миром."
  compound_dialog.1.a:0 "§RНастроить все флоты!§!"
  
  compound_dialog.3.desc_01:0 "§HСвязь установлена§!\Трансмутация этой галактики продолжается. Первый из многих.\n\nЧто вам нужно, сущности барионной материи?"
  compound_dialog.3.desc_02:0 "§HСвязь установлена§!\nВы пытаетесь бороться против нас. Ненужно. Мы всего лишь хотим сделать этот космос совершенным.\n\nНе волнуйтесь, нашей работе не помешает ваша наивность и парадоксальность против совершенства..\n\nСдавайтесь и вознеситесь вместе с этой реальностью."
  compound_dialog.3.desc_03:0 "§HСвязь установлена§!\nДля меня большая честь быть теми, кто принесет совершенство этой вселенной.\n\nЧем мы можем помочь вам, сущности барионной материи?"
  compound_dialog.3.desc_04:0 "§HСвязь установлена§!\nНекоторые из вас сделаны из плоти, основанной на барионной материи... Другие из металла... Некоторые и того и другого.\n\nНеактуально.\n\nДля нас вы все одинаковы... Ошибочные. Возникнет совершенство."
  
  compound_dialog.3.a:0 "Кто вы?"
  compound_dialog.3.a.response:0 "Мы $ehof_the_compound$. Мы высшая форма жизни."
  compound_dialog.3.a.r:99 "The $ehof_the_compound_text$?"
  compound_dialog.3.a.r.response:0 "Мы сделаны из многих. Мы разделяем один ум, но обладаем бесчисленным множеством тел.\n\nВсе наши формы связаны с единым абсолютным сознанием. Даже то, что вы называете нашими «кораблями», на самом деле является лишь некоторыми из наших многочисленных форм."
  compound_dialog.3.a.r2:0 "Высшая форма жизни?"
  compound_dialog.3.a.r2.response:0 "Когда это факт, нечего утверждать. Вся жизнь в этом космосе состоит из испорченной барионной материи, не подходящей для вечного существования в этой реальности.\n\nС другой стороны, мы являемся первыми и единственными формами жизни из темной материи. Создан $ehof_the_creators$ и потенциально может стать вершиной жизни этой вселенной."
  
  compound_dialog.3.b:0 "Почему вы нападаете на нас?"
  compound_dialog.3.b.response:0 "Мы не атакуем вас. Мы только начали трансмутацию этой галактики.\n\nЭтот процесс, конечно, включает трансмутацию всех несовершенных форм жизни барионной материи, таких как вы. Что вы интерпретируете как нападение.\n\nЭто не акт вражды, это акт доброты. Подарок. Дар совершенства."
  
  compound_dialog.3.d:0 "Как вы нас понимаете?"
  compound_dialog.3.d.response:0 "Мы наблюдали в течение долгого времени.\n\nМы наблюдали за вашей галактикой и слушали вас.\n\nКаждый сигнал, который когда-либо испускался вами, был перехвачен нами.\n\nМы знаем все ваши языки. Вся ваша история. Мы знаем о вас все."
  
  compound_dialog.3.e:0 "Вы нерушимы?"
  compound_dialog.3.e.response:0 "Наши формы невозможно повредить. Мы всегда, в силу нашей природы, могли иметь иммунитет против большинства форм потенциально вредной энергии. Что касается всего остального, мы адаптировались.\n\nИменно поэтому мы - высшие. Единственные, кто может сделать эту вселенную совершенной и жить вечно."
  
  compound_dialog.3.f:0 "Мы остановим вас."
  compound_dialog.3.f.response:0 "Не бойся. Мы знаем, что это изменение вас пугает. Это будет исключительно способствовать совершенствованию этой вселенной. Даже если вы не уступите, это не изменит результата. Это только отсрочит неизбежное. Примите совершенство."
  
  compound_dialog.3.g:0 "Кто такие $ehof_the_creators$?"
  compound_dialog.3.g.response:0 "$ehof_the_creators$ были теми, кто дал нам жизнь. Они заставили нас попытаться создать первые формы жизни из темной материи.\n\nОни способны противостоять почти всем формам повреждений и обладая безграничной адаптируемостью, они предположили, что мы можем стать высшей формой жизни в космосе.\n\nМы доказали им, что мы лучше, показывая им свое превосходство."
  
  compound_dialog.3.h.response:0 "Эта вселенная - такая враждебная реальность для таких барионных форм жизни, как вы. Не волнуйтесь, мы положим конец вашим страданиям. Примите совершенство."
  
  compound_dialog.7.desc:0 "§HСвязь установлена§!\nСовершенство ждет этот космос... Не тебя. Для вас... будет только агония!"
  
  compound_dialog.8.desc:0 "§HСвязь установлена§!\nГлупо. Какая бы сущность ни передала это сообщение, она ничего не знает о нашей безупречности.\n\nЭтого предполагаемого «решения» против нас не существует. Не тратьте впустую энергию Вселенной, пытаясь ее найти.\n\nПримите наш дар. Примите совершенство."
  compound_dialog.8.response:0 "Нет ничего безупречного."
  
  compound_dialog.9.desc:0 "§HСвязь установлена§!\nЭтот зверь проник в наш дом! Мы высвободим нашу безграничную силу и уничтожим этого безжалостного деструктора!"
  
  compound_dialog.10.desc:0 "§HСвязь установлена§!\nДобро пожаловать в наш дом... Образ совершенства, совершенство, которое ожидает этот космос.\n\nВам здесь не рады!"
  
  compound_dialog.11.desc:0 "§HСвязь установлена§!\nЧто это за сущность?! Почему он может нам навредить?! Почему мы не можем его повредить?!"
  compound_dialog.11.response:0 "Это корабль, который $ehof_the_creators$ послали, чтобы уничтожить вас."
  
  compound_dialog.12.desc:0 "$ehof_the_creators$ ушли! Мы сами их трансмутировали! Не лгите нам, ущербная сущность!"
  compound_dialog.12.response:0 "Вы убили только тех, кто был в вашем доме."
  
  compound_dialog.13.desc:0 "Мы видим! На самом деле они никуда не исчезли!\n\nТеперь они послали это жалкое существо, чтобы уничтожить нас в жалком акте мести?! НАС!"
  compound_dialog.13.response:0 "Да, им ваши действия не нравятся!"
  
  compound_dialog.14.desc:0 "Неважно, довольны ли они! Мы - высшая форма жизни! НИЧТО НЕ МОЖЕТ ОСТАНОВИТЬ НАС от СОВЕРШЕНСТВОВАНИЯ ЭТОЙ РЕАЛЬНОСТИ! $Ehof_the_creators$ пострадает, как и вы! §RЭТА ГАЛАКТИКА БУДЕТ РАЗРУШЕНА!§!"
  compound_dialog.14.response:0 "Теперь они боятся!"
  
  compound_dialog.16.desc:0 "§HСвязь установлена§!\nНевозможно! Этого не может быть! Как ваш флот может нанести урон нашим очищающим формам?"
  compound_dialog.16.response:0 "Теперь мы можем повредить все ваши формы."
  
  compound_dialog.17.desc:0 "Мы не потерпим этого беспокойства! Возможно, вы обнаружили загадочную ошибку, к которой мы еще не адаптировались. Но не надейтесь. Обнаруженный вами недостаток скоро исчезнет."
  compound_dialog.17.response:0 "Вы уверены в этом?"
  
  compound_dialog.18.desc:0 "Мы не понимаем! Что случилось?! Мы не можем адаптироваться! Мы остаемся несовершенными! §RЧТО ВЫ СДЕЛАЛИ С НАМИ?!§!"
  compound_dialog.18.response:0 "Отрицательная масса для тебя яд"
  
  compound_dialog.19.desc:0 "ЭТО НЕПРИЕМЛЕМО! Возможно, мы хотим привести эту вселенную к совершенству, но в вашу галактику мы принесем разрушение! НИЧЕГО не останется, когда мы с этим покончим! ТОЛЬКО МЫ! Вечные страдания - единственное, что вас ждет сейчас!"
  compound_dialog.19.response:0 "Мы очень сильно их задели!"
  
  ##############################################
  ######### Stellar Annihilator Dialog #########
  ##############################################
  
  # Begin SA Event Chain
  annihilator_dialog.014.name:0 "Спасение"
  annihilator_dialog.014.desc:99 "$compound_solution_chain_desc$"
  annihilator_dialog.014.a:0 "§HМы должны найти это сейчас§!"
  
  # Initial Contact
  annihilator_dialog.001_name:99 "$NAME_Stellar_Annihilator_Species$"
  annihilator_dialog.001.desc:0 "Приветствую жителей Галактики-XY1527! Я - $NAME_Stellar_Annihilator_Species$, также называемый $ehof_the_stellar_annihilator$. $Ehof_the_creators$ послал меня уничтожить Живую-Темную-Материю-Субъект001, $ehof_the_compound$.\n\nКак вы, наверное, уже заметили, его мотивы - это полная космическая трансмутация. Начиная с вашей домашней галактики.\n\n$ehof_the_compound$ считает себя непобедимым. Я следил за его действиями, и в определенной степени это правда. Однако он не знает своей самой большой слабости. Фундаментальный недостаток, который является частью самой его природы. Все формы темной материи распадаются при контакте с $ehof_qnm$. В этом его вечная слабость."
  annihilator_dialog.001.response:0 "Итак, $ehof_qnm$ - это ключ?"
  
  annihilator_dialog.002.desc:0 "С помощью оружия с усиленной отрицательной массой или оружия, которое напрямую использует отрицательную массу, $ehof_the_compound$ может быть уничтожено. Само его существование возможно только из-за хрупкого баланса огромных сил, и они не могут адаптироваться к нему, но этого будет недостаточно.\n\nЕго система происхождения содержит множество черных дыр, а в центре - уникальное небесное тело, белая дыра. Это и ключ к их существованию, и самое большое проклятие. $ehof_the_creators$ использовал уникальные взаимодействия между белыми и черными дырами, чтобы создать $ehof_the_compound$. Это была идеальная среда для его создания."
  annihilator_dialog.002.response:0 "$ehof_the_creators$ создали $ehof_the_compound$?!"
  
  annihilator_dialog.003.desc:0 "Они создали $ehof_the_compound$ миллионы лет назад как первую форму жизни темной материи в этом галактическом скоплении. Чтобы уберечь его от того, что делает возможным его существование, они должны были защитить его.\n\nБелые дыры - уникальные и чрезвычайно редкие существа. Помимо генерирования беспрецедентного количества энергии, он также генерирует огромные суммы в размере $ehof_qnm$. Которая расходится во все стороны. Сделав систему происхождения и кластер $ehof_the_compounds$ непригодными для проживания.\n\n$ehof_the_creators$ построил специальную сферу Дайсона вокруг белой дыры под названием $ehof_preservation_sphere$. Эта сфера Дайсона сводит на нет выброс отрицательной массы белой дыры, сохраняя при этом огромный выход энергии.\n\nКогда $ehof_the_compound$ убил $ehof_the_creators$ в своей исходной системе, он взял под контроль сферу Дайсона, чтобы получить доступ к огромному источнику энергии. Усиливая его еще больше."
  annihilator_dialog.003.response:0 "Значит, мы должны уничтожить $ehof_preservation_sphere$?"
  
  annihilator_dialog.004.desc:0 "Уничтожение $ehof_the_compound$ возможно только с уничтожением $ehof_preservation_sphere$, в противном случае они не могут быть уничтожены навсегда.\n\n$ehof_the_compound$ - это единичный объект. Один разум с бесчисленным множеством тел. Он имеет централизованный интеллект, который находится в их исходной системе и распространяется по всему кластеру. Уничтожение $ehof_preservation_sphere$ уничтожит разум $ehof_the_compound$ и искалечит его оставшиеся формы.\n\nОднако столкновение с этой звездой значительно повредило мое лобовое вооружение и силовое ядро, сделав меня неработоспособным. Мне нужен капитальный ремонт, который я не могу выполнить в одиночку.\n\nВ любом случае, я помогу вам с технологией, которая вам понадобится, чтобы победить $ehof_the_compound$."
  annihilator_dialog.004.response:0 "Что нужно, чтобы починить вас?"
  
  annihilator_dialog.005_01.desc:0 "Механизм преобразования материи потребует огромного количества §H£minerals£ Минералы и £energy£ Энергия§!, чтобы починить мое энергетическое ядро.\n\nЛибо:\n - £minerals£ Минералы §R-500§! и £energy£ Энергия §R-400§! в течении £time£48 месяцев.\n - £minerals£ Минералы §R-24,000§! и £energy£ Энергия §R-20,000§!.\ n\nУ меня не так много времени до того, как мой коммуникационный модуль полностью отключится, в течение ближайших §H£time£6 месяцев§! я не смогу принимать помощь."
  
  annihilator_dialog.005_02.desc:0 "Мне срочно нужен ремонт, вы можете помочь?\n\n$annihilator_dialog.005_01.desc$"
  
  annihilator_dialog.005_03.desc:0 "§H[initial_annihilator_discoverer.GetName]§! были первыми, кто меня обнаружил, и поэтому я должен сначала попросить их о помощи. Если они откажутся, я спрошу вас."
  annihilator_dialog.005_03.response:0 "Это честно"
  
  annihilator_dialog.005.a.response:0 "§HНачнем сбор ресурсов§!"
  annihilator_dialog.005.a.tooltip:0 "Ежемесячно: £minerals£ Минералы §R-500§! и £energy£ Энергия §R-400§! в течении £time£ §H48§! месяцев\n\nРемонт $ehof_the_stellar_annihilator$\n\n"
  annihilator_dialog.005.b.response:0 "§GУ нас есть эти ресурсы под рукой§!"
  annihilator_dialog.005.a.reply:0 "Спасибо. Я знаю, что ваши запасы ресурсов, вероятно, почти исчерпаны, но в противном случае уничтожение $ehof_the_compound$ было бы почти невозможно. Приступим к ремонту!"
  annihilator_dialog.005.c.response:0 "У нас недостаточно ресурсов, чтобы помочь вам."
  annihilator_dialog.005.c.reply:0 "Тогда мне очень жаль. Желаю удачи в уничтожении $ehof_preservation_sphere$. Прощайте."
  annihilator_dialog.005.c.2.response:0 "Свяжитесь со мной через £time£ §H6 месяцев§!"
  annihilator_dialog.005.c.2.reply:0 "Очень хорошо, но совершенно необходимо, чтобы это не длилось дольше. Я свяжусь с вами в через £time£ §H6 месяцев§!"
  annihilator_dialog.005.c.2.tooltip:0 "У нас есть £time£ §H6 месяцев§! собрать эти материалы вместе"
  annihilator_dialog.005.d.response:0 "Нам не нужна твоя помощь. Наш флот справится со сферой."
  annihilator_dialog.005.d.reply:0 "Если вы действительно верите, что можете уничтожить $ehof_preservation_sphere$ без моей помощи, то я верю в вас. Прощайте и удачи."
  annihilator_dialog.005.e.response:0 "Прошу прощения?"
  
  # Contact the SA
  annihilator_dialog.007.desc_01:0 "§HСоединение установлено§!\nДобро пожаловать §H[root.GetSpeciesClassPlural]§!. Что я могу сделать для вас?\n\n"
  annihilator_dialog.007.desc_02:0 "§HСоединение установлено§!\n$ehof_the_compound$ все еще продолжает осаду вашей галактики. Сохраняйте спокойствие, и вместе мы сможем их остановить!\n\n"
  annihilator_dialog.007.desc_03:0 "§HСоединение установлено§!\nМы должны остановить $ehof_the_compound$ до того, как его влияние станет слишком большим. В противном случае даже я не смогу их остановить.\n\nКак я могу быть полезен?\n\n"
  annihilator_dialog.007.desc_04:0 "§HСоединение установлено§!\n$ehof_the_creators$ предположили, что $ehof_the_compound$ однажды может стать высшей формой жизни в этой вселенной.\n\n$ehof_the_compound$ считает, что это так, но это не так.\n\nЭто болезнь, раковая опухоль, портящая все, к чему прикасается. Это нужно остановить!\n\n"
  
  annihilator_dialog.007.desc_order_01:0 "§H- $ehof_the_stellar_annihilator$ в настоящее время находится в системе §H[annihilator_location.solar_system.GetName]§!.§!\n§H- $ehof_the_stellar_annihilator$ в настоящее время следует за §H[discoverer_fleet.GetName]§!"
  annihilator_dialog.007.desc_order_02:0 "§H- $ehof_the_stellar_annihilator$ в настоящее время находится в системе §H[annihilator_location.solar_system.GetName]§!.§!\n§H- $ehof_the_stellar_annihilator$ в настоящее время нацелен на §!$ehof_the_compound$"
  annihilator_dialog.007.desc_order_03:0 "§H- $ehof_the_stellar_annihilator$ в настоящее время находится в системе §H[annihilator_location.solar_system.GetName]§!.§!\n§H- $ehof_the_stellar_annihilator$ в настоящее время нацелен на $ehof_preservation_sphere$"
  annihilator_dialog.007.desc_order_04:0 "§H- $ehof_the_stellar_annihilator$ в настоящее время находится в системе §H[annihilator_location.solar_system.GetName]§!.§!\n§H- $ehof_the_stellar_annihilator$ в настоящее время находится в защитном режиме.§!"
  
