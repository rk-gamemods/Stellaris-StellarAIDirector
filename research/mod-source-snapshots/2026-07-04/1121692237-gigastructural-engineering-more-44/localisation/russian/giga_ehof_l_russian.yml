  ehof_megastructure.008.desc:0 "Мы захватили $ehof_ehof$, более продвинутый, чем тот, который мы сейчас используем. Хотели бы вы переместить наши операции в лучший $ehof_ehof$?\n\nЕсли вы решите не делать этого, мы будем считать, что вы стратегически расположили наш $ehof_ehof$, и больше не будем спрашивать о перемещении."
  ehof_megastructure.008.a:0 "Нет"
  ehof_megastructure.008.b:0 "Да"
  
  ehof_megastructure.410.desc:0 "Я уверен, что у вас есть причины, но вы на 100% уверены, что хотите разобрать $ehof_ehof$?\n\n§RЭто действие необратимо§!"
  ehof_megastructure.410.a:0 "Я уверен на 100%"
  
