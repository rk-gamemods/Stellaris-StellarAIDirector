  # Anomaly
  code_2_cat:0 "Код реальности - Расколотый мир"
  code_02_category_desc:0 "Еще одна передача $ehof_epcs$ была получена §H[this.GetName]§! внутри системы §H[root.solar_system.GetName]§!. Как и в предыдущие два раза, корабль был отключен передачей, но на этот раз его $ehof_closed_modular$ смог восстановить работоспособность кораблей всего за несколько минут. Намного быстрее, чем в прошлый раз.\n\nСканеры $ehof_ep$ смогли идентифицировать источник передачи внутри системы, это разрушенная планета §H[from.from.GetName]§!. Точное местоположение на планете или внутри нее необходимо определить в ходе расследования.\n\nСканеры $ehof_ep$ смогут определить местонахождение источника, но для этого потребуется некоторое время."
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.201.name:0 "Код реальности - Расколотый мир"
  ehof_reality_code.201.desc:0 "Местоположение источника $ehof_ep$ на планете §H[from.from.GetName]§! было определено.\n\nИсточник, похоже, расположен внутри большого фрагмента планеты на глубине около 223,7 км.\n\nЭти раскопки будут более сложнее, чем первые, не только из-за того, что источник находится глубже, чем предыдущий, но из-за опасных и нестабильных условий. Фрагмент, над которым нам придется работать, может развалиться или столкнуться с другими фрагментами.\n\nПриступаем с осторожностью."
  
  # Initial
  code2_digsite:0 "Код реальности - Расколотые раскопки"
  code2_digsite_desc:0 "Оборудование, необходимое для раскопок на §H[code_world_planet.GetName]§! готово к развертыванию.\n\nПрежде чем мы сможем начать раскопки, необходимо защитить место раскопок и установить оборудование."
  
  # Stage 1
  ehof_reality_code.211.name:0 "Код реальности - Расколотые раскопки I"
  ehof_reality_code.211.desc:0 "Чтобы защитить место раскопок от ударов астероидов и землетрясений, было установлено несколько генераторов энергетических барьеров и сильных электромагнитных полей, чтобы создать изолированный островок из фрагментарного материала, который не будет разорван на части под воздействием окружающего материала. Оборудование смонтировано и готово к развертыванию.\n\nВ связи с нестабильностью структуры фрагментов и глубиной источника земляные работы обычным экскаватором невозможны. Вместо этого для этих раскопок будет использоваться специализированная буровая установка с пилотом.\n\nОна войдет во фрагмент, просверлив его слои, пока не достигнет местоположения источника.\n\nБлок готов к развертыванию."
  
  # Stage 2
  ehof_reality_code.212.name:0 "Код реальности - Расколотые раскопки II"
  ehof_reality_code.212.desc:0 "Пилотируемая буровая установка сообщила, что достигла места расположения источника. Точно так же, как внутри токсичного мира, где был расположен первый объект-усилитель, объект окружает пустота. Он также имеет форму октаэдра, как и первый. Это приводит к предположению, что октаэдрическая форма выполняет неизвестную цель и предпочтительнее по сравнению с другими формами. Возможно, это просто архитектурный выбор создателей.\n\nПо результатам сканирования и анализа объекта-усилителя он идентичен первому, только отличается тем, что находится в другом месте.\n\nЭкипаж пилотируемой буровой установки готова предпринять необходимые действия для выхода на объект."
  
  # Stage 3
  ehof_reality_code.213.name:0 "Код реальности - Расколотые раскопки III"
  ehof_reality_code.213.desc:0 "Несмотря на то, что шаги, необходимые для входа в объект, были такими же, как и для первого, для получения доступа потребовалось довольно много времени.\n\nОн не реагировал на $ehof_epcs$, как первый. Экипажу пришлось поэкспериментировать с интенсивностью передачи, чтобы найти тот сигнал, который открыл объект.\n\nМеханизм входа объекта был похож, но все же достаточно отличным, чтобы бросить вызов команде. Неизвестно, различны ли интенсивность, необходимая для открытия объектов-усилителей, и сложность входного механизма для каждого объекта-усилителя, или объекты каким-то образом взаимодействуют друг с другом и меняют свои свойства.\n\nВ любом случае, экипаж смог извлечь другой фрагмент кодовой последовательности из $ehof_epcs$ и, объединив его с первыми двумя фрагментами, смогли получить ограниченный доступ к базе данных усилителя и преобразовать информацию. Они узнали больше о самом загадочном узоре, изначальных камнях и $ehof_sm$.\n\nОбъекты $PGATE_GALACTIC$ на краях связанных с червоточиной систем, по-видимому, фактически ответственны за транспортировку $ehof_epcs$ на межзвездных расстояниях. Невероятно высокое содержание энергии гравиэлектромагнитных волн, через которые передается узор, кажется, необходимо для активации $PGATE_GALACTIC$.\n\nПоскольку все известные $PGATE_GALACTIC$ кажутся бездействующими, можно предположить, что для их активации требуется определенная энергоемкость или что-то подобное. Возможно эта гипотеза верна лили нуждается в проверке. Что касается $ehof_sm$, команда смогла выяснить, что он получает приказы от чего-то, что можно описать только как продвинутый ИИ, который каким-то образом интегрирован и распределен по всему веществу.\n\nОн оснащен множеством различных приказов, которые выполняются в зависимости от окружающей среды вещества. Этот ИИ программа способна воспринимать и анализировать окружающую среду и ее влияние на $ehof_sm$ неизвестными способами и придает составным нанитным частицам соответствующий порядок для адаптации к ней. Весь этот процесс выполняется менее чем за фемтосекунду, поэтому вещество способно так быстро реагировать и адаптироваться к воздействию окружающей среды и обстоятельствам.\n\nЭто все еще не объясняет, как вещество может вести себя так реалистично, и как это вещество может адаптироваться в любом месте сразу. С помощью новых специализированных инструментов, разработанных нашими учеными, команда смогла манипулировать искусственным интеллектом, и немного изменила порядок адаптации, что вынудило $ehof_sm$ изменить свою форму.\n\nЭто открытие может привести к разработке технологий производства специализированных компонентов $ehof_sm$ для различных технологических применений, таких как броня для воинских частей. Мы пока лишь поверхностно оцениваем потенциал $ehof_sm$, но определенно находимся на шаг впереди. Теперь экипаж готов вернуться на поверхность."
  
