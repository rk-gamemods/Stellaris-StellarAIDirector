  giga_dialog.11101.name:99 "$ehof_sm_forge_phase0$"
  giga_dialog.11101.desc:0 "Строительные материалы доставлены, и площадка за пределами $ehof_the_sphere_ named$ подготовлена ​​к началу работ на нашем первом и, вероятно, единственном $ehof_sm_forge_phase4$."
  giga_dialog.11101.a:0 "Отлично."
  
  giga_dialog.11102.name:99 "$ehof_sm_forge_phase1$"
  giga_dialog.11102.desc:0 "Мы намерены максимально увеличить производительность кузницы, поэтому мы включили в нее гигантские живые комплексы."
  giga_dialog.11102.a:0 "Переходим к следующему этапу!"
  
  giga_dialog.11103.name:99 "$ehof_sm_forge_phase2$"
  giga_dialog.11103.desc:0 "Первый этап изготовления $ehof_sm_forge_phase4$ завершен. Следующая фаза будет происходить на противоположной стороне кузницы."
  giga_dialog.11103.a:0 "Нам нужно больше!"
  
  giga_dialog.11104.name:99 "$ehof_sm_forge_phase3$"
  giga_dialog.11104.desc:0 "Теперь кузница загружена на 50%! Надо как можно скорее приступить к работе над завершающим этапом."
  giga_dialog.11104.a:0 "Хорошо."
  
  giga_dialog.11105.name:99 "$ehof_sm_forge_phase4$"
  giga_dialog.11105.desc:0 "$ehof_sm_forge_phase4$ завершен. Обеспечение нашей империи огромными запасами $ehof_sm$ и $ehof_qnm$. Это обязательно пригодится оружейной фабрике."
  giga_dialog.11105.a:0 "Превосходно."
  pc_ehof_black_hole:99 "$pc_black_hole$"
