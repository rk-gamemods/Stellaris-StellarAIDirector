  # Anomaly
  code_6_cat:0 "Код реальности - Звезда"
  code_06_category_desc:0 "Еще одна передача $ehof_epcs$ была получена §H[this.GetName]§! внутри системы §H[root.solar_system.GetName]§!. Восстановлена ​​функциональность кораблей и определено местонахождение источника. Звезда §H[из.из.GetName]§!.\n\nТочное местоположение на поверхности звезды или внутри нее необходимо определить в ходе расследования."
  
  # Anomaly Success (Creates Dig site)
  # to fix: this is always a brown dwarf?
  ehof_reality_code.601.name:0 "Код реальности - Звезда"
  ehof_reality_code.601.desc:0 "Расположение объекта усилителя на §H[from.from.GetName]§! было определено.\n\nДостижение этого объекта-усилителя будет чрезвычайно сложной задачей, потому что он расположен внутри звезды, в 74650,7 километрах под поверхностью звезды. Невероятная плотность и экстремальные температуры сделают этот проект чрезвычайно трудным. Сначала необходимо изготовить необходимое оборудование.\n\nСтоимость и временные затраты на этот проект не измеримы, но завершение загадочной последовательности мастер-кода и достижение источника $ehof_epcs$ может стоить любых затрат."
  
  # Initial
  code6_digsite:0 "Код реальности - звездные раскопки"
  code6_digsite_desc:0 "Оборудование необходимое для проекта на §H[code_world_planet.GetName]§! готово к развертыванию. В связи с тем, что усилитель расположен внутри конвективной зоны звезды, необходимо выбрать нестандартный способ достижения объекта."
  
  # Stage 1
  ehof_reality_code.611.name:0 "Код реальности - звездные раскопки I"
  ehof_reality_code.611.desc:0 "Чтобы добраться до места расположения усилителя, над фотосферой §H[code_world_planet.GetName]§!, было построено специальное сооружение, точно над местом расположения объекта. Сильное давление и высокая температура внутри звезды делают невозможным проведение обычных раскопок.\n\nНа объекте будет использоваться гигантский сверхтермостойкий якорь, который будет брошен в фотосферу звезды. Он будет проталкиваться через материал фотосферы до тех пор, пока не достигнет непосредственной близости к месту назначения, где генераторы электромагнитного поля будут удерживать якорь в нужном положении.\n\nСоединение якоря с объектом будет затем использоваться в качестве линии для специализированного лифта, который будет следовать за линией, пока не достигнет источника.\n\nЯкорь теперь готов к развертыванию."
  
  # Stage 2
  ehof_reality_code.612.name:0 "Код реальности - звездные раскопки II"
  ehof_reality_code.612.desc:0 "Якорь достиг местоположения источника. Он был закреплен, и связь с объектом стабилизировалась.\n\nТеперь лифт можно развернуть."
  
  # Stage 3
  ehof_reality_code.613.name:0 "Код реальности - звездные раскопки III"
  ehof_reality_code.613.desc:0 "Лифтовая установка сообщила, что достигла объекта-усилителя. Как и внутри предыдущих планет, силовое поле создает пустоту вокруг объекта-усилителя, но вместо того, чтобы удерживать материал корки от раздавливания объекта-усилителя, теперь оно предотвращает его от атмосферы и ее давления. Экипаж готов предпринять необходимые шаги для входа на объект."
  
  # Stage 4
  ehof_reality_code.614.name:0 "Код реальности - звездные раскопки IV"
  ehof_reality_code.614.desc:0 "Команда смогла получить доступ к усилителю и извлечь еще один фрагмент последовательности мастер-кода $ehof_epcs$.\n\nС этим последним фрагментом мы наконец-то сможем полностью собрать последовательность мастер-кода $ehof_epcs$!. Полная последовательность позволит нам добраться до источника $ehof_epcs$, где мы сможем выяснить, какова цель $ehof_epcs$, объектов усилителя и $PGATE_GALACTIC$.\n\nВ отношении $PGATE_GALACTIC$. Полная последовательность мастер-кода позволила нам получить полный доступ к базе данных этого усилителя. Новая информация, которую команда смогла собрать, наконец открыла нам природу эфирной энергии, которая управляет $ehof_sm$ и, следовательно, $PGATE_GALACTIC$ и усилителями. $ehof_sm$ может использовать локальную вакуумную энергию, которую он может поглотить, если поблизости нет более мощного источника энергии или если основная энергия больше не доставляется.\n\nЭтот источник энергии, кажется, является источником загадочного рисунка. $ehof_sm$ получает энергию от источника, передавая ее через сам кожух. Энергия, которую получает $ehof_sm$, является энергией оболочки, что дает основание для гипотезы о том, что источником является сущность Покровной природы.\n\nТакже возможно, что оболочка является только носителем энергии, а источник только направляет поток энергия через кожух, которая в процессе преобразуется в энергию кожуха. Тем не менее, поиск источника теперь стал еще более важным, поскольку теперь мы можем не только выяснить, какова цель загадочного паттерна, усилителей и $PGATE_GALACTIC$, но также можем раскрыть истинный потенциал $ehof_sm$.\n\nЭкипаж лифта готовится к возвращению на поверхность звезды."
  
  ###############################
  ### Final digsite (CPlanet) ###
  ###############################
  # Notification that a new system spawned
  ehof_reality_code.1000.name:0 "Код реальности - Происхождение"
  ehof_reality_code.1000.desc:0 "После многих лет поиска всех фрагментов последовательности мастер-кода $ehof_epcs$ мы наконец смогли собрать достаточно деталей, чтобы восстановить ее полностью.\n\nУсилители и $PGATE_GALACTIC$, которые были обнаружены разбросанными по всем системам $ehof_cohesive$ используются для передачи $ehof_epcs$ по галактике и за ее пределы с целью пока неизвестной. Мы уже знаем следующее. Усилители способны создавать квазиотрицательную массу с неизвестной целью и используют $PGATE_GALACTIC$ для связи друг с другом. Сигнал, через который они общаются, кодовая последовательность $ehof_epcs$, передается гравиэлектромагнитными волнами, пока не достигает $PGATE_GALACTIC$, который затем либо реагирует либо не реагирует на него.\n\nЭто зависит от частоты и амплитуды $ehof_epcs$ и интенсивности энергии, запасенной внутри гравиэлектромагнитной волны, которая несет $ehof_epcs$. Если $PGATE_GALACTIC$ действительно реагирует, он преобразуется в $PGATE_GALACTIC$ и передает $ehof_epcs$ в желаемую систему $ehof_cohesive$. Основная цель всего этого до сих пор остается загадкой, но мы надеемся, что расследование происхождения откроет ее нам.\n\nБлагодаря последовательности мастер-кода, теперь мы сможем установить связь между $PGATE_GALACTIC$ и происхождением загадочного узора.\n\nПомимо этого, благодаря знаниям, собранным внутри усилителей и изучению $PGATE_GALACTIC$, мы теперь можем исследовать технологию производства $ehof_sm$ и создать нашу собственную $PGATE_GALACTIC$!"
  
  # On entering the system
  ehof_reality_code.10001.name:0 "Звездный Искоренитель"
  ehof_reality_code.10001.desc:0 "Наконец-то мы достигли системы происхождения $ehof_epcs$, §H[root.GetStarName]§!.\n\nСистема состоит из массивной черной дыры и одного единственного небесного тела, вращающегося вокруг нее. Огромная сферическая структура диаметром примерно 15 000 000 километров. Структура определенно не естественного происхождения и, похоже, ее защищает корабль, с которым мы раньше не сталкивались, Звездный Искоренитель.\n\nМы должны действовать осторожно, так как он выглядит враждебно и хорошо вооружен! Уничтожение этого корабля может оказаться необходимым, так как он, вероятно, помешает нам приблизиться к сферическому объекту."
  
  # On killing the eradicator
  ehof_reality_code.10002.name:0 "Искоренитель уничтожен?"
  ehof_reality_code.10002.desc:0 "Как только показалось, что мы должны выиграть битву со Звездным Искоренителем, он бесследно исчез. Нет никаких указаний относительно того, куда он ушел и может ли он вернуться.\n\nВ любом случае, теперь мы можем возобновить нашу миссию из-за которой мы пришли сюда с самого начала. Сферический объект, который, вероятно, является источником загадочного узора.\n\nВизуальное и тепловое сканирование поверхности показывает, что он постоянно находится в движении и изменяется между множеством различных состояний материи. Он не является ни твердым, ни жидким, ни газообразным, ни плазменным. Это все сразу! Даже сверхвысокие или сверхнизкие энергетические состояния вещества, по-видимому, существуют в составе поверхности, такие как конденсаты Бозе-Эйнштейна, вырожденная материя и даже фотонная материя.\n\nПоверхность также светится сама по себе время от времени, в разных локациях, вероятно, из-за распада фотонной материи и постоянных фазовых переходов. Исходя из наших знаний о $ehof_sm$ и того факта, что все остальные первичные структуры сделаны из него, вполне вероятно, что поверхность сделана из того же материала. Попытки проверить эту гипотезу, к сожалению, оказались тщетными, так как состав поверхности невозможно определить с помощью сканеров из-за постоянных и чрезвычайно быстрых фазовых переходов. Что примечательно, так это то, что он, кажется, обладает определенными цветовыми схемами, которые одинаковы почти для всей конструкции. Золото-серебро и оранжевый. Как все это работает, абсолютно неизвестно.\n\nДве области круглой формы, которые можно определить только как «полюса» этой сферы, потому что у идеальных сфер нет полюсов, они отличаются от основной структуры поверхности. Они имеют диаметр примерно 2 миллиона километров и, кажется, сделаны из твердого кристаллического материала бронзового цвета. В отличие от остальной поверхности, столбы статичны и не меняются ни малейшим образом. В центре этих полюсов расположен какой-то большой символ, имеющий форму, аналогичную форме усилителей и сигил на $PGATE_GALACTIC$. Это может быть своего рода репрезентативный символ создателей этой конструкции, усилителей и $PGATE_GALACTIC$.\n\nТак же, как и в случае с объектами-усилителями, поверхность не может быть исследована сканерами, но в отличие от них ее температура не может быть определена, из-за постоянно меняющихся фаз поверхности.\n\nВход не идентифицируем, если он есть, но он может быть похож на объекты-усилители, входы которых «проявляются» только при определенных условиях.\n\nТщательное изучение структуры потребуется, чтобы определить ее функцию и найти путь в нее, что, вероятно, будет необходимо в первую очередь для определения функции. Наши исследователи решили назвать конструкцию $ehof_the_sphere_ named$."
  ehof_reality_code.10002.a:0 "Это невероятно!"
  
  # Initial
  code_final_digsite:0 "Код реальности - $ehof_the_sphere_named$"
  code_final_digsite_desc:0 "Найти путь в $ehof_the_sphere$ кажется невыполнимой задачей. Стимулирование поверхности или проникновение в нее излучением или механической силой может быть бесполезным, как и в случае с усилителями.\n\nПоверхность может не иметь определенной температуры в целом, как и отдельные компоненты самой поверхности. Их температуры, вероятно, колеблются в диапазоне от чрезвычайно низких до чрезвычайно высоких температур.\n\nЛюбая форма оборудования, которая использовалась бы даже для прикосновения к поверхности, вероятно, была бы уничтожена в одно мгновение. Вместо этого наши исследователи хотят использовать метод $ehof_epcs$. Это был ключ для доступа к усилителям и $PGATE_GALACTIC$, так что он может быть ключом и для $ehof_the_sphere$. Однако они будут использовать не просто какую-то загадочную последовательность кода шаблона, но последовательность мастер-кода. Вероятно, что если $ehof_the_sphere$ вообще отреагирует на $ehof_epcs$, это будет последовательность мастер-кода.\n\nИз-за огромного размера $ehof_the_sphere$ единственного передатчика, вероятно, будет не достаточно, если он действительно может отреагировать на $ehof_ep$. Однако для начала будет построен только один объект. Он будет направленным передатчиком для $ehof_epcs$ и будет излучать $ehof_ep$ на поверхность посредством гравиэлектромагнитных волн.\n\nСтроительство объекта можно начинать прямо сейчас."
  
  # Stage 1
  ehof_reality_code.1001.name:0 "Код реальности - $ehof_the_sphere_named$ I"
  ehof_reality_code.1001.desc:0 "Передатчик частично справился с задачей открыть вход в $ehof_the_sphere$.\n\nПервые несколько раз он использовался, он излучал $ehof_epcs$ посредством гравитационных волн, как и в случае с усилителями, но эти попытки остались без реакции со стороны $ehof_the_sphere$. После этого исследователи использовали гравиэлектромагнитные волны, так как их также необходимо было использовать для $PGATE_GALACTIC$. На этот раз $ehof_the_sphere_ named$ отреагировала, хотя и ненадолго. На одном из полюсов проявилась относительно небольшая выемка диаметром 1 км, которая вскоре исчезла. Похоже, стимула было недостаточно.\n\nВозможно, потребуется строительство дополнительных сооружений, чтобы открыть стабильный вход в $ehof_the_sphere$."
  
  # Stage 2
  ehof_reality_code.1002.name:0 "Код реальности - $ehof_the_sphere_named$ II"
  ehof_reality_code.1002.desc:0 "Наш огромный проект в $ehof_the_sphere$ добился существенного прогресса.\n\nПосле установки и развертывания нескольких дополнительных эмиттеров количество выемок увеличилось. Похоже, что количество выемок увеличивается экспоненциально количеству стимулов, приложенных к поверхности. После установки 5 дополнительных устройств на поверхности проявилась ровно 216 выемок. Они выровнены по кругу от центра к внешней стороне, образуя круг, заполненный равномерно упорядоченными выемками.\n\nОсновываясь на том факте, что 1 объект имел 1 выемку, а 5 объектов - 243 выемки, можно определить, что количество выемок увеличивается в 3 степени. Размер самих выемок не изменился.\n\nПри такой скорости увеличения потребуется всего 126 объектов, пока количество выемок и их выравнивание не покроют весь полюс. Строительство дополнительных 110 таких дорогостоящих объектов было бы экономическим кошмаром, и наши ученые убеждены, что увеличение их количества до тех пор, пока не будет покрыт весь полюс, не приведет к появлению входа. Они считают, что количества сигналов, излучаемых одним только оборудованием, недостаточно, подобно тому, как $PGATE_GALACTIC$ не реагируют просто на $ehof_epcs$, а только при определенных условиях. Помимо количества важны также интенсивность, частота и амплитуда передачи. Количество и качество передачи должны быть правильными, чтобы вызвать проявление входа.\n\nТеперь оборудование начнет передавать последовательность мастер-кода $ehof_epcs$ с различной интенсивностью и конфигурацией на $ehof_the_sphere$, чтобы проверить эту гипотезу."
  
  # Stage 3
  ehof_reality_code.1003.name:0 "Код реальности - $ehof_the_sphere_named$ III"
  ehof_reality_code.1003.desc:0 "Гипотеза наших исследователей о $ehof_the_sphere$ оказалась верной.\n\nСредства передатчика излучали кодовую последовательность $ehof_eps$ с различной интенсивностью и конфигурацией на $ehof_the_sphere$, и зазубрины не только проявлялись, но и меняли свой размер.\n\nПосле длительного периода времени, в течение которого исследователям приходилось тестировать множество различных вариантов, они, наконец, смогли определить правильный вариант. При правильной интенсивности и конфигурации выемки слились в одну большую дыру диаметром 240 километров, и, наконец, $ehof_the_sphere$ открылась.\n\nНаши ученые даже смогли выяснить, что, применяя правильную интенсивность, можно увеличить или уменьшить размер входа. Этот механизм, вероятно, допускает множество различных размеров входа в $ehof_the_sphere$, возможно, для транспортировки больших или меньших грузов в $ehof_the_sphere$. Судя по размеру $ehof_the_sphere$, это могли быть целые планеты или даже звезды! Что бы там ни было, что создатели $ehof_the_spher $ перевезли через вход, сейчас не важно, только то, что мы раскрываем секреты $ehof_the_sphere$.\n\nК сожалению, за входом находится еще один огромный механизм, похожий на тот, что находится внутри объектов-усилителей. Похоже, что сначала нам нужно найти способ решить загадку механизма, чтобы наконец получить доступ к $ehof_the_sphere$.\n\nНаши исследователи предполагают, что для решения загадки механизма потребуется развернуть расширенную вычислительную мощь."
  
  # Stage 4
  ehof_reality_code.1004.name:0 "Код реальности - $ehof_the_sphere_named$ IV"
  ehof_reality_code.1004.desc:0 "Чтобы выяснить, как решить загадку механизма входа в $ehof_the_sphere$, наши ученые задействовали целый сонм чрезвычайно продвинутых ИИ.\n\nПосле многих дней вычислений и анализа ИИ действительно смог решить загадку механизма. Единственная проблема заключается в том, что для того, чтобы применить решение для механизма, механическая сила и излучение должны быть применены в десятках тысяч различных мест на механизме.\n\nВ первую очередь необходимо разработать и сконструировать оборудование для этой задачи. Тогда мы, наконец, сможем открыть $ehof_the_sphere$!"
  
  # Stage 5
  ehof_reality_code.1005.name:0 "Код реальности - $ehof_the_sphere_named$ V"
  ehof_reality_code.1005.desc:0 "Мы наконец-то завершили создание механизма, необходимого для открытия входа в $ehof_the_sphere$.\n\nТысячи разных дронов с разными инструментами были построены, чтобы взаимодействовать с всеми локациями.\n\nНеизвестно, все ли стимулы нужно применять сразу или в определенном порядке. Разумные существа будут наблюдать за всем процессом, чтобы определить, как нужно применять стимулы.\n\nТеперь можно начинать развертывание дронов."
  
  # Stage 6
  ehof_reality_code.1006.name:0 "Код реальности - $ehof_the_sphere_named$ VI"
  ehof_reality_code.1006.desc:0 "Это сработало, мы смогли решить загадку механизма входа, чтобы открыть $ehof_the_sphere$!\n\nПосле бесчисленных попыток ИИ смог определить, что порядок, в котором дроны должны были применять различные стимулы, согласован с гармонической частотой гравитационных волн, которые вращаются вокруг черной дыры $ehof_the_sphere$.\n\nПочему создатели $ehof_the_sphere$ защищают механизм таким образом, абсолютно неизвестно, но это не имеет особого значения.\n\n$ehof_the_sphere$ наконец-то открыта. Мы можем раскрыть все ее тайны!"
  
  ###########################################################################
  ################# 1/6 reality code excavations completed ##################
  ###########################################################################
  ehof_reality_code.005.name:0 "Код реальности - $ehof_sm$"
  ehof_reality_code.005.desc:0 "После возвращения команды, загадочный фрагмент последовательности рисунка и образец вещества, из которого состоит усилитель, были переданы нашим научным учреждениям. С помощью образцов изнутри усилителя мы смогли многое узнать о самовоспроизводящейся чужеродной субстанции. Она состоит из множества сверхсовременных наномашин, которые способны копировать самих себя и вместе могут имитировать множество различных форм материи, а также ее физические и химические свойства.\n\nПо своему поведению вещество почти кажется, что субстанция не только живая, но и разумная. Она способна реагировать на множество различных условий окружающей среды, причем все ее реакции направлены на приспособление к условиям и обеспечение целостности самой себя. Наблюдались различные формы реакций.\n\nРепликация, перегруппировка и изменение формы, чтобы сделать вещество невосприимчивым к любому виду разрушающего физического или химического воздействия. Экстремальная жара, холод и коррозия, сильные электромагнитные поля, различные формы излучения, механическое давление, лазеры и даже гравитация. Кажется, что не существует верхнего предела эффективности его адаптивных способностей, по крайней мере, мы не можем определить их.\n\nПомимо ее способности трансформироваться и размножаться для сохранения себя, структура также способна «расти». Ее репликационные способности бывают двух разных форм. Первая форма репликации возникает, когда веществу необходимо адаптироваться к разрушающим воздействиям окружающей среды, при котором она, кажется, может воспроизводить себя из ничего, возможно, путем поглощения энергии или материи самого разрушительного воздействия или с помощью источника необнаруживаемой энергии.\n\nВ этом случае вещество не увеличивает или лишь незначительно увеличивает свой объем. Вторая форма репликации возникает, когда вещество приспособилось к любым повреждающим воздействиям и находится в контакте или в непосредственной близости от доступного вещества или энергии. Оно поглощает их, чтобы увеличивать свой объем, чтобы «расти» и, по-видимому, может поглощать практически любую известную форму материи и энергии.\n\nТолько гравитационная энергия, темная материя и квазиотрицательная масса не могут быть поглощены. Какова цель этого «роста», неизвестно, но, судя по отчетам об усилителе, этого не произошло внутри самого усилителя, хотя наша команда и их инструменты находились в прямом контакте с веществом. Похоже, что это вещество способно «знать» об окружающей среде и в зависимости от обстоятельств реагировать по-разному.\n\nНаши ученые решили назвать вещество $ehof_sm$ по аналогии с живым металлом из-за его сходства. Несмотря на то, что мы все еще почти ничего не знаем о веществе или, точнее, о том, как оно работает, наше научное сообщество убеждено, что оно обладает невообразимым технологическим потенциалом, и они хотят интенсифицировать наши исследования вещества, а также усилителей. Не только для того, чтобы узнать больше о загадочном паттерне, но и о $ehof_sm$.\n\nИспользование $ehof_sm$ на данный момент может быть ограничено, поскольку мы все еще знаем о нем слишком мало, чтобы использовать его в полной мере, но наши ученые разработали проекты строительства специализированных объектов, предназначенных для воспроизводства $ehof_sm$ путем подпитки минералами и энергией. Кроме того, был запрошен проект по исследованию $PGATE_GALACTICS$, поскольку наши ученые полагают, что они могли быть построены теми же объектами, которые построили усилители, и, таким образом, также могут состоять из $ehof_sm$."
  ###########################################################################
  ################# 3/6 reality code excavations completed ##################
  ###########################################################################
  
  ehof_reality_code.004.name:0 "Код реальности - Активация"
  ehof_reality_code.004.desc:0 "Благодаря знаниям, которые мы смогли собрать внутри усилителей, теперь мы знаем, как активировать $PGATE_GALACTIC$.\n\nНаши исследователи уже начали разработку необходимой технологии для их активации. В настоящее время разрабатываются устройства, которые будут способны передавать гравиэлектромагнитные волны и создавать необходимую мощность для сохранения энергии передачи.\n\nОни будут проецировать $ehof_epcs$ с правильной частотой и амплитудой, поэтому системы $PGATE_GALACTIC$ будут реагировать соответствующим образом и активируют его. Совершенно неизвестно, что именно происходит, когда активируется $ehof_gateway_disabled$. Все, что мы знаем, это как это сделать, и теперь мы действительно можем начать это делать!"
  
  #########################################
  ### Hieroglyphics (EHOF Precursor) ######
  #########################################
  ehof_megastructure.602.name:99 "Mysterious Geoglyphs"
  ehof_megastructure.602.desc:99 "A routine review of scanner data has unexpectedly revealed giant geoglyphs carved into a planet's surface. Repeating elements and the symbols' overall abstraction indicate that they are more likely a script than representations of lifeforms.\n\nDefinitely something worth investigating."
  ehof_megastructure.602.a:99 "They even spread beyond the horizon..." #very unforced reference
  
  ehof_precursor:0 "Иероглифы"
  ehof_precursor_digsite_desc:0 "На поверхности §H[from.Planet.GetName]§!, есть гигантские иероглифы, очень похожие на круги на полях, но вырезанные на самой поверхности.\n\nОпределенно это то, что стоит исследовать."
  
  ehof_megastructure.0051.name:0 "Иероглифы I"
  ehof_megastructure.0051.desc:0 "Экипаж §H[this.GetName]§! немедленно приземлился и начал устраивать раскопки вокруг самого большого из иероглифов, расположенного к югу от множества гор, окружающих северный полюс планеты.\n\nСразу же мысли обращаются к выяснению, что это за иероглифы, и кто их здесь оставил. После некоторого размышления ученые приступили к работе, тестируя образцы воздуха и земли, а также выполняя сканирование поверхности самих иероглифов."
  
  ehof_megastructure.0052.name:0 "Иероглифы II"
  ehof_megastructure.0052.desc:0 "Прошло несколько недель с тех пор, как ученые на §H[from.Planet.GetName]§! приземлились и попытались расшифровать, что означают иероглифы или кто мог их сделать.\n\nРазочарованные временем, уже потраченным на исследование планеты, команда растерялась и объявила миссию неудачной. Они свернули места раскопок и начали подниматься на борт корабля, готовые к отбытию.\n\n§H[this.leader.GetName]§! отдал приказ покинуть планету, и §H[this.GetName]§! начали подниматься на орбиту, но когда они поднимались, научная группа заметила, что тот самый символ, на который их корабль приземлялся в течение нескольких недель, светился очень слабым оранжевым светом, в то время как другие - нет."
  
  ehof_megastructure.0053.name:0 "Иероглифы III"
  ehof_megastructure.0053.desc:0 "§H[this.leader.GetName]§! остановил подъем и снова начал спускаться, и чем ближе судно подходило к иероглифу, тем более явным становился оттенок оранжевого тумана.\n\nОзадаченные таким развитием событий, ученые решили сделать круг по планете, пролетая над каждым глифом на низком уровне высоты, наблюдая, как они загораются, когда они пролетают над ними.\n\nВ конце концов все символы были зажжены и остались светиться, но команда все еще не знала, что это означает, и потому решила снова приземлиться на место раскопок, где на поверхности было трудно сказать, светился ли он вообще оранжевым."
  
  ehof_megastructure.00531.name:0 "Иероглифы IV"
  ehof_megastructure.00531.desc:0 "Вскоре после приземления на поверхность §H[from.Planet.GetName]§!, научная группа приступила к тестированию атмосферы вокруг глифов в надежде найти какой-то ответ, когда их сенсоры зафиксировали сильную сейсмическую активность на мгновение, и все глифы сразу перестали светиться.\n\nОбеспокоенные благополучием команды, они быстро сели на §H[this.GetName]§! и вышли на орбиту.\n\nКак только они покинули атмосферу §H[from.Planet.GetName]§!, сенсоры кораблей обнаружили гигантскую вспышку оранжевого света, движущуюся далеко за пределами любой скорости, которую мы могли достичь.\n\nСвет вскоре покинул видимый диапазон, но команда смогла определить его предполагаемую цель благодаря рассчитанной траектории и скорости луча. Мы должны исследовать систему, к которой он, по-видимому, движется."
  
  EXPLORE_EHOF_PRECURSOR_NO_RUINED:0 "Оранжевый луч"
  EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC:0 "Сенсоры корабля обнаружили гигантскую вспышку оранжевого света, движущуюся далеко за пределами любой скорости, которую мы могли достичь.\n\nСвет вскоре покинул видимый диапазон, но команда смогла определить его предполагаемую цель благодаря рассчитанной траектории и скорости луча. Мы должны исследовать систему, к которой он, по-видимому, движется."
  
  EXPLORE_EHOF_PRECURSOR_RUINED:99 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED$"
  EXPLORE_EHOF_PRECURSOR_RUINED_DESC:99 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC$"
  
  ehof_megastructure.0054_name:0 "Тупик"
  ehof_megastructure.0054_desc:0 "Прибыв в систему через несколько недель после появления оранжевого луча, его нигде не видно...\n\nНесмотря на годы, потраченные на изучение этой аномалии, так и не удалось выяснить, для чего предназначались эти глифы, кто их сделал, почему они их сделали или что представлял собой оранжевый луч.\n\nОднако после некоторого исследования случайных обломков, разбросанных по системе без всякой видимой причины, выяснилось, что когда-то здесь была какая-то мегаструктура, вероятно, со временем разрушенная черной дырой.\n\nВнутри обломков наши ученые обнаружили большой и функциональный тайник данных, содержащий передовые технологии и знания, связанные со стабилизацией червоточин.\n\nОднако самой значительной находкой стало обнаружение крайне инопланетного и потустороннего артефакта. Изучение артефакта, безусловно, того стоит."
  
  ehof_megastructure.0055_name:0 "Объект"
  ehof_megastructure.0055_desc:0 "Прибыв в систему через несколько недель после появления оранжевого луча, мы не можем его обнаружить, но в центре системы есть поврежденная структура. Похоже, что этот $ehof_ehof$ когда-то мог манипулировать черными дырами в огромных масштабах. Данные, полученные изнутри сооружения, показывают, что это древний генератор червоточины и стабилизатор.\n\nНесмотря на то, что ученые поднялись на борт несколько разрушенного и, безусловно, заброшенного сооружения, команда решила найти любые признаки жизни или любой ключ к тому, что нас привело сюда.\n\nПосле месяцев сканирования, тестирования и размышлений становится ясно, что нет реального понимания того, для чего были символы, кто их сделал, почему они сделали их или что такое оранжевый луч.\n\nОднако, в то время как внутри и вокруг $ehof_megastructure_ruined$ мы собрали множество передовых технологий, знаний и, что наиболее важно, тайный артефакт неизвестного назначения и происхождения, который был установлен на видном месте внутри объекта. Наши ученые уверены, что мы должны изучить его дальше."
  
  STUDY_ARCANE_ARTIFACT_1:0 "§BИзучение таинственного артефакта§!"
  STUDY_ARCANE_ARTIFACT_1_DESC:0 "Таинственный артефакт, который мы обнаружили среди обломков внутри системы §H[ehof_blackhole_@root.owner]§! может пролить свет на происхождение оранжевого луча, поскольку он может быть связан с ним. \n\nОднако, независимо от оранжевого луча, артефакт может содержать и другие удивительные секреты, которые только и ждут, чтобы их раскрыли.\n\n§B(Этот проект обязателен для разблокировки EHOF!)§!"
  
  STUDY_ARCANE_ARTIFACT_2:0 "§BИзучение таинственного артефакта§!"
  STUDY_ARCANE_ARTIFACT_2_DESC:0 "Таинственный артефакт, который мы обнаружили в поврежденном $ehof_ehof$ внутри системы §H[ehof_blackhole_@root.owner]§!, может пролить свет на происхождение оранжевого луча, поскольку он может быть связан с ним.\n\nОднако, независимо от оранжевого луча, артефакт может содержать и другие удивительные секреты, которые только и ждут, чтобы их раскрыли.\n\n§B(Этот проект обязателен для разблокировки EHOF!)§!"
  
  STUDY_ARCANE_ARTIFACT_3:0 "§BИзучение таинственного артефакта§!"
  STUDY_ARCANE_ARTIFACT_3_DESC:0 "Таинственный артефакт, который мы обнаружили в поврежденном $ehof_ehof$ внутри системы §H[ehof_blackhole_@root.owner]§!, может пролить свет на то, как именно работала мегаструктура.\n\n§B(Этот проект обязателен для восстановления EHOF!)§!"
  
  ehof_anomaly.4321.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4321.desc:0 "Наше продолжительное исследование тайного артефакта увенчалось успехом.\n\nАртефакт обладает очень странными свойствами.\n\nПомимо того, что конструкция состоит из неизвестного и пока не поддающегося исследованию материала, размер и масса конструкции со временем колеблются.\nЕго размер варьируется от 150 до 7800 метров, а масса - от 7000 тонн до 16 миллионов тонн. Однако эти свойства не изменяются пропорционально.\n\nКажется, что он обладает определенной основной формой, но время от времени выходит из нее, чтобы вернуться обратно в исходную форму.\n\nЧто еще более удивительно, кажется, что он распространяется по всей реальности, поскольку некоторые ее части меняют свои физические свойства и становятся полупрозрачными, прозрачными или невидимыми, могут даже становиться неосязаемыми и давать странные и разные энергетические показания, в зависимости от их состояния.\n\nВ различных местах артефакта могут происходить более или менее интенсивные выбросы радиации и даже материи, которые также хаотичны и непредсказуемы."
  #This event seems to be deprecated(4322), as a note for the future because of that it's just been brought to parity with 4324
  ehof_anomaly.4322.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4322.desc:0 "Из данных, которые нам удалось собрать, мы смогли определить по крайней мере одну из функций устройства.\n\nОн способен стабилизировать червоточины и управлять ими.\n\nОднако это заявление сильно преуменьшает возможности устройства.\n\nОн обладает потенциалом стабилизировать и управлять любым типом червоточин во Вселенной, даже чрезвычайно крошечной и недолговечной виртуальной $ehof_wormhole$, созданной квантовыми флуктуациями самого пространства-времени.\nТо, что теоретически должно быть невозможно.\n\nКонструкция может выполнять и другие функции, но из-за ее нестабильности, непредсказуемости и загадочности их будет трудно определить.\nНаши исследователи даже не уверены, должна ли она вести себя таким образом или это так же какое-то повреждение.\n\nНесмотря на это, наши ученые нашли способ использовать способность манипулирования червоточинами в ограниченной степени.\nОни считают, что устройство $ehof_wormhole$ можно использовать для стабилизации, манипулирования и, в конечном счете, перемещения через червоточину.\nСамая высокая известная плотность $ehof_wormhole$ возникает на краю горизонта событий черных дыр, что делает артефакт там наиболее эффективным и мощным."
  
  ehof_anomaly.4323.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4323.desc:0 "Наше продолжительное исследование тайного артефакта увенчалось успехом.\n\nАртефакт обладает очень странными свойствами.\n\nПомимо того, что конструкция состоит из неизвестного и пока не поддающегося исследованию материала, размер и масса конструкции со временем колеблются.\nЕго размер варьируется от 150 до 7800 метров, а масса - от 7000 тонн до 16 миллионов тонн. Однако эти свойства не изменяются пропорционально.\n\nКажется, что он обладает определенной основной формой, но время от времени выходит из нее, чтобы вернуться обратно в исходную форму.\n\nЧто еще более удивительно, кажется, что он распространяется по всей реальности, поскольку некоторые ее части меняют свои физические свойства и становятся полупрозрачными, прозрачными или невидимыми, могут даже становиться неосязаемыми и давать странные и разные энергетические показания, в зависимости от их состояния.\n\nВ различных местах артефакта могут происходить более или менее интенсивные выбросы радиации и даже материи, которые также хаотичны и непредсказуемы."
  
  ehof_anomaly.4324.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4324.desc:0 "Из данных, которые нам удалось собрать, мы смогли определить по крайней мере одну из функций устройства.\n\nОн способен стабилизировать червоточины и управлять ими.\n\nОднако это заявление сильно преуменьшает возможности устройства.\n\nОн обладает потенциалом стабилизировать и управлять любым типом червоточины во вселенной, даже чрезвычайно крошечной и недолговечной виртуальной $ehof_wormhole$, созданной квантовые флуктуации самого пространства-времени.\nЧто-то, что теоретически должно быть невозможно сделать.\nВероятно, он использовался в $ehof_ehof$ в качестве основного компонента процесса управления червоточиной.\n\nКонструкция может выполнять и другие функции, но из-за ее нестабильности, непредсказуемости и загадочности их будет трудно определить.\nНаши исследователи даже не уверены, должна ли она вести себя таким образом или это так же какое-то повреждение.\n\nНесмотря на это, наши ученые нашли способ использовать способность манипулирования червоточинами в ограниченной степени.\nОни считают, что устройство $ehof_wormhole$ можно использовать для стабилизации, манипулирования и, в конечном счете, перемещения через червоточину.\nРазрушенный $ehof_ehof$ потенциально может быть восстановлен для этой цели."
  
  r_arcane_manipulator_1:0 "§BМистический манипулятор червоточин§!"
  r_arcane_manipulator_1_desc:0 "Кажется, что эта потусторонняя конструкция перемещается в самой реальности, она обладает способностью стабилизировать и манипулировать червоточинами любого типа, включая виртуальную $ehof_wormhole$. Однако устройство до сих пор для нас загадка и не все его способности и возможности раскрыты."
  giga_relic_no_active:99 "This relic is purely a collectible and does not have any active effects."
  
  ehof_megastructure.0056_name:0 "E.H.O.F"
  ehof_megastructure.0056_desc:0 "Изучив поврежденную структуру черной дыры, мы определили, что эта конструкция изначально использовалась для уникальной формы межзвездного путешествия.\nДанные, полученные из так называемого «Комплекса смещения горизонта событий», сокращенно «EHOF», показывают, что это древний генератор и стабилизатор червоточины.\n\nНаходясь в мегаструктуре и вокруг нее, мы собрали большое количество передовые технологии, знания и, что наиболее важно, тайный артефакт неизвестного назначения и происхождения, который был установлен на видном месте внутри объекта. Наши ученые уверены, что мы должны изучить его дальше."
  
  #############################################################################################################################################
  ### Bombardment Stances #####################################################################################################################
  #############################################################################################################################################
  bombardment_redtoxin:0 "Алая Плеть"
  bombardment_redtoxin_desc:3 "$bombardment_redtoxin$ Бомбардировка использует Алую Плеть, чтобы отравить планету с помощью орбитальной бомбардировки и убить все живое на планете.\n- §RМассивное§! повреждение §HАрмии§!\n- §RМассивное§! повреждение §HПланеты§!\n- §RМассивное§! повреждение §HНаселения§!\n- Будет бомбардировать незащищенные планеты\n- Может превратить планеты в необитаемый, но легко терраформируемый Красный токсичный мир"
  opinion_policy_orbital_bombardment_redtoxin:0 "Нам не нравится твой горчичный газ"
  orbital_bombardment_redtoxin:0 "Алая Плеть"
  orbital_bombardment_redtoxin_name:0 "Орбитальная бомбардировка Алой Плети"
  orbital_bombardment_redtoxin_desc:0 "Позволяет использовать Алую Плеть в качестве оружия для орбитальных бомбардировок.\n\n§EПозволяет выполнять орбитальную бомбардировку «Алой Плети».§!"
  ehof_red_toxin.2.name:0 "Мир разбомблен в Красный токсичный мир"
  ehof_red_toxin.2.desc:0 "Одна из наших планет стала Красным токсичным миром."
  ehof_red_toxin.2.a:0 "Это ужасно!"
  bombed_to_red_toxic:0 "Мир теперь непригоден для жизни, но его можно терраформировать очень быстро."
  ehof_red_toxin.3.desc:0 "Наши флоты превратили вражескую планету в Красный токсичный мир с помощью бомбардировки Алой Плетью."
  ehof_red_toxic_world:0 "Повышение эффективности терраформирования"
  ehof_red_toxic_world_desc:0 "Алая Плеть увеличивает эффективность терраформирования, позволяя нам очень быстро терраформировать планету."
  
  building_ehof_sm_forge_1:0 "$giga_sr_sentient_metal$ Литейный завод"
  building_ehof_sm_forge_1_desc:0 "$Building_ehof_sm_forge_1$ - это специализированная и продвинутая установка, которая служит единственной цели - подавать £alloys£ §Y$alloys$§! и £energy£ §Y$energy$§! для накопления £giga_sr_sentient_metal£ §Y$giga_sr_sentient_metal$§! чтобы создать больше £giga_sr_sentient_metal£ §Y$giga_sr_sentient_metal$§!."
  
  building_ehof_sm_forge_2:0 "$building_ehof_sm_forge_1$-Комплекс"
  building_ehof_sm_forge_2_desc:0 "$building_ehof_sm_forge_2$ - более крупный и эффективный вариант $building_ehof_sm_forge_1$. Он использует наши расширенные знания о £giga_sr_sentient_metal£ §Y$giga_sr_sentient_metal$§! для улучшения производственного процесса и создания дополнительного £giga_sr_sentient_metal£ §Y$giga_sr_sentient_metal$§! за меньшее время."
  
  building_giga_research_lab_1:0 "Институт реферативной экспертизы"
  building_giga_research_lab_1_desc:0 "Специализированный институт феноменологических исследований и экспериментов в области абстрактной физики с очень большим штатом научных сотрудников."
  
  building_giga_research_lab_2:0 "Нелокализованный исследовательский центр"
  building_giga_research_lab_2_desc:0 "Специализированный институт феноменологических исследований и экспериментов в области абстрактной физики с очень большим штатом научных сотрудников."
  
  building_giga_institute_1:0 "Неортодоксальный аналитический центр"
  building_giga_institute_1_desc:0 "The Unorthodox Think Thank — это огромная установка и центр обработки и исследования абстрактной физики на планете. Этот удивительный объект значительно увеличивает результаты исследований планеты во всех аспектах."
  
  building_giga_supercomputer_1:0 "Абстрактный суперкомпьютер"
  building_giga_supercomputer_1_desc:0 "The Unorthodox Think Thank — это огромная установка и центр обработки и исследования абстрактной физики на планете. Этот удивительный объект значительно увеличивает результаты исследований планеты во всех аспектах."
  
  building_giga_supercomputer_2:0 "Абстрактный гиперкомпьютер"
  building_giga_supercomputer_2_desc:0 "Эта высокотехнологичная и специализированная установка позволяет изучать и экспериментировать с нелокализованными явлениями, открытыми средствами абстрактной физики."
  
  building_giga_institute_2:0 "Сверхпричинный научный нексус"
  building_giga_institute_2_desc:0 "Сверхпричинный Научный Нексус — это огромный объект, предназначенный для самых передовых и огромных исследовательских проектов и экспериментов в отношении нелокальных, сверхпричинных явлений абстрактной физики."
  
  building_giga_energy_nexus_1:0 "Распределитель энергии лазерной проводимости"
  building_giga_energy_nexus_1_desc:0 "Огромный комплекс использует мощные высокоэнергетические световоды для транспортировки энергии между планетой, на которой он расположен, и другими планетами в его звездной системе."
  
  building_giga_energy_nexus_2:0 "Гиперкоридорный передатчик мощности"
  building_giga_energy_nexus_2_desc:0 "Эти сверхмощные передатчики энергии могут передавать энергию между звездными системами и более эффективно распределять энергию внутри нашей империи."
  
  building_giga_energy_nexus_3:0 "Запутыватель межзвездного поля"
  building_giga_energy_nexus_3_desc:0 "Эта огромная конструкция позволяет напрямую запутывать различные местоположения квантовых полей в галактике, что позволяет нам мгновенно передавать энергию внутри нашей империи."
  
  # building_giga_planetary_shield_generator_1:0 "Hypershield Defensive Screen"
  # building_giga_planetary_shield_generator_1_desc:0 "The $building_giga_planetary_shield_generator_1$ is an enhanced version of a classical Planetary Shield Generator that affords increased protection to the planet below."
  
  building_giga_planetary_shield_generator_2:0 "Проектор отрицательной массы"
  building_giga_planetary_shield_generator_2_desc:0 "Создавая отталкивающий слой массы и энергии вокруг атмосферы планеты за счет использования Отрицательной Массы, Проектор Отрицательной Массы защищает Планету даже от самых интенсивных орбитальных бомбардировок и астероидов. Только постоянная длительная бомбардировка и сфокусированные лучи сверхвысоких энергий могут вовремя проникнуть сквозь отталкивающий слой."
  
  building_negative_mass_factory_1:0 "Прототип энергетического антипреобразователя"
  building_negative_mass_factory_1_desc:0 "Достижения в абстрактной физике позволяют нам разрабатывать и строить экспериментальные установки для генерации экзотической отрицательной массы. Несмотря на то, что Энергетический Анти-Преобразователь способен производить отрицательную массу, он все еще находится в состоянии прототипа, и его эффективность производства и выход очень низки."
  
  building_negative_mass_factory_2:0 "Преобразователь отрицательной массы"
  building_negative_mass_factory_2_desc:0 "Будучи следующим шагом в производстве отрицательной массы, Преобразователь Отрицательной Массы представляет собой усовершенствованную форму Энергетического Анти-Преобразователя с повышенной эффективностью и производительностью. Однако преобразование энергии в отрицательную энергию все еще далеко от эффективности и останется таковой, пока мы не выясним, как идеально преобразовать энергию между двумя состояниями."
  
  edict_giga_photonic_matter_sb:0 "Усиление щита фотонной энергией"
  edict_giga_photonic_matter_sb_desc:0 "Фотонную материю можно использовать для временного увеличения эффективности регенерации щита нашего корабля."
  
  edict_giga_negative_pressure_ti:0 "Увеличение тяги отрицательного давления"
  edict_giga_negative_pressure_ti_desc:0 "Точно применяя отрицательное давление к нашим обычным двигателям, мы можем повысить их эффективность."
  
  edict_giga_negative_mass_build:99 "Negative Mass Construction Acceleration"
  edict_giga_negative_mass_build_desc:99 "By utilizing negative mass within our construction processes, we can improve the speed at which we can finish our construction projects."
  
  edict_giga_sterile_hyper_neutrino_d_s:0 "Поддержка стерильного детектора гипернейтрино"
  edict_giga_sterile_hyper_neutrino_d_s_desc:0 "Наши стерильные детекторы гипернейтрино, обычно используемые для нашего EHOF Omega, также могут использоваться для обнаружения и извлечения большего количества темной материи из источников темной материи."
  
  pc_red_toxic:0 "Красный токсичный мир"
  pc_red_toxic_desc:0 "Уникальный тип токсичной планеты, полностью отравленной красными ядовитыми частицами, которые окрашивают атмосферу в красный цвет."
  
  pc_ehof_habitat:0 "Астероидная среда обитания"
  pc_ehof_habitat_desc:0 "Большая среда обитания, состоящая из множества астероидов, построенная потерянной, а ныне вымершей цивилизацией. Что случилось с его строителями, неизвестно."
  
  pc_ehof_unhabitat:99 "$pc_ehof_habitat$"
  pc_ehof_unhabitat_desc:99 "$pc_ehof_habitat_desc$"
  
  sc_ehof_black_hole:99 "$pc_ehof_black_hole$"
  sc_ehof_black_hole_desc:99 "$pc_ehof_black_hole_desc$"
  sc_annihilator:0 "Катаклизмическая звезда"
  sc_annihilator_desc:0 "Официально это Гигант звездного класса M, но в этой звезде есть что-то особенное..."
  sc_white_hole:0 "Белая дыра"
  sc_white_hole_desc:0 "Контр-двойник черной дыры. Белая дыра излучает астрономически большое количество энергии, отталкивая все вещества. Невозможно пересечь ее горизонт событий. Откуда берется вся энергия - до сих пор загадка. Она может работать на энергии вакуума, таинственной фоновой энергии Космоса, с потенциально неограниченным запасом энергии. Или это может даже быть приведено в действие инфляционными механизмами рождения целых вселенных! Никто не знает истинного ответа..."
  
  #########################################
  ### Supermassive E.H.O.F. ###############
  #########################################
  #Site
  giga_dialog.4201.name:99 "Supermassive E.H.O.F. Construction Site Complete"
  giga_dialog.4201.desc:99 "From crude animal-drawn carriages, to steam and nuclear-powered vehicles, to FTL travel and then Hyper-Relays and Gateways, the development and growth of all civilisations hinges on constant improvements in transportation technologies, enabling us to project our ambitions further and further.\n\nAnd so, with the construction site for a future §YSupermassive E.H.O.F.§! completed around the galactic core, we stand on the cusp of yet another and perhaps the greatest transportation revolution.\n\nThis platform shall serve as the logistical hub for the construction of a supersized Event Horizon Offset Facility around the galaxy's supermassive black hole which shall, in time, bolster our FTL capabilities to unseen heights and connect all corners of our empire together thanks to a network of countless micro-wormholes."
  giga_dialog.4201.a:99 "Marvelous."
  
  #Frame
  giga_dialog.4202.name:99 "Supermassive E.H.O.F. Electroweak Hyperframe Complete"
  giga_dialog.4202.desc:99 "The Supermassive E.H.O.F.'s §YElectroweak Hyperframe§! is now in place. This gargantuan frame shall generate a gargantuan electroweak field around the supermassive black hole's event horizon, from which probalistic wormholes will be 'plucked' and inflated across the galaxy by the structure's two not-yet built Quasi-Field Manipulators."
  giga_dialog.4202.a:99 "That makes sense... I think."
  
  #Gateways
  giga_dialog.4203.name:99 "Supermassive E.H.O.F. Quasi-Field Manipulators Complete"
  giga_dialog.4203.desc:99 "With the completion of the §YQuasi-Field Manipulators§!, the structure of our Supermassive E.H.O.F. is essentially complete. These manipulators shall manipulate the electroweak field generated by the Hyperframe as to twist surrounding spacetime into two gargantuan vortexes emanating from the Manipulators.\n\nThis should theoretically extend the range at which micro-wormholes can be generated to the entire galaxy and beyond, all while enabling them to remain stable over an indefinite period of time.\n\nAll that remains to be done now is to activate the device."
  giga_dialog.4203.a:99 "What do you mean by 'theoretically'?"
  
  #Activation
  giga_dialog.4204.name:99 "Supermassive E.H.O.F. Operational"
  giga_dialog.4204.desc:99 "Thanks to a massive infusion of energy and Quasi-Negative Mass, our marvelous §YSupermassive E.H.O.F.§! has roared to life. Twisting and bending spacetime like mere clay, the device's gargantuan power essentially grants us near-total control over our galaxy's underlying quasi-space.\n\nAlready, micro-wormholes are being generated across our entire empire, connecting our once-disparate worlds together as if they were one and reducing travel times to almost nothing, while our warships enjoy unprecedented mobility as wormholes enable them to traverse the void faster than ever.\n\nWith the full activation of this grand device, logistical and bureaucratic problems owing to our empire's size are soon to be little more than a distant memory as we enter an era of unprecedented cohesion and galactic coordination."
  giga_dialog.4204.a:99 "The galaxy is now truly our domain!"
  
  
  name_supermassive_ehof:99 "Supermassive E.H.O.F."
  
  supermassive_ehof_0:99 "$gc_tera$$name_supermassive_ehof$ Construction Site"
  supermassive_ehof_0_DESC:99 "The construction site for a future $name_supermassive_ehof$. This relatively small platform shall be used as a base to construct a machine granting us near-perfect mobility and cohesion across the galaxy."
  supermassive_ehof_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_terastructure$ - $giga_list_category_transportation$\nDrastically buffs §YFTL Speed§!, £unity£ §YUnity§!, £trade_value£ §YTrade Value§!, reduces §YEmpire Size§!.\n§LAn upscaled E.H.O.F. Facility designed to generate microwormholes anywhere in the galaxy on the fly.§!" #megalistentry SUPERMASSIVE EHOF
  
  supermassive_ehof_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - The §YSupermassive E.H.O.F.§! can manipulate spacetime and generate microwormholes on the fly anywhere in the galaxy to bolster conventional methods of FTL travel, effectively reducing §YHyperdrive Cooldown§! to almost nothing and granting infinite range to §YJump Drives§!.\n\nThese wormholes also bring all parts of our empire closer together, increasing §YUnity§! and §YTrade Value§! while reducing §YEmpire Size§! and §YResettlement Cost§!.\n\nIt can also act as a §YQuantum Catapult§! with infinite range and near-perfect accuracy (With the §YOverlord§! DLC), and should the opportunity present itself, it may also allow us to probe §YIntergalactic Space§!.\n\nGenerating the wormholes is however not free and will incur an §YEnergy§! and §YQuasi-Negative Mass§! upkeep based on our current number of §YPops§! (§Y4§! £energy£ & §Y0.04§! £giga_sr_negative_mass£ per), §YPlanets§! (§Y100§! £energy£ & §Y1§! £giga_sr_negative_mass£ per) and §YShips§! (§Y2§! £energy£ per). "
  
  supermassive_ehof_1:99 "Supermassive E.H.O.F. Electroweak Hyperframe"
  supermassive_ehof_1_DESC:99 "The Electroweak Hyperframe plays the crucial role of generating an electroweak field around the event horizon, out of which probabilistic microwormholes may then be plucked."
  
  supermassive_ehof_2:99 "Supermassive E.H.O.F. Quasi-Field Manipulators"
  supermassive_ehof_2_DESC:99 "The Quasi-Field Manipulators bend and twist the Hyperframe's electroweak field, allowing for near-total control of quasi-space across the galaxy."
  
  supermassive_ehof_3:99 "Supermassive E.H.O.F."
  supermassive_ehof_3_DESC:99 "The Supermassive E.H.O.F. can generate a near-endless amount of micro-wormholes anywhere within the galaxy, enabling unprecedented mobility and cohesion. As such, upkeep scales directly with pop, planet and ship count."
  
  supermassive_ehof_3_no_catapult:99 "Supermassive E.H.O.F."
  supermassive_ehof_3_no_catapult_DESC:99 "$supermassive_ehof_3_DESC$² "
  
  requires_ehof_phase_04:99 "$TRIGGER_FAIL$Requires the £engineering_research£ §Y$tech_ehof_phase_04$§! technology."
  
  ap_supermassive_ehof:99 "Unshackled Transportation"
  ap_supermassive_ehof_desc:99 "For too long, the sheer size of the galaxy has stood as an ever-present impediment to our galactic ambitions. No longer! An upscaled Event Horizon Offset Facility built around the galactic core shall enable us to link even the furthest reaches of our empire together and will allow our mighty warships to cross the void with utmost ease."
  
  giga_tech_supermassive_ehof:99 "Event Horizon Offset Facility Hyperscaling"
  giga_tech_supermassive_ehof_desc:99 "The culmination of E.H.O.F. development coupled with the latest advancements in gigastructural engineering. This monstrous construct, built around the largest of black holes, is theoretically capable of generating a near-infinite amount of microwormholes anywhere within the galaxy, enabling both never-seen-before mobility for our fleets as well as the drastic curbing of most distance-related logistical issues inherent to our empire's size."
  allow_supermassive_ehof:99 "§HUnlocks Megastructure:§! $name_supermassive_ehof$"
  desc_supermassive_ehof:99 "The Supermassive E.H.O.F. allows unmatched FTL movement and empire cohesion."
  
  requires_no_existing_supermassive_ehof:99 "$TRIGGER_FAIL$Can only construct one $name_supermassive_ehof$."
  
  giga_blokkat.10021.name:99 "Intergalactic Probing Proposal"
  giga_blokkat.10021.desc:99 "With the gravitational anomaly barreling towards our galaxy at alarming speeds, some are proposing that rather than sit idly waiting for the object to arrive, we take proactive action and utilize our §YSupermassive E.H.O.F.§! to directly fling a probe towards the approaching anomaly within intergalactic space.\n\nIf successful, this would undoubtedly yield some valuable data pertaining to the object's nature, but we should, of course, be ready for anything. Now, if we are to go through with this, several different options have been brought forward.\n\nFirst, we could play it safe and simply send an uncrewed science ship to probe the anomaly and retrieve as much data as possible. if the anomaly turns out to be hostile or dangerous, we wouldn't lose much and it would provide us with valuable insight on how to best prepare for its arrival.\n\nAlternatively, a more brazen option would be to send a fleet to intercept the anomaly and perhaps destroy it before it reaches us, but we really have no idea how powerful it actually is and so there is no guarantee of success.\n\nAnd last, but not least, some argue that bothering with sending an expensive fleet would be little more than a waste of resources, and instead advocate for us to send a powerful explosive device through, which would be a risk-free way of attempting to destroy or at least repel the anomaly by diverting its course."
  giga_blokkat.10021.a:99 "Let's just send an uncrewed science probe."
  giga_blokkat.10021.b:99 "Our fleets will make quick work of whatever that thing is!"
  giga_blokkat.10021.c:99 "A powerful explosive device should hopefully knock it off-course."
  giga_blokkat.10021.d:99 "Rejected. Not worth the risk and expenses."
  
  EHOF_PROBE_BLOKKATS:99 "Probe Intergalactic Anomaly"
  EHOF_PROBE_BLOKKATS_DESC:99 "Sending an uncrewed science ship to the intergalactic anomaly may shed some light on its true nature. As we are unlikely to actually get the ship back, we should not put a leader on it."
  
  EHOF_FIGHT_BLOKKATS:99 "Engage Intergalactic Anomaly"
  EHOF_FIGHT_BLOKKATS_DESC:99 "We shall send a warfleet to intercept and hopefully destroy the anomaly before it reaches us. However, as there's no guarantee of success, we should probably not commit too large of a fleet in the event of a failure.\n§RThis will commit whatever fleet is being used to research the project!§!"
  
  giga_blokkat.10022.name:99 "Intergalactic Anomaly Probing Report"
  giga_blokkat.10022.desc:99 "Our §YSupermassive E.H.O.F.§!'s staff brings... ominous news.\n\nWhile our uncrewed science ship has successfully made it to the anomaly, it could only spend a few precious seconds probing it before being destroyed by cataclysmic energies. And the data it sent back has confirmed our empire's worst fear: the object is not natural.\n\nIt is a ship! More precisely a gargantuan vessel of utterly alien design, comprised of large concentric rings arranged around some sort of high-energy core.\n\nUnfortunately there was not enough time to understand what the purpose of its components were and most of the data beamed back is currently unusable due to a critical lack of context. Fortunately our scientists believe that we might be able to complete our analysis once the anomaly actually arrives, but for now, we should prepare for the worst."
  
  giga_blokkat.10023.name:99 "Intergalactic Anomaly Battle Report"
  giga_blokkat.10023.desc:99 "Going where no [Root.GetSpeciesName] has gone before, our warfleet streaks through intergalactic space, riding the pocket of infinitely-twisted space woven by our §YSupermassive E.H.O.F.§! at speeds unseen.\n\nWithin mere days the anomaly comes into sight, and, to everyone's utter dismay and surprise, it is... small? No more than a few hundred kilometers across, it could be encompassed within the breadth of our warfleet several times over. Whatever the case, it matters not as the fleet opens fire, cannons big and small showering the anomaly in ordnance powerful enough to level most of [ROOT.Capital.GetName].\n\nBut nothing happens. The anomaly, utterly unfazed by our intervention, continues onwards, our fleet struggling to catch up. And so we open fire once more, but this time, there is a response as the anomaly suddenly stops. In an instant, energy readings spike, and... all is quiet.\n\nOur high command scrambles to regain contact, receiving nothing but silence. The conclusion is clear: whatever, or whoever that thing is, we must be ready to deploy everything's we've got against it when it finally arrives."
  giga_blokkat.10023.a:99 "We will overcome. Prepare to fight."
  giga_blokkat.10023.b:99 "Ensure that our grand projects are ready in time."
  giga_blokkat.10023.c:99 "Invest more in technological progress."
  giga_blokkat.10023.d:99 "We shall wait and see."
  
  giga_blokkat.10024.name:99 "Intergalactic Anomaly Bombing Report"
  giga_blokkat.10024.desc:99 "Our §YSupermassive E.H.O.F.§!'s staff reports that they have successfully flung an explosive device towards the anomaly in intergalactic space, yielding... mitigated results.\n\nThe anomaly's course remains completely unchanged despite being impacted in a way that should have knocked it away from our galaxy, however its speed has been somewhat reduced which should hopefully buy us some more time to prepare for its arrival.\n\nInterestingly however, this slowdown occurred some time after the actual impact rather than directly afterwards, leading some to wonder if it might be the result of something, or someone, inside the anomaly reacting to the impact as opposed to being forcefully decelerated by it.\n\nRegardless, we estimate that this has bought us an additional §Yfive years§! to prepare for the arrival..."
  giga_blokkat.10024.a:99 "Splendid."
  
  preparing_to_fight_blokkats:99 "Intergalactic Anomaly - Military Preparation"
  preparing_to_tech_blokkats:99 "Intergalactic Anomaly - Technological Preparation"
  preparing_to_mega_blokkats:99 "Intergalactic Anomaly - Engineering Preparation"
  
  probed_blokkats_early:99 "Blokkat Probing Data"
  fought_blokkats_early:99 "Blokkat Combat Data"
  
  giga_blokkat.10025.name:99 "Intergalactic Anomaly Combat Data Analysed"
  giga_blokkat.10025.desc:99 "Following the Blokkats' arrival within our galaxy, our Research Bureau has been hard at work studying what little data we managed to acquire from our brief combat stunt with the Blokkat-Vester in intergalactic space.\n\nBy crossing it with the flood of data coming in from current Blokkat studies, we should be able to gain a slight military edge against Blokkat vessels."
  giga_blokkat.10025.a:99 "Excellent. So it wasn't all for nothing."
  
  giga_blokkat.10026.name:99 "Intergalactic Anomaly Probing Data Analysed"
  giga_blokkat.10026.desc:99 "Following the Blokkats' arrival within our galaxy, our Research Bureau has been hard at work studying the data our probe managed to acquire when it came into contact with the intergalactic anomaly.\n\nBy crossing it with the flood of data coming in from current Blokkat studies, we should be able to understand the Blokkats at least a little better."
  giga_blokkat.10026.a:99 "Delightful!"
  
  tremendous_ring:0 "Потрясающая система колец"
  tremendous_ring_desc:0 "Этот газовый гигант имеет гигантскую кольцевую систему, диаметр которой оценивается в 3,78 миллиона километров."
  
  methane_oceans:0 "Метановые океаны"
  methane_oceans_desc:0 "В этом холодном бесплодном мире есть небольшие океаны жидкого метана внутри крупнейших астероидных кратеров."
  
  nanite_deserts:0 "Нанитовые пустыни"
  nanite_deserts_desc:0 "50% пустынь этой планеты состоят из наномашин, имитирующих песок."
  
  coreless_planet:0 "Планета без ядра"
  coreless_planet_desc:0 "На этой планете полностью отсутствует железное ядро, что делает ее ценной для физических исследований."
  
  core_facility:0 "Установка Ядра"
  core_facility_desc:0 "На этой планете полностью отсутствует железное ядро, но есть гигантский исследовательский центр под поверхностью, который можно использовать для продвинутых исследований."
  
  cataclysmic_star:0 "Катаклизмическая переменная звезда"
  cataclysmic_star_desc:0 "Эта звезда содержит белый карлик, что приводит к крайней нестабильности внутри самой звезды."
  
  oxygen_world:0 "Мир кристаллического кислорода"
  oxygen_world_desc:0 "Поверхность этой планеты состоит из кристаллизованного кислорода, что делает ее чрезвычайно ценной с научной точки зрения."
  
  natural_network:0 "Естественная глобальная сеть"
  natural_network_desc:0 "Уникальный род растений создает обширную сеть по всей планете, что делает ее действительно ценной с научной точки зрения."
  
  fire_life:0 "Плазматические формы жизни"
  fire_life_desc:0 "На этой планете обитают уникальные плазматические формы жизни, что делает ее крайне враждебной для органической жизни."
  
  red_toxic:0 "Красный токсичный мир"
  red_toxic_desc:0 "Недавно обнаруженный токсичный мир, атмосфера которого заполнена неизвестным токсичным веществом красного цвета."
  
  scarlet_scourge:0 "Красный токсичный мир"
  scarlet_scourge_desc:0 "Невероятно враждебный мир с атмосферой, наполненной красными частицами передового синтетического токсина, который, кажется, выходит из-под контроля."
  
  remnants_civ:0 "Остатки цивилизации"
  remnants_civ_desc:0 "В этом мире остались остатки некогда великой цивилизации, поврежденные эффектами Алой Плети."
  
  the_repository1:0 "Репозиторий"
  the_repository1_desc:0 "Огромный исследовательский центр Кузница инноваций позволяет проводить в этом мире передовые исследования и разработки."
  
  the_repository2:0 "Репозиторий"
  the_repository2_desc:0 "Огромный исследовательский центр Кузницы инноваций позволяет проводить в этом мире продвинутые исследования и разработки, даже если Плеть все еще присутствует."
  
  urmazin_utopia:0 "Утопия Урмазин"
  urmazin_utopia_desc:0 "Урмазин изолирован от остальной галактики в раю, чему же быть недовольным?"
  
  
  # Immunity
  giga_compound_immunity:99 "Immune to Damage"
  weapon_type_anticompound:99 "§YAnticompound§!"
  mod_weapon_type_anticompound_weapon_damage_mult:99 "Anticompound Weaponry"
  
  # Situation
  compound_situation:99 "Break $ehof_the_compound$"
  compound_situation_type:99 "Break $ehof_the_compound$"
  compound_situation_desc:99 "We must investigate ways to damage $ehof_the_compound$ if we are to survive. Let us hope there will be enough time to find a solution."
  compound_situation_monthly_change_tooltip:99 "Survival is Paramount"
  
  compound_situation_desc_1:99 "Observe the $ehof_the_compound_text$ and create a plan on how to proceed.\n\n§ROur choice will be locked in after§! §Y1 Year§! £time£ §R.§!"
  compound_situation_desc_2:99 "Keep your eyes open for opportunities to analyze our opponent."
  compound_situation_desc_2_a:99 "If we abandon our resolve now, it'll be too late to try again. Experiments must be complete for our empire must survive."
  compound_situation_desc_3:99 "We will wait for a solution... there is nothing to do but hope."
  compound_situation_desc_3_a:99 "We have gained basic $giga_sr_negative_mass$ weapons, but they are small and weak. At least they can buy some time."
  compound_situation_desc_3_b:99 "Our experiments failed. All we can do now is hope it's not too late."
  
  compound_situation_finisher:99 "The proper solution will reveal itself in time, but this could take too long.\n\nShould we wait or should we take action?\nWhatever it may be, we must be swift."
  compound_situation_stage_1_tooltip:99 "Observation Stage"
  compound_situation_stage_2_tooltip:99 "Experimentation Stage"
  compound_situation_stage_3_tooltip:99 "Application Stage"
  
  compound_approach_wait:99 "Gather Data"
  compound_approach_wait_tooltip:99 "We can afford to wait and observe until we have gathered more information."
  compound_approach_qnm1:99 "Quick Solution"
  compound_approach_qnm1_tooltip:99 "We could try radical approaches, and try to find a quick solution."
  compound_approach_qnm2:99 "Prototype Ships"
  compound_approach_qnm2_tooltip:99 "Since we cannot get samples from the $ehof_the_compounds_text$ fleets, we must field-test experimental technologies in the hope that we find one which works."
  compound_approach_qnm3:99 "Negative Mass Weapons"
  compound_approach_qnm3_tooltip:99 "We have learned that $giga_sr_negative_mass$ can hurt the $ehof_the_compound_text$. While we haven't yet unlocked their true potential, we can at least make small weapons which utilize this type of matter."
  compound_approach_blokkat:99 "Blokkat Weaponry"
  compound_approach_blokkat_tooltip:99 "Blokkat weaponry shreds reality at a fundamental level. It might be able to harm these creatures."
  compound_approach_DEBUG:99 "§PDEBUG§!"
  compound_approach_DEBUG_tooltip:99 "§PTHIS IS A DEBUG COMMAND AND NOT SUPPOSED TO BE SEEN§!\n\n\n"
  compound_approach_DEBUG_ADD:99 "§PADDITION (DEBUG)§!"
  compound_approach_DEBUG_SUB:99 "§PSUBTRACT (DEBUG)§!"
  compound_approach_DEBUG_VAR:99 "$compound_approach_DEBUG_tooltip$VAR owner.compound_protoships_eaten: [owner.compound_protoships_eaten]\n\n\n"
  
  compound_gimmeyaships:99 "Test $ehof_the_compound$"
  compound_gimmeyaships_type:99 "Test $ehof_the_compound$"
  compound_gimmeyaships_desc:99 "Even though we have no way to harm them, we will throw our ships at the $ehof_the_compound_text$ to try and discover some sort of weakness.\n\n§WWe must feed §!§Y[owner.compound_protoships_tobeeaten]§!§W ships to their forces before the timer in the $compound_situation$ situation runs out.§!"
  compound_gimmeyaships_monthly_change_tooltip:99 "Spaceship Buffet"
  
  compound_gimmeyaships_approach:99 "Spaceship Buffet"
  compound_gimmeyaships_approach_tooltip:99 "Our [Owner.GetEngineerPlural] have equipped our fleets with random prototype technologies meant to test anything and everything they can. Throw them at the $ehof_the_compound_text$ to see what happens."
  
  compound_gimmeyaships_finisher:99 "The experimental technologies equipped on our sacrificial ships have, at last, yielded insight into the nature of the $ehof_the_compound_text$.\n"
  
  # Situation Events
  compound_situation.1.title:99 "Blokkat Weaponry"
  compound_situation.1.desc:99 "We already have everything we need to crush the $ehof_the_compound_text$. There is no need to waste time with silly projects."
  compound_situation.1.a:99 "§RWe'll show them what we got!§!"
  compound_situation.1.a.tooltip:99 "§RCancel the Situation§!"
  compound_situation.1.b:99 "It would be wise to investigate anyways."
  
  compound_situation.2.title:99 "To Wait and Watch"
  compound_situation.2.desc:99 "We have decided the $ehof_the_compound_text$ is not an immediate threat to us. We can afford to watch them before we decide our next move."
  compound_situation.2.a:99 "It's just another crisis."
  
  compound_situation.3.title:99 "Searching for Solutions"
  compound_situation.3.desc:99 "The $ehof_the_compound_text$ is a seemingly-unstoppable threat - but we've seen enough in this universe to know that there's always an answer somewhere, somehow. They must have a weakness.\n\nWe will build many ships with different experimental weapons, and fight until something works."
  compound_situation.3.a:99 "Research with guns, not labs!"
  
  compound_situation.4.title:99 "Weakness Found"
  compound_situation.4.desc:99 "We did it! We managed to find an elusive weakness of the $ehof_the_compound_text$ - one that even they might not be aware of. It turns out that $giga_sr_negative_mass$ can harm them! Unfortunately, our mastery over this technology is limited, and we are only able to come up with smaller weapon designs. These should be enough to buy us more time, at least."
  compound_situation.4.a:99 "This'll do nicely, good job everyone."
  
  compound_situation.5.title:99 "We Failed to Find a Weakness"
  compound_situation.5.desc:99 "Even though we tried our best, we simply failed to find and exploit any meaningful weakness in the $ehof_the_compound_text$. There is not much time left, and the leaders of our empire have begun to lose hope in overcoming this crisis."
  compound_situation.5.a:99 "Hope is such a fleeting thing, isn't it?"
  
  compound_situation.6.title:99 "Still Waiting"
  compound_situation.6.desc:99 "While we wait for something to happen, the galaxy burns around us.\n\nJust ignore the $ehof_the_compound_text$ and it'll be alright.\n\nIgnorance is bliss, right?"
  compound_situation.6.a:99 "This is fine."
  
  compound_situation.9.title:99 "Project Aborted"
  compound_situation.9.desc:99 "We have received news of a better solution to deal with the $ehof_the_compound_text$ and have aborted our current project."
  compound_situation.9.a:99 "Well, at least we can fight them now."
  
  compound_situation.10.title:99 "Data Gathered"
  compound_situation.10.desc:99 "We have recorded massive amounts of data on the way that the $ehof_the_compounds_text$ ships react to our attacks. Now, we wait for our experts to analyze them and come up with a solution."
  compound_situation.10.a:99 "This better have been worth it."
  compound_situation.10.a.tooltip:99 "$compound_situation$ Situation advances by §G+20 points§!"
  
  # Custom tooltips statuses
  compound_situation_already_open:99 "Dialog already open, close it first."
  compound_situation_no_qnm_tech:99 "\n§RPerhaps the answers we seek lie through the wormholes produced by an $ehof_ehof_abr$...§!"
  compound_situation_chosen_route:99 "We have already chosen our route."
  compound_situation_qnm2_failed:99 "We have failed to discover their weakness."
  
