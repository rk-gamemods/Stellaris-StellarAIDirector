  bombardment_compound:0 "Орбитальная трансмутация"
  bombardment_compound_desc:0 "$bombardment_compound$ бомбардировка очищает планету, избавляя от существования всего живого.\n- §RМассивный§! урон §ХАрмии§!\n- §RМассивное§! повреждение §HПланеты§!\n- §RМассивный§! урон §HНаселению§!\n- Бомбардирует незащищенные планеты\n- Может сделать планеты непригодными для жизни"
  
  resolution_galactic_focus_crisis_compound:0 "Сосредоточить на: $ehof_the_compound$"
  resolution_galactic_focus_crisis_compound_desc:0 "$ehof_the_compound$ представляет угрозу для всего живого в галактике. Если мы не объединимся, чтобы остановить это, они всех нас уничтожат. Мы должны сделать борьбу с этим кризисом в центре внимания Галактики."
