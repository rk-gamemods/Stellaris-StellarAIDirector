  #################################
  ####### DEVASTATED SYSTEM #######
  #################################
  ehof_anomaly.14.name:0 "Разрушенная система"
  ehof_anomaly.14.desc:0 "В тот момент, когда мы достигли §H[root.solar_system.GetName]§!, мы обнаружили короткий подпространственный сигнал, который был отправлен звездой системы. Сигнал подпространства был похож на тот, который передавал сообщение о решении проблемы $ehof_the_compound$ по всей галактике.\n\nОднако сигнал не единственное, что мы обнаружили в системе. Разорение распространяется по всей системе. Все планеты либо разбиты на части, либо горят. Самая внутренняя планета даже полностью уничтожена, осталось лишь несколько больших частей и пояс астероидов вокруг центра.\n\nПричина этого опустошения до сих пор неизвестна, но, похоже, оно было вызвано звездой системы. Она имеет аномальное распределение энергии и демонстрирует необычные свойства на своей поверхности и слоях.\n\nТакие невероятные разрушения, естественно, могут быть вызваны только чрезвычайно мощным выбросом энергии, подобным сверхновой, но звезда все еще там.\n\nСлучилось что-то ужасное с этой звездой, и она, по-видимому, является источником сообщения, что делает ее исследование более важным, чем что-либо еще."
  ehof_anomaly.14.a:0 "Наконец-то! Надеюсь, мы сможем положить конец этому галактическому кошмару!"
  
  INVESTIGATE_WOUNDED_STAR:0 "Разрушенная система"
  INVESTIGATE_WOUNDED_STAR_DESC:0 "Наш научный корабль находится на пути к исследованию системы §H[root.solar_system.GetName]§!.\n\nЕе секреты могут наконец дать нам доступ к решению с $ehof_the_compound$. Если нет, то хотя бы найдем источник сообщения."
  
  ehof_anomaly.10021.name:0 "Раненая звезда"
  ehof_anomaly.10021.desc:0 "Наше исследование системы §H[root.solar_system.GetName]§! выяснило, что на поверхности звезды обнаружена гигантская звездная аномалия. Гигантское углубление диаметром около 3,3 миллиона километров.\n\nОно конечно меньше самого красного гиганта, диаметр которого составляет около 105 миллионов километров, но, тем не менее, оно все равно невероятно массивно.\n\nПредполагается, что вдавливание - это «ударный кратер», остатки столкновения с звездой с астрономической энергией.\n\nКакой был ударник, неизвестно, но он должен был быть либо действительно массивным, либо очень быстрым.\n\nМы не можем точно рассчитать, когда произошло столкновение, из-за быстро меняющейся поверхности звезды. Постоянно меняющаяся поверхность звезды делает даже такие огромные изменения поверхности неузнаваемыми в течение нескольких сотен лет.\n\nСамо столкновение запустило гигантское количество звездной плазмы по всей системе, расплавляя, разрушая и нагревая каждую планету в системе.\n\nВоздушный элемент все еще может быть узнаваемым и, возможно, имеет какое-то отношение к сообщению.\n\nПотребуется исследование внешнего и внутреннего слоев звезды, чтобы найти следы ударного элемента или даже самого ударного элемента."
  ehof_anomaly.10021.a:0 "Сделайте все необходимое, чтобы найти ударный элемент!"
  
  INVESTIGATE_STELLAR_WOUND:0 "Раненая звезда"
  INVESTIGATE_STELLAR_WOUND_DESC:0 "Наши ученые готовят несколько кораблей, оснащенных сканерами высокой интенсивности, для сканирования всей звезды на предмет ударного элемента.\n\nВ связи с постоянно меняющимся характером поверхностей и внутренних частей звезд, ударный элемент может, в зависимости от размера, располагаться за пределами исходного пути, по которому он ударил по звезде.\n\nПолное сканирование §H[root.solar_system.GetName]§! таким образом будет необходимо."
  
  ehof_anomaly.10022.name:0 "Дремлющий Левиафан"
  ehof_anomaly.10022.desc:0 "Мы, наконец, закончили исследование внешних слоев §H[root.solar_system.GetName]§! и результаты просто поразительны.\n\nСтолкнулась не большая планета со звездой, а корабль, или, по крайней мере, мы предполагаем, что это корабль.\n\nУдарный элемент - это гигантская искусственная конструкция, которая столкнулась со звездой тысячелетия назад. Насколько мы можем судить, она все еще цела, и, возможно, она является источником самого сообщения!\n\nРазмер конструкции невообразим для корабля, почти 2300 километров в длину. Его масса составляет около 980,2 квадриллиона тонн, масса небольшой карликовой планеты.\n\nДля корабля такого размера скорость, необходимая для высвобождения такого невероятного количества энергии, по-прежнему огромна. Релятивистские скорости необходимы, чтобы нанести такой серьезный ущерб звезде и всем окружающим планетам с такой низкой массой (по сравнению с планетами-гигантами).\n\nНаши ученые экстраполировали модель удара с помощью сложных симуляций и определили , что он должен, независимо от угла столкновения, иметь скорость не менее 5000 километров в секунду. Фактическая скорость, вероятно, была выше. Мы не сможем определить точную скорость, но наши ученые просят, чтобы мы попытались изучить само судно.\n\nУсилия для этого определенно будут огромными, потому что корабль находится в конвективной зоне звезды, примерно 8 миллионов километров под звездной фотосферой (поверхностью).\n\nВ связи с тем, что корабль все еще не поврежден после того, как он выдержал температуру более 20000 °C в течение тысячелетий, само столкновение, возможно, является функциональным и, скорее всего, источник сообщения, безусловно, будет стоить огромных усилий!"
  ehof_anomaly.10022.a:0 "Не существует слишком высокой цены!"
  
  INVESTIGATE_DORMANT_LEVIATHAN:0 "Дремлющий Левиафан"
  INVESTIGATE_DORMANT_LEVIATHAN_DESC:0 "Для выполнения исследовательского проекта гигантского космического корабля, находящегося внутри §H[root.solar_system.GetName]§!, потребуются огромные ресурсы и самые передовые технологии нашей империи и империй наших союзников.\n\nИсследователи и инженеры со всей империи отправляются в систему, чтобы построить необходимое оборудование и конструкции для проекта."
  
  ehof_anomaly.10023.name:0 "Достижение Левиафана"
  ehof_anomaly.10023.desc:0 "Мы сделали это! Наконец-то нам удалось добраться до спящего гигантского космического корабля в §H[root.solar_system.GetName]§!. Это было невероятное мероприятие.\n\nИсследователи и инженеры нашей империи и наши союзники с почти безграничным запасом ресурсов и временем в качестве своего единственного врага смогли построить то, что они называют «звездный трос-антилифт».\n\nЭто гигантское сооружение, туннель/кабель шириной до 50 километров и общей длиной 8 миллионов километров, который тянется от фотосферы звезды по всей ее конвективной зоне до места расположения левиафана.\n\nАнтилифт сделан из самых современных самосохраняющихся материалов, известных галактике, чтобы выдерживать и адаптироваться к невероятным условиям в конвективной зоне звезд.\n\nНа нижнем конце антилифта, на котором расположен левиафан, внутри звездной плазмы построено множество станций вокруг корабля, оснащенных гравитационными манипуляторами. Эти станции удерживают колоссальный корабль на месте, чтобы его не унесло потоком звездной плазмы.\n\nНа стороне левиафана был построен относительно небольшой купол, соединенный с антилифтом. Этот купол представляет собой защищенную зону, созданную для работы с самим левиафаном, не опасаясь испарения из-за огромной жары.\n\nКроме того, теперь мы могли эффективно определять состояние судна, которое на самом деле кажется в основном цело. До сих пор неизвестно, как корабль смог выжить внутри этой звезды в течение многих тысячелетий без каких-либо значительных повреждений, но технология корабля кажется намного более продвинутой, чем даже самые передовые технологии павших империй.\n\nНи одному из наших сканеров не удалось пробить неизвестные материалы корпуса. Несмотря на то, что корпус кажется твердым, при ближайшем рассмотрении этот материал больше похож на супертвердые тела, материалы, которые обладают как твердыми, так и текучими свойствами. Постоянно меняющийся квази-супертвердый материал может объяснить способность корабля выживать внутри звезды.\n\nНаши ученые пытаются найти способ попасть внутрь корабля, но ждут одобрения на это."
  ehof_anomaly.10023.a:0 "Утвердительно. Попробуйте войти в корабль!"
  
  ENTERING_LEVIATHAN:0 "Вход в Левиафан"
  ENTERING_LEVIATHAN_DESC:0 "Наши ученые сейчас пытаются найти способ войти в бездействующий космический корабль-левиафан.\n\nКто знает, какие технологические чудеса ждут нас внутри этого загадочного колосса.\n\nНадеемся, мы сможем подтвердить его как источник сообщения. Он может даже содержать решения для самого $ehof_the_compound$!"
  
  ehof_anomaly.10024.name:0 "Пробуждение"
  ehof_anomaly.10024.desc:0 "Мы не ожидали, что произойдет нечто подобное! Как только мы попытались использовать наши инструменты, чтобы открыть путь через внешний корпус корабля, корпус начал меняться и образовался большой проход, который позволил нам войти в корабль. Проход был достаточно большим, чтобы мы могли использовать несколько транспортных средств одновременно, чтобы войти внутрь корабля.\n\nВнутри стены были окрашены в чистый белый цвет и постоянно менялись, превращаясь в жидкость. Плавление и затвердевание с неизвестной целью. Структура жидких стен была однородной, без каких-либо различий в структуре, за исключением различий, создаваемых их постоянно меняющимся состоянием.\n\nКорридор также был максимально пустым. Мы не смогли найти внутри ничего технологического или научного, кроме самого коридора.\n\nХотя коридор менялся, его протяженность всегда оставалась неизменной, пока мы не достигли нашего окончательного местоположения.\n\nЧерез несколько минут мы достигли гигантского пустого зала, сделанного из той же постоянно меняющейся жидкости, что и коридор. Вначале внутри зала ничего не было, но это быстро изменилось.\n\nБесконечное количество неопознанных сущностей, появившихся из жидких стен, начали входить в зал.\n\nСущества, к счастью, не пришли напасть на нас. Они собрались в гигантский октаэдр, образованный из той же постоянно меняющейся жидкости, что и стены.\n\n И Он начал говорить с нами, мысленно, поскольку каким-то образом может напрямую подключаться к нашему разуму, возможно, через псионическую телепатию. Он представился как доминирующее сознание этого корабля и сказал нам, что очень рад, что мы его нашли.\n\nОн требует немедленного контакта с нашими лидерами, поскольку на кону судьба Вселенной."
  ehof_anomaly.10024.a:0 "Будьте готовы ко всему. Свяжите меня с сущностями!"
  
  REPAIR_ANNIHILATOR:0 "Реабилитация Левиафана"
  REPAIR_ANNIHILATOR_DESC:0 "Мы договорились помочь $ehof_the_stellar_annihilator$ и отремонтировать его энергетическое ядро, чтобы вывести его из этой звезды и вернуться в большой космос.\n\nЭто будет немалый подвиг, и для этого потребуется, чтобы наша нация в целом собралась вместе и собрала все материалы, которые потребуются для этой гигантской операции."
  
  annihilator_dialog.006.desc:0 "Все ремонтные работы завершены, $ehof_shroud_ftl$ запускается, цель §H[root.Capital.GetName]§!.\n\nЯ буду защищать вас, но мы обязательно уничтожим $ehof_preservation_sphere$.\n\n§G(Используйте пользовательский интерфейс ниже, если вы хотите изменить приказы для $ehof_the_stellar_annihilators$)§!"
  annihilator_dialog.006.tooltip:0 "$ehof_the_stellar_annihilator$ оставляет §H[annihilator_spawn_here.GetName] star§! и инициирует $ehof_shroud_ftl$ передвижение в §H[root.Capital.GetName]§!"
  
  
  
