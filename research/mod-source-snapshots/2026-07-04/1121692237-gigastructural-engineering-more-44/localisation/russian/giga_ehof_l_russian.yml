  # Anomaly
  code_3_cat:0 "Код реальности - замороженный мир"
  code_03_category_desc:0 "§H[this.GetName]§! получил еще одну передачу $ehof_epcs$ внутри системы §H[root.solar_system.GetName]§!. Восстановлена ​​функциональность кораблей и определено местонахождение источника. Замороженная планета §H[from.from.GetName]§!.\n\nТочное местоположение на планете или внутри нее необходимо определить в ходе расследования."
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.301.name:0 "Код реальности - замороженный мир"
  ehof_reality_code.301.desc:0 "§H[root.GetName]§! определил местонахождение объекта-усилителя внутри §H[from.from.GetName]§!.\n\nОн расположен на глубине около 470,8 км под северным полушарием планеты. Чтобы добраться до этого места, потребуются раскопки. Потребуются специализированные инструменты, чтобы эффективно копать холодную замороженную поверхность мира.\n\nМы должны вложить необходимое время и ресурсы в проект, чтобы узнать больше о $ehof_epcs$, объектах усилителях и $PGATE_GALACTIC$."
  
  # Initial
  code3_digsite:0 "Код реальности - Замороженные раскопки"
  code3_digsite_desc:0 "Оборудование, необходимое для раскопок на §H[code_world_planet.GetName]§! готово к развертыванию. Прежде чем мы сможем начать раскопки, необходимо закрепить место раскопок и установить оборудование."
  
  # Stage 1
  ehof_reality_code.311.name:0 "Код реальности - Замороженные раскопки I"
  ehof_reality_code.311.desc:0 "Чтобы защитить место раскопок от низких температур, был построен большой купол со слабой теплопроводностью, который будет удерживать тепло внутри купола. Оборудование смонтировано и готово к развертыванию. Из-за мерзлой поверхности, мерзлой коры и глубины источника для этих раскопок будет использоваться специализированная буровая установка с пилотом.\n\nОна достигнет источника, пробурив земную кору и внешнюю мантию, пока не достигнет месторасположение объекта. Теперь отряд можно развернуть."
  
  # Stage 2
  ehof_reality_code.312.name:0 "Код реальности - Замороженные раскопки II"
  ehof_reality_code.312.desc:0 "Пилотируемая буровая установка сообщила, что достигла места расположения источника. Все как в прошлый раз. Пустота, внутри которой расположен усилитель.\n\nЭкипаж пилотируемой буровой установки готов предпринять необходимые шаги для входа на объект."
  
  # Stage 3
  ehof_reality_code.313.name:0 "Код реальности - Замороженные раскопки III"
  ehof_reality_code.313.desc:0 "Команда смогла получить доступ к усилителю и извлечь еще один фрагмент загадочной кодовой последовательности.\n\nКроме фрагмента, команда смогла собрать дополнительную информацию о транспортном механизме $ehof_epcs$. Основываясь на знаниях, уже собранных внутри другого усилителя, и информации, найденной в новом, команда смогла определить, как активировать $PGATE_GALACTIC$!. $PGATE_GALACTIC$ необходимы три вещи, чтобы реагировать на передачу $ehof_epcs$ и активировать транспортацию его по межзвездному пространству.\n\nВо-первых, гравиэлектромагнитные волны, которые переносят последовательность $ehof_epcs$, должны обладать удельной энергией. Если содержание энергии даже немного отличается, независимо от того, меньше оно или больше, $PGATE_GALACTIC$ не будет реагировать на передачу и нейтрализовать гравиэлектромагнитную волну. Во-вторых, волна, которая переносит последовательность $ehof_epcs$, должна быть гравиэлектромагнитной.\n\nПричина этого, по-видимому, в том, что $PGATE_GALACTIC$ не будет активироваться другими формами излучения с таким же содержанием энергии необходимым для активации $PGATE_GALACTIC$. В-третьих, необходимо идеально настроить последовательность кода загадочного шаблона, чтобы активировать $PGATE_GALACTIC$.\n\nЭто служит способом гарантировать, что $PGATE_GALACTIC$ активируется только тогда, когда это действительно необходимо, а не случайно. Экипаж также смог получить дополнительные сведения о $ehof_sm$ от усилителя.\n\nБлагодаря новой информации, которую команда могла извлечь из базы данных усилителя, они смогли и дальше управлять приказами ИИ до такой степени, что можно было бы использовать $ehof_sm$ не только для самовосстанавливающихся структур, состоящих из $ehof_sm$, но даже для восстановления других структур, отличных от $ehof_sm$. Добавив дополнительные заказы, посвященные ремонту систем, к которым прикреплен или интегрирован $ehof_sm$, можно было бы использовать $ehof_sm$ для ремонта таких конструкций, как корпуса кораблей. Бригада буровой установки готовится к выходу на поверхность."
  
