  #############################################################################################################################################
  INVESTIGATE_CORE_ANOMALY:0 "Основная аномалия"
  INVESTIGATE_CORE_ANOMALY_DESC:0 "Проект исследования основной аномалии на §H[from.GetName]§! был одобрен, и наши лучшие ученые и инженеры сейчас строят конструкцию, которая сможет достичь основной аномалии. Тогда мы сможем раскрыть ее секреты."
  
  ehof_anomaly.10001.name:0 "Основной объект"
  ehof_anomaly.10001.desc:0 "Исследование центра на §H[from.from.GetName]§! было успешно завершено. Наша исследовательская группа обнаружила, что основная аномалия на §H[from.from.GetName]§!, на самом деле является гигантским заброшенным исследовательским центром, созданным неизвестной развитой цивилизацией.\n\nОсновное сооружение, похоже, полностью работоспособно, но было немного повреждено в результате неизвестного инцидента.\n\nПо результатам разведки, был построен объект для изучения экзотических условий внутри центра на §H[from.from.GetName]§! и использования их для экспериментов и исследований.\n\nЧто случилось с теми, кто построенный основной объект неизвестен.\n\nРасследование ущерба, причиненного инцидентом, показывает, что объект не подвергается никакому риску и безопасен для возобновления исследовательской деятельности.\n\nНаши ученые просят, чтобы мы использовали объект для в наших собственных интересах и говорят, что это было бы действительно полезно для наших исследований."
  ehof_anomaly.10001.a:0 "Невероятно. Подготовьте основной объект к восстановлению."
  ehof_anomaly.10001.b:0 "Демонтируйте самую ценную технику и покиньте объект."
  
  ################################4
  
  EXPLORE_LARGE_STATION:0 "Поврежденная космическая станция"
  EXPLORE_LARGE_STATION_DESC:0 "Наше правительство одобрило проект исследования поврежденной космической станции на орбите §H[from.GetName]§!, и наши ученые сейчас готовят вооруженную исследовательскую группу, которая будет исследовать станцию."
  
  ehof_anomaly.10002.name:0 "Заброшенная правительственная резиденция"
  ehof_anomaly.10002.desc:0 "Исследовательская группа, которая исследовала большую космическую станцию ​​на орбите §H[from.from.GetName]§!, смогла определить ее первоначальную цель.\n\nНа основе данных, которые команда смогла собрать, большая космическая Станции была центральным правительственным центром бывшей цивилизации на §H[from.from.GetName]§!. Она использовалась аналогично тому, как устроены транснациональные / планетарные коллективные правительства.\n\nЦивилизация на §H[from.from.GetName]§! находилась на грани глобального конфликта из-за растущей напряженности между странами-членами транснационального правительства.\n\nНапряжение возникло из-за отсутствия важного ресурса на §H[from.from.GetName]§!, который назывался "Гонва".\n\nНаши ученые не смогли идентифицировать указанный ресурс исключительно на основе неповрежденных записей на станции, но он был важен для целостности их общества.\n\nВ конечном итоге борьба между народами привела к термоядерной войне, которая, конечно же, опустошила §H[from.from.GetName]§!"
  ehof_anomaly.10002.a:0 "Какой ужас. Другое общество, разрушенное собственной жадностью!"
  
  ################################
  
  STUDY_NATURAL_NETWORK:0 "Род взаимосвязанных растений"
  STUDY_NATURAL_NETWORK_DESC:0 "Наши ученые готовятся к обширной исследовательской деятельности в лесах на §H[from.GetName]§!, чтобы узнать больше об уникальном роде растений, создающем глобальную сеть на планете."
  
  ehof_anomaly.10003.name:0 "Планета-растение-мозг"
  ehof_anomaly.10003.desc:0 "Длительное изучение взаимосвязанного рода растений на §H[from.from.GetName]§!, привело к невероятному открытию.\n\nРастения на самом деле ведут себя как гигантский мозг, раскинувшийся по всему земному шару. Единичные растения или, скорее, колонии растений функционируют как отдельные нейроны или синапсы.\n\nПланета-растение-мозг, похоже, обладает какой-то примитивной формой сознания, как у животных, но все же совершенно другой.\n\nПопытки общения с мозг приводили к ошибкам, которые либо основывались на том, что мозг недостаточно развит для логических операций похожих на мысли, или вообще не может общаться.\n\nНезависимо от сознания мозга, его функциональность дала нам представление о продвинутой сетевой механике, которую мы можем использовать для исследования технологий, полезных для наших собственных сетей."
  ehof_anomaly.10003.a:0 "Какое интересное открытие!"
  
  ################################
  
  EXPLORE_ABANDONED_STATION:0 "Астероидная станция"
  EXPLORE_ABANDONED_STATION_DESC:0 "Было отправлено несколько вооруженных исследовательских групп, чтобы исследовать, казалось бы, заброшенную астероидную станцию.\n\nОни должны определить ее первоначальную цель и найти следы жизни, которые, возможно, не были обнаружены нашими датчиками."
  
  ehof_anomaly.10004.name:0 "Загадочная колония Отрекшихся"
  ehof_anomaly.10004.desc:0 "Наше исследование подключенной астероидной станции привело к странным открытиям, которые еще предстоит понять.\n\nОсновываясь на наших открытиях, станция изначально была полностью самодостаточной колонией, способной вместить и поддерживать сотни тысяч жителей.\n\nЗаписи, обнаруженные в компьютерных системах, показали, что это было убежище для цивилизации, планета которой была разрушена огромной тектонической катастрофой, которую они назвали «Великим расколом». Похоже, что эта планета является самой потрескавшейся в этой системе.\n\nУ станции сбивает с толку тот факт, что она полностью заброшена. Не было обнаружено ни одной формы биологической жизни, даже микробов в искусственной атмосфере. Похоже, что колония была полностью лишена жизни в результате неизвестного события.\n\nВсе записи за период времени продолжительностью около 17 минут, были повреждены 32 года и 121 день назад по неизвестным причинам. Возможно, что инцидент, который привел к исчезновению всего живого на станции, произошел в течение этих 17 минут.\n\nНаши ученые обсуждают, было бы предпочтительнее занять важные технические средства станции и уйти из-за загадочное исчезновение прежних жителей, или может ли он использоваться как ценная колония для нашего народа."
  ehof_anomaly.10004.a:0 "Станция слишком полезна, чтобы ее оставлять просто так."
  ehof_anomaly.10004.b:0 "Это место кажется проклятым. Лучше оставим его!"
  
  ehof_anomaly.16.name:0 "Исчезновение"
  ehof_anomaly.16.desc:0 "Это ужасно! Мы неожиданно получили сообщения от §H[from.from.GetName]§! о внезапных, странных и сильных психических расстройствах наших колонистов. Скорость, с которой у жителей начались сбои, увеличилась, и внезапно стало тихо.\n\nМы послали группу расследования к нашим колонистам, просто чтобы обнаружить, что все они исчезли. Так же, как и первоначальные жители §H[from.from.GetName]§!, наши колонисты исчезли по неизвестным причинам.\n\nВсе записи также снова повреждены.\n\nПричины этих аномальных событий на §H[from.from.getName]§! остается загадкой."
  ehof_anomaly.16.a:0 "Мы должны были лучше все разузнать."
  
  ################################
  
  STUDY_PLASMATIC_LIFE:0 "Изучение плазматических форм жизни"
  STUDY_PLASMATIC_LIFE_DESC:0 "Наше правительство одобрило прямое исследование плазменных форм жизни.\n\nУсиленные и защищенные отряды готовятся к развертыванию в смертоносной среде на §H[from.GetName]§!, где температура поверхности может достигать 485° Цельсия."
  
  ehof_anomaly.10005.name:0 "Неорганическая плазматическая жизнь"
  ehof_anomaly.10005.desc:0 "Интенсивное изучение образцов плазматических форм жизни и наблюдение за их экосистемами привело к поразительным результатам. Анализ их псевдогенетической основы привел к открытию, что эти формы жизни являются действительно неорганическими биологическими формами жизни. В отличие от машин, которые являются неорганическими, но не биологическими.\n\nУсловия для развития неорганической жизни невероятно сложны и редки, поэтому почти ничего не было обнаружено ранее.\n\nУникальный биологический состав их клеток делает использование механизмов интенсивного высокотемпературного окисления и простой, но все же грозной металлической жидкости, которая служит их «кровью», для генерации метаболических процессов.\n\nЭто дает им возможность выживать и процветать в этой экстремальной среде.\n\nОбнаружены одноклеточные, но также и многоклеточные организмы, способные к бесполому размножению. Никаких форм полового размножения пока не обнаружено, но наши ученые хотят начать второе исследование, чтобы найти более сложные организмы и, возможно, даже развитые организмы, способные к социальным взаимодействиям или тому подобному."
  ehof_anomaly.10005.a:0 "Удивительные существа. Разверните исследование."
  ehof_anomaly.10005.b:0 "Лучше оставить эту уникальную экосистему в покое."
  
  INVESTIGATE_INTELLIGENT_PLASMATICS:0 "Поиск передовых плазматических организмов"
  INVESTIGATE_INTELLIGENT_PLASMATICS_DESC:0 "С одобрения правительства наши исследователи начали интенсивное и амбициозное исследование плазматической экосистемы на §H[from.GetName]§!, Чтобы найти разумные плазматические организмы, потенциально способные к социальному взаимодействию."
  
  ehof_anomaly.10006.name:0 "Плазматическое общество"
  ehof_anomaly.10006.desc:0 "Наше исследование плазматической экосистемы на §H[from.from.GetName]§! привело к удивительному прорыву.\n\nБлизко к южному полюсу §H[from.from.GetName]§! наши исследователи обнаружили социальных плазматических существ. Эти существа, похоже, могут строить простые конструкции и использовать свои тела в качестве инструментов, при этом они могут общаться друг с другом и формировать крошечные стаи. Эти стаи повышают выживаемость отдельных существ.\n\nОсновываясь на проанализированных данных наблюдений, они находятся на стадии, предшествующей охоте, через которую обычно проходят социально индивидуализированные существа. Они все еще далеки от высокоразвитых социальных существ, но, тем не менее, это невероятное открытие.\n\nПродолжительное наблюдение будет действительно полезно для эволюционной биологии и экзобиологических исследований."
  ehof_anomaly.10006.a:0 "Может быть, однажды мы найдем еще больше подобных существ!"
  
  #################################
  #########RED TOXIC WORLD#########
  #################################
  
  ehof_red_toxic_digsite:99 "The Scarlet Scourge"
  ehof_red_toxic_digsite_desc:99 "High-intensity scanners that will use x-rays to penetrate the thick atmosphere are being prepared to scan the surface. Our [Owner.GetScientistPlural] hope that these scans will reveal the origin of the red fog that blankets this planet, as they speculate that it does not have a natural origin."
  
  ehof_red_toxin.41.name:99 "Poisoned Paradise"
  ehof_red_toxin.41.desc:99 "Our attempt to conduct an x-ray scan of §H[from.Planet.GetName]§! was a success.\n\nOur systems mapped an 82,844 square kilometer area of the surface. Forests and cities are located on the planets surface, or, at least, the remnants of them. From this we can determine that a civilization once existed on §H[from.Planet.GetName]§!, and at least plant life was once part of the planet's ecosystem.\n\nThe architecture and size of the buildings indicate that the civilization was substantially developed, but the absence of substantial orbital debris indicates they never achieved permanent presence beyond the planet.\n\nWhether the civilization is responsible for the red fog remains unknown.\n\nUnfortunately, a surface exploration will be necessary to find out more about what happened to the planet. Only finding records from the extinct civilization and samples of the surface and environment will tell us more about the red fog and its origin.\n\nThe red fog makes it very dangerous for organic lifeforms. Due to the danger posed to any expedition, advanced robotic exploration units are being used there instead, equipped with corrosion-resistant armor and energy shields."
  ehof_red_toxin.41.a:99 "Prepare the exploration team."
  
  ehof_red_toxin.42.name:99 "The Scarlet Scourge"
  ehof_red_toxin.42.desc:99 "The exploration of §H[from.Planet.GetName]§!'s surface was successful, and we have determined the nature of the red fog.\n\nCalled \"The Scarlet Scourge\" by the former inhabitants of §H[from.Planet.GetName]§!, it is an advanced synthetic toxin created by members of the former civilization of §H[from.Planet.GetName]§!.\n\nBy whom, and why, the toxin was created were facts unknown to the general population of the planet, and even examining confidential records of government and scientific institutions failed to reveal the origin of the Scarlet Scourge.\n\nAll that we know right now is that the toxin suddenly appeared at a location in the northern hemisphere named the \"ORIGIN site\", 321 galactic standard years ago, and within a year it had covered the entire planet, utterly destroying its biosphere.\n\nThe toxin is composed of particles ranging in diameter from 0.1 to 100 microns. This diversity of size makes it extremely difficult to contain or filter, while also enabling it to pervade through every level of the atmosphere. Most concerningly, the toxin appears able to self-replicate via as-yet-unknown means.\n\nOur [Owner.GetScientistPlural] believe further exploration of the ORIGIN site on §H[from.Planet.GetName]§! will answer our remaining questions about the Scourge."
  ehof_red_toxin.42.a:99 "We need to find out where the Scarlet Scourge came from."
  
  ehof_red_toxin.421.name:99 "ORIGIN Site Expedition"
  ehof_red_toxin.421.desc:99 "Our robotic exploration units are being replaced and prepared for exploring the ORIGIN site. The location might not only be the source of the Scarlet Scourge, but potentially even the place it was originally created."
  
  ehof_red_toxin.43.name:99 "Innovation Forge's Compound 23RCA"
  ehof_red_toxin.43.desc:99 "The investigation of the ORIGIN site revealed even more secrets about the Scarlet Scourge than we had anticipated.\n\nThe ORIGIN site, internally named \"Hazard Testing Ground Y-173\", was not the place the Scarlet Scourge was created, but rather a testing site utilized by the institution responsible for the toxin's creation. The site consists of an observation post embedded in the apex of a large dome, which in turn once enclosed a small towns and small forests. These were originally inhabited by test subjects of §H[from.Planet.GetName]§!'s dominant species, though fossil evidence indicates that other animal life was also present.\n\nComposed of advanced isolation materials, the dome was supposed to prevent the Scourge from leaking into the atmosphere. Unfortunately, even the toxin's creators underestimated its effects. The Scourge corroded the dome's material and entered into the atmosphere, heralding the beginning of the end for all life on §H[from.Planet.GetName]§!.\n\nData extraction and recovery from the damaged systems at the site indicate it was run by a privately-owned research and development organization named Innovation Forge.\n\nThe Scarlet Scourge (internally referred to as \"Compound 23RCA\") was tested at the ORIGIN site to study its effects on organic and inorganic matter within a realistic environment - members of the species present in the test were told that they were participating in a climate control experiment.\n\nThe records also revealed the original main facility of Innovation Forge, a location called \"the Repository\". This site was not just where the Scourge was originally created, but also the incubator for many of Innovation Forge's other great creations.\n\nOur [Owner.GetScientistPlural] want to explore the Repository in order to find out how the Scarlet Scourge was synthesized and uncover any other Innovation Forge research that could prove useful."
  ehof_red_toxin.43.a:99 "The data within the Repository could be really useful!"
  
  ehof_red_toxin.431.name:99 "The Repository"
  ehof_red_toxin.431.desc:99 "The Repository is the target of our final exploration on §H[from.Planet.GetName]§!. Armed robotic exploration units are being deployed for this mission.\n\nIf the Repository is truly the birthplace of Innovation Forge's greatest creations, it may be dangerous in ways we cannot yet anticipate."
  
  ehof_red_toxin.44.name:99 "The Source and the Solution"
  ehof_red_toxin.44.desc:99 "Our exploration of the Repository was a complete success.\n\nThe Repository is a gigantic facility built underneath a big mountain chain.\n\nLike the data we recovered from the ORIGIN site indicated, it was a treasure trove of technological innovation, with technology vastly superior to anywhere else on the planet.\n\nThe Repository was protected by internal security systems which turned out to be a challenge, even for our units, but after we overcame its security, we had free run of the facility.\n\nWe were able to locate the lab in which the Scarlet Scourge was originally created, and there, we able to find out everything there is to know about it.\n\nIt was the first fully-functioning prototype of a series of terraforming agents created by the Innovation Forge. These agents would be deployed via space vessels onto hostile but potentially habitable planets, in order to cleanse their atmosphere from hazardous substances - including biological ones.\n\nThe agent turned out to behave differently than expected, and in the end, proved too effective at its intended task.\n\nWithin the heart of the facility, we located an advanced intelligence that turned out to be an ensemble of the Innovation Forge's greatest [Owner.GetScientistPlural], who had uploaded their consciousness to escape the Scourge. They told us more about the Repository, the civilization of §H[from.Planet.GetName]§!, the Scarlet Scourge, and about their solution for the Scarlet Scourge crisis.\n\nAs the Scourge swept across the planet, they constructed a gigantic tower named \"the Catalyst\" close to the south pole. It was meant to cleanse the atmosphere from the Scarlet Scourge. Their initial attempt to do so failed because they were not able to find a way to stop the Scarlet Scourge from replicating, and they lacked the resources necessary for a second attempt.\n\nThe ensemble told us that our superior technology may enable us to determine how to defeat the Scourge's self-replication and cleanse the atmosphere.\n\nWe can now either purify this world and make it habitable once again, or use the Scarlet Scourge for our own means."
  ehof_red_toxin.44.a:99 "The Scourge is a monstrosity. Free the planet from it!"
  ehof_red_toxin.44.b:99 "The Scourge could be really useful..."
  
  ################################
  
  INVESTIGATE_ONE_ORBIT:0 "Одна орбита"
  INVESTIGATE_ONE_ORBIT_DESC:0 "Спустя короткое время после того, как мы прибыли в §H[root.solar_system.GetName]§!, наши датчики обнаружили странное расположение планет.\n\nПохоже, что в звездной системе есть две планеты, которые находятся на одной орбите. Их расстояние от звезды почти одинаковое.\n\nНаши ученые хотят исследовать эти две планеты дальше, чтобы узнать больше о них и об этом странном расположении."
  
  ehof_anomaly.10011.name:0 "Один рай"
  ehof_anomaly.10011.desc:0 "Исследуя первую из двух планет в §H[root.solar_system.GetName]§!, планету §H[from.from.GetName]§!, мы выяснили, что это редкий, чрезвычайно пригодный для жизни мир Gaia.\n\nОн обладает массой выше средней и обычной плотностью каменных планет. Планетная экосистема невероятно разнообразна, и там существует бесчисленное множество видов.\n\nИзучение этой планеты может быть действительно ценным для наших биологических исследований, но мы сосредоточены на изучении сестры §H[from.from.GetName]§!."
  ehof_anomaly.10011.a:0 "Печально, что мы не можем узнать больше об этом оружии."
  
  ################################
  
  INVESTIGATE_ONE_ORBIT_2:0 "Одна орбита II"
  INVESTIGATE_ONE_ORBIT_2_DESC:0 "Исследование на §H[from.from.GetName]§! в конечном итоге покажет нам, как устроено это странное планетное устройство."
  
  ehof_anomaly.10012.name:0 "Райские близнецы"
  ehof_anomaly.10012.desc:0 "Наше исследование второй планеты в §H[root.solar_system.GetName]§!, §H[from.from.GetName]§!, обнаружила нечто невероятное.\n\n§H[from.from.GetName]§! имеет не только те же свойства, что и ее близнец, но и является миром Gaia!\n\nОбе планеты являются мирами Gaia, которые имеют одинаковую массу, плотность, наклон, орбиту, скорость вращения и орбитальную скорость. Единственное, что отличает их друг от друга? это их экосистема и тот факт, что они находятся в разных местах.\n\nВся система кажется слишком нереальной, но все же она здесь. Они должны быть искусственного происхождения. Вероятность естественного развития такого планетного тандема практически равна нулю.\n\nПризнаки создателей этой системы еще не найдены ..."
  
  ################################
  
  INVESTIGATE_SCARRED_PLANET:0 "Шрам"
  INVESTIGATE_SCARRED_PLANET_DESC:0 "Шрам будет изучен на предмет его геологической структуры и состава материалов, чтобы выяснить, что его создало.\n\nСканеры также анализируют окружающие области и сам Шрам, чтобы обнаружить необычные вещества. Наши ученые подозревают, что Шрам мог быть образован в результате применения оружия."
  
  ehof_anomaly.10013.name:0 "Огромная выемка"
  ehof_anomaly.10013.desc:0 "Наши интенсивные усилия по расследованию Шрама подтвердили, что одна из гипотез формирования Шрама верна. На самом деле Шрам был создан путем развертывания массивного оружия.\n\nМы уже видели оружие такого масштаба, но именно это оружие, которое, скорее всего, вызвало образование Шрама, делает этот случай таким увлекательный. Геологическое строение, угол по отношению к поверхности планеты, которая ориентирована от поверхности планеты на 60 километров вниз до верхней мантии, и обнаруженные необычные вещества в этом районе, наводят на подозрение, что Шрам был создан как результат развертывания огромного кинетического оружия. Кроме того, наши датчики смогли определить неправильный путь излучения по всему каньону.\n\nОднако радиоактивное загрязнение не является результатом радиоактивных веществ, таких как плутоний, а является результатом воздействия интенсивного гамма-излучения. Это приводит к открытию, что кинетический снаряд, поразивший поверхность планеты и создавший Шрам, также был, по крайней мере частично, составлен из антивещества.\n\nПричина, по которой кто-то выстрелил в планету из такого разрушительного оружия, неизвестна. Это могло быть по любой причине. Испытания оружия, война или демонстрация силы.\n\nКроме того, наш ученый смог определить возраст Шрама примерно с точностью до 1,25 миллиона лет. Поскольку Шрам такой старый, любые попытки узнать больше об этом оружии будут тщетными."
  
  ################################
  
  ehof_megastructure.016.name:0 "Таинственный камень"
  ehof_megastructure.016.desc:0 "Один из наших научных кораблей обнаружил большой, очень яркий объект рядом с центром системы §H[root.solar_system.GetName]§!.\n\nПервоначально ошибочно принятый за нейтронную звезду, объект оказался какой-то конструкцией неизвестного происхождения. Энергетические значения и сигнатуры, излучаемые объектом, огромны и мешают нашим щитам по всей системе.\n\nПри ближайшем рассмотрении он выглядит как круглая конструкция размером с планету с загадочными глифами на верхней и нижней поверхностях, которые излучают чрезвычайно интенсивный синий свет. Более глубокое сканирование объекта ничего о нем не сообщает, поскольку значения, возвращаемые нашими датчиками, странные и неразборчивые, возможно, из-за сильных помех.\n\nПрямое исследование конструкции невозможно, так как излучаемая ею энергия настолько огромна, что температура в непосредственной близости от нее колеблется от минимума в 5 миллионов Кельвинов до триллиона Кельвинов на глифах.\n\nПока что, нам придется оставить конструкцию как есть."
  ehof_megastructure.016.a:0 "Огромный!"
  
  ################################
  
  ehof_megastructure.017.name:0 "Изначальный столп"
  ehof_megastructure.017.desc:0 "Один из наших научных кораблей обнаружил один из загадочных Изначальных Столпов! Он расположен внутри системы §H[root.solar_system.GetName]§!.\n\nДо нас дошли только слухи об этих конструкциях, но, как нам стало известно, они должны быть чем-то вроде гиперпродвинутых врат, позволяющих путешествовать во внегалктические системы. Конструкция действительно большая, диаметром около 90 000 километров в самом большом ее разрезе."
  ehof_megastructure.017.a:0 "Очаровательно!"
  
  ################################
  
  ehof_megastructure.018.name:0 "Конструкция над черной дырой"
  ehof_megastructure.018.desc:0 "В центра системы §H[root.solar_system.GetName]§! находится поврежденная орбитальная структура, которая, по-видимому, окружает центральную черную дыру. На первый взгляд конструкция кажется нефункциональной и заброшенной. Чтобы определить ее назначение, нам нужно изучить конструкцию."
  ehof_megastructure.018.a:0 "Интригующе!"
  
  EXPLORE_RUINED_EHOF:0 "Исследуйте конструкцию над черной дырой"
  EXPLORE_RUINED_EHOF_DESC:0 "Проект исследования поврежденной конструкции вокруг черной дыры внутри системы §H[root.solar_system.GetName]§! продолжается. Чтобы определить ее назначение, нам придется отправить разведывательные подразделения в остатки конструкции."
  
  ################################
  
  INVESTIGATE_ENIGMATIC_PATTERN:99 "An Enigmatic Pattern"
  INVESTIGATE_ENIGMATIC_PATTERN_DESC:0 "Экипаж §H[ehof_code_fleet.GetName]§! помнит только 12-часовой период и $ehof_eps$, но, к счастью, они смогли записать $ehof_eps$ с портативных устройств.\n\nСообщения с судна требуют дальнейшего изучения, чтобы попытаться разобраться в них.\n\nНикто не знает, откуда взялась энергетическая вспышка, попавшая в §H[ehof_code_fleet.GetName]§!, это произошло в одной из, и без того странных, систем $ehof_cohesive$.\n\nТем временем нашим научным судам было рекомендовано следить за новыми энергетическими вспышками и $ehof_eps$ при изучении систем $ehof_cohesive$."
  
  ehof_reality_code.002.name:0 "Кодовая последовательность"
  ehof_reality_code.002.desc:0 "Мы совершили прорыв в изучении $ehof_ep$.\n\nЭтот шаблон является частью расширенной последовательности передачи информации и энергии, отправленной из неизвестного места. Кодовая последовательность способна заражать и захватывать логические структуры, такие как сосуды.\n\nЭнергетическая интенсивность кодовой последовательности привело к обнаружению того, что затемнение на §H[ehof_code_fleet.GetName]§! не было результатом удара энергетической вспышки в судно, корабль просто не мог справиться с огромной сложностью информации, что привело к полному его отключению.\n\nПоследовательность на самом деле была причиной странного поведения на корабле, включая проявление самой кодовой последовательности в виде визуальной информации на мониторах или механической информации о дверях.\n\nПервоначальное использование последовательности и ее значение неясно, но благодаря нашей науке мы смогли сравнить шаблоны $ehof_closed_modular$ и $ehof_ep$.\n\n$ehof_closed_modular$ - это небольшие комплексы с автономным питанием, расположенные в основных зонах наших судов и работающие даже после полного отключения основного и вспомогательного силовых ядер. Они оснащены возможностью подключаться к определенным частям корабля и повторно активироваться, полностью отключая их от основных систем. С этими комплексами корабли снова смогут работать в течение часа.\n\nСканеры $ehof_ep$, подобно $ehof_closed_modular$, также имеют автономное питание и оснащены экспериментальными блоками обработки информации, специально разработанными для $ehof_ep$. Они смогут извлекать образец и обрабатывать его, не страдая от отключения электроэнергии.\n\nС помощью этой новой технологии наши научные корабли теперь могут безопасно пересекать системы $ehof_cohesive$ и готовы к следующей передаче $ehof_ep$."
  
  ################################
  
  EXPLORE_CREATOR_PLANET:0 "Исследование $ehof_the_sphere$"
  EXPLORE_CREATOR_PLANET_DESC:0 "Теперь, когда $ehof_the_sphere$ предоставил нам доступ к своему внутреннему пространству, мы наконец можем раскрыть его секреты. Кто знает, какие загадочные и технологические чудеса и загадки мы откроем внутри него!"
  
  ehof_anomaly.10417.name:0 "Микровселенная в оболочке"
  ehof_anomaly.10417.desc:0 "После многих лет исследований $ehof_the_sphere$ его секреты были раскрыты.\n\nВнутри него находится нечто, что можно описать только как миниатюрную вселенную, огромный пузырь свернутого пространства-времени! $ehof_the_sphere$ служит защитной, постоянно меняющейся и неразрушимой оболочкой, предотвращающей влияние внешней вселенной.\n\nПространственно-временной объем этой микровселенной складывается обратно пропорционально внешнему пространству, в результате чего объем внутри $ehof_the_sphere$ в несколько тысяч раз больше чем сама $ehof_the_sphere$.\n\nМикровселенная разделена на две отдельные области: внешний и внутренний объем. Два объема разделены разной плотностью энергии вакуума.\n\nВнешний объем имеет плотность энергии вакуума, практически идентичную плотности энергии внешней Вселенной, и заполнен сотнями звезд. Бесчисленные технологические объекты расположены во внешнем объеме, которые, кажется, используют энергию звезд, квантовые флуктуации энергии вакуума и даже сверхмерные энергии неизвестного происхождения.\n\nВнутренний объем кажется пустой пустотой, заполнены чисто парами античастица-частица от квантовых флуктуаций. Однако он обладает гораздо большей плотностью энергии вакуума, чем внешний объем.\n\nНаш вывод приводит к предположению, что причиной разделения объема на два разных объема является генерирование смехотворно большого количества энергии! Вся энергия извлекается из внешнего объема, а затем перекачивается во внутренний объем. Энергосодержание внутреннего объема было определено как минимум 10 ^ 49 Джоулей, что эквивалентно полной массе-энергии тысячи звезд.\n\nКроме того, мы смогли определить, что усилители и $PGATE_GALACTIC$ работают в унисон как распространители энергии и информации, которые разбросаны по всей галактике. Они используются для создания гигантской сети распределения энергии и информации и должны использовать энергию, предоставляемую $ehof_the_sphere$, для создания квазиотрицательной массы. Усилители - это ретрансляторы загадочного паттерна, разумный административный протокол галактической распределительной сети и генераторы квазиотрицательной массы.\n\n$PGATE_GALACTIC$ используются для распределения порядков $ehof_the_sphere$ по сети и передачи информации между усилители и $ehof_the_sphere$. Это означает, что в галактике гораздо больше $ehof_cohesive$ систем, чем мы ожидали!\n\nК сожалению, мы все еще не смогли определить первоначальную цель этой гигантской конструкции и сети, но самое удивительное открытие заключается в том, что $ehof_the_sphere$ - не единственная конструкция такого типа, и есть по крайней мере еще несколько, расположенных где-то за пределами нашей галактики.\n\nЧего бы ни хотели создатели этих огромных конструкций, для этого требовалось больше энергии, чем тысячи звезд могли выделить за всю свою жизнь! Где и кто создатели - неизвестно."
  ehof_anomaly.10417.a:0 "Это величайшее научное открытие всех времен!"
  
  ehof_anomaly.10418.desc:99 "We have further determined that the $ehof_ep$ transmitters and $PGATE_GALACTICS$ we've encountered during our pursuit of the $ehof_epcs$ are all subsidiary to the $ehof_the_sphere$. These structures are sent energy and data broadcasts from the $ehof_the_sphere_named$ via micro-wormholes. That data, of course, is the $ehof_ep$, which in turn controls the $ehof_ep$ transmitter and $PGATE_GALACTIC$ network.\n\nBy monitoring the destinations of these transmissions, we have found that there are many more $ehof_cohesive$ systems outside the galaxy than previously anticipated! The most astonishing revelation is that the $ehof_the_sphere_named$ is not the only source of these transmissions - there are more located beyond our galaxy.\n\nUnfortunately, we were still not able to determine the original purpose of the $ehof_the_sphere$ and its network, or any information about who created it. Whatever the goal was, it needed more energy than thousands of stars could generate in their entire lifetime!"
  
  #############################################################################################################################################
  ### Anomalies ###############################################################################################################################
  #############################################################################################################################################
  tremendous_ring_system_category:0 "Аномальный газовый гигант"
  tremendous_ring_system_category_desc:0 "Газовый гигант §H[from.GetName]§! в §H[root.solar_system.GetName]§! проявляет необычное распределение масс и масштабные свойства.\n\nНаши ученые хотели бы исследовать планету, чтобы узнать больше об этой планетарной аномалии."
  
  ehof_anomaly.01.name:0 "Потрясающая система колец"
  ehof_anomaly.01.desc:0 "Мы обнаружили, что газовый гигант §H[from.GetName]§! обладает гигантской системой колец, намного больше, чем средняя система колец.\n\nСогласно оценкам, диаметр системы колец составляет около 3,78 миллиона километров, что на многие величины превосходит собственный диаметр планеты в 171557 километров.\n\nКаким образом такая планета сформировала такую впечатляющую кольцевую систему является предметом текущих аналитических исследований космологических вычислений и астрономической математики."
  ehof_anomaly.01.a:0 "Очаровательно."
  
  ################################
  
  methane_oceans_category:0 "'Не такой уж и бесплодный мир"
  methane_oceans_category_desc:0 "Сканеры нашего научного корабля обнаружили аномальные свойства на поверхности бесплодной планеты §H[from.GetName]§! в §H[root.solar_system.GetName]§!.\n\nНаши ученые хотят исследовать планету, чтобы узнать больше об этой планетарной аномалии."
  
  ehof_anomaly.02.name:0 "Метановые океаны"
  ehof_anomaly.02.desc:0 "Наши ученые обнаружили, что кажущаяся бесплодной планета §H[from.GetName]§! не совсем бесплодна.\n\nНа поверхности §H[from.GetName]§! расположены маленькие океаны жидкого метана в огромных кратерах, образованных столкновениями с астероидами. Океаны могут существовать, потому что температура поверхности в этих кратерах составляет от -193 °C до -143 °C, в зависимости от дневного/ночного цикла в мире.\n\nМетановые океаны §H[from.GetName]§! могут содержать простые формы неорганической биологической жизни.\n\nЕсли в метановом океане присутствует какая-либо форма жизни, это должно обсуждаться в сообществе исследователей экзобиологии."
  ehof_anomaly.02.a:0 "Захватывающе."
  
  ################################
  
  nanite_deserts_category:0 "Странные пустыни"
  nanite_deserts_category_desc:0 "Поверхность пустынной планеты §H[from.GetName]§! в §H[root.solar_system.GetName]§! демонстрирует странные свойства.\n\nПо результатам сканирования научного корабля наши ученые хотят отправить группу исследователей, чтобы узнать больше об этой планетарной аномалии."
  
  ehof_anomaly.03.name:0 "Нанитовые пустыни"
  ehof_anomaly.03.desc:0 "Мы обнаружили, что 50% пустынь §H[from.GetName]§! состоят из песчинок, имитирующих наномашины.\n\nОстальные 50% пустынь состоят из природных гранулированных материалов, как и большинство пустынь на других планетах в галактике.\n\nНа основе прямого анализа отобранных образцов «нанит-песок», мы обнаружили, что наномашины, похоже, не обладают какими-либо более высокими функциями.\n\nНанит-песок выглядит идентично «нормальному» песку, найденному в других природных пустынях, и его можно отличить только с помощью микроскопического анализа .\n\nПричины использования этих наномашин и почему только 50% пустынь §H[from.GetName]§! сделаны из них, остается загадкой."
  ehof_anomaly.03.a:0 "Удивительно!"
  
  ################################
  
  coreless_planet_category:0 "Планета без ядра"
  coreless_planet_category_desc:0 "Бесплодная планета §H[from.GetName]§! в §H[root.solar_system.GetName]§! демонстрирует странные свойства в отношении своего внутреннего состава и структуры.\n\nДля того, чтобы узнать больше об этой планетарной аномалии, требуются дальнейшие исследования."
  
  ehof_anomaly.04.name:0 "Аномалия планетарного ядра"
  ehof_anomaly.04.desc:0 "Наши ученые обнаружили, что планета §H[from.GetName]§! не имеет настоящего ядра.\n\nУ нее полностью отсутствует железное ядро, а ее каменная мантия полностью достигает того места, где должно быть его ядро. В центре планеты находится аномальная структура.\n\nНаши ученые не уверены, состоит ли она из экзотического материала или это искусственная структура.\n\nОни хотят отправить группу исследователей внутрь планеты, чтобы узнать больше об этой аномалии, но чтобы добраться до объекта, потребуется время и ресурсы."
  ehof_anomaly.04.a:0 "Впечатляет. Отправьте команду исследователей."
  ehof_anomaly.04.b:0 "Мы не должны этого делать."
  
  ################################
  
  cataclysmic_star_category:0 "Интенсивная звезда"
  cataclysmic_star_category_desc:0 "Звезда §H[from.GetName]§! излучает интенсивные нерегулярные энергетические сигнатуры и показывает аномальное распределение масс.\n\nДля того, чтобы узнать больше об этой звездной аномалии, требуются дальнейшие исследования."
  
  ehof_anomaly.05.name:0 "Катаклизм переменной звезды"
  ehof_anomaly.05.desc:0 "Мы обнаружили, что звезда §H[from.GetName]§! содержит в себе звезду §HD-класса§!, точнее, ее остаток §Hелый карлик§!.\n\nБелый карлик увеличил массу звезды в 1,2 раза и находится в радиоактивной зоне звезды, ее \"мантии\".\n\n§HБелый карлик§! приводит к крайней нестабильности в ядре §H[from.GetName]§!, что, по всей видимости, является причиной интенсивных, частых и нерегулярных плазменных взрывов, выбрасывающих в космос миллиарды тонн звездной массы.\n\nЗвезда §HD-класса§!, вероятно, столкнулась с §H[from.GetName]§! несколько миллионов лет назад и была полностью поглощен звездой.\n\n§H[from.GetName]§! нестабильности приведут к гораздо более ранней смерти звезды, скорее всего, в течение следующих 100000 лет."
  ehof_anomaly.05.a:0 "Ужасно!"
  
  
  ################################
  
  oxygen_world_category:0 "Аномальная замороженная планета"
  oxygen_world_category_desc:0 "Наш научный корабль обнаружил аномальные свойства в поверхностном льду §H[from.GetName]§ !, в системе §H[root.solar_system.GetName]§!.\n\nНаши ученые хотели бы отправить на планету группу исследователей, чтобы узнать больше об этой планетарной аномалии."
  
  ehof_anomaly.06.name:0 "Кристаллизованный кислородный мир"
  ehof_anomaly.06.desc:0 "Наши ученые обнаружили, что поверхностный лед §H[from.GetName]§! это не водяной лед или сухой лед, а кристаллизованный кислород.\n\nСредняя температура поверхности §H[from.GetName]§! чрезвычайно низка и на 51 градус ниже точки плавления кислорода.\n\nТребования к существованию стабильного твердого кислорода в звездной системе чрезвычайно трудно выполнить.\n\n§H[from.GetName]§! действительно уникальный мир. §H[from.GetName]§! станет центральной исследовательской площадкой для будущих проектов в области физики низких температур."
  ehof_anomaly.06.a:0 "Потрясающе!"
  
  ################################
  
  abandoned_seat_category:0 "Опустошенный мир"
  abandoned_seat_category_desc:0 "Опустошенная планета, мир-гробница под названием §H[from.GetName]§! была обнаружена одним из наших научных кораблей.\n\nОна находится в §H[root.solar_system.GetName]§! и обладает небольшим кольцом, состоящим из космического мусора, который, по всей видимости, является остатками бывших спутников и космических станций.\n\nНаши ученые считают, что то же событие, которое разрушило §H[from.GetName]§!, также несет ответственность за уничтожение спутников и космических станций.\n\nОни хотели бы исследовать кольцо обломков и саму планету, чтобы узнать больше о том, что случилось с миром."
  
  ehof_anomaly.07.name:0 "Поврежденная космическая станция"
  ehof_anomaly.07.desc:0 "В кольце обломков вокруг §H[from.GetName]§!, наши ученые обнаружили большую космическую станцию.\n\nСканирование с нашего научного корабля намекает, что космическая станция имеет признаки умеренного структурного повреждения и, похоже, заброшена.\n\nНеповрежденные конструкции станции демонстрируют уникальный внешний вид по сравнению с остальным космическим мусором.\n\nНаши ученые предполагают, что станция имела большое значение для цивилизации, которая когда-то населяла ее теперь уже разрушенный мир.\n\nОни хотят продолжить исследование станции в надежде узнать, что случилось с §H[from.GetName]§!."
  ehof_anomaly.07.a:0 "Интересно, исследуйте станцию!"
  ehof_anomaly.07.b:0 "Не все секреты нужно раскрывать."
  
  ################################
  
  natural_network_category:0 "Мыслящая планета?"
  natural_network_category_desc:0 "Мы обнаруживаем странные сигналы со всего обитаемого мира §H[from.GetName]§! в §H[root.solar_system.GetName]§!.\n\nОбнаруженные сигналы похожи на волновые модели мозга животных, и наши ученые уже действительно сбиты с толку, живет ли планета или это что-то совсем другое.\n\nДля того, чтобы узнать больше, необходимы дальнейшие исследования. об этой планетарной аномалии."
  
  ehof_anomaly.08.name:0 "Естественная глобальная сеть"
  ehof_anomaly.08.desc:0 "Мы обнаружили, что флора §H[from.GetName]§! соединена гигантской сетью взаимосвязанных колоний растений по всей планете.\n\nЭта сеть воплощена в едином роде растений, которые, кажется, имеют способность соединяться друг с другом через свои корни. Род растений доминирует на планете, составляя около 65% планетарной флоры. Они являются источником странных сигналов, которые были обнаружены нашим научным кораблем.\n\nНаши ученые предполагают, что сеть имеет хотя бы незначительную форму квазиневрологической активности. Указанная активность, вероятно, по-прежнему будет отличаться от нейронной активности животных из-за ее растительной природы.\n\nНаши ученые хотят расширить исследования растений, чтобы узнать больше о них и глобальной сети."
  ehof_anomaly.08.a:0 "Увлекательно, расширяйте исследования растений!"
  ehof_anomaly.08.b:0 "Пусть растения будут растениями."
  
  ################################
  
  connected_asteroid_category:0 "Астероидная станция"
  connected_asteroid_category_desc:0 "В §H[root.solar_system.GetName]§!, в поле астероидов было обнаружено неестественное образование с аномальным распределением массы и состава.\n\nНаши ученые хотят исследовать аномалию, чтобы узнать о ней больше."
  
  ehof_anomaly.09.name:0 "Подключенная астероидная станция"
  ehof_anomaly.09.desc:0 "Было обнаружено, что неестественное образование в поле астероидов системы §H[root.solar_system.GetName]§! это огромная космическая станция, состоящая из множества астероидов. Самый большой диаметр станции составляет около 35 километров, и она состоит из 23 отдельных астероидов диаметром от 400 до 1,5 километров, соединенных большими металлическими трубами.\n\nПо данным наших последних сканирований, станция выглядит заброшенной, но неповрежденный. Чтобы подтвердить это предположение, необходимы дальнейшие исследования.\n\nНикаких космических кораблей или другой активности не было обнаружено вокруг станции.\n\nНаши ученые просят провести исследование внутри станции, чтобы узнать больше."
  ehof_anomaly.09.a:0 "Исследуйте станцию, но будьте осторожны."
  ehof_anomaly.09.b:0 "Просто игнорируйте станцию."
  
  ################################
  
  hot_society_category:0 "Обитаемая Раскаленная планета"
  hot_society_category_desc:0 "На поверхности расплавленной планеты §H[from.GetName]§!, были обнаружены признаки жизнедеятельности.\n\nОрганические формы жизни обычно не могут выжить в такой невероятно враждебной среде и, конечно, не могут развиваться естественным путем.\n\nДля того, чтобы узнать больше об аномальной активности в этом расплавленном мире, требуется дальнейшее расследование."
  
  ehof_anomaly.10.name:0 "Плазматические формы жизни"
  ehof_anomaly.10.desc:0 "Интенсивное дистанционное расследование аномальной активности на планете §H[from.GetName]§! приводят к удивительным результатам.\n\nПланета действительно населена уникальной формой жизни, которую наши ученые назвали \"плазматические формы жизни\". Похоже, они состоят из псевдоорганической плазмы, которая функционирует аналогично тому, как работают тела органических форм жизни.\n\nМногие разновидности этих плазматических форм жизни живут в этом мире, и похоже, что планета разработала уникальную биосферу.\n\nЕсли они состоят из углеродных «структур», их теоретически можно считать органическими формами жизни. Неизвестно, являются ли они чрезвычайно редкими формами неорганической жизни.\n\nДля того, чтобы выяснить это, необходимо прямое исследование образцов плазматической жизни, что будет опасно из-за смертоносной среды планеты."
  ehof_anomaly.10.a:0 "Увлекательно, расширьте изучение этой формы жизни."
  ehof_anomaly.10.b:0 "Мы не должны рисковать ради этого жизнями и ресурсами наших ученых."
  
  ################################
  
  intoxicated_world_category:0 "Красная планета"
  intoxicated_world_category_desc:0 "В системе §H[root.solar_system.GetName]§! был обнаружен неизвестный до сих пор тип мира.\n\nПо результатам дистанционного наблюдения и сканирования, это, вероятно, токсичный мир, но для безопасного определения необходимо прямое исследование тип планеты."
  
  ehof_anomaly.11.name:0 "Красный токсичный мир"
  ehof_anomaly.11.desc:0 "Путем прямого исследования атмосферы §H[from.GetName]§!, мы обнаружили, что планета на самом деле является токсичным миром. Цвет планеты, а точнее ее атмосферы, создается чрезвычайно токсичными частицами, состоящими из неизвестного вещества.\n\nПо результатам химического анализа этих частиц они состоят в основном из меди, углеродных соединений, фосфора, серы, кобальта и даже актинидов, что делает токсин радиоактивным.\n\nПомимо своей радиоактивности, он также очень агрессивен, повреждая как органические, так и неорганические структуры.\n\nДаже неорганические металлы подвергаются коррозии в определенной степени.\n\nПомимо того, что он ужасно смертоносен для любой органической формы жизни, он также чрезвычайно плотный и непрозрачный, что делает невозможным видеть сквозь него. Более слабые формы излучения также не могут проникать через поверхность, что чрезвычайно затрудняет сканирование поверхности.\n\nНаши исследователи просят использовать сканеры высокой интенсивности для анализа поверхности планеты и изучения того, что скрывается за красным туманом. "
  ehof_anomaly.11.a:0 "Как страшно и в то же время увлекательно! Попробуйте проникнуть в атмосферу."
  ehof_anomaly.11.b:0 "Наверное, будет лучше, если мы не будем знать, что скрывается за туманом."
  
  ################################
  
  scarred_planet_category:0 "Шрам"
  scarred_planet_category_desc:0 "Бесплодная планета в §H[root.solar_system.GetName]§! проявляет аномальные свойства.\n\nНаши датчики предупредили нас об огромном каньоне на поверхности планеты, но необходимы дальнейшие исследования, чтобы определить, что с ним не так."
  
  ehof_anomaly.12.name:0 "Шрам"
  ehof_anomaly.12.desc:0 "Благодаря нашему исследованию гигантского каньона на §H[from.GetName]§!, мы смогли обнаружить, что сам каньон, который простирается более чем на 1600 километров и достигает верхней части мантии, не является естественным образованием. Сама структура каньона указывает на то, что это не может быть естественным.\n\nЕсли теория наших исследователей верна, планетарное кольцо также может быть результатом образования каньона, в зависимости от того, что его вызвало.\n\nМы еще не выяснили, что вызвало «шрам», как его уже называют наши ученые, но более глубокий анализ планетарного материала шрама и планетарного кольца может дать нам ключ к разгадке того, чем он мог быть."
  ehof_anomaly.12.a:0 "Интересно, что могло образовать такой огромный каньон?"
  ehof_anomaly.12.b:0 "Нет времени на геологию. Бросить проект."
  
  ################################
  
  ehof_anomaly.13.name:0 "Одна орбита"
  ehof_anomaly.13.desc:0 "Спустя короткое время после того, как мы прибыли в §H[root.solar_system.GetName]§!, наши сенсоры начали обнаруживать некоторые странные планетные структуры внутри системы.\n\nПохоже, что в звездной системе есть две планеты, но обе делят одну орбиту. Их расстояние от звезды почти такое же.\n\nНаши ученые хотят исследовать эти две планеты, чтобы узнать больше о них и об этом странном орбитальном расположении."
  
