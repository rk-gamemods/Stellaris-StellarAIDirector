  giga_category_ehof:99 "$ehof_system_list_title$"
  ehof_system_list_title:99 "$ehof_ehof$"
  ehof_system_list_desc:0 "Мы решили вести учет каждого внегалактического предприятия, которое мы предпринимаем.\n\nМы записываем координаты системы, количество звезд и их названия, планеты и пригодные для жизни планеты, луны и астероиды. Мы также будем регистрировать оценку того, какие ресурсы, вероятно, будут у системы.\n\nМы считаем, что эта информация может быть полезна для отслеживания прогресса каждой системы и может оказаться жизненно важной, если или когда мы урегулируем большое количество из них."
