  tech_compound_armor:0 "Поглотитель опасной материи"
  tech_compound_armor_desc:0 "Поглощает все формы входящего урона и преобразует его в полезную энергию для усиления защитного материала."
  
  tech_compound_computers:0 "Осознание опасной материи"
  tech_compound_computers_desc:0 "Создан, чтобы вести себя как единое целое."
  TECH_UNLOCK_COMPOUND_COMPUTERS_TITLE:0 "§HРазблокирует компонент:§! $tech_compound_computers$"
  TECH_UNLOCK_COMPOUND_COMPUTERS_DESC:99 "§H$tech_compound_computers$§!\n$tech_compound_computers_desc$"
  
  tech_compound_drives:0 "Прыжковый двигатель опасной материи"
  tech_compound_drives_desc:0 "Способен двигаться намного быстрее, чем любой другой известный обычный гипердвигатель."
  TECH_UNLOCK_COMPOUND_JUMPDRIVE_TITLE:0 "§HРазблокирует компонент:§! $tech_compound_drives$"
  TECH_UNLOCK_COMPOUND_JUMPDRIVE_DESC:99 "§H$tech_compound_drives$§!\n$tech_compound_drives_desc$"
  
  tech_compound_reactors:0 "Реакторы опасной материи"
  tech_compound_reactors_desc:0 "Манипулирует темной материей, чтобы производить большое количество энергии."
  TECH_UNLOCK_COMPOUND_REACTOR_TITLE:0 "§HРазблокирует компонент:§! $tech_compound_reactors$"
  TECH_UNLOCK_COMPOUND_REACTOR_DESC:99 "§H$tech_compound_reactors$§!\n$tech_compound_reactors_desc$"
  
  tech_compound_sensors:0 "Сенсоры опасной материи"
  tech_compound_sensors_desc:0 "Наблюдает за галактическим потоком темной материи, который скрепляет галактику, чтобы обнаружить движение флотов в огромных масштабах."
  TECH_UNLOCK_COMPOUND_SENSOR_TITLE:0 "§HРазблокирует компонент:§! $tech_compound_sensors$"
  TECH_UNLOCK_COMPOUND_SENSOR_DESC:99 "§H$tech_compound_sensors$§!\n$tech_compound_sensors_desc$"
  
  tech_compound_shields:0 "Отражатели опасной материи"
  tech_compound_shields_desc:0 "Отражает все формы входящего урона."
  
  tech_compound_thrusters:0 "Усилители опасной материи"
  tech_compound_thrusters_desc:0 "Более эффективный и быстрый вариант $tech_qnm_thrusters$."
  TECH_UNLOCK_COMPOUND_THRUSTER_TITLE:0 "§HРазблокирует компонент:§! $tech_compound_thrusters$"
  TECH_UNLOCK_COMPOUND_THRUSTER_2_DESC:99 "§H$tech_compound_thrusters$§!\n$tech_compound_thrusters_desc$"
  
  
