  giga_qso.008.undesirable:99 "Dump 2500 £pops£ §YUndesirables§!"
  giga_qso.008.undesirable.tooltip:99 "§LWe will dump 2500 random pops with Undesirable Citizenship into the quasar. Their constituent energy will finally be useful for something.§!"
  
