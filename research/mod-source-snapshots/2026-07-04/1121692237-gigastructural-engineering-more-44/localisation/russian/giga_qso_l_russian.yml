l_russian:
  
  #########################################
  ### Quasi-Stellar Obliterator ###########
  #########################################
  
  ### Techs ###
  giga_tech_quasi_stellar_1:0 "Гиперпространственное экранирование"
  giga_tech_quasi_stellar_1_desc:0 "Квазары - невероятные энергетические объекты. Если мы захотим осуществить какие-либо инженерные проекты в их окрестностях, необходимо будет разработать усовершенствованные экраны для защиты наших структур от гравитационного притяжения и излучения квазара."
  
  giga_tech_quasi_stellar_2:0 "Гравитационное аккреционное сжатие"
  giga_tech_quasi_stellar_2_desc:0 "Гиперквазар в ядре галактики окружен массивным и чрезвычайно энергичным аккреционным диском. Очевидно, этот диск делает невозможным сборку чего-либо в окрестностях квазара. Однако, изменяя гравитационную постоянную возле квазара, мы могли бы эффективно моделировать увеличение массы объекта, что заставило бы диск уменьшиться до меньшего размера. Это, по сути, увеличило бы его энергетический потенциал и позволило бы построить структуру намного ближе к квазару."
  
  giga_tech_quasi_stellar_3:0 "Релятивистское отклонение струи"
  giga_tech_quasi_stellar_3_desc:0 "Одной из наиболее заметных особенностей сверхмассивного квазара является наличие двух гигантских струй, состоящих из сверхускоренных струй ионизированной материи, вылетающих с обоих полюсов с релятивистскими скоростями. Эти реактивные струи чрезвычайно энергичны, и способность собирать и перенаправлять их катастрофическую энергию будет очень полезна для питания нашего будущего гипероружия."
  
  giga_tech_quasi_stellar_4:0 "Гигантские вычислительные машины"
  giga_tech_quasi_stellar_4_desc:0 "чрезвычайно велика, и нам потребуются столь же гигантские компьютеры, если мы хотим правильно поддерживать структуру, а также управлять невероятным количеством энергии, используемой гипероружием."
  
  giga_tech_quasi_stellar_5:0 "Манипуляция энергией квазара"
  giga_tech_quasi_stellar_5_desc:0 "Каким-то образом сбор, хранение и перенаправление чистой энергии, излучаемой сверхмассивным квазаром, потребует объединения нескольких чрезвычайно продвинутых технологий, начиная от гиперпространственных конденсаторов и заканчивая модуляцией супергравитационного поля."
  
  giga_tech_quasi_stellar_6:0 "$name_quasistellar$"
  giga_tech_quasi_stellar_6_desc:0 "$name_quasistellar$ это оружие, в котором используются практически все известные нам технологии, чтобы сделать оружие из самого энергичного тела во всей галактике. Эта устрашающая конструкция действительно является вершиной гипермасштабируемого оружия, превосходя даже $name_ndb$ и Systemcraft на несколько порядков."
  
  ### Megastructure ###
  quasi_stellar_obliterator_0:0 "Строительная площадка $name_quasistellar$"
  quasi_stellar_obliterator_0_DESC:0 "Строительная площадка будущей $name_quasistellar$, плавающая рядом с колоссальным сверхмассивным квазаром. Эта относительно небольшая платформа будет использоваться в качестве базы для создания самого грандиозного и невероятного гипероружия, когда-либо созданного разумными существами в этой галактике."
  quasi_stellar_obliterator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_terastructure$ - $giga_list_category_weaponry$\nСоздает гипероружие вокруг §YГиперквазара§!, которое может уничтожить целые §Yзвездные скопления§!.\n§LНевероятно гигантское гипероружие, созданное на основе квазара и обладающее невероятной разрушительной силой.§!"
  quasi_stellar_obliterator_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - §YКвазарная пушка§! способна разрушить либо единичные §YПланеты§!, §YЗвездные системы§! либо целые §YЗвездные скопления§!. У нее очень высокий шанс §RРАЗОЗЛИТЬ§ галактику и заставить ее §Yобъединиться§! против нас!"
  # quasi_stellar_obliterator_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - The §YQuasi-Stellar Obliterator§! is capable of destroying either singular §YPlanets§!, §YSolar Systems§! or entire §YStar Clusters§!. It has a very high chance of §YANGERING§! the galaxy and causing it to §Yunite§! against us!"
  
  quasi_stellar_obliterator_1:0 "Компрессор аккреции $name_quasistellar$"
  quasi_stellar_obliterator_1_DESC:0 "Это колоссальное частичное кольцо окружает квазар и использует гиперпространственные сверхгравитационные давления для локального изменения гравитационной постоянной и эффективного уплотнения шумного аккреционного диска квазара."
  
  quasi_stellar_obliterator_2:0 "Релятивистские дефлекторы $name_quasistellar$"
  quasi_stellar_obliterator_2_DESC:0 "Набор замысловатых силовых проводов и ультраэффективных дефлекторов используются для тщательного сбора и перенаправления полярных струй Квазара, предоставляя нам огромное количество полезной энергии для нашего гипероружия."
  
  quasi_stellar_obliterator_3:0 "Гиперкомпьютеры $name_quasistellar$"
  quasi_stellar_obliterator_3_DESC:0 "Громадные компьютеры интегрированы в колоссальный корпус гипероружия, чтобы должным образом контролировать и регулировать огромные потоки энергии, получаемые от квазара, и стабилизировать структуру в целом."
  
  quasi_stellar_obliterator_4:0 "Тераконденсаторы $name_quasistellar$"
  quasi_stellar_obliterator_4_DESC:0 "Эти гигантские кольца, окружающие Квазар, используются для сбора энергии как из аккреционного диска, так и из процесса Пенроуза, а также для перенаправления ее туда, куда нам нужно, будь то гигантские накопители или само оружие."
  
  quasi_stellar_obliterator_firing_1:99 "$name_quasistellar$"
  quasi_stellar_obliterator_firing_1_DESC:0 "Эта $name_quasistellar$ в настоящее время стреляет из своего оружия."
  quasi_stellar_obliterator_firing_1_MEGASTRUCTURE_DETAILS:99 "$quasi_stellar_obliterator_firing_1_DESC$"
  
