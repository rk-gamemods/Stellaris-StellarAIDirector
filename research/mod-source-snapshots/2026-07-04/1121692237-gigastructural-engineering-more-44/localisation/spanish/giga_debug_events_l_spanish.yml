  giga_log.3.desc:0 "Sistemas Totales: §Y[Root.giga_asteroid_survey_systems]§!, Con Asteroides: §Y[Root.giga_asteroid_survey_systems_with_asteroids]§!, Total de Asteroides: §Y[Root.giga_asteroid_survey_total]§!\n\nSitios de ['concept_giga_asteroid_industry_alloys']: §Y[Root.giga_asteroid_survey_alloys]§!, por asteroide: §Y[Root.giga_asteroid_survey_average_alloys_per_asteroids]§!, por sistema: §Y[Root.giga_asteroid_survey_average_alloys]§!, por sistema con asteroides: §Y[Root.giga_asteroid_survey_average_alloys_with_asteroids]§!\n\nSitios de ['concept_giga_asteroid_industry_consumer_goods']: §Y[Root.giga_asteroid_survey_consumer_goods]§!, por asteroide: §Y[Root.giga_asteroid_survey_average_consumer_goods_per_asteroids]§!, por sistema: §Y[Root.giga_asteroid_survey_average_consumer_goods]§!, por sistema con asteroides: §Y[Root.giga_asteroid_survey_average_consumer_goods_with_asteroids]§!\n\nSitios de ['concept_giga_asteroid_industry_energy']: §Y[Root.giga_asteroid_survey_energy]§!, por asteroide: §Y[Root.giga_asteroid_survey_average_energy_per_asteroids]§!, por sistema: §Y[Root.giga_asteroid_survey_average_energy]§!, por sistema con asteroides: §Y[Root.giga_asteroid_survey_average_energy_with_asteroids]§!\n\nSitios de ['concept_giga_asteroid_industry_food']: §Y[Root.giga_asteroid_survey_food]§!, por asteroide: §Y[Root.giga_asteroid_survey_average_food_per_asteroids]§!, por sistema: §Y[Root.giga_asteroid_survey_average_food]§!, por sistema con asteroides: §Y[Root.giga_asteroid_survey_average_food_with_asteroids]§!\n\nSitios de ['concept_giga_asteroid_industry_supertensiles']: §Y[Root.giga_asteroid_survey_supertensiles]§!, por asteroide: §Y[Root.giga_asteroid_survey_average_supertensiles_per_asteroids]§!, por sistema: §Y[Root.giga_asteroid_survey_average_supertensiles]§!, por sistema con asteroides: §Y[Root.giga_asteroid_survey_average_supertensiles_with_asteroids]§!"
  
  giga_log.500.title:99 "Optional Data Logging"
  giga_log.500.desc:99 "Thank you for playing Gigastructural Engineering & More!\n\nIn the past we have made changes based on user feedback. As we continue to work on developing the mod to the best it can, we have decided collecting data from players will prove invaluable in balancing decisions.\n\nIf you wish, you can help us by enabling a logging feature to track the status of your galaxy as you play with Gigastructures. After your session you may then upload your game.log file and mod list to the survey found in the link <SOMEWHERE>. It is likely that logging may add a small amount of lag to the first of every year. Apologies for the inconvenience.\n\n§HATTENTION§!: Due to the way log files function, every time you open Stellaris, your log file is cleared. You will not be able to send or view a log file from a previous session.\n\n§LGigastructures, or any Stellaris mods for that matter, have no capability of storing your data and sending telemetry anywhere. The only data sent to Gigastructure or any member of its development team is the data you willingly provide. Stellaris log files contain no identifiable data unless such data is willingly entered.§!"
  giga_log.500.a:99 "Yes, I would like to enable logging."
  giga_log.500.b:99 "No I do not want to enable logging."
  
  
  