l_spanish:
  
  concept_giga_sr_amb_megaconstruction:99 "$giga_sr_amb_megaconstruction$"
  concept_giga_sr_amb_megaconstruction_desc:99 "£giga_sr_amb_megaconstruction£ §H$giga_sr_amb_megaconstruction$§! represents advanced materials able to withstand incredible levels of tensile stress, making them essential in the construction of the largest space installations.\n\nThe higher our income of them, the faster ['concept_megastructures'] will be able to be built. They are §Hsplit§! amongst all in-progress megastructures, meaning that building multiple megastructures simultaneously will §Hslow down§! their overall construction speed. They thus act as a 'soft' cap on our parallel megastructure building capacity.\n\nAdditionally, most megastructures have some §Hupkeep§! of them, with larger ones having greater upkeep.\n\nTo increase:\n- Build £building£['building:building_giga_megaworkshop_hub'] or £building£ ['building:building_giga_megaworkshop']\n- Build £mining_station£ ['concept_mining_stations'] on ['concept_celestial_objects'] with Supertensile deposits"
  
  concept_giga_sr_bulk_matter:99 "$giga_sr_bulk_matter$"
  concept_giga_sr_bulk_matter_desc:99 "£giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! represents large amounts of low value unrefined material harvested from celestial objects, used as filler in the construction of extremely large ['concept_megastructures'] or those aiming to replicate planetary conditions.\n\nIt can be harvested from §HAsteroids§!, §HRocky Planets§! and §HGas Giants§!, at a rate of one §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! per ['concept_planet_size'].\n\nThis resource is required to construct the §HRingworld§!, §HMatrioskha Brain§!, §H$name_alderson$§!, §HBirch World§!, §HQuasi-Stellar Obliterator§!, §HSupermassive E.H.O.F.§! and the §HNicoll-Dyson Beam§!.\n\nIt is also used by the §HLunar Macrofabricator§! and the §HBehemoth Assembly Plant§! to create §HAttack Moons§! and §HBehemoth Planetcrafts§!, respectively.\n\nIf the megastructure §Hremoves planets§! as part of its construction, then the £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! contents of the system's planets will be §Hdiscounted§! from the initial build phase. Leftovers will be stored in a §HBulk Matter Cache§! above the system's star which can then be harvested to retrieve its contents.\n\nFor example, if a system contains §Y75§! £giga_sr_bulk_matter£ then a §HRingworld Frame§! which normally requires §Y100§! £giga_sr_bulk_matter£ will only requires §Y25§! £giga_sr_bulk_matter£. However, if the system contains §Y150§! £giga_sr_bulk_matter£, then the megastructure's initial phase will cost no £giga_sr_bulk_matter£ and the §HCache§! will contain §Y50§! £giga_sr_bulk_matter£ to harvest. Subsequent build phases are not affected by this mechanic and will require stored £giga_sr_bulk_matter£.\n\nTo increase:\n- Use the §H$decision_harvest_matter_for_planetary_printing$§! ['concept_decision'] on a non-star ['concept_celestial_object'] to construct a §H$moon_printer_orbital_mass_harvester_1$§! and dismantle the planet, yielding §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! every §Y6§! months. This cannot be stopped and will eventually completely §Rremove§! the planet.\n- Select the decision on a system's ['concept_star'] to begin this process on every planet in the ['concept_system']."
  
