  ehof_megastructure.008.desc:0 "Hemos capturado un $ehof_ehof$ que es más avanzado que el que estamos usando actualmente. ¿Te gustaría trasladar nuestras operaciones al mejor $ehof_ehof$?\n\nSi eliges no hacerlo, asumiremos que has posicionado estratégicamente nuestro $ehof_ehof$ y no volveremos a preguntar sobre la reubicación."
