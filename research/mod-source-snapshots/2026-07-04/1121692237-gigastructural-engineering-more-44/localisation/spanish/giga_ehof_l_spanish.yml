  ehof_sm_forge_phase00_MEGASTRUCTURE_DETAILS:99 "$tech_sm_megastructure_desc$"
  
  ehof_sm_forge_phase1:0 "$tech_sm_megastructure$ Viviendas"
  ehof_sm_forge_phase1_DESC:99 "$tech_sm_megastructure_desc$"
  
  ehof_sm_forge_phase2:0 "$tech_sm_megastructure$ Instalación de extracción"
  ehof_sm_forge_phase2_DESC:99 "$tech_sm_megastructure_desc$"
  
  ehof_sm_forge_phase3:0 "$tech_sm_megastructure$ Instalación de extracción dual"
  ehof_sm_forge_phase3_DESC:99 "$tech_sm_megastructure_desc$"
  
  ehof_sm_forge_phase4:99 "$tech_sm_megastructure$"
  ehof_sm_forge_phase4_DESC:99 "$tech_sm_megastructure_desc$"
  
  giga_dialog.11101.name:99 "$ehof_sm_forge_phase0$"
  giga_dialog.11101.desc:0 "Materiales de construcción han sido entregados a los sitios de preparación en órbita de la $ehof_the_sphere_named$. Estamos preparados para que comience el trabajo en nuestro primer y probablemente único $ehof_sm_forge_phase4$."
  giga_dialog.11101.a:0 "Excelente."
  
  giga_dialog.11102.name:99 "$ehof_sm_forge_phase1$"
  giga_dialog.11102.desc:0 "Pretendemos maximizar la producción de la forja. En consecuencia, hemos incluido gigantescos complejos de vivienda dentro de la superestructura de la forja para el personal de mantenimiento y coordinación."
  giga_dialog.11102.a:0 "¡Al siguiente paso!"
  
  giga_dialog.11103.name:99 "$ehof_sm_forge_phase2$"
  giga_dialog.11103.desc:0 "La primera etapa de fabricación del $ehof_sm_forge_phase4$ está completa. La siguiente fase se reflejará en el lado opuesto de la forja."
  giga_dialog.11103.a:0 "Bien, procede."
  
  giga_dialog.11104.name:99 "$ehof_sm_forge_phase3$"
  giga_dialog.11104.desc:0 "¡La forja ya está funcionando al 50% de su capacidad! Deberíamos comenzar a trabajar en la etapa final lo antes posible."
  giga_dialog.11104.a:0 "¡Necesitamos más!"
  
  giga_dialog.11105.name:99 "$ehof_sm_forge_phase4$"
  giga_dialog.11105.desc:0 "El $ehof_sm_forge_phase4$ está completo. Ya está proporcionando a nuestro imperio un suministro masivo de ambos, $ehof_sm$ y $ehof_qnm$."
  giga_dialog.11105.a:0 "Excelente."
  pc_ehof_black_hole:99 "$pc_black_hole$"
  pc_ehof_black_hole_desc:99 "$pc_black_hole_desc$"
  
  pc_wh_star:0 "Agujero Blanco"
  pc_wh_star_plural:99 "White Holes"
  pc_wh_star_desc:0 "Una contrapartida teórica al agujero negro. Un agujero blanco emite cantidades astronómicas de energía y repele toda la materia. Es imposible cruzar su horizonte de sucesos.\n\nEl origen de toda esa energía sigue siendo un misterio. Puede que se alimente de la energía del vacío, de la misteriosa energía de fondo del cosmos o incluso de los mecanismos inflacionarios de nacimiento de subuniversos enteros. Nadie conoce la verdadera respuesta..."
  
  pc_whdyson_star:99 "$pc_wh_star$"
  pc_whdyson_star_plural:99 "$pc_wh_star_plural$"
  pc_whdyson_star_desc:99 "$pc_wh_star_desc$"
  
  pc_whc_star:0 "Esfera de Preservación"
  pc_whc_star_desc:0 "Esta estructura fue construida por $ehof_the_creators$ para proteger a los seres de materia oscura de la Masa Negativa."
  
