  annihilator_dialog.013.desc:0 "Fallamos en proteger al $ehof_the_stellar_annihilator$ de las armadas del $ehof_the_compounds_text$ mientras estaba ocupado destruyendo la $ehof_preservation_sphere$!"
  annihilator_dialog.013.response:0 "¡Esto es una catástrofe!"
  
