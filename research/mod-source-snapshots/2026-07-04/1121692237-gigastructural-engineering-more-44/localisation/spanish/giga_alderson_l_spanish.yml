  # priests
  job_ald_priest:0 "Gran Sacerdote"
  job_ald_priest_plural:0 "Grandes Sacerdotes"
  job_ald_priest_desc:0 "Una vasta red de oradores y fieles. Los sacerdotes trabajan incansablemente para mantener la tradición y las creencias fundamentales."
  mod_job_ald_priest_add:0 "$job_ald_priest$ Trabajos"
  
  job_ald_deathpriest:0 "Sacerdote del Pasaje"
  job_ald_deathpriest_plural:0 "Sacerdotes del Pasaje"
  job_ald_deathpriest_desc:0 "Una vasta red de predicadores sombríos y fieles. Estos sacerdotes leen a la gente para el final aseguran que un sacrificio nunca será en vano."
  mod_job_ald_deathpriest_add:0 "$job_ald_deathpriest$ Trabajos"
  
  # culture workers
  job_ald_cultureworker:0 "Experto en Cultura Alderson"
  job_ald_cultureworker_plural:0 "Expertos en Cultura Alderson"
  job_ald_cultureworker_desc:0 "Tropas enteras produciendo, interpretando y recreando las artes. Museos que muestran la historia. Las exposiciones de arte terminan siendo más grandes que las ciudades enteras en nuestra historia."
  mod_job_ald_cultureworker_add:0 "$job_ald_cultureworker$ Trabajos"
  
  job_ald_corpmanager:0 "Gerente Regional"
  job_ald_corpmanager_plural:0 "Gerentes Regionales"
  job_ald_corpmanager_desc:0 "Grandes grupos de gerentes intermedios. Compiten despiadadamente para ver qué parte del disco aporta más ingresos."
  mod_job_ald_corpmanager_add:0 "$job_ald_corpmanager$ Trabajos"
  
  job_ald_memorialist:0 "Escriba de Quietus"
  job_ald_memorialist_plural:0 "Escribas de Quietus"
  job_ald_memorialist_desc:0 "Grandes grupos de individuos dedicados a la supervivencia y la falta de la misma en la galaxia. Utilizan su espacio para recrear ciudades y monumentos antiguos para entender mejor a aquellos que estudian."
  mod_job_ald_memorialist_add:0 "$job_ald_memorialist$ Trabajos"
  
  # merchants
  job_ald_merchant:0 "Barón del Comercio"
  job_ald_merchant_plural:0 "Barones del Comercio"
  job_ald_merchant_desc:0 "Increíbles cantidades de vendedores astutos capaces de ver la venta de un planeta entero de suministros todo antes del almuerzo. Controlan la mayor parte de la tierra y su cambio de manos."
  mod_job_ald_merchant_add:0 "$job_ald_merchant$ Trabajos"
  
  
  
  
