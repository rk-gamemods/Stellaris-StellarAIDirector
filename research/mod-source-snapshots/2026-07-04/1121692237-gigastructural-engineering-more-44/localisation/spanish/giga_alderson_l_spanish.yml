  pc_alderson_slice_gaia:0 "Rebanada Alderson Gaia"
  pc_alderson_slice_gaia_desc:0 "Una rebanada gigantesca de un $name_alderson$, capaz de soportar una población verdaderamente gigantesca. Esta rebanada presenta una amplia gama de climas a diferentes distancias de la estrella, y por lo tanto es habitable por casi todas las especies."
  
  mod_pc_alderson_slice_gaia_shattered_habitability:0 "Habitabilidad de Gaia Despedazada Alderson"
  trait_pc_alderson_slice_gaia_shattered_preference:0 "Preferencia de Gaia Despedazada Alderson"
  trait_pc_alderson_slice_gaia_shattered_preference_desc:0 "§LPreferecia climática es determinada a nivel genético, por eones de evolución o manipulación hábil.§!"
  
