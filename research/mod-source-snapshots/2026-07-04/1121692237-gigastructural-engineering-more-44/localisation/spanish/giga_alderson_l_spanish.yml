  # "miners"
  job_ald_matter_synthesizer:0 "Sintetizador de Materia de Disco"
  job_ald_matter_synthesizer_plural:0 "Sintetizadores de Materia de Disco"
  job_ald_matter_synthesizer_desc:0 "Una gran cantidad de gerentes y trabajadores con el propósito de generar minerales a partir de energía. Las instalaciones son imposibles de haber sido construidas en cualquier otro lugar."
  mod_job_ald_matter_synthesizer_add:0 "$job_ald_matter_synthesizer$ Trabajos"
  
  job_ald_matter_synthesizer_drone:0 "Dron de Síntesis de Materia Alderson"
  job_ald_matter_synthesizer_drone_plural:0 "Drones de Síntesis de Materia Alderson"
  job_ald_matter_synthesizer_drone_desc:0 "Una gran cantidad de drones con el propósito de generar minerales a partir de energía. Este proceso requiere una tonelada de energía y mucho espacio. Aún así, se puede hacer."
  mod_job_ald_matter_synthesizer_drone_add:0 "$job_ald_matter_synthesizer_drone$ Trabajos"
  
  # technicians
  job_ald_supergenerator:0 "Técnico Alderson"
  job_ald_supergenerator_plural:0 "Técnico Alderson"
  job_ald_supergenerator_desc:0 "Una gran cantidad de gerentes y trabajadores con el propósito de mantener la producción de energía. Reparan paneles con más área que planetas enteros y reactores que no se pueden encontrar en ningún otro lugar."
  mod_job_ald_supergenerator_add:0 "$job_ald_supergenerator$ Trabajos"
  
  job_ald_supergenerator_drone:0 "Dron Técnico Alderson"
  job_ald_supergenerator_drone_plural:0 "Drones Técnicos Alderson"
  job_ald_supergenerator_drone_desc:0 "Una gran cantidad de drones con el propósito de mantener la producción de energía. Reparan paneles colosales y reactores gigantes."
  mod_job_ald_supergenerator_drone_add:0 "$job_ald_supergenerator$ Trabajos"
  
  # farmers
  job_ald_superfarmer:0 "Granjero de Tamaño Súper"
  job_ald_superfarmer_plural:0 "Granjeros de Tamaño Súper"
  job_ald_superfarmer_desc:0 "Una gran cantidad de gerentes y trabajadores con el propósito de mantener la flora y la fauna. ¡Algunas de estas plantas y animales podrían alimentar a familias enteras durante meses!"
  mod_job_ald_superfarmer_add:0 "$job_ald_superfarmer$ Trabajos"
  
  job_ald_superfarmer_drone:0 "Dron de Granja Alderson"
  job_ald_superfarmer_drone_plural:0 "Dron de Granja Alderson"
  job_ald_superfarmer_drone_desc:0 "Una gran cantidad de drones con el propósito de mantener la flora y la fauna. Algunos de estos requieren grandes cantidades de espacio, pero son de alto rendimiento."
  mod_job_ald_superfarmer_drone_add:0 "$job_ald_superfarmer_drone$ Trabajos"
  
  # exotic gas refiners
  job_ald_gases:0 "Especialista en Refinería"
  job_ald_gases_plural:0 "Especialistas en Refinería"
  job_ald_gases_desc:0 "Un gran grupo de gerentes y técnicos supervisando refinerías masivas. Hipotéticamente, estos edificios nos permitirían reemplazar atmósferas enteras con gases raros."
  mod_job_ald_gases_add:0 "$job_ald_gases$ Trabajos"
  
  job_ald_gases_drone:0 "Dron de Refinería Alderson"
  job_ald_gases_drone_plural:0 "Drones de Refinería Alderson"
  job_ald_gases_drone_desc:0 "Un gran grupo de drones dedicados a supervisar refinerías masivas. Algunas refinerías emiten más gases de los que un planeta entero podría poseer."
  mod_job_ald_gases_drone_add:0 "$job_ald_gases_drone$ Trabajos"
  
  # volatile motes chemists
  job_ald_motes:0 "Químico Supraescala"
  job_ald_motes_plural:0 "Químicos Supraescala"
  job_ald_motes_desc:0 "Un gran grupo de gerentes y técnicos supervisando plantas químicas masivas. Estas instalaciones podrían transformar la masa de planetas enteros dado un poco de tiempo."
  mod_job_ald_motes_add:0 "$job_ald_motes$ Trabajos"
  
  job_ald_motes_drone:0 "Dron Químico Alderson"
  job_ald_motes_drone_plural:0 "Drones Químicos Alderson"
  job_ald_motes_drone_desc:0 "Un gran grupo de drones dedicados a supervisar plantas químicas masivas. La cantidad de materiales utilizados puede rivalizar rápidamente con la masa de planetas enteros."
  mod_job_ald_motes_drone_add:0 "$job_ald_motes_drone$ Trabajos"
  
  # rare crystal translucers
  job_ald_crystals:0 "Supervisor de Cristal"
  job_ald_crystals_plural:0 "Supervisores de Cristal"
  job_ald_crystals_desc:0 "Un gran grupo de gerentes y técnicos supervisando fábricas masivas. El tamaño de una sola fábrica avergüenza a la mayoría de las ciudades enteras."
  mod_job_ald_crystals_add:0 "$job_ald_crystals$ Trabajos"
  
  job_ald_crystals_drone:0 "Dron de Lenteado Alderson"
  job_ald_crystals_drone_plural:0 "Drones de Lenteado Alderson"
  job_ald_crystals_drone_desc:0 "Un gran grupo de drones dedicados a la supervisión de fábricas masivas. El tamaño de estas fábricas solo es posible con el espacio de Alderson."
  mod_job_ald_crystals_drone_add:0 "$job_ald_crystals_drone$ Trabajos"
  
  # metallurgists
  job_ald_hyperfoundry:0 "Metalúrgico Supraescala"
  job_ald_hyperfoundry_plural:0 "Metalúrgicos Supraescala"
  job_ald_hyperfoundry_desc:0 "Un gran grupo de metalúrgicos en fundiciones masivas. Utilizan herramientas gigantes y trajes para producir cantidades increíbles de nuestras preciadas aleaciones."
  mod_job_ald_hyperfoundry_add:0 "$job_ald_hyperfoundry$ Trabajos"
  
  job_ald_hyperfoundry_drone:0 "Dron de Fundición Alderson"
  job_ald_hyperfoundry_drone_plural:0 "Drones de Fundición Alderson"
  job_ald_hyperfoundry_drone_desc:0 "Un gran grupo de drones operando fundiciones masivas. La gran cantidad de metales refinados que hacen son el sustento de nuestras construcciones."
  mod_job_ald_hyperfoundry_drone_add:0 "$job_ald_hyperfoundry_drone$ Trabajos"
  
  # artisans
  job_ald_hyperfactorio:0 "Artesano Supraescala"
  job_ald_hyperfactorio_plural:0 "Artesanos Supraescala"
  job_ald_hyperfactorio_desc:0 "Un gran grupo de trabajadores de fábrica en fábricas masivas. Producen cantidades asombrosas de lujos y bienes utilizando herramientas extremadamente grandes."
  mod_job_ald_hyperfactorio_add:0 "$job_ald_hyperfactorio$ Trabajos"
  
  job_ald_hyperartificer:0 "Gran Artífice"
  job_ald_hyperartificer_plural:0 "Grandes Artífices"
  job_ald_hyperartificer_desc:0 "Un gran grupo de Artífices extremadamente talentosos en grandes fábricas. Convierten la producción de bienes comunes en un espectáculo."
  mod_job_ald_hyperartificer_add:0 "$job_ald_hyperartificer$ Trabajos"
  
  job_ald_hyperfactorio_drone:0 "Dron Artesano Alderson"
  job_ald_hyperfactorio_drone_plural:0 "Drones Artesanos Alderson"
  job_ald_hyperfactorio_drone_desc:0 "Un gran grupo de drones operando fábricas masivas. Producen bienes necesarios para hacer que 'La Vida' valga la pena vivir."
  mod_job_ald_hyperfactorio_drone_add:0 "$job_ald_hyperfactorio_drone$ Trabajos"
  
  # researchers
  job_ald_megascience:0 "Tanque de Pensamiento"
  job_ald_megascience_plural:0 "Tanques de Pensamiento"
  job_ald_megascience_desc:0 "Un grupo colosal de algunas de las mentes más brillantes. Aunque no siempre están de acuerdo, todos están contribuyendo a las ciencias."
  mod_job_ald_megascience_add:0 "$job_ald_megascience$ Trabajos"
  
  job_ald_megascience_mind:0 "Mente Enlazada"
  job_ald_megascience_mind_plural:0 "Mentes Enlazadas"
  job_ald_megascience_mind_desc:0 "Un grupo colosal de drones trabajando como uno. Están contribuyendo cada parte de su fuerza mental a las ciencias."
  mod_job_ald_megascience_mind_add:0 "$job_ald_megascience_mind$ Trabajos"
  
  job_ald_megascience_robot:0 "Red Neural Alderson"
  job_ald_megascience_robot_plural:0 "Redes Neurales Alderson"
  job_ald_megascience_robot_desc:0 "Un grupo colosal de drones trabajando como uno. Están realizando un número incalculable de cálculos cada segundo."
  mod_job_ald_megascience_robot_add:0 "$job_ald_megascience_robot$ Trabajos"
  
  # duelist only
  job_ald_duelists:0 "Batallón Recreativo"
  job_ald_duelists_plural:0 "Batallones Recreativos"
  job_ald_duelists_desc:0 "Batallones enteros utilizando espacios abiertos y amplios para proporcionar entretenimiento. La gran cantidad de tamaño permite que se utilicen armas nucleares para espectáculos."
  mod_job_ald_duelists_add:0 "$job_ald_duelists$ Trabajos"
  
