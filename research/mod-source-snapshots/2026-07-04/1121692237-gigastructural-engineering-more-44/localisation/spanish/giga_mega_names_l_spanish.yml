  orbital_artificial_eco_1_DESC:0 "Un conjunto de brazos externos para almacenar funcionalmente la informaciĂłn genĂ©tica de todas las especies alojadas dentro del $name_orbital_artificial_eco$ planeado, de modo que si alguna se extingue, pueden ser recuperadas."
  
