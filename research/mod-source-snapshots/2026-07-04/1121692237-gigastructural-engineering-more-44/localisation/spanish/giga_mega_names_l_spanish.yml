  #########################################
  giga_tech_planetary_seeder_nexus:99 "Large-Scale Extremophile Sustenance"
  giga_tech_planetary_seeder_nexus_desc:99 "Barren worlds, both hot and cold, often feature the basic building blocks of life, merely not in the proper arrangement. However, with the discovery of Cutholoids and Amoebas thriving in the depths of space, there now lies the possibility of creating bespoke artificial 'lifeforms' which, once deposited on lifeless worlds, will be able to accumulate and rearrange these building blocks into various substances suitable for harvest and consumption. As all these would do is shuffle and rearrange scattered molecules into various edible compounds, these would have to be regularly replenished and would not constitute a proper 'biosphere', but could provide a useful supply of materials to our nutrition industries."
  
  planetary_seeder_nexus_0:99 "$gc_kilo$$name_planetary_seeder_nexus$: Organic Biosensors"
  planetary_seeder_nexus_0_DESC:99 "This site will serve as a base to construct an $name_planetary_seeder_nexus$, an orbital bioengineering facility producing various quasi-biological automata able to reprocess scattered organic compounds found within lifeless worlds into edible matter. Large geo-surveying arrays constantly scan nearby worlds and deploy probes to confirm the locations of highly concentrated processable organic compounds."
  planetary_seeder_nexus_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$\nGenerates ÂŁfoodÂŁ Â§YFoodÂ§! deposits on system planets.\nÂ§LA station built in orbit of a gas giant, producing biological automata which reprocessed organic compounds into edible matter.Â§!" #megalistentry PLANETARY SEEDER NEXUS
  planetary_seeder_nexus_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $planetary_seeder_nexus_1_mod_tooltip$"
  
  planetary_seeder_nexus_1:99 "$name_planetary_seeder_nexus$: Biological Manufactory"
  planetary_seeder_nexus_1_DESC:99 "Nutritious phytoplankton-like lifeforms capable of thriving in subsurface oceans, rocky crusts and gaseous atmospheres are produced in vast quantities and spread through the local system."
  
  planetary_seeder_nexus_2:99 "$name_planetary_seeder_nexus$: Enzyme Plants"
  planetary_seeder_nexus_2_DESC:99 "For worlds that cannot sustain conventional life, advanced plants manufacture enzyme-rich cellular automata capable of incredible feats of molecular chemistry ranging from rearranging the crust and atmosphere of carbon-rich worlds into pillars of crystallised sucrose to producing protein slurry by manipulating hydrocarbons and water."
  
  planetary_seeder_nexus_3:99 "$name_planetary_seeder_nexus$"
  planetary_seeder_nexus_3_DESC:99 "A complete $name_planetary_seeder_nexus$, overseeing the production, deployment and subsequent harvest of specialized enzymes and nutritional lifeforms onto nearly every world in this system."
  
  #########################################
