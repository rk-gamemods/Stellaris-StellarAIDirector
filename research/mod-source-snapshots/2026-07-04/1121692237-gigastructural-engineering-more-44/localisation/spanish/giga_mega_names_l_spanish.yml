  fusion_suppressor_0:0 "Emplazamiento $gc_mega$$name_fusion_suppressor$"
  fusion_suppressor_0_DESC:0 "El Emplazamiento para un futuro $name_fusion_suppressor$, que alberga todo lo necesario para comenzar la construcciĂłn de este dispositivo extremadamente avanzado."
  fusion_suppressor_0_MEGASTRUCTURE_DETAILS:0 "ÂŁgigastructuralÂŁ $giga_list_category_megastructure$ - $giga_list_category_miscellaneous$\nPuede convertir estrellas Â§YnormalesÂ§! en Â§YEstrellas de NeutronesÂ§! y Â§YAgujeros NegrosÂ§! - $giga_list_damages_system_planets$\nÂ§LEl Supresor de FusiĂłn manipula los procesos de fusiĂłn dentro de una estrella para desencadenar prematuramente una supernova, transformando la estrella en un cuerpo celeste mĂˇs exĂłtico." #gigalistentry FUSION SUPPRESSOR
  fusion_suppressor_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - La finalizaciĂłn completa del $name_fusion_suppressor$ resulta en la opciĂłn de desmantelar la estructura y mantener un Â§YAgujero NegroÂ§! utilizable, o dejar que la estrella Â§HsupernovaÂ§!, Â§Rdestruyendo todas las naves y estructuras en el sistema, y arrasando cada planeta en el procesoÂ§!, dejando una Â§YEstrella de NeutronesÂ§! utilizable. Los cuerpos restantes se siembran aleatoriamente con ÂŁgiga_sr_iodiziumÂŁ Â§Y$giga_sr_iodizium$Â§!, ÂŁenergyÂŁ Â§Y$energy$Â§!, y ÂŁphysics_researchÂŁ Â§Y$physics_research$Â§!.\n\nÂ§HNota:Â§! El $name_fusion_suppressor$ debe estar Â§Ycompletamente terminadoÂ§! para poder usar la Estrella de Neutrones para otra megaestructura.\n\nÂŁgiga_sr_iodiziumÂŁ Â§Y$giga_sr_iodizium$Â§! se puede utilizar para alimentar edificios poderosos que mejoran la ÂŁphysics_researchÂŁ ÂŁsociety_researchÂŁ ÂŁengineering_researchÂŁ Â§YInvestigaciĂłnÂ§! planetaria y la producciĂłn de ÂŁenergyÂŁ Â§Y$energy$Â§!.\n\nÂ§YEstrellas de NeutronesÂ§! creadas por el Â§YSupresor de FusiĂłnÂ§! son adecuadas para un Â§YHiperforja NidavellirÂ§!. Los Â§YAgujeros NegrosÂ§! se pueden utilizar para cualquier otra megaestructura basada en agujeros negros."
  
  fusion_suppressor_1:0 "Moduladores de Gravedad $name_fusion_suppressor$"
  fusion_suppressor_1_DESC:0 "Estos grandes dispositivos son capaces de manipular la gravedad alrededor de la estrella, lo que hace posible comprimir la materia de la estrella en un volumen mĂˇs pequeĂ±o."
  
  fusion_suppressor_2:0 "Estabilizadores Estelares $name_fusion_suppressor$"
  fusion_suppressor_2_DESC:0 "El $name_fusion_suppressor$ ahora es capaz de estabilizar la estrella alrededor de la cual se construyĂł, permitiendo que los moduladores de gravedad compriman el objeto estelar sin que explote repentinamente al ser desestabilizado."
  
  fusion_suppressor_3:0 "$name_fusion_suppressor$ - Etapa de CompresiĂłn I"
  fusion_suppressor_3_DESC:0 "El $name_fusion_suppressor$ ha comenzado a comprimir la materia de la estrella, abriendo oportunidades de investigaciĂłn sobre la naturaleza de las reacciones nucleares estelares. Una mayor compresiĂłn producirĂˇ mĂˇs investigaciĂłn."
  
  fusion_suppressor_4:0 "$name_fusion_suppressor$ - Etapa de CompresiĂłn II"
  fusion_suppressor_4_DESC:0 "La estrella ha sido comprimida una vez mĂˇs, y sus componentes bĂˇsicos estĂˇn comenzando a mostrar comportamientos extraĂ±os con altos potenciales cientĂ­ficos. EstĂˇn comenzando a tener lugar reacciones de fusiĂłn mĂˇs exĂłticas, mientras que la propia estructura de la estrella parece degradarse."
  
  fusion_suppressor_5:0 "Etapa de Estrella de Neutrones $name_fusion_suppressor$"
  fusion_suppressor_5_DESC:0 "El $name_fusion_suppressor$ ha logrado comprimir tanto la estrella que los protones y electrones se han fusionado para convertirse en neutrones dentro del nĂşcleo de la estrella, transformando dicho nĂşcleo en una estrella de neutrones. Esto es efectivamente una estrella de neutrones rodeada de plasma estelar regular."
  
  fusion_suppressor_6:0 "Colapsar Estrella en Agujero Negro"
  fusion_suppressor_6_DESC:0 "La materia de la estrella ahora se ha colapsado hasta tal punto que ni siquiera la luz puede escapar del tirĂłn gravitacional del cuerpo, transformĂˇndola efectivamente en un Agujero Negro artificial, que posee un increĂ­ble potencial de investigaciĂłn."
  
  fusion_suppressor_6b:99 "Detonate Star"
  fusion_suppressor_6b_DESC:0 "Ordena al $name_fusion_suppressor$ que libere el campo gravitatorio y ejerza una fuerza repulsiva, haciendo que la estrella comprimida detone en una supernova devastadora, destruyendo el $name_fusion_suppressor$. Cualquier planeta menor de 5, asĂ­ como los asteroides, serĂˇn destruidos, y los gigantes gaseosos serĂˇn despojados de su atmĂłsfera. Los planetas supervivientes obtendrĂˇn depĂłsitos de Iodizium, que son cristales generados por la supernova artificial al chocar contra los planetas a velocidades relativistas. Estos cristales pueden utilizarse para construir potentes edificios en nuestros planetas."
  
  fusion_suppressor_7:0 "Desmantelar $name_fusion_suppressor$"
  fusion_suppressor_7_DESC:0 "Eliminar este $name_fusion_suppressor$, haciendo su Agujero Negro utilizable para otros proyectos."
  
