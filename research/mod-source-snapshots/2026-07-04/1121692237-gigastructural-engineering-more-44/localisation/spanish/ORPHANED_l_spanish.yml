  REACTOR_LEVIATHAN_DESC:0 "Las entidades biológicas digieren los alimentos mezclándolos con ácidos y enzimas en el estómago, creando glucosa. La glucosa se libera entonces en el torrente sanguíneo y puede ser utilizada como energía."
