  district_giga_alderson_hive_desc:0 "Torres imponentes se extienden por esta sección para que los drones se reúnan cuando no están trabajando para rejuvenecer y consumir nutrientes."
  district_giga_alderson_generator:0 "Hipersegmento Generador Solar"
  district_giga_alderson_generator_plural:0 "Hipersegmentos Generadores Solares"
  district_giga_alderson_generator_desc:0 "Complejos gigantescos de paneles solares construidos aquí, generando cantidades incontables de energía del sol, complementados por reactores de fusión subterráneos."
  district_giga_alderson_farming:0 "Hipersegmento de Agricultura"
  district_giga_alderson_farming_plural:0 "Hipersegmentos de Agricultura"
  district_giga_alderson_farming_desc:0 "Un paisaje colosal que proporciona una mezcla de cultivo en torre y granjas más clásicas. Las condiciones del ganado varían de condensadas a de libre pastoreo. Estos procesos son en su mayoría automatizados; la flora y la fauna pueden ser peligrosas para un granjero promedio."
  district_giga_alderson_mining:0 "Hipersegmento de Síntesis de Materia"
  district_giga_alderson_mining_plural:0 "Hipersegmentos de Síntesis de Materia"
  district_giga_alderson_mining_desc:0 "Un paisaje colosal dedicado a subestaciones del tamaño de un planeta y máquinas complejas para la síntesis de varios materiales básicos."
  district_giga_alderson_commercial:0 "Hipersegmento Comercial"
  district_giga_alderson_commercial_plural:0 "Hipersegmentos Comerciales"
  district_giga_alderson_commercial_desc:0 "La industria civil y la infraestructura pueblan este hipersegmento dedicado al comercio."
  district_giga_alderson_science:0 "Hipersegmento de Investigación"
  district_giga_alderson_science_plural:0 "Hipersegmentos de Investigación"
  district_giga_alderson_science_desc:0 "Instalaciones de investigación de todo tipo llenan este hipersegmento."
  district_giga_alderson_admin:0 "Hipersegmento Administrativo"
  district_giga_alderson_admin_plural:0 "Hipersegmentos Administrativos"
  district_giga_alderson_admin_spiritualist:0 "Hipersegmento Eclesiástico"
  district_giga_alderson_admin_spiritualist_plural:0 "Hipersegmentos Eclesiásticos"
  district_giga_alderson_sanctuary:0 "Hipersegmento Santuario"
  district_giga_alderson_sanctuary_plural:0 "Hipersegmentos Santuarios"
  district_giga_alderson_consumer:0 "Hipersegmento Industrial"
  district_giga_alderson_consumer_plural:0 "Hipersegmentos Industriales"
  district_giga_alderson_consumer_desc:0 "Talleres llenos de artesanos e industrias civiles bordean las calles apiladas de este hipersegmento."
  district_giga_alderson_alloys:0 "Hipersegmento de Fundición"
  district_giga_alderson_alloys_plural:0 "Hipersegmentos de Fundición"
  district_giga_alderson_alloys_desc:0 "Orientado hacia las industrias militares, este hipersegmento ecumenopolítico está lleno del rugido de los hornos y el clang de las metalurgias."
  district_giga_alderson_leisure:0 "Hipersegmento de Ocio"
  district_giga_alderson_leisure_plural:0 "Segmentos de Ocio"
  district_giga_alderson_leisure_desc:0 "Donde los habitantes del hipersegmento se relajan en sus horas de ocio."
  district_giga_alderson_pop_growth:0 "Segmento de Desove"
  district_giga_alderson_pop_growth_plural:0 "Segmentos de Desove"
  district_giga_alderson_pop_growth_desc:0 "Atendidos por el cuidado científico y suave de los especialistas, estas piscinas estimulan nuestro desove hacia un crecimiento más rápido."
  district_giga_alderson_pop_assembly:0 "Segmento de Ensamblaje"
  district_giga_alderson_pop_assembly_plural:0 "Segmentos de Ensamblaje"
  district_giga_alderson_pop_assembly_desc:0 "Extensas fábricas, dedicadas al ensamblaje de nuestra población."
  ap_slice_of_life:0 "La Rebanada de Vida"
  ap_slice_of_life_desc:0 "Los mundos anillo, una vez vistos como el pináculo de la megaingeniería, ahora no son más que hábitats glorificados. Por lo tanto, debemos pasar al siguiente paso de la megaingeniería diseñando un nuevo tipo de hábitat que supere incluso a los mundos anillo más grandes. El $name_alderson$, un gigantesco disco del tamaño de un sistema solar construido alrededor de una estrella, nos permitiría albergar una cantidad inimaginable de personas e industria."
  add_research_options_alderson:0 "Opciones de investigación obtenidas:\n£engineering_research£§YEl $name_alderson$§!"
  ap_systemcraft:0 "Armas Celestiales Esotéricas"
  ap_systemcraft_desc:0 "Ya somos capaces de transformar planetas enteros en naves de guerra, pero algunos de nuestros científicos más ambiciosos creen que podría ser posible, de alguna manera, ir aún más allá. Un sistema solar entero, ensamblado para formar una nave de guerra de proporciones increíblemente grandes. Esta gran construcción eclipsaría incluso al poderoso $name_war_planet$, y por último, podríamos finalmente tener suficiente dakka."
  add_research_options_systemcraft_base:0 "Opciones de investigación obtenidas:\n£physics_research£§YEstructura: Propulsión a Escala Estelar§!\nComenzaremos a trabajar en una serie de tecnologías para eventualmente construir el nave más grande y grandioso que esta galaxia, o quizás incluso universo, haya visto jamás."
  pc_alderson_slice_ecu:0 "Ecumenópolis Alderson"
  pc_alderson_slice_ecu_desc:0 "Una ciudad verdaderamente titánica que se extiende a través de este sistema solar. Completamente envuelta en expansión urbano-industrial, esta Rebanada Alderson puede llevar cantidades incontables de industrias y personas en su superficie."
  pc_alderson_slice_hive:0 "Colmena Alderson"
  pc_alderson_slice_hive_desc:0 "Esta rebanada entera es un organismo gigante viviente, conectado psiónicamente con la Mente Colmena que lo formó. Cualquier ser que no sea parte de la Colmena que pise aquí será atacado por el mismo terreno."
  pc_alderson_slice_machine:0 "Máquina Alderson"
  pc_alderson_slice_machine_desc:0 "Cubierto con estructuras artificiales. La delgada atmósfera consiste principalmente de contaminantes industriales y no es capaz de soportar vida biológica."
  pc_alderson_slice_pc:0 "Complejo de Computación Alderson"
  pc_alderson_slice_pc_desc:0 "Un complejo de computación verdaderamente gigantesco similar a los planetarios, pero extendido sobre toda una Rebanada Alderson. Es capaz de un poder de procesamiento incontable, y proporciona increíbles mejoras a la investigación. Aún no puede ejecutar Crysis."
  tech_giga_planetary_shield_generator_1:0 "Pantalla Defensiva de Hipercampo"
  tech_giga_planetary_shield_generator_1_desc:0 "El $tech_giga_planetary_shield_generator_1$ es una versión mejorada de un generador de escudo planetario clásico que ofrece una mayor protección al planeta de abajo."
  district_giga_alderson_industrial:0 "Hipersegmento Industrial"
  district_giga_alderson_industrial_plural:0 "Hipersegmentos Industriales"
  district_giga_alderson_industrial_desc:0 "Un paisaje colosal dedicado a hiper-raíles verdaderamente titánicos, trajes de mecha masivos e incomprensibles fábricas. Este no es un lugar para un trabajador común."
  giga_blokkat.3351.a.tooltip:0 "El costo de esta tecnología es de aproximadamente §Y25M§!."
  giga_dialog.2501.title:0 "Especialización de Rebanada Alderson"
  giga_dialog.2501.desc:0 "Ha llegado el momento de decidir qué tipo de Rebanada Alderson queremos mejorar en este segmento particular. El tipo puede ser cambiado más tarde cuando el segmento esté completado, a través de la terraformación."
  giga_dialog.2505.title:0 "¡Complejo de Computación Alderson Completo!"
  giga_dialog.2505.desc:0 "¡Una de nuestras rebanadas de $name_alderson$ finalmente ha sido completada! Este colosal hábitat abarca varias unidades astronómicas y proporcionará cantidades incalculables de espacio vital para nuestra población e industrias. Esta rebanada está completamente cubierta por capas y capas de potentes computadoras y procesadores. Será capaz de proporcionar a nuestros investigadores con cantidades casi ilimitadas de poder de cómputo y acceso instantáneo a las bases de datos de conocimiento de nuestro imperio. Esta poderosa construcción seguramente nos ayudará a penetrar los misterios del universo con aún mayor facilidad que antes."
  giga_dialog.2505.a:0 "¡Maravilloso! ¿Puede ejecutar Crysis?"
  giga_dialog.2506.title:0 "¡Ecumenópolis Alderson Completa!"
  giga_dialog.2506.desc:0 "¡Una de nuestras rebanadas de $name_alderson$ finalmente ha sido completada! Este colosal hábitat abarca varias unidades astronómicas y proporcionará cantidades incalculables de espacio vital para nuestra población e industrias. Esta rebanada está completamente cubierta por expansión urbano-industrial, ofreciendo cantidades gigantescas de capacidad industrial y vivienda para nuestros ciudadanos."
  giga_dialog.2506.a:0 "¡Maravilloso!"
  giga_dialog.25061.title:0 "¡Colmena Alderson Completa!"
  giga_dialog.25061.desc:0 "¡Una de nuestras rebanadas de $name_alderson$ finalmente ha sido completada! Este colosal hábitat abarca varias unidades astronómicas y proporcionará cantidades incalculables de espacio vital para nuestra población e industrias. Esta rebanada entera es un organismo viviente gigante, psiónicamente conectado con la Mente Colmena que la formó. Cualquier ser que no sea parte de la Colmena que pise aquí será atacado por el propio terreno."
  giga_dialog.25061.a:0 "¡Maravilloso!"
  giga_dialog.25062.title:0 "¡Máquina Alderson Completa!"
  giga_dialog.25062.desc:0 "¡Una de nuestras rebanadas de $name_alderson$ finalmente ha sido completada! Este colosal hábitat abarca varias unidades astronómicas y proporcionará cantidades incalculables de espacio vital para nuestra población e industrias. Esta rebanada está completamente cubierta con estructuras artificiales. La atmósfera delgada consiste principalmente de contaminantes industriales y no es capaz de sostener vida biológica."
  giga_dialog.25062.a:0 "¡Maravilloso!"
  giga_dialog.2507.title:0 "¡$name_alderson$ Completo!"
  giga_dialog.2507.desc:0 "¡Se ha hecho! En el Sistema [giga_system.GetName], hemos logrado ensamblar completamente un disco colosal que se extiende desde la estrella hasta el borde del sistema. Esta gigantesca gigaestructura enana cualquier cosa que hayamos construido antes y se erige como un testimonio de nuestro dominio definitivo sobre las leyes de la física y la ingeniería."
  giga_dialog.2507.a:0 "¿Quién podría oponerse a nosotros ahora?"
  compound_def_army_name:0 "$ORD$ Preservador"
  compound_off_army_name:0 "$ORD$ Catalizador"
  compound_gen_army_name:0 "$ORD$ Catalizador"
  giga_mega.403.desc:0 "¡Noticias fantásticas! Después de mucha investigación y mapeo intensivos, nuestros científicos han anunciado que se han descubierto puntos de brecha de hiperspacio que conducen al cúmulo central! Nuestros equipos de investigación utilizaron un haz de taquiones de largo alcance para abrir remotamente esos puntos de brecha, creando así nuevas hipervías. Esto significa que el núcleo ahora es accesible (para nosotros, y para todos los demás también), y nuestros investigadores aconsejan encarecidamente enviar un buque para explorarlo."
  d_ehof_solar_array:0 "Colectores Solares Prístinos"
  tech_arcane_g_r:0 "Restauración del Generador de Grietas Arcanas"
  tech_arcane_g_r_desc:0 "Los secretos del $ehof_ep$ nos permiten controlar el metal consciente. Con su ayuda y la de la masa negativa, ahora somos capaces de restaurar completamente el Generador de Grietas Arcanas a su antigua gloria, permitiéndonos utilizarlo a su máximo potencial."
  ehof_timetoresearch:0 "¡Dile a los científicos que investiguen $tech_negative_pressure$!"
  mod_giga_pop_growth_speed_extra_add:0 "Crecimiento Secundario de Población Mensual"
  allow_systemcraft_p6:0 "$allow_war_system$ Estabilización del Casco Hiperdimensional"
  desc_systemcraft_p6:0 "Desbloquea otro paso del Sistema Solar de Combate."
  giga_menu_presets_random:0 "Aleatorio"
  giga_menu_presets_01:0 "Los 5 Originales"
  giga_menu_presets_02:0 "Fiel al nombre del mod"
  giga_menu_presets_03:0 "¡Más pequeño es mejor!"
  giga_menu_presets_04:0 "Gloria a los anillos"
  giga_menu_presets_05:0 "Megaestructuras Peligrosas"
  origin_orbital_arcology:0 "Arcología Orbital"
  origin_orbital_arcology_desc:0 "A lo largo de la evolución de esta especie, ha habido un gran anillo flotando en el cielo. Una vez que lograron el viaje espacial subluz, descubrieron que este anillo estaba completamente cubierto con tierra habitable y cultivable."
  origin_orbital_arcology_effects:0 "Comienza con una Arcología Orbital alrededor del planeta de inicio."
  giga_massive_planet:0 "Luna de Combate"
  giga_massive_planet_plural:0 "Luna de Combates"
  giga_war_moon_fe:0 "Antigua Luna de Combate"
  giga_war_moon_fe_plural:0 "Núcleo"
  giga_planet_behemoth_fe:0 "Antigua $name_war_planet$"
  giga_planet_behemoth_fe_plural:0 "Antigua $name_war_planet$s"
  ancient_holy_behemoth_ship_mid_01_key:0 "Núcleo"
  ancient_behemoth_ship_mid_01_key:0 "Núcleo"
  SYSTEMCRAFT_FARMS:0 "Granja Continental"
  SYSTEMCRAFT_FARMS_DESC:0 "§GProducción:\n30 Alimentos§!\nUna granja de tamaño continental construida en un planeta Sistema Solar de Combate."
  SYSTEMCRAFT_SHIPYARD:0 "Instalación Auxiliar de Astillero"
  SYSTEMCRAFT_SHIPYARD_DESC:0 "§YMantenimiento:\n15 Aleaciones§!\nUna instalación de astillero adicional para que Sistema Solar de Combate produzca naves."
  INVESTIGATE_GALACTIC_CORE:0 "Localizar Hipervías del Núcleo Galáctico"
  INVESTIGATE_GALACTIC_CORE_DESC:0 "El núcleo galáctico está actualmente oculto para nosotros, pero podríamos ser capaces de localizar débiles rutas de hiperspacio que conducen a él. El acceso al núcleo representará tanto una ventaja estratégica como científica, ya que los sistemas centrales probablemente sean ricos en recursos.\nEste proyecto puede ser emprendido en cualquier momento cuando esté listo."
  INVESTIGATE_GALACTIC_CORE_LINK:0 "Localizar Hipervías de Conexión del Núcleo Galáctico"
  INVESTIGATE_GALACTIC_CORE_LINK_DESC:0 "Nuestras proyecciones muestran que debería haber hipervías entre el núcleo y el resto de la galaxia. Con suficiente esfuerzo de investigación deberíamos ser capaces de localizarlas y activarlas"
  decision_repaired_shattered_alderson:0 "Reparar hipersegmento"
  feeble_ai_mega_buff:0 "IA débil"
  feeble_ai_mega_buff_desc:0 "Un pequeño empujón en la dirección correcta"
  virtual_world:0 "Mundo Virtual"
  virtual_world_desc:0 "Este mundo está completamente simulado por los increíbles procesadores del $name_matrioshka_brain$. Como tal, es imposible producir minerales aquí, y mantener a la población en cápsulas de estasis es bastante caro."
  giga_tech_war_system_hull_booster:0 "Estabilización del Casco Hiperdimensional"
  giga_tech_war_system_hull_booster_desc:0 "El $name_war_system$ es un buque poderoso, y como tal, agregar estructuras dedicadas ancladas dentro de dimensiones superiores puede asegurar que su casco colosal no colapse bajo su propia gravedad."
  giga_tech_particle_accelerator:0 "Colisionadores de Partículas Ultra-Energéticas"
  giga_tech_particle_accelerator_desc:0 "Acelerar partículas una contra otra es una forma eficiente de aprender sobre cómo interactúan. La capacidad de construir aceleradores enormes, capaces de rodear una estrella, ciertamente resultará útil."
  giga_dialog.1801.name:0 "Construcción de $name_particle_accel$"
  giga_dialog.1801.desc:0 "El Emplazamiento ubicado cerca de [giga_system.GetName] ya está terminado. Ahora podemos comenzar a trabajar en el acelerador de partículas real, que se envolverá alrededor de la estrella, lo que permitirá acelerar partículas a velocidades tremendas."
  giga_dialog.1801.a:0 "Maravilloso."
  giga_dialog.1802.name:0 "$name_particle_accel$ Construido"
  giga_dialog.1802.desc:0 "Después de meses y meses de trabajo, el acelerador de partículas alrededor de [giga_system.GetName] ya está terminado y operativo. Posee la capacidad de acelerar partículas a velocidades que ni siquiera se pensaba que eran posibles, lo que nos permitirá aprender bastante sobre las partículas y cómo interactúan entre sí."
  giga_dialog.1802.a:0 "Excelente trabajo."
  giga_dialog.1803.name:0 "$name_particle_accel$ En Ruinas"
  giga_dialog.1803.desc:0 "¡Nuestra nave científica ha hecho un descubrimiento increíble! En medio del sistema [from.GetName] yace un masivo $name_particle_accel$, que teóricamente podría acelerar partículas increíblemente cerca de la velocidad de la luz.\n\nLamentablemente, parece haber sufrido daños increíbles y actualmente se encuentra en un estado de desesperada descomposición. Sin embargo, nuestros científicos confían en que podría ser devuelto a un estado de funcionamiento, dadas las tecnologías adecuadas."
  giga_dialog.1803.a:0 "Maravilloso."
  giga_dialog.1804.name:0 "$name_particle_accel$ ¡Reparado!"
  giga_dialog.1804.desc:0 "¡Buenas noticias! ¡Nuestros ingenieros han logrado restaurar el $name_particle_accel$ en ruinas a un estado de funcionamiento! Ahora está operativo y está produciendo un flujo constante de investigación de física, así como muchas partículas exóticas."
  giga_dialog.1804.a:0 "Increíble."
  particle_accelerator_0:0 "Emplazamiento de $gc_kilo$$name_particle_accel$"
  particle_accelerator_0_DESC:0 "Un gran Emplazamiento que alberga al personal y los materiales necesarios para construir un acelerador de partículas alrededor de una estrella."
  particle_accelerator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\nGenera £physics_research£ §YInvestigación de Física§! y aumenta §YHP de Escudo§! por §Y2.5%§!\n§LEste colosal acelerador de partículas se envuelve alrededor de una estrella, acelerando partículas a velocidades nunca vistas para fines de investigación."
  particle_accelerator_1_DESC:0 "Un acelerador de partículas extremadamente grande construido alrededor de una estrella. Es capaz de acelerar varios tipos de partículas a velocidades casi iguales a la velocidad de la luz, lo que nos permite ampliar enormemente nuestra comprensión de lo que están hechas y cómo interactúan."
  particle_accelerator_ruined:0 "$name_particle_accel$ En Ruinas"
  particle_accelerator_ruined_DESC:0 "Un $name_particle_accel$ en ruinas, construido hace decenas de miles de años por una civilización desconocida. Ha sufrido daños increíbles, pero el marco principal todavía está algo intacto. Con las tecnologías adecuadas, potencialmente podría ser restaurado a un estado de funcionamiento."
  particle_accelerator_restored_DESC:0 "Un acelerador de partículas extremadamente grande construido alrededor de una estrella. Es capaz de acelerar varios tipos de partículas a velocidades casi iguales a la velocidad de la luz, lo que nos permite ampliar enormemente nuestra comprensión de lo que están hechas y cómo interactúan."
  giga_tech_orbital_arcologies_overlord:0 "Arcologías Orbitales del Mundo Anillo"
  giga_tech_orbital_arcologies_overlord_desc:0 "A medida que los planetas crecen y se desarrollan, a menudo empiezan a quedarse sin espacio para distritos adicionales. Al ampliar las secciones habitables de nuestros Anillos Orbitales, se pueden crear grandes cantidades de espacio utilizable."
  giga_fallen_empire.101.name:0 "¡Movimiento de Cuerpo Celestial Detectado!"
  giga_fallen_empire.101.desc:0 "¡Noticias alarmantes! Poco después del despertar de uno de los Imperios Caídos, los sensores de largo alcance han detectado que múltiples planetas dentro de su territorio han abandonado sus órbitas. Enormes armas ocultas y propulsores emergieron de sus cortezas, y ahora se han transformado en temibles planetoids armados. Parece que estas antiguas civilizaciones tenían más armamento oculto de lo que se pensaba anteriormente..."
  giga_fallen_empire.101.a:0 "¡A las estaciones de batalla!"
  giga_fallen_empire.102.name:0 "El Behemoth Sagrado"
  giga_fallen_empire.102.desc:0 "No es ningún secreto que los Imperios Despertados poseen muchos tipos de armas antiguas que han estado inactivas durante milenios. Pero nadie podría predecir que uno de los Mundos Sagrados de los Guardianes Sagrados no era en realidad un mundo regular, sino más bien, una gigantesca e inactiva nave espacial del tamaño de un planeta. Y con su reciente despertar, esta colosal nave espacial se ha reactivado y el otrora prístino Mundo Gaia se ha transformado en un colosal planeta armado, capaz de aniquilar cualquier cosa que se interponga en su camino. Parece que están más preparados para defender su fe de lo que anticipamos..."
  giga_fallen_empire.102.a:0 "Esto es malo."
  giga_flusion.001.desc:0 "Nuestra nave científica que inspeccionaba el primitivo mundo de Flusion ha hecho un sorprendente descubrimiento, ya que parece que este primitivo mundo está habitado no por una, sino por varias especies sapientes!\n\nLa tripulación ha podido identificar 5 especies principales: los felinos Katzens, los anfibios Zuspris, los humanoides Roqualians y los crustáceos Kronks; con una quinta especie "Flusioniana" que consiste en docenas de otras subespecies difíciles de clasificar.\n\nNuestros científicos todavía no están seguros de cómo o por qué tantas especies terminaron en un solo mundo, pero esto es sin duda un hallazgo notable."
  giga_flusion.002.desc:0 "Nuestros hallazgos de Katzens y Zuspris en diferentes planetas parecen indicar que el mundo al que las dos especies escaparon después de la destrucción de Katzenland no es otro que el primitivo planeta de Flusion!\n\nAunque, en el momento de su descubrimiento en Flusion, ambas especies parecían haber regresado drásticamente en tecnología. Esto implica que la §YExpedición a Meopía 1§! muy probablemente se estrelló en el planeta, obligando a los pocos individuos restantes a reconstruir prácticamente toda su base tecnológica.\n\nAunque no es un descubrimiento particularmente importante, estos hallazgos son de gran interés para nuestros bioarqueólogos planetarios. También muestra que, incluso cuando las cosas parecen particularmente sombrías para una civilización, no se debe descartar la posibilidad de su milagrosa supervivencia contra todo pronóstico.\n\nLo cual puede ser tanto alentador como aterrador pensar..."
  katzenartig_balance:0 "Equilibrio del Imperio Katzenartig"
  katzenartig_balance_desc:0 "Para fabricar meticulosamente el fervor de lucha de estos felinos funky."
  giga_katzen.022.desc:0 "Tras una larga guerra con los Katzens, finalmente hemos logrado firmar un tratado de paz con ellos, poniendo fin a más de una década de conflicto.\n\nLas hostilidades entre nosotros y el Imperio han cesado, y las fronteras actuales se han oficializado. El Kaiser también podría estar más abierto a negociaciones ahora que la guerra ha terminado."
  katzenartig_splinter:0 "Recursos del Estado Fragmentado"
  katzenartig_splinter_desc:0 "Para evitar un colapso catastrófico."
  giga_katzen.02021.desc:0 "¡El sistema Gatzo! Es donde yace nuestra antigua patria de §YKatzenland§!, donde nuestra especie escapó por poco de la extinción a bordo de una nave colonia después de que el loco §YMeopa§! aniquilara su superficie en fuego nuclear.\n\nEl Kaiser estaría dispuesto a dar a tu especie §Y15000§! £energy£ a cambio de este sistema extremadamente valioso, que consideraríamos sagrado si fuéramos una especie espiritualista.\n\nEntonces, ¿qué dices?"
  katzenartig_major_splinter:0 "Recursos de Estado Mayor Disidente"
  katzenartig_major_splinter_desc:0 "Para prevenir un colapso catastrófico."
  aet_intel_1:0 "Inteligencia Tecnológica Aeternita"
  aet_intel_1_desc:0 "Nuestro conocimiento de la tecnología Aeternita mejora nuestras capacidades de combate contra ellos."
  giga_dismantle_accelerator_tooltip:0 "$giga_dismantle_mega$\n\nDesmontar este §YAcelerador de Partículas Estelar§! nos dará §Y3500§! £alloys£ de vuelta."
  giga_accelerator_ui_guide:0 "El §YAcelerador de Partículas Estelar§! es una maravilla tecnológica, que puede acelerar un diluvio de partículas a velocidades relativistas y causar colisiones de partículas increíbles de magnitud sin precedentes gracias a su inmensa longitud.\n\nCon las tecnologías adecuadas, estas colisiones no solo pueden producir §Ygrandes resultados científicos§!, sino también un pequeño flujo de otros §Yrecursos exóticos§!, formados durante las reacciones que desafían la física que tienen lugar dentro de la estructura.\n\nTambién podemos §Yincrementar§! la §Yintensidad§! de las colisiones, lo que a su vez aumentará la §Ysalida§! y el §Ymantenimiento§! de la megaestructura.\n\nSin embargo, producir §Yrecursos exóticos§! y aumentar la §Yintensidad de colisión§! son procesos relativamente §Rpeligrosos§!, que conducirán a un mayor riesgo de que ocurran §RFallas§! dentro de la estructura, y pueden requerir una intervención inmediata para evitar la §RDestrucción catastrófica§!."
  giga_med_failure_risk:0 "Hay un §Y20%§! de probabilidades de que ocurra una §RFalla catastrófica§! en los próximos meses."
  giga_accelerator.2000.name:0 "¡Desmantelando un §YAcelerador de Partículas Estelar§!"
  giga_accelerator.2000.desc:0 "¿Está seguro de que desea desmantelar este §YAcelerador de Partículas Estelar§!?\n\nRecibiremos §Y3500§! £alloys£ de vuelta."
  giga_flavor.2000.yes:0 "Sí, proceda con el desmantelamiento."
  giga_accelerator.2000.tooltip:0 "Este §YAcelerador de Partículas Estelar§! será §RDesmontado§!."
  particle_accelerator_1_manage:0 "Administrar Megaestructura..."
  particle_accelerator_1_manage_DESC:0 "Abrir el menú de configuración de este §YAcelerador de Partículas Estelar§!."
  giga_accelerator.110.name:0 "Daño Estructural en el Acelerador de Partículas Estelar"
  giga_accelerator.110.desc:0 "La tripulación que opera el §YAcelerador de Partículas Estelar [giga_mega_event_system.GetName]§! está reportando que algunas partes del acelerador han sufrido severos daños estructurales, muy probablemente debido a los altos requerimientos de energía de los experimentos realizados dentro de la estructura.\n\nSi bien la megaestructura sigue siendo funcional, aconsejan tomar medidas inmediatas para corregir este problema y reparar los daños, ya que dejarlo sin corregir podría tener consecuencias fatales para la integridad de la estructura si la forzamos un poco demasiado."
  giga_accelerator.110.a:0 "Apagarlo y enviar §Y3000§! £alloys£ para repararlo de inmediato."
  giga_accelerator.110.a.tooltip:0 "La intensidad del §YAcelerador de Partículas Estelar§! se configurará a §BApagado§! por §Y6 meses§!.\nSe volverá a configurar a §BNormal§! después."
  giga_accelerator.110.b:0 "Apagarlo por un año y realizar reparaciones mínimas."
  giga_accelerator.110.b.tooltip:0 "La intensidad del §YAcelerador de Partículas Estelar§! se configurará a §BBaja§! por §Y1 año§!.\nSe volverá a configurar a §BNormal§! después.\n\n$giga_med_failure_risk$"
  giga_accelerator.110.c:0 "¡No importa!"
  giga_accelerator.111.name:0 "¡Reparaciones al Acelerador de Partículas Estelar Exitosas!"
  giga_accelerator.111.desc:0 "¡La tripulación de nuestro §YAcelerador de Partículas Estelar§! en el sistema §Y[giga_mega_event_system_name.GetName]§! reporta que las reparaciones realizadas en la megaestructura han sido exitosas!\n\n¡La megaestructura ha sido restaurada a pleno funcionamiento y está lista para cualquier otra cosa que pueda necesitarse!"
  giga_accelerator.111.a:0 "¡Maravilloso!"
  giga_accelerator.112.name:0 "Acelerador de Partículas Estelar: ¡§RFalla Catastrófica§!"
  giga_accelerator.112.desc:0 "Informes graves indican que el §YAcelerador de Partículas Estelar§! en el sistema §Y[giga_mega_event_system_name.GetName]§! desafortunadamente no pudo resistir su daño estructural.\n\nDe hecho, durante un reciente experimento de colisión de partículas, la estructura no logró contener adecuadamente las energías cataclísmicas de la colisión, las cuales posteriormente sobrecargaron el delicado armazón de todo el acelerador, causando una reacción en cadena y un §Rcolapso estructural completo§!.\n\nLa megaestructura se ha reducido a una masa de escombros espaciales en órbita solar, que quizás podamos reparar si contamos con suficientes recursos."
  giga_accelerator.112.a:0 "¡Maldición!"
  giga_accelerator.112.a.tooltip:0 "El §YAcelerador de Partículas Estelar§! en el sistema §Y[giga_mega_event_system_name.GetName]§! se convierte en §Rarruinado§!."
  giga_accelerator.120.name:0 "Temores de Decadencia"
  giga_accelerator.120.desc:0 "Informes de todo nuestro imperio indican que, luego de la construcción y subsecuente activación de un §YAcelerador de Partículas Estelar§!, algunos de nuestros ciudadanos han comenzado a evocar crecientes preocupaciones sobre la posibilidad de que la estructura desencadene una §YDecadencia de Vacío Falso§!.\n\nDe hecho, según algunas teorías, las colisiones extremadamente energéticas que tienen lugar dentro del acelerador podrían conducir a lo que se conoce como una §YDecadencia de Vacío§!, que es cuando un repentino estallido de energía en un punto localizado del espacio desestabiliza uno de los campos cuánticos principales del universo y posteriormente altera las leyes de la física.\n\nEsto llevaría a una reacción en cadena, creando una esfera en expansión dentro de la cual las leyes de la física son diferentes, y que por lo tanto eventualmente envolvería todo el universo, destruyéndolo.\n\nObviamente, nuestros principales científicos niegan esta teoría, alegando que es "rebuscada" e "insensata", pero el temor no obstante está creciendo entre nuestra población, y el tema se ha agravado por varios científicos prominentes decidiendo respaldar el reclamo.\n\nCon muchos afirmando que la megaestructura traería el "Fin del universo", ahora están pidiendo el desmantelamiento de nuestros §YAceleradores de Partículas Estelares§!..."
  giga_accelerator.120.a:0 "¡Invertir recursos en realizar un gran estudio para refutarlo!"
  giga_accelerator.120.b:0 "Censurar la prensa y arrestar a cualquiera que difunda la afirmación."
  giga_accelerator.120.c:0 "Ignorar el problema. Pasará."
  giga_accelerator.120.d:0 "¡Cumplir y destruir los aceleradores!"
  giga_accelerator.120.d.tooltip:0 "Todos los §YAceleradores de Partículas Estelares§! en nuestro imperio serán §RDesmantelados§!.\n\nRecibiremos §Y3500§! £alloys£ por cada acelerador desmantelado."
  giga_accelerator.120.b.tooltip:0 "La gente se enfadará al principio, pero eventualmente lo olvidará."
  giga_accelerator.120.a.tooltip:0 "Realizaremos un gran estudio para asegurarnos de que esta teoría sea totalmente refutada."
  censored_vacuum_fears:0 "Temores del Vacío Falso Censurados"
  censored_vacuum_fears_desc:0 "La teoría del Vacío Falso es una tesis absurda por naturaleza. Nos aseguraremos de que nadie hable sobre ella nunca más."
  false_vacuum_fears:0 "Temores de Vacío Falso"
  false_vacuum_fears_desc:0 "Nuestra población teme una Decadencia de Vacío Falso teórica que podría ser causada por un Acelerador de Partículas Estelar."
  conducting_false_vacuum_study:0 "Realizando Estudio del Vacío Falso"
  conducting_false_vacuum_study_desc:0 "Estamos empleando todo lo que podemos en un estudio para refutar la teoría del Vacío Falso."
  giga_accelerator.121.name:0 "Temores Huecos"
  giga_accelerator.121.desc:0 "Se ha requerido un gran esfuerzo, pero finalmente, nuestros científicos han logrado refutar completamente la teoría del Vacío Falso.\n\nAl emplear una serie de tesis, teorías, experimentos y anuncios públicos para mostrar sus hallazgos, han logrado eliminar casi por completo el temor de la población sobre el Vacío Falso, y aunque algunos grupos aún creen que todo es un encubrimiento, podremos continuar usando nuestro §YAcelerador de Partículas Estelar§! sin ser molestados.\n\nEl estudio también nos ha ayudado a mejorar nuestra comprensión del universo en general, lo cual sin duda beneficiará nuestra investigación en física."
  giga_accelerator.121.a:0 "¡Hurra!"
  giga_accelerator.122.name:0 "Vacío Verdadero"
  giga_accelerator.122.desc:0 "Después de algunos años de arduos esfuerzos, nuestros científicos encargados de estudiar la teoría del Vacío Falso finalmente han llegado a una conclusión.\n\n¡§REs cierta§!.\n\n¡Todo es cierto! De hecho, han determinado que, si bien las probabilidades de que ocurra son infinitamente pequeñas, es posible que un acelerador de partículas lo suficientemente grande cause un Vacío Falso que destruiría toda la galaxia.\n\nA pesar de que es tan increíblemente improbable que ocurra, que es más probable que el universo muera por sí mismo antes de que se forme un vacío falso, nuestra comunidad científica rápidamente se ha alarmado por estos hallazgos, y muchos también están comenzando a pedir que desmantelemos los aceleradores.\n\nEn una nota más positiva, y posiblemente lo único bueno que salga de esto, el estudio nos ha ayudado a mejorar nuestra comprensión del universo en general, pero podría ser en vano si terminamos destruyendo dicho universo."
  giga_accelerator.122.a:0 "Censurar los hallazgos y mentirle a la población."
  giga_accelerator.122.a.tooltip:0 "Esto tiene una posibilidad de salir mal.\n\nLos hallazgos tienen más probabilidades de filtrarse si somos §YIgualitarios§!, y viceversa si somos §YAutoritarios§!."
  giga_accelerator.122.b:0 "Simplemente anúncialo. Eventualmente dejarán de pensar en eso."
  giga_accelerator.122.c:0 "Desmantelar los aceleradores."
  false_vacuum_study:0 "Estudio del Vacío Falso"
  false_vacuum_study_desc:0 "Estudiar la posibilidad de un Vacío Falso ha expandido nuestra comprensión del universo."
  giga_accelerator.123.name:0 "¡Hallazgos del Vacío Falso Filtrados!"
  giga_accelerator.123.desc:0 "¡Noticias alarmantes! Parece que nuestros hallazgos sobre el Vacío Falso de alguna manera se han filtrado a nuestra población.\n\nEsto ha tenido consecuencias desastrosas, con grandes partes de nuestra población sucumbiendo al pánico por las revelaciones..."
  giga_accelerator.123.a:0 "¡Maldita sea..."
  giga_accelerator.123.b:0 "¡Suficiente! ¡Simplemente desháganse de los aceleradores y terminemos con esto!"
  giga_accelerator.130.name:0 "Hallazgos del Acelerador de Partículas Estelar"
  giga_accelerator.130.desc:0 "El personal de nuestro §YAcelerador de Partículas Estelar§! informa que han hecho una serie de interesantes descubrimientos últimamente, que sin duda beneficiarán nuestra investigación en física en curso."
  giga_accelerator.130.a:0 "Bien."
  giga_accelerator.130.b:0 "¡Aumenten el salario de los científicos!"
  gave_accelerator_scientists_raise:0 "Salarios de Científicos Aumentados"
  gave_accelerator_scientists_raise_desc:0 "Estamos otorgando salarios más altos a los científicos del Acelerador de Partículas Estelar."
  giga_accelerator.131.name:0 "Más Hallazgos del Acelerador de Partículas Estelar"
  giga_accelerator.131.desc:0 "Después del aumento salarial anterior, el personal de nuestro §YAcelerador de Partículas Estelar§! ha hecho más descubrimientos que sin duda beneficiarán nuestra investigación en física en curso."
  giga_accelerator.131.a:0 "Bien."
  giga_accelerator.140.name:0 "Excedente de Materia Oscura"
  giga_accelerator.140.desc:0 "¡El personal de nuestro §YAcelerador de Partículas Estelar§! informa que los recientes experimentos de colisión han terminado generando un excedente de exótica §YMateria Oscura§!!\n\nHan logrado cosecharla usando redes electromagnéticas especializadas, y posteriormente enviaron los recursos directamente a nuestras reservas."
  giga_accelerator.140.a:0 "¡Maravilloso!"
  giga_accelerator.140.b:0 "¡Aumenten el salario de los científicos!"
  giga_accelerator.141.name:0 "Más Excedente de Materia Oscura"
  giga_accelerator.141.desc:0 "Después del aumento salarial anterior, el personal de nuestro §YAcelerador de Partículas Estelar§! ha estado trabajando duro y logró replicar su éxito previo, ¡creando más §YMateria Oscura§!!\n\nLos recursos han sido enviados directamente a nuestras reservas."
  giga_accelerator.141.a:0 "¡Maravilloso!"
  giga_acc_intensity_up:0 "§YAumentar§! la intensidad de esta megaestructura."
  giga_acc_intensity_down:0 "§YDisminuir§! la intensidad de esta megaestructura."
  mega_intensity_meaning:0 "Aumentar la intensidad conducirá a una mayor §RPosibilidad de Falla§! anual, lo que hará que la megaestructura requiera reparaciones, o de lo contrario podría ocurrir una §RFalla Catastrófica§!."
  giga_acc_physics:0 "El §YAcelerador de Partículas Estelar§! puede especializarse en producir §YInvestigación Física§! al chocar varias partículas y observar los resultados. \n\nProducción Base: §Y150§! £physics_research£"
  giga_acc_dm:0 "El §YAcelerador de Partículas Estelar§! puede especializarse en producir §YMateria Oscura§! gracias a colisiones de partículas especiales que generarán trazas de materia oscura.\n\nProducción Base: §Y100§! £physics_research£ §Y1§! £sr_dark_matter£\n¡Posibilidad de Falla Base: §R+5%§!"
  giga_acc_qnm:0 "El §YAcelerador de Partículas Estelar§! puede especializarse en producir §YMasa Negativa§! gracias a colisiones de partículas esotéricas y muy específicas que crean materia negativa.\n\nProducción Base: §Y80§! £physics_research£ §Y0.7§! £giga_sr_negative_mass£\n¡Posibilidad de Falla Base: §R+10%§!"
  giga_acc_intensity_5:0 "Intensidad Actual:\n§BExtrema§!\n\nEfecto:\n§G+75% Producción de la Megaestructura§!\n§R+200% Mantenimiento de la Megaestructura§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_4:0 "Intensidad Actual:\n§BAlta§!\n\nEfecto:\n§G+50% Producción de la Megaestructura§!\n§R+100% Mantenimiento de la Megaestructura§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_3:0 "Intensidad Actual:\n§BMedia§!\n\nEfecto:\n§G+25% Producción de la Megaestructura§!\n§R+40% Mantenimiento de la Megaestructura§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_2:0 "Intensidad Actual:\n§BNormal§!\n\nEfecto:\n§Y100% Producción de la Megaestructura§!\n§Y100% Mantenimiento de la Megaestructura§!\n\n$mega_intensity_meaning$"
  giga_acc_intensity_1:0 "Intensidad Actual:\n§BDesactivado§!\n\nEfecto:\n§R-100% Producción de Megaestructura§!\n§G-100% Mantenimiento de Megaestructura§!\n\n$mega_intensity_meaning$"
  giga_accelerator.150.name:0 "Agujero Negro a la Deriva"
  giga_accelerator.150.desc:0 "Nuestro §YAcelerador de Partículas Estelares§! alrededor de §Y[accelerator_quasistar.GetName]§! informa que un evento improbable ha ocurrido recientemente dentro del acelerador.\n\nHace apenas unas horas, un experimento de colisión de partículas inusualmente energético terminó creando un §Ymicroscopic agujero negro§!. Aunque esto normalmente no es notable, ya que estos agujeros negros normalmente se evaporan nanosegundos después de aparecer, parece que esta particular singularidad era lo suficientemente masiva como para comenzar a caer hacia la estrella e impactar el marco del acelerador, otorgándole así algo de materia para alimentarse y evitar la evaporación.\n\nEl daño causado por el agujero negro es mínimo, ya que simplemente excavó un pequeño túnel de unos pocos micrómetros de ancho a través del acelerador. Sin embargo, luego salió rápidamente de la megaestructura, y ahora está cayendo hacia la superficie de la estrella.\n\nEstimamos que tomará unos días para que alcance la estrella, y lo más probable es que comience a masticar a través de sus capas externas antes de llegar al núcleo estelar. Nuestros científicos no están seguros de qué sucederá a continuación, pero aconsejan que lo monitoreemos de cerca... ya que el potencial de investigación es innegable."
  giga_accelerator.150.a:0 "Preocupante. Debemos seguir la pista de este agujero negro."
  giga_accelerator.150.b:0 "¡Fascinante! El potencial científico es innegable."
  giga_accelerator.151.name:0 "Devorado desde Dentro"
  giga_accelerator.151.desc:0 "El agujero negro microscópico que había caído en §Y[accelerator_quasistar.GetName]§! ahora ha alcanzado el núcleo de la estrella, y según el personal del §YAcelerador de Partículas Estelares§!, el plasma estelar en el núcleo de la estrella ha comenzado a caer en la singularidad, aumentando su tamaño, permitiéndole consumir más y más materia a medida que crece.\n\nEsto efectivamente significa que §Y[accelerator_quasistar.GetName]§! está encogiendo! Aunque actualmente es imperceptible, la tasa a la que se consume la materia solo aumentará a medida que el agujero negro dentro de su núcleo aumente de tamaño con el tiempo.\n\nAfortunadamente para nosotros, el personal de nuestro acelerador nos asegura que no hay de qué preocuparse en el futuro previsible, y parecen bastante emocionados ante la perspectiva de estudiar este increíble suceso."
  giga_accelerator.151.a:0 "Esto todavía suena un poco preocupante."
  studying_accelerator_black_hole_star:0 "Estudiando Agujero Negro Intraestelar"
  studying_accelerator_black_hole_star_desc:0 "Nuestros científicos están presenciando una estrella siendo lentamente devorada desde dentro por un agujero negro artificial."
  studying_accelerator_black_hole_star_1:0 "Estudiando Agujero Negro Intraestelar"
  studying_accelerator_black_hole_star_1_desc:0 "Nuestros científicos están presenciando una estrella siendo lentamente devorada desde dentro por un agujero negro artificial."
  giga_quasi_star:0 "Agujero Negro Intraestelar"
  giga_quasi_star_desc:0 "Un agujero negro artificial está devorando esta estrella desde dentro."
  giga_accelerator.152.name:0 "Acelerando el Declive"
  giga_accelerator.152.desc:0 "El personal del §Y[accelerator_quasistar.GetName]§! Acelerador de Partículas Estelares está informando que el agujero negro interno de la estrella está creciendo más rápido de lo esperado.\n\nDe hecho, el radio aparente de la estrella ha comenzado a encogerse visiblemente en los últimos meses, indicando que el crecimiento de la singularidad está comenzando a acelerarse exponencialmente.\n\nComo resultado, la luminosidad de la estrella está disminuyendo lentamente, enfriando ligeramente los planetas del sistema.\n\nSin embargo, sigue siendo una increíble oportunidad científica, que continúa beneficiando nuestra investigación en física."
  giga_accelerator.152.a.tooltip:0 "Todos los planetas en el sistema §Y[accelerator_quasistar.GetName]§! se vuelven más fríos.\nCualquier colonia en el sistema sufrirá de §Yfuerte empuje de la emigración§!.\n\n"
  giga_quasi_star_cooling_planet:0 "Estrella Atenuante"
  giga_quasi_star_cooling_planet_desc:0 "La estrella de este planeta se está atenuando lentamente debido a un agujero negro que devora su masa. Como resultado, este mundo se está enfriando progresivamente."
  giga_quasi_star_cooling_planet_1:0 "Estrella Atenuante"
  giga_quasi_star_cooling_planet_1_desc:0 "La estrella de este planeta se está atenuando lentamente debido a un agujero negro que devora su masa. Como resultado, este mundo se está enfriando progresivamente."
  giga_accelerator.153.name:0 "Consumo Escalante"
  giga_accelerator.153.desc:0 "¡Noticias alarmantes! El agujero negro dentro de §Y[accelerator_quasistar.GetName]§! ahora está consumiendo rápidamente la estrella, la cual ha encogido significativamente en los últimos años.\n\nLos planetas del sistema se han enfriado notablemente, y el agujero negro continúa creciendo dentro de la estrella, habiendo consumido una gran parte del núcleo estelar.\n\nMientras todavía proporciona enormes cantidades de datos científicos, las consecuencias que esto está teniendo en el sistema son cada vez más preocupantes día con día."
  giga_accelerator.153.a:0 "¡Esto es sumamente problemático!"
  giga_accelerator.153.a.tooltip:0 "Todos los planetas en el sistema §Y[accelerator_quasistar.GetName]§! se vuelven aún más fríos.\nCualquier colonia en el sistema sufrirá de §Yfuerte empuje de la emigración§!.\n\n"
  giga_accelerator.155.name:0 "Equilibrio"
  giga_accelerator.155.desc:0 "Sorprendentes informes están llegando desde §Y[accelerator_quasistar.GetName]§!, ¡ya que la estrella en contracción ha dejado de encogerse!\n\nAunque inicialmente desconcertados por este suceso, nuestros científicos se dieron cuenta rápidamente de que la radiación generada por algún material estelar cayendo en el agujero negro está generando en realidad una forma de presión hacia afuera, que contrarresta la gravedad y posteriormente impide que el resto de la estrella colapse aún más.\n\nEsto efectivamente significa que la estrella aún se encogerá, aunque extremadamente lento, ya que toda su capa exterior ahora está soportada por la radiación del agujero negro, y aunque los planetas del sistema todavía están más fríos de lo que solían estar, el sistema ya no está condenado a una muerte completamente fría."
  giga_accelerator.155.a:0 "Intrigante."
  giga_accelerator.156.name:0 "Rebote"
  giga_accelerator.156.desc:0 "¡§Y[accelerator_quasistar.GetName]§! nunca deja de decepcionar. De hecho, en un giro sorprendente, parece que la estrella ha dejado de encogerse completamente, ¡e incluso está comenzando a crecer más grande!\n\nEstudios adicionales han revelado que la presión de radiación del material cayendo en el agujero negro está en realidad \"empujando\" el sobre exterior de la estrella, causándole hincharse y expandirse hacia afuera.\n\nEsto también significa que la luminosidad de la estrella está aumentando de nuevo, y los planetas del sistema están empezando a calentarse de nuevo a su temperatura original."
  giga_accelerator.156.a:0 "¡Un problema que se resolverá por sí mismo! Qué encantador."
  giga_accelerator.156.a.tooltip:0 "Todos los planetas en el sistema de §Y[accelerator_quasistar.GetName]§! se vuelven más calientes.\n\n"
  giga_accelerator.158.name:0 "Expandiéndose Hacia Afuera"
  giga_accelerator.158.desc:0 "Nuestros científicos informan que §Y[accelerator_quasistar.GetName]§! ha pasado ahora su tamaño original, y continúa hinchándose a tamaños más grandes debido a la presión de radiación del agujero negro.\n\nLa temperatura de los planetas del sistema ha vuelto a valores normales, pero ahora está aumentando lentamente a medida que la estrella se expande hacia afuera.\n\nEsto continúa produciendo un potencial científico inmenso, pero la superficie en expansión de la estrella está empezando a acercarse alarmantemente al §YAcelerador de Partículas Estelares§! del sistema..."
  giga_accelerator.158.a:0 "Preocupante..."
  giga_accelerator.158.a.tooltip:0 "Todos los planetas en el sistema de §Y[accelerator_quasistar.GetName]§! se vuelven más calientes."
  giga_quasi_star_heating_planet:0 "Estrella Creciente"
  giga_quasi_star_heating_planet_desc:0 "La estrella de este planeta se está volviendo más brillante como resultado de un agujero negro intraestelar empujando contra sus capas exteriores. Mientras que las condiciones superficiales se han vuelto menos hospitalarias, es ciertamente una gran oportunidad para estudiar los procesos exóticos que ocurren dentro de la estrella y el sistema como resultado del agujero negro. La estrella también es mucho más brillante, lo que aumenta drásticamente la energía generada por las granjas solares."
  giga_accelerator.160.name:0 "Nacimiento De Una Quasi-Estrella"
  giga_accelerator.160.desc.a:0 "Noticias alarmantes nos han llegado que la expansión de §Y[accelerator_quasistar.GetName]§! finalmente ha destruido el §YAcelerador de Partículas Estelares§! del sistema.\n\nLa megaestructura ha caído en la superficie estelar en expansión, vaporizándola en momentos.\n\nAfortunadamente, sin embargo, hemos podido salvar partes de ella antes de su prematura desaparición, y parece que la expansión de la estrella ha disminuido drásticamente. De hecho, los científicos estiman que esta \"estrella de agujero negro\", o §YCuasi-Estrella§!, ha alcanzado ahora otro equilibrio entre la singularidad y sus capas exteriores, y ahora continuará creciendo, aunque extremadamente lentamente.\n\nTodo este fenómeno ha sido de extremo valor científico, y aunque los planetas del sistema se han calentado significativamente por estos eventos, todo el sistema está ahora lleno de oportunidades de investigación con respecto a esta peculiar Quasi-Estrella.\n\nSin embargo, la vida útil de la estrella se ha reducido significativamente, y se estima que sus capas exteriores terminarán disipándose en unos pocos millones de años, dejando el agujero negro expuesto detrás, pero esto no debería ser una preocupación, por ahora al menos."
  giga_accelerator.160.desc.b:0 "Parece que la expansión de §Y[accelerator_quasistar.GetName]'s§! ha disminuido drásticamente. De hecho, los científicos estiman que esta \"estrella de agujero negro\", o §YCuasi-Estrella§!, ha alcanzado ahora otro equilibrio entre la singularidad y sus capas exteriores, y ahora continuará creciendo, aunque extremadamente lentamente.\n\nTodo este fenómeno ha sido de extremo valor científico, y aunque los planetas del sistema se han calentado significativamente por estos eventos, todo el sistema está ahora lleno de oportunidades de investigación con respecto a esta peculiar Quasi-Estrella.\n\nSin embargo, la vida útil de la estrella se ha reducido significativamente, y se estima que sus capas exteriores terminarán disipándose en unos pocos millones de años, dejando el agujero negro expuesto detrás, pero esto no debería ser una preocupación, por ahora al menos."
  giga_accelerator.160.a:0 "¡Ten más cuidado con los aceleradores la próxima vez!"
  giga_accelerator.160.a.tooltip:0 "Todos los planetas en el sistema §Y[accelerator_quasistar.GetName]§! se vuelven más calientes.\n\nSi hay uno, el §YAcelerador de Partículas Estelares§! será §Rdestruido§!.\n\n"
  mod_shipsize_giga_massive_planet_hull_mult:0 "Puntos de Casco de Luna de Combate"
  mod_shipsize_giga_massive_planet_tracking_mult:0 "Rastreo de Luna de Combate"
  giga_flavor_systems.1101.desc:0 "Mientras explorábamos el sistema §Y[from.GetName]§!, nuestros equipos de inspección han localizado lo que parece ser un §YComplejo de Computación Planetaria Abandonado§!, un ordenador planetario colosal magnitudes más poderoso que cualquier dispositivo de computación típico.\n\nDesafortunadamente, aunque el planeta en sí está claramente deshabitado, está orbitado por una pequeña serie de plataformas defensivas potentes y hostiles §R§! que abren fuego contra cualquier cosa que se acerque demasiado al planeta.\n\nQuién o qué estableció estas plataformas es desconocido, aunque es probable que sean unidades antiguas que sobrevivieron a sus propios creadores y ahora defienden sin sentido un mundo vacío. De cualquier manera, derrotarlas y apoderarse del complejo de computación para nosotros seguramente sería un increíble beneficio para nuestros departamentos de ciencia."
  giga_flavor_systems.1101.a:0 "Intrigante."
  civic_eaw_crystals:0 "Ingeniería Cristalina"
  civic_eaw_crystals_desc:0 "Esta civilización hace un uso extensivo de cristales energéticamente cargados y peculiares dentro de la mayoría de sus tecnologías, mejorando drásticamente su rendimiento aunque a costa de una menor fiabilidad."
  giga_fallen_empire_misc.1029.a.tooltip:0 "Cada planeta en la galaxia recibe §R100 Devastación§!.\nLa §YRed de Hipervías§! está completamente reorganizada."
  district_flusion_science:0 "Complejo de Investigación de Flusion"
  district_flusion_science_plural:0 "Complejos de Investigación de Flusion"
  district_flusion_science_desc:0 "Extensas áreas que consisten en campus y laboratorios de investigación trabajando incansablemente para ampliar los límites de la ciencia de Flusion aún más y sintetizar varios recursos de otra manera inobtenibles."
  giga_tech_enhance_orbital_arcologies:0 "Mejora de Arcología Orbital"
  giga_tech_enhance_orbital_arcologies_desc:0 "Mejoras en el campo de la astroingeniería nos permiten agregar de forma segura un segundo anillo a las Arcologías Orbitales existentes, aumentando el espacio habitable sin comprometer la integridad estructural."
  giga_tech_maximize_orbital_arcologies:0 "Maximización de Arcología Orbital"
  giga_tech_maximize_orbital_arcologies_desc:0 "El refinamiento adicional de nuestras técnicas de construcción orbital permite la incorporación de otro anillo más en el diseño de nuestras Arcologías Orbitales, maximizando efectivamente el espacio habitable."
  NAME_reicsharmee_army:0 "Fuerza de Tarea Reichsarmee"
  ehof_contact_ehof:0 "\n\n§GContactar al $ehof_ehof$§!"
  ehof_megastructure.018.b:0 "Nah. Es mucho más genial mantenerse aislado."
  giga_penrose_system_NAME:0 "El Arca Eterna"
  giga_penrose_system_DESC:0 "Comienza en un anillo del mundo de la Esfera de Penrose"
  origin_penrose_ring:0 "Anillo del Mundo Penrose"
  origin_penrose_ring_desc:0 "Esta antigua Esfera de Penrose fue construida alrededor de uno de los primeros agujeros negros de la galaxia hace un número incalculable de años. Estos misteriosos precursores han desaparecido sin dejar rastro y ahora surge una nueva civilización en su legado."
  origin_tooltip_penrose_ring_effects:0 "Comienza en un anillo del mundo de la Esfera de Penrose.\n- La habitabilidad de las especies se establece en §LEsfera de Penrose§!.\n- §RNo habrá sistemas con mundos habitables garantizados cerca§!.\n\n§RLa IA no puede usar este origen. Cualquier imperio de IA personalizado predefinido generado con este origen se generará con $origin_default$ en su lugar.§!"
  relic_penrose_sphere_1:0 "Esfera de Penrose Reliquia"
  relic_penrose_sphere_1_DESC:0 "Esta antigua esfera de Penrose está en sus últimas etapas y se desmoronará dentro de unos pocos miles de años, a menos que sea reparada. Algunos de sus componentes todavía están funcionando, aunque producen cantidades minúsculas de energía."
  relic_penrose_sphere_2:0 "Esfera de Penrose"
  giga_ring_origins.101.name:0 "Esfera de Penrose Reliquia Restaurada"
  giga_ring_origins.101.desc:0 "Después de años de arduo trabajo, la esfera de Penrose reliquia en el sistema §L[relic_penrose_sphere.GetName]§! ha sido restaurada a su antigua gloria y una vez más genera grandes cantidades de energía utilizando la dispersión superradiante del agujero negro. ¡Que proteja y nutra nuestra civilización por el resto de la eternidad!"
  pc_giga_penrose_habitable_desc:0 "Una construcción masiva que rodea un Agujero Negro cautivo. Un $name_penrose$ proporciona la energía necesaria para alimentar este mundo anillo y permitir la vida en la superficie, libre de las limitaciones y la mundanidad de la existencia ligada al planeta. También tiene algunas de las mejores vistas del universo."
  war_moon_scrap:0 "Chatarra por §Y15000§! £alloys£ & §Y7500§! £minerals£"
  war_moon_scrap_DESC:0 "Desmantela la infraestructura externa de esta Nave de Guerra Celestial para obtener aleaciones, investigación y minerales valiosos."
  war_planet_scrap:0 "Chatarra por §Y80000§! £alloys£ & §Y40000§! £minerals£"
  war_planet_scrap_DESC:0 "Desmantela la infraestructura externa de esta Nave de Guerra Celestial para obtener aleaciones, investigación y minerales valiosos."
  giga_titan_scrap:0 "Chatarra por §Y2000§! £alloys£"
  giga_titan_scrap_DESC:0 "Desmantela este buque para obtener piezas y sus aleaciones constituyentes."
  giga_juggernaut_scrap:0 "Chatarra por §Y4000§! £alloys£"
  giga_juggernaut_scrap_DESC:0 "Desmantela este buque para obtener piezas y sus aleaciones constituyentes."
  giga_battleship_scrap:0 "Desguazar por §Y1800§! £alloys£"
  giga_battleship_scrap_DESC:0 "Desmontar esta nave para piezas y sus aleaciones constituyentes."
  giga_colossus_scrap:0 "Desguazar por §Y6000§! £alloys£"
  giga_colossus_scrap_DESC:0 "Desmontar esta nave para piezas y sus aleaciones constituyentes."
  penrose_sphere_a2:0 "Bomba de Distorsión Subespacial Desarmada"
  penrose_sphere_a2_DESC:0 "Este $name_penrose$ ha sido reconvertido en una bomba. Ahora debemos dejar que acumule energía por un tiempo antes de detonarla."
  penrose_sphere_a3:0 "Bomba de Distorsión Subespacial"
  penrose_sphere_a3_DESC:0 "Una estructura grande similar a un espejo construida alrededor de un Agujero Negro, capaz de reflejar la radiación de ida y vuelta entre su superficie interna y la ergosfera del Agujero Negro, causando dispersión superradiante y amplificando exponencialmente la energía de la radiación."
  penrose_sphere_a4:0 "Detonar!"
  penrose_sphere_a4_DESC:0 "Envía justo suficiente radiación para empujar la integridad del espejo más allá de su límite y liberar el flujo de energía!"
  penrose_sphere_a41:0 "Bomba de Distorsión Subespacial"
  penrose_sphere_a41_DESC:0 "¡Esta Bomba de Distorsión Subespacial está a punto de detonar!"
  penrose_sphere_a42:0 "Bomba de Distorsión Subespacial"
  penrose_sphere_a42_DESC:0 "¡Esta Bomba de Distorsión Subespacial está a punto de detonar!"
  penrose_sphere_b2_DESC:0 "Un gran espejo construido alrededor de un Agujero Negro. Las radiaciones están rebotando de ida y vuelta entre la superficie interna del espejo y la ergosfera del Agujero Negro, generando energía."
  penrose_sphere_b3:0 "$name_penrose$ Estabilizado"
  penrose_sphere_b3_DESC:0 "Este $name_penrose$ ha sido estabilizado con construcciones especializadas, permitiendo que más radiación sea contenida dentro de la esfera de espejos sin arriesgar una explosión. Por lo tanto, genera más energía."
  penrose_sphere_b4:0 "Mundo Anillo $name_penrose$"
  penrose_sphere_b4_DESC:0 "Partes de la salida de este $name_penrose$ han sido redirigidas hacia el soporte de un Mundo Anillo masivo y altamente avanzado construido alrededor de él."
  gigablackhole_ring_world_2:0 "$name_penrose_ring$ Segmento"
  gigablackhole_ring_world_2_DESC:0 "Esta estructura esquelética constituye aproximadamente la mitad de la circunferencia completa del Mundo Anillo. Ahora debemos comenzar a trabajar en los hábitats reales."
  gigablackhole_ring_world_3:0 "$name_penrose_ring$ Segmento"
  gigablackhole_ring_world_3_DESC:0 "Un trozo masivo de un Mundo Anillo, consistiendo en dos segmentos habitables y un segmento de soporte, alimentado por un $name_penrose$."