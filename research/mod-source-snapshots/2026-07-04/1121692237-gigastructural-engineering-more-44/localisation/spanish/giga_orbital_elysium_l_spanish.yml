l_spanish:
  #############################################################################################################################################
  ### Orbital Elysium #########################################################################################################################
  #############################################################################################################################################
  
  mod_giga_elysium_host_stability_add:0 "Estabilidad del Planeta Anfitrión Elysium"
  mod_giga_elysium_host_jobs_produces_mult:0 "Producción de Trabajo del Planeta Anfitrión Elysium"
  
  giga_elysium_host_planet:0 "$name_orb_elysium$ Planeta Anfitrión"
  giga_elysium_host_planet_desc:0 "Controlado desde lo alto, la gobernanza de este planeta ha sido en gran medida dejada en manos de las autoridades locales, mientras sus superiores observan desde la estación en órbita."
  
  giga_elysium_origin_fix:0 "$name_orb_elysium$ Corrección del Mundo de Origen"
  giga_elysium_origin_fix_desc:0 "¡Si puedes ver este modificador, algo salió mal!"
  
  giga_elysium_origin_build_speed:0 "$name_orb_elysium$ Ensamblaje de Origen"
  giga_elysium_origin_build_speed_desc:0 "¡Si puedes leer este modificador, algo salió mal!"
  
  giga_elysium_no_host:0 "Apoyo Planetario Insuficiente"
  giga_elysium_no_host_desc:0 "Sin el apoyo de la infraestructura en el planeta de abajo, los habitantes de esta estación están luchando."
  
  giga_origin_no_elysium:0 "Sin Supervisión Orbital"
  giga_origin_no_elysium_desc:0 "Sin un $name_orb_elysium$ para guiarlos desde lo alto, los habitantes de este mundo son desordenados e ineficientes."
  
  giga_dismantle_elysium:0 "Desmantelar $name_orb_elysium$"
  giga_dismantle_elysium_desc:0 "Esta estación, y el control asfixiante que proporciona, ya no se adecuan a nuestras necesidades."
  giga_dismantle_elysium_tooltip:0 "¡El $name_orb_elysium$ será §Rdestruido§!."
  
  d_giga_elysium_buildings:0 "Infraestructura de Apoyo Planetario"
  d_giga_elysium_buildings_desc:0 "§WEl $name_orb_elysium$ gana un £edificio£ §YSlot de Construcción§! por cada uno que se desbloquearía en el mundo anfitrión.§!\n§W--------------§!\nLejos de ser independiente de su mundo anfitrión, el Elysium se beneficia enormemente de una infraestructura de apoyo suficiente."
  
  d_giga_elysium_origin_industry:0 "Zona Industrial Abandonada"
  d_giga_elysium_origin_industry_desc:0 "Reliquias de un antiguo período de desarrollo industrial, estas obsoletas instalaciones de fabricación ahora solo se interponen en el camino del progreso."
  d_giga_elysium_origin_industry_effect:0 "Reemplaza algunos trabajos de £job_foundry£ §Y[owner.GetAlloyProducer]§! y [owner.GetArtisanIcon] §Y[owner.GetArtisan]§! con trabajos de §Y[owner.GetClerkOrMaintenanceDrone]§! cuando el Planeta tiene una Designación de Planeta §YIndustrial§!, §YFundición§!, o §YFábrica§!."
  
  
  # blocker events
  
  giga_elysium.002.name:0 "Expansión Industrial No Regulada en [From.GetName]"
  giga_elysium.002.desc:0 "Nuestro centro de control en la estación Elysium arriba de §Y[From.GetName]§! informa que en respuesta al aumento del desempleo, ha habido un aumento en la actividad industrial no autorizada. Esta §Y$d_giga_elysium_cottage_industry$§! promete empleo a aquellos que buscan trabajo, lleva consigo los siniestros matices del crimen organizado.\n\nSu presencia en [From.GetName] probablemente tendrá un §Yefecto negativo en la estabilidad planetaria§!, y puede requerir intervención estatal."
  giga_elysium.002.desc.hive:0 "Nuestro centro de control en la estación Elysium arriba de §Y[From.GetName]§! informa que en respuesta al prolongado ocio de los drones, un clúster de gestión local en la superficie ha ordenado la construcción de una §Y$d_giga_elysium_cottage_industry$§!.\n\nAunque esta región recién desarrollada proporcionará empleo adicional, su naturaleza semi-autónoma está dando lugar a actividades desviadas, y probablemente tendrá un §Yefecto negativo en la estabilidad planetaria§! a largo plazo. Puede que sea necesario extirpar."
  giga_elysium.002.desc.machine:0 "Nuestro centro de control en la estación Elysium arriba de §Y[From.GetName]§! informa que en respuesta al prolongado ocio de los drones, una submente de planificación estructural semi-autónoma en la superficie ha ordenado la construcción de una §Y$d_giga_elysium_cottage_industry$§!.\n\nAunque esta región recién desarrollada proporcionará empleo adicional, la calidad de integración con los sistemas planificados centralmente es deficiente, y probablemente tendrá un §Yefecto negativo en la estabilidad planetaria§! a largo plazo. Puede que sea necesario extirpar."
  
  MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY_TITLE:0 "Expansión Industrial No Regulada"
  MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY:0 "El alto desempleo en §Y$PLANET$§! en el sistema §Y$SYSTEM$§! ha llevado a la construcción de una §Y$d_giga_elysium_cottage_industry$§! para proporcionar trabajos."
  
  d_giga_elysium_cottage_industry:0 "Zona Industrial Improvisada"
  d_giga_elysium_cottage_industry_desc:0 "Estas industrias caseras fueron construidas por la población ociosa para proporcionar empleo."
  
  giga_elysium.004.name:0 "Expansión Urbana No Regulada en [From.GetName]"
  giga_elysium.004.desc:0 "Nuestro centro de control en la estación Elysium arriba de §Y[From.GetName]§! informa que en respuesta al aumento de la falta de vivienda, un grupo de colonos desposeídos ha construido un §Y$d_giga_elysium_slums$§! en las afueras de un asentamiento importante.\n\nDifícil de gobernar y más difícil de patrullar, es probable que sea un refugio para el crimen organizado. Como tal, su presencia en [From.GetName] probablemente tendrá un §Yefecto negativo en la estabilidad planetaria§!, y puede requerir intervención."
  giga_elysium.004.desc.hive:0 "Nuestro centro de control en la estación Elysium arriba de §Y[From.GetName]§! informa que en respuesta a un nivel creciente de falta de vivienda, un grupo de drones ha recurrido a sus instintos de supervivencia y ha construido un §Y$d_giga_elysium_slums$§! para refugiarse.\n\nAunque esta estructura recién tallada proporcionará espacio de vivienda adicional, el laberinto ya se está convirtiendo en un refugio para elementos desviados de la población planetaria, y probablemente tendrá un §Yefecto negativo en la estabilidad planetaria§! en adelante. Puede que sea necesario demoler."
  giga_elysium.004.desc.machine:0 "Nuestro centro de control en la estación Elysium sobre §Y[From.GetName]§! informa que en respuesta a una escasez crítica de áreas de preparación de drones, una submente de planificación estructural semi-autónoma en la superficie ha ordenado la construcción de un §Y$d_giga_elysium_slums$§!.\n\nMientras que esta región recién desarrollada proporcionará de hecho refugio para los drones sin hogar, su estructura laberíntica ya se está convirtiendo en un refugio para elementos corruptos de nuestra red, y probablemente tendrá un §Yefecto negativo en la estabilidad planetaria§! en adelante. Puede ser necesario demolerla."
  
  MESSAGE_GIGA_ELYSIUM_SLUMS_TITLE:0 "Expansión Urbana No Regulada"
  MESSAGE_GIGA_ELYSIUM_SLUMS:0 "La alta falta de vivienda en §Y$PLANET$§! en el sistema §Y$SYSTEM$§! ha llevado a la construcción de un §Y$d_giga_elysium_slums$§! para proporcionar refugio."
  
  d_giga_elysium_slums:0 "Zona de Vivienda Provisional"
  d_giga_elysium_slums_desc:0 "Pobremente planificada y llena de actividad desviada, estos barrios bajos proporcionan un espacio vital muy necesario."
  
  giga_elysium.005.name:0 "Ganado Reubicado en [From.GetName]"
  giga_elysium.005.desc:0 "Nuestro centro de control en la estación Elysium sobre §Y[From.GetName]§! informa que en respuesta al aumento de la falta de vivienda entre nuestras §Y$LIVESTOCK$ Poblaciones§!, las autoridades locales han ordenado la construcción de un §Y$d_giga_elysium_livestock_pens$§!.\n\nMenos controlados que nuestras instalaciones estándar, los habitantes tendrán una vida menos estructurada y probablemente tendrán un §Yefecto negativo en la estabilidad planetaria§! en adelante. Puede ser necesario reemplazar la instalación por completo."
  giga_elysium.005.desc.hive:0 "Nuestro centro de control en la estación Elysium sobre §Y[From.GetName]§! informa que en respuesta al aumento de la falta de vivienda entre nuestras §Y$LIVESTOCK$ Poblaciones§!, un clúster de gestión local en la superficie ha ordenado la construcción de un §Y$d_giga_elysium_livestock_pens$§!.\n\nMenos controlados que nuestras instalaciones estándar, los habitantes tendrán una vida menos estructurada y probablemente tendrán un §Yefecto negativo en la estabilidad planetaria§! en adelante. Puede ser necesario reemplazar la instalación por completo."
  giga_elysium.005.desc.machine:0 "Nuestro centro de control en la estación Elysium sobre §Y[From.GetName]§! informa que en respuesta a una escasez crítica de áreas de almacenamiento para nuestras §Y$slavery_matrix$ Poblaciones§!, una submente de planificación estructural semi-autónoma en la superficie ha ordenado la construcción de un §Y$d_giga_elysium_livestock_pens$§!.\n\nMenos controlados que nuestras instalaciones estándar, puede contener defectos de diseño desconocidos y probablemente tendrá un §Yefecto negativo en la estabilidad planetaria§! en adelante. Puede ser necesario reemplazar la instalación por completo."
  
  MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS_TITLE:0 "Reubicación de Ganado No Regulada"
  MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS:0 "Ganado sin hogar £pop£ §YPoblaciones§! en §Y$PLANET$§! en el sistema §Y$SYSTEM$§! han sido trasladados a un §Y$d_giga_elysium_livestock_pens$§! para proporcionar refugio."
  
  d_giga_elysium_livestock_pens:0 "Recinto Provisional para Ganado"
  d_giga_elysium_livestock_pens_desc:0 "Menos regulado que nuestras instalaciones estándar, este recinto ofrece a nuestros \"invitados\" libertades adicionales. Quizás demasiadas."
  
  giga_elysium.006.name:0 "[From.GetName] Desmantelado"
  giga_elysium.006.desc:0 "La estación Elysium sobre [fromfrom.GetName] ha sido desmantelada con éxito, restaurando el control a la administración de la superficie.\n\nTodos los residentes restantes han sido reubicados en la superficie del planeta, y los restos de la estación han sido desorbitados."
  giga_elysium.006.desc.egal:0 "La estación Elysium sobre [fromfrom.GetName] ha sido desmantelada con éxito, poniendo fin al reinado opresivo de las élites que huyeron allí.\n\nTodos los residentes restantes han sido reubicados en la superficie del planeta, y los restos de la estación han sido desorbitados."
  giga_elysium.006.desc.gestalt:0 "La estación Elysium sobre [fromfrom.GetName] ha sido desmantelada con éxito, transfiriendo el control a las instalaciones de la superficie.\n\nTodos los drones restantes han sido reubicados en la superficie del planeta, y los restos de la estación han sido desorbitados."
  
  giga_elysium.006.good:0 "Menos mal."
  
  #########################################
  ### Elysium districts ###################
  #########################################
  
  district_giga_elysium_housing:0 "Distrito de Habitación"
  district_giga_elysium_housing_plural:0 "Distritos de Habitación"
  district_giga_elysium_housing_desc:0 "Viviendas espaciosas situadas entre un campo simulado, con acceso directo a infraestructura de comunicaciones de alta velocidad."
  
  district_giga_elysium_control:0 "Centro de Control Planetario"
  district_giga_elysium_control_plural:0 "Centros de Control Planetario"
  district_giga_elysium_control_desc:0 "El centro neurálgico de las operaciones en la superficie del planeta, donde los supervisores aseguran el cumplimiento de la población de abajo."
  
  district_giga_elysium_admin:0 "Distrito Administrativo"
  district_giga_elysium_admin_plural:0 "Distritos Administrativos"
  district_giga_elysium_admin_desc:0 "Una extensa instalación administrativa, gestionando las comunicaciones para la estación y su planeta anfitrión."
  
  district_giga_elysium_science:0 "Distrito de Investigación"
  district_giga_elysium_science_plural:0 "Distritos de Investigación"
  district_giga_elysium_science_desc:0 "Laboratorios de alta tecnología donde nuestras mentes más brillantes pueden trabajar sin distracciones."
  
  district_giga_elysium_entertainment:0 "Distrito de Entretenimiento"
  district_giga_elysium_entertainment_plural:0 "Distritos de Entretenimiento"
  district_giga_elysium_entertainment_desc:0 "Un centro de producción de medios de comunicación, capaz de producir un flujo interminable de contenido para satisfacer a las masas."
  
  #########################################
  ### Elysium buildings ###################
  #########################################
  
  building_giga_elysium_host_capital:0 "Centro de Control Planetario Elysium"
  building_giga_elysium_host_capital_plural:0 "Centro de Control Planetario Elysium"
  building_giga_elysium_host_capital_desc:0 "El asiento de la burocracia local, gestionando el planeta en nombre de sus superiores."
  
  building_giga_elysium_host_major_capital:0 "Complejo de Control Planetario Elysium"
  building_giga_elysium_host_major_capital_plural:0 "Complejos de Control Planetario Elysium"
  building_giga_elysium_host_major_capital_desc:0 "Un importante centro administrativo, mediando entre la población local y sus superiores en órbita."
  
  giga_elysium_dystopian_stability_desc:0 "\n§H$civic_dystopian_society$:§! Adicionalmente recibe §Y50%§! de la £stability£ §YEstabilidad§! del Elysium en órbita"
  
  building_giga_elysium_host_hive_capital:0 "Nodo Sináptico Planetario Elysium"
  building_giga_elysium_host_hive_capital_plural:0 "Nodos Sinápticos Planetarios Elysium"
  building_giga_elysium_host_hive_capital_desc:0 "El principal relevo sináptico a través del cual la Mente Colmena gestiona las funciones planetarias."
  
  building_giga_elysium_host_hive_major_capital:0 "Clúster Sináptico Planetario Elysium"
  building_giga_elysium_host_hive_major_capital_plural:0 "Clústers Sinápticos Planetarios Elysium"
  building_giga_elysium_host_hive_major_capital_desc:0 "Un enorme relevo sináptico a través del cual la Mente Colmena enfoca el desarrollo y la planificación planetaria."
  
  building_giga_elysium_host_machine_capital:0 "Nodo de Relevo Planetario Elysium"
  building_giga_elysium_host_machine_capital_plural:0 "Nodos de Relevo Planetario Elysium"
  building_giga_elysium_host_machine_capital_desc:0 "Un centro de relevo de señales que sirve instrucciones desde la estación muy por encima."
  
  building_giga_elysium_host_machine_major_capital:0 "Nexo de Relevo Planetario Elysium"
  building_giga_elysium_host_machine_major_capital_plural:0 "Nexos de Relevo Planetario Elysium"
  building_giga_elysium_host_machine_major_capital_desc:0 "Un poderoso centro administrativo y de relevo, procesando instrucciones enviadas desde la órbita."
  
  
  building_giga_elysium_host_jobs:0 "Ministerio de Empleo"
  building_giga_elysium_host_jobs_plural:0 "Ministerios de Empleo"
  building_giga_elysium_host_jobs_desc:0 "Una autoridad gubernamental omnipresente de la cual se asignan trabajos y se emiten cuotas."
  building_giga_elysium_host_jobs_effect:0 "Proporciona §Y$@giga_elysium_jobs_per_100|*0$§! £job£ Trabajos por cada §Y100§! £pop£ Poblaciones en el planeta, adecuados a nuestro §YTipo de Imperio§! y la actual §YDesignación de Colonia§!."
  building_giga_elysium_host_jobs_amenities_effect:0 "Proporciona §Y$@giga_elysium_jobs_per_100|*0$§! £job£ Trabajos por cada §Y100§! £pop£ Poblaciones en el planeta, adecuados a nuestro §YTipo de Imperio§! y la actual §YDesignación de Colonia§!, y adicionales £amenities£ §YComodidades§! por £job_clerk£ §Y$job_clerk$§! Trabajo"
  
  building_giga_elysium_host_hive_jobs:0 "Centro de Asignación de Drones"
  building_giga_elysium_host_hive_jobs_plural:0 "Centros de Asignación de Drones"
  building_giga_elysium_host_hive_jobs_desc:0 "Una instalación que alberga un clúster neural semi-autónomo, encargado de mantener la productividad de los drones en todo el planeta."
  
  building_giga_elysium_host_machine_jobs:0 "Centro de Asignación de Tareas"
  building_giga_elysium_host_machine_jobs_plural:0 "Centros de Asignación de Tareas"
  building_giga_elysium_host_machine_jobs_desc:0 "Un nodo computacional que distribuye tareas a drones inactivos en todo el planeta."
  
  building_giga_elysium_host_booster:0 "Sector Industrial Suplementario"
  building_giga_elysium_host_booster_plural:0 "Sectores Industriales Suplementarios"
  building_giga_elysium_host_booster_desc:0 "Una extensa región industrial construida para aumentar la productividad planetaria."
  building_giga_elysium_host_booster_effect:0 "Proporciona mejoras a la £job£ §YProductividad Laboral§! basada en la §YDesignación de Colonia§!, y explota cualquier depósito de £volatile_motes£ £exotic_gases£ £rare_crystals£ §YRecurso Estratégico§!, proporcionando trabajos de extracción"
  
  building_giga_elysium_trash_heap:0 "Enorme Montón de Basura"
  building_giga_elysium_trash_heap_desc:0 "Inmensas pilas de escombros variados, descartados por los habitantes de la estación de arriba. Los carroñeros tamizan los detritos, buscando lujos desechados."
  building_giga_elysium_trash_heap_effect:0 "Proporciona §Y$amenity$§! igual a §Y$@giga_elysium_trash_amenities|%0$§! de la §YDisponible $amenity$§! en el §Y$orbital_elysium$§!"
  
  #########################################
  ### Elysium jobs ########################
  #########################################
  
  job_giga_elysium_controller:0 "Supervisor Elysian"
  job_giga_elysium_controller_plural:0 "Supervisores Elysian"
  job_giga_elysium_controller_desc:0 "Aquellos en el poder tienen el deber de mantener el control sobre las masas sin lavar."
  job_giga_elysium_controller_effect_desc:0 "$job_giga_elysium_controller_swap_plural_with_icon$ convierten £consumer_goods£ §Y$consumer_goods$§! en £stability£ §YEstabilidad§! para el planeta anfitrión de la estación"
  job_giga_elysium_controller_swap_plural_with_icon:0 "[giga_elysium_controller.GetIcon] [giga_elysium_controller.GetNamePlural]"
  mod_job_giga_elysium_controller_add:0 "[giga_elysium_controller.GetName] Jobs"
  mod_job_giga_elysium_controller_per_pop:0 "§G+1§! [giga_elysium_controller.GetName] Job per $VALUE$ Pops"
  mod_job_giga_elysium_controller_per_pop_short:0 "\n§G+1§! £mod_job_giga_elysium_controller_add£ per $VALUE$ £pop£"
  
  job_giga_elysium_controller_drone:0 "Dron Supervisor Elysian"
  job_giga_elysium_controller_drone_plural:0 "Drones Supervisores Elysian"
  job_giga_elysium_controller_drone_desc:0 "Estos drones gestionan las operaciones planetarias desde arriba, manteniendo el orden en un planeta que de otro modo podría ser potencialmente caótico."
  job_giga_elysium_controller_drone_effect_desc:0 "$job_giga_elysium_controller_drone_swap_plural_with_icon$ convertir £energy£ §Y$energy$§! en £stability£ §Y$MOD_PLANET_STABILITY_ADD$§! para el planeta anfitrión de la estación."
  job_giga_elysium_controller_drone_swap_plural_with_icon:0 "[giga_elysium_controller_drone.GetIcon] [giga_elysium_controller_drone.GetNamePlural]"
  mod_job_giga_elysium_controller_drone_add:0 "[giga_elysium_controller_drone.GetName] Jobs"
  mod_job_giga_elysium_controller_drone_per_pop:0 "§G+1§! [giga_elysium_controller_drone.GetName] Job per $VALUE$ Pops"
  mod_job_giga_elysium_controller_drone_per_pop_short:0 "\n§G+1§! £mod_job_giga_elysium_controller_add£ per $VALUE$ £pop£"
  
  # extra bit for the origin effect
  job_giga_elysium_controller_origin_effect_desc:0 "y £job£ §YProducción Laboral§! "
  giga_elysium_from_station:0 "Para $orbital_elysium$"