  quasi_stellar_gateway_off:0 "Portal E-QE"
  quasi_stellar_gateway_off_DESC:0 "Similar en principio al portal del $name_ndb$, este portal a través del subespacio permite la transferencia instantánea de cantidades enormes de energía."
  quasi_stellar_gateway_off_MEGASTRUCTURE_DETAILS:99 "$quasi_stellar_gateway_off_DESC$"
  
  quasi_stellar_gateway_on:0 "Portal E-QE Activo"
  quasi_stellar_gateway_on_DESC:0 "Similar en principio al portal del $name_ndb$, este portal a través del subespacio permite la transferencia instantánea de cantidades enormes de energía."
  
  quasi_stellar_obliterator_5:99 "$name_quasistellar$"
  quasi_stellar_obliterator_5_DESC:0 "Un $name_quasistellar$ completo y totalmente operativo. Extrayendo energía de los chorros polares del Quásar, el disco de acreción y el proceso de Penrose, esta hiperarma gigantesca es capaz de desatar la furia de una galaxia entera de energía estelar en su desafortunado objetivo."
  
  quasi_stellar_obliterator_6:0 "Panel de Control del Exterminador-QE"
  quasi_stellar_obliterator_6_DESC:0 "Abre el panel de control de la hiperarma, para dispararla o configurarla."
  
