  giga_qso.006.desc:99 "Please select a targeting mode for the Q.S.O.\n\nTargeting the §YStar Cluster§! marks the system itself and all adjacent systems for destruction. Adjacent systems protected by an $giga_fe_shield$ or a $d_maginot_subspace_disruptor$ will not be affected.\n\nTargeting the §YSolar System§! marks only the system for destruction, leaving surrounding systems intact.\n§TCurrently Targeted Systems:§! §Y[root.giga_qso_targeted_systems]/4§!\n\nTargeting a §YPlanet§! marks selected planets for destruction, leaving the system intact. You may simultaneously target up to §Y10§! planets across multiple systems or empires.\n§TCurrently Targeted Planets:§! §Y[root.giga_qso_targeted_planets]/10§!"
  giga_qso.006.a:99 "Target the Star Cluster"
  giga_qso.006.b:99 "Target the Solar System"
  giga_qso.006.c:99 "Target a Planet"
  
  giga_qso.007.desc:99 "Please select up to §Y10§! planets to target. These planets are not required to be in the same system or even the same empire.\n\n§TCurrently Targeted Planets:§! §Y[root.giga_qso_targeted_planets]/10§!"
  giga_qso.0070.desc:99 "Please confirm your desire to fire upon the designated star cluster. Beyond this point there is no backing out and §Rthe designated star cluster will be destroyed.§!"
  giga_qso.0071.desc:99 "Please confirm your desire to fire upon the designated systems. Beyond this point there is no backing out and §Rthe designated systems will be destroyed.§!\n\n§TCurrently Targeted Systems:§! §Y[root.giga_qso_targeted_systems]/4§!"
  giga_qso.0072.desc:99 "Please select the systems you wish to stop targeting.\n\n§TCurrently Targeted Systems:§! §Y[root.giga_qso_targeted_systems]/4§!"
  giga_qso.0073.desc:99 "Please confirm your desire to fire upon the designated planets. Beyond this point there is no backing out and §Rthe designated planets will be destroyed.§!\n\n§TCurrently Targeted Planets:§! §Y[root.giga_qso_targeted_planets]/10§!"
  giga_qso.0074.desc:99 "Please select the planets you wish to stop targeting.\n\n§TCurrently Targeted Planets:§! §Y[root.giga_qso_targeted_planets]/10§!"
  
