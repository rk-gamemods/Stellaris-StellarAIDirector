l_german:
  origin_alderson:99 "$name_alderson$"
  origin_alderson_desc:99 "You are the remnant of a long forgotten civilization, living in the vast expanse of an $name_alderson$ built by unknown precursors. The other slices harbor intelligent life, but they have not returned to the stars."
  origin_alderson_effects:99 "Start on a $pc_alderson_slice_gaia_shattered$, a ruined part of a colossal $name_alderson$.\n- Species habitability is set to §L$pc_alderson_slice_gaia$§!.\n- §RThere will be no systems with guaranteed habitable worlds nearby§!.\n- Two powerful Pre-FTL nations will spawn alongside you on other sections of the Alderson."
  
  giga_alderson_start_NAME:99 "$origin_alderson$"
  giga_alderson_start_DESC:99 "$origin_alderson_desc$"
  
  giga_start_screen_alderson:99 "We do not know what happened to our ancestors. Enemies, plague, civil war? They exist now as myths and legends, their knowledge and power lost. They, or someone else, somehow built this vast disk encompassing the entirety of our star's gravity well, and now we live in a vast, echoing expanse designed to house a million times more people than are left.\n\nAs all but the last few slices have fallen into disrepair and uselessness, our people have been filled with a new sense of purpose: we must unite and take our place again in the stars, or we will be lost forever to history."
  
  name_alderson:99 "Alderson Disk"
  allow_alderson:99 "§HUnlocks Megastructure:§! $name_alderson$"
  desc_alderson:99 "The $name_alderson$ is a colossal disk built around a star, providing immense living space."
  
  decision_repair_shattered_alderson:99 "Repair Hypersegment"
  decision_repair_shattered_alderson_desc:99 "Our ancestral home will not lie in indignant disrepair any longer. It is time to restore our heritage."
  decision_shattered_alderson_project_effects:99 "Restores this Hypersegment into an §G$pc_alderson_slice_gaia$§!."
  
  alderson_shield:99 "Ancient Forcefield"
  alderson_shield_desc:99 "Whichever empire built this $name_alderson$ placed a vast network of shield projectors across the disk's surface. Many are beyond destroyed by now but the projectors on this disk seem to be functioning. Any attempt at bombardment will be severely slowed, necessitating a ground invasion."
  
  giga_tech_alderson_disk:99 "The $name_alderson$"
  giga_tech_alderson_disk_desc:99 "An $name_alderson$ is a massive, solar-system spanning disk allowing for habitation on its upper surface. Such a construct would be ludicrously expensive, and would require the application of several incredibly advanced technologies to prevent it from collapsing, but could provide untold amounts of industrial capacity and building space."
  
  dominion_defender:99 "Dominion Predator"
  dominion_defender_desc:99 "Fearless warriors, often found in large groups."
  
  excognitor_defender:99 "Excognitor Praetorian"
  excognitor_defender_desc:99 "Consumed with perfection, these soldiers train every waking hour."
  
