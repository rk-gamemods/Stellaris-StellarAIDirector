  mod_job_ald_matter_synthesizer_add:99 "$job_ald_matter_synthesizer$ Jobs"
  
  job_ald_matter_synthesizer_drone:99 "Alderson Matter Synth Drone"
  job_ald_matter_synthesizer_drone_plural:99 "Alderson Matter Synth Drones"
  job_ald_matter_synthesizer_drone_desc:99 "A massive amount of drones with the purpose of generating minerals from energy. This process requires a ton of energy and a lot of space. It can still be done."
  mod_job_ald_matter_synthesizer_drone_add:99 "$job_ald_matter_synthesizer_drone$ Jobs"
  
  # technicians
  job_ald_supergenerator:99 "Alderson Technician"
  job_ald_supergenerator_plural:99 "Alderson Technician"
  job_ald_supergenerator_desc:99 "A massive amount of managers and workers with the purpose of maintaining power production. They repair panels with more area than entire planets and reactors that can't be found anywhere else."
  mod_job_ald_supergenerator_add:99 "$job_ald_supergenerator$ Jobs"
  
  job_ald_supergenerator_drone:99 "Alderson Tech Drone"
  job_ald_supergenerator_drone_plural:99 "Alderson Tech Drones"
  job_ald_supergenerator_drone_desc:99 "A massive amount of drones with the purpose of maintaining power production. They repair colossal panels and gigantic reactors."
  mod_job_ald_supergenerator_drone_add:99 "$job_ald_supergenerator$ Jobs"
  
  # farmers
  job_ald_superfarmer:99 "Supersized Farmer"
  job_ald_superfarmer_plural:99 "Supersized Farmers"
  job_ald_superfarmer_desc:99 "A massive amount of managers and workers with the purpose of maintaining flora and fauna. Some of these plants and animals could feed entire families for months!"
  mod_job_ald_superfarmer_add:99 "$job_ald_superfarmer$ Jobs"
  
  job_ald_superfarmer_drone:99 "Alderson Farm Drone"
  job_ald_superfarmer_drone_plural:99 "Alderson Farm Drone"
  job_ald_superfarmer_drone_desc:99 "A massive amount of drones with the purpose of maintaining flora and fauna. Some of these require large amounts of space, but are high yield."
  mod_job_ald_superfarmer_drone_add:99 "$job_ald_superfarmer_drone$ Jobs"
  
  # exotic gas refiners
  job_ald_gases:99 "Refinery Specialist"
  job_ald_gases_plural:99 "Refinery Specialists"
  job_ald_gases_desc:99 "A large group of managers and technicians overseeing massive refineries. Hypothetically, these buildings would allow us to replace entire atmospheres with rare gasses."
  mod_job_ald_gases_add:99 "$job_ald_gases$ Jobs"
  
  job_ald_gases_drone:99 "Alderson Refinery Drone"
  job_ald_gases_drone_plural:99 "Alderson Refinery Drones"
  job_ald_gases_drone_desc:99 "A large group of drones dedicated to overseeing massive refineries. Some refineries output more gasses than an entire planet could posses."
  mod_job_ald_gases_drone_add:99 "$job_ald_gases_drone$ Jobs"
  
  # volatile motes chemists
  job_ald_motes:99 "Superscale Chemist"
  job_ald_motes_plural:99 "Superscale Chemists"
  job_ald_motes_desc:99 "A large group of managers and technicians overseeing massive chemical plants. These facilities could transform the mass of entire planets given a bit of time."
  mod_job_ald_motes_add:99 "$job_ald_motes$ Jobs"
  
  job_ald_motes_drone:99 "Alderson Chem-Drone"
  job_ald_motes_drone_plural:99 "Alderson Chem-Drones"
  job_ald_motes_drone_desc:99 "A large group of drones dedicated to overseeing massive chemical plants. The amount of materials used can quickly rival the mass of entire planets."
  mod_job_ald_motes_drone_add:99 "$job_ald_motes_drone$ Jobs"
  
  # rare crystal translucers
  job_ald_crystals:99 "Crystal Overseer"
  job_ald_crystals_plural:99 "Crystal Overseers"
  job_ald_crystals_desc:99 "A large group of managers and technicians overseeing massive factories. The size of a single factories puts most entire cities to shame."
  mod_job_ald_crystals_add:99 "$job_ald_crystals$ Jobs"
  
  job_ald_crystals_drone:99 "Alderson Lensing Drone"
  job_ald_crystals_drone_plural:99 "Alderson Lensing Drones"
  job_ald_crystals_drone_desc:99 "A large group of drones dedicated to the oversight of massive factories. The size of these factories are only possible with the space of the Alderson."
  mod_job_ald_crystals_drone_add:99 "$job_ald_crystals_drone$ Jobs"
  
  # metallurgists
  job_ald_hyperfoundry:99 "Superscaled Metalworker"
  job_ald_hyperfoundry_plural:99 "Superscaled Metalworkers"
  job_ald_hyperfoundry_desc:99 "A large group of metalsmiths in massive foundries. They use giant tools and suits to produce incredible amounts of our precious alloys."
  mod_job_ald_hyperfoundry_add:99 "$job_ald_hyperfoundry$ Jobs"
  
  job_ald_hyperfoundry_drone:99 "Alderson Foundry Drone"
  job_ald_hyperfoundry_drone_plural:99 "Alderson Foundry Drones"
  job_ald_hyperfoundry_drone_desc:99 "A large group of drones operating massive foundries. The large quantity of refined metals they make are the lifeblood of our constructs."
  mod_job_ald_hyperfoundry_drone_add:99 "$job_ald_hyperfoundry_drone$ Jobs"
  
  # artisans
  job_ald_hyperfactorio:99 "Superscaled Artisan"
  job_ald_hyperfactorio_plural:99 "Superscaled Artisans"
  job_ald_hyperfactorio_desc:99 "A large group of factory workers in massive factories. They produce mind boggling amounts of luxuries and goods using extremely large tools."
  mod_job_ald_hyperfactorio_add:99 "$job_ald_hyperfactorio$ Jobs"
  
  job_ald_hyperartificer:99 "Grand Artificer"
  job_ald_hyperartificer_plural:99 "Grand Artificers"
  job_ald_hyperartificer_desc:99 "A large group of extremely talented Artificers in grand factories. They turn production of common goods into a spectacle."
  mod_job_ald_hyperartificer_add:99 "$job_ald_hyperartificer$ Jobs"
  
  job_ald_hyperfactorio_drone:99 "Alderson Artisan Drone"
  job_ald_hyperfactorio_drone_plural:99 "Alderson Artisan Drones"
  job_ald_hyperfactorio_drone_desc:99 "A large group of drones operating massive factories. They produce goods required to make 'Life' worth living."
  mod_job_ald_hyperfactorio_drone_add:99 "$job_ald_hyperfactorio_drone$ Jobs"
  
  # researchers
  job_ald_megascience:99 "Think Tank"
  job_ald_megascience_plural:99 "Think Tanks"
  job_ald_megascience_desc:99 "A colossal group of some of the brightest minds. While not always in agreement, they are all contributing to the sciences."
  mod_job_ald_megascience_add:99 "$job_ald_megascience$ Jobs"
  
  job_ald_megascience_mind:99 "Linked Mind"
  job_ald_megascience_mind_plural:99 "Linked Minds"
  job_ald_megascience_mind_desc:99 "A colossal group of drones working as one. They are contributing every part of their mental strength to the sciences."
  mod_job_ald_megascience_mind_add:99 "$job_ald_megascience_mind$ Jobs"
  
  job_ald_megascience_robot:99 "Alderson Neural Network"
  job_ald_megascience_robot_plural:99 "Alderson Neural Networks"
  job_ald_megascience_robot_desc:99 "A colossal group of drones working as one. They are performing an untold number of calculations every second."
  mod_job_ald_megascience_robot_add:99 "$job_ald_megascience_robot$ Jobs"
  
  # duelist only
  job_ald_duelists:99 "Recreational Battalion"
  job_ald_duelists_plural:99 "Recreational Battalions"
  job_ald_duelists_desc:99 "Entire battalions using wide, open spaces to provide entertainment. The vast amount of size allows for nuclear weapons to be used for shows."
  mod_job_ald_duelists_add:99 "$job_ald_duelists$ Jobs"
  
  # not used
  job_ald_duelist_effect_desc:99 "£job_duelist£ $job_ald_duelists_plural$ turn £alloys£ §Y$alloys$§! into £unity£ §Y$unity$§!, £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§! and £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!"
  
  # priests
  job_ald_priest:99 "Grand Priest"
  job_ald_priest_plural:99 "Grand Priests"
  job_ald_priest_desc:99 "A vast network of speakers and the faithful. The priests work tirelessly to uphold tradition and core beliefs."
  mod_job_ald_priest_add:99 "$job_ald_priest$ Jobs"
  
  job_ald_deathpriest:99 "Priest of Passing"
  job_ald_deathpriest_plural:99 "Priests of Passing"
  job_ald_deathpriest_desc:99 "A vast network of grim preachers and the faithful. These priests read the people for the end ensure that a sacrifice will never be in vain."
  mod_job_ald_deathpriest_add:99 "$job_ald_deathpriest$ Jobs"
  
  # culture workers
  job_ald_cultureworker:99 "Alderson Culture Expert"
  job_ald_cultureworker_plural:99 "Alderson Culture Experts"
  job_ald_cultureworker_desc:99 "Entire troupes producing, performing, and recreating the arts. Museums that display history. Art exhibits end up larger than entire cities in our history."
  mod_job_ald_cultureworker_add:99 "$job_ald_cultureworker$ Jobs"
  
  job_ald_corpmanager:99 "Regional Manager"
  job_ald_corpmanager_plural:99 "Regional Managers"
  job_ald_corpmanager_desc:99 "Large groups of middle managers. They ruthlessly compete to see their part of the disk bring in the most revenue."
  mod_job_ald_corpmanager_add:99 "$job_ald_corpmanager$ Jobs"
  
  job_ald_memorialist:99 "Scribe of Quietus"
  job_ald_memorialist_plural:99 "Scribes of Quietus"
  job_ald_memorialist_desc:99 "Large groups of individuals dedicated to the survival and the lack thereof in the galaxy. They use their space to recreate ancient cities and landmarks to better understand those they study."
  mod_job_ald_memorialist_add:99 "$job_ald_memorialist$ Jobs"
  
  # merchants
  job_ald_merchant:99 "Trade Baron"
  job_ald_merchant_plural:99 "Trade Barons"
  job_ald_merchant_desc:99 "Incredible amounts of savvy salespeople able to see to the sale of an entire planets worth of supplies all before lunch. They control most of the land and its changing hands."
  mod_job_ald_merchant_add:99 "$job_ald_merchant$ Jobs"
  
  
  
  
