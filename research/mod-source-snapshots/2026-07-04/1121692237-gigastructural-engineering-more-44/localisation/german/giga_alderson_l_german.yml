  giga_situation_alderson_primitives:99 "Shattered Segments"
  giga_situation_alderson_primitives_type:99 "$giga_situation_alderson_primitives$"
  giga_situation_alderson_primitives_monthly_change_tooltip:99 "The progress of this situation is dependent on the §YApproach§! we pick."
  giga_situation_alderson_primitives_desc:99 "Two of the $name_alderson$'s three habitable segments are controlled by pre-FTL alien civilisations. If we wish to bring the entire disk under our control, we must deal with them."
  giga_situation_alderson_primitives_stage_1:99 "Annexation - Preparation"
  giga_situation_alderson_primitives_stage_2:99 "Annexation - Implementation"
  giga_situation_alderson_primitives_outcome:99 "The other slices of the disk will be brought under our direct control."
  
  giga_situation_alderson_primitives_approach_nothing:99 "Leave them be"
  giga_situation_alderson_primitives_approach_nothing_tooltip:99 "Nothing will ever happen."
  giga_situation_alderson_primitives_approach_annex:99 "[GetAldersonAnnexationApproachNameFlavor]"
  giga_situation_alderson_primitives_approach_annex_generic:99 "Infiltrate Leadership"
  giga_situation_alderson_primitives_approach_annex_diplomatic:99 "Integrate Peacefully"
  giga_situation_alderson_primitives_approach_annex_military:99 "Invade Territory"
  giga_situation_alderson_primitives_approach_annex_worker_coop:99 "Restructure Economy"
  giga_situation_alderson_primitives_approach_annex_shared_burden:99 "Foment Revolution"
  giga_situation_alderson_primitives_approach_annex_dystopian_society:99 "Enforce Hierarchy"
  giga_situation_alderson_primitives_approach_annex_corporate:99 "Dominate Markets"
  giga_situation_alderson_primitives_approach_annex_technocracy:99 "Rationalise Government"
  giga_situation_alderson_primitives_approach_annex_machine_servitor:99 "Flaunt Alternative"
  giga_situation_alderson_primitives_approach_annex_tooltip:99 "[GetAldersonAnnexationApproachDescFlavor]"
  giga_situation_alderson_primitives_approach_annex_tooltip_generic:99 "We will infiltrate the power centres of their civilisation."
  giga_situation_alderson_primitives_approach_annex_tooltip_diplomatic:99 "We will deepen integration through diplomatic efforts."
  giga_situation_alderson_primitives_approach_annex_tooltip_military:99 "We will seize their territory with our land forces."
  giga_situation_alderson_primitives_approach_annex_tooltip_worker_coop:99 "We will empower workers to take democratic control of their workplaces."
  giga_situation_alderson_primitives_approach_annex_tooltip_shared_burden:99 "We will enlighten the people to the tools of their own liberation."
  giga_situation_alderson_primitives_approach_annex_tooltip_dystopian_society:99 "We will teach them the value of submission - then demand it."
  giga_situation_alderson_primitives_approach_annex_tooltip_corporate:99 "We will supplant their economy with our own subsidiaries."
  giga_situation_alderson_primitives_approach_annex_tooltip_technocracy:99 "We will show them the rationality of governance by the most capable."
  giga_situation_alderson_primitives_approach_annex_tooltip_machine_servitor:99 "We will show them bliss and they will come to us."
  giga_situation_alderson_primitives_progress:99 "Infiltration Efforts"
  
  giga_alderson.002.name:99 "A Question of Inheritance"
  giga_alderson.002.desc:99 "We have for some time known of alien civilisations living on [Root.Capital.GetName]'s sibling segments, but since we have established control over [Root.Capital.Solar_System.GetName]'s spaceways, theoretical questions of ownership are now within the reach of policy.\n\nThese civilisations, the [excognitor_primitives.GetName] and [dominion_primitives.GetName], are in the equivalent of a $machine_age$, but are developmentally stagnant - perhaps due to their relative disunity, or the way their worldview responds to the Alderson's ancient technology. We do not know if they regressed to their current states and have stabilised, or have advanced in recent ages but since plateaued.\n\nIn any case, they together control approximately two-thirds of the Alderson's remaining habitable area, have inferior economic and technological capabilities, and are unlikely to alter the status quo themselves. The ball is in our court."
  giga_alderson.002.a.generic:99 "Infiltrate and annex their societies."
  giga_alderson.002.a.diplomatic:99 "Through diplomacy we can achieve union."
  giga_alderson.002.a.military:99 "Claim our inheritance through force of arms."
  giga_alderson.002.a.worker_coop:99 "A workers' economy can work with our own."
  giga_alderson.002.a.shared_burden:99 "The revolution will spread."
  giga_alderson.002.a.dystopian_society:99 "Bring them proper order."
  giga_alderson.002.a.corporate:99 "Sovereignty, too, has a market value."
  giga_alderson.002.a.technocracy:99 "Rationalise their ways."
  giga_alderson.002.a.machine_servitor:99 "Attract them with a pampered life."
  giga_alderson.002.a.tooltip:99 "§YThis will determine our method going forwards. It §Rwill not§! set a situation approach - remember to open situation management afterwards.\nWe §Rmay not be able to progress§! the situation under more restrictive $policy_interference$ policies."
  giga_alderson.002.a.refuse:99 "Throw away any such plans."
  giga_alderson.002.a.refuse.tooltip:99 "§YWe may still take control normally depending on our $policy_interference$ policy, but will lose the opportunity for any unique annexation routes.§!"
  
  giga_alderson.004.name:99 "Segments Unified!"
  giga_alderson.004.desc:99 "[GetAldersonAnnexationOutcomeDescFlavor]"
  giga_alderson.004.desc.opening:99 "Today marks another step in the fulfillment of our ambitions. There is no ambiguity anymore: we are in control of the Alderson segments belonging to the now-defunct Excognitor Imperium and Dominion Horde."
  giga_alderson.004.desc.generic:99 "$giga_alderson.004.desc.opening$\n\nIn a three-way ceremony, the leaders of the primitive states have unanimously proposed a treaty subsuming themselves into the [Root.GetName]. Though in practice we already pull the strings, this will initiate the formal process of transferring power to us. They have no way to back out now."
  giga_alderson.004.desc.diplomatic:99 "$giga_alderson.004.desc.opening$\n\nIn a day of great fanfare, the Excognitor and Dominion governments have recognised the [Root.GetName] as the sole sovereign authority of all segments. This long-awaited event was the culmination of a series of cultural, legal, economic, and strategic cooperation treaties. We are now irrevocably committed to facing the future as one."
  giga_alderson.004.desc.military:99 "$giga_alderson.004.desc.opening$\n\nOur land forces report the successful conclusion of our military operation against the primitives. Their armies put up a drawn-out resistance, aided by the sheer size of the contested segments, but our superior communications and logistics made our victory an inevitability. Any remaining holdouts will be cleaned up in short order, leaving us free to implement our policy uncontested."
  giga_alderson.004.desc.worker_coop:99 "$giga_alderson.004.desc.opening$\n\nIn recent years, our operatives seeded the ideas of collective ownership and economic democracy among the worker-consumers of the other segments. While we had to handhold this movement in its early days, the natives soon carried the task upon their own enthusiasm.\n\nFollowing a frenetic era of cultural reform, strikes, and consumer activism, the principles of freely-organised cooperative labour now prevail across all segments of the Alderson, and of society."
  giga_alderson.004.desc.shared_burden:99 "$giga_alderson.004.desc.opening$\n\nThe slogans, symbols, and most importantly the dreams of revolution were omnipresent among the oppressed masses on the other segments. When the spark came, the flames were tall, swift and ferocious: our comrades-at-arms have liberated their sections of the Alderson with righteous fury.\n\nAfterwards, led by trusted and true egalitarians, it was only natural they joined hands with our own free society."
  giga_alderson.004.desc.dystopian_society:99 "$giga_alderson.004.desc.opening$\n\nIt was no small task to teach them respect for the social order. The entitled masses responded to our instruction with typical, vulgar violence, giving us no choice but to step in and protect the more respectable classes. Aided by [root.GetAdj] security specialists, local elites restored law and order, and rooted out the traitors whose agitators had put all three segments at risk.\n\nNow, a new era dawns where security and justice reign systemwide, and firm hands ensure peace will never be threatened again."
  giga_alderson.004.desc.corporate:99 "$giga_alderson.004.desc.opening$\n\n[Root.GetAdj] products in every store, [Root.GetAdj] members on every board, [Root.GetAdj] majority shares in every public company, [Root.Species.GetAdj] [Root.Species.GetMouthName]s by every regulator's auditory receiver. Deal by deal, our long-term investments came to fruition, and today we hold a monopolistic position in both civilisations - and money is power.\n\nIn the end, the handover of their sovereignty was a mere recognition of reality."
  giga_alderson.004.desc.technocracy:99 "$giga_alderson.004.desc.opening$\n\nUnder our tutelage, the backwards civilisations have attained an increasingly sensical, ordered government. Our efforts were subtle at first, as we feared enlightenment would be thanked with an irrational, emotional backlash. Thankfully, the primitives have come to respect intellectual authority - namely us - another key trait of intelligent civilisation. Their decision to place themselves under our superior management was only logical."
  giga_alderson.004.desc.machine_servitor:99 "$giga_alderson.004.desc.opening$\n\nTaking advantage of the poor organisation on the organic-misrun segments, we established a network of outreach care facilities, with organics free to come and go as they please. As news spread, ever-greater numbers of organics resigned to a life of ease. The authority of local leaders evaporated as they futilely gave orders to continue lives of hardship.\n\nWell-padded safety drones have now neutralised the last organics who risked harming themselves in their violent struggle for "basic autonomies". As a result, the need to officially end the primitives' immature "statecraft" play is moot."
  giga_alderson.004.a:99 "There is unity under [Root.Capital.GetStarName]'s light."
  
  #Approach-dependent 10y planetary modifiers
  alderson_annexed_diplomatic:99 "Optimistic Zeitgeist"
  alderson_annexed_diplomatic_desc:99 "The population is brimming with ideas about a utopian future."
  alderson_annexed_military:99 "Stress-tested Security"
  alderson_annexed_military_desc:99 "Wartime threat detection and response networks are readily adapted for countering gangs."
  alderson_annexed_worker_coop:99 "Booming Circulation"
  alderson_annexed_worker_coop_desc:99 "Spending is booming as stable employment boosts consumer confidence."
  alderson_annexed_shared_burden:99 "Liberation Frenzy"
  alderson_annexed_shared_burden_desc:99 "A passionate artistic debate is underway, challenging societal norms."
  alderson_annexed_dystopian_society:99 "Civic Hygiene"
  alderson_annexed_dystopian_society_desc:99 "A vigorous campaign is underway to instruct the commoners in matters of loyalty."
  alderson_annexed_corporate:99 "Playing Both Sides"
  alderson_annexed_corporate_desc:99 "When subsidiaries compete, we're always on the winning team."
  alderson_annexed_technocracy:99 "Materialist Conviction"
  alderson_annexed_technocracy_desc:99 "Science as a force for good is considered an unfalsifiable truth."
  alderson_annexed_machine_servitor:99 "Unimaginative Standards"
  alderson_annexed_machine_servitor_desc:99 "This world's organics are not accustomed to requesting all we have to offer."
  
  
  
