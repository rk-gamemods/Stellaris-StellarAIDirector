  # pc_alderson_slice_pc_desc:0 "A truly gargantuan computing complex similar to planetary ones, but stretched over an entire Alderson Slice. It is capable of untold processing power, and provides incredible buffs to research. Still cannot run Crysis."
  
  pc_alderson_slice_gaia:99 "Alderson Slice"
  pc_alderson_slice_gaia_desc:99 "A gargantuan slice of an $name_alderson$ stretching across an entire solar system, capable of supporting a truly gigantic population and the industry to match it."
  
  mod_pc_alderson_slice_gaia_shattered_habitability:99 "Shattered Alderson Habitability"
