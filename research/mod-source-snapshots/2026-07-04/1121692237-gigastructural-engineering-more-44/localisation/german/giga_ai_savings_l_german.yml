  giga_ai_savings_info:0 "Gigas KI-Megastruktur Sparinformationen"
  giga_ai_savings_info_desc:0 "§LEine helfende Hand bei der Finanzplanung.§!"
  mod_giga_ai_savings_tooltips_minerals_produces_add:0 "Zeigt an, wie viel die KI für Megastrukturen zurückgelegt hat. Diese Werte werden von den Baukosten der unterstützten Megastrukturen abgezogen und beim Baubeginn reduziert.\n\n§EWichtige Wirtschafts-Megastrukturen:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_important_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_important_unity]§!\n\n§ESekundäre Wirtschafts-Megastrukturen:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_resource_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_resource_unity]§!\n\n§ENutz-Megastrukturen:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_utility_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_utility_unity]§!\n\n§EMilitärische Megastrukturen:§!\n£alloys£ $alloys$: §Y[giga_ai_savings_military_alloys]§!\n£unity£ $unity$: §Y[giga_ai_savings_military_unity]§!\n\nDummy modifier so the values show properly"
  
  r_giga_ai_savings:0 "KI-Sparkonto"
  r_giga_ai_savings_desc:0 "Dies ist ein KI-exklusives Relikt, das die Modifikatoren für die KI-Megastruktur-Sparfunktion bereitstellt. Es hat keine Auswirkung für menschliche Spieler und wird bei Jahresbeginn entfernt, falls es sich in deren Besitz befindet.\n\n§LHolla holla get dolla§!"
  
  giga_ai_savings_desc:0 "Kostenänderung dieser Megastruktur durch Ersparnisse."
  
