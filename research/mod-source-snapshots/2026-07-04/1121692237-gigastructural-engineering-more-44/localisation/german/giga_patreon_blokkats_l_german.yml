l_german:
  
  trait_blokkat_blokkimous:0 "Multiversums-Enthusiast"
  trait_blokkat_blokkimous_desc:0 "Diese Blockkatze scheint Beweise gefunden zu haben, dass unser Universum Teil einer Art 'zeitlichen Multiversums' ist, das sich bis in die Ewigkeit erstreckt, und zeigt Interesse daran, dieses neu entdeckte Phänomen zu erforschen."
  
  prison_blokkat_is_blokkimous:0 "§MMultiversums-Enthusiast§! - Diese Blockkatze scheint Beweise gefunden zu haben, dass unser Universum Teil einer Art 'zeitlichen Multiversums' ist, das sich bis in die Ewigkeit erstreckt, und zeigt Interesse daran, dieses neu entdeckte Phänomen zu erforschen."
  
  trait_blokkat_baron:0 "Völlig Wahnsinnig"
  trait_blokkat_baron_desc:0 "Diese Blockkatze hat eine bizarre Faszination dafür, alles aus seinem natürlichen Zustand zu verdrehen und zu verfremden. Außerdem scheint sie sich selbst eine Aura von Aristokratie und Elitismus zugelegt zu haben."
  
  prison_blokkat_is_baron:0 "§RVöllig Wahnsinnig§! - Diese Blockkatze hat eine bizarre Faszination dafür, alles aus seinem natürlichen Zustand zu verdrehen und zu verfremden. Außerdem scheint sie sich selbst eine Aura von Aristokratie und Elitismus zugelegt zu haben."
  
  trait_blokkat_blokkepsii:0 "Empathisch"
  trait_blokkat_blokkepsii_desc:0 "Diese Blockkatze scheint sich sehr um andere Spezies zu kümmern und widmet ihre Zeit deren Erforschung. Obwohl sie weiterhin auf Ernteeinsätze fokussiert zu sein scheint, ist sie offenbar durchaus bereit, anderen Spezies auf jede erdenkliche Weise zu helfen."
  
  prison_blokkat_is_blokkepsii:0 "§EEmpathisch§! - Diese Blockkatze scheint sich sehr um andere Spezies zu kümmern und widmet ihre Zeit deren Erforschung. Obwohl sie weiterhin auf Ernteeinsätze fokussiert zu sein scheint, ist sie offenbar durchaus bereit, anderen Spezies auf jede erdenkliche Weise zu helfen."
  
  trait_blokkat_bloblokkad:0 "Wissenschaftsführer"
  trait_blokkat_bloblokkad_desc:0 "Diese Blockkatze scheint das Streben nach Wissen über alles andere zu stellen. Man kann sie regelmäßig dabei beobachten, wie sie an 'Primitiven' experimentiert oder an irgendeinem verrückten Projekt tüftelt."
  
  prison_blokkat_is_bloblokkad:0 "§EWissenschaftsführer§! - Diese Blockkatze scheint das Streben nach Wissen über alles andere zu stellen. Man kann sie regelmäßig dabei beobachten, wie sie an 'Primitiven' experimentiert oder an irgendeinem verrückten Projekt tüftelt."
  
  trait_blokkat_blokkofett:0 "Neuverbundene"
  trait_blokkat_blokkofett_desc:0 "Diese Blockkatze war Teil einer raumfahrenden Nation wie der unseren, die die Block-Protokolle abgeschlossen und sich den Blockkatzen angeschlossen hat. Diese galaktische Ernteoperation ist ihre erste, und sie wurde der Erforschung nationaler Einheiten zugeteilt."
  
  prison_blokkat_is_blokkofett:0 "§HNeuverbundene§! - Diese Blockkatze war Teil einer raumfahrenden Nation wie der unseren, die die Block-Protokolle abgeschlossen und sich den Blockkatzen angeschlossen hat. Diese galaktische Ernteoperation ist ihre erste, und sie wurde der Erforschung nationaler Einheiten zugeteilt."
  
  trait_blokkat_blokkutos:0 "Träumerin"
  trait_blokkat_blokkutos_desc:0 "Diese Blockkatze hat stets ein Gefühl von Nostalgie für die Vergangenheit und träumt von einer besseren Zukunft. Ihre Träume inspirieren Einheit, Hoffnung und eine Faszination für das Unbekannte bei allen in ihrer Gegenwart."
  
  prison_blokkat_is_blokkutos:0 "§MTräumerin§! - Diese Blockkatze hat stets ein Gefühl von Nostalgie für die Vergangenheit und träumt von einer besseren Zukunft. Ihre Träume inspirieren Einheit, Hoffnung und eine Faszination für das Unbekannte bei allen in ihrer Gegenwart."
  
  trait_blokkat_sophia:0 "Rosenritterin"
  trait_blokkat_sophia_desc:0 "Diese Blockkatze behauptet und genießt es aus irgendeinem Grund, eine sogenannte Rosenritterin zu sein, und scheint alle Kriegsführungsmethoden zu kennen, bis hin zu solchen, die in gewisser Weise geradezu archaisch erscheinen."
  
  prison_blokkat_is_sophia:0 "§PRosenritterin§! - Diese Blockkatze behauptet und genießt es aus irgendeinem Grund, eine sogenannte Rosenritterin zu sein, und scheint alle Kriegsführungsmethoden zu kennen, bis hin zu solchen, die in gewisser Weise geradezu archaisch erscheinen. Sie scheint sowohl uns als auch den Blockkatzen bei ihren Ernteoperationen gegenüber gleichgültig zu sein. Sie bittet auch oft darum, einfach 'Rose' genannt zu werden. Sie hat einen fanatischen Drang, alles, was in Kanonen passt, auf feindliche Schiffe zu feuern, und flieht auch oft, wenn sie weiß, dass ihr Leben in Gefahr ist. Außerdem genießt sie es aus irgendeinem Grund, Schiffe ineinander zu rammen.\n\nZu guter Letzt behauptet sie, dass sie 'Den großartigsten Anblick sehen möchte, den je jemand erblicken könnte'. Alle rätseln, was das sein könnte."
  
  trait_blokkat_blokknight:0 "Blockritterin"
  trait_blokkat_blokknight_desc:0 "Diese Blockkatze scheint es zu genießen, sich zu verkleiden und endlose Geschichten von Taten und heldenhaften Interaktionen mit früheren primitiven Zivilisationen zu erzählen. Außerdem scheint sie eine ungesunde Besessenheit von primitiven Waffen und Rüstungen zu haben und sorgt ständig dafür, dass davon so viel wie möglich produziert wird."
  
  prison_blokkat_is_blokknight:0 "§LDie Blockritterin kehrt zurück§! - Diese Blockkatze scheint es zu genießen, sich zu verkleiden und endlose Geschichten von Taten und heldenhaften Interaktionen mit früheren primitiven Zivilisationen zu erzählen. Außerdem scheint sie eine ungesunde Besessenheit von primitiven Waffen und Rüstungen zu haben und sorgt ständig dafür, dass davon so viel wie möglich produziert wird."
  
  trait_blokkat_yoru:0 "Bösartig Psychotisch"
  trait_blokkat_yoru_desc:0 "Diese Blockkatze scheint auf die ultimative Vernichtung aller Lebensformen versessen zu sein."
  
  prison_blokkat_is_yoru:0 "§RBösartig Psychotisch§! - Diese Blockkatze scheint auf die ultimative Vernichtung aller Lebensformen versessen zu sein. Warum? Vielleicht wurde sie im Blockwerk angepingt, vielleicht hat sie heute Morgen ihren Blocktoast verbrannt, oder vielleicht... ist sie einfach wahnsinnig."
  
  trait_blokkat_silly:99 "Silly"
  trait_blokkat_silly_desc:99 "This Blokkat is full of whimsy and joy. Every Blokkat knows not to challenge PIEBLOKK because I'm the strongest! :3"
  
  prison_blokkat_is_pieblokk:99 "§CVery Silly :3§! - $trait_blokkat_silly_desc$"
  
  trait_blokkat_megastructure_obsession:99 "Megastructure Obsession"
  trait_blokkat_megastructure_obsession_desc:99 "This Blokkat shows a great interest in any and all forms of artificial megastructures, from those shown in primitive science fiction entertainment to impossibly complicated plans for structures dwarfing entire galaxies."
  
  prison_blokkat_is_tempestkat:99 "§MMegastructure Obsession§! - $trait_blokkat_megastructure_obsession_desc$"
  