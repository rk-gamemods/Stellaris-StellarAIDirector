  giga_dialog.2501.title:0 "Alderson Segment Spezialisierung"
  giga_dialog.2501.desc:0 "Die Zeit ist gekommen zu entscheiden, zu welcher Art von Alderson Segment wir diesen bestimmten Abschnitt ausbauen wollen. Der Typ kann spĂ¤ter nach Fertigstellung des Segments durch Terraforming geĂ¤ndert werden."
  giga_dialog.2505.title:0 "Alderson Computer Komplex fertiggestellt!"
  giga_dialog.2505.desc:0 "Eines der Segmente unserer $name_alderson$ ist endlich fertig! Dieser kolossale Lebensraum erstreckt sich ĂĽber mehrere astronomische Einheiten und wird ungeahnte Mengen an Lebensraum fĂĽr unsere BevĂ¶lkerung und Industrien bieten. Dieses Segment ist vollstĂ¤ndig mit Schichten leistungsstarker Computer und Prozessoren bedeckt. Es wird unseren Forschern nahezu unbegrenzte Rechenleistung und sofortigen Zugriff auf die Wissensdatenbanken unseres Reiches bieten. Dieses mĂ¤chtige Konstrukt wird uns sicherlich helfen, die Geheimnisse des Universums noch leichter zu ergrĂĽnden als zuvor."
  giga_dialog.2505.a:0 "Wunderbar! Kann es Crysis ausfĂĽhren?"
  giga_dialog.2505.a.tooltip:0 "Nein."
  giga_dialog.2506.title:0 "Ă–kumenopolis Alderson fertiggestellt!"
  giga_dialog.2506.desc:0 "Eines der Segmente unserer $name_alderson$ ist endlich fertig! Dieser kolossale Lebensraum erstreckt sich ĂĽber mehrere astronomische Einheiten und wird ungeahnte Mengen an Lebensraum fĂĽr unsere BevĂ¶lkerung und Industrien bieten. Dieses Segment ist vollstĂ¤ndig mit urbanen Industriegebieten bedeckt und bietet gigantische industrielle KapazitĂ¤ten und Wohnraum fĂĽr unsere BĂĽrger."
  giga_dialog.2506.a:0 "Wunderbar!"
  giga_dialog.25061.title:0 "Schwarm Alderson fertiggestellt!"
  giga_dialog.25061.desc:0 "Eines der Segmente unserer $name_alderson$ ist endlich fertig! Dieser kolossale Lebensraum erstreckt sich ĂĽber mehrere astronomische Einheiten und wird ungeahnte Mengen an Lebensraum fĂĽr unsere BevĂ¶lkerung und Industrien bieten. Dieses gesamte Segment ist ein riesiger lebender Organismus, psionisch verbunden mit dem Schwarmgeist, der es geformt hat. Jedes Wesen, das nicht Teil des Schwarms ist und hier einen FuĂź setzt, wird vom Terrain selbst angegriffen."
  giga_dialog.25061.a:0 "Wunderbar!"
  giga_dialog.25062.title:0 "Maschinen Alderson fertiggestellt!"
  giga_dialog.25062.desc:0 "Eines der Segmente unserer $name_alderson$ ist endlich fertig! Dieser kolossale Lebensraum erstreckt sich ĂĽber mehrere astronomische Einheiten und wird ungeahnte Mengen an Lebensraum fĂĽr unsere BevĂ¶lkerung und Industrien bieten. Dieses Segment ist vollstĂ¤ndig mit kĂĽnstlichen Strukturen bedeckt. Die dĂĽnne AtmosphĂ¤re besteht hauptsĂ¤chlich aus industriellen Schadstoffen und kann kein biologisches Leben unterstĂĽtzen."
  giga_dialog.25062.a:0 "Wunderbar!"
  giga_dialog.2507.title:0 "$name_alderson$ fertiggestellt!"
  giga_dialog.2507.desc:0 "Es ist vollbracht! Im [giga_system.GetName] System ist es uns gelungen, eine kolossale Scheibe zu errichten, die sich vom Stern bis zum Rand des Systems erstreckt. Diese gigantische Megastruktur ĂĽbertrifft alles, was wir bisher gebaut haben, und steht als Zeugnis unserer ultimativen Beherrschung der Gesetze der Physik und des Ingenieurwesens."
  giga_dialog.2507.a:0 "Wer kĂ¶nnte uns jetzt noch widerstehen?"
