l_german:
  
  ########################################################
  ##################### DYSON SPHERE #####################
  ########################################################
  giga_dialog.40041.desc:0 "Die Arbeiten an der [From.From.GetName] Dyson Sphäre schreiten voran. Durch die Installation weiterer fortschrittlicher Solarsammler haben wir den Nutzen der Dyson Sphäre erhöht.\n\nDer Energiegewinn hat 50% des prognostizierten Maximalwerts der fertigen Konstruktion erreicht."
  giga_dialog.40042.desc:0 "Mit der Ergänzung weiterer Solarsammler Paneele haben wir die Dyson Sphäre im [From.From.GetName] System fast fertiggestellt.\n\nDie Struktur erreicht nun 75% der prognostizierten Maximalleistung für einen Stern dieser Größe.\n\nBald wird die volle Kraft des Sterns selbst in unseren Händen liegen."
  
  ########################################################
  ##################### KUGELBLITZ #######################
  ########################################################
  giga_dialog.101.name:0 "$name_kugelblitz$ Baustelle errichtet"
  giga_dialog.101.desc:0 "Die Baustelle für einen $name_kugelblitz$ im [giga_system.GetName] System ist nun fertiggestellt. Sie beherbergt das Personal und die Ausrüstung, die für den Bau einer Anlage benötigt werden, die einen künstlichen Kugelblitz erzeugen kann - ein Schwarzes Loch aus Strahlung statt Materie! Wir können Energie und Materie in den Kugelblitz einbringen und diese später wieder extrahieren und bei Bedarf in Materie umwandeln, wodurch der Kugelblitz zu einem äußerst effizienten Speicher wird!"
  giga_dialog.101.a:0 "Ausgezeichnet."
  
  giga_dialog.102.name:0 "Leerer $name_kugelblitz$ fertiggestellt"
  giga_dialog.102.desc:0 "Unsere Ingenieure haben die große Anlage zur Erzeugung eines künstlichen Kugelblitzes fertiggestellt."
  giga_dialog.102.a:0 "Großartig."
  
  giga_dialog.103.name:0 "Kugelblitz erzeugt!"
  giga_dialog.103.desc:0 "Unser $name_kugelblitz$ hat erfolgreich einen künstlichen Kugelblitz erzeugt! Obwohl aufgrund beschleunigter Hawking Strahlung derzeit Energie entweicht, kann er nun Materie und Energie in Form von Strahlung für die spätere Verwendung speichern!"
  giga_dialog.103.a:0 "Wunderbar!"
  
  giga_dialog.106.name:0 "Kugelblitz verfeinert!"
  giga_dialog.106.desc:0 "Unser $name_kugelblitz$ über [giga_planet.GetName] wurde erfolgreich verbessert! Bereits jetzt beginnen Lagerhäuser im gesamten [giga_system_owner.GetName] damit, ihre Bestände zu leeren und nach [giga_planet.GetName] zu transportieren, um die erhöhte Kapazität der künstlichen Singularität zu nutzen."
  giga_dialog.106.a:0 "Eine großartige Leistung."
  
  giga_dialog.107.name:0 "Das Große Lagerhaus"
  giga_dialog.107.desc:0 "Unser $name_kugelblitz$ nahe [giga_planet.GetName] wurde vollständig mit den neuesten Fortschritten der tetradimensionalen Technologie aufgerüstet. Die künstliche Singularität im Kern der Struktur ist bereits fast größer als der Planetoid, um den sie errichtet wurde.\n\nMit solch einer Konstruktion können wir nun Mengen an Rohmaterialien und veredelten Gütern speichern, die bisher als nahezu unmöglich galten. Prognosen zeigen, dass es Jahre dauern könnte, bis der Kugelblitz seine stabile Maximalkapazität erreicht."
  giga_dialog.107.a:0 "Wahrhaft unglaublich!"
  
  giga_dialog.104.name:0 "Ruinenhafter $name_kugelblitz$"
  giga_dialog.104.desc:0 "Unser Forschungsschiff wurde beim Eintritt in das [from.GetName] System von einem ungewöhnlichen Anblick begrüßt. Ein $name_kugelblitz$ wurde in der Umlaufbahn eines der Planeten entdeckt! Dieses unglaublich fortschrittliche Konstrukt könnte eine kontrollierte Singularität beherbergen, die große Mengen Energie erzeugen kann. Leider scheint es sich in einem beklagenswerten Zustand des Verfalls zu befinden."
  giga_dialog.104.a:0 "Faszinierend."
  
  giga_dialog.105.name:0 "$name_kugelblitz$ repariert!"
  giga_dialog.105.desc:0 "Ein ruinenhafter $name_kugelblitz$ wurde von unseren Ingenieurteams wieder in einen funktionsfähigen Zustand versetzt! Nach der Reaktivierung begann das Konstrukt, eine massive kontrollierte Singularität zu erzeugen, aus der wir große Mengen Energie gewinnen und zudem Materie in Form von Strahlung speichern können."
  giga_dialog.105.a:0 "Wie funktioniert das überhaupt?"
  
  ########################################################
  #################### PENROSE SPHERE ####################
  ########################################################
  giga_dialog.1207.title:0 "Zweck der $name_penrose$"
  giga_dialog.1207.a.desc:0 "Nun da der Spiegelrahmen um [giga_system.GetName] fertiggestellt ist, können wir endlich mit den Vorbereitungen beginnen, ihn als Bombe zu nutzen.\n\nWir müssen ihn einige Jahre lang Energie sammeln lassen, dann wird er zur Detonation bereit sein. Alles im System wird zerstört werden, und die Explosion wird so mächtig sein, dass sie sich durch Hyperraumrouten ausbreitet. Jeder Planet in benachbarten Systemen wird durch den Energiefluss unbewohnbar gemacht, und alle Planeten zwei Sprünge entfernt werden verstrahlt. Am wichtigsten ist, dass eine Schockwelle durch den Subraum geschickt wird, die Hyperraumrouten bis zu 4 Sprünge weit stört und neu anordnet!"
  giga_dialog.1207.b.desc:0 "Nun da der Spiegelrahmen um [giga_system.GetName] fertiggestellt ist, können wir endlich mit den Vorbereitungen beginnen, ihn zu stabilisieren und für die Energiegewinnung zu nutzen.\n\nSeine Leistung wird relativ bescheiden sein (250 £energy£), aber es könnte möglich sein, ihn zu stabilisieren, sobald wir die entsprechenden Technologien haben."
  
  giga_dialog.1207.a:0 "Es wird ein ausgezeichnetes Instrument der Zerstörung sein."
  giga_dialog.1207.b:0 "Bald wird seine volle Kraft uns gehören."
  
  ###########################################################
  #################### FUSION SUPPRESSOR ####################
  ###########################################################
  giga_dialog.3401.name:0 "$name_fusion_suppressor$ Baustelle errichtet"
  giga_dialog.3401.desc:0 "Die Baustelle für einen zukünftigen $name_fusion_suppressor$ wurde erfolgreich im [giga_system.GetName] System errichtet. Sie wird die Infrastruktur beherbergen, die für den Bau eines $name_fusion_suppressor$ benötigt wird, der die Prozesse innerhalb eines Sterns verändern kann."
  giga_dialog.3401.a:0 "Großartig."
  
  giga_dialog.3402.name:0 "Gravitationsmodulatoren gebaut"
  giga_dialog.3402.desc:0 "Unsere Ingenieure haben die große Anordnung von Gravitationsmodulatoren unseres $name_fusion_suppressor$ um [giga_system.GetName] fertiggestellt. Diese massiven Geräte können ein künstliches Gravitationsfeld erzeugen, um einen ganzen Stern zu komprimieren und seine internen Fusionsprozesse zu verändern."
  giga_dialog.3402.a:0 "Wunderbar."
  
  giga_dialog.3403.name:0 "Stellare Stabilisatoren gebaut"
  giga_dialog.3403.desc:0 "Die Stellaren Stabilisatoren unseres $name_fusion_suppressor$ um [giga_system.GetName] sind nun fertig. Sie können den Stern stabilisieren, während die Gravitationsmodulatoren das künstliche Gravitationsfeld erzeugen. Jetzt können wir mit dem eigentlichen Prozess der Sternkompression beginnen, um ihn letztendlich zu zerstören oder in ein Schwarzes Loch zu verwandeln."
  giga_dialog.3403.a:0 "Erstaunlich."
  
  giga_dialog.3404.name:0 "Stellare Kompression - Phase I"
  giga_dialog.3404.desc:0 "Unser $name_fusion_suppressor$ hat erfolgreich begonnen, [giga_system.GetName] zu komprimieren. Die Fusionsprozesse des Sterns wurden verändert und ein starkes Gravitationsfeld wurde erzeugt, wodurch das sichtbare Volumen des Sterns schrumpft. Die vielen Auswirkungen auf das stellare Plasma werden von verschiedenen Laboratorien innerhalb des $name_fusion_suppressor$ untersucht."
  giga_dialog.3404.a:0 "Wunderbar."
  
  giga_dialog.3405.name:0 "Stellare Kompression - Phase II"
  giga_dialog.3405.desc:0 "Der $name_fusion_suppressor$ hat [giga_system.GetName] erneut auf ein noch kleineres Volumen komprimiert. Interessante Phänomene sind im Stern aufgetreten, die große wissenschaftliche Erkenntnisse liefern, und der Stern beginnt sich auf eine Weise zu verhalten, die den Gesetzen der Physik trotzt. Weitere Kompression wird zu mehr Ergebnissen führen."
  giga_dialog.3405.a:0 "Großartig."
  
  giga_dialog.3406.name:0 "Stellare Kompression - Neutronenstern"
  giga_dialog.3406.desc:0 "Der $name_fusion_suppressor$ hat [giga_system.GetName] nun so stark komprimiert, dass Protonen und Elektronen im Sternkern zu Neutronen verschmolzen sind, wodurch der Kern sich in einen Neutronenstern verwandelt hat, umgeben von einer Schicht exotischen stellaren Plasmas.\n\nWir können den Stern nun in diesem Zustand belassen, was Physik und Ingenieurforschung liefert. Alternativ können wir den Stern weiter komprimieren und ihn in ein künstliches Schwarzes Loch verwandeln, was Physikforschung liefert. Schließlich kann der $name_fusion_suppressor$ die gesamte Gravitationskompression aufheben und eine abstoßende Kraft ausüben, wodurch die abstoßenden Kräfte im Sternkern den Stern in eine Supernova verwandeln, den $name_fusion_suppressor$ zerstören und eine neue strategische Ressource auf der Oberfläche der Planeten dieses Sonnensystems ablagern, die zum Bau leistungsfähiger Gebäude verwendet werden kann."
  giga_dialog.3406.a:0 "Ausgezeichnet."
  
  giga_dialog.3407.name:0 "$name_fusion_suppressor$ demontiert"
  giga_dialog.3407.desc:0 "Der $name_fusion_suppressor$ im [giga_system.GetName] System wurde erfolgreich demontiert. Das von ihm erschaffene Schwarze Loch steht nun für andere Projekte zur Verfügung."
  giga_dialog.3407.a:0 "Wunderbar."
  
  giga_dialog.3409.title:0 "Supernova"
  giga_dialog.3409.desc:0 "Der $name_fusion_suppressor$ hat alle auf den Stern ausgeübten Gravitationsfelder aufgehoben und beginnt, ein negatives Gravitationsfeld anzuwenden.\nInnerhalb von Sekunden überwinden die intensiven abstoßenden Kräfte im Neutronenkern des Sterns das natürliche Gravitationsfeld, und die kochenden Energien eines superdichten Sterns werden plötzlich entfesselt.\nDer Stern beginnt heller zu leuchten und scheint für einige Sekunden zu pulsieren, bevor die äußeren Schichten des Sterns plötzlich mit relativistischer Geschwindigkeit durch die abstoßenden Kräfte ausgestoßen werden. Innerhalb von Stunden werden alle Planeten im System von der enormen Energiewelle verglast, die ihre Oberflächen und Atmosphären abträgt.\nIodizium Ablagerungen haben sich auf den nun geschmolzenen Planeten gebildet, bereit zur Förderung und Nutzung."
  giga_dialog.3409.a:0 "Wunderbar!"
  
  giga_dialog.3410.title:0 "Schwarzes Loch"
  giga_dialog.3410.desc:0 "Der $name_fusion_suppressor$ hat sein künstliches Gravitationsfeld auf das Maximum verstärkt. Der Stern ist zu einem Punkt kollabiert, an dem nicht einmal Licht seiner natürlichen Gravitationsanziehung entkommen kann, wodurch er effektiv in ein Schwarzes Loch verwandelt wurde. Forschungslabore innerhalb des $name_fusion_suppressor$ haben begonnen, das künstliche Schwarze Loch zu untersuchen, was zu unglaublichen wissenschaftlichen Daten führt."
  giga_dialog.3410.a:0 "Wunderbar!"
  
  ########################################################
  #################### ALDERSON DISC #####################
  ########################################################
  
  # giga_dialog.2501.title:0 "Alderson Slice Specialization"
  # giga_dialog.2501.desc:0 "The time has come to decide what sort of Alderson Slice we want to upgrade this particular segment to. The type can be later changed when the segment is completed, through terraforming."
  
  giga_dialog.2502.title:0 "$name_alderson$ Baustelle fertiggestellt!"
  giga_dialog.2502.desc:0 "Die Baustelle für unsere $name_alderson$ wurde im [giga_system.GetName] System fertiggestellt. Diese Plattform wird als Ausgangspunkt dienen, um mit dem Bau des kolossalen Rahmens zu beginnen, der sich bis zu den Grenzen dieses Systems erstrecken wird. Es wird auch möglich sein, Planetare Computer und Ökumenopolis Alderson Segmente zu bauen, wenn ihre planetaren Gegenstücke bereits freigeschaltet sind."
  giga_dialog.2502.a:0 "Großartig."
  
  giga_dialog.2503.title:0 "$name_alderson$ Rahmen fertiggestellt!"
  giga_dialog.2503.desc:0 "Unser systemumspannender Alderson Scheiben Rahmen ist nun fertig! Dieses kolossale metallische Skelett bedeckt das gesamte System und wird als Grundlage für den Bau der eigentlichen Segmente dienen. Jedes Segment wird 15 Distrikte besitzen, die jeweils viermal so leistungsfähig sind wie ein normaler Ringwelt Distrikt. Nach der Fertigstellung wird diese mächtige Struktur uns sicherlich zu den größten Baumeistern dieser Galaxie machen."
  giga_dialog.2503.a:0 "Aber wie kollabiert das nicht in sich selbst?"
  giga_dialog.2503.a.tooltip:0 "Multidimensionales Engineering ist buchstäblich eine Voraussetzung für dieses Ding."
  
  giga_dialog.2504.title:0 "Gaia Alderson Segment fertiggestellt!"
  giga_dialog.2504.desc:0 "Eines der Segmente unserer $name_alderson$ ist endlich fertig! Dieser kolossale Lebensraum erstreckt sich über mehrere astronomische Einheiten und wird ungeahnte Mengen an Lebensraum für unsere Bevölkerung und Industrien bieten. Es verfügt über eine große Vielfalt an Ökosystemen und Klimazonen und ist daher für praktisch jede Spezies in der Galaxie bewohnbar. Wir sollten sofort mit der Besiedlung beginnen."
  giga_dialog.2504.a:0 "Wunderbar!"
  
  # giga_dialog.2505.title:0 "Alderson Computing Complex Complete!"
  # giga_dialog.2505.desc:0 "One of our $name_alderson$'s slices has finally been completed! This colossal habitat spans several astronomical units, and shall provide untold amounts of living space for our population and industries. This slice is completely covered by layers and layers of powerful computers and processors. It will be able to provide our researchers with nearly unlimited amounts of computing power, and instantaneous access to our empire's knowledge databanks. This mighty construct will surely help us pierce the mysteries of the universe with even greater ease than before."
  # giga_dialog.2505.a:0 "Marvelous! Can it run Crysis?"
  # giga_dialog.2505.a.tooltip:0 "No."
  
  # giga_dialog.2506.title:0 "Ecumenopolis Alderson Complete!"
  # giga_dialog.2506.desc:0 "One of our $name_alderson$'s slices has finally been completed! This colossal habitat spans several astronomical units, and shall provide untold amounts of living space for our population and industries. This slice is entirely covered by urbo-industrial sprawl, offering gargantuan amounts of industrial capacity and housing for our citizens."
  # giga_dialog.2506.a:0 "Marvelous!"
  
  # giga_dialog.25061.title:0 "Hive Alderson Complete!"
  # giga_dialog.25061.desc:0 "One of our $name_alderson$'s slices has finally been completed! This colossal habitat spans several astronomical units, and shall provide untold amounts of living space for our population and industries. This entire slice is a giant living organism, psionically connected with the Hive Mind that shaped it. Any beings not part of the Hive that set foot here will be attacked by the very terrain itself."
  # giga_dialog.25061.a:0 "Marvelous!"
  
  # giga_dialog.25062.title:0 "Machine Alderson Complete!"
  # giga_dialog.25062.desc:0 "One of our $name_alderson$'s slices has finally been completed! This colossal habitat spans several astronomical units, and shall provide untold amounts of living space for our population and industries. This slice is entirely covered with artificial structures. The thin atmosphere consists mostly of industrial pollutants and is not capable of supporting biological life."
  # giga_dialog.25062.a:0 "Marvelous!"
  
  giga_dialog.25070.title:99 "$name_alderson$ Complete!"
  giga_dialog.25070.desc:99 "It has been done! In the [giga_system.GetName] System, we have managed to fully assemble a colossal disk stretching all the way from the star to the edge of the system. This gargantuan gigastructure dwarfs anything we've built before, and stands as a testimony to our ultimate dominance over the laws of physics and engineering."
  giga_dialog.25070.a:99 "Who could oppose us now?"
  
  giga_dialog.25071.title:99 "$name_alderson$ Complete! has origin"
  giga_dialog.25071.desc:99 "It has been done! In the [giga_system.GetName] System, we have managed to fully assemble a colossal disk stretching all the way from the star to the edge of the system. This gargantuan gigastructure dwarfs anything we've built before, and stands as a testimony to our ultimate dominance over the laws of physics and engineering."
  giga_dialog.25071.a:99 "Who could oppose us now?"
  
  ########################################################
  ################# AUTOMATED STRIPMINE ##################
  ########################################################
  
  giga_dialog.3301.name:0 "$name_auto_stripmine$ Baustelle errichtet"
  giga_dialog.3301.desc:0 "Unsere Ingenieure haben die Baustelle für einen zukünftigen $name_auto_stripmine$ nahe [giga_system.GetName] fertiggestellt. Diese große Orbitalplattform wird alles beherbergen, was wir brauchen, um einen großen Minenkomplex um den Planeten zu bauen, der ihn schließlich fast aller seiner Mineralien berauben wird."
  giga_dialog.3301.a:0 "Ausgezeichnet."
  
  giga_dialog.3302.name:0 "$name_auto_stripmine$ Orbitalanlage konstruiert"
  giga_dialog.3302.desc:0 "Die Orbitalanlage unseres $name_auto_stripmine$ ist nun fertig. Dieses große Konstrukt besteht aus zwei großen Traktorstrahlen, die sowohl große Mengen abgebauter Mineralien nach oben befördern als auch die Oberfläche mit großen Energiestrahlen beschießen können, um schwer abbaubare Teile des Planeten zu schmelzen. Es beinhaltet auch einen Verarbeitungsring zur weiteren Steigerung der Mineralienausbeute. Jetzt müssen wir nur noch die planetaren Anlagen fertigstellen, die aus Millionen von robotischen Bohreinheiten bestehen, um mit dem eigentlichen Bergbau zu beginnen."
  giga_dialog.3302.a:0 "Wunderbar!"
  
  giga_dialog.3303.title:0 "Planetarer Tagebau in Betrieb"
  giga_dialog.3303.desc:0 "Unser $name_auto_stripmine$ wurde erfolgreich aktiviert! Gigantische orbitale Traktorstrahlen befördern Tonnen über Tonnen von Mineralien, die von Millionen automatisierter Roboterbohrer abgebaut werden, welche die flüchtigen Partikel des Planeten in tausenden ausgedehnten Minenkomplexen sammeln."
  giga_dialog.3303.monster.desc:0 "Unser $name_auto_stripmine$ wurde erfolgreich aktiviert! Gigantische orbitale Traktorstrahlen befördern Tonnen über Tonnen von Mineralien, die von Millionen automatisierter Roboterbohrer in tausenden ausgedehnten Minenkomplexen abgebaut werden.\n\nDie früheren Bewohner von [giga_planet.GetName] schafften es nicht, der Aktivierung der Struktur rechtzeitig zu entkommen. Sie werden wahrscheinlich wie gewöhnliche Steine eingesammelt und zur Ausbeute des $name_auto_stripmine$ hinzugefügt werden."
  giga_dialog.3303.a:0 "Mineralienausbeute nominal."
  giga_dialog.3303.b:0 "Wie entsetzlich... für sie."
  
  giga_dialog.3304.title:0 "Planetarer Tagebau erreicht äußeren Kern"
  giga_dialog.3304.desc:0 "Unsere Ingenieure und Wissenschaftler am [giga_planet.GetName] $name_auto_stripmine$ informieren uns, dass die Bergbauoperationen den geschmolzenen äußeren Kern des Planeten erreicht haben.\nDies bedeutet, dass die Mineraliengewinnung in einigen Jahren enden wird, wenn wir schließlich den inneren Kern erreichen."
  giga_dialog.3304.a:0 "Zur Kenntnis genommen."
  
  giga_dialog.3305.title:0 "Planetarer Tagebau erschöpft"
  giga_dialog.3305.desc:0 "Der [giga_planet.GetName] $name_auto_stripmine$ hat keine Mineralien mehr zum Abbau. [giga_planet.GetName] wurde auf einen kleinen geschmolzenen Kern reduziert, der der Kälte des Weltraums ausgesetzt ist. Die verbliebenen Mineralien des Kerns wurden mittels fortschrittlicher Fracking Techniken extrahiert, was bedeutet, dass nur noch Schrott und kaum verwertbare Materialien übrig sind. Die Orbitalanlage wurde demontiert und eine Mineralienlagerstätte befindet sich nun auf dem freigelegten Kern des Planeten."
  giga_dialog.3305.a:0 "Es war unvermeidlich."
  
  giga_dialog.3306.name:0 "Planetarer Tagebau fand Ressourcen"
  giga_dialog.3306.desc.minerals:0 "Der [fromfrom.GetName] $name_auto_stripmine$ hat ziemlich große reiche Erzadern freigelegt. Diese Adern werden die £minerals£§YMineralien§! Ausbeute des umkreisenden $name_auto_stripmine$ deutlich erhöhen.\n\nSie werden schätzungsweise nur noch weitere [from.gigas_stripmine_rich_mineral_deposit_length] Planetenschichten anhalten."
  giga_dialog.3306.desc.alloys:0 "Der [fromfrom.GetName] $name_auto_stripmine$ hat einen merkwürdig dichten Teil des Mantels entdeckt. Dieser extrem dichte Abschnitt der Lithosphäre ist strukturell unglaublich ähnlich zu £alloys£§YLegierungen§!, was uns effektiv erlaubt, raffinierte Materialien direkt abzubauen. Leider ist der Abbau eines Materials, das als würdige Panzerung für Raumfahrzeuge dient, keine einfache Aufgabe, und die erforderliche Konzentration auf die dichte Lagerstätte wird die £minerals£§YMineralien§! Produktion verlangsamen.\n\nWir schätzen, dass wir weitere [from.gigas_stripmine_alloy_deposit_length] Planetenschichten entfernen können, bevor die dichten Materialien erschöpft sind."
  giga_dialog.3306.desc.gas:0 "Der [fromfrom.GetName] $name_auto_stripmine$ hat riesige Höhlen freigelegt, die mit einer hochverdichteten Form von £exotic_gases£§YExotischem Gas§! gefüllt sind! Die Drohnen an der Oberfläche sollten in der Lage sein, das kostbare Gas zu extrahieren. Leider wird die Umleitung von Drohnen zur Gasgewinnung die £minerals£§YMineralien§! Produktion verlangsamen.\n\nWir schätzen, dass wir noch [from.gigas_stripmine_gas_deposit_length] Planetenschichten vor uns haben, bevor wir keine dieser Höhlen mehr finden."
  giga_dialog.3306.desc.motes:0 "Der [fromfrom.GetName] $name_auto_stripmine$ hat eine Ader hochvolatiler Verbindungen entdeckt. Mit geringer Veredelung könnten diese Materialien als Ersatz für £volatile_motes£§YFlüchtige Partikel§! verwendet werden. Dieser Segen wird allerdings voraussichtlich die £minerals£§YMineralien§! Produktion verringern, da wir unsere Bergbauoperationen verlangsamen müssen, um eine versehentliche Entzündung der Verbindungen zu vermeiden.\n\nWir prognostizieren, dass die Verbindungen nach [from.gigas_stripmine_motes_deposit_length] Planetenschichten erschöpft sein werden."
  giga_dialog.3306.desc.crystals:0 "Der [fromfrom.GetName] $name_auto_stripmine$ hat eine Höhle lokalisiert, die bis zum Rand mit kristallinen Strukturen gefüllt ist. Richtige Reinigung und Verarbeitung könnte Fragmente dieser Kristalle in nutzbare £rare_crystals£§YSeltene Kristalle§! verwandeln. Die Höhle ist instabil, und die Notwendigkeit, sie vorsichtig abzubauen, um die Kristalle darin nicht zu beschädigen, wird leider die £minerals£§YMineralien§! Produktion verlangsamen.\n\nDie Höhlen werden voraussichtlich für weitere [from.gigas_stripmine_crystal_deposit_length] Planetenschichten vorhanden sein."
  giga_dialog.3306.desc.tensiles:0 "Der [fromfrom.GetName] $name_auto_stripmine$ ist auf etwas wirklich Bemerkenswertes gestoßen: Ein eigenartiger Teil des Planeten ist 'hohl', wobei diese innere Höhlung den Kräften der Schwerkraft durch ein natürlich vorkommendes £giga_sr_amb_megaconstruction£§YSupertensiles Material§! widersteht. Obwohl die Leere die £minerals£§YMineralien§! Ausbeute der Struktur verringern wird, ist die geschätzte Ernte dieses natürlichen £giga_sr_amb_megaconstruction£§YSupertensilen Materials§! für weitere Mega Konstruktionsprojekte von unschätzbarem Wert.\n\nDie Tasche wird voraussichtlich nicht lange halten und den Abbau nur für geschätzte [from.gigas_stripmine_supertensile_deposit_length] Planetenschichten unterstützen."
  giga_dialog.3306.desc.default:0 "Der [fromfrom.GetName] $name_auto_stripmine$ hat eine ungewöhnliche Konzentration von Ressourcen tief unter der Oberfläche des Planeten lokalisiert. Diese Ressourcen sollten sich als unschätzbar wertvoll für die Steigerung der Leistung der Struktur erweisen, auch wenn sie nicht ewig halten werden."
  ########################################################
  ######################### SUCC #########################
  ########################################################
  
  giga_dialog.1901.name:0 "$name_succ$ Baustelle fertiggestellt"
  giga_dialog.1901.desc:0 "Die Baustelle für einen zukünftigen $name_succ_full$ im [giga_system.GetName] System wurde fertiggestellt! Auf diesem Gerüst werden wir eine massive Anlage errichten, die stetig die Atmosphäre des Gasriesen erntet und zu exotischen Gasen filtert. Sie wird auch durch Fusionsreaktoren Energie erzeugen, die den in der Atmosphäre gefundenen Wasserstoff nutzen.\n\nBedenken Sie, dass die Ressourcen irgendwann erschöpft sein werden und eine öde Welt zurückbleibt."
  giga_dialog.1901.a:0 "Wie lange hat es gedauert, dieses Akronym zu entwickeln?"
  # old interstage build Dialogue
  # giga_dialog.1902.name:0 "$name_succ$ Orbital Apparatus Complete"
  # giga_dialog.1902.desc:0 "Our $name_succ$'s Orbital Apparatus has been completed in the [giga_system.GetName] system. This massive ring houses the necessary facilities to harvest Gases, Motes and Energy from the planet's atmosphere. Now, we must begin to work on the actual tractor beams themselves."
  # giga_dialog.1902.a:0 "Great."
  
  giga_dialog.1903.title:0 "$name_succ$ betriebsbereit!"
  giga_dialog.1903.desc:0 "Unser $name_succ$ im [giga_system.GetName] System ist nun betriebsbereit! Seine Traktorstrahlen wurden aktiviert, und die Atmosphäre des Gasriesen wird stetig geerntet."
  giga_dialog.1903.a:0 "Wunderbar!"
  
  giga_dialog.1904.title:0 "$name_succ$ erschöpft"
  giga_dialog.1904.desc:0 "Unser $name_succ_full$ im [giga_system.GetName] System hat nun den felsigen inneren Kern des Gasriesen erreicht. Es gibt keine Atmosphäre mehr zum Extrahieren, und der ehemalige Gasriese wurde zu einer kleinen, mineralreichen öden Welt reduziert. Die Megastruktur selbst wurde demontiert, und der Kern kann nun auf beliebige Weise genutzt werden."
  giga_dialog.1904.a:0 "Alles muss enden."
  
  ########################################################
  ##################### SQUAREWORLD ######################
  ########################################################
  
  giga_dialog.3001.name:0 "Das mythische Quadrat"
  giga_dialog.3001.desc:0 "Im [from.GetName] System liegt ein seltsames Konstrukt. Unsere Wissenschaftler sind verblüfft beim Anblick dieser massiven orbitalen Installation, die den Stern des Systems umkreist. Tatsächlich ist es so absurd, dass es zunächst für einen Scherz oder eine Anomalie in unseren Sensoren gehalten wurde.\n\nEine $name_ringworld_square$.\n\nIm [from.GetName] System befindet sich eine quadratische Ringwelt. Obwohl sie in der Vergangenheit offenbar stark beschädigt wurde, scheint sie strukturell noch weitgehend intakt zu sein. Die seltsame Form dieses Konstrukts widerspricht allem, was wir über Physik und Ingenieurwesen wissen, da die Schwerkraft dieses Ding vor Jahrtausenden hätte zerreißen müssen. Dennoch steht es hier untätig und wartet darauf, dass jemand seine Geheimnisse lüftet.\n\nEine kleine und größtenteils verlassene Station schwebt auch still über dem Stern, und unsere Wissenschaftler glauben, dass sie nützliche Informationen über diese eigenartige Struktur enthalten könnte.\n\nEin §SSpezielles Projekt§! wurde gestartet, um dieses Ding und die Station zu untersuchen und herauszufinden, wie es überhaupt noch existieren kann."
  giga_dialog.3001.a:0 "Wie eigenartig."
  
  giga_dialog.3002.name:0 "Die Geheimnisse des Quadrats"
  giga_dialog.3002.desc:0 "Nach Dutzenden von Expeditionen und monatelanger Forschung glauben unsere Wissenschaftler, endlich die Geheimnisse dieser Quadratwelt gelüftet zu haben.\n\nWährend das Äußere der Quadratwelt stark beschädigt ist, ist ihr Inneres noch größtenteils intakt, und die meisten internen Systeme sind tatsächlich funktionsfähig! Ihr Rahmen besteht hauptsächlich aus Quberine, einer äußerst fortschrittlichen Legierung mit unglaublich komplexer selbstreparierender Elektronik, was erklärt, wie sie den enormen Kräften widerstehen kann, die auf sie einwirken.\n\nUnsere Wissenschaftler glauben, dass es möglich sein könnte, dieses Ding zu reparieren, wenn genügend Ressourcen und ausreichend fortschrittliche Technologien zur Verfügung stehen. Wir haben eine Reihe deaktivierter Quberine-Produktionsanlagen innerhalb der Ringwelt entdeckt, die möglicherweise wieder Quberine produzieren könnten, wenn wir bei zukünftigen Reparaturen die Energieversorgung dieser Ringwelt wiederherstellen.\n\nDie Forschungsteams haben auch festgestellt, dass die kleine Station über dem Stern als eine Art 'zentraler Zugangspunkt' zu den internen Systemen der Quadratwelt dient. Sie empfehlen uns, einige Energiekredite und Legierungen zu investieren, um sie zu reparieren und anschließend zu reaktivieren, da sie uns möglicherweise Zugang zu unschätzbaren Daten über die Quadratwelt und ihre Erbauer gewährt, die in ihren umfangreichen internen Archiven gespeichert sind. Diese Daten könnten durchaus der Schlüssel zur Reparatur dieses wunderbaren Konstrukts sein..."
  giga_dialog.3002.a:0 "Wunderbar! Wir werden diese Station sofort reparieren."
  
  giga_dialog.3003.name:0 "Quadratwelt wiederhergestellt!"
  giga_dialog.3003.desc:0 "Unsere Ingenieure freuen sich zu berichten, dass ein Abschnitt der ruinierten Quadratwelt erfolgreich repariert wurde! Die Stromversorgung wurde für die Hilfsschaltkreise wiederhergestellt, und Quberine fließt aus den automatisierten Fabriken, die mit fortschrittlichen Energie-zu-Materie-Konvertern ausgestattet sind. Die große Menge an Quberine in der Struktur und im Boden hatte den seltsamen Effekt, dass die Pflanzen ein wenig zu grün geworden sind, aber abgesehen davon scheint alles völlig normal zu sein."
  giga_dialog.3003.a:0 "Unglaublich!"
  
  giga_dialog.3004.name:0 "Die Quadratwelt spricht"
  giga_dialog.3004.desc:0 "Unglaubliche Neuigkeiten! Nach der Reparatur und Wiederherstellung der Energieversorgung der Station in den Systemen der Quadratwelt scheint eine alte schlafende KI, die sowohl in der Station als auch in der Quadratwelt selbst beheimatet ist, erwacht zu sein.\n\nDiese KI, deren Name laut den aus der Station geborgenen Daten §YGaryx§! ist, war offenbar für die Wartung der Quadratwelt und ihrer umfangreichen internen Systeme verantwortlich. Unsere Forschungsteams haben es geschafft, Kontakt mit ihr aufzunehmen, und sie ist sehr begierig darauf, mit uns zu kommunizieren."
  giga_dialog.3004.a:0 "Auf den Bildschirm."
  
  giga_dialog.3005.name:0 "Garyx, Hüter der Quadratwelt"
  giga_dialog.3005.desc:0 "Ah, Besucher! Danke, dass Sie der Station genug Energie gesendet haben, um sie aus dem Winterschlaf zu holen. Es ist eine Weile her, seit ich mit einem denkenden Wesen gesprochen habe.\n\nIch bin Garyx, die künstliche Intelligenz, die für die Wartung der Quadratwelt und ihrer umfangreichen Datenarchive verantwortlich ist, und ich habe die Form eines holographischen Reptils angenommen, da meine Erschaffer so aussahen.\n\nEntschuldigung übrigens für den bedauernswerten Zustand der Quadratwelt. Ich fand eine besonders interessante Dokumentation über reptilische Fortpflanzung und habe sie die letzten 120 Jahrtausende mit Reserveenergie studiert, um meine Erschaffer besser zu verstehen. Leider scheint in der Zwischenzeit etwas Drastisches mit der Quadratwelt passiert zu sein... Nun ja.\n\nJetzt, da Sie hier sind, und da meine Erschaffer offenbar längst verschwunden sind, können Sie die Erlaubnis haben, auf die Datenbanken der Quadratwelt zuzugreifen, die überraschenderweise größtenteils intakt sind."
  
  giga_dialog.3005.a:0 "Was ist in diesen Datenbanken?"
  giga_dialog.3005.a.response:0 "Oh, viele Dinge. Meine Erschaffer speicherten jede Menge Daten über die verschiedenen Reiche und Spezies, die sie kannten, ihr wissenschaftliches Wissen und vor allem über ihre Gottheit §BQubey§!.\nSie wollten es bewahren, damit zukünftige Generationen davon profitieren können, und nun, da Sie hier sind, nehme ich an, dass sie in dieser Aufgabe erfolgreich waren. Schade, dass sie nicht mehr hier sind, um es zu sehen..."
  
  giga_dialog.3005.b:0 "Wie alt ist die Quadratwelt?"
  giga_dialog.3005.b.response:0 "Nun, nach der Position der Sterne zu urteilen, schätze ich, dass dieses Ding seit etwa 120.000 Ihrer Jahre beschädigt ist, aber es ist viel älter als das.\nEs wurde vor etwa 567.000 Jahren von meinen Erschaffern gebaut und beherbergte ihre Zivilisation für viele Jahrtausende. Ich bin mir nicht sicher, was damit passiert ist, da ich leider völlig von meiner Forschung gefesselt war. Die wahrscheinlichste Möglichkeit ist, dass ihre Zivilisation an Dekadenz zugrunde ging oder einfach zu alt und divergent wurde, genau wie viele andere große Reiche vor ihnen."
  
  giga_dialog.3005.c:0 "Wer baute die Quadratwelt, und warum?"
  giga_dialog.3005.c.response:0 "Meine Erschaffer taten es. Sie waren eine Spezies von §R(DATEN BESCHÄDIGT)§!, bekannt als die §R(DATEN BESCHÄDIGT)§!, und sie herrschten über ein ziemlich großes Reich, das §R(DATEN BESCHÄDIGT)§!\n\nSie waren auch unglaublich religiös und verehrten eine Gottheit, die sie §BQubey§! nannten. Es wurde gesagt, dass diese Gottheit ihrer Spezies über Millionen von Jahren bei der Evolution half, und viele sahen die Perfektion geometrischer Formen als §BQubey§!s Art, seine Präsenz in der Welt zu manifestieren.\n\nMeine Erschaffer entdeckten schließlich eine unglaubliche Substanz mit unübertroffenen selbstreparierenden Eigenschaften. Sie nannten sie 'Quberine', da sie glaubten, die Substanz bestünde aus §BQubey§! selbst, und beschlossen, diese großartige physikdefinierende geometrische Struktur zu bauen, um sowohl §BQubey§! zu verehren als auch ihre Dankbarkeit zu zeigen!\n\nSie nutzten auch die Gelegenheit, so viele Daten wie möglich über ihre wissenschaftlichen Fortschritte, Quberine, die Quadratwelt und §BQubey§! in den Datenbanken zu speichern, in der Hoffnung, dass eine zukünftige Zivilisation, die darauf stößt, ebenfalls vom allmächtigen §BQubey§! erfahren würde."
  
  giga_dialog.3005.d:0 "Können wir die Quadratwelt irgendwie reparieren?"
  giga_dialog.3005.d.response:0 "Hoffentlich ja! Die größtenteils funktionierenden Archive enthalten viele Daten über die interne und externe Struktur der Quadratwelt. Wenn Sie mir einige Dutzend Monate Zeit geben, um alles zusammenzustellen, kann ich Ihren Wissenschaftlern einen Datenspeicher mit allen notwendigen Informationen zur Durchführung umfangreicher Reparaturen an der Megastruktur geben. Ich würde die Quadratwelt gerne in ihrem früheren Glanz wiederhergestellt sehen!"
  
  giga_dialog.3005.e:0 "Auf Wiedersehen."
  giga_dialog.3005.e.response:0 "Mögen die Archive Ihnen gute Dienste leisten, und zögern Sie nicht, mich wieder zu kontaktieren, wenn Sie etwas wissen müssen."
  
  giga_dialog.3006.name:0 "Die Archive"
  giga_dialog.3006.desc:0 "Kurz bevor wir uns abmeldeten, hat §YGaryx§! uns versichert, dass er uns in etwa 2 Jahren einen Datenspeicher mit allen notwendigen Informationen zur Reparatur der Quadratwelt schicken wird.\n\nIn der Zwischenzeit können wir ihn wieder kontaktieren, indem wir die Quadratwelt Hub Megastruktur 'verbessern'. Unsere Wissenschaftler glauben, dass seine Fähigkeit, sich leicht in den Datenbanken der Quadratwelt zurechtzufinden, erheblich zu unserer Forschung beitragen könnte."
  giga_dialog.3006.a:0 "Verstanden."
  
  giga_dialog.3007.name:0 "Garyx, Hüter der Quadratwelt"
  giga_dialog.3007.desc:0 "Grüße, noch einmal. Ich habe die Zusammenstellung eines Datenspeichers mit allen notwendigen Informationen zur Reparatur der Quadratwelt abgeschlossen! Ich werde ihn sofort an Ihre Wissenschaftler übertragen."
  giga_dialog.3007.a:0 "Wunderbar! Wir werden dieses Wissen gut nutzen."
  
  giga_dialog.3008.name:0 "Garyx, Hüter der Quadratwelt"
  giga_dialog.3008.desc:0 "Ah, seid gegrüßt! Seid Ihr gekommen, um mehr Daten aus den Archiven zu suchen? Wie kann ich Euch helfen?"
  giga_dialog.3008.a:0 "Kannst du unsere Forschung unterstützen?"
  giga_dialog.3008.c:0 "Bildschirm aus."
  
  giga_dialog.3009.name:0 "Garyx, Hüter der Quadratwelt"
  giga_dialog.3009.desc:0 "Aber ja! Ich kann die Archive der Quadratwelt nach Daten durchsuchen, die Sie nützlich finden könnten. Welche Art von Daten soll ich abrufen?"
  giga_dialog.3009.a:0 "Allgemeine £physics_research£ §YPhysikforschung§!"
  giga_dialog.3009.a.response:0 "In Ordnung! Ich werde Daten abrufen, die sich auf Ihre Physikforschung beziehen, was Ihnen eine §Y10% Steigerung§! Ihrer Forschungsgeschwindigkeit in dieser Kategorie gewährt.\n\nWenn Sie möchten, dass ich einen anderen Bereich unterstütze, kontaktieren Sie mich einfach erneut und wählen Sie eine andere Option."
  giga_dialog.3009.b:0 "Allgemeine £engineering_research£ §YIngenieurforschung§!"
  giga_dialog.3009.b.response:0 "In Ordnung! Ich werde Daten abrufen, die sich auf Ihre Ingenieurforschung beziehen, was Ihnen eine §Y10% Steigerung§! Ihrer Forschungsgeschwindigkeit in dieser Kategorie gewährt.\n\nWenn Sie möchten, dass ich einen anderen Bereich unterstütze, kontaktieren Sie mich einfach erneut und wählen Sie eine andere Option."
  giga_dialog.3009.c:0 "Allgemeine £society_research£ §YGesellschaftsforschung§!"
  giga_dialog.3009.c.response:0 "In Ordnung! Ich werde Daten abrufen, die sich auf Ihre Gesellschaftsforschung beziehen, was Ihnen eine §Y10% Steigerung§! Ihrer Forschungsgeschwindigkeit in dieser Kategorie gewährt.\n\nWenn Sie möchten, dass ich einen anderen Bereich unterstütze, kontaktieren Sie mich einfach erneut und wählen Sie eine andere Option."
  giga_dialog.3009.d:0 "Vergiss es, unterstütze unsere Forschung nicht."
  giga_dialog.3009.d.response:0 "In Ordnung, ich werde aufhören, Sie in Ihrer Forschung zu unterstützen, wenn Sie das wünschen..."
  
