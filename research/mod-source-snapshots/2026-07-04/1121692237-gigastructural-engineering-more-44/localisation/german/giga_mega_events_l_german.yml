  #####################################################################
  giga_dialog.13701.name:0 "Megastruktur Management"
  giga_dialog.13701.desc:0 "Die neu gebaute [from.GetName] in [fromfrom.GetName] hat zusätzliche Optionen, die über einen Button oben rechts in der Megastruktur-Benutzeroberfläche zugänglich sind.\n\nAchten Sie auf andere Megastrukturen, bei denen der Button verfügbar ist, da die [from.GetName] nicht der einzige Megastrukturtyp ist, der solche zusätzlichen Optionen hat.\n\nDiese Nachricht wird nur einmal angezeigt."
  
  giga_repeatables.001.name:99 "Kilostructure Capacity Increased"
  giga_repeatables.001.desc:99 "Following our advances in mega-engineering engineers have applied modern techniques to our constructing methods, allowing us to construct and maintain a greater amount of kilostructures."
  giga_repeatables.001.a.name:99 "$SPLENDID$"
  giga_kilo_cap_increased:99 "§YEligible Kilostructures will have their capacity increased by 2.§!"
  