  job_giga_media_coordinator:0 "Medien Mogul"
  job_giga_media_coordinator_plural:0 "Medien Moguln"
  job_giga_media_coordinator_desc:0 "Die kreativen Köpfe hinter virtuellen Unterhaltungsimperien sorgen dafür, dass unserer Bevölkerung nie die Unterhaltung ausgeht. Licht. Kamera. ACTION!"
  job_giga_media_coordinator_effect_desc:0 "$job_giga_media_coordinator_swap_plural_with_icon$ wandeln £consumer_goods£ §Y$consumer_goods$§! in £unity£ §Y$unity$§!, £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§! und £mod_trade_value_add£ §Y$TRADE_VALUE$§! um und erhöhen außerdem £mod_planet_amenities_add£ §Y$PLANET_AMENITIES_TITLE$§! in unserem gesamten Reich geringfügig"
  job_giga_media_coordinator_swap_plural_with_icon:0 "[giga_media_coordinator.GetIcon] [giga_media_coordinator.GetNamePlural]"
  mod_job_giga_media_coordinator_add:0 "[giga_media_coordinator.GetName] Jobs"
  mod_job_giga_media_coordinator_per_pop:0 "§G+1§! [giga_media_coordinator.GetName] Job per $VALUE$ Pops"
  mod_job_giga_media_coordinator_per_pop_short:0 "\n§G+1§! £mod_job_giga_media_coordinator_add£ per $VALUE$ £pop£"
  
  job_giga_media_coordination_drone:0 "Medien Koordinationsdrohne"
  job_giga_media_coordination_drone_plural:0 "Medien Koordinationsdrohnen"
  job_giga_media_coordination_drone_desc:0 "Diese spezialisierten Drohnencluster produzieren einen endlosen Strom an Inhalten, maßgeschneidert für die Vorlieben der organischen Schützlinge der Maschinenintelligenz."
  job_giga_media_coordination_drone_effect_desc:0 "$job_giga_media_coordination_drone_swap_plural_with_icon$ wandeln £consumer_goods£ §Y$consumer_goods$§! in £unity£ §Y$unity$§! und £mod_planet_amenities_no_happiness_add£ §Y$PLANET_AMENITIES_TITLE$§! um und erhöhen außerdem £mod_planet_amenities_no_happiness_add£ §Y$PLANET_AMENITIES_TITLE$§! in unserem gesamten Reich geringfügig"
