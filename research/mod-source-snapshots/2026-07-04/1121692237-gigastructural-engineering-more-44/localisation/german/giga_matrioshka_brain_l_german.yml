  concept_giga_mbrain_uplinks_machine_desc:0 "$concept_giga_mbrain_uplinks_text$\n\nVerfügbar für alle Reiche:$giga_mbrain_uplink_research_concept$$giga_mbrain_uplink_unity_concept_machine$$giga_mbrain_uplink_training_concept$$giga_mbrain_uplink_foundry_concept$$giga_mbrain_uplink_refinery_concept$$giga_mbrain_uplink_anti_deviancy_concept$$giga_mbrain_uplink_robot_concept$\n\nVerfügbar für Reiche mit £job_organic_battery£ $job_organic_battery$ Bewohnern:$giga_mbrain_uplink_amalgamation_concept$\n\nVerfügbar für Reiche mit £consumer_goods£ $consumer_goods$:$giga_mbrain_uplink_factory_concept$\n\nVerfügbar für ['tradition_category:tradition_virtuality', Virtuelle] Reiche:$giga_mbrain_uplink_virtual_concept$\n\nVerfügbar für ['civic:civic_machine_diplomatic_protocols']:$giga_mbrain_uplink_diplomacy_concept$"
  
