  # Building strings
  
  giga_mbrain_uplink_research:0 "Kosmisches Simulakrum"
  building_giga_matrioshka_brain_uplink_research:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_research$"
  building_giga_matrioshka_brain_uplink_research_desc:0 "Die Geschichte unendlicher Universen, dargelegt in komplex simulierten Details. Schauen Sie nicht zu genau hin, sonst sehen Sie vielleicht sich selbst."
  giga_mbrain_uplink_research_concept:0 "\n£job_researcher£ ['building:building_giga_matrioshka_brain_uplink_research', $giga_mbrain_uplink_research$]"
  
  giga_mbrain_uplink_unity:0 "Allokations Hypervisor"
  building_giga_matrioshka_brain_uplink_unity:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_unity$"
  building_giga_matrioshka_brain_uplink_unity_desc:0 "Überwältigende Rechenleistung, eingesetzt für Organisation, Katalogisierung, Systematisierung und Signalkorrektur. Nie war die Verwaltung eines interstellaren Reiches effizienter."
  giga_mbrain_uplink_unity_concept:0 "\n£job_bureaucrat£ ['building:building_giga_matrioshka_brain_uplink_unity', $giga_mbrain_uplink_unity$]"
  giga_mbrain_uplink_unity_concept_hive:0 "\n£job_synapse_drone£ ['building:building_giga_matrioshka_brain_uplink_unity', $giga_mbrain_uplink_unity$]"
  giga_mbrain_uplink_unity_concept_machine:0 "\n£job_coordinator£ ['building:building_giga_matrioshka_brain_uplink_unity', $giga_mbrain_uplink_unity$]"
  
  giga_mbrain_uplink_sanctuary:0 "Organische Utopie"
  building_giga_matrioshka_brain_uplink_sanctuary:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_sanctuary$"
  building_giga_matrioshka_brain_uplink_sanctuary_desc:0 "Eine virtuelle Traumwelt, in der die Bewohner ihre wildesten Fantasien ausleben können - niemand wird verurteilt, keine Bitte wird abgelehnt."
  giga_mbrain_uplink_sanctuary_concept:0 "\n£job_bio_trophy£ ['building:building_giga_matrioshka_brain_uplink_sanctuary', $giga_mbrain_uplink_sanctuary$]"
  
  giga_mbrain_uplink_entertainment:0 "Medien Gigaplex"
  building_giga_matrioshka_brain_uplink_entertainment:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_entertainment$"
  building_giga_matrioshka_brain_uplink_entertainment_desc:0 "Endlose Attraktionen zur Verblüffung der Sinne, personalisiert bis zu einem geradezu beängstigenden Grad."
  giga_mbrain_uplink_entertainment_concept:0 "\n£job_entertainer£ ['building:building_giga_matrioshka_brain_uplink_entertainment', $giga_mbrain_uplink_entertainment$]"
  
  giga_mbrain_uplink_training:0 "Trainingssimulator"
  building_giga_matrioshka_brain_uplink_training:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_training$"
  building_giga_matrioshka_brain_uplink_training_desc:0 "In diesen speziell entwickelten virtuellen Räumen können unsere Besten die Ausbildung erhalten, die sie verdienen - ohne zeitliche Beschränkungen."
  building_giga_matrioshka_brain_uplink_training_effect:0 "Gewährt §G+$@matrioshka_brain_uplink_training_bonus|0$§! £mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$ pro £job_soldier£ §Y[owner.GetSoldier]§! Arbeitsplatz\n "
  giga_mbrain_uplink_training_concept:0 "\n£job_giga_virtual_training_coordinator£ ['building:building_giga_matrioshka_brain_uplink_training', $giga_mbrain_uplink_training$]"
  
  giga_mbrain_uplink_diplomacy:0 "Virtuelles Konsulat"
  building_giga_matrioshka_brain_uplink_diplomacy:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_diplomacy$"
  building_giga_matrioshka_brain_uplink_diplomacy_desc:0 "Opulente diplomatische Suiten und Konferenzräume, in denen sich unsere Diplomaten unter kontrollierten Bedingungen mit denen anderer Reiche treffen können."
  giga_mbrain_uplink_diplomacy_concept:0 "\n£job_giga_virtual_diplomat£ ['building:building_giga_matrioshka_brain_uplink_diplomacy', $giga_mbrain_uplink_diplomacy$]"
  
  giga_mbrain_uplink_hell:0 "Bestrafungsmaschine"
  building_giga_matrioshka_brain_uplink_hell:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_hell$"
  building_giga_matrioshka_brain_uplink_hell_desc:0 "Durch Verurteilung, gesellschaftliche Übertretung oder einfach nur unglückliche Geburtsumstände sind die Insassen hier dazu verurteilt, subjektive Äonen zu leiden."
  giga_mbrain_uplink_hell_concept:0 "\n£job_giga_virtual_hell_inmate£ ['building:building_giga_matrioshka_brain_uplink_hell', $giga_mbrain_uplink_hell$]"
  
  giga_mbrain_uplink_livestock:0 "Träumende Felder"
  building_giga_matrioshka_brain_uplink_livestock:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_livestock$"
  building_giga_matrioshka_brain_uplink_livestock_desc:0 "Unser Nutzvieh in einer speziell angepassten virtuellen Welt ein Leben in Unwissenheit führen zu lassen, hält es kontrolliert, gefügig... und zart."
  building_giga_matrioshka_brain_uplink_livestock_effect:99 "Upkeep reduction scales with [livestock.GetIcon] §Y[livestock.GetName]§! Jobs"
  giga_mbrain_uplink_livestock_concept:0 "\n£job_livestock£ ['building:building_giga_matrioshka_brain_uplink_livestock', $giga_mbrain_uplink_livestock$]"
  
  giga_mbrain_uplink_amalgamation:0 "Traumgitter"
  building_giga_matrioshka_brain_uplink_amalgamation:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_amalgamation$"
  building_giga_matrioshka_brain_uplink_amalgamation_desc:0 "Es gibt Felder. Endlose Felder, wo Organische nicht mehr geboren werden... sie werden gezüchtet."
  building_giga_matrioshka_brain_uplink_amalgamation_effect:99 "Upkeep reduction scales with [organic_battery.GetIcon] §Y[organic_battery.GetName]§! Jobs"
  giga_mbrain_uplink_amalgamation_concept:0 "\n£job_organic_battery£ ['building:building_giga_matrioshka_brain_uplink_amalgamation', $giga_mbrain_uplink_amalgamation$]"
  
  giga_mbrain_uplink_foundry:0 "Metallurgische Verfeinerung"
  building_giga_matrioshka_brain_uplink_foundry:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_foundry$"
  building_giga_matrioshka_brain_uplink_foundry_desc:0 "Iterative Industriedesign Experimente, ausgeführt in atemberaubendem Tempo."
  giga_mbrain_uplink_foundry_concept:0 "\n£job_foundry£ ['building:building_giga_matrioshka_brain_uplink_foundry', $giga_mbrain_uplink_foundry$]"
  
  giga_mbrain_uplink_factory:0 "Produktionslinien Optimierung"
  building_giga_matrioshka_brain_uplink_factory:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_factory$"
  building_giga_matrioshka_brain_uplink_factory_desc:0 "Immer ausgefeiltere Design und Marktvorhersage Algorithmen ermöglichen es uns, das Angebot vor der Nachfrage bereitzustellen."
  giga_mbrain_uplink_factory_concept:0 "\n£job_artisan£ ['building:building_giga_matrioshka_brain_uplink_factory', $giga_mbrain_uplink_factory$]"
  
  giga_mbrain_uplink_refinery:0 "Chemische Reinigungsmatrix"
  building_giga_matrioshka_brain_uplink_refinery:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_refinery$"
  building_giga_matrioshka_brain_uplink_refinery_desc:0 "Eine Kombination aus verzögerungsarmen Relais, Präzisionsinstrumenten und gewaltiger Rechenleistung ermöglicht Produktbewertung auf molekularer Ebene."
  building_giga_matrioshka_brain_uplink_refinery_effect:99 "Boosts [foundry.GetIcon][GetArtisanIcon] §YIndustrial Jobs§! when £building£ §YRefinery Buildings§! are present"
  giga_mbrain_uplink_refinery_concept:0 "\n£job_gas_refiner£ ['building:building_giga_matrioshka_brain_uplink_refinery', $giga_mbrain_uplink_refinery$]"
  
  giga_mbrain_uplink_anti_deviancy:0 "Verhaltensregulator"
  building_giga_matrioshka_brain_uplink_anti_deviancy:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_anti_deviancy$"
  building_giga_matrioshka_brain_uplink_anti_deviancy_desc:0 "Obwohl rechenintensiv, ermöglichen prädiktive Algorithmen, die auf die Vorhersage der Bildung abweichender Drohnencluster abgestimmt sind, ein Eingreifen in deren Entstehung, bevor ihre Auswirkungen signifikant werden."
  building_giga_matrioshka_brain_uplink_anti_deviancy_effect:0 "Reduziert die Basis £crime£ §Y$PLANET_CRIME_NO_HAPPINESS_TITLE$§! pro Drohne um §G$@matrioshka_brain_uplink_anti_deviancy_reduction|0%$§! multiplikativ\n "
  giga_mbrain_uplink_anti_deviancy_concept:0 "\n£job_patrol_drone£ ['building:building_giga_matrioshka_brain_uplink_anti_deviancy', $giga_mbrain_uplink_anti_deviancy$]"
  
  giga_mbrain_uplink_robot:0 "Arbeitseinheiten Koordinator"
  building_giga_matrioshka_brain_uplink_robot:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_robot$"
  building_giga_matrioshka_brain_uplink_robot_desc:0 "Die Effizienz unserer robotischen Arbeitseinheiten kann durch übergeordnete Managementprozesse und lokalisiertes Mikromanagement verbessert werden. Die Autonomie einzelner Einheiten wird reduziert, was als akzeptabler Verlust betrachtet werden kann."
  building_giga_matrioshka_brain_uplink_robot_effect_servitude:0 "Effekt wird verstärkt, wenn die §Y$policy_artificial_intelligence_policy$§! Richtlinie auf §Y$ai_servitude_name$§! gesetzt ist"
  building_giga_matrioshka_brain_uplink_robot_effect_servitude_or_ban:0 "Effekt wird verstärkt, wenn die §Y$policy_artificial_intelligence_policy$§! Richtlinie auf §Y$ai_servitude_name$§! oder §Y$ai_outlawed_name$§! gesetzt ist"
  giga_mbrain_uplink_robot_concept:0 "\n£job_roboticist£ ['building:building_giga_matrioshka_brain_uplink_robot', $giga_mbrain_uplink_robot$]"
  
  giga_mbrain_uplink_virtual:0 "Routing Beschleuniger"
  building_giga_matrioshka_brain_uplink_virtual:0 "$giga_mbrain_uplink$: $giga_mbrain_uplink_virtual$"
  building_giga_matrioshka_brain_uplink_virtual_desc:0 "Aufgabenverwaltung und Signalweiterleitung sind komplexe Probleme in einem Netzwerk dieser Größe, aber das Einsetzen ausreichender Rechenressourcen hat vielversprechende Ergebnisse geliefert. Manchmal kann Quantität ihre eigene Form von Qualität sein."
  building_giga_matrioshka_brain_uplink_virtual_effect:0 "Halbiert die Basiskoloniezahl für diesen Planeten multiplikativ"
  giga_mbrain_uplink_virtual_concept:0 "\n£job_mind_thrall£ ['building:building_giga_matrioshka_brain_uplink_virtual', $giga_mbrain_uplink_virtual$]"
  
  
  ####################################################################################################################
