  concept_giga_mbrain_uplinks_hive:0 "$giga_mbrain_uplink_plural$: $auth_hive_mind$"
  concept_giga_mbrain_uplinks_hive_desc:0 "$concept_giga_mbrain_uplinks_text$\n\nVerfügbar für alle Reiche:$giga_mbrain_uplink_research_concept$$giga_mbrain_uplink_unity_concept_hive$$giga_mbrain_uplink_training_concept$$giga_mbrain_uplink_foundry_concept$$giga_mbrain_uplink_refinery_concept$$giga_mbrain_uplink_anti_deviancy_concept$\n\nVerfügbar für Reiche mit £job_livestock£ $job_livestock$:$giga_mbrain_uplink_livestock_concept$\n\nVerfügbar für Reiche mit £consumer_goods£ $consumer_goods$:$giga_mbrain_uplink_factory_concept$\n\nVerfügbar für ['civic:civic_hive_empath']:$giga_mbrain_uplink_diplomacy_concept$"
  
