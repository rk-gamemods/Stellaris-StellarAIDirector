  concept_giga_mbrain_uplinks_machine_servitor_desc:0 "$concept_giga_mbrain_uplinks_text$\n$giga_mbrain_uplink_research_concept$$giga_mbrain_uplink_training_concept$$giga_mbrain_uplink_foundry_concept$$giga_mbrain_uplink_factory_concept$$giga_mbrain_uplink_refinery_concept$$giga_mbrain_uplink_anti_deviancy_concept$$giga_mbrain_uplink_robot_concept$$giga_mbrain_uplink_sanctuary_concept$$giga_mbrain_uplink_entertainment_concept$$giga_mbrain_uplink_diplomacy_concept$\n\nVerfügbar für ['tradition_category:tradition_virtuality', Virtuelle] Reiche:$giga_mbrain_uplink_virtual_concept$"
  
