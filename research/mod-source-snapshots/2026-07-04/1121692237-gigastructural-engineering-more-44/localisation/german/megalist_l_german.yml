  MEGASTRUCTURE_SELECTION_LEGEND:0 "§HSymbolerklärung:§!\n\n£galwonders£ §ESchaltet $ap_galactic_wonders$ frei§!\nDer Abschluss dieser Megastruktur erfüllt die Bauvoraussetzung für das Aufstiegs-Merkmal §Y$ap_galactic_wonders$§!.\n\n£gigastructural£ §ESchaltet $ap_gigastructural_constructs$ frei§!\nDer Abschluss dieser Megastruktur erfüllt die Bauvoraussetzung für das Aufstiegs-Merkmal §Y$ap_gigastructural_constructs$§!.\n\n£megaupgrade£ §EMerkmal wird durch Aufwertung freigeschaltet§!\nWenn dies neben einem der obigen Symbole angezeigt wird, bedeutet es, dass das Merkmal erst durch eine spätere Aufwertung der Megastruktur freigeschaltet wird und nicht sofort verfügbar ist.\n\n§LHinweis: Megastrukturen, die durch andere Mods als Gigastructural Engineering & More hinzugefügt wurden, werden nicht mit diesen Symbolen gekennzeichnet, können aber trotzdem Merkmale freischalten, insbesondere $ap_galactic_wonders$.§!"
  
  