  giga_frameworld_nanite_consume_world_desc:0 "$decision_nanotech_swarm_consume_world_desc$"
  giga_frameworld_nanite_consume_world_effect:0 "\nEin zufälliger geeigneter $frameworld_outpost_0$ Planet erhält einen §Y$d_frameworld_nanite_damage$§! Blocker, der £nanites£ §Y$nanites$§! produziert und die Ressourcenproduktion des Außenpostens um §Y10%§! erhöht\n\nJeder $frameworld_outpost_0$ kann bis zu §Y3§! mal absorbiert werden"
  giga_frameworld_nanite_consume_world_allow:0 "$TRIGGER_FAIL$Benötigt einen $frameworld_outpost_0$ mit aktivierter Absorption und weniger als drei §Y$d_frameworld_nanite_damage$§! Blockern"
  
  giga_frameworld_nanite_consume_world_toggle_on:0 "Absorption erlauben"
  giga_frameworld_nanite_consume_world_toggle_on_desc:0 "Der Schwarm wird wachsen."
  giga_frameworld_nanite_consume_world_toggle_on_effect:0 "Diese Welt wird als geeignetes Ziel für die §Y$giga_frameworld_nanite_consume_world$§! Entscheidung auf §Y[from.Capital.GetName]§! betrachtet"
  
  giga_frameworld_nanite_consume_world_toggle_off:0 "Absorption verbieten"
  giga_frameworld_nanite_consume_world_toggle_off_desc:0 "Manche Welten bleiben besser ungestört."
  giga_frameworld_nanite_consume_world_toggle_off_effect:0 "Diese Welt wird nicht absorbiert, wodurch der Planet erhalten bleibt"
  
  giga_frameworld_contract:0 "Modul abkoppeln"
  giga_frameworld_contract_desc:0 "Wenn die Netzwerklast extrem hoch ist, können zusätzliche Stationsmodule mehr Last als Nutzen sein."
  giga_frameworld_contract_effect:0 "Entfernt eine zufällige Erweiterungsfunktion von §Y[this.GetName]§!, reduziert £planetsize£ §YPlanetengröße§!, was ['concept_giga_virtual_colony_size'] reduzieren kann"
  giga_frameworld_contract_need_expansions:0 "$TRIGGER_FAIL$Erfordert, dass [this.GetName] mindestens einmal erweitert wurde"
  
  # upgrades
  
  giga_frameworld_upgrade_desc:0 "§B$pc_giga_frameworld$ Verbesserungsprojekt§!\n "
  giga_frameworld_upgrade_warning:0 "§HDieses große Verbesserungsprojekt wird alle anderen Verbesserungsprojekte blockieren, bis es vollständig abgeschlossen ist.§!\n "
  giga_frameworld_upgrade_upkeep:0 "§PAchtung: Dieses Projekt hat signifikante laufende Unterhaltskosten!§!\n"
  giga_frameworld_upgrade_fail:0 "$TRIGGER_FAIL$Es darf kein großes Verbesserungsprojekt in Arbeit sein."
  
  giga_frameworld_penrose:0 "$d_frameworld_penrose$"
  giga_frameworld_penrose_effect:0 "Beginnt den Bau einer mehrstufigen Megastruktur, die nach Fertigstellung die §Y$district_giga_frameworld_generator_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl deutlich leistungsfähigerer §Y$district_giga_frameworld_penrose_plural$§! ersetzt.\n\n§Y$district_giga_frameworld_penrose_plural$§! bieten zusätzliche £job_technician£§Y[owner.GetTechnician] Arbeitsplätze§!, sind aber teurer als die Bezirke, die sie ersetzen.\n\n$frameworld_penrose_fake_tooltip$"
  giga_frameworld_penrose_desc:0 "Ein großer Spiegel, der um das $pc_black_hole$ des Systems gebaut wurde und durch superradiante Streuung mit erstaunlicher Effizienz Energie erzeugt."
  
  giga_frameworld_decompressor:0 "$d_frameworld_decompressor$"
  giga_frameworld_decompressor_effect:0 "Beginnt den Bau einer mehrstufigen Megastruktur, die nach Fertigstellung die §Y$district_giga_frameworld_mining_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl deutlich leistungsfähigerer §Y$district_giga_frameworld_decompressor_plural$§! ersetzt.\n\n§Y$district_giga_frameworld_decompressor_plural$§! bieten zusätzliche £job_miner£§Y[owner.GetMiner] Arbeitsplätze§!, sind aber teurer als die Bezirke, die sie ersetzen."
  giga_frameworld_decompressor_desc:0 "Eine Gravitationslinsenanlage, die Gravitationsfelder zu Bohrern verdreht, die Material aus dem $pc_black_hole$ extrahieren können."
  
  giga_frameworld_advanced_city:0 "Wohnabschnitte verbessern"
  giga_frameworld_advanced_city_effect:0 "Ersetzt die §Y$district_giga_frameworld_city_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl von §Y$district_giga_frameworld_city_advanced_plural$§!\n\n§Y$district_giga_frameworld_city_advanced_plural$§! sind doppelt so effektiv wie die Bezirke, die sie ersetzen.\n "
  giga_frameworld_advanced_hive_effect:0 "Ersetzt die §Y$district_giga_frameworld_hive_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl von §Y$district_giga_frameworld_hive_advanced_plural$§! und ersetzt zwei £job_maintenance_drone£§Y$job_maintenance_drone_plural$§! Arbeitsplätze jedes §Y$district_giga_frameworld_amenities_gestalt$§! durch £job_frame_maintenance_overseer£§Y$job_frame_maintenance_overseer_plural$§!\n\n§Y$district_giga_frameworld_hive_advanced_plural$§! sind doppelt so effektiv wie die Bezirke, die sie ersetzen.\n$job_frame_maintenance_overseer_effect_desc$\n "
  giga_frameworld_advanced_nexus_effect:0 "Ersetzt die §Y$district_giga_frameworld_nexus_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl von §Y$district_giga_frameworld_nexus_advanced_plural$§! und ersetzt zwei £job_maintenance_drone£§Y$job_maintenance_drone_plural$§! Arbeitsplätze jedes §Y$district_giga_frameworld_amenities_gestalt$§! durch £job_frame_maintenance_overseer£§Y$job_frame_maintenance_overseer_plural$§!\n\n§Y$district_giga_frameworld_nexus_advanced_plural$§! sind doppelt so effektiv wie die Bezirke, die sie ersetzen.\n$job_frame_maintenance_overseer_effect_desc$\n "
  giga_frameworld_advanced_city_desc:0 "Verbesserte Designs für Wohn- und Lagerstationen ermöglichen eine bessere Organisation der Wohnräume."
  
  giga_frameworld_advanced_industrial:0 "Schwerindustrie erweitern"
  giga_frameworld_advanced_industrial_foundry_effect:0 "Ersetzt die §Y$district_giga_frameworld_foundry_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl von §Y$district_giga_frameworld_foundry_advanced_plural$§!.\n\n§Y$district_giga_frameworld_foundry_advanced_plural$§! bieten 2 zusätzliche £job_fabricator£§Y[owner.GetAlloyProducer] Arbeitsplätze§!, benötigen aber £volatile_motes£ §Y$volatile_motes$§! für den Unterhalt."
  giga_frameworld_advanced_industrial_factory_effect:0 "Ersetzt die §Y$district_giga_frameworld_factory_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl von §Y$district_giga_frameworld_factory_advanced_plural$§!.\n\n§Y$district_giga_frameworld_factory_advanced_plural$§! bieten 2 zusätzliche [owner.GetArtisanIcon]§Y[owner.GetArtisan] Arbeitsplätze§!, benötigen aber £rare_crystals£ §Y$rare_crystals$§! für den Unterhalt."
  giga_frameworld_advanced_industrial_desc:0 "Die Einführung fortschrittlicher industrieller Prozesse mit exotischen Materialien in Verbindung mit erweiterten Fertigungsanlagen wird den Durchsatz erheblich verbessern."
  
  giga_frameworld_advanced_sanctuary:0 "Schutzgebiet Arkologie Projekt"
  giga_frameworld_advanced_sanctuary_effect:0 "Ersetzt die §Y$district_giga_frameworld_sanctuary_plural$§! des $pc_giga_frameworld$ durch eine kleinere Anzahl von §Y$district_giga_frameworld_sanctuary_advanced_plural$§!.\n\n§Y$district_giga_frameworld_sanctuary_advanced_plural$§! können doppelt so viele £job_bio_trophy£ §Y$job_bio_trophy_plural$§! beherbergen wie die Bezirke, die sie ersetzen."
  giga_frameworld_advanced_sanctuary_desc:0 "Strategische Neugestaltung der Einrichtungen für organische Bedürfnisbefriedigung und Unterhaltung ermöglicht eine wesentlich höhere Wohndichte ohne Einbußen bei Funktion oder Komfort."
  
  giga_frameworld_gaia:0 "Umweltunterstützungssysteme verbessern"
  giga_frameworld_gaia_desc:0 "Fortschrittliche Klimakontrollsysteme, entwickelt um ideale Umgebungen für alle Formen organischen Lebens bereitzustellen."
  
  giga_frameworld_computing_complex:0 "Datenverarbeitungsanlagen verbessern"
  giga_frameworld_computing_complex_desc:0 "Spezielle Einrichtungen für hochverdichtete Datenspeicherung und beschleunigte Informationsverarbeitung werden unsere Forschungskapazität erheblich verbessern."
  
  giga_frameworld_expand_infrastructure:0 "Stationsinfrastruktur erweitern"
  giga_frameworld_expand_infrastructure_desc:0 "Die Verbesserung des Durchsatzes der Stationsfertigungs- und Wartungseinrichtungen ermöglicht es uns, eine größere Anzahl von Modulen zu unterstützen."
  
  giga_frameworld_orbital_ring_upgrade:0 "Verarbeitungsorbits bauen"
  giga_frameworld_orbital_ring_upgrade_desc:0 "$d_frameworld_orbital_ring_desc$"
  
  giga_frameworld_nanites:0 "Nanotechinfusion"
  giga_frameworld_nanites_desc:0 "Wir haben uns verändert, und nun müssen wir den Prozess vollenden."
  giga_frameworld_nanites_effect:0 "Ermöglicht Erweiterungsentscheidungen, die £nanites£ §Y$nanites$§! kosten\n\nRüstet mehrere Bezirke mit Nanotechnologie nach:\n\n§H$district_giga_frameworld_foundry$:§!\n- Produziert zusätzliche £alloys£ §Y$alloys$§! direkt\n- Erhöhter £energy£ §Y$energy$§! Unterhalt\n- Zusätzlicher £nanites£ §Y$nanites$§! Unterhalt\n\n§H$district_giga_frameworld_science$:§!\n- Entfernt 1 [owner.GetResearcherIcon] §Y[owner.GetResearcher]§! Arbeitsplatz\n- Fügt 3 [owner.GetNanotechResearcherIcon] §Y[owner.GetNanotechResearcher]§! Arbeitsplätze hinzu\n- Zusätzlicher £nanites£ §Y$nanites$§! Unterhalt\n\n§H$district_giga_frameworld_refinery$:§!\n- Produziert zusätzliche $giga_r_motes$$giga_r_gases$$giga_r_crystals$ §YStrategische Ressourcen§! direkt\n- Erhöhter £energy£ §Y$energy$§! Unterhalt\n- Zusätzlicher £nanites£ §Y$nanites$§! Unterhalt\n "
  
  giga_frameworld_maginot:0 "Maginot Doktrin implementieren"
  giga_frameworld_maginot_effect:0 "Schaltet §Y$name_maginot$ Mechaniken§! frei, die das Verteidigungspotential des $pc_giga_frameworld$ auf vielfältige Weise verbessern:\n\nFügt eine §Y$strategic_defence_command_platform$§! hinzu, eine immens mächtige aufrüstbare Verteidigungsstation, die es mit ganzen Flotten aufnehmen kann\n\nFügt 3 zusätzliche §Y$frameworld_defensive_station_plural$§! zum Verteidigungsperimeter des $pc_giga_frameworld$ hinzu\n\nErmöglicht den Bau von §Y$district_giga_frameworld_maginot_shield_generators$§! und §Y$district_giga_frameworld_maginot_planetary_cannons$§! Bezirken, die Weltraumverteidigung verstärken und spezielle Armeen bereitstellen\n\n§Y$district_giga_frameworld_fortress_plural$§! bieten zusätzliche mächtige Verteidigungsarmeen\n\nStellt ein umschaltbares §YSubraum-Störungssystem§! bereit, das Wurmlochbildung und Sprungantriebsoperationen in diesem und angrenzenden Systemen blockiert\n\n"
  giga_frameworld_maginot_desc:0 "Wir verstehen jetzt die absurden Ausmaße, bis zu denen ein Planet befestigt werden kann, und mit diesem Wissen sehen wir einen klaren Weg zur Verbesserung unserer eigenen Verteidigung."
  
