  #################
  ### Modifiers ###
  #################
  
  frameworld_origin_colony_cost:0 "Koloniekosten Malus"
  frameworld_origin_colony_cost_desc:0 "§T§EKompatibilitätsmodifikator:§! Die vollständige Deaktivierung des Baus von $colonizer_plural$ erfordert invasive Überschreibungen, die nicht ohne weiteres mit anderen Mods kompatibel sind.\n\nWenn irgendwie ein $colonizer$ erhalten wird, kann er immer noch zur Gründung einer Kolonie verwendet werden, aber die Kolonisten werden wie bei einer eroberten Welt umgesiedelt.§!\n§T--------------§!\n§LUnsere Netzwerkarchitektur ist grundsätzlich inkompatibel mit den Anforderungen einer dezentralisierten planetaren Kolonisierung. Wir sind untrennbar mit dem Rahmen verbunden.§!"
  
  frameworld_outpost_bonus:0 "$giga_frameworld_outpost$ Netzwerk"
  frameworld_outpost_bonus_desc:0 "§LKleiner als die Kolonien anderer raumfahrender Zivilisationen, erweitern unsere unterstützenden $giga_frameworld_outpost_plural$ unseren Einfluss auf entfernte Welten.§!"
  
  giga_frameworld_outpost_empire_size_modifier_text:0 " und $giga_frameworld_outpost_plural$"
  giga_frameworld_outpost_pops_modifier_text:0 "Zusätzliche Bewohner beim Bau von $giga_frameworld_outpost_plural$"
  
  frameworld_expanded_maintenance_protocol:0 "Erweiterte Wartungsprotokolle"
  frameworld_expanded_maintenance_protocol_desc:0 "Der Rahmen benötigt ständig Wartung und Verbesserung. Die Arbeitslosen werden umgeschult und sekundären Aufgaben zugewiesen, um bei Bedarf andere Stationsfunktionen zu warten und zu unterstützen."
  frameworld_expanded_maintenance_protocol_tooltip:0 "Arbeitslose Bewohner §Yüber dem 5.§! auf dieser $pc_giga_frameworld$ werden stattdessen als £job_frame_maintenance_worker£ §Y$job_frame_maintenance_worker_plural$§! beschäftigt\n\n$job_frame_maintenance_worker_effect_desc$"
  
  frameworld_expanded_maintenance_protocol_gestalt:0 "$frameworld_expanded_maintenance_protocol$"
  frameworld_expanded_maintenance_protocol_gestalt_desc:0 "Es ist ein inakzeptabler Verlustfaktor, nicht zugewiesene Drohnen inaktiv zu lassen. Diese Drohnen werden auf sekundäre Aufgaben verteilt, um bei Bedarf andere Stationsfunktionen zu warten und zu unterstützen."
  frameworld_expanded_maintenance_protocol_gestalt_tooltip:0 "Arbeitslose Bewohner §Yüber dem 5.§! auf dieser $pc_giga_frameworld$ werden stattdessen als £job_frame_maintenance_drone£ §Y$job_frame_maintenance_drone_plural$§! beschäftigt\n\n$job_frame_maintenance_drone_effect_desc$"
  
  frameworld_ai_build_cooldown:0 "$pc_giga_frameworld$ KI Konstruktions Abklingzeit"
  frameworld_ai_build_cooldown_desc:0 "Abklingzeit für KI-Helfer Ereignisse."
  
  frameworld_ai_artisans:0 "$job_artisan_drone$ Anpassung"
  frameworld_ai_artisans_desc:0 "Ein KI-Arbeitsplatzverwaltungshelfer."
  
  frameworld_conquered:0 "Administrative Überbelastung"
  frameworld_conquered_desc:0 "Diese Welt befindet sich nach einem Besitzerwechsel im Chaos."
  frameworld_conquered_tooltip:0 "Wachstum, Konstruktion und Armeeausbildung sind auf dieser Welt effektiv zum Stillstand gekommen."
  
  frameworld_conquered_no_resettle:0 "Logistische Überbelastung"
  frameworld_conquered_no_resettle_desc:0 "Ohne entwickelte zivile interstellare Infrastruktur hat dieses $origin_frameworld$ Reich Schwierigkeiten, den Transportbedarf in Kriegszeiten zu decken."
  frameworld_conquered_no_resettle_tooltip:0 "£pop£Bewohner werden von dieser Welt nicht automatisch umgesiedelt, bis dieser Modifikator ausläuft oder durch Frieden entfernt wird"
  
  frameworld_building_wreck_fix:0 "Gebäuderuinen Korrektur"
  frameworld_building_wreck_fix_desc:0 "Wenn Sie das lesen, ist etwas schiefgelaufen. Dieser Modifikator existiert, um zu verhindern, dass Gebäude während Reorganisationsereignissen zu Ruinen werden und soll nicht bestehen bleiben."
  
  frameworld_outpost_planet:0 "$pc_giga_frameworld$ $giga_frameworld_outpost$"
  frameworld_outpost_planet_effects:0 "$giga_frameworld_outpost_plural$ produzieren Ressourcen basierend auf ihrem Wirtsplaneten, beeinflusst durch Produktionsmodifikatoren der Arbeitsplätze."
  frameworld_outpost_planet_desc:0 "§T§HAbbaubare Seltene Ressourcenvorkommen:§!\n\n£volatile_motes£ $volatile_motes$: §Y[this.GetFrameworldOutpostVolatileMotes]§!\n£exotic_gases£ $exotic_gases$: §Y[this.GetFrameworldOutpostExoticGases]§!\n£rare_crystals£ $rare_crystals$: §Y[this.GetFrameworldOutpostRareCrystals]§![FrameworldOutpostTerravoreText][FrameworldOutpostNaniteText][FrameworldOutpostEnvironmentalistText]\n\n§T--------------§!\n§LObwohl nicht im Maßstab einer voll entwickelten Kolonie, können unsere Außenposten dennoch wertvolle Ressourcen liefern.§!"
  
  frameworld_outpost_planet_desc_terravore:0 "\n\nPlanetarer Tagebau: [FrameworldOutpostTerravoreState]\nMale abgebaut: §Y[GetFrameworldOutpostTerravoreDamage]/3§!"
  frameworld_outpost_planet_desc_nanite:0 "\n\nNanit Absorption: [FrameworldOutpostNaniteState]\nMale absorbiert: §Y[GetFrameworldOutpostNaniteDamage]/3§!"
  frameworld_outpost_planet_desc_environmentalist:0 "\n\n£blocker£ Natürliche Blocker: §Y[GetNaturalBlockerCount]§!"
  
  # asteroid harvest modifiers
  mod_deposit_blockers_frameworld_cost_mult:0 "Asteroidenabbaukosten"
  
  # planetary outpost modifiers
  frameworld_outposts:0 "$giga_frameworld_outpost_plural$"
  mod_frameworld_outposts_produces_mult:0 "$giga_frameworld_outpost$ Ressourcenproduktion"
  mod_frameworld_outpost_build_cost_mult:0 "$giga_frameworld_outpost$ Baukosten"
  mod_giga_frameworld_outpost_output_mult:0 "$giga_frameworld_outpost$ Gesamtressourcenproduktion"
  
  mod_giga_frameworld_outpost_count:0 "$giga_frameworld_outpost$ Netzwerkgröße"
  mod_giga_frameworld_outpost_count_display:0 "Außenpostenanzahl"
  
  frameworld_crucible:0 "$gestation_colony$"
  frameworld_crucible_desc:0 "Eine Initiative, die der Aufzucht kybernetischer Drohnen zu produktiven Mitgliedern des Kollektivs gewidmet ist."
  frameworld_crucible_effects:0 "Ersetzt die Hälfte der £job_replicator£ §Y$job_replicator$§! Arbeitsplätze aus Erweiterungen und §Y$giga_frameworld_outpost_plural$§! durch £job_giga_extra_crucible_drone£ §Y$job_giga_extra_crucible_drone_plural$§!\n\n$job_giga_extra_crucible_drone_effect_desc$"
  
  mod_giga_frameworld_growth_jobs_add:0 "Sekundäres Bewohnerwachstum ['concept_giga_frameworld_growth_job_value_tooltip']"
  
  concept_giga_frameworld_growth_job_value_tooltip:0 "Arbeitsplatzwert"
  concept_giga_frameworld_growth_job_value:0 "Sekundärer Bewohnerwachstum Arbeitsplatzwert"
  concept_giga_frameworld_growth_job_value_desc:0 "Die §Y$pc_giga_frameworld$§! erhält zusätzliche Bewohnerwachstum £job£ Arbeitsplätze durch Erweiterung und die §Y$giga_situation_frameworld_outposts$§!.\n\nDieser Modifikator repräsentiert das §Ygesamte Basis-Wachstum und die Basis-Montage§!, die durch die bereitgestellten Arbeitsplätze gewährt werden, welche je nach §YReichstyp§!, §YGesellschaftsformen§! und §YAszensionsweg§! variieren."
  
  ##############
  ### Events ###
  ##############
  
  # First planetary outpost notification
  giga_frameworld_origin.107.name:0 "Die erste [Root.GetSpeciesName] Expedition"
  giga_frameworld_origin.107.desc:0 "Unsere Bauteams haben die Montage der Außenpostenstation über §Y[From.GetName]§! abgeschlossen. Von diesem Stützpunkt aus wurde eine Expedition gestartet, um die Oberfläche systematisch zu erforschen.\n\nObwohl unser Einfluss so weit von §Y[Root.GetHomeWorldName]§! entfernt begrenzt ist, wird die Expedition dennoch alle nützlichen Ressourcen nutzen können, die während der Erforschung gefunden werden.\n\nUnser Einfluss auf diese Welt wird nie so vollständig sein wie unsere Beherrschung des Rahmens, aber dies ist ein wichtiger erster Schritt, um unseren Platz unter den Sternen einzunehmen."
  giga_frameworld_origin.107.desc.hive:0 "Unsere Bauteams haben die Montage der planetaren Relaisstation über §Y[From.GetName]§! abgeschlossen. Von diesem Stützpunkt aus wurde eine Expedition gestartet, um die Oberfläche systematisch zu erforschen.\n\nObwohl unser Einfluss so weit von §Y[Root.GetHomeWorldName]§! entfernt begrenzt ist, wird die Expedition dennoch alle nützlichen Ressourcen nutzen können, die während der Erforschung gefunden werden.\n\nUnser Einfluss auf diese Welt wird nie so vollständig sein wie unsere Beherrschung des Rahmens, aber dies ist ein wichtiger erster Schritt, um unseren Platz unter den Sternen einzunehmen."
  giga_frameworld_origin.107.desc.machine:0 "Unsere Baueinheiten haben die Montage der planetaren Relaisstation über §Y[From.GetName]§! abgeschlossen. Von diesem Stützpunkt aus wurde eine Expedition gestartet, um die Oberfläche systematisch zu erforschen.\n\nObwohl unser Einfluss so weit von §Y[Root.GetHomeWorldName]§! entfernt begrenzt ist, wird die Expedition dennoch alle nützlichen Ressourcen nutzen können, die während der Erforschung gefunden werden.\n\nUnser Einfluss auf diese Welt wird nie so vollständig sein wie unsere Beherrschung des Rahmens, aber dies ist ein wichtiger erster Schritt, um unseren Platz unter den Sternen einzunehmen."
  giga_frameworld_origin.107.a:0 "Ein großer Tag für die [Root.GetName]!"
  
  # Baol life-seeding alternative text
  giga_frameworld_origin.500.desc.first:0 "Unsere Umweltspezialisten freuen sich berichten zu können, dass der Aussaatprozess auf [Root.GetName] abgeschlossen ist! Die neuen im Labor geschaffenen Pflanzenhybriden, die mit sorgfältig ausgewählten Segmenten des §YBaol§! Gencodes aus dem Körper des letzten §YBaol§! hergestellt wurden, wurden erfolgreich als Teil einer größeren Erweiterung der Umweltunterstützungssysteme eingesetzt.\n\nDie Verwaltung berichtet auch, dass eine Anzahl intelligenter Außerirdischer, unglaublich ähnlich den alten §YBaol§!, auf [Root.GetName] erschienen sind!\n\nObwohl sie keine Mitglieder eines Schwarmverstands sind, scheinen diese §GNu-Baol§! Außerirdischen genauso friedlich wie ihre Vorfahren. So oder so müssen wir uns mit ihrer Anwesenheit auf [Root.GetName] befassen."
  giga_frameworld_origin.500.desc:0 "Unsere Umweltspezialisten freuen sich berichten zu können, dass der Aussaatprozess auf [Root.GetName] abgeschlossen ist! Erneut sind eine Anzahl von §GNu-Baol§! Populationen erschienen, dank unseres Einsatzes von im Labor geschaffenen Pflanzenhybriden, die sorgfältig ausgewählte Segmente des §YBaol§! Gencodes enthalten."
  
  # Penrose notifications
  
  giga_frameworld_origin.001.name:0 "$name_penrose$ Rahmen gebaut"
  giga_frameworld_origin.001.desc:0 "Der Rahmen für einen zukünftigen $name_penrose$ wurde um [giga_system.star.GetName] gebaut. Dieser skelettartige Rahmen wird eines Tages massive Spiegel tragen, gebaut aus den reflektierendsten Materialien, die wir uns vorstellen können. Sobald wir diese Spiegel und die begleitenden Partikelinjektions- und Erfassungssysteme fertiggestellt haben, können wir mit der Ernte der Rotationsenergie des $pc_black_hole$ beginnen."
  giga_frameworld_origin.001.a:0 "Wunderbar."
  
  giga_frameworld_origin.002.name:0 "Teilweiser $name_penrose$ gebaut"
  giga_frameworld_origin.002.desc:0 "Die Hälfte der gigantischen Spiegel wurde nun am Rahmen installiert, der [giga_system.star.GetName] umschließt, und die Partikelinjektoren sind teilweise fertiggestellt. Weitere Arbeit ist erforderlich, um die Struktur fertigzustellen, bevor wir sie richtig nutzen können."
  giga_frameworld_origin.002.a:0 "Ausgezeichnet."
  
  giga_frameworld_origin.003.name:0 "Integrierter $name_penrose$ fertiggestellt"
  giga_frameworld_origin.003.desc:0 "Mit der Installation der letzten Spiegelplatten ist [giga_system.star.GetName] nun vollständig umschlossen. Wir können jetzt beginnen, die Rotationsenergie des $pc_black_hole$ zu ernten."
  giga_frameworld_origin.003.a:0 "Fantastisch!"
  
  # Decompressor notifications
  
  giga_frameworld_origin.004.name:0 "$matter_decompressor_4$ Strukturstützen gebaut"
  giga_frameworld_origin.004.desc:0 "Um Materie aus [giga_system.star.GetName] zu extrahieren, benötigen wir zunächst eine sichere Basis für die Anlage. Ankerstützen wurden von der $pc_giga_frameworld$ Superstruktur zu einer Region über dem Ereignishorizont von [giga_system.star.GetName] gebaut, wo ein riesiger Verarbeitungsring schließlich die Gravitationsbohranlage tragen wird."
  giga_frameworld_origin.004.a:0 "Wunderbar."
  
  giga_frameworld_origin.005.name:0 "$matter_decompressor_4$ Verarbeitungsring gebaut"
  giga_frameworld_origin.005.desc:0 "Auf den bestehenden Strukturstützen errichtet, beherbergt dieser Verarbeitungsring riesige Raffinerien und Schmelzanlagen, die die aus [giga_system.star.GetName] extrahierte Materie in nutzbare Mineralien umwandeln. Alles was bleibt ist die Montage der Dekompressionsanlage, die fokussierte Bereiche verdrehter Schwerkraft nutzt, um gewaltige Bohrer zu erschaffen, deren Bohrungen aus umgeleiteter und konzentrierter Gravitationskraft bestehen."
  giga_frameworld_origin.005.a:0 "Ausgezeichnet."
  
  giga_frameworld_origin.006.name:0 "Integrierter $matter_decompressor_4$ fertiggestellt"
  giga_frameworld_origin.006.desc:0 "Mit der Fertigstellung der Gravitationsbohranlage ist der $matter_decompressor_4$ über [giga_system.star.GetName] nun komplett und ermöglicht uns beispiellosen Zugang zu der Materie, die bisher als für immer in seinem Ereignishorizont gefangen galt. Wir können nun beginnen, Mineralien direkt aus [giga_system.star.GetName] zu gewinnen."
  giga_frameworld_origin.006.a:0 "Fantastisch!"
  
  giga_frameworld_origin.007.name:0 "Wohnbereichserweiterung abgeschlossen"
  giga_frameworld_origin.007.desc:0 "Die Neugestaltung und Erweiterung unserer städtischen Bereiche auf [giga_planet.GetName] ist abgeschlossen. Das neue, stärker gekapselte Design ermöglicht es einer größeren Anzahl von Menschen, ein einzelnes Stationsmodul komfortabel zu bewohnen, mit bequemem Zugang zu lokalen Arbeitsplätzen und Annehmlichkeiten.\n\nUnsere Wohnbereiche sind nun wahrhaftig eigene Städte, wodurch Platz, der zuvor von externen Unterstützungsanlagen belegt war, für neue Konstruktionen frei wird."
  giga_frameworld_origin.007.desc.hive:0 "Die Neugestaltung und Erweiterung unserer Schwarmknoten auf [giga_planet.GetName] ist abgeschlossen. Das neue, stärker gekapselte Design ermöglicht eine bessere Verteilung der Wartungsdrohnen unter der sich erholenden Bevölkerung, reduziert Reisezeiten und verbessert die lokale Aufgabenverteilung.\n\nDurch die gemeinsame Nutzung von Einrichtungen gewonnene Effizienz macht Platz frei, der zuvor von dedizierten Wartungssystemen belegt war, für neue Konstruktionen."
  giga_frameworld_origin.007.desc.machine:0 "Die Neugestaltung und Erweiterung unserer Drohnenwohnbereiche auf [giga_planet.GetName] ist abgeschlossen. Das neue, stärker gekapselte Design ermöglicht eine engere Integration der Drohnenwartung in Lagereinrichtungen, reduziert Reiseaufwand und verringert den insgesamt genutzten Platz.\n\nDurch Effizienzen in Unterstützungssystemen wird Platz freigegeben, der zuvor von sekundären Systemen belegt war, für neue Konstruktionen."
  giga_frameworld_origin.007.a:0 "Die Station muss wachsen."
  
  giga_frameworld_origin.008.name:0 "Erneuerte Schwerindustrie geht in Betrieb"
  giga_frameworld_origin.008.desc:0 "Gießereien und Fabriken auf [giga_planet.GetName] summen vor Aktivität nach Abschluss unseres industriellen Erneuerungsprojekts.\n\nModerne industrielle Methoden ermöglichen ein höheres Maß an Produktivität, indem Ausrüstung, die einst riesige Regionen von [giga_planet.GetName] belegte, in kompakte und effiziente Zentralstationen verdichtet wird. Der durch diese Neugestaltung eingesparte Platz kann nun für andere Stationsmodule oder einfach für noch mehr Fabriken genutzt werden."
  giga_frameworld_origin.008.a:0 "Die Produktivitätsprognosen steigen."
  
  giga_frameworld_origin.009.name:0 "Schutzeinrichtung Verbesserung abgeschlossen"
  giga_frameworld_origin.009.desc:0 "Nach einer langen Phase der Reorganisation sind die neuen Einrichtungen zur Erfüllung organischer Bedürfnisse auf [giga_planet.GetName] nun betriebsbereit. Die Organischen in unserer Obhut werden keine Störung bemerken, ihr Leben bleibt ungestört, wird aber durch die verbesserten Systeme bereichert.\n\nBereiche, die zuvor Wartungssysteme beherbergten, können nun umgewidmet werden, um eine noch größere Bevölkerung aufzunehmen oder für völlig andere Zwecke."
  giga_frameworld_origin.009.a:0 "Die Arbeit ist nie vollendet."
  
  giga_frameworld_origin.010.name:0 "Umweltunterstützungssysteme verbessert"
  giga_frameworld_origin.010.desc:0 "Wir haben die Renovierung der Umweltkontroll- und atmosphärischen Verarbeitungssysteme auf [giga_planet.GetName] abgeschlossen. Unsere Bürger können nun eine breite Palette simulierter planetarer Umgebungen genießen, geeignet für alle Arten. Die feinere Kontrolle der Wasseraufbereitung und Beleuchtung wird auch eine viel effizientere Nahrungsproduktion ermöglichen, mit einer entsprechenden Reduzierung des Arbeitsaufwands.\n\nEin neuer Tag bricht an für die [giga_planet.owner.GetName], und die Luft ist klar."
  giga_frameworld_origin.010.a:0 "Erfrischend!"
  giga_frameworld_origin.010.desc.servitor:0 "Wir haben die Renovierung der Umweltkontroll- und atmosphärischen Verarbeitungssysteme auf [giga_planet.GetName] abgeschlossen. Die Organischen in unserer Obhut können nun eine breite Palette simulierter planetarer Umgebungen genießen, geeignet für alle Arten. Die feinere Kontrolle der Wasseraufbereitung und Beleuchtung wird auch eine viel effizientere Nahrungsproduktion ermöglichen, wodurch eine vielfältigere Palette organischer Ernährungsbedürfnisse erfüllt werden kann.\n\nEin neuer Tag bricht an für die [giga_planet.owner.GetName], und die Luft ist klar."
  giga_frameworld_origin.010.a.servitor:0 "Nichts ist zu gut für unsere Schützlinge."
  giga_frameworld_origin.010.desc.assimilator:0 "Wir haben die Renovierung der Umweltkontroll- und atmosphärischen Verarbeitungssysteme auf [giga_planet.GetName] abgeschlossen. Unsere organischen Drohnen werden von den verbesserten Bedingungen profitieren, besonders jene, die außerhalb unserer ursprünglichen Designparameter entstammen.\n\nDie feinere Kontrolle der Wasseraufbereitung und Beleuchtung wird auch eine viel effizientere Nahrungsproduktion ermöglichen, was den fortgesetzt effizienten Betrieb integrierter Drohnencluster sicherstellt. Es wird prognostiziert, dass die Produktivität als Ergebnis dieser Änderungen steigen wird."
  giga_frameworld_origin.010.a.assimilator:0 "Verstanden."
  
  giga_frameworld_origin.011.name:0 "Datenverarbeitungsanlagen verbessert"
  giga_frameworld_origin.011.desc:0 "Die Bauarbeiten am neuen Hochleistungs-Rechenzentrum auf [giga_planet.GetName] sind abgeschlossen. Riesige Supercomputer-Bänke stehen nun zur Verfügung, um die schwierigsten wissenschaftlichen Fragen zu bewältigen, die wir bisher erdacht haben, und versprechen eine enorme Verbesserung des allgemeinen Forschungsdurchsatzes.\n\nDie Integration dieser Systeme in die Kernfunktionen der Station läuft noch, aber die zusätzliche Wärmemanagementlast wird voraussichtlich keine signifikanten Störungen verursachen."
  giga_frameworld_origin.011.a:0 "Die Geheimnisse des Universums sind in unserer Reichweite."
  
  giga_frameworld_origin.012.name:0 "Stationsinfrastruktur erweitert"
  giga_frameworld_origin.012.desc:0 "Nach einer langen Bauphase wurden neue zentrale Transportinfrastruktur-Korridore zwischen den Hauptbereichen von [giga_planet.GetName] fertiggestellt.\n\nVerbesserte strukturelle Integrität und vernetzte Transportsysteme ermöglichen es der Superstruktur, zusätzliche Funktionsmodule zu unterstützen."
  giga_frameworld_origin.012.desc.2:0 "Eine zweite Runde von Infrastrukturverbesserungen wurde in den Hauptbereichen von [giga_planet.GetName] abgeschlossen.\n\nVerbesserte strukturelle Integrität und vernetzte Transportsysteme ermöglichen es der Superstruktur, zusätzliche Funktionsmodule zu unterstützen."
  giga_frameworld_origin.012.a:0 "Verstanden."
  
  giga_frameworld_origin.013.name:0 "Maginot Projekt abgeschlossen"
  giga_frameworld_origin.013.desc:0 "Wir haben nun unsere ultimative Verteidigungsbarriere um [giga_planet.GetName] fertiggestellt, die unsere Heimat mit Schicht um Schicht tödlicher Befestigungen umgibt. Dieses wahrhaft ehrfurchtgebietende Meisterwerk der Militärtechnik ist praktisch uneinnehmbar, ausgestattet mit integrierten Verteidigungsplattformen, gigantischen kinetischen Batterien, riesigen Garnisonsstellungen und Schildgeneratoren, die die Leistung ganzer Marineflotten bei weitem übertreffen.\nZusätzlich dient das Dead-Hand-System als Abschreckung gegen jede vollständige Zerstörung von [giga_planet.GetName], indem es den zentralen Kern der Station im Falle einer Notfallaktivierung als gewaltige antimateriebetriebene gerichtete Ladung nutzt - §Rund vernichtet dabei alle feindlichen Streitkräfte im Orbit vollständig.§! \n\nDie verschiedenen Verteidigungssysteme können durch §YEntscheidungen§! verwaltet werden. Bauen Sie §YBezirke§!, um $defensive_upgrade_point_plural$ und $offensive_upgrade_point_plural$ für diese Entscheidungen zu erhalten."
  giga_frameworld_origin.013.a:0 "Niemand kann uns jetzt noch schaden."
  
  giga_frameworld_origin.014.name:0 "Sekundäre Verarbeitungsorbits fertiggestellt"
  giga_frameworld_origin.014.desc:0 "Wir haben den Bau mehrerer neuer Verarbeitungsanlagen in der Nähe von [giga_planet.GetName] abgeschlossen. Diese Anlagen werden die Fähigkeiten mehrerer unserer sekundären Verarbeitungsgebäude verbessern und ermöglichen weitere Optimierung und Verbesserung der Produktionslinien."
  giga_frameworld_origin.014.a:0 "Alle Systeme nominal."
  
  giga_frameworld_origin.015.name:0 "Nanit Infusion abgeschlossen"
  giga_frameworld_origin.015.desc:0 "Wir haben die Integration unseres Schwarms in die Kerninfrastruktur von [giga_planet.GetName] abgeschlossen und verschmelzen unser Wesen mit der Struktur selbst. Wir können nun jedes System mit beispielloser Präzision manipulieren und werden davon stark profitieren."
  giga_frameworld_origin.015.a:0 "Essenz, verkörpert."
  
  # conquered world abandonment
  
  giga_frameworld_origin.101.name:0 "Annektierte Bevölkerung umgesiedelt"
  # first time
  giga_frameworld_origin.101.desc.a:0 "Die lokale Bevölkerung von [From.GetName] wurde nun vollständig nach [Root.Capital.GetName] transferiert. Nach einer kurzen Experimentierphase haben wir nun bestätigt, dass die Aufrechterhaltung der vollständigen Kontrolle über eine so große externe Siedlung außerhalb unserer Kapazitäten liegt, und zukünftige Protokolle werden sich auf die effiziente Umsiedlung lokaler Bevölkerungseinheiten konzentrieren.\n\n[From.FrameworldEvent101GetOutpost]"
  # subsequent times
  giga_frameworld_origin.101.desc.b:0 "Gemäß etabliertem Protokoll wurden die Bevölkerungseinheiten von [From.GetName] nach [Root.Capital.GetName] umgesiedelt.\n\n[From.FrameworldEvent101GetOutpost]"
  giga_frameworld_origin.101.a:0 "Zur Kenntnis genommen."
  
  giga_frameworld_origin.101.outpost:0 "Ein §Y$frameworld_outpost_0$§! wurde im Orbit eingerichtet, und ein Relaisposten bleibt an der Oberfläche."
  giga_frameworld_origin.101.no_outpost:0 "Da der Standort für einen §Y$frameworld_outpost_0$§! ungeeignet ist, wurden keine weiteren Maßnahmen ergriffen."
  
  # outpost wreck dismantled on settlement
  
  giga_frameworld_origin.103.name:0 "Orbitale Trümmer geborgen"
  giga_frameworld_origin.103.desc.a:0 "Jetzt, da die Kolonie auf [From.GetName] ordnungsgemäß eingerichtet wurde, haben unsere Infrastrukturteams mit den Bergungsarbeiten an der zerstörten Station im Orbit begonnen.\n\nDer Zweck der Station bleibt unklar, da die Menge an Kommunikationsausrüstung, die an Bord gefunden wurde, unverhältnismäßig zum Aktivitätsniveau erscheint, das wir bei unserer Ankunft an der Oberfläche vorfanden.\n\nWir werden die Beweggründe der früheren Besitzer vielleicht nie vollständig verstehen, aber die geborgenen Materialien haben sich als wertvoll erwiesen."
  giga_frameworld_origin.103.a:0 "Seltsam, aber nützlich."
  
  # outpost resource discovery
  
  giga_frameworld_origin.308.name:0 "Expeditionsressourcenuntersuchungen zeigen Ergebnisse"
  giga_frameworld_origin.308.desc:0 "Laufende Ressourcenuntersuchungen durch unsere Expeditionsteams haben neue Möglichkeiten zur Ausbeutung planetarer Ressourcen entdeckt.[frameworld_outpost_motes.FrameworldEvent308Motes][frameworld_outpost_gases.FrameworldEvent308Gases][frameworld_outpost_crystals.FrameworldEvent308Crystals][frameworld_outpost_betharian.FrameworldEvent308Betharian][frameworld_outpost_zoo.FrameworldEvent308Zoo]"
  
  giga_frameworld_origin.308.desc.motes.general:0 "Diese Partikel erzeugen bei chemischer Aktivierung eine explosive kinetische Kraft und sind angeblich sehr scharf, wenn sie beim Kochen verwendet werden."
  giga_frameworld_origin.308.desc.motes:0 "\n\nEine Erkundungsabteilung auf §Y[this.GetName]§! hat ein reichhaltiges Vorkommen von §H$volatile_motes$§! entdeckt. $giga_frameworld_origin.308.desc.motes.general$"
  giga_frameworld_origin.308.desc.motes.ecu:0 "\n\nIn einer antiken chemischen Verarbeitungsanlage auf §Y[this.GetName]§! wurde ein bedeutendes Vorkommen von §H$volatile_motes$§! gefunden. $giga_frameworld_origin.308.desc.motes.general$"
  giga_frameworld_origin.308.desc.motes.desert:0 "\n\nChemische Analysen des Wüstensands von §Y[this.GetName]§! haben eine reiche Quelle von §H$volatile_motes$§! offenbart. $giga_frameworld_origin.308.desc.motes.general$"
  giga_frameworld_origin.308.desc.motes.caverns:0 "\n\nTief in einer Höhle unter der Oberfläche von §Y[this.GetName]§! hat ein Erkundungsteam eine reiche Quelle von §H$volatile_motes$§! entdeckt. $giga_frameworld_origin.308.desc.motes.general$"
  
  giga_frameworld_origin.308.desc.gases.general:0 "Diese Gase haben eine Reihe von taktischen und sogar Freizeitanwendungen."
  giga_frameworld_origin.308.desc.gases:0 "\n\nDetailierte Scans von §Y[this.GetName]§! haben eine bisher ungenutzte Quelle von §H$exotic_gases$§! aufgedeckt. $giga_frameworld_origin.308.desc.gases.general$"
  giga_frameworld_origin.308.desc.gases.ecu:0 "\n\nLuftaufnahmen des antiken Industriesektors auf §Y[this.GetName]§! haben ein großes Speicherreservoir von §H$exotic_gases$§! aufgedeckt. $giga_frameworld_origin.308.desc.gases.general$"
  giga_frameworld_origin.308.desc.gases.swamp:0 "\n\nGründliche Scans der Sumpfgebiete von §Y[this.GetName]§! haben mehrere potenzielle Anzapfpunkte für §H$exotic_gases$§! aufgedeckt. $giga_frameworld_origin.308.desc.gases.general$"
  giga_frameworld_origin.308.desc.gases.bog:0 "\n\nNiedrigflug-Luftuntersuchungen der sumpfigen Feuchtgebiete auf §Y[this.GetName]§! haben mehrere für die Gewinnung von §H$exotic_gases$§! geeignete Standorte aufgedeckt. $giga_frameworld_origin.308.desc.gases.general$"
  
  giga_frameworld_origin.308.desc.crystals.general:0 "Die Kristalle eignen sich dank ihrer spektakulären Brechungseigenschaften sowohl für Hochleistungselektronik als auch für Laserwaffensysteme."
  giga_frameworld_origin.308.desc.crystals:0 "\n\nUntersuchungsteams auf §Y[this.GetName]§! haben den Standort einer bedeutenden Quelle von §H$rare_crystals$§! kartiert. $giga_frameworld_origin.308.desc.crystals.general$"
  giga_frameworld_origin.308.desc.crystals.ecu:0 "\n\nUntersuchungsteams auf §Y[this.GetName]§! haben eine größtenteils intakte Lagereinrichtung mit einem riesigen Vorrat an §H$rare_crystals$§! identifiziert. $giga_frameworld_origin.308.desc.crystals.general$"
  giga_frameworld_origin.308.desc.crystals.caverns:0 "\n\nGeologische Untersuchungen von §Y[this.GetName]§! haben eine ausgedehnte Höhle mit Formationen von §H$rare_crystals$§! identifiziert. $giga_frameworld_origin.308.desc.crystals.general$"
  giga_frameworld_origin.308.desc.crystals.forest:0 "\n\nUntersuchungsteams auf §Y[this.GetName]§! haben einen Wald aus Silikatbäumen entdeckt, die zur Gewinnung von §H$rare_crystals$§! verarbeitet werden können. $giga_frameworld_origin.308.desc.crystals.general$"
  giga_frameworld_origin.308.desc.crystals.reef:0 "\n\nOzeanographische Untersuchungen von §Y[this.GetName]§! haben mehrere Riffe aus kristallisierter Koralle kartiert, die für §H$rare_crystals$§! geerntet werden könnten. $giga_frameworld_origin.308.desc.crystals.general$"
  
  giga_frameworld_origin.308.desc.betharian.general:0 "Diese Steine haben ein enormes Potenzial für die Energieerzeugung, das mit einem entsprechend ausgelegten Kraftwerk genutzt werden könnte."
  giga_frameworld_origin.308.desc.betharian:0 "\n\nGroße Mengen an §HBetharian Steinen§! wurden auf §Y[this.GetName]§! entdeckt. $giga_frameworld_origin.308.desc.betharian.general$"
  giga_frameworld_origin.308.desc.betharian.fields:0 "\n\nGroße Formationen natürlich vorkommender §HBetharian Steine§! wurden auf §Y[this.GetName]§! entdeckt. $giga_frameworld_origin.308.desc.betharian.general$"
  
  giga_frameworld_origin.308.desc.zoo.general:0 "Diese Kreaturen haben sich als harmlos und freundlich gegenüber unseren Untersuchungsteams erwiesen und bieten ideale Bedingungen für die Nahbeobachtung außerirdischen Lebens."
  giga_frameworld_origin.308.desc.zoo:0 "\n\nZoologische Studien von §Y[this.GetName]§! haben die Existenz von §Hzahmer lokaler Fauna§! bestätigt. $giga_frameworld_origin.308.desc.zoo.general$"
  giga_frameworld_origin.308.desc.zoo.valley:0 "\n\nEin isoliertes Tal auf §Y[this.GetName]§! wurde entdeckt, das eine Population von §Hzahmer lokaler Fauna§! enthält. $giga_frameworld_origin.308.desc.zoo.general$"
  
  giga_frameworld_origin.308.a:0 "Ausgezeichnet."
  giga_frameworld_origin.308.a.tooltip:0 "§LNeue Möglichkeiten erfordern neue Methoden.§!"
  giga_frameworld_origin.308.a.motes:0 "\n§Y£volatile_motes£$volatile_motes$§! entdeckt auf §Y[frameworld_outpost_motes.GetName]§!:"
  giga_frameworld_origin.308.a.gases:0 "\n§Y£exotic_gases£$exotic_gases$§! entdeckt auf §Y[frameworld_outpost_gases.GetName]§!:"
  giga_frameworld_origin.308.a.crystals:0 "\n§Y£rare_crystals£$rare_crystals$§! entdeckt auf §Y[frameworld_outpost_crystals.GetName]§!:"
  giga_frameworld_origin.308.a.betharian:0 "\n§Y£energy£Betharian Stein§! entdeckt auf §Y[frameworld_outpost_betharian.GetName]§!:"
  giga_frameworld_origin.308.a.zoo:0 "\n§Y£unity£ £society_research£Zahmes Außerirdisches Leben§! entdeckt auf §Y[frameworld_outpost_zoo.GetName]§!:"
  
