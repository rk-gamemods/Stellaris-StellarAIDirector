  giga_biotrophy_scaling:0 "$job_bio_trophy$ Skalierung"
  giga_biotrophy_scaling_fluff:0 "Ab einem gewissen Punkt werden die Vorteile der Versorgung organischer Wesen durch die logistischen Realitäten ihrer wachsenden Anzahl aufgewogen."
  giga_biotrophy_scaling_desc:0 "§TDiese Megastruktur ermöglicht eine viel höhere Dichte von £job_bio_trophy£ §Y$job_bio_trophy_plural$§! als normale Planeten. Dieser Effekt gleicht die extreme Stapelung von §Y$mod_planet_jobs_complex_drone_produces_mult$§! bei hohen Zahlen aus.\n\nZusätzliche £job_bio_trophy£ §Y$job_bio_trophy_plural$§! sind immer vorteilhaft, aber die Effizienz jeder neuen Bevölkerung sinkt ab §Y50§! auf §Y20%§! bei §Y150§! Einheiten.\n\n$job_bio_trophy$ Bevölkerung: §Y[Root.giga_biotrophy_count]§!\nBasisbonus: §G+[Root.giga_biotrophy_count]%§!\nAngepasster Bonus: §G+[Root.giga_biotrophy_adjusted]%§!\nEffizienz: §Y[Root.giga_biotrophy_efficiency]%§!§!\n§T--------------§!\n$giga_biotrophy_scaling_fluff$"
  d_giga_biotrophy_scaling:0 "$giga_biotrophy_scaling$"
  d_giga_biotrophy_scaling_desc:0 "§TFür Details siehe den gleichnamigen Planetenmodifikator.§!\n\n$giga_biotrophy_scaling_fluff$"
  
