  giga_situation_frameworld_outposts_type:0 "$giga_frameworld_outpost$ Netzwerk"
  giga_situation_frameworld_outposts:0 "$giga_situation_frameworld_outposts_type$"
  giga_situation_frameworld_outposts_desc:0 "§Y$giga_frameworld_outpost_plural$§! ersetzen Kolonien für $origin_frameworld$ Reiche und bieten signifikante Wachstumsboni für die $pc_giga_frameworld$ selbst. Der Gesamtbonus unseres Netzwerks kann hier eingesehen werden.\n\nDer $EMPIRE_SIZE$ Modifikator entspricht der gleichen Anzahl von Kolonien, einschließlich Modifikatoren für £mod_empire_size_colonies_mult£ §Y$MOD_EMPIRE_SIZE_COLONIES_MULT_ORIGINAL$§!."
  
  giga_situation_frameworld_outposts_stage:0 "$giga_situation_frameworld_outposts$"
  
  giga_situation_frameworld_outposts_monthly_change_tooltip:0 "Diese Situation macht keinen Fortschritt."
  
  giga_situation_frameworld_outposts_approach:0 "Normaler Betrieb"
  giga_situation_frameworld_outposts_approach_desc:0 "Erforschung und Untersuchung."
  
