  #frameworld_harvest_0_CONSTRUCTION_INFO_DELAYED:0 "$giga_list_additional_data$ - Erweitert die §Y$pc_giga_frameworld$§! einmal und fügt zusätzlich §G+1§! §Y$mod_district_giga_frameworld_mining_max$ pro 4 Abbauaktionen§! hinzu.\n\nKosten skalieren mit £mod_planet_clear_blocker_cost_mult£ §Y$MOD_COUNTRY_CLEAR_BLOCKER_COST_MULT$§! Modifikatoren.\n\nErweiterungseffekte:\n\n$frameworld_size_fake_tooltip$\n\n$frameworld_expansion_fake_tooltip$\n\n$frameworld_asteroid_fake_tooltip$"
