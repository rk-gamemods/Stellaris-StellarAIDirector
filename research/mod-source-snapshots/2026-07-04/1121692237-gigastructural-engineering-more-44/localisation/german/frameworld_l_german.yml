  pc_giga_frameworld_outpost_artificial:0 "$pc_giga_frameworld_outpost_planet$"
  pc_giga_frameworld_outpost_artificial_desc:0 "Eine bewohnbare Struktur, derzeit überwacht von einer großen Raumstation. Expeditionsgruppen von der Station besuchen regelmäßig die Oberfläche, führen Untersuchungen durch und betreiben leichten Ressourcenabbau.\n\nKeine aktiven permanenten Siedlungen sind auf der Oberfläche zu finden."
