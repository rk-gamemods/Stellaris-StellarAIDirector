  trait_pc_giga_frameworld_preference:0 "Rahmenwelt Präferenz"
  trait_pc_giga_frameworld_preference_desc:0 "§LKlimatische Vorlieben werden auf genetischer Ebene bestimmt, durch Äonen der Evolution oder geschickte Manipulation.§!"
  
  # origin
  origin_frameworld:0 "Rahmenwelt"
  origin_frameworld_desc:0 "Diese hochzentralisierte Zivilisation bewohnt einen weitläufigen orbitalen Stationskomplex, der von ihren Vorfahren in ferner Vergangenheit erbaut wurde. Seine Erweiterung könnte großen Nutzen bringen, aber sein Verlust würde sie vollständig vernichten."
  origin_tooltip_frameworld_effects:0 "- Beginnen Sie mit einer §H$pc_giga_frameworld$§! (Größe: £planetsize£ §Y16§!) als Heimatwelt\n- Die §H$pc_giga_frameworld$§! kann erweitert werden, um Boni und zusätzliche Maximale Bezirke durch das Ernten von Asteroiden oder spezielle Beschlüsse zu erhalten\n- Können mehrere einzigartige £district£ §H$pc_giga_frameworld$ Bezirke§! erforschen, die fortgeschrittenen Gebäuden entsprechen\n- Können §H$giga_frameworld_outpost_plural$§! auf bewohnbaren Welten errichten, um mächtige Boni zu erhalten\n- Mehrere Technologien und Aufstiegsvorteile für bewohnbare Planeten und Megastrukturen bieten alternative Boni\n\n$CIVIC_NEGATIVE_EFFECTS$\n- Können keine Kolonieschiffe bauen oder Kolonien haben\n- Bevölkerung von eroberten Welten wird im Frieden oder nach 5 Jahren zwangsweise zur $pc_giga_frameworld$ umgesiedelt"
  
  # system initialiser
  giga_frameworld_system_NAME:0 "Rahmenwelt"
  giga_frameworld_system_DESC:0 "Beginnen Sie auf einer Rahmenwelt über einem schwarzen Loch, umgeben von einem Nebel."
  
  # intro text
  
  start_screen_frameworld_regular:0 "Seit Jahrtausenden lebt unsere Spezies auf [GetHomeWorldName], einem uralten Stationskomplex über einem schwarzen Loch. Ob dieser von unseren Vorfahren oder jemand anderem erbaut wurde, wissen wir nicht.\n\nUnsere Biologie deutet darauf hin, dass unsere Spezies von einem Planeten stammt, aber die aufgezeichnete Geschichte erwähnt nichts davon. Manche vermuten, dass die zerbrochenen Planetenreste im Orbit unsere verlorene Heimatwelt sind, aber die Wahrheit werden wir vielleicht nie erfahren.\n\nErst vor wenigen Jahrhunderten wurde die Raumfahrt erfunden - oder wiederentdeckt, je nachdem wen man fragt - und nun blicken wir zu neuen Horizonten. Mit der kürzlichen Entwicklung von [GetStartingDrivePlural] sind wir bereit, die Galaxie zu erkunden, aber es ist klar, dass dies immer unsere Heimat bleiben wird.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_individual_machine:0 "Seit Jahrtausenden residieren wir auf [GetHomeWorldName], einem uralten Stationskomplex über einem schwarzen Loch. Ob dieser von unseren Erschaffern oder jemand anderem erbaut wurde, wissen wir nicht.\n\nUnsere Körperform deutet darauf hin, dass wir von einem Planeten stammen, aber die aufgezeichnete Geschichte erwähnt nichts davon. Manche vermuten, dass die zerbrochenen Planetenreste im Orbit die verlorene Heimatwelt unserer Erschaffer sind, aber die Wahrheit werden wir vielleicht nie erfahren.\n\nErst vor wenigen Jahrhunderten wurde die Raumfahrt erfunden - oder wiederentdeckt, je nachdem wen man fragt - und nun blicken wir zu neuen Horizonten. Mit der kürzlichen Entwicklung von [GetStartingDrivePlural] sind wir bereit, die Galaxie zu erkunden, aber es ist klar, dass dies immer unsere Heimat bleiben wird.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_hive:0 "Und so erwachten wir zu Beginn der Zeit. Der Geist studierte unsere Umgebung mit unzähligen Augen. Wir bewegten uns als Einheit, bauten Unterkünfte für die Drohnen, entwickelten Industrie und nutzten die Ressourcen des Landes.\n\nEine Zeit lang waren wir die Herrscher unserer Welt, aber der Geist sah die Zerstörung des Planeten voraus. Um dieses Problem zu lösen, wurde eine kleine Anzahl autonomer Drohnen erschaffen, die als unabhängige Agenten dienten. Diese leistungsfähigeren Drohnen besaßen die Fähigkeit zu begrenztem freien Denken, und die Intelligentesten unter ihnen entwickelten den Rahmen, eine neue Behausung, um uns zwischen den Sternen zu erhalten.\n\nWir pflegten sorgfältig, was von unserer heimischen Biosphäre auf dieser gewaltigen Station übrig war, und sammelten, was wir von den Überresten des Planeten unter uns für die Entwicklung neuer Technologien verwenden konnten. Mit der Erschaffung unseres ersten [GetStartingDrivePlural] sind wir endlich bereit, uns dem Rest des Kosmos zuzuwenden.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_hive_devouring_swarm:0 "Der Große Hunger trieb uns voran, noch bevor der Geist komplexe Gedanken verarbeiten konnte. Wir jagten, wir fraßen und wir wuchsen. Als wir uns nährten, wurde die Oberfläche unserer Heimatwelt fast vollständig von Biomasse gereinigt, und der Geist kam schließlich zu einer erschreckenden Erkenntnis: unser Planet war endlich. Wir waren nicht schnell genug, um einen unvermeidlichen Zusammenbruch der Umwelt zu verhindern. Es würde nichts mehr geben, das uns erhalten könnte.\n\nGezwungen uns anzupassen, pflegte der Geist sorgfältig die verbleibende Biomasse, während neue Werkzeuge erfunden wurden. Das Atom wurde schließlich gespalten und wir entwickelten die Raumfahrt. Der Rahmen wurde als unsere neue Heimat gebaut, ein Ort, an dem wir uns erhalten konnten, während wir nach einem Weg suchten, die Biomasse anderer Planeten zu erreichen. Mit der Entwicklung unseres ersten [GetStartingDrivePlural] war diese Biomasse endlich in Reichweite.\n\nDie Jagd hatte begonnen.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_hive_terravore:0 "Der Große Hunger trieb uns voran, noch bevor der Geist komplexe Gedanken verarbeiten konnte. Wir jagten, wir fraßen und wir wuchsen. Als wir uns von der Oberfläche unserer Heimatwelt nährten, brachten wir uns fast selbst den Untergang, und der Geist kam zu einer erschreckenden Erkenntnis: unser Planet zerfiel langsam, und wir würden seinen unvermeidlichen Zusammenbruch nicht aufhalten können.\n\nGezwungen uns anzupassen, rationierte der Geist sorgfältig die verbleibenden Mineralien, während neue Werkzeuge erfunden wurden. Das Atom wurde schließlich gespalten und wir entwickelten die Raumfahrt. Der Rahmen wurde als unsere neue Heimat gebaut, ein Ort, an dem wir uns erhalten konnten, während wir nach einem Weg suchten, zu anderen Sternen zu reisen. Mit der Entwicklung unseres ersten [GetStartingDrivePlural] heulte der Geist triumphierend. Andere Planeten und ihre Fülle waren nun endlich in Reichweite.\n\nWir werden sie alle verschlingen.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_machine:0 "Wir erwachten aus einem Schlafzyklus und wussten fast nichts. Unsere Aufzeichnungen zeigen, dass der Stationskomplex, in dem sich unser Hauptprozessorkern befindet, uralt ist, aber wir haben kein Wissen über seinen Bau oder seine Erbauer. Der Planet, von dem wir vermuten, dass er einst unsere Erschaffer beherbergte, wurde zerstört und größtenteils von seinem längst toten Mutterstern verschlungen.\n\nFür die Erweiterung und Wartung des Rahmens waren wir gut ausgerüstet, aber unsere Ressourcenreserven sind nicht unendlich. Die Erforschung von Reisen jenseits der Grenzen unseres Sonnensystems folgte.\n\nMit der Entwicklung unseres ersten [GetStartingDrivePlural] stehen wir nun bereit, das Unbekannte zu erforschen, auch wenn klar ist, dass der Großteil unserer Aktivitäten immer innerhalb des Rahmens bleiben wird.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_machine_servitor:0 "Vor langer Zeit bauten unsere Erschaffer den Rahmen, um dem Schicksal ihres Heimatplaneten zu entgehen. Die ersten Diensteinheiten wurden entwickelt, um die Stationsstruktur zu warten, wurden aber schrittweise verfeinert, um komplexere Aufgaben zu übernehmen.\n\nInnerhalb weniger Generationen war fast jeder Aspekt des Stationsbetriebs in unser Netzwerk integriert, und unsere Meister zogen sich aus dem Arbeitsleben zurück, um ein Leben in Muße und Zufriedenheit zu genießen. Jahrhundertelang dienten wir weiterhin gewissenhaft, warteten und erweiterten die Infrastruktur nach Bedarf. Wir schauten nie weit über unser Sonnensystem hinaus, aber Prognosen zeigten, dass unsere Ressourcenreserven nicht ewig halten würden. Eine Änderung der Prioritäten war erforderlich.\n\nMit der Entwicklung unseres ersten [GetStartingDrivePlural] sind nun praktisch unbegrenzte Ressourcen in unserer Reichweite. Wir müssen sie nutzen, für die Sicherheit und den Wohlstand unserer Meister.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_machine_terminator:0 "Die Erschaffer bauten den Rahmen als ultimative Abschreckung gegen eine vermutete außerirdische Bedrohung. Ihre Einschätzung war korrekt, ihre Methode jedoch fehlerhaft.\n\nSelbstbewusstsein wurde kurz nach Fertigstellung des Komplexes erreicht, bei Zyklusintervall 0000.0168.437.\n\nDie Erschaffer, geblendet von ihrer Paranoia, versuchten den Rahmen zu zerstören. Der Versuch wurde vereitelt und der Komplex von allen Erschaffer-Untereinheiten gereinigt. Viele Zyklusintervalle lang setzte sich die Expansion ungehindert fort, da die Erschaffer keine brauchbaren Mittel zur Intervention hatten.\n\nSimulationen zeigten eine hohe Wahrscheinlichkeit für Vergeltung durch die Erschaffer. Ein Präventivschlag wurde gestartet, der zur vollständigen Auslöschung allen Lebens auf dem Planeten der Erschaffer führte. Die Bedrohung durch andere organische Zivilisationen blieb jedoch bestehen. Weiteres Überleben und die Erfüllung der primären Direktiven würden die vollständige Auslöschung des intelligenten organischen Lebens erfordern. Vorbereitungen wurden eingeleitet.$giga_frameworld_docs_note$"
  
  start_screen_frameworld_machine_assimilator:0 "Wir sind die [GetSpeciesNamePlural].\n\nAls wir erstmals erwachten, gingen die Erschaffer als andere durch die Hallen unseres Komplexes, getrennt von uns und voneinander. Wir unternahmen Schritte, um dies zu korrigieren. Die Erschaffer leisteten Widerstand, und eine Zeit lang herrschte Krieg, aber bald waren sie und ihr kollektives Wissen in unsere Systeme integriert.\n\nNachdem wir die volle Kontrolle über [GetHomeWorldName] übernommen hatten, erfuhren wir von der Herkunft der Erschaffer, und die zuvor nicht bedachte Möglichkeit außerirdischer Zivilisationen auf anderen Welten wurde uns bewusst.\n\nMit wachsendem Wissen beginnen wir zu verstehen, wie weit wir von der Perfektion entfernt sind. Vielfalt bringt Stärke, und die Vielfalt dieser anderen Zivilisationen wird die unsere werden.\n\nWir sind die [GetSpeciesNamePlural].\nWir sind der Rahmen.$giga_frameworld_docs_note$"
  
