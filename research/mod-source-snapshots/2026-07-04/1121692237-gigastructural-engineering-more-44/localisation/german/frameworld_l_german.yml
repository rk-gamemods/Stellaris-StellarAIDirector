  pc_giga_frameworld_desc:0 "Ein weitläufiger Komplex aus verbundenen Raumstationen, die sich um einen großen zentralen Kern gruppieren."
  pc_giga_frameworld_adj:0 "künstlich"
  
  # habitability trait
