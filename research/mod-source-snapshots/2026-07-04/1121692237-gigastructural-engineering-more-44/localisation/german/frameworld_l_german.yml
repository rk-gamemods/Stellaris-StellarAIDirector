  ########################
  ### Event Chain Docs ###
  ########################
  
  giga_frameworld_docs_note:0 "\n\n§YHinweise zum Ursprung finden Sie im Situationsprotokoll.§!"
  
  giga_category_frameworld:99 "$giga_frameworld_docs_chain_title$"
  giga_frameworld_docs_chain_title:0 "$pc_giga_frameworld$ Dokumentation"
  giga_frameworld_docs_chain_desc:0 "Der §Y$pc_giga_frameworld$§! Ursprung bietet einen 'Ein-Planeten' Spielstil mit starkem Fokus auf eine einzelne Hauptwelt. Kolonieschiffe sind nicht verfügbar, und wenn die Hauptwelt verloren geht, werden Sie besiegt. Bauplätze sind begrenzt, aber Bezirke können unbegrenzt erweitert werden.\n\nWeitere Details finden Sie in den Unterkategorien dieses Menüs."
  
  giga_frameworld_docs_expansion:0 "1. Expansion"
  giga_frameworld_docs_expansion_desc:0 "Zusätzliche Bezirke können durch §YPlanetare Beschlüsse§! und §YAsteroidenabbau§! hinzugefügt werden. Jede Erweiterung fügt der §Y$pc_giga_frameworld$§! mehrere schrittweise Boni hinzu, unabhängig von der verwendeten Methode. Alle Expansionsboni finden Sie im Menü §YPlanetare Eigenschaften§!.\nErweiterungsbeschlüsse gibt es in drei Varianten:\n\n- §T$giga_frameworld_expand$§!: Kostet £alloys£ $alloys$, die Kosten steigen mit jeder Durchführung. Bietet zusätzlich alle zwei Anwendungen einen §YBauplatz§!. Wird von £mod_megastructures_cost_mult£ §Y$mod_megastructures_cost_mult$§! beeinflusst.\n- §T$giga_frameworld_reorganise$§!: Kostet eine große Menge £influence£ $influence$ und beschleunigt mehrere häufige Aktionen.\n- §T$giga_frameworld_expand_mass$§!: Kostet £giga_sr_bulk_matter£ $giga_sr_bulk_matter$ und erhöht §Y$mod_district_giga_frameworld_mining_max$§! pro Anwendung um eins."
  
  giga_frameworld_docs_asteroids:0 "2. Asteroidenabbau"
  giga_frameworld_docs_asteroids_desc:0 "Die §Y$pc_giga_frameworld$§! kann durch Abbau von Asteroiden mit der §Y$frameworld_harvest_0$§! Megastruktur erweitert werden. Jeder abgebaute Asteroid fügt einen Bezirk hinzu, verschiedene schrittweise Boni und erhöht §Y$mod_district_giga_frameworld_mining_max$§! pro vier Abbauaktionen um eins. Die Abbaukosten skalieren mit £mod_planet_clear_blocker_cost_mult£ §Y$MOD_COUNTRY_CLEAR_BLOCKER_COST_MULT$§!.\n\nAsteroidenabbau sollte Ihr primärer Expansionsfokus sein. Systeme mit abbaubaren Asteroiden werden in ihrem Galaxiekarten-Tooltip angezeigt:\n\n\"$frameworld_has_harvestable_asteroid$\" zeigt Asteroiden ohne Ressourcenvorkommen an, ideal für den Abbau.\n\"$frameworld_has_harvestable_asteroid_2$\" zeigt an, dass nur noch Asteroiden mit Ressourcenvorkommen übrig sind, deren Abbau Sie möglicherweise verzögern möchten.\n\"$frameworld_has_harvestable_asteroid_3$\" zeigt an, dass nur noch Asteroiden mit strategischen Ressourcenvorkommen übrig sind, die am wenigsten für den Abbau geeignet sind."
  
  giga_frameworld_docs_outposts:0 "3. $giga_frameworld_outpost_plural$"
  giga_frameworld_docs_outposts_desc:0 "Statt Kolonien können §Y$giga_frameworld_outpost_plural$§! auf bewohnbaren Welten errichtet werden, die mehrere Boni bieten, vor allem eine deutliche Steigerung der £mod_planet_pop_assembly_reduction£ §YBevölkerungsproduktion§!. Die Ressourcenproduktion der Außenposten variiert je nach Eigenschaften und Klasse des Wirtsplaneten, mit speziellen Erträgen von fortgeschrittenen Planetentypen. Außenposten sollten wann immer möglich errichtet werden."
  
  giga_frameworld_docs_districts:0 "4. Bezirke"
  giga_frameworld_docs_districts_desc:0 "Viele zusätzliche Bezirkstypen, die §YRaffinerien§! und §YStufe 2 Gebäuden§! entsprechen, können durch Erforschung der Technologien freigeschaltet werden, die die entsprechenden Gebäude freischalten.\n\nDie Erforschung von £society£ §Y$tech_paradise_dome$§! ist besonders wichtig für §Y$civic_machine_servitor$§! Reiche, da der Platz für §Y$building_organic_sanctuary$§! Gebäude begrenzt ist."
  
  giga_frameworld_docs_conquest:0 "5. Eroberung"
  giga_frameworld_docs_conquest_desc:0 "Eroberte Welten werden ihre Bevölkerung mit einer Rate von §Y4 Einheiten pro Monat§! zur §Y$pc_giga_frameworld$§! umsiedeln. Wenn sie leer sind, wird automatisch ein §Y$giga_frameworld_outpost$§! über der ehemaligen Kolonie errichtet.\n\nWelten, die von §Y$pc_giga_frameworld$§! Reichen erobert wurden, haben ihre §Y$giga_frameworld_outpost_plural$§! zerstört. Zerstörte Außenposten können repariert werden, wenn das System zurückerobert wird."
  
  giga_frameworld_docs_stations:0 "6. Verteidigungsstationen"
  giga_frameworld_docs_stations_desc:0 "Die §Y$pc_giga_frameworld$§! hat mehrere Verteidigungsstationen um sich herum, die mit jeder Stufe der §YSternenbasis Technologie§! stärker werden. Wenn eine Verteidigungsstation zerstört wird, kann sie über einen Planetaren Beschluss repariert werden.\n\nDer Abschluss des §Y$giga_frameworld_maginot$§! Verbesserungsbeschlusses fügt drei weitere Stationen hinzu."
  
  giga_frameworld_docs_disabled:0 "7. Deaktivierte Inhalte"
  giga_frameworld_docs_disabled_desc:0 "Mehrere bewohnbare Megastrukturen und die Technologien zu ihrer Freischaltung sind für §Y$pc_giga_frameworld$§! Reiche §Ynicht verfügbar§!. §EAufgrund von Spielbeschränkungen werden nicht verfügbare Megastrukturen weiterhin bei den verfügbaren Technologien aufgelistet.§!\n\n$giga_fwm$ Megastruktur gesperrt\n$giga_fwa$ Aufstiegsvorteil gesperrt\n$giga_fwt$ Technologie gesperrt\n\n$name_alderson$ $giga_fwm$$giga_fwa$\n$name_ringworld_behemoth$ $giga_fwm$\n$name_birch$ $giga_fwm$$giga_fwa$\n$name_eq_shipyard$ $giga_fwm$\n$name_ringworld_gargan$ $giga_fwm$\n$habitat_0$ $giga_fwm$\n$name_interstellar_hab$ $giga_fwm$$giga_fwt$\n$name_interstellar_ring$ $giga_fwm$$giga_fwt$\n$name_discomoon$ $giga_fwm$$giga_fwt$\n$name_maginot$ $giga_fwm$\n$pc_virtual_reality$ $giga_fwm$$giga_fwt$\n$name_orbital_arcology$ $giga_fwm$\n$name_orb_elysium$ $giga_fwm$$giga_fwt$\n$name_penrose_ring$ $giga_fwm$$giga_fwt$\n$pc_ringworld_habitable$ $giga_fwm$\n$name_upgrade_ringworld$ $giga_fwm$\n$name_ringworld_titanic$ $giga_fwm$"
  giga_fwt:0 "£job_researcher£"
  giga_fwa:0 "£mod_country_ascension_perks_add£"
