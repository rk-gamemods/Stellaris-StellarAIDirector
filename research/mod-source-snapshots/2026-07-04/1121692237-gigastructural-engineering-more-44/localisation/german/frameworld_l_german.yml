  # outpost planet types
  pc_giga_frameworld_outpost_planet:0 "Rahmen Außenpostenwelt"
  pc_giga_frameworld_outpost_planet_desc:0 "Eine bewohnbare Welt, derzeit überwacht von einer großen Raumstation. Expeditionsgruppen von der Station besuchen regelmäßig die Oberfläche, führen Untersuchungen durch und betreiben leichten Ressourcenabbau.\n\nKeine aktiven permanenten Siedlungen sind auf der Oberfläche zu finden."
