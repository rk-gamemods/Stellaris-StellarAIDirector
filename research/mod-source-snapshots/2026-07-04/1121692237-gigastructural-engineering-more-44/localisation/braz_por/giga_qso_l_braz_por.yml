  quasi_stellar_gateway_off:99 "Q.S.O. Gateway"
  quasi_stellar_gateway_off_DESC:0 "Semelhante em princípio ao gateway de$name_ndb$, este portal através do subespaço permite a transferência instantânea de enormes quantidades de energia."
  quasi_stellar_gateway_off_MEGASTRUCTURE_DETAILS:99 "$quasi_stellar_gateway_off_DESC$"
  
  quasi_stellar_gateway_on:0 "Gateway QS-O ativo"
  quasi_stellar_gateway_on_DESC:0 "Semelhante em princípio ao gateway de$name_ndb$, este portal através do subespaço permite a transferência instantânea de enormes quantidades de energia."
  
  quasi_stellar_obliterator_5:99 "$name_quasistellar$"
  quasi_stellar_obliterator_5_DESC:0 "Um$name_quasistellar$completo e totalmente operacional. Extraindo energia dos jatos polares do Quasar, do disco de acreção e do processo de penrose, esta hiperema gigantesca é capaz de desencadear a fúria de uma galáxia inteira de energia estelar em seu infeliz alvo. "
  
  quasi_stellar_obliterator_6:0 "Painel de controle QS-Obliterator"
  quasi_stellar_obliterator_6_DESC:0 "Abra o painel de controle da hiper-arma, para dispará-lo ou configurá-lo. "
  
