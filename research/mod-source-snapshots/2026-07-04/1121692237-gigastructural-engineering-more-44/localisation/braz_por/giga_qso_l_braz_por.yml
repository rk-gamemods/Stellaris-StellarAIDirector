  giga_qso.008.name:99 "$name_quasistellar$: Parameters"
  giga_qso.008.desc:99 "Here, you can manage the power output/consumption of the Q.S.O. itself.\n\nIncreasing the §YCharging Rate§! of the Q.S.O. will increase its £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§! output at the expense of a higher £energy£ §Y$energy$§! upkeep.\n\nDecreasing the charging rate will decrease its £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§! output, in return, the Q.S.Os £energy£ §Y$energy$§! upkeep will be reduced, nullified or even turned into £energy£ §Y$energy$§! production.\n\nYou can also dump various resources, such as £minerals£§Y$minerals$§!, £food£§Y$food$§!, £consumer_goods£ §Y$consumer_goods$§!, £alloys£ §Y$alloys$§!, £giga_sr_bulk_matter£ §Y$giga_sr_bulk_matter$§! and §Rothers...§! into the black hole below to quickly gain small amounts of £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§!."
  
  giga_qso.009.name:99 "$name_quasistellar$: Resource Dumping"
  giga_qso.009.desc:99 "Here, you can dump various resources, such as £minerals£§Y$minerals$§!, £food£§Y$food$§!, £consumer_goods£ §Y$consumer_goods$§!, £alloys£ §Y$alloys$§!, £giga_sr_bulk_matter£ §Y$giga_sr_bulk_matter$§! and §Rothers...§! into the black hole below to quickly gain small amounts of £giga_sr_quasaric_energy£ §Y$giga_sr_quasaric_energy$§!, please "
  
  giga_qso.008.dump:99 "Dump Resources..."
  
