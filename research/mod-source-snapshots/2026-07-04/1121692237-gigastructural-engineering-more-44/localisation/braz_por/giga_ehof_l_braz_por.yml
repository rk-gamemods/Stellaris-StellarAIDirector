  ### Star ###
  ############
  # Anomaly
  code_6_cat:0 "Código da realidade - Estrela"
  code_06_category_desc:0 "Outra transmissão do$ehof_epcs$foi recebida por§H[this.GetName]§ !, dentro do sistema§H[root.solar_system.GetName]§!. A funcionalidade dos navios foi restaurada e a localização do a fonte determinada. A estrela§H[from.from.GetName]§! \n \n. A localização exata no planeta ou dentro dele precisa ser determinada por uma investigação. "
  
  # Anomaly Success (Creates Dig site)
  # to fix: this is always a brown dwarf?
  ehof_reality_code.601.name:0 "Código da realidade - Estrela"
  ehof_reality_code.601.desc:0 "A localização do objeto amplificador em§H[from.from.GetName]§! foi determinada. \n \nAtingir este objeto amplificador será uma tarefa extremamente difícil, porque ele está localizado dentro a estrela, 74650,7 quilômetros abaixo da superfície da estrela. Densidades incríveis e temperaturas extremas tornarão este projeto extremamente difícil. O equipamento necessário precisa ser fabricado primeiro. \n \nOs custos e o investimento de tempo deste projeto não são previsíveis, mas completar a enigmática sequência do código-mestre e chegar à origem de$ehof_epcs$pode valer a pena. "
  
  # Initial
  code6_digsite:0 "Código da realidade - Escavação estelar"
  code6_digsite_desc:0 "O equipamento necessário para o projeto em§H[code_world_planet.GetName]§! está pronto para implantação. Devido ao fato de o amplificador estar localizado dentro da zona convectiva de uma estrela, uma forma não convencional de alcançar o objeto precisa ser tomado. "
  
  # Stage 1
  ehof_reality_code.611.name:0 "Código da realidade - Escavação estelar I"
  ehof_reality_code.611.desc:0 "Para chegar à localização do amplificador, uma instalação especializada foi construída acima da fotosfera de§H[code_world_planet.GetName]§ !, exatamente acima da localização do objeto. As pressões e o calor intensos dentro de uma estrela, impossibilita uma escavação convencional. \n \nA instalação usará uma âncora gigantesca e ultra-resistente ao calor, que será lançada na fotosfera da estrela. Ela será empurrada através do material das fotosferas até chegar perto de o local onde os geradores de campo eletromagnético manterão a âncora na posição. \n \nA conexão da âncora com a instalação, será então usada como uma linha para uma unidade de elevador especializada, que seguirá a linha até atingir a fonte. \n \nA âncora agora está pronta para ser implantada. "
  
  # Stage 2
  ehof_reality_code.612.name:0 "Código da realidade - Escavação estelar II"
  ehof_reality_code.612.desc:0 "A âncora alcançou o local da fonte. Ela foi ancorada e a conexão com a instalação estabilizada. \n \nA unidade de elevador pode agora ser implantada."
  
  # Stage 3
  ehof_reality_code.613.name:0 "Código da realidade - Escavação estelar III"
  ehof_reality_code.613.desc:0 "A unidade de elevador relatou que atingiu o objeto amplificador. Como dentro dos planetas anteriores, um campo de força cria um vazio de espaço ao redor do objeto amplificador, mas em vez de impedir que o material da crosta esmague o amplificador objeto, ele agora impede que a atmosfera e a pressão dele o façam. A tripulação está pronta para realizar as etapas necessárias para entrar no objeto. "
  
  # Stage 4
  ehof_reality_code.614.name:0 "Código da realidade - Escavação estelar IV"
  ehof_reality_code.614.desc:0 "A tripulação conseguiu acessar o amplificador e extrair outro fragmento da sequência de código-mestre$ehof_epcs$. \n \nCom este fragmento final em nossa posse, poderemos finalmente monte a sequência de código mestre$ehof_epcs$! A sequência completa nos permitirá viajar para a origem de$ehof_epcs$, onde podemos descobrir qual é o propósito de$ehof_epcs$, os objetos amplificadores e$PGATE_GALACTICSS$. \n \nEm relação ao$PGATE_GALACTICSS$. A sequência do código-mestre completo nos permitiu acesso total ao banco de dados deste amplificador. As novas informações que a tripulação conseguiu reunir, finalmente nos revelaram a natureza da energia etérea que impulsiona$ehof_sm$e, portanto,$PGATE_GALACTIC$e os amplificadores.$ehof_sm$pode fazer uso de energia de vácuo local, que pode absorver se não houver fonte de energia mais potente nas proximidades ou se a energia principal não for mais distribuída. \n \nDisse que a fonte de energia parece ser a origem de t O padrão enigmático. O$ehof_sm$recebe energia da origem, transmitindo-a pela própria mortalha. A energia que$ehof_sm$recebe é a energia da mortalha, o que dá origem à hipótese de que a origem é uma entidade da natureza da mortalha. \ N \nTambém pode ser possível que a mortalha seja apenas um portador da energia e a origem apenas canalize o energia em toda a mortalha, que é convertida em energia da mortalha no processo. Independentemente disso, encontrar a origem agora se tornou ainda mais crucial, pois agora podemos não apenas descobrir qual é o propósito do padrão enigmático, dos amplificadores e do$PGATE_GALACTICSS$, mas também pode desbloquear o verdadeiro potencial de$ehof_sm$. \n \nA tripulaçãoda unidade de elevador está se preparando para a jornada de volta à superfície da estrela. "
  
  ###############################
  ### Final digsite (CPlanet) ###
  ###############################
  # Notification that a new system spawned
  ehof_reality_code.1000.name:0 "Código da realidade - A origem"
  ehof_reality_code.1000.desc:0 "Depois de anos procurando por todos os fragmentos da sequência de código-mestre$ehof_epcs$, finalmente conseguimos reunir peças suficientes para montá-la totalmente. \n \nOs amplificadores e$PGATE_GALACTICSS$, que foram encontrados espalhados pelos sistemas$ehof_cohesive$, são usados ​​para transferir$ehof_epcs$por toda a galáxia e além, para uma finalidade ainda desconhecida. O que já sabemos é o seguinte. Os amplificadores são capazes de criar massa quase negativa para um propósito desconhecido e estão usando$PGATE_GALACTICSS$para se comunicarem. O sinal através do qual eles se comunicam, a sequência de código$ehof_epcs$, é transmitido por ondas gravieletromagnéticas até atingir um$PGATE_GALACTIC$, que então reage a ele ou não reage a isso. \n \nIsso depende da frequência e amplitude de$ehof_epcs$e da intensidade da energia armazenada dentro da onda gravieletromagnética, que carrega$ehof_epcs$. Se$PGATE_GALACTIC$sim reagir, ele se transforma em um$PGATE_GALACTIC$e transmite o$ehof_epcs$para o sistema$ehof_cohesive$desejado. O propósito fundamental para tudo isso ainda é um mistério, mas a investigação da origem provavelmente nos revelará. \ N \nGraças à sequência do código-mestre, agora seremos capazes de criar uma conexão entre um$PGATE_GALACTIC$e a origem do padrão enigmático. \n \nAlém disso, com o conhecimento acumulado dentro dos amplificadores e o estudo do$PGATE_GALACTICS$, agora podemos pesquisar a tecnologia para fabricar$ehof_sm$e criar nosso próprio$PGATE_GALACTICS$! "
  
  # On entering the system
  ehof_reality_code.10001.name:99 "Stellar Eradicator"
  ehof_reality_code.10001.desc:0 "Finalmente alcançamos o sistema de origem de$ehof_epcs$, [root.GetStarName]. \n \nO sistema consiste em um enorme buraco negro e um único corpo celeste orbitando-o. Um tremendo esférico estrutura com um diâmetro de aproximadamente 15.000.000 quilômetros. A estrutura definitivamente não é de origem natural e parece estar sendo defendida por um navio que não encontramos antes, o Erradicador Estelar. \n \nDevemos proceder com cautela, pois parece ser hostil e fortemente armado! A derrota desta nave pode ser necessária, pois provavelmente nos impedirá de nos aproximar do objeto esférico. "
  
  # On killing the eradicator
  ehof_reality_code.10002.name:0 "Erradicador erradicado"
  ehof_reality_code.10002.desc:0 "Assim como parecia que íamos vencer a batalha contra o Erradicador Estelar, ele simplesmente desapareceu sem deixar vestígios. Não há indicação de para onde foi ou se pode retornar. \n \nIndependentemente, nós agora podemos retomar nossa missão, o motivo pelo qual viemos aqui para começar. O objeto esférico que provavelmente é a origem do padrão enigmático. \n \nAs varreduras visuais e térmicas da superfície mostram que ela está perpetuamente em movimento e mudando entre muitos estados diferentes da matéria. Não é sólido, nem líquido, nem gasoso, nem um plasma. É tudo ao mesmo tempo! Mesmo estados de energia ultra-alta ou ultra-baixa da matéria parecem existir na composição da superfície, como condensados ​​de Bose-Einstein, matéria degenerada e até mesmo matéria fotônica. \n \nA superfície também brilha sozinha de vez em quando, em locais diferentes, provavelmente por causa da decomposição da matéria fotônica e das constantes transições de fase. Com base em nosso conhecimento sobre$ehof_sm$e o fato isso tudo As outras estruturas primordiais são feitas dele, é provável que a superfície seja feita do mesmo material. As tentativas de verificar esta hipótese, infelizmente, mostram-se inúteis, pois a composição da superfície é impossível de determinar com scanners, devido às constantes e extremamente rápidas transições de fase. O que é digno de nota é que parece possuir esquemas de cores específicos, que são os mesmos em quase toda a construção. Um ouro-prata e laranja. Como tudo isso funciona é absolutamente desconhecido. \ N \nDuas áreas circulares, que só podem ser definidas como os 'pólos' desta esfera, porque as esferas perfeitas não têm pólos, são distintas da estrutura da superfície principal. Eles têm um diâmetro de aproximadamente 2 milhões de quilômetros e parecem ser feitos de um material sólido e cristalino com uma cor semelhante ao bronze. Ao contrário do resto da superfície, os pólos são estáticos e não se alteram nem um pouco. No centro desses pólos, algum tipo de sigilo grande, com formato semelhante aos amplificadores e os sigilos em$PGATE_GALACTICS$, está localizado. Pode ser algum tipo de símbolo representativo dos criadores desta construção, os amplificadores e o$PGATE_GALACTICSS$. \ N \nAssim como com os objetos amplificadores, a superfície não podeser penetrado por scanners, mas ao contrário deles sua temperatura não é definível, devido às fases em constante mudança da superfície. \n \nUma entrada não é identificável, se houver, mas pode ser semelhante aos objetos amplificadores, cujas entradas apenas 'se manifesta' sob condições específicas. \n \nUm estudo intenso da estrutura será necessário para determinar sua função e encontrar um caminho para ela, o que provavelmente será necessário para determinar a função em primeiro lugar. Nossos pesquisadores decidiram nomear a construção$ehof_the_sphere_named$. "
  ehof_reality_code.10002.a:0 "Isso é incrível!"
  
  # Initial
  code_final_digsite:0 "Código da realidade -$ehof_the_sphere_named$"
  code_final_digsite_desc:0 "Encontrar um caminho para$ehof_the_sphere$parece uma tarefa impossível. Estimular ou penetrar a superfície com radiação ou força mecânica pode ser inútil, assim como com os amplificadores. \n \nA superfície pode não possuir temperatura definida como um todo. , mas os componentes separados da própria superfície sim. Suas temperaturas provavelmente variam nas ordens de temperaturas extremamente baixas e extremamente altas. \n \nTodo tipo de equipamento que seria usado apenas para tocar a superfície provavelmente seria destruído em um instantâneo. Em vez disso, nossos pesquisadores querem usar a abordagem de usar$ehof_epcs$. Era a chave para obter acesso aos amplificadores e$PGATE_GALACTICS$, então pode ser a chave para$ehof_the_sphere$também. No entanto, eles não usarão apenas qualquer sequência de código de padrão enigmático, mas a sequência de código-mestre. É provável que, se$ehof_the_sphere$reagir a$ehof_epcs$, será para a sequência de código-mestre. \n \nDevido ao imme Se o tamanho de$ehof_the_sphere$for$ehof_the_sphere$, um único transmissor provavelmente não será suficiente para ele, caso ele possa realmente reagir a$ehof_ep$. No entanto, apenas uma instalação será construída para começar. Será um transmissor direcional para$ehof_epcs$e emitirá$ehof_ep$na superfície por ondas gravieletromagnéticas. \ N \nA construção da instalação pode começar agora. "
  
  # Stage 1
  ehof_reality_code.1001.name:0 "Código da realidade -$ehof_the_sphere_named$I"
  ehof_reality_code.1001.desc:0 "A instalação do transmissor foi parcialmente bem-sucedida em sua tarefa de abrir uma entrada para$ehof_the_sphere$. \n \nAs primeiras vezes em que foi utilizado, emitiu$ehof_epcs$por meio de ondas gravitacionais, assim como com os amplificadores, mas essas tentativas permaneceram sem nenhuma reação de$ehof_the_sphere$. Depois disso, os pesquisadores usaram ondas gravieletromagnéticas, pois também foi necessário usá-las para$PGATE_GALACTICS$. Desta vez,$ehof_the_sphere_named$reagiu, mesmo que apenas por um curto período de tempo. Em um dos pólos, um entalhe relativamente pequeno com um diâmetro de 1 quilômetro se manifestou, mas desapareceu logo depois. Parece que o estímulo não foi suficiente. \n \nA construção de instalações adicionais pode ser necessária para abrir uma entrada estável para$ehof_the_sphere$. "
  
  # Stage 2
  ehof_reality_code.1002.name:0 "Código da realidade -$ehof_the_sphere_named$II"
  ehof_reality_code.1002.desc:0 "Nosso enorme projeto em$ehof_the_sphere$fez um progresso essencial. \n \nApós instalar e implantar várias instalações emissoras adicionais, o número de entalhes aumentou. Parece que o número de entalhes aumenta exponencialmente com o número de estímulos aplicados à superfície. Após a instalação de 5 recursos adicionais, exatamente 216 entalhes se manifestaram na superfície. Eles se alinharam circularmente do centro para o exterior, formando um círculo preenchido com entalhes uniformemente ordenados. \n \nCom base no fato de que 1 a instalação tinha 1 entalhe e 5 instalações têm 243 entalhes, pode ser determinado que o número de entalhes aumenta com a potência de três. O tamanho dos próprios entalhes não mudou. \n \nCom esta taxa de aumento, levará 126 instalações no total até que a quantidade de entalhes e seu alinhamento cobririam todo o pólo. Construir mais 110 dessas instalações caras seria um pesadelo econômico e nossos cientistas são c convencido de que aumentar o número até que todo o pólo seja coberto, não levaria à manifestação de uma entrada. Eles acreditam que a quantidade de sinais emitidos pelas instalações por si só não é suficiente, à semelhança de como os$PGATE_GALACTICS$não reagem simplesmente aos$ehof_epcs$, mas apenas em condições específicas. Além da quantidade, a intensidade, frequência e amplitude da transmissão também são importantes. A quantidade e a qualidade da transmissão precisam ser corretas, para acionar a manifestação de uma entrada. \ N \nAs instalações agora começarão a emitir a sequência de código mestre$ehof_epcs$com várias intensidades e configuração em$ehof_the_sphere$, para verifique esta hipótese. "
  
  # Stage 3
  ehof_reality_code.1003.name:0 "Código da realidade -$ehof_the_sphere_named$III"
  ehof_reality_code.1003.desc:0 "A hipótese de nossos pesquisadores em$ehof_the_sphere$provou queesteja correto. \n \nAs instalações do transmissor estavam emitindo a sequência de código$ehof_eps$com várias intensidades e configuração em$ehof_the_sphere$e os entalhes não apenas se manifestaram, mas também mudaram de tamanho. \n \nApós um longo período de tempo, em que as instalações tiveram que testar inúmeras variações diferentes, eles foram finalmente capazes de determinar a correta. Com a intensidade e configuração certas, os entalhes se fundiram em um grande buraco, com um diâmetro de 240 quilômetros, e$ehof_the_sphere$finalmente aberto. \ N \nNossos cientistas foram capazes de descobrir que aplicando a intensidade certa com um diferente número de instalações, aumenta ou diminui o tamanho da entrada. Este mecanismo provavelmente permite uma infinidade de tamanhos diferentes para a entrada de$ehof_the_sphere$, talvez para transportar cargas maiores ou menores em$ehof_the_sphere$. Com base no tamanho de$ehof_the_sphere$, poderiam ser planetas inteiros ou até estrelas! O que quer que seja que os criadores de$ehof_the_sphere$transportados pela entrada não são importantes agora, apenas que desvendemos os segredos de$ehof_the_sphere$. \ N \nInfelizmente, atrás da entrada, outro mecanismo enorme, semelhante ao que está dentro do objetos amplificadores, está localizado. Parece que primeiro temos que encontrar uma maneira de resolver o mecanismo, para finalmente obter acesso a$ehof_the_sphere$. \ N \nNossos pesquisadores acham que será necessário implantar assistência computacional avançada para resolver o mecanismo "
  
  # Stage 4
  ehof_reality_code.1004.name:0 "Código da realidade -$ehof_the_sphere_named$IV"
  ehof_reality_code.1004.desc:0 "Para descobrir como resolver os mecanismos de entrada de$ehof_the_sphere$, nossos cientistas implantaram um conjunto de inteligência extremamente avançada para descobrir como resolvê-lo. \n \nApós muitos dias de cálculos e análises , as inteligências eram de fato capazes de resolver o mecanismo. O único problema é que, para aplicar a solução para os mecanismos, a força mecânica e a radiação precisam ser aplicadas em dezenas de milhares de locais diferentes no mecanismo. \n \nO maquinário pois esta tarefa precisa ser desenvolvida e construída primeiro. Então, finalmente seremos capazes de abrir$ehof_the_sphere$! "
  
  # Stage 5
  ehof_reality_code.1005.name:0 "Código da realidade -$ehof_the_sphere_named$V"
  ehof_reality_code.1005.desc:0 "Finalmente concluímos a construção do maquinário necessário para resolver o mecanismo de entrada de$ehof_the_sphere$. \n \nMilhares de drones diferentes com ferramentas diferentes foram construídos, a fim de interagir com todos os locais diferentes . \n \nNão se sabe se todos os estímulos precisam ser aplicados de uma vez ou em uma ordem específica. As inteligências observarão todo o processo, a fim de determinar como os estímulos devem ser aplicados. \n \nA implantação do drones agora podem começar "
  
  # Stage 6
  ehof_reality_code.1006.name:0 "Código da realidade -$ehof_the_sphere_named$VI"
  ehof_reality_code.1006.desc:0 "Funcionou, conseguimos resolver o mecanismo de entrada para abrir$ehof_the_sphere$! \n \nApós incontáveis ​​tentativas, as inteligências conseguiram determinar a ordem que os drones precisavam para aplicar os diferentes estímulos em , era coerente com a frequência harmônica das ondas gravitacionais, que o buraco negro$ehof_the_sphere$está orbitando, está emitindo. \n \nPor que os criadores de$ehof_the_sphere$garantiriam o mecanismo desta forma é absolutamente desconhecido, mas não realmente importa. \n \n$ehof_the_sphere$está finalmente aberto. Podemos desvendar todos os seus mistérios! "
  
  ###########################################################################
  ################# 1/6 reality code excavations completed ##################
  ###########################################################################
  ehof_reality_code.005.name:0 "Código da realidade -$ehof_sm$"
  ehof_reality_code.005.desc:0 "Após o retorno da tripulação, tanto o fragmento da sequência do padrão enigmático quanto a amostra da substância que compõe o amplificador, foram passados ​​para nossas instituições científicas. Com a ajuda das amostras de dentro do amplificador , pudemos aprender muito sobre a substância estranha que se auto-reproduz. Ela é composta por uma série de nanomáquinas hiperavançadas, que são capazes de se replicar e, juntas, podem imitar muitas formas diferentes de matéria, física e propriedades químicas. \n \nA forma como a substância se comporta, quase dá a impressão de que a substância não está apenas viva, mas também senciente. Ela é capaz de reagir a inúmeras condições ambientais diferentes, com todas as suas reações sendo dedicadas à adaptação à condição e garantindo sua integridade. Diferentes formas de reações foram observadas. \n \nReplicação, rearranjo e remodelagem, a fim de tornar a substância imune a qualquer tipo de dano físico ou químico efeito. Calor, frio e corrosividade extremos, campos eletromagnéticos intensos, diferentes formas de radiação, pressão mecânica, lasers e até gravidade. Taqui parece não haver limite superior para a eficiência de suas habilidades adaptativas, pelo menos nenhum que possamos determinar. \n \nAlém de sua capacidade de se transformar e multiplicar para se preservar, a estrutura também é capaz de 'crescer'. Suas habilidades replicativas vêm em duas formas diferentes. A primeira forma de replicação aparece quando a substância precisa se adaptar aos efeitos ambientais prejudiciais, nos quais parece ser capaz de se replicar do nada, talvez absorvendo a energia ou matéria dos próprios efeitos prejudiciais ou usando uma energia indetectável fonte. \n \nNeste caso, a substância não ou apenas aumenta seu volume de forma insignificante. A segunda forma de replicação aparece, quando a substância se adaptou a quaisquer efeitos prejudiciais e está em contato ou próxima a matéria ou energia disponível. Ele os absorve para aumentar seu volume, para 'crescer' e, aparentemente, pode absorver quase todas as formas conhecidas de matéria e energia. \ N \nApenas a energia gravitacional, a Matéria Escura e a Massa Quasi-Negativa não puderam ser absorvidas. Qual é o propósito desse 'crescimento', não se sabe, mas com base nos relatos sobre o amplificador, isso não aconteceu dentro do próprio amplificador, embora nossa equipe e suas ferramentas estivessem em contato direto com a substância. Parece que a substância é capaz de 'ter consciência' sobre seu ambiente e, dependendo das circunstâncias, reagir de forma diferente. \ N \nNossos cientistas decidiram nomear a substância '$ehof_sm$', em analogia ao Metal Vivo, devido ao seu semelhanças. Embora ainda não saibamos quase nada sobre a substância ou melhor, como ela funciona, nossa comunidade científica está convencida de que ela possui um potencial tecnológico inimaginável e querem intensificar nossas pesquisas sobre a substância e também os amplificadores. Não apenas para descobrir mais sobre o padrão enigmático, mas também sobre o$ehof_sm$. \ N \nOs usos para$ehof_sm$podem ser limitados por enquanto, pois ainda sabemos muito pouco sobre ele, para utilizá-lo em toda a sua extensão , mas nossos cientistas desenvolveram projetos para a construção de instalações especializadas, dedicadas à reprodução de$ehof_sm$, alimentando-o com minerais e energia. Além disso, um projeto para investigar um$PGATE_GALACTICS$foi solicitado, pois nossos cientistas acreditam que eles podem ter sido construídos pelas mesmas entidades que construíram os amplificadores e, portanto, também poderiam ser compostos por$ehof_sm$. "
  ###########################################################################
  ################# 3/6 reality code excavations completed ##################
  ###########################################################################
  
  ehof_reality_code.004.name:0 "Código da realidade - Ativação"
  ehof_reality_code.004.desc:0 "Graças ao conhecimento que pudemos coletar dentro dos amplificadores, agora sabemos como ativar o$PGATE_GALACTICS$. \n \nNossos pesquisadores já começaram a desenvolver a tecnologia necessária para ativá-los. Instalações que serão capazes de transmitir ondas gravieletromagnéticas e produzir a intensidade necessária para o conteúdo de energia da transmissão, estão se desenvolvendo. \n \nEles projetarão$ehof_epcs$com a frequência e amplitude certas, então os sistemas$PGATE_GALACTICS$reagirão em conformidade e ativá-lo. É totalmente desconhecido o que exatamente acontece quando um$PGATE_GALACTIC$é ativado. Tudo o que sabemos é como fazê-lo, e agora podemos realmente começar a fazê-lo! "
  
  #########################################
  ### Hieroglyphics (EHOF Precursor) ######
  #########################################
  ehof_megastructure.602.name:99 "Mysterious Geoglyphs"
  ehof_megastructure.602.desc:99 "A routine review of scanner data has unexpectedly revealed giant geoglyphs carved into a planet's surface. Repeating elements and the symbols' overall abstraction indicate that they are more likely a script than representations of lifeforms.\n\nDefinitely something worth investigating."
  ehof_megastructure.602.a:99 "They even spread beyond the horizon..." #very unforced reference
  
  ehof_precursor:0 "Hieróglifos"
  ehof_precursor_digsite_desc:0 "Existem hieróglifos gigantes na superfície de§H[from.Planet.GetName]§ !, muito parecidos com os círculos nas plantações, mas esculpidos na própria superfície. \n \nDefinitivamente algo que vale a pena investigar."
  
  ehof_megastructure.0051.name:0 "Hieróglifos I"
  ehof_megastructure.0051.desc:0 "A tripulação do§H[this.GetName]§! pousou imediatamente e começou a construir um local de escavação em torno do maior dos hieróglifos, situado ao sul de uma infinidade de montanhas que estão ao redor o pólo norte do planeta. \n \nOs pensamentos imediatos se voltam para descobrir o que são esses hieróglifos e quem os colocou lá. Após alguma deliberação, os cientistas começam a trabalhar testando amostras do ar e do solo e fazendo varreduras de superfície dos próprios hieróglifos. "
  
  ehof_megastructure.0052.name:99 "Mysterious Geoglyphs II"
  ehof_megastructure.0052.desc:0 "Algumas semanas se passaram desde que os cientistas em§H[from.Planet.GetName]§! pousaram e tentaram decifrar o que significam os hieróglifos ou quem poderia tê-los criado. \n \nDesencorajado pelo tempo já perdida no planeta, a equipe está perdida e declarou a missão um fracasso. Eles empacotaram o local da escavação e começaram a embarcar na nave prontos para partir. \n \n§H[this.leader.GetName]§! deu a ordem para deixar o planeta e o§H[this.GetName]§! começou a subir em órbita, mas conforme eles estavam subindo, a equipe de ciência notou o próprio glifoSeu navio tinha pousado por semanas estava brilhando muito levemente laranja, enquanto os outros não. "
  
  ehof_megastructure.0053.name:99 "Mysterious Geoglyphs III"
  ehof_megastructure.0053.desc:0 "§H[this.leader.GetName]§! interrompeu a subida e começou a descer mais uma vez e a névoa tornou-se um tom laranja mais forte quanto mais perto o navio chegava dela. \n \nPuzzled por Neste desenvolvimento, eles decidiram dar uma volta no planeta, voando sobre cada glifo em baixa altitude, observando-os iluminar conforme passavam. \n \nEventualmente todos os glifos foram acesos e permaneceram acesos, mas a tripulação ainda não é mais sábio sobre o que isso significava e decidiu pousar mais uma vez de volta ao local da escavação, onde, na superfície, era difícil dizer que estava brilhando laranja em tudo. "
  
  ehof_megastructure.00531.name:0 "Hieróglifos IV"
  ehof_megastructure.00531.desc:0 "Pouco depois de voltar à superfície de§H[from.Planet.GetName]§ !, a equipe de ciência começou a testar a atmosfera em torno dos glifos na esperança de revelar algum tipo de resposta, quando seus sensores detectaram uma atividade sísmica importante por um breve momento e todos os glifos pararam de brilhar ao mesmo tempo. \n \nPreocupados com o bem-estar da tripulação, eles embarcaram rapidamente no§H[this.GetName]§! e entraram em órbita. \n \nAssim que deixaram a atmosfera de§H[from.Planet.GetName]§ !, os sensores da nave detectaram um raio gigante de luz laranja viajando muito além de qualquer velocidade que pudemos alcançar. \n \nA luz em breve deixou uma faixa visível, mas a tripulação foi capaz de determinar o destino pretendido, devido à trajetória calculada e à velocidade do ferrolho. Devemos investigar o sistema para o qual ele parece estar se dirigindo. "
  
  EXPLORE_EHOF_PRECURSOR_NO_RUINED:0 "Parafuso Laranja"
  EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC:0 "Os sensores do navio detectaram um raio gigante de luz laranja viajando muito além de qualquer velocidade que pudemos alcançar. \ N \nA luz logo saiu do alcance visível, mas a tripulação foi capaz de determinar seu destino pretendido, devido ao trajetória calculada e velocidade do parafuso. Devemos investigar o sistema para o qual ele parece estar se dirigindo. "
  
  EXPLORE_EHOF_PRECURSOR_RUINED:99 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED$"
  EXPLORE_EHOF_PRECURSOR_RUINED_DESC:99 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC$"
  
  ehof_megastructure.0054_name:99 "Dead End"
  ehof_megastructure.0054_desc:99 "Having arrived in the system after the orange bolt reached it, it's nowhere to be seen...\n\nDespite all the time spent on this anomaly, there has been no real insight into what the geoglyphs were for, who made them, why they made them, or what the orange bolt was.\n\nHowever, after some investigation of the strange debris strewn around the system, it appears there was once some kind of megastructure here, probably destroyed over time by the black hole.\n\nInside the debris, our [Owner.GetScientistPlural] discovered a large and functional data cache, containing advanced technologies and knowledge related to wormhole stabilization.\n\nHowever, the most significant find was an extremely alien and otherworldly artifact. Studying the artifact is certainly going to be worth it."
  
  ehof_megastructure.0055_name:99 "The Machine"
  ehof_megastructure.0055_desc:99 "Having arrived in the system after the orange bolt reached it, it's nowhere to be seen - but there's a damaged structure cradled around the black hole at the system's center. Data retrieved from inside the structure revealed that, when it was operational, it could manipulate the black hole it's built on in order to open and stabilize wormholes. Our [Owner.GetScientistPlural] have named this structure the $ehof_ehof$, or $ehof_ehof_abr$ for short. \n\nDespite its decrepit and seemingly-abandoned state, the crew set out to check for any signs of life or clues as to what lead us here.\n\nAfter scanning, testing and contemplating the structure, it is clear there is no real insight into what the geoglyphs were for, who made them, why they made them, or what the orange bolt was.\n\nHowever, our examinations of the structure have revealed a great deal of advanced knowledge related to wormhole stabilization. Perhaps more significantly, we have found an arcane artifact of unknown purpose and origin that was installed in a prominent location within the facility. Our [Owner.GetScientistPlural] are certain we should study it further."
  
  STUDY_ARCANE_ARTIFACT_1:99 "Study the §BArcane Artifact§!"
  STUDY_ARCANE_ARTIFACT_1_DESC:99 "The arcane artifact we've discovered might shed some light on the orange bolt, as it could possibly be linked to it.\n\nThe artifact might hold other amazing secrets, just waiting to be uncovered.\n\n§R(This project is mandatory for unlocking the $ehof_ehof$!)§!"
  
  STUDY_ARCANE_ARTIFACT_2:99 "Study the §BArcane Artifact§!"
  STUDY_ARCANE_ARTIFACT_2_DESC:99 "The arcane artifact we've discovered in the destroyed $ehof_ehof$ could hold amazing secrets about the megastructure that are just waiting to be uncovered.\n\n§B(This project is mandatory for unlocking the $ehof_ehof$!)§!"
  
  STUDY_ARCANE_ARTIFACT_3:99 "Study the §BArcane Artifact§!"
  STUDY_ARCANE_ARTIFACT_3_DESC:99 "The arcane artifact we've discovered in the damaged $ehof_ehof$ might shed light on how exactly the megastructure worked.\n\n§B(This project is mandatory for restoring the $ehof_ehof$!)§!"
  
  ehof_anomaly.4321.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4321.desc:99 "Our long-term study of the arcane artifact has been quite informative, though most of it was spent confronting the artifact's bizarre properties.\n\nWhile it retains a particular octahedral main shape, its scale and mass independently oscillate to truly wild extremes. Our [Owner.GetResearchers] have recorded sizes as small as a datapad and as large as a modern cruiser, and masses between a single standard alloy unit and approximately an eighth of a standard rocky world's mass. The artifact's opacity and solidity vary in a similarly erratic fashion.\n\nThese factors lead our [Owner.GetScientistPlural] to believe that it is actually a higher-dimensional object partially anchored in our reality, and its rotation through those dimensions is responsible for the all strange effects we observe in our three-plus-one."
  #This event seems to be deprecated(4322), as a note for the future because of that it's just been brought to parity with 4324
  ehof_anomaly.4322.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4322.desc:99 "We have determined at least one of the artifact's functions: it is capable of stabilizing and manipulating wormholes.\n\nIt possesses the potential to stabilize and manipulate any type of wormhole in the universe, even the subatomic, short-lived virtual $ehof_wormholes_text$ that arise from the quantum fluctuations of spacetime itself.\n\nIt was probably utilized in the $ehof_ehof$ to drive the megastructure's wormhole manipulation.\n\nThe artifact might possess other functions, but due to its enigmatic nature, they will be hard to determine. Our [Owner.GetResearchers] aren't even sure if its erratic behavior is intentional, or if it is damaged somehow.\n\nRegardless, our [Owner.GetScientistPlural] believe that it should be possible to utilize the artifact for $ehof_wormhole_text$ stabilization, manipulation, and ultimately, travel. The destroyed $ehof_ehof$ could potentially be restored and re-established for that purpose."
  
  ehof_anomaly.4323.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4323.desc:99 "$ehof_anomaly.4321.desc$"
  
  ehof_anomaly.4324.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4324.desc:99 "We have determined at least one of the artifact's functions: it is capable of stabilizing and manipulating wormholes.\n\nIt possesses the potential to stabilize and manipulate any type of wormhole in the universe, even the subatomic, short-lived virtual $ehof_wormholes_text$ that arise from the quantum fluctuations of spacetime itself.\n\nIt was probably utilized in the $ehof_ehof$ to drive the megastructure's wormhole manipulation.\n\nThe artifact might possess other functions, but due to its enigmatic nature, they will be hard to determine. Our [Owner.GetResearchers] aren't even sure if its erratic behavior is intentional, or if it is damaged somehow.\n\nRegardless, our [Owner.GetScientistPlural] believe that it should be possible to utilize the artifact for $ehof_wormhole_text$ stabilization, manipulation, and ultimately, travel. The destroyed $ehof_ehof$ could potentially be restored and re-established for that purpose."
  
  r_arcane_manipulator_1:0 "$r_arcane_manipulator_1$"
  r_arcane_manipulator_1_desc:99 "Appearing to phase through reality itself, this otherworldly construct can stabilize and manipulate wormholes of any kind, including virtual $ehof_wormholes_text$."
  giga_relic_no_active:99 "This relic is purely a collectible and does not have any active effects."
  
  ehof_megastructure.0056_name:99 "Event Horizon"
  ehof_megastructure.0056_desc:99 "After exploring the damaged black hole structure, we have determined that it originally facilitated a unique form of interstellar travel.\n\nData retrieved from inside this so called \"$ehof_ehof$\" (or $ehof_ehof_abr$ for short), reveals it to be an ancient wormhole generator and stabilizer. While in and around the megastructure, we have uncovered a great deal of advanced knowledge related to wormhole stabilization.\n\nPerhaps more significantly, we have found an arcane artifact of unknown purpose and origin that was installed in a prominent location within the facility. Our [Owner.GetScientistPlural] are certain we should study it further."
  
