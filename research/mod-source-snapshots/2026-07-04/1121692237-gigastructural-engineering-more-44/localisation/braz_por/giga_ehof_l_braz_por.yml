  compound_invincible_3:99 "$compound_invincible$"
  compound_invincible_desc:99 "The $ehof_the_compound_text$ are as good as indestructible."
  compound_invincible_2_desc:99 "$compound_invincible_desc$ With the discovery of $tech_qnm_utilities$, they have become vulnerable."
