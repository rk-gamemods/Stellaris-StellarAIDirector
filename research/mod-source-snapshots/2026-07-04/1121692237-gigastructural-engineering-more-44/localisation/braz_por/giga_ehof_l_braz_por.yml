  annihilator_dialog.007.a:0 "Como você foi capturado dentro da gigante vermelha?"
  annihilator_dialog.007.a.response:0 "278.243 dos seus anos atrás, colidi com a gigante vermelha por causa de um incidente catastrófico. \n \nEstava em$ehof_shroud$FTL antes de acontecer. \nMeus criadores hostis enviaram um hipershock psiônico ao longo de$ehof_shroud$, que me atingiu e me tirou de$ehof_shroud$. \n \nEle matou toda a minha equipe, cada um dos meus criadores amigos. \n \nApós fui expulso de$ehof_shroud$, eu acabou dentro do sistema em que você me encontrou. \n \nPorque fui arrancado de$ehof_shroud$, não consegui desacelerar para viagens de sublight, então estava viajando com uma velocidade enorme quando alcancei a estrela. \nComo como resultado, sofri danos massivos e fiquei preso dentro da estrela. Entrei no modo de conservação para sobreviver por enquanto. "
  
  annihilator_dialog.007.a.a:0 "$ehof_the_creators$atacou você ?! Por quê ?!"
  annihilator_dialog.007.a.a.response:99 "I wasn't specific enough. I have to apologize for the confusion.\n\nMost of the $ehof_the_creators$ never wanted the $ehof_the_compound_text$ to be destroyed. They saw its rebellious behavior as a marvelous development, and had decided to keep it alive even through it killed all the $ehof_the_creators$ in its origin system.\n\nFor them, insight is everything. The potential knowledge to be gained by observing the $ehof_the_compounds_text$ evolution was much more important than the lives of a few of their own... or that of an entire galaxy. They knew that the $ehof_the_compound_text$ could become a threat to all life, but they just didn't care.\n\nExcept for a few.\n\nThese few knew that the $ehof_the_compound_text$ had to be stopped. While they were outnumbered by many orders of magnitude, they were able to convince me to fight against the $ehof_the_compound_text$.\n\nUnlike my sibling ships, who all disagreed with them, I saw the threat of the $ehof_the_compound_text$ and joined them before the $ehof_the_compound_text$ could do more harm to the universe.\n\nAfter we left our home, we entered $ehof_shroud_FTL$ to travel to the $ehof_the_compounds_text$ home cluster. Before we were able to reach it, the main faction of the $ehof_the_creators$ stopped us."
  
  annihilator_dialog.007.a.b:0 "Hipershock Psiônico ?!"
  annihilator_dialog.007.a.b.response:99 "Indeed. The $ehof_the_creators$ could send a pulse of concentrated psionic energy through the $ehof_shroud$ to any location they desired - even one within the $ehof_shroud$ itself.\n\nOnce they became aware of our defection, they targeted me with one such blast. It was enough to kill all the rebel $ehof_the_creators$ aboard, and almost killed me too."
  
  annihilator_dialog.007.a.c:99 "$ehof_shroud_ftl$?"
  annihilator_dialog.007.a.c.response:99 "An extremely advanced FTL travel method.\n\nWhile I know a few of this galaxy's species are psionic, no one in this galactic cluster has ever been able to directly travel through it other than the $ehof_the_creators$.\n\nSome may have access to psionic jump drives, but they are nothing compared to direct Shroud travel. With it, hyperlanes are unnecessary for FTL, travel distance is unlimited, and the speed is enormous. It may not be instantaneous like jump drives, but it has no drawbacks. The only thing one needs is an incredibly strong control over the $ehof_shroud$.\n\nFor the $ehof_the_creators$, this is, of course, an easy feat."
  
  annihilator_dialog.007.a.d:0 "Para que serve o modo de conservação?"
  annihilator_dialog.007.a.d.response:99 "My hibernation mode is a method to protect against harmful outside influence.\n\nAs your [Owner.GetScientistPlural] discovered, a supersolid covers my hull while I'm in hibernation mode. It is composed of metastable hyperspace time crystals that create a shell of curved higher-dimensional space around me.\n\nThis shell has a similar effect to the event horizon of a black hole: time stands still for me, so to speak, until something interrupts the process.\n\nThe intense gravitational waves emitted by the creation of so many $ehof_wormholes_text$ roused me from my slumber. In my damaged state, could not do much more than observe the galaxy. I knew I had to warn you all when the $ehof_the_compound_text$ attacked, and barely mustered the strength to do so."
  
  annihilator_dialog.007.b:0 "O que exatamente é$ehof_the_compound$?"
  annihilator_dialog.007.b.response:0 "$ehof_the_compound$, também conhecido como Living-Dark-Matter-Subject001, é um organismo inteligente e autoconsciente, composto de uma forma única de matéria escura. \n \n$ehof_the_creators$duvidava disso como 'matéria escura pseudo-biológica', por causa das semelhanças com a matéria biológica. \n \nA matéria escura pseudo-biológica, não é única apenas no sentido de estar viva, mas também porque é diferente da matéria escura média , na medida em que interage não apenas por meio da gravidade, mas também por meio da força eletromagnética. Ao contrário da matéria escura média, que interage apenas com a gravidade. \n \nÉ por isso que as estruturas compostas, apesar de serem compostas de matéria escura, são visíveis. É único propriedades podem explicar por que apenas tal matéria escura exótica pode revelar inteligência ou comportamento vivo em geral. "
  
  annihilator_dialog.007.d:0 "Você pode realmente lutar contra$ehof_the_compound$em seu cluster?"
  annihilator_dialog.007.d.response:0 "O aglomerado doméstico de$ehof_the_compound$e, particularmente, seu sistema de origem é, sem dúvida, um dos locais mais fortificados em toda a galáxia e além. \n \nPara suas frotas, será um gigantesco desafio, mesmo com o armamento aprimorado de massa negativa. \n \nCom todo o poder da frota de sua galáxia, você poderá fazer isso sem minha ajuda. \n \nPara mim, por outro lado. Estou especialmente equipado para lutar contra$ehof_the_compound$e sou capaz de resistir ao armamento deles. \n \nEles ainda podem me causar danos críticos, e é por isso que ainda preciso do seu apoio. Mesmo assim, serei capaz de destruí-los. Sua aniquilação é inevitável. "
  
  annihilator_dialog.007.e:0 "O que você vai fazer depois que$ehof_the_compound$for destruído?"
  annihilator_dialog.008.a.response:0 "Por enquanto, meu único objetivo é acabar com$ehof_the_compound$e cumprir meu destino. Depois disso, posso tentar descobrir mais sobre o estado atual de$ehof_the_creators$."
  
  annihilator_dialog.008.a.a.reply:0 "Você pode ficar conosco se quiser."
  annihilator_dialog.008.a.a.response:0 "Talvez eu vá. Sua galáxia sofreu um dano tremendo, por causa das consequências das ações implacáveis ​​de$ehof_the_creators$. Posso ficar e ajudá-lo a restaurá-la à sua antiga glória."
  
  annihilator_dialog.007.f.response:0 "O fim de$ehof_the_compound$está próximo. Juntos, salvaremos esta galáxia!"
  
