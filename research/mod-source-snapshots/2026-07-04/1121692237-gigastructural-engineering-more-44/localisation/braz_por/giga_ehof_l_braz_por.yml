  giga_dialog.11101.name:99 "$ehof_sm_forge_phase0$"
  giga_dialog.11101.desc:0 "Os materiais de construção foram entregues e o site fora de$ehof_the_sphere_named$está preparado para o início do trabalho em nosso primeiro e provavelmente apenas$ehof_sm_forge_phase4$."
  giga_dialog.11101.a:0 "Excelente"
  
  giga_dialog.11102.name:99 "$ehof_sm_forge_phase1$"
  giga_dialog.11102.desc:0 "Pretendemos maximizar a produção da forja, como tal incluímos complexos vivos gigantes dentro da própria forja."
  giga_dialog.11102.a:0 "Vamos para a próxima fase!"
  
  giga_dialog.11103.name:99 "$ehof_sm_forge_phase2$"
  giga_dialog.11103.desc:0 "O primeiro estágio de fabricação da$ehof_sm_forge_phase4$está concluído. A próxima fase será espelhada no lado oposto da forja."
  giga_dialog.11103.a:0 "Precisamos de mais!"
  
  giga_dialog.11104.name:99 "$ehof_sm_forge_phase3$"
  giga_dialog.11104.desc:0 "A forja agora está funcionando com 50% da capacidade! Devemos começar a trabalhar no estágio final o mais rápido possível."
  giga_dialog.11104.a:0 "Continue com isso."
  
  giga_dialog.11105.name:99 "$ehof_sm_forge_phase4$"
  giga_dialog.11105.desc:0 "$ehof_sm_forge_phase4$está completo. Fornecendo ao nosso império reservas massivas de$ehof_sm$e$ehof_qnm$. Isso certamente será útil para a manufatura de armas."
  giga_dialog.11105.a:0 "Excelente"
  pc_ehof_black_hole:99 "$pc_black_hole$"
  pc_ehof_black_hole_desc:99 "$pc_black_hole_desc$"
  
  pc_wh_star:0 "Buraco Branco"
  pc_wh_star_plural:99 "White Holes"
  pc_wh_star_desc:0 "Uma contraparte do buraco negro. Um buraco branco emite quantidades astronomicamente grandes de energia, repelindo toda a matéria. É impossível cruzar seu horizonte de eventos. De onde vem toda a energia ainda é um mistério. Pode ser alimentado pela energia do vácuo, a misteriosa energia de fundo do Cosmos, com um suprimento de energia potencialmente ilimitado. Ou pode até ser alimentado pelos mecanismos inflacionários de nascimento de universos inteiros! Ninguém sabe a verdadeira resposta ... "
  
  pc_whdyson_star:99 "$pc_wh_star$"
