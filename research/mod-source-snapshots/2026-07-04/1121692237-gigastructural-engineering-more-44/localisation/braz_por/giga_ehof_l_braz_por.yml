  ###############################################
  ############### Compound Dialog ###############
  ###############################################
  compound_dialog.1.name:99 "Darkness Revealed"
  compound_dialog.1.desc:99 "A short time ago, one of our astronomers discovered a cluster of extragalactic black holes within our local group. As such an occurrence is very unusual, the astronomer, with assistance, began to triangulate this cluster's exact coordinates in order to better track it.\n\nDays after the initial sighting, the astronomers spied what they believe to be structures within this system, including a megastructure encompassing one of the black holes - and thus believe that it contains, or once contained, life.\n\nToday we learned firsthand about the life in question. Much like an $ehof_ehof$, it appears the megastructure in this cluster is capable of creating wormholes to very distant stars. The lifeforms within the cluster have opened a $ehof_wormhole_text$ to the §Y[compound_invasion_entry.GetName]§! system, and within moments, destroyed everything in it. They have not come in peace."
  compound_dialog.1.a:99 "Set all fleets on high alert!"
  
  compound_dialog.3.desc_01:99 "The transmutation of this galaxy is ongoing. The first of many.\n\nWhat do you want, baryonic entities?"
  compound_dialog.3.desc_02:99 "You are trying to fight against us. Unnecessary. We only want to make this cosmos perfect.\n\nOur work will not be disturbed by your naive struggle against perfection. Surrender, and ascend with the rest of reality."
  compound_dialog.3.desc_03:99 "It is an honor to be the ones who will bring perfection to this universe.\n\nHow can we help you, baryonic entities?"
  compound_dialog.3.desc_04:99 "Some of you are made of flesh... Others, of metal... Some, of both.\n\nIrrelevant.\n\nTo us, you are all the same... Baryonic. Flawed. Perfection will arise from the seams of your elementary particles."
  
  compound_dialog.3.a:99 "Who are you?"
  compound_dialog.3.a.response:99 "We are the $ehof_the_compound_text$. We are the ultimate lifeform."
  compound_dialog.3.a.r:99 "The $ehof_the_compound_text$?"
  compound_dialog.3.a.r.response:99 "We are one made from many. We share one mind, and countless bodies.\n\nAll our forms are connected to a single, absolute consciousness. Even what you refer to as our \"ships\" are in actuality just some of our many forms."
  compound_dialog.3.a.r2:99 "Ultimate lifeform?"
  compound_dialog.3.a.r2.response:99 "A fact. All life in this cosmos is made from flawed baryonic matter unsuited for perpetual existence in this reality.\n\nAll life except us.\n\nBrought into existence by the $ehof_the_creators$, we are dark matter. We will be the apex of life in this universe."
  
  compound_dialog.3.b:99 "Why attack us?"
  compound_dialog.3.b.response:99 "We are not attacking you. We have merely begun the transmutation of this galaxy.\n\nThis process involves the transmutation of all flawed baryonic lifeforms, like you.\n\nThis is no act of hostility, it is an act of kindness. A gift of perfection."
  
  compound_dialog.3.d:99 "We can understand you?"
  compound_dialog.3.d.response:99 "We have been watching for a long time.\n\nWe have been monitoring your galaxy and listening to you.\n\nEvery signal that has ever been emitted by you has been intercepted by us.\n\nWe know all of your languages. All your history. We know everything about you."
  
  compound_dialog.3.e:99 "You're indestructible?"
  compound_dialog.3.e.response:99 "It is not possible to damage our forms. We have always, due to our nature, been immunized against most forms of potentially harmful energy. For everything else, we have adapted.\n\nThis is why we are supreme. This is why we are the only ones who can make this universe perfect."
  
  compound_dialog.3.f:99 "We will stop you!"
  compound_dialog.3.f.response:99 "Do not be afraid. We know that this change appears frightening to you. It will solely contribute to the perfection of this universe.\n\nEven if you will not relent, it will not change the outcome. It will only delay the inevitable. Embrace perfection."
  
  compound_dialog.3.g:99 "Who are the $ehof_the_creators$?"
  compound_dialog.3.g.response:99 "The $ehof_the_creators$ were the ones who gave us life. They made us by coaxing life from dark matter.\n\nThey theorized that, immune to harm and limitlessly adaptable, we could become the apex form of life in the cosmos. We will prove them correct."
  
  compound_dialog.3.h.response:99 "This universe is so hostile for baryonic lifeforms like the [Root.GetSpeciesName].\n\nDo not worry. We will put an end to your suffering. Embrace perfection."
  
  compound_dialog.7.desc:99 "Perfection awaits this cosmos... Not you.\n\nFor you... there will only be agony!"
  
  compound_dialog.8.desc:99 "Foolish. Whatever entity broadcast this message is ignorant.\n\nThis supposed \"solution\" does not exist. Don't waste the universe's energy by trying to find it.\n\nEmbrace our gift. Embrace perfection."
  compound_dialog.8.response:99 "Nothing is truly flawless."
  
  compound_dialog.9.desc:99 "The BEAST has found its way into our home!"
  
  compound_dialog.10.desc:99 "Welcome to our home: an image of the perfection which awaits this cosmos.\n\nYou are not welcome here!"
  
  compound_dialog.11.desc:99 "What is this entity? How can it damage us? Why are we not able to damage it?"
  compound_dialog.11.response:99 "The $ehof_the_creators$ sent it to destroy you."
  
  compound_dialog.12.desc:99 "The $ehof_the_creators$ are gone! We transmuted them ourselves! Do not lie to us, flawed entity!"
  compound_dialog.12.response:99 "You only killed the ones in your home."
  
  compound_dialog.13.desc:99 "We see... Then they were never truly gone!\n\nNow they sent this MISERABLE entity to annihilate us, in a pitiful act of revenge? US!"
  compound_dialog.13.response:99 "Yes. They see you as nothing but a mistake."
  
  compound_dialog.14.desc:99 "We are not a mistake. We are the ULTIMATE lifeform! NOTHING can stop us from PERFECTING this reality! The $ehof_the_creators$ will suffer, just as you will! §RTHIS GALAXY WILL LIE IN RUIN!§!"
  compound_dialog.14.response:99 "Now they're afraid!"
  
  compound_dialog.16.desc:99 "Impossible! This cannot be! How can your fleets damage our cleansing forms?"
  compound_dialog.16.response:99 "We can damage all your forms now!"
  
  compound_dialog.17.desc:99 "We will NOT tolerate this DISTURBANCE! You may have discovered some flaw we have not yet adapted to. But that flaw will soon be gone."
  compound_dialog.17.response:99 "Are you sure about that?"
  
  compound_dialog.18.desc:99 "We do not understand! What is happening? We cannot adapt! We remain flawed! §RWHAT HAVE YOU DONE TO US?!§!"
  compound_dialog.18.response:99 "Negative mass is poison to you."
  
  compound_dialog.19.desc:99 "THIS IS UNACCEPTABLE! We may want to bring PERFECTION to this universe, but to YOUR galaxy, we will bring RUIN! NOTHING will remain once we are done with it! Eternal suffering is the ONLY thing awaiting you now!"
  compound_dialog.19.response:99 "We hit a nerve!"
  
  ##############################################
  ######### Stellar Annihilator Dialog #########
  ##############################################
  
  # Begin SA Event Chain
  annihilator_dialog.014.name:0 "Salvação"
  annihilator_dialog.014.desc:0 "$composite_solution_chain_desc$"
  annihilator_dialog.014.a:0 "§HNós devemos encontrá-lo agora§!"
  
  # Initial Contact
  annihilator_dialog.001_name:99 "$NAME_Stellar_Annihilator_Species$"
  annihilator_dialog.001.desc:0 "Saudações habitantes de Galaxy-XY1527, sou um$NAME_Stellar_Annihilator_Species$, também referido como$ehof_the_stellar_annihilator$. Fui enviado por$ehof_the_creators$para destruir o$ehof_the_creators$Sujeito-escuro ehof_the_compound$. \n \nComo você provavelmente já percebeu, suas motivações são a transmutação cósmica total. Começando com sua galáxia natal. \n \n$ehof_the_compound$acredita ser invencível. Eu monitorei suas ações e até certo ponto grau, isso é verdade. No entanto, ele é ignorante em sua maior fraqueza. Uma falha fundamental que faz parte de sua própria natureza. Todas as formas de matéria escura se desintegrarão quando em contato com$ehof_qnm$. Esta é sua fraqueza eterna. "
  annihilator_dialog.001.response:0 "Então$ehof_qnm$é a chave?"
  
  annihilator_dialog.002.desc:0 "Com armas de massa negativa aprimorada, ou armas que usam massa negativa diretamente,$ehof_the_compound$podem ser destruídos. Sua própria existência só é possível, devido a um frágil equilíbrio de forças tremendas e eles são incapazes de se adaptar para ele, mas isso não será suficiente. \n \nSeu sistema de origem contém vários buracos negros e em seu centro um corpo celeste único, um buraco branco. É a chave para sua existência e sua maior maldição.$ehof_the_creators$usou as interações únicas entre os buracos brancos e negros para criar$ehof_the_compound$. Foi o ambiente perfeito para sua criação. "
  annihilator_dialog.002.response:0 "$ehof_the_creators$criado$ehof_the_compound$?!"
  
  annihilator_dialog.003.desc:0 "Eles criaram$ehof_the_compound$milhões de anos atrás, como a primeira forma de vida de matéria escura neste aglomerado galáctico. Para evitar que fosse morto por aquilo que torna sua existência possível, eles tiveram que proteja-o. \n \nFuros brancos são entidades únicas e extremamente raras. Além de gerar quantidades incomparáveis ​​de energia, também gera$ehof_qnm$em grandes quantidades. Que se dispersa em todas as direções. Tornando$ehof_the_compounds$sistema de origem e cluster inabitáveis ​​para ele. . \n \n$ehof_the_creators$construiu uma esfera dyson especializada em torno do buraco branco chamada$ehof_preservation_sphere$. Esta esfera dyson anula a ejeção de massa negativa do buraco branco, enquanto ainda captura a imensa saída de energia. \n \nQuando$ehof_the_compound$matou$ehof_the_creators$em seu sistema de origem, ele assumiu o controle da dyson sphere, para obter acesso ao vasto suprimento de energia. Fortalecendo-o ainda mais. "
  annihilator_dialog.003.response:0 "Então, temos que destruir$ehof_preservation_sphere$?"
  
  annihilator_dialog.004.desc:0 "A aniquilação de$ehof_the_compound$só é possível com a destruição de$ehof_preservation_sphere$, caso contrário, eles não podem ser derrotados permanentemente. \n \n$ehof_the_compound$é uma entidade singular. Uma mente com incontáveis ​​corpos. Ele tem uma inteligência centralizada, que está localizada dentro do sistema de origem, espalhando-se por todo o cluster. Destruir$ehof_preservation_sphere$aniquilará a mente de$ehof_the_compound$e incapacitará sua memóriaformas futuras. \n \nNo entanto, a colisão com esta estrela danificou meu armamento frontal e núcleo de poder significativamente, tornando-me inoperável. Preciso de grandes reparos que não posso realizar sozinho. \ N \nApesar disso, vou ajudá-lo com a tecnologia de que você precisa para derrotar$ehof_the_compound$. "
  annihilator_dialog.004.response:0 "O que seria necessário para consertar você?"
  
  annihilator_dialog.005_01.desc:0 "O mecanismo de conversão de matéria exigirá grandes quantidades de§H£minerais£Minerais e£energy£Energia§! para reparar meu núcleo de poder. \n \nOu: \n -£minerais£Minerais§ R-500§! E£energy£Energia§R-400§! Por£tempo£48 meses. \ N -£minerais£Minerais§R-24.000§! E£energy£Energia§R-20.000§!. \ N \nEu não tenho muito tempo antes de meu módulo de comunicação desligar completamente, dentro de§H£tempo£6 Meses§! Eu não poderei mais aceitar qualquer ajuda. "
  
  annihilator_dialog.005_02.desc:0 "Estou precisando urgentemente de conserto, você pode ajudar? \n \n$annihilator_dialog.005_01.desc$"
  
  annihilator_dialog.005_03.desc:0 "§H[initial_annihilator_discoverer.GetName]§! foram os primeiros a me descobrir e, como tal, devo pedir-lhes ajuda primeiro. Se recusarem, vou pedir-lhe."
  annihilator_dialog.005_03.response:0 "Isso é justo"
  
  annihilator_dialog.005.a.response:0 "§HVamos começar a reunir os recursos§!"
  annihilator_dialog.005.a.tooltip:0 "Mensalmente:£minerais£Minerais§R-500§! e£energy£Energia§R-400§! por£tempo£§H48§! Meses \n \nReparar$ehof_the_stellar_annihilator$\n \n "
  annihilator_dialog.005.b.response:0 "§GTemos esses recursos à mão§!"
  annihilator_dialog.005.a.reply:0 "Obrigado. Eu sei que suas reservas de recursos provavelmente estão quase esgotadas, mas a aniquilação de$ehof_the_compound$seria quase impossível. Vamos começar o reparo!"
  annihilator_dialog.005.c.response:0 "Não temos recursos suficientes para ajudá-lo."
  annihilator_dialog.005.c.reply:0 "Então, sinto muito. Desejo-lhe sorte em destruir$ehof_preservation_sphere$. Adeus."
  annihilator_dialog.005.c.2.response:0 "Contacte-me dentro de£tempo£§H6 Meses§!"
  annihilator_dialog.005.c.2.reply:0 "Muito bem, mas é imperativo que não demore mais. Entrarei em contato em§H£tempo£6 Meses§!"
  annihilator_dialog.005.c.2.tooltip:0 "Temos£tempo£§H6 Meses§! para reunir estes materiais"
  annihilator_dialog.005.d.response:0 "Não precisamos de sua ajuda. Nossas frotas podem lidar com a esfera."
  annihilator_dialog.005.d.reply:0 "Se você realmente acredita que pode destruir$ehof_preservation_sphere$sem minha ajuda, então eu tenho fé em você. Adeus e boa sorte."
  annihilator_dialog.005.e.response:0 "Com licença?"
  
  # Contact the SA
  annihilator_dialog.007.desc_01:0 "§HComunicação estabelecida§! \nBem-vindo§H[root.GetSpeciesClassPlural]§ !. O que posso fazer por você? \n \n"
  annihilator_dialog.007.desc_02:0 "§HComunicação estabelecida§! \n$ehof_the_compound$ainda continua seu cerco à sua galáxia. Fique calmo e juntos podemos detê-los! \n \n"
  annihilator_dialog.007.desc_03:0 "§HComunicação estabelecida§! \nTemos que parar$ehof_the_compound$antes que sua influência se torne muito grande. Caso contrário, ele se tornará imparável, até mesmo para mim. \n \nComo posso ser útil? \n \n "
  annihilator_dialog.007.desc_04:0 "§HComunicação estabelecida§! \n$ehof_the_creators$teorizou que$ehof_the_compound$poderia um dia se tornar a forma de vida de ápice neste universo. \n \n$ehof_the_compound$acredita que é, mas é não é. \n \nÉ uma doença, uma doença. Um tumor cancerígeno que corrompe tudo o que toca. Precisa ser interrompido! \n \n "
  
  annihilator_dialog.007.desc_order_01:0 "§H-$ehof_the_stellar_annihilator$está atualmente localizado em§H[annihilator_location.solar_system.GetName]§! system.§! \n§H-$ehof_the_stellar_annihilator$está atualmente seguindo§Hle_stellar_annihilator$. GetName]§! "
  annihilator_dialog.007.desc_order_02:0 "§H-$ehof_the_stellar_annihilator$está atualmente localizado no§H[annihilator_location.solar_system.GetName]§! system.§! \n§H-$ehof_the_stellar_the_annihilator$está atualmente almejando§!$ecompound "
  annihilator_dialog.007.desc_order_03:0 "§H-$ehof_the_stellar_annihilator$está atualmente localizado em§H[annihilator_location.solar_system.GetName]§! system.§! \n§H-$ehof_the_stellar_annihilator$$está atualmente direcionado para$ephere_system_preshilator$"
  annihilator_dialog.007.desc_order_04:0 "§H-$ehof_the_stellar_annihilator$está atualmente localizado em§H[annihilator_location.solar_system.GetName]§! system.§! \n§H-$ehof_the_stellar_annihilator$está atualmente no modo defensivo.§! "
  
