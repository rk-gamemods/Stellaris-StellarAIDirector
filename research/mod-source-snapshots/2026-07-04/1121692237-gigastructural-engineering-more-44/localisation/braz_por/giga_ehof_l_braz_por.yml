  giga_category_ehof:99 "$ehof_system_list_title$"
  ehof_system_list_title:99 "$ehof_ehof$"
  ehof_system_list_desc:0 "Decidimos manter um registro de cada aventura extragaláctica em que embarcamos. \n \nEstamos registrando as coordenadas do sistema, contagem e nome de estrelas, planetas e planetas habitáveis, luas e asteróides. Devemos também registra uma estimativa de quais recursos o sistema provavelmente terá. \n \nAcreditamos que esta informação pode ser útil para rastrear o progresso de cada sistema e pode ser vital se ou quando tivermos resolvido uma grande quantidade deles. "
  total_systems:99 "Total Systems"
  ehof_sys:99 "[ehof_destination_system.GetName]"
  ehof_sys_desc:0 "$ehof_sys_prefix$$ehof_sys_info$$ehof_loc_stars$$ehof_loc_planets$$ehof_loc_red_habitable$$ehof_loc_yellow_habitable$$ehof_loc_green_habitable$$ehof_loc_moons$$ehof_loc_megas$$ehof_loc_asteroids$$ehof_sys_resources$$ehof_loc_minerals$$ehof_loc_energy$$ehof_loc_alloys$$ehof_loc_exotic_gases$$ehof_loc_rare_crystals$$ehof_loc_volatile_motes$$ehof_loc_zro$$ehof_loc_living_metal$$ehof_loc_dark_matter$$ehof_loc_negative_mass$$ehof_loc_physics$$ehof_engine_metal$$ehof_loc_dark_matter$$ehof_loc_negative_mass$$ehof_loc_physics$$ehof_engine_locering "
  
