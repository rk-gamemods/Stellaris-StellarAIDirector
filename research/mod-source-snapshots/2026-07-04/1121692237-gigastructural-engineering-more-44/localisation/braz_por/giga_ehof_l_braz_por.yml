  #############################################
  # Sentient Metal / Quasi-Negative-Mass Tech #
  #############################################
  tech_qnm_utilities:0 "$ehof_qnm$Melhorias"
  tech_qnm_utilities_desc:0 "$ehof_the_compound$é uma ameaça para toda a vida na galáxia, possivelmente até além. A massa negativa exótica parece ser a única coisa capaz de prejudicá-los. Fomos capazes de aprender sobre essa fraqueza para eles e com nossos novos adquiriu conhecimento. Começou a transformar a massa negativa em uma arma para usá-la contra suas frotas. Finalmente há uma chance de repelir a invasão! "
  
  tech_qnm_thrusters:0 "$ehof_qnm$Thrusters"
  tech_qnm_thrusters_desc:0 "Descobrir mais dos segredos de$ehof_qnm$, nos permite expandir seu uso dentro de nosso império.$ehof_qnm$nos permite ultrapassar a barreira causal, a velocidade da luz, e dá aos nossos navios a capacidade de voar mais rápido do que luz, mesmo sem hiper drives. Com isso em mente, fomos capazes de criar os propulsores$ehof_qnm$(QNM). Os propulsores mais rápidos que a galáxia já viu! "
  TECH_UNLOCK_QNM_THRUSTER_TITLE:0 "§ Componente HUnlocks:§!$Tech_qnm_thrusters$"
  TECH_UNLOCK_QNM_THRUSTER_2_DESC:0 "§H$tech_qnm_thrusters$§! \ NOs propulsores mais rápidos que a galáxia já viu!"
  
  tech_qnm_sensors:0 "$ehof_qnm$Sensors"
  tech_qnm_sensors_desc:0 "$ehof_qnm$nos permite aumentar nossos sensores existentes e fornecer maior saída, resultando em uma detecção de frota muito maior."TECH_UNLOCK_QNM_SENSOR_TITLE:0 "§HUnlocks Componente:§!$Tech_qnm_sensors$"
  TECH_UNLOCK_QNM_SENSOR_TITLE:99 "§HUnlocks Component:§! $tech_qnm_sensors$"
  TECH_UNLOCK_QNM_SENSOR_DESC:0 "§H$tech_qnm_sensors$§! \ N$tech_qnm_sensors_desc$"
  
  tech_qnm_shields:0 "$ehof_qnm$Shields"
  tech_qnm_shields_desc:0 "$ehof_qnm$nos permite aumentar nossos escudos existentes e fornecer maior produção de energia, resultando em uma absorção de dano muito mais forte."
  
  tech_qnm_reactors:0 "$ehof_qnm$Reactors"
  tech_qnm_reactors_desc:0 "$ehof_qnm$Reatores aproveitam a enorme taxa de transferência de$ehof_qnm$, permitindo energia inconcebível em tamanhos pequenos."
  TECH_UNLOCK_QNM_REACTORS_TITLE:0 "§ Componente HUnlocks:§!$Tech_qnm_reactors$"
  TECH_UNLOCK_QNM_REACTORS_DESC:0 "§H$tech_qnm_reactors$§! \ N$tech_qnm_reactors_desc$"
  
  tech_qnm_jumpdrive:0 "$ehof_qnm$Enhanced Jump drive"
  tech_qnm_jumpdrive_desc:0 "O Jump Drive já é uma invenção inacreditável por si só, mas com as propriedades exclusivas de$ehof_qnm$, pudemos aprimorá-lo ainda mais! Este novo Jump Drive$ehof_qnm$Enhanced (QNME) ', nos permite para pular ainda mais rápido e mais longe do que com uma unidade de salto convencional. "
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE:0 "§HUnlocks Componente:§!$Tech_qnm_jumpdrive$"
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE_DESC:0 "§H$tech_qnm_jumpdrive$§! \ NPule ainda mais rápido e mais longe do que com um jump drive convencional."
  
  tech_sm_armor:0 "$ehof_sm$Armor"
  tech_sm_armor_desc:0 "$ehof_sm$nanites se reconstituem e se replicam, adaptando-se aos efeitos ambientais prejudiciais"
  
  tech_sm_auto_repair:0 "$ehof_sm$Hull Regeneration"
  tech_sm_auto_repair_desc:0 "Construindo os cascos de nossos navios com materiais que contenham vestígios de$ehof_sm$, com rotinas IA reprogramadas, nossos navios podem se curar com extrema eficiência."
  
  tech_sm_computers:0 "$ehof_sm$Intellect"
  tech_sm_computers_desc:0 "As capacidades do$ehof_sm$Hive Mind são enormes e muito além de nossas redes de processamento de informações mais poderosas. Ao conectá-lo diretamente aos sistemas de nossas naves e estruturas, podemos implementar ordens superordenadas para que controle nossas naves e estações como nenhum outro computador de navio antes. "
  TECH_UNLOCK_SM_COMPUTERS_TITLE:0 "§HUnlocks Componente:§!$Tech_sm_computers$"
  TECH_UNLOCK_SM_COMPUTERS_DESC:0 "§H$tech_sm_computers$§! \ N$tech_sm_computers_desc$"
  
  tech_sm_flak_batteries:0 "$ehof_sm$Flak Battery"
  tech_sm_flak_batteries_desc:0 "A bateria$ehof_sm$Flak utiliza os recursos da rotina$ehof_sm$A.I., para mirar com mais precisão e exatidão nos projéteis que se aproximam do que jamais fomos capazes antes"
  
  tech_sm_autocannons:0 "$ehof_sm$Ripper"
  tech_sm_autocannons_desc:0 "O$ehof_sm$Ripper atira vários projéteis minúsculos compostos de$ehof_sm$, que são programados para absorver qualquer forma de matéria com a qual entrem em contato. Não é muito eficaz contra armaduras, é extremamente eficaz para quase todos os tipos conhecidos de composições de escudo. "
  
  tech_sm_mass_drivers:0 "$ehof_sm$Railgun"
  tech_sm_mass_drivers_desc:0 "O canhão elétrico$ehof_sm$atira pequenos projéteis compostos de$ehof_sm$, que são programados para absorver qualquer forma de matéria com a qual entrem em contato. Não é muito eficaz contra armaduras, é extremamente eficaz para quase todos os tipos conhecidos de composições de escudo. "
  
  tech_sm_kinetic_artillery:0 "$ehof_sm$Artillery"
  tech_sm_kinetic_artillery_desc:0 "A$ehof_sm$Artillery atira grandes projéteis compostos de$ehof_sm$, que são programados para absorver qualquer forma de matéria com a qual entrem em contato. Não muito eficaz contra armaduras, é extremamente eficaz para quase todos os tipos de composições de escudo. "
  
  tech_sm_mass_accelerator:0 "$ehof_sm$Absorber"
  tech_sm_mass_accelerator_desc:0 "O absorvedor$ehof_sm$atira projéteis enormes compostos de$ehof_sm$, que são programados para absorver qualquer forma de matéria com a qual entrem em contato. Não é muito eficaz contra armaduras, é extremamente eficaz para quase todos os tipos de composições de escudo. "
  
  tech_sm_titanic:0 "$ehof_sm$Devourer"
  tech_sm_titanic_desc:0 "O$ehof_sm$Devourer não utiliza$ehof_sm$em si para danificar seus alvos, mas em vez disso, utiliza sua conexão com o Everchanging. Ele explora o conteúdo de energia extrema do Everchanging e dispara um feixe de energia da mortalha focada em seu alvo. Alimentado pela energia de mais de mil sóis, o$ehof_sm$Devourer é de longe a arma naval mais poderosa já vista, capaz de devastar tudo em seu caminho. "
  
  tech_qnm_pd_tracking:0 "$ehof_qnm$Point Defense"
  tech_qnm_pd_tracking_desc:0 "$ehof_qnm$ballistics melhora muito o dano causado às ameaças de entrada."
  
  tech_qnm_lasers:0 "$ehof_qnm$Laser"
  tech_qnm_lasers_desc:0 "Energia$ehof_qnm$focada em uma variedade de tamanhos simplifica o trabalho da Matéria Escura"
  
  tech_qnm_plasma:0 "$ehof_qnm$Plasma"
  tech_qnm_plasma_desc:0 "Bolas concentradas de$ehof_qnm$evaporam matéria escura no impacto"
  
  tech_qnm_disruptors:0 "$ehof_qnm$Disruptor "
