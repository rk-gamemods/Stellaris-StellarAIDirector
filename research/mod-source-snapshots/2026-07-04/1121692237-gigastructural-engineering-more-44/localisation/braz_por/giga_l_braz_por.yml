  gigadiscord_title:99 "£giga_discord£ Discord"
  gigadiscord_desc:99 "This will open or join the §YGigastructural Engineering Discord§!. This requires the §YDiscord App§! to be installed as the ingame browser does not support Discord, but the invite will still work and launch the app.\n\nIt is recommended to use the Discord to §Yreport bugs§! or if you have §Yquestions§! about the mod in general, as the Steam comments were disabled due to being pointless.\n\nThe Discord's link can also be found on the §YSteam Page§! if the invite does not work at all."
  
