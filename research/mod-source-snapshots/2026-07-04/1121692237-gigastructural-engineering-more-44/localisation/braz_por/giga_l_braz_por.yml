  #O Stars
  
  pc_giga_o_star:0 "Estrela Classe O"
  pc_giga_o_star_plural:99 "Class O Stars"
  pc_giga_o_star_desc:0 "Estrelas do tipo O são espetacularmente brilhantes e incrivelmente raras. Esses gigantes estelares representam a categoria mais pesada e quente de estrelas da sequência principal, vivendo apenas por alguns milhões de anos antes de perecer em uma supernova brutal. Devido à sua imensa luminosidade, os sistemas planetários em torno deste tipo de estrela são sempre estéreis. Além disso, os ventos solares extremamente intensos dessas estrelas são incrivelmente prejudiciais para as formas de vida, robôs e naves estelares."
  
  giga_o_star_modifier:99 "O-Class Star"
  giga_o_star_modifier_desc:0 "Esta estrela incrivelmente brilhante oferece oportunidades incríveis de colher grandes quantidades de energia para alimentar as mais poderosas das máquinas. \n \n§YDyson Spheres, Star Lifters e Matrioshka Brains construídos em torno deste tipo de estrelarequiresem uma tecnologia especial para serem construídos além da própria tecnologia da megaestrutura. \n \nEstas megaestruturas terão+500% de produção,+500% de manutenção,+450% de custo de construção e+350% de tempo de construção se forem construídas em torno desta estrela. "
  
  sc_giga_o_star:0 "Estrela da classe O"
  
  dyson_sphere_0_o_star:99 "O-Class Dyson Sphere Site"
  dyson_sphere_0_o_star_DESC:0 "A estação do canteiro de obras serve de base para a futura construção de uma esfera de Dyson."
  dyson_sphere_1_o_star:0 "Estrutura de esfera Dyson de classe O"
  dyson_sphere_1_o_star_DESC:0 "A estrutura é a base para o futuro Dyson Sphere, e não gera nenhuma energia."
  dyson_sphere_2_o_star:0 "Esfera de Dyson Classe O parcial"
  dyson_sphere_2_o_star_DESC:0 "Uma esfera Dyson parcialmente operacional -§Y25%§! eficiência de geração de energia."
  dyson_sphere_3_o_star:0 "Esfera de Dyson Classe O parcial"
  dyson_sphere_3_o_star_DESC:0 "Uma esfera Dyson parcialmente operacional -§Y50%§! eficiência de geração de energia."
  dyson_sphere_4_o_star:0 "Esfera de Dyson Classe O parcial"
  dyson_sphere_4_o_star_DESC:0 "Uma esfera Dyson parcialmente operacional -§Y75%§! eficiência de geração de energia."
  dyson_sphere_5_o_star:99 "O-Class Dyson Sphere"
  dyson_sphere_5_o_star_DESC:0 "Uma esfera Dyson totalmente operacional -§G100%§! eficiência de geração de energia. \nNullifica os riscos ambientais da estrela O-Class."
  
  matrioshka_brain_0_o_star:0 "O-Class$name_matrioshka_brain$Canteiro de obras"
  matrioshka_brain_0_o_star_DESC:0 "Este canteiro de obras servirá como um depósito de preparação para hospedar grandes quantidades de recursos e pessoal necessários para construir um$name_matrioshka_brain$."
  
  matrioshka_brain_1_o_star:0 "O-Class$name_matrioshka_brain$Capacitores Solares"
  matrioshka_brain_1_o_star_DESC:0 "Esses capacitores avançados circulando a estrela fornecem energia para o futuro$name_matrioshka_brain$, mas também estabilizam a estrela e são capazes de suprimir erupções solares e ventos solares para proteger os delicados circuitos."
  
  matrioshka_brain_2_o_star:0 "O-Class$name_matrioshka_brain$Main Databank"
  matrioshka_brain_2_o_star_DESC:0 "Os bancos de dados principais agora estão posicionados ao redor da estrela, e computadores de primeira linha foram instalados para gerenciar a quantidade bruta de dados gerados pela pesquisa científica. A maioria dos dados que coletamos até agora foi foram armazenados e estão sendo estudados aqui. "
  
  matrioshka_brain_3_o_star:0 "O-Class$name_matrioshka_brain$Central Processor"
  matrioshka_brain_3_o_star_DESC:0 "Os processadores centrais são enormes computadores que se estendem ao redor de toda a estrela. O calor gerado pelos bancos de dados principais é usado para alimentar os processadores centrais, aumentando muito a eficiência do dispositivo. Esses computadores são extremamente poderosos."
  
  matrioshka_brain_4_o_star:0 "O-Class$name_matrioshka_brain$Quantum Calculators"
  matrioshka_brain_4_o_star_DESC:0 "Muitos cálculos complexos, especialmente aqueles pertencentes à própria natureza do universo, estão sendo processados ​​nessas calculadoras quânticas. Eles usam o calor do processador central para funcionar, tornando-os muito eficientes."
  
  matrioshka_brain_5_o_star:0 "O-Class$name_matrioshka_brain$"
  matrioshka_brain_5_o_star_DESC:0 "Um$name_matrioshka_brain$totalmente operacional, incluindo a camada mais externa que consiste nos arquivos de referência cruzada que coordenam os outros componentes, aumentando a eficiência ao seu máximo."
  
  matrioshka_brain_6_o_star:99 "O-Class Matrioshka Reality Simulator"
  matrioshka_brain_6_o_star_DESC:0 "Este$name_matrioshka_brain$foi equipado com um grande número de pods de estase, permitindo que os orgânicos carreguem suas mentes em vastos mundos idealizados e simulados. O único limite é sua imaginação."
  
  matrioshka_brain_7_o_star:99 "O-Class Matrioshka Reality Simulator"
  matrioshka_brain_7_o_star_DESC:0 "Este$name_matrioshka_brain$foi equipado com um grande número de pods de estase, permitindo que os orgânicos carreguem suas mentes em vastos mundos idealizados e simulados. O único limite é sua imaginação."
  
  matrioshka_brain_8_o_star:99 "O-Class Matrioshka Reality Simulator"
  matrioshka_brain_8_o_star_DESC:0 "Este$name_matrioshka_brain$foi equipado com um grandevários pods de estase, permitindo que os orgânicos carreguem suas mentes em vastos mundos idealizados e simulados. O único limite é a imaginação. "
  
  matrioshka_brain_9_o_star:99 "O-Class Matrioshka Reality Simulator"
  matrioshka_brain_9_o_star_DESC:0 "Este$name_matrioshka_brain$foi equipado com um grande número de pods de estase, permitindo que os orgânicos carreguem suas mentes em vastos mundos idealizados e simulados. O único limite é sua imaginação."
  
  star_lifter_0_o_star:0 "O-Class$name_starlifter$Site"
  star_lifter_0_o_star_DESC:0 "Este site irá um dia fornecer ao nosso império vários planetas valiosos de minerais."
  star_lifter_0_o_star_MEGASTRUCTURE_DETAILS:0 "A§Y$star_lifter_5$§! envolve totalmente uma determinada estrela, reunindo massa solar e convertendo-a diretamente em£minerais£Minerais."
  star_lifter_0_o_star_CONSTRUCTION_INFO_DELAYED:99 ""
  
  star_lifter_1_o_star:0 "O-Class$name_starlifter$Frame"
  star_lifter_1_o_star_DESC:0 "Esta estrutura esguia um dia suportará um complexo de mineração que apagará a estrela do sistema e nossa escassez de minerais."
  
  star_lifter_2_o_star:0 "O-Class$name_starlifter$Estágio 1"
  star_lifter_2_o_star_DESC:0 "Neste estágio de conclusão, este$name_starlifter$está produzindo cerca de 25% de seu rendimento potencial."
  
  star_lifter_3_o_star:0 "Classe O$name_starlifter$Estágio 2"
  star_lifter_3_o_star_DESC:0 "Neste estágio de conclusão, este$name_starlifter$está produzindo cerca de 50% de seu rendimento potencial."
  
  star_lifter_4_o_star:0 "O-Class$name_starlifter$Estágio 3"
  star_lifter_4_o_star_DESC:0 "Neste estágio de conclusão, este$name_starlifter$está produzindo cerca de 75% de seu rendimento potencial."
  
  star_lifter_5_o_star:0 "O-Class$name_starlifter$"
  star_lifter_5_o_star_DESC:0 "Este$name_starlifter$está totalmente operacional. Atualmente está produzindo quantidades astronômicas de minerais graças a conversores de fusão avançados e gravilift extraindo o hidrogênio e o hélio da estrela."
  
  requires_standard_planet_class_o_star:0 "$TRIGGER_FAIL$Deve ser construído em torno de um tipo de estrela padrão. A construção em torno de estrelas de classe Orequires a tecnologia§YSuprainsulação§! apropriada para esta megaestrutura."
  
  requires_dyson_swarm:99 "$TRIGGER_FAIL$Must upgrade a §Y$dyson_swarm_3$§! into a §Y$dyson_sphere_5$§!. Can only be built around an O-Class star with the appropriate §YSuprainsulation§! technology for this megastructure."
  
  giga_tech_dyson_o_star:99 "Dyson Sphere Suprainsulation"
  giga_tech_dyson_o_star_desc:0 "O-Stars são as estrelas mais brilhantes e luminosas de nossa galáxia. Se quisermos montar uma Dyson Sphere em torno de um desses gigantes, teremos que projetar uma megaestrutura que seja maior e mais resistente do que as Dyson Spheres normais , e ser capaz de suportar o calor estelar extremamente forte emitido por este tipo de estrela. "
  
  allow_o_class_dyson:0 "§HUnlocks Recurso:§! O-Class Dyson Sphere"
  allow_o_class_dyson_desc:0 "Vamos construir Dyson Spheres em torno de estrelas da classe O, que terão+500% de saída,+500% de manutenção,+450% de custo de construção e+350% de tempo de construção se forem construídas em torno desta estrela."
  
  
  giga_tech_lifter_o_star:99 "Star Lifter Suprainsulation"
  giga_tech_lifter_o_star_desc:0 "O-Stars são as estrelas mais brilhantes e luminosas de nossa galáxia. Se quisermos montar um Star Lifter em torno de um desses gigantes, teremos que projetar uma megaestrutura que seja maior e mais resistente do que Star Lifter regulares , e ser capaz de suportar o calor estelar extremamente forte emitido por este tipo de estrela. "
  
  allow_o_class_lifter:99 "§HUnlocks Feature:§! O-Class Star Lifter"
  allow_o_class_lifter_desc:0 "Vamos construir Star Lifters em torno de estrelas de classe O, que terão+500% Output,+500% Upkeep,+450% Build Cost e+350% Build Time se forem construídos em torno desta estrela."
  
  
  giga_tech_brain_o_star:99 "Matrioshka Brain Suprainsulation"
  giga_tech_brain_o_star_desc:0 "O-Stars são as estrelas mais brilhantes e luminosas de nossa galáxia. Para montar um Cérebro Matrioshka em torno de um desses gigantes, teremos que projetar uma megaestrutura que seja maior e mais resistente do que o Cérebro Matrioshka normal, e ser capaz de suportar o calor estelar extremamente forte emitido por este tipo de estrela. "
  
  allow_o_class_brain:0 "§HUnlocks Recurso:§! O-Class Matrioshka Brain"
  allow_o_class_brain_desc:0 "Vamos construir Matrioshka Brains em torno de estrelas da classe O, que terá+500% de produção,+500% de manutenção,+450% de custo de construção e+350% de tempo de construção se construído em torno desta estrela."
  
  giga_o_stars_disabled:0 "£menu_disabled£§YO-Class Stars§! \nAs estrelas luminosas e raras de classe O não aparecerão. \n \n§BDsabled por padrão se§YReal Space§! estiver ativo para evitar classes de estrelas duplicadas.§ ! "
  
  giga_o_stars_enabled:0 "£menu_enabled£§YO-Class Stars§! \n \nAs estrelas luminosas e raras da classe O irão desovar, com sua quantidade dependendo da quantidade total de estrelas na galáxia dividida por aproximadamente 70. \n \nMegastruturas terá+500% de saída,+500% de manutenção,+450% de custo de construção e+350% de tempo de construção se construída em torno dessas estrelas, independentemente de outras opções de escala. \n \nSão necessárias tecnologias especiais para construir megaestruturas em torno dessas estrelas. \n \n§B Desativado por padrão se§YReal Space§! estiver ativo para evitar a duplicação de classes de estrelas.§! "
  
  must_not_have_real_space:99 "Dsabled if §YReal Space§! is active to prevent duplicate star classes."
  
  giga_o_star.2000.name:99 "O-Star Stellar Behemoth"
  giga_o_star.2000.desc:0 "Um achado maravilhoso foi feito por uma nave de exploração atualmente mapeando a galáxia. A embarcação está relatando que a estrela central do sistema§Y [from.GetName]§! -Classe Star§ !! \n \nEsta estrela extremamente brilhante, rara e azul-púrpura é de proporções verdadeiramente gigantescas e há muito esterilizou seu sistema planetário circundante. Além disso, devido à imensa atividade da estrela, os ventos solares são incrivelmente proeminentes em todo o sistema inteiro, o que está provando ser prejudicial para todos os navios que cruzam esta área. \n \nNo entanto, embora esse tipo de estrelas sejam perigosas e de vida curta, quaisquer megaestruturas construídas ao redor delas sem dúvida teriam o potencial de ser§Yextremamente poderosas§ !, ainda mais do que aquelas construídas em torno de estrelas típicas da classe B. \n \nNo entanto, devemos estar atentos que apenas um punhado dessas estrelas existe em nossa galáxia e, portanto, são extremamente valiosas. "
  giga_o_star.2000.a:0 "Maravilhoso!"
  
  giga_menu.200.name:0 "Recursos temporariamente desativados"
  giga_menu.200.desc:0 "Saudações! Obrigado por usar Gigastructural Engineering & More. Este pop-up está aqui para informar que o§YPsionic Beacon§! está temporariamente desativado porque 3.0 o quebrou. \n \nTambém há um problema lamentável com o§YFlusionian Resistance RNG§! que apareceu misteriosamente após o 3.0 e faz com que a maioria das operações falhe, a menos que sua chance de sucesso seja superior a 85%. Infelizmente, ele é extremamente relutante em consertar, apesar de meus melhores esforços. \n \nPedimos desculpas por o inconveniente e espero que você aproveite o mod de qualquer maneira! "
  giga_menu.200.a:0 "Compreendido."
  
  ASTEROID_ARTILLERY_STERN:0 "Artilharia espinhal"
  ASTEROID_ARTILLERY_MID:0 "Baterias de armas"
  ASTEROID_ARTILLERY_BOW:0 "Armamento Auxiliar"
  
  asteroid_artillery:0 "Artilharia de Asteroide"
  asteroid_artillery_plural:0 "Artilharia de Asteroides"
  asteroid_artillery_cap:99 "$asteroid_artillery$"
  
  REACTOR_ASTEROID:0 "Núcleo de Energia Asteróide"
  REACTOR_ASTEROID_DESC:0 "Aninhado nas profundezas da crosta do asteróide está um reator colossal de design avançado, fornecendo energia suficiente para a vasta gama de armas da estrutura."
  
  asteroid_artillery_0:0 "Estrutura de artilharia de asteróide"
  asteroid_artillery_0_DESC:0 "Esta estrutura envolve um asteróide, preparando-o para a próxima etapa na construção da Artilharia de Asteróide."
  asteroid_artillery_0_MEGASTRUCTURE_DETAILS:0 "Uma artilharia de asteróide é uma construção defensiva estacionária potente embutida em um asteróide, projetada para repelir incursões inimigas." #gigalistentry ASTEROID ARTILLERY
  
  asteroid_artillery_1:99 "Asteroid Artillery"
  asteroid_artillery_1_DESC:0 "Uma artilharia de asteróide é uma grande plataforma de arma embutida em um pequeno corpo rochoso que é minado para sustentar a plataforma. Consiste em uma arma espinhal central complementada por uma série de torres auxiliares menores e é feita para repelir inimigos de médio porte incursões. "
  
  asteroid_artillery_1_fake:99 "$asteroid_artillery_1$"
  asteroid_artillery_1_fake_DESC:99 "$asteroid_artillery_1_DESC$"
  
  asteroid_artillery_ruined:0 "Artilharia de asteróide danificada"
  asteroid_artillery_ruined_DESC:0 "Embora tenha sofrido muitos danos, esta Artilharia de Asteróide teoricamente poderia ser reparada com recursos suficientes."
  
  asteroid_artillery_repaired:99 "Asteroid Artillery"
  asteroid_artillery_repaired_DESC:99 "An Asteroid Artillery is a large weapon platform embedded into a small rocky body which is mined to sustain the platform. It consists of a central spinal weapon supplemented by an array of smaller auxiliary turrets and is made to repel medium-sized enemy incursions."
  
  giga_tech_asteroid_artillery:0 "Operações defensivas do Planetoide"
  giga_tech_asteroid_artillery_desc:0 "O tamanho cada vez maior dos navios de guerra modernos significa que as bases estelares simplesmente não vão cortá-lo mais quando se trata de defender nosso território, mas problemas logísticos impedem que uma plataforma defensiva convencional fique muito grande. No entanto, incorporando uma instalação defensiva em um grande asteróide, podemos resolver simultaneamente os problemas colocados pelo recuo, bem como aqueles causados ​​por problemas de manutenção, integrando as partes internas da estrutura no próprio asteróide e extraindo-o de recursos sempre que necessário. Isso permitiria efetivamente a construção de uma estrutura muito maior e significativa. bastiões defensivos mais poderosos. "
  
  allow_asteroid_artillery:0 "§HDesbloqueia a megaestrutura:§! Artilharia de asteróide\n§BProsseguir pesquisas adicionais neste campo levará a navios de guerra cada vez maiores.§!"
  desc_asteroid_artillery:0 "Uma artilharia de asteróide é uma plataforma defensiva estacionária construída em um asteróide, projetada para repelir grandes frotas inimigas por conta própria."
  
  giga_mobile_planet_quest_chain:0 "§BProcurar mais pesquisas neste campo irá desbloquear navios de guerra cada vez maiores.§!"
  
  giga_artillery.1000.name:0 "Gerenciando a artilharia de asteróide"
  giga_artillery.1000.desc:0 "A artilharia de asteróide construída em torno de§Y[asteroid_artillery_location.GetName]§! pode ser atualizada para garantir que possa acompanhar a força cada vez maior das frotas espaciais.\n\ n§BReforço total :§! Aumenta a HP do casco e da armadura em 30% por nível. \ N§YNível atual:§![Asteroid_artillery_location.asteroid_artillery_hp] |+[asteroid_artillery_location.asteroid_artillery_hp_perc]%\n\ nRE§ Cargas úteis aumentadas em 20:§! % por nível.\n§YNível atual:§![asteroid_artillery_location.asteroid_artillery_dmg] |+[asteroid_artillery_location.asteroid_artillery_dmg_perc]%\n\ n§GFRefigerantes flash:§! Aumenta a taxa de incêndio em 20% por nível.\n§YNível atual:§![Asteroid_artillery_location.asteroid_artillery_atkspeed] |+[asteroid_artillery_location.asteroid_artillery_atkspeed_perc]%\n\ n§HCalibrated Sensors:§! Aumenta o intervalo de armas em 25% por nível. \ N§YCurrent Level[asteroid_artillery_atkspeed_perc]%\n\ n§HCalibrated:§! asteroid_artillery_location.ast eroid_artillery_range_perc]%\n\ n§E Direcionamento de precisão:§! Aumenta o rastreamento em 30% por nível. \ N§YNível atual:§![asteroid_artillery_location.asteroid_artillery_tracking] |+[asteroid_artillery_location.asteroid_artillery_tracking_perc]%\n\ n§M Casco regenerativo:§! Aumenta a Regeneração Diária do Casco / Armadura em 1,5% por nível. \ N§YNível Atual:§![asteroid_artillery_location.asteroid_artillery_pen] |+[asteroid_artillery_location.asteroid_artillery_pen_perc]%\n\ n§PPontos de atualização restantes:§![asteroid_artillery_location.asteroid_artillery_points_current] "
  
  giga_artillery.1000.b:0 "Gastar§Y1§!§PPonto de atualização§! em§BReforço total§! |§Y[asteroid_artillery_location.asteroid_artillery_hp_cost]§!£alloys£"
  giga_artillery.1000.c:0 "Gastar§Y1§!§Pponto de atualização§! em§Cargas úteis aprimoradas§! |§Y[asteroid_artillery_location.asteroid_artillery_dmg_cost]§!£alloys£"
  giga_artillery.1000.d:0 "Gaste§Y1§!§Pponto de atualização§! em§GFlash Coolants§! |§Y[asteroid_artillery_location.asteroid_artillery_atkspeed_cost]§!£alloys£"
  giga_artillery.1000.e:0 "Gaste§Y1§!§PPonto de atualização§! em§HSensores calibrados§! |§Y[asteroid_artillery_location.asteroid_artillery_range_cost]§!£alloys£"
  giga_artillery.1000.f:0 "Gaste§Y1§!§PPonto de atualização§! em§M Casco regenerativo§! |§Y[asteroid_artillery_location.asteroid_artillery_pen_cost]§!£alloys£"
  giga_artillery.1000.g:0 "Gastar§Y1§!§PPonto de atualização§! em§Segmentação de precisão§! |§Y[asteroid_artillery_location.asteroid_artillery_tracking_cost]§!£alloys£"
  
  giga_artillery.1000.a:0 "Sair."
  
  giga_tech_asteroid_artillery_pen_shots:0 "Armadura regenerativa de artilharia de asteróide"
  giga_tech_asteroid_artillery_pen_shots_desc:0 "Melhor integração em grande escala de nanites e construções de autorreparação dentro de Asteroid Artilleries significa que eles podem se reparar muito mais rápido e mais eficientemente do que antes."
  
  allow_asteroid_artillery_pen:0 "§HDesbloqueia a atualização da artilharia de asteróide:§! Casco regenerativo"
  allow_asteroid_artillery_pen_desc:0 "A atualização do Casco Regenerativo permite que os Asteroid Artilleries se reparem passivamente mais rápido."
  
  not_enough_artillery_points:0 "Esta artilharia de asteróide não tem pontos de atualização suficientes restantes."
  
  giga_tech_asteroid_artillery_damage_upgrade:99 "Reimagined Asteroid Weaponry"
  giga_tech_asteroid_artillery_damage_upgrade_desc:0 "Com o advento das Luas de Ataque e de planetóides armados mais capazes, é fundamental que garantamos que nossas Artilharia de Asteróide sejam capazes de acompanhar o ritmo cada vez maior de desenvolvimento de navios de guerra. Integrando várias novas tecnologias emergentes, como dimensões mais altas a engenharia e os reatores de singularidade garantirão que a Artilharia de Asteróide continue a ser um ativo competitivo na guerra galáctica. "
  allow_asteroid_artillery_dmg_upgrade:0 "Danos em armas de artilharia de asteróide:§G+35%§!\nAlcance das armas de artilharia de esteróide:§G+20%§!\nPontos de atualização da artilharia de asteróide:§G+3§!"
  
  giga_not_enough_alloys:99 "We do not have enough alloys."
  
  giga_tech_asteroid_artillery_health_upgrade:0 "Geradores de Escudo Asteróide Avançado"
  giga_tech_asteroid_artillery_health_upgrade_desc:0 "Aumentar a capacidade de sobrevivência de nossas artilharias de asteróide é crucial e, portanto, melhorar seus geradores de escudo permitirá que sobrevivam a punições adicionais."
  
  allow_asteroid_artillery_hp_upgrade:0 "Escudo de artilharia de asteróide HP:§G+25%§!\nRegeneração do escudo de artilharia de asteróide:§G+2%§!\nPontos de atualização da artilharia de asteróide:§G+2§!"
  
  giga_artillery.1004.name:0 "Estrutura de artilharia de asteróide construída"
  giga_artillery.1004.desc:0 "A estrutura para uma futura artilharia de asteróide foi concluída no sistema§Y[giga_system.GetName]§!. Esta pequena construção envolve o asteróide e abriga instalações de mineração que coletarão a massa do asteróide e prepararão seu interior para a instalação de um reator colossal.\n\ nEle suportará adicionalmente uma variedade de baterias de armas auxiliares para complementar o próximo canhão principal da arma. As artilharias de asteróide têm uma manutenção de§Y100§!£energy£e§Y25§!£alloys£.\n\ n§YNão se esqueça de projetar$name_asteroid_artillery$no Ship Designer!§! "
  giga_artillery.1004.a:0 "Bom."
  
  giga_artillery.1005.name:0 "Construída a artilharia de asteróide!"
  giga_artillery.1005.desc:0 "Uma artilharia de asteróide foi totalmente construída no sistema§Y[giga_system.GetName]§!. Ancorada em um asteróide particularmente grande, esta fortaleza imóvel apresenta um canhão espinhal gigante complementado por armamento instalado em sua estrutura .\n\ n§YA artilharia de asteróide pode ser atualizada clicando no botão "Gerenciar atualizações" na IU da megaestrutura. Se ela for destruída, poderemos reconstruí-la mais tarde e ela conservará todas as suas atualizações anteriores.§! "
  giga_artillery.1005.a:0 "Ótimo!"
  
  asteroid_artillery_config:0 "Gerenciar atualizações"
  asteroid_artillery_config_DESC:0 "Atualize esta artilharia de asteróide."
  
  giga_artillery.1002.name:0 "Artilharia de asteróide destruída!"
  giga_artillery.1002.desc:0 "Uma de nossas artilharias de asteróide foi destruída no§Y[ast_artillery_destroyed_system.GetName]§! sistema após um combate feroz com o§Y[From.GetName]§!.\n\ nA construção defensiva foi foi reduzido a um grande naufrágio ao redor de seu asteróide e pode ser reconstruído no futuro se eventualmente conseguirmos recuperá-lo. Se ele tivesse sido atualizado, repará-lo conservará quaisquer atualizações que possa ter. "
  giga_artillery.1002.a:0 "Maldições!"
  
  giga_tech_asteroid_artillery_planetcraft_upgrade:0 "Arma de asteróide modernizada"
  giga_tech_asteroid_artillery_planetcraft_upgrade_desc:0 "As aeronaves gigantescas extrapolaram os limites do design e da sanidade de uma nave mais do que nunca. Nossas artilharias de asteróide devem se adaptar se quiserem permanecer ativos defensivos potentes nesta era de guerra planetária."
  
  allow_asteroid_artillery_planetcraft_upgrade:0 "Casco / armadura de artilharia de asteróide:§G+40%§!\nTaxa de fogo de artilharia de esteróide:§G+40%§!\nPontos de atualização da artilharia de asteróide:§G+3§!"
  
  giga_tech_repeatable_asteroid_artillery_upgrade:99 "Streamlined Artillery Design"
  giga_tech_repeatable_asteroid_artillery_upgrade_desc:0 "Outras melhorias podem ser feitas no design de nossas artilharias de asteróide para aumentar quantas vezes elas podem ser atualizadas."
  
  adds_one_ast_art_point:99 "Asteroid Artillery Upgrade Points §G+1§!"
  
  name_asteroid_artillery:0 "Artilharia Asteróide"
  
  giga_tech_repeatable_asteroid_artillery_cap:0 "Protocolos de gerenciamento de artilharia de asteróide"
  giga_tech_repeatable_asteroid_artillery_cap_desc:0 "Protocolos avançados de construção e manutenção para permitir a construção e o gerenciamento de§YArtilarias Esteroides§ adicionais! dentro das fronteiras de nosso império."
  giga_asteroid_artillery_capacity_increase_title:0 "§YArtilharia esteróide§! capacidade:§G+1§!"
  giga_asteroid_artillery_capacity_increase_desc:0 "A capacidade do Império para§YArtilharia esteróide§! é aumentada em§G+1§!"
  
  giga_artillery.1003.name:0 "Reparação da artilharia de asteróide!"
  giga_artillery.1003.desc:0 "Consertamos com sucesso uma artilharia de asteróide no sistema§Y[giga_system.GetName]§!. A estrutura voltou a funcionar e agora está pronta para defender nosso território.\n\ nQualquer atualização aplicada anteriormente à estrutura também foi conservada. "
  giga_artillery.1003.a:0 "Maravilhoso!"
  
  dormant_aeternum_governor:0 "Supervisor"
  
  pc_giga_asteroid_artillery:0 "Artilharia Asteróide"
  pc_giga_asteroid_artillery_desc:0 "Este asteróide foi convertido em uma arma defensiva."
  
