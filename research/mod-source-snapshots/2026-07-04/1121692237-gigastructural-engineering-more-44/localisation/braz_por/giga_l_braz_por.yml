  ### Computers
  GIGA_MOON_COMPUTER:0 "Lua de Guerra AI"
  GIGA_MOON_COMPUTER_DESC:0 "A Lua da Guerra ficará em um alcance muito longo (§Y250§!) E disparará sua Lança de Aniquilação Ômega nos alvos disponíveis."
  
  GIGA_PLANET_COMPUTER:0 "$name_war_planet$AI"
  GIGA_PLANET_COMPUTER_DESC:0 "O$name_war_planet$ficará em um alcance muito longo (§Y300§!) E disparará seu conjunto de armas contra os alvos disponíveis."
  GIGA_SYSTEM_COMPUTER:0 "Computadores Solares de Combate"
  GIGA_SYSTEM_COMPUTER_DESC:0 "Matrizes gigantescas de computadores do tamanho de um planeta calculando constantemente a melhor estratégia para o$name_war_system$. O Systemcraft ficará em longo alcance e disparará seu armamento."
  QSO_COMPUTER:0 "Computador Calibrador Quasi-Stellar"
  QSO_COMPUTER_DESC:0 "O Calibrador Quasi-Stellar ficará o mais longe possível dos inimigos."
  
  
  ### Auras
  SHIP_AURA_PLANET:0 "Presença Planetária"
  SHIP_AURA_PLANET_DESC:0 "A visão de um planeta inteiro lutando no campo de batalha é certamente algo para se ver. Sua atração gravitacional afeta as naves inimigas."
  SHIP_MOBILE_SYSTEM:0 "Estaleiros Hiperescavados Planetários"
  SHIP_MOBILE_SYSTEM_DESC:0 "O$name_war_system$dobra como uma base massiva onde nossas grandes armadas podem consertar e reabastecer à vontade."
  aura_ship_gravity_well:99 "$aura_category_offensive$"
  aura_systemcraft:0 "$aura_category_defensive$-$aura_type_support$"
  
  ### Armor
  ARMOR_QUBERINE:0 "Armadura de Neutrônio com Quberine"
  ARMOR_QUBERINE_DESC:0 "Ligas de neutrônio aprimoradas com pequenas quantidades de Quberine do Mundo Quadrado, aumentando a tenacidade do revestimento."
  SMALL_ARMOR_QUBERINE:0 "Pequena Armadura de Neutrônio Atada com Quberine"
  MEDIUM_ARMOR_QUBERINE:0 "Armadura de Neutrônio Ligada por Quberine Média"
  LARGE_ARMOR_QUBERINE:0 "Grande Armadura de Neutrônio com Quberine Atado"
  
  REACTOR_PLANET:0 "Reator de núcleo planetário"
  REACTOR_PLANET_DESC:0 "Um reator verdadeiramente gigantesco construído dentro do núcleo de um planeta. Ele fornece a imensa quantidade de energia necessária para alimentar o conjunto de canhões principal da nave, que consiste no Feixe Apagador Omega e dezenas de pequenas armas."
  REACTOR_SYSTEM:0 "Estrela Cativa"
  REACTOR_SYSTEM_DESC:0 "Uma estrela inteira é mantida cativa e usada para fornecer energia a este navio gigantesco."
  
  ### Drives
  GIGA_MOON_DRIVE:0 "Hiperdrive Planetário"
  GIGA_MOON_DRIVE_DESC:0 "Um hiperdrive massivo que pode deformar uma lua inteira através do subespaço."
  QSO_JUMP_DRIVE:99 "Quasi-Stellar Calibrator Jump Drive"
  QSO_JUMP_DRIVE_DESC:0 "Um Jump Drive especialmente criado, capaz de imensa distância de salto."
  
  ### Auxiliary
  SYSTEMCRAFT_ALLOY_FOUNDRIES:0 "Fundições Planetárias"
  SYSTEMCRAFT_ALLOY_FOUNDRIES_DESC:0 "§GProdução: \n20 Ligas§! \ N§YManutenção: \n40 Minerais \n2 Motos voláteis§! \ NFundamentos construídos em um dos planetas do Systemcraft, nos fornecendo ligas."
  SYSTEMCRAFT_DYSON_CAPACITOR:0 "Capacitor Dyson"
  SYSTEMCRAFT_DYSON_CAPACITOR_DESC:0 "§GProdução: \n20 Energia§! \ NUm grande capacitor redirecionando parte da energia da estrela central diretamente para a nossa economia."
  SYSTEMCRAFT_WEAPONS_PLANT:0 "Plantas de Munições Voláteis"
  SYSTEMCRAFT_WEAPONS_PLANT_DESC:0 "§YManutenção: \n15 Ligas \n1 Mote§! \ NEstas grandes fábricas fabricam munição explosiva de alta qualidade que pode ser lançada em planetas infelizes próximos."
  SYSTEMCRAFT_STABILITY:0 "Estabilizador Hiperdimensional"
  SYSTEMCRAFT_STABILITY_DESC:0 "§YUpkeep: \n50 Ligas \n50 Energia \n5 Nanites \n2.5 Matéria Escura§! \ NEste edifício emprega campos esotéricos de macroestabilização de dimensão superior para melhorar a integridade estrutural da Systemcraft."
  SYSTEMCRAFT_SHIELD:0 "Escudo Planetário"
  SYSTEMCRAFT_SHIELD_DESC:0 "§YManutenção: \n150 Energia \n3 Matéria Escura§! \ NProjetores de escudo colossal capazes de proteger um planeta inteiro."
  
  ### Weapons
  GIGA_MOON_FIGHTER_1:0 "Hangares lunares"
  GIGA_MOON_FIGHTER_1_DESC:0 "Grandes quantidades de hangares capazes de lançar uma enorme quantidade de naves de ataque."
  GIGA_MOON_MISSILE_1:0 "Baterias de mísseis lunares"
  GIGA_MOON_MISSILE_1_DESC:0 "Baterias de mísseis enormes construídas na superfície da lua, capazes de devastação imensa."
  GIGA_OMEGA_LANCE_1:0 "Lança de Aniquilação Ômega"
  GIGA_OMEGA_LANCE_1_DESC:0 "Uma arma literal do tamanho da lua. Alimentada por um enorme reator instalado no núcleo do planeta e regulado por uma infinidade de sistemas abaixo da crosta, esta lança de energia pode e irá destruir tudo em seu caminho. É quase como um arma colosso, mas montada em um navio. "
  GIGA_PLANET_MISSILE_1:0 "Baterias de mísseis planetários"
  GIGA_PLANET_MISSILE_1_DESC:0 "Baterias de mísseis massivas construídas na superfície do planeta, capazes de uma devastação imensa."
  GIGA_PLANETARY_RAILGUN:99 "Planetary Railgun"
  GIGA_PLANETARY_RAILGUN_DESC:99 "A version of the $MASS_ACCELERATOR_2$ that has been scaled up a hundredfold, probably capable of shooting a hole through a small moon."
  GIGA_SUPER_OMEGA_LANCE_1:99 "Omega Eraser Beam"
  GIGA_SUPER_OMEGA_LANCE_1_DESC:0 "Uma versão muito, muito mais forte da Lança de Aniquilação Ômega. Um reator gigantesco alimenta esta arma monstruosa, que atrapalha até mesmo$name_war_moon$. Ela apagará absolutamente tudo que estiver em seu caminho."
  SYSTEMCRAFT_KATZENLAND_LANCE_1:99 "Ray of Doom"
  SYSTEMCRAFT_KATZENLAND_LANCE_1_DESC:0 "Uma lança poderosa projetada para complementar as armas principais do Systemcraft."
  SYSTEMCRAFT_RAY_OF_DOOM_1:0 "Feixe de apagamento existencial"
  SYSTEMCRAFT_RAY_OF_DOOM_1_DESC:0 "O auge do armamento superdimensionado. Esses feixes de escala e poder inimagináveis ​​rasgam o próprio espaço-tempo e excluem o alvo da realidade. Não apenas impactam de vários planos de existência de dimensões superiores, mas as energias cataclísmicas também vazam para frente e para trás através do fluxo temporal, obliterando o alvo em todo o tempo. "
  GIGA_STELLAR_HYPERCANNON:99 "Stellar Hypercannon"
  GIGA_STELLAR_HYPERCANNON_DESC:99 "Solid rods of pure neutronium accelerated to 0.98c are sure to do unthinkable damage to any ships unfortunate enough to be struck by one."
  QUASISTELLAR_GUN_ENTITY:0 "Lança de obliteração quase estelar"
  QUASISTELLAR_GUN_ENTITY_DESC:0 "Um laser disparado direto de um$name_quasistellar$, acumulando tanta energia quanto a produção energética total da galáxia."
  
