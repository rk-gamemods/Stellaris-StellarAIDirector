  giga_katrebels.2011.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! ao lado de vários grupos Ravkan para realizar uma operação na terra de§YRavka§ !. Eles terão como alvo os campos de treinamento de Katzenarmee, onde os Ravkans são recrutados e treinados para os Katzen Forças armadas. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YRavkanien§!§Aumentarão§!. \nOs Katzens sofrerão§Ydiminuição dos danos ao exército§!. \nKatzen Cautela§Ravkanien§! por§ R2§!. \ N \n§YSe falha§!: \ NKatzen Wariness será§R1§! Por§R1§!. \ N \n§YChance of success§!: \ NBase:§Y75%§! \ N§ HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \ N§HModerate Katzen Grasp em Ravkanien§ !:§R-20%§! \ N§BPartisans em Lyuinstaat§ !:§G +ly [flusion_primitives_country] %§! \ N§BPartidários em Linteria§ !:§G+[flusion_primitives_country.zousa_res_perc]%§! \ N§BPartidários em Rokalien§ !:§G+[flusion_primitives_country.solak_res_percotal]%§! \ NTais_cusões_Tais_de_tria_flusion_total:§Yflitotal_ ]%§! "
  
  giga_katrebels.2012.name:0 "Operações de resistência em§YLinteria§!"
  giga_katrebels.2012.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! juntamente com vários grupos zousanianos, bem como o governo zousaniano no exílio, para realizar uma operação na terra de§YLinteria§ !. Eles terão como alvo Katzen Hyperdrive centros de pesquisa e produção, a fim de reduzir as habilidades do Katzen FTL. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YLinteria§! irão§Aumentar§! . \nSe as atividades partidárias chegarem a§Rextreme§ !, o Katzen§Yjump-drive scrambler§! será desligado, permitindo que navios com§Yjump-drive§! se teletransportem para Jublio. \nKatzen Wariness irá§Rincrease§! por§R2§! . \n \n§YSe falhar§!: \nKatzen Wariness irá§Rincrease§! por§R1§!. \n \n§YChance of success§!: \nBase:§Y75%§! \n§HKatzen Wariness§§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \ N§HModerate Katzen Grasp em Linteria§ !:§R-20%§! \ N§BPartidários em Ravkanien§ !:§G+[flusion_primitives_country.ravka_res_perc]%§! \n§BPartidários em Geschwollen§ !:§G+[flusion_ primitives_country.puffy_res_perc]%§! \nTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2013.name:0 "Operações de resistência em§YLyuinstaat§!"
  giga_katrebels.2013.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! juntamente com vários grupos Lyuinite para empreender uma operação na terra de§YLyuinita§ !. Eles terão como alvo os centros de pesquisa de Katzenarmee, onde os Katzen experimentam designs de escudos para seus embarcações. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YLyuinstaat§! irão§Aumentar§!. \nOs Katzens sofrerão de§Ydiminuição do escudo HP§!. \nKatzen Cautela§Rumentará§! por§R2§!. \ N \n§YSe falha§!: \ NKatzen Wariness irá§R1§! Por§R1§!. \ N \n§YChance of success§!: \ NBase:§Y75%§! \ N§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \ N§HHigh Katzen Grasp em Lyuinstaat§ !:§R-30%§! \ N§BPartidários em Ravkanien§ !:§G+[flusion_primitives_country.ravc§! \ N§BPartidários em Katzen Herzlands§ !:§G+[flusion_primitives_country.katzen_res_perc]%§! \ N§BPartidários em Rokalien§ !:§G+[flusion_primitives_country.solak_res_perc]%§!§G+[flusion_primitives_country.puffy_re s_perc]%§! \nTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2014.name:0 "Resistance Operações em§YGeschwollen§! "
  giga_katrebels.2014.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! ao lado de uma miríade de grupos formados por diversas espécies para realizar uma operação na terra de§YGeschwollen§ !. Eles terão como alvo as fábricas de munição Katzenarmee onde os Katzen produzir e armazenar munição para seu armamento cinético e as minas de urânio que os Katzens usam para coletar urânio valioso para suas armas cinéticas. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YGeschwollen§! irão§Geschwollen§! nOs Katzen sofrerão de§Ydano cinético diminuído§!. \nKatzen Wariness irá§Raumentar§! por§R2§!. \n \n§YSe falhar§!: \nKatzen Wariness irá§Rincrease§! por§R1§ !. \n \n§YChance of success§!: \nBase:§Y75%§! \n§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \n§HHigh Katzen Grasp em Geschwollen§ !: R-30%§! \ N§BPartisans in Linteria§ !:§G+[flusion_primitives_country.zousa_res_perc]%§! \ N§BPartisans in Katzen Herzlands§ !:§G+[flusion_primitives_country.katzen_res_perc]%§! \ N§BPartisans in Katzen Herzlands§ !:§G+[flusion_primitives_country.katzen_res_perc]%§! eu yuinstaat§ !:§G+[flusion_primitives_country.lyuin_res_perc]%§! \n§BPartisans em Arivoejien§ !:§G+[flusion_primitives_country.symby_res_perc]%§! \n§BPartisusion_primitives_country]% ​​§! \n§BPartisusion_primitives_country]% ​​§try_primres_prim_res_perc] %.laperenda_res_perc.§! \ NTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2015.name:0 "Operações de resistência em§YLaurendaar§!"
  giga_katrebels.2015.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! ao lado de alguns rebeldes nativos Laurnaise para empreender uma operação na terra de§YLaurendaar§ !. Eles terão como alvo os estúdios de propaganda de Katzen, onde os Katzen gravam filmes e filmes lisonjeiros sobre seu império. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YLaurendaar§! irão§Aumentar§!. \nOs Katzens sofrerão de§Ydiminuição do moral do exército§!. \nKatzen A cautela irá§Aumentar§! por§R2§!. \ N \n§YSe falha§!: \ NKatzen Wariness irá§R1§!. \ N \n§YChance of success§!: \ NBase:§Y75%§! \ N§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \ N§HModerate Katzen Grasp em Laurendaar§ !:§R-20%§! \ N§BPartisans em Geschwollen§ !:§G+[flusion_resprimcitives_cuffives_ ]%§! \ NTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2016.name:0 "Operações de resistência em§YMercurreich§!"
  giga_katrebels.2016.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! ao lado dos mercurianos nativos na terra de§YMercuria§ !. Eles terão como alvo laboratórios e campos de testes onde os Katzens projetam novos armamentos explosivos. \n \n§ Se bem-sucedido§!: \ NAs atividades partidárias em§YMercurreich§! Irão§Aumentar§!. \ NOs Katzens sofrerão de§Ydiminuição dos danos dos mísseis§!. \ NKatzen Wariness irá§Rincrease§! Por§R2§!. \ N \n§YSe falhar§!: \ NKatzen Cautela irá§Rincrease§! Por§R1§!. \ N \n§YChance de sucesso§!: \ NBase:§Y75%§! \ N§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \n§HBaixo Katzen Grasp em Mercurreich§ !:§R-10%§! \nTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2017.name:0 "Operações de resistência em§YArivoejien§!"
  giga_katrebels.2017.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! ao lado dos poucos Wacegi que ainda vivem em§YArivoejien§! em uma operação para paralisar as instalações de produção de combustível e campos de teste de propulsores de Katzen. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YArivoejien§! irão§Aumentar§!. \nOs Katzens sofrerão de§Ydiminuição da velocidade do navio§!. \nKatzen Cautela irá§R2§! por§R2§!. \n \n§ Se falhar§!: \ NKatzen Cautela irá§Rincrease§! Por§R1§!. \ N \n§YChance de sucesso§!: \ NBase:§Y75%§! \ N§HKatzen Cautela§ !:§R- [ flusion_primitives_country.katzen_wary_perc]%§! \n§HModerate Katzen Grasp em Arivoejien§ !:§R-20%§! \n§BPartidários em Geschwollen§ !:§G+[flusion_primitives_country.potaly_res_perc]%§! flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2018.name:0 "Operações de resistência em§YKatzen Herzlands§!"
  giga_katrebels.2018.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! e os poucos indivíduos que se opõem ao governo de Katzen em§YKatzen Herzlands§ !. Eles tentarão paralisar as fábricas militares e a indústria de Katzen na região, sem dúvida terá um impacto drástico no desempenho de suas armas. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YKatzen Herzlands§! terão§Aumentar§!. \nOs Katzens sofrerão§Ydiminuição de danos causados ​​por armas§! . \nKatzen Wariness irá§Rincrease§! por§R2§!. \n \n§YSe falhar§!: \nKatzen Wariness irá§Rincrease§! by§R1§!. \n \n§YChance of success§ !: \nBase:§Y75%§! \n§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \n§HExtreme Katzen Grasp em Katzen Herzlands§ !:§R-40%§! \n§ BPartisans in Rokalien§ !:§G+[flusion_primitives_country.solak_res_perc]%§! \ N§BPartisans in Lyuinstaat§ !:§G+[flusion_primitives_country.lyuin_res_perc]%§! \ N§BPartisans em Gespercidas!c]%§! \nTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2019.name:0 "Operações de resistência na§YKatown Megalópolis§!"
  giga_katrebels.2019.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! em uma operação temerária para atacar o coração da civilização Katzen: Katown. Eles tentarão interromper o alto comando de Katzen, bem como os vários geradores de escudos localizados abaixo a cidade, mas o domínio extremamente alto de Katzen na área tornará isso difícil. \n \n§YSe for bem-sucedido§!: \nAs atividades partidárias na§YMegalópole de Katown§! irão§Aumentar§!. \nOs Katzens sofrerão de§ Y diminuiu a saúde do exército§! E§Yaumento dos danos de bombardeio orbital§! No Flusion. \ NSe as atividades partidárias atingirem§Rsignificantes§ !, o§Campo de Yanti-buraco de minhoca§! De Katzen será encerrado, permitindo o uso de hiperarmas no Flusion. as atividades alcançam§Rextremo§ !, o§Rextremo§! de Katzen será encerrado, expondo o planeta a ataques psiônicos. \nKatzen Cautela§Raumentará§! por§R2§!. \n \n§YSe falhar§!: \nKatzen Cautela§Raumentará§! por§R1§!. \n \n§YChance de sucesso§!: \nBase:§Y75%§! \n§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \ N§HInfaturável Katzen Grasp na Katown Megalopolis§ !:§R-60%§! \ N§BPartidários em Katzen Herzlands§ !:§G+[flusion_primitives_country.katzen]§! \ NTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
