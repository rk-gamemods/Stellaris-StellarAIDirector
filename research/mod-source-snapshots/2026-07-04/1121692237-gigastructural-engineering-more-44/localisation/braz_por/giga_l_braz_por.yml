  giga_katrebels.2010.name:0 "Operações de resistência in§YRokalien§! "
  giga_katrebels.2010.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! a empreender uma operação em sua terra natal de§YRoqualia§ !. Eles vão ter como alvo bancos de dados cruciais de Katzen e vazar dados militares de Katzen para a galáxia, permitindo causam mais danos aos navios. \n \n§YSe bem-sucedido§!: \nAs atividades partidárias em§YRokalien§! irão§Aumentar§!. \nOs Katzens sofrerão§Yaumento dos danos do inimigo§!. \nKatzen Cautela§Rumentará§! Por§R2§!. \ N \n§YSe falha§!: \ NKatzen Wariness irá§Rincrease§! Por§R1§!. \ N \n§YChance of success§!: \ NBase:§Y75%§ ! \n§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \n§HHigh Katzen Grasp em Rokalien§ !:§R-30%§! \n§BPartidários em Lyuinstaat§ !:§G+[ flusion_primitives_country.lyuin_res_perc]%§! \n§BPartidários em Katzen Herzlands§ !:§G+[flusion_primitives_country.katzen_res_perc]%§! \n§BPartidários em Ravkanienkan§ !:§G+[flusion_primitives_country.katzen_res_perc]%§! \n§BPartidários em Ravkanien ]§ !:§G+[flusion_primitives_country] Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
