  ###BLOKKAT UPDATE###
  giga_mega.600.name:99 "Constructing Orbital Arcology"
  giga_mega.600.desc:99 "We can complete the Orbital Arcology around §Y[orbital_arcology_planet.GetName]§! provided we possess sufficient alloys. Given §Y[orbital_arcology_planet.GetName]§!'s size, the cost of the project is estimated to be §Y[ROOT.orbital_arcology_alloy_cost]§! £alloys£\n\nThe bonuses granted by the arcology will also scale based on the planet's size.\n\nIf completed, this arcology should grant §Y[orbital_arcology_planet.GetName]§! an extra §Y[orbital_arcology_planet.orbital_arcology_modifier]§! §HGenerator§! and §GFarming§! Districts if it can support them, as well as §Y[orbital_arcology_planet.orbital_arcology_modifier_districts]§! §BDistrict Slots§!.\n\nThe megastructure's build time is estimated at §Y900§! days and will have an upkeep of §Y15§! £energy£ and §Y5§! £alloys£ regardless of planet size."
  giga_mega.600.a:99 "Let us proceed. | §Y[ROOT.orbital_arcology_alloy_cost]§! £alloys£"
  giga_not_enough_alloys:99 "We do not have enough alloys."
  giga_mega.600.b:99 "On second thought, not now."
  
  orbital_arcology_0_site:99 "$name_orbital_arcology$ Construction Site"
  orbital_arcology_0_site_DESC:99 "The construction site for an $name_orbital_arcology$, which is a miniature ringworld encircling this planet. It will provide large amounts of space for our industries."
  
  orbital_arcology_0_upgrade:99 "Construct Orbital Arcology"
  orbital_arcology_0_upgrade_DESC:99 "This construction platform is being upgraded into a full Orbital Arcology."
  
  orbital_arcology_1:99 "$name_orbital_arcology$"
  orbital_arcology_1_DESC:99 "A miniature ringworld-like structure circling a planet's equator, providing its inhabitants with additional district slots."
  
  orbital_arcology_2:99 "Enhanced $name_orbital_arcology$"
  orbital_arcology_2_DESC:99 "A double miniature ringworld-like structure circling a planet's equator and poles, providing its inhabitants with additional district slots."
  
  orbital_arcology_3:99 "Maximized $name_orbital_arcology$"
  orbital_arcology_3_DESC:99 "A triple miniature ringworld-like structure circling a planet's equator and poles, providing its inhabitants with additional district slots."
  
  giga_tech_tetradimensional_engineering:0 "Engenharia Tetradimensional"
  giga_tech_tetradimensional_engineering_desc:0 "Quando uma estrutura fica muito grande e muito complexa, nenhuma quantidade de suporte será capaz de evitar que ela desmorone sobre si mesma. Portanto, torna-se necessário fazer uso de construções enraizadas em dimensões superiores para estabilizar essas gigantescas estruturas gigantes . Isso abre caminho para muitas tecnologias inovadoras, como a capacidade de encaixar mais matéria em um determinado volume sem que ele entre em colapso em um buraco negro e de ser capaz de desafiar a gravidade em escalas inimagináveis. Isso também permite a criação de materiais capazes de suportar quantidades absolutamente ridículas de estresse. "
  
  giga_mega.500.name:99 "Gigaconstruction Traditions"
  giga_mega.500.desc:99 "Our recent inquiries into §YTetradimensional Engineering§! have cemented our position as the upcoming galactic masters of megascale engineering.\n\nSubsequently, a new set of §YGigaconstruction Traditions§! has been unlocked if we wish to focus even further on our path towards complete mastery of the cosmos."
  giga_mega.500.a:99 "Noted."
  giga_mega.500.a.tooltip:99 "A new §YTradition Tree§! is now available."
  
  mod_damage_vs_country_type_hke_country_mult:99 "Damage to the Holy Katzen Empire"
  
  mod_shipsize_giga_planet_behemoth_tracking_mult:99 "Behemoth Planetcraft Tracking"
  mod_shipsize_giga_war_moon_tracking_mult:99 "Attack Moon Tracking"
  
  tradition_gigaengineering:99 "Gigaconstruction"
  tradition_gigaengineering_desc:99 "Our destiny lies in the realization of our wildest ambitions. It cannot be any other way."
  
  tr_gigaengineering_adopt:99 "Gigaconstruction Traditions"
  tr_gigaengineering_finish:99 "Gigaconstruction Traditions Finished"
  
  tr_gigaengineering_grand_ambitions:99 "Administrative Streamlining"
  tr_gigaengineering_grand_ambitions_delayed:99 "We cannot let administrative burden get in the way of our rightful ambitions. Our bureaucracy must be simplified to ensure our projects experience no unnecessary delays."
  
  tr_gigaengineering_mega_monuments:99 "Grand Monuments"
  tr_gigaengineering_mega_monuments_delayed:99 "Megastructures are the manifestation of our absolute dominance over the cosmos itself - and they shall be regarded as such for eons to come."
  
  tr_gigaengineering_power_cores:99 "Gigastructural Power Cores"
  tr_gigaengineering_power_cores_delayed:99 "Our vast constructs need vast power sources. Further investments into large-scale power generation and transfer will ensure our precious energy is handled at maximum efficiency."
  
  tr_gigaengineering_super_planets:99 "Celestial Dominance"
  tr_gigaengineering_super_planets_delayed:99 "Celestial Warships are the future of warfare and as such must be constantly enhanced in every way possible to ensure their continued dominance over the galactic battlefield."
  
  tr_gigaengineering_anticrisis:99 "Ultimate Bulwarks"
  tr_gigaengineering_anticrisis_delayed:99 "Our enemies are many, but our equals are none. Thanks to our great feats of engineering, we will be able to repel any and all threats to our sovereignty."
  
