  nicoll_beam_recharge_after_damage_DESC:99 "$nicoll_beam_4_DESC$"
  nicoll_beam_menu:99 "$nicoll_beam_4$"
  nicoll_beam_menu_DESC:99 "$nicoll_beam_4_DESC$"
  requires_ndb_recharge:99 "This $nicoll_beam_4$ is still recharging, it will be ready §Y[solar_system.nicoll_beam_recharge]§!"
  #########################################
  ### Automated Stripmine #################
  #########################################
  giga_tech_automated_stripmine_1:0 "Replicação Ultrarápida Industrial"
  giga_tech_automated_stripmine_1_desc:0 "Avanços na impressão 3D e construção modular podem levar a técnicas de construção exponencialmente mais rápidas."
  
  giga_tech_automated_stripmine_2:0 "Extração Mineral Planetária"
  giga_tech_automated_stripmine_2_desc:0 "Graças às técnicas avançadas de construção orbital, bem como às novas máquinas de escavação industrial ultra-replicantes, a perspectiva de extrair todos os minerais de um planeta pode se tornar uma realidade."
  
  #########################################
  ### Kugelblitz ##########################
  #########################################
  giga_tech_kugelblitz:0 "Contenção Artificial Kugelblitz"
  giga_tech_kugelblitz_desc:0 "A capacidade de gerar um Kugelblitz pode ser útil, já que esses objetos podem ser usados ​​como geradores de singularidade eficientes. Mais importante, Kugelblitzes controlados podem ser alimentados com matéria e energia para recuperação posterior, efetivamente atuando como um dispositivo de armazenamento Black Hole."
  
  giga_tech_kugelblitz_2:99 "Refined Artificial Kugelblitz Containment"
  giga_tech_kugelblitz_2_desc:99 "Containment and safe storage of a larger artificial singularity will be a great boon. Allowing for an effective increase in our ability to store materials to meet the ever-increasing demands of larger construction projects."
  
  giga_tech_kugelblitz_3:99 "Artificial Kugelblitz Containment"
  giga_tech_kugelblitz_3_desc:99 "The ability to generate a Kugelblitz could prove useful, as such objects could be used as efficient singularity generators. Most importantly, controlled Kugelblitzes could be fed matter and energy for later recovery, effectively acting as a Black Hole storage device."
  
  #########################################
  ### Substellar Compressor ###############
  #########################################
  giga_tech_substellar_compressor:99 "Helioforming"
  giga_tech_substellar_compressor_desc:0 "Os anões marrons chegaram perto de iniciar as reações de fusão e se tornarem estrelas. Com as tecnologias certas e alguns recursos, pode ser possível dar-lhes o impulso necessário para que se acendam."
  
  giga_dialog.1701.name:0 "$name_sub_compressor$Site Built"
  giga_dialog.1701.desc:0 "O canteiro de obras de um futuro$name_sub_compressor$foi construído no [giga_system.GetName]. Sobre este andaime, construiremos um dispositivo capaz de gerar uma nova estrela de uma anã marrom. O marrom O extenso sistema lunar de Dwarf será drasticamente aquecido, e algumas das luas podem se tornar habitáveis ​​ou terraformáveis. "
  giga_dialog.1701.a:0 "Excelente."
  
  giga_dialog.1702.name:0 "$name_sub_compressor$Magnetopanels Built"
  giga_dialog.1702.desc:0 "Nossos magnetopanéis de$name_sub_compressor$estão concluídos. Esses painéis maciços serão capazes de usar campos magnéticos para gerar calor dentro do núcleo da anã marrom, tornando possível iniciar as reações de fusão."
  giga_dialog.1702.a:0 "Ótimo."
  
  giga_dialog.1703.name:0 "$name_sub_compressor$Built"
  giga_dialog.1703.desc:0 "Nosso$name_sub_compressor$está concluído! Ele foi equipado com moduladores gravitacionais massivos capazes de comprimir a anã marrom a um volume menor, um passo crucial para acendê-la. Agora, devemos começar a esmagar a anã marrom Anão e aumentando lentamente sua temperatura central para, eventualmente, permitir que reações de fusão sustentáveis ​​ocorram. Observe que este será um processo bastante demorado e que consome muita energia. "
  giga_dialog.1703.a:0 "Continue os esforços."
  
  giga_dialog.1704.name:0 "$name_sub_compressor$- Estágio de compactação concluído"
  giga_dialog.1704.desc:0 "Outro passo para o nascimento de uma nova estrela. A anã marrom no sistema [giga_system.GetName] foi comprimida ao ponto onde sua densidade é quase alta o suficiente para permitir que as reações de fusão ocorram. Tudo o que resta a fazer agora é aquecer seu núcleo um pouco mais usando os magnetopanéis, desencadeando uma reação em cadeia e acendendo a anã marrom. "
  giga_dialog.1704.a:0 "Quase lá."
  
  giga_dialog.1705.title:0 "Estrela acesa"
  giga_dialog.1705.desc:0 "Em um feito maravilhoso de engenharia e tecnologia, nosso$name_sub_compressor$aqueceu o núcleo da anã marrom a ponto de o hidrogênio começar a se fundir em hélio, gerando energia e iniciando uma reação em cadeia, causando o núcleo de a anã marrom para acender, eventualmente incendiando todo o corpo celestial e transformando-o em uma nova estrela. Podemos afirmar que fizemos o que poucos impérios ousaram imaginar: dar à luz uma nova estrela. \n \nO$name_sub_compressor$agora está coletando o energia da estrela e estudando seus processos de fusão, e também estabiliza a estrela recém-nascida. Nossos cientistas relatam que o sistema lunar da ex-anã marrom foi drasticamente alterado e pelo menos uma lua tornou-se habitável. Estimamos que cada uma delas luas (ou são tecnicamente planetas agora?) agora é terraformável. "
  giga_dialog.1705.a:0 "Uma estrela brilha."
  giga_dialog.1705.b:99 "Wondrous new worlds born."
  giga_dialog.1705.b.tooltip:99 "Adds a selection of natural blockers to any newly-habitable moons, ready for our §Y$job_ranger_plural_with_icon$§!."
  
  # Jupiter -> Lucifer, a reference to 2010: Odyssey Two
  NAME_giga_Lucifer:99 "Lucifer"
  
  substellar_compressor_0:0 "$name_sub_compressor$Site"
  substellar_compressor_0_DESC:0 "O canteiro de obras de um$name_sub_compressor$, hospedando o pessoal necessário para construir um$name_sub_compressor$em torno de uma anã marrom."
  substellar_compressor_0_MEGASTRUCTURE_DETAILS:0 "Uma construção construída em torno de uma anã marrom para desencadear reações de fusão e acendê-la." #megalistentry SUBSTELLAR COMPRESSOR
  
  substellar_compressor_1:0 "$name_sub_compressor$Magnetopanels"
  substellar_compressor_1_DESC:0 "Esses grandes painéis são o primeiro passo para a construção de um$name_sub_compressor$. Eles podem utilizar campos magnéticos e outras forças para aquecer remotamente o interior da Anã Marrom."
  
  substellar_compressor_2:99 "$name_sub_compressor$"
  substellar_compressor_2_DESC:0 "Um$name_sub_compressor$completo. Ele foi equipado com dois compressores gravitacionais gigantescos, capazes de esmagar a Anã Marrom em um tamanho menor, a fim de iniciar as reações de fusão."
  
  substellar_compressor_3:0 "$name_sub_compressor$- Acreção"
  substellar_compressor_3_DESC:0 "Este$name_sub_compressor$está despejando grandes quantidades de matéria na anã marrom, lentamente, mas continuamente aumentando sua massa. Agora, devemos começar a comprimir a anã marrom até que ela alcance uma densidade crítica."
  
  substellar_compressor_4:0 "$name_sub_compressor$- Compressão"
  substellar_compressor_4_DESC:0 "Os compressores gravitacionais esmagaram a anã marrom em um tamanho menor. Basta dar a ordem e a anã marrom será ainda mais comprimida além do ponto crítico e se incendiará em uma nova estrela."
  
  substellar_compressor_5:0 "Acende a estrela"
  substellar_compressor_5_DESC:0 "Acende o interior da Anã Marrom e ativa reações de fusão."
  
  substellar_compressor_6:99 "$name_sub_compressor$"
  substellar_compressor_6_DESC:0 "Este$name_sub_compressor$acendeu com sucesso uma anã marrom."
  
  substellar_compressor_7:0 "Desmontar$name_sub_compressor$"
  substellar_compressor_7_DESC:0 "Desmontará este$name_sub_compressor$, se for necessário removê-lo por qualquer motivo."
  
  #########################################
  ### Star Lifter #########################
  #########################################
  giga_tech_star_lifter:99 "Hyperscale Stellar Lifting"
  giga_tech_star_lifter_desc:0 "Estrelas contêm quantidades incompreensíveis de recursos. Usando elevadores de gravidade especializados e fornos de fusão, esses recursos podem ser extraídos e convertidos em minerais utilizáveis!"
  
  giga_dialog.1601.name:0 "$name_starlifter$Construction"
  giga_dialog.1601.desc:0 "Aproveitar o poder das estrelas tem sido um sonho dos engenheiros [root.GetAdj] ao longo da história - da combustão bruta à pálida imitação da fusão solar - agora estamos prontos para realizar este sonho. O sistema [giga_system.GetName] é o suporte sobre o qual construiremos um$name_starlifter$, englobando [giga_system.GetName] e monopolizando a própria essência da estrela. Esta maravilha extrairá grandes quantidades de hidrogênio e hélio diretamente da infernal fotosfera da estrela e converterá eles em elementos mais pesados ​​por meio da fusão nuclear. A fusão de qualquer coisa além do ferrorequires energia externa, então os requisitos de energia desta construção serão incrivelmente altos. "
  giga_dialog.1601.a:0 "Em breve, teremos recursos incompreensíveis."
  
  giga_dialog.1602.name:0 "$name_starlifter$Frame"
  giga_dialog.1602.desc:0 "Com o frame$name_starlifter$agora em vigor, a incrível escala do projeto é evidente para todos. \n \n [giga_system.GetName] queima em uma gaiola estreita, mas eventualmente ficará completamente cercado por [root.GetAdj] painéis solares e gravilifts. "
  giga_dialog.1602.a:0 "Excelente."
  
  giga_dialog.1603.name:0 "$name_starlifter$Infraestrutura instalada"
  giga_dialog.1603.desc:0 "Embora ainda não concluído, com a instalação de colheitadeiras solares avançadas, começamos a usar a energia da estrela [giga_system.GetName] para alimentar os gravilvenadores e a usina de conversão de matéria. \n \nO assunto e as demandas de energia só continuarão a aumentar conforme a construção continua e a conversão de matéria é otimizada ainda mais. "
  giga_dialog.1603.a:0 "Mais uma etapa ..."
  
  giga_dialog.1604.name:0 "$name_starlifter$Infraestrutura instalada"
  giga_dialog.1604.desc:0 "Nosso$name_starlifter$está um passo mais perto da conclusão. [giga_system.GetName] fica cada vez mais escuro à medida que completamos outra parte da megaestrutura. A massa da estrela está sendo extraída continuamente em uma taxa crescente, alimentando os fornos de fusão de$name_starlifter$com mais hidrogênio e hélio. "
  giga_dialog.1604.a:0 "Mais uma etapa ..."
  
  giga_dialog.1605.name:0 "[giga_system.GetName]$name_starlifter$Completed"
  giga_dialog.1605.desc:0 "A estrela do sistema [giga_system.GetName] agora foi completamente envolvida por um [root.GetAdj]$name_starlifter$. \n \nNós alcançamos o que apenas um punhado de impérios estelares na história do galáxia ousou imaginar - a subjugação total de uma estrela. "
  giga_dialog.1605.a:0 "Saída mineral nominal."
  
  star_lifter_0:0 "$name_starlifter$Site"
  star_lifter_0_DESC:0 "Este site um dia fornecerá ao nosso império vários planetas valiosos de minerais."
  star_lifter_0_MEGASTRUCTURE_DETAILS:0 "A§Y$star_lifter_5$§! envolve totalmente uma determinada estrela, reunindo massa solar e convertendo-a diretamente em£minerais£Minerais." #gigalistentry STAR LIFTER
  star_lifter_0_CONSTRUCTION_INFO_DELAYED:99 ""
  
  star_lifter_1:0 "$name_starlifter$Frame"
  star_lifter_1_DESC:0 "Esta estrutura esguia um dia suportará um complexo de mineração que apagará o sistema estelar e nossa escassez de minerais."
  
  star_lifter_2:0 "$name_starlifter$Estágio 1"
  star_lifter_2_DESC:0 "Neste estágio de conclusão, este$name_starlifter$está produzindo cerca de 25% de seu rendimento potencial."
  
  star_lifter_3:0 "$name_starlifter$Estágio 2"
  star_lifter_3_DESC:0 "Neste estágio de conclusão, este$name_starlifter$está produzindo cerca de 50% de seu rendimento potencial."
  
  star_lifter_4:0 "$name_starlifter$Estágio 3"
  star_lifter_4_DESC:0 "Neste estágio de conclusão, este$name_starlifter$está produzindo cerca de 75% de seu rendimento potencial."
  
  star_lifter_5:99 "$name_starlifter$"
  star_lifter_5_DESC:0 "Este$name_starlifter$está totalmente operacional. Atualmente está produzindo quantidades astronômicas de minerais graças a conversores de fusão avançados e gravilift extraindo o hidrogênio e o hélio da estrela."
  
  #########################################
  ### Penrose Sphere ######################
  #########################################
  giga_tech_penrose_sphere_1:99 "Superradiant Scattering Exploitation"
  giga_tech_penrose_sphere_1_desc:0 "Buracos negros giratórios têm campos gravitacionais tão poderosos que literalmente arrastam o espaço-tempo junto com eles wainda girando. É teoricamente possível explorar este processo disparando luz em uma esfera de espelho especializada em torno de um buraco negro, que será amplificado pela região do espaço arrastada pelo buraco negro. "
  
  giga_tech_penrose_sphere_2:0 "Coleta controlada da ergosfera"
  giga_tech_penrose_sphere_2_desc:0 "Usando estabilizadores e moduladores especializados, é possível aumentar drasticamente a quantidade de radiação controlada que um$name_penrose$pode conter, aumentando drasticamente sua saída."
  
  giga_tech_penrose_sphere_3:0 "Autonomous Starless Mundo Anel Infrastructure"
  giga_tech_penrose_sphere_3_desc:0 "Teoricamente, pode ser possível montar um mundo em anel alimentado por$name_penrose$. Esse mundo em anel seria alimentado por radiação eletromagnética alimentada na ergosfera do Buraco Negro e poderia fornecer um refúgio seguro para bilhões e bilhões de anos, mesmo depois que as próprias estrelas morrem. "
  
  giga_dialog.1201.name:0 "$name_penrose$Canteiro de obras construído"
  giga_dialog.1201.desc:0 "O canteiro de obras de um futuro$name_penrose$foi concluído perto de [giga_system.GetName]. Sobre este andaime, devemos envolver completamente um buraco negro com um espelho hiper-reflexivo, a fim de explorar o energias gigantescas da rotação do Buraco Negro. "
  giga_dialog.1201.a:0 "Ótimo."
  
  giga_dialog.1202.name:0 "$name_penrose$Frame Built"
  giga_dialog.1202.desc:0 "A moldura para um futuro$name_penrose$foi construída perto de [giga_system.GetName]. Esta moldura esquelética um dia conterá espelhos enormes, construídos com os materiais mais reflexivos que podemos imaginar. terminar de construir esses espelhos, teremos a opção de transformar a estrutura em uma bomba massiva ou usá-la para coletar energia. "
  giga_dialog.1202.a:0 "Maravilhoso."
  giga_dialog.1202.b:99 "A bomb? What a preposterous idea."
  
  giga_dialog.1203.name:0 "Bomba de distorção de subespaço armada!"
  giga_dialog.1203.desc:0 "A Bomba de Distorção Subespacial no sistema [giga_system.GetName] agora acumulou energia suficiente para ser detonada! Tudo o que resta fazer agora é injetar um pouco mais de radiação na moldura do espelho, e a sobrecarga energética detonará a bomba. "
  giga_dialog.1203.a:0 "Excelente."
  
  giga_dialog.1204.name:0 "$name_penrose$Stabilized"
  giga_dialog.1204.desc:0 "Com a adição de dois estabilizadores enormes e incrivelmente complexos envolvendo o [giga_system.GetName]$name_penrose$, a energia agora está começando a fluir. O processo de dispersão superradiante agora pode ocorrer em escalas muito maiores que a estrutura foi devidamente controlada, gerando quantidades incrivelmente grandes de energia! "
  giga_dialog.1204.a:0 "Maravilhoso!"
  
  giga_dialog.1205.name:0 "$name_penrose$Mundo Anel Built"
  giga_dialog.1205.desc:0 "Em uma façanha de engenharia, um enorme ringworld foi construído em torno de$name_penrose$! Alimentado pelo próprio$name_penrose$, este ringworld será capaz de suportar mais habitats do que um ringworld convencional, obrigado à realocação de alguns dos sistemas de suporte do mundo do anel para o$name_penrose$. A própria esfera foi ligeiramente modificada para ajustar o fluxo de energia e partes de sua saída agora são dedicadas ao mundo do anel. O disco de acreção do Buraco Negro também foi removido, a fim de evitar uma colisão com o mundo dos anéis. "
  giga_dialog.1205.a:0 "Incrível."
  
  giga_dialog.1206.name:0 "$name_penrose_ring$Segmento concluído!"
  giga_dialog.1206.desc:0 "Um pedaço do mundo do anel ao redor de [giga_system.GetName] foi construído! Com nada menos que dois habitats do mundo do anel massivo, esta construção maravilhosa será capaz de abrigar nossa espécie até mesmo depois que as próprias estrelas morram . Esta conquista incrível é realmente um testemunho de nosso domínio sobre a engenharia megaestrutural. "
  giga_dialog.1206.a:0 "Que esta seja a nossa casa, para sempre."
  
  giga_dialog.1208.title:0 "Bomba de distorção subespaço detonando!"
  giga_dialog.1208.desc:0 "Temos agora eminjetamos radiação eletromagnética suficiente em nossa Bomba de Distorção Subespacial para empurrá-la além de seus limites. As radiações hiperamplificadas estão agora saltando para frente e para trás indefinidamente, e a moldura do espelho se estilhaçará muito em breve devido à sobrecarga de energia. Sente-se e aproveite os fogos de artifício! "
  giga_dialog.1208.a:0 "Fogos de artifício são sempre apreciados."
  
  #########################################
  ### Ringworld Upgrade ###################
  #########################################
  giga_tech_ringworld_upgrade:0 "Ultra-Efficient Mundo Anel Support Systems"
  giga_tech_ringworld_upgrade_desc:0 "A principal limitação dos mundos em anel (e, até certo ponto, outras megaestruturas também) é o tamanho dos sistemas de suporte de vida usados ​​para sustentar um ecossistema estável na superfície, bem como os vários mecanismos que mantêm o mundo em anel inteiros. Tais sistemas incluem geração de energia, catalogação de formas de vida, estabilização gravitacional e assim por diante. Embora atualmente estejam armazenados em um segmento de mundo circular dedicado próximo ao segmento habitável, tecnologias suficientemente avançadas podem possibilitar o armazenamento da maioria desses sistemas dentro do habitável próprio segmento do mundo do anel, aumentando drasticamente a capacidade de nossos mundos do anel. \n \n§A decisão deve ser tomada no segmento do mundo do anel que você deseja atualizar§! "
  
  giga_dialog.1501.name:0 "Atualizando Mundo Anel"
  giga_dialog.1501.desc:0 "Agora estamos prontos para começar a atualizar um segmento de suporte do mundo do anel em um habitat do mundo do anel. Ao reduzir drasticamente o volume dos sistemas de suporte do mundo do anel, seremos capazes de adicionar uma biosfera estável a um segmento de suporte, garantindo assim ainda mais espaço vital para o nosso mundo do anel! \n \n§HE conclusão estimada:£tempo£[root.giga_upgrade_time] dias "
  giga_dialog.1501.a:0 "Ótimo."
  
  giga_dialog.1502.name:0 "Mundo Anel atualizado!"
  giga_dialog.1502.desc:0 "Notícias fantásticas! Em uma façanha de engenharia, adicionamos com sucesso uma biosfera a um segmento de suporte do mundo do anel, tornando-o efetivamente adequado para a habitação de nossa espécie. Poucos impérios podem sequer sonhar em rivalizar com nossas proezas de engenharia."
  giga_dialog.1502.a:0 "Trabalho incrível."
  
  giga_dialog.1503.name:0 "Sistema Mundo Anel quádruplo totalmente atualizado"
  giga_dialog.1503.desc:0 "Depois de décadas de trabalho árduo e esforço, agora atualizamos o último segmento de nosso sistema de mundo circular quádruplo. Este sistema agora possui 56 segmentos de mundo circular habitáveis ​​impressionantes, lançando sombras sobre quase tudo que já foi construído. nossas conquistas anteriores não foram suficientes, esta é a prova definitiva de que somos os construtores mais magistrais que a galáxia já viu. \n \nVocê está satisfeito agora? "
  giga_dialog.1503.a:0 "Nós somos verdadeiramente os mestres dos céus agora."
  
  giga_ringworld_upgrade_tt:99 "This support segment will upgrade to a fully functional §Y$pc_ringworld_tech$§! after the modifier expires."
  
  #########################################
  ### Ringworld Ecumenopolis ##############
  #########################################
  giga_dialog.2401.name:0 "§H$name_ringworld_city$§ !: [root.GetName] Coberto"
  giga_dialog.2401.desc:0 "Camadas e mais camadas de paisagem urbana cobrem a superfície do mundo do anel, e está feito. \n \nNosso próprio planeta artificial, um segmento do mundo do anel, foi totalmente coberto por uma enorme cidade, abrangendo milhares e milhares de quilômetros em todas as direções. Levaria décadas para percorrer esta vasta cidade, capaz de conter trilhões de almas. "
  giga_dialog.2401.a:0 "Impressionante."
  
  #########################################
  ### Titanic Ringworld ###################
  #########################################
  giga_tech_ringworld_titanic_1:0 "Aplicativo Superscale Pseudosunlight"
  giga_tech_ringworld_titanic_1_desc:0 "Como sustentamos um vasto ecossistema não contido sem uma estrela para aquecê-lo? A resposta é a luz artificial espalhando-se pela dispersão de nanocompostos específicos na atmosfera do habitat, permitindo que grandes aquecedores aqueçam facilmente a superfície de um habitat sem estrelas, por meio de processos exóticos de transmissão de calor. "
  
  giga_tech_ringworld_titanic_2:0 "$name_ringworld_titanic$Construction"
  giga_tech_ringworld_titanic_2_desc:0 "Um mundo em anel é certamente uma façanha incrível. Mas novos avanços em hipermateriais e logística podem tornar possível construir um segundo mundo em anel ainda maior em torno da mesma estrela, garantindo assim ainda mais espaço habitável! Para fazer isso, seria um pouco complicado sistemas de aquecimento e estabilização. "
  
  giga_dialog.2101.name:0 "$name_ringworld_titanic$Construction"
  giga_dialog.2101.desc:0 "Como se um mundo em anel colossal ao redor de [giga_system.GetName] não fosse suficiente, agora estamos prontos para começar a construir um segundo mundo em anel ainda maior ao redor da estrela. Com cerca de 1,5 vezes a circunferência do primeiro ringworld, o$name_ringworld_titanic$terá 10 distritos habitáveis, totalizando 60 distritos no sistema quando estiver totalmente concluído. Devemos agora começar a construir sua estrutura absolutamente massiva. "
  giga_dialog.2101.a:0 "Isto é verdadeiramente grandioso."
  
  giga_dialog.2102.name:0 "$name_ringworld_titanic$Quadro completo"
  giga_dialog.2102.desc:0 "Concluímos agora a construção de uma estrutura esquelética maciça em torno de [giga_system.GetName]. Com uma circunferência de quase um bilhão e meio de quilômetros, esta estrutura grandiosa um dia suportará um dos maiores mundos do anel a galáxia já viu. Devemos agora começar a trabalhar nos habitats reais. "
  giga_dialog.2102.a:0 "Muitos trabalhos estão diante de nós."
  
  giga_dialog.2103.name:0 "$name_ringworld_titanic$Habitat concluído"
  giga_dialog.2103.desc:0 "Um dos quatro segmentos habitáveis ​​de$name_ringworld_titanic$foi concluído! Apresentando uma biosfera totalmente artificial e estável criada por nossos biólogos, este segmento de ringworld está pronto para ser habitada."
  giga_dialog.2103.a:0 "Para o próximo."
  
  giga_dialog.2104.name:0 "$name_ringworld_titanic$Completo!"
  giga_dialog.2104.desc:0 "Está feito. No sistema [giga_system.GetName], conseguimos construir um segundo mundo em anel maior ao redor da estrela. Com quatro segmentos totalmente habitáveis, esta construção verdadeiramente massiva será uma eterna lembrete de nossas proezas de engenharia. "
  giga_dialog.2104.a:0 "Este é um dia maravilhoso."
  
  giga_dialog.2105.name:0 "$name_ringworld_titanic$Restored"
  giga_dialog.2105.desc:0 "Com base no que restou do$name_ringworld_titanic$em ruínas no sistema [giga_system.GetName], nossos engenheiros conseguiram restaurar totalmente uma de suas seções. A nova biosfera teve que ser criada mais ou menos a partir de arranhado pelos nossos principais planetologistas, mas agora é considerado estável e pronto para habitação. "
  giga_dialog.2105.a:0 "Maravilhoso"
  
  ringworld_titanic_0:0 "$name_ringworld_titanic$Site"
  ringworld_titanic_0_DESC:0 "Este complexo servirá como palco, depósito de recursos e alojamentos para centenas de milhares de pessoas envolvidas na construção de$name_ringworld_titanic$íon."
  ringworld_titanic_0_MEGASTRUCTURE_DETAILS:0 "A$name_ringworld_titanic$baseia-se em um sistema ringworld existente, fornecendo mais espaço habitável."
  #MEGALISTENTRY Titanic Ringworld
  
  # ringworld_titanic_0_CONSTRUCTION_INFO_DELAYED:3 "$giga_list_additional_data$ - A full §Y$name_ringworld_titanic$§! consists of 4 §YTitanic Ring World Sections§!, each §YTwice§! the size of a regular §YRing World Section§!"
  
  ringworld_titanic_1:0 "$name_ringworld_titanic$Frame"
  ringworld_titanic_1_DESC:0 "Esta estrutura esquelética inicial circunda o sol do sistema e serve como a plataforma na qual iremos construir seções totalmente habitáveis."
  
  ringworld_t_3x_segment:0 "Seção$name_ringworld_titanic$Frame"
  ringworld_t_3x_segment_DESC:0 "Esta seção do esqueleto representa aproximadamente um quarto da área total da superfície inacabada de$name_ringworld_titanic$. O trabalho na seção habitável menor ainda não foi concluído."
  
  ringworld_titanic_2:0 "Seção$name_ringworld_titanic$concluída"
  ringworld_titanic_2_DESC:0 "Uma seção do Ring World habitável totalmente funcional, completa com uma biosfera ativa, que está pronta para colonização."
  
  ring_world_titanic_ruined:0 "$name_ringworld_titanic$ Arruinado"
  ring_world_titanic_ruined_DESC:0 "Esta seção do$name_ringworld_titanic$já suportou uma biosfera funcional, mas não mais. Os reparos são teoricamente viáveis, mas exigiriam tecnologia avançada e uma grande quantidade de recursos."
  ring_world_titanic_ruined_MEGASTRUCTURE_DETAILS:99 "$ring_world_titanic_ruined_DESC$"
  
  ring_world_titanic_restored:99 "$ringworld_titanic_2$"
  ring_world_titanic_restored_DESC:99 "$ringworld_titanic_2_DESC$"
  
  #########################################
  ### Behemoth Ringworld ##################
  #########################################
  giga_tech_ringworld_behemoth:0 "$name_ringworld_behemoth$Construction"
  giga_tech_ringworld_behemoth_desc:0 "Nosso crescimento populacionalrequires quilômetros de terras urbanas e rurais que a maioria dos sistemas não pode fornecer. Talvez seja hora de um terceiro anel."
  
  giga_dialog.2201.name:0 "$name_ringworld_behemoth$Construction"
  giga_dialog.2201.desc:0 "Parece até não ser suficiente para nossas ambições cada vez maiores. No sistema [giga_system.GetName], que já hospeda dois colossais mundos do anel, devemos agora começar a construir um TERCEIRO mundo do anel em torno estrela, com cada segmento tendo 15 distritos, totalizando 120 distritos no sistema quando totalmente concluído!"
  giga_dialog.2201.a:0 "Não é possível ter ringworld suficiente."
  
  giga_dialog.2202.name:0 "$name_ringworld_behemoth$Quadro completo"
  giga_dialog.2202.desc:0 "Concluímos agora a construção de uma estrutura esquelética hipermassiva em torno de [giga_system.GetName]. Com uma circunferência de quase dois bilhões de quilômetros, esta estrutura grandiosa um dia suportará um dos mais$name_ringworld_gargan$s a galáxia já viu. Devemos agora começar a trabalhar nos habitats reais. "
  giga_dialog.2202.a:0 "Muitos trabalhos estão diante de nós."
  
  giga_dialog.2203.name:0 "$name_ringworld_behemoth$Habitat Completo"
  giga_dialog.2203.desc:0 "Um dos quatro segmentos habitáveis ​​de$name_ringworld_behemoth$foi concluído! Apresentando uma biosfera totalmente artificial e estável criada por nossos biólogos, este segmento ringworld está pronto para ser habitada."
  giga_dialog.2203.a:0 "Para o próximo."
  
  giga_dialog.2204.name:0 "$name_ringworld_behemoth$Complete!"
  giga_dialog.2204.desc:0 "Conseguimos mais uma vez. Em torno da estrela primária de [giga_system.GetName], um terceiro e assustador mundo em anel foi construído. Ostentando quatro segmentos totalmente habitáveis, esta construção verdadeiramente esplêndida coloca cada outras espécies envergonhadas em termos de capacidade de engenharia. Que este imenso mundo de anéis triplos consolide para sempre nossos talentos na história. "
  giga_dialog.2204.a:0 "Este é um dia maravilhoso."
  
  giga_dialog.2205.name:0 "$name_ringworld_behemoth$Restored"
  giga_dialog.2205.desc:0 "Com base no que restou do$name_ringworld_behemoth$em ruínas no sistema [giga_system.GetName], nossos engenheiros conseguiram restaurar totalmente uma de suas seções. A nova biosfera teve que ser criada mais ou menos a partir de arranhado pelos nossos principais planetologistas, mas agora é considerado estável e pronto para habitação. "
  giga_dialog.2205.a:0 "Verdadeiramente magnífico."
  
  ringworld_behemoth_0:0 "$name_ringworld_behemoth$Site"
  ringworld_behemoth_0_DESC:0 "Este complexo servirá como palco, depósito de recursos e alojamentos para centenas de milhares de pessoas envolvidas na construção incrivelmente grande de$name_ringworld_behemoth$."
  ringworld_behemoth_0_MEGASTRUCTURE_DETAILS:0 "Um$name_ringworld_behemoth$se baseia em um sistema ringworld duplo existente, fornecendo ainda mais espaço habitável." #megalistentry BEHEMOTH RINGWORLD
  
  #ringworld_behemoth_0_CONSTRUCTION_INFO_DELAYED:99 "A full $name_ringworld_behemoth$ consists of a massive 8 Completed Ring World Sections, each equivalent to a size 25 Gaia world."
  
  ringworld_behemoth_1:0 "$name_ringworld_behemoth$Frame"
  ringworld_behemoth_1_DESC:0 "Thsua vasta estrutura esquelética inicial circunda o sol do sistema e serve como a plataforma sobre a qual iremos construir quatro seções totalmente habitáveis. "
  
  ringworld_behemoth_2:0 "Seção$name_ringworld_behemoth$concluída"
  ringworld_behemoth_2_DESC:0 "Uma seção do mundo do anel habitável totalmente funcional, completa com uma biosfera ativa, que está pronta para colonização."
  
  ringworld_b_3x_segment:0 "Seção$name_ringworld_behemoth$Frame"
  ringworld_b_3x_segment_DESC:0 "Esta seção da estrutura do esqueleto representa aproximadamente um quarto da enorme área de superfície total inacabada de$name_ringworld_behemoth$. O trabalho na seção habitável menor ainda não foi concluído."
  
  ring_world_behemoth_ruined:0 "$name_ringworld_behemoth$ Arruinado"
  ring_world_behemoth_ruined_DESC:0 "Esta seção do$name_ringworld_behemoth$já suportou uma biosfera funcional, mas não mais. Os reparos são teoricamente viáveis, mas exigiriam tecnologia avançada e uma grande quantidade de recursos."
  ring_world_behemoth_ruined_MEGASTRUCTURE_DETAILS:99 "$ring_world_behemoth_ruined_DESC$"
  
  ring_world_behemoth_restored:99 "$ringworld_behemoth_2$"
  ring_world_behemoth_restored_DESC:99 "$ringworld_behemoth_2_DESC$"
  
  #########################################
  ### Gargantuan Ringworld ################
  #########################################
  giga_tech_ringworld_gargantuan_1:0 "Sistemas de estabilização de habitat supratitânico"
  giga_tech_ringworld_gargantuan_1_desc:0 "Quando entramos no reino dos habitats que anões mundos aneis, novos tipos de sistemas de estabilização e logística precisam ser desenvolvidos. Esses sistemas incluem propulsores práticos para estabilizar a estrutura, bem como software capaz de gerenciar as atividades internas da estrutura. "
  
  giga_tech_ringworld_gargantuan_2:0 "$name_ringworld_gargan$Construction"
  giga_tech_ringworld_gargantuan_2_desc:0 "Três mundos em anel ao redor da mesma estrela estão literalmente beirando a loucura, mas que tal um quarto? Tal coisa vai exigir engenharia e logística estupidamente complicadas, mas já fomos tão longe, então por que não ir até o fim?"
  
  giga_dialog.2301.name:0 "$name_ringworld_gargan$Construction"
  giga_dialog.2301.desc:0 "Outro mundo circular? Você realmente gosta de colocar minerais neste coletor, não é? Ótimo. Vamos tornar ainda mais absurdo. Nada poderia dar errado. De qualquer forma, no sistema [giga_system.GetName] fica o canteiro de obras para um quarto mundo do anel. Um quarto. Sim. Cada segmento terá 20 distritos, totalizando 200 distritos quando totalmente concluído. "
  giga_dialog.2301.a:0 "Nada de errado com muitos Mundos Aneis."
  
  giga_dialog.2302.name:0 "$name_ringworld_gargan$Quadro completo"
  giga_dialog.2302.desc:0 "Concluímos agora a construção de uma estrutura esquelética ridiculamente maciça em torno de [giga_system.GetName]. Com uma circunferência de quase 2,5 bilhões de quilômetros ... bem, você já conhece a broca. saiba que seus conselheiros estão começando a se preocupar com sua obsessão por este seu projeto. "
  giga_dialog.2302.a:0 "Muito trabalho pela frente."
  
  giga_dialog.2303.name:0 "$name_ringworld_gargan$Habitat concluído"
  giga_dialog.2303.desc:0 "Um dos quatro segmentos habitáveis ​​de$name_ringworld_gargan$foi concluído! Apresentando uma biosfera totalmente artificial e estável criada por nossos biólogos, este segmento do mundo do anel está agora pronto para habitação. \n \nEntão, como muitos deles você vai usar? "
  giga_dialog.2303.a:0 "Todos eles. Para o próximo."
  
  giga_dialog.2304.name:0 "$name_ringworld_gargan$Completo!"
  giga_dialog.2304.desc:0 "Isso foi feito, mais uma vez. No sistema [giga_system.GetName], construímos um QUARTO ringworld. Se nossas conquistas anteriores já não eram suficientes, isso deve definitivamente provar que somos o melhores engenheiros da galáxia. \n \nVocê tem um complexo de inferioridade ou algo assim? "
  giga_dialog.2304.a:0 "Uma conquista maravilhosa."
  
  giga_dialog.2305.name:0 "$name_ringworld_gargan$Restored"
  giga_dialog.2305.desc:0 "Com base no que resta do$name_ringworld_gargan$em ruínas no sistema [giga_system.GetName], nossos engenheiros conseguiram restaurar totalmente uma de suas seções. A nova biosfera teve que ser criada mais ou menos a partir de arranhado pelos nossos principais planetologistas, mas agora é considerado estável e pronto para habitação. "
  giga_dialog.2305.a:0 "Maravilhosa"
  
  ringworld_gargantuan_0:0 "Site$name_ringworld_gargan$"
  ringworld_gargantuan_0_DESC:0 "Este complexo servirá como palco, depósito de recursos e alojamentos para centenas de milhares de pessoas envolvidas na construção estupidamente grande de$name_ringworld_gargan$."
  ringworld_gargantuan_0_MEGASTRUCTURE_DETAILS:0 "A$name_ringworld_gargan$baseia-se em um sistema triplo ringworld existente, fornecendo provavelmente muito espaço habitável." #megalistentry GARGANTUAN RINGWORLD
  
  #ringworld_gargantuan_0_CONSTRUCTION_INFO_DELAYED:99 "A full $name_ringworld_gargan$ consists of an overly massive 10 Completed Ring World Sections, each equivalent to a size 25 Gaia world."
  
  ringworld_gargantuan_1:0 "$name_ringworld_gargan$Frame"
  ringworld_gargantuan_1_DESC:0 "Esta vasta estrutura esquelética inicial circunda o sol do sistema e serve como a plataforma na qual iremos construir quatro seções totalmente habitáveis."
  
  ringworld_gargantuan_2:0 "Seção$name_ringworld_gargan$concluída"
  ringworld_gargantuan_2_DESC:0 "Uma seção habitável do mundo do anel totalmente funcional, completa com uma biosfera ativa, que está pronta para colonização."
  
  ringworld_g_3x_segment:0 "Seção$name_ringworld_gargan$Frame"
  ringworld_g_3x_segment_DESC:0 "Esta seção do esqueleto representa aproximadamente um quarto da área total inacabada de$name_ringworld_gargan$. O trabalho na seção habitável menor ainda não foi concluído. Para que você precisa de todos esses habitats, afinal? "
  
  ring_world_gargantuan_ruined:0 "$name_ringworld_gargan$ Arruinado"
  ring_world_gargantuan_ruined_DESC:0 "Esta seção do$name_ringworld_gargan$já suportou uma biosfera funcional, mas não mais. Os reparos são teoricamente viáveis, mas exigiriam tecnologia avançada e uma grande quantidade de recursos."
  ring_world_gargantuan_ruined_MEGASTRUCTURE_DETAILS:99 "$ring_world_gargantuan_ruined_DESC$"
  
  ring_world_gargantuan_restored:99 "$ringworld_gargantuan_2$"
  ring_world_gargantuan_restored_DESC:99 "$ringworld_gargantuan_2_DESC$"
  
  #########################################
  ### Nidavellir Hyperforge ###############
  #########################################
  giga_tech_nidavellir:0 "Forjamento de liga espacial-temporal"
  giga_tech_nidavellir_desc:0 "O auge das tecnologias de ligas. Ao explorar a natureza desafiadora da física das estrelas de nêutrons ao lado da manipulação avançada do espaço-tempo, torna-se possível utilizar as propriedades de uma estrela de nêutrons para facilitar os processos de refino de minerais, tornando a produção em massa de ligas trivial. ligas, quando misturadas com o neutrônio coletado, poderiam então ser transformadas nas armas mais puras e poderosas já projetadas por uma espécie sapiente, capaz de dobrar o próprio espaço-tempo. Isso exigiria uma estrutura de anel colossal construída em torno de uma estrela de nêutrons, empregando as tecnologias mais avançadas conhecido na galáxia. "
  
  giga_dialog.801.name:0 "$name_nidavellir$Obra concluída"
  giga_dialog.801.desc:0 "O canteiro de obras de$name_nidavellir$agora está completo no sistema [giga_system.GetName]! Sobre este andaime, construiremos uma construção massiva, circundando completamente esta estrela de nêutrons. Será capaz de refinar quantidades verdadeiramente imensas de minerais em ligas puras. "
  giga_dialog.801.a:0 "Ótimo."
  
  giga_dialog.802.name:0 "$name_nidavellir$Anel interno completo"
  giga_dialog.802.desc:0 "Nosso anel interno de$name_nidavellir$foi concluído. Ele contém dispositivos de estabilização avançados para evitar falhas catastróficas e possui recursos limitados de refino de minerais."
  giga_dialog.802.a:0 "Maravilhoso."
  
  giga_dialog.803.name:0 "$name_nidavellir$Anel do gerador completo"
  giga_dialog.803.desc:0 "O anel gerador de nosso$name_nidavellir$agora está completo! Capaz de coletar as energias cataclísmicas da estrela de nêutrons, este segundo anel irá alimentar o resto das fundições avançadas da hiperforja."
  giga_dialog.803.a:0 "Excelente."
  
  giga_dialog.804.name:0 "Anel de processamento de$name_nidavellir$concluído"
  giga_dialog.804.desc:0 "O anel de processamento de$name_nidavellir$foi concluído. Fundições colossais pegam minerais importados e extraem neutrônio e os fundem para fabricar as ligas mais puras da galáxia, de qualidade incomparável."
  giga_dialog.804.a:0 "Legal. Estamos perto."
  
  giga_dialog.805.name:0 "$name_nidavellir$Completo!"
  giga_dialog.805.desc:0 "Notícias fantásticas! Finalmente, o$name_nidavellir$foi finalmente concluído. O quarto e último anel foi totalmente construído, e o enorme feixe gravítico da forja está sugando grandes quantidades de energia e neutrônio do nêutron estrela, que são então usados ​​junto com minerais para fabricar ligas. Esta megaestrutura verdadeiramente inspiradora é um testemunho de nosso verdadeiro domínio da engenharia. "
  giga_dialog.805.a:0 "Incrível!"
  
  nidavellir_forge_0:0 "Canteiro de obras de$name_nidavellir$"
  nidavellir_forge_0_DESC:0 "O canteiro de obras para$name_nidavellir$, que é a fundição de liga mais avançada já projetada. Em breve, ela fornecerá um suprimento quase ilimitado de ligas, desde que tenhamos minerais suficientes."
  nidavellir_forge_0_MEGASTRUCTURE_DETAILS:0 "Uma refinaria gigantesca construída em torno de uma estrela de nêutrons, refinando£minerais£Minerais em imensas quantidades de£alloys£Ligas.§Todos os planetas do sistema serão destruídos§!" #megalistentry NIDAVELLIR
  nidavellir_forge_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - §YNeutron Stars§! created by a §YFusion Suppressor§! are fit for a §YNidavellir Hyperforge§!, but those created by a §YNicoll-Dyson Beam§! are not. Can be stacked with the §YNeutronium Gigaforge§!"
  
  nidavellir_forge_1:0 "$name_nidavellir$Anel interno"
  nidavellir_forge_1_DESC:0 "O primeiro passo em direção ao$name_nidavellir$, este anel interno é responsável por estabilizar o resto da estrutura. Fornece refi de liga básicarecursos ning. "
  
  nidavellir_forge_2:0 "$name_nidavellir$Generator Ring"
  nidavellir_forge_2_DESC:0 "O segundo anel da Hyperforge abriga geradores imensamente poderosos que acionam a maior parte da maquinaria da estrutura, afastando as propriedades estranhas da estrela de nêutrons."
  
  nidavellir_forge_3:0 "Anel de processamento de$name_nidavellir$"
  nidavellir_forge_3_DESC:0 "O terceiro anel abriga enormes instalações de processamento ao lado de máquinas especializadas de manipulação de espaço-tempo, a fim de misturar minerais importados e neutrônio coletado em ligas puras com eficiência invisível."
  
  nidavellir_forge_4:99 "$name_nidavellir$"
  nidavellir_forge_4_DESC:0 "Um$name_nidavellir$totalmente operacional. Seu feixe trator imensamente poderoso drena grandes quantidades de energia e neutrônio da estrela, e os anéis de fundição especializados utilizam a manipulação do espaço-tempo para forjar as armas mais poderosas do universo."
  
  #########################################
  ### Hyperstructural Assembly Yard #######
  #########################################
  giga_tech_hyperstructural_ass:0 "Instalações do estaleiro gigantesco"
  giga_tech_hyperstructural_ass_desc:0 "Às vezes, mesmo a maior das cidadelas não fornece estaleiros suficientes para satisfazer as necessidades de produção de um império. A resposta é simples: vá maior. Muito maior. O$name_hyperstructural_ass$seria uma estrutura absolutamente gigantesca construída em torno de uma estrela, consistindo em um anel de levantamento estelar interno e um anel externo de estaleiro, semelhante ao$name_eq_shipyard$. Esta construção gigantesca forneceria imensas capacidades de construção naval, bem como grande capacidade naval. "
  
  giga_dialog.3701.name:0 "$name_hyperstructural_ass$Obra concluída"
  giga_dialog.3701.desc:0 "O canteiro de obras de nosso$name_hyperstructural_ass$foi concluído em torno de [giga_system.GetName]! Embora possa não parecer muito agora, este andaime será usado para montar o maior e mais eficiente estaleiro galáxia já viu, capaz de montar dezenas de naves simultaneamente. "
  giga_dialog.3701.a:0 "Bom."
  
  giga_dialog.3702.name:0 "$name_hyperstructural_ass$Anel interno completo"
  giga_dialog.3702.desc:0 "Nosso anel interno de$name_hyperstructural_ass$foi concluído! Alojando vastos reatores de fusão e instalações de refino especializadas, ele processará o plasma extraído pelas bombas de elevação estelares ainda não construídas. Parte do plasma processado irá ser transformado em ligas para manter a estrutura, enquanto o resto será exportado como minerais. \nLembre-se de que a estrutura terá uma manutenção robusta de Engenharia devido à grande quantidade de cientistas necessários para mantê-la funcionando. "
  giga_dialog.3702.a:0 "Ótimo."
  
  giga_dialog.3703.name:0 "$name_hyperstructural_ass$Stellar Pumps Complete"
  giga_dialog.3703.desc:0 "Com as bombas de levantamento estelar agora concluídas, nosso$name_hyperstructural_ass$começou a produzir pequenas quantidades de minerais colhendo e fundindo plasma estelar. Devemos agora iniciar a construção do anel externo da estrutura, que abrigará o enorme estaleiro se organiza. "
  giga_dialog.3703.a:0 "Incrível."
  
  giga_dialog.3704.name:0 "$name_hyperstructural_ass$Anel externo completo"
  giga_dialog.3704.desc:0 "A conclusão do Anel Externo do Pátio traz nossos sonhos de produção infinita de frota um passo mais perto de ser uma realidade. Conectado ao anel interno por uma estrutura de treliça maciça, este construto abriga a infraestrutura necessária para abastecer o futuros estaleiros com todos os recursos de que precisam. Agora, devemos terminar o projeto de uma vez por todas, finalmente construindo os próprios estaleiros!"
  giga_dialog.3704.a:0 "Em breve, ninguém ficará no nosso caminho."
  
  giga_dialog.3705.name:0 "$name_hyperstructural_ass$Complete!"
  giga_dialog.3705.desc:0 "Finalmente, após décadas de trabalho exaustivo e centenas de milhares de ligas gastas, nosso$name_hyperstructural_ass$está completo. Seus gigantescos estaleiros são capazes de montar imensas quantidades de navios em curtos períodos de tempo, que irá garantir nosso domínio naval absoluto sobre toda a galáxia. "
  giga_dialog.3705.a:0 "Está completo. Somos verdadeiramente os mestres da galáxia agora."
  
  hyperstructural_ass_0:0 "$name_hyperstructural_ass$Canteiro de obras"
  hyperstructural_ass_0_DESC:0 "O canteiro de obras de um futuro$name_hyperstructural_ass$, um estaleiro gigantesco com capacidades de produção incomparáveis."
  hyperstructural_ass_0_MEGASTRUCTURE_DETAILS:0 "Um sistema abrangente de estaleiros e ancoragens, capaz de montar rapidamente armadas inteiras.§Todos os planetas do sistema serão destruídos§!" #megalistentry Hyperstructural Assembly Yard
  
  hyperstructural_ass_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - Due to the immense power requirements of this structure, it must be built around a star of spectral class §YA§! or §YB§!."
  
  hyperstructural_ass_1:0 "$name_hyperstructural_ass$Inner Ring"
  hyperstructural_ass_1_DESC:0 "Este anel massivo abriga o maquinário necessário para processar grandes quantidades de plasma extraído da estrela para ajudar tanto na montagem de vasos, quanto na manutenção da própria estrutura."
  
  hyperstructural_ass_2:0 "$name_hyperstructural_ass$Plasma Pumps "
  hyperstructural_ass_2_DESC:0 "Seis bombas de plasma gigantescas capazes de coletar plasma da fotosfera da estrela graças à coleta especializada de feixes gravitacionais. Parte do plasma é fundida em minerais, e o resto é usado para manter esta enorme construção."
  
  hyperstructural_ass_3:0 "$name_hyperstructural_ass$Outer Ring"
  hyperstructural_ass_3_DESC:0 "O anel externo do Yard contém a infraestrutura necessária para suportar a enorme variedade de estaleiros que em breve serão adicionados à superestrutura. Ele também armazena uma grande quantidade de minerais e ligas."
  
  hyperstructural_ass_4:99 "$name_hyperstructural_ass$"
  hyperstructural_ass_4_DESC:0 "Alimentado por 6 gigantescas bombas de elevação estelares, este imenso estaleiro de abrangência de sistema possui capacidades de produção incomparáveis. Concede capacidade de estaleiro de +90 e+35% de velocidade de construção de navio."
  
  #########################################
  ### Lunar Speculorefractor ##############
  #########################################
  giga_tech_disco_moon:0 "Aparelhos refratários em hiperescala"
  giga_tech_disco_moon_desc:0 "A vida de um cidadão pode ser difícil e exaustiva. Cobrir uma lua próxima com placas de cristal e holofotes subterrâneos criaria um dispositivo capaz de projetar auroras e luzes magníficas no céu de um planeta. Esses efeitos majestosos certamente teriam um impacto positivo em nosso moral das pessoas! "
  
  giga_dialog.201.name:0 "$name_discomoon$Obra Completa"
  giga_dialog.201.desc:0 "Nossos engenheiros concluíram a construção de um futuro$name_discomoon$no sistema [giga_system.GetName]. Sobre este andaime, construiremos uma enorme concha de cristais ao redor de uma lua, que será usado para refratar a luz dos holofotes subterrâneos, criando raios de luz magníficos visíveis de todos os corpos no sistema planetário local. \n \nTodos os planetas e luas próximos terão um bônus de unidade, conforto, felicidade e valor comercial. "
  giga_dialog.201.a:0 "Brilhante."
  
  giga_dialog.202.name:0 "$name_discomoon$Internals Complete"
  giga_dialog.202.desc:0 "Nossos internos de$name_discomoon$estão completos. Instalados abaixo da crosta, os internos consistem em uma fonte de alimentação e uma grande quantidade de holofotes, que eventualmente brilharão através das placas cristalinas uma vez instalados . "
  giga_dialog.202.a:0 "Maravilhoso."
  
  giga_dialog.203.name:0 "$name_discomoon$Complete!"
  giga_dialog.203.desc:0 "Em um feito de macroengenharia, toda a superfície da lua foi coberta com placas de cristal polido no [giga_system.GetName]. Uma vasta rede de holofotes subterrâneos agora está brilhando através deles, lançando uma luz maravilhosa raios visíveis nos céus de cada corpo no sistema planetário local. \n \nPodemos gerenciar a megaestrutura clicando no botão§YGerenciar§! na IU da megaestrutura. "
  giga_dialog.203.a:0 "Espetacular!"
  
  lunar_disco_ball_0:0 "Canteiro de obras$name_discomoon$"
  lunar_disco_ball_0_DESC:0 "O canteiro de obras de um futuro$name_discomoon$, um conjunto de cristais que abrangem todo o planeta projetado para projetar lindos shows de luz nos céus de planetas próximos."
  lunar_disco_ball_0_MEGASTRUCTURE_DETAILS:0 "Um dispositivo que projeta auroras maravilhosas nos céus de planetas próximos. Aumenta o conforto, a unidade, o valor comercial e a felicidade." #megalistentry SPECULOREFRACTOR
  
  lunar_disco_ball_1:0 "$name_discomoon$Framework"
  lunar_disco_ball_1_DESC:0 "Esta estrutura consiste em geradores de subsuperfície que brilharão em placas cristalinas, produzindo belas luzes coloridas. Devemos agora instalar as próprias placas cristalinas para concluir o projeto."
  
  lunar_disco_ball_2:99 "$name_discomoon$"
  lunar_disco_ball_2_DESC:0 "Um conjunto de placas cristalinas que se espalham pelo planeta, instaladas em uma lua. Projetores subterrâneos lançam luz em tais cristais, resultando em espetáculos de luz maravilhosos e auroras visíveis de planetas próximos."
  
  #########################################
  ### Equatorial Shipyard #################
  #########################################
  giga_tech_equatorial_shipyard:0 "Instalações do estaleiro Molten World"
  giga_tech_equatorial_shipyard_desc:0 "Molten Worlds possui um potencial incrível quando se trata de expandir nossos estaleiros. Podemos utilizar sua atividade geotérmica para alimentar nossas instalações e colher seus recursos para construir os próprios navios. A instalação de um anel de colheita especializado em torno de um mundo assim certamente provou ser muito útil. "
  
  giga_dialog.3601.name:0 "$name_eq_shipyard$Canteiro de obras construído"
  giga_dialog.3601.desc:0 "O local de construção de um futuro$name_eq_shipyard$foi concluído perto de um Molten World no sistema [giga_system.GetName]. Esta plataforma orbital será usada para construir dois anéis ao redor deste planeta, a fim de refine grandes quantidades de ligas e transforme-as em naves. \n \nPor favor, observe que as luas do planeta, se houver, serão consumidas no processo. "
  giga_dialog.3601.a:0 "Ótimo."
  
  giga_dialog.3602.name:0 "$name_eq_shipyard$Frame Built "
  giga_dialog.3602.desc:0 "Nosso$name_eq_shipyard$no sistema [giga_system.GetName] está um passo mais perto da conclusão. As estruturas dos anéis foram construídas e agora devemos começar a trabalhar nos próprios anéis. O anel interno será ser um habitat colonizável dedicado a ligas e energia. "
  giga_dialog.3602.a:0 "Excelente."
  
  giga_dialog.3603.name:0 "$name_eq_shipyard$Complete!"
  giga_dialog.3603.desc:0 "Ótimas notícias! Nossos engenheiros relatam que nosso$name_eq_shipyard$no sistema [giga_system.GetName] está totalmente operacional! O anel interno está pronto para colonização e os estaleiros do anel externo estão totalmente ativos."
  giga_dialog.3603.a:0 "Maravilhoso!"
  
  eq_shipyard_0:0 "$name_eq_shipyard$Canteiro de obras"
  eq_shipyard_0_DESC:0 "O local de construção de um$name_eq_shipyard$consistindo em um anel de processamento de liga e um anel de estaleiro."
  eq_shipyard_0_MEGASTRUCTURE_DETAILS:0 "Dois anéis ao redor de um mundo fundido, usados ​​para processamento de ligas e construção de navios." #gigalistentry EQUATORIAL SHIPYARD
  
  eq_shipyard_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - Has districts for producing £energy£ §Y$energy$§! and £alloys£ §Y$alloys$§!. £job_foundry£ $planet_metallurgists$ have significantly increased output and reduced upkeep."
  
  eq_shipyard_1:0 "$name_eq_shipyard$Frame"
  eq_shipyard_1_DESC:0 "Esta vasta estrutura se estende ao redor de um mundo fundido. O anel interno será usado para extrair minerais do mundo fundido e processá-los em ligas, enquanto o anel externo terá grandes estaleiros para auxiliar na construção de navios."
  
  eq_shipyard_2:99 "$name_eq_shipyard$"
  eq_shipyard_2_DESC:0 "Um enorme estaleiro circulando um planeta, capaz de montar um grande número de navios de guerra."
  
  building_giga_equatorial_factory:99 "Civilian Reprocessing Plant"
  building_giga_equatorial_factory_plural:99 "Civilian Reprocessing Plants"
  building_giga_equatorial_factory_desc:99 "This workshop works metals forged by the ring's primary smelteries into a wide variety of consumer products."
  
  mod_district_giga_planet_alloys_artisan_replacement:99 "$district_giga_planet_alloys_plural$ replace one £job_foundry£ [GetAlloyProducer] Job with an [GetArtisanIcon] [GetArtisan] Job"
  mod_district_giga_planet_alloys_artisan_replacement_short:99 "£job_foundry£ -> [GetArtisanIcon]"
  
  #########################################
  ### Crystal Megabore ####################
  #########################################
  giga_tech_crystal_megabore:0 "Coleta de cristal central"
  giga_tech_crystal_megabore_desc:0 "Cristais raros são formados quando pressões extremas encontram temperaturas extremas no interior de corpos celestes. Depende do acaso de trazê-los à superfície, onde podem ser colhidos por nós. No entanto, esse fator de sorte pode ser eliminado por perfurar diretamente no centro de um mundo e colher diretamente os cristais preciosos de lá! "
  
  giga_dialog.3501.name:0 "$name_crystal_megabore$Obra concluída"
  giga_dialog.3501.desc:0 "O canteiro de obras de um futuro$name_crystal_megabore$foi concluído no sistema [giga_system.GetName]. Sobre este andaime, construiremos uma enorme estação espacial, que projetará um feixe de laser gigante perfurando diretamente no núcleo do mundo derretido, colhendo cristais puros dele. "
  giga_dialog.3501.a:0 "Ótimo."
  
  # giga_dialog.3502.name:0 "$name_crystal_megabore$ Main Hub Complete"
  # giga_dialog.3502.desc:0 "Our engineers have now completed the construction of our $name_crystal_megabore$'s main hub in the [giga_system.GetName] system. Orbiting around a molten world, this massive space station houses forges and refineries specialized in purifying molten rock into rare crystals, which is indispensable if we wish to efficiently harvest the world below."
  # giga_dialog.3502.a:0 "Good."
  
  # giga_dialog.3503.name:0 "$name_crystal_megabore$ Gravitogenerator Complete"
  # giga_dialog.3503.desc:0 "Our $name_crystal_megabore$'s Gravitogenerator is now complete! This large structure fully encircles the Megabore's hub, and will provide it with energy. It will also serve as a catalyst for the Megabore's main drill, and drastically amplify the strength of its gravitational tractor beam."
  # giga_dialog.3503.a:0 "Wonderful."
  
  giga_dialog.3504.name:0 "$name_crystal_megabore$Complete!"
  giga_dialog.3504.desc:0 "Nosso$name_crystal_megabore$foi totalmente concluído no sistema [giga_system.GetName]! Equipado com um feixe de laser orbital gigante, ele perfurou a crosta e o manto deste mundo e alcançou seu próprio núcleo. Maciço quantidades de cristais e minerais estão agora sendo retirados do centro infernal do planeta, o que certamente será muito útil para nossas indústrias. "
  giga_dialog.3504.a:0 "Maravilhoso!"
  
  crystal_megabore_0:0 "Canteiro de obras$name_crystal_megabore$"
  crystal_megabore_0_DESC:0 "Esta plataforma orbital serve como local de construção para um futuro$name_crystal_megabore$ao redor deste mundo fundido. Abriga o pessoal e a infraestrutura necessários para começar a construir esta enorme estação espacial."
  crystal_megabore_0_MEGASTRUCTURE_DETAILS:0 "Um Megabore de Cristal extrai grandes quantidades de cristais e minerais raros do núcleo de um planeta derretido."
  crystal_megabore_0_CONSTRUCTION_INFO_DELAYED:99 "$sr_mega_extra_data$"
  
  # crystal_megabore_1:0 "$name_crystal_megabore$ Refinery Hub"
  # crystal_megabore_1_DESC:0 "The Crystal Bore's refinery hub will serve the purpose of purifying and refining the massive amounts of molten rock that will be pulled from the planet's core, and separating the precious crystals from it."
  
  # crystal_megabore_2:0 "$name_crystal_megabore$ Gravitogenerator"
  # crystal_megabore_2_DESC:0 "The Gravitogenerator plays a crucial role in mining the planet below, as it provides energy and acts as a catalyst for the Bore's main drill."
  
  crystal_megabore_1:0 "$name_crystal_megabore$Refinery Hub"
  crystal_megabore_1_DESC:0 "O centro da refinaria do Crystal Bore servirá ao propósito de purificar e refinar as enormes quantidades de rocha derretida que serão extraídas do núcleo do planeta e separar os preciosos cristais dele."
  
  giga_subsurface_ocean:99 "Thriving Subsurface Ocean"
  giga_subsurface_ocean_desc:99 "Beneath this frozen world's icy crust flows a warm, salty ocean populated by numerous aquatic lifeforms of all shapes and sizes. They provide fascinating research opportunities and, with a little investment, could even be a source of nutritious biomasss."
  
  #########################################
  ### S.U.C.C. ############################
  #########################################
  giga_tech_succ:0 "Mineração atmosférica global"
  giga_tech_succ_desc:0 "As atmosferas dos gigantes gasosos estão cheias de recursos, como gases exóticos e partículas voláteis. Vigas trator maciças, emparelhadas com instalações de fusão e refino, podem nos permitir destruir continuamente a atmosfera de um gigante gasoso, colhendo todos os seus recursos. "
  
  
  #########################################
  ### Orbital Arcologies ##################
  #########################################
  giga_tech_orbital_arcologies:0 "Arcologias do mundo circular orbital"
  giga_tech_orbital_arcologies_desc:0 "Conforme os planetas crescem e se desenvolvem, eles geralmente começam a ficar sem espaço para distritos adicionais. Construindo massivos mundos em anel ao redor do equador de um planeta, grandes quantidades de espaço utilizável podem ser criadas."
  # giga_tech_orbital_arcologies_overlord:0 "Orbital Ringworld Arcologies"
  # giga_tech_orbital_arcologies_overlord_desc:0 "As planets grow and develop, they often start to run out of space for additional districts. By expanding the habitation sections of our Orbital Rings, vast amounts of usable space can be created."
  
  giga_dialog.901.name:0 "$name_orbital_arcology$Canteiro de obras concluído"
  giga_dialog.901.desc:0 "O canteiro de obras de um$name_orbital_arcology$no sistema [giga_system.GetName] foi concluído. Esta plataforma servirá como base para a construção de um grande anel orbital em torno deste planeta, aumentando sua capacidade máxima de distrito . Planetas maiores obtêm buffs melhores, mas a um custo mais alto. "
  giga_dialog.901.a:0 "Ótimo."
  
  giga_dialog.902.name:0 "$name_orbital_arcology$Complete"
  giga_dialog.902.desc:0 "Um$name_orbital_arcology$foi concluído ao redor de um planeta no sistema [giga_system.GetName]! Este vasto anel se estende ao redor do equador do planeta e fornece grandes quantidades de espaço para nossas indústrias."
  giga_dialog.902.a:0 "Excelente."
  
  giga_dialog.903.name:99 "$name_orbital_arcology$ Enhanced"
  giga_dialog.903.desc:99 "The §Y[giga_planet.GetName]§! $name_orbital_arcology$ has been enhanced with the construction of a second ring circling the planet's poles.\n\nThis additional ring will grant §Y20%§! extra §BDistrict Slots§! to §Y[giga_planet.GetName]§!, for a total of §Y40%§!."
  giga_dialog.903.a:99 "Excellent."
  
  giga_dialog.904.name:99 "$name_orbital_arcology$ Maximized"
  giga_dialog.904.desc:99 "The §Y[giga_planet.GetName]§! $name_orbital_arcology$ has been maximized with the construction of a third ring surrounding the planet's poles.\n\nThis additional ring will grant §Y20%§! extra §BDistrict Slots§! to §Y[giga_planet.GetName]§!, for a total of §Y60%§!."
  giga_dialog.904.a:99 "Excellent."
  
  orbital_arcology_0:0 "Canteiro de obras$name_orbital_arcology$"
  orbital_arcology_0_DESC:0 "O canteiro de obras de um$name_orbital_arcology$, que é um mundo anelar em miniatura que circunda este planeta. Ele fornecerá grandes quantidades de espaço para nossas indústrias."
  orbital_arcology_0_MEGASTRUCTURE_DETAILS:0 "Um pequeno mundo em anel ao redor de um planeta, fornecendo slots de distrito adicionais. Mais caro para pl maioranets, mas eles se beneficiam mais. " #megalistentry ORBITAL ARCOLOGY
  orbital_arcology_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - As it occupies a planet's §YOrbital Slot§!, this cannot be stacked with the §YPlanetary Dockyard§!"
  
  orbital_arcology_0_s:99 "$orbital_arcology_0$"
  orbital_arcology_0_s_DESC:99 "$orbital_arcology_0_DESC$"
  orbital_arcology_0_s_MEGASTRUCTURE_DETAILS:99 "$orbital_arcology_0_MEGASTRUCTURE_DETAILS$"
  
  orbital_arcology_0_m:99 "$orbital_arcology_0$"
  orbital_arcology_0_m_DESC:99 "$orbital_arcology_0_DESC$"
  orbital_arcology_0_m_MEGASTRUCTURE_DETAILS:99 "$orbital_arcology_0_MEGASTRUCTURE_DETAILS$"
  
  orbital_arcology_0_l:99 "$orbital_arcology_0$"
  orbital_arcology_0_l_DESC:99 "$orbital_arcology_0_DESC$"
  orbital_arcology_0_l_MEGASTRUCTURE_DETAILS:99 "$orbital_arcology_0_MEGASTRUCTURE_DETAILS$"
  
  orbital_arcology_1_s:99 "$name_orbital_arcology$"
  orbital_arcology_1_s_DESC:0 "Um mundo anelar em miniatura circundando um planeta médio, fornecendo espaços distritais adicionais."
  
  orbital_arcology_1_m:99 "$orbital_arcology_1_s$"
  orbital_arcology_1_m_DESC:99 "$orbital_arcology_1_s_DESC$"
  orbital_arcology_1_m_MEGASTRUCTURE_DETAILS:99 "orbital_arcology_1_m_MEGASTRUCTURE_DETAILS placeholder"
  
  orbital_arcology_1_l:99 "$orbital_arcology_1_s$"
  orbital_arcology_1_l_DESC:99 "$orbital_arcology_1_s_DESC$"
  orbital_arcology_1_l_MEGASTRUCTURE_DETAILS:99 "orbital_arcology_1_l_MEGASTRUCTURE_DETAILS placeholder"
  
  decision_giga_build_orbital_arcology_effect:99 "This will begin the construction of an §YOrbital Arcology§! around this world, costing £alloys£§Y200§! per §YPlanet Size§!.\n\nAfter a base build time of §Y900 days§!, this miniature ringworld will provide §Y20%§! extra §BDistrict Slots§! to §Y[ROOT.GetName]§! once completed, with an upkeep of £alloys£§Y5§! and £energy£§Y15§!.\n\nConstructing it will block the §YPlanetary Dockyard§!, but not the §YOrbital Ring§!."
  
  decision_giga_build_orbital_arcology:99 "Construct Orbital Arcology"
  decision_giga_build_orbital_arcology_desc:99 "[ROOT.GetName] is in dire need of space. Constructing an orbital ring around its equator will expand its living space significantly."
  
  decision_giga_upgrade_orbital_arcology_effect:99 "This will begin to upgrade the §YOrbital Arcology§! around this world into an §YEnhanced Orbital Arcology§!, costing £alloys£§Y250§! per §YPlanet Size§!.\n\nAfter a base build time of §Y1000 days§!, this miniature ringworld will provide another §Y20%§! extra §BDistrict Slots§! to §Y[ROOT.GetName]§! once completed (for a total of §Y40%§!), with an upkeep of £alloys£§Y10§! and £energy£§Y30§!."
  
  decision_giga_upgrade_orbital_arcology:99 "Enhance Orbital Arcology"
  decision_giga_upgrade_orbital_arcology_desc:99 "Enhancing the Orbital Arcology already in orbit will increase [ROOT.GetName]'s living space even further."
  
  decision_giga_maximize_orbital_arcology_effect:99 "This will begin to upgrade the §YEnhanced Orbital Arcology§! around this world into a §YMaximized Orbital Arcology§!, costing £alloys£§Y300§! per §YPlanet Size§!.\n\nAfter a base build time of §Y1100 days§!, this miniature ringworld will provide another §Y20%§! extra §BDistrict Slots§! to §Y[ROOT.GetName]§! once completed (for a total of §Y60%§!), with an upkeep of £alloys£§Y15§! and £energy£§Y45§!."
  
  decision_giga_maximize_orbital_arcology:99 "Maximize Orbital Arcology"
  decision_giga_maximize_orbital_arcology_desc:99 "Maximizing the Orbital Arcology already in orbit by adding yet another ring will increase [ROOT.GetName]'s living space to the maximum."
  
  #########################################
  ### Planetary Computer ##################
  #########################################
  giga_tech_planetary_computer:0 "Complexos de computação em escala planetária"
  giga_tech_planetary_computer_desc:0 "A solução para as necessidades cada vez maiores de poder de computação: um planeta inteiro transformado em um computador! Usando técnicas especializadas de terraform, este projeto aparentemente bobo pode se tornar uma realidade."
  giga_tech_planetary_computer_wilderness_swap:99 "Planetary Ecosystem Collective Computing"
  giga_tech_planetary_computer_wilderness_swap_desc:99 "One brain alone is weak, but many brains together are strong. The Wilderness has always been an emergent property of its many members, but it is time to take the next step: interconnecting floral electrochemical systems across the planetary crust could effectively transform an entire celestial body into one wetware computer."
  
  giga_dialog.1301.name:0 "$name_planetary_computer$Canteiro de obras concluído"
  giga_dialog.1301.desc:0 "O canteiro de obras de um futuro$name_planetary_computer$agora foi concluído no sistema [giga_system.GetName]. Sobre este andaime, iremos eventualmente converter todo este planeta em um computador enorme, possuindo imenso poder de processamento . "
  giga_dialog.1301.a:0 "Maravilhoso."
  
  giga_dialog.1302.name:0 "$name_planetary_computer$Internals Complete"
  giga_dialog.1302.desc:0 "Estamos mais perto de concluir um$name_planetary_computer$no sistema [giga_system.GetName]. Com a estrutura interna agora instalada, estamos prontos para concluir adequadamente este projeto colossal que se estende profundamente no manto do planeta. Em breve teremos um poder de computação impensável à nossa disposição. "
  giga_dialog.1302.a:0 "Maravilhoso."
  
  giga_dialog.1303.name:0 "$name_planetary_computer$Complete!"
  giga_dialog.1303.desc:0 "Notícias fantásticas! No sistema [giga_system.GetName], envolvemos completamente um planeta em um supercomputador enorme, que se estende da superfície ao manto do planeta. Esta construção verdadeiramente inspiradora fornecerá imensos oportunidades de pesquisa para pesquisadores em sua superfície, e certamente será um grande benefício para nossa pesquisa. "
  giga_dialog.1303.a:0 "Incrível"
  
  planetary_computer_0:0 "$name_planetary_computer$Construction Site"
  planetary_computer_0_DESC:0 "O canteiro de obras de um futuro$name_planetary_computer$a ser construído ao redor do planeta abaixo. Este enorme computador um dia se estenderá profundamente no manto do planeta e terá um poder de processamento impensável. Todos os distritos do planeta, exceto as habitações, serão ser substituídos por outros únicos, com foco na pesquisa. "
  planetary_computer_0_MEGASTRUCTURE_DETAILS:0 "Um computador engolfando um planeta inteiro, com imenso poder de processamento. Fornece bônus massivos de§YResearch§! e distritos únicos." #megalistentry PLANETARY COMPUTER
  
  planetary_computer_1:0 "$name_planetary_computer$Internals"
  planetary_computer_1_DESC:0 "Os primeiros passos para um$name_planetary_computer$completo. Estruturas internas preliminares e infraestrutura especializada."
  
  planetary_computer_2:99 "$name_planetary_computer$"
  planetary_computer_2_DESC:0 "Um$name_planetary_computer$completo, fornecendo imensos buffs de pesquisa para trabalhos em sua superfície."
  
  building_giga_pcc_scrap_pile:99 "Colossal Scrap Heap"
  building_giga_pcc_scrap_pile_desc:99 "A huge pile of scrap material, ripe for recycling."
  
  #########################################
  ### Macroatmospheric Stabilizer #########
  #########################################
  giga_tech_terraform_gas:0 "Estabilização Atmosférica Gigante de Gás"
  giga_tech_terraform_gas_desc:0 "As atmosferas dos gigantes gasosos estão cheias de recursos raros que são infelizmente impossíveis de acessar devido às atmosferas tumultuadas dos planetas. No entanto, matrizes de modulação da gravidade orbital massivas acima da atmosfera do planeta podem estabilizar a atmosfera superior do planeta, potencialmente permitindo a colonização cidades flutuantes. "
  
  giga_dialog.301.name:0 "$name_terraform_gasgiant$Canteiro de obras construído"
  giga_dialog.301.desc:0 "O canteiro de obras de um futuro canteiro Macroatmosférico foi concluído no sistema [giga_system.GetName]. Sobre este andaime, construiremos um dispositivo capaz de estabilizar a atmosfera superior de um gigante gasoso, tornando-o adequado para a colonização por assentamentos aerotransportados. "
  giga_dialog.301.a:0 "Maravilhoso."
  
  giga_dialog.302.name:0 "$name_terraform_gasgiant$Magnetorings construídos"
  giga_dialog.302.desc:0 "Nossos magnetores de$name_terraform_gasgiant$foramconcluído no sistema [giga_system.GetName]! Esses dois anéis massivos que se estendem ao redor do gigante gasoso são capazes de gerar um poderoso campo magnético, que irá alimentar os moduladores de gravidade que ainda não instalamos. "
  giga_dialog.302.a:0 "Ótimo."
  
  giga_dialog.303.name:0 "$name_terraform_gasgiant$Moduladores de gravidade construídos"
  giga_dialog.303.desc:0 "Nosso$name_terraform_gasgiant$no sistema [giga_system.GetName] agora está completo! Com os moduladores de gravidade agora no lugar, podemos começar o processo real de estabilização da atmosfera superior deste gigante gasoso para eventualmente colonizar isto."
  giga_dialog.303.a:0 "Estamos perto."
  
  giga_dialog.304.name:99 "Gas Giant Stabilized!"
  giga_dialog.304.desc:0 "Ótimas notícias! Nossos engenheiros relatam que nosso$name_terraform_gasgiant$no sistema [giga_system.GetName] estabilizou a atmosfera superior de um gigante gasoso! O gigante gasoso agora é colonizável e pode hospedar assentamentos aéreos, que certamente beneficiará nossa economia, já que os gigantes gasosos estão repletos de recursos raros. "
  giga_dialog.304.a:0 "Maravilhoso!"
  
  macro_stabilizer_0:0 "Canteiro de obras$name_terraform_gasgiant$"
  macro_stabilizer_0_DESC:0 "O canteiro de obras de$name_terraform_gasgiant$, abrigando o pessoal e o equipamento necessário para construir uma instalação massiva em torno deste gigante de gás a fim de torná-lo mais habitável."
  macro_stabilizer_0_MEGASTRUCTURE_DETAILS:0 "Uma grande construção semelhante a um anel ao redor de um gigante gasoso que pode estabilizar sua atmosfera superior." #gigalistentry MACROATMOSPHERIC STABILIZER
  
  macro_stabilizer_1:0 "$name_terraform_gasgiant$Magnetorings"
  macro_stabilizer_1_DESC:0 "Os anéis massivos que se estendem ao redor deste planeta podem emitir um poderoso campo magnético que, por sua vez, alimentará os moduladores de gravidade avançados que ainda precisam ser construídos."
  
  macro_stabilizer_2:99 "$name_terraform_gasgiant$"
  macro_stabilizer_2_DESC:0 "Com os moduladores de gravidade agora no lugar, este$name_terraform_gasgiant$está concluído. Tudo o que resta fazer agora é iniciar o processo de estabilização."
  
  macro_stabilizer_3:0 "Iniciar Estabilização"
  macro_stabilizer_3_DESC:0 "Use a maquinaria avançada de$name_terraform_gasgiant$para estabilizar a atmosfera superior deste gigante gasoso, tornando-a um tanto habitável."
  
  #########################################
  ### Interstellar Habitat ################
  #########################################
  giga_tech_interstellar_habitat:99 "$name_interstellar_hab$ion"
  giga_tech_interstellar_habitat_desc:0 "O vasto vazio entre as estrelas é completamente desprovido de qualquer vida ou atividade. No entanto, usando sistemas de reciclagem extremamente eficientes e engenharia avançada, podemos transformar esses territórios antes hostis e inexplorados em nossa casa."
  
  giga_tech_interstellar_ringworld:99 "$name_interstellar_ring$s"
  giga_tech_interstellar_ringworld_desc:0 "Nós dominamos a arte de construir mundos em anel que nãorequiresem muito calor natural para funcionar. O próximo passo lógico é levar isso ao extremo e atualizar nossos$name_interstellar_hab$s com mundos em anel massivos!"
  
  giga_dialog.2901.title:0 "$name_interstellar_hab$Canteiro de obras construído"
  giga_dialog.2901.desc:0 "O canteiro de obras de um futuro$name_interstellar_hab$foi construído no sistema [giga_system.GetName]. Usando um feixe de táquions subespaço focalizado, ele irá gerar uma hiperfaia parcial que levará ao canteiro de obras por an$name_interstellar_hab$. \n \nAgora, devemos escolher onde colocar o referido canteiro de obras ao redor do sistema atual. "
  giga_dialog.2901.a:0 "Espaço-Leste"
  giga_dialog.2901.b:0 "Espaço-Norte"
  giga_dialog.2901.c:0 "Espaço-Oeste"
  giga_dialog.2901.d:0 "Espaço-Sul"
  
  giga_dialog.2902.title:0 "$name_interstellar_hab$Concluído!"
  giga_dialog.2902.desc:0 "Ótimas notícias! Nossos engenheiros nos informaram que um$name_interstellar_hab$foi concluído! Ele fica a alguns anos-luz de distância do sistema [giga_system.GetName], na direção que foi escolhida. Isso é maravilhoso A estação espacial pode abrigar milhões de habitantes e é alimentada por um enorme gerador de singularidade. Agora, tudo o que temos a fazer é colonizá-la. \n \nO posto avançado deve ser construído a partir do mapa da galáxia. "
  giga_dialog.2902.a:0 "Maravilhoso."
  
  giga_dialog.2903.title:0 "$name_interstellar_ring$Frame Built"
  giga_dialog.2903.desc:0 "Em uma incrível façanha de engenharia, construímos a estrutura do esqueleto para um enorme$name_interstellar_ring$em torno de um de nossos$name_interstellar_hab$s! Com uma circunferência de alguns milhões de quilômetros, esta estrutura enorme servirá como base para construir quatro segmentos habitáveis ​​em torno de$name_interstellar_hab$. "
  giga_dialog.2903.a:0 "Excelente."
  
  giga_dialog.2904.title:0 "$name_interstellar_ring$Habitat Built"
  giga_dialog.2904.desc:0 "Um segmento de nosso$name_interstellar_ring$foi concluído! Apresentando dois enormes habitats de$name_interstellar_ring$, esta enorme construção funciona sem um sol para aquecê-la. Esta é realmente uma conquista surpreendente que few espécies podem até sonhar em rivalizar. "
  giga_dialog.2904.a:0 "Maravilhoso."
  
  interstellar_habitat_0:0 "Canteiro de obras$name_interstellar_hab$"
  interstellar_habitat_0_DESC:0 "O depósito de teste para um futuro$name_interstellar_hab$s. Ele emite um feixe de tachyon focado através do subespaço todo o caminho para o espaço interestelar, gerando uma hiperlane parcial que os navios podem usar para viajar até o local para um futuro$name_interstellar_hab$. "
  interstellar_habitat_0_MEGASTRUCTURE_DETAILS:0 "Um$name_interstellar_hab$é uma estação espacial autossustentável localizada entre sistemas estelares, que pode suportar 15 distritos especiais." #megalistentry INTERSTELLAR HABITAT
  
  interstellar_habitat_1:0 "Construir$name_interstellar_hab$"
  interstellar_habitat_1_DESC:0 "Iniciar a construção do$name_interstellar_hab$."
  
  interstellar_habitat_2:0 "Complexo Interestelar Central"
  interstellar_habitat_2_DESC:0 "Um enorme complexo no espaço interestelar abrigando um reator de singularidade e um habitat."
  interstellar_habitat_2_MEGASTRUCTURE_DETAILS:99 "$interstellar_habitat_2_DESC$"
  
  interstellar_habitat_3:0 "$name_interstellar_ring$Complex"
  interstellar_habitat_3_DESC:0 "Um enorme complexo no espaço interestelar abrigando um reator de singularidade e um habitat. Ele também contém um mundo anelar e fornece-lhe energia."
  
  interstellar_habitat_4:0 "$name_interstellar_ring$Frame"
  interstellar_habitat_4_DESC:0 "Este enorme esqueleto constitui cerca de um quarto da circunferência total de$name_interstellar_ring$. O trabalho nos habitats reais ainda não foi iniciado."
  interstellar_habitat_4_MEGASTRUCTURE_DETAILS:99 "$interstellar_habitat_4_DESC$"
  
  interstellar_habitat_5:0 "$name_interstellar_ring$Segment"
  interstellar_habitat_5_DESC:0 "Um segmento$name_interstellar_ring$completo, pronto para habitação."
  
  #########################################
  ### Orbital Naval Logistics Office ######
  #########################################
  giga_tech_orbital_naval_logistics:99 "Offworld Naval Logistics Management"
  giga_tech_orbital_naval_logistics_desc:99 "As our empire's navy grows, so does its needs. One solution to the navy's ever-growing needs is to construct massive $name_orb_naval_logistics$s, housing vast arrays of military equipment to support our fleets."
  orb_naval_logistics_desc:99 "A vast military complex which helps in managing our military."
  
  orbital_naval_logistics_office_0:99 "$gc_kilo$$name_orb_naval_logistics$ Construction Site"
  orbital_naval_logistics_office_0_DESC:99 "The construction site for a future $name_orb_naval_logistics$, an installation housing all of the staff and equipment needed to manage a fledgling interstellar navy."
  orbital_naval_logistics_office_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_kilostructure$ - $giga_list_category_military$\nIncreases £navy_size£ §YNaval Capacity§!\n§LA large orbital structure housing various facilities to improve the ability of our fleet military."
  
  orbital_naval_logistics_office_1:99 "$name_orb_naval_logistics$"
  orbital_naval_logistics_office_1_DESC:99 "An operational $name_orb_naval_logistics$, ready to aid in the management of our navy."
  
  #########################################
  ### Orbital Elysium #####################
  #########################################
  giga_tech_orbital_elysium:0 "Habitação orbital avançada"
  giga_tech_orbital_elysium_desc:0 "Técnicas incrivelmente avançadas de construção orbital permitem a criação de habitats planetários muito eficientes, oferecendo condições de vida maravilhosas aos seus habitantes."
  
  giga_dialog.1101.name:0 "$name_orb_elysium$Completed"
  giga_dialog.1101.desc:0 "Um habitat$name_orb_elysium$acabou de ser concluído no sistema [giga_system.GetName]! Este magnífico habitat em forma de anel abriga continentes e oceanos artificiais, proporcionando condições semelhantes às de planetas para seus habitantes."
  giga_dialog.1101.a:0 "Maravilhoso."
  
  orbital_elysium_0:99 "$gc_kilo$$name_orb_elysium$"
  orbital_elysium_0_DESC:0 "Um$name_orb_elysium$é uma forma de habitat avançado orbitando um planeta, fornecendo muito espaço vital."
  orbital_elysium_0_MEGASTRUCTURE_DETAILS:0 "$orbital_elysium_0_DESC$" #megalistentry ORBITAL ELYSIUM
  
  orbital_elysium_origin_platform_0:99 "$name_orb_elysium$ Construction Site"
  orbital_elysium_origin_platform_0_DESC:99 "The future site of an $name_orb_elysium$."
  orbital_elysium_origin_platform_0_MEGASTRUCTURE_DETAILS:99 "orbital_elysium_origin_platform_0_MEGASTRUCTURE_DETAILS placeholder"
  
  orbital_elysium_origin_platform_1:99 "$orbital_elysium_0$"
  orbital_elysium_origin_platform_1_DESC:99 "$orbital_elysium_0_DESC$"
  
  orbital_elysium_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - Replaces the host planet capital building, §Yblocking all building slots§!, §Yhalving district count§!, and §Yreducing research output§!, but §Yprovides additional jobs§! scaling with population, varying with planet designation. These jobs focus primarily on §Ybasic resource production§!, but include a small number of more advanced jobs.\n\nUpon reaching £pop£ §Y40 Pops§! and upgrading the capital, the host planet also receives a §Y$building_giga_elysium_host_booster$§! building, which boosts the output of jobs related to the planet's designation.\n\nThe Elysium itself has districts for §Yresearch§!, §Yunity§!, §Yamenities§!, and maintaining §Ystability on the host planet§!. It also §Ygains building slots§! based on effects which would provide slots on the host planet."
  
  orbital_elysium_ruined:0 "$name_orb_elysium$ Arruinado"
  orbital_elysium_ruined_DESC:0 "Este$name_orb_elysium$foi completamente arruinado por algum cataclismo. Pode ser possível repará-lo com as tecnologias corretas."
  
  orbital_elysium_repaired:99 "$name_orb_elysium$"
  orbital_elysium_repaired_DESC:99 "A complete $name_orb_elysium$, ready for habitation."
  
  GIGA_ELYSIUM_PLANET_NAME:99 "[event_target:giga_elysium_host.GetName] Control"
  
  #########################################
  ### Stellar Ring Habitat ################
  #########################################
  
  giga_tech_stellar_ring_habitat:99 "The Stellar Ring"
  giga_tech_stellar_ring_habitat_desc:99 "We have mastered the art of building space stations over planets. What if we used the rest to make our own planets instead?"
  
  stellar_ring_habitat_0:99 "$gc_mega$$name_giga_orbital$ Site"
  stellar_ring_habitat_0_DESC:99 "The construction station serves as the base for the future construction of a $name_giga_orbital$."
  stellar_ring_habitat_0_MEGASTRUCTURE_DETAILS:99 "£galwonders£ $giga_list_category_megastructure$ - $giga_list_category_habitable_mega$\nA large §YHabitat§! orbiting a star, complementary to other §YHabitats§! in the system\n§LA glittering circlet built from gathered asteroids, lined with artistically constructed planetary landscapes, and studded with civilian spaceports.§!"
  
  stellar_ring_habitat_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - Has districts for §YFarming§!, §YUnity§!, §YAmenities§!, and §YLogistics§!. Max one per system.\n\nConsumes all §YAsteroids§! which orbit a star and are not used by other megastructures, scaling £planetsize£ §Y$PLANET_SIZE$§! with their number and quality. Deposits of £alloys£ $alloys$, £minerals£ $minerals$, and to a lesser extent £energy£ $energy$ improve yield. Converts Strategic Resource deposits on consumed asteroids into planet deposits.\n\nSome districts have special effects:\n- §Y$district_giga_orbital_preserve$§! districts provide Amenities to every $habitat_0$ in the same system.\n- §Y$district_giga_orbital_logistics$§! districts provide £mod_planet_resettlement_unemployed_mult£ $MOD_PLANET_RESETTLEMENT_UNEMPLOYED_MULT$ to every colony in the system, and for §Y$civic_machine_servitor$§! Empires also propagate £job_bio_trophy£ $job_bio_trophy$ production bonuses."
  
  stellar_ring_habitat_1:99 "$name_giga_orbital$ Consolidation"
  stellar_ring_habitat_1_DESC:99 "Collected material, ready to be incorporated into surface plates once the frame is complete."
  
  stellar_ring_habitat_2:99 "$name_giga_orbital$ Framework"
  stellar_ring_habitat_2_DESC:99 "The bare skeleton of a ring, awaiting substrate, support systems, and surface plates."
  
  stellar_ring_habitat_3:99 "$name_giga_orbital$"
  stellar_ring_habitat_3_DESC:99 "A completed ring, ready to be settled."
  
  stellar_ring_habitat_ruined:99 "Ruined $name_giga_orbital$"
  stellar_ring_habitat_ruined_DESC:99 "A large, ring shaped habitat orbiting a star. Currently severely damaged, it could be repaired with the right technology."
  stellar_ring_habitat_ruined_MEGASTRUCTURE_DETAILS:99 "stellar_ring_habitat_ruined_MEGASTRUCTURE_DETAILS placeholder"
  
  stellar_ring_habitat_restored:99 "$stellar_ring_habitat_3$"
  stellar_ring_habitat_restored_DESC:99 "A fully repaired ring, ready to be settled."
  
  GIGA_ORBITAL_PLANET_NAME:99 "[FromFrom.System.GetName] Orbital"
  GIGA_ORBITAL_ANCHOR_NAME:99 "Ring Site"
  
  requires_no_existing_orbital:99 "$TRIGGER_FAIL$Only one $name_giga_orbital$ can be built per system."
  
  # platform
  giga_dialog.13601.name:99 "$name_giga_orbital$ Construction Site Built"
  giga_dialog.13601.desc:99 "The construction site for the $name_giga_orbital$ in the [giga_system.GetName] system is now ready. This orbital platform will serve as a staging ground for the collection of asteroids from across the system, and their future incorporation into the ring's frame structure, once it is ready.\n\n§YNOTE: Make sure all asteroids you wish to use in construction are clear of anomalies and have any special projects or archaeological sites completed, as these will be §Rexcluded§! from collection. §RSelection is final§! once the consolidation step is started!§!"
  giga_dialog.13601.a:99 "Conduct a final sweep of the system's asteroids."
  
  # stage 1
  giga_dialog.13602.name:99 "$name_giga_orbital$ Asteroid Consolidation Complete"
  giga_dialog.13602.desc:99 "Collection of loose asteroids and other material from the [giga_system.GetName] system has now concluded. Construction crews are now ready to begin work on the frame of the $name_giga_orbital$ proper, which will provide structural support to the landscape plates above and spaceport facilities below."
  giga_dialog.13602.a:99 "Onward to the ring itself."
  
  # stage 2
  giga_dialog.13603.name:99 "$name_giga_orbital$ Frame Built"
  giga_dialog.13603.desc:99 "The frame of the $name_giga_orbital$ in the [giga_system.GetName] system is now complete. This superstructure will support primary functions of the habitat, and contains the major transit corridors which will be used after its eventual surface colonization. Sites for multiple spaceports have been laid out around the circumference, and the huge edge walls for containing atmosphere under spin gravity are partially complete. "
  
  # stage 3
  giga_dialog.13604.name:99 "$name_giga_orbital$ Complete!"
  giga_dialog.13604.desc:99 "With the installation of the final landscape plate, and the transplantation of the final planetary biosphere, the $name_giga_orbital$ in the [giga_system.GetName] system is finally complete and ready for colonization.\n\nThe surface will provide ample space for development while the sub-surface transport network will make sure it has a minimal impact upon the ring's environment, and the spaceports on the exterior will allow efficient access to any other colonies in the system."
  giga_dialog.13604.desc.servitor:99 "With the installation of the final landscape plate, and the transplantation of the final planetary biosphere, the $name_giga_orbital$ in the [giga_system.GetName] system is finally complete and ready for colonization.\n\nThe surface contains habitats tailored to a wide range of organic species, making it an ideal place to house a huge population of $job_bio_trophy_plural$.\n\nThe spaceport facilities on the ring's exterior will provide us an extreme level of integration between it and any production centers elsewhere in the system, reducing the need for localised organic care facilities."
  giga_dialog.13604.servitor:99 "A true organic paradise."
  
  # discover ruined
  giga_dialog.13605.name:99 "Ruined $name_giga_orbital$"
  giga_dialog.13605.desc:99 "The broken remains of a huge space structure have been found in [giga_system.GetName], orbiting the system primary. A colossal ring with a diameter several times larger than that of a planet, it appears to have once served as some kind of habitat, maintaining an atmosphere with spin gravity.\n\nThough thoroughly scoured of life, this \"§H$name_giga_orbital$§!\" remains mostly intact, and if repaired could potentially have a livable surface area exceeding that of most habitable worlds."
  giga_dialog.13605.a:99 "A familiar concept."
  
  # repairs
  giga_dialog.13606.name:99 "$name_giga_orbital$ Restored"
  giga_dialog.13606.desc:99 "The scoured $name_giga_orbital$ in the [giga_system.GetName] system has been fully repaired, and its environment re-seeded. The landscape is now ready to receive colonists, and the expansive spaceport facilities around the ring's outer surface will no doubt be a major boon to local logistics."
  
  giga_stellar_ring_asteroid:99 "Marked For Collection"
  giga_stellar_ring_asteroid_desc:99 "This asteroid has been marked for collection for use in the construction of a $name_giga_orbital$ in this system."
  
  #########################################
  ### HRAE-MC #############################
  #########################################
  giga_tech_hrae_mc:0 "Colheita de Singularidade Relativística"
  giga_tech_hrae_mc_desc:0 "Os buracos negros, apesar de emitirem muito pouca energia, estão na verdade surgindopotências tic. A combinação de vários métodos avançados de coleta de energia, adaptados para caber em torno de um enorme buraco negro, poderia nos permitir montar uma máquina extremamente eficiente para monopolizar completamente toda a energia que o buraco negro tem a oferecer. "
  
  giga_dialog.3101.name:0 "$name_hraemc$Construction"
  giga_dialog.3101.desc:0 "O canteiro de obras do nosso futuro$name_hraemc$está pronto. Esta maravilha tecnológica extrairá a energia diretamente de [giga_system.GetName] e também provará ser um centro de pesquisa maravilhoso de perto estudar o buraco negro. "
  giga_dialog.3101.a:0 "Excelente."
  
  giga_dialog.3102.name:0 "Aceleradores construídos"
  giga_dialog.3102.desc:0 "Nossos trabalhadores acabaram de montar os aceleradores cronotemporais, dois enormes anéis de distorção do espaço-tempo capazes de acelerar bastante a decadência do buraco negro, aumentando assim a radiação Hawking. Nossos engenheiros estimam que a decadência do buraco negro está sendo acelerada em quintilhões de vezes. No entanto, devido à sua enorme vida útil, o buraco negro provavelmente sobreviverá a todas as civilizações da galáxia. \n \nEles também eliminam a dilatação do tempo em torno do buraco negro e estabilizam o resto da megaestrutura. "
  giga_dialog.3102.a:0 "Ótimo. Continue os esforços."
  
  giga_dialog.3103.name:0 "Injetores de massa construídos"
  giga_dialog.3103.desc:0 "Os injetores de massa foram instalados e estão começando a lançar grandes quantidades de materiais diretamente no horizonte de eventos, gerando um disco de acreção muito brilhante. Os injetores possuem uma capacidade limitada de gerar energia a partir da luz emitidos do disco, mas eles não são muito eficientes e exigirão que construamos os Coletores de Acreção para colher plenamente o potencial energético. "
  giga_dialog.3103.a:0 "Bom. É uma façanha e tanto."
  
  giga_dialog.3104.name:0 "Coletores de acreção construídos"
  giga_dialog.3104.desc:0 "Outra etapa no caminho para um macro-coletor Hawking de radiação e emissão de acreção é concluída quando os coletores de acreção são concluídos. Essas enormes construções são feitas especialmente para coletar a energia emitida pela acreção ultrabrilhante disco causado pelo nosso despejo de materiais no buraco negro. Eles também coletam parte da energia rotacional do buraco negro, e laboratórios especializados foram instalados dentro dele, permitindo que nossos cientistas vejam de perto o rasgo literal no espaço-tempo. \n \nA etapa final será construir os Coletores Polares, que coletarão os vários raios emitidos pelo buraco negro quando engole algo, bem como a Radiação Hawking. "
  giga_dialog.3104.a:0 "Muito bom."
  
  giga_dialog.3105.name:0 "$name_hraemc$Terminado"
  giga_dialog.3105.desc:0 "Nosso macro-coletor de radiação e emissão de acreção, ou$name_hraemc$, está concluído. Este incrível feito tecnológico nos concederá enormes quantidades de energia, bem como muitos dados sobre a natureza do estranho corpos que são buracos negros. Os coletores polares estão coletando ativamente a maior parte da energia emitida pelo buraco negro, bem como a matéria escura residual que sai dele. \nA integração civil também foi adicionada, permitindo que nossos cidadãos despejem seu lixo em o buraco negro, reduzindo o custo dos bens de consumo. "
  giga_dialog.3105.a:0 "Que isso nos ajude a dominar a galáxia."
  
  hrae_mc_0:0 "Canteiro de obras de$name_hraemc$"
  hrae_mc_0_DESC:0 "Este local de construção servirá como um depósito de preparação para hospedar grandes quantidades de recursos e pessoal necessários para construir um coletor de macro de emissão de radiação e acreção Hawking."
  hrae_mc_0_MEGASTRUCTURE_DETAILS:0 "O$name_hraemc$é uma joia tecnológica construída em torno de um buraco negro para coletar sua energia." #megalistentry HRAE-MC
  
  #hrae_mc_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - Provides a reduction to §YConsumer Goods§! cost."
  
  hrae_mc_1:0 "$name_hraemc$Chrono-Accelerators"
  hrae_mc_1_DESC:0 "Esses anéis emitem uma radiação cronotron especial que acelera a emissão da radiação falciforme e reduz a enorme dilatação do tempo normalmente encontrada em torno dos buracos negros."
  
  hrae_mc_2:0 "$name_hraemc$Injetores de massa"
  hrae_mc_2_DESC:0 "Esses injetores permitem o fácil despejo de grandes quantidades de matéria no buraco negro, gerando um disco de acreção muito brilhante e energético, cuja energia pode ser coletada. Os componentes integrados permitem ao injetor coletar parte da energia, mas eles não são eficientes. "
  
  hrae_mc_3:0 "$name_hraemc$Coletores de Acreção"
  hrae_mc_3_DESC:0 "Os Coletores de Acreção são feitos especialmente para coletar a vasta quantidade de energia emitida pelo disco de acreção. Eles também possuem instalações científicas especializadas para estudar a estranha física do buraco negro."
  
  hrae_mc_4:99 "$name_hraemc$"
  hrae_mc_4_DESC:0 "Um$name_hraemc$operacional, que significa 'Macro-coletor de radiação e emissão de acreção'. A radiação Hawking é acelerada graças a componentes especiais."
  
  #############################################################################################################################################
  ### Event Chains ############################################################################################################################
  #############################################################################################################################################
  #########################################
  ### Pouchkinn ###########################
  #########################################
  giga_pouchkinn.002.title:0 "Laboratório Antigo"
  giga_pouchkinn.002.desc:0 "Nossa nave científica pesquisando o abandonado$name_orb_elysium$avistou um estranho laboratório em sua superfície. Parece estar bloqueado, e as varreduras confirmaram sua incrível idade. \n \nNosso cientista recomenda colonizar o Orbital Habitat se quisermos saber mais sobre este estranho edifício. "
  giga_pouchkinn.002.a:99 "Peculiar."
  
  giga_pouchkinn.101.name:0 "O Laboratório"
  giga_pouchkinn.101.desc:0 "Desde que nossos colonos pisaram neste aparentemente abandonado$name_orb_elysium$, o misterioso laboratório antigo permaneceu um mistério intrigante. Varreduras confirmaram que não continha nenhuma forma de vida inteligente. As equipes de expedição enviadas para dentro têm encontramos muitos dispositivos centenários feitos com tecnologias muito avançadas. \n \nNo entanto, ainda não temos absolutamente nenhuma ideia de quem construiu este lugar e por quê. Colonos em$name_orb_elysium$expressaram desejo de descobrir a origem deste laboratório, como poderia potencialmente conter tecnologias perigosas. "
  giga_pouchkinn.101.a:0 "Organize uma expedição às profundezas deste lugar."
  giga_pouchkinn.101.b:0 "Deixe como está. Não pode causar muito dano."
  giga_pouchkinn.101.b.tooltip:0 "Espero que nada de ruim aconteça."
  giga_pouchkinn.101.c:0 "Não podemos deixar essa coisa ficar. Destrua-a."
  giga_pouchkinn.101.c.tooltip:0 "Prepare uma ogiva de pequena escala para destruir o laboratório."
  
  giga_pouchkinn.102.name:0 "Detonação catastrófica!"
  giga_pouchkinn.102.desc:0 "Notícias horríveis do recém-colonizado$name_orb_elysium$! Nossos colonos prepararam uma ogiva nuclear de pequena escala e dispararam contra o Laboratório Antigo, a fim de se livrar dela para sempre. \nNo entanto, parece que a destruição do prédio ativou algum tipo de protocolo, que por sua vez levou à detonação simultânea de vários milhares de ogivas nucleares em torno de$name_orb_elysium$. \nNossa colônia foi totalmente destruída, e a construção tornou-se inabitável. Pode ser possível para restaurá-lo se possuirmos as tecnologias certas. "
  giga_pouchkinn.102.a:0 "Maldições!"
  
  giga_pouchkinn.103.name:0 "Drones defensivos!"
  giga_pouchkinn.103.desc:0 "Nossa equipe armada entrou no estranho laboratório e passou por algumas portas lacradas. Ao entrar no que parece ser uma grande e oca câmara, uma sirene de repente começou a emitir um guincho ensurdecedor. o teto então se abriu, despejando galões de um ácido superpoderoso sobre nossos soldados, que morreram quase imediatamente. \n \n Pouco depois, o solo perto do Laboratório se desfez e milhares de drones armados peculiares surgiram! Os drones começaram a escanear o$name_orb_elysium$, atacando qualquer forma de vida inteligente. Devemos agir rapidamente se quisermos salvar a colônia! "
  giga_pouchkinn.103.a:0 "Preparem os exércitos!"
  
  giga_pouchkinn.104.name:99 "Drones Victorious!"
  giga_pouchkinn.104.desc:0 "Nosso$name_orb_elysium$foi apreendido pelos Drones de Defesa Autônoma do Laboratório Antigo! Devemos agir rapidamente se quisermos recuperá-lo antes que os drones matem todos."
  giga_pouchkinn.104.a:0 "Exércitos!"
  
  giga_pouchkinn.105.name:0 "$name_orb_elysium$Reclaimed!"
  giga_pouchkinn.105.desc:0 "Nossos exércitos destruíram com sucesso os drones que tomaram conta de nossa colônia no$name_orb_elysium$. A análise dos drones destruídos confirmou a incrível idade do Laboratório e sua origem misteriosa, e coletamos muitos dados de engenharia de eles."
  giga_pouchkinn.105.a:0 "Bom."
  
  giga_pouchkinn.106.name:0 "Drones derrotados!"
  giga_pouchkinn.106.desc:0 "Nossos exércitos conseguiram se defender dos drones do Antigo Laboratório. A análise dos drones destruídos confirmou a incrível idade do Laboratório e sua origem misteriosa, e coletamos muitos dados de engenharia deles."
  giga_pouchkinn.106.a:0 "Bom."
  
  giga_pouchkinn.107.name:0 "Exploração de laboratório"
  giga_pouchkinn.107.desc:0 "Agora que os drones de laboratório foram derrotados, que curso de ação devemos tomar? Parece que há muito mais neste Laboratório do que se pensava anteriormente ... \nNossos cidadãos estão ficando desconfiados disso incrivelmente estranho edifício, e alguns dizem que deveria ser destruído. Nossos cientistas desaconselham isso, no entanto, porque não sabemos que tipo de eventos a destruição do laboratório causaria. "
  giga_pouchkinn.107.gestalt.desc:99 "Now that the lab drones have been defeated, what course of action should we take? It seems there is much more to this Laboratory than previously thought...\nOur drones' self-preservation protocols are routing them away from this incredibly strange building, and pathfinding efficiency reviews suggest it should be destroyed. However, collective self-preservation might be best pursued by leaving it, as we don't know what kind of events destroying the lab would cause."
  giga_pouchkinn.107.a:0 "Envie uma equipe menor de cientistas."
  
  giga_pouchkinn.108.name:0 "As Profundezas do Laboratório"
  giga_pouchkinn.108.desc:0 "Nossa equipe de cientistas entrou no laboratório mais uma vez, desta vez com extrema cautela. \nO laboratório é muito maior do que pensávamos anteriormente e parece se estender até as profundezas de$name_orb_elysium$. Cada andar está cheio de engenhocas estranhas que não servem a um propósito claro. Cada engenhoca apresenta uma descrição detalhada em um idioma que não podemos entender, e todas as tentativas de tradução infelizmente falharam. \ N \nDepois de algumas dezenas de andares ou mais, a equipe chegou ao aparente na parte inferior do lugar, alguns quilômetros abaixo da superfície de$name_orb_elysium$. Eles fizeram uma descoberta incrível: o laboratório é habitado! Mais precisamente, eles se depararam com dezenas de criaturas estranhas, curtas e peludas semelhantes a mamíferos. Quando falaram com, as criaturas simplesmente olharam para nossos cientistas e retomaram suas atividades. Eles parecem estar fazendo a manutenção do laboratório e limpando-o. \n \nNo entanto, depois de mais alguns andares, nossa equipe avistou um indivíduo inteligente aparentemente construído usando algum tipo de dispositivo. Eles teorizam que foi ele quem construiu toda esta estrutura. \ NO indivíduo aparentemente ficou surpreso com a nossa chegada e, após ativar uma espécie de tradutor, decidiu se apresentar. "
  giga_pouchkinn.108.a:0 "Na tela."
  
  giga_pouchkinn.109.name:0 "O Cientista Solitário"
  giga_pouchkinn.109.desc:0 "Ah. Saudações. É, Weeny Pouchkinn. Sim, Weeny. Nome estranho, eu sei. \n \nJá se passaram décadas ... não, séculos desde que vi outra forma de vida inteligente cair lá. Fica solitário rapidamente, sabe? E não, aquelas coisas peludas estranhas que você provavelmente viu quando veio aqui não contam. Eles são drones estúpidos que eu fiz bioengenharia para fazer coisas que eu não queria fazer sozinho. Eles não contam. Não tenho muita conversa, infelizmente. \n \nPara os últimos séculos, tenho trabalhado aqui, fazendo experimentos, criando tecnologias sofisticadas. Mas acredito que minha pesquisa está finalmente chegando ao fim. Veja, estive tentando descobrir uma maneira de viajar através do espaçome continuum em ambas as direções ... Em outras palavras, viagem no tempo. Sim."
  giga_pouchkinn.109.a:0 "Viagem no tempo?"
  giga_pouchkinn.109.a.response:0 "Sim, viagem no tempo. Tenho quase certeza de que estou muito perto de descobrir. Ou estou? Eu ... nem sei mais. Já faz tanto tempo . É apenas um fluxo interminável de equações e experimentos e mais equações e teorias ... Eu gerei buracos de minhoca em miniatura, fiz buracos no espaço-tempo e baguncei com Tachyons, e ainda assim me escapa. "
  giga_pouchkinn.109.b:0 "Você construiu este$name_orb_elysium$?"
  giga_pouchkinn.109.b.response:0 "O quê? Não, claro. Eu só ... encontrei. Estava lá, apenas deitado orbitando um gigante gasoso. Então eu o resolvi. Não havia nenhum império por perto quando eu chegou aqui. \n \nNa verdade, sua espécie está listada como 'Não compatível com FTL' em meu banco de dados. Acho que devo atualizá-lo com mais frequência, hein? "
  giga_pouchkinn.109.c:0 "É você quem está por trás dos navios e dos drones?"
  giga_pouchkinn.109.c.response:0 "Oh. Esses. Sim. Eu os construí um tempo atrás. Bem, eu realmente não 'construí' as naves. Eu as vasculhei em toda a galáxia. \n \nAs naves aleatórias caíram em campos de asteróides ou cargueiros abandonados. Dei-lhes um pequeno fixador e eles estavam prontos para ir. Coloque-os perto do Elysium para ter certeza de que ninguém me incomodaria. Acho que eles falharam, uh? Afinal, eu os projetei para proteger fauna e piratas fora do espaço. Não esperava um ataque total de um império espacial. \n \nA mesma coisa com aqueles drones. Tenho muito orgulho deles. Muita engenharia lá dentro. Oh, os drones quase mataram seus colonos? Me desculpe por isso."
  giga_pouchkinn.109.d:0 "Há quanto tempo você está aí embaixo?"
  giga_pouchkinn.109.d.response:0 "Há muito, muito tempo. Pelo menos alguns séculos. Tenho estado ocupado fazendo 'ciência' desde então. Gosto daqui, porque é muito tranquilo. Lugar perfeito para conduzir meu experimentos sem algum governo irritante gritando que é 'muito perigoso'. Bem, todos os 'governos' e 'impérios' que conheci durante minhas viagens já se foram. \nQuem riu por último agora? "
  giga_pouchkinn.109.e:0 "Exibir tela desligada."
  
  giga_pouchkinn.110.name:0 "O Cientista"
  giga_pouchkinn.110.desc:0 "Agora que finalmente descobrimos quem construiu este lugar, precisamos tomar uma decisão. O cientista expressou o desejo de potencialmente se juntar à equipe científica de nosso império, alegando que talvez nosso conhecimento pudesse ajudá-lo a descobrir nossa viagem no tempo. Também podemos deixá-lo fazer sua pesquisa e continuar os esforços de colonização conforme planejado. Ele concordou em nos deixar usar os andares superiores do laboratório, se assim o desejarmos, o que sem dúvida seria de grande valor científico. "
  giga_pouchkinn.110.a:0 "Deixe-o continuar com sua pesquisa."
  giga_pouchkinn.110.b:0 "Contrate-o como cientista."
  giga_pouchkinn.110.c:0 "A pesquisa dele é muito perigosa. Execute-o e invada o local."
  
  giga_pouchkinn.111.name:99 "An Ancient Scientist"
  giga_pouchkinn.111.desc:0 "Pouchkinn parecia animado com a ideia de finalmente fazer outra coisa depois de séculos de pesquisa. Ele pegou um disco de dados contendo a maior parte de suas pesquisas, embalou seus suprimentos e foi escoltado para fora de seu laboratório por nosso cientista. Algumas das pequenas criaturas peludas o seguiram. \ N \nO calor da luz do sol após tantos anos de isolamento o encantou, e depois de alguns exames médicos para se certificar de que não carregava nenhum patógeno alienígena, ele agora está pronto para se juntar nosso império como cientista. "
  giga_pouchkinn.111.a:0 "Excelente."
  giga_pouchkinn.111.a.tooltip:0 "Ganhamos um cientista de nível 6."
  
  giga_pouchkinn.112.name:0 "Pesquisa de Pouchkinn"
  giga_pouchkinn.112.desc:0 "Nossos cientistas se despediram de Pouchkinn e lhe desejaram boa sorte em sua jornada no tempo. Antes de partirem, Pouchkinn insistiu em dar a eles um disco de dados contendo algumas de suas pesquisas. \n \nPouchkinn também disse os cientistas eram livres para usar as partes superiores do laboratório como quisessem, o que certamente será muito útil para nossos pesquisadores. "
  giga_pouchkinn.112.a:0 "Muito bem."
  giga_pouchkinn.112.a.tooltip:0 "Um modificador positivo é criado no$name_orb_elysium$."
  
  giga_pouchkinn.113.name:0 "Não mexa com o tempo"
  giga_pouchkinn.113.desc:0 "Notícias dramáticas do nosso$name_orb_elysium$. Parece que Weeny Pouchkinn continuou com seus experimentos de viagem no tempo e, acidentalmente, abriu um buraco enorme no espaço-tempo. \nTudo ao seu redor, incluindo o próprio Pouchkinn, foi instantaneamente absorvido a singularidade, criando um novo tipo de buraco negro exótico que consiste em energia de vácuo metaestável em ebulição. A colônia está irremediavelmente perdida para sempre. "
  giga_pouchkinn.113.a:0 "Uma tragédia horrível causada por um indivíduo tolo."
  
  giga_pouchkinn.114.name:0 "É uma armadilha!"
  giga_pouchkinn.114.desc:0 "Notícia horrível! Quando o cientista-chefe da expedição sacou uma arma para assassinar Weeny Pouchkinn, algum tipo de dispositivo de autodestruição foi ativado dentro do traje de Pouchkinn, causando uma detonação massiva. reação em cadeiação, que detonou ogivas escondidas dentro da estrutura de$name_orb_elysium$, obliterando nossa colônia e arruinando a construção. Não houve sobreviventes. "
  giga_pouchkinn.114.a:0 "Maldições!"
  
  giga_pouchkinn.115.name:99 "Lab Raided"
  giga_pouchkinn.115.desc:0 "Pouco depois de falar com Pouchkinn, o principal cientista da expedição sacou uma arma e atirou no peito dele, matando-o no local. Nossa equipe então vasculhou o laboratório, recolhendo tudo o que pôde. \nAn A autópsia foi realizada no corpo de Pouchkinn, revelando implantes cibernéticos e biológicos incrivelmente avançados que certamente irão beneficiar nossa pesquisa. \nO laboratório foi então isolado. "
  giga_pouchkinn.115.a:0 "Seu sacrifício contribuirá para a ciência."
  giga_pouchkinn.115.natural_design.a:99 "Another body mutilated by implants."
  
  giga_pouchkinn.116.name:99 "Escapee"
  giga_pouchkinn.116.desc:0 "Nossos cientistas não foram capazes de matar Pouchkinn, pois ele ativou algum tipo de dispositivo de teletransporte, enviando-o para um pod de fuga que então fugiu para o hiperespaço, para nunca mais ser visto. \n \nEstamos no entanto capaz de invadir o próprio laboratório, reunindo quantidades incríveis de dados da pesquisa de Pouchkinn. O laboratório foi então isolado. "
  giga_pouchkinn.116.a:0 "Nos encontraremos novamente."
  
  #########################################
  ### Eeloo ###############################
  #########################################
  giga_dialog.10801.title:0 "Sob o gelo"
  giga_dialog.10801.desc:0 "Ao pesquisar o planeta frio e normal de Eeloo nos arredores do sistema Kerbol, nossa nave científica tropeçou em algo estranho. \n \nA densidade do planeta não corresponde às previsões, e algumas partes do superfície exibe padrões irregulares, de aparência quase artificial. Nosso cientista acredita que pode haver mais neste pequeno mundo gelado do que pensávamos, e preparou um projeto especial para analisá-lo melhor. "
  giga_dialog.10801.a:99 "Peculiar."
  
  giga_dialog.10802.title:0 "Os Mistérios de Eeloo"
  giga_dialog.10802.desc:0 "Enquanto explorava a superfície de Eeloo, nossa equipe expedicionária localizou uma pequena escotilha metálica no meio de uma planície congelada. A equipe forçou a abertura da escotilha e chegou em uma enorme sala subterrânea e tecnologicamente avançada. a chegada aparentemente acionou algum tipo de mecanismo de ativação, e nossa equipe foi saudada por uma voz robótica. Eles estão repassando a mensagem para nós. "
  giga_dialog.10802.a:0 "Na tela."
  
  giga_dialog.10803.title:0 "Transmissão de entrada!"
  giga_dialog.10803.desc:0 "<ENTIDADE ESTRANGEIRA LOCALIZADA> \n \n <INICIANDO PROTOCOLO DE DIGITALIZAÇÃO> \n \n <ENTIDADE NÃO RECONHECIDA> \n \n <SCANS CONFIRMAM ENTIDADE TEM VIAGEM FTL> \n \n <PROBABILIDADE DE RELAÇÃO COM KRAKEN = HIGH> \n \n <ATIVANDO O SISTEMA DE DEFESA ANTI-KRAKEN> \n \n <SISTEMA EELOO ANTI-KRAKEN ATIVADO> \n \n <ÚLTIMA ATIVAÇÃO 3617 CICLOS ATRÁS> \n \n <PREPARAR PARA A ERADICAÇÃO> "
  giga_dialog.10803.a:0 "O Kraken? Agourento."
  
  giga_dialog.10804.title:0 "O mundo voador"
  giga_dialog.10804.desc:0 "Logo depois que a IA concluiu seu discurso sinistro, o contato com a equipe foi perdido. As equipes expedicionárias de superfície relataram grandes ondas tectônicas, como se todo o planeta estivesse tremendo! De repente, enormes construções metálicas emergiram do planeta congelado superfície. Nossa nave científica ponderou o que eles eram, mas a resposta rapidamente ficou clara: é uma arma. \n \nO planeta inteiro se transformou em uma enorme super arma móvel como mecanismo de defesa e saiu de órbita. Este corpo celestial hostil agora ataca qualquer coisa que se aproxime, incluindo nossa nave científica. "
  giga_dialog.10804.a:0 "Inacreditável! Precisamos encontrar uma maneira de contra-atacar."
  
  giga_dialog.10805.title:0 "Derrota de Eeloo"
  giga_dialog.10805.desc:0 "Depois de uma luta perigosa, nossas frotas conseguiram paralisar fatalmente o planetóide armado no sistema Kerbol. \n \nNo entanto, mesmo que o planeta tenha sido colocado fora de funcionamento, sua estrutura interna ainda está principalmente intacto, graças à sua espessa crosta protetora. Alguns de nossos cientistas mais otimistas acreditam que poderíamos consertar este dispositivo maravilhoso e usá-lo como nosso próprio planeta armado! "
  giga_dialog.10805.a:0 "Esta nave colossal servirá sob nossa bandeira!"
  giga_dialog.10805.b:0 "Jogue fora."
  
  giga_dialog.10806.title:0 "Um planeta voa mais uma vez"
  giga_dialog.10806.desc:0 "Notícia incrível! Em um feito maravilhoso de engenharia, conseguimos restaurar o planetóide danificado como arma no sistema Kerbol. Ele voltou a funcionar e agora está sob nosso controle direto. \n \nNossos cientistas aproveitaram a oportunidade para estudá-lo mais de perto. Eles descobriram que os habitantes anteriores do sistema construíram esta super arma para lutar contra um ser transdimensional conhecido como 'O Kraken'. Parece que eles tiveram sucesso em lutar contra a fera , mas logo após essa vitória, a IA da super arma não funcionou bem e atirou no planeta natal da espécie, acreditando que era o Kraken. \n \nDe qualquer forma, agora temos um planeta de batalha totalmente armado e operacional sob nosso controle. "
  giga_dialog.10806.a:0 "Maravilhoso!"
  
  #########################################
  ### Fallen Empires ######################
  #########################################
  giga_fallen_empire_moons.101.name:99 "Celestial Body Movement Detected!"
  giga_fallen_empire_moons.101.desc:99 "Alarming news! Shortly after the awakening of the [giga_fe_activating_celestials.GetName], long-range sensors have detected that multiple bodies within their territory have left their orbits. Massive hidden weapons and thrusters emerged from their crusts, and they have now transformed into fearsome weaponized planetoids. It appears this ancient civilization had more hidden weaponry than previously thought..."
  giga_fallen_empire_moons.101.a:99 "Battlestations!"
  
  giga_fallen_empire_moons.102.name:99 "The Holy Behemoth"
  giga_fallen_empire_moons.102.desc:99 "It is no secret that the Awakened Empires possess many kind of ancient weapons that have laid dormant for millennia. But nobody could predict that one of the Holy Guardians' Holy Worlds wasn't actually a regular world, but rather, a gigantic and inactive planet-sized spaceship. And with their recent awakening, this colossal spaceship has re-activated and the once pristine Gaia World has transformed into a colossal weaponized planet, capable of obliterating anything standing in its way. It seems they are more prepared to defend their faith than we anticipated..."
  giga_fallen_empire_moons.102.a:99 "This is bad."
  
  #########################################
  ### Paluushia ###########################
  #########################################
  giga_paluush.001.name:0 "O sistema Gatzo"
  giga_paluush.001.desc:0 "Nosso navio de ciência explorando o sistema Gatzo relata que duas megaestruturas foram localizadas dentro do sistema! A primeira é um portal abandonado flutuando perto da borda do sistema, indicando que este lugar pode ter pertencido a um império estelar importante. A segunda megaestrutura é uma$name_terraform_barren$completa construída em torno de um dos planetas internos! Parece que os habitantes anteriores tentaram terraformar este mundo, mas seu progresso foi interrompido no meio por alguns motivos desconhecidos. "
  giga_paluush.001.a:0 "Incrível."
  
  giga_paluush.002.name:0 "Mensagem de rádio primitiva"
  giga_paluush.002.desc:0 "Nossa nave científica atualmente pesquisando o mundo primitivo de Paluushia fez uma descoberta fascinante. Parece que, apesar de suas tecnologias primitivas, os primitivos da era das máquinas do planeta estão repetidamente enviando uma mensagem de rádio de curto alcance para o espaço, destinado a potenciais visitantes alienígenas. Nossa equipe de ciência conseguiu decifrar a mensagem. "
  giga_paluush.002.a:0 "Na tela."
  
  giga_paluush.003.name:0 "O Paluush"
  giga_paluush.003.desc:0 "Saudações. Esta é uma mensagem de rádio que foi pré-gravada usando nossas tecnologias de rádio mais avançadas. \n \nEu sou Poh'tin, representante do Estado Democrático de Paluush, vindo do planeta Paluushia. Vivemos uma existência pacífica em nosso belo mundo continental e imploramos gentilmente para que você, viajante das estrelas, não perturbe nosso modo de vida. \ N \nNós adicionamos algumas informações sobre nossa cultura e nosso povo nesta mensagem. para que possam servir aos seus sociólogos. \n \nCordialmente, Poh'tin e o povo Paluush. "
  giga_paluush.003.a:0 "Exibir tela desligada."
  
  giga_paluush.1011.title:0 "Lagomorfos impossíveis"
  giga_paluush.1011.desc:0 "Notícias alarmantes! Parece que a arma da chupeta global do nosso Colosso não é tão infalível como se pensava. Pouco depois de proteger o mundo de Paluushia, a tripulação a bordo do nosso Colosso percebeu picos de energia peculiares emanando dos pacificados Primeiro, desconsiderados como anomalias do sensor, os picos ficaram cada vez mais intensos nos últimos dias, culminando em uma enorme explosão subespacial de energia. \n \nEm questão de minutos, o escudo outrora impenetrável que colocamos em torno de Paluushia se desfez e se dissipou no nada. \n \nSensores relataram Paluushes exultantes celebrando no planeta abaixo, celebrando a façanha que acabaram de realizar. Este evento desafiador da física mostra que o potencial psiônico dos Paluushes é ainda mais potente do que pensávamos, e muitos de nossos cientistas estão começando a ficar preocupados com a possibilidade de eles se tornarem uma ameaça. Eles aconselham deixá-los na lua continental. "
  giga_paluush.1011.a:0 "Patifes miseráveis!"
  
  giga_paluush.1021.title:99 "The Unsweeped"
  giga_paluush.1021.desc:0 "Más notícias. Nossa tripulação do Colossus relata que a civilização primitiva de Paluushes na superfície de Paluushia foi ... completamente afetada por nosso feixe de nêutrons. \n \nMinutos antes de nosso assassino de planetas disparar sua pluma de nêutrons, milhões de Paluushes em todo o planeta começaram a entrar em um transe peculiar. Parece que, ao reunir seus potenciais psiônicos coletivos, eles conseguiram gerar uma espécie de barreira psiônica que cobre o mundo inteiro. O escudo tinha tal integridade que o nêutron de Colossus a pluma ricocheteou inofensivamente no espaço. \n \n Imediatamente depois, o misterioso traDepois de terminar, os primitivos começaram a celebrar sua 'vitória' sobre nós. Parece que esses selvagens lagomórficos vivem para ver outro ciclo solar, apesar de nossos melhores esforços. "
  giga_paluush.1021.a:0 "Idiotas insolentes! Vamos pegá-los a tempo."
  
  giga_paluush.1031.title:0 "Uma Porca Inquebrável"
  giga_paluush.1031.desc:0 "Conforme o feixe de rachaduras de planetas hiperaquecido segue em direção à superfície de Paluushia, um Paluush solitário olha para o céu. Maior do que qualquer Paluush que vimos antes, ele de repente decola e voa em direção ao Colosso 'laser gigantesco, aparentemente em rota de colisão direta com ele. \n \nA tripulação do Colossus observa esse ato tolo com diversão, sabendo que o Paluush está voando em direção à sua condenação certa. Mas, em uma torção impossível, exatamente como o o feixe está prestes a atingir a criatura logo acima da atmosfera, o Paluush levanta a cabeça e encara o laser. Em uma fração de segundo, o feixe simplesmente para antes mesmo de entrar na atmosfera de Paluushia, interrompido por um fluxo imensamente poderoso de puro energia psiônica. O feixe então se dissipa no nada, e o Paluush casualmente retorna à superfície, depois de parar sem esforço uma arma destruidora de planetas. \n \nMinutos após este incidente, uma mensagem ecoa na consciência do cr do Colosso ew: \n§RA mensagem não foi clara o suficiente? Pedimos especificamente à sua espécie que não nos perturbasse. Saia imediatamente e nunca mais volte.§! "
  giga_paluush.1031.a:0 "Como isso é possível ?!"
  
  giga_paluush.1041.title:0 "Lagomorfos sem Deus"
  giga_paluush.1041.desc:0 "À medida que o Raio Divino do Colosso desce sobre Paluushia ... absolutamente nada acontece. Os Paluush, que deveriam começar a adorar nossas divindades, parecem completamente não afetados pelas energias psiônicas do raio, como se ele apenas ricocheteasse suas mentes como uma bola de borracha contra uma parede. \n \nDe fato, nossos médiuns estão detectando que todo o planeta parece estar protegido por uma espécie de escudo psiônico dentro da própria mortalha, emitida por uma criatura cujo potencial psiônico faz com que nosso Godray se pareça um mero foguete de mortalha. A aura psiônica desta criatura é tal que pode ser sentida por paranormais a vários anos-luz de distância. \n \n Pouco depois, nossos paranormais receberam coletivamente uma mensagem psiônica proveniente da mesma criatura: \n'§RDo não tente impor suas crenças fúteis sobre minha espécie, pois eu já sou sua divindade. Não precisamos de sua 'orientação', portanto, peço que você saia de nosso mundo imediatamente."
  giga_paluush.1041.a:0 "Idiotas absurdos!"
  
  giga_paluush.1051.title:0 "Nanobots instáveis"
  giga_paluush.1051.desc:0 "Notícias alarmantes. A nuvem de nanorrobôs que lançamos sobre os Paluushes mal chegou à superfície. Assim que entrou na atmosfera, a grande maioria dos nanorrobôs simplesmente explodiu em chamas roxas e se desintegrou. Os restantes que chegaram à superfície conseguiram pousar em alguns Paluushes, mas foram simplesmente sacudidos pelas criaturas, incapazes de convertê-los em ciborgues. Os núcleos de processamento do nosso Colossus não encontraram uma explicação lógica para isso, e muitos acabaram fritando tentando encontrar uma resposta. \n \nPoderia haver mais na mente orgânica do que pensávamos anteriormente? "
  giga_paluush.1051.a:0 "Talvez pudéssemos aprender com essas criaturas, de alguma forma."
  
  giga_paluush.2011.title:0 "Paluushia Retornando Fogo!"
  giga_paluush.2011.desc:0 "Notícias alarmantes! O comandante da frota encarregado de bombardear o mundo primitivo de Paluushia relata que os Paluushes estão de alguma forma usando seu imenso potencial psiônico para parar nossos projéteis de bombardeio antes que atinjam a superfície, antes de prosseguir para arremessá-los de volta para nós em grandes velocidades! \n \nVárias de nossas naves já foram danificadas por isso, mas não causaram danos ao próprio planeta. Eles aconselham parar de bombardear o planeta, pois é evidentemente inútil. "
  giga_paluush.2011.a:0 "Como se atrevem ?!"
  
  giga_paluush.3031.title:0 "Posto de observação Paluushia destruído!"
  giga_paluush.3031.desc:0 "Pouco depois de nosso posto de observação acima de Paluushia ser concluído, ainda antes que a tripulação pudesse se mover, toda a estrutura repentinamente deixou sua órbita e passou a entrar na atmosfera do planeta antes de se desintegrar, criando uma maravilhosa chuva de meteoros visível da superfície do planeta. Nossos cientistas então simplesmente ouviram uma voz, falando em suas próprias consciências: \n§B'Eu entendo que nossa civilização pode ser do seu interesse, mas simplesmente desejamos ser deixados sozinhos para viver nossas vidas. Não leve para o lado pessoal. Em troca, aceite este gentil presente, para mostrar que não pretendemos fazer mal.'§! \n \n Pouco depois de a mensagem terminar, nossos cientistas relataram que um grande aglomerado de minerais misteriosos apareceu em órbita, onde o posto de observação costumava ser ... "
  giga_paluush.3031.a:99 "Peculiar."
  
  giga_paluush.400.title:0 "Vovô derrotado, Paluushia desmorona"
  giga_paluush.400.desc:0 "Através de puro poder de fogo, nossos exércitos conseguiram matar o 'deus' e líder paluush, o almighty Grandbunny. Quando o corpo colossal da criatura caiu no chão, todos os Paluush em Paluushia de repente pararam de se mover e começaram a emitir coletivamente um grito ensurdecedor, audível em todo o planeta. \ N \nO corpo do avô começou a brilhar com uma luz roxa ofuscante , ofuscando até mesmo a estrela local. Esta luz cresceu rapidamente para engolfar toda Paluushia em energias cataclísmicas, e todo o planeta está agora começando a entrar em colapso sobre si mesmo, como se esmagado pela quantidade de energia liberada pela morte do avô ... "
  giga_paluush.400.a:0 "Isso é ... impossível!"
  
  giga_paluush.402.title:0 "A Alma do Avô"
  giga_paluush.402.desc:0 "Já se passaram alguns dias desde o colapso de Paluushia, e nossos topógrafos fizeram uma descoberta impressionante: Paluushia ainda está tecnicamente lá! \n \nNa verdade, parece que as energias do Avô derrubaram todo o planeta em um pequeno cristal extremamente energético de pura energia psiônica, que agora flutua no espaço vazio onde Paluushia costumava estar. \n \nNossos cientistas recuperaram este cristal, e ele parece de fato conter a própria essência do Avô ao lado do resto de Paluushia . Acreditamos que pode ser extremamente benéfico, se usado corretamente ... "
  giga_paluush.402.a:0 "Enfim, eles vão servir a algum propósito."
  
  #############################################################################################################################################
  ### Found Ruined/System/Planet ##############################################################################################################
  #############################################################################################################################################
  giga_dialog.10001.title:0 "Plano caído"
  giga_dialog.10001.desc:0 "Nossa nave científica explorando o sistema [from.GetName] avistou um planeta muito, muito estranho. \n \nUm planeta plano de origem artificial! Ainda mais estranho, uma civilização primitiva parece habitá-lo! no solo por geradores de gravidade artificial, esses seres primitivos provavelmente ficarão muito confusos quando deixarem seu mundo. \n \nNinguem tem idéia de como essa coisa surgiu. E provavelmente ninguém jamais terá. "
  giga_dialog.10001.a:99 "Peculiar."
  
  giga_dialog.10101.name:0 "Capital Antigo"
  giga_dialog.10101.desc:0 "A equipe encarregada de explorar o sistema de Corinto fez uma descoberta impressionante! Parece que o referido sistema é um§Sistema precursor BAnciente§! ou, mais precisamente, a antiga capital de um império morto há muito tempo, que caiu em ruínas após milênios de abandono. \n \nDuas megaestruturas em ruínas foram localizadas no sistema: um Complexo de Orquídeas Yggdrasil em ruínas e um$name_kugelblitz$em ruínas. Além disso, dois habitats em$name_orb_elysium$em ruínas também foram encontrados orbitando alguns dos planetas . \n \nJulgando pelo estado dos planetas do sistema, parece que muitas coisas aconteceram aqui. Isso certamente será de grande interesse para nossos arqueólogos. "
  giga_dialog.10101.a:0 "Incrível!"
  
  giga_dialog.10201.name:99 "The Lost Menagerie"
  giga_dialog.10201.desc:0 "Nossa nave científica parece ter tropeçado em algum tipo de§Sistema Precursor Bnciente§! . \n \nO sistema apresenta duas megaestruturas em ruínas: uma$name_yggdrasil$em ruínas, provavelmente usada para alimentar os espécimes em cativeiro, e uma$name_orbital_artificial_eco$em ruínas, que provavelmente foi usada para abrigar algumas espécies de animais exóticos. Dois planetas habitáveis ​​parecem cumprir o papel das reservas, embora quem a construiu tenha deixado o local há muito tempo. Isso certamente será muito precioso para nossos biólogos e arqueólogos. "
  giga_dialog.10201.a:0 "Fascinante."
  
  giga_dialog.10301.name:0 "O Berço dos Titãs"
  giga_dialog.10301.desc:0 "Um§Sistema Precursor BAncient§! foi descoberto por um navio de ciência! O sistema, apelidado de 'Berço do Titã', parece ter sido uma instalação de fabricação de navios enorme. Uma gigantesca, embora arruinada$name_neut_gigaforge$orbita em torno da estrela de nêutrons do sistema. Um$name_eng_test_site$arruinado também orbita um dos planetas do sistema. Os próprios planetas sofreram danos pesados ​​no passado. \n \nNo entanto, o sistema é guardado por uma grande frota de navios de guerra antigos , presumivelmente construído neste mesmo sistema. Parece que a luta será necessária se quisermos tomar este sistema ... "
  giga_dialog.10301.a:0 "Incrível."
  
  giga_dialog.10401.name:0 "A Antiga Forja"
  giga_dialog.10401.desc:0 "Um navio de ciência tropeçou no que parece ser um§Sistema precursor BAnciente§! As varreduras mostram que algum antigo precursor converteu este sistema em um vasto centro industrial, capaz de extrair quantidades incríveis de minerais para supostamente alimentar sua máquina de guerra. Alguns dos planetas do sistema foram despojados de sua crosta e manto,deixando apenas um núcleo interno exposto. \n \nInteressantemente, um$name_eng_test_site$arruinado flutua silenciosamente sobre um planeta, abandonado há milênios. A análise do sistema primário revelou que uma megaestrutura massiva uma vez envolveu a estrela (provavelmente um vasto complexo de elevação de estrelas), mas desde então foi destruída pela expansão estelar. "
  giga_dialog.10401.a:0 "Maravilhoso."
  
  giga_dialog.10501.name:0 "Anões trigêmeos"
  giga_dialog.10501.desc:0 "O sistema [from.GetName] é o lar de um arranjo estelar incrivelmente peculiar. Não um, mas três anões castanhos de classe L orbitam em torno de uma estrela de classe F central! Cada uma dessas estrelas falhadas apresenta um extenso sistema lunar, quase como um sistema solar em miniatura. Nossos cientistas estão intrigados sobre como esse sistema peculiar surgiu, e eles especulam que pode ser possível acender os anões marrons, se possuirmos as tecnologias corretas. \n \nOs marrons Os anões serão adicionados ao planejador de expansão assim que forem examinados. "
  giga_dialog.10501.a:0 "Que achado!"
  
  giga_dialog.10701.name:0 "Abandonado$name_orb_elysium$"
  giga_dialog.10701.desc:0 "Ao entrar no sistema [from.GetName], nosso navio científico avistou um habitat em forma de anel aparentemente vazio. Este '$name_orb_elysium$' parece ter sido abandonado e poderíamos colonizá-lo. No entanto, perto os Elysium são várias naves de origem desconhecida, aparentemente guardando o habitat. Se quisermos resolvê-lo, teremos que lutar ... "
  giga_dialog.10701.a:0 "Quem poderia ter construído esses navios?"
  
  ##########################################
  ### Katzenland ###########################
  ##########################################
  giga_katzenland.001.name:0 "Necrópole irradiada"
  giga_katzenland.001.desc:0 "O Sistema Gatzo nunca para de decepcionar. Após uma pesquisa de um dos maiores planetas do sistema, Katzenland, nossa equipe de ciência relata que encontraram grandes quantidades de ruínas enterradas abaixo das areias do planeta. Parece que este mundo costumava ser habitada por uma civilização próspera, possivelmente aquela que construiu o Portal do sistema, mas seus habitantes aparentemente tiveram um fim violento há vários milênios, a julgar pelo estado atual do planeta. \n \nNossa equipe de ciência está ansiosa para descobrir o que exatamente levou à queda desta civilização, já que estudar este mundo sem dúvida renderia dados científicos incríveis e, como tal, um local de escavação foi estabelecido no planeta. "
  giga_katzenland.001.a:0 "Interessante."
  
  site_katzenland:0 "Necrópole enterrada"
  site_katzenland_intro:0 "Uma civilização inteira morta jaz enterrada sob as dunas de areia em redemoinho de Katzenland. O que poderia ter acontecido com o mundo deles para que terminasse assim?"
  
  giga_katzenland.002.name:0 "Esqueletos multiespécies"
  giga_katzenland.002.desc:0 "Nossos arqueólogos encontraram alguns edifícios notavelmente intactos enterrados na areia. Lá dentro, eles encontraram os restos mortais de duas espécies distintas, provavelmente os principais habitantes deste mundo. Um deles parece ter uma aparência felina características coerentes com as de predadores de vértice em muitos outros mundos, enquanto o outro era provavelmente uma espécie anfíbia, embora seu esqueleto apresentasse uma quantidade perturbadoramente alta de lâminas e dentes extremamente afiados. \n \nOs edifícios parecem estar conectados a alguns uma espécie de rede de dados antiga que armazenava o conhecimento da civilização. Embora provavelmente não tenha funcionado por milênios, nossos arqueólogos esperam recuperar todos os dados que puderem dela. "
  giga_katzenland.002.a:0 "Continue cavando!"
  
  giga_katzenland.003.name:99 "Antique Data Web"
  giga_katzenland.003.desc:0 "A rede de dados do planeta, como esperado, está em muito mau estado. No entanto, por algum milagre, a equipe conseguiu recuperar alguns dados criptografados de um núcleo de dados rodando em uma fonte de energia nuclear de longa duração . Eles conseguiram decifrar notavelmente os nomes das duas espécies do planeta; a felina sendo um 'Katzen', enquanto a anfíbia era uma 'Zuspri'. Não se sabe se uma espécie governou sobre a outra, ou se elas coexistiram como iguais. \n \nTalvez a descoberta mais interessante deles seja a localização da capital do planeta, que supostamente hospedava o governo central da civilização ... "
  giga_katzenland.003.a:0 "Continue cavando!"
  
  giga_katzenland.004.name:99 "Katzen Capital"
  giga_katzenland.004.desc:0 "Demorou um pouco para cavar, mas a antiga capital do planeta foi localizada! Nossos arqueólogos encontraram uma construção colossal em forma de pirâmide enterrada na areia, que eles presumem que costumava servir como uma espécie de edifício do governo central. \n \nA pirâmide é absolutamente gigantesca e provavelmente se elevou a vários quilômetros da superfície do planeta. Levará um pouco de tempo e esforço para mapeá-la totalmente, pois contém centenas e centenas de salas decadentes, mas provavelmente vai render mais informações sobre o passado tumultuado deste planeta. "
  giga_katzenland.004.a:0 "Vá lá!"
  
  giga_katzenland.005.name:99 "Katzenland's Last Zuspri"
  giga_katzenland.005.desc:0 "Nossa equipe tem explorado o vasto palácio há algum tempo e conseguiu resgatar muitos materiais raros também. Mas, indo mais fundo no edifício, eles toparam com uma espécie de complexo de bunker , selado por uma porta de metal gigantesca. Abri-lo foi uma tarefa relativamente simples graças às suas brocas de fusão, e eles acabaram encontrando uma grande quantidade de criptos quebrados dentro do próprio bunker. \n \nEles continham vários Katzen e Zuspri mortos há muito tempo. indivíduos, que presumivelmente previram o que estava para acontecer com seu mundo. No entanto, de alguma forma, um dos pods ainda estava intacto e continha uma Zuspri congelada viva! Com extrema cautela, nossa equipe conseguiu descongelar a criatura, embora fosse pouco desorientado no início, parece ansioso para se comunicar conosco ... "
  giga_katzenland.005.a:0 "Na tela."
  
  giga_katzenland.006.name:0 "A Última Zuspri"
  giga_katzenland.006.desc:0 "Eu sou ... Ghuqwy. Sim, Ghuqwy. Esse é o meu nome, eu acho. E vocês são ... arqueólogos? \n \n ... \n \nEntão aconteceu. \n \nEle ... ele realmente fez isso? Meopa foi para a guerra com os Sobakis? Se não tivéssemos começado o Projekt Katzenform, então talvez a crise econômica não tivesse acontecido e ... Eu sabia que ... deveríamos ter feito algo para impedi-lo, mas ... ninguém ouviu ... e agora Katzenland se foi, para sempre ... \n \n ... quanto tempo faz, mesmo? Algumas décadas? Eu mal lembre-se de qualquer coisa de antes ... "
  
  giga_katzenland.006.a:0 "Já se passaram alguns milhares de anos."
  giga_katzenland.006.a.response:0 "Isso ... não deve haver nenhum vestígio de nossa civilização ... Eu não posso acreditar que tudo se foi. \n Eu nem sei como meu cripto resistiu por tanto tempo , e olhando para o resto da sala, parece que eu deveria me considerar com sorte ... "
  
  giga_katzenland.006.b:99 "Meopa?"
  giga_katzenland.006.b.response:0 "Minha memória está um pouco nebulosa ... mas, Meopa era nosso líder, eu acho. Sim, nosso líder. Um ambicioso Katzen. Não me lembro muito dele, mas eu sei ele queria travar uma guerra contra os Sobakis, que viveram na primeira lua de Katzenland ... e essa foi uma ideia horrível. "
  
  giga_katzenland.006.c:99 "Projekt Katzenform?"
  giga_katzenland.006.c.response:0 "Veja ... nosso sistema está prosperando com vida. Cada planeta carregando suas próprias formas de vida únicas ... exceto a mais interna, Potradus. Então Meopa queria ... transformá-lo. Faça é habitável, assim como Katzenland. Eu realmente não me lembro dos detalhes, mas sei que isso causou alguns problemas sérios em nossa economia depois ... "
  
  giga_katzenland.006.d:0 "Quem é você exatamente?"
  giga_katzenland.006.d.response:0 "Não me lembro muito do meu passado, infelizmente, é muito borrado ... sono criogênico não é muito bom para isso. Mas eu sei que fui um almirante da Armada Katzenlandiana ... Eu era muito bom em atirar e tudo mais. Se você também tiver espaçonaves, eu poderia ... ajudá-lo com isso. Parece que o velho Katzenland não é mais um lugar muito bom para se viver. "
  
  giga_katzenland.006.e:0 "Fora da tela."
  
  giga_katzenland.007.name:99 "Ghuqwy's Fate"
  giga_katzenland.007.desc:0 "Embora a descoberta de uma Zuspri sobrevivente seja incrível, parece que a memória nebulosa de Ghuqwy significa que não seremos capazes de aprender mais nada sobre a própria Katzenland. pelo que pudemos reunir, um certo 'Meopa' começou uma guerra com uma civilização que vivia na primeira lua de Katzenland, que provavelmente retaliou, destruindo a superfície de Katzenland. Precisamos explorar o planeta um pouco mais se quisermos realmente descobrir as razões desta guerra. \n \nQuanto ao A própria Ghuqwy, poderíamos recrutá-la como almirante da frota, ou poderíamos submetê-la à eutanásia e dissecá-la para aprender mais sobre a biologia ezicaniana ... "
  giga_katzenland.007.a:0 "Recrute-a, ela será útil."
  giga_katzenland.007.a.tooltip:0 "Ghuqwy torna-se um almirante de habilidade 4 de 78 anos (idade biológica). Ainda estudaremos sua biologia, mas em menor grau."
  giga_katzenland.007.b:0 "Dissecar ela."
  giga_katzenland.007.c:0 "Mate-a."
  
  giga_katzenland.008.name:99 "Meopa"
  giga_katzenland.008.desc:0 "Depois de analisar o que Ghuqwy disse, nossa equipe continuou sua exploração da pirâmide colossal, em busca de pistas para explicar o que causou a guerra Sobaki-Katzen. Eles finalmente encontraram uma sala enorme, quase totalmente destruída, com um trono no qual um esqueleto um pouco curto de Katzen estava sentado, segurando um pequeno dispositivo com uma das mãos. \n \nEmbora inicialmente confusos, eles descobriram que o esqueleto não era outro senão o próprio Meopa! Vários caches de dados estavam espalhados pela sala, provavelmente registrando dispositivos usados ​​por Meopa para registrar suas ações. Os dispositivos são antigos e danificados. Será necessário um grande esforço para descriptografá-los e analisá-los corretamente. \n \nEles também localizaram várias pedras preciosas, que teriam um bom preço no mercado. "
  giga_katzenland.008.a:0 "Devemos estar chegando perto."
  
  giga_katzenland.009.name:99 "Nuclear Folly"
  giga_katzenland.009.desc:0 "Infelizmente, os caches de dados foram corrompidos por milênios de negligência e só renderam informações parciais, então mexpedições de minério nas profundezas da pirâmide eram necessárias para juntar tudo. Mas, depois de muita procura, finalmente descobrimos sobre a horrível verdade ... \n \nMeopa realmente iniciou o Projekt Katzenform, que tinha como objetivo transformar Potradus em um mundo habitável. No entanto, os Katzens possuíam apenas FTL limitada e muito poucas colônias fora de seu sistema de origem, o que tornou o projeto extremamente caro para sua civilização. Embora a estrutura de terraformação fosse notavelmente bem feita, seu custo total levou a um colapso econômico. Por causa disso, os Sobakis de Nienet, uma civilização que compartilhava o sistema Gatzo e foram aliados próximos dos Katzen, decidiram atacar Katzenland, na tentativa de conquistá-la enquanto estava enfraquecida, contradizendo nossa teoria original de que os Katzen atacaram primeiro. \n \nMeopa então retaliou com a 'fúria de mil sóis', devastando completa e totalmente a superfície de Nienet. Essa resposta genocida desproporcional levou a uma queda drástica na estabilidade da nação, que culminou com revoltas em todo o império contra o regime de Meopa. Meopa, não querendo renunciar e sua sanidade se deteriorando rapidamente, começou a fazer o impensável: \nEle liberou o resto do arsenal nuclear de Katzen ... sobre a própria Katzenland. Ele destruiu seu próprio mundo, matando bilhões de Katzens e Zuspri. O relativamente pequeno império espacial de Katzen entrou em colapso, com as poucas colônias incapazes de se sustentar sem sua capital. \ N \nEmbora os registros falavam de um grande navio de colonização denominado§ Expedição YMeopian 1§ !, lançado antes do Sobaki-Katzen guerra em direção a um planeta distante desconhecido, que carregava Katzens e Zuspris em sono criogênico, o que significa que há uma pequena chance de as espécies ainda estarem lá fora, em algum lugar. \n \nO lado bom, conseguimos recuperar esquemas surpreendentemente intactos e detalhados de Projekt Katzenform, que sem dúvida irá beneficiar nosso conhecimento de terraformação. "
  giga_katzenland.009.a:0 "Horrível."
  giga_katzenland.009.b:0 "Nós conhecemos este mundo!"
  
  katzenland_terraform_knowledge:0 "Métodos de Terraforming Katzenlandian"
  katzenland_terraform_knowledge_desc:0 "As teorias dos Katzens sobre terraformação foram notavelmente eficientes para seu desenvolvimento tecnológico."
  
  giga_katzenland.010.name:99 "Resurrecting Meopa?"
  giga_katzenland.010.desc:99 "Meopa is dead and has been so for ten thousand years.\n\nOr... is he? His skeleton, still sitting on his throne, is remarkably intact despite what the rest of the planet went through and our archeologists have located trace amounts of surviving DNA within tissues that still cling to his bones.\n\nReviving the dead is no secret to us and by splicing what remains of Meopa with other samples of Katzen DNA as well as cybernetic implants, we might very well be able to bring back this once glorious leader... to serve under our flag.\n\nHe might have slight genocidal tendencies, but our scientists assure us that properly-placed nerve dampeners should quench most of his murderous tendencies. Should we proceed with this proposal?"
  giga_katzenland.010.a:99 "Absolutely!"
  giga_katzenland.010.b:99 "He was insane! Not a chance."
  
  REANIMATE_MEOPA:99 "Reanimate Meopa"
  REANIMATE_MEOPA_DESC:99 "Meopa is dead, but perhaps we could bring him back to life. However, due to his immense age, this will undoubtedly require supplementation by cybernetics and gene-splicing to fill the gaps."
  
  giga_katzenland.011.name:99 "Meopa's Return"
  giga_katzenland.011.desc:99 "It... has been done. A clever combination of cybernetics and gene-splicing alongside our esoteric reanimation techniques has enabled us to resurrect the long-dead Katzen leader. His mind has subsequently been placed within a new robotic body based on his skeleton and he should be fully ready to serve under our flag.\n\nIt is not entirely sure just how much of the original \"Meopa\" this reanimated copy has retained but initial questioning has shown his remaining memories do match what we collected from Katzenland's data cores but he is understandably somewhat confused about his current situation.\n\nThe usage of nerve dampeners implanted within his robotic body should quench any lingering genocidal tendencies but whether or not they will render him actually sane is... debatable.\n\nHowever, Meopa's incredible variety of skills he acquired while ruling Katzenland will enable him to serve as both an §YAdmiral§!, a §YGeneral§! and a §YGovernor§!."
  giga_katzenland.011.a:99 "Excellent... I think. Was this a good idea...?"
  giga_katzenland.011.a.tooltip:99 "§YMeopa§! joins us as both an §YAdmiral§!, §YGovernor§! and §YGeneral§!. If he dies in any of these roles, he will die in all three of them. We can however dismiss him from any of these roles if we do not want to risk a premature death.\n\nHopefully he will be somewhat sane this time.\n\nHopefully..."
  
  katzen_trait_meopa_revived:99 "Unhinged Nuclear Maniac"
  katzen_trait_meopa_revived_desc:99 "Although the usage of nerve dampeners is helping quench Meopa's questionable tendencies, his inner nuclear-loving self is still very much present and it shows."
  
  #Meopian Continuum moon and planetcraft names
  meopa_moon_fidelity:99 "Fidelity" #Meopa doesn't have a track record of forgiving disloyalty
  sobakitranen:99 "Sobakitränen" #Meopa knows how to hold a grudge
  
  ##########################################
  ### Flusion ##############################
  ##########################################
  giga_flusion.001.name:0 "Hiperdiversidade"
  giga_flusion.001.katzens.desc:99 "Our surveyors investigating the primitive world of Flusion has made a surprising discovery, as it appears this primitive world is inhabited not by one, but several sapient species!\n\nThe crew has been able to identify 5 main species: the feline Katzens, the amphibious Zuspris, the humanoid Roqualians, and the crustacean Kronks; with a fifth \"Flusionian\" species consisting of dozens of other hard-to-classify subspecies.\n\nOur scientists still aren't sure how or why so many species ended up on a single world, but this is surely a remarkable find."
  giga_flusion.001.nokatzens.desc:99 "Our surveyors investigating the primitive world of Flusion has made a surprising discovery, as it appears this primitive world is inhabited not by one, but several sapient species!\n\nThe crew has been able to identify 3 main species: the humanoid Roqualians, the crustacean Kronks and a third \"Flusionian\" species consisting of dozens of other hard-to-classify subspecies.\n\nOur scientists still aren't sure how or why so many species ended up on a single world, but this is surely a remarkable find."
  giga_flusion.001.a:0 "Interessante."
  giga_flusion.001.b:0 "Espere, Katzens e Zuspris ...?"
  
  giga_flusion.002.name:0 "Um Conto de Duas Espécies"
  giga_flusion.002.katzenland_nuked.desc:99 "Our findings of Katzens and Zuspris on different planets seem to indicate that the world the two species escaped to after Katzenland's destruction is none other than the primitive planet of Flusion!\n\nAlthough, at the time of their discovery on Flusion, both species seemed to have drastically regressed technologically. This implies the §YMeopian Expedition 1§! most likely crash-landed on the planet, forcing the few remaining individuals to rebuild practically their entire technological base.\n\nEven though it isn't a particularly important discovery, these findings are nonetheless of great interest to our planetary bioarcheologists. It also shows that, even when things are looking particularly dire for a civilization, one must not cast aside the possibility of their miraculous survival against all odds.\n\nWhich can be both uplifting and terrifying to think about..."
  giga_flusion.002.katzenland_alive.desc:99 "Our findings of Katzens and Zuspris on different planets shows a historic connection between Flusion and the §Y[giga_meopa_fe.GetName]§!! A reopened study into the elder empire's history has found references to the §YMeopian Expedition 1§!, which we believe was a large colonization vessel despatched towards Flusion many millenia ago.\n\nThe inferior technology of the Flusionian society implies that the colony ship most likely crash-landed, forcing the few remaining individuals to rebuild practically their entire technological base.\n\nIt isn't entirely clear why the §Y[giga_meopa_fe.GetName]§! abandoned the survivors completely, but our leading theory is that the colony ship malfunctions related to the crash included an FTL drive failure, and by the time the ship finally reached Flusion, its progenitors had long since lost interest."
  giga_flusion.002.a:0 "Um achado fascinante!"
  
  giga_flusion.004.name:0 "Desafio Flusionian"
  giga_flusion.004.a.desc:0 "Notícias terríveis! Pouco depois de nossos exércitos conseguirem derrotar os defensores primitivos de Flusion, uma das principais espécies do planeta, os Katzens, detonou todo o seu colossal arsenal nuclear, provavelmente para prevenir a captura de seu povo. Embora isso normalmente levasse o planeta a se transformar em um Mundo da Tumba, os Katzens haviam investido pesadamente em armamentos nucleares, o que os levou a possuir um estoque que rivalizava com alguns impérios interestelares. \n \nEm poucos minutos, gigantesco bolas de fogo engolfaram a maior parte da superfície do planeta, nivelando cadeias de montanhas e evaporando a maior parte dos oceanos do planeta. Todos os Flusionianos morreram no cataclismo e sua civilização foi completamente destruída. \n \nO outrora verdejante mundo continental de Flusiem se transformou em um deserto radioativo gigantesco repleto de ruínas ... "
  giga_flusion.004.a:0 "Oh, bem."
  giga_flusion.004.b.desc:0 "Notícias terríveis! Pouco depois de nossos exércitos conseguirem derrotar os defensores primitivos de Flusion, uma das principais espécies do planeta, os Katzens, detonou todo o seu colossal arsenal nuclear, provavelmente para prevenir a captura de seu povo. Embora isso normalmente levasse o planeta a se transformar em um Mundo da Tumba, os Katzens haviam investido pesadamente em armamentos nucleares (assim como fizeram em Katzenland), o que os levou a possuir um estoque que rivalizava com alguns impérios interestelares . \n \nEm minutos, bolas de fogo gigantescas engolfaram a maior parte da superfície do planeta, nivelando cadeias de montanhas e evaporando a maior parte dos oceanos do planeta. Todos os Flusionianos morreram no cataclismo, e sua civilização foi completamente destruída. \n \nO outrora verdejante continental mundo de Flusion foi transformado em um deserto gigantesco e radioativo repleto de ruínas, assim como Katzenland, o antigo mundo natal de Katzen ... "
  giga_flusion.004.b:0 "Eles realmente se detonaram NOVAMENTE?"
  
  giga_flusion.005.name:99 "Katzen Atomics"
  giga_flusion.005.desc:0 "Após a destruição do Flusion causada pelos Katzens incinerando todo o planeta com fogo nuclear, nossos cientistas não puderam deixar de notar que o método de auto-devastação nuclear dos Katzens foi surpreendentemente eficiente para uma espécie primitiva. , Os registros arqueológicos de Katzenland mostram que sua destruição foi tão rápida quanto a de Flusion, o que indica ainda que os Katzens haviam dominado a arte de destruir planetas em um inferno nuclear. \ N \nQuanto mais ... elementos radicais de nossas forças armadas estão sugerindo que fazemos a engenharia reversa de nossas descobertas nesses dois mundos, a fim de adaptar efetivamente os métodos de Katzen às nossas operações de bombardeio planetário. \n \nIsso sem dúvida nos permitiria devastar mundos com eficiência invisível, embora o resto da galáxia possa não ser muito feliz por estarmos destruindo mundos inteiros com o fogo atômico ... "
  giga_flusion.005.a:0 "Uma sugestão maravilhosa! Vamos fazê-lo imediatamente ..."
  giga_flusion.005.b:0 "Absurdo."
  
  giga_flusion.201.name:0 "Planeta Devastado"
  giga_flusion.201.desc:0 "Nossas frotas agora destruíram completamente a superfície de um planeta inimigo, erradicando todos os sinais de vida e transformando-o em um gigantesco deserto radioativo em ebulição. A quantidade de armamento que liberamos teve o efeito colateral de "sintetizando" alguns recursos raros (que normalmente só se formam naturalmente sob condições extremas) na superfície do planeta também. \n \nRealmente uma bela vista. "
  giga_flusion.201.a:0 "Os Katzens ficariam orgulhosos se não estivessem todos mortos."
  
  bombardment_katzen:99 "Katzen"
  bombardment_katzen_desc:0 "Com base nos métodos dos agora extintos Katzens,$bombardment_katzen$O bombardeio libera todo o poder do armamento nuclear, antimatéria e biológico na superfície do planeta. \n-§PApocalíptico§! danos a§YArmies§! \n -§PApocalyptic§! Dano a§YPlanet§! \ N-§PApocalyptic§! Dano a§YPops§! \ N- Bombardeará planetas indefesos \n- Pode reduzir planetas a Mundos de Deserto Irradiados \n - Alta chance de gerar recursos raros depósitos em mundos devastados \n- Irá§Rreduzir§! a opinião de impérios estrangeiros dos quais não somos aliados na devastação do planeta, se usado em um império não genocida \n-§R Esta postura de bombardeio pode, e irá, arruinar completamente os planetas é usado em "
  
  # bombardment_house_cat_katzen: "$bombardment_katzen$"
  # bombardment_house_cat_katzen_desc: "$bombardment_katzen_desc$"
  
  # bombardment_mary_sue_katzen: "$bombardment_katzen$"
  # bombardment_mary_sue_katzen_desc: "$bombardment_katzen_desc$"
  
  # bombardment_mary_sue_slam_dance_katzen: "$bombardment_katzen$"
  # bombardment_mary_sue_slam_dance_katzen_desc: "$bombardment_katzen_desc$"
  
  # bombardment_mary_sue_Q_katzen: "$bombardment_katzen$"
  # bombardment_mary_sue_Q_katzen_desc: "$bombardment_katzen_desc$"
  
  katzen_bombing:0 "§HDesbloqueia a Postura de Bombardeio:§!$bombardment_katzen$"
  katzen_bombing_desc:0 "Uma postura de bombardeio que emprega uma vasta gama de explosivos diferentes para maximizar o dano causado ao planeta alvo, e tem uma grande chance de criar depósitos de recursos raros."
  
  tech_katzen_atomic_munitions:0 "Munições Atômicas Katzen"
  tech_katzen_atomic_munitions_desc:0 "Os extremamente militaristas e amantes de armas nucleares conseguiram destruir as superfícies de Katzenland e Flusion com notável facilidade e eficiência. Eles pareciam empregar uma vasta gama de explosivos diferentes para lidar com o máximo de danos possível, variando de ogivas de fissão radioativa a bombas de antimatéria e armamento bioquímico. Ao adotar seus métodos, nossos navios poderiam ser feitos para devastar completamente os mundos inimigos com facilidade. "
  
  giga_fusion_age:0 "Idade da fusão"
  giga_fusion_age_desc:0 "Esta civilização avançou para o equivalente a uma Idade da Fusão. Eles dominaram a fusão nuclear e as viagens espaciais ao seu sistema lunar local são comuns. No entanto, eles ainda não descobriram FTL e o voo interplanetário continua escasso. Unificação política ainda está para ser alcançado, com o planeta abrigando vários estados-nações diferentes. "
  
  col_giga_pre_ftl_fusion:99 "$giga_fusion_age$"
  col_giga_pre_ftl_fusion_desc:99 "$col_primitive_desc$"
  col_giga_pre_ftl_fusion_tt:99 "$col_giga_pre_ftl_fusion_desc$"
  
  building_giga_flusion_home:0 "Metrópole Flusionian"
  building_giga_flusion_home_desc:0 "Um grande centro urbano Flusionian que abriga uma miríade de espécies, oferecendo condições de vida notavelmente boas."
  
  building_giga_flusion_fusion_power_plant:99 "Katzen Megareactor"
  building_giga_flusion_fusion_power_plant_desc:99 "A colossal Katzen-built Fusion Reactor located under the Katzen capital, providing vast amounts of clean energy."
  
  building_giga_flusion_capital:99 "Katown Megalopolis"
  building_giga_flusion_capital_desc:0 "Uma cidade gigantesca que abriga milhões de habitantes, servindo como capital dos Katzens. Ela apresenta uma pirâmide moderna notavelmente grande que abriga seu governo centralizado. A cidade também possui um gerador de escudo primitivo enorme, protegendo seus habitantes de bombardeios. "
  
  giga_flusion.301.name:0 "Megastrestrutura lunar flusioniana"
  giga_flusion.301.desc:0 "Nosso posto avançado no sistema§YJublio§! relata que a atividade começou a aumentar em uma lua de§YFlusion§ !, um mundo primitivo localizado dentro do sistema. \n \nDe fato, parece um das principais nações do planeta, o§YKatzenartig Imperium§! começou a empreender um grande projeto de construção na segunda lua de Flusion, Muno. Atualmente, eles estão transportando grandes quantidades de material e pessoal para a lua, e muitas bases permanentes surgiram no superfície do satélite. \n \nAs transmissões de rádio dos primitivos são surpreendentemente bem codificadas, o que impediu nossos cientistas de descobrir o que o projeto deveria ser. Eles não têm certeza de como apreender essa situação peculiar, e alguns defendem que colocamos um terminar este projeto nós mesmos imediatamente. "
  giga_flusion.301.a:0 "Não os perturbe, não importa."
  giga_flusion.301.b:0 "Tentativa de descobrir o que é o projeto."
  giga_flusion.301.c:0 "Eles devem ser parados. Bombardeiem a lua de uma vez!"
  
  giga_flusion.3001.name:99 "Flusionians Mobilize!"
  giga_flusion.3001.desc:0 "Notícias terríveis! Em resposta às nossas claras intenções de assumir o controle da Flusion, o Império Katzenartig iniciou uma campanha de mobilização massiva. \n \nEles expandiram drasticamente o tamanho de suas forças armadas e implantaram anti- canhões ferroviários orbitais para interceptar rodadas de bombardeio orbital. Seu líder, Kaiser Kattail, declarou que "Nós Katzens não entregaremos nossa amada Flusion a entidades sobrenaturais hostis tão facilmente, lutaremos até o fim e fazê-los pagar por cada quilômetro quadrado que eles tire de nós! ""
  giga_flusion.3001.a:0 "Primitivos tolos!"
  giga_flusion.3001.b:0 "Vamos quebrar seu mundo lamentável!"
  
  katzen_orbital_bombardment_shield:0 "Medidas anti-bombardeio de Katzen"
  katzen_orbital_bombardment_shield_desc:0 "Os Katzens e os Flusionians montaram uma vasta gama de canhões e aeronaves de alta altitude para tentar interceptar bombardeios orbitais direcionados a seu mundo."
  
  flusion_attack_moon_0:0 "Projeto Flusionian Lunar"
  flusion_attack_moon_0_DESC:0 "Um vasto projeto de construção semelhante a uma megaestrutura realizado pelos Flusionianos nesta pequena lua. É um empreendimento incrível dada a base tecnológica dos primitivos."
  flusion_attack_moon_0_MEGASTRUCTURE_DETAILS:99 "$flusion_attack_moon_0_DESC$"
  
  flusion_attack_moon_1:0 "Projeto Flusionian concluído"
  flusion_attack_moon_1_DESC:0 "Uma versão crua, mas poderosa, de uma Lua de Ataque. Ela é incapaz de se mover, mas possui uma enorme arma relativística."
  
  planning_flusionian_invasion:0 "Operação Flusionfall"
  planning_flusionian_invasion_desc:0 "Estamos preparando uma grande invasão dos Flusionianos. Como seus exércitos são surpreendentemente poderosos, teremos que investir muitos recursos nisso, se quisermos ter sucesso."
  
  failed_flusionian_invasion:0 "Falha na invasão Flusioniana"
  failed_flusionian_invasion_desc:0 "Falhamos em investir apropriadamente em nossos exércitos para conquistar os Flusionianos. Nosso império está em convulsão com o fracasso em conquistar um mundo primitivo."
  
  FIND_OUT_FLUSION_GUN_PROJECT:0 "Investigar o Projeto Flusioniano"
  FIND_OUT_FLUSION_GUN_PROJECT_DESC:0 "Envie uma equipe de cientistas para estudar secretamente as operações Flusionian em Muno, a fim de determinar o que exatamente eles estão planejando construir."
  
  giga_flusion.320.name:0 "Super Arma Flusioniana"
  giga_flusion.320.desc:0 "Nossos cientistas conseguiram determinar com sucesso o que a megaestrutura flusioniana deveria ser: \n \nÉ uma super arma lunar gigante. \n \nA decodificação de seus sinais de rádio revelou que eles pretendem construir um enorme canhão relativístico esculpido na superfície da lua, completo com vastas matrizes de mísseis nucleares e hangares de naves de ataque. Esta construção maciça e imóvel, aparentemente apelidada de§YProjekt Mondkanone: Sistema de Defesa Lunar§ !, destina-se a defender Flusion contra ameaças extraterrestres. Alguns também acreditam que o Império Katzenartig está apenas tentando projetar sua força para o resto do planeta, embora essa teoria permaneça duvidosa, já que algumas das outras nações do planeta também estão envolvidas no projeto. \n \nDe qualquer maneira, embora não tenham viagens FTL os esquemas da super arma mostram que ela ainda seria extremamente poderosa, mesmo contra nossas frotas da era espacial. Na verdade, os esquemas revelam que a arma de fogo seria capaz de acelerar erar um projétil enorme quase à velocidade da luz, o que poderiaperfure até mesmo nossas melhores armaduras ... \n \nPara explicar suas armas incrivelmente avançadas, alguns de nossos cientistas teorizam que os Flusionianos de alguma forma "perderam" o desenvolvimento da tecnologia FTL e, em vez disso, continuaram a desenvolver seu armamento em um grau extremo. "
  giga_flusion.320.a:0 "Temos que intervir. Contate-os diretamente."
  giga_flusion.320.b:0 "Monitore de longe, não pode ser tão poderoso."
  giga_flusion.320.c:0 "Destrua imediatamente."
  
  giga_flusion.321.name:0 "Contato com Flusion"
  giga_flusion.321.desc:0 "Em uma tentativa de estabelecer contato com os Flusionianos, nosso posto de observação enviou uma mensagem de rádio de alta energia para§YKatown§ !, a capital do§YKatzenartig Imperium§ !, iniciadores do projeto lunar . \n \nNão demorou muito para que os Katzens de Katown respondessem, e um representante de Katzen agora está nos saudando ... "
  giga_flusion.321.a:0 "Na tela."
  
  giga_flusion.322.name:0 "Transmissão de entrada!"
  giga_flusion.322.desc:0 "Saudações, alienígenas. \n \nEu sou Douclaw MacCathur, representante de nosso grande líder§YKaiser Kattail§ !, encarregado de estabelecer contato com vocês. Posso assegurar-lhes que trazemos apenas intenções pacíficas, como contanto que você faça o mesmo. \n \nEntão não estamos sozinhos lá fora, hein? Eu sempre suspeitei disso, de alguma forma. Então, parece que você notou o mais novo projeto do Império Katzenartig,§YProjekt Mondkanone§! ... \nBem, isso não é surpreendente, considerando que é nosso empreendimento mais ambicioso até agora. \nE você veio nos contatar sobre isso? O que um império interestelar poderia querer de um projeto como esse? Provavelmente não é tão avançado em comparação com o que sua espécie é capaz de fazer ... "
  giga_flusion.322.a:0 "Quem é você?"
  giga_flusion.322.a.response:0 "Eu? Estou surpreso que uma espécie alienígena queira saber sobre mim pessoalmente! \n \nSou o comandante militar do Katzenarmee, as forças armadas de nosso país. E, deixe-me dizer você, podemos não ter uma viagem espacial mais rápida do que a luz, mas posso garantir que certamente sabemos como lutar. \n \nNosso tipo passou por muitas guerras em nosso passado, pois este planeta nem sempre o mais pacífico. Então, nós somos lutadores bastante competentes, eu posso te dizer isso. "
  giga_flusion.322.b:99 "Kaiser Kattail?"
  giga_flusion.322.b.response:0 "Kaiser Kattail é o grande líder da nossa nação. Ele é um cara meio maluco, com um interesse peculiar em projetos de engenharia de grandes dimensões. Provavelmente uma das razões pelas quais ele criou pessoalmente o design básico para Projekt Mondkanone. \ N \nEle não é um diplomata muito bom. Por isso ele me enviou para me comunicar com sua espécie. "
  giga_flusion.322.c:0 "E as outras nações?"
  giga_flusion.322.c.response:0 "As outras nações? Existem algumas delas, como Roqualia, Laurandar, Lyuinita ou Linteria. Mas são muito complexas e diferentes para que eu seja capaz de resumi-las. \n \nElas parecem estar mais a bordo do Projekt Mondkanone, então eles estão contribuindo para sua construção e fornecendo ajuda econômica para financiá-lo. Eu mesmo espero que um dia possamos unir este mundo como um ... "
  giga_flusion.322.d:0 "Agora, conte-nos sobre o Projekt Mondkanone."
  
  giga_flusion.323.name:0 "Transmissão de entrada!"
  giga_flusion.323.desc:0 "Bem, ele foi construído para um propósito simples, na verdade. \n \nVocê vê, Kattail deseja usá-lo para nos proteger de ... ameaças sobrenaturais, como enxames vorazes devoradores, por exemplo. Embora nem tenhamos certeza de que tais coisas existam. Não temos a intenção de empregar esta super arma para conquistar ninguém, ou qualquer coisa, considerando que ela nem será capaz de se mover. \ N \nTudo o que desejamos é poder defender nossa modo de vida, se for necessário. \n \n ... \n \nE esperamos que não. "
  giga_flusion.323.a:0 "Não podemos tolerar isso. Cesse este projeto imediatamente."
  giga_flusion.323.a.tooltip:0 "Tentaremos ameaçar os Flusionianos para desmontar o Projekt Mondkanone. \n§ROs Flusionianos agora nos conhecem e serão capazes de se mobilizar em preparação para um conflito.§!"
  giga_flusion.323.a.response:0 "O quê? Você está nos ameaçando? \n \n ... \n \nIsso ... é exatamente para isso que estamos nos preparando! Não vamos desistir sem uma luta, alienígenas! "
  giga_flusion.323.b:0 "Uma causa nobre. Devemos contribuir com alguns recursos."
  giga_flusion.323.b.tooltip:0 "Vamos conceder a eles pelo menos 100£alloys£para acelerar a construção."
  giga_flusion.323.c:0 "Compreendido. Boa sorte, então."
  giga_flusion.323.c.tooltip:0 "Não faremos nada e esperaremos que eles terminem seu projeto."
  giga_flusion.323.c.response:0 "Bem, obrigado. Que possamos nos encontrar novamente, alienígenas."
  giga_flusion.323.d:0 "É uma boa ideia. Você poderia nos dar o esquema?"
  giga_flusion.323.d.tooltip:0 "Vamos simplesmente pedir o esquema da arma. Eles podem pedir uma compensação."
  giga_flusion.323.d.response:0 "Bem, terei que perguntar ao Kaiser e aos líderes do projeto sobre isso, mas ... eles provavelmente não se importarão, eu acho. Pode ser uma boa maneira de garantir uma boa relações entre nossas duas espécies, até. "
  
  giga_flusion.3234.name:0 "Flusion é desafiador! "
  giga_flusion.3234.desc:0 "Seguindo nossa demanda pelo desmantelamento do Projejt Mondkanone, os Flusionianos se recusaram categoricamente a encerrar seu projeto de megaestrutura lunar, com o Kaiser deixando claro que seu povo não desistiria sem lutar. \n \nNo momento em que falamos, toda a Flusion parece estar se preparando para uma grande mobilização em preparação para a nossa invasão ... "
  giga_flusion.3234.a:0 "Então invadiremos!"
  giga_flusion.3234.b:0 "Esqueça, não vale a pena se preocupar."
  
  giga_flusion.3235.name:99 "Flusion Submits, Kaiser Dead"
  giga_flusion.3235.desc:0 "Parece que as palavras severas de MacCathur foram apenas ameaças vazias. Embora ele e Kaiser Kattail fossem a favor da mobilização contra nós, o resto do Império Katzenartig e Flusion não se sentia assim. \n \nO Katzens não queria enfrentar um império interestelar e, de fato, enquanto o Kaiser estava preparando sua nação relutante para a mobilização, ele teria sido§Rassinado§! Por um membro de seu próprio alto comando militar! \ N \nUm novo governo provisório foi criado para substituí-lo, que concordou em desmantelar o Projekt Mondkanone, retirar-se de Muno e até nos enviar alguns recursos como compensação. \n \nCom a morte do ambicioso Kaiser Kattail, os Flusionianos provavelmente não tentarão mais nada em o futuro..."
  giga_flusion.3235.a:0 "Boa viagem, eles aprenderam seu lugar."
  
  giga_flusion.3232.name:0 "Kaiser aceita, exige compensação"
  giga_flusion.3232.desc:0 "Seguindo nossa demanda pelas plantas do Projekt Mondkanone, recebemos uma transmissão da Flusion! \n \nKaiser Kattail aparentemente aceitou nosso pedido para compartilhar as plantas da arma, mas também exigiu uma extensa compensação na forma de uma transferência de energia no valor de aproximadamente§ Y3000§!£energy£Ele declarou que ficaria feliz em cooperar conosco, mas que é justo que o ajudemos com o projeto em troca de tecnologia altamente secreta. \n \nEnquanto isso é uma soma considerável, os projetos parecem bastante avançados, mesmo para os nossos padrões, e certamente seriam um grande benefício para a nossa pesquisa sobre armas cinéticas. "
  giga_flusion.3232.a:0 "Um acordo justo. Aceitamos!"
  giga_flusion.3232.a.tooltip:0 "§BOs Flusionians e Kaiser Kattail vão se lembrar disso.§! \nProjekt Mondkanone Build Speed:§G+30%§!"
  giga_flusion.3232.b:0 "Não podemos pagar."
  giga_flusion.3232.c:0 "Vamos dar a ele sua energia, com bombardeio orbital!"
  giga_flusion.3233.c.tooltip:0 "Devemos preparar uma invasão de Flusion. \n§ROs Flusionianos agora nos conhecem e serão capazes de se mobilizar em preparação para um conflito.§! \n§RNós sofreremos de estabilidade , unidade e penalidades de influência se os Flusionianos conseguirem completar seu projeto antes de nós derrotá-los.§! "
  
  giga_flusion.3233.name:0 "Kaiser se recusa!"
  giga_flusion.3233.desc:0 "Seguindo nossa demanda pelas plantas do Projekt Mondkanone, recebemos uma transmissão da Flusion! \n \nParece que Kaiser Kaittail infelizmente recusou nossas exigências para compartilhar as plantas da arma, com ele chamando de" Tentativa de seres de outro mundo para apreender os segredos tecnológicos Flusionianos a fim de usá-los contra nossa espécie. "\n \nEm resposta a isso, alguns elementos de nosso alto comando militar defendem que ensinemos a este Kaiser uma lição de humildade ..."
  giga_flusion.3233.a:0 "Não vale a pena o incômodo, deixe-os estar."
  giga_flusion.3233.b:0 "Devemos ensiná-lo a respeitar!"
  
  mega_build_speed_1:0 "Maior velocidade de construção"
  mega_build_speed_1_desc:0 "Esta megaestrutura está sendo construída mais rápido."
  
  mega_build_speed_2:0 "Maior velocidade de construção"
  mega_build_speed_2_desc:0 "Esta megaestrutura está sendo construída mais rápido."
  
  mega_build_speed_3:0 "Maior velocidade de construção"
  mega_build_speed_3_desc:0 "Esta megaestrutura está sendo construída mais rápido."
  
  mega_build_speed_4:0 "Maior velocidade de construção"
  mega_build_speed_4_desc:0 "Esta megaestrutura está sendo construída mais rápido."
  
  giga_flusion.3231.name:0 "Transmissão de entrada!"
  giga_flusion.3231.desc:0 "Sua espécie gostaria de nos dar alguns recursos para construir o Projekt Mondkanone? Isso é ... inesperado, mas maravilhoso! \n \nÉ um projeto bastante caro para uma civilização como a nossa, então qualquer contribuição seria ser apreciado..."
  giga_flusion.3231.a:0 "Daremos 100£alloys£"
  giga_flusion.3231.a.tooltip:0 "Vamos contribuir um pouco para o projeto. \nProjekt Mondkanone Velocidade de construção:§G+10%§!"
  giga_flusion.3231.a.response:0 "Maravilhoso! Isso certamente será útil. \nObrigado por sua ajuda, alienígenas."
  giga_flusion.3231.b:0 "Daremos£500£ligas"
  giga_flusion.3231.b.tooltip:0 "Vamos contribuir com o projeto. \nProjekt Mondkanone Velocidade de construção:§G+30%§!"
  giga_flusion.3231.b.response:0 "Maravilhoso! Isso certamente será útil. \nObrigado por sua ajuda, alienígenas."
  giga_flusion.3231.c:0 "Nós daremos£1500£ligas"
  giga_flusion.3231.c.tooltip:0 "Contribuiremos significativamente com o projeto. \n§BOs Flusionians e Kaiser Kattail se lembrarão disso.§! \nProjekt Mondkanone Build Speed:§G+60%§!"
  giga_flusion.3231.c.response:99 "That's... a lot of resources. Splendid! Your contribution will not be forgotten, aliens."
  giga_flusion.3231.d:0 "Pagaremos o preço total! 2250£alloys£"
  giga_flusion.3231.d.tooltip:0 "Contribuiremos imensamente com o projeto. \n§BOs Flusionians e Kaiser Kattail irão§Mdefinitely§! lembrar disso.§! \nProjekt Mondkanone Build Speed:§G+135%§!"
  giga_flusion.3231.d.response:0 "Você realmente nos daria tanto? Este é um dia histórico, alienígenas! Com sua ajuda, Projekt Mondkanone será concluído em nenhum momento!"
  giga_flusion.3231.e:0 "Esqueça. Não podemos pagar."
  giga_flusion.3231.e.tooltip:0 "Voltaremos a observar o projeto de longe."
  giga_flusion.3231.e.response:0 "Oh. Que pena."
  
  giga_flusion.330.name:0 "Projeto de demolição bem-sucedido!"
  giga_flusion.330.desc:0 "Nosso posto avançado de Jublio relata que o projeto de construção primitiva em Muno foi destruído com sucesso. \n \nNossos cientistas redirecionaram um asteróide de um cinturão de asteróides próximo e o enviaram para a superfície da lua. Os primitivos falharam para reagir com rapidez suficiente, e o asteróide se chocou contra o local de construção lunar, deixando apenas uma enorme cratera. \n \nEmbora isso tenha causado muitas baixas Flusionianas na Lua, seu pequeno projeto, sem dúvida, nunca será concluído agora. Também temos conseguiu resgatar algumas ligas dos restos de sua infraestrutura lunar. "
  giga_flusion.330.a:0 "Excelente."
  
  giga_flusion.3301.name:0 "Flusion desce para a guerra nuclear!"
  giga_flusion.3301.desc:0 "Parece que nossa destruição do Projeto Lunar Flusionian não foi sem consequências. Algumas semanas após nossa" intervenção ", um certo§YKaiser Kattail§ !, governante do§YKatzenartig Império§ !, bateu com força o resto das nações da Flusion. \n \nDe fato, o Império Katzenartig foi o iniciador do projeto e principal contribuinte, com Kattail alegando que as outras nações redirecionaram intencionalmente o asteróide para o local de construção, como parte de um complô de uma "coalizão Anti-Katzen ". Os Estados-nação acusados ​​naturalmente negaram isso, mas Kattail apenas intensificou suas acusações, exigindo uma compensação financeira imediata pelas vidas e materiais perdidos no evento. \ N \nAs negociações rapidamente se desfizeram, com Kattail ameaçando guerra se suas demandas não fossem atendidas, o que eles não eram. O Império Katzenartig e os outros estados-nação se mobilizaram, e logo, uma guerra em todo o planeta estourou. Com ambos os lados possuindo muitas armas nucleares, não demorou muito para o golpe. flict para escalar para uma guerra nuclear totalmente explodida, que acabou exterminando a civilização flusioniana. \n \nFlusion foi reduzida a um sombrio Tomb World, com cerca de 13 bilhões de pessoas morrendo no evento. "
  giga_flusion.3301.a:0 "Opa."
  giga_flusion.3301.b:0 "Os Katzens adoram explodir seu próprio mundo."
  
  giga_flusion.331.name:0 "Falha na demolição do projeto!"
  giga_flusion.331.desc:0 "Nossa tentativa de demolir o projeto de construção Flusionian em Muno falhou. Nossos cientistas do posto avançado do sistema redirecionaram um grande asteróide de um cinturão de asteróides próximo, enviando-o em uma rota de colisão direta com o local de construção principal. Infelizmente, os primitivos notaram o asteróide a tempo e foram rápidos em enviar uma grande nave para desviá-lo da lua. \n \nTentar destruir o projeto novamente revelaria, sem dúvida, nossa presença aos primitivos, mas não devemos descartar a possibilidade de este projeto está se tornando problemático caso seja concluído. \n \nQual deve ser o nosso curso de ação? "
  
  giga_flusion.331.a:0 "Esqueça e deixe que eles terminem."
  giga_flusion.331.b:0 "Tente descobrir o que é."
  giga_flusion.331.c:0 "Chega! Prepare uma invasão em grande escala deste mundo!"
  giga_flusion.331.c.tooltip:0 "O elemento surpresa certamente vai nos beneficiar. \n§RNós sofreremos de penalidades de estabilidade, unidade e influência se os Flusionianos conseguirem completar seu projeto antes de derrotá-los.§!"
  
  giga_flusion.332.name:0 "Invasão Flusionian falhou"
  giga_flusion.332.desc:0 "Apesar de nossos melhores esforços, não conseguimos derrotar os primitivos Flusionianos antes que eles pudessem concluir sua enorme megaestrutura lunar. Nosso império e economia estão agora sofrendo com a reação de investir tanto em um empreendimento inútil. .. \n \nCom o Sistema de Defesa Lunar agora em vigor, qualquer invasão futura será imensamente mais difícil de realizar. "
  giga_flusion.332.a:0 "Ratos! Vamos ter que destruí-lo ..."
  
  giga_flusion.333.name:0 "Flusionians derrotados!"
  giga_flusion.333.a.desc:0 "Depois de muito planejamento, conseguimos derrotar os Flusionianos, interrompendo seu vil projeto lunar. \n \nAo enviar cientistas para a lua em questão, eles descobriram que o projeto seria um matriz gigantesca de mísseis e hangares posicionados em torno de um canhão relativístico colossal embutido na superfície da lua. \n \nNosso alto comando está aliviado com a invasão bem-sucedida, pois este "Sistema de Defesa Lunar" sem dúvida teria baté mesmo problemático se tivesse sido concluído. Também conseguimos resgatar partes do projeto, bem como adquirir alguns de seus esquemas surpreendentemente avançados. "
  giga_flusion.333.b.desc:0 "Depois de muito planejamento, conseguimos derrotar os Flusionianos, interrompendo assim seu vil projeto lunar. \n \nAo enviar cientistas para a lua em questão, eles confirmaram que o projeto era de fato gigantesco conjunto de mísseis e hangares posicionados ao redor de um canhão relativístico colossal embutido na superfície da lua. \n \nNosso alto comando está aliviado com o sucesso da invasão, já que este "Sistema de Defesa Lunar" sem dúvida teria sido problemático se tivesse sido concluído. também conseguiu salvar partes do projeto, e nossos cientistas adquiriram alguns de seus esquemas surpreendentemente avançados. "
  giga_flusion.333.a:0 "Boa viagem. Isso pode ter sido um problema ..."
  
  giga_war_moon_flusion:0 "Sistema de defesa lunar"
  giga_war_moon_flusion_plural:0 "Sistemas de Defesa Lunar"
  
  flusion_planet_ship_01_key:99 "Core"
  GIGA_FLUSION_GUN_1:99 "Riesigekatzenwaffe"
  GIGA_FLUSION_GUN_1_DESC:0 "Um canhão elétrico gigante embutido na crosta da lua."
  GIGA_FLUSION_GUN_01:99 "Riesigekatzenwaffe"
  GIGA_FLUSION_GUN_01_DESC:0 "Um canhão elétrico gigante embutido na crosta da lua."
  GIGA_FLUSION_AUTOCANNON_1:99 "Katzenschnellegewehr"
  GIGA_FLUSION_AUTOCANNON_1_DESC:0 "Uma colossal artilharia cinética de fogo rápido projetada para destruir navios menores."
  GIGA_FLUSION_AUTOCANNON_01:99 "Katzenschnellegewehr"
  GIGA_FLUSION_AUTOCANNON_01_DESC:0 "Uma colossal artilharia cinética de fogo rápido projetada para destruir navios menores."
  GIGA_FLUSION_MISSILE_1:99 "Kaiserweltraumrakete"
  GIGA_FLUSION_MISSILE_1_DESC:0 "Uma única grande ogiva nuclear de antimatéria de fusão."
  GIGA_FLUSION_MISSILE_01:99 "Kaiserweltraumrakete"
  GIGA_FLUSION_MISSILE_01_DESC:0 "Uma única grande ogiva nuclear de antimatéria de fusão."
  
  giga_flusion.400.name:0 "Megastrestrutura lunar flusioniana concluída!"
  giga_flusion.400.a.desc:0 "Nosso posto avançado no sistema Jublio relata que o projeto de construção Flusionian localizado na lua de seu planeta foi finalmente concluído, após anos de trabalho árduo. \n \nÉ uma gigantesca super arma lunar! \n \nAtravés do militarismo e da força de vontade, o Katzenartig Imperium conseguiu embutir um canhão colossal na superfície da lua, cercado por vários lançadores de mísseis grandes e canhões automáticos superdimensionados, bem como hangares de naves de ataque. Embora imóvel, este construto temível está agora totalmente operacional , e está pronto para proteger a Flusion de ameaças externas. \n \nNosso alto comando aconselha que não consideremos isso levianamente, pois esta arma poderia competir até mesmo com nossas frotas da era espacial ... "
  giga_flusion.400.b.desc:0 "Nosso posto avançado no sistema Jublio relata que o Flusionian§YProjekt Mondkanone§! foi recentemente concluído. \n \nO Katzenartig Imperium conseguiu transformar a segunda lua de seu mundo em uma super arma muito capaz, equipado com um canhão elétrico colossal, baterias de mísseis, canhões automáticos e até hangares de naves de ataque. Apesar de ser imóvel, o Projekt Mondkanone é, sem dúvida, um sistema de defesa muito capaz, que deve impedir a maioria dos invasores de tentar dominar Flusion. \n \nCom uma nova super arma em suas mãos, o curso de ação do Império Katzenartig ainda está para ser visto, embora alguns especulem que Kaiser Kattail pode decidir usá-lo para mais do que apenas defesa ... "
  giga_flusion.400.a:0 "Parabéns a eles e ao Kaiser."
  giga_flusion.400.b:0 "Aqueles ratos chatos!"
  giga_flusion.400.c:0 "Uma Lua de Ataque primitiva! Fascinante."
  
  giga_flusion.401.name:0 "Lua de ataque primitiva"
  giga_flusion.401.desc:0 "Sensores de longo alcance indicam que os sistemas primitivos de§YJublio§! conseguiram transformar as luas de seu mundo em armas, por pura força de vontade e militarismo. Após cerca de uma década de trabalho árduo, e apesar de sua base tecnológica limitada, eles incorporaram um canhão elétrico enorme dentro da lua, ao lado de canhões automáticos e lançadores de mísseis. \n \nApesar de ser imóvel, este constructo temível deve ser capaz de dissuadir a maioria, senão todas, as tentativas de invadir seu mundo. "
  giga_flusion.401.a:0 "Esses são alguns primitivos resistentes."
  giga_flusion.401.b:0 "Isso pode ser um problema."
  
  giga_flusion.402.name:99 "Incoming Flusionian Transmission!"
  giga_flusion.402.desc:0 "Nosso posto avançado de Jublio relata que os Flusionianos, que completaram o Projekt Mondkanone alguns anos atrás, nos enviaram outra transmissão diplomática. \n \nParece que Kaiser Kattail está grato pelos recursos que demos a ele para para ajudar com o Projekt Mondkanone, e agora deseja nos retribuir! "
  giga_flusion.402.a:0 "Ótimas notícias! Na tela."
  
  giga_flusion.403.name:0 "Transmissão de entrada!"
  giga_flusion.403.desc:0 "Aliens! Sou mais uma vez eu, Douclaw MacCathur. \n \nFui encarregado pelo próprio Kaiser Kattail de informar que, para agradecer a contribuição de sua espécie para o Projekt Mondkanone, decidimos dê ao seu império um suprimento de uma nova e empolgante forma de matéria que conseguimos criar usandonossos mais novos aceleradores de partículas! \n \nEsta substância parece ser extremamente exótica, desafiando as leis da física de várias maneiras e apresenta um potencial científico incrível. Como tal, o Kaiser considera que é uma recompensa digna, considerando sua grande contribuição para o projeto. \ N \nEsperamos que você goste. "
  giga_flusion.403.a:0 "Um belo presente."
  
  giga_flusion.404.name:0 "Transmissão de entrada!"
  giga_flusion.404.desc:0 "Alienígenas! Sou mais uma vez eu, Douclaw MacCathur. \n \nFui encarregado pelo próprio Kaiser Kattail de informá-lo, a fim de agradecer a contribuição§Bimmense§! de sua espécie para o Projekt Mondkanone, decidimos presentear vocês com duas de nossas naves espaciais mais novas, as§YKSS Catburg§! e as§YKSS Meownich§ !, dois de nossos§YClermeowth-Class Katzenkreusers§ !! \n \nDe fato, o Kaiser iniciou recentemente um grande programa para construir a força espacial adequada do Império Katzenartig, por isso temos trabalhado muito no desenvolvimento dessas embarcações. \n \nEles foram construídos com a mais recente tecnologia Katzen e, como tal, esperamos que sejam úteis para a sua espécie. Embora nossas naves não tenham drives FTL, como infelizmente não conseguimos criar um ainda, deixamos algum espaço vazio dentro das naves, então você poderá usar apenas um de seus próprios drives. \n \nEsperamos que você goste! "
  giga_flusion.404.a:0 "Um excelente presente! Faremos bom uso deles."
  giga_flusion.404.a.tooltip:0 "Ganhamos 2§YClermeowth-Class§! Cruzadores Katzen acima de Flusion."
  
  giga_katzen_cruiser:0 "Katzenkreuser"
  giga_katzen_cruiser_cap:99 "$giga_katzen_cruiser$"
  giga_katzen_cruiser_plural:0 "Katzenkreusers"
