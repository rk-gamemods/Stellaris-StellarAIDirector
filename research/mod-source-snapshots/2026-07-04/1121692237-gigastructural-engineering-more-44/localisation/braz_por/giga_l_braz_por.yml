  giga_katzen.0202.medvalue.tooltip:0 "Vamos§Ytransfer§! o§Y [kaiser_sell_yes.GetName]§! para o§YKatzenartig Imperium§ !, em troca de recursos. \nDado o valor do sistema, há um§Y40%§! chance de que a§YKaiser Opinion§! de nós§Gumentos§!. \nO Kaiser não exigirá terras de nós no próximo ano.$attache_boost_chance$"
  
  giga_katzen.0202.highvalue.tooltip:0 "Iremos§Ytransfer§! o sistema§Y [kaiser_sell_yes.GetName]§! para o§YKatzenartig Imperium§ !, em troca de recursos. \nDado o valor do sistema, há um§ Y80%§! Chance de que a§Y Opinião do Kaiser§! De nós§Gaumentos§!. \ NO Kaiser não exigirá terras de nós no próximo ano.$Attache_boost_chance$"
  
