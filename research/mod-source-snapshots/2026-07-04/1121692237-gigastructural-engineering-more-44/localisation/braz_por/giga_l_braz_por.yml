  mod_country_base_giga_sr_quasaric_energy_produces_add:0 "Energia Quasárica Mensal"
  
  giga_sr_iodizium:0 "Cristais de Iodizium"
  giga_sr_iodizium_desc:0 "Esses cristais estranhos são criados quando uma grande quantidade de partículas exóticas liberadas por uma supernova artificial impactam planetas em velocidades relativísticas. Eles aparentemente desafiam as leis da física de muitas maneiras interessantes."
  
  giga_sr_bulk_matter:0 "Massa Planetária"
  giga_sr_bulk_matter_desc:0 "Massa planetária representa grandes quantidades de matéria sólida não refinada colhida de um planeta telúrico ou lua, armazenada na forma de grandes asteróides."
  
