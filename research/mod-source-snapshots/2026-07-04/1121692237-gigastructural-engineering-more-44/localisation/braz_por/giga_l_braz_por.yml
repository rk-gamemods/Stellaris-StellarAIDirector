  giga_katrebels.2100.name:0 "Operação bem-sucedida!"
  giga_katrebels.2100.desc:0 "Os partidários de Flusionian relatam que a operação em§Y [katzen_name_tool.GetName]§! correu exatamente como planejado! Seus agentes conseguiram realizar a sabotagem na infraestrutura de Katzen, que infligirá§Ypênaltis§! nos Katzens e aumentam a atividade§Ypartisan§! na região, pois mais partidários poderão sabotar regularmente a infraestrutura de Katzen. \n \nOs Katzen, no entanto, notaram a sabotagem e imediatamente promulgaram medidas antipartidárias mais rigorosas, aumentando subsequentemente sua§Aviso§ ! por§R2§!. \n \nA chance de sucesso era§Y [flusion_primitives_country.flusion_operation_odds]%§! "
  giga_katrebels.2100.a:0 "Maravilhoso!"
  giga_katrebels.2100.a.tooltip:0 "Atividade partidária em§Y [katzen_name_tool.GetName]§!§Gincreases§!. \nKatzen cautela§Rincreases§! por§R2§ !."
  
  giga_katrebels.2102.name:0 "Operação com muito sucesso!"
  giga_katrebels.2102.desc:0 "Os partidários de Flusionian relatam que a operação em§Y [katzen_name_tool.GetName]§! correu exatamente como planejado! Seus agentes conseguiram realizar a sabotagem na infraestrutura de Katzen, que infligirá§Ypênaltis§! nos Katzen e aumentam a atividade§Ypartisan§! na região, pois mais guerrilheiros poderão sabotar regularmente a infraestrutura de Katzen. \n \nAlém disso, os guerrilheiros conseguiram executar uma série de ataques aos armazéns de Katzen durante a operação, permitindo aos Roqualians alguns equipamentos e materiais, que subseqüentemente aumentaram seus§Recursos de resistência§! em 2! \n \nOs Katzens, no entanto, notaram a sabotagem e imediatamente promulgaram medidas antipartidárias mais rígidas, subsequentemente aumentando sua§Aviso§! em§R2§ !. \n \nA chance de sucesso era§Y [flusion_primitives_country.flusion_operation_odds]%§! "
  giga_katrebels.2102.a:0 "Delicioso!"
  giga_katrebels.2102.a.tooltip:0 "Atividade partidária em§Y [katzen_name_tool.GetName]§!§Gincreases§!. \nOs Roqualians ganham 2§BResistance Resources§!. \nKatzen cautela§Rincreases§! por§R2§! . "
  
  giga_katrebels.2101.name:0 "A operação falhou!"
  giga_katrebels.2101.desc:0 "Os partidários de Flusionian relatam que a operação em§Y [katzen_name_tool.GetName]§! falhou. Seus agentes foram interceptados por soldados Katzen antes mesmo de serem capazes de executar a sabotagem, frustrando assim toda a operação . \n \nA chance de sucesso era§Y [flusion_primitives_country.flusion_operation_odds]%§! "
  giga_katrebels.2101.a:0 "Maldições!"
  giga_katrebels.2101.a.tooltip:0 "Katzen cautela§Rincreases§! por§R1§ !."
  
