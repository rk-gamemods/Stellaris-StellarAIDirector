  giga_menu_compound_1_desciptor:99 "§GEasy§!\nFor those who want a minor challenge.\n\nThey receive no combat bonuses\nQuick Solution costs 200 ships."
  giga_menu_compound_2_desciptor:99 "§BNormal§!\nFor those who want the intended experience.\n\n§YThey receive the following effects§!\n+100% Weapon Damage\n+100% Shields\n+100% Armor\n+100% Hull\n+50% Ship Fire Rate\n+25% Sublight Speed\n+25% Evasion\n\n§YQuick Solution costs 400 ships.\n$reshaper$ colossi count multiplied by 2x.§!"
  giga_menu_compound_3_desciptor:99 "§HHard§!\nYou want a strong challenge.\n\n§YThey receive the following effects§!\n+400% Weapon Damage\n+400% Shields\n+400% Armor\n+400% Hull\n+200% Ship Fire Rate\n+50% Sublight Speed\n+50% Evasion\n\n§YQuick Solution costs 1K ships.\n$reshaper$ colossi count multiplied by 4x.§!"
  giga_menu_compound_4_desciptor:99 "§RBrutal§!\nYou have a death wish or two.\n\n§YThey receive the following effects§!\n+1500% Weapon Damage\n+1500% Shields\n+1500% Armor\n+1500% Hull\n+750% Ship Fire Rate\n+75% Sublight Speed\n+75% Evasion\n\n§YQuick Solution costs 5K ships.\n$reshaper$ colossi count multiplied by 8x.§!"
  
