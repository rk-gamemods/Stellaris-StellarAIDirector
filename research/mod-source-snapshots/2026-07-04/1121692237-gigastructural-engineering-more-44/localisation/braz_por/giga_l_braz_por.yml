  giga_katrebels.01234.name:0 "Peixes Feisty"
  giga_katrebels.01234.desc:0 "Em uma reviravolta não tão surpreendente, parece que alguns dos recém-criados§YInfused Zuspris§ !, reforçados por suas imensas capacidades físicas recém-descobertas, começaram a resistir ao governo de Katzen, com muitos dos eles se juntando à§YZuspri Vanguard§ !! \n \nIsso efetivamente aumentou a§YZuspri Resistance§! em 1. "
  giga_katrebels.01234.a:0 "Finalmente, algumas boas notícias!"
  
  giga_katrebels.2000.name:0 "Contato estabelecido com§YRoqualian Freedom Fighters§!"
  giga_katrebels.2000.desc:0 "Depois de alguns negócios obscuros, reuniões secretas e extensas trocas de mensagens criptografadas, conseguimos entrar em contato com o líder dos§YRoqualian Freedom Fighters§ !, um tipo e corajoso Roqualian conhecido como§YDofus Tequenik Machina§!. \ N \nO ex-governante da§República de Roqualian§ !, Dofus foi forçado a uma rendição incondicional pelas forças do§YKatzenartig Imperium§! Durante a conquista de Flusion por§YKaiser§ !. n \nEmbora ele tenha sido relativamente cooperativo com os Katzens e servido como governador regional para as partes governadas por Katzen de Roqualia, Dofus tem mantido secretamente uma rede de guerrilheiros e lutadores pela liberdade dedicados a minar o governo de Katzen em§YFlusion§! um dia restaure a§República de Roqualian§!. \n \nOs Roqualians possuem uma afinidade incrível com tudo relacionado à ciência da computação e inteligência artificial, já que sua antiga sociedade girava fortemente em torno de entretenimento virtual e robótica inteligente. \n \nA Assim, embora não sejam capazes de lutar diretamente contra o exército Katzen, os Freedom Fighters são capazes de manter secretamente uma rede relativamente grande de guerrilheiros em toda a Flusion, que reagrupa vários outros grupos de resistência da Flusion. \n \nInfelizmente, sem suporte externo, seus esforços não foram muito longe, mas isso pode mudar agora que conseguimos entrar em contato com Dofus diretamente, já que podemos permitir que eles ataquem diretamente na capital de Katzen, Flusion ... "
  giga_katrebels.2000.a:0 "Na tela."
  
  giga_katrebels.2001.name:0 "Os§YRoqualian Freedom Fighters§!"
  giga_katrebels.2001.desc:0 "Ah! Finalmente, algumas boas notícias por aqui. Palavras não podem expressar como estou aliviado que uma potência estrangeira finalmente decidiu nos ajudar. \n \nSou§YDofus Tequenik Machina§ !, mas é só ligar me§YDofus§ !. Por várias décadas, tenho tentado coordenar meus antigos cidadãos, bem como outras espécies, em uma série de tentativas de desestabilizar o domínio de Katzen sobre Flusion, mas infelizmente sem sucesso. Podemos ser muito habilidosos quando se trata de para a computação, mas os Katzens também. \n \nNossa amada§República de Roqualian§! costumava ser um lugar de liberdade, livre-arbítrio, festas excessivas e entretenimento virtual. Que os Katzens tomaram muito cuidado para demolir e substituir com sua ordem militarista e culto ao§YKaiser§ !. Que maldito Kaiser! Tivemos a chance de agir e parar§YProjekt Mondkanone§ !, mas ficamos cegos por sua fala mansa e discursos afirmando que era para "o bem de todos os Flusionianos ". \n \nMoleta de mentiras, isto é! O Kaiser dá a ilusão de liberdade, mas discretamente ainda assim, convence com eficiência bilhões de flusionianos a seguir estupidamente tudo o que ele diz. \n \nNão mais, eu digo! Com financiamento externo, talvez possamos espremer sua ordem estúpida onde ela é mais fraca e fazer com que tudo arrebente como um balão de água superinflado. "
  giga_katrebels.2001.a:0 "Trabalharemos juntos para um bem maior."
  giga_katrebels.2001.a.tooltip:0 "Podemos agora§Ysecretely contact§! os§Roqualian Freedom Fighters§! e outros§YGrupos de Resistência Flusionista§! do§YKatzenartig Menu Imperium§ !. "
  
  giga_katzen.020.solak:0 "§HSecretamente entre em contato com os§Roqualian Freedom Fighters§! ...§!"
  
  riesigerkatzenpanzer_defence:0 "Divisão Riesigerkatzenpanzer"
  riesigerkatzenpanzer_defence_desc:0 "Uma divisão que consiste em algumas dezenas de Riesigerkatzenpanzers, veículos blindados absolutamente colossais que medem bem mais de 500 metros de comprimento. Eles estão armados com centenas de torres, baterias anti-aéreas e possuem uma enorme arma nuclear capaz de disparar multiplos -gigaton ogivas nucleares com alcance praticamente ilimitado. "
  riesigerkatzenpanzer_assault:0 "Divisão Riesigerkatzenpanzer"
  riesigerkatzenpanzer_assault_desc:0 "Uma divisão que consiste em cerca de uma dúzia de Riesigerkatzenpanzers, veículos blindados absolutamente colossais que medem bem mais de 500 metros de comprimento. Eles estão armados com centenas de torres, baterias anti-aéreas e possuem um canhão nuclear enorme capaz de disparar ogivas nucleares multi-gigatoneladas com alcance praticamente ilimitado. "
  
  ###talk to kaiser###
  cant_kaiser_opinion_too_low_talk:0 "Os Katzens não querem falar conosco. A opinião deles sobre nós precisa ser -1 ou superior."
  giga_katzen.02020.cool:0 "Interessante. Obrigado por compartilhar."
  
  giga_katzen.020.talk:0 "Gostaríamos de saber mais sobre o seu tipo ..."
  
  giga_katzen.02020.name:99 "The Katzenartig Imperium"
  giga_katzen.02020.desc:0 "O Kaiser ficaria feliz em compartilhar as histórias dos Katzens e Flusion com sua espécie, alienígenas. O que vocês gostariam de saber?"
  
  giga_katzen.02020.whatareyou:0 "Como é a sua espécie?"
  giga_katzen.02020.whatareyou.response:0 "Nós, Katzens, somos uma espécie obediente e ambiciosa. Com a ajuda de um líder forte, o Kaiser, nossa espécie abraçou o militarismo a um grau extremo, de tal forma que não é mais uma mero conceito, mas nosso próprio modo de vida. \n \nNossa cultura, tradições e até romance giram fortemente em torno da guerra, e os militares detêm um poder imenso em nossa civilização, de tal forma que nossa nação é efetivamente um exército gigante. \n \nDentro de uma idade muito jovem, nossos cidadãos são treinados na arte da guerra blindada, tanto no espaço quanto no solo, para que cada um de nós tenha uma boa compreensão dos meandros do combate moderno. \n \nA conquista tem tem sido uma parte integrante de nossa civilização desde o seu início, à medida que dedicamos recursos imensos para expandir nossas fronteiras cada vez mais, e espalhar nossa cultura e ideais através dos reinos conhecidos. "
  
  giga_katzen.02020.treataliens:0 "Como você lida com as espécies conquistadas?"
  giga_katzen.02020.treataliens.response:0 "Você pode pensar que somos uma espécie opressora e brutal que oprime sem pensar qualquer população em que possamos colocar nossas patas. \n \nMas você não poderia estar mais longe da verdade! Temos muito orgulho de nossa política de assimilação, onde garantimos que todas as espécies, independentemente de seu tamanho ou comportamento, tenham direitos iguais dentro de nosso império. \n \nO Kaiser acredita que qualquer um pode ser um "Katzen", independentemente de sua espécie real. , assim, tentamos integrar novos cidadãos em nossa cultura e civilização tanto quanto possível. \n \nTemos muito cuidado para conter as desigualdades legais, eliminar as discriminações e padronizar a educação, para que os pontos fortes e os ativos de cada espécie sejam reforçado para servir o Kaiser e nossa gloriosa causa para trazer a civilização para o universo conhecido. "
  
  giga_katzen.02020.whokaiser:0 "Quem é o Kaiser?"
  giga_katzen.02020.whokaiser.response:0 "O Kaiser é nosso grande líder e fiel protetor. Ele zela por nossa civilização, garantindo seu desenvolvimento e prosperidadea cada passo do caminho. \n \nEmbora suas políticas expansionistas possam ser desanimadoras no início, tudo o que ele faz é para o bem maior de todos os seres sapientes de nosso império e da galáxia como um todo. \n \nO Kaiser tem poder absoluto, mas garante que todos possam dizer algo antes de tomar uma decisão; pois ele acredita que a chave para o sucesso é permanecer adaptável e abordar os problemas do maior número de pontos de vista possível. \n \nEle trouxe grande riqueza e sucesso para nossa civilização, garantindo que todas as espécies sejam elevadas ao mesmo nível de desenvolvimento como nós, e que ninguém é deixado para trás em nossa grande busca para alcançar a assimilação universal de todos os seres sapientes na grande cultura e civilização de Katzen. "
  
  giga_katzen.02020.otherraces:0 "E quanto ao Flusion e suas outras raças?"
  giga_katzen.02020.otherraces.response:0 "Ah, Flusion. Um mundo lindo, que tornamos ainda maior. Graças a grandes projetos arquitetônicos, drenamos um pouco alguns mares e usamos a água para irrigar desertos antes estéreis, transformando vastas áreas de terra seca em grandes pastagens e campos. \n \nNós eliminamos a natureza hostil, substituindo-a pela perfeição da civilização e pela indústria nuclear sustentável. \n \n Quanto às outras espécies ... bem, garantimos que fossem perfeitamente integradas em nossa cultura, e se certificou de melhorar suas vidas tanto quanto possível. \n \nLeve os§YZuspris§ !, por exemplo. Esses pobres camaradas costumavam levar uma vida primitiva e esquálida de caçadores-coletores antes de nós os arrastarmos para fora do lama e em grandeza. \nSeu tempo de vida foi longo, mas muitos de seus jovens foram vítimas de doenças e predadores, então inventamos curas e destruímos esses predadores, para que eles pudessem prosperar como nós. \n \nO§ YKronks§ !, essas criaturas artropóides, costumavam o residir em cidades-ninho cavadas manualmente, que muitas vezes eram insalubres e inseguras. \nEntão nós construímos grandes cidades, modeladas para se adequar à sua anatomia, para que eles também possam desfrutar dos frutos da civilização e da vida moderna! \n \nTodas as espécies que que conquistamos, e particularmente aqueles de Flusion, é como uma rocha, que então tomamos muito cuidado para polir em uma linda pérola que adorna nosso império e a coroa resplandecente do Kaiser. "
  
  ###Submit###
  SUBJECT_katzprotektorat:99 "Katzprotektorat"
  SUBJECT_DESC_katzprotektorat:0 "Um Katzprotektorat é uma forma de governo fantoche estabelecido pelo Império Katzenartig. Eles são efetivamente governadores regionais do Império e desfrutam de alguma autonomia limitada."
  
  giga_katzen.020.submit:0 "Nós nos rendemos. Deixe-nos submeter ao seu império."
  giga_katzen.020.submit.tooltip:0 "Podemos pedir§YSubmit§! ao§YKatzenartig Imperium§ !. Quaisquer guerras entre nós cessarão e nos tornaremos um§YKatzprotektorat§ !, que é um tipo especial de Katzen sujeito que goza de autonomia limitada. "
  cant_submit_fto:0 "Não podemos submeter se somos da Organização do Tratado Flusionian."
  
  giga_katzen.0030.name:0 "Katzenartig Imperium: Submissão"
  giga_katzen.0030.desc:0 "Então, você gostaria de abrir mão de sua autonomia e se submeter a nós? \nPor que, é claro! O Kaiser ficaria encantado em receber sua espécie em nossa grande civilização. \n \n§YTornando-se um Katzprotektorat terá os seguintes efeitos:§! \ N-Quaisquer conflitos em andamento entre nós e os Katzens terminarão. \ N-Nosso Império se tornará o§YKatzprotektorat [Root.Capital.GetStarName]§! E nossa bandeira mudará. \nSe não formos§YHive Mind§ !, nosso líder será substituído por um§YKatzen Governor§ !, que não pode ser removido nem por eleições. \n-Manteremos todas as terras que atualmente possuímos. \n-Nós se juntará automaticamente a todas as guerras de Katzen. \n-O Kaiser não exigirá terras de nós. \n-Receberemos+100%§YAtração Militar§!. \n-Manteremos a capacidade de construir postos avançados, mas não seremos capaz de declarar guerras. \n-A§YParecer do Kaiser§! de nós voltará para§G3 | Amigáveis§! se fosse menor. \n-Os Katzens serão capazes de construir§YKatzen Forças de Guerra§! dentro de nosso território. \n-Os Katzens wi obteremos controle sobre nossa economia, levando a -25%§YAlloy Production§ !, -50%§YNaval Capacity§! e -20%§YVelocidade de construção de navio§! \n-Eles irão, no entanto, nos ajudar com sua experiência militar, concedendo+25%§YShip Speedhip§ !,+25%§YShip Speed§ !,+25%§YShip§ !,+25%§YEngineering Research Speed§! \ N-Temos uma redução de 40% no custo de todas as tecnologias que os Katzens possuem atualmente. \ N-Quaisquer assuntos nossos também se tornarão um Katzprotektorat. \ N-Quaisquer anexos no Império serão recuperados. \n-Os Katzens vão§YNOT§! anexar-nos. \n \n§Devido a QUANTO CONTROLE DEVEMOS CONCEDER OS KATZENS SOBRE NOSSA NAÇÃO, SÓ PODEREMOS SER LIVRES SE A LUA KAISER FOR DESTRUÍDA! \n \nNós NÃO PODEMOS CONTATAR OS PARCEIROS OU ESTUDE A LUA DE KAISER! \ N \nDEVIDO A LIMITAÇÕES TÉCNICAS, NÃO PODEREMOS RECUPERAR NOSSA ANTIGA BANDEIRA SE NOS ROMPERAMOS.§! "
  
  giga_katzen.0030.yes:0 "Muito bem. Aceitamos."
  giga_katzen.0030.no:0 "Pensando bem ... nunca!"
  
  giga_katzen.0031.name:0 "O Birth of§YKatzprotektorat [Root.Capital.GetStarName]§! "
  giga_katzen.0031.desc:0 "Hoje será visto como um dia fantástico por alguns e como uma temida rendição por outros. \n \nDe fato, nosso império agora se submeteu ao§YKatzenartig Imperium§ !, tornando-se oficialmente um§YKatzprotektorat§ !. Os Katzens agora poderão controlar nossa economia e usar nossa infraestrutura para alimentar sua agenda expansionista. \ N \nA§YKatzen Governor§! Tornou-se o governante de nossa nação e supervisionará a cooperação entre nossa espécie e os Katzens. Embora isso tenha efetivamente nos acorrentado à vontade deles, podemos ter certeza de que eles nos tratarão com respeito, e agora estamos sob sua proteção absoluta, para o melhor e para o pior. \ N \nO§YKaiser§! Deu um discurso triunfante, aclamando este "incrível feito de cooperação interespécies", e declarou seu desejo de que nossos tipos sejam "unidos até o fim dos tempos". "
  giga_katzen.0031.a:0 "Esperamos que tenha sido uma boa decisão."
  
  katzprotektorat_modifier:99 "Katzprotekrotat"
  katzprotektorat_modifier_desc:0 "Somos um Katzprotektorat, um estado fantoche Katzen com autonomia limitada."
  
  giga_katzen.0033.name:0 "Uma oportunidade"
  giga_katzen.0033.desc:0 "Com a destruição do§YKaiser Moon§ !, o§YKatzenartig Imperium§! caiu em desordem. \n \nPodemos ser capazes de explorar isso para nos livrar de nosso§YKatzprotektorat§ ! status, e efetivamente se tornar livre da regra de Katzen ... "
  
  giga_katzen.0033.a:0 "Até logo, felinos!"
  giga_katzen.0033.a.tooltip:0 "Nos tornaremos§Yfree§! e§Reclarar guerra§! no§YKatzenartig Imperium§ !."
  
  giga_katzen.0033.b:0 "Nossa lealdade é para com o Império e o Kaiser!"
  giga_katzen.0033.b.tooltip:0 "Vamos permanecer leais aos Katzens, por enquanto ..."
  
  giga_katzen.0034.name:0 "O Katzgouverneur"
  giga_katzen.0034.desc:0 "Com nossa independência recém-descoberta, a legitimidade de [Root.GetRulerName] como nosso governante se tornou ... questionável, já que não somos mais governados pelos Katzens. \n \nDevemos descartar [Root .leader.GetHerHim] e restabelecer um [Root.GetSpeciesName] como governante de nosso império? "
  
  giga_katzen.0034.a:0 "Fora [Root.leader.GetSheHe] vai!"
  giga_katzen.0034.b:0 "[Root.GetRulerName] nos serviu bem. Eles continuarão sendo nossos líderes."
  
  giga_katzen.0035.name:0 "O que há em uma bandeira?"
  giga_katzen.0035.desc:0 "Os Katzens mudaram nossa bandeira para melhor refletir nosso status como§YKatzprotektorat§ !. Devemos trazer de volta nossa velha bandeira, agora que somos mais uma vez independentes?"
  giga_katzen.0035.a:0 "Com certeza!"
  giga_katzen.0035.b:0 "Não, Katzen Blue está na moda hoje em dia!"
  
  giga_katzen.020.attache:0 "Gostaríamos de enviar um adido diplomático."
  giga_katzen.020.attache.tooltip:0 "Enviar um anexo ao§YKatzenartig Imperium§! reduzirá nosso§YPeso diplomático§ !,§Sociedade Research§! e§Saída da Unidade§ !, mas tornará mais fácil aumentar o§ Opinião de YKaiser§! Sobre nós. "
  
  giga_katzen.5000.name:0 "Adido diplomático"
  giga_katzen.5000.desc:0 "O Kaiser certamente apreciaria se sua espécie enviasse uma missão diplomática ao nosso império, sim! Um adido certamente seria benéfico para nós dois. \n \n§YEnviar um adido terá o seguinte efeitos, uma vez que investiremos recursos para melhorar a opinião do Kaiser sobre nós:§! \n-30%§Produto de pesquisa da sociedade§!. \n-30%§Produto da Unidade§!. \n-30%§YPeso diplomático§ !. \n20% de chance de§YPensação do Kaiser§!§Aumentar§! a cada ano. \nOs negócios comerciais, demandas de terras e compras de navios terão 25% mais probabilidade de§Aumentar§!§YPensação do Kaiser§ !. "
  giga_katzen.5000.a:0 "Envie o adido."
  giga_katzen.5000.a.tooltip:0 "Enviaremos um adido para§YKatzenartig Imperium§ !, aplicando todos os efeitos acima mencionados. Podemos retirar o adido a qualquer momento, e ele será revogado automaticamente se terminarmos em§ Rwar§! Com o Kaiser. "
  giga_katzen.5000.b:0 "Esqueça."
  
  giga_katzen.020.noattache:0 "Gostaríamos de relembrar o nosso Adido"
  giga_katzen.020.noattache.response:0 "Ah? Uma pena. Eles farão falta."
  giga_katzen.020.noattache.tooltip:0 "Vamos chamar de volta nosso adido, removendo todos os benefícios e debuffs."
  
  giga_katzen.5001.name:0 "Attaché Recuperado"
  giga_katzen.5001.desc:0 "Após a eclosão da guerra entre o§YKatzenartig Imperium§! e nós, nosso adido diplomático foi posteriormente chamado de volta ao nosso império."
  giga_katzen.5001.a:0 "Como era de se esperar."
  
  giga_katzen.5002.name:0 "A opinião de Kaiser aumenta!"
  giga_katzen.5002.desc:0 "Ótimas notícias! Nosso adido diplomático no§YKatzenartig Imperium§! relata que seus esforços foram bem-sucedidos em aumentar a§YKaiser Opinião§! de nós. \n \nIsso trouxe muita satisfação para aqueles que deseja evitar conflito com os Katzens ... "
  giga_katzen.5002.a:0 "Ótimo!"
  giga_katzen.5002.a.tooltip:0 "A§Y Opinião do Kaiser§! de nós§Aumenta§! por§G1§ !."
  
  attache_boost_chance:0 "\n \nAs chances de§YAttaché§! aumentarem são aumentadas em§Y20%§! se tivermos um§YAttaché§! ino§YKatzenartig Imperium§!. \n "
  
  katzen_attache:99 "Katzen Attaché"
  katzen_attache_desc:0 "Estamos investindo uma quantidade significativa de recursos em uma grande missão diplomática dentro do Império Katzenartig."
  
  ###CORONNA STUFF###
  pc_t_star_big:99 "$pc_t_star$"
  pc_t_star_big_desc:99 "$pc_t_star_desc$"
  
  corrona_defence_buff:0 "Campo de Energia Esotérica"
  corrona_defence_buff_desc:0 "Um shun de energia misteriosa permeia todo o mundo. Parece estar impedindo completamente o uso de todas as tecnologias convencionais, tornando as invasões planetárias praticamente impossíveis. Surpreendentemente, as civilizações dos nativos não parecem ser afetadas, pois estão empregando tecnologias que são radicalmente diferentes das nossas. \n \n§YOs exércitos defensivos neste planeta são extremamente poderosos, pois a maior parte de nossa tecnologia simplesmente falhará ao pousar no planeta. "
  
  corrona:99 "Corronian"
  
  corrona_army:0 "Exército Esotérico Primitivo"
  corrona_army_plural:0 "Exércitos primitivos esotéricos"
  corrona_army_desc:0 "Um exército primitivo que emprega armamento medieval combinado com habilidades extraordinárias que lembram magia."
  
  giga_corrona_age:0 "Idade Medieval Esotérica"
  giga_corrona_age_desc:0 "Embora esta civilização não possua eletricidade ou motores de combustão, ela faz uso de vários instrumentos e armamentos esotéricos, que se assemelham muito às nossas representações de magia. Os habitantes deste mundo parecem efetivamente estar embarcando em uma tecnologia totalmente diferente e única caminho."
  
  col_giga_pre_ftl_corrona:99 "$giga_corrona_age$"
  col_giga_pre_ftl_corrona_desc:99 "$col_primitive_desc$"
  col_giga_pre_ftl_corrona_tt:99 "$col_giga_pre_ftl_corrona_desc$"
  
  # katzenartig_major_splinter:0 "Major Splinter State Resources"
  # katzenartig_major_splinter_desc:0 "To prevent catastrophic collapse."
  
  building_giga_corrona_capital:0 "Palácios Arcanos"
  building_giga_corrona_capital_desc:0 "Grandes palácios que servem como sede da elite governante de Corrona. Eles são povoados por uma miríade de criaturas fantásticas que possuem uma variedade de habilidades aparentemente mágicas."
  
  building_giga_corrona_homes:0 "Centro Urbano Esotérico"
  building_giga_corrona_homes_desc:0 "Embora pareçam ser habitats medievais simples à primeira vista, essas cidades estão repletas de várias criaturas que empregam algum tipo de" mágica "para melhorar suas vidas diariamente."
  
  giga_corrona.001.name:0 "Gravitacionalmente vinculado"
  giga_corrona.001.desc:0 "Ao entrar no§YJupitwo System§ !, nossa nave científica fez uma descoberta interessante: o sistema não é realmente um sistema estelar adequado! \n \nNa verdade, apesar de parecer um sistema independente, a anã marrom de Jupitwo está na verdade ligada gravitacionalmente ao§YSistema da Jublio§ !, e lentamente gira em torno dele, embora seu período orbital exceda várias centenas de milênios. \n \nIsso significa que Jublio e Jupitwo podem ser classificados como um binário extremamente distante, e embora não seja uma descoberta inovadora, o fato de que uma hiperlane conseguiu se formar entre os dois é independentemente do interesse particular de nossos cientistas. "
  giga_corrona.001.a:0 "Legal. Certamente esses dois sistemas não terão nenhuma importância."
  
  giga_corrona.002.name:0 "Primitivos Esotéricos"
  giga_corrona.002.desc:0 "O§YJupitwo System§! nunca para de surpreender, pois nossa equipe de ciência agora relata que eles identificaram uma civilização próspera em uma das luas do anão marrom! \n \nIsso os deixou bastante perplexos, embora Jupitwo seja particularmente quente devido a uma concentração excepcionalmente alta de elementos radioativos em sua atmosfera, ele não deveria ser capaz de aquecer um planeta a ponto de torná-lo habitável. \n \nAlém disso, as várias nações primitivas do planeta parecem possuir e empregar habilidades extremamente esotéricas que aparentemente desafiam nossa compreensão atual da física. Poderia ser praticamente considerado mágico! Eles até localizaram uma inexplicável fuga de energia em torno do planeta, que de alguma forma frita e desativa a maioria, senão toda a tecnologia moderna . Especula-se que este campo poderia de alguma forma ser responsável por manter o planeta aquecido. \ N \nIsso, combinado com o uso primitivo do que é basicamente mágico, tornaria ambas as explorações um Embora a subjugação seja extremamente difícil, o potencial científico deste mundo é inegável. No entanto, se esses primitivos se unissem e levassem às estrelas, eles seriam, sem dúvida, um adversário formidável ... "
  giga_corrona.002.a:0 "Fascinante!"
  
  giga_corrona_planetcraft:0 "Planetcraft Esotérico"
  giga_corrona_planetcraft_plural:99 "Esoteric Planetcrafts"
  CORRONA_MOON:0 "Núcleo"
  
  GIGA_CORRONA_FIRE_MAGES:0 "Conjuradores Corronianos"
  GIGA_CORRONA_FIRE_MAGES_DESC:0 "Magos formidáveis ​​lançando feitiços mortais em inimigos espaciais."
  
  GIGA_CORRONA_LIGHTNING:0 "Raio Hipercristalino"
  GIGA_CORRONA_LIGHTNING_DESC:0 "Um cristal colossal descarregando quantidades incontáveis ​​de raios mágicos."
  
  GIGA_CORRONA_HYPER_LIGHTNING:0 "Iluminação Planetária"
  GIGA_CORRONA_HYPER_LIGHTNING_DESC:0 "Um cristal realmente grande que dispara raios realmente grandes."
  
  GIGA_CORRONA_FREEZERAYS:0 "Freezerays"GIGA_CORRONA_FREEZERAYS_DESC:0 "Feixes de energia negativa que derretem através de escudos drenando sua energia."
  GIGA_CORRONA_FREEZERAYS_DESC:99 "Beams of negative energy that melt through shields by draining their energy."
  
  GIGA_CORRONA_DRAGON_BREATH:99 "Draconic Breath"
  GIGA_CORRONA_DRAGON_BREATH_DESC:99 "A fiery magic-infused stream of draconic fire."
  
  giga_corrona_dragon:0 "Dragão Corroniano"
  giga_corrona_dragon_plural:0 "Dragões Corronianos"
  
  giga_corrona.005.name:0 "Pico de Energia Esotérica"
  giga_corrona.005.desc:0 "Sensores em todo o nosso império detectaram um pico de energia intenso, originado do mundo primitivo de§YCorrona§ !, orbitando o§YJupitwo§! Brown Dwarf, a menos de um ano-luz de distância do§YKatzenartig Imperium§ ! sistema capital. \n \nEste mundo é conhecido por ser povoado por espécies que possuem habilidades esotéricas incríveis e ainda inexplicáveis ​​que podem ser consideradas praticamente mágicas. \n \nEmbora não tenhamos certeza de que causou esse aumento repentino, a maioria A explicação provável é que os Corronianos podem estar reunindo suas "habilidades mágicas" para lançar algum tipo de "feitiço" gigantesco sobre todo o seu mundo. \n \nO que esse "feitiço" realmente é ainda está para ser visto, mas podemos descubra logo ... "
  giga_corrona.005.a:99 "Peculiar."
  
  giga_corrona.007.name:99 "The Corronian Worldcraft"
  giga_corrona.007.desc:0 "Não demorou muito para descobrir o que causou o pico de energia Corronian. Pouco depois de registrar esse pico, nossos sensores de longo alcance detectaram§movimento do corpo celestial§! dentro do sistema§YJupitwo§! ! \n \nUma análise posterior do sistema revelou que os§YSkeletoids§ !, uma das espécies dominantes de§YCorrona§ !, conseguiram unir o mundo inteiro sob seu domínio após uma série de guerras brutais. Não satisfeito com sua atual conquistas, eles passaram a reunir os recursos do planeta para lançar um "feitiço" colossal e extremamente complexo sobre o planeta. \n \nEste "feitiço" teve o efeito de encantar toda Corrona, posteriormente transformando-a em um§ gigante YEsoteric Planetcraft§ !, ou§YWorldcraft§ !! Em uma incrível façanha de domínio esotérico, o próprio planeta começou a se mover através do vazio, dirigido pela vontade da liderança dominante do Esqueletoide. criaturas etéreas semelhantes a dragões para "escoltar" o mundo, e parece que esta civilização esotérica está agora prestes a embarcar em um novo conjunto de conquistas no plano celestial, seu primeiro alvo sendo nada menos que o§YKatzenartig Imperium§!. \n \nFurthermor, os Esqueletoides enviaram uma transmissão, visando toda a galáxia ... "
  giga_corrona.007.a:0 "Isso é impossível!"
  
  giga_corrona.008.name:0 "A Magocracia Corronian"
  giga_corrona.008.desc:0 "Habitantes do Plano Celestial! \n \nNós, os§YSkeletoids§ !, finalmente unimos nosso mundo e agora levamos para as estrelas. Devemos dirigir nosso grande§YWorldcraft§! para vitória e forjaremos um império dentro dos próprios céus. \n \nNosso primeiro alvo não será outro senão o vil§YKatzenartig Imperium§ !, os infelizes felinos que impedem nossas ambições. O Kaiser e os covardes Katzens que se escondem sob sua "tecnologia" crua serão derrubados usando o fogo do inferno! \ N \nNão tente resistir a nós, pois nosso Worldcraft varrerá qualquer forma de resistência que você possa suportar usando seu inferior "tecnologia"."
  giga_corrona.008.a:0 "Ótimo, outro império megalomaníaco ..."
  giga_corrona.008.a.tooltip:0 "A§YMagocracia Coroniana§! apareceu no sistema§YJupitwo§! e envolverá o§YKatzenartig Imperium§ !. Se o Kaiser cair, eles provavelmente virão atrás de nós .. . "
  
  giga_corrona.020.name:99 "Corronian Worldcraft Obliterated"
  giga_corrona.020.desc:0 "Após um combate espacial extremamente intenso, nossas forças conseguiram destruir com sucesso o§YCorronian Worldcraft§ !, o Esotérico Planetcraft que eles estavam usando em sua tentativa de subjugar a galáxia. \n \nOs feitiços Corronian não foram suficientes para proteger e reparar a nave, que foi submetida a uma grande quantidade de armamento. Todas as energias contidas na nave não foram mais adequadamente contidas e, subsequentemente, inundaram a superfície do planeta. \n \nComo resultado, todo o Worldcraft inteiro começou a entrar em colapso e foi dilacerado por suas próprias energias esotéricas cataclísmicas. \n \nNada resta do recipiente além de algumas tênues tempestades de energia, e todos os vasos Corronianos restantes pereceram devido a serem separados da magia Corroniana que os mantinha vivos em o vácuo do espaço. "
  giga_corrona.020.a:0 "Boa viagem."
  
  giga_corrona.021.name:99 "Corronian Worldcraft Obliterated"
  giga_corrona.021.desc:0 "Após um combate espacial extremamente intenso, as forças do§Y [corrona_moon_slayer.GetName]§! conseguiram destruir com sucesso o§YCorronian Worldcraft§ !, o Esotérico Planetcraft que estavam usando em sua tentativa para subjugar a galáxia. \n \nOs feitiços corronianos não foram suficientes para proteger e reparar a nave, que foi submetida a uma grande quantidade de armamento. Todas as energias contidas na nave não foram mais contidas de forma adequada e, subsequentemente, inundaram a superfície do planeta .\n \nComo resultado, todo o Worldcraft começou a entrar em colapso e foi dilacerado por suas próprias energias esotéricas cataclísmicas. \n \nNada resta do recipiente além de algumas tênues tempestades de energia, e todos os recipientes Corronianos restantes pereceram devido a sendo separado da magia Corronian mantendo-os vivos no vácuo do espaço. "
  giga_corrona.021.a:0 "Eles encontram o seu fim."
  
  giga_corrona.022.name:99 "Katzens Obliterate Corronian Worldcraft"
  giga_corrona.022.desc:0 "Após um combate espacial extremamente intenso, as forças blindadas do§Y [corrona_moon_slayer.GetName]§! conseguiram destruir com sucesso o§YCorronian Worldcraft§ !, o Esotérico Planetcraft que estavam usando em seu tentativa de subjugar a galáxia. \n \nOs feitiços corronianos não foram suficientes para proteger e reparar a nave, que foi submetida a uma grande quantidade de armamento. Todas as energias contidas na nave não foram mais contidas adequadamente e, subsequentemente, inundaram o planeta superfície. \n \nComo resultado, o Worldcraft inteiro começou a entrar em colapso e foi dilacerado por suas próprias energias esotéricas cataclísmicas. \n \nNada resta do recipiente além de algumas tênues tempestades de energia e todos os recipientes Corronianos restantes pereceram devido ao fato de terem sido separados da magia Corroniana, mantendo-os vivos no vácuo do espaço. \n \nParece que mesmo a magia Corroniana esotérica não foi suficiente para parar a máquina militar de Katzen, e o Kaiser deu um res ouding discurso na frente de bilhões de cidadãos, celebrando a "Vitória da tecnologia e engenhosidade de Katzen sobre essas entidades bárbaras e primitivas." "
  giga_corrona.022.a:0 "Os Katzens derrotam outro inimigo ..."
  
  
  ###RESISTANCE###
  giga_katrebels.0001.name:0 "Felinos Fraturados"
  giga_katrebels.0001.desc:0 "Já se passaram vários anos desde que o§YKatzenartig Imperium§! entrou no estágio galáctico e, sem dúvida, parece ser um inimigo incrível. Do lado de fora, pelo menos. \n \nInteressante, recente diplomático e missões de espionagem revelaram que a maioria da população do Império estava satisfeita com a regra do§YKaiser§ !. A maioria, mas não todos. Na verdade,§YFlusion§! é um planeta diverso, que, antes de ser unificado sob o Kaiser, era lar de pelo menos uma dúzia de nações diferentes, cada uma com sua própria cultura e estilo de vida distintos. \n \nA maioria delas foi apagada ou assimilada na cultura Katzen dominante, mas ainda existem alguns redutos isolados e rebeldes compostos de rebeldes espécies de Flusion e seus descendentes. Esses rebeldes defendem inflexivelmente seus modos de vida e culturas ancestrais e se opõem firmemente às tentativas do Kaiser de integrá-los à sociedade Katzen. \n \nNós conseguimos identificar duas resistências bastante significativas redes dentro do Império: os§YRoqualian Freedom Fighters§ !, formados por cidadãos de uma nação anteriormente conhecida como§YRoqualia§ !; bem como a§YZuspris§ !, composta por§YZuspris§! do antigo§YZuspri Intermarium§! no Flusion. \n \nEmbora seus membros sejam poucos e distantes entre si, e atualmente representem poucos problemas para o Kaiser, determinamos que entrar em contato secretamente com qualquer um deles poderia nos ajudar em nossa luta para finalmente acabar com a ameaça Katzen. \n \ A resistência será um recurso inestimável para enfraquecer o Império de Katzenartig! "
  giga_katrebels.0001.a:0 "Vamos tentar estabelecer contato com eles."
  giga_katrebels.0001.a.tooltip:0 "Começaremos§YSprojetos especiais§! entrando em contato com os§YRoqualian Freedom Fighters§! e com a§YZuspri Vanguard§ !, na esperança de possivelmente ajudá-los a perturbar o§YKatzenartig Imperium§!. \n \nSeremos capazes de apoiá-los em sua luta, o que enfraquecerá o Império, mas isso pode fazer com que a§Y Opinião do Kaiser§! de nós§Rediminua§! se ele descobrir sobre nossas operações. \n \n "
  giga_katrebels.0001.b:0 "Isso não vale a pena o aborrecimento."
  
  CONTACT_EZIC_REBELS_PROJECT:0 "Contactar a§YZuspri Vanguard§!"
  CONTACT_EZIC_REBELS_PROJECT_DESC:0 "Os§YZuspris§! São uma espécie assustadora, que constitui uma parte significativa das Forças de Elite de Katzen, apesar de sua baixa população. \ N \nEmbora a maioria deles seja obediente à regra do Kaiser, muitos deles não concordo com suas políticas, e suas incríveis habilidades de combate significam que mesmo alguns partidários dedicados da Zuspri poderiam causar estragos no§YKatzenartig Imperium§ !. "
  CONTACT_SOLAK_REBELS_PROJECT:0 "Contate os§YRoqualian Freedom Fighters§!"
  CONTACT_SOLAK_REBELS_PROJECT_DESC:0 "Os§YRoqualians§! Costumavam ser uma das pessoas mais independentes, democráticas e de espírito livre em§YFlusion§! Antes da conquista global de§YKaiser§! A sociedade de Katzen, e ainda assim, o espírito da velha§República de Yosolakian§! Ainda vive dentro de alguns indivíduos. Reforçá-lo sem dúvida contribuiria para desestabilizar o governo estabelecido do Kaiser. "
  
  giga_katrebels.0010.name:0 "Contato estabelecido com a§YE Ordem da Rússia§!"
  giga_katrebels.0010.desc:0 "Depois de váriosmeses de operações secretas, reuniões secretas e negócios duvidosos, conseguimos estabelecer contato oficialmente com o chefe da§YZuspri Ordem§ !:§YTyukl§ !, outrora governante do§YZuspri Império§!. \n \nMais adiante estudos revelaram que esta Ordem costumava ser uma força de manutenção da paz no Império antes de ser subjugada pelas forças do Kaiser. Desde então, eles têm agido como uma espécie de "Governo no Exílio", coordenando a resistência remanescente dos Zusprianos contra o governo de Katzen. \ N \nEmbora eles não sejam atualmente uma força muito potente, tudo o que pode ser necessário é um pequeno empurrão para eles para se tornar algo que realmente ameaça o Kaiser. Eles estão, portanto, muito ansiosos para se comunicar conosco ... "
  giga_katrebels.0010.a:0 "Na tela."
  
  giga_katrebels.0011.name:0 "A§Y Ordem Zicanal§!"
  giga_katrebels.0011.desc:0 "Finalmente, os deuses nos abençoaram, ao que parece. \n \nSaudações, viajantes do espaço. Meu nome é§YTyukl Kaau§ !, governante do Império Zuspri ... bem, eu era, até aquele desgraçado Kaiser tirou tudo de nós. Nossa cultura, nosso modo de vida, nossos grandes pastos ... \n \nTudo o que antes amamos foi varrido por sua maré estúpida de militarismo e industrialização galopantes. O número de Zuspris ainda leal a nós diminui lentamente a cada dia enquanto o Kaiser impõe seu culto à personalidade a bilhões de pessoas. \n \nIsso não vai durar mais! Nós, os Zusprianos, esperamos que, com sua ajuda, possamos finalmente ser capazes de derrubar este felino megalomaníaco e, finalmente, restaure a paz para Flusion e a galáxia ... "
  
  giga_katrebels.0011.a:0 "Esperamos que sim. Vamos ver o que podemos fazer ..."
  giga_katrebels.0011.a.tooltip:0 "Podemos agora§Ysecretamente entrar em contato§! a§Y Ordem da Rússia§! do§YKatzenartig Menu Imperium§ !."
  
  giga_katrebels.0012.bye:0 "Adeus."
  
  giga_katrebels.0013.back:0 "Gostaríamos de discutir outra coisa ..."
  
  ###CONTACT EZIC REBELS###
  giga_katzen.020.ezics:0 "§HSecretamente em contato com a§YZuspri Vanguard§! ...§!"
  cant_ezic_revolt_ongoing:0 "Os Zuspris estão revoltados!"
  
  opinion_helped_us_revolt_from_katzen:99 "Supported our rebellion"
  opinion_anti_katzen_partisans:99 "Anti-Kaiser Rebels"
  
  giga_katrebels.0012.name:0 "A ordem§YZuspri§!"
  
  giga_katrebels.0012.low.a:0 "O Kaiser deve ser interrompido. Mas, infelizmente, não podemos fazer isso sozinhos, pois ele espalhou sua influência por toda parte."
  giga_katrebels.0012.low.b:0 "Nada é sagrado para Katzens. Eles implacavelmente expandem e industrializam suas terras, em detrimento de tudo o que vive lá. Se não os impedirmos, toda a galáxia logo poderá cair sob a bota Katzen. "
  giga_katrebels.0012.low.c:0 "Fomos nós ontem. Pode ser você amanhã."
  
  giga_katrebels.0012.mid.a:0 "Estamos intensificando nossos esforços. Em todo o Império, colmeias de Zuspris estão empreendendo operações contra os Katzens. No entanto, ainda não estou convencido de que isso será suficiente para acabar com o governo do Kaiser para sempre. . "
  giga_katrebels.0012.mid.b:0 "Anseio pelo dia em que nossos esforços finalmente valham a pena e esta galáxia seja libertada do Kaiser."
  giga_katrebels.0012.mid.c:0 "Juntos, nossos tipos podem forjar um futuro de paz e prosperidade."
  
  giga_katrebels.0012.high.a:0 "Zuspris estão começando a se revoltar em todos os lugares! Minha espécie finalmente pode ter um impacto contra a liderança nefasta do Kaiser. Em breve, poderemos estar todos livres. Mas ainda há muito a ser feito. "
  giga_katrebels.0012.high.b:0 "Os dias do Kaiser estão contados."
  giga_katrebels.0012.high.c:0 "Embora estejamos ganhando a vantagem, devemos permanecer vigilantes. Nossa espécie pode ser corajosa e poderosa, mas o Kaiser provavelmente terá mais truques na ... uh ... mangas ? De qualquer maneira, podemos fazer isso! "
  
  giga_katrebels.ezic.none:0 "§YForça da resistência russa§ !:0 | Insignificante"
  giga_katrebels.ezic.low:0 "§YForça da resistência russa§ !: 1 | Baixa"
  giga_katrebels.ezic.moderate:0 "§YZuspri Resistance Strength§ !: 2 | Moderate"
  giga_katrebels.ezic.significant:0 "§YZuspri Resistance Strength§ !: 3 | Significant"
  giga_katrebels.ezic.high:0 "§YForça da resistência russa§ !: 4 | Alta"
  giga_katrebels.ezic.critical:0 "§ Força da Resistência YZuspri§ !: 5 | CRÍTICO!"
  giga_katrebels.ezic.revolt:0 "§Força da resistência do YZuspri§ !: 6 | REVOLTANDO!"
  
  giga_katrebels.ezic.none.tooltip:0 "A grande maioria dos Zuspris são obedientes ao Kaiser. \n \n§RKatzen Penalidades:§! \n§YNone.§!"
  giga_katrebels.ezic.low.tooltip:0 "Alguns grupos isolados de Zuspris estão realizando operações em pequena escala para interromper a máquina militar Katzen. \n \n§RPenalizações de RKatzen:§! \n§Y-5% Taxa de Incêndio§!"
  
  giga_katrebels.ezic.moderate.tooltip:0 "A resistência está começando a se espalhar conforme mais grupos de Zuspris em todo o Império cooperam para impedir os Katzens, mas o Kaiser ainda tem a vantagem. \n \n§RPenens Katzen:§! \n§Y-7.5% Taxa de tiro \n-5% Exército Danos§! "
  
  giga_katrebels.ezic.significant.tooltip:0 "As autoridades de Katzen em vários mundos estão relatando um número cada vez maior de partidários da Zuspri.Zusprianos anti-Kaiser se infiltraram em algumas embarcações militares Katzen e as sabotam ativamente por dentro. \ N \n§RPenalizações Katzen:§! \ N§Y-10% de taxa de fogo \n-10% de velocidade do navio \n-10% Danos ao Exército \n-5 Estabilidade§! "
  
  giga_katrebels.ezic.high.tooltip:0 "A maioria dos Zuspris está agora envolvida de uma forma ou de outra em operações anti-Kaiser. As cadeias de suprimentos de Katzen estão sendo interrompidas em todos os níveis, impedindo seus esforços militares. \n \n§RPenensas Katzen :§! \ N§Y-20% Taxa de tiro \n-20% Velocidade do navio \n-15% Dano do Exército \n-10 Estabilidade§! "
  
  giga_katrebels.ezic.critical.tooltip:0 "Os Zuspris estão fervendo! Cada um deles está lutando abertamente contra o domínio de Katzen, enquanto outras espécies estão começando a se unir à sua causa para derrotar o Kaiser. Partes do Império estão à beira de um revolução! \n \n§RPenalizações de RKatzen:§! \n§Y-30% Taxa de tiro \n-40% Velocidade do navio \n-25% Danos ao Exército \n-15 Estabilidade§! "
  
  giga_katrebels.ezic.revolt.tooltip:0 "Os Zusprianos começaram uma rebelião total contra o Império Katzenartig!"
  
  giga_katrebels.0012.fund:0 "Gostaríamos de contribuir para a sua causa."
  
  giga_katrebels.0013.name:0 "Financiando a§YE Ordem da Rússia§!"
  giga_katrebels.0013.desc:0 "Embora nossa espécie não seja deficiente quando se trata de habilidades de combate, ainda somos superados pela maioria dos veículos militares Katzen. E o Kaiser também tem olhos em todos os lugares. \n \nComo nos conceder algum armamento e fundos seria um grande benefício para nossas atividades em todo o Império. \n \n§YQuando a resistência aumenta devido às nossas ações, há uma chance de§R25%§! o Kaiser descobrir e§Rdiminuir§! sua opinião sobre nós. \n \nMúltiplos impérios contribuindo não aumentarão as chances de resistência!§! "
  
  giga_katrebels.0013.a:0 "Podemos contribuir ligeiramente. | Dê§Y50§!£energy£&§Y25§!£alloys£Mensalmente"
  giga_katrebels.0013.a.tooltip:0 "Com esta contribuição, há uma chance de§Y10%§! de que§YZuspri Resistance§! vá§Aumentar§! a cada ano."
  
  giga_katrebels.0013.b:0 "Podemos dar armas e fundos. | Dar§Y150§!£energy£&§Y50§!£alloys£Mensalmente"
  giga_katrebels.0013.b.tooltip:0 "Com esta contribuição, há uma chance de§Y25%§! de que§YZuspri Resistance§! irá§Aumentar§! a cada ano."
  
  giga_katrebels.0013.c:0 "Vamos dar tudo o que podemos! | Dar§Y300§!£energy£&§Y150§!£alloys£Mensalmente"
  giga_katrebels.0013.c.tooltip:0 "Com esta contribuição, há uma chance de§Y50%§! de que§YZuspri Resistance§! irá§Aumentar§! a cada ano."
  
  giga_katrebels.0013.d:0 "Cancelar nossa contribuição."
  
  giga_katrebels.0013.a.response:0 "Isso será de grande utilidade em nossa luta para libertar a galáxia do Kaiser! Que os deuses os abençoem."
  giga_katrebels.0013.d.response:0 "Uma pena. Parece que estamos sozinhos agora ..."
  
  contributing_ezic_1:99 "Slightly Funding Zuspri Vanguard"
  contributing_ezic_1_desc:99 "We are funding the Zuspri Vanguard and providing them with weapons to fight against the Kaiser."
  
  contributing_ezic_2:99 "Funding Zuspri Vanguard"
  contributing_ezic_2_desc:99 "$contributing_ezic_1_desc$"
  
  contributing_ezic_3:99 "Greatly Funding Zuspri Vanguard"
  contributing_ezic_3_desc:99 "$contributing_ezic_1_desc$"
  
  giga_katrebels.0101.name:0 "A resistência ezicaniana aumenta!"
  giga_katrebels.0101.desc:0 "Devido ao apoio de outros impérios,§YZuspri Resistance§! no§YKatzenartig Imperium§! aumentou! \n \nOs Katzens agora sofrerão penalidades maiores, dificultando seu esforço de guerra."
  giga_katrebels.0101.a:0 "Maravilhoso!"
  giga_katrebels.ezic.increase:0 "§YZuspri Resistance§!§Aumentou§! por§Y1§ !."
  
  giga_katrebels.0102.name:99 "Zuspri Resistance Decreases"
  giga_katrebels.0102.desc:0 "Devido à falta de apoio,§YZuspri Resistance§! no§YKatzenartig Imperium§! naturalmente diminuiu. \n \nOs Katzens empreenderam uma série de operações que reduziram a§YZuspri Vanguard§! capacidade de agir contra o Kaiser. Eles sofrerão menos penalidades por seus esforços militares. "
  giga_katrebels.0102.a:0 "Uma pena."
  giga_katrebels.ezic.decreases:0 "§YZuspri Resistance§!§Rdiminuiu§! por§Y1§ !."
  
  giga_katrebels.0103.name:0 "Kaiser aprende sobre nossas operações!"
  giga_katrebels.0103.desc:0 "Notícias alarmantes! O§YKaiser§! foi recentemente informado do nosso conluio com os partidários! e do nosso envolvimento com o recente aumento da resistência anti-Katzen. \n \nEle denunciou abertamente a nossa império em um discurso recente, e sua§Yopinion de nós§! subsequentemente§Rdiminuiu§ !. "
  giga_katrebels.0103.a:0 "Aquele rato miserável!"
  
  cant_recent_ezic_operation:0 "Os ezicanos já realizaram uma operação recente. Eles só podem fazer uma a cada 6 meses."
  ezic_revolution_already_ongoing:0 "Já existe uma revolução em andamento."
  
  ###REVOLT###
  giga_katrebels.0012.ezicrevolt:99 "§HTrigger Zuspri Uprising§!"
  giga_katrebels.0012.ezicrevolt.tooltip:0 "Chegou a hora. Com a resistência dos Zusprianos em alta, podemos ajudá-los a iniciar uma rebelião total dentro do Império de Katzenartig! \n \nIsso criará um§ Império Yrebel§! dentro do§ YKatzenartig Imperium§ !, que irá imediatamente§Reclarar a guerra§! Aos Katzens. "
  
  need_ezic_resistance_5:0 "Precisamos de§ Força da Resistência YZuspri§! para estar em§G5§ !."
  
  giga_katrebels.0017.name:0 "A Revolta Zuspria"
  giga_katrebels.0017.desc:0 "Sim! Com a resistência ezicaniana mastigando o império do Kaiser por dentro, agora pode ser a hora de minha espécie finalmente pegar em armas e se separar deste reino miserável. Isso vai exigir muito de suporte externo, já que minha espécie não é populosa, e apreender espaçonaves Katzen suficientes para a operação ser bem-sucedida será um desafio. \nMas se conseguirmos, então, finalmente, poderemos apenas livrar esta galáxia da mancha que é o Kaiser. \ N \n§YIsso será§Ranger§! O Kaiser, independentemente do que aconteça. \ N \nÉ mais provável que seja necessário declarar guerra ao Kaiser também para apoiar o golpe. "
  
  giga_katrebels.0017.yes:0 "É agora ou nunca. |§Y2500§!£energy£&§Y500§!£alloys£"
  giga_katrebels.0017.yes.tooltip:0 "A§YZuspri Vanguard§! irá§Yrevolt§! e§Ysecede§! do§YKatzenartig Imperium§ !, criando um§Yrebelimpire§ !! \nTeremos a oportunidade de§ Ycontribute§! Mais§Se recursos§! Para a Ordem antes da revolta real, que vai§Aumentar§! A§Ypotência§! Da revolta. \ NTeremos que gastar£influência£,£energy£e£alloys£em para impulsionar a revolta. \nEles capturarão algo entre§Y10%§! e§Y40%§! de§YKatzen Planets§! dependendo da§YPotência§ da revolta !. "
  
  giga_katrebels.0017.reponse:0 "O fim está próximo ... para o Kaiser. A Ordem deve desferir um golpe rápido e decisivo sobre suas malditas legiões!"
  
  giga_katrebels.00171.name:0 "Revolta Zuspria: Influência"
  giga_katrebels.00171.desc:0 "Como primeiro passo para a revolta, a§YZuspri Vanguard§! está solicitando que usemos parte de nossa influência externa para influenciar a população do Império a seu favor, por meio da difusão de propaganda anti-Kaiser, denunciando abertamente o Kaiser, e promovendo o modo de vida Zusprio. \n \nEmbora isso fosse, sem dúvida,§Ranger§! o Kaiser, os efeitos de um império estrangeiro apoiando abertamente a causa Zuspria certamente seriam sentidos em todo o Império e poderiam convencer mais pessoas a junte-se à causa deles. "
  
  giga_katrebels.00171.no:0 "Não podemos pagar nada."
  giga_katrebels.00171.a:0 "Faça alguns discursos anti-Kaiser. |§Y50§!£influenciar£"
  giga_katrebels.00171.b:0 "Faça propaganda e espalhe-a no Império. |§Y150§!£influência£"
  giga_katrebels.00171.c:0 "Declarar abertamente nosso apoio aos ezicanos! |§Y300§!£influenciar£"
  
  giga_katrebels.00171.coup.1:0 "A§ Força da Revolta YZuspri§! aumentará um pouco. \nA§Y Opinião do Kaiser§! de nós vai§Rdiminuir§ !."
  giga_katrebels.00171.coup.2:0 "A§ Força da Revolta YZuspri§! aumentará. \nA§Y Opinião do Kaiser§! de nós vai§Reduzir§ !."
  giga_katrebels.00171.coup.3:0 "A§ Força da Revolta YZuspri§! aumentará significativamente. \nA§Y Opinião do Kaiser§! de nós irá§Reduzir§ !."
  
  giga_katrebels.00172.name:0 "Revolta Zuspria: Financiamento"
  giga_katrebels.00172.desc:0 "A§YZuspri Vanguard§! está agora pedindo que forneçamos alguns fundos adicionais, a fim de que eles adquiram armamento mais avançado, comprem naves espaciais próprias e, o mais importante, subornem quaisquer oficiais que entrem no forma do plano. \n \nEmbora isso vá contra os métodos usuais de Zusprian, Tyukl considerou isso necessário para que o levante tenha sucesso. "
  
  giga_katrebels.00172.no:0 "Não podemos pagar nada."
  giga_katrebels.00172.a:0 "Eles podem fazer alguns empréstimos. |§Y5000§!£energy£"
  giga_katrebels.00172.b:0 "Dê a eles um pedaço de nossas reservas de ouro. |§Y10000§!£energy£"
  giga_katrebels.00172.c:0 "Uma nave espacial de ouro para cada Zuspri! |§Y25000§!£energy£"
  
  giga_katrebels.00171.coup.0:0 "A§ Força da Revolta YZuspri§! não aumentará."
  giga_katrebels.00172.coup.1:0 "A§ Força da Revolta YZuspri§! aumentará um pouco."
  giga_katrebels.00172.coup.2:0 "A§ Força da Revolta YZuspri§! aumentará."
  giga_katrebels.00172.coup.3:0 "A§ Força da Revolta YZuspri§! aumentará significativamente."
  
  giga_katrebels.00173.name:0 "Revolta do Zuspriano: Equipamento"
  giga_katrebels.00173.desc:0 "Por último, mas não menos importante, a§ Ordem YZuspri§!requires grandes quantidades de equipamento militar e civil para apoiar a revolta que se aproxima. \n \nEsta é provavelmente a parte mais cara da revolta, mas Tyukl nos garantiu que era absolutamente crucial que a Ordem estivesse devidamente equipada para esta grande luta. "
  
  giga_katrebels.00173.no:0 "Não podemos pagar nada."
  giga_katrebels.00173.a:0 "Dê-lhes algumas espingardas sobressalentes. |§Y3500§!£alloys£"
  giga_katrebels.00173.b:0 "Eles podem ter alguns veículos blindados de combate. |§Y7500§!£alloys£"
  giga_katrebels.00173.c:0 "Envie-lhes o nosso equipamento militar mais recente! |§Y12500§!£alloys£"
  
  giga_katrebels.00174.name:0 "Revolta Zuspria: Pronta"
  giga_katrebels.00174.desc:0 "Tudo está pronto para que a§YZuspri Revolt§! ocorra. Não deve demorar muito para que membros da§YZuspri Vanguard§! bem como outras espécies se levantem contra o Kaiser interno o Império Katzenartig. \n \nZusprianos na maioria dos mundos Katzen tentarão derrubar guarnições planetárias locais e comandar as naves Katzen, a fim de tomar o controle dos planetas e seus sistemas. \n \nE ainda, os dados sugerem que os ezicanos provavelmente venceram não seremos capazes de fazer isso sozinhos, e alguns membros de nosso alto comando aconselham que atacemos o Kaiser assim que a revolta começar, a fim de encerrar os Katzens em uma guerra mortal em duas frentes. "
  giga_katrebels.00174.a:0 "Agora, só podemos esperar."
  giga_katrebels.00174.a.tooltip:0 "A§YZuspri Vanguard§! se rebelará, tomando aleatoriamente entre§Y10%§! e§Y40%§! dos planetas Katzen e seus sistemas vizinhos. \n \nEles vão§Ygain o controle§! De todos os§YKatzen navios§! E§Yplanetas§! Dentro das áreas capturadas (excluindo o§YKaiser Moon§! E sua frota), e proceda imediatamente para§Yataca§! O Kaiser. "
  
  giga_katrebels.00176.name:0 "Não está mais na ordem"
  giga_katrebels.00176.desc:0 "A§YZuspri Vanguard§! declarou guerra ao governo Katzen, formando-se ao lado de outras espécies que compartilham as mesmas esperanças de vida. \n \nA hostilidade cresceu ao longo de vários anos de pressão de um mais governo independente e está finalmente sendo libertado. \n \nZuspris dos militares teriam abandonado postos e sabotado itens militares de Katzen. Em poucas horas, rebeldes ezicanos altamente equipados apreenderam uma parte significativa dos§YKatzenartig Imperium§! territórios, comandando navios e oprimindo guarnições planetárias locais com ataques de surpresa. Enquanto o ataque foi repelido na maioria dos mundos Katzen, os Zuspris conseguiram apreender independentemente uma quantidade significativa de sistemas Katzen. \n \nEles conseguiram roubar e limpar vários embarcações improvisadas também, que pretendem empregar contra os Katzens o mais rápido possível. \n \nCom o primeiro Ártico determinado§YTyukl Kaau§! liderando o ataque, parece que não há voltando agora. \n \nQualquer contribuição material que possamos ter dado aos Zuspris foi cancelada posteriormente. "
  
  giga_katrebels.00176.a:0 "O Kaiser está em uma situação complicada, com certeza."
  
  origin_katzen_splinter:0 "Estado Katzen Splinter"
  origin_katzen_splinter_desc:0 "Esta nação era originalmente parte do maior§YKatzenartig Imperium§! e se separou após o colapso catastrófico do Império após a queda de§YFlusion§ !."
  
  origin_katzen_rebels:0 "Rebeldes Katzen"
  origin_katzen_rebels_desc:0 "Esta nação se rebelou contra o§YKatzenartig Imperium§ !, em uma tentativa de acabar com o domínio do§YKaiser§! sobre seu povo."
  
  giga_katrebels.00178.name:0 "Rebelião da Zuspri esmagada"
  giga_katrebels.00178.desc:0 "A§YZuspri Vanguard§! lutou bravamente, mas não foi o suficiente. Sua rebelião foi esmagada pelo§YKatzenartig Imperium§ !, e todos os mundos apreendidos voltaram ao controle de Katzen. \n \nE mesmo assim,§YTyukl§! continua esperançoso de que foi apenas um revés temporário, e rumores dizem que ele já está planejando uma segunda rebelião. No entanto, muitos especialistas acreditam que os ezicanos têm pouca ou nenhuma chance de montar uma rebelião novamente. "
  giga_katrebels.00178.a:0 "O futuro parece sombrio ..."
  giga_katrebels.00178.a.tooltip:0 "A Resistência Zuspria irá§Rdecrease§! em 3."
  
  ezic_assault_army:0 "Caçadores Zusprianos"
  ezic_assault_army_desc:0 "Zuspris vorazes e altamente equipadas que podem rasgar a maioria dos materiais e soldados com facilidade."
  
  ###TALK###
  giga_katrebels.0012.talk:0 "Conte-nos sobre seu tipo e estilo de vida."
  giga_katrebels.0018.name:0 "Os Zuspris"
  giga_katrebels.0018.desc:0 "Nossa espécie é fascinante, da qual me orgulho. Terei o maior prazer em lhes contar as histórias da minha espécie ..."
  giga_katrebels.0018.ezicanias:0 "Como é a sua espécie?"
  
  giga_katrebels.0018.ezicanias.response:0 "Nós, Zuspris, não somos uma espécie beligerante. Costumávamos residir no§YZuspri Império§! em§YFlusion§ !, onde a maioria de nós vivia uma vida idílica de caçador-coletor. \n \nEstamos geralmente organizados em "colméias" de tamanhos variados, espalhadas por nossa terra.§YPrime Specimens§ !, uma raça especial de Zuspris, exercia controle sobre várias dezenas de indivíduos de colmeias. E eu, bem, servi como uma espécie de " Great Prime ", exercendo alguma autoridade sobre cada colmeia e Prime em nossa nação. Tínhamos cidades e assentamentos, mas eles nunca tiveram mais do que algumas centenas de milhares de habitantes. \ N \nEmbora eu deixasse os Primes fazerem o que achavam certo, como eu acredito que eles devem ter permissão para viver suas vidas como quiserem, e eles são os melhores quando se trata de decidir o que é certo para seu vihe. \n \nEsta forma descentralizada de liderança é como vivemos na Flusion por milênios. Nunca tivemos a ambição de expandir para além de nossas fronteiras, pois viver da terra era suficiente para a grande maioria de nossa população. Era uma vida boa. \ N \nAté a chegada do Kaiser, claro. "
  
  giga_katrebels.0018.empire:0 "Conte-nos sobre o Império Zuspri."
  giga_katrebels.0018.empire.response:0 "O Império Zuspri era um dos lugares mais bonitos de toda a Flusion! \n \nEmbora não fosse tão grande, ele abrigava algumas das paisagens mais majestosas do planeta. Nosso grande as terras estavam cheias de enormes florestas, vastos pântanos e imponentes cadeias de montanhas que minha espécie chamava de lar. \n \nApesar de nossos modos de vida aparentemente primitivos, ainda assim montamos uma vasta rede de trens, que abrangia todo o império e conectava a maioria dos principais assentamentos. Era nosso orgulho, de certa forma. \n \nO Império foi dividido ao lado de uma dúzia ou mais de espécimes Prime, que exerciam seu governo sobre alguns milhões de Zuspris. E nós simplesmente ... vivíamos nossas vidas, nos divertindo e explorando o que nossa nação tinha a oferecer. \n \nNem sempre foi perfeito, mas pelo menos não estávamos oprimindo ninguém ou iniciando guerras em todos os lugares. "
  
  giga_katrebels.0018.kaiserbad:0 "Como o Kaiser te invadiu?"
  giga_katrebels.0018.kaiserbad.response:0 "O Kaiser ...§Yvisible sadness§! ... é um tolo miserável! \n \nQuando ele iniciou§YProjekt Mondkanone§ !, não prestamos muita atenção. Alguns Zuspris inteligente foi trabalhar no projeto, mas minha espécie não se importou muito. \n \nEntão, tudo mudou quando o§YKatzenartig Imperium§! atacou. \n \nO Kaiser utilizou o Mondkanone para bombardear nossas terras em órbita, destruindo nossas§Ytouricane Turrets§! que construímos para perfurar a armadura de Katzen. Os navios Katzen dispararam grupos de torpedos que destruíram nossas colméias de defesa costeira. \n \nMas não nos rendemos! Eles ainda tinham que rolar seus blindados para dentro de nossa terra, e estávamos confiantes de que nossos caçadores destruiriam suas feras metálicas com facilidade. Além disso, nosso terreno acidentado de montanhas, florestas e pântanos tornou as operações militares reais extremamente complicadas para eles. \n \nFoi quando o Kaiser fez o impensável e ... empregou minha própria espécie, contra nós. Os Katzens, usando nosso DNA como um ba se, fez a bioengenharia de uma raça especial de pequenos e vorazes Zuspris! Os infelizes felinos liberaram milhões deles sobre nossa terra, e não pudemos fazer nada. \ N \nEssas criaturas eram pequenas, rápidas, ágeis e continham ácido altamente corrosivo que espalharam por toda parte após a morte. Esses ... pixies maliciosos roeram nossas defesas e permitiram que a infantaria Katzen ocupasse toda a nossa nação sem disparar um tiro. \ N \nNosso Império havia caído e eu fugi, recusando-me a me submeter ao imperialismo Katzen. Tenho tentado coordenar a resistência ezicaniana desde então, mas nunca foi a lugar nenhum ... até agora. "
  
  giga_katrebels.0018.kaiserverybad:0 "O que o Kaiser fez com a sua terra?"
  giga_katrebels.0018.kaiserverybad.response:0 "Coisas terríveis ... \n \nEle começou industrializando pesadamente nossas planícies férteis, drenou lagos e pântanos e até nivelou algumas de nossas montanhas para colher mais minerais. \n \nMeu tipo era forçados a entrar na máquina militar de Katzen, e embora os Katzens não nos oprimissem abertamente ou atirassem em nós, eles ainda recrutaram uma grande parte de nossa população e começaram a lentamente, mas de forma constante, apagar nossa cultura e crenças, substituindo-as por seu culto ao Kaiser e militarismo. \n \nMas nós, Zuspris, não desistimos tão facilmente! Embora tivéssemos de obedecer, ainda ansiamos pelo dia em que o Kaiser finalmente seria despejado da existência. No fundo, todos desejamos retornar ao nosso estilo de vida antes idílico. \n \nÉ o que parece natural e certo para nós. Todo esse militarismo Katzen, colonização interestelar e expansão simplesmente não combinam com a grande maioria de nós. \n \nMeu tipo tem uma vida longa também, então a maioria dos Zuspris que existiam durante a conquista do Kaiser do O império ainda está vivo, esperando uma chance de contra-atacar. Eu não quero decepcioná-los. "
  
  giga_katrebels.0018.whatkaiser:0 "Quem é o Kaiser, exatamente?"
  giga_katrebels.0018.whatkaiser.response:0 "O ser mais megalomaníaco que existe, é ele! \n \nEle só procura expandir, conquistar, expandir e conquistar um pouco mais. Não estou muito certo de seus motivos, mas parece ele simplesmente quer governar para ... tudo. Foi Flusion no início, e se não fizermos nada, será a galáxia! \n \nNada parece sagrado para ele, e ele ficará feliz em pavimentar nosso pastagens ancestrais para construir mais fábricas militares. Bem, ele tenta fazer concessões às vezes, concedendo autogoverno limitado a algumas espécies, mas essas concessões são obviamente feitas para silenciar os manifestantes e dar a ele mais tempo para doutriná-los. \n \nE o Katzens o segue como uma espécie de divindade, obedecendo a cada uma de suas palavras e morrendo nas guerras que começou só porque tem vontade. Ele doutrina todas as espécies que conquistou.usuários, forçando-os a seu culto à personalidade e ao militarismo desenfreado. \n \nEu nem tenho certeza de onde ele veio, parece que ele apenas apareceu no Flusion um dia e assumiu o controle do Império Katzenartig durante um período de crise. Ele é muito misterioso ... e irritante. "
  
  giga_katrebels.0018.cool:0 "Interessante. Obrigado por compartilhar."
  giga_katrebels.0018.cool.response:0 "É importante que nossas histórias não sejam esquecidas ... para que o Kaiser não vença."
  
  ###SABOTAGE POWER PLANT###
  giga_katrebels.0012.sabotplants:99 "§YStrike Katzen Power Plants§!"
  giga_katrebels.0012.sabotplants.tooltip:0 "Podemos apoiar a§YZuspri Vanguard§! em uma operação para desestabilizar a Rede de Energia de Katzen sabotando usinas de energia, o que por sua vez impediria sua marinha."
  
  need_ezic_resistance_2:0 "Precisamos de§YZuspri Resistance Strength§! para estar em§G2§! ou superior."
  
  giga_katrebels.0016.name:0 "Centrais de energia impressionantes"
  giga_katrebels.0016.desc:0 "Katzens tendem a enviar energia de seus planetas para suas naves, a fim de evitar o uso de geradores caros e frágeis. \nE nós, Zuspris, temos uma anatomia que nos torna imunes à maioria dos tipos de choque elétrico. Equipes de sabotadores poderiam facilmente mastigar alguns fios aqui e ali em usinas de energia Katzen, o que definitivamente teria um impacto perceptível em suas naves. \nEles não teriam energia suficiente para alimentá-los mais, forçando-os a ir muito mais devagar do que o normal! Um plano diabólico! Só precisamos de ajuda ... \n \n§YHá 25% de chance de o Kaiser descobrir isso, caso em que a opinião dele sobre nós§Rdiminuir§!. \n \n§YSe a operação for bem-sucedida, todos os navios Katzen receberão os seguintes debuffs por 2 anos:§! \n§R-40% Velocidade do navio \n+25% Tempo de carga de salto \n \n§YSe a operação falhar, Resistência Zuspria irá§Rdiminuir§! em 1.§! \n \n§YHá uma chance de 10% de um§HGrande sucesso§ !, o que levará à Resistência Zuspria§Aumento§! em 1 al lado a lado com as penalidades de Katzen.§! "
  
  giga_katrebels.0016.reponse:0 "Faremos o que pudermos para atacar suas usinas, então."
  
  giga_katrebels.0016.low:0 "Contribuir com§Y3000§!£energy£&§Y500§!£alloys£| 60% de chance de sucesso"
  giga_katrebels.0016.med:0 "Contribuir com§Y5000§!£energy£&§Y1500§!£alloys£| 80% de chance de sucesso"
  
  giga_katrebels.00162.name:0 "Falha na sabotagem da usina"
  giga_katrebels.00162.desc:0 "§YZuspris§! pertencente à§YZuspris§! grupo de resistência anti-Kaiser foi preso recentemente por tentar destruir usinas de energia em todo o§YKatzenartig Império§! \n \nOs sabotadores foram rapidamente detidos Autoridades de Katzen antes mesmo de entrar nos edifícios e suas tentativas de subornar os Katzens falharam miseravelmente. \ N \nO Kaiser fez um discurso triunfante para informar a população sobre esta contra-operação bem-sucedida, e isso representa um terrível revés para a resistência Zuspria em o Império. "
  giga_katrebels.00162.a:0 "Ratos!"
  
  giga_katrebels.00164.name:0 "Usina de energia sabotagem bem-sucedida!"
  giga_katrebels.00164.desc:0 "§YZuspris§! pertencente à§YZuspris§! o grupo de resistência anti-Kaiser conseguiu atacar várias centrais militares críticas no§YKatzenartig Império§!. \n \nOs Zuspris se infiltraram os edifícios e usaram suas mandíbulas poderosas para mastigar facilmente os delicados fios das usinas, levando a um blecaute generalizado nas instalações militares de Katzen. \n \nIsso forçou efetivamente os Katzens, que normalmente irradiam energia de suas usinas no planeta diretamente para suas naves 'baterias, para reduzir drasticamente a velocidade de seus navios, a fim de economizar energia. "
  giga_katrebels.00164.a:0 "Boa sorte conduzindo" Guerra Eletrizante "sem iluminação!"
  giga_katrebels.00164.a.tooltip:0 "§YKatzen Navios§! recebe as seguintes penalidades por§Y2 anos§!:§R \n-40% Velocidade do navio \n+25% Tempo de carga de salto"
  
  giga_katrebels.00166.name:0 "Sabotagem da usina:§HGrande sucesso§!"
  giga_katrebels.00166.desc:0 "§YZuspris§! pertencente à§YZuspris§! o grupo de resistência anti-Kaiser conseguiu atacar várias centrais militares críticas no§YKatzenartig Império§!. \n \nOs Zuspris rapidamente se infiltraram os edifícios e usaram suas poderosas mandíbulas para mastigar facilmente os delicados fios das usinas, levando a um blecaute generalizado nas instalações militares de Katzen. Os Katzens não tiveram tempo de reagir. \n \nIsso forçou efetivamente os Katzens, que normalmente irradiam energia de suas usinas de energia no planeta diretamente para as baterias de suas naves, para reduzir drasticamente a velocidade de suas naves a fim de economizar energia. \n \nA operação foi conduzida com tal velocidade e eficiência que aumentou a resistência dos Zusprianos em todo o Império, dando-lhes mais esperança de um dia tombar sobre o Kaiser. "
  giga_katrebels.00166.a:0 "Boa sorte conduzindo" Guerra Eletrizante "sem iluminação!"
  giga_katrebels.00166.a.tooltip:0 "§YKatzen Navios§! recebe as seguintes penalidades por§Y2 anos§!:§R \n-40% Sp do navioeed \n+25% Tempo de carga de salto§! \n \n§YZuspri Resistance§!§Aumentou§! por§Y1§ !. "
  
  ###SABOTAGE ARMY###
  katzen_armies_already_sabotaged:0 "As linhas de abastecimento de Katzenarmee já foram sabotadas."
  
  need_ezic_resistance_3:0 "Precisamos de§YZuspri Resistance Strength§! para estar em§G3§! ou superior."
  
  giga_katrebels.0012.sabotarmy:0 "§YDestroy Katzenarmee Depósitos de suprimentos§!"
  giga_katrebels.0012.sabotarmy.tooltip:0 "Podemos apoiar a§YZuspri Vanguard§! em uma série de operações para atacar vários depósitos de suprimentos de Katzenarmee, o que reduzirá a eficiência das§YKatzen Ground Tropops§ !."
  
  giga_katrebels.0015.name:0 "Destruindo depósitos de suprimentos"
  giga_katrebels.0015.desc:0 "A Ordem Zuspria sabe onde alguns depósitos de suprimentos cruciais de Katzenarmee estão localizados nos vários mundos Katzen. Pequenas forças-tarefa de Zuspri agindo silenciosamente poderiam facilmente destruir esses depósitos, o que enfraqueceria as tropas Katzen do lado do planeta. Parece relativamente viável, sim. Precisamos apenas de algum apoio ... \n \n§YHá 25% de chance do Kaiser descobrir sobre isso, caso em que sua opinião sobre nós irá§Rdiminuir§!. \n \n§ Se a operação for bem-sucedida, as tropas terrestres de Katzen receberão os seguintes debuffs por 2 anos:§! \ N§R-30% Saúde do Exército \n-30% Danos ao Exército \n-30% Moral do Exército! \ N \n§YSe Se a operação falhar, a Resistência Zuspria§Rdiminuirá! em 1.§! \n \n§YHá uma chance de 10% de um§HGrande sucesso§ !, o que levará a Resistência Zuspria§Aumento§! em 1 ao lado do Katzen penalidades.§! "
  
  giga_katrebels.0015.low:0 "Contribuir com§Y3000§!£energy£&§Y500§!£alloys£| 50% de chance de sucesso"
  giga_katrebels.0015.med:0 "Contribuir com§Y6000§!£energy£&§Y1500§!£alloys£| 70% de chance de sucesso"
  
  giga_katrebels.0015.reponse:0 "Faremos o que pudermos, então. As linhas de abastecimento de Katzen entrarão em colapso, por dentro."
  
  giga_katrebels.00152.name:99 "Katzenarmee Supply Line Sabotage Failed"
  giga_katrebels.00152.desc:0 "Dezenas de prisões foram feitas hoje como§YKatzenarmee§! tropas interceptaram guerrilheiros de§YZuspri§! alegou que essas atividades anti-Katzen não teriam mais permissão para continuar, levando a mais repressão às atividades da§YZuspri Vanguard§!."
  giga_katrebels.00152.a:0 "Dane-se o Kaiser!"
  
  giga_katrebels.00154.name:99 "Zuspris Sabotage Katzenarmee Depots!"
  giga_katrebels.00154.desc:0 "Várias dezenas de grupos de partidários§YZuspri§! empreenderam recentemente um grande ataque coordenado nos§YKatzenarmee Supply Depots§! em todo o Império. \n \nEles conseguiram destruir muitas instalações e bases militares críticas de Katzen , o que levará a uma redução significativa na eficiência de combate das tropas terrestres de Katzen, deixando seus mundos mais vulneráveis ​​do que nunca. "
  giga_katrebels.00154.a:0 "Excelentes notícias!"
  giga_katrebels.00154.a.tooltip:0 "§YKatzen Terrestre Tropas§! recebe as seguintes penalidades por§Y2 Anos§!:§R \n-30% Danos ao Exército \n-30% Saúde do Exército \n-30% Moral do Exército "
  
  giga_katrebels.00156.name:0 "Zuspris Sabotage Katzenarmee Depots:§HGrande Sucesso§!"
  giga_katrebels.00156.desc:0 "Várias dezenas de grupos de partidários§YZuspri§! empreenderam recentemente um grande ataque coordenado nos§YKatzenarmee Supply Depots§! em todo o Império. \n \nEles conseguiram destruir rapidamente muitas instalações militares críticas de Katzen e bases, o que levará a uma redução significativa na eficiência de combate das tropas terrestres de Katzen, deixando seus mundos mais vulneráveis ​​do que nunca. \n \nEsta incrível façanha de cooperação anti-Katzen ezicaniana também reforçou a resistência ezicaniana dentro do Império e garantiu um aumento legitimidade à§YZuspri Vanguard§ !. "
  giga_katrebels.00156.a:0 "Ótimas notícias!"
  giga_katrebels.00156.a.tooltip:0 "§YKatzen Terrestre Tropas§! recebe as seguintes penalidades por§Y2 Anos§!:§R \n-30% Danos ao Exército \n-30% Saúde do Exército \n-30% Moral do Exército§! \ N \n§YZuspri Resistance§!§Aumentou§! Em§Y1§ !. "
  
  ###SABOTAGE MOON###
  kaiser_moon_already_sabotaged:0 "A Lua Kaiser já foi sabotada."
  katzen_plants_already_sabotaged:0 "Os planetas de energia Kaiser já foram sabotados."
  
  giga_katrebels.0012.sabotmoon:0 "§YSabotagem da Lua Kaiser§!"
  giga_katrebels.0012.sabotmoon.tooltip:0 "Podemos apoiar a§YZuspri Vanguard§! em uma operação para sabotar o§YKaiser Moon§ !."
  need_ezic_resistance_4:0 "Precisamos de§YZuspri Resistance Strength§! para estar em§G4§! ou superior."
  
  giga_katrebels.0014.name:0 "Sabotando a Lua Kaiser"
  giga_katrebels.0014.desc:0 "Você gostaria que sabotássemos§YKaiser Moon§ !? Seria um grande empreendimento. Esta lua é composta exclusivamente por Katzens, e se infiltrar nela seria extremamente difícil. \nNo entanto, Eu acredito que nossa rede de resistência é poderosa o suficiente para pelo menos tentar algo, como Zuspris pode mastigar metal, então destruir coisas é muito fácil para nós.\nIsso ainda vai precisar de algum apoio financeiro de seu império. Precisaremos subornar alguns Katzens se quisermos que isso seja bem-sucedido. \ N \n§YHá 50% de chance de o Kaiser descobrir sobre isso; nesse caso, sua opinião sobre nós§Rdiminuir§! . \n \n§YSe a operação for bem-sucedida, o Kaiser Moon receberá os seguintes debuffs por 1 ano:§! \n§R-25% Taxa de tiro \n-40% Velocidade \n-30% Dano de armas \n- 30% Hull & Armor HP§! \ N \n§YSe a operação falhar, a Resistência Zuspri irá§Rdecrease§! por 1.§! \n \n§YHá uma chance de 10% de um§HGrande sucesso§ !, o que levará à Resistência Zuspria§Aumento§! por 1 junto com as penalidades de Katzen.§! "
  
  giga_katrebels.0014.low:0 "Contribuir com§Y5000§!£energy£&§Y500§!£alloys£| 40% de chance de sucesso"
  giga_katrebels.0014.med:0 "Contribua§Y7500§!£energy£&§Y1000§!£alloys£| 60% de chance de sucesso"
  giga_katrebels.0014.high:0 "Contribua§Y10000§!£energy£&§Y3000§!£alloys£| 80% de chance de sucesso"
  
  giga_katrebels.0014.reponse:0 "Muito bem, nós, Zuspris, tentaremos nos infiltrar na nau capitânia do Kaiser e danificá-la o máximo que pudermos."
  
  giga_katrebels.00142.name:0 "Kaiser Moon Sabotage falhou!"
  giga_katrebels.00142.desc:0 "Um grupo de§YZuspris§! pertencentes à§YZuspris§! grupo de resistência anti-Kaiser foi recentemente pego tentando se infiltrar no§YKaiser Moon§ !, presumivelmente para sabotá-lo e destruí-lo do dentro. \n \nOs sabotadores foram detidos antes mesmo de embarcarem na enorme nave, e grandes quantidades de prisões foram feitas em todo o§YKatzenartig Imperium§ !, o que impedirá drasticamente os movimentos de resistência dos Zusprianos. \n \nO Kaiser então deu um discurso triunfante para descrever sua vitória sobre esses "bárbaros", e prometeu destruir qualquer coisa que estivesse em seu caminho. "
  giga_katrebels.00142.a:0 "Ratos!"
  
  giga_katrebels.00144.name:0 "Kaiser Moon Sabotage bem-sucedido!"
  giga_katrebels.00144.desc:0 "O§YKatzenartig Imperium§! está em pânico, como um grupo de§YZuspris§! pertencentes à§YZuspris§! pertencentes à§YZuspri Vanguard§! grupo de resistência anti-Kaiser recentemente conseguiu se infiltrar na nau capitânia de Katzens, e passou a mastigar partes vitais do veículo. \n \nEles então detonaram grandes quantidades de explosivos pela lua transformada em arma, causando imensos danos estruturais. Embora o tamanho da lua signifique que ela não foi totalmente destruída, isso sem dúvida reduzirá sua eficácia em combate por algum tempo."
  giga_katrebels.00144.a:0 "Um brinde aos nossos amigos ezicanos!"
  giga_katrebels.00144.a.tooltip:0 "O§YKaiser Moon§! recebe as seguintes penalidades por§Y1 Anos§!:§R \n-25% Taxa de Fogo \n-40% Velocidade \n-30% Danos por Armas \n-30% Hull & Armor HP§! "
  
  giga_katrebels.00146.name:0 "Kaiser Moon Sabotage:§HGrande sucesso§!"
  giga_katrebels.00146.desc:0 "O§YKatzenartig Imperium§! está em pânico, como um grupo de§YZuspris§! pertencentes à§YZuspris§! pertencentes à§YZuspri Vanguard§! o grupo de resistência anti-Kaiser recentemente conseguiu se infiltrar na nau capitânia de Katzens, e passou a mastigar partes vitais do veículo. \n \nEles então detonaram grandes quantidades de explosivos pela lua transformada em arma, causando imensos danos estruturais. Embora o tamanho da lua signifique que ela não foi totalmente destruída, isso sem dúvida reduzirá sua eficácia em combate por algum tempo. \n \nA operação foi conduzida com rapidez e eficiência, tanto que muitos ezicanos em todo o império Katzen foram motivados a começar a pegar em armas também contra os Katzens, fortalecendo ainda mais a Ordem Zuspria. "
  giga_katrebels.00146.a:0 "Um brinde aos nossos amigos ezicanos!"
  giga_katrebels.00146.a.tooltip:0 "O§YKaiser Moon§! recebe as seguintes penalidades por§Y1 Anos§!:§R \n-25% Taxa de Fogo \n-40% Velocidade \n-30% Danos por Armas \n-30% Hull & Armor HP§! \n \n§YZuspri Resistance§!§Aumentou§! por§Y1§ !. "
  
  giga_katrebels.1001.name:0 "A Grande Migração da Zuspri"
  giga_katrebels.1001.desc:0 "Após o colapso do§YKatzenartig Imperium§ !,§YZuspri§! populações em todo o antigo império têm tentado retornar ao seu modo de vida ancestral e pacífico, que o§YKaiser§! havia tentado suprimir. \n \nNo entanto, este modo de vida, que rejeita a tecnologia avançada e adota um estilo de vida mais primitivo e "natural", muitas vezes é incompatível com a civilização e a infraestrutura modernas, o que levou a conflitos entre os Zuspris e as outras espécies que compartilham planetas com. \n \nComo tal, sob a orientação de§YTyukl Kaau§ !, o "líder" da espécie Zuspris em toda a galáxia empreendeu um grande esforço para ... partir. \n \nNa verdade, bilhões de Zuspris estão agora embarcando em cargueiros, antigas naves Katzen e tudo o mais que puderem encontrar e, posteriormente, continuar a decolar para o espaço, em direção a algum destino desconhecido. \n \nDe acordo com Tyukl, este destino misterioso finalmente permitirá que eles "vivam suas vidas do jeito que querem. eles w sempre pretendemos. ""
  
  giga_katrebels.1001.rebels.desc:0 "Após o colapso of o§YKatzenartig Imperium§ !,§YZuspri§! populações em todo o antigo império têm tentado retornar ao seu modo de vida ancestral e pacífico, que o§YKaiser§! tentaram suprimir. \n \nNo entanto, esse modo de vida, que rejeita a tecnologia avançada e adota um estilo de vida mais primitivo e "natural", muitas vezes é incompatível com a civilização e a infraestrutura modernas, o que levou a conflitos entre os Zuspris e os outros espécies com as quais compartilham planetas. \n \nComo tal, sob a orientação de§YTyukl Kaau§ !, o "líder" da espécie Zuspris em toda a galáxia empreendeu um grande esforço para ... partir. Na verdade, bilhões de Zuspris estão agora embarcando em cargueiros, velhos navios Katzen e tudo o mais que podem encontrar e, subsequentemente, partem para o espaço, em direção a algum destino desconhecido. De acordo com Tyukl, este destino misterioso finalmente permitirá que eles "vivam suas vidas da maneira que sempre foram planejados". \ N \nO império formado pela§ Ordem YZuspri§! subseqüentemente entrou em colapso, deixando suas outras espécies constituintes para se defenderem e reformarem seus próprios governos. "
  
  giga_katrebels.1001.a:0 "Para onde eles estão indo?"
  giga_katrebels.1001.a.tooltip:0 "Sobre§Y75%§! de§YZuspris§! através da galáxia§Ydepart§! seus mundos, excluindo qualquer um que possa estar em nosso império."
  
  giga_katrebels.1002.name:0 "Zuspris pede para sair"
  giga_katrebels.1002.desc:0 "Com a§YGrande Migração Zuspri§! em andamento, as§YZuspris§! dentro de nosso próprio império estão pedindo que os deixemos ir também, para que se juntem aos seus companheiros Zuspris em sua grande jornada. \n \nNaturalmente, isso significaria que alguns de nossos planetas perderiam uma porção significativa de sua população, mas a recusa pode terminar em§Rangering§! disseram as populações de Zuspris ... "
  giga_katrebels.1002.a:0 "Claro. Eles devem ter permissão para ir."
  giga_katrebels.1002.a.tooltip:0 "Sobre§Y75%§! de§YZuspris§! dentro de nosso Império§Ydepart§! seus mundos."
  giga_katrebels.1002.b:0 "Eles pertencem ao nosso império e a nenhum outro lugar."
  giga_katrebels.1002.b.tooltip:0 "Cerca de§Y75%§! de§YZuspris§! dentro do nosso Império se tornam§Rangered§! por§Y5 anos§ !, reduzindo drasticamente sua§YFelicidade§! e§YEstabilidade Planetária§ !. "
  
  ezic_refused_depart:0 "Partida recusada"
  ezic_refused_depart_desc:0 "Este pop da Zuspri está furioso porque não foi autorizado a participar da Grande Migração da Zuspri."
  
  giga_katrebels.1004.name:99 "Hutyukl"
  giga_katrebels.1004.desc:0 "Depois de alguns meses de viagem, parece que os§YZuspris§! participando da§YGrande migração da Zuspri§! finalmente chegaram ao seu destino: um mundo tropical exuberante conhecido como§YHutyukl§ !, que se segue uma órbita distante em torno de um buraco negro ativo que os Zuspris chamam de§YOs Seis Sóis§ !, e aquece o planeta graças ao seu disco de acreção. \n \nEstudos sobre culturas ezicanas revelaram que poderia ser uma espécie de "Terra Prometida" dentro antiga mitologia ezicaniana, embora a veracidade dessa afirmação seja contestada. \n \nDe qualquer forma, embora nem todos tenham conseguido, bilhões de ezicanias já pisaram em Hutyukl e estão começando a recriar sua peculiar e bastante "idílica" a sociedade muito parecida com a que costumava ser em§YFlusion§ !, antes da conquista do Kaiser. \n \nE, portanto, os ezicanos efetivamente se retiraram do cenário galáctico. Suas incríveis habilidades de combate significam que, apesar de sua falta de tecnologias avançadas , um alvo de invasão terrestre Ting Hutyukl certamente seria mortal. "
  giga_katrebels.1004.a:0 "Interessante. Uma espécie bastante peculiar."
  
  giga_ezic_age:0 "Idade Idílica"
  giga_ezic_age_desc:0 "Embora possuam algumas tecnologias, como motores a vapor, esta civilização não deseja desenvolver mais suas tecnologias ou se expandir além de seu mundo natal. Seus membros desfrutam de uma vida relativamente simples e natural, baseada principalmente na caça e organizada em pequenos tribos. \nExiste uma espécie de "governo" supranacional, embora sirva principalmente como uma força de manutenção da paz e não interfira muito nos assuntos domésticos. "
  
  col_giga_pre_ftl_ezic:99 "$giga_ezic_age$"
  col_giga_pre_ftl_ezic_desc:99 "$col_primitive_desc$"
  col_giga_pre_ftl_ezic_tt:99 "$col_giga_pre_ftl_ezic_desc$"
  
  job_giga_ezic_hunter:0 "Homem da Tribo Zuspria"
  job_giga_ezic_hunter_plural:0 "Tribos Zusprianos"
  job_giga_ezic_hunter_desc:0 "Zusprianos que cumprem vários deveres para sua tribo local, ou" colmeia "."
  
  building_giga_ezic_capital:0 "Capital Zuspri"
  building_giga_ezic_capital_desc:0 "Uma cidade grande e um tanto rústica que serve como a" capital "da Civilização Zuspria. Ela abriga o nobre Zusprio de maior classificação do planeta e coordena as operações intertribais, bem como a rede ferroviária surpreendentemente desenvolvida do planeta."
  
  mod_job_giga_ezic_hunter_add:0 "Trabalhos de Tribos Zusprianos"
  
  giga_katrebels.1005.name:0 "Presente de despedida de Tyukl"
  giga_katrebels.1005.desc:0 "[ezic_liberator.GetName]! Sou mais uma vez I,§YTyukl Kaau§!. \n \nComo um agradecimento por nos ajudar a revoltar-nos contra o§YKatzenartig Imperium§ !, nossa espécie decidiu para conceder a você umaift, que consiste em uma série de recursos raros que desenterramos em§YHutyukl§ !, para os quais não temos uso. \n \nPodem esses recursos servirem bem em seus empreendimentos futuros. \n \nE agora que encontramos o paraíso, os Zuspris e eu nos despedimos de vocês, viajantes do espaço. "
  giga_katrebels.1005.a:0 "Um belo presente. Adeus, Zuspris."
  
  ###UNIFICATIONS###
  giga_flusionunion.002.name:0 "Katzenartig Imperium derrotado!"
  giga_flusionunion.002.desc:0 "Notícias surpreendentes chegaram ao mundo primitivo de§YFlusion§! no Sistema§YJublio§ !. \n \nO§YKatzenartig Imperium§ !, que embarcou na conquista do mundo alguns anos atrás, foi derrotado por uma coalizão de nações Flusionianas liderada pela§República de Roqualian§ !! Esta união, conhecida como§YEstados Flusionianos Unidos§ !, surgiu a fim de se opor diretamente à tentativa dos Katzens de dominar o mundo, e devido para a emergência da situação, cresceu rapidamente para abranger o restante dos governos do planeta. \n \nCom a derrota do Império, o§YUFS§! agora se torna um hiperestado que abrange a Flusão. Com muito mais pacífico, liberal e democrático em comparação com o Império Katzenartig, alguns vêem isso como uma grande vitória para os Flusionianos, e muitos ficam perplexos porque tudo não terminou em um apocalipse nuclear. \n \n§YProjekt Mondkanone§! foi mantido, embora tenha foi completamente restaurado por não-Katzens, para garantir que eles não possam use-o para intenções maliciosas novamente. O paradeiro de§YKaiser Kattail§! no entanto, permanecem desconhecidos, já que ele parece ter simplesmente desaparecido da superfície de Flusion após sua derrota. "
  giga_flusionunion.002.a:0 "Uma vitória para a democracia."
  
  giga_flusionunion.004.name:0 "Flusion atinge FTL!"
  giga_flusionunion.004.desc:0 "Após cerca de uma década de consolidação de seu poder, os§YEstados Flusionianos Unidos§! em§YFlusion§! finalmente descobriram o motor FTL. Consequentemente, seu líder eleito,§YDofus Tequenik Machina§ !, nos enviou uma transmissão diplomática, solicitando a transferência do sistema§YJublio§! para eles. \n \nEmbora eles tenham descoberto recentemente o FTL, seu armamento e outras tecnologias são surpreendentemente avançados, e convém ter cuidado com isso novo contendor no palco galáctico. "
  giga_flusionunion.004.a:0 "Na tela."
  
  giga_flusionunion.005.name:0 "Transmissão de entrada!"
  giga_flusionunion.005.desc:0 "Saudações, viajantes do espaço! \n \nMeu nome é§YDofus Tequenik Machina§ !, líder dos§YEstados Flusionianos Unidos§ !. Após a derrota do Império Katzenartig, nos tornamos o único corpo governante de Flusion, e temos nos esforçado para melhorar as condições de vida de todas as espécies em nosso adorável mundo. \n \nMas isso não vem ao caso! Por meio de nossos esforços combinados, finalmente conseguimos adquirir a viagem FTL e agora pedimos que você transfira o§YJublio§! Sistema para nós. Podemos fornecer compensação financeira para o sistema, na forma de§Y10000§!£energy£e§Y1000§!£alloys£. \ N \nSeja avisado de que não temos medo de assumir armas se necessário ... "
  giga_flusionunion.005.a:0 "Um bom negócio."
  giga_flusionunion.005.a.tooltip:0 "Iremos§Ytransferir§! o sistema de§YJublio§! para os§YEstados Flusionianos Unidos§ !."
  giga_flusionunion.005.a.response:0 "Excelente! Esperamos por mais cooperação com sua espécie."
  giga_flusionunion.005.b:0 "Este sistema é nosso. Vá embora."
  giga_flusionunion.005.b.tooltip:0 "Os§YEstados Flusionianos Unidos§! provavelmente§Reclararão a guerra§! contra nós!"
  giga_flusionunion.005.b.response:0 "Parece que teremos que retirar todo o antigo armamento Katzen ..."
  
  ufs_buffs:99 "ufs_buffs"
  
  giga_flusionunion.006.name:0 "Flusion vai para a guerra!"
  giga_flusionunion.006.desc:0 "Notícias alarmantes! Após nos recusarmos a entregar o sistema de §YJublio§! para eles, o governo Flusioniano invadiu o sistema à força, e subsequentemente declarou guerra contra nós. \n\nEles tomaram também uma quantidade substancial de território nas redondezas de Jublio. Parece que eles não estavam brincando com suas demandas..."
  giga_flusionunion.006.a:0 "Estações de batalha!"
  
  giga_flusionunion.007.name:0 "Estados Unidos da Flusionan"
  giga_flusionunion.007.desc:0 "Notícias chegaram até nós de que o mundo primitivo de§YFlusion§! alcançou a viagem FTL. Embora os primitivos que chegam à era espacial sejam normalmente de pouca preocupação, esta civilização é na verdade bastante avançada e se desenvolveu bastante antes para inventar o Hyperdrive. \n \nComo tal, eles agora estão entrando no estágio galáctico com armas e equipamentos que podem muito bem rivalizar com os nossos. Pode ser prudente ter cuidado ao lidar com este novo contendor galáctico. "
  giga_flusionunion.007.a:0 "Interessante."
  
  # #Kronks (UNUSED)
  # giga_flusionunion.012.name:0 "Kronks unite Flusion!"
  # giga_flusionunion.012.desc:0 "Surprising news have arrived the primitive world of §YFlusion§! in the §YJublio§! System.\n\nThe §YKatzenartig Imperium§!, who had embarked on a world conquest a few years ago, has been defeated by the overwhelming numbers of... §YKronk§!. Populated by the arthropoid and namesake §YKronks§!, §YKronk§! remained an underdog on Flusion's geopolitical scene, until the war between the Katzens and the rest of the planet kicked off.\n\nThe Kronks remained relatively neutral, but as the fighting got worse and worse, and Flusion was on the brink of total devastation, a particularly charming Kronk leader known as... §YKronk§!... launched a surprise offensive against the myriad of weakened nations.\n\nThe Kronks, who possess extremely high birthrates, were able to overwhelm whatever opposition remained with sheer numbers, and ended up unifying all of Flusion within months.\n\nWith their rule consolidated, the Kronks are now beginning to slowly rebuild Flusion, and they have managed to commandeer the Katzen §YProjekt Mondkanone§!, which had been abandoned during the later portions of the war."
  # giga_flusionunion.012.a:0 "Kronk!"
  
  # giga_flusionunion.014.name:0 "Kronks Achieve FTL!"
  # giga_flusionunion.014.desc:0 "News have reached us that the arthropoid §YKronks§! of §YFlusion§! (which they renamed to... Kronk), have recently developed their very first FTL engines!\n\nFollowing a period of military and technological buildup following their takeover of §YKronk§!, the §YKronks§! of §YKronk§!, led by §YKronk§!, have consolidated their rule over the planet.\n\nTheir extremely high birthrates allowed them to rapidly repopulate parts of the planet devastated by the war, and it seems they are now looking to spread their kind into the stars, as we are receiving a transmission from them..."
  # giga_flusionunion.014.a:0 "Kronk?"
  
  # giga_flusionunion.015.name:0 "Kronk"
  # giga_flusionunion.015.desc:0 "I am §YKronk§!, ruler of §YKronk§! and the §YKronks§! on the planet of §YKronk§!.\n\nAs you have most likely noticed, my kind has recently achieved FTL travel, and we are subsequently demanding that you transfer the §YJublio§! system to us.\n\nFailure to comply will result in your immediate termination by the Kronks."
  # giga_flusionunion.015.a:0 "You can have it."
  # giga_flusionunion.015.a.tooltip:0 "We will §Ytransfer§! the §YJublio§! system to the §YUnited Flusionian States§!."
  # giga_flusionunion.015.a.response:0 "The Kronks thank you."
  # giga_flusionunion.015.b:0 "To hell with you Kronks!"
  # giga_flusionunion.015.b.tooltip:0 "§YKronk§! will likely §Rdeclare war§! on us!"
  # giga_flusionunion.015.b.response:0 "The Kronks will not forgive you for this."
  
  # giga_flusionunion.016.name:0 "Kronks goes to War!"
  # giga_flusionunion.016.desc:0 "Alarming news! Following our refusal to hand over the §YJublio§! system to them, the Kronk government has forcefully seized the system, and subsequently declared war on us.\n\nThey have also claimed a colossal amount of territory surrounding Jublio. It appears they weren't messing around with their demands, as hordes of Kronk ships are already mobilizing for war."
  # giga_flusionunion.016.a:0 "Those damned Kronks!"
  
  # giga_flusionunion.017.name:0 "The Kronks"
  # giga_flusionunion.017.desc:0 "News have reached us that the primitive world of §YFlusion§! has achieved FTL travel. While primitives reaching the space age is normally of little concern, this civilization of arthropoid §YKronks§! is actually quite advanced, and developed rather heavily prior to inventing the Hyperdrive.\n\nAs such, they are now entering the galactic stage with weaponry and equipment that might very well rival our own. It might be prudent to tread with caution when dealing with this new galactic contender."
  # giga_flusionunion.017.a:0 "Interesting... Kronk?"
  
  ###HKE###
  giga_hke.002.name:0 "O Sagrado Império Katzen"
  giga_hke.002.desc:0 "Pode-se supor que, após o desaparecimento de§YKaiser§! com o colapso de§YKatzenartig Imperium§ !, ele seria lembrado como um covarde ou traidor, que abandonou seu próprio povo quando eles mais precisavam dele. Mas, surpreendentemente, parece que o oposto completo acabou acontecendo. \n \nNa verdade, possivelmente devido ao desenvolvimento de um enorme culto à personalidade pelo Kaiser, uma espécie de "Culto ao Kaiser" começou a se desenvolver dentro da miríade de§YKatzen Splinter States§ !. A população e a liderança dessas nações começaram a praticamente "adorá-lo", com alguns alegando que ele "voltaria e corrigiria os erros que foram cometidos com a espécie Katzen". \n \nTalvez ainda mais surpreendente é que esses estados fragmentados se reuniram em uma federação gigantesca, embora vagamente limitada, o§YHoly Katzen Empire§ !. Este "HKE" aparentemente visa terminar o trabalho iniciado pelo Kaiser e garantir a continuidade de Katzen pode na galáxia. \n \nAtualmente liderado pelo§Y [giga_hke_leader.GetName]§ !, a "Nação Kaiser" do HKE, esta confederação supranacional provavelmente destruirá qualquer esperança de paz duradoura que a galáxia possa ter tido após a derrota do Kaiser ... "
  giga_hke.002.a:0 "Interessante. Eles estão de volta para mais, ao que parece."
  giga_hke.002.a.tooltip:0 "O§YHoly Katzen Empire§! se formou, consistindo na maioria dos§YKatzen Splinter States§!. \nPodemos contatá-los na§YLista de Contatos§ !, embora sejam relativamente§Rhostile§! Para nós, pois fomos nós que vencemos o§YKaiser§ !. "
  
  hke_federation:0 "Império Sagrado de Katzen"
  hke_federation_desc:0 "O mbrasas desta federação desejam reafirmar o antigo poder do Império Katzenartig dentro da galáxia e ter sucesso em realizar a visão do Kaiser. "
  
  hke_country:0 "Império Sagrado de Katzen"
  hke_country_desc:0 "Uma organização supranacional estabelecida pelos restos do colapso do Império Katzenartig."
  
  giga_hke.0010.name:0 "O Império Sagrado de Katzen"
  giga_hke.centra.0:0 "§YHKE Centralização:§! 1 | Baixo"
  giga_hke.centra.0.tooltip:0 "§RHKE Membros interessados:§! \n§YNenhum.§!"
  
  giga_hke.centra.1:0 "§YHKE Centralização:§! 2 | Médio"
  giga_hke.centra.1.tooltip:0 "§RHKE Buffs de Estados Membros:§! \n§Y+10% Taxa de Incêndio do Navio \n+10% HP do Casco \n+10% HP da Armadura \n+10% Saúde do Exército§ ! "
  
  giga_hke.centra.2:0 "§YHKE Centralização:§! 3 | Alta"
  giga_hke.centra.2.tooltip:0 "§RHKE Buffs de Estados Membros:§! \n§Y+25% Taxa de Incêndio do Navio \n+25% HP do Casco \n+25% HP da Armadura \n+25% Saúde do Exército§ ! "
  
  giga_hke.centra.3:0 "§YHKE Centralização:§! 4 | Extremo"
  giga_hke.centra.3.tooltip:0 "§RHKE Buffs de Estados Membros:§! \n§Y+50% Taxa de Incêndio do Navio \n+50% HP do Casco \n+50% HP da Armadura \n+50% Saúde do Exército§ ! "
  
  giga_hke.0021.name:0 "Centralização HKE aumenta!"
  giga_hke.0021.desc:0 "Após uma série de reformas recentes, o ainda relativamente jovem§YHoly Katzen Empire§! conseguiu aumentar sua centralização administrativa. \n \nIsso levará a um aumento da eficiência burocrática nos Estados Fragmentos de Katzen, que por sua vez, fortalecerá suas frotas e exércitos, pois será mais fácil para as nações alocar recursos para eles. "
  giga_hke.0021.a:0 "Interessante."
  giga_hke.0021.a.tooltip:0 "§YHKE Centralização§!§Aumenta§! para§YMedium§ !."
  
  giga_hke.0023.name:0 "Centralização HKE aumenta!"
  giga_hke.0023.desc:0 "Graças à incrível cooperação internacional, o§YHoly Katzen Empire§! conseguiu aumentar mais uma vez a sua centralização administrativa. \n \nIsso irá, como da última vez, levar a um maior aumento da eficiência burocrática dentro do Katzen Splinter States, que por sua vez fortalecerá suas frotas e exércitos, à medida que as nações começarem a compartilhar mais e mais de seus recursos. "
  giga_hke.0023.a:0 "Interessante."
  giga_hke.0023.a.tooltip:0 "§YHKE Centralização§!§Aumenta§! para§YHigh§ !."
  
  giga_hke.0025.name:0 "Centralização HKE aumenta!"
  giga_hke.0025.desc:0 "No que é praticamente um milagre burocrático, o§YHoly Katzen Empire§! conseguiu aumentar mais uma vez sua centralização administrativa. \n \nUma vez mais, isso levará a um grande aumento da eficiência burocrática dentro de Katzen Estados fragmentados, que por sua vez fortalecerão suas frotas e exércitos, à medida que o poder administrativo e militar comece a girar cada vez mais em torno da§YKaiser Nation§ do HKE !. "
  giga_hke.0025.a:0 "Isso está ficando preocupante."
  giga_hke.0025.a.tooltip:0 "§YHKE Centralização§!§Aumenta§! para§YExtreme§ !."
  
  giga_hke.0010.desc.a:0 "Flusion é nosso por direito. O Kaiser exige que o reivindiquemos em seu nome."
  giga_hke.0010.desc.b:0 "O Kaiser retornará. \n \nVerifique seu relógio, pois ele está cada vez mais perto de sua chegada. \n \nNós suportaremos."
  giga_hke.0010.desc.c:0 "O Kaiser está conosco. Ele também está com você?"
  giga_hke.0010.desc.d:0 "Um dia, a galáxia será unida mais uma vez."
  giga_hke.0010.desc.e:0 "O Kaiser nos incumbiu de continuar seu grande projeto. \n \nNão queremos decepcioná-lo."
  giga_hke.0010.desc.f:0 "Opor-se à vontade do Kaiser foi seu erro mais grave, [root.GetName]."
  
  giga_hke.president:0 "§YHKE Kaiser Nation§ !: [giga_hke_leader.GetName]"
  giga_hke.membercount:0 "§YHKE Member Count§ !: [global_event_country.hke_member_count]"
  
  giga_hke.1001.name:0 "Santo Império Katzen: Nova Nação Kaiser"
  giga_hke.1001.desc:0 "Após infelizes acontecimentos relativos à anterior Nação Kaiser, o§Y [giga_hke_leader.GetName]§! assumiu o manto da§YKaiser Nation§! do HKE e agora lidera o§YHoly Katzen Empire§! ! em sua busca para restaurar a glória de Katzen. "
  giga_hke.1001.a:0 "Interessante."
  
  giga_hke.1002.name:0 "O Santo Império Katzen"
  giga_hke.1002.desc:0 "Após a morte prematura de sua§YKaiser Nation§ anterior !, o§YHoly Katzen Empire§! está atualmente em processo de designar um novo e não aceitará comunicações. Este processo pode levar para cima de um mês. "
  giga_hke.1002.a:0 "Oh, que pena."
  
  giga_hke.0027.name:0 "Sagrados Refederados do Império Katzen!"
  giga_hke.0027.desc:0 "Em um feito sem precedentes de cooperação, destreza burocrática e dedicação ao Kaiser, a miríade de Katzen Splinter States que formaram o§YHoly Katzen Empire§! decidiram finalmente deixar de lado quaisquer diferenças que possam ter tido , e se federaram em um superestado galáctico! \n \nNa verdade, praticamente todo o Império Sagrado de Katzen foi agora fundido em uma entidade supranacional singular, centrada em torno da antiga§YKaiser Nation§ do HKE!. \n \nSeu governante,§ Y [hkekaiser.GetName]§ !, proclamou-se o "sucessordo Kaiser ", e prometeu empregar todo o poder do HKE agora unido para afirmar o poder dos Katzens e de todas as espécies constituintes do HKE sobre a galáxia, a fim de cumprir a visão do Kaiser. \n \nAfirmante este superestado relatou que empregou seus recursos reunidos para montar duas armadas enormes, conhecidas como§YHelligekatzarmadas§ !, cada uma apresentando um corpo celestial temível armado: A§YKaiser Moon§ !! \n \nEles também reivindicaram a maior parte do espaço vazio ao redor de suas terras, e mesmo que alguns Estados Fragmentos tenham§Rrefuso§! para federalizar, para todos os efeitos e propósitos, o§YKatzenartig Imperium§! efetivamente retornou ... "
  giga_hke.0027.a:0 "Isso ... não é bom. Eles realmente não vão desistir."
  giga_hke.0027.a.tooltip:0 "A maior parte do§YHoly Katzen Empire§! se federou em uma poderosa entidade singular. \n§REles provavelmente tentarão recuperar a terra perdida do Império.§!"
  
  civic_spirit_of_the_kaiser:0 "Espírito do Kaiser"
  civic_spirit_of_the_kaiser_desc:0 "O Império Sagrado de Katzen se federou, recriando efetivamente o Império Katzenartig. Eles estão empregando armamento Katzen avançado aprimorado com as tecnologias mais recentes para aumentar sua força ao máximo. \n§BEles estão determinados a terminar o que o Kaiser começou .§! "
  
  origin_hke:0 "Império Sagrado de Katzen"
  origin_hke_desc:0 "Esta civilização é o resultado de uma miríade de estados fragmentados tentando reformar o Império de Katzenartig."
  
  giga_hke.0029.name:0 "As Guerras de Reclamação"
  giga_hke.0029.desc:0 "Notícias alarmantes! Pouco depois de sua federalização, o§YHoly Katzen Empire§! decidiu pegar em armas contra todos os§Yindependent§! Katzen Splinter States, a fim de unificar o Império mais uma vez. \n \nEmbora não devamos ser afetados diretamente por esta "Rückgewinnungskrieg" ou "Guerra de Recuperação", devemos, no entanto, ficar de olho nesses revanchistas imperiais, pois eles provavelmente voltarão sua atenção para nós depois ... "
  giga_hke.0029.a:0 "Ups."
  giga_hke.0029.a.tooltip:0 "O§YHoly Katzen Empire§! declarou§Rdeclarou guerra§! em todos os restantes Katzen Splinter States independentes."
  
  giga_hke.0011.name:0 "O Império Sagrado de Katzen"
  giga_hke.0011.desc:0 "[root.GetName]! Você está de posse do§YJublio System§ !, um lugar sagrado para nós, pois é onde o Kaiser originalmente começou suas grandes conquistas. \n \nPortanto, exigimos que você nos dê o sistema de uma vez, para que nosso império possa ser novamente inteiro. \n \nPodemos fornecer§Y25000§!£energy£para compensar, mas esteja avisado de que não hesitaremos em atacar sua espécie se você não cooperar. "
  giga_hke.0011.a:0 "Muito bem, pode ficar com você."
  giga_hke.0011.a.tooltip:0 "Iremos§Ytransferir§! o sistema§YJublio§! para o§YHoly Katzen Empire§ !."
  giga_hke.0011.b:0 "O Império entrou em colapso há décadas, siga em frente!"
  giga_hke.0011.b.tooltip:0 "O§YHoly Katzen Empire§! vai§Reclarar guerra§! contra nós!"
  
  opinion_ended_kaiser:99 "Vanquished the Kaiser"
  
