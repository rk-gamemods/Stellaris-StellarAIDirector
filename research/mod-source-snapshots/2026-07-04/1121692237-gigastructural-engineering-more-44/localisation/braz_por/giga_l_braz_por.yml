  #########################################
  ### Nicoll Dyson Beam ###################
  #########################################
  giga_tech_ndb_1:0 "Capacitores de potência hiperenergéticos em fase"
  giga_tech_ndb_1_desc:0 "Armazenar enormes quantidades de energia em uma megaestrutura de tamanho estelar poderia ter aplicações incrivelmente úteis."
  
  giga_tech_ndb_2:0 "Lentes cristalinas com hiperfocagem macroescala"
  giga_tech_ndb_2_desc:0 "Avanços nas tecnologias cristalinas podem levar a uma variedade de lentes novas e incrivelmente eficientes, capazes de focalizar quantidades imensas de energia."
  
  giga_tech_ndb_3:0 "Geração de buraco de minhoca interestelar artificial"
  giga_tech_ndb_3_desc:0 "A capacidade de gerar buracos de minhoca em grandes distâncias pode melhorar muito nossa capacidade de transmitir grandes quantidades de energia através das estrelas."
  
  giga_tech_ndb_4:0 "Redirecionamento de energia Gigascale ofensiva"
  giga_tech_ndb_4_desc:0 "Usando tecnologias incrivelmente avançadas, é possível focar completamente a saída de uma estrela inteira em um feixe de pura destruição."
  
  giga_dialog.3201.name:0 "$name_ndb$Canteiro de obras construído"
  giga_dialog.3201.desc:0 "O canteiro de obras de um futuro$name_ndb$foi concluído. Esta plataforma servirá como base para começar a construir um$name_ndb$capaz de aniquilar sistemas inteiros."
  giga_dialog.3201.a:0 "Maravilhoso."
  
  giga_dialog.3202.name:0 "$name_ndb$Magneto-Collector construído"
  giga_dialog.3202.desc:0 "O magneto-coletor de$name_ndb$está concluído. É uma construção massiva construída em torno da estrela, capaz de coletar e manipular sua energia usando campos magnéticos avançados e modulação gravitacional."
  giga_dialog.3202.a:0 "Maravilhoso."
  
  giga_dialog.3203.name:0 "$name_ndb$Stellar-Redirector Construído"
  giga_dialog.3203.desc:0 "Nosso Redirecionador Estelar de$name_ndb$foi concluído!ng já visto nesta galáxia, e é capaz de redirecionar e manipular facilmente a energia cataclísmica da estrela. Ainda precisamos construir as matrizes de foco para disparar o$name_ndb$. "
  giga_dialog.3203.a:0 "Excelente!"
  
  giga_dialog.3204.name:0 "$name_ndb$Estabilizadores de hiperescala construídos"
  giga_dialog.3204.desc:0 "Outro passo para a conclusão de nossa super arma galáctica. Os estabilizadores de hiperescala$name_ndb$são grandes estruturas circulares em anel construídas dentro do Redirecionador Estelar, que garantem que o imenso fluxo de energia não destrua o megaestrutura em si. Agora, tudo o que resta fazer é construir as matrizes de foco ... "
  giga_dialog.3204.a:0 "Estamos perto."
  
  giga_dialog.3205.name:0 "$name_ndb$Concluído!"
  giga_dialog.3205.desc:0 "Hoje é um grande dia para a nossa espécie e império. Nosso$name_ndb$foi concluído. Esta hiper-arma absolutamente massiva pode esterilizar planetas à distância e potencialmente destruir sistemas inteiros. É provavelmente uma das mais poderosas construções já construídas na história galáctica, e seu poder absoluto deve garantir a nossa dominação galáctica. "
  giga_dialog.3205.a:0 "Que nossos inimigos se encolham de medo."
  
  giga_ndb.002.name:99 "$name_ndb$"
  giga_ndb.002.desc:0 "O$name_ndb$está pronto para disparar. O que devemos visar?"
  giga_ndb.002.a:0 "Hostil"
  giga_ndb.002.b:0 "Neutro"
  giga_ndb.002.c:0 "Amigável"
  giga_ndb.002.e:0 "Cancelar"
  giga_ndb.003.desc:0 "Qual país você gostaria de segmentar?"
  giga_ndb.003.a:0 "Nenhum país (espaço vazio)"
  
  giga_ndb.004.desc:0 "Que tipo de estrela do referido país você gostaria de segmentar?"
  giga_ndb.005.desc:0 "Qual sistema especificamente você gostaria de ter como alvo?"
  giga_ndb.006.desc:0 "Você gostaria de ter como alvo o sistema inteiro ou um corpo planetário dentro do referido sistema?"
  giga_ndb.006.a:0 "Direcione o sistema"
  giga_ndb.006.cantnukeowncaptialsystem:0 "Não é possível direcionar nosso próprio sistema de capital."
  giga_ndb.system:0 "O$name_ndb$está disparando através do Warp Gate. Um sistema solar inteiro logo será engolfado por energias cataclísmicas, terminando tudo dentro do poço gravitacional da estrela."
  
  giga_ndb.006.b:0 "Mirar em um planeta"
  giga.ndb.novalidtargets:0 "Não há alvos válidos neste sistema."
  giga_ndb.007.desc:0 "Qual planeta dentro do sistema você gostaria de mirar?"
  
  giga_ndb.008.desc:0 "Agora estamos prontos para disparar o$name_ndb$em nosso alvo designado. Com que força devemos atingir o planeta? \n \n§H$giga_ndb.008.a$§! \n$giga_ndb .008.a.tooltip$\n \n§H$giga_ndb.008.b$§! \ N$giga_ndb.008.b.tooltip$\n \n§H$giga_ndb.008.c$§! \ N$giga_ndb.008.c.tooltip$\n \n§H$giga_ndb.008.d$§! \n$giga_ndb.008.d.tooltip$"
  
  giga_ndb.008.a:0 "Quebre o planeta"
  giga_ndb.008.a.tooltip:0 "O planeta alvo será totalmente devastado e estilhaçado em pedaços. \nHabitats são obliterados. \n Segmentos do mundo circular estão arruinados. \nGas gigantes são eliminados de sua atmosfera. \nGerará um depósito de 10£minerais£"
  
  giga_ndb.008.b:0 "Derreta a superfície do planeta"
  giga_ndb.008.b.tooltip:0 "A superfície do planeta alvo será derretida, transformando-o em um deserto derretido. \nHabitats são obliterados. \n Segmentos do mundo circular estão arruinados. \n Gigantes de gás habitável tornam-se hostis novamente. \nGerará um depósito de 1£giga_sr_iodizium£"
  
  giga_ndb.008.c:0 "Esterilizar o planeta"
  giga_ndb.008.c.tooltip:0 "O planeta alvo será esterilizado, transformando-o em um planeta estéril. \nHabitats são obliterados. \n Segmentos do mundo circular estão arruinados. \n Gigantes gasosos habitáveis ​​são tornados hostis novamente. \nPodem ser terraformados de volta em um mundo habitável. "
  
  giga_ndb.008.d:0 "Arruinar a infraestrutura"
  giga_ndb.008.d.tooltip:0 "O planeta alvo será danificado, transformando-o em um Mundo Temperado Sem Vida e aumentando o nível de Devastação Planetária para 100%."
  
  nicoll_beam_0:0 "Canteiro de obras de$name_ndb$"
  nicoll_beam_0_DESC:0 "O canteiro de obras de um futuro$name_ndb$, abrigando a infraestrutura necessária para construir esta super arma titânica."
  nicoll_beam_0_MEGASTRUCTURE_DETAILS:0 "Uma super arma de escala sem precedentes, capaz de destruir sistemas inteiros.§Todos os planetas do sistema serão destruídos§!" #megalistentry NICOLL DYSON BEAM
  
  nicoll_beam_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - §YNeutron Stars§! created by a §YFusion Suppressor§! are fit for a §YNidavellir Hyperforge§!, but those created by a §YNicoll-Dyson Beam§! are not. Can be configured to destroy either §YIndividual Planets§! or §YEntire Systems§!, but will likely §RANGER§! the rest of the galaxy"
  
  nicoll_beam_1:0 "$name_ndb$Magneto-Collector"
  nicoll_beam_1_DESC:0 "Esta estrutura massiva envolvendo uma estrela usa campos magnéticos especializados para controlar e redirecionar a produção energética da estrela para explorá-la."
  
  nicoll_beam_2:0 "$name_ndb$Redirecionador Estelar"
  nicoll_beam_2_DESC:0 "Esta construção massivamente massiva, diminuindo quase tudo que já foi construído nesta galáxia, é capaz de armazenar e manipular a produção de energia cataclísmica da estrela."
  
  nicoll_beam_3:0 "$name_ndb$Estabilizadores de hiperescala"
  nicoll_beam_3_DESC:0 "Os anéis recentemente construídos dentro do Redirecionador Estelar servem ao propósito de estabilizar a energia que flui através do redirecionador, para evitar a detonação da megaestrutura acidentalmente."
  
  nicoll_beam_4:99 "$name_ndb$"
  nicoll_beam_4_DESC:0 "Um$name_ndb$completo e operacional. Ele é capaz de focarcante a energia de uma estrela em um feixe hiperenergético que pode destruir sistemas estelares inteiros. "
  
  nicoll_beam_ready:99 "$nicoll_beam_4$"
  nicoll_beam_ready_DESC:99 "$nicoll_beam_4_DESC$"
  nicoll_beam_ready_MEGASTRUCTURE_DETAILS:99 "$nicoll_beam_4_DESC$"
  
  nicoll_beam_side_gate_closed:0 "Gerador de buraco de minhoca"
  nicoll_beam_side_gate_open:0 "Gerador de buraco de minhoca"
  
  nicoll_beam_targetting:0 "Selecione um alvo"
  nicoll_beam_targetting_DESC:99 "$nicoll_beam_4_DESC$"
  
  nicoll_beam_cooldown:0 "$nicoll_beam_4$(§RCooldown§!)"
  nicoll_beam_cooldown_DESC:99 "$nicoll_beam_4_DESC$"
  nicoll_beam_cooldown_MEGASTRUCTURE_DETAILS:99 "$nicoll_beam_4_DESC$"
  
  nicoll_beam_firing:0 "$name_ndb$(§BFiring§!)"
  nicoll_beam_firing_DESC:0 "Este$name_ndb$está disparando!"
  
  nicoll_beam_recharge_after_system:99 "$nicoll_beam_4$"
  nicoll_beam_recharge_after_system_DESC:99 "$nicoll_beam_4_DESC$"
  nicoll_beam_recharge_after_crack:99 "$nicoll_beam_4$"
  nicoll_beam_recharge_after_crack_DESC:99 "$nicoll_beam_4_DESC$"
