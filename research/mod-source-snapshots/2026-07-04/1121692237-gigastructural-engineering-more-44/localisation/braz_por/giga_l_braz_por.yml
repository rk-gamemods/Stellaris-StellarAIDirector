  # giga_accelerator.141.a:0 "Marvelous!"
  #
  # giga_acc_intensity_up:0 "§YIncrease§! this megastructure's intensity."
  # giga_acc_intensity_down:0 "§YDecrease§! this megastructure's intensity."
