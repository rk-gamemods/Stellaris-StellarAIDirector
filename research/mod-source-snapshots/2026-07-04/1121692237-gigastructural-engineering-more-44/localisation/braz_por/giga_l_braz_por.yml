  giga_flavor.999.name:0 "Atualização Gigastructures: Novos recursos"
  giga_flavor.999.desc:0 "Saudações! Gigastructures foi atualizado recentemente, trazendo novos recursos de personalização para o§YAcelerador de Partículas Estelar§! e o§YLunar Speculorefractor§ !. A atualização não quebra salvos, mas você pode ter que selecionar os megas e clique no botão "Gerenciar" para aplicar adequadamente os novos recursos. \n \nObrigado por ler e divirta-se! "
  giga_flavor.999.a:0 "Compreendido."
  
  giga_bulk_matter_cost_disabled:99 "£menu_disabled£Megastructure Bulk Matter Cost\n\nShould large megastructures cost £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! and thus require dismantling multiple planets for materials?\n\nApplies to the §YRingworld§!, §YMatrioskha Brain§!, §Y$name_alderson$§!, §YBirch World§!, §YQuasi-Stellar Obliterator§!, §YSupermassive E.H.O.F.§! and the §YNicoll-Dyson Beam§!.\n\nIf disabled, then £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! will only be needed for Celestial Printing."
  giga_bulk_matter_cost_enabled:99 "£menu_enabled£Megastructure Bulk Matter Cost\n\nShould large megastructures cost £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! and thus require dismantling multiple planets for materials?\n\nApplies to the §YRingworld§!, §YMatrioskha Brain§!, §Y$name_alderson$§!, §YBirch World§!, §YQuasi-Stellar Obliterator§!, §YSupermassive E.H.O.F.§! and the §YNicoll-Dyson Beam§!.\n\nIf disabled, then £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! will only be needed for Celestial Printing."
  
  giga_planet_bulking_disabled:99 "£menu_disabled£Planetary Bulking\n\nShould £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! be able to be used to enlarge §YUninhabitable Rocky Planets§! up to §YSize 30§! and make §YGas Giants§! heliformable."
  giga_planet_bulking_enabled:99 "£menu_enabled£Planetary Bulking\n\nShould £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! be able to be used to enlarge §YUninhabitable Rocky Planets§! up to §YSize 30§! and make §YGas Giants§! heliformable."
  
  giga_celestial_printing_disabled:0 "£menu_disabled£Fabricantes de Lua de Ataque \nDeve que Luas de Ataque possam ser" impressas "com o Macrofabricante Lunar e sua mecânica associada ou não. Desativar remove a§YCelestial Conjunto de Navio de Guerra§! Benefício de Ascensão."
  giga_celestial_printing_enabled:0 "£menu_enabled£Fabricantes de Lua de Ataque \nDeve que Luas de Ataque possam ser" impressas "com o Macrofabricante Lunar e sua mecânica associada ou não. A desativação remove a§YConjunto de Navio de Guerra Celestial§! Perk Ascensão."
  
