  #intact
  kaiser_moon_barrel_tooltip:0 "§YRiesigekatzenwaffe§! \n \n§GFuncional | Sem penalidades por danos§! \n \nRequisitos de sabotagem: \n§HSactividade partidária significativa em Mercurreich§! \n§HSactividade partidária significativa em Geschwollen§! \n \n§L A arma principal da Lua Kaiser é uma arma de fogo titânica. Com base em antigos designs de Katzen para armamento planetário, ela acelera um projétil extremamente denso próximo à velocidade da luz. O projétil contém a energia de vários bilhões de ogivas nucleares concentradas em um único ponto, renderizando é incrivelmente mortal.§! "
  
  kaiser_moon_moon_tooltip:0 "§YMondkruste§! \n \n§GFuncional | Sem penalidades de armadura§! \n \nRequisitos de sabotagem: \n§HS Atividades Partidárias Significativas em Katzen Herzlands \n§HS Atividades Partidárias Significativas em Lyuinstaat \n \n§Várias quilômetros de rochas entrelaçadas com suportes estruturais protegem o delicado interior da Lua. Essa crosta espessa garante ao navio uma enorme capacidade de sobrevivência quando confrontado com frotas inimigas. "
  
  kaiser_moon_thrusters_tooltip:0 "§YSistemas de movimento§! \n \n§GFuncional | Sem penalidades de tempo de carga de salto§! \n \nRequisitos de cabotagem: \n§RExtreme Partisan Activity em Linteria§! \n§YAtividade Partisan Moderada em Arivoejien§! \ O propulsor gigantesco do n \n§LA combinado com um hiperpropulsor colossal permite que a Lua Kaiser voe através do espaço e do hiperespaço. Alimentados por um reator de antimatéria avançado dos designs de Katzen, eles superam qualquer coisa empregada nas Forças Armadas de Katzen. BA Lua Kaiser perderá a capacidade de lembrar quando Flusion é ameaçada se isso for sabotado!§! "
  
  kaiser_moon_wings_tooltip:0 "§YVakuumwings§! \n \n§GFuncional | Sem penalidades de velocidade§! \n \nRequisitos de Sabotagem: \n§YAtividades Partidárias Moderadas em Linteria§! \n§Rextreme Atividade Partidária em Arivoejien§! \n \n§L Estas asas podem parecer inúteis no início, mas na verdade elas contêm uma série de propulsores alinhados ao longo de sua extremidade traseira. Esses propulsores ajudam a lua a manobrar através do espaço com maior facilidade. "
  
  #sabo
  kaiser_moon_barrel_sabo_tooltip:0 "§YRiesigekatzenwaffe§! \n \n§RSabotaged | -30% dano de armas§! \n \n§L A arma principal da Lua Kaiser é uma arma ferroviária titânica. Baseado em antigos designs de Katzen para armamento planetário, ele acelera extremamente projétil denso próximo à velocidade da luz. O projétil embala a energia de vários bilhões de ogivas nucleares concentradas em um único ponto, tornando-o incrivelmente mortal. "
  
  kaiser_moon_moon_sabo_tooltip:0 "§YMondkruste§! \n \n§RSabotaged | -40% blindagem HP§! \n \n§LSvários quilômetros de rochas entrelaçadas com suportes estruturais protegem o delicado interior da lua. Esta crosta espessa concede efetivamente ao navio uma imensa capacidade de sobrevivência quando confrontado com frotas inimigas. "
  
  kaiser_moon_thrusters_sabo_tooltip:0 "§YSistemas de movimento§! \n \n§RSabotado |+500% tempo de carga de salto§! \n \n§LA propulsor gigantesco emparelhado com um hiperdrive colossal permite que a Lua Kaiser voe através do espaço e do hiperespaço. por um reator de antimatéria avançado de projetos de Katzen, eles superam qualquer outra coisa empregada nas Forças Armadas de Katzen. \n \n§B A Lua Kaiser não consegue mais se lembrar se a Flusão está ameaçada.§! "
  
  kaiser_moon_wings_sabo_tooltip:0 "§YVakuumwings§! \n \n§RSabotado | -40% velocidade do sublight§! \n \n§L Estas asas podem parecer inúteis no início, mas na verdade contêm uma série de propulsores alinhados ao longo de sua parte traseira fim. Esses propulsores ajudam a lua a manobrar através do espaço com maior facilidade. "
  
  kaiser_moon_destroyed_tooltip:0 "A Lua Kaiser foi destruída! \n \nOs Katzens agora sofrem de -50%§Danos do YArmy§ !, -50%§Velocidade da nave§ !, -50%§YTaxa de incêndio§! e -50%§ Danos de bombardeio§ !. "
  
  #events
  giga_katrebels.2120.name:0 "Kaiser Moon Sabotage bem-sucedido!"
  giga_katrebels.2120.desc:0 "Os partidários de Flusionian relatam que a operação para incapacitar o§Y [katzen_name_tool.GetName]§! foi exatamente como planejado! Seus agentes conseguiram realizar a sabotagem, que infligirá§Ypenas§! nos Katzens enquanto trabalham para consertar o§Y [katzen_name_tool.GetName]§!. \n \nOs Katzens, no entanto, notaram a sabotagem e imediatamente promulgaram medidas antipartidárias mais rígidas, aumentando subsequentemente seu§Aviso§! por§R2§!. \n \nA chance de sucesso era§Y [flusion_primitives_country.flusion_operation_odds]%§! "
  giga_katrebels.2120.a:0 "Maravilhoso!"
  giga_katrebels.2120.a.tooltip:0 "Katzen cautela§Rincreases§! por§R2§ !."
  
  giga_katrebels.2121.name:99 "Kaiser Moon Sabotage Failed!"
  giga_katrebels.2121.desc:0 "Os guerrilheiros flusionianos relatam que a operação para incapacitar o§Y [katzen_name_tool.GetName]§! falhou. Seus agentes e todo o material que pretendiam enviar ilicitamente para a lua foram interceptados por soldados Katzen antes deles foram até mesmo capazes de decretar a sabotagem, frustrando assim toda a operação. \n \nA chance de sucesso era§Y [flusion_primitives_country.flusion_operation_odds]%§! "
  giga_katrebels.2121.a:0 "Maldições!"
  giga_katrebels.2101.a.tooltip:0 "Katzen cautela§Rincreases§! por§R1§ !."
  
  giga_katrebels.2020.name:0 "Sabotando§YRiesigekatzenwaffe§ do Kaiser Moon!"
  giga_katrebels.2020.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! em uma missão para danificar a arma principal da Kaiser Moon. \n \nCom o controle de§YGeschwollen§! e§YMercurreich§ !, e com um quantidade de subornos, eles poderão substituir os cartuchos de munição destinados aos§YRiesigekatzenwaffe§! por outros falsificados equipados com explosivos para detonar sempre que chegarem à lua. \n \n§Se bem-sucedido§!: \nA Lua Kaiser irá sofrerá de§Y-35% dos danos das armas§! e§Y-50% da taxa de fogo§! por§Y3 anos§!. \nKatzen Wariness irá§Rincrease§! por§R2§!. \n \n§YSe falhar§ !: \nKatzen Wariness vai§Rincrease§! por§R1§!. \n \n§YChance of success§!: \nBase:§Y85%§! \n§HKatzen Wariness§ !:§R- [flusion_primitives_country.katzen_wary_perc ]%§! \ NTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2020.a:0 "Use 4§BResistance Resources§! ([flusion_primitives_country.flusion_success_chance_total]% chance de sucesso)"
  giga_katrebels.2020.b:0 "Esqueça."
  
  giga_katrebels.2021.name:0 "Sabotando§YMondkruste§ do Kaiser Moon!"
  giga_katrebels.2021.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! em uma missão para danificar a crosta planetária da Lua Kaiser. \n \nCom o controle de§YKatzen Herzlands§! e§YLyuinstaat§ !, e com com uma quantidade considerável de subornos, eles poderão infiltrar-se em agentes duplos fingindo ser trabalhadores de manutenção, que colocarão explosivos dentro de pontos estruturais dentro da crosta. \n \n§YSe bem-sucedidos§!: \nA Lua Kaiser sofrerá de§ Y-40% da armadura HP§! Por§Y3 anos§!. \ NKatzen Wariness irá§Rincrease§! Por§R2§!. \ N \n§YSe falhar§!: \ NKatzen Wariness vai§Rincrease§! Por§R1§!. \ N \n§YChance of success§!: \ NBase:§Y85%§! \ N§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \ NTotal:§Y [flusion_primitives_country_cotaltry.flusion_success_ ]%§! "
  
  giga_katrebels.2022.name:0 "Sabotando os§YSistemas de Movimento§ do Kaiser Moon!"
  giga_katrebels.2022.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! em uma missão para danificar os sistemas de movimento da Lua Kaiser. \n \nCom o controle de§YLinteria§! e§YArivoejien§ !, e com uma quantidade de subornos, eles serão capazes de destruir instalações vitais que produzem os componentes avançados necessários para manter o impulso de salto da lua. \n \n§YSe bem-sucedido§!: \nA Lua Kaiser sofrerá de§Y+500% do tempo de carga de salto§! Por§Y3 anos§! E perderá a capacidade de§Yrecall§! Para Flusion se for bombardeado ou invadido. \ NKatzen Wariness vai§Rincrease§! Por§R2§!. \ N \n§YSe falhar§ !: \nKatzen Wariness vai§Rincrease§! por§R1§!. \n \n§YChance of success§!: \nBase:§Y85%§! \n§HKatzen Wariness§ !:§R- [flusion_primitives_country.katzen_wary_perc ]%§! \ NTotal:§Y [flusion_primitives_country.flusion_success_chance_total]%§! "
  
  giga_katrebels.2023.name:0 "Sabotando a Lua Kaiser§YVakuumwings§!"
  giga_katrebels.2023.desc:0 "Podemos apoiar os§YRoqualian Freedom Fighters§! em uma missão para danificar as ... asas da Kaiser Moon. \n \nCom o controle de§YLinteria§! e§YArivoejien§ !, e com uma quantidade saudável de subornos, eles serão capazes de sabotar as instalações que produzem o combustível e a energia necessários para alimentar os propulsores de manobra da asa. \n \n§YSe bem-sucedido§!: \nA Lua Kaiser sofrerá de§Y-40 % sublight speed§! para§Y3 anos§! \nKatzen Wariness irá§Rincrease§! por§R2§!. \n \n§YSe falhar§!: \nKatzen Wariness irá§Rincrease§! por§R1§!. \n \n§YChance of success§!: \nBase:§Y85%§! \n§HKatzen Cautela§ !:§R- [flusion_primitives_country.katzen_wary_perc]%§! \nTotal:§Y [flusion_primitives_country.flusion_success_chance]%§ "
  
