  giga_katrebels.2003.name:0 "Adquirindo§BRrecursos de resistência§!"
  giga_katrebels.2003.desc:0 "Os§YRoqualian Freedom Fighters§! precisam de recursos se quiserem lutar com eficiência contra os opressores Katzen. \n \nPodemos apoiá-los secretamente dando-lhes fundos, armas ou exercendo nossa influência dentro do§YKatzenartig Imperium§! na forma de propaganda ou discursos ilícitos. \n \nTambém podemos escolher apoiá-los em um ataque contra os Katzens para obter recursos, mas isso pode sair pela culatra. "
  giga_katrebels.2003.a:0 "Envie-lhes fundos. |§Y7500§!£energy£"
  giga_katrebels.2003.a.tooltip:0 "Enviaremos fundos aos Roqualianos, concedendo 1§BRRecurso de resistência§ !."
  giga_katrebels.2003.b:0 "Dê-lhes armas. |§Y1500§!£alloys£"
  giga_katrebels.2003.b.tooltip:0 "Vamos contrabandear armas para os Roqualianos, concedendo 1§BRRecurso de resistência§ !."
  giga_katrebels.2003.c:0 "Exercer a nossa influência. |§Y75§!£influência£"
  giga_katrebels.2003.c.tooltip:0 "Vamos exercer nossa influência dentro do Império com propaganda e discursos ilegais, o que atrairá mais membros para a causa Roqualiana, concedendo 1§BResistência§!. \nEste tem um§Y15%§ ! chance de§Rdiminuir§! a§Y Opinião do Kaiser§! sobre nós. "
  giga_katrebels.2003.d:0 "Raid Warehouses. |§Y65%§! Chance de sucesso"
  giga_katrebels.2003.d.tooltip:0 "Os Roqualians organizarão um§Yraid§! em§YKatzen Warehouses§!. \nIsto tem uma chance de§Y65%§! de conceder 2§BRRecursos de resistência§! e um§Y35%§! Chance de§Rfailing§! E aumento de§HKatzen Wariness§! Em§R1§ !. "
  giga_katrebels.2003.e:0 "Esqueça."
  
  giga_katrebels.2004.name:0 "Falha no ataque!"
  giga_katrebels.2004.desc:0 "O ataque Roqualian aos armazéns de Katzen em Flusion falhou. Eles foram interceptados por soldados Katzen antes de serem capazes de roubar qualquer coisa, levando a um aumento de§HKatzen Cautela§! em 1."
  giga_katrebels.2004.a:0 "Droga!"
  giga_katrebels.2004.a.tooltip:0 "§HKatzen Cautela§!§Reaumentou§! por§R1§ !."
  
  giga_katrebels.2005.name:0 "Raid bem-sucedido!"
  giga_katrebels.2005.desc:0 "O ataque Roqualian aos armazéns de Katzen foi bem-sucedido! Os Roqualians conseguiram adquirir bastante armamento e munição, o que certamente será útil para futuras operações de resistência."
  giga_katrebels.2005.a:0 "Maravilhoso!"
  giga_katrebels.2005.a.tooltip:0 "Os Roqualianos ganham 2§BRRecursos de resistência§ !."
  
  already_spent_energy_res:0 "Só podemos fazer isso a cada§Y6 meses§ !."
  
  giga_katrebels.2006.name:0 "Gerenciando§HKatzen Wariness§!"
  giga_katrebels.2006.desc:0 "Os Katzens são bastante eficientes no estabelecimento de medidas antipartidárias. Talvez seja necessária alguma intervenção para ajudar a afrouxar o controle sobre Flusion ... \n \n§HKatzen Cautela§! decai naturalmente em 1 a cada ano, com uma chance de diminuir ainda mais com base na§YKaiser Opinion§! dos impérios de jogadores. Essa chance tem um valor base de§Y10%§! e aumenta em§Y10%§! se a§YKaiser Opinion§! for em§Y1§ !, diminui em§Y-10%§! se a§YKaiser Opinion§! estiver em§Y-1§ !, e assim por diante em incrementos de§Y-10%§ !. "
  
  giga_katrebels.2006.a:0 "Subornar Katzen Funcionários. |§Y7500§!£energy£"
  giga_katrebels.2006.a.tooltip:0 "Alguns subornos podem ir muito longe. Isso reduzirá§HKatzen Cautela§! em§H1§ !."
  
  giga_katrebels.2006.b:0 "Tranquilize o Kaiser. |§Y150§!£influência£"
  giga_katrebels.2006.b.tooltip:0 "Faremos uma série de discursos e fingiremos apoiar os Katzens em seus esforços antipartidários. Isso reduzirá§HKatzen Cautela§! em§H1§ !."
  
  giga_katrebels.2006.c:0 "Entregar recursos. |§Y1§!§BRRecurso de resistência§!"
  giga_katrebels.2006.c.tooltip:0 "Os Roqualians fingirão entregar alguns de seus próprios recursos, o que fará os Katzens acreditarem que a resistência ficou mais fraca. Isso reduzirá§HKatzen Cautela§! em§H2§ !. "
  
  already_bribed_wary:99 "We can only do this every §YYear§!."
  
  giga_res_manage_tooltip:0 "§BGerenciar recursos de resistência§! \nRecursos como§YAlloys§ !,§YEnergia§! e§YInfluência§! podem ser gastos para fornecer aos§YRoqualian Freedom Fighters§! e outros grupos de resistência com mais recursos para realizar operações. "
  
  giga_wary_manage_tooltip:0 "§HManage Katzen Cautela§! \nEmbora Cautela decaia naturalmente, alguns subornos bem colocados podem ajudar a acelerar o processo."
  
