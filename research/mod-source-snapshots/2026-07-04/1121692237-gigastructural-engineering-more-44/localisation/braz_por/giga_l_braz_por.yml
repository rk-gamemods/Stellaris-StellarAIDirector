  mod_job_giga_iodizium_miner_per_pop_short:99 "\n§G+1§! £mod_job_giga_iodizium_miner_add£ per $VALUE$ £pop£"
  
  job_giga_iodizium_mining_drone:99 "Iodizium Mining Drone"
  giga_iodizium_mining_drone_wilderness:99 "Piezosymbiont"
  job_giga_iodizium_mining_drone_wilderness:99 "$giga_iodizium_mining_drone_wilderness$"
  job_giga_iodizium_mining_drone_plural:99 "Iodizium Mining Drones"
  giga_iodizium_mining_drone_wilderness_plural:99 "Piezosymbionts"
  job_giga_iodizium_mining_drone_wilderness_plural:99 "$giga_iodizium_mining_drone_wilderness_plural$"
  job_giga_iodizium_mining_drone_desc:99 "These specialist miners are equipped for the extraction of physics-defying iodizium crystals."
  giga_iodizium_mining_drone_wilderness_desc:99 "Sophisticated bioelectric organs and miniscule pick-like hairs enable the extraction of physics-defying iodizium crystals."
  job_giga_iodizium_mining_drone_wilderness_desc:99 "$giga_iodizium_mining_drone_wilderness_desc$"
  job_giga_iodizium_mining_drone_effect_desc:99 "$job_giga_iodizium_mining_drone_swap_plural_with_icon$ use £energy£ §Y$energy$§! to safely extract £giga_sr_iodizium£ §Y$giga_sr_iodizium$§!"
  job_giga_iodizium_mining_drone_swap_plural_with_icon:99 "[giga_iodizium_mining_drone.GetIcon] [giga_iodizium_mining_drone.GetNamePlural]"
