  # giga_accelerator.2000.desc:0 "Are you certain that you wish to dismantle this §YStellar Particle Accelerator§!?\n\nWe will get §Y3500§! £alloys£ back."
  # giga_flavor.2000.yes:0 "Yes, proceed with the dismantlement."
