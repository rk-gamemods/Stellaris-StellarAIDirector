  psychic_beacon_0_DESC:0 "O canteiro de obras de$name_psychic_beacon$. Esta imensa instalação é usada para abrigar milhões de engenheiros qualificados e telepatas particularmente poderosos trabalhando juntos em perfeita harmonia." #megalistentry PSIONIC BEACON
