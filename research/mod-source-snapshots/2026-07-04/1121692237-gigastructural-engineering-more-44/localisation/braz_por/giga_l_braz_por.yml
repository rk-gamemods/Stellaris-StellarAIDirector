  psychic_beacon_1:99 "$name_psychic_beacon$: Spire"
  psychic_beacon_1_DESC:0 "A espiral de um$name_psychic_beacon$, a primeira parte de um poderoso farol galáctico. Esmaecidas energias da mortalha já se manifestam dentro do casco."
  
  psychic_beacon_2:0 "$name_psychic_beacon$: Conduítes"
  psychic_beacon_2_DESC:0 "Os conduítes psiônicos amplificam muito o fluxo e a captura das energias do Sudário."
  
