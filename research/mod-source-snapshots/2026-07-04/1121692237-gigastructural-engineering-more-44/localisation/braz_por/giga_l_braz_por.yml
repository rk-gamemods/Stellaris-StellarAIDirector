  zousa_res_ext_tooltip:0 "$zousa_name$\n \n§FunçãoHMain§! -§Bpotador de unidade de aceleração§! \n \nA compreensão de Katzen é§YModerada§! \nA atividade partidária é§RExtreme§! \nModificadores Katzen: \n§R+20 % Tempo de carga do salto \n Scrambler do Jump Drive inativo \n \n$zousa_desc$"
  
  
  lyuin_name:99 "§YLyuinstaat§!"
  lyuin_desc:0 "§LLyuinstaat, ou Lyuinita, é uma vasta estepe pontilhada de campi e centros de pesquisa, habitados pelos inteligentes Lyuinitas. Os Katzens centralizam a maior parte de suas pesquisas avançadas nessas terras, especialmente em relação aos escudos.§!"
  
