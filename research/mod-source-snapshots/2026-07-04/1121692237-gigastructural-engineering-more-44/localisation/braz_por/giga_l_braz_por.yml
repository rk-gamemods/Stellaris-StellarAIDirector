  giga_gigas_experience_preset_title:99 "GIGA-EXPERIENCE"
  giga_gigas_experience_preset_text:99 "A mostly-balanced experience with challenging crises and unique mechanics."
  giga_gigas_experience_preset_tooltip:99 "- Megastructures have varying build caps based on their size\n- Job-based build cap mechanics\n- Celestial warships are limited to Behemoth Planetcrafts\n- Aeternum and the Blokkats might spawn as crises\n- Unique systems may spawn\n- The galactic core will spawn\n- Fallen Empires receive a few Celestial Warships\n- Megastructure output varies based on star type\n- The E.H.O.F. is enabled\n- Mod-unique achievements are enabled but provide no bonuses"
  
  giga_arcade_preset_title:99 "ARCADE"
  giga_arcade_preset_text:99 "No limitations, no restrictions!\nFight the biggest of bads with the biggest of megastructures.\n\n§LRecommended if your playset includes high-powered mods.§!"
  giga_arcade_preset_tooltip:99 "- Megastructures are uncapped\n- Build cap is uncapped\n- The Systemcraft is enabled\n- All modded crises are enabled\n- Unique systems will spawn\n- The galactic core will spawn\n- Fallen Empires receive Celestial Warships\n- Megastructure output varies based on star type\n- The E.H.O.F. is enabled\n- Mod-unique achievements are enabled and provide bonuses upon completion"
  
  giga_vanilla_plus_preset_button_tooltip:99 "§RWill override your current configuration!§!\n§E$giga_vanilla_plus_preset_title$§!\n$giga_vanilla_plus_preset_text$\n$giga_vanilla_plus_preset_tooltip$"
