  #Attack Moon
  giga_wrecked_ships.1043.name:99 "Wrecked Attack Moon Scrapped"
  giga_wrecked_ships.1043.desc:99 "Our scavenging teams have now completed the dismantlement of the ruined Attack Moon found within the §Y[from.GetName]§! system. The dismantlement of the Celestial Warship's colossal weapons array and movement systems has netted us significant amounts of alloys and engineering research. Additionally, its devastated crust was scoured for valuable elements and leftover minerals."
  giga_wrecked_ships.1043.a:99 "Good."
  
  #Behemoth Planetcraft
  giga_wrecked_ships.1044.name:99 "Wrecked Behemoth Planetcraft Scrapped"
  giga_wrecked_ships.1044.desc:99 "Our scavenging teams have now completed the dismantlement of the ruined Behemoth Planetcraft found within the §Y[from.GetName]§! system. The dismantlement of the Celestial Warship's colossal weapons array and movement systems has netted us significant amounts of alloys and engineering research. Additionally, its devastated crust was scoured for valuable elements and leftover minerals."
  giga_wrecked_ships.1044.a:99 "Good."
  
  #Titan
  giga_titan_ruined:99 "Wrecked Titan"
  giga_titan_ruined_DESC:99 "The remains of a titanic spaceship, leftover from a bygone era. The vessel's main hull is still remarkably intact and could realistically be brought back to working order with sufficient resources."
  giga_titan_ruined_MEGASTRUCTURE_DETAILS:99 "giga_titan_ruined_MEGASTRUCTURE_DETAILS placeholder"
  
  giga_titan_restored:99 "Restored Titan"
  giga_titan_restored_DESC:99 "An ancient Titan-class warship, repaired and brought back to its former glory."
  
  giga_wrecked_ships.1010.name:99 "Wrecked Titan"
  giga_wrecked_ships.1010.desc:99 "The remains of a titanic ruined warship have been located within the §Y[from.GetName]§! system. Floating silently near the edge of a planet's gravity well, this impressive §YTitan§!-class vessel has been estimated to be several tens of thousands of years old, a silent relic from the bygone past of our galaxy.\n\nAlthough it has sustained heavy damage, restoring it would most likely be quite feasible granted we possess the technology to build our own Titans. Additionally, this would undoubtedly be significantly cheaper than building one ourselves.\n\nAlternatively, we could scrap the wreck for §YAlloys§! £alloys£, but in the meantime, studying it will provide us with §YEngineering Research§!."
  giga_wrecked_ships.1010.a:99 "Intriguing."
  
  giga_wrecked_ships.1011.name:99 "Wrecked Titan Restored!"
  giga_wrecked_ships.1011.desc:99 "The ruins of a wrecked Titan found in the §Y[from.GetName]§! have been restored and effectively brought back to working order; and while most of its weaponry had to be rebuilt from scratch, the craft's outer hull has not been drastically altered aside from minor repairs.\n\nRegardless, the mighty vessel is now ready for service once more, perhaps for the first time in millennia."
  giga_wrecked_ships.1011.a:99 "Excellent."
  giga_wrecked_ships.1011.b:99 "To Victory!"
  
  giga_wrecked_ships.1012.name:99 "Wrecked Titan Scrapped"
  giga_wrecked_ships.1012.desc:99 "Our scavenging teams have now completed the dismantlement of the ruined Titan found within the §Y[from.GetName]§! system, netting us significant amounts of alloys and engineering research. "
  giga_wrecked_ships.1012.a:99 "Good."
  
  #Juggernaut
  giga_juggernaut_ruined:99 "Wrecked Juggernaut"
  giga_juggernaut_ruined_DESC:99 "The remains of a humongous spaceship, leftover from a bygone era. The vessel's main hull is still remarkably intact and could realistically be brought back to working order with sufficient resources."
  giga_juggernaut_ruined_MEGASTRUCTURE_DETAILS:99 "giga_juggernaut_ruined_MEGASTRUCTURE_DETAILS placeholder"
  
  giga_juggernaut_restored:99 "Restored Juggernaut"
  giga_juggernaut_restored_DESC:99 "An ancient Juggernaut-class warship, repaired and brought back to its former glory."
  
  giga_wrecked_ships.1020.name:99 "Wrecked Juggernaut"
  giga_wrecked_ships.1020.desc:99 "The remains of a humongous ruined warship have been found within the §Y[from.GetName]§! system. Judging from its sheer size, this impressive vessel most likely served as a §YJuggernaut§!-class craft in the distant past, presumably having been disabled in an ancient conflict of epic proportions.\n\nAlthough it has sustained heavy damage, restoring it would most likely be quite feasible granted we possess the technology to build our own Juggernaut. Additionally, this would undoubtedly be significantly cheaper than building one ourselves and would not require a Capital Assembly Yard.\n\nAlternatively, we could scrap the wreck for §YAlloys§! £alloys£, but in the meantime, studying it will provide us with §YEngineering Research§!."
  giga_wrecked_ships.1020.a:99 "That is a large ship indeed."
  
  giga_wrecked_ships.1021.name:99 "Wrecked Juggernaut Restored!"
  giga_wrecked_ships.1021.desc:99 "The ruins of a wrecked Juggernaut found in the §Y[from.GetName]§! have been restored and effectively brought back to working order; and while most of its weaponry had to be rebuilt from scratch, the craft's outer hull has not been drastically altered aside from minor repairs.\n\nThe craft has once more been refitted with its extensive strike-craft hangars and ship manufacturing facilities and is now ready for deployment whenever we see fit."
  giga_wrecked_ships.1021.a:99 "Excellent."
  giga_wrecked_ships.1021.b:99 "Grandiose!"
  
  giga_wrecked_ships.1022.name:99 "Wrecked Juggernaut Scrapped"
  giga_wrecked_ships.1022.desc:99 "Our scavenging teams have now completed the dismantlement of the ruined Juggernaut found within the §Y[from.GetName]§! system, netting us significant amounts of alloys and engineering research. "
  giga_wrecked_ships.1022.a:99 "Good."
  
  
  #Battleships
  giga_battleship_ruined:99 "Wrecked Battleships"
  giga_battleship_ruined_DESC:99 "The remains of several battleships, leftover from a bygone era. The ships' hulls are still remarkably intact and could realistically be brought back to working order with sufficient resources."
  giga_battleship_ruined_MEGASTRUCTURE_DETAILS:99 "giga_battleship_ruined_MEGASTRUCTURE_DETAILS placeholder"
  
  giga_battleship_restored:99 "Restored Battleships"
  giga_battleship_restored_DESC:99 "Several ancient battleships, repaired and brought back to their former glory."
  
  giga_wrecked_ships.1030.name:99 "Wrecked Battleships"
  giga_wrecked_ships.1030.desc:99 "A small fleet of destroyed §YBattleships§! has been found within the §Y[from.GetName]§! system. This group of ships has most likely been damaged in an ancient conflict and have been floating silently through the void for several thousand years by now.\n\nAlthough they have sustained heavy damage, restoring them would most likely be quite feasible granted we possess the technology to build our own Battleships. Additionally, this would undoubtedly be significantly cheaper than building battleships ourselves.\n\nAlternatively, we could scrap the wreck for §YAlloys§! £alloys£, but in the meantime, studying it will provide us with §YEngineering Research§!."
  giga_wrecked_ships.1030.a:99 "They could be useful..."
  
  giga_wrecked_ships.1031.name:99 "Wrecked Battleships Restored!"
  giga_wrecked_ships.1031.desc:99 "The ruins of the wrecked Battleships found in the §Y[from.GetName]§! have been restored and effectively brought back to working order; and while most of their weaponry had to be rebuilt from scratch, the ships' outer hulls have not been drastically altered aside from minor repairs.\n\nThe crafts are subsequently ready for deployment whenever we see fit."
  giga_wrecked_ships.1031.a:99 "Great."
  giga_wrecked_ships.1031.b:99 "Fantastic!"
  
  giga_wrecked_ships.1032.name:99 "Wrecked Battleships Scrapped"
  giga_wrecked_ships.1032.desc:99 "Our scavenging teams have now completed the dismantlement of the ruined Battleships found within the §Y[from.GetName]§! system, netting us significant amounts of alloys and engineering research. "
  giga_wrecked_ships.1032.a:99 "$giga_wrecked_ships.1022.a$"
  
  #Colossus
  giga_colossus_ruined:99 "Wrecked Colossus"
  giga_colossus_ruined_DESC:99 "The remains of a Colossus, presumably destroyed after obliterating a planet. The ship's colossal hull is still remarkably intact and could realistically be brought back to working order with sufficient resources."
  giga_colossus_ruined_MEGASTRUCTURE_DETAILS:99 "giga_colossus_ruined_MEGASTRUCTURE_DETAILS placeholder"
  
  giga_colossus_restored:99 "Restored Colossus"
  giga_colossus_restored_DESC:99 "An ancient colossus, repaired and brought back to its former glory."
  
  giga_wrecked_ships.1040.name:99 "Wrecked Colossus"
  giga_wrecked_ships.1040.desc:99 "The gigantic wreck of an ancient §YColossus§! has been located in the §Y[from.GetName]§! system. Floating silently over a shattered world, it is evident that this Colossus once had the power to lay waste to entire planets, but no longer. \n\nAlthough it has sustained heavy damage, possibly inflicted by whoever inhabited its unfortunate target, restoring it would most likely be quite feasible granted we possess the technology to build our own Colossus, and would not require a Capital Assembly Yard. Additionally, this would undoubtedly be significantly cheaper than building our own Colossus.\n\nAlternatively, we could scrap the wreck for §YAlloys§! £alloys£, but in the meantime, studying it will provide us with §YEngineering Research§!."
  giga_wrecked_ships.1040.a:99 "A dangerous yet wonderful machine."
  
  giga_wrecked_ships.1041.name:99 "Wrecked Colossus Restored!"
  giga_wrecked_ships.1041.desc:99 "The ruins of the wrecked Colossus found in the §Y[from.GetName]§! have been restored and effectively brought back to working order; and while most of its weaponry had to be rebuilt from scratch, the ship's outer hull has not been drastically altered aside from minor repairs.\n\nIt has been equipped with a weapon of such caliber that it is now once again capable of devastating an entire world. The mighty vessel is ready for deployment whenever we see fit."
  giga_wrecked_ships.1041.a:99 "Wonderful."
  giga_wrecked_ships.1041.b:99 "Excellent, truly excellent!"
  
  giga_wrecked_ships.1042.name:99 "Wrecked Colossus Scrapped"
  giga_wrecked_ships.1042.desc:99 "Our scavenging teams have now completed the dismantlement of the ruined Colossus found within the §Y[from.GetName]§! system, netting us significant amounts of alloys and engineering research. "
  
