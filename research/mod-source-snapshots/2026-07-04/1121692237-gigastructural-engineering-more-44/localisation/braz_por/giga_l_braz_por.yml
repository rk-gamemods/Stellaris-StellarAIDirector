  grandbunny_psionics:0 "Singularidade Psiônica Paluushiana"
  grandbunny_psionics_desc:0 "A grande quantidade de energia psiônica emitida pela alma em colapso do Grandbunny permite que nossas naves dobrem a própria estrutura da realidade e cruzem a galáxia inteira em poucos dias."
  
  pangalactic_federation:0 "A Federação Pangalactic"
  pangalactic_federation_desc:0 "Juntos, nunca seremos derrotados!"
  
  hke_buffs:0 "O Império Sagrado de Katzen"
  hke_buffs_desc:0 "Para o Kaiser!"
  
  garyxphysics:0 "Mundo Quadrado Databanks: Pesquisa Física"
  garyxphysics_desc:0 "Garyx está recuperando dados dos arquivos do Mundo Quadrado para nos ajudar em nossas pesquisas de física."
  
  garyxengineering:0 "Mundo Quadrado Databanks: Pesquisa de Engenharia"
  garyxengineering_desc:0 "Garyx está recuperando dados dos arquivos da Mundo Quadrado para nos ajudar em nossa pesquisa de engenharia."
  
  garyxsociety:0 "Mundo Quadrado Databanks: Pesquisa de Sociedade"
  garyxsociety_desc:0 "Garyx está recuperando dados dos arquivos da Mundo Quadrado para nos ajudar na pesquisa da nossa sociedade."
  
  paluush_shield:0 "Campo de Força Psiônico"
  paluush_shield_desc:0 "Os habitantes deste mundo possuem incríveis habilidades psiônicas, devido ao seu tamanho gigantesco. De alguma forma, eles são capazes de interceptar e desviar qualquer quantidade de bombardeio orbital lançado contra eles. Nossos cientistas acreditam que algo neste mundo pode estar multiplicando seus potencial psiônico dez vezes maior. "
  
  # feeble_ai_mega_buff:0 "Feeble AI"
  # feeble_ai_mega_buff_desc:0 "A little push in the right direction"
  
  giga_no_build_cap:0 "Construtor de megaestrutura"
  giga_no_build_cap_desc:0 "Dominamos a arte de construir múltiplas megaestruturas ao mesmo tempo."
  giga_plus_1_build_cap:0 "Construtor de megaestrutura"
  giga_plus_1_build_cap_desc:0 "Aprendemos como gerenciar vários projetos grandes de uma vez."
  giga_plus_2_build_cap:0 "Construtor de megaestrutura"
  giga_plus_2_build_cap_desc:0 "Dominamos o gerenciamento de vários projetos grandes de uma vez."
  
  temporary_debug:99 "debug"
  space_storm:99 "debug"
  
