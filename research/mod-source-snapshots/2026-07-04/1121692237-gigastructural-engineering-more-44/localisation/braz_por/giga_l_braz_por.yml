  laurn_name:99 "§YLaurendaar§!"
  laurn_desc:0 "§LLaurandar, ou Laurendaar, é habitado por uma variedade de criaturas plantoides muito diversas. Os Katzens transformaram a enorme ilha em um centro de propaganda, usando suas idílicas paisagens tropicais para filmar cenas encantadoras a fim de seduzir a população e motivar os Exército.§!"
  
