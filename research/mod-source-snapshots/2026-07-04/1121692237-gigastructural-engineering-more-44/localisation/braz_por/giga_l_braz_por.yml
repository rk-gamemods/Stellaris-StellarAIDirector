  REACTOR_MOON:0 "Reator Lunar"
  REACTOR_MOON_DESC:0 "Um poderoso gerador de energia alojado no núcleo de um pequeno planetóide armado, fornecendo grandes quantidades de energia para uma vasta gama de armas."
  
  requires_war_planets:0 "$TRIGGER_FAIL$Requer a tecnologia£engineering£§Y$giga_tech_war_planet$§ !."
  
  ap_celestial_printing:0 "Montagem Celestial do Navio de Guerra"
  ap_celestial_printing_desc:0 "As Luas de Ataque e as Naves planetárias Behemoth superam em muito todas as outras embarcações, tanto em termos de tamanho, poder de fogo e capacidades defensivas. Mesmo os poderosos Titãs, Colossos e Comedores de Estrelas não são nada comparados a uma única Lua de Ataque. Infelizmente, eles devem ser construídos em corpos celestes particulares que atendam a critérios específicos, o que limita drasticamente nossa capacidade de produzi-los. Mas por que nos limitar? Com ​​nossa base tecnológica atual, deslocar grandes quantidades de matéria-prima de um planeta para uma megaestrutura especializada seria trivial. Ao fazer isso, poderíamos efetivamente criar enormes dispositivos megaestruturais que, quando alimentados com matéria planetária crua colhida de vários corpos celestes, seriam capazes de "imprimir" Luas de Ataque com relativa facilidade. É hora de abraçarmos totalmente essa possibilidade e começarmos a produção em massa de planetóides armados e, finalmente, acabar com os vasos insignificantes e patéticos de antigamente! "
  
  ap_celestial_printing_effects:0 "\n \nConcederá acesso a tecnologias poderosas que nos permitirão colher£giga_sr_bulk_matter£§YMassa Planetária§! de planetas telúricos.£giga_sr_bulk_matter£§YMassa Planetária§! pode então ser usada para montar§YAtack Luas§! usando uma megaestrutura especializada sem a necessidade de encontrar um candidato adequado. \n \nNavios de guerra celestiais fabricados são um pouco mais§Raros§! e§R demorados§ !, mas têm§G15%§! adicional§YHull HP§ !,§YArmor HP§! E§YShield HP§! Bem como§G10%§!§YShip Taxa de Incêndio§! Y$giga_tech_lunar_assembly$§! "
  
  giga_tech_planetary_matter_dumping:99 "Hyperefficient Telluric Dumping"
  giga_tech_planetary_matter_dumping_desc:99 "Dumping tremendous quantities of matter onto a planet's surface is far easier than getting it away from said surface, but it is still a gargantuan undertaking requiring extremely well-oiled logistics and coordination in moving entire planets' worth of mass around."
  
  giga_tech_lunar_assembly:0 "Protocolos de fabricação em escala lunar"
  giga_tech_lunar_assembly_desc:0 "Ao empregar uma infinidade de métodos, como Engenharia Tetradimensional e nanites, é possível reorganizar de forma rápida e eficiente grandes quantidades de matéria planetária em qualquer coisa que quisermos. Isso efetivamente nos permite criar nossas próprias Luas de Ataque sem a necessidade de um planetóide de ocorrência natural para construí-lo, desde que coletemos matéria planetária suficiente de antemão. "
  allow_lunar_assembly:0 "§HDesbloqueia a megaestrutura:§! Macro-fabricante lunar"
  allow_lunar_assembly_desc:0 "Uma ambiciosa megaestrutura orbital que converte matéria planetária e ligas em Luas de Ataque fabricadas. Esta construçãorequires£sr_solar_energia£§YMassa Planetária§! ! Tecnologia. "
  
  decision_harvest_matter_for_planetary_printing_system:99 "Dismantle Solar System for £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!"
  decision_harvest_matter_for_planetary_printing_system_desc:99 "This system's planets serve simply no purpose, they will be more useful if we completely dismantle them for materials."
  cant_have_moon:99 "Planet must not have any moons. Dismantle any remaining moons first."
  
  decision_harvest_matter_for_planetary_printing:99 "Dismantle World for £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!"
  decision_harvest_matter_for_planetary_printing_desc:99 "Some planets serve simply no purpose, they will be more useful if we completely dismantle them for materials."
  
  decision_recover_bm_in_cache:99 "Recover £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! from Cache"
  decision_recover_bm_in_cache_tooltip:99 "This cache contains §Y[PREV.solar_system.giga_system_bm_cache]§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§!."
  decision_recover_bm_in_cache_desc:99 "Harvest whatever is stored inside this cache."
  
  decision_build_planetary_matter_harvester:99 "This will begin the construction of a §YPlanetary Matter Harvester§! in orbit of this celestial body.\n\nOnce complete, this powerful megastructure will steadily harvest one £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! every §Ysix months§!, shrinking the planet's size by one every time it does so. When the planet's size drops below 1, it will §Rdisappear§!. The harvesting megastructure has a §Ymonthly upkeep§! of 50 £energy£\n\n§RThe Planetary Matter Harvester§! cannot be stopped once started!§!"
  
  decision_dump_matter_on_planet:99 "Dump §Y1§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! Onto Planet"
  decision_dump_matter_on_planet_desc:99 "We can rather easily enlarge this world by dumping excess mass onto it. This may result in geological instability."
  decision_dump_matter_on_planet_5:99 "Dump §Y5§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! Onto Planet"
  decision_dump_matter_on_planet_5_desc:99 "We can rather easily enlarge this world by dumping excess mass onto it. This may result in geological instability."
  decision_dump_matter_on_gas_giant:99 "Inject §Y25§! £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! For Helioforming"
  decision_dump_matter_on_gas_giant_desc:99 "By injecting tremendous quantities of bulk matter into this gas giant, we can render it sufficiently massive enough to allow for ignition into a proper star."
  decision_dump_matter_on_gas_giant_tooltip:99 "We will be able to use a §YSubstellar Compressor§! to ignite this §YGas Giant§! into a §YStar§!, generating energy and potentially rending its moons habitable."
  decision_dump_matter_on_planet_tooltip:99 "We can go up to size §Y30§! with this method, beyond which it would become too unstable and massive to be exploited further."
  
  giga_printer.1001.name:0 "Desmontando [planet_being_harvested_for_printing.GetName]"
  giga_printer.1001.desc:0 "Um§YPlanetary Matter Harvester§! foi concluído em torno de [planet_being_harvested_for_printing.GetName]. Feixes gravíticos baratos, porém grandes, estão agora sendo empregados para rapidamente destruir e desmantelar o planeta, o que renderá£giga_sr_bulk_matter£§YMassa Planetária§! A cada§Sis meses§! E reduza o tamanho do planeta em um. \ N \nQuando o tamanho do planeta chegar a 0, ele desaparecerá e o§Ysisestador de Matéria Planetária§! Será desmontado. "
  giga_printer.1001.a:0 "Delicioso!"
  giga_printer.1001.a.tooltip:0 "Agora receberemos uma£giga_sr_bulk_matter£§YMassa Planetária§! a cada§Seis meses§ !."
  
  moon_printer_orbital_mass_harvester_0:0 "Coletor de matéria planetária"
  moon_printer_orbital_mass_harvester_0_DESC:0 "Um Coletor de Matéria Planetária está sendo construído em torno de um mundo telúrico."
  moon_printer_orbital_mass_harvester_1:0 "Coletor de matéria planetária ativo"
  moon_printer_orbital_mass_harvester_1_DESC:0 "Este dispositivo orbital está continuamente desmantelando o infeliz corpo rochoso localizado abaixo dele. \nRega uma£giga_sr_bulk_matter£§Massa YPlanetária§! a cada§Y6 meses§ !."
  
  MESSAGE_GIGA_PLANET_DISMANTLE_TITLE:99 "Planetary Dismantlement Update"
  giga_planet_dismantle_start:99 "§H[planet_being_harvested_for_printing.GetName]§! is now being dismantled, yielding £giga_sr_bulk_matter£ §H$giga_sr_bulk_matter$§! every 6 months."
  giga_planet_dismantle_end:99 "§H[planet_being_harvested_depleted.GetName]§! has been fully dismantled. §Y500§! £alloys£ has been salvaged from the dismantler."
  
  giga_printer.1005.name:99 "Dismantling [From.solar_system.GetName]"
  giga_printer.1005.desc:99 "It would cost §Y[ROOT.giga_system_dismantle_cost_alloys]§! £alloys£ and §Y[ROOT.giga_system_dismantle_cost_energy]§! £energy£ to build the §YPlanetary Matter Harvesters§! necessary to dismantle [From.solar_system.GetName]. Shall we proceed?"
  giga_printer.1005.a:99 "Absolutely."
  giga_printer.1005.a.tooltip:99 "A §YPlanetary Matter Harvester§! will begin to be built around every valid dismantlement target in §Y[From.solar_system.GetName]§!."
  giga_printer.1005.b:99 "On second thought, forget it."
  
  lunar_macroreplicator_0:0 "Canteiro de obras do Macro-Fabricador Lunar"
  lunar_macroreplicator_0_DESC:0 "O canteiro de obras para um pátio de montagem colossal capaz de fabricar uma Lua de Ataque inteira de material planetário bruto e ligas."
  lunar_macroreplicator_0_MEGASTRUCTURE_DETAILS:0 "Um grande pátio de montagem orbital que utiliza£giga_sr_bulk_matter£§YMassa Planetária§! para fabricar§YAtack Luas§ !." #megalistentry LUNAR MACROFABRICATOR
  
