  giga_menu_blokkat_section_desc:99 "The Blokkats are ravenous extragalactic stripminers.\n\nThis section controls their settings. Below lists the effects of each difficulty setting.\n - ['concept_giga_blokkat_diff_very_easy']\n - ['concept_giga_blokkat_diff_easy']\n - ['concept_giga_blokkat_diff_normal']\n - ['concept_giga_blokkat_diff_bismuth']\n - ['concept_giga_blokkat_diff_endtech']\n - ['concept_giga_blokkat_diff_deathmode']"
  
