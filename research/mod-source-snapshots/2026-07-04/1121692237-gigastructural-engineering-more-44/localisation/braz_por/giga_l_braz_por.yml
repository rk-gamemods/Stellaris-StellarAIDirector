  giga_galactic_core_inactive_empty:0 "£menu_i£Núcleo Galáctico (Buraco Negro Supermassivo Vazio) \nO núcleo galáctico será sempre um§YS Buraco Negro Supermassivo§ inexplorado !."
  giga_galactic_core_inactive_aeternum:0 "£menu_i£Núcleo Galáctico (Aeternum) \nO núcleo galáctico sempre será ocupado por§YAeternum§ !, uma civilização precursora antiga e poderosa que reside em um§YMundo de Birch§ !."
  giga_galactic_core_inactive:0 "£menu_i£Núcleo Galáctico (Buraco Negro Supermassivo Aleatório) \nO núcleo galáctico tem 50/50 de chance de gerar um inexplorado§YSBuro Negro Supermassivo§! ou§YAeternum§ !."
  
  aeternum_spawn_mechanics:0 "§YIsso só afetará Aeternum se acontecerem de desovar, e não garante que o façam. Se Aeternum não puder desovar, isso não fará nada.§!"
  
  giga_galactic_core_aeternum_1:0 "£menu_aet_1£Aeternum (§MRegular§!) \nAeternum não receberá buffs em particular. \n \nEles começarão com aproximadamente§Y20 milhões§! poder da frota. \n \n$aeternum_spawn_mechanics$"
  giga_galactic_core_aeternum_2:0 "£menu_aet_2£Aeternum (§BAzure Aeternum§!) \nAeternum será§Muito mais poderoso§ !, recebendo os seguintes buffs: \n§Y+100% Dano de Armas \n+100% Taxa de Fogo \n+100% HP do escudo \n+100% HP da armadura \n+100% HP do casco \n+20% Velocidade do navio \n+100% Dano do Exército \n+100% Saúde do Exército \n+100% Moral do Exército \n+20 % Evasão \n+50% Velocidade de construção da megaestrutura§! \ N \n§B Suas frotas terão aproximadamente 50% a mais de navios pesados ​​\nEles despertarão mais rápido \nAtrasando seu despertar wiserão menos eficazes \nOs fabricantes de psykofabricantes serão construídos com mais frequência e terão um limite de 20 em vez de 10§! \n \nEles começarão com aproximadamente§Y100 milhões§! poder da frota. \n \n§HPARA USAR COM MODS PODEROSOS! \n \n$aeternum_spawn_mechanics$"
  giga_galactic_core_aeternum_3:0 "£menu_aet_3£Aeternum (§ROmega Aeternum§!) \nAeternum será§Rimmensamente mais poderoso§ !, recebendo os seguintes buffs: \n§Y+500% Dano de armas \n+500% Taxa de fogo \n+500% HP do escudo \n+500% HP da armadura \n+500% HP do casco \n+80% Velocidade do navio \n+500% Dano do Exército \n+500% Saúde do Exército \n+500% Moral do Exército \n+100 % Evasão \n+200% Velocidade de construção da megaestrutura§! \ N \n§B Suas frotas terão aproximadamente o dobro de navios pesados ​​\nEles despertarão muito mais rápido \nA demora em seu despertar será muito menos eficaz \nOsykofabricators serão construídos com muito mais frequência e limite em 30 em vez de 10§! \n \ NNão começarão com aproximadamente§Y3 bilhões§! potência da frota (presumindo que um mod como§YACOT Defines§! seja usado, pois os cálculos FP irão transbordar em baunilha) \n \n§R PARA USO COM MODS EXTREMAMENTE PODEROSOS! \n \n$aeternum_spawn_mechanics$"
  giga_galactic_core_aeternum_4:99 "£menu_aet_4£Aeternum (§ROmega Aeternum§!)\nAeternum will be §Rimmensely more powerful§!, receiving the following buffs:\n§Y+500% Weapons Damage\n+500% Fire Rate\n+500% Shield HP\n+500% Armor HP\n+500% Hull HP\n+80% Ship Speed\n+500% Army Damage\n+500% Army Health\n+500% Army Morale\n+100% Evasion\n+200% Megastructure Build Speed§!\n\n§BTheir fleets will have roughly twice as many heavy ships\nThey will awaken much quicker\nDelaying their awakening will be much less effective\nPsykofabricators will be built much more frequently and cap at 30 instead of 10§!\n\nThey will start with six fleets with roughly §Y1 billion§! fleet power each.\n\n§RFOR USE WITH EXTREMELY POWERFUL MODS!\n\n$aeternum_spawn_mechanics$"
  
