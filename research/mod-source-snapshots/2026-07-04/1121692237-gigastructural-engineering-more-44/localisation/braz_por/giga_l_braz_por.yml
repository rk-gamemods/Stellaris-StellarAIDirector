  giga_katzen.042.name:0 "Kaiser Kaittail exige território!"
  
  giga_katzen.042.1.desc:0 "Recebemos uma transmissão urgente de§YKatzenartig Imperium§!. \n \nSeu líder,§YKaiser Kattail§ !, está exigindo que, para cumprir suas" cotas de expansão ", nós transferimos o§Y [kaiser_system_1.GetName]§! sistema ao Imperium no próximo mês. \n \nEle está, no entanto, propondo uma compensação financeira em troca do sistema, oferecendo-se para nos pagar§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£e§Y [flusion_primitives_country.kaiser_trade_value_alloys]§!£alloys£, com base no valor estimado do sistema. \n \nEmbora este território seja nosso por direito, negar o comércio pode irritar o Kaiser, que pode tentar tomar o território à força se o seu opinião sobre nós cai muito ... "
  
  giga_katzen.042.2.desc:0 "Recebemos uma transmissão urgente de§YKatzenartig Imperium§!. \n \nSeu líder,§YKaiser Kattail§ !, está exigindo que, para cumprir suas" cotas de expansão ", nós transferimos os sistemas§Y [kaiser_system_1.GetName]§! e§Y [kaiser_system_2.GetName]§! ao Imperium no próximo mês. \n \nEle está, no entanto, propondo uma compensação financeira em troca dos sistemas, oferecendo-se para nos pagar§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£e§Y [flusion_primitives_country.kaiser_trade_value_alloys]§!£alloys£, com base no valor estimado do sistema. \n \nEmbora este território seja nosso por direito, negar o comércio pode causar que pode tentar tomar o território à força se sua opinião sobre nós cair muito ... "
  
  giga_katzen.042.3.desc:0 "Recebemos uma transmissão urgente de§YKatzenartig Imperium§!. \n \nSeu líder,§YKaiser Kattail§ !, está exigindo que, para cumprir suas" cotas de expansão ", nós transferimos os sistemas§Y [kaiser_system_1.GetName]§ !,§Y [kaiser_system_2.GetName]§! e§Y [kaiser_system_3.GetName]§! para o Império no próximo mês. \n \nEle está, no entanto, propondo uma compensação financeira em troca para os sistemas, oferecendo-se para nos pagar§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£e§Y [flusion_primitives_country.kaiser_trade_value_alloys]§!£alloys£, com base no valor estimado do sistema. \n \nQuando este território está correto. nosso, negar o comércio pode enfurecer o Kaiser, que pode tentar tomar o território à força se sua opinião sobre nós cair muito ... "
  
  giga_katzen.042.4.desc:0 "Recebemos uma transmissão urgente do§YKatzenartig Imperium§!. \n \nSeu líder,§YKaiser Kattail§ !, está exigindo que, para cumprir suas" cotas de expansão ", nós transferimos os sistemas§Y [kaiser_system_1.GetName]§ !,§Y [kaiser_system_2.GetName]§ !,§Y [kaiser_system_3.GetName]§! e§Y [kaiser_system_4.GetName]§! para o Império no próximo mês. \n \nEle está, no entanto, propondo uma compensação financeira em troca dos sistemas, oferecendo-se para nos pagar§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£e§Y [flusion_primitives_country.kaiser_trade_value_alloys]§!£alloys£, com base nos sistemas ' valor. \n \nEnquanto este território é nosso por direito, negar o comércio pode enfurecer o Kaiser, que pode tentar tomar o território pela força se sua opinião sobre nós cair muito ... "
  
  giga_katzen.042.5.desc:0 "Recebemos uma transmissão urgente de§YKatzenartig Imperium§!. \n \nSeu líder,§YKaiser Kattail§ !, está exigindo que, para cumprir suas" cotas de expansão ", nós transferimos o§Y [kaiser_system_1.GetName]§ !,§Y [kaiser_system_2.GetName]§ !,§Y [kaiser_system_3.GetName]§ !,§Y [kaiser_system_4.GetName]§! e§Y [kaiser_system_5.GetName]§! para o Imperium no próximo mês. \n \nEle está, no entanto, propondo uma compensação financeira em troca dos sistemas, oferecendo-se para nos pagar§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£e§Y [flusion_primitives_country.kaiser_trade_value_alloys]§!£alloys£, com base no valor estimado dos sistemas. \ N \nEmbora este território seja nosso por direito, negar o comércio pode enfurecer o Kaiser, que pode tentar tomar o território à força se sua opinião sobre nós for muito baixa ... "giga_katzen.042.yes:0 "Aceitamos."
  
  giga_katzen.042.yes:99 "We accept."
  giga_katzen.042.yes.tooltip:0 "§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£§Y [flusion_primitives_country.kaiser_trade_value_alloys]§!£alloys£\nTodos os sistemas exigidos serão transferidos. \§Y§YKaiser Opinion§! Pode§Aumentar§! (Cerca de 70% de chance).$Attache_boost_chance$"
  
  giga_katzen.042.no:0 "Nunca. Esses sistemas pertencem a nós!"
  giga_katzen.042.no.tooltip:0 "A§YParecer do Kaiser§!§Reduzirá§!. \nEle declarará guerra contra nós se sua opinião chegar a§Renfurecido§ !."
  
  giga_katzen.043.name:0 "[kaiser_system_demand_target.GetName] Cedes Território para Kaiser!"
  giga_katzen.043.desc:0 "O [kaiser_system_demand_target.GetName] acedeu recentemente a uma demanda do governante de§YKatzenartig Imperium§ !,§YKaiser Kattail§ !, para transferir alguns de seus sistemas para os Katzens. \n \nOs Katzens forneceram compensação financeira e material em troca dos sistemas e já estão começando a se mudar para seus territórios recém-adquiridos. \n \nParece que a guerra foi evitada, por enquanto. "
  giga_katzen.043.a:0 "O Império fica cada vez maior ..."
  
  #War
  giga_katzen.050.name:0 "§RDeclaração de Guerra§!"
  giga_katzen.050.desc:0 "[Root.GetSpeciesNamePlural]. Sua nação atrapalhou nosso Kaiser pela última vez. \n \nEsta é uma declaração de guerra! Seu povo será libertado da influência de seus miseráveis governo e integrados à nossa sociedade superior. \n \nEn garde, alienígenas! "
  giga_katzen.050.a:0 "Vamos encontrá-lo no campo de batalha, então."
  giga_katzen.050.a.tooltip:0 "§T§RTHE KATZENARTIG IMPERIUM DECLARARÁ GUERRA TOTAL NOS EUA.§! \n \nA§YKaiser Opinion§! irá§Rdecrease§! para§Renraged§!. \n \nPeace will só será possível após pelo menos§Y2.5 anos de luta§!. \n \n§YFlusion§! deve ser§Ycapturada§! ou§Ydestruída§! para derrotar o Império.§T "
  
  giga_katzen.051.name:0 "Katzenartig Imperium vai para a guerra!"
  giga_katzen.051.desc:0 "Notícias chegaram até nós de que após desentendimentos entre o Kaiser e a liderança de [kaiser_attack_target.GetAdjective], o§YKatzenartig Imperium§! recentemente declarou guerra ao§Y [kaiser_attack_target.GetName]§ !! \n \nAs relações diplomáticas entre as duas nações foram completamente rompidas e ambas estão prestes a se envolver em uma guerra total entre si ... "
  giga_katzen.051.a:0 "Outra guerra na galáxia."
  
  #Project
  giga_katzen.2000.name:0 "Segredos da Lua Kaiser"
  giga_katzen.2000.desc:0 "O§YKatzenartig Imperium§! já existe há algum tempo, e seu§YKaiser Moon§! provou ser um navio formidável. \n \nNo entanto, repetidas observações de longo alcance revelaram que a lua pode ter uma série de falhas que podem ser exploradas a fim de facilitar sua destruição, se tivermos que engajá-la. \n \nUm§YProjeto especial§! foi estabelecido a fim de estudar a engenharia peculiar da Lua de longe e Esperamos encontrar uma maneira de aumentar drasticamente a eficiência de nossas armas quando confrontados com as naves Katzen. \n \nNo entanto, empreender este projeto pode acabar irritando o Kaiser e§Rediminuindo§! sua opinião sobre nós, caso ele descubra isso estamos tentando aprender a melhor maneira de explodir seus navios. "
  giga_katzen.2000.a:0 "Vamos começar imediatamente."
  
  STUDY_KAISER_PROJECT:0 "Estude a Lua Kaiser"
  STUDY_KAISER_PROJECT_DESC:0 "Dedique uma grande quantidade de recursos para espionar os Katzens e estudar sua Lua Kaiser de longe, a fim de encontrar maneiras de contra-atacar. \ N \nCompletar este projeto irá§Aumentar§! O dano de nossas armas contra os Katzens por§G30%§ !, mas fará com que a§Y Opinião do Kaiser§! de nós§Rdecuar§! por§R3§!. \n \nTendo a§Benigmática de Engenharia§! O privilégio de ascensão garantirá que o Kaiser não consiga descobrir nossos planos , evitando a queda de opinião. "
  
  giga_katzen.2001.name:0 "Katzen Fraquezas descobertas!"
  giga_katzen.2001.a.desc:0 "Após vários anos de trabalho árduo, conseguimos localizar vários pontos fracos gritantes dentro do§YKaiser Moon§! de Katzens, o que melhorará drasticamente nossa capacidade de lutar contra ele. Também temos aprendemos muitas coisas sobre a engenharia de Katzen como um todo, o que deve nos ajudar sempre que tivermos que enfrentar suas frotas de frente. \n \nInfelizmente, recebemos a notícia de que o Kaiser ficou ciente disso e de§Yopinion sobre nós§ ! subseqüentemente,§Rdiminuiu§! por§R3§!. \n \nTambém ganhamos acesso a um novo tipo de§Tecnologia repetível§ !, que nos permitirá aumentar ainda mais nossa produção de danos contra o§YKatzenartig Imperium§ !, mas correndo o risco de§Rangering§! o Kaiser ainda mais. "
  giga_katzen.2001.a:0 "Não importa. Deixe-o vir!"
  
  giga_katzen.2001.b.desc:0 "Depois de vários anos de trabalho árduo, conseguimos localizar várias fraquezas gritantes dentro do§YKaiser Moon§! de Katzens, o que vai melhorar drasticamente nossa capacidade de lutar contra ele. Nós também aprendemos muitas coisas sobre a engenharia de Katzen como um todo, o que deve nos ajudar sempre que tivermos que enfrentar suas frotas de frente. \n \nComo um bônus adicional, devido tos nossos métodos científicos complexos e enigmáticos, os Katzens ainda estão completamente alheios aos nossos planos. \n \nTambém ganhamos acesso a um novo tipo de§Tecnologia repetível§ !, que nos permitirá aumentar ainda mais nossa produção de danos contra o§ YKatzenartig Imperium§ !. "
  giga_katzen.2001.b:0 "Excelente."
  
  mod_damage_vs_country_type_katzenartig_imperium_mult:0 "Danos ao Império Katzenartig"
  katzenartig_weaknesses:99 "Katzen Weaknesses"
  katzenartig_weaknesses_desc:0 "Localizamos uma série de falhas na engenharia de Katzen, que podemos explorar para melhor danificar suas frotas."
  
  giga_tech_repeatable_increased_katzen_damage:0 "Análise do ponto fraco de Katzen"
  giga_tech_repeatable_increased_katzen_damage_desc:0 "Ao estudar mais a engenharia do navio Katzen, podemos localizar pontos fracos em seus projetos, que podem ser explorados para facilitar sua destruição.§Benigmática Engenharia§! anulará completamente qualquer risco do Kaiser descobrir sobre nossos planos."
  
  might_anger_kaiser_title:99 "§Y50%§! chance of §Rdecreasing§! the §YKaiser's Opinion§!\n§BEnigmatic Engineering§! prevents opinion drop"
  might_anger_kaiser_desc:99 "Understandably, he isn't too fond of people trying to find out ways to blow up his stuff."
  
  ##MOON DESTROYED##
  giga_flusion.089.name:99 "Kaiser Moon Destroyed!"
  giga_flusion.089.desc:99 "A savage blow was today dealt to the §YKatzenartig Imperium§!. Indeed, overwhelming firepower has managed to succesfully destroy the Imperium's flagship, the mighty §YKaiser Moon§!.\n\nThe vessel, which served as a forward base of operations for the Katzens, has been reduced to a gigantic lunar wreck, causing immense Katzen casualties. The Imperium has entered a state of panic following the loss of their most important military asset, with their high-command retreating to the fortified homeworld of §YFlusion§!.\n\nThe §YKaiser§! has reportedly gone into a mad rage, and it seems their entire empire is now falling into disarray..."
  
  giga_flusion.090.name:0 "Lua Kaiser destruída!"
  giga_flusion.090.desc:0 "Um golpe selvagem foi desferido hoje no§YKatzenartig Imperium§ !. De fato, nossas forças conseguiram aleijar e destruir com sucesso a nau capitânia do Império, o poderoso§YKaiser Moon§!. \n \nO navio , que serviu de base avançada de operações para os Katzens, foi reduzido a um gigantesco naufrágio lunar, causando imensas baixas em Katzen. O Imperium entrou em pânico após a perda de seu recurso militar mais importante, com seu alto comando retirando-se para o mundo natal fortificado de§YFlusion§!. \n \nO§YKaiser§! supostamente ficou furioso e parece que todo o seu império está caindo em desordem ... \n \nComo um bônus adicional, nós também conseguiram recuperar alguns recursos do naufrágio. "
  giga_flusion.090.a:0 "O fim deles é iminente."
  
  giga_flusion.091.name:0 "Lua Kaiser destruída!"
  giga_flusion.091.desc:0 "Um golpe selvagem foi desferido hoje no§YKatzenartig Imperium§ !. De fato, as forças do§Y [kaiser_moon_slayer.GetName]§! conseguiram aleijar e destruir com sucesso a nau capitânia do Império, o poderoso§YKaiser Moon§!. \ N \nA embarcação, que servia como base avançada de operações para os Katzens, foi reduzida a um gigantesco naufrágio lunar, causando imensas baixas em Katzen. O Império entrou em estado de pânico após a perda de seu recurso militar mais importante, com seu alto comando recuando para o mundo natal fortificado de§YFlusion§!. \n \nO§YKaiser§! supostamente entrou em uma fúria louca e parece que todo o seu império está agora caindo em desordem. .. "
  giga_flusion.091.a:0 "O fim deles é iminente."
  
  giga_flusion.090.a.tooltip:0 "O§YKatzenartig Imperium§! sofrerá de§Renúncia§! a§Ytaque de fogo§ !,§Bombardeamento orbital§ !,§Dano de Yarmy§! e§Velocidade do navio§ !."
  
  giga_katzen.092.name:0 "O Império Katzenartig?"
  giga_katzen.092.desc:0 "Após a destruição da Lua Kaiser, o Império caiu em desordem, e Kaiser parece não querer se comunicar com ninguém ..."
  giga_katzen.092.war:0 "Devemos acelerar seu fim,§Reclarar a guerra!§!"
  giga_katzen.092.war.tooltip:0 "§T§RWE DECLARARÁ GUERRA TOTAL NO IMPERIUM KATZENARTIG.§! \n \nA paz§RNOT§! será mais possível. \n \n§YFlusion§! deve ser§Ycapturada§! Ou§Ydestroyed§! Para derrotar o Império para sempre.§T "
  giga_katzen.092.a:0 "Muito bem."
  
  giga_katzen.094.name:99 "The Fall of Flusion"
  giga_katzen.094.desc:0 "Flusion caiu. \n \nDepois de lutas horríveis, as forças de [flusion_conqueror.GetName] dominaram os defensores Katzen em Flusion e assumiram o controle total do planeta. Com a perda de sua capital , o extremamente centralizado§YKatzenartig Imperium§! não pode mais se manter unido e entrará em colapso total nos próximos dias. \n \nEles estão agora interrogando o alto-comando Katzen, a fim de descobrir onde§ YKaiser Kattail§! Está se escondendo, se é que ainda está vivo. \ N \nApesar disso, a galáxia agora pode dar um suspiro de alívio, já que a ameaça de Katzen, finalmente, não existe mais. "
  giga_katzen.094.a:0 "Boa viagem."
  giga_katzen.094.b:0 "Boa viagem."
  
  giga_katzen.095.name:0 "A Destruição da Flusão"
  giga_katzen.095.desc:0 "Flusão caiu. \n \nO planeta foi exposto a intensos disparos de armas e os Katzens foram varridos da superfície do mundo. Com a perda de sua capital, o extremamente centralizado§YKatzenartig Imperium§ ! não consegue mais se manter unida e entrará em colapso total nos próximos dias. \n \nA galáxia agora pode dar um suspiro de alívio, pois a ameaça de Katzen, finalmente, não existe mais. "
  giga_katzen.095.a:0 "Boa viagem."
  
  giga_katzen.097.name:99 "Katzenartig Imperium Collapses"
  giga_katzen.097.desc:0 "Como esperado, com a captura de§YFlusion§ !, o§YKatzenartig Imperium§! não durou muito. Sem seu governo centralizado e o Kaiser para liderá-los, todas as colônias Katzen restantes declararam independência, e o Império foi dissolvido , aparentemente durante a noite. \n \nO outrora poderoso Imperium foi finalmente reduzido a nada além de história. "
  giga_katzen.097.a:0 "Eles tiveram uma boa corrida."
  
