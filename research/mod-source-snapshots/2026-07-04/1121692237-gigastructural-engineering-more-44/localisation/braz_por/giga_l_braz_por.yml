  #
  # giga_acc_physics:0 "The §YStellar Particle Accelerator§! can be specialized in producing §YPhysics Research§! by colliding various particles and observing the results.\n\nBase Production: §Y150§! £physics_research£"
  #
  # giga_acc_dm:0 "The §YStellar Particle Accelerator§! can be specialized in producing §YDark Matter§! thanks to special particle collisions that will generate trace amounts of dark matter.\n\nBase Production: §Y100§! £physics_research£ §Y1§! £sr_dark_matter£\nBase Failure Chance: §R+5%§!"
  #
  # giga_acc_qnm:0 "The §YStellar Particle Accelerator§! can be specialized in producing §YNegative Mass§! thanks to esoteric and very specific particle collisions creating negative matter.\n\nBase Production: §Y80§! £physics_research£ §Y0.7§! £giga_sr_negative_mass£\nBase Failure Chance: §R+10%§!"
  #
  # giga_acc_intensity_5:0 "Current Intensity:\n§BExtreme§!\n\nEffect:\n§G+75% Megastructure Output§!\n§R+200% Megastructure Upkeep§!\n\n$mega_intensity_meaning$"
  # giga_acc_intensity_4:0 "Current Intensity:\n§BHigh§!\n\nEffect:\n§G+50% Megastructure Output§!\n§R+100% Megastructure Upkeep§!\n\n$mega_intensity_meaning$"
  # giga_acc_intensity_3:0 "Current Intensity:\n§BMedium§!\n\nEffect:\n§G+25% Megastructure Output§!\n§R+40% Megastructure Upkeep§!\n\n$mega_intensity_meaning$"
  # giga_acc_intensity_2:0 "Current Intensity:\n§BNormal§!\n\nEffect:\n§Y100% Megastructure Output§!\n§Y100% Megastructure Upkeep§!\n\n$mega_intensity_meaning$"
