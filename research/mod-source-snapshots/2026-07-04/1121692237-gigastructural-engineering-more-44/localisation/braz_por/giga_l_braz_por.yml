  THRUSTER_STRIKE_CORVETTE_DESC:99 "Strike Corvettes require incredible speed and maneuverability if they are to intercept oncoming hostile forces."
  
  giga_dialog.13403.name:99 "Planetary Defense Nexus Mechanics"
  
  giga_megaview_defense_nexus_explain_tooltip:99 "Click to display the §YPlanetary Defense Nexus§!'s mechanics."
  
  defense_nexus_explanation_text:99 "The Defense Nexus relies on its automated fleet of §YStrike Corvettes§! to defend its planet.\n\nIt will construct and store §YStrike Corvettes§! on its own every month.\nThe base maximum capacity is equal to §Yone third§! of the planet's population and can be increased in various ways.\n\n§Y2§! are built each month, with every §Y2000§! pops adding §Y1§! extra corvette per month. Much like the maximum capacity, the build rate can also be increased in different ways.\n\nThe Strike Corvettes however cannot be deployed if the planet is §Runder invasion§! or §Roccupied§! by a hostile force.\n\n§YStrike Corvettes§! are regular §YCorvettes§! lacking §YFTL§! but with increased §Ymobility§! and §Yfirepower§!. We thus §Rdo not§! need to design a new ship class, as the defense squadrons will randomly draw from all of our existing §YCorvette§! designs from the §YShip Designer§!.\n\nThese ships will automatically deploy when a hostile fleet approaches the megastructure and we can configure when the §YStrike Corvettes§! are released using the configuration buttons on the Megastructure's UI itself.\n\nOnce the threats have been eliminated, the defense squadron will return to the §YDefense Nexus§! automatically. There is a cooldown of §Y3 months§! before fleets can be deployed again.\n\nThe megastructure will also spawn one §YPlanetary Guardian§! army on the planet for every §Y1000§! pops living on it."
  
  giga_dialog.13403.a:99 "Acknowledged."
  
  giga_megaview_defense_nexus_explain_tooltip_no:99 "This window is already open."
  
  giga_megaview_defense_nexus_explain_button:99 "§HDisplay Mechanics§!"
  
  giga_defense_nexus_army:99 "Planetary Guardians"
  giga_defense_nexus_army_desc:99 "Armies stationed within the defense nexus tasked with ensuring planetary safety."
  NAME_nexus_army:99 "$giga_defense_nexus_army$"
  
