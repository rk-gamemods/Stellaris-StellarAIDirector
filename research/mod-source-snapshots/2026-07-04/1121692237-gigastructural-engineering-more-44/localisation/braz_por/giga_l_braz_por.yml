  decision_virtual_advanced_effects:99 "Changes the district set to be for production of advanced resources. Cannot be undone."
  
  decision_ringworld_upgrade:99 "Habitable Ringworld Upgrade"
  decision_ringworld_upgrade_desc:0 "Atualize este segmento de mundo de anel em um habitat de mundo de anel capaz de suportar uma biosfera estável em seu lado interno."
  
  decision_ringworld_arcology_project:99 "Ringworld Arcology Project"
  decision_ringworld_arcology_project_desc:99 "An unceasing stretch of arcologies will unite this ringworld segment into one massive mega-city, the largest city the galaxy has ever seen."
  decision_ringworld_arcology_project_effects:99 "Turns this ringworld segment into an §Y$pc_ringworld_city$§!, increasing £housing£ §Y$PLANET_HOUSING_TITLE$§!, §YResource Production§! and §YPop Growth§! and unlocking special £district£ §YArcology Districts§! at the expense of the ringworld's entire surface being transformed, preventing all further construction of £district£ §YGenerator§! and §YAgriculture Districts§!."
  decision_ringworld_arcology_project_requirements:99 "$TRIGGER_FAIL$ §RAll district slots on the planet must be filled with§! §Y$district_city_plural$§! or §Y$district_industrial_plural$§!"
  
  decision_giga_flood_habitat:99 "$decision_flood_habitat$"
  decision_giga_flood_habitat_desc:99 "$decision_flood_habitat_desc$"
  decision_giga_flood_habitat_elysium:99 "\nIf this $name_orb_elysium$ is later decommissioned, the ice spent flooding it §Rwill be lost§!."
  
  #############################################################################################################################################
  ### Ascension Perks #########################################################################################################################
  #############################################################################################################################################
  # ap_slice_of_life:0 "The Slice of Life"
  # ap_slice_of_life_desc:0 "Ringworlds, once viewed as the pinnacle of megaengineering, are now little more than glorified habitats. We therefore must move onto the next step of megaengineering by designing a new type of habitat that outclasses even the largest of ringworlds. The $name_alderson$, a gigantic solar system-sized disk built around a star, would allow us to house an unimaginable quantity of people and industry."
  # add_research_options_alderson:0 "Research options gained:\n£engineering_research£§YThe $name_alderson$§!"
  
  # ap_systemcraft:0 "Esoteric Celestial Weaponization"
  # ap_systemcraft_desc:0 "We are already able to transform entire planets into warships, but some of our more ambitious scientists believe that it might be possible to, somehow, go even bigger. An entire solar system, assembled together to form a warship of unbelievably huge proportions. This grand construct would dwarf even the mighty $name_war_planet$, and last, we might finally have enough dakka."
  # add_research_options_systemcraft_base:0 "Research options gained:\n£physics_research£§YFramework: Stellarscale Propulsion§!\nWe will begin to work on a series of technologies to eventually construct the largest and grandest vessel this galaxy, or perhaps even universe, has ever seen."
  
  ap_vast_expanses:0 "Vastas extensões"
  ap_vast_expanses_desc:0 "Nossas necessidades cada vez maiores de habitação e produção chegaram a um ponto em que temos que nos dedicar à criação do espaço vital definitivo. Para isso, precisamos utilizar plenamente os maiores objetos da galáxia em seu potencial máximo. \n \nPermite que$ehof_ehofp4$encontre um§B Buraco Negro Supermassivo Inativo§! se o centro de nossa galáxia não for um. "
  add_research_options_birch_world:0 "Opções de pesquisa obtidas: \n£engineering_research£§Y$name_birch$§! \nA$name_birch$é um enorme habitat construído em torno do maior dos buracos negros destinados à residência permanente e eterna de uma espécie. Começa como um esfera de metal estéril com um único distrito, mas ganha mais slots de distrito conforme sua população cresce e se expande na superfície da concha, tornando-a capaz de abrigar uma quantidade infinita de pops. "
  
  ap_gigastructural_constructs:0 "Construções Gigastructural"
  ap_gigastructural_constructs_desc:0 "Maior é sempre melhor. Construindo megaestruturas de tamanho e escopo impensáveis, podemos garantir nosso lugar como uma hiperpotência galáctica."
  ap_gigastructural_constructs_add_research:0 "Opção de pesquisa ganha:\n£physics_research£§Y$giga_tech_matrioshka_brain_1$§!\n£physics_research£§Y$giga_tech_hrae_mc$§!\n£engineering_research£§Y$giga_tech_ringworld_behemoth$§!\n\nOpções de pesquisa que precisam disso:\n£physics_research£ §Y$giga_tech_tetradimensional_engineering$§!\n£physics_research£ §Y$giga_tech_ndb_1$§!\n£engineering_research£ §Y$giga_tech_hyperstructural_ass$§!\n£engineering_research£ §Y$giga_tech_nidavellir$§!\n£engineering_research£ §Y$giga_tech_war_planet$§!\n\nRegalias da Ascensão que precisam disso:\n§Y$ap_qso$§!\n§Y$ap_systemcraft$§!\n§Y$ap_celestial_printing$§!\n§Y$ap_slice_of_life$§!\n§Y$ap_vast_expanses$§!"
  
  ap_qso:0 "Uma arma para perfurar os céus"
  ap_qso_desc:0 "A descoberta de um quasar hiperenergético no núcleo galáctico representa uma oportunidade incrível de construir uma arma que ofuscaria até mesmo o$name_ndb$, ou a Systemcraft. Uma arma de tamanho e escala que teria um poder destrutivo de vários ordens de magnitudes maiores do que qualquer coisa construída antes. Uma arma, que destruiria os próprios céus. \n \nPermite que$ehof_ehofp4$encontre um§BActive Supermassive Quasar§! se o centro de nossa galáxia não for um. "
  add_research_options_quasistellar_base:0 "Opções de pesquisa obtidas: \n£física£§YFramework: Blindagem Hiperdimensional§! \nNós embarcaremos em uma missão para montar o§R$name_quasistellar$§ !, um g giganteun, construído em torno do núcleo galáctico, de um poder tão avassalador que nada poderia resistir à sua fúria absoluta. \n \n§RComprar a construção de uma arma tão mortal, sem dúvida, irritará a galáxia como um todo.§! "
  
