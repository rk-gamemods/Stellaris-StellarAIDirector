  giga_aeternum.3032.name:0 "Aeternite Intel plantada com sucesso!"
  giga_aeternum.3032.desc:0 "Através de uma série de operações destinadas a convencer os Aeternites de que não somos uma ameaça para eles, conseguimos impedir com sucesso os seus esforços de rearmamento, já que pesquisas de longo alcance confirmam que a atividade diminuiu ligeiramente dentro o núcleo de seu império. \n \nEstimamos que isso atrasará seu despertar em aproximadamente§Y [bétula_aeternum.aeternum_intel_scramble_awake_delay_value]§! anos. "
  
  giga_category_aeternum:99 "Aeternum"
  aeternum_chain_title:0 "Os Aeternites"
  aeternum_chain_desc:0 "Aeternum exibe tecnologias e armamentos muito além dos nossos. Devemos monitorar esses precursores de perto."
  aeternum_ship_count:0 "§YContagem de navios da Eternite§!"
  aeternum_shroud_count:99 "§MWorlds Shrouded By Aeternum§!"
  aeternum_system_count:0 "§YContagem do sistema eternite§!"
  aeternum_warforge_count:99 "§YAeternite Psykofabricator Count§!"
  ships_lost_to_aeternum:99 "§RShips Destroyed By Aeternum§!"
  aeternum_ships_lost:99 "§GAeternite Ships Destroyed§!"
  
  aeternum_chain_1:0 "Expansão Aeternite"
  aeternum_chain_1_desc:0 "Assim que§YAeternum§! despertar, eles construirão§YAeternite Psykofabricators§! em torno de§MShrouded Worlds§ !, o que irá gerar periodicamente mais frotas para eles. \nEles também usarão§RColossus Weaponry§! e bombardeio para se tornarem habitáveis mundos em mundos tão envoltos. \nPara acabar com eles para sempre, devemos tomar sua capital, o§YAiondia§! Mundo Bétula, com tropas terrestres, o que levará ao colapso completo de seu império. \nPodemos reunir$aeternum_tech_intel$para aumentar os danos que infligimos aos seus navios. "
  
  giga_aeternum.3002.name:0 "Atrasando o inevitável"
  giga_aeternum.3002.desc:0 "Seguindo um estudo adicional de Aeternum, alguns de nossos cientistas começaram a acreditar que, do jeito que está, existe uma série de falhas gritantes na infraestrutura precursora de Aeternum e nas redes de comunicação, que os Aeternites estão ignorando ou francamente acho que eles são muito avançados para qualquer espécie mais jovem explorar essas falhas. \n \nMas, assim como a maioria dos Impérios Caídos, sua arrogância pode muito bem ser sua ruína, pois, com recursos suficientes, podemos apenas ser capazes de identificar essas falhas e posteriormente, explorá-los. Isso nos permitiria retardar o despertar de Aeternite e efetivamente ganhar um tempo valioso antes que eles voltassem à cena galáctica. \n \nPodemos ver as várias pistas que nossos cientistas têm em relação a essas falhas na§YTela de monitoramento de eternite§! . "
  giga_aeternum.3002.a:0 "Anotado. Vamos começar então."
  
  giga_aeternum.4002.name:0 "O Despertar"
  giga_aeternum.4002.desc:0 "Habitantes desta galáxia. \n \nA hora chegou para os Aeternites reivindicarem seu lugar como os únicos governantes do estágio galáctico. \n \nA única paz que devemos aceitar é sua completa e absoluta destruição. \n \nFaça nenhuma tentativa fútil de atrasar ou negociar conosco, e talvez parte de sua população capturada terá permissão para se estabelecer em Aiondia ao nosso lado. "
  
  giga_aeternum.4002.a:0 "Idiotas decrépitos! Você logo encontrará seu fim ..."
  giga_aeternum.4002.purifier:99 "Pretentious xeno scum."
  giga_aeternum.4002.swarm:0 "Presa mal-humorada."
  giga_aeternum.4002.terminator:0 "Você será extinto."
  
  giga_aeternum.4004.name:0 "A recuperação eterna"
  giga_aeternum.4004.desc:0 "E assim, independentemente de quão preparados estivéssemos, Aeternum e suas armadas estão agora sobre nós. Devemos agora esperar que nossas defesas e frotas estejam prontas para lidar com esta tempestade que se aproxima. \n \nFelizmente, nossa§YAeternite Intelligence Agency§! Acredita que, se possuirmos$aeternum_tech_intel$suficientes, poderemos fazer a engenharia reversa de embarcações e tecnologia Aeternite para nós mesmos. \ N \nEnquanto isso seria extremamente caro e muito perigoso, o benefício de fazer isso é inegável. Nesse ínterim, devemos tentar reunir o máximo de informações possível, a fim de aumentar nossas capacidades de combate contra os navios Aeternite e, esperançosamente, virar a maré da guerra contra eles. "
  giga_aeternum.4004.a:0 "Anotado. Vamos mostrar a eles!"
  
  giga_aeternum.4000.a.tooltip:0 "§Novas operações estão agora disponíveis na Aeternite Intelligence Agency.§!"
  
  aet_intel:99 "Aeternite Technological Intel"
  aet_intel_desc:99 "Our knowledge of Aeternite technology enhances our combat capabilities against them."
  
  mod_damage_vs_country_type_dormant_aeternum_mult:99 "Damage to Aeternum"
  
  #contact#
  
  giga_aeternum.2000.name:0 "Os precursores de Aeternite"
  
  giga_aeternum.2000.desc.a:0 "§B << INICIANDO PROTOCOLOS DE SAUDAÇÕES >>§! \n \nSaudações,§Y [ROOT.GetName]§ !. Sou uma§YUnidade Diplomática Psicossintética de Eternita§ !, implantada em servir como uma interface entre§YAeternum§! e o resto da galáxia. De acordo com os protocolos diplomáticos, uma varredura será conduzida em sua civilização. \n \n§B << ANALISANDO O DESENVOLVIMENTO SOCIETAL E INTELECTUAL DO RECIPIENTE >>§ ! \n \nDevido ao seu nível atual de desenvolvimento tecnológico, sua solicitação para se comunicar diretamente com os§YAeternite Precursores§! foi§R <<DENIED>>§! \n \nPara saciar o desejo de conhecimento de sua espécie e para garantir a não interferência nos assuntos Aeternite, compilamos informações básicas sobre nossa civilização dentro de um§BBanco de Dados§ !, que você pode ler se assim desejar. \n \n§B << TERMINANDO PROTOCOLOS DE SAUDAÇÃO >>§! "
  
  giga_aeternum.2000.who:0 "Quem são os Aeternites? |§BDATABANK§!"
  giga_aeternum.2000.who.response:0 "§B << RECUPERANDO INFORMAÇÕES DO BANCO DE DADOS >>§! \n \n§YAeternum§! consistem em uma civilização que reside em§YAiondia§ !, um§YMundo Bétula§! construído em torno do§ YGalactic Core§ !. O mundo natal Aeternite original de§YKouihmatalla§! Não é mais habitado, com toda a população atualmente residindo no Mundo Bétula. De acordo com os protocolos, eles não desejam ser perturbados, e em nenhuma circunstância os externos devem galáxia pode interferir nos assuntos de Aeternite. \n \nA população de Aiondia totaliza atualmente§Y10.6 quatrilhões§ !, ocupando aproximadamente§Y0,014%§! da área habitável da estrutura, com os§Y99,986%§ restantes! sendo§R << FALTA DE DADOS >>§! \ N \nA ameaça à segurança da Aeternite resultará em seu§Remissão imediata§!. \ N \n§B << FIM DO REGISTRO DE DADOS >>§! "
  
  giga_aeternum.2000.howold:0 "Quantos anos tem a sua civilização? |§BDATABANK§!"
  giga_aeternum.2000.howold.response:0 "§B << RECUPERANDO INFORMAÇÕES DO BANCO DE DADOS >>§! \n \nA idade estimada de§YAeternum§! é§Y1,2 milhões de ciclos padrão§ !,§Y931 mil§! dos quais foram gastos em§YAiondia§!. \n \nEste ciclo galáctico é o§Y9th§! ciclo para restabelecer as§Hiperfaixas centrais Ygalactic§ !, que serão automaticamente interrompidas nos próximos séculos por disruptores taquiônicos automatizados. \n \nPor favor, não tente se intrometer com a civilização Aeternite enquanto as pistas estiverem abertas. \n \n§B << FIM DO REGISTRO DE DADOS >>§! "
  
  giga_aeternum.2000.war:0 "Sua civilização decrépita não tem lugar aqui. |§RDECLARE WAR§!"
  giga_aeternum.2000.war.tooltip:0 "Iremos§RDECLARE WAR§! na antiga nação de§YAeternum§!. \n \nEles irão§RNOT§! aceitar a paz. \n \nOs únicos resultados são a vitória total, ou destruição total. "
  giga_aeternum.2000.war.response:0 "§R << AVISO: PRIMITIVAS NÃO COMPLICANTES QUE EXIBEM COMPORTAMENTO HOSTIL >>§! \n \n§R << INICIANDO PROTOCOLOS DEFENSIVOS >>§!"
  
  giga_aeternum.2000.warawake:0 "Não vamos deixar você terminar o seu despertar! |§RDECLARE WAR§!"
  giga_aeternum.2000.warawake.tooltip:0 "Iremos§RDECLARE WAR§! na antiga nação de§YAeternum§!. \n \nEles vão§RNOT§! aceitar a paz. \n \nOs únicos resultados são a vitória total, ou destruição total. \n \nComo eles estão preparando seu§YAwakening§ !, eles serão mais poderosos quanto mais perto estiverem do despertar. "
  giga_aeternum.2000.warawake.response:0 "§R << AVISO: PRIMITIVOS NÃO COMPLICANTES QUE EXIBEM COMPORTAMENTO HOSTIL DURANTE PROTOCOLOS DE RECONSTRUÇÃO >>§! \n \n§R << INICIANDO PROTOCOLOS DEFENSIVOS >>§!"
  
  giga_aeternum.2002.name:0 "Os precursores de Aeternite"
  giga_aeternum.2002.desc.a:0 "Você cometeu um erro fatal, [ROOT.GetName]. O [ROOT.GetSpeciesNamePlural] logo juntará milhares de outras espécies nas profundezas infinitas da história galáctica."
  giga_aeternum.2002.desc.b:0 "Jogue jogos estúpidos, ganhe prêmios estúpidos."
  giga_aeternum.2002.desc.c:0 "Sua espécie nem está exibindo insolência, mas pura estupidez."
  giga_aeternum.2002.desc.d:0 "Perturbar os Aeternites será seu último erro, [Root.GetSpeciesName]. Uma tentativa final, que você está fadado ao fracasso."
  giga_aeternum.2002.a:0 "Assim seja, tolos decrépitos. Vamos nos encontrar no campo de batalha."
  
  giga_aeternum.2003.name:0 "Os precursores de Aeternite"
  giga_aeternum.2003.desc.a:0 "Os Aeternites devem reclamar o seu lugar como governantes supremos desta galáxia."
  giga_aeternum.2003.desc.b:0 "A paz só será alcançada através da sua destruição completa."
  giga_aeternum.2003.desc.c:0 "Devemos mostrar à sua espécie o verdadeiro significado da guerra, [Root.GetSpeciesName]."
  giga_aeternum.2003.desc.d:0 "Não tente negociar a paz. Nós a estabeleceremos nós mesmos."
  giga_aeternum.2003.a:0 "Vamos nos encontrar no campo de batalha."
  
  # giga_aeternum.2000.desc.b:0 "Go away. Don't try to negotiate anything with us. We do not care."
  # giga_aeternum.2000.desc.c:0 "You sicken me."
  # giga_aeternum.2000.desc.d:0 "Stop bothering us. Leave. Do not come back."
  # giga_aeternum.2000.desc.e:0 "Whatever it is, we don't care. We really don't."
  # giga_aeternum.2000.desc.f:0 "Go back to your petty galactic affairs before we end them for good."
  # giga_aeternum.2000.desc.g:0 "Leave. Now. Just do it."
  # giga_aeternum.2000.desc.h:0 "Why do you even bother? Needlessly nagging us won't make you look more important."
  # giga_aeternum.2000.desc.i:0 "You mean nothing to us. Just like the thousands of other civilizations that came before you."
  # giga_aeternum.2000.desc.j:0 "Get out of here before we make the Contingency look like a tea party."
  # giga_aeternum.2000.desc.k:0 "Know your place, savage. We could smite your entire species back into the stone age if we wanted to."
  # giga_aeternum.2000.desc.l:0 "Leave us alone. We do not wish to partake in your pointless affairs."
  # giga_aeternum.2000.desc.m:0 "You asinine cretins. You complete fools. Absolute, utter buffoons. You bumbling imbeciles. Go away, and never return."
  
  giga_aeternum.2000.a:0 "Adeus."
  
  giga_aeternum.2001.name:0 "Os precursores de Aeternite"
  giga_aeternum.2001.desc:0 "§Y [ROOT.GetName]§ !. Eu sou§Y [birch_aeternum.GetRulerName]§ !, indiscutível Imperatriz de§YAeternum§ !. Sua estranha declaração de guerra não passou despercebida, e eu chegaram para emitir um aviso final para sua espécie. \n \nEstamos dando a você a chance de se abaixar e perceber a gravidade e a inanidade de seu erro, antes de implantarmos nossos protocolos de defesa e apagar sua civilização do mapa galáctico, como o milhares que tiveram a audácia de nos desafiar no passado. \n \nPara seu próprio bem, recomendamos que você faça a escolha certa. "
  giga_aeternum.2001.a:0 "Estamos falando sério, Aeternites. Isso é guerra."
  giga_aeternum.2001.a.response:0 "Você já se perguntou o que era o Grande Filtro? Seu tipo está prestes a descobrir,§Y [ROOT.GetName]§ !."
  giga_aeternum.2001.b:0 "Parece que fomos mal orientados. Não vamos entrar em conflito."
  giga_aeternum.2001.b.response:0 "Você fez a escolha certa."
  
