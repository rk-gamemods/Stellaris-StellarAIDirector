  giga_galactic_core_aeternum_5:99 "£menu_aet_5£Aeternum (§YLux Aeternum§!)\nAeternum will be §Yinfinitely more powerful§!, receiving the same buffs as §ROmega Aeternum§!.\n\nIn addition to this, having managed to become a Champion but unwilling to go further, they will use §YOmega Components§! from the §YSecrets Beyond the Gates§! mod, granting them near-unlimited power.\n\n§BThey will awaken instantly\nDelaying their awakening will be impossible\nAiondia will be a powerful Birch Void Sphere\nPsykofabricators will be built much more frequently and have no cap instead of 10§!\n\n§RFOR USE WITH EXTREMELY POWERFUL MODS!\n\n$aeternum_spawn_mechanics$\n\n§HONLY AVAILABLE IF THE "ANCIENT CACHES OF TECHNOLOGIES" AND "SECRETS BEYOND THE GATES" MODS ARE ALSO ENABLED!§!"
  
