  mercuria_name:99 "§YMercurreich§!"
  mercuria_desc:0 "§LMercurreich, também conhecido como Mercuria, é uma ilha isolada no oceano Flusionian setentrional. Povoada por seres vegetais reclusos, os Katzens usam a ilha para testar novos e emocionantes designs de ogivas .§!"
  
