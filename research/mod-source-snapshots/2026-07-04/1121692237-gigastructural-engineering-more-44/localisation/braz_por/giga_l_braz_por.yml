  zousa_name:99 "§YLinteria§!"
  zousa_desc:0 "§LLinteria é habitada por criaturas aviárias que possuem a habilidade de abrir portais e se teletransportar através do subespaço. Os Katzens estão estudando suas habilidades para otimizar seus designs de hiperdrive. \n \nA região apresenta um colossal§YJump Drive Scrambler§! na tecnologia Linteriana, que impede que as naves pulem no Sistema Jublio§! \n \n§BO Jump Drive Scrambler falhará se as Atividades Partidárias crescerem o suficiente!§! "
  
