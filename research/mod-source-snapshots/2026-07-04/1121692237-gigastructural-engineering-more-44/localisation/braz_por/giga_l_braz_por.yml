  giga_news_title:99 "Mod News & Latest Changes"
  giga_news_log:99 "§B---------------------------- June 22nd, 2026 --------------------------------§!\n§HMOD VERSION, 3.38.0 by Tempest, Caramel & Xahkarias§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nA massive amount of changes, with initial compatibility for Stellaris v4.4 and Nomads. Large amounts of tweaks, fixes, and modernizations. Notably, §YWilderness§! can now access more Gigas content, §YCelestials§! are no longer DLC locked, the §YKaiser§! has been touched up in multiple ways, and §RSUPERTENSILES ARE DISABLED DUE TO BUGS§!. More §INomad§! integration to come in the future!\n\n§B----------------------------- May 11th, 2026 --------------------------------§!\n§HMOD VERSION, 3.37.0 by Tempest, Caramel & Xahkarias§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nTremendous patchnotes. A humongous quantity of fixes, alongside a general rebalance to §YBlokkats§! & §YCelestials§!, as well as §YAlderson Start§! & §YCompound§! improvements!\n\n§B----------------------------- April 12th, 2026 --------------------------------§!\n§HMOD VERSION, 3.36.4 by Caramel & Xahkarias§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nApril's Fool specialties have been removed... see you all next year! Numerous fixes and miscellaneous improvements.\n\n§B----------------------------- April 1st, 2026 ---------------------------------§!\n§HMOD VERSION, 3.36.3 by Caramel, Tempest, Xahkarias & PIECAT§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nThe §YSirenalia§! crisis is now finally fixed! It is enabled by default in the §YArcade§! Preset, and in the §YGigas Experience§! preset for the §Ynext week§!. And of course, numerous fixes as well.\n\n§B--------------------------- March 18th, 2026 -------------------------------§!\n§HMOD VERSION, 3.36.2 by Tempest, Xahkarias, PIECAT & TTFTCUTS§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nThe mod has been updated for §Y4.3§!, with numerous balance changes, alongside reworks to the §YQuasi-Stellar Obliterator§! and §YOrbital Bastion§! (now §YOrbital Naval Logistics Office§!) by Tempest.\n\n§B--------------------------- January 18th, 2026 -------------------------------§!\n§HMOD VERSION, 3.36.1 by TTFTCUTS, Xahkarias & Dodosman§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nThe §YMatrioskha Brain Uplinks§! and the §YSquareworld§! have been updated to 4.0! Alongside a myriad of other fixes, notably to Tankbound.\n\n§B--------------------------- January 1st, 2026 -------------------------------§!\n§HMOD VERSION, 3.36.0 - 'PONDERING THE ORB', by TTFTCUTS, dodomans & Xahkarias§!\n§GSee the Discord for full/detailed patchnotes.§!\n\n§RH§!§HA§!§YP§!§GP§!§BY§! §MN§!§RE§!§HW§! §YY§!§GE§!§BA§!§MR§!\n§YREVAMPED BIRCH WORLD§!\nThe Birch World has been updated to 4.0+ standards! Insulae and Sectors are back with improved UI and access to district specializations. Aiondia too has been updated to take advantage of this design, integrating Aeternum closer with more recent Birch systems. Alongside, of course, many miscellaneous fixes.\n§B-------------------------- November 9th, 2025 ------------------------------§!\n\n§HMOD VERSION, 3.35.2, by Tempest, Xahkarias and dodosman§!\n§GSee the Discord for full/detailed patchnotes.§!\n\n§YRE-ENABLED MAGINOT WORLDS§!\nThe Maginot World is back, alongside numerous bugfixes.\n\n§B------------------------ September 25th, 2025 ----------------------------§!\n§HMOD VERSION, 3.35.0 - 'SPARBLERONI PIZZA' by Elowiny§!\n§GSee the Discord for full/detailed patchnotes.§!\n\n§YREWORKED ALDERSON DISK.§!\nThe Alderson Disk is back, with giant 4-zone districts!\n\n§YBULK MATTER REWORK§!\nLarge megastructures now require Bulk Matter harvested from planets. Get dismantling!\n\n§YPLANETARY SEEDER NEXUS§!\nBuilt around a Gas Giant and creates food deposits across a whole system! Suggested by Reddit user markjsno1 on r/Stellaris.\n\n§B------------------------ September 22nd, 2025 ----------------------------§!\n§HMOD VERSION, 3.34.3 by Elowiny§!\n§GSee the Discord for full/detailed patchnotes.§!\nVersion 3.34.3 brings compatibility with 4.1 for planetviews and tankbound. Report any missed issues on the Discord!\n\n§B--------------------------- June 16th, 2025 ---------------------------------§!\n§HMOD VERSION, 3.34 by TTFTCUTS, PIECAT & Elowiny§!\n§GSee the Discord for full/detailed patchnotes.§!\nVersion 3.34.1 at last re-enable the §YKatzenartig Imperium§!, alongside a plethora of other bugfixes!\n\n§B---------------------------- May 6th, 2025 ----------------------------------§!\n§HMOD VERSION, 3.34 by Elowiny & TTFTCUTS§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nVersion 3.34 brings §Ypartial compatibility§! with §Y4.0§!! However, some parts of the mod remain disabled for now while we fix them, these include the §YFrameworld§!, §YOrbital Elysium§!, §YAlderson Disk§!, §YAsteroid Industry§!, §YMatrioskha Brain VR§! (M.B. output doubled to compensate), the §YRingworld Variants§!, the §YInterstellar Habitat§!. the §YKatzenartig Imperium§!, §YSirenalia§! and the full scope of the §YBirch World§! (still available, but simplified). Expect §Yhotfixes§! bringing them back progressively over the next couple days and weeks!\n\n§B---------------------------- April 3rd, 2025 ----------------------------------§!\n§HMOD VERSION, 3.33 by PIECAT, Tempest, Elowiny & TTFTCUTS§!\n§GSee the Discord for full/detailed patchnotes.§!\n\nVersion 3.33 brings a rework to the §YB.I.G. Vat§!, the new easier §YAlpha Aeternum§! difficulty, a §Yrework§! to the menu, numerous QoL fixes, and the new §YConfiguration§! selection screen before the menu!\n\n§YIF YOU HAVE FEEDBACK ABOUT THE NEW CONFIGURATION SELECTION MENU, MAKE SURE TO LEAVE IT ON THE DISCORD!§!\n\n§B--------------------------- January 2nd, 2025 -------------------------------§!\n§HMOD VERSION, 3.32.3 by PIECAT & Tempest§!\n§GSee the Discord for full/detailed patchnotes.§!\n\n§RH§!§HA§!§YP§!§GP§!§BY§! §MN§!§RE§!§HW§! §YY§!§GE§!§BA§!§MR§!\nVersion 3.32.3 brings numerous much-needed fixes as well a second page for presets since we ran out of space.\n\n§B-------------------------- November 16th, 2024 -----------------------------§!\nFinally updated the §YBlokkat Portraits§!, §YPaluush Portraits§! and §YKatzen Portraits§! sub/standalone mods to 3.14! You can check them all out of the Workshop via the §YElowiny's Mods§! collection.\n\n§B-------------------------- November 20th, 2024 -----------------------------§!\n§HMOD VERSION, 3.32 by PIECAT§!\n§GSee the Discord for full/detailed patchnotes.§!\n\n§YMACROATMOSPHERIC STABILIZER§!\nReworked Gas Districts to provide powerful ruler jobs which provide Exotic Gas output to technicians on the planet.\n\n§B-------------------------- November 16th, 2024 -----------------------------§!\n§HMOD VERSION 3.32 - 'CUE THE TRIUMPHANT RETURN'§!\n§GSee the Discord for full/detailed patchnotes.§!\n\n§YTHE SUPERMASSIVE E.H.O.F.§!\nBuilt around an Inactive Core, provides immense buffs to fleet mobility.\n\n§YREWORKED TERRAFORMING MEGASTRUCTURES§!\nThey are now built from a singular site, and rather than terraforming by themselves, enable the terraformation of their planet via conventional terraforming.\n\n§YREWORKED STRIPMINE/S.U.C.C./MEGABORE§!\nThey no longer run out, and instead generate and buff Mote/Gas/Crystal deposits on their planet.\n\n§Y14 NEW SPECIMENS§!\nMostly related to events and crises. Can you find them all?\n\n§YASCENSION PERKS MERGED§!\nAlderson Disk no longer requires a perk, Systemcraft perk merged with Celestial Assembly perk.\n\n§YKATZENARTIG IMPERIUM DISABLED BY DEFAULT§!\nDue to how disruptive Kaiser can be to the unprepared player, the decision has been made to disable him by default."
  
  
