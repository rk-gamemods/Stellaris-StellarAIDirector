  building_giga_siegfried_global_bunker:99 "Siegfried Central Command"
  building_giga_siegfried_global_bunker_desc:99 "This vast network of reinforced bunkers houses the administrative heart of a Katzen Siegfried World, ensuring its defenders are as efficient as possible."
  
  pc_giga_siegfried_world:99 "Siegfried World"
  pc_giga_siegfried_world_desc:99 "A fortress world of Katzen design, the Siegfried World is designed to be a major roadblock to any hostile empire attempting to reach the heart of the Katzenartig Imperium. These mighty fortifications are rigged to completely detonate if ever seized by enemy forces and as such are only staffed by the most nationalistic and dedicated of Katzens."
  
  building_katzen_foundry:99 "Katzen Megafoundry"
  building_katzen_foundry_desc:99 "The Katzen Megafoundry produces large quantities of usable alloys with the unfortunate side-effect of damaging its planet's climate."
  
  building_katzen_theater:99 "Katzen Entertainment Complex"
  building_katzen_theater_desc:99 "These vast complexes provide citizens with large quantities of Katzen-approved mass media primarily focusing on warfare and militarism."
  
  building_katzen_science:99 "Katzen Research Center"
  building_katzen_science_desc:99 "A large facility where researchers work tirelessly to push the boundaries of Katzen science (reportedly the \"best in the galaxy\") further and further. The nature of the experiments conducted within are however somewhat... controversial, at times, often being undertaken on less-than-willing test subjects comprised of criminals deemed 'unredeemable' and death row inmates."
  
  katzenartig_chain_3:99 "Katzen Economic Status"
  katzenartig_chain_3_desc:99 "§PKatzen Resources§! represents an amalgamate of the resources employed by the Katzens. They are required to build new ships and fuel their §YWarforges§!.\n\nConversion rates between monthly regular resources and monthly §PKatzen Resources§! are as follow:\n§Y50§! £energy£/£trade£ = §Y1§! §PKatzen Resource§!\n§Y20§! £minerals£ = §Y1§! §PKatzen Resource§!\n§Y1§! £alloys£ = §Y1§! §PKatzen Resource§! \n§Y5§! £consumer_goods£ = §Y1§! §PKatzen Resource§! \n§Y5§! £rare_crystals£/£volatile_motes£/£exotic_gases£ = §Y1§! §PKatzen Resource§!\n\nCurrent §GIncome§!: §Y[flusion_primitives_country.kaiser_resource_income]§! §PKatzen Resources§!\nCurrent §RSpending§!: §Y[flusion_primitives_country.kaiser_resource_spending]§! §PKatzen Resources§!\n\nCurrent §HBalance§!: §Y[flusion_primitives_country.kaiser_resource_balance]§! §PKatzen Resources§!\nCurrent §BStockpile§!: §Y[flusion_primitives_country.kaiser_resource_stockpile]§! §PKatzen Resources§!"
  
  katzenartig_chain_4:99 "Katzen Research Efforts"
  katzenartig_chain_4_desc:99 "§BKatzen Research Output§! represents how much technological progress the Katzens are making every month as they work towards their next tech level.\n\n§GKatzen Tech Level§! represents how advanced the Katzens have become, with each level increasing §YHull§!, §YArmor§! & §YShields§! §YHP§! by §Y[flusion_primitives_country.cdk_kaiser_other_buff_desc]%§!, §YFire Rate§! and §YWeapons Damage§! by §Y[flusion_primitives_country.cdk_kaiser_weapon_buff_desc]%§!, §YArmy Damage§! and §YArmy Health§! by §Y[flusion_primitives_country.cdk_kaiser_other_buff_desc]%§! and §YMegastructure Build Speed§! by §Y[flusion_primitives_country.cdk_kaiser_other_buff_desc]%§!.\n\nCurrent Monthly §BKatzen Research§!: §Y[flusion_primitives_country.kaiser_tech_income]§!\nProgress to next §GKatzen Tech Level§!: §Y[flusion_primitives_country.kaiser_tech_stockpile]§!/§Y[flusion_primitives_country.kaiser_tech_to_next_level]§!\n\nCurrent §GKatzen Tech Level§!: §Y[flusion_primitives_country.kaiser_tech_level]§!\nExtra §HShip Hull§!/§HArmor§!/§HShields§!: §Y[flusion_primitives_country.kaiser_tech_ship_hp_buff]%§!\nExtra §HWeapons Damage§! & §HFire Rate§!: §Y[flusion_primitives_country.kaiser_tech_damage_buff]%§!\nExtra §HArmy Damage§! & §HArmy Health§!: §Y[flusion_primitives_country.kaiser_tech_army_buff]%§!\nExtra §HMegastructure Build Speed§!: §Y[flusion_primitives_country.kaiser_tech_mega_speed_buff]%§!"
  
  
  katzen_economy_modifier:99 "Katzen Economy Mechanics"
  katzen_economy_modifier_desc:99 "All that matters are Alloys and Research."
  
  col_katzen_capital:99 "Katzen Imperial Capital"
  col_katzen_capital_desc:99 "Flusion is the beating heart of the Katzenartig Imperium, practically being considered a holy world by its inhabitants and the Kaiser himself."
  
  col_katzen_foundry:99 "Katzen Foundry World"
  col_katzen_foundry_desc:99 "The Katzens have dedicated this planet to producing refined alloys."
  
  col_katzen_research:99 "Katzen Laboratory World"
  col_katzen_research_desc:99 "The Katzens have dedicated this planet to advancing their scientific base."
  
  col_katzen_fortress:99 "Katzen Fortress World"
  col_katzen_fortress_desc:99 "The Katzens have dedicated this planet to becoming an impenetrable fortress."
  
  
  pc_flusion_gaia_ecu:99 "Flusio-Arcology"
  pc_flusion_gaia_ecu_desc:99 "The Flusio-Arcology makes full usage of Flusion's vast natural resources. The cities of Katown, Bundengrad and Teho have been transformed into gargantuan gigacities spanning large portions of the planet and capable of housing dozens of billions of inhabitants each. The rest of the planet has been altered to ecological perfection and now harbors a variety of climates fit for every single species native to Flusion."
  
  katzen_rebel_got_support:99 "Foreign Support"
  katzen_rebel_got_support_desc:99 "This rebel state is being supported by alien empires in their struggle against the Kaiser."
  
  katzen_agri_crisis_starvation:99 "Katzen Agricultural Crisis"
  katzen_agri_crisis_starvation_desc:99 "The Kaiser is drawing food from other parts of the Katzenartig Imperium in order to feed Flusion, to the detriment of fringe worlds."
  
  giga_flusionoperations.506.name:99 "Agricultural Crisis in the Katzenartig Imperium!"
  giga_flusionoperations.506.desc:99 "The disruption of both the §YRoqualtropa§! and §YKatlantropa§! projects have thrown §YFlusion§!'s agricultural production into disarray.\n\nWith the climate being significantly impacted by the sudden halt of both geoengineering projects, the Katzen capital is effectively no longer able to feed itself. In order to avoid famine on his most important world, the §YKaiser§! has subsequently reversed Flusion's role regarding food production, with it now importing large quantities of food from other parts of the empire instead of serving as its breadbasket, to the detriment of other potential Katzen colonies.\n\nThis has thus sparked a major §YAgricultural Crisis§! within the Imperium, as fringe outposts in the empire are no longer able to feed themselves properly with Flusion itself hogging the majority of the nation's food supply.\n\nAs such, several independentist movements have begun to grow in strength within other parts of the §YKatzenartig Imperium§! and political analysts expect that the neglected parts of the Katzen empire might very well end up declaring independence if the Kaiser fails to address their problems.\n\nThis period of turmoil is expected to last for upwards of a §Yyear§!, during which parts of the Kaiser's empire might very well end up revolting against his rule."
  giga_flusionoperations.506.a:99 "So much for Flusiocentrism, huh?"
  giga_flusionoperations.506.a.tooltip:99 "Various parts of the §YKatzenartig Imperium§! might break free during the next 8 months."
  
  giga_flusionoperations.505.name:99 "Katzen Colony Revolts!"
  giga_flusionoperations.505.desc:99 "News have reached us that because of the §YAgricultural Crisis§! currently plaguing the §YKatzenartig Imperium§!, the Katzen colony of §Y[giga_katzen_agri_crisis_planet.GetName]§! has revolted against the Kaiser's rule and declared complete independence from Flusion, formally establishing the §Y[giga_katzen_agri_crisis_country.GetName]§! as a sovereign nation.\n\nThe Kaiser has immediately declared open hostilities towards the new regime and is likely going to attempt re-taking the world within the coming months."
  giga_flusionoperations.505.a:99 "A struggle for survival."
  giga_flusionoperations.505.b:99 "Send them some support. | §Y750§! £trade£ & §Y200§! £alloys£"
  giga_flusionoperations.505.c:99 "Sent them support. | §Y1500§! £trade£ & §Y400§! £alloys£"
  giga_flusionoperations.505.d:99 "Sent them major support! | §Y2500§! £trade£ & §Y800§! £alloys£"
  
  giga_flusionoperations.4000.name:99 "Blowing up the §YKatlantropa Dams§!"
  giga_flusionoperations.4000.desc:99 "The §YKatlantropa Dams§! consist of a pair of dams built on the §YKatsula§! and §YPolga§! rivers. The redirected water has been used to create new artificial lakes, irrigating once-deserting areas and permitting agriculture in previously uninhabitable places.\n\nOur agents will have to strategically detonate small warheads within both dams, which will disrupt the project as a whole and have a drastic impact on Flusion's agricultural output.\n\n§YIf successful§!:\n§YFlusion§! and the §YKatzens§! will get debuffs due to disruption of their agriculture and supply chains, reducing their §YShip HP§! and §YShip Fire Rate§!.\nKatzen Wariness will §Rincrease§! by §R3§!\nResistance in §YLyuinstaat§! and §YGeschwollen§! will decrease by §Y1§!\n\n§YIf failure§!:\nKatzen Wariness will §Rincrease§! by §R1§!.\n\n§YChance of success§!:\nBase: §Y70%§!\n§HKatzen Wariness§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§RHigh Risk Level§!: §R-30%§!\n§BGlobal Partisan Activity§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\n§BPartisans in Mercurreich§!: §G+[flusion_primitives_country.mercuria_res_perc]%§!\nTotal: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
  
  giga_flusionoperations.4001.name:99 "§YKatlantropa Dams§! Blown"
  giga_flusionoperations.4001.desc:99 "Following a series of sabotages targeting the twin dams on the §YKatsula§! and §YPolga§! rivers, our Roqualian allies report that friendly Kronk and Yinjite partisans have managed to successfully bring down the aforementioned dams.\n\nThe two rivers will now be able to flow freely and slowly fill the Catspian Sea back up. This will effectively reverse localized terraforming efforts and lead to the collapse of Katzen agricultural efforts in the immediate area.\n\nSome of the populations living near the Catspian Sea have however been alienated by this act, as this will lead to a slow flooding of coastal areas as the sea rises back up and the disruption of Katzen agricultural efforts will lead to famine in the poorest areas of Flusion.\n\n§YLoris Von Kattensbach§!, governor of Flusion and main proponent of the project, has reportedly gone into a mad rage followed by a deep depression, before eventually giving a heated speech spewing insults and vows of revenge at the partisans responsible for this action.\n\nThe success chance was §Y[flusion_primitives_country.flusion_operation_odds]%§!"
  
  giga_flusionoperations.4001.a:99 "It will all be worth it in the end."
  giga_flusionoperations.4001.a.tooltip:99 "Katzen wariness §Rincreases§! by §R3§!\nResistance in §YGeschwollen§! and §YLyuinstaat§! decreases by §Y1§!."
  
  giga_flusionoperations.4002.name:99 "Dam-Busting Operation Foiled"
  giga_flusionoperations.4002.desc:99 "Our Roqualian allies are reporting that the Katzens have managed to locate and remove the small warheads planted within and around the §YKatlantropa Dams§! before any damage could be dealt to them. The agents infiltrating the dam were then arrested and executed for high treason against the Katzen state.\n\nBecause of this, the Katzens are likely to further reinforce the security surrounding the dams in the coming weeks, leading to an increase in §YKatzen Wariness§!.\n\n§YLoris Von Kattensbach§! himself has given a speech denouncing the "Cowardice" and "Foolishness" of these partisans attempting to "Sabotage glorious Katzen engineering".\n\nThe success chance was §Y[flusion_primitives_country.flusion_operation_odds]%§!"
  giga_flusionoperations.4002.a:99 "A shame."
  giga_flusionoperations.4002.a.tooltip:99 "Katzen wariness §Rincreases§! by §R1§!."
  
  katlantropa_economic_crisis:99 "Katlantropa Economic Turmoil"
  katlantropa_economic_crisis_desc:99 "The agricultural loss caused by Katlantropa is having a drastic effect on the Katzens' supply lines."
  
  giga_blow_loris_dam_desc:99 "\n§HRisk Level§! - §RHigh§!\n§HLocation§! - §BKatsula & Polga Rivers, Südkronk Administrative Region§!\n\nMission Requirements:\n§RExtreme Partisan Activity in Geschwollen§!\n§HSignificant Partisan Activity in Lyuinstaat§!\n\n§LThe brainchild of governor and environmental engineer §YLoris Von Kattensbach§!, §YKatlantropa§! is a large-scale irrigation project involving the redirection of several rivers (notably the §YKatsula§! and the §YPolga§!) thanks to huge dams in order irrigate the more desertic areas of Flusion and transform them into arable farmland.\n\nIt also has the expected consequence of lowering the sea level of the §YCatspian Sea§!, which in turns grants more space for the Katzens to expand their Flusionian industries, while the evaporated water is redirected by weather manipulation towards areas of Flusion in dire need of extra rainfall.\n\nIt was the first Katzen draining project before Roqualtropa, guided and proposed by Loris. The project also helped to develop the industry of the former Kronk and Yinjite nations, using the vast salt plains created by it.§!\n\n§BAlthough not required, ensuring §YMercurreich§! has high resistance will increase the success odds as the partisans will be able to smuggle extra warheads to ensure the detonations goes well.§!\n\n§BDestroying both the §YRoqualtropa§! and the §YKatlantropa§! Dams will cause an §GAgricultural Crisis§! within the Imperium, which might cause fringe worlds to revolt against the Kaiser's rule!§!\n\n§HDisrupting the dam will cause the §YCatspian Sea§!'s level to slowly rise again over a few years, disrupting the coasts and climate of §YGeschwollen§! and §YLyuinstaat§!, which will in turn §RLOWER§! the resistance in those areas by §R1§! as their inhabitants are unlikely to support this move.§!"
  
  giga_blow_loris_dam_no:99 "§YBlow the Katlantropa Dams§!\n\n§HStatus§! - §RUnavailable§!$giga_blow_loris_dam_desc$"
  
  giga_blow_loris_dam_yes:99 "§YBlow the Katlantropa Dams§!\n\n§HStatus§! - §GAvailable§!$giga_blow_loris_dam_desc$"
  
  giga_blow_loris_dam_done:99 "§YBlow the Katlantropa Dams§!\n\n§HStatus§! - §BCompleted§!$giga_blow_loris_dam_desc$"
  
  
  giga_flusionoperations.503.name:99 "Sonya Soul Defects"
  giga_flusionoperations.503.desc:99 "Following recent hostilities with §YRoqualia§!, §YSonya Soul§! has decided to defect from our empire and presumably rejoin her father instead of continuing to help us."
  giga_flusionoperations.503.a:99 "Unsurprising."
  giga_flusionoperations.503.a.tooltip:99 "If §YRoqualia§! exists as an independent nation, §YSonya Soul§! becomes a general for them."
  
  
  giga_flusionoperations.500.name:99 "Dofus Tequenik Machina"
  giga_flusionoperations.500.desc:99 "You... you maniacs!\n\nYou BLEW IT UP!!\n\nThat... that wasn't how you were supposed to end the Kaiser!! AT LEAST HE KEPT THE DAMN PLANET INTACT, YOU INSANE LUNATICS!!\n\nWE TRUSTED YOU! WE HELPED YOU! THERE WILL BE RETRIBUTION!!!"
  giga_flusionoperations.500.a:99 "It was just a planet, get over it."
  giga_flusionoperations.500.a.response:99 "..."
  
  giga_flusionoperations.501.name:99 "Katzen Splinter States Angered"
  giga_flusionoperations.501.desc:99 "The destruction of Flusion at our hands has not gone unnoticed by the myriad of splinter states which emerged following the collapse of the Katzenartig Imperium.\n\nUnsurprisingly, the obliteration of their precious homeworld has not been very well received by their leadership and population, and judging by the stream of hostilities we have just received from their governments, it seems we should not expect to establish any fruitful diplomatic relationships with these successor states anytime soon."
  giga_flusionoperations.501.a:99 "What are they going to do?"
  
  opinion_splinter_state_destroyed_flusion:99 "Destroyed Flusion"
  opinion_major_splinter_state_destroyed_flusion:99 "Destroyed Flusion"
  opinion_solakia_splinter_state_destroyed_flusion:99 "Destroyed Flusion"
  
  giga_flusionoperations.502.name:99 "The United Flusionian Front"
  giga_flusionoperations.502.desc:99 "Following our violent destruction of §YFlusion§!, the major splinter states emerging from the §YKatzenartig Imperium§! have grown worried that we might just be a threat greater than that of the Kaiser.\n\nSubsequently, the nations of the §YRoqualian Republic§!, §YLaurandar§! and the §YKronk Realm§!, all which formerly held territory on Flusion itself, have recently proclaimed the creation of the §YUnited Flusionian Front§!, a supranational alliance aimed at ensuring the safety of all Flusionian refugees and species.\n\n§YDofus Tequenik Machina§!, §YAaron N. Bleu§! and §YWolfgang§!, the respective leaders of the alliance's constituent nations, have made a joint declaration following the federation's formation.\n\n§L"We once believed that the end of the Kaiser's reign would mark the end of Flusion's suffering, yet the aggression and betrayal displayed by the [player_country_cracked_flusion.GetName] proves that we were all but mistaken. Their destruction of our ancestral homeworld cannot go unanswered, and the UFF shall thus ensure that they do not become a threat even greater than the Kaiser himself should they attempt to further disrupt the affairs of any major Flusionian nation."§!"
  giga_flusionoperations.502.a:99 "Fools!"
  giga_flusionoperations.502.a.tooltip:99 "The §YRoqualian Republic§!, §YLaurandar§! and the §YKronk Realms§! have joined the §YUnited Flusionian Front§!."
  
  trait_sonya:99 "Dofus' Little Miracle"
  trait_sonya_desc:99 "Sonya is a custom-built Soulbot created by Dofus himself to revive his deceased daughter. Not only is her chassis filled with a surprisingly high amount of weaponry, she is also a competent and charismatic leader, especially when it comes to fighting against Katzens.\n\n§RSonya will defect if we ever become hostile towards Roqualia!§!"
  
  needs_5_solak_res:99 "We need at least 5 §BResistance Resources§!."
  needs_6_solak_res:99 "We need at least 6 §BResistance Resources§!."
  needs_10_solak_res:99 "We need 10 §BResistance Resources§!, 3 §BRiesigerkatzenpanzer Armies§! on our homeworld as well as the required resources."
  
  giga_flusionoperations.3001.name:99 "§YRoqualtropa Dam§! Blown"
  giga_flusionoperations.3001.desc:99 "As the last warheads are put in place, the various partisan groups who accepted to sacrifice themselves for this vast operation take one last breath and press the triggers.\n\nIt only takes mere seconds for several nuclear explosions to engulf the kilometers-long dam. As the dam undergoes catastrophic collapse, these explosions are quickly followed by a tidal wave the likes of which Flusion has likely never seen before.\n\nEngulfing everything in its path, it obliterates whatever infrastructure the Katzens had built around the dam and most boats within a hundred kilometers. Only mere hours later, the wave slams into the dried-up coasts of the Roqualarean sea, destroying the numerous factories and settlements built by the Katzens following the dam's completion and going even further than where the sea originally was, flooding significant Roqualian and Ravkanian cities in the process.\n\nThis is a blow which the Katzens will feel for years to come as their industries are now deprived of the dam's power and their agriculture will no longer be able to use the evaporated water from the Roqualarean sea to irrigate the vast farmlands the Kaiser had established.\n\nBut the native populations of Rokalien and Ravkanien might not be too happy about the damage we just inflicted to their homelands, with Dofus himself expressing some regrets, even though in time, the whole galaxy will obviously thank us.\n\nThe success chance was §Y[flusion_primitives_country.flusion_operation_odds]%§!"
  
  giga_flusionoperations.3001.nuked.desc:99 "As the last warheads are put in place, the various partisan groups who accepted to sacrifice themselves for this vast operation take one last breath and press the triggers.\n\nIt only takes mere seconds for several nuclear explosions to engulf the kilometers-long dam. As the dam undergoes catastrophic collapse, these explosions are quickly followed by a tidal wave the likes of which Flusion has likely never seen before.\n\nEngulfing everything in its path, it obliterates whatever infrastructure the Katzens had built around the dam and most boats within a hundred kilometers. Only mere hours later, the wave slams into the dried-up coasts of the Roqualarean sea, destroying the numerous factories and settlements built by the Katzens following the dam's completion and going even further than where the sea originally was, flooding significant Roqualian and Ravkanian cities in the process.\n\nThis is a blow which the Katzens will feel for years to come as their industries are now deprived of the dam's power and their agriculture will no longer be able to use the evaporated water from the Roqualarean sea to irrigate the vast farmlands the Kaiser had established.\n\nBut the native populations of Rokalien and Ravkanien might not be too happy about the damage we just inflicted to their homelands, especially considering our extensive usage of nuclear warheads will certainly lead to long term contamination of the sea and its surroundings. Dofus himself has expressed some regrets, even though in time, the whole galaxy will obviously thank us.\n\nThe success chance was §Y[flusion_primitives_country.flusion_operation_odds]%§!"
  
  giga_flusionoperations.3001.a:99 "For the greater good..."
  giga_flusionoperations.3001.a.tooltip:99 "Katzen wariness §Rincreases§! by §R3§!\nResistance in §YRokalien§! and §YRavkanien§! decreases by §Y2§!."
  
  giga_flusionoperations.3001.b:99 "For the greater good..."
  giga_flusionoperations.3001.b.tooltip:99 "Katzen wariness §Rincreases§! by §R3§!\nResistance in §YRokalien§! and §YRavkanien§! decreases by §Y3§!."
  
  solaktropa_economic_crisis:99 "Roqualtropa Economic Turmoil"
  solaktropa_economic_crisis_desc:99 "The loss of the Roqualtropa Dam is a crippling blow to the Katzens."
  
  giga_flusionoperations.3002.name:99 "Dam-Busting Operation Foiled"
  giga_flusionoperations.3002.desc:99 "Our Roqualian allies are reporting that the Katzens have managed to locate and remove the warheads planted within the §YRoqualtropa Dam§! before any damage could be dealt to it. The agents infiltrating the dam were then arrested and executed for high treason against the Katzen state.\n\nBecause of this, the Katzens are likely to further reinforce their security in the coming weeks, leading to an increase in §YKatzen Wariness§!."
  giga_flusionoperations.3002.a:99 "A shame."
  giga_flusionoperations.3002.a.tooltip:99 "Katzen wariness §Rincreases§! by §R1§!."
  
  giga_flusionoperations.3000.name:99 "Blowing up the §YRoqualtropa Dam§!"
  giga_flusionoperations.3000.desc:99 "The §YRoqualtropa Project§! is an ambitious undertaking aiming to reduce the sea level of the Roqualarean Sea, providing vast quantities of water for farming, freeing up space for industries and most importantly, generating an immense amount of energy for Flusion.\n\nDestroying this dam will certainly have a significant impact on Flusion's economy but might cause dire climatological troubles on the planet.\n\n§YIf successful§!:\n§YFlusion§! and the §YKatzens§! will get debuffs due to the loss of the dam's energy and the disruption of their agriculture, reducing their §YShip Speed§! and §YWeapons Range§!.\nKatzen Wariness will §Rincrease§! by §R3§!\nResistance in §YRokalien§! and §YRavkanien§! will decrease by §Y2§! (§Y3§! if §YExtra Warheads§! are used)\n\n§YIf failure§!:\nKatzen Wariness will §Rincrease§! by §R1§!.\n\n§YChance of success§!:\nBase: §Y70%§!\n§HKatzen Wariness§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§PExtreme Risk Level§!: §R-40%§!\n§BGlobal Partisan Activity§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\n§BPartisans in Mercurreich§!: §G+[flusion_primitives_country.mercuria_res_perc]%§!\nTotal: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
  
  
  giga_blow_solak_dam_desc:99 "\n§HRisk Level§! - §PExtreme§!\n§HLocation§! - §BRavqualian Strait, Roqualarean Sea§!\n\nMission Requirements:\n§RExtreme Partisan Activity in Ravkanian§!\n§HSignificant Partisan Activity in Rokalien§!\n\n§L§YRoqualtropa§! is a massive-scale geoengineering project undertaken by the Katzenartig Imperium to lower the sea level of one of Flusion's major seas, the §YRoqualarean Sea§!. By blocking off the sea from the ocean, water from said sea will evaporate quicker than it can be replenished, causing the sea level to drop.\n\nThe evaporated water is, using advanced weather manipulation, redirected towards immense farmlands covering the large island of Atallria northwest of Rokalien, while the dried up land is used to squeeze even more industries onto Flusion.\n\nAdditionally, the dam generates a significant quantity of energy to power Flusion as a whole. Blowing up this dam and shattering this little project would surely be a devastating blow to Flusion's economy.§!\n\n§BAlthough not required, ensuring §YMercurreich§! has high resistance will increase the success odds as the partisans will be able to smuggle extra warheads to ensure the detonation goes well.§!\n\n§BDestroying both the §YRoqualtropa§! and the §YKatlantropa§! Dams will cause an §GAgricultural Crisis§! within the Imperium, which might cause fringe worlds to revolt against the Kaiser's rule!§!\n\n§HBlowing up the dam will cause untold devastation to both §YRokalien§! and §YRavkanien§!'s shores, which will in turn §RLOWER§! the resistance in those areas by §R2§! as their inhabitants are unlikely to support this move.§!"
  
  giga_blow_solak_dam_no:99 "§YBlow the Roqualtropa Dam§!\n\n§HStatus§! - §RUnavailable§!$giga_blow_solak_dam_desc$"
  
  giga_blow_solak_dam_yes:99 "§YBlow the Roqualtropa Dam§!\n\n§HStatus§! - §GAvailable§!$giga_blow_solak_dam_desc$"
  
  giga_blow_solak_dam_done:99 "§YBlow the Roqualtropa Dam§!\n\n§HStatus§! - §BCompleted§!$giga_blow_solak_dam_desc$"
  
  giga_capture_panzer_desc:99 "\n§HRisk Level§! - §YMedium§!\n§HLocation§! - §BLionsburg Assembly Plant, Southern Katzen Herzlands§!\n\nMission Requirements:\n§RExtreme Partisan Activity in the Katzen Herzlands§!\n§YSignificant Zuspri Resistance§!\n\n§LThe §YRiesigerkatzenpanzers§! are the pride of the Katzen ground forces. These hulking behemoths are nothing less than monstrous armored vehicles capable of both inflicting and sustaining immense damage. If we could acquire their blueprints, we might be able to reverse-engineer their designs and build our very own Riesigerkatzenpanzers.§!\n\n§BDue to the complexity of such a data heist, we require the support of friendly Zuspri guards turned to our cause who are familiar with the complex layout of the data servers hosting Riesigerkatzenpanzer assembly schematics, meaning that §YZuspri§! resistance must be at a high enough level to undertake this operation.§!"
  
  giga_capture_panzer_no:99 "§YSteal Riesigerkatzenpanzer Blueprints§!\n\n§HStatus§! - §RUnavailable§!$giga_capture_panzer_desc$"
  
  giga_capture_panzer_yes:99 "§YSteal Riesigerkatzenpanzer Blueprints§!\n\n§HStatus§! - §GAvailable§!$giga_capture_panzer_desc$"
  
  giga_capture_panzer_done:99 "§YSteal Riesigerkatzenpanzer Blueprints§!\n\n§HStatus§! - §BCompleted§!$giga_capture_panzer_desc$"
  
  
  giga_sonya_desc:99 "\n§HRisk Level§! - §RHigh§!\n§HLocation§! - §BKleinkalien Isle, Sonne Sea§!\n\nMission Requirements:\n§RExtreme Partisan Activity in Rokalien§!\n§HSignificant Partisan Activity in Linteria§!\n\n§L§YSonya Soul§! is none other than the precious daughter of Dofus Tequenik Machina. Once killed in a terrible accident, she was successfully brought back as a §YSoulbot§!. Soulbots are perhaps the Roqualians' greatest invention, as they are artificial robotic bodies capable of housing a genuine organic soul within themselves, used by the Roqualians to give a second chance to deceased members of their society.\n\nUnsurprisingly, the blueprints were quickly stolen by the Katzens and used to create nigh-immortal supersoldiers, while Sonya herself was captured by the Katzens and is currently being held and studied in a remote island off the coast of Roqualia.§!\n\n§BQuickly evacuating Sonya once the fortress is breached will require the usage of the Linterians' ability to generate wormholes, thus we will have to ensure resistance in §YLinteria§! is high enough before proceeding.§!\n\n§BKleinkalien Isle also serves as the Katzens' §YSoulbot§! production and storage facility. These §YKatzen Soulbots§! are usually used to "revive" fallen high command members, and destroying it while breaking Sonya free would prevent them from doing so in the future.§!"
  
  giga_rescue_sonya_no:99 "§YRescue Sonya Soul§!\n\n§HStatus§! - §RUnavailable§!$giga_sonya_desc$"
  
  giga_rescue_sonya_yes:99 "§YRescue Sonya Soul§!\n\n§HStatus§! - §GAvailable§!$giga_sonya_desc$"
  
  giga_rescue_sonya_done:99 "§YRescue Sonya Soul§!\n\n§HStatus§! - §BCompleted§!$giga_sonya_desc$"
  
  giga_flusionoperations.1000.a:99 "Use 3 §BResistance Resource§! for the operation ([flusion_primitives_country.flusion_success_chance_total]% chance of success)"
  giga_flusionoperations.1000.b:99 "Use 4 §BResistance Resources§! for the operation ([flusion_primitives_country.flusion_success_chance_total_2]% chance of success)"
  giga_flusionoperations.1000.c:99 "Use 5 §BResistance Resources§! for the operation ([flusion_primitives_country.flusion_success_chance_total_3]% chance of success)"
  
  giga_flusionoperations.3000.a:99 "Use 3 §BResistance Resources§! for the operation ([flusion_primitives_country.flusion_success_chance_total]% chance of success)"
  
  giga_flusionoperations.3000.b:99 "Use 4 §BResistance Resources§! for the operation ([flusion_primitives_country.flusion_success_chance_total_2]% chance of success)"
  
  giga_flusionoperations.3000.c:99 "Use 5 §BResources§! & §YExtra Warheads§! for the operation ([flusion_primitives_country.flusion_success_chance_total_3]% chance of success)"
  
  giga_flusionoperations.3000.c.tooltip:99 "Partisans will smuggle a significant quantity of additional nuclear warheads from §YMercurreich§!, ensuring the operation can succeed even if some of the warheads are disarmed before we are ready.\n\nThis will however cause §YResistance§! in §YRokalien§! and §YRavkanien§! to drop by §Y3§! instead of §Y2§! as the extra warheads will spread large quantities of radioactive fallout over parts of Flusion."
  
  needs_5_solak_res_and_mercurreich_resistance:99 "We need at least 5 §BResistance Resources§! and §HSignificant§! Partisan Activity in §YMercurreich§!."
  
  giga_flusionoperations.2000.name:99 "Rescuing §YSonya Soul§! from §YKleinkalien Isle§!"
  giga_flusionoperations.2000.desc:99 "Following the §YRoqualrieg§!, the Katzen conquest of §YRoqualia§!, Dofus' daughter was captured by Katzen forces and is currently being held in a heavily fortified military complex on the small island of §YKleinkalien§!.\n\nOnce a beautiful tropical fishing town, the island has been repurposed into a giant military research center where Sonya's advanced design is studied and analyzed by the Katzens in order to improve their own Soulbot designs. Busting out Sonya would thus likely be a major blow to the Katzens' research in military robotics.\n\n§YIf successful§!:\n§YSonya Soul§! will likely join us as a powerful §YGeneral§!, Katzen Wariness will §Rincrease§! by §R3§!, they will get §Rpenalties§! to their ground forces and the §YKaiser's Opinion§! of us will §Rdecrease§! by §Y2§!.\n\n§YIf failure§!:\nNothing significant will happen.\n\n§YChance of success§!:\nBase: §Y70%§!\n§HKatzen Wariness§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§HHigh Risk Level§!: §R-30%§!\n§BGlobal Partisan Activity§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\nTotal: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
  
  giga_flusionoperations.2001.name:99 "Sonya Rescued from §YKleinkalien Isle§!"
  giga_flusionoperations.2001.desc:99 "Roqualian intelligence is reporting that our attempt at rescuing §YSonya Soul§! went flawlessly. An infiltration party managed to enter the island's fortress and proceeded to place explosives all around the structure.\n\nBefore the Katzens were able to react, a series of cataclysmic explosions engulfed most of the fortress's outer defences, allowing more waves of partisan fighters using hijacked Katzen vessels to storm the island and breach the inner containment chamber where Sonya was being held.\n\nLinterian partisans then proceeded to quickly evacuate Sonya by leading her through one of their wormholes to a safer location on Flusion, where she was taken to a shuttlecraft and evacuated off planet to be reunited with §YDofus Tequenik Machina§!.\n\nHowever, the loss of such an important asset is sure to make the Katzens take drastic measures to combat partisan activities on Flusion while the §YKaiser§! is very likely to find out that we were behind this entire operation within the next months.\n\nAfter ensuring the Katzens were not tracking her, Sonya herself has asked to communicate with us.\n\nThe success chance was §Y[flusion_primitives_country.flusion_operation_odds]%§!"
  
  giga_flusionoperations.2001.a:99 "Great! On screen."
  giga_flusionoperations.2001.a.tooltip:99 "Katzen wariness §Rincreases§! by §R3§!."
  
  giga_flusionoperations.2003.name:99 "Sonya Soul"
  giga_flusionoperations.2003.desc:99 "Thank Mirelan! Words cannot express how thankful I am to finally be out of this dreaded containment cell. The Katzens were... experimenting on me, like some sort of lab animal. These vicious beasts truly have no respect for anything, do they?\n\nBah! I'd rather not think about it too much. Now that I'm free and finally reunited with my dear father, perhaps I'll finally be able to take some action against these asinine felines, hmm? It's been a while since I've been in a proper fight!\n\nAnd spending years in containment makes you feel a bit... vengeful, if you know what I mean."
  
  giga_flusionoperations.2003.whoareyou:99 "Who are you, exactly?"
  giga_flusionoperations.2003.whoareyou.response:99 "None other than the daughter of Dofus, of course! Back in the old days, when Flusion was free, I helped him lead our great nation and even took direct leadership of a large part of the Roqualian armed forces when the Roqualrieg broke out between us and the vicious Kaiser.\n\nAnd oh, the adventures I've had! Diving into the depths of the oceans, scaling the highest mountains... Flusion was a wild place in the past. Full of mystery, danger and wonders...\n\nWell, so much of it is gone now..."
  
  giga_flusionoperations.2003.lakia:99 "What is Kleinkalien Isle?"
  giga_flusionoperations.2003.lakia.response:99 "Well you see, when the Katzens ultimately overran our defensive lines, these filthy beings separated me from Dofus and transported me to this place in order to study how Dofus built me. Because of course, they were jealous of us Roqualians and our technologies.\n\nIt was once known as §YPetite Qualie§! and used to be a delightful fishing town full of joyful townsfolk and tasteful seafood. But when the Katzens showed up, half of the island was turned into a resort for high-ranking officers, and the other half was paved over and transformed into a giant fortress to study potentially "hazardous" pieces of technology like me due to its remote location in the middle of the sea.\n\nTruly terrible..."
  
  giga_flusionoperations.2003.soulbot:99 "What even are Soulbots?"
  giga_flusionoperations.2003.soulbot.response:99 "Soulbots were invented by Dofus himself! They're Roqualia's greatest creation: an artificial robotic chassis capable of hosting a soul within itself, just like me!\n\nIndeed! When an individual dies, we can melt their body into a peculiar §YSoul Gem§! which is then embedded into these custom-built chassis, bringing them back to life!\n\nThe actual inner workings of the processes are still poorly understood but there haven't been any noticeable side-effects so far.\n\nOf course, the Katzens quickly copied us and used the technology to create monstrous hypersoldiers capable of decimating entire armies by themselves.\n\nDreadful, is it not? The Roqualians used this technology to spread life, but they use it to sow death whenever they go.\n\nUnfortunately for your kind, following what happened with the Katzens, I doubt my father would be willing to share the secrets of this technology with anyone else, not even our closest allies. Sorry about that..."
  
  giga_flusionoperations.2003.joinus:99 "Well, care to join us in some Katzen-kicking?"
  giga_flusionoperations.2003.joinus.tooltip:99 "§YSonya Soul§! will join us as a powerful §YGeneral§!. However, if we ever become §Rhostile§! towards Roqualia, she will defect!"
  giga_flusionoperations.2003.joinus.response:99 "I'd love to! As long as you don't turn our back on us Roqualians, of course..."
  
  giga_flusionoperations.2003.bye:99 "Goodbye, and take good care."
  giga_flusionoperations.2003.bye.response:99 "May you finally be the striking blow which ends the Kaiser's reign."
  
  
  katzen_soulbot_research_busted:99 "Katzen Soulbot Research Disrupted"
  katzen_soulbot_research_busted_desc:99 "Sonya's rescue has thrown a wrench in the Kaiser's plan to develop the perfect Soulbot."
  
  giga_katzen.2004.name:99 "The Katzenartig Imperium"
  giga_katzen.2004.desc:99 "Following a thorough investigation, it has come to our attention that you were the ones orchestrating this little Sonya heist.\n\nDo you really believe you can just snatch up one of our most precious scientific assets without us noticing?\n\nWe demand immediate payment for the damage caused to our military infrastructure at once."
  giga_katzen.2004.a:99 "Alright, alright, we'll pay you. | §Y10000§! £trade£"
  giga_katzen.2004.a.tooltip:99 "The §YKaiser's Opinion§! of us will only §Rdecrease§! by §Y1§!."
  giga_katzen.2004.a.response:99 "Do not think you are forgiven just yet, aliens."
  
  giga_katzen.2004.b:99 "Get lost."
  giga_katzen.2004.b.tooltip:99 "The §YKaiser's Opinion§! of us will §Rdecrease§! by §Y2§!."
  giga_katzen.2004.b.response:99 "The Kaiser will remember this, aliens."
  
  giga_flusionoperations.2002.name:99 "Sonya Rescue Foiled"
  giga_flusionoperations.2002.desc:99 "Our attempt at rescuing §YSonya Soul§! ended in disaster. Even before our Roqualian and Zuspri agents could get close to §YKleinkalien Isle§!, their disguised landing ship was recognized and blown out of the water by the island's extensive fortification network.\n\nMuch to Dofus' dismay, the operation has been declared a complete failure, but the Katzens at least didn't deem the incident to be of enough significance to warrant increasing their wariness."
  giga_flusionoperations.2002.a:99 "Curses!"
  
  giga_flusionoperations.1000.name:99 "Acquiring §YRiesigerkatzenpanzer Blueprints§! from the §YLionsburg Assembly Plant§!"
  giga_flusionoperations.1000.desc:99 "The §YRiesigerkatzenpanzers§! are by far the most terrifying ground vehicles employed by the Katzen ground forces. These hulking behemoths, designed before their species even reached the stars, are capable of flinging terrifyingly powerful nuclear warheads to any location on a planet's surface and even low orbit.\n\nWhile their blueprints remain an absolute secret, fortunately for us, Roqualian agents have found potentially vulnerable servers hosting the blueprints within an assembly plant located in the Katzen city of §YLionsburg§!.\n\nThanks to friendly Zuspri double-agents, we might just be able to slip into the plant and recover valuable data disks containing the famed blueprints.\n\n§YIf successful§!:\nWe will acquire a §YTechnology§! granting us the ability to build our own §YRiesigerkatzenpanzers§! as armies.\n\n§YIf failure§!:\nKatzen Wariness will §Rincrease§! by §R1§!.\n\n§YChance of success§!:\nBase: §Y70%§!\n§HKatzen Wariness§!: §R-[flusion_primitives_country.katzen_wary_perc]%§!\n§HMedium Risk Level§!: §R-20%§!\n§BGlobal Partisan Activity§!: §G+[flusion_primitives_country.flusion_total_res_perc]%§!\nTotal: §Y[flusion_primitives_country.flusion_success_chance_total]%§!"
  
  giga_flusionoperations.1001.name:99 "§YRiesigerkatzenpanzer Blueprints§! Acquired!"
  giga_flusionoperations.1001.desc:99 "Our Roqualian contacts report that everything has gone according to plan.\n\nFollowing a power outage triggered by another partisan group, the designated Zuspri double-agents slipped into the depths of the darkened Lionsburg assembly plant, retrieving several data hefty and highly-encrypted disks supposedly containing blueprints for Katzen military vehicles.\n\nAnd, just as we had hoped, they did indeed contain the invaluable blueprints for the almighty §YRiesigerkatzenpanzers§!, split into several parts due to the vehicle's immense complexity. The Zuspris wasted no time transferring the data to their own disks, before escaping the facility and handing over the data to Roqualian partisans.\n\nIt will take some time for our scientists to properly analyze and reverse-engineer these blueprints into something we can assemble ourselves, but the Roqualians have assured us that being able to construct these grandiose behemoths of war will surely help seal the Kaiser's fate.\n\nThe success chance was §Y[flusion_primitives_country.flusion_operation_odds]%§!"
  
  giga_flusionoperations.1001.a:99 "Wonderful!"
  giga_flusionoperations.1001.a.tooltip:99 "The Katzens barely even noticed anything, avoiding §RWariness Growth§!."
  
  giga_tech_katzen_panzers:99 "Riesigerkatzenpanzer Deployment"
  giga_tech_katzen_panzers_desc:99 "Based on blueprints retrieved from the heart of the Katzenartig Imperium itself, these mighty machines capable of spewing nuclear fire anytime and anywhere are sure to turn any combat to our favor."
  
  giga_flusionoperations.1002.name:99 "Operation Foiled"
  giga_flusionoperations.1002.desc:99 "Our Roqualian allies are reporting that contact has unfortunately been lost with our Zuspri double-agents attempting to steal §YRiesigerkatzenpanzer Blueprints§!.\n\nThe myriad of Katzen soldiers guarding the heavily-fortified §YLionsburg Assembly Plant§! likely caught on to their scheme and promptly proceeded to gun our agents down.\n\nThe Katzens are likely to further reinforce their security in the coming weeks, leading to an increase in §YKatzen Wariness§!."
  giga_flusionoperations.1002.a:99 "Curses..."
  giga_flusionoperations.1002.a.tooltip:99 "Katzen wariness §Rincreases§! by §R1§!."
  
  giga_disabled_for_overlord:99 "This feature has been temporarily disabled due to the new vassalization mechanics in 3.4!"
  
  giga_cant_remove_orbital_ring_part:99 "Can only remove this module if the planet does not use regular districts."
  
  sm_orbital_ring_giga_mining_district:99 "Exospheric Mineral Surveyor"
  sm_orbital_ring_giga_mining_district_desc:99 "Sets of highly-sensitive scanning apparatuses can help locate previously undiscovered ore veins, allowing for increased mining activity on a planet's surface.\n\n§YEfficiency is higher on Lifeless Worlds.§!\n"
  
  sm_orbital_ring_giga_generator_district:99 "Orbital Sunlight Redirector"
  sm_orbital_ring_giga_generator_district_desc:99 "An array of powerful mirrors redirect extra sunlight onto the planet's surface, enabling additional power generation.\n\n§YEfficiency depends on the brightest star in the system.§!\n"
  
  sm_orbital_ring_giga_farming_district:99 "Planetary Soil Fertilizer"
  sm_orbital_ring_giga_farming_district_desc:99 "Automated factories produce vast quantities of fertilizer and distribute them to previously inhospitable parts of the planet's surface to permit agriculture.\n\n§YEfficiency is lower on Tomb Worlds and higher on Gaia Worlds. Does not function on Irradiated Desert Worlds.§!\n"
  
  sm_ring_giga_crystals_hub:99 "Laser Crystal Bore"
  sm_ring_giga_crystals_hub_desc:99 "Immense laser drills cutting into the planet's crust to help planetside rare crystal mining. Other extracted materials supplement the crystal refining process.\n\n§TProvides §G+25§! £job_crystal_miner£ §YCrystal Mining§! Jobs per £district£ §Y$district_mining$§!.\n"
  ring_giga_crystals_hub_condition:99 "§RPlanet must have a £rare_crystals£ §Y$zone_rare_crystals$§! zone."
  
  sm_ring_giga_motes_hub:99 "Hypersonic Mote Sifter"
  sm_ring_giga_motes_hub_desc:99 "Powerful sonic emitters blast ultrasound waves into the atmosphere and towards mote harvesting sites, stirring up dust deserts with just the right frequency to bring plenty of Volatile Motes to the surface. Electromagnetic nets can also capture materials valuable to the mote refining process.\n\n§TProvides §G+25§! £job_mote_harvester£ §YMote Harvesting§! Job per £district£ §Y$district_generator$§!.\n"
  ring_giga_motes_hub_condition:99 "§RPlanet must have a £volatile_motes£ §Y$zone_volatile_motes$§! zone."
  
  sm_ring_giga_gas_hub:99 "Atmospheric Gas Stabilizer"
  sm_ring_giga_gas_hub_desc:99 "Chemical plants which inject stabilizing agents into the atmosphere near naturally-occurring gas deposits, making extraction safer and easier. As a side effect, local microbes can be more effectively utilised to refine gases from biomass.\n\n§TProvides §G+25§! £job_gas_extractor£ §YGas Extraction§! Jobs per £district£ §Y$district_farming$§!.\n"
  ring_giga_gas_hub_condition:99 "§RPlanet must have a £exotic_gases£ §Y$zone_exotic_gases$§! zone."
  
  sm_ring_giga_iodizium_hub:99 "Field Isolation Grid"
  sm_ring_giga_iodizium_hub_desc:99 "Shield projectors focused on Iodizium mining facilities ensure that explosive chain reactions are kept to a minimum, greatly improving the efficiency of planetside crystal handling.\n\n§TProvides §G+100§! £job_giga_iodizium_miner£ §YIodizium Mining§! Jobs per active £building£ §Y$building_giga_iodizium_mines$§! Building§!\n"
  ring_giga_iodizium_hub_condition:99 "§RPlanet must be able to support at least one £building£ §Y$building_giga_iodizium_mines$§! Building.§!"
  
  sm_ring_giga_orbital_arcology:99 "Orbital Arcology"
  sm_ring_giga_orbital_arcology_desc:99 "High density housing developments and ample transport infrastructure will let us make the most of the space on the planet blow.\n\n$sm_ring_giga_orbital_arcology_effect$\n"
  sm_ring_giga_orbital_arcology_effect:99 "Provides §G+5%§! §Y$MOD_PLANET_MAX_DISTRICTS_MULT$§! per ['starbase_module:orbital_ring_habitation', $sm_orbital_ring_habitation$] up to §G+20%§!, and §G+1§! §Y$MOD_PLANET_MAX_DISTRICTS_ADD$§! per ['concept_giga_rural_district_booster_modules'] up to §G+4§!"
  ring_giga_orbital_arcology_requires_module:99 "§RRequires at least one $sm_orbital_ring_habitation$ or $concept_giga_rural_district_booster_modules$§!"
  ring_giga_orbital_arcology_no_existing:99 "§R[planet.GetName] already has an Orbital Arcology§!"
  ring_giga_orbital_arcology_capped:99 "§RWe have reached our $sm_ring_giga_orbital_arcology$ limit§!"
  
  giga_dialog.13500.name:99 "Orbital Ring Constructed"
  giga_dialog.13500.desc:99 "Construction of an Orbital Ring around §Y[orbital_ring_planet.GetName]§! has concluded. The ring may now be specialized to suit the needs of its planet."
  giga_dialog.13500.a:99 "Acknowledged."
  
  # giga_tech_enhance_orbital_arcologies:0 "Orbital Arcology Enhancement"
  # giga_tech_enhance_orbital_arcologies_desc:0 "Improvements in the field of astroengineering let us safely add a second ring to existing Orbital Arcologies, increasing living space without compromising structural integrity."
  
  # giga_tech_maximize_orbital_arcologies:0 "Orbital Arcology Maximization"
  # giga_tech_maximize_orbital_arcologies_desc:0 "Further refining of our orbital construction techniques enable the incorporation of yet another ring into the design of our Orbital Arcologies, effectively maximizing living space."
  
  giga_tech_orbital_ring_strategic_resources:99 "Orbital Resource Extraction Maximization"
  giga_tech_orbital_ring_strategic_resources_desc:99 "Orbital Rings can be used as a platform to build a variety of devices to increase the yield of rare resource extraction and refining facilities. Although this is quite efficient, it is only applicable where there are existing resources to extract."
  
  giga_tech_orbital_ring_iodizium_hub:99 "Orbital Suppression Field Projection"
  giga_tech_orbital_ring_iodizium_hub_desc:99 "Mining $giga_sr_iodizium$ is a dangerous process, which could be made safer with the deployment of specialized shield generators on our orbital rings.\n\nSuppression of the crystals' most volatile tendencies and compartmentalization of processing facilities with these shields will reduce losses to catastrophic unplanned disassembly of mining equipment."
  
  giga_blokkat_admiral_name:99 "Blokkmiral [THIS.GetName]"
  
  MESSAGE_WAR_MOON_DESTROYED:99 "Attack Moon Destroyed"
  MESSAGE_WAR_MOON_DESTROYED_DESC:99 "The $CELESTIAL_WARSHIP_NAME|Y$ Attack Moon has been destroyed by the $ENEMY_NAME|Y$ in the $SYSTEM_NAME|Y$ system.\n\nIt has been reduced to an immobile wreck which may be repaired if we have the necessary resources and control of the system."
  
  MESSAGE_WAR_PLANET_DESTROYED:99 "Behemoth Planetcraft Destroyed"
  MESSAGE_WAR_PLANET_DESTROYED_DESC:99 "The $CELESTIAL_WARSHIP_NAME|Y$ Behemoth Planetcraft has been destroyed by the $ENEMY_NAME|Y$ in the $SYSTEM_NAME|Y$ system.\n\nIt has been reduced to an immobile wreck which may be repaired if we have the necessary resources and control of the system."
  
  MESSAGE_WAR_SYSTEM_DESTROYED:99 "Stellar Systemcraft Destroyed"
  MESSAGE_WAR_SYSTEM_DESTROYED_DESC:99 "The $CELESTIAL_WARSHIP_NAME|Y$ Stellar Systemcraft has been destroyed by the $ENEMY_NAME|Y$ in the $SYSTEM_NAME|Y$ system.\n\nIt has subsequently split into 4 damaged Behemoth Planetcrafts and 5 damaged Attack Moons."
  
  MESSAGE_GIGA_HIDDEN_MEGAS_UNHIDDEN_TITLE:99 "Previously Hidden Megastructure(s) Unhidden"
  MESSAGE_GIGA_HIDDEN_MEGAS_UNHIDDEN_DESC:99 "At least one ['concept_megastructure'] that was previously hidden from the ['concept_outliner'] has been unhidden."
  
  giga_tech_ringworld_buildings:99 "Superscale Urban Development"
  giga_tech_ringworld_buildings_desc:99 "Now that we have built truly colossal livable spaces, what if we just... built bigger buildings on them?\n\nIt's not that simple of course, but the goal is an attainable one."
  
  #Specimens
  garyx_collection:99 "Reptilian Reproduction Databank"
  garyx_collection_desc_short:99 "A databank dedicated to the reproductive rituals of numerous reptilian species across the galaxy"
  garyx_collection_desc_details:99 "With over two million hours of dedicated reptilian content, this databank enthralled Garyx to the point of leading the Squareworld to ruin. Why he became so enraptured by it however is a mystery we may never solve."
  
  meopa_detonator:99 "Meopa's Detonator"
  meopa_detonator_desc_short:99 "A small metallic device bearing a big red button intended to launch the entirety of Katzenland's military arsenal"
  meopa_detonator_desc_details:99 "Crafted with the greatest Katzenlandian craftmanship, this little device was intended to allow Meopa to rapidly react to a potential threat by enabling the immediate launching of Katzenlandian nuclear weaponry. Most however did not know that Meopa had it modified it so that a double-press would turn the nukes around towards Katzenland, presumably as to deny Katzenland from a potential invader. The mere fact the Katzenlandians entrusted full control of their arsenal to a singular leader speaks of the excessive devotion they held towards him, which would, of course, be their downfall."
  
  aeternite_golem:99 "Aeternite Golem Head"
  aeternite_golem_desc_short:99 "The gargantuan head of a fallen Aeternite Golem intended to guard Aiondia"
  aeternite_golem_desc_details:99 "This vast crystalline construct dates back to the Golden Age of Aeternum and was likely a prototype for an Aeternite frontline unit. Of course, with Aeternum declining and stagnating, it was left to roam Aiondia's surface for the better part of a million years. It boasts incredible regenerative properties, with entire teams having to be dedicated towards keeping it from regrowing, which does incidentally represent a good source of crystals."
  
  planckeryons:99 "Planckeryon Sample"
  planckeryons_desc_short:99 "Esoteric sub-planck particles with a variety of intriguing properties, most notably the ability to 'recode' themselves"
  planckeryons_desc_details:99 "Aeternum experimented with the production of these potent particles during their Golden Age, but essentially shelved the project following their decline. From what we can gather, these particles possess the ability to recode their own properties, rendering them extraordinarily powerful if properly utilised. It seems that Aeternum however failed to move to the large-scale production of Planckeryons, something which we should most likely be grateful for."
  
  riesiger_blueprints:99 "Riesigerkatzenpanzer Blueprints"
  riesiger_blueprints_desc_short:99 "The blueprints for the fearsome Riesigerkatzenpanzers employed by the Katzen armed forces"
  riesiger_blueprints_desc_details:99 "Retrieved from the depths of their production center in Lionsburg, these blueprints explain in deep detail how to construct the mighty Riesigerkatzenpanzers. These monstrous vehicles serve both as mobile artillery platforms and as frontline units based on military needs, and are very similar to the 'Weltraumpanzers' employed the Katzen space fleets. Recent models have indeed merged both vehicles into one capable of operating both in space as warships and on the surface of planets as frontline troops."
  
  slukatian_drive:99 "Slukatian FTL Drive"
  slukatian_drive_desc_short:99 "An experimental FTL drive relying on previously unseen principles to leap across intergalactic space"
  slukatian_drive_desc_details:99 "This device hails from another galaxy altogether, having been put together by the 'Slukatians' in an attempt to create the 'ultimate' FTL drive by combining existing technologies into something entirely new. It appears their attempt were a bit too successful, given the distance the probe travelled and their inability to retrieve it altogether. Interestingly enough, in addition to the Slukatians' own empire, the device bears faint mentions of an organisation referred to as the 'Grand (illegible) Federation'. Whatever relation they held towards the Slukatians is unknown."
  
  loris_katana:99 "Kattensbach Katana"
  loris_katana_desc_short:99 "An ancient Katzen Katana previously belonging to Loris von Kattensbach, retrieved from the rubble of the Bundeshalle"
  loris_katana_desc_details:99 "Forged by the finest Katzen warsmiths back in pre-gunpowder times, this katana has been passed down for generations within the von Kattensbach family. On it is inscribed the name of every Katzen to have inherited it, going back over two thousand years and ending with Loris himself. While it is unlikely to have seen actual combat, it nonetheless stands as a timeless symbol of Katzen military traditions."
  
  meopian_expedition_chunk:99 "Meopian Expedition Chunk"
  meopian_expedition_chunk_desc_short:99 "A chunk of the 'Meopian Expedition I' colony ship which carried Katzens across interstellar space, retrieved from Flusion's surface"
  meopian_expedition_chunk_desc_details:99 "The Meopian Expeditions were a set of vessels sent by the former Katzenlandian king, Meopa, intended to colonize numerous planets with Katzens and Zuspris over ten thousand years ago. While the first of these ships ended up on Flusion, archeological data indicates that twelve of these ships were launched. Their ultimate fates are unknown."
  
  soulbot_fragment:99 "Roqualian Soulgem"
  soulbot_fragment_desc_short:99 "A 'Soulgem' of Roqualian design, apparently capable of binding a genuine organic soul to a machine body. Its inner workings are unknown"
  soulbot_fragment_desc_details:99 "These incredible technological marvels enable the Roqualians to fabricate 'soulbots' - machine chassis connected to a soul, granting them true sapience without the need for complicated AI systems, and allowing for a 'second chance' to be given to the most unlucky. Their design is far beyond what the Roqualians could have been able to manufacture, hinting that they were likely reverse-engineered by a precursor civilization which previously visited Flusion."
  
  dead_chablokk:99 "Ancient Chablokk Suit"
  dead_chablokk_desc_short:99 "A robotic exoskeleton meant to surround the body of a Chablokk to enhance their capabilities"
  dead_chablokk_desc_details:99 "The Chablokks' brutal fight with the gargantuan psionic Paluushes forced them into a cycle of rapid technological innovation and military iteration. These advanced robotic suits were developed as a way to enhance their lackluster physical performances, as well as enable them to more easily interface with technology. This process of technological integration would continue until their eventual transformation into the Blokkats of today."
  
  meopium:99 "Nuke-Forged Soil"
  meopium_desc_short:99 "A chunk of Katzenlandian soil bearing exotic alloys forged in nuclear hellfire"
  meopium_desc_details:99 "The furious rain of nuclear ordnance which marred Katzenland's surface resulted in the creation of new and highly-radioactive alloys embedded within parts of the planet's upper crust. They alone represent a significant source of heat and radiation keeping the planet uninhabitable for millennia to come."
  
  kaiser_plans:99 "Incomplete Katzen Schematics"
  kaiser_plans_desc_short:99 "Unfinished schematics belonging to Kaiser Kattail, describing advanced structures which are sometimes more advanced than what the Katzens were known to be able to construct"
  kaiser_plans_desc_details:99 "Retrieved from a heavily-fortified storage room beneath the Kaiser's office, these plans contain partial information and early schematics for vast planetary projects and megastructures. They were apparently drawn up in secret by a number of renowned Katzen scientists and engineers, who presumably sent them to the Kaiser for approval. Curiously enough, some of these aforementioned bright Katzen minds appear to have completely forged identities inserted into official civil records, indicating that they might partially ficticious. This thus raises the question as to who actually created these plans."
  
  pouchkinn_device:99 "Pouchkinnian Temporal Device"
  pouchkinn_device_desc_short:99 "A device which utilizes a strange purple gas to grant partial precognition to its user, at the cost of some mental sanity"
  pouchkinn_device_desc_details:99 "Amongst the many experiments found in Pouchkinn's laboratories, this one is certainly amongst the most intriguing. It seems to 'charge' some sort of psionic gas, allowing it to induce otherwordly visions of one's fate, and thus possibly take pre-emptive action. It was quite possibly utilized by Pouchkinn to optimize his research, but the visions tend to be so cryptic that they are essentially unusable by untrained personal."
  
  kaiser_moon_core:99 "Kaiser Moon Megareactor Chunk"
  kaiser_moon_core_desc_short:99 "This gargantuan reactor chunk once provided untold power to the Kaiser Moon"
  kaiser_moon_core_desc_details:99 "The power necessary to move an entire celestial body through the heavens is nothing short of phenomenal. As such, countless such megareactors were employed by the Kaiser Moon to provide energy to its vast array of gravitic thrusters and relativistic railguns. They mostly used antimatter-catalyzed fusion, which, while not the most advanced of methods, is relatively easy to scale up to the sizes necessary to run an entire moon, and far less prone to catastrophic failures than antimatter power plants."
  
  blokkat_core:99 "Blokkwork Receiver"
  blokkat_core_desc_short:99 "The nearly intact and miraculously stable Blokkwork receiver of a Blokkframe"
  blokkat_core_desc_details:99 "Blokkframes are multipurpose chassis designed to easily enable a Blokkat to interact with reality. This component plays the crucial role of connecting the Blokkat to the Blokkwork, allowing it to remain synchronized with the rest of Blokkat civilization."
  
  wilzystellaquis:99 "Wilzy - Stellaquis"
  
