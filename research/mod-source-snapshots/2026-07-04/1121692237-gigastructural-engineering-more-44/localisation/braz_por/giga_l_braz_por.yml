  katzen_name:99 "§YKatzen Herzlands§!"
  katzen_desc:0 "§L O Katzen Herzlands é o centro da civilização Katzen, onde reside a maioria dos Katzen e de onde as espécies se originaram. Com uma população na casa das dezenas de bilhões, ele centraliza e concentra uma grande parte da indústria militar de Katzen.§! "
  
