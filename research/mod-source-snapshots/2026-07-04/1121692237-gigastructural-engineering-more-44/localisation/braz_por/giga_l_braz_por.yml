  solak_name:99 "§YRokalien§!"
  solak_desc:0 "§LRokalien, ou Roqualia, costumava ser a terra da República de Roqualia, que se orgulhava da liberdade, das festas e do entretenimento virtual. Os Katzens hoje em dia centralizaram seus centros de criptografia e bancos de dados vitais nas terras de Roqualia.§! "
  
