  #PRE FTL EVENTS
  giga_katzen.002.name:0 "Katzenartig Imperium embarca na conquista da Flusion"
  giga_katzen.002.desc:0 "Nosso posto avançado no Sistema Jublio relata que o principal iniciador do Projekt Mondkanone, o§YKatzenartig Imperium§ !, liderado por Katzen, declarou recentemente guerra a várias outras grandes potências. \n \nDe fato, seu líder ,§YKaiser Kattail§ !, teria lançado uma "Grande Cruzada de Unificação" para unir a Flusion sob um único estandarte. Sem surpresa, ele está empregando o Sistema de Defesa Lunar em sua vantagem, usando-o para bombardear exércitos inimigos a partir da segurança do exterior espaço. \n \nSó o tempo dirá se suas ambições serão bem-sucedidas. "
  giga_katzen.002.a:0 "Boa sorte para ele!"
  giga_katzen.002.b:0 "Espero que seja o fim dele."
  giga_katzen.002.c:0 "Não é da nossa conta, realmente."
  
  giga_katzen.004.name:99 "Kaiser Kattail Unites Flusion!"
  giga_katzen.004.desc:0 "Após mais de uma década de lutas horríveis, nosso posto avançado de Jublio relata que, em uma vitória surpreendente, o§YKatzenartig Imperium§! liderado por§YKaiser Kattail§ !, conseguiu unir o mundo primitivo de Flusion. \n \nDada a base tecnológica relativamente avançada dos primitivos, a luta foi particularmente intensa, praticamente parecendo um combate moderno da era espacial. O Kaiser fez uso extensivo do Projekt Mondkanone, bem como de uma força espacial rudimentar, e essas são provavelmente as razões pelas quais ele era capaz de realizar esta conquista mundial em primeiro lugar. \n \nCom o planeta unido, os Katzens agora têm acesso a uma quantidade muito maior de recursos e mão de obra, e agora estão trabalhando para consolidar seu domínio. Só o tempo dirá o que o próximo esforço do Kaiser será, embora o Império Katzenartig provavelmente comece a olhar para fora ... "
  giga_katzen.004.a:0 "Parabéns."
  giga_katzen.004.b:0 "Aquele rato danado!"
  giga_katzen.004.c:0 "Pitoresco, mas intrigante."
  
  giga_katzen.011.name:99 "Katzenartig Imperium Achieves FTL"
  giga_katzen.011.desc:0 "Após a conquista do§YKatzenartig Imperium§! de§YFlusion§ !, o país havia entrado em um período de forte crescimento militar, reunindo uma grande quantidade de espaçonaves como parte de sua força espacial. No entanto, eles parecem ter finalmente descoberto uma viagem mais rápida do que a luz. \n \nEm um feito notável de engenharia, eles usaram os vastos recursos do Flusion para melhorar maciçamente seu Sistema de Defesa Lunar, transformando-o em uma super arma adequada, capaz tanto de luz subterrânea quanto de FTL vôo. \n \nConsiderando que eles são agora uma civilização espacial adequada, eles nos enviaram uma mensagem direta, pedindo a transferência imediata do§YSistema Jublio§! para eles ... "
  giga_katzen.011.a:0 "Na tela."
  
  giga_katzen.0100.name:99 "The Katzenartig Imperium"
  giga_katzen.0100.desc:0 "Notícias chegaram até nós de que o§YKatzens§ !, uma espécie do sistema§YJublio§ !, atingiu recentemente o FTL. \n \nEnquanto os primitivos que adquirem o FTL são geralmente de pouca preocupação, devido à forma como muito atrasados, esta espécie parece ter investido pesadamente em sua tecnologia de armamento antes de inventar o Hyperdrive. Como tal, eles agora estão entrando no estágio galáctico com frotas capazes de rivalizar ou até mesmo superar a nossa. \n \nTalvez ainda mais preocupante é que este§YKatzenartig Imperium§ !, liderado por um certo§YKaiser Kattail§ !, parece ter transformado uma pequena lua em uma enorme nave espacial equipada com armas! Esta super arma, apelidada de§YKaiser Moon§ !, sem dúvida pulverizaria a maioria das coisas. vem. \n \nÉ aconselhável ter cuidado ao lidar com esta nova ameaça potencial para a galáxia. Eles também parecem ter enviado uma transmissão para toda a galáxia, que acabamos de receber ... "
  giga_katzen.0100.a:0 "Preocupado. Na tela."
  
  giga_katzen.0101.name:0 "Transmissão de entrada!"
  giga_katzen.0101.desc:0 "Estrangeiros da galáxia. \n \nEu sou§YDouclaw MacCathur§ !, enviado por nosso governante§YKaiser Kattail§! para informá-lo de nossas intenções. Respeite nossa nação, nosso Kaiser e nós devem cooperar com suas civilizações. Mas, esteja avisado de que não hesitaremos em ir à guerra, se precisarmos. \n \nEstamos ansiosos por uma futura cooperação com suas nações e desejamos estabelecer uma ordem duradoura de paz e prosperidade nesta galáxia. \n \nO Kaiser espera que você não nos decepcione. "
  giga_katzen.0101.a:0 "Veremos isso."
  
  #Kaiser demands Jublio
  giga_katzen.012.name:0 "Transmissão de entrada!"
  giga_katzen.012.a.desc:0 "Alienígenas! \n \nComo você sem dúvida notou, nossa espécie finalmentealcançou uma viagem mais rápida que a luz. E, como tal, gostaríamos de receber a propriedade adequada de nosso sistema solar. \ N \nConsiderar que sua espécie nos ajudou no passado,§YKaiser Kattail§! decidiu oferecer-lhe um acordo: Oferecemos a sua espécie§W7500§!£energy£e§W2500§!£alloys£, em troca do controle total do§YSistema Jublio§!. \ N \nIsso parece justo para você? Lembre-se de que não temos medo de lutar pelo sistema, se necessário. "
  giga_katzen.012.a:0 "Excelente negócio! Aceitamos."
  giga_katzen.012.a.response:0 "Excelente! O Kaiser ficará feliz em saber que sua espécie ainda é tão generosa."
  giga_katzen.012.a.tooltip:0 "Iremos§Gtransfer§! o§YJublio System§! para o Império de Katzenartig."
  
  giga_katzen.012.b.desc:0 "Saudações, alienígenas. Sou§YDouclaw MacCathur§ !, enviado por nosso Kaiser para comunicar-se com vocês. \n \nComo você sem dúvida notou, nossa espécie finalmente alcançou o Mais Rápido - Viagem leve. E, como tal, gostaríamos de receber a propriedade adequada de nosso sistema solar. \ N \nNosso líder, o grande unificador§YKaiser Kattail§ !, decidiu oferecer-lhe um acordo: Daremos sua espécie§ W2500§!£energy£e§W1000§!£alloys£, em troca do controle total do§YSistema da Jublio§!. \ N \nEsperamos que pareça justo para você, mas lembre-se de que não temos medo de lutar para o sistema, se necessário. "
  giga_katzen.012.b:0 "Um bom negócio. Aceitamos."
  giga_katzen.012.b.response:0 "Excelente! O Kaiser ficará feliz em saber que sua espécie é cooperativa."
  
  giga_katzen.012.c.desc:0 "Alienígenas. \n \nComo você sem dúvida notou, nossa espécie finalmente conseguiu uma viagem mais rápida que a luz. E, como tal, gostaríamos de receber a propriedade adequada de nosso solar sistema. \n \nConsiderando que você foi anteriormente hostil a nós,§YKaiser Kattail§ !, exige que você transfira imediatamente o§YJublio System§! para nós, ou então nos vingaremos contra sua espécie para sempre. "
  giga_katzen.012.c:0 "Não temos escolha a não ser aceitar."
  giga_katzen.012.c.response:0 "O Kaiser ficará feliz em saber que sua espécie viu a razão."
  
  giga_katzen.012.d:0 "Não. Este sistema é nosso."
  giga_katzen.012.d.response:0 "Muito bem então. Nós o encontraremos no campo de batalha."
  giga_katzen.012.d.tooltip:0 "O§YKatzenartig Imperium§! se tornará§Rhostile§! e tente apreender o sistema."
  
  giga_katzen.013.name:99 "The Katzenartig Imperium Attacks!"
  giga_katzen.013.desc:0 "Após nossa recusa em entregar o§YJublio System§ !, o Katzenartig Imperium mobilizou suas frotas e está atacando a base estelar do sistema! Agora existe um estado de guerra entre nossos dois impérios ..."
  giga_katzen.013.a:0 "Ups."
  
  #Jublio Peace Offer
  giga_katzen.014.name:0 "Transmissão de entrada!"
  giga_katzen.014.desc:0 "Estrangeiros. Apreendemos o Sistema Jublio e, portanto, adquirimos o que viemos. \n \nPara tal, o Kaiser está oferecendo a você um acordo de paz para encerrar este conflito. Todas as fronteiras atuais devem ser conservadas , e não iremos mais atacá-lo. "
  giga_katzen.014.a:0 "Aceitamos."
  giga_katzen.014.a.tooltip:0 "Iremos§Gtransfer§! o§YSistema da Jublio§! e§Todos os sistemas ocupados§! para o Império de Katzenartig. \n \nA§YParecer do Kaiser§! vai§Aumentar§ !."
  giga_katzen.014.a.response:0 "O Kaiser ficará feliz em saber que sua espécie viu a razão."
  giga_katzen.014.b:0 "Nós nunca nos renderemos!"
  giga_katzen.014.b.tooltip:0 "Continuaremos lutando contra o Império Katzenartig até o fim."
  giga_katzen.014.b.response:0 "Bem, pelo menos tentamos."
  
  ###CONTACT EVENT###
  giga_katzen.020intro.desc:0 "Nós, Katzens saudamos vocês, alienígenas. Eu sou§YDouclaw MacCathur§ !, representante de nosso grande líder§YKaiser Kattail§!. \n \nSabemos que somos receptivos à diplomacia, mas não hesitaremos em pegue em armas contra sua espécie, se isso se tornar necessário. "
  
  giga_katzen.020.name:99 "The Katzenartig Imperium"
  giga_katzen.020aally.desc:0 "Saudações [Root.GetSpeciesName]! O Kaiser fica sempre feliz em ouvir notícias de sua espécie. Ele fala muito sobre você."
  giga_katzen.020bally.desc:0 "O Kaiser está feliz por termos sido capazes de estabelecer uma aliança militar. Ele considera sua espécie digna de respeito."
  giga_katzen.020cally.desc:0 "[Root.GetSpeciesName]! Que nossa aliança dure até que as estrelas se apaguem e mais um pouco."
  giga_katzen.020dally.desc:0 "Com o [Root.GetSpeciesNamePlural] ao nosso lado, a Organização do Tratado Flusionian governará a galáxia!"
  giga_katzen.020eally.desc:0 "O FTO foi originalmente estabelecido como uma aliança militar entre nós e outra nação em Flusion, antes de termos FTL. \n \nNão pergunte o que aconteceu com essa nação."
  giga_katzen.020aneutral.desc:0 "Saudações, alienígenas. Vocês vieram discutir possíveis trocas de território, hmm? Eles são uma forma muito lucrativa de ganhar recursos, você sabe."
  giga_katzen.020bneutral.desc:0 "Saudações. Você traz boas notícias? O Kaiser só quer boas notícias."
  giga_katzen.020cneutral.desc:0 "O Kaiser espera estabelecer boas relações com sua espécie. Você não iria querer nos decepcionar, não é?"
  giga_katzen.020dneutral.desc:0 "Sim? Douclaw MacCathur aqui, falando em nome de Kaiser Kattail."
  giga_katzen.020eneutral.desc:0 "Bom dia para vocês, alienígenas. Nossos militares estão monitorando este canal, então não sejam muito turbulentos."
  giga_katzen.020fneutral.desc:99 "We hope your arkships are compliant with all relevant travel regulations while in Katzenartig space."
  giga_katzen.020ahappy.desc:0 "Ah! O [Root.GetName]! O Kaiser ficará feliz em negociar com sua espécie. Ele espera que possamos negociar recursos e território. Especialmente território."
  giga_katzen.020bhappy.desc:0 "Como estão as coisas para o seu império, [Root.GetSpeciesNamePlural]? O Kaiser espera que esteja tudo bem."
  giga_katzen.020chappy.desc:0 "O Kaiser freqüentemente spAks de você, [Root.GetName]. Ele o considera uma espécie confiável, o que, honestamente, é um feito e tanto, na verdade. "
  giga_katzen.020dhappy.desc:0 "Saudações, [Root.GetName]. O Kaiser está sempre feliz em se comunicar com sua espécie."
  giga_katzen.020ehappy.desc:0 "O Kaiser espera que nossas duas civilizações possam crescer e prosperar juntas, [Root.GetSpeciesNamePlural]."
  giga_katzen.020fhappy.desc:99 "It is always a pleasure to hear from our travelling friends. In our own ways, we explore this galaxy together."
  giga_katzen.020ghappy.desc:99 "You should know that many on Flusion dream of seeing the wonders you must encounter on your journeys. But alas, there is a lifetime of sights already on our beloved capital."
  giga_katzen.020aangry.desc:0 "[Root.GetName]. Saiba que não temos medo de conflito. O Kaiser ficaria mais do que satisfeito em apagar seu império do mapa e substituí-lo pelo nosso."
  giga_katzen.020bangry.desc:0 "Você veio nos dar seu território? O Kaiser com certeza espera que sim. Do contrário, podemos pegá-lo nós mesmos."
  giga_katzen.020cangry.desc:0 "Você sabia? O Kaiser freqüentemente faz discursos para descrever o quão desprezível é o seu governo. E ele está certo."
  giga_katzen.020dangry.desc:0 "O Kaiser tem uma extensa lista de" Impérios a serem removidos do mapa ". \n \nO [Root.GetName] está no topo."
  giga_katzen.020eangry.desc:0 "Nós, Katzens, nos perguntamos como sua espécie chegou ao espaço."
  giga_katzen.020fangry.desc:99 "You can flee in your dinghies for now, [Root.GetSpeciesNamePlural]. But the spread of our banner will eventually leave you with nowhere to hide in this galaxy, or beyond it."
  giga_katzen.020awar.desc:0 "Nós seremos a maré que arrasta sua civilização para as profundezas da história. E o Kaiser ficará mais do que feliz em controlar a maré."
  giga_katzen.020bwar.desc:0 "Você teve sua chance, [Root.GetSpeciesNamePlural]. Agora, é hora de agir."
  giga_katzen.020cwar.desc:0 "O Kaiser não pode esperar para libertar seu povo de seu governo asinino. Eles aprenderão a amar o Kaiser."
  giga_katzen.020dwar.desc:0 "O Kaiser deve enviar o [Root.GetName] onde ele pertence: Na lata de lixo da história."
  giga_katzen.020ewar.desc:0 "O [Root.GetName] logo se juntará à miríade de nações de Flusion."
  giga_katzen.020fwar.desc:99 "Where will your people hide when the Weltraumpanzers breach your hulls? All of space belongs to Katzenkind, and vagrants are unwelcome."
  
  giga_katzen.020.kaiserhappy4:0 "§YParecer do Kaiser§ !: 4 | Exultante"
  giga_katzen.020.kaiserhappy3:0 "§YParceira de Kaiser§ !: 3 | Muito amigável"
  giga_katzen.020.kaiserhappy2:0 "§YParecer do Kaiser§ !: 2 | Amigável"
  giga_katzen.020.kaiserhappy1:0 "§YParecer do Kaiser§ !: 1 | Cordial"
  giga_katzen.020.kaiserneutral:0 "§Y Opinião do Kaiser§ !:0 | Indiferente"
  giga_katzen.020.kaiserangry1:0 "§YParceira de Kaiser§ !: -1 | Descontente"
  giga_katzen.020.kaiserangry2:0 "§YPensação de Kaiser§ !: -2 | Irritado"
  giga_katzen.020.kaiserangry3:0 "§YParecer de Kaiser§ !: -3 | Enfurecido"
  giga_katzen.020.kaiserangry4:99 "§YKaiser's Opinion§!: Enraged | Current attitude range: -80 to -100"
  
  giga_katzen.020.kaiseropinion:0 "§TA§Y Opinião do Kaiser§! de nós pode variar entre§E4 | Exaltado§! e§R-3 | Enfurecido§! sua opinião. \n \nUm Kaiser enfurecido irá automaticamente§Reclarar guerra§! contra nós, enquanto podemos ser capazes de buscar uma§Aliança§! com um Kaiser exultante.§! "
  
  giga_katzen.020.war:0 "Já nos cansamos de você,§Resta é guerra!§!"
  giga_katzen.020.war.tooltip:0 "§T§RWE DECLARARÁ GUERRA TOTAL NO IMPERIUM KATZENARTIG.§! \n \nA§YKaiser Opinion§! irá§Rdecrease§! to§Renraged§!. \n \nPeace will só será possível após pelo menos§Y2.5 anos de luta§!. \n \n§YFlusion§! deve ser§Ycapturada§! ou§Ydestruída§! para derrotar o Império para sempre.§T "
  giga_katzen.020.war.response:0 "Muito bem. \n \nSe você quer guerra, então deve haver guerra, alienígenas."
  
  giga_katzen.020.peace:0 "§BOferir paz§!"
  giga_katzen.020.peace.tooltip:0 "§T§BNós assinaremos uma trégua com o Império de Katzenartig.§! \n \nA§Y Opinião do Kaiser§! irá§Aumentar§! para§Aumentar§!. \n \nTodos os§ Suas fronteiras atuais§! Serão mantidas.§! "
  need_katzen_war_10_years:0 "Os Katzens só estarão dispostos a assinar um tratado de paz após§Y2.5 anos§! de luta."
  giga_katzen.020.peace.response:0 "Ah, paz? O Kaiser ficará feliz em ver que nosso povo pode finalmente chegar a um acordo!"
  
  giga_katzen.020.a:0 "Adeus."
  
  giga_katzen.021.name:0 "Guerra com o Império"
  giga_katzen.021.desc:0 "Seguindo nossa declaração aos Katzens, nossos dois impérios estão oficialmente em guerra. Os Katzens estão atualmente mobilizando suas frotas, e devemos esperar que a luta comece em breve. \n \nOs Katzens só aceitarão a paz depois de pelo menos uma década de luta, e as negociações diplomáticas com eles não serão possíveis até então. "
  giga_katzen.021.a:0 "Vamos acabar com eles."
  
  giga_katzen.022.name:0 "Katzen- [Root.GetSpeciesName] Tratado de Paz"
  giga_katzen.022.settled.desc:99 "Following a long war with the Katzens, we have finally managed to sign a peace treaty with them, ending years of conflict.\n\nHostilities between us and the Imperium has ceased, and the current borders have been made official. The Kaiser might also be more open to negotiations now that the war has ended."
  giga_katzen.022.nomad.desc:99 "Following a long war with the Katzens, we have finally managed to sign a peace treaty with them, ending years of conflict.\n\nHostilities between us and the Imperium has ceased, and we have agreed to respect each other's assets. The Kaiser might also be more open to negotiations now that the war has ended."
  giga_katzen.022.a:0 "Um bom resultado."
  
  #SHIP TRADE
  giga_katzen.020.buy:0 "Podemos comprar alguns de seus navios?"
  giga_katzen.020.buy.tooltip:0 "Podemos comprar alguns navios especiais do§YKatzenartig Imperium§ !, se assim o desejarmos. Isso tem uma pequena chance de§Aumentar§! a§YPerícia do Kaiser§ !."
  cant_recently_bought_ships:0 "Só podemos comprar navios Katzen a cada 6 meses."
  cant_already_buy_katzen_ships:0 "Já estamos encomendando navios Katzen."
  cant_kaiser_opinion_too_low:0 "A opinião do Kaiser sobre nós é muito baixa. Ele só concordará em nos vender navios se for maior ou igual a -1."
  
  giga_katzen.02011.name:0 "Compra do navio Katzen"
  giga_katzen.02011.desc:0 "O Kaiser estaria disposto a vender alguns de nossos navios de guerra avançados do seu tipo, sim. Temos várias classes de navios disponíveis, então faça sua escolha. Claro, vamos construir esses navios de forma diferente de nossos navios regulares , então não pense que está recebendo informações grátis sobre nossa engenharia. \n \n ... \n \nE não, o Kaiser Moon não está à venda. "
  
  giga_katzen.02011.a:0 "5§BKatzenweltraumpanzers§! |§Y5000§!£energy£"
  giga_katzen.02011.a.tooltip:0 "Compraremos uma frota de 5§BKatzenweltraumpanzers§ !, embarcações de combate blindadas ágeis e rápidas. \nHá 15% de chance de o§YKaiser Opinhão§! de nós vai§Aumentar§!.$attache_boost_chance$"
  
  giga_katzen.02011.b:0 "3§BLeerekatzenbombers§! |§Y10000§!£energy£"
  giga_katzen.02011.b.tooltip:0 "Compraremos uma frota de 3§Bombardos de Bleerekatzen§ !, embarcações de bombardeiro móveis equipadas com mísseis de longo alcance. \nHá 20% de chance de que§YKaiser Parecer§! de nós§Aumentará§!.$Attache_boost_chance$"
  
  giga_katzen.02011.c:0 "1§BKatzenkreuser§! |§Y15000§!£energy£"
  giga_katzen.02011.c.tooltip:0 "Compraremos um único§BKatzenkreusers§ !, um grande e completo navio de guerra para esmurrar o inimigo de longe. \nHá 25% de chance de que a§Y Opinião do Kaiser§! de nós o faça§Aumentar§!.$Attache_boost_chance$"
  
  giga_katzen.02011.response:0 "Uma excelente escolha! Vamos entregar o artesanato na sua capital no próximo mês."
  
  giga_katzen.02011.bye:0 "Esqueça."
  
  giga_katzen.02012.name:0 "Navios de Katzen Chegam!"
  giga_katzen.02012.desc:0 "Como prometido, o Kaiser fez com que os navios que encomendamos fossem entregues em nossa capital. Eles agora se juntaram oficialmente às nossas forças armadas e podemos usá-los como quisermos. \n \nTeremos que fazer isso espere 6 meses se quisermos encomendar os navios Katzen novamente. "
  giga_katzen.02012.a:0 "Ótimo."
  
  #ALLIANCE
  giga_katzen.020.ally:0 "Gostaríamos de negociar uma§Aliança§ !."
  giga_katzen.020.ally.tooltip:0 "Se o Kaiser for extremamente amigável conosco, podemos ser capazes de§Eally§! o§YKatzenartig Imperium§!. \n \nNós teríamos que nos juntar a todas as suas guerras, mas nós poderá chamá-los livremente em nosso auxílio. "
  need_elated_kaiser:0 "A§Y Opinião do Kaiser§! precisa ser§E4 | Exaltado§! para estabelecer uma aliança."
  giga_katzen.020.ally.response:0 "Uma aliança, você diz? Considerando as boas relações entre nossa espécie, tenho certeza de que o Kaiser ficaria mais do que feliz em forjar uma aliança militar poderosa com sua espécie, alienígenas! \n \nNós entrarei em contato com você com um tratado de aliança mais detalhado dentro de uma semana. "
  
  giga_katzen.3000.name:0 "A Organização do Tratado Flusionian"
  giga_katzen.3000.desc:0 "§YKaiser Kattail§! enviou-nos uma transmissão diplomática, sobre a formação de uma aliança entre nós. Esta aliança, que ele denomina de§YFlusionian Tratado Organização§ !, tem os seguintes termos: \n \n-Não podemos declarar guerra uns aos outros. \n-Teremos que nos juntar a todos os conflitos em que os Katzens se envolverem. \n-Poderemos chamar os Katzens em nossa ajuda sempre que necessário. \n-Faremos isso Desfrute de um maior grau de cooperação militar, científica e econômica. \n-O Kaiser não exigirá mais terras de nós. \n-Em troca de proteção militar, emprestaremos 5% de nossa capacidade naval aos Katzens. \n \nSomos livres para recusar estes termos, mas, ao fazer isso,§Rdiminuir§! a§Y Opinião do Kaiser§! de nós. O Kaiser pode revogar a aliança se sua opinião sobre nós cair abaixo de§B3 | Amigável§!. \n \nVamos aceitar? "
  giga_katzen.3000.a:0 "Juntos, nunca seremos derrotados!"
  giga_katzen.3000.a.tooltip:0 "Vamos aliar o§YKatzenartig Imperium§! e nos juntar à§YOrganização do Tratado da Flusão§!. \nSeremos imediatamente chamados para qualquer guerra Katzen. \nSeremos capazes de chamá-los para nossas guerras através de sua tela de diplomacia. "
  giga_katzen.3000.b:0 "Pensando bem, esqueça."
  giga_katzen.3000.b.tooltip:0 "Não aliaremos o§YKatzenartig Império§!. \nA§YParecer do Kaiser§! de nós irá§Rdecuar§ !."
  
  giga_katzen.3001.name:0 "§Y [new_katzen_ally.GetName]§! junta-se à§YFlusionian Treaty Organization§!"
  giga_katzen.3001.desc:0 "Recebemos notícias de que§Y [new_katzen_ally.GetName]§! e§YKatzenartig Imperium§! formaram uma aliança, apelidada de§YOrganização do Tratado da Flusionismo§ !. Essa aliança permitirá que eles façam chame os Katzens às armas a qualquer momento, e as duas nações desfrutarão de um maior grau de cooperação militar, científica e econômica. "
  giga_katzen.3001.a:0 "A esfera de influência Katzen cresce."
  
  need_at_war_katzen:0 "Precisamos estar em uma guerra sem os Katzens."
  giga_katzen.020.calltoarms:0 "Precisamos de você para se juntar às nossas guerras."
  giga_katzen.020.calltoarms.tooltip:0 "O§YKatzenartig Imperium§! declarará§Guerra total§! em todos os países com os quais estamos em guerra. A paz§RNOT§! será possível entre eles e os países-alvo."
  giga_katzen.020.calltoarms.response:0 "Muito bem, então! Vamos ajudá-los em suas conquistas galácticas, alienígenas."
  
  giga_katzen.020.noally:0 "Esta aliança acabou, Katzens."
  giga_katzen.020.noally.tooltip:0 "Iremos§Relegar§! a§YOrganização do Tratado da Flusão§ !, perdendo todos os benefícios. \n \nO Kaiser não gostará disso, e sua§YOpinião§! de nós irá§Reduzir§ ! significativamente. Diminuirá ainda mais quanto mais próxima nossa aliança estiver. "
  giga_katzen.020.noally.response:0 "Vocês querem quebrar nossa aliança, alienígenas? \n \nMuito bem. Se vocês desejam se separar, que seja. Eu entendo. \n \nO Kaiser, por outro lado ... "
  
  fto_member:0 "Membro da Organização do Tratado de Flusionian"
  fto_member_desc:0 "Somos parte da Organização do Tratado Flusionian, uma aliança militar centrada em torno dos Katzens. Eles fornecem proteção militar, e contribuir ao nosso desenvolvimento militar e científico. "
  
  fto_member_1:0 "Membro da Organização do Tratado Flusionian"
  fto_member_1_desc:0 "Fazemos parte da Organização do Tratado Flusionian, uma aliança militar centrada em torno dos Katzens. Eles fornecem proteção militar e contribuem para o nosso desenvolvimento militar e científico."
  
  fto_member_2:0 "Membro da Organização do Tratado de Flusionian"
  fto_member_2_desc:0 "Somos parte da Organização do Tratado Flusionian, uma aliança militar centrada em torno dos Katzens. Eles fornecem proteção militar e contribuem para o nosso desenvolvimento militar e científico."
  
  fto_member_3:0 "Membro da Organização do Tratado de Flusionian"
  fto_member_3_desc:0 "Fazemos parte da Organização do Tratado Flusionian, uma aliança militar centrada em torno dos Katzens. Eles fornecem proteção militar e contribuem para o nosso desenvolvimento militar e científico."
  
  fto_member_4:0 "Membro da Organização do Tratado de Flusionian"
  fto_member_4_desc:0 "Fazemos parte da Organização do Tratado Flusionian, uma aliança militar centrada em torno dos Katzens. Eles fornecem proteção militar e contribuem para o nosso desenvolvimento militar e científico."
  
  giga_katzen.3002.name:0 "Kaiser nos expulsa do FTO!"
  giga_katzen.3002.desc:0 "Notícia terrível. Parece que algumas de nossas ações recentes irritaram§YKaiser§ !, que subsequentemente decidiu quebrar a aliança que estabelecemos. \n \nFomos efetivamente expulsos do§YFlusionian Organização do Tratado§ !, e a§Y Opinião do Kaiser§! Sobre nós caiu significativamente. "
  giga_katzen.3002.a:0 "Uma pena. Não precisávamos dele de qualquer maneira."
  
  cant_katzen_fed:0 "Não podemos aliar os Katzens se estivermos em uma federação."
  cant_katzen_subject:0 "Não podemos aliar os Katzens se formos um sujeito."
  cant_katzen_nomad:99 "Our nomadic ways are incompatible with Katzen strategic standards."
  
  giga_katzen.3003.name:0 "Organização do Tratado Flusionian desmorona!"
  giga_katzen.3003.desc:0 "Após a destruição de§YKaiser Moon§ !, o§YKatzenartig Imperium§! entrou em desordem. Como resultado, a§Y Organização do Tratado da Flusão§! entrou em colapso total e efetivamente não mais existe. \n \nNós podemos não receber mais assistência militar dos Katzens, e o Kaiser não está mais respondendo aos nossos gritos. "
  giga_katzen.3003.a:0 "Uma pena."
  
  giga_katzen.3010.name:0 "Kaiser propõe cooperação econômica mais estreita"
  giga_katzen.3010.desc:0 "Recebemos uma transmissão de§YKaiser Kattail§ !, perguntando se gostaríamos de aumentar os laços econômicos de nossas duas nações dentro da§YOrganização do Tratado da Flusão§!. \n \nOs Katzens obteriam acesso a mais de nossas instalações de ancoragem, mas em troca receberíamos subsídios adicionais para pesquisa e equipamento militar para nossa marinha."
  giga_katzen.3010.a:0 "Que gentil da parte dele."
  giga_katzen.3010.a.tooltip:0 "Nosso nível de cooperação com os Katzens como parte da§YOrganização do Tratado da Flusão§! irá§Aumentar§ !."
  giga_katzen.3010.b:0 "Nós recusamos."
  giga_katzen.3010.b.tooltip:0 "O§YKaiser§! provavelmente irá§Rexpelar§! nós da§YOrganização do Tratado da Flusão§! e sua opinião§Reduzir§ !."
  
  giga_katzen_external_leader_trigger:99 "$trigger_success$Is part of the §YFlusionian Treaty Organization§!"
  
  giga_katzen.3011.name:0 "Kaiser propõe aumento da cooperação militar"
  giga_katzen.3011.desc:0 "§YKaiser Kattail§! nos enviou uma transmissão, propondo um maior nível de cooperação militar dentro da§YOrganização do Tratado da Flusão§!. \n \nEle pede que mais uma vez concedamos aos Katzens acesso a um maior parte de nossas instalações de estaleiro, mas eles nos concederiam conhecimento militar secreto de Katzen, bem como grandes quantidades de suprimentos militares em troca. \n \nEle também afirmou que nossas frotas poderiam se envolver em exercícios militares cooperativos para beneficiar nossos dois corpos de almirantes . Devemos aceitar suas demandas? "
  giga_katzen.3011.a:0 "Uma boa proposta."
  giga_katzen.3011.a.tooltip:0 "Nosso nível de cooperação com os Katzens como parte da§YOrganização do Tratado da Flusão§! irá§Aumentar§ !."
  giga_katzen.3011.b:0 "O que ele pensa que está fazendo? Nós recusamos!"
  giga_katzen.3011.b.tooltip:0 "O§YKaiser§! provavelmente irá§Rexpelar§! nós da§YOrganização do Tratado da Flusão§ !, e sua opinião§Reduzir§! significativamente."
  
  giga_katzen.3012.name:0 "Kaiser oferece oficiais Katzen"
  giga_katzen.3012.desc:0 "O§YKaiser§! está mais uma vez se propondo a aumentar ainda mais os esforços de colaboração de nossos militares, agora oferecendo ainda maiores intercâmbios tecnológicos, investimentos militares, bem como alguns oficiais Katzen para nossas frotas. \n \nEle até se oferece para permitir que acessemos a grande maioria dos arquivos militares de Katzen, para que nossas forças armadas desfilem nos mundos de Katzen e para organizar exercícios e reuniões diárias do exército para aumentar ainda mais nossa cooperação. \n \nDevemos aceitar? "
  giga_katzen.3012.a:0 "Com certeza! Só o bem pode sair disso."
  giga_katzen.3012.a.tooltip:0 "Nosso nível de cooperação com os Katzens como parte da§YOrganização do Tratado da Flusão§! irá§Aumentar§!. \n2§YKatzen Admirals§! se juntará ao nosso grupo de líderes."
  giga_katzen.3012.b:0 "Chega de propostas do Kaiser!"
  giga_katzen.3012.b.tooltip:0 "O§YKaiser§! provavelmente irá§Rexpel§! us fda§ Organização do Tratado da Flusão§ !, e sua opinião§Rdecuar§! muito significativamente. "
  
  giga_katzen.3013.name:0 "Kaiser propõe união militar"
  giga_katzen.3013.desc:0 "O§YKaiser§! nos contatou com uma proposta ousada para praticamente fundir nossos altos comandos, o que nos permitiria nos beneficiar efetivamente de todo o conhecimento Katzen, e permitir que eles nos forneçam uma imensa ajuda no gerenciamento de nossas armas forças. \n \nOs benefícios de fazer isso seriam colossais, e os Katzens concordaram em nos enviar ainda mais almirantes e generais para liderar nossas frotas e exércitos. \n \nDevemos aceitar? "
  giga_katzen.3013.a:0 "Um empreendimento ambicioso, que certamente valerá a pena!"
  giga_katzen.3013.a.tooltip:0 "Nosso nível de cooperação com os Katzens como parte da§YOrganização do Tratado da Flusão§! irá§Aumentar§!. \n4§YKatzen Admirals§! e 2§YKatzen Generals§! se juntarão ao nosso pool de líderes. "
  giga_katzen.3013.b:0 "Essa é uma proposta estúpida."
  giga_katzen.3013.b.tooltip:0 "O§YKaiser§! provavelmente irá§Rexplicar§! nós da§YOrganização do Tratado da Flusão§ !, e sua opinião irá§Reduzir§! imensamente."
  
  giga_katzen.3014.name:0 "Kaiser exige federalização"
  giga_katzen.3014.desc:0 "O§YKaiser§! nos enviou uma transmissão diplomática urgente, exigindo a federalização imediata da§Y Organização do Tratado da Flusão§! em um§YKatzenartig Império§ maior!. \n \nA aceitação significaria efetivamente o nosso anexação completa e total ao Império, o que era de se esperar, considerando quanto controle concedemos aos Katzens sobre nossos militares. "
  giga_katzen.3014.a:0 "O quê? Não foi isso que combinamos!"
  giga_katzen.3014.a.tooltip:0 "Iremos§Reusar§! a§YKatzenartig Tratado da Organização§ !,§Remover§! todos os seus benefícios. \n \nO Kaiser se tornará§Renragado§ !, causando o§YKatzenartig Império§ ! para§Reclarar guerra§! sobre nós no próximo mês. \n \n "
  giga_katzen.3014.b:0 "Nós submetemos."
  giga_katzen.3014.b.tooltip:0 "§RO JOGO TERMINARÁ PARA VOCÊ.§! \nSeremos completamente anexados ao§YKatzenartig Imperium§ !."
  
  katzen_breakup:0 "Ruptura de Katzen"
  katzen_breakup_desc:0 "De repente e violentamente rompemos nossa aliança com os Katzens, que nos forneciam equipamento militar e ajudavam em nossas pesquisas. Isso teve consequências perceptíveis em nosso império como um todo."
  
  giga_katzen.3015.name:99 "Katzen Admirals Defect!"
  giga_katzen.3015.desc:0 "Após a eclosão da guerra com o§YKatzenartig Império§ !, os almirantes e generais Katzen que recebemos desertaram de nossas forças armadas e se juntaram a seus companheiros Katzens no Império! \n \nParece teremos que viver sem eles ... "
  giga_katzen.3015.a:0 "Esses ratos!"
  giga_katzen.3015.a.tooltip:0 "Todos os líderes Katzen do Império foram§Removidos§! de nosso grupo de líderes."
  
  #LAND TRADE
  giga_katzen.020.trade:0 "Gostaríamos de discutir o comércio de terras ..."
  giga_katzen.020.trade.tooltip:0 "Podemos oferecer ao Kaiser a compra de um de nossos sistemas. 4 de nossos sistemas que fazem fronteira com o§YKatzenartig Imperium§! serão escolhidos aleatoriamente e podemos então propor a venda de um para o Kaiser. "
  cant_trade_katzen_war:0 "Não podemos negociar se estivermos em guerra."
  need_border_with_katzen:0 "Precisamos ter uma fronteira direta com o Império Katzenartig."
  
  giga_katzen.0201.name:99 "Katzen Land Trades"
  giga_katzen.0201.desc:0 "Você gostaria de nos vender parte de seu território, hmm? O Kaiser ficaria mais do que feliz em pagar você em troca de um de seus sistemas! Qual deles você gostaria de nos dar?"
  giga_katzen.0201.a:0 "O sistema§Y [kaiser_sell_1.GetName]§ !."
  giga_katzen.0201.b:0 "O sistema§Y [kaiser_sell_2.GetName]§ !."
  giga_katzen.0201.c:0 "O sistema§Y [kaiser_sell_3.GetName]§ !."
  giga_katzen.0201.d:0 "O sistema§Y [kaiser_sell_4.GetName]§ !."
  giga_katzen.0201.tooltip:0 "Enviaremos uma oferta para§YKaiser§! e os Katzens proporão um preço para o sistema, com base em seu conteúdo, que podemos aceitar ou negar. \nSe a negociação for bem-sucedida , a opinião do§YKaiser§! de nós pode§Aumentar§ !, dependendo do valor do sistema vendido. "
  
  giga_katzen.0202.name:0 "O sistema [kaiser_sell_yes.GetName]"
  giga_katzen.0202.desc:0 "Considerando o conteúdo do sistema§Y [kaiser_sell_yes.GetName]§!, o Kaiser está disposto a oferecer§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£e§Y [flusion_primitives_country.kaiser_trade_value]§!£energy£e§Y [flusion_primitives_value_valor_valor]§!£alloys£em troca do controle total do sistema. \ N \nComo isso soa para a sua espécie? "
  
