  giga_dialog.1903.title:0 "$name_succ$Operacional!"
  giga_dialog.1903.desc:0 "Nosso$name_succ$no sistema [giga_system.GetName] agora estГЎ operacional! Seus feixes trator foram ativados e a atmosfera do Gigante de GГЎs estГЎ sendo continuamente coletada. \n \nDe acordo com nossos cientistas, acabarГЎ em algumas dГ©cadas. "
  giga_dialog.1903.a:0 "Maravilhoso!"
  
  giga_dialog.1904.title:0 "$name_succ$Esgotado"
  giga_dialog.1904.desc:0 "Nosso$name_succ_full$no sistema [giga_system.GetName] agora atingiu o nГєcleo rochoso do gigante gasoso. NГЈo hГЎ atmosfera para extrair e o antigo gigante gasoso foi reduzido a um Barren World, pequeno e rico em minerais. A prГіpria megaestrutura foi desmontada e o nГєcleo agora pode ser utilizado da maneira que quisermos. "
  giga_dialog.1904.a:0 "Todas as coisas devem acabar."
  
