  ########################################################
  
  giga_dialog.3301.name:0 "$name_auto_stripmine$Canteiro de obras construГ­do"
  giga_dialog.3301.desc:0 "Nossos engenheiros terminaram de montar o canteiro de obras de uma futura$name_auto_stripmine$perto de [giga_system.GetName]. Esta grande plataforma orbital hospedarГЎ tudo que precisamos para construir um grande complexo de mineraГ§ГЈo ao redor do planeta, eventualmente extraГ§ГЈo de quase todos os seus minerais. "
  giga_dialog.3301.a:0 "Excelente."
  
  giga_dialog.3302.name:0 "$name_auto_stripmine$Aparelho orbital construГ­do"
  giga_dialog.3302.desc:0 "Nosso aparelho orbital de$name_auto_stripmine$agora estГЎ completo. Esta grande construГ§ГЈo consiste em dois grandes feixes trator capazes de rastrear grandes quantidades de minerais extraГ­dos e pode explodir a superfГ­cie com grandes feixes de energia em para derreter duramente para extrair partes do planeta. TambГ©m incorpora um anel de processamento, a fim de aumentar ainda mais a produГ§ГЈo de minerais. Agora, devemos terminar de construir as instalaГ§Гµes planetas, consistindo de milhГµes de unidades de perfuraГ§ГЈo robГіtica, para realmente comeГ§ar operaГ§Гµes de stripmining. "
  giga_dialog.3302.a:0 "Maravilhoso!"
  
  giga_dialog.3303.title:0 "Planetary Strip Mine Operacional"
  giga_dialog.3303.desc:0 "Nossa$name_auto_stripmine$foi ativada com sucesso! Vigas trator orbitais gigantescas estГЈo irradiando toneladas e toneladas de minerais, extraГ­dos por milhГµes de perfuraГ§Гµes robГіticas automatizadas que coletam os minerais do planeta em milhares de complexos de mineraГ§ГЈo. \n \nLembre-se de que as operaГ§Гµes de mineraГ§ГЈo cessarГЈo assim que o centro do planeta for atingido e todos os minerais extraГ­dos, o que se estima que aconteГ§a em algumas dГ©cadas."
  giga_dialog.3303.monster.desc:99 "Our $name_auto_stripmine$ has been successfully activated! Gigantic orbital tractor beams are beaming tons upon tons of minerals, extracted by millions of automated robotic drilling collecting the planet's minerals in thousands of sprawling mining complexes.\n\nThe previous inhabitants of [giga_planet.GetName] failed to escape the activation of the structure in time. They will likely be gathered as if they were nothing but rocks and added to the $name_auto_stripmine$'s output."
  giga_dialog.3303.a:0 "SaГ­da mineral nominal."
  giga_dialog.3303.b:99 "How horrifying... for them."
  
  giga_dialog.3304.title:0 "Planetary Strip Mine Atingiu o nГєcleo externo"
  giga_dialog.3304.desc:0 "Nossos engenheiros e cientistas que trabalham no [giga_planet.GetName]$name_auto_stripmine$nos informam que as operaГ§Гµes de mineraГ§ГЈo atingiram o nГєcleo externo derretido do planeta. \nIsso significa que as operaГ§Гµes de extraГ§ГЈo de minerais cessarГЈo em cerca de 6 anos, quando finalmente alcanГ§amos o nГєcleo interno. "
  giga_dialog.3304.a:0 "Confirmado."
  
  giga_dialog.3305.title:0 "Planetary Strip Mine esgotada"
  giga_dialog.3305.desc:0 "O [giga_planet.GetName]$name_auto_stripmine$ficou sem minerais para extrair. [giga_planet.GetName] foi reduzido a um pequeno nГєcleo derretido exposto ao frio do espaГ§o. Os minerais restantes do nГєcleo foram foi extraГ­do por meio de tГ©cnicas de fraturamento avanГ§adas, o que significa que apenas restos e materiais pouco explorГЎveis вЂ‹вЂ‹permanecem. O aparato orbital foi desmontado e um depГіsito mineral estГЎ agora presente no nГєcleo exposto do planeta. "
  giga_dialog.3305.a:0 "Era inevitГЎvel."
  
  giga_dialog.3306.name:99 "Planetary Strip Mine Found Resources"
  giga_dialog.3306.desc.minerals:99 "The [fromfrom.GetName] $name_auto_stripmine$ has unearthed a rather sizeable rich ore veins. These veins will increase the ВЈmineralsВЈВ§YMineralВ§! yield of the orbiting $name_auto_stripmine$ by a significant margain.\n\nThey're only estimated to last for another [from.gigas_stripmine_rich_mineral_deposit_length] layers of the planet."
  giga_dialog.3306.desc.alloys:99 "The [fromfrom.GetName] $name_auto_stripmine$ has uncovered a peculiarly dense portion of mantle. This extra dense section of lithosphere is incredibly structurally similar to ВЈalloysВЈВ§YAlloysВ§!, effectively allowing us to directly mine refined materials. Unfortunately, excavating a material that is a worthy armor for spacefaring vessels is not a simple task, and the required focus on the dense deposit will cause ВЈmineralsВЈВ§YMineralВ§! production to slow.\n\nIt is estimated that we can remove another [from.gigas_stripmine_alloy_deposit_length] layers of the planet before the dense materials run out."
  giga_dialog.3306.desc.gas:99 "The [fromfrom.GetName] $name_auto_stripmine$ has breached vast caverns, full of a highly pressurized form of ВЈexotic_gasesВЈВ§YExotic GasВ§!! The drones on the surface should be able to extract the precious gas. Unfortunately to diverting drones to harvesting the gas will slow down ВЈmineralsВЈВ§YMineralВ§! production. \n\nWe have an estimated [from.gigas_stripmine_gas_deposit_length] layers of the planet before we stop seeing these caverns."
  giga_dialog.3306.desc.motes:99 "The [fromfrom.GetName] $name_auto_stripmine$ has discovered a seam of highly volatile compounds. With minor refinement these materials could be used to substitate ВЈvolatile_motesВЈВ§YVolatile MotesВ§!. This bounty however, is expected to lower ВЈmineralsВЈВ§YMineralВ§! output as we must slow down our mining operations down to avoid any accidental ignition of the compounds. \n\nWe predict that the compounds will run out after [from.gigas_stripmine_motes_deposit_length] layers of the planet."
  giga_dialog.3306.desc.crystals:99 "The [fromfrom.GetName] $name_auto_stripmine$ has located a cavern filled to the brim with crystalline structures. Proper purification and processing could turn fragments of these crystals into useable ВЈrare_crystalsВЈВ§YRare CrystalsВ§!. The cavern is unstable and the need to carefully dissamble it so as to not damage the crystals within, will unfortunately slow ВЈmineralsВЈВ§YMineralsВ§! production. \n\nThe Caverns are predicted to be present for another [from.gigas_stripmine_crystal_deposit_length] layers of the planet"
  giga_dialog.3306.desc.tensiles:99 "The [fromfrom.GetName] $name_auto_stripmine$ has struck something truly remarkable, a peculiar portion of the planet is 'hollow' with this internal hollow resisting the forces of gravity due to a naturally occuring ВЈgiga_sr_amb_megaconstructionВЈВ§YSupertensile MaterialВ§!, although the void will lower the ВЈmineralsВЈВ§YMineralВ§! output of the structure, the estimated harvest of this natural ВЈgiga_sr_amb_megaconstructionВЈВ§YSupertensile MaterialВ§! is truly invaluable for further mega-construction projects.\n\nThe pocket is not predicted to last long, only sustaining mining for an estamated [from.gigas_stripmine_supertensile_deposit_length] layers of the planet."
  giga_dialog.3306.desc.default:99 "The [fromfrom.GetName] $name_auto_stripmine$ has located an abnormal concentration of resources buried deep within the surface of the planet. Theses resources should prove invaluable in increasing the output of the structure, although they will not last forever."
  ########################################################
  ######################### SUCC #########################
  ########################################################
  
  giga_dialog.1901.name:0 "$name_succ$Obra ConcluГ­da"
  giga_dialog.1901.desc:0 "O canteiro de obras para um futuro$name_succ_full$no sistema [giga_system.GetName] foi concluГ­do! Sobre este andaime, construiremos um dispositivo enorme, que irГЎ continuamente coletar a atmosfera e o filtro do gigante de gГЎs Ele tambГ©m irГЎ gerar energia graГ§as aos reatores de fusГЈo que utilizam o hidrogГЄnio encontrado na atmosfera. \n \nLembre-se de que ele acabarГЎ se esgotando, deixando um mundo ГЎrido para trГЎs. "
  giga_dialog.1901.a:0 "Quanto tempo demorou para aparecer essa sigla?"
