  giga_dialog.3001.name:0 "O Quadrado MГ­tico"
  giga_dialog.3001.desc:0 "No sistema [from.GetName] reside uma construГ§ГЈo estranha. Nossos cientistas estГЈo perplexos com a visГЈo desta instalaГ§ГЈo orbital massiva circulando a estrela do sistema. Na verdade, Г© tГЈo ridГ­culo que foi assumido ser uma pegadinha ou uma anomalia em nossos sensores. \n \nA$name_ringworld_square$. \n \nNo sistema [from.GetName] existe um mundo circular em forma de quadrado. Embora pareГ§a ter sofrido muitos castigos no passado, ainda parece estar quase totalmente intacto. A forma estranha desta construГ§ГЈo desafia tudo o que sabemos sobre fГ­sica e engenharia, jГЎ que a gravidade deveria ter quebrado essa coisa hГЎ milГЄnios. No entanto, aqui estГЎ parada, esperando algo para descobrir seus mistГ©rios. \n \nUma estaГ§ГЈo pequena e quase totalmente abandonada tambГ©m flutua silenciosamente acima da estrela, e nossos cientistas acreditam que ela pode conter informaГ§Гµes Гєteis sobre esta estrutura peculiar. \n \nAВ§Projeto especialВ§! foi emitido para investigar esta coisa e a estaГ§ГЈo em um esforГ§o para descobrir como ainda existe. "
  giga_dialog.3001.a:0 "Que peculiar."
  
  giga_dialog.3002.name:0 "Os MistГ©rios do Quadrado"
  giga_dialog.3002.desc:0 "ApГіs dezenas de expediГ§Гµes e meses de pesquisa, nossos cientistas acreditam que finalmente penetraram os mistГ©rios deste Mundo Quadrado. \n \nEnquanto o exterior do Mundo Quadrado estГЎ seriamente danificado, seu interior ainda estГЎ intacto, e a maioria dos sistemas internos sГЈo realmente funcionais! Sua estrutura Г© feita principalmente de Quberine, uma liga extremamente avanГ§ada embalada com componentes eletrГґnicos incrivelmente complexos de auto-reparo, explicando assim como Г© capaz de suportar as incrГ­veis forГ§as exercidas sobre ela. \n \nNossos cientistas acreditam que pode ser possГ­vel consertar essa coisa, com recursos suficientes e tecnologias suficientemente avanГ§adas. Detectamos vГЎrias fГЎbricas desativadas de Quberine no mundo do anel, que podem comeГ§ar a produzir o Quberine novamente se restaurarmos a fonte de alimentaГ§ГЈo do mundo do anel durante reparos futuros. \n \nO equipes de pesquisa tambГ©m concluГ­ram que a pequena estaГ§ГЈo acima da estrela serve como uma espГ©cie de 'ponto de acesso central' para o sistema interno do Mundo Quadrado em. Eles nos encorajam a gastar alguns crГ©ditos de energia e ligas para consertГЎ-lo e subsequentemente reativГЎ-lo, pois isso pode nos conceder acesso a dados valiosos sobre o Mundo Quadrado e seus construtores armazenados em seus vastos arquivos internos. Esses dados podem muito bem ser a chave para reparar esta construГ§ГЈo maravilhosa ..."
  giga_dialog.3002.a:0 "Maravilhoso! Vamos consertar esta estaГ§ГЈo imediatamente."
  
  giga_dialog.3003.name:0 "Mundo Quadrado restaurado!"
  giga_dialog.3003.desc:0 "Nossos engenheiros tГЄm o prazer de informar que uma seГ§ГЈo do Mundo Quadrado em ruГ­nas foi reparada com sucesso! A energia foi restaurada para os circuitos auxiliares e Quberine estГЎ fluindo das fГЎbricas automatizadas, equipadas com energia avanГ§ada para - conversores de matГ©ria. A grande quantidade de Quberine na estrutura e no solo teve o estranho efeito de tornar as plantas um pouco verdes demais, mas, fora isso, tudo parece inteiramente nominal. "
  giga_dialog.3003.a:0 "IncrГ­vel!"
  
  giga_dialog.3004.name:0 "Mundo Quadrado Speaks"
  giga_dialog.3004.desc:0 "NotГ­cia incrГ­vel! Depois de reparar e repotencializar a estaГ§ГЈo nos sistemas do Mundo Quadrado, uma IA adormecida antiga hospedada tanto na estaГ§ГЈo quanto no prГіprio Mundo Quadrado parece ter despertado. \n \nEsta IA, cujo nome Г©В§ YGaryxВ§! De acordo com dados recuperados da estaГ§ГЈo, aparentemente era responsГЎvel pela manutenГ§ГЈo do Mundo Quadrado e seus vastos sistemas internos. Nossas equipes de pesquisa conseguiram estabelecer contato com ele, e estГЎ bastante ansioso para se comunicar conosco. "
  giga_dialog.3004.a:0 "Na tela."
  
  giga_dialog.3005.name:0 "Garyx, Keeper of the Mundo Quadrado"
  giga_dialog.3005.desc:0 "Ah, visitantes! Obrigado por enviar energia suficiente para a estaГ§ГЈo para tirГЎ-la da hibernaГ§ГЈo. JГЎ faz um tempo desde que falei com uma entidade sapiente. \n \nEu sou Garyx, o artificial inteligГЄncia responsГЎvel por manter o Mundo Quadrado e seus vastos arquivos de dados, e eu assumi a forma de um reptiliano hologrГЎfico, pois era assim que meus criadores se pareciam. \n \nDe qualquer forma, desculpas pelo lamentГЎvel estado do Mundo Quadrado. Eu encontrei um particularmente documentГЎrio interessante sobre a reproduГ§ГЈo reptiliana, e venho estudando-o nos Гєltimos 120 milГЄnios usando backup de energia para entender melhor meus criadores. Infelizmente, parece que algo drГЎstico aconteceu ao Mundo Quadrado nesse Г­nterim ... Oh, bem. \n \nAgora que vocГЄ estГЎ aqui, e como meus criadores aparentemente jГЎ se foram, vocГЄ pode ter permissГЈo para acessar os bancos de dados do Mundo Quadrado, que estГЈo surpreendentemente intactos. "
  
  giga_dialog.3005.a:0 "O que hГЎ nesses bancos de dados?"
  giga_dialog.3005.a.response:0 "Oh, muitas coisas. Meus criadores armazenaram muitos dados sobre os vГЎrios impГ©rios e espГ©cies que conheciam, seus conhecimentos cientГ­ficos e, o mais importante, sua divindadeВ§BQubeyВ§!. \nEles queriam preservГЎ-lo para que as geraГ§Гµes futuras possam se beneficiar dele, e, bem, jГЎ que vocГЄ estГЎ aqui agora, acho que eles tiveram sucesso nesta tarefa. Pena que eles nГЈo estГЈo mais aqui para ver isso ... "
  
  giga_dialog.3005.b:0 "Quantos anos tem o Mundo Quadrado?"
  giga_dialog.3005.b.response:0 "Bem, a julgar pela posiГ§ГЈo das estrelas, estimo que esta coisa esteve quebrada por cerca de 120.000 dos seus anos, mas Г© muito mais antiga do que isso. \nFoi construГ­da cerca de 567.000 anos atrГЎs pelos meus criadores, e abrigou sua civilizaГ§ГЈo por muitos milГЄnios. NГЈo tenho certeza do que aconteceu com isso, pois, infelizmente, fui completamente cativado por minha pesquisa. A possibilidade mais provГЎvel Г© que a civilizaГ§ГЈo deles tenha entrado em colapso devido Г  decadГЄncia ou simplesmente envelhecido e divergentes, assim como muitos outros grandes impГ©rios antes deles. "
  
  giga_dialog.3005.c:0 "Quem construiu o Mundo Quadrado e por quГЄ?"
  giga_dialog.3005.c.response:0 "Meus criadores sim. Eles eram uma espГ©cie deВ§R (DATA CORRUPTED)В§ !, conhecido comoВ§R (DATA CORRUPTED)В§ !, e governavam um impГ©rio bastante grande, oВ§R (DADOS CORROMPIDOS)В§! \ N \nEles tambГ©m eram incrivelmente religiosos e adoravam uma divindade que chamavam deВ§BQubeyВ§ !. Diz-se que essa divindade ajudou sua espГ©cie a evoluir durante milhГµes de anos, e muitos viram a perfeiГ§ГЈo da geometria formas comoВ§BQubeyВ§! 's maneira de manifestar sua presenГ§a para o mundo. \n \nMeus fabricantes descobriram uma substГўncia incrГ­vel, possuindo propriedades de autorreparaГ§ГЈo incomparГЎveis. Eles a apelidaram de' Quberine ', pois acreditavam que a substГўncia era decifrada do prГіprioВ§BQubeyВ§ !, e decidiu usГЎ-lo para construir esta magnГ­fica estrutura geomГ©trica que desafia a fГ­sica como uma forma de adorar e mostrar sua gratidГЈo para comВ§BQubeyВ§! \n \nEles tambГ©m aproveitaram a oportunidade para reunir o mГЎximo de dados sobre seus avanГ§os cientГ­ficos, Quberine, o Mundo Quadrado eВ§BQubeyВ§ !, nos bancos de dados, na esperanГ§a de que um futuro A civilizaГ§ГЈo que tropeГ§ar nele pode aprender sobre o todo-poderosoВ§BQubeyВ§! tambГ©m."
  
  giga_dialog.3005.d:0 "Podemos de alguma forma consertar o Mundo Quadrado?"
  giga_dialog.3005.d.response:0 "Espero que sim! Os arquivos mais funcionais contГЄm muitos dados sobre a estrutura interna e externa do Mundo Quadrado. Se vocГЄ me der algumas dezenas de meses para compilar tudo, posso dar aos seus cientistas um cache de dados contendo todas as informaГ§Гµes necessГЎrias para realizar grandes reparos na megaestrutura. Eu adoraria ver o Mundo Quadrado restaurado Г  sua antiga glГіria! "
  
  giga_dialog.3005.e:0 "Adeus."
  giga_dialog.3005.e.response:0 "Que os arquivos lhe sirvam nГіsll, e nГЈo hesite em entrar em contato comigo novamente se precisar de mais informaГ§Гµes. "
  
  giga_dialog.3006.name:0 "Os Arquivos"
  giga_dialog.3006.desc:0 "Pouco antes de desconectarmos,В§YGaryxВ§! garantiu que nos enviarГЎ um cache de dados contendo todas as informaГ§Гµes necessГЎrias para reparar o mundo quadrado em cerca de 2 anos. \n \nEnquanto isso, podemos contatГЎ-lo novamente 'atualizando' a Megastrestrutura do Mundo Quadrado. Nossos cientistas acreditam que sua habilidade de navegar facilmente nos bancos de dados do Mundo Quadrado pode contribuir muito para nossa pesquisa. "
  giga_dialog.3006.a:0 "Confirmado."
  
  giga_dialog.3007.name:0 "Garyx, GuardГЈo do the Mundo Quadrado"
  giga_dialog.3007.desc:0 "SaudaГ§Гµes, mais uma vez. Terminei de compilar um cache de dados contendo todas as informaГ§Гµes necessГЎrias para reparar o Mundo Quadrado! Vou transferi-lo para seus cientistas imediatamente."
  giga_dialog.3007.a:0 "Maravilhoso! Faremos bom uso deste conhecimento."
  
  giga_dialog.3008.name:0 "Garyx, GuardГЈo do  the Mundo Quadrado"
  giga_dialog.3008.desc:0 "Ah, saudaГ§Гµes! Veio buscar mais dados nos arquivos? Em que posso ajudГЎ-lo?"
  giga_dialog.3008.a:0 "VocГЄ pode ajudar em nossa pesquisa?"
  giga_dialog.3008.c:0 "Exibir tela desligada."
  
  giga_dialog.3009.name:0 "Garyx, GuardГЈo do Mundo Quadrado"
  giga_dialog.3009.desc:0 "Por que sim! Posso examinar o arquivo do Mundo Quadrado em busca de dados que vocГЄ possa achar Гєteis. Que tipo de dados vocГЄ quer que eu recupere?"
  giga_dialog.3009.a:0 "GeralВЈfГ­sicaВЈВ§YPhysics ResearchВ§!"
  giga_dialog.3009.a.response:0 "Tudo bem! Vou recuperar os dados relacionados Г  sua pesquisa em fГ­sica, o que concederГЎ a vocГЄ um aumento deВ§Y10 %В§! na velocidade de sua pesquisa nessa categoria. \n \nSe vocГЄ quiser, impulsionar um campo diferente, basta entrar em contato comigo novamente e escolher uma opГ§ГЈo diferente. "
  giga_dialog.3009.b:0 "GeneralВЈengineeringВЈВ§YEngineering ResearchВ§!"
  giga_dialog.3009.b.response:0 "Tudo bem! Vou recuperar os dados relacionados Г  sua pesquisa de engenharia, o que concederГЎ a vocГЄ um aumento deВ§Y10 %В§! na velocidade de pesquisa nessa categoria. \n \nSe vocГЄ desejar, impulsionar um campo diferente, basta entrar em contato comigo novamente e escolher uma opГ§ГЈo diferente. "
  giga_dialog.3009.c:0 "GeralВЈsociedadeВЈВ§Sociedade PesquisaВ§!"
  giga_dialog.3009.c.response:0 "Tudo bem! Vou recuperar dados relacionados Г  pesquisa da sua sociedade, o que concederГЎ a vocГЄ um aumento deВ§Y10 %В§! para a velocidade de pesquisa nessa categoria. \n \nSe vocГЄ quiser, impulsionar um campo diferente, basta entrar em contato comigo novamente e escolher uma opГ§ГЈo diferente. "
  giga_dialog.3009.d:0 "Deixa pra lГЎ, nГЈo ajude nossa pesquisa."
  giga_dialog.3009.d.response:0 "Tudo bem, vou parar de ajudar na sua pesquisa, se Г© isso que vocГЄ quer ..."
  
