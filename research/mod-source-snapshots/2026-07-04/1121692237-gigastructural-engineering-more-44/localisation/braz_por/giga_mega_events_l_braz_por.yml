  giga_dialog.101.name:0 "$name_kugelblitz$Site construГ­do"
  giga_dialog.101.desc:0 "O canteiro de obras de$name_kugelblitz$no sistema [giga_system.GetName] estГЎ concluГ­do. Ele abriga o pessoal e o equipamento necessГЎrio para construir um dispositivo capaz de gerar um Kugelblitz artificial, que Г© um Black Buraco feito de radiaГ§ГЈo em vez de matГ©ria! Seremos capazes de injetar energia e matГ©ria no Kugelblitz, e depois extraГ­-la e convertГЄ-la em matГ©ria novamente se necessГЎrio, efetivamente tornando o Kugelblitz um silo muito eficiente! "
  giga_dialog.101.a:0 "Excelente."
  
  giga_dialog.102.name:0 "$name_kugelblitz$Built"
  giga_dialog.102.desc:0 "Nossos engenheiros terminaram de construir o grande dispositivo capaz de gerar um Kugelblitz artificial."
  giga_dialog.102.a:0 "Г“timo."
  
  giga_dialog.103.name:0 "Kugelblitz gerado!"
  giga_dialog.103.desc:0 "Nosso$name_kugelblitz$gerou com sucesso um Kugelblitz artificial! Atualmente estГЎ fornecendo energia graГ§as Г  radiaГ§ГЈo Hawking acelerada e agora pode armazenar matГ©ria e energia na forma de radiaГ§ГЈo para uso posterior!"
  giga_dialog.103.a:0 "Um grande feito."
  
  giga_dialog.106.name:99 "Kugelblitz Refined!"
  giga_dialog.106.desc:99 "Our $name_kugelblitz$ above [giga_planet.GetName] has successfully been upgraded! Already storehouses elsewhere in the [giga_system_owner.GetName] have begin emptying out their contents and shipping them to [giga_planet.GetName] to take advantage of the increased capacity of the artificial singularity."
  giga_dialog.106.a:99 "A great feat."
  
  giga_dialog.107.name:99 "The Grand Warehouse"
  giga_dialog.107.desc:99 "Our $name_kugelblitz$ near [giga_planet.GetName] has been fully upgraded to the latest advances in tetra-dimensional technology. The artificial singularity at the structure's core has already grown to nearly surpass the planetoid it is based around.\n\nWith such a construct we can now store quantities of raw materials and refined goods that would previously have been thought nigh impossible. Output projections declare that it could be several years before the kugelblitz is filled to its stable capacity."
  giga_dialog.107.a:99 "Truly incredible!"
  
  giga_dialog.104.name:0 "$name_kugelblitz$ Arruinado"
  giga_dialog.104.desc:0 "Nossa nave cientГ­fica entrando no sistema [from.GetName] foi saudada por algumas visГµes peculiares. Um$name_kugelblitz$foi avistado orbitando ao redor de um dos planetas! Esta construГ§ГЈo incrivelmente avanГ§ada poderia abrigar uma singularidade controlada, capaz de gerar grandes quantidades de energia. Infelizmente, parece ter caГ­do em um terrГ­vel estado de degradaГ§ГЈo. "
  giga_dialog.104.a:0 "Fascinante."
  
  giga_dialog.105.name:0 "$name_kugelblitz$Reparado!"
  giga_dialog.105.desc:0 "Um$name_kugelblitz$arruinado foi trazido de volta ao funcionamento por nossas equipes de engenheiros! ApГіs a reativaГ§ГЈo, o construto comeГ§ou a gerar uma maciГ§a singularidade controlada, da qual podemos extrair grandes quantidades de energia, como bem como armazenar matГ©ria na forma de radiaГ§ГЈo. "
  giga_dialog.105.a:0 "Como isso funciona?"
  
  ########################################################
  #################### PENROSE SPHERE ####################
  ########################################################
  giga_dialog.1207.title:0 "Objetivo do$name_penrose$"
  giga_dialog.1207.a.desc:99 "With the mirror frame now finished around [giga_system.GetName], we can finally start our preparations to use it as a bomb.\n\nWe'll have to let it accumulate energy for a few years, then it will gain the ability to be detonated. Everything in the system will be destroyed, and the explosion will be so powerful it propagates through hyperlanes. Every planet in neighboring systems will be rendered uninhabitable from the flow of energy, and every planet two jumps away will be irradiated. Most importantly, it will send a shockwave through subspace, disturbing and rearranging hyperlanes from up to 4 jumps away!"
  giga_dialog.1207.b.desc:99 "With the mirror frame now finished around [giga_system.GetName], we can finally start our preparations to stabilize the $name_penrose$ and use it for energy production.\n\nIts energy production capability remains somewhat mediocre for now, but by following the right research avenues, we should be able to bolster its output."
  
  giga_dialog.1207.a:0 "FaГ§a uma bomba."
  giga_dialog.1207.b:0 "Use para gerar energia."
  
  ###########################################################
  #################### FUSION SUPPRESSOR ####################
  ###########################################################
  giga_dialog.3401.name:0 "$name_fusion_suppressor$Canteiro de obras construГ­do"
  giga_dialog.3401.desc:0 "O canteiro de obras de um futuro$name_fusion_suppressor$foi construГ­do com sucesso no sistema [giga_system.GetName]. Ele abrigarГЎ a infraestrutura necessГЎria paracomeГ§ar a construir um$name_fusion_suppressor$, capaz de modificar os prГіprios processos dentro de uma estrela. "
  giga_dialog.3401.a:0 "Г“timo."
  
  giga_dialog.3402.name:0 "Moduladores de gravidade construГ­dos"
  giga_dialog.3402.desc:0 "Nossos engenheiros terminaram de construir a grande variedade de moduladores de gravidade do nosso$name_fusion_suppressor$em torno de [giga_system.GetName]. Esses dispositivos volumosos sГЈo capazes de gerar um campo gravitacional artificial para comprimir uma estrela inteira e alterar sua processos de fusГЈo interna. "
  giga_dialog.3402.a:0 "Maravilhoso."
  
  giga_dialog.3403.name:0 "Estabilizadores estelares construГ­dos"
  giga_dialog.3403.desc:0 "Os Estabilizadores Estelares de nosso$name_fusion_suppressor$ao redor de [giga_system.GetName] estГЈo completos. Eles sГЈo capazes de estabilizar a estrela enquanto os moduladores de gravidade geram o campo gravitacional artificial. Agora, podemos comeГ§ar o real processo de compressГЈo da estrela para, eventualmente, destruГ­-la ou transformГЎ-la em um buraco negro. "
  giga_dialog.3403.a:0 "IncrГ­vel."
  
  giga_dialog.3404.name:0 "CompressГЈo estelar - EstГЎgio I"
  giga_dialog.3404.desc:0 "Nosso$name_fusion_suppressor$comeГ§ou a comprimir com sucesso [giga_system.GetName]. Os processos de fusГЈo da estrela foram alterados e um poderoso campo gravitacional foi gerado, diminuindo o volume aparente da estrela. Os muitos efeitos que isso tem teve no plasma estelar estГЎ sendo estudado por vГЎrios laboratГіrios dentro do$name_fusion_suppressor$. "
  giga_dialog.3404.a:0 "Maravilhoso."
  
  giga_dialog.3405.name:0 "CompressГЈo estelar - EstГЎgio II"
  giga_dialog.3405.desc:0 "O$name_fusion_suppressor$mais uma vez comprimiu [giga_system.GetName] para um volume ainda menor. FenГґmenos interessantes surgiram dentro da estrela, produzindo grandes retornos cientГ­ficos, e a estrela estГЎ comeГ§ando a se comportar na fГ­sica- maneiras desafiadoras. Uma maior compressГЈo levarГЎ a mais resultados. "
  giga_dialog.3405.a:0 "Г“timo."
  
  giga_dialog.3406.name:0 "CompressГЈo estelar - Estrela de nГЄutrons"
  giga_dialog.3406.desc:0 "O$name_fusion_suppressor$agora comprimiu [giga_system.GetName] a tal ponto que prГіtons e elГ©trons dentro do nГєcleo da estrela se fundiram e se tornaram nГЄutrons, transformando o nГєcleo em uma estrela de nГЄutrons, cercada por uma camada de plasma estelar exГіtico. \n \nAgora podemos manter a estrela como estГЎ, gerando pesquisas de fГ­sica e engenharia. Como alternativa, podemos comprimir ainda mais a estrela, transformando-a em um buraco negro artificial, gerando pesquisas de fГ­sica. Finalmente, o$name_fusion_suppressor$pode liberar toda a compressГЈo gravitacional e exercer uma forГ§a repulsiva, fazendo com que as forГ§as repulsivas dentro do nГєcleo da estrela detonem a estrela em uma supernova, destruindo o$name_fusion_suppressor$e depositando um novo recurso estratГ©gico na superfГ­cie dos planetas deste sistema solar, que pode ser usado para criar edifГ­cios poderosos. "
  giga_dialog.3406.a:0 "Excelente."
  
  giga_dialog.3407.name:0 "$name_fusion_suppressor$Dismantled"
  giga_dialog.3407.desc:0 "O$name_fusion_suppressor$no sistema [giga_system.GetName] foi desmontado com sucesso. O buraco negro que ele criou agora pode ser usado."
  giga_dialog.3407.a:0 "Maravilhoso."
  
  giga_dialog.3409.title:99 "Supernova"
  giga_dialog.3409.desc:0 "O$name_fusion_suppressor$liberou todos os campos gravitacionais exercidos na estrela e comeГ§ou a aplicar um campo gravitacional negativo. \nEm segundos, as intensas forГ§as repulsivas dentro do nГєcleo de nГЄutrons da estrela superam o campo gravitacional natural, e as energias ferventes de uma estrela superdensa sГЈo repentinamente liberadas. \nA estrela comeГ§a a brilhar mais forte e parece pulsar por alguns segundos, antes que as camadas externas da estrela sejam repentinamente ejetadas em velocidades relativГ­sticas pelas forГ§as repulsivas. Em questГЈo de horas , todos os planetas do sistema sГЈo envidraГ§ados pela enorme onda de energia, privando-os de suas superfГ­cies e atmosferas. \n DepГіsitos de iodГ­zio se formaram nos planetas agora derretidos, prontos para serem colhidos e usados."
  giga_dialog.3409.a:0 "Maravilhoso!"
  
  giga_dialog.3410.title:0 "Buraco Negro"
  giga_dialog.3410.desc:0 "O$name_fusion_suppressor$intensificou seu campo gravitacional artificial ao mГЎximo. A estrela entrou em colapso a ponto de nem mesmo a luz escapar de sua atraГ§ГЈo gravitacional natural, transformando-a efetivamente em um buraco negro. LaboratГіrios de pesquisa dentro o$name_fusion_suppressor$comeГ§ou a estudar o buraco negro artificial, produzindo dados cientГ­ficos incrГ­veis. "
  giga_dialog.3410.a:0 "Maravilhoso!"
  
