  giga_dialog.2502.title:0 "ConstruГ§ГЈo de$name_alderson$concluГ­da!"
  giga_dialog.2502.desc:0 "O canteiro de obras do nosso$name_alderson$foi concluГ­do no sistema [giga_system.GetName]. Esta plataforma servirГЎ como palco para iniciar a construГ§ГЈo da estrutura colossal da estrutura, que se estenderГЎ por todo o caminho Г s bordas desse sistema. TambГ©m serГЎ possГ­vel construir Fatias de Alderson de ComputaГ§ГЈo PlanetГЎria e EcumenГіpolis se suas contrapartes planetГЎrias jГЎ estiverem desbloqueadas. "
  giga_dialog.2502.a:0 "Г“timo."
  
  giga_dialog.2503.title:0 "$name_alderson$Quadro concluГ­do!"
  giga_dialog.2503.desc:0 "Nosso quadro de abrangГЄncia do sistema do Disco de Alderson estГЎ concluГ­do! Este colossal esqueleto metГЎlico cobre todo o sistema e serГЎ usado como base para construir as prГіprias fatias. Cada fatia possuirГЎ 15 distritos, cada uma dos quais Г© 4 vezes mais poderoso que um distrito normal do mundo do anel. Depois de concluГ­da, esta estrutura poderosa certamente nos permitirГЎ nos tornar os maiores construtores desta galГЎxia. "
  giga_dialog.2503.a:0 "Mas como nГЈo desmorona sobre si mesmo?"
  giga_dialog.2503.a.tooltip:0 "A engenharia multidimensional Г© literalmente um prГ©-requisito para isso."
  
  giga_dialog.2504.title:0 "Fatia de Gaia Alderson concluГ­da!"
  giga_dialog.2504.desc:0 "Uma de nossas fatias de$name_alderson$foi finalmente concluГ­da! Este habitat colossal abrange vГЎrias unidades astronГґmicas e deve fornecer uma quantidade incalculГЎvel de espaГ§o para a nossa populaГ§ГЈo e indГєstrias. Apresenta uma ampla gama de ecossistemas e clima, e, portanto, Г© habitГЎvel por praticamente todas as espГ©cies na galГЎxia. Devemos comeГ§ar a colonizГЎ-lo de uma vez. "
  giga_dialog.2504.a:0 "Maravilhoso!"
  
  # giga_dialog.2505.title:0 "Alderson Computing Complex Complete!"
  # giga_dialog.2505.desc:0 "One of our $name_alderson$'s slices has finally been completed! This colossal habitat spans several astronomical units, and shall provide untold amounts of living space for our population and industries. This slice is completely covered by layers and layers of powerful computers and processors. It will be able to provide our researchers with nearly unlimited amounts of computing power, and instantaneous access to our empire's knowledge databanks. This mighty construct will surely help us pierce the mysteries of the universe with even greater ease than before."
  # giga_dialog.2505.a:0 "Marvelous! Can it run Crysis?"
