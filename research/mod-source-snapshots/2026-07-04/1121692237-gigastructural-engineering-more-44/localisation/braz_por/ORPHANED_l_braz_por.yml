  giga_dialog.2501.a.tooltip:0 "Uma fatia de Alderson habitável por todas as espécies. Apresenta distritos para gerar£energy£§YEnergia§ !,£comida£§YAlimentos§ !, e£minerais£§YMinerais§!"
  giga_dialog.2501.b.tooltip:0 "Um Alderson Slice dedicado à computação e à pesquisa. Apresenta distritos para gerar§YPesquisa§! e§YCapacidade administrativa§!"
  giga_dialog.2501.c.tooltip:0 "Um Alderson Slice dedicado à indústria e habitação. Apresenta distritos para gerar§YBens de consumo§ !,§YAlloys§! e§YAmenities§!"
  giga_dialog.2501.d.tooltip:0 "Um Alderson Slice dedicado à indústria e habitação. Apresenta distritos para gerar§YMinerals§! e§YAlloys§!"
  giga_dialog.2501.e:0 "Máquina Alderson"
  giga_dialog.2501.e.tooltip:0 "Um Alderson Slice dedicado à indústria e habitação. Apresenta distritos para gerar§YMinerals§! e§YAlloys§!"
  alderson_disk_2_specialize:0 "Escolha a especialização Alderson"
  alderson_disk_2_specialize_DESC:0 "Devemos decidir para que tipo de Alderson Slice desejamos atualizar este quadro."
  alderson_disk_2_construction_gaia_DESC:0 "Um quadro colossal que será usado para construir um Gaia Alderson Slice completo."
  alderson_disk_2_construction_pc_DESC:0 "Um quadro colossal que será usado para construir um Complexo de Computação Alderson completo."
  alderson_disk_2_construction_ecu_DESC:0 "Uma estrutura colossal que será usada para construir uma Ecumenópolis Alderson completa."
  alderson_disk_2_construction_hive:0 "Quadro Hive Alderson"
  alderson_disk_2_construction_hive_DESC:0 "Uma estrutura colossal que será usada para construir uma Colmeia Alderson completa."
  alderson_disk_2_construction_machine:0 "Máquina Alderson Frame"
  alderson_disk_2_construction_machine_DESC:0 "Um quadro colossal que será usado para construir uma Máquina Alderson completa."
  giga_dialog.3408.title:0 "$name_fusion_suppressor$Actions"
  giga_dialog.3408.desc:0 "É hora de escolher o destino final do sistema [giga_system.GetName]. \n \nPodemos comprimir a estrela em um buraco negro, gerando enormes quantidades de pesquisas físicas e congelando todos os planetas do sistema . \nAlternativamente, podemos ordenar que$name_fusion_suppressor$libere o campo gravitacional e exerça uma força repulsiva, fazendo com que a estrela comprimida detone em uma supernova devastadora, destruindo o$name_fusion_suppressor$. Qualquer planeta menor que 5, bem como asteróides, serão destruídos e os gigantes gasosos serão eliminados de sua atmosfera. Os planetas sobreviventes receberão depósitos de iodizium, que são cristais gerados pela supernova artificial que bate em planetas em velocidades relativísticas. Esses cristais podem ser usados ​​para construir edifícios poderosos em nossos planetas. \n \nO que fazemos? "
  giga_dialog.3408.a:0 "Detonar [giga_system.GetName]."
  giga_dialog.3408.b:0 "Recolher [giga_system.GetName] em um buraco negro."
  giga_dialog.1207.desc:0 "Com a moldura do espelho agora concluída em torno de [giga_system.GetName], agora temos que fazer uma escolha. Podemos utilizar o$name_penrose$como um meio de gerar energia ou usá-lo como uma bomba . \n \nSe o usarmos para gerar energia, sua produção será relativamente medíocre (150£energy£), mas pode ser possível estabilizá-lo assim que conseguirmos as tecnologias apropriadas. \n \nSe decidirmos usá-lo como uma bomba, teremos que deixá-la acumular energia por alguns anos, então ela ganhará a capacidade de ser detonada. Tudo no sistema será destruído, e a explosão será tão poderosa que se propaga através de hiper-rotas. Todos os planetas em os sistemas vizinhos se tornarão inabitáveis ​​com o fluxo de energia e todos os planetas a dois saltos de distância serão irradiados. Mais importante ainda, ela enviará uma onda de choque através do subespaço, perturbando e reorganizando as hiperfaixas de até 4 saltos de distância! "
  giga_dialog.1902.name:0 "$name_succ$Aparelho orbital concluído"
  giga_dialog.1902.desc:0 "Nosso Aparelho Orbital de$name_succ$foi concluído no sistema [giga_system.GetName]. Este anel maciço abriga as instalações necessárias para coletar Gases, Motores e Energia da atmosfera do planeta. Agora, nós deve começar a trabalhar nas próprias vigas do trator. "
  giga_dialog.1902.a:0 "Ótimo."
  succ_2_DESC:0 "Um$name_succ_full$completo e operacional, constantemente colhendo grandes quantidades de gases de um gigante de gás. Reatores de fusão estão usando hidrogênio coletado para gerar grandes quantidades de energia."
  giga_pd_diamond_planet:0 "Planeta Diamante"
  giga_pd_diamond_planet_desc:0 "Este maravilhoso mundo de diamantes oferece oportunidades incríveislaços para mineração. \n \n§YSaída Stripmine automática:§! \n§Y+50§!£minerais£e§Y+15§!£raro_crystals£\n \n§YSaída Megabore de Cristal:§! \ N§Y+50§!£minerais£e§Y+25§!£raro_crystals£"
  giga_pd_ethane_planet:0 "Oceano Ethane"
  giga_pd_ethane_planet_desc:0 "Este oceano de etano apresenta uma grande oportunidade para coletar todos os tipos de gases exóticos. \n \n§Y Saída automática de stripmine:§! \n§R-50§!£minerais£e§Y+15§!£exotico_gases£"
  giga_pd_chthonian_planet:0 "Planeta Chthonian"
  giga_pd_chthonian_planet_desc:0 "Este antigo núcleo de gigante gasoso é rico em elementos pesados ​​raros e materiais semelhantes a ligas. \n \n§Y Saída automática de stripmine:§! \n§Y+100§!£minerais£e§Y+75§!£alloys£"
  negative_mass_buffs_1:0 "Momentum de massa quase-negativa"
  negative_mass_buffs_2:0 "Aceleração de construção em massa quase negativa"
  negative_mass_buffs_3:0 "Aceleração de construção do Momentum de Massa Quasi-Negativa"
  building_giga_shroud_capacitor:0 "Capacitor de proteção"
  building_giga_shroud_capacitor_desc:0 "Uma enorme instalação psiônica extraindo à força o Sudário Energia e redistribuí-la na superfície do planeta, aumentando enormemente as habilidades telepáticas e as indústrias. "
  giga_tech_psychic_hypersiphon_1:0 "Estudos de energia da mortalha"
  giga_tech_psychic_hypersiphon_1_desc:0 "Estudar o que exatamente constitui o Sudário pode melhorar nossa capacidade de nos conectarmos com nossas habilidades psiônicas e refinar nossos sistemas de distribuição de energia usando o conhecimento aplicado do Sudário."
  giga_tech_psychic_hypersiphon_2:0 "Rede Deep Shroud"
  giga_tech_psychic_hypersiphon_2_desc:0 "Bem no fundo, o Sudário nos conecta a todos. Se ajustarmos nossas habilidades psiônicas à conexão natural do Sudário, podemos realizar grandes feitos de união."
  giga_tech_psychic_hypersiphon_3:0 "Rituais de invocação da mortalha"
  giga_tech_psychic_hypersiphon_3_desc:0 "Se combinarmos poderes psiônicos com tecnologia, torna-se possível materializar entidades do ene do Sudáriorgy, que pode então ser controlada e servir como exércitos. No entanto, essas entidades não são mais do que bolas furiosas de energia e, como tal, têm pouca saúde e alto ataque. "
  giga_tech_psychic_hypersiphon_4:0 "Capacitores de energia da cobertura"
  giga_tech_psychic_hypersiphon_4_desc:0 "A energia pode ser extraída à força do Sudário usando poderosas habilidades psiônicas. No entanto, essa energia é bastante volátil e dificilmente pode formar algo mais complexo do que uma bola de energias psiônicas. Se conseguirmos estabilizar a energia, poderemos armazenar e redistribuí-lo por um planeta inteiro com uma eficiência muito maior do que antes, impulsionando muito nossas indústrias. "
  giga_tech_psychic_hypersiphon_5:0 "Conexões diretas da mortalha"
  giga_tech_psychic_hypersiphon_5_desc:0 "O Sudário é um reino estranho. No entanto, ao combinar várias tecnologias e imenso poder telepático, pode ser possível ligar diretamente a nossa realidade à dimensão arcana do Sudário. Fazer isso pode ser muito lucrativo, mas pode acabar sendo perigoso se não tivermos cuidado. "
  giga_dialog.1403.name:0 "$name_psy_siphon$Spire Built"
  giga_dialog.1403.desc:0 "A espiral do portal de$name_psy_siphon$foi concluída. Este equipamento maciço, junto com os capacitores do portal, emitirá uma poderosa explosão de energia psiônica, poderosa o suficiente para rasgar o espaço-tempo e abrir um buraco para o Sudário! O portal obviamente não será estável o suficiente para permitir o acesso físico ao Sudário, mas muita energia começará a sair dele para ser coletada pela torre do portal. A única coisa que falta fazer agora é ligá-lo. . "
  giga_dialog.1403.a:0 "Excelente!"
  psychic_hypersiphon_3_DESC:0 "Um$name_psy_siphon$totalmente operacional e estabilizado. O portal que conecta nossa realidade com o Sudário foi totalmente ativado, e este link para o sudário libera a Essência do Sudário pura, o que aumenta muito nosso potencial psiônico."
  asteroid_manufactory_1:0 "Fábrica de Asteróides: Aparelhos de mineração"
  asteroid_manufactory_1_DESC:0 "A primeira parte de uma Manufatura de Asteróide, infra-estrutura de habitação empregada para colher minerais diretamente da superfície do asteróide, a fim de eventualmente convertê-los e refiná-los em Bens de Consumo para nossa população."
  giga_asteroid_industry.001.a:0 "Excelente."
  giga_asteroid_industry.002.name:0 "Aparelhos de mineração de manufatura de asteróides concluídos!"
  giga_asteroid_industry.002.desc:0 "Nossos aparelhos de mineração de fábricas de asteróides no sistema [From.GetName] foram concluídos. Este grande anel envolve completamente o asteróide e abriga uma série de unidades de perfuração e robôs de mineração de strip automatizados que irão continuamente asteróide para materiais. Devemos agora começar a trabalhar na parte de fabricação real da instalação. "
  giga_asteroid_industry.002.a:0 "Ótimo."
  giga_asteroid_industry.003.desc:0 "Um Asteroid Manufactory foi concluído no sistema [From.GetName]! Envolvido em torno de um asteróide, esta construção está agora constantemente colhendo recursos brutos do asteróide, antes de convertê-los e refiná-los em todos os tipos de produtos em fábricas especializadas. \n \nEstes produtos são então exportados para o resto de nosso império, onde serão distribuídos para nossa população a fim de satisfazer suas necessidades em constante mudança. Certamente será um grande benefício para nossa economia civil . "
  giga_asteroid_industry.003.a:0 "Delicioso!"
  job_virtual_admin_cap:0 "Burocrata Virtual"
  job_virtual_admin_cap_plural:0 "Burocratas Virtuais"
  job_virtual_admin_cap_desc:0 "Estar em um mundo virtual é muito benéfico para os traficantes de papel."
  mod_job_virtual_admin_cap_add:0 "Burocrata Virtual"
  job_virtual_admin_cap_hive:0 "Drone Sinapse Virtual"
  job_virtual_admin_cap_hive_plural:0 "Drones Sinapses Virtuais"
  job_virtual_admin_cap_hive_desc:0 "Estar em um mundo virtual é muito benéfico para os traficantes de papel."
  mod_job_virtual_admin_cap_hive_add:0 "Drone Sinapse Virtual"
  job_virtual_admin_cap_machine:0 "Coordenador Virtual"
  job_virtual_admin_cap_machine_plural:0 "Coordenadores Virtuais"
  job_virtual_admin_cap_machine_desc:0 "Estar em um mundo virtual é muito benéfico para os traficantes de papel."
  mod_job_virtual_admin_cap_machine_add:0 "Coordenador Virtual"
  giga_dialog.1001.name:0 "$name_orbital_artificial_eco$Construction"
  giga_dialog.1001.desc:0 "Nossos engenheiros e biólogos estão agora prontos para começar a montar um$name_orbital_artificial_eco$em órbita ao redor de um dos planetas de [giga_system.GetName], que abrigará tanto as espécies importadas de nossos planetas quanto as espécies totalmente artificiais. à adaptação de genes. "
  giga_dialog.1001.a:0 "Ótimo."
  giga_dialog.1002.name:0 "$name_orbital_artificial_eco$Built"
  giga_dialog.1002.desc:0 "Nosso$name_orbital_artificial_eco$está concluído. Ele foi preenchido com muitas flora e fauna estranhas e fascinantes para criar os ecossistemas mais exóticos que podemos imaginar. Certamente será muito útil em nossa pesquisa futura sobre a natureza da vida e dos ecossistemas. "
  giga_dialog.1002.a:0 "Excelente."
  giga_dialog.1004.name:0 "$name_orbital_artificial_eco$Reparado!"
  giga_dialog.1004.desc:0 "Um$name_orbital_artificial_eco$arruinado foi colocado de volta em funcionamento por nossos engenheiros e biólogos. \n \nPreenchido com muitas formas de vida estranhas, algumas das quais foram clonadas de vestígios de matéria biológica encontrados nos escombros , esta estação espacial recém-restaurada certamente ajudará bastante a pesquisa da nossa sociedade. "
  giga_dialog.1004.a:0 "Excelente."
  orbital_artificial_eco_1_dismantle:0 "Desmontar Megastrestrutura"
  orbital_artificial_eco_1_dismantle_DESC:0 "Esta megaestrutura será desconstruída e descartada para materiais."
  giga_dialog.4003.name:0 "$name_terraform_molten$Complete!"
  giga_dialog.4003.desc:0 "Nosso$name_terraform_molten$agora está completo. Com a adição de três grandes feixes de resfriamento em hiperescala e brocas a laser, seremos capazes de resfriar e estabilizar a atividade geológica deste mundo. Agora, devemos começar o processo real de terraformação. "
  giga_dialog.4003.a:0 "Faremos isso imediatamente."
  terraform_molten_2_DESC:0 "Um$name_terraform_molten$completo, equipado com um conjunto de grandes resfriadores orbitais e brocas a laser para resfriar e estabilizar a superfície do planeta. Tudo o que resta fazer agora é iniciar o processo real de terraformação."
  terraform_molten_3:0 "Iniciar Terraforming"
  terraform_molten_3_DESC:0 "Ordene a tripulação de$name_terraform_molten$para começar a transformar a superfície derretida e a composição tectônica deste planeta em algo que pode ser habitado pela maioria das formas de vida."
  giga_dialog.3803.name:0 "$name_terraform_barren$Gerador atmosférico construído"
  giga_dialog.3803.desc:0 "O Gerador Atmosférico de$name_terraform_barren$acaba de ser construído. Esta grande grade em torno de um mundo árido é capaz de gerar grandes quantidades de atmosfera e pode ajustar o clima deste planeta à vontade. \nTudo o que resta fazer agora é realmente começar o processo de terraformação. "
  giga_dialog.3803.a:0 "Ótimo."
  terraform_barren_2_DESC:0 "O$name_terraform_barren$agora está equipado com uma grande variedade de dispositivos de manipulação atmosférica, que podem semear uma atmosfera respirável e água em toda a superfície deste mundo. Tudo o que resta fazer agora é começar o processo."
  terraform_barren_3:0 "Iniciar Terraformação"
  terraform_barren_3_DESC:0 "Ordene a tripulação de$name_terraform_barren$para iniciar o processo em grande escala de reativar o campo magnético deste planeta e subsequentemente implementar uma atmosfera respirável e uma hidrosfera estável."
  giga_dialog.3903.name:0 "$name_terraform_toxic$Macromanipulators Built"
  giga_dialog.3903.desc:0 "Os macromanipuladores de$name_terraform_toxic$agora estão completos! Eles consistem em duas bombas massivas, capazes de extrair e injetar grandes quantidades de gases dentro e fora da atmosfera de um planeta. \n \nCom o$name_terraform_toxic$agora está completo, devemos agora começar o próprio processo de terraformação ... "
  giga_dialog.3903.a:0 "Fantástico."
  terraform_toxic_2:0 "$name_terraform_toxic$Macromanipuladores"
  terraform_toxic_2_DESC:0 "Este$name_terraform_toxic$foi equipado com duas bombas massivas, capazes de manipular a atmosfera de um planeta, tornando-a mais ou menos densa, e redistribuindo seus gases constituintes."
  terraform_toxic_3:0 "Iniciar Terraformação"
  terraform_toxic_3_DESC:0 "Ordene a tripulação do Manipulador Atmosférico para começar a transformar a atmosfera e a hidrosfera deste planeta em algo que pode ser habitado pela maioria das formas de vida."
  giga_dialog.3502.name:0 "$name_crystal_megabore$Main Hub concluído"
  giga_dialog.3502.desc:0 "Nossos engenheiros concluíram a construção de nosso hub principal de$name_crystal_megabore$no sistema [giga_system.GetName]. Orbitando em um mundo fundido, esta enorme estação espacial abriga forjas e refinarias especializadas em purificação rocha derretida em cristais raros, o que é indispensável se quisermos colher com eficiência o mundo abaixo. "
  giga_dialog.3502.a:0 "Ótimo."
  giga_dialog.3503.name:0 "$name_crystal_megabore$Gravitogenerator concluído"
  giga_dialog.3503.desc:0 "Nosso gravitogerador de$name_crystal_megabore$agora está completo! Esta grande estrutura circunda totalmente o hub do Megabore e fornecerá energia para ele. Também servirá como um catalisador para a broca principal do Megabore, e drasticamente amplificar a força de seu feixe trator gravitacional. "
  giga_dialog.3503.a:0 "Maravilhoso."
  crystal_megabore_2:0 "$name_crystal_megabore$Gravitogenerator"
  crystal_megabore_2_DESC:0 "O Gravitogerador desempenha um papel crucial na mineração do planeta abaixo, pois fornece energia e atua como um catalisador para a broca principal do Bore."
  crystal_megabore_3_DESC:0 "Um$name_crystal_megabore$totalmente operacional, extraindo grandes quantidades de cristais e minerais diretamente do núcleo derretido de um planeta."
  giga_dialog.401.name:0 "$name_eng_test_site$Construção"
  giga_dialog.401.desc:0 "O canteiro de obras de um grande$name_eng_test_site$foi finalizado no sistema [giga_system.GetName]. Quando concluído, esta maravilhosa estação provará ser um ótimo local para testar muitos projetos de engenharia orbital estações para novos projetos de espaçonaves. O planeta em que orbita se tornará um campo de testes para engenharia inovadora. "
  giga_dialog.401.a:0 "Bom trabalho."
  giga_dialog.402.name:0 "$name_eng_test_site$Built"
  giga_dialog.402.desc:0 "O$name_eng_test_site$Construído localizado no sistema [giga_system.GetName] agora está operacional. Ele servirá como um campo de testes para os projetos mais complexos e potencialmente mortais dos nossos engenheiros para coisas como naves espaciais e edifícios . Os experimentos já estão começando acima do planeta e podemos esperar que muitos mais ocorram no futuro próximo, impulsionando muito nossa pesquisa de engenharia. "
  giga_dialog.402.a:0 "Maravilhoso."
  giga_dialog.404.name:0 "$name_eng_test_site$Reparado!"
  giga_dialog.404.desc:0 "Um$name_eng_test_site$anteriormente arruinado foi totalmente reparado por nossas equipes de construção. \n \nAgora está totalmente operacional e podemos começar a utilizá-lo para fins científicos."
  giga_dialog.404.a:0 "Maravilhoso."
