  quasi_stellar_marker_planet_DESC:0 "Um marcador de alvo virtual que designa o infeliz alvo do QS-O."
  quasi_stellar_marker_planet_MEGASTRUCTURE_DETAILS:0 "Posicione sobre um planeta para mirar nele com o QS-O."
  quasi_stellar_marker_planet_open:0 "QS-O Buraco de minhoca"
  quasi_stellar_marker_planet_open_DESC:0 "Um$name_quasistellar$está prestes a disparar por este buraco de minhoca."
  giga_qso.500.desc:0 "Aqui, você pode configurar alguns aspectos do próprio QS-O. \n \nA alteração da taxa de carga modificará a saída de£giga_sr_quasaric_energy£da hiperema. Uma taxa de carga mais baixa gerará menos, mas dará algum£energy£em troca, convertida de£giga_sr_quasaric_energy£. Uma taxa de carregamento mais alta irá gerar mais, mas custará cerca de£energy£em troca, pois é necessário sobrecarregar a estrutura. \ N \nVocê também pode optar por despejar alguns recursos (£minerais££alimentos£bens de consumo££alloys££estouram£) no quasar. Os recursos irão colidir com o disco de acreção brilhante e gerar uma cascata de partículas altamente energéticas que podem então ser usadas para fornecer mais£giga_sr_quasaric_energy£para a hyperweapon. "
  giga_qso.501.name:0 "$name_quasistellar$: Despejo de recursos"
  giga_qso.501.desc:0 "Você pode despejar vários recursos no quasar supermassivo para alimentar o disco de acreção brilhante e gerar energia para ser convertida em£giga_sr_quasaric_energy£\n \nPor favor, escolha o que deseja despejar no quasar."
  giga_qso.1.panel:0 "Voltar ao Painel de Controle"
  giga_qso.500.dump:0 "Despejar recursos ..."
