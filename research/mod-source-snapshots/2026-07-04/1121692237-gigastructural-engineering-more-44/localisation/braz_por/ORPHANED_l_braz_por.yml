  aeternum_buff_2_desc:0 "Eles têm o poder do anime ao seu lado!"
  job_purge_psionic_sublimation:0 "Sublimação"
  job_purge_psionic_sublimation_plural:0 "Sublimando"
  job_purge_psionic_sublimation_desc:0 "Este pop está sendo sublimado. \n Irá produzir 2§Sublimado MPsionic§! (10 se psiônico) depois de ser completamente sublimado."
  giga_tech_planetary_matter_harvesting:0 "Desmontagem telúrica hipereficiente"
  giga_tech_planetary_matter_harvesting_desc:0 "Para montar nossos próprios navios de guerra celestiais, precisaremos de enormes quantidades de matéria planetária bruta. Usando feixes trator gravíticos orbitais baratos e de construção rápida, podemos literalmente desmontar um planeta inteiro em poucos meses. Como não há precisa refinar o assunto, o processo é extremamente rápido e o planeta pode simplesmente ser quebradoem asteróides que são enviados para onde quer que possamos precisar deles. "
  alderson_disk_2_ecu_DESC:0 "Uma fatia gigantesca de$name_alderson$, estendendo-se até as bordas deste sistema solar. Funciona como uma cidade colossal e pode abrigar uma enorme quantidade de indústrias e pessoas."
  alderson_disk_2_hive_DESC:0 "Uma fatia gigantesca de$name_alderson$, estendendo-se até as bordas deste sistema solar. Funciona como uma cidade colossal e pode abrigar enormes quantidades de indústrias e drones."
  alderson_disk_2_machine:0 "Máquina Alderson"
  alderson_disk_2_machine_DESC:0 "Uma fatia gigantesca de$name_alderson$, estendendo-se até as bordas deste sistema solar. Funciona como uma cidade colossal e pode abrigar enormes quantidades de indústrias e população."
  alderson_disk_2_pc_DESC:0 "Uma fatia gigantesca de$name_alderson$, estendendo-se até a bordaes deste sistema solar. Capaz de uma quantidade incalculável de poder de processamento. "
  district_rw_quberine:0 "Extrator Quberine"
  district_rw_quberine_plural:0 "Extratores Quberine"
  district_rw_quberine_desc:0 "Colheitadeiras automatizadas que recuperam Quberine autorregenerável da estrutura do Mundo Quadrado e o dividem em ligas e minerais utilizáveis."
  allow_orb_bastion:0 "§HDesbloqueia a megaestrutura:§!$name_orb_bastion$"
