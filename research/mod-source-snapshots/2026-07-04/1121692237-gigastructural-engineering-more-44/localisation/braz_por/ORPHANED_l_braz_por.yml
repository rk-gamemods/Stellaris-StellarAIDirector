  district_giga_alderson_city:0 "Hipersegmento de Habitação"
  district_giga_alderson_city_plural:0 "Hiperegmentos de habitação"
  district_giga_alderson_city_desc:0 "Extensões surpreendentemente grandes de habitações urbanas construídas aqui, estendendo-se por milhares e milhares de quilômetros em todas as direções."
  district_giga_alderson_nexus:0 "Nexus Hipersegmento"
  district_giga_alderson_nexus_desc:0 "Distritos enormes e eficientes preenchem esta seção e fornecem locais para os drones serem atendidos e reparados antes de serem implantados em suas atribuições de trabalho."
  district_giga_alderson_hive:0 "Hipersegmento Colmeia"
  district_giga_alderson_hive_plural:0 "Hipersegmentos Colmeia""
  district_giga_alderson_hive_desc:0 "Agulhas imponentes se estendem por esta seção para drones se reunirem quando não estiverem trabalhando para rejuvenescer e consumir nutrientes."
  district_giga_alderson_generator:0 "Hipersegmento do gerador solar"
  district_giga_alderson_generator_plural:0 "Hipersegmentos do gerador solar"
  district_giga_alderson_generator_desc:0 "Complexos gigantescos de painéis solares construídos aqui, gerando quantidades incontáveis ​​de energia do sol, complementadas por reatores de fusão subterrâneos."
  district_giga_alderson_farming:0 "Hipersegmento Megaplex de Agricultura"
  district_giga_alderson_farming_plural:0 "Hipersegmentos Megaplex de Agricultura"
  district_giga_alderson_farming_desc:0 "Milhões e milhões de acres de terras férteis, projetadas para alimentar uma população verdadeiramente gigantesca que vive aqui."
  district_giga_alderson_mining:0 "Hipersegmento do gerador de matéria"
  district_giga_alderson_mining_plural:0 "Hipersegmentos do gerador de matéria"
  district_giga_alderson_mining_desc:0 "Instalações colossais que extraem imensas quantidades de energia das redes elétricas para sintetizar artificialmente minerais e elementos pesados."
  district_giga_alderson_commercial:0 "Hipersegmento comercial"
  district_giga_alderson_commercial_plural:0 "Hipersegmentos Comerciais"
  district_giga_alderson_commercial_desc:0 "Indústria civil e infraestrutura povoam este hipersegmento dedicado ao comércio."
  district_giga_alderson_science:0 "Hipersegmento de Pesquisa"
  district_giga_alderson_science_plural:0 "Pesquisar Hypersegments"
  district_giga_alderson_science_desc:0 "Instalações de pesquisa de todos os tipos preenchem este hipersegmento."
  district_giga_alderson_admin:0 "Hipersegmento Administrativo"
  district_giga_alderson_admin_plural:0 "Hipersegmentos administrativos"
  district_giga_alderson_admin_desc:0 "Dedicado a melhorar a capacidade de nosso império de administrar colônias."
  district_giga_alderson_consumer:0 "Hipersegmento industrial"
  district_giga_alderson_consumer_plural:0 "Hipersegmentos Industriais"
  district_giga_alderson_consumer_desc:0 "Oficinas cheias de artesãos e indústrias civis alinham-se nas ruas empilhadas deste hipersegmento."
  district_giga_alderson_alloys:0 "Hipersegmento de Fundição "
  district_giga_alderson_alloys_plural:0 "Hipersegmentos de fundição"
  district_giga_alderson_alloys_desc:0 "Voltado para indústrias militares, este hipersegmento ecumenopolístico é preenchido com o rugido das fundições e o clangor das metalurgias."
  district_giga_alderson_leisure:0 "Hipersegmento de lazer"
  district_giga_alderson_leisure_plural:0 "Hipersegmentos de lazer"
  district_giga_alderson_leisure_desc:0 "Onde os habitantes do hipersegmento relaxam em suas horas de lazer."
  district_giga_alderson_pop_growth:0 "Hipersegmento de Reprodução"
  district_giga_alderson_pop_growth_plural:0 "Hipersegmentos de Reprodução"
  district_giga_alderson_pop_growth_desc:0 "Cuidadas pelo cuidado científico e gentil de especialistas, essas piscinas estimulam nossa prole a um crescimento mais rápido."
  district_giga_alderson_pop_assembly:0 "Hipersegmento de Montagem"
  district_giga_alderson_pop_assembly_plural:0 "Hipersegmentos de montagem"
  district_giga_alderson_pop_assembly_desc:0 "Grandes fábricas, dedicadas à assembléia de nossa população."
  ap_slice_of_life:0 "As Fatias de Vida em Anel"
  ap_slice_of_life_desc:0 "Mundo Anels, antes vistos como o pináculo da megaengenharia, agora são pouco mais do que habitats glorificados. Portanto, devemos avançar para a próxima etapa da megaengenharia projetando um novo tipo de habitat que supera até mesmo o maior dos ringworlds. O$name_alderson$, um disco gigantesco do tamanho de um sistema solar construído em torno de uma estrela, nos permitiria abrigar uma quantidade inimaginável de pessoas e indústrias. "
  add_research_options_alderson:0 "Opções de pesquisa obtidas: \n£engenharia£§YO$name_alderson$§!"
  ap_systemcraft:0 "Armamento Celestial Esotérico"
  ap_systemcraft_desc:0 "Já somos capazes de transformar planetas inteiros em naves de guerra, mas alguns de nossos cientistas mais ambiciosos acreditam que pode ser possível, de alguma forma, ir ainda maior. Todo um sistema solar, reunido para formar um navio de guerra incrivelmente grande proporções. Esta grande construção tornaria ainda mais pequeno o poderoso$name_war_planet$e, por último, poderíamos finalmente ter dakka suficiente. "
  add_research_options_systemcraft_base:0 "Opções de pesquisa obtidas: \n£física£§YFramework: Stellarscale Propulsion§! \nNós começaremos a trabalhar em uma série de tecnologias para construir o maior e mais grandioso navio que esta galáxia, ou talvez até mesmo o universo, já viu . "
  pc_alderson_slice_ecu:0 "Ecumenopolis Alderson "
  pc_alderson_slice_ecu_desc:0 "Uma cidade verdadeiramente titânica que se estende por todo o sistema solar. Completamente envolvida na expansão urboindustrial, esta fatia Alderson pode transportar uma quantidade incontável de indústrias e pessoas em sua superfície."
  pc_alderson_slice_hive_desc:0 "Esta fatia inteira é um organismo vivo gigante, psionicamente conectado com a Mente da Colmeia que a formou. Quaisquer seres que não façam parte da Colmeia que pisarem aqui serão atacados pelo próprio terreno."
  pc_alderson_slice_machine:0 "Máquina Alderson"
  pc_alderson_slice_machine_desc:0 "Coberto com estruturas artificiais. A fina atmosfera consiste principalmente de poluentes industriais e não é capaz de sustentar vida biológica."
  pc_alderson_slice_pc_desc:0 "Um complexo de computação verdadeiramente gigantesco semelhante aos planetários, mas estendido por uma fatia Alderson inteira. É capaz de um poder de processamento incalculável e fornece buffs incríveis para pesquisar. Ainda não consigo executar o Crysis."
  district_giga_alderson_industrial:0 "Hipersegmento Industrial"
  district_giga_alderson_industrial_plural:0 "Hipersegmentos Industriais"
  district_giga_alderson_industrial_desc:0 "Arranjos extensos de fábricas barulhentas e maquinarias poderosas se estendem por este hipersegmento, fornecendo à nossa civilização uma imensa capacidade industrial."
  giga_dialog.2501.desc:0 "Chegou a hora de decidir para que tipo de Alderson Slice queremos atualizar este segmento em particular. O tipo pode ser alterado posteriormente quando o segmento for concluído, através de terraformação."
  giga_dialog.2505.title:0 "Complexo de computação Alderson concluído!"
  giga_dialog.2505.desc:0 "Uma de nossas fatias de$name_alderson$foi finalmente concluída! Este habitat colossal abrange várias unidades astronômicas e fornecerá uma quantidade incalculável de espaço vital para nossa população e indústrias. Esta fatia é completamente coberta por camadas e camadas de computadores e processadores poderosos. Ele será capaz de fornecer aos nossos pesquisadores uma quantidade quase ilimitada de poder de computação e acesso instantâneo aos bancos de dados de conhecimento do nosso império. Esta poderosa construção certamente nos ajudará a desvendar os mistérios do universo com ainda maior facilidade do que antes. "
  giga_dialog.2505.a:0 "Maravilhoso! Ele pode executar o Crysis?"
  giga_dialog.2505.a.tooltip:0 "Não."
  giga_dialog.2506.desc:0 "Uma de nossas fatias de$name_alderson$foi finalmente completada! Este habitat colossal abrange várias unidades astronômicas e fornecerá uma quantidade incalculável de espaço vital para nossa população eindústrias. Esta fatia é inteiramente coberta pela expansão urboindustrial, oferecendo quantidades gigantescas de capacidade industrial e habitação para nossos cidadãos. "
  giga_dialog.2506.a:0 "Maravilhoso!"
  giga_dialog.25061.title:0 "Colmeia Alderson concluída!"
  giga_dialog.25061.desc:0 "Uma de nossas fatias de$name_alderson$foi finalmente concluída! Este habitat colossal abrange várias unidades astronômicas e fornecerá uma quantidade incalculável de espaço para nossa população e indústrias. Esta fatia inteira é um gigante organismo vivo, psionicamente conectado com a Mente Colméia que o formou. Quaisquer seres que não façam parte da Colméia que pisarem aqui serão atacados pelo próprio terreno. "
  giga_dialog.25061.a:0 "Maravilhoso!"
  giga_dialog.25062.title:0 "Máquina Alderson concluída!"
  giga_dialog.25062.desc:0 "Uma de nossas fatias de$name_alderson$foi finalmente concluída! Este habitat colossal abrange várias unidades astronômicas e fornecerá uma quantidade incalculável de espaço para nossa população e indústrias. Esta fatia é inteiramente coberta com estruturas artificiais. A fina atmosfera consiste principalmente de poluentes industriais e não é capaz de sustentar vida biológica. "
  giga_dialog.25062.a:0 "Maravilhoso!"
  giga_dialog.2507.title:0 "$name_alderson$Completo!"
  giga_dialog.2507.desc:0 "Está feito! No Sistema [giga_system.GetName], conseguimos montar totalmente um disco colossal que se estende desde a estrela até a borda do sistema. Esta gigantesca estrutura gigantesca supera tudo já construímos antes e é um testemunho de nosso domínio final sobre as leis da física e da engenharia. "
  giga_dialog.2507.a:0 "Quem poderia se opor a nós agora?"
  giga_mega.403.desc:0 "Notícias fantásticas! Depois de muita pesquisa e mapeamento intensivos, nossos cientistas anunciaram que os pontos de violação do hiperespaço que levam ao cluster central foram descobertos! Nossas equipes de pesquisa usaram um feixe de taqui de longo alcance para abrir remotamente essa violação pontos, criando assim novas hiperlanas. Isso significa que o núcleo agora está acessível (para nós, e todos os outros também), e nossos pesquisadores aconselham o envio de um navio para explorá-lo. "
  ehof_timetoresearch:0 "Diga aos cientistas para olharem em$tech_negative_pressure$!"
  allow_systemcraft_p6:0 "$allow_war_system$Hyperdimensional Hull Stabilization"
  desc_systemcraft_p6:0 "Desbloqueia outra etapa do Systemcraft."
  giga_menu_presets_random:0 "Aleatório"
  giga_menu_presets_01:0 "Os 5 originais"
  giga_menu_presets_02:0 "Fiel ao nome do mod"
  giga_menu_presets_03:0 "Quanto menor, melhor!"
  giga_menu_presets_04:0 "Glória aos anéis"
  giga_menu_presets_05:0 "Megastruturas perigosas"
  origin_orbital_arcology:0 "Arcologia Orbital"
  origin_orbital_arcology_desc:0 "Ao longo da evolução desta espécie, houve um grande anel flutuando no céu. Assim que realizaram a viagem espacial sob a luz do Sol, eles descobriram que este anel estava totalmente coberto por terras habitáveis ​​e aráveis."
  origin_orbital_arcology_effects:0 "Comece com uma Arcologia Orbital ao redor do planeta inicial."
  giga_massive_planet:0 "Lua de Ataque"
  giga_massive_planet_plural:0 "Luas de Ataque"
  giga_war_moon_fe:0 "Lua de Ataque Antiga"
  giga_planet_behemoth_fe:0 "Antigo$name_war_planet$"
  giga_planet_behemoth_fe_plural:0 "Antigo$name_war_planet$s"
  SYSTEMCRAFT_FARMS:0 "Fazenda Continental"
  SYSTEMCRAFT_FARMS_DESC:0 "§GProdução: \n30 Alimentos§! \ NUma fazenda do tamanho de um continente enorme construída em um planeta Systemcraft."
  SYSTEMCRAFT_SHIPYARD:0 "Instalação de estaleiro auxiliar"
  SYSTEMCRAFT_SHIPYARD_DESC:0 "§YManutenção: \n15 Ligas§! \ NUma instalação de estaleiro adicional para a Systemcraft produzir navios."
  INVESTIGATE_GALACTIC_CORE:0 "Localizar Hiperlanos do Núcleo Galáctico"
  INVESTIGATE_GALACTIC_CORE_DESC:0 "O núcleo galáctico está escondido de nós, mas podemos localizar rotas tênues no hiperespaço que levam a ele. O acesso ao núcleo representará um avanço estratégico e científico, já que os sistemas centrais provavelmente são ricos em recursos. \nEste projeto pode ser realizado a qualquer momento, quando estiver pronto. "
  INVESTIGATE_GALACTIC_CORE_LINK:0 "Localizar Hiperlanos de Conexão do Núcleo Galáctico"
  INVESTIGATE_GALACTIC_CORE_LINK_DESC:0 "Nossas projeções mostram que deve haver hiperlanas entre o núcleo e o resto da galáxia. Com esforço de pesquisa suficiente, devemos ser capazes de localizá-las e ativá-las"
  feeble_ai_mega_buff:0 "IA fraca"
  feeble_ai_mega_buff_desc:0 "Um pequeno empurrão na direção certa"
  virtual_world:0 "Mundo Virtual"
  virtual_world_desc:0 "Este mundo é inteiramente simulado pelos incríveis processadores de$name_matrioshka_brain$. Como tal, é impossível produzir minerais aqui, e manter a população em pods de estase é muito caro."
  giga_tech_war_system_hull_booster:0 "Estabilização do casco hiperdimensional"
  giga_tech_war_system_hull_booster_desc:0 "O$name_war_system$é um navio poderoso e, como tal, adicionar estruturas dedicadas ancoradas em dimensões superiores pode garantir que seu casco colossal não desmorone sob sua própria gravidade."
  giga_tech_particle_accelerator_desc:0 "Acelerar partículas umas contra as outras é uma maneira eficiente de aprender como elas interagem. A habilidade de construir grandes aceleradores, capazes de envolver uma estrela, certamente será útil."
  giga_dialog.1801.name:0 "$name_particle_accel$Construction"
  giga_dialog.1801.desc:0 "O canteiro de obras localizado próximo a [giga_system.GetName] está concluído. Agora podemos começar a trabalhar no acelerador de partículas real, que envolverá a estrela, tornando possível acelerar as partículas a velocidades tremendas. "
  giga_dialog.1801.a:0 "Maravilhoso."
  giga_dialog.1802.name:0 "$name_particle_accel$Built"
  giga_dialog.1802.desc:0 "Depois de meses e meses de trabalho, o acelerador de partículas em torno de [giga_system.GetName] está pronto e operacional. Possui a capacidade de acelerar partículas a velocidades jamais imaginadas, o que nos permitirá para aprender um pouco sobre as partículas e como elas interagem entre si. "
  giga_dialog.1802.a:0 "Excelente trabalho."
  giga_dialog.1803.name:0 "$name_particle_accel$ Arruinado"
  giga_dialog.1803.desc:0 "Nossa nave científica fez uma descoberta incrível! No meio do sistema [from.GetName] está um enorme$name_particle_accel$, que teoricamente poderia acelerar partículas incrivelmente perto da velocidade da luz. \n \nInfelizmente, ele parece ter sofrido danos incríveis e atualmente está em um estado de extrema degradação. No entanto, nossos cientistas estão confiantes de que ele poderá ser restaurado ao funcionamento, com as tecnologias certas. "
  giga_dialog.1803.a:0 "Maravilhoso."
  giga_dialog.1804.name:0 "$name_particle_accel$Reparado!"
  giga_dialog.1804.desc:0 "Ótimas notícias! Nossos engenheiros conseguiram restaurar o estado de funcionamento do$name_particle_accel$arruinado! Agora está operacional e produzindo um fluxo constante de pesquisas em física, bem como muitas partículas exóticas."
  giga_dialog.1804.a:0 "Incrível."
  particle_accelerator_0:0 "$name_particle_accel$Site"
  particle_accelerator_0_DESC:0 "Um grande canteiro de obras que abriga o pessoal e os materiais necessários para construir um acelerador de partículas em torno de uma estrela."
  particle_accelerator_0_MEGASTRUCTURE_DETAILS:0 "Um grande acelerador de partículas construído à sua voltaencontrar uma estrela para acelerar as partículas próximas à velocidade da luz. "
  particle_accelerator_1_DESC:0 "Um acelerador de partículas extremamente grande construído em torno de uma estrela. Ele é capaz de acelerar vários tipos de partículas a velocidades quase iguais à velocidade da luz, o que nos permite expandir muito nossa compreensão do que são feitas e como elas interagir."
  particle_accelerator_ruined:0 "$name_particle_accel$ Arruinado"
  particle_accelerator_ruined_DESC:0 "Um$name_particle_accel$arruinado, construído dezenas de milhares de anos atrás por uma civilização desconhecida. Ele sofreu danos incríveis, mas o quadro principal ainda está um pouco intacto. Com as tecnologias certas, ele poderia ser restaurado para funcionar pedido."
  particle_accelerator_restored_DESC:0 "Um acelerador de partículas extremamente grande construído em torno de uma estrela. Ele é capaz de acelerar vários tipos de partículas a velocidades quase iguais à velocidade da luz, o que nos permite expandir muito nossa compreensão do que são feitas e como elas interagir."
  giga_fallen_empire.101.name:0 "Movimento do corpo celestial detectado!"
  giga_fallen_empire.101.desc:0 "Notícias alarmantes! Logo após o despertar de um dos Impérios Caídos, sensores de longo alcance detectaram que vários planetas dentro de seu território deixaram suas órbitas. Enormes armas ocultas e propulsores emergiram de suas crostas, e eles agora se transformaram em terríveis planetóides transformados em armas. Parece que essas civilizações antigas tinham mais armamentos ocultos do que se pensava ... "
  giga_fallen_empire.101.a:0 "Estações de batalha!"
  giga_fallen_empire.102.name:0 "O Santo Behemoth"
  giga_fallen_empire.102.desc:0 "Não é nenhum segredo que os Impérios Despertos possuem muitos tipos de armas antigas que permaneceram adormecidas por milênios. Mas ninguém poderia prever que um dos Mundos Sagrados dos Sagrados Guardiões não era realmente um mundo normal, mas sim, uma nave gigante e inativa do tamanho de um planeta. E com seu recente despertar, esta espaçonave colossal foi reativada e o outrora imaculado Mundo de Gaia se transformou em um planeta colossal armado, capaz de obliterar qualquer coisa que esteja em seu caminho. Parece eles estão mais preparados para defender sua fé do que prevíamos ... "
  giga_fallen_empire.102.a:0 "Isso é ruim."
  giga_flusion.001.desc:0 "Nossa nave científica pesquisando o mundo primitivo de Flusion fez uma descoberta surpreendente, pois parece que este mundo primitivo é habitado não por uma, mas por várias espécies sapientes! \n \nA tripulação foi capaz de identificar 5 espécies principais: o felino Katzens, o anfíbio Zuspris, o humanóide Roqualians e o crustáceo Kronks; com uma quinta espécie "Flusioniana" composta por dezenas de outras subespécies difíceis de classificar. \ N \nNossos cientistas ainda não têm certeza como ou por que tantas espécies acabaram em um único mundo, mas esta é certamente uma descoberta notável. "
  giga_flusion.002.desc:0 "Nossas descobertas de Katzens e Zuspris em planetas diferentes parecem indicar que o mundo para o qual as duas espécies escaparam após a destruição de Katzenland não é outro senão o planeta primitivo de Flusion! \n \nEmbora, na época de após a descoberta em Flusion, ambas as espécies pareciam ter regredido drasticamente tecnologicamente. Isso implica que a§ Expedição Simópica 1§! muito provavelmente atingiu o planeta, forçando os poucos indivíduos restantes a reconstruir praticamente toda a sua base tecnológica. \n \nMesmo que não seja Apesar de ser uma descoberta particularmente importante, essas descobertas são de grande interesse para nossos bioarqueólogos planetários.Também mostra que, mesmo quando as coisas estão parecendo particularmente terríveis para uma civilização, não se deve deixar de lado a possibilidade de sua sobrevivência milagrosa contra todas as probabilidades. \n \nO que pode ser edificante e assustador de se pensar ... "
  katzenartig_balance_desc:0 "Para fabricar fastidiosamente o fervor de luta desses felinos da moda."
  giga_katzen.022.desc:0 "Após uma longa guerra com os Katzens, finalmente conseguimos assinar um tratado de paz com eles, encerrando mais de uma década de conflito. \n \nAs hostilidades entre nós e o Império cessaram, e o atual as fronteiras foram oficializadas. O Kaiser também pode estar mais aberto às negociações agora que a guerra acabou. "
  katzenartig_splinter_desc:0 "Para evitar o colapso catastrófico."
  giga_katzen.02021.desc:0 "O sistema Gatzo! É onde fica nossa antiga pátria de§YKatzenland§ !, onde nossa espécie escapou por pouco da extinção a bordo de um navio-colônia depois que os insanos§YMeopa§! destruíram sua superfície com um fogo nuclear. \n \nO Kaiser estaria disposto a dar à sua espécie§Y15000§!£energy£em troca deste sistema extremamente valioso, que consideraríamos sagrado se fôssemos uma espécie espiritualista. \n \nEntão, o que me diz? "
  katzenartig_major_splinter:0 "Principais recursos do estado da fragmentação"
  katzenartig_major_splinter_desc:0 "Para prevenir o colapso catastrófico."
  aet_intel_1_desc:0 "Nosso conhecimento da tecnologia Aeternite aumenta nossas capacidades de combate contra eles."
  giga_dismantle_accelerator_tooltip:0 "$giga_dismantle_mega$\n \nDesmontar este§YAcelerador de Partículas Estelares§! nos dará§Y3500§!£alloys£de volta."
  giga_accelerator_ui_guide:0 "O§YAcelerador de Partículas Estelares§! é uma maravilha tecnológica, que pode acelerar uma enxurrada de partículas a velocidades relativísticas e causar colisões de partículas incríveis de magnitude sem precedentes graças ao seu imenso comprimento. \n \nCom as tecnologias certas, essas colisões pode produzir não apenas§Grandes resultados científicos§ !, mas também um filete de outros§Yexotic resources§ !, formados durante as reações que desafiam a física que ocorrem dentro da estrutura. \n \nNós também podemos§Aumentar§! a§Yintensity§ ! das colisões, o que, por sua vez, aumentará os§Youtput§! e§Yupkeep§! da megaestrutura! a um risco aumentado de§Rfalhas§! ocorrendo dentro da estrutura, e pode exigir intervenção imediata para evitar§Rdestruição catastrófica§ !. "
  giga_med_failure_risk:0 "Há§Y20%§! chance de uma§Rfalha catastrófica§! ocorrer nos próximos meses."
  giga_accelerator.2000.name:0 "Desmontando um§YAcelerador de Partículas Estelares§!"
  giga_accelerator.2000.desc:0 "Tem certeza que yVocê deseja desmontar este§YAcelerador de Partículas Estelares§!? \n \nVamos obter§Y3500§!£alloys£de volta. "
  giga_flavor.2000.yes:0 "Sim, prossiga com a desmontagem."
  giga_accelerator.2000.tooltip:0 "Este§YAcelerador de Partículas Estelares§! será§Rdesmontado§ !."
  particle_accelerator_1_manage:0 "Gerenciar megaestrutura ..."
  particle_accelerator_1_manage_DESC:0 "Abra este menu de configuração do§YAcelerador de Partículas Estelar§ !."
  giga_accelerator.110.name:0 "Dano estrutural do acelerador de partícula estelar"
  giga_accelerator.110.desc:0 "A equipe do§Y [giga_mega_event_system.GetName] Acelerador de Partículas Estelares§! está relatando que algumas partes do acelerador sofreram graves danos estruturais, provavelmente devido aos altos requisitos de energia dos experimentos realizados dentro da estrutura. \n \nEnquanto a megaestrutura ainda está funcional, eles aconselham tomar medidas imediatas para corrigir esse problema e reparar os danos, pois deixá-lo passar sem verificação pode ter consequências terríveis na integridade da estrutura se formos demais distante."
  giga_accelerator.110.a:0 "Desligue e envie§Y3000§!£alloys£para consertar imediatamente."
  giga_accelerator.110.a.tooltip:0 "A intensidade do§YAcelerador de Partículas Estelares§! será definida para§BOff§! por§Y6 meses§!. \nEle será redefinido para§BNormal§! posteriormente."
  giga_accelerator.110.b:0 "Desligue-o por um ano e faça reparos de token."
  giga_accelerator.110.b.tooltip:0 "A intensidade do§YAcelerador de Partículas Estelares§! será definida para§BLow§! para§Y1 ano§!. \nEle será redefinido para§BNormal§! posteriormente. \n \n$giga_med_failure_risk$"
  giga_accelerator.110.c:0 "Não importa!"
  giga_accelerator.111.name:0 "Reparos do acelerador de partículas estelares bem-sucedidos!"
  giga_accelerator.111.desc:0 "A equipe de nosso§YAcelerador de partículas estelares§! no§Y [giga_mega_event_system_name.GetName]§! relata que os reparos realizados na megaestrutura foram bem-sucedidos! \n \nA megaestrutura foi entregue de volta ao pleno funcionamento e está pronto para tudo o que for necessário. "
  giga_accelerator.111.a:0 "Maravilhoso!"
  giga_accelerator.112.name:0 "Acelerador de partículas estelares:§RCatastrófico Falha§!"
  giga_accelerator.112.desc:0 "Estão chegando relatórios terríveis de que o§YAcelerador de Partículas Estelares§! no sistema§Y [giga_mega_event_system_name.GetName]§! infelizmente não conseguiu suportar seus danos estruturais. \n \nCom certeza, durante um recente No experimento de colisão de partículas, a estrutura falhou em conter adequadamente as energias cataclísmicas da colisão, o que subsequentemente sobrecarregou toda a estrutura delicada do acelerador, causando uma reação em cadeia e§R colapso estrutural completo§!. \n \nA megaestrutura foi reduzida a uma massa de detritos espaciais em órbita solar, que podemos consertar com recursos suficientes. "
  giga_accelerator.112.a:0 "Maldições!"
  giga_accelerator.112.a.tooltip:0 "O§YAcelerador de Partículas Estelares§! no§Y [giga_mega_event_system_name.GetName]§! sistema torna-se§Rruinado§ !."
  giga_accelerator.120.name:0 "Medos Decadentes"
  giga_accelerator.120.desc:0 "Estão chegando relatórios de todo o nosso império que, após a construção e subsequente ativação de um§YAcelerador de Partículas Estelares§ !, alguns de nossos cidadãos começaram a evocar preocupações crescentes sobre a possibilidade de ativação da estrutura a§YFalse Vacuum Decay§!. \n \nDe fato, de acordo com algumas teorias, as colisões extremamente energéticas que ocorrem dentro do acelerador podem levar ao que é conhecido como§YVacuum Decay§ !, que é quando uma explosão repentina de energia em um ponto localizado do espaço desestabiliza um dos principais campos quânticos dos universos e, subsequentemente, altera as leis da física. \n \nIsso levaria a uma reação em cadeia, criando uma esfera em expansão dentro da qual as leis da física são diferentes, e isso iria assim, eventualmente, engolfará todo o universo, destruindo tudo. \n \nObviamente, nossos cientistas-chefes negam essa teoria, alegando que ela é "rebuscada" e "sem sentido", mas o medo continua crescendo entre nossa população e os O problema foi agravado por vários cientistas proeminentes que decidiram apoiar a afirmação. \n \nCom muitos alegando que a megaestrutura traria o "Fim do universo", eles agora estão pedindo o desmantelamento de nossos§YAceleradores de Partículas Estelares§! .. . "
  giga_accelerator.120.a:0 "Invista recursos para conduzir um grande estudo para refutá-lo!"
  giga_accelerator.120.b:0 "Censure a imprensa e prenda qualquer pessoa que divulgar a denúncia."
  giga_accelerator.120.c:0 "Ignore o problema. Isso vai passar."
  giga_accelerator.120.d:0 "Cumprir e destruir os aceleradores."
  giga_accelerator.120.d.tooltip:0 "Todos os§YAceleradores de Partículas Estelares§! em nosso império são§Rdesmontados§!. \nRecebemos§Y3500§!£alloys£por acelerador desmontado."
  giga_accelerator.120.b.tooltip:0 "As pessoas ficarão indignadas no início, mas isso irá embora eventualmente. \n \n"
  giga_accelerator.120.a.tooltip:0 "Faremos um grande estudo para garantir que esta teoria seja inteiramente e completamente refutada. \n \n"
  censored_vacuum_fears_desc:0 "A teoria do False Vacuum é inerentemente estúpida. Garantiremos que ninguém fale sobre ela nunca mais."
  false_vacuum_fears:0 "Medos Falso de Vácuo"
  false_vacuum_fears_desc:0 "Nossa população tem medo de uma falsa redução teórica de vácuo que pode ser causada por um acelerador de partículas estelares."
  giga_accelerator.121.name:0 "Medos vazios"
  giga_accelerator.121.desc:0 "Foi preciso muito esforço, mas, finalmente, nossos cientistas conseguiram refutar completa e inteiramente a teoria do Falso Vácuo! \n \nAo usar uma série de teses, teorias, experimentos e anúncios públicos para mostrar suas descobertas, eles foram capazes de eliminar quase completamente o medo da população de um falso vácuo e, embora alguns grupos ainda acreditem que a coisa toda seja um encobrimento, poderemos continuar usando nosso§YAcelerador de Partículas Estelar§! Imperturbável. \ N \nO estudo também nos ajudou a melhorar nossa compreensão do universo como um todo, o que, sem dúvida, beneficiará nossas pesquisas em física. "
  giga_accelerator.122.desc:0 "Após alguns anos de árduos esforços, nosso cientista encarregado de estudar a teoria do Falso Vácuo finalmente chegou a uma conclusão. \n \n§É verdade.§! \n \nÉ tudo verdade! De fato , eles determinaram que, embora as chances de isso acontecer sejam infinitamente pequenas, é realmente possível que um acelerador de partículas grande o suficiente cause um Falso Vácuo que destruiria toda a galáxia. \n \nMesmo que seja incrivelmente improvável que isso aconteça Acontece que o universo provavelmente vai morrer por conta própria antes que um falso vácuo se forme, nossa comunidade científica ficou rapidamente alarmada com essas descobertas, e muitos também estão começando a pedir que desmontemos os aceleradores. \n \nEm uma nota mais positiva , e possivelmente a única coisa boa que resultou disso, o estudo nos ajudou a melhorar nossa compreensão do universo como um todo, mas pode ser discutível se acabarmos destruindo esse universo. "
  giga_accelerator.122.a:0 "Censurar as descobertas e mentir para a população."
  giga_accelerator.122.a.tooltip:0 "Isso tem uma chance de sair pela culatra. \nAs descobertas têm maior probabilidade de vazar se formos§YEgalitários§! e vice-versa se formos§YAutoritários§!. \n \n"
  giga_accelerator.122.b:0 "Apenas anuncie. Eles vão parar de pensar nisso, eventualmente."
  giga_accelerator.122.c:0 "Desmonte os aceleradores."
  false_vacuum_study:0 "Estudo de Falso Vácuo"
  false_vacuum_study_desc:0 "O estudo da possibilidade de um Falso Vácuo expandiu nossa compreensão do universo."
  giga_accelerator.123.name:0 "Descobertas falsas de vácuo vazadas!"
  giga_accelerator.123.desc:0 "Notícias alarmantes! Parece que nossas descobertas sobre o Falso Vácuo vazaram de alguma forma para nossa população. \n \nIsso teve consequências desastrosas, com grande parte de nossa população sucumbindo ao pânico por causa das revelações. . "
  giga_accelerator.123.a:0 "Droga ..."
  giga_accelerator.123.b:0 "Chega! Apenas desmonte os aceleradores e pronto!"
  giga_accelerator.130.name:0 "Descobertas do acelerador de partículas estelares"
  giga_accelerator.130.desc:0 "Nossa equipe do§YAcelerador de Partículas Estelares§! relatou que fizeram uma série de descobertas interessantes recentemente, que certamente irão beneficiar nossas pesquisas em física."
  giga_accelerator.130.a:0 "Bom."
  giga_accelerator.130.b:0 "Dê um aumento aos cientistas!"
  giga_accelerator.140.name:0 "Excesso de matéria escura"
  giga_accelerator.140.desc:0 "Nossa equipe do§YAcelerador de Partículas Estelares§! relatou que experimentos de colisão recentes acabaram gerando um excedente de§YMaterial Escuro§ exótico !! \n \nEles conseguiram coletá-lo usando redes eletromagnéticas especializadas e, posteriormente, enviaram os recursos diretamente para nossos estoques. "
  giga_accelerator.140.a:0 "Maravilhoso!"
  giga_acc_intensity_up:0 "§YAumentar§! intensidade desta megaestrutura."
  giga_acc_intensity_down:0 "§YDecrease§! intensidade desta megaestrutura."
  mega_intensity_meaning:0 "O aumento da intensidade levará a um aumento anual de§Robertura de falha§ !, o que fará com que a megaestrutura precise de reparos, para que uma§Rfalha catastrófica§! possa ocorrer."
  giga_acc_physics:0 "O§YAcelerador de Partículas Estelares§! pode ser especializadod na produção de§YPhysics Research§! colidindo várias partículas e observando os resultados. \n \nProdução de base:§Y150§!£física£"
  giga_acc_dm:0 "O§YAcelerador de Partículas Estelares§! pode ser especializado na produção de§YMateria Escura§! graças a colisões de partículas especiais que irão gerar vestígios de matéria escura. \n \nProdução de base:§Y100§!£física£§Y1§!£sr_dark_matter£\nOportunidade de falha na base:§R+5%§! "
  giga_acc_qnm:0 "O§Yacelerador de partículas estelares§! pode ser especializado na produção de§YQuasi-Massa Negativa§! graças a colisões de partículas esotéricas e muito específicas, criando matéria negativa. \n \nProdução de base:§Y80§!£física£§Y0 .7§!£giga_sr_negative_mass£\nBase Failure Chance:§R+10%§! "
  giga_acc_intensity_5:0 "Intensidade atual: \n§BExtreme§! \n \nEfeito: \n§G+50% Saída da megaestrutura§! \n§R+100% Manutenção da megaestrutura§! \n \n$mega_intensity_meaning$"
  giga_acc_intensity_4:0 "Intensidade atual: \n§BHigh§! \n \nEfeito: \n§G+25% Saída da megaestrutura§! \n§R+40% Manutenção da megaestrutura§! \n \n$mega_intensity_meaning$"
  giga_acc_intensity_3:0 "Intensidade atual: \n§BNormal§! \n \n$mega_intensity_meaning$"
  giga_acc_intensity_2:0 "Intensidade atual: \n§BLow§! \n \nEfeito: \n§R-40% Saída da megaestrutura§! \n§G-60 %% Manutenção da megaestrutura§! \n \n$mega_intensity_meaning$"
  giga_acc_intensity_1:0 "Intensidade atual: \n§BOff§! \n \nEfeito: \n§R-100% Saída da megaestrutura§! \n§G-100% Manutenção da megaestrutura§! \n \n$mega_intensity_meaning$"
  giga_accelerator.150.name:0 "Buraco negro solto"
  giga_accelerator.150.desc:0 "Nosso§YAcelerador de Partículas Estelares§! em torno de§Y [accelerator_quasistar.GetName]§! informa que um evento improvável ocorreu recentemente no acelerador. \n \nApenas algumas horas atrás, uma partícula excepcionalmente energética experimento de colisão acabou criando um§ Buraco negro microscópico§ !. Embora isso geralmente não seja digno de nota, como esses buracos negros normalmente evaporam meros nanossegundos depois de aparecer, parece que essa singularidade em particular era massiva o suficiente para começar a cair em direção à estrela e impactar o quadro do acelerador, garantindo a ele alguma matéria para se alimentar e evitar a evaporação. \n \nO dano causado pelo buraco negro é mínimo, pois ele simplesmente cavou um pequeno túnel de alguns micrômetros de largura através do acelerador. No entanto, ele saiu rapidamente a megaestrutura, e agora está caindo em direção à superfície da estrela. \n \nEstimamos que levará alguns dias para que ela alcance a estrela e provavelmente começará a mastigar suas camadas externas antes de atingir o núcleo estelar. Nossos cientistas não têm certeza do que realmente vai acontecer a seguir, mas eles aconselham que fiquemos de olho nisso ... já que o potencial de pesquisa é inegável. "
  giga_accelerator.150.a:0 "Preocupado. Devemos acompanhar este buraco negro."
  giga_accelerator.150.b:0 "Fascinante! O potencial científico é inegável."
  giga_accelerator.151.name:0 "Devorado de dentro"
  giga_accelerator.151.desc:0 "O buraco negro microscópico que caiu em§Y [accelerator_quasistar.GetName]§! atingiu agora o núcleo da estrela e, de acordo com a equipe do§YStellar Particle Accelerator§ !, plasma estelar no o núcleo da estrela começou a cair na singularidade, aumentando seu tamanho, permitindo que ela consuma mais e mais matéria à medida que cresce. \n \nIsso significa efetivamente que§Y [accelerator_quasistar.GetName]§! está encolhendo! Embora atualmente imperceptível, a taxa na qual a matéria é consumida só aumentará à medida que o buraco negro dentro de seu núcleo aumenta de tamanho ao longo do tempo. \n \nFelizmente para nós, a equipe do nosso acelerador nos garante que não há preocupação em um futuro previsível, e eles parecem bastante entusiasmados com a perspectiva de estudar esta incrível ocorrência. "
  giga_accelerator.151.a:0 "Isso ainda parece um pouco preocupante."
  giga_quasi_star:0 "Buraco Negro Intrastellar"
  giga_quasi_star_desc:0 "Um buraco negro artificial está devorando esta estrela de dentro."
  giga_accelerator.152.name:0 "Acelerando o desaparecimento"
  giga_accelerator.152.desc:0 "O§Y [accelerator_quasistar.GetName]§! A equipe do Stellar Particle Accelerator está relatando que o buraco negro interno da estrela está crescendo mais rápido do que o esperado. \n \nDe fato, o raio aparente da estrela começou a encolher visivelmente nos últimos meses, indicando que o crescimento da singularidade está começando a acelerar exponencialmente. \n \nComo resultado, a luminosidade da estrela está diminuindo lentamente, resfriando levemente os planetas do sistema. \n \nNo entanto, ainda é uma oportunidade científica incrível, que continua a beneficiar nossa física research. "
  giga_accelerator.152.a:0 "Ups."
  giga_accelerator.152.a.tooltip:0 "Todos os planetas no sistema§Y [accelerator_quasistar.GetName]§! ficam mais frios. \nQuaisquer colônias no sistema sofrerão de§Ypuxo de alta emigração§!. \n \n"
  giga_quasi_star_cooling_planet_desc:0 "A estrela deste planeta está diminuindo lentamente devido a um buraco negro devorando sua massa. Como resultado, este mundo está cada vez mais frio."
  giga_quasi_star_cooling_planet_1_desc:0 "A estrela deste planeta está diminuindo lentamente devido a um buraco negro devorando sua massa. Como resultado, este mundo está cada vez mais frio."
  giga_accelerator.153.name:0 "Escalando o consumo"
  giga_accelerator.153.desc:0 "Notícias terríveis! O buraco negro dentro de§Y [accelerator_quasistar.GetName]§! agora está consumindo rapidamente a estrela, que encolheu significativamente nos últimos anos. \n \nOs planetas do sistema ficaram visivelmente mais frio, e o buraco negro continua a crescer dentro da estrela, tendo consumido uma grande parte do núcleo estelar. \n \nEmbora ainda forneça grandes quantidades de dados científicos, as consequências disso no sistema são cada vez maiores. e mais preocupante a cada dia. "
  giga_accelerator.153.a:0 "Isso é altamente problemático!"
  giga_accelerator.153.a.tooltip:0 "Todos os planetas no sistema§Y [accelerator_quasistar.GetName]§! ficam ainda mais frios. \nQuaisquer colônias no sistema sofrerão de§Ypuxo de alta emigração§!. \n \n"
  giga_accelerator.155.desc:0 "Relatórios surpreendentes estão chegando de§Y [accelerator_quasistar.GetName]§ !, já que a estrela que encolhe parou de encolher! \n \nEmbora inicialmente desconcertados com esta ocorrência, nossos cientistas rapidamente perceberam que a radiação gerada por algum material estelar que cai no buraco negro está na verdade gerando uma forma de pressão externa, que neutraliza a gravidade e, subsequentemente, evita que o resto da estrela entre em colapso ainda mais. \n \nIsso efetivamente significa que a estrela ainda encolherá, embora muito lentamente, como toda a sua camada externa agora é suportada pela radiação do buraco negro e, embora os planetas do sistema ainda sejam mais frios do que costumavam ser, o sistema não está mais condenado a uma morte completamente fria. "
  giga_accelerator.155.a:0 "Intrigante."
  giga_accelerator.156.desc:0 "§Y [accelerator_quasistar.GetName]§! nunca para de decepcionar. De fato, em uma reviravolta surpreendente, parece que a estrela parou completamente de encolher e está até começando a crescer! \n \nMais adiante estudos revelaram que a pressão de radiação do material que cai no buraco negro está na verdade "empurrando" o envelope externo da estrela, fazendo-o inchar e se expandir para fora. \n \nIsso também significa que a luminosidade da estrela está aumentando novamente e os planetas do sistema estão começando a aquecer de volta à temperatura original. "
  giga_accelerator.156.a:0 "Um problema que se resolve sozinho! Que delícia."
  giga_accelerator.156.a.tooltip:0 "Todos os planetas no sistema§Y [accelerator_quasistar.GetName]§! ficam mais quentes. \n \n"
  giga_accelerator.158.desc:0 "Nossos cientistas relatam que§Y [accelerator_quasistar.GetName]§! agora ultrapassou seu tamanho original e continua a aumentar para tamanhos maiores devido à pressão de radiação do buraco negro. \n \nA temperatura de os planetas do sistema voltaram aos valores normais, mas agora estão aumentando lentamente conforme a estrela se expande para fora. \n \nIsso continua a produzir um imenso potencial científico, mas a superfície em expansão da estrela está começando a se aproximar assustadoramente do§YAcelerador de Partículas Estelares§ do sistema ! ... "
  giga_accelerator.158.a:0 "Preocupado ..."
  giga_accelerator.158.a.tooltip:0 "Todos os planetas no sistema§Y [accelerator_quasistar.GetName]§! ficam mais quentes."
  giga_quasi_star_heating_planet:0 "Estrela em crescimento"
  giga_quasi_star_heating_planet_desc:0 "A estrela deste planeta está ficando mais brilhante como resultado de um buraco negro intrastelar empurrando contra suas camadas externas. Embora as condições da superfície tenham se tornado menos hospitaleiras, é certamente uma grande oportunidade para estudar os processos exóticos que ocorrem dentro da estrela e do sistema como resultado do buraco negro. A estrela também é muito mais brilhante, o que aumenta drasticamente a energia gerada por fazendas solares. "
  giga_accelerator.160.a:0 "Tenha mais cuidado com os aceleradores da próxima vez!"
  giga_accelerator.160.a.tooltip:0 "Todos os planetas no sistema§Y [accelerator_quasistar.GetName]§! ficam mais quentes. \n \nO§YAcelerador de Partículas Estelar§! é§Rdestruído§!. \n \n"
  mod_shipsize_giga_massive_planet_hull_mult:0 "Pontos de Ataque do Casco da Lua"
  ehof_contact_ehof:0 "\n \n§GContate$ehof_ehof$§!"
  giga_penrose_system_NAME:0 "A Arca Eterna"
  giga_penrose_system_DESC:0 "Comece em um ringworld Penrose Sphere"
  origin_penrose_ring:0 "Penrose Mundo Anel"
  origin_penrose_ring_desc:0 "Esta antiga esfera de Penrose foi construída em torno de um dos primeiros buracos negros na galáxia incontáveis ​​anos atrás. Esses precursores misteriosos desapareceram sem deixar vestígios e agora uma nova civilização surge em seu legado."
  origin_tooltip_penrose_ring_effects:0 "Comece em um ringworld Penrose Sphere. \n- Habitabilidade das espécies é definida como§LPenrose Mundo Anel§!. \n-§RNão haverá sistemas com mundos habitáveis ​​garantidos próximos§!. \n \n§RAI não pode usar esta origem. Quaisquer impérios de IA personalizados predefinidos gerados com esta origem serão gerados com$origin_default$em seu lugar.§! "
  relic_penrose_sphere_1:0 "Esfera Relic Penrose"
  relic_penrose_sphere_1_DESC:0 "Esta antiga esfera de Penrose está em suas últimas pernas e se desintegrará em alguns milhares de anos, a menos que seja reparada. Alguns de seus componentes ainda estão funcionando, porém, produzindo quantidades minúsculas de energia."
  relic_penrose_sphere_2:0 "Esfera Penrose"
  giga_ring_origins.101.desc:0 "Após anos de trabalho árduo, a esfera de Penrose relíquia no sistema§L [relic_penrose_sphere.GetName]§! foi restaurada à sua antiga glória e mais uma vez gera grandes quantidades de energia usando a dispersão superradiante do buraco negro . Que ele proteja e alimente nossa civilização pelo resto da eternidade! "
  pc_giga_penrose_habitable_desc:0 "Uma construção massiva que circunda um buraco negro cativo. A$name_penrose$fornece a energia necessária para alimentar este mundo circular e permitir a vida na superfície, livre das restrições e mundanidade da existência ligada ao planeta. Também tem alguns dos melhores vistas do universo. "
  penrose_sphere_a2:0 "Bomba de distorção subespacial desarmada"
  penrose_sphere_a2_DESC:0 "Este$name_penrose$foi reaproveitado em uma bomba. Agora devemos deixá-lo acumular energia por um tempo antes de detoná-lo."
  penrose_sphere_a3:0 "Bomba de distorção subespacial"
  penrose_sphere_a3_DESC:0 "Uma grande estrutura semelhante a um espelho construída em torno de um buraco negro, capaz de refletir a radiação para frente e para trás entre sua superfície interna e a ergosfera do buraco negro, causando espalhamento superradiante e amplificando exponencialmente a energia da radiação."
  penrose_sphere_a4:0 "Detonar!"
  penrose_sphere_a4_DESC:0 "Envie radiações apenas o suficiente para empurrar a integridade do espelho além de seu limite e liberar o fluxo de energia!"
  penrose_sphere_a41:0 "Bomba de distorção subespacial"
  penrose_sphere_a41_DESC:0 "Esta Bomba de Distorção Subespacial está prestes a detonar!"
  penrose_sphere_a42:0 "Bomba de distorção subespacial"
  penrose_sphere_a42_DESC:0 "Esta Bomba de Distorção Subespacial está prestes a detonar!"
  penrose_sphere_b2_DESC:0 "Um grande espelho construído em torno de um buraco negro. As radiações estão saltando para frente e para trás entre a superfície interna do espelho e a ergosfera do buraco negro, gerando energia."
  penrose_sphere_b3:0 "Estabilizado$name_penrose$"
  penrose_sphere_b3_DESC:0 "Este$name_penrose$foi estabilizado com construções especializadas, permitindo que mais radiação seja contida dentro da bola de espelho sem risco de explosão. Portanto, gera mais energia."
  penrose_sphere_b4:0 "Mundo Anel$name_penrose$"
