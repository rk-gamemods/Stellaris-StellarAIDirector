  giga_qso.1.name:0 "$name_quasistellar$Painel de Controle"
  giga_qso.1.desc:0 "Bem-vindo ao painel de controle de$name_quasistellar$. \n \nAqui, você pode escolher um alvo para a hiper-arma ou configurar seus parâmetros. \n \nA escolha de um alvo permitirá que você mire em uma estrela, planeta ou frota. Lembre-se de que disparar o QS-Orequires£giga_sr_quasaric_energy£§Energia Quasárica§ !, gerada pela própria megaestrutura. \n \nA visualização dos parâmetros permitirá que você altere a taxa de carregamento da arma, aumentando ou diminuindo a quantidade de£giga_sr_quasaric_energy£§Energia Quasárica§! acumulada por nosso QS-O. \n \n§B Este menu também pode ser acessado diretamente por meio de um edital.§! "
  giga_qso.1.fire:0 "Escolha o alvo"
  giga_qso.1.parameters:0 "Exibir parâmetros"
  giga_qso.1.quit:0 "Sair do Painel de Controle"
  giga_qso.1.menu:0 "Retornar ao Menu"
  giga_qso.10.name:0 "$name_quasistellar$: Seleção de alvo"
  giga_qso.10.desc:0 "Aqui, você pode selecionar o que deseja atingir com o QS-O. Leia como cada método de direcionamento funciona corretamente. Lembre-se de que destruir alvos maiores exigirá mais£giga_sr_quasaric_energy£§Energia Quasárica§ !. "
  giga_qso.10.fleet:0 "Destrua uma§GFleet§!"
  giga_qso.10.planet:0 "Destrua um§YPlanet§!"
  giga_qso.10.star:0 "Destrua um§HSolar System§!"
  giga_qso.10.starcluster:0 "Destrua um§RStar Cluster§!"
  giga_qso.200.name:0 "$name_quasistellar$:§GFleet Destruction§!"
  giga_qso.200.desc:0 "Você optou por mirar em uma frota inimiga com$name_quasistellar$. Isso custará§Y20§!£giga_sr_quasaric_energy£\n \nUma nave especial, usada para calibrar a mira do QS-O, será criada perto da estrutura. Está equipada com um Jump Drive especial de alcance ilimitado. Mova esta nave para o sistema que contém a frota alvo e, em seguida, reabra o painel de controle para confirmar. \n \nA nave terá que permanecer viva por§Y5 dias§! enquanto a hiper-arma é calibrada, então certifique-se de que ela esteja devidamente acompanhada. \n \nQuando esses 5 dias se passarem, o QS-O disparará através de um buraco de minhocadiretamente na frota inimiga, por 30 dias. O buraco de minhoca pode, entretanto, ser interrompido por fogo inimigo, então não é recomendado deixá-lo sozinho. \ N \nSe você deseja cancelar a operação, dissolva a nave ou use o Painel de Controle. "
  giga_qso.200.yes:0 "Vamos continuar."
  giga_qso.201.name:0 "Calibrador quase estelar montado"
  giga_qso.201.desc:0 "Nosso QS-O montou uma pequena nave do Calibrador Quasi-Stellar. Ele deve ser usado para calibrar e apontar adequadamente o buraco de minhoca através do qual a hiper-arma irá disparar. Para iniciar a sequência de disparo, use o seu jump drive para movê-lo para o sistema que contém a frota alvo. "
  giga_qso.201.a:0 "Compreendido."
  giga_qso.202.name:0 "Calibrador Quasi-Stellar dissolvido"
  giga_qso.202.desc:0 "Dissolvemos nosso Calibrador Quasi-Stellar. O procedimento de destruição foi cancelado."
  giga_qso.202.a:0 "Compreendido."
  giga_qso.203.name:0 "Calibrador quase estelar destruído"
  giga_qso.203.desc:0 "Nosso Calibrador Quasi-Estelar foi destruído por forças hostis. O procedimento de destruição foi cancelado."
  giga_qso.203.a:0 "Compreendido."
  giga_qso.204.name:0 "$name_quasistellar$:§GFDestruição da Frota§!"
  giga_qso.204.desc:0 "Se você colocou o Calibrador Quasi-Stellar no sistema correto, selecione a primeira opção. Você terá que protegê-lo por 5 dias. Se desejar cancelar, selecione a terceira opção, que irá dissolva o Calibrador. "
  giga_qso.204.fire:0 "Comece a calibração! Custo:§Y20§!£giga_sr_quasaric_energy£"
  giga_qso.204.markers:0 "O Calibrador ainda não está instalado."
  giga_qso.205.name:0 "Calibrando o Obliterador"
  giga_qso.205.desc:0 "Nosso$name_quasistellar$começou a calibrar sua arma usando a nave Calibradora. Devemos garantir que ela não seja destruída por 5 dias, após o qual nossa super arma irá liberar um raio de pura destruição sobre nossos inimigos. O QS-O irá disparar por cerca de 30 dias, após os quais o buraco de minhoca desaparecerá e o QS-O estará novamente pronto para uso. "
  giga_qso.205.a:0 "Excelente."
  giga_qso.206.name:0 "$name_quasistellar$: Calibragem Completa"
  giga_qso.206.desc:0 "Nosso$name_quasistellar$acabou de calibrar sua hiper arma e o buraco de minhoca, e agora irá liberar sua fúria sobre a infeliz frota que designamos como alvo."
  giga_qso.206.a:0 "Excelente. Deixe-os queimar"
  giga_qso.400.name:0 "$name_quasistellar$:§RStar Destruição do cluster§!"
  giga_qso.400.desc:0 "Você escolheu destruir uma estrela e cada uma de suas vizinhas hiperlane imediatas. Para fazer isso, use uma nave de construção para construir um§BQS-O Marcador de Alvo§! sobre as estrelas que deseja destruir. \n \nEle é construído instantaneamente e nãorequires que o navio de construção esteja fisicamente presente no sistema. \n \n§R O sistema, entretanto, deve ser limpo de hostis.§! \nVocê pode usar o QS-O Fleet Destruction para facilitar isso. \n \nUma vez que os marcadores de alvo foram construídos, retorne ao QS-O e abra o Painel de Controle mais uma vez para disparar o dispositivo. \n \n§B A explosão será tão poderosa que se propagará através hiperlanas, resultando no sistema-alvo, ao lado de todos os sistemas conectados a ele, sendo completamente destruídos, e suas hiperfaixas sendo excluídas, deixando nada além de um espaço vazio.§! "
  giga_qso.401.name:0 "§RStar Destruição do cluster§!"
  giga_qso.401.desc:0 "Se você tem como alvo a estrela no núcleo do cluster que deseja destruir, selecione a primeira opção. Se você deseja cancelar, selecione a terceira opção, que excluirá o marcador."
  giga_qso.401.fire:0 "Destrua um aglomerado de estrelas, atire! Custo:§Y120§!£giga_sr_quasaric_energy£"
  giga_qso.401.markers:0 "Ainda não almejamos a estrela."
  giga_qso.300.name:0 "$name_quasistellar$:§Destruição do sistema solar§!"
  giga_qso.300.desc:0 "Você optou por destruir uma ou várias estrelas e seus sistemas planetários inteiros. Para fazer isso, use uma nave de construção para construir um§BQS-O Marcador de Alvo§! sobre as estrelas que deseja destruir. \n \nEle é construído instantaneamente e nãorequires que o navio de construção esteja fisicamente presente no sistema. \n \n§ROs sistemas, entretanto, devem ser limpos de hostis.§! \nVocê pode usar o QS-O Fleet Destruction para facilitar isso. \n \nVocê pode definir como alvo até 4 estrelas de uma vez, cada uma adicionando 40£giga_sr_quasaric_energy£ao custo total de disparo. Se um sistema tiver várias estrelas, você só precisa definir como alvo uma delas. \n \nUma vez os marcadores de destino foram construídos, retorne ao QS-O e abra o Painel de Controle mais uma vez para disparar o dispositivo. \n \n§BA produção de energia de$name_quasistellar$é tão alta que pode destruir estrelas de nêutrons, pulsares, e até mesmo buracos negros, já que o fluxo de energia é tão alto que o próprio espaço-tempo é literalmente virado do avesso, e o buraco negro evapora em nada ss. \n \n§BAll hyperlanes conectados aos sistemas irão desaparecer assim que os sistemas forem destruídos.§! "
  giga_qso.301.name:0 "$name_quasistellar$:§Destruição do sistema solar§!"
  giga_qso.301.desc:0 "Se você almejou todas as estrelas que desejadestruir, selecione a primeira opção. Se desejar cancelar, selecione a terceira opção, que excluirá todos os marcadores. "
  giga_qso.301.markers:0 "Ainda precisamos mirar em mais estrelas antes de atirar."
  giga_qso.301.fire.1:0 "Destrua 1 sistema solar, atire! Custo:§Y40§!£giga_sr_quasaric_energy£"
  giga_qso.301.fire.2:0 "Destrua 2 sistemas solares, atire! Custo:§Y80§!£giga_sr_quasaric_energy£"
  giga_qso.301.fire.3:0 "Destrua 3 sistemas solares, atire! Custo:§Y120§!£giga_sr_quasaric_energy£"
  giga_qso.301.fire.4:0 "Destrua 4 sistemas solares, atire! Custo:§Y160§!£giga_sr_quasaric_energy£"
  giga_qso.100.name:0 "$name_quasistellar$:§YDestruição do Planeta§!"
  giga_qso.100.desc:0 "Você optou por destruir um ou vários planetas. Para fazer isso, use uma nave de construção para construir uma megaestrutura§BQS-O Target Marker§! sobre os planetas que deseja destruir. \n \nEles são construídos instantaneamente e não exigem que o navio de construção esteja fisicamente presente no sistema. Certifique-se de que o navio de construção não esteja em posição evasiva. \n \nVocê pode mirar em até 10 planetas de uma vez, cada um adicionando 5£giga_sr_quasaric_energy£ao custo total de disparo, para um máximo de 50. \n \nUma vez que os marcadores de alvo tenham sido construídos, retorne ao QS-O e abra o Painel de Controle mais uma vez para disparar o dispositivo. "
  giga_qso.101.name:0 "$name_quasistellar$:§YDestruição do Planeta§!"
  giga_qso.101.desc:0 "Se você mirou em todos os planetas que deseja destruir, selecione a primeira opção. Se desejar cancelar, selecione a terceira opção, que apagará todos os marcadores."
  giga_qso.101.fire.1:0 "Destrua 1 planeta, atire! Custo:§Y5§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.2:0 "Destrua 2 planetas, atire! Custo:§Y10§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.3:0 "Destrua 3 planetas, atire! Custo:§Y15§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.4:0 "Destrua 4 planetas, atire! Custo:§Y20§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.5:0 "Destrua 5 planetas, atire! Custo:§Y25§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.6:0 "Destrua 6 planetas, atire! Custo:§Y30§!£giga_sr_quasaric_energy£"
