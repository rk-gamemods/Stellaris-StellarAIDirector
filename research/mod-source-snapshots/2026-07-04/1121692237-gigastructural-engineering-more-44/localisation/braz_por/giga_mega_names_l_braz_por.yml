  kugelblitz_0_DESC:0 "O canteiro de obras de um futuro$name_kugelblitz$. Abriga o pessoal necessário para construir este dispositivo de armazenamento incrivelmente avançado."
  kugelblitz_0_MEGASTRUCTURE_DETAILS:0 "Um dispositivo de armazenamento incrivelmente avançado, que pode armazenar energia e matéria na forma de radiação." #megalistentry KUGELBLITZ
  
  kugelblitz_1:0 "Esvaziar$name_kugelblitz$"
  kugelblitz_1_DESC:0 "Uma grande construção capaz de criar um Kugelblitz artificial para gerar e armazenar energia graças à radiação Hawking acelerada, bem como matéria. Também pode extrair energia armazenada para usá-la."
  
  kugelblitz_2:99 "Enhanced $name_kugelblitz$"
  kugelblitz_2_DESC:0 "Esta construção abriga um Kugelblitz artificial, bem como dispositivos capazes de injetar e extrair energia dele. O Kugelblitz gera energia graças à radiação Hawking acelerada e sua energia pode ser extraída e convertida de volta em matéria. \nStores 40000 de cada recurso."
  
  kugelblitz_3:99 "Grand $name_kugelblitz$"
  kugelblitz_3_DESC:99 "This construct houses an artificial Kugelblitz as well as devices capable of injecting and extracting energy from it. Utilizing tetra-dimensional engineering we're capable of an even higher increase in the amount of viable storage from a single generated kugelblitz."
  
  kugelblitz_ruined:0 "$name_kugelblitz$ Arruinado"
  kugelblitz_ruined_DESC:0 "Um$name_kugelblitz$arruinado. Construído para abrigar uma singularidade artificial controlada, este construto sofreu imensos danos no passado e não está mais operacional. Embora seja difícil, os reparos podem ser possíveis."
  kugelblitz_ruined_MEGASTRUCTURE_DETAILS:99 "$kugelblitz_ruined_DESC$"
  
  kugelblitz_restored:99 "$name_kugelblitz$"
  kugelblitz_restored_DESC:99 "$kugelblitz_2_DESC$"
  
  #########################################
  ### Planetary Seeder Nexus ##############
  #########################################
  giga_tech_planetary_seeder_nexus:99 "Large-Scale Extremophile Sustenance"
  giga_tech_planetary_seeder_nexus_desc:99 "Barren worlds, both hot and cold, often feature the basic building blocks of life, merely not in the proper arrangement. However, with the discovery of Cutholoids and Amoebas thriving in the depths of space, there now lies the possibility of creating bespoke artificial 'lifeforms' which, once deposited on lifeless worlds, will be able to accumulate and rearrange these building blocks into various substances suitable for harvest and consumption. As all these would do is shuffle and rearrange scattered molecules into various edible compounds, these would have to be regularly replenished and would not constitute a proper 'biosphere', but could provide a useful supply of materials to our nutrition industries."
  
  planetary_seeder_nexus_0:99 "$gc_kilo$$name_planetary_seeder_nexus$: Organic Biosensors"
  planetary_seeder_nexus_0_DESC:99 "This site will serve as a base to construct an $name_planetary_seeder_nexus$, an orbital bioengineering facility producing various quasi-biological automata able to reprocess scattered organic compounds found within lifeless worlds into edible matter. Large geo-surveying arrays constantly scan nearby worlds and deploy probes to confirm the locations of highly concentrated processable organic compounds."
  planetary_seeder_nexus_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_kilostructure$ - $giga_list_category_basic_resource_production$\nGenerates £food£ §YFood§! deposits on system planets.\n§LA station built in orbit of a gas giant, producing biological automata which reprocessed organic compounds into edible matter.§!" #megalistentry PLANETARY SEEDER NEXUS
  planetary_seeder_nexus_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $planetary_seeder_nexus_1_mod_tooltip$"
  
  planetary_seeder_nexus_1:99 "$name_planetary_seeder_nexus$: Biological Manufactory"
  planetary_seeder_nexus_1_DESC:99 "Nutritious phytoplankton-like lifeforms capable of thriving in subsurface oceans, rocky crusts and gaseous atmospheres are produced in vast quantities and spread through the local system."
  
  planetary_seeder_nexus_2:99 "$name_planetary_seeder_nexus$: Enzyme Plants"
  planetary_seeder_nexus_2_DESC:99 "For worlds that cannot sustain conventional life, advanced plants manufacture enzyme-rich cellular automata capable of incredible feats of molecular chemistry ranging from rearranging the crust and atmosphere of carbon-rich worlds into pillars of crystallised sucrose to producing protein slurry by manipulating hydrocarbons and water."
  
  planetary_seeder_nexus_3:99 "$name_planetary_seeder_nexus$"
  planetary_seeder_nexus_3_DESC:99 "A complete $name_planetary_seeder_nexus$, overseeing the production, deployment and subsequent harvest of specialized enzymes and nutritional lifeforms onto nearly every world in this system."
  
  #########################################
  ### Orbital Artificial Ecosystem ########
  #########################################
  giga_tech_orbital_artificial_eco:0 "Ecossistemas orbitais"
  giga_tech_orbital_artificial_eco_desc:0 "Criar um ecossistema complexo totalmente funcional na órbita de um planeta é um grande desafio, mas tal tecnologia permite a construção de grandes ecossistemas orbitando um planeta para fins de pesquisa."
  
  orbital_artificial_eco_0:0 "$name_orbital_artificial_eco$Site"
  orbital_artificial_eco_0_DESC:0 "Este site servirá de base para construir um$name_orbital_artificial_eco$, que é uma grande estrutura que abriga um ecossistema totalmente artificial no qual podemos experimentar livremente."
  orbital_artificial_eco_0_MEGASTRUCTURE_DETAILS:0 "Uma estação muito grande que abriga um ecossistema completamente artificial para estudar a natureza." #megalistentry ORBITAL ARTIFICIAL ECOSYSTEM
  orbital_artificial_eco_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $orbital_eco_arcology_1_mod_tooltip$"
  
  orbital_artificial_eco_1:99 "$name_orbital_artificial_eco$: Gene Bank"
  orbital_artificial_eco_1_DESC:0 "Um$name_orbital_artificial_eco$completo, repleto de espécies importadas e também fabricadas graças à engenharia genética. Este ecossistema único pode ser modelado e deformado por nossos cientistas à vontade para estudar como funciona a natureza."
  
  orbital_artificial_eco_2:99 "$name_orbital_artificial_eco$: Exotic Enclosures"
  orbital_artificial_eco_2_DESC:99 "The exotic enclosures house a variety of simulated environments as well as facilities to ensure all the flora and fauna have sustainable numbers."
  
  orbital_artificial_eco_3:99 "$name_orbital_artificial_eco$: Planetary Testing"
  orbital_artificial_eco_3_DESC:99 "A complete $name_orbital_artificial_eco$, filled with imported species as well as fabricated ones thanks to genetic engineering. This unique ecosystem can be modeled and deformed by our scientists at will to study how nature functions."
  
  orbital_artificial_eco_ruined:0 "$name_orbital_artificial_eco$ Arruinado"
  orbital_artificial_eco_ruined_DESC:0 "Um$name_orbital_artificial_eco$arruinado. Costumava abrigar uma grande quantidade de espécies de bioengenharia em ambientes controlados, mas não mais. Pode ser possível restaurá-lo com as tecnologias corretas."
  orbital_artificial_eco_ruined_MEGASTRUCTURE_DETAILS:99 "$orbital_artificial_eco_ruined_DESC$"
  
  orbital_artificial_eco_restored:99 "$name_orbital_artificial_eco$"
  orbital_artificial_eco_restored_DESC:99 "$orbital_artificial_eco_3_DESC$"
  
  giga_dialog.1003.name:0 "$name_orbital_artificial_eco$ Arruinado"
  giga_dialog.1003.desc:0 "Um$name_orbital_artificial_eco$arruinado foi avistado orbitando um gigante gasoso no sistema [from.GetName]. Parece ter sofrido grandes danos, mas a estrutura externa ainda está um tanto intacta. Nossos cientistas acreditam que pode ser viável repará-lo se possuirmos as tecnologias adequadas. "
  giga_dialog.1003.a:0 "Interessante."
  #########################################
  ### Macroengineering Test Site ##########
  #########################################
  giga_tech_engineering_test_site:0 "Instalações de teste colossais"
  giga_tech_engineering_test_site_desc:0 "Construir uma instalação de teste na órbita de um planeta pode ser difícil e incrivelmente mortal. No entanto, as aplicações potenciais são muito promissoras."
  
  macro_test_site_0:0 "$name_eng_test_site$Site"
  macro_test_site_0_DESC:0 "Um grande canteiro de obras que abriga todos os materiais necessários para construir um grande Site da Estação de Macroengenharia, uma estrutura que nos permitirá fazer vários experimentos relacionados à engenharia no planeta abaixo."
  macro_test_site_0_MEGASTRUCTURE_DETAILS:0 "Uma grande estação orbitando um planeta para realizar experiências de engenharia livremente." #megalistentry MACROENGINEERING TEST SITE
  macro_test_site_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $orbital_test_site_1_mod_tooltip$"
  
  macro_test_site_1:99 "$name_eng_test_site$: Material Testing Bays"
  macro_test_site_1_DESC:0 "Esta estação, equipada com muitos laboratórios de ciências, bem como instalações de construção, nos permite realizar uma variedade de testes relacionados à nossa pesquisa de engenharia no planeta abaixo."
  
  macro_test_site_2:99 "$name_eng_test_site$: Material Simulations"
  macro_test_site_2_DESC:99 "The material simulations can help to further improve the efficiency of more practical material tests, allowing for an impressive array of simulated destruction and planetary devastation."
  
  macro_test_site_3:99 "$name_eng_test_site$: Orbital Firing Range"
  macro_test_site_3_DESC:99 "The firing ranges allow for near constant bombardment of the planet below, as well as long range slower hostile munitions delivery to other planets in the system, though they're far too slow to be used in combat scenarios."
  
  macro_test_site_ruined:0 "$name_eng_test_site$ Arruinado"
  macro_test_site_ruined_DESC:0 "Um$name_eng_test_site$ arruinado, construído eras atrás por uma corrida espacial. Enquanto o interior está totalmente destruído, o casco externo está praticamente intacto e pode ser reparado."
  macro_test_site_ruined_MEGASTRUCTURE_DETAILS:99 "$macro_test_site_ruined_DESC$"
  
  macro_test_site_restored:99 "$name_eng_test_site$"
  macro_test_site_restored_DESC:99 "$macro_test_site_3_DESC$"
  
  macro_test_site_1_dismantle:0 "Desmontar Megastrestrutura"
  macro_test_site_1_dismantle_DESC:0 "Esta megaestrutura será desconstruída e descartada para materiais."
  
  giga_dialog.403.name:0 "u$name_eng_test_site$ Arruinado"
  giga_dialog.403.desc:0 "Nossa nave de ciência avistou uma estação espacial bastante grande orbitando ao redor de um planeta no sistema [from.GetName]. Após uma investigação mais detalhada, parece que esta estação espacial é na verdade uma ruína$name_eng_test_site$, construída há muito tempo por algumas espécies desconhecidas. Esta estação espacial provavelmente serviu como um campo de testes para muitos experimentos no passado, mas desde então, infelizmente, caiu em ruínas. "
  giga_dialog.403.a:0 "Intrigante."
  
  #########################################
  ### Atmospheric Storm Observatory #######
  #########################################
  giga_tech_macro_scale_weather_manipulation:99 "Macro-Atmospheric Weather Manipulation"
  giga_tech_macro_scale_weather_manipulation_desc:99 "Construction of a facility dedicated to creating massive storms within the atmosphere of gas giants could allow us to study the effects far better than any natural storms. The applications of such storm research are very promising."
  
  atmosphere_shredder_0:99 "$gc_kilo$$name_atmosphere_shredder$: Storm Eye"
  atmosphere_shredder_0_DESC:99 "A large weather manipulation facility housing all the necessary materials to start an experimental atmosphere wide storm. The structure will allow for us to conduct various experiments on the gas giant itself, and collect valuable data from all over the system."
  atmosphere_shredder_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_kilostructure$ - $giga_list_category_science_production$\nGenerates £physics_research£ §YPhysics Research§! deposits on system planets.\n§LA large station orbiting a gas giant causing a permanent storm for studying and experimentation.§!"
  atmosphere_shredder_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - $orbital_atmosphere_shredder_1_mod_tooltip$"
  
  atmosphere_shredder_1:99 "$name_atmosphere_shredder$: Agitator Arms"
  atmosphere_shredder_1_DESC:99 "The colossal Agitator Arms allow for the strength of the planetside storm to be amplified, further increasing the potential for study."
  
  atmosphere_shredder_2:99 "$name_atmosphere_shredder$: Stabilizer Arms"
  atmosphere_shredder_2_DESC:99 "The stabilizer arms will allow for pockets of relative calm to be created in the storm, allowing for the safe recovery of drones and other automated machines sent into the storm to study it."
  
  atmosphere_shredder_3:99 "$name_atmosphere_shredder$: Laboratory Ring"
  atmosphere_shredder_3_DESC:99 "The laboratory ring houses the less delicate sensors of the station. The ring is meant to be immersed in the power of the storm allowing for a wealth of data to be recovered."
  
  atmosphere_shredder_complete_name:99 "$name_atmosphere_shredder$"
  
  atmosphere_shredder_ruined:99 "Ruined $name_atmosphere_shredder$"
  atmosphere_shredder_ruined_DESC:99 "A ruined $name_atmosphere_shredder$, constructed eons ago by a spacefaring race. While the storm control mechanism and internal components are destroyed, the external hull is mostly intact, and could be repaired."
  atmosphere_shredder_ruined_MEGASTRUCTURE_DETAILS:99 "$atmosphere_shredder_ruined_DESC$"
  
  atmosphere_shredder_restored:99 "$name_atmosphere_shredder$"
  atmosphere_shredder_restored_DESC:99 "$atmosphere_shredder_3_DESC$"
  
