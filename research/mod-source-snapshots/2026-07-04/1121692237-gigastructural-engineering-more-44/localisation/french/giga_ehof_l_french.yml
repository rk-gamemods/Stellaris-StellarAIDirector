  #############################################################################################################################################
  ### Special Projects ########################################################################################################################
  #############################################################################################################################################
  INVESTIGATE_CORE_ANOMALY:99 "Core Anomaly"
  INVESTIGATE_CORE_ANOMALY_DESC:99 "The exploration project for the core anomaly found in §H[from.GetName]§! has been approved. Our best [Owner.GetScientistPlural] and [Owner.GetEngineerPlural] are working to developing a machine able to reach the core anomaly, so that we can reveal its secrets."
  
  ehof_anomaly.10001.name:99 "Core Facility"
  ehof_anomaly.10001.desc:99 "The exploration to the center of §H[fromfrom.GetName]§! was successful. Our exploration team has discovered that the core anomaly within §H[fromfrom.GetName]§!, is, in fact, a gigantic abandoned research facility created by an unknown advanced civilization.\n\nThe core facility seems to be fully functional, but was slightly damaged in an unknown incident.\n\nBased on the results of our exploration, the facility was constructed in order to study the exotic conditions within §H[fromfrom.GetName]§!'s center. What happened to those who constructed the core facility is unknown.\n\nInvestigating the damage caused by the incident shows that the facility's superstructure is undamaged, and we could safely continue the research that was once performed here. Our [Owner.GetScientistPlural] request that we use the facility for our own interests, and say that it would be invaluable for our research."
  ehof_anomaly.10001.a:99 "Incredible. Prepare the core facility for re-establishment."
  ehof_anomaly.10001.b:99 "Dismantle the most valuable tech and leave the facility."
  
  ################################4
  
  EXPLORE_LARGE_STATION:99 "Damaged Space Station"
  EXPLORE_LARGE_STATION_DESC:99 "Our government has approved an exploration project for the damaged space station in the orbit of §H[from.GetName]§!, and our [Owner.GetScientistPlural] are now preparing an armed exploration team to investigate the station."
  
  ehof_anomaly.10002.name:99 "Abandoned Government Seat"
  ehof_anomaly.10002.desc:99 "The exploration team that explored the large space station in the orbit of §H[fromfrom.GetName]§! was able to determine its initial purpose.\n\nBased on the data the team was able to gather, the large space station served as the central governmental seat of §H[fromfrom.GetName]§!'s former civilization.\n\nThe civilization of §H[fromfrom.GetName]§! was on the verge of a global conflict due to tensions between the member countries of the transnational government - ones which ultimately led to a thermonuclear war, which, of course, devastated §H[fromfrom.GetName]§!. These tensions arose because of the lack of an important resource on §H[fromfrom.GetName]§!, which the former inhabitants appear to have called \"Gonva\".\n\nOur [Owner.GetScientistPlural] were unable to identify the resource solely based on the station's records, but those records indicated that it was essential for the function of almost every level of their society."
  ehof_anomaly.10002.a:99 "Horrible! Another society destroyed by its own greed."
  
  ################################
  
  STUDY_NATURAL_NETWORK:99 "Interconnected Plant Genus"
  STUDY_NATURAL_NETWORK_DESC:99 "Our [Owner.GetScientistPlural] prepare themselves to enter the forests of §H[from.GetName]§!, where they hope to find out more about the unique plant genus that is creating a network across the planet surface."
  
  ehof_anomaly.10003.name:99 "The Planet-Plant-Brain"
  ehof_anomaly.10003.desc:99 "Long-term study of the interconnected plant genus on §H[fromfrom.GetName]§! has led to an incredible revelation.\n\nThe plants are, in fact, behaving like a gigantic brain stretching around the entire globe. Singular plants form colonies that function like neurons or synapses. This \"Planet-Plant-Brain\" even appears to possess some primitive form of consciousness!\n\nAttempts to communicate with the brain have unfortunately failed. Our [Owner.GetScientistPlural] believe that the brain is either not advanced enough for logical operations like thoughts, or it is unable to communicate at all.\n\nRegardless of the brain's consciousness, its functionality gave us insight into advanced networking mechanics, which we can use to further technologies which benefit our own networks."
  ehof_anomaly.10003.a:99 "What an interesting discovery!"
  
  ################################
  
  EXPLORE_ABANDONED_STATION:99 "Asteroid Station"
  EXPLORE_ABANDONED_STATION_DESC:99 "Multiple armed exploration teams have been sent out in order to explore the seemingly abandoned asteroid station.\n\nThey are supposed to determine its initial purpose and search for traces of life that may have been missed by our sensors."
  
  ehof_anomaly.10004.name:99 "Enigmatic Forsaken Colony"
  ehof_anomaly.10004.desc:99 "Our investigation of the connected asteroid station has led to concerning discoveries that have yet to be fully understood.\n\nBased on our findings, the station was originally a fully self-sufficient colony, capable of housing and supporting hundreds of thousands of inhabitants.\n\nRecords found within the computer systems revealed that it served as a refuge for a civilization whose planet has been destroyed by an immense tectonic catastrophe. \n\nWorryingly, the station seems completely empty of any life apart from our exploration team. Not a single form of biological life has been found - not even microbes within the artificial atmosphere. It appears that the colony has been entirely scrubbed of life by an unknown event some time before our arrival.\n\nFurther examination of the colony's computer core indicate that records of a 17-minute time period recorded 32 years and 121 days ago have been irrevocably corrupted. It is possible that the incident which led to the vanishing of all life on the station happened within those 17 minutes.\n\nOur [Owner.GetScientistPlural] are discussing whether it would be preferable to retrieve any recoverable technology on the station and leave, or if it could be used as a valuable colony for our people."
  ehof_anomaly.10004.a:99 "The station is too useful to be left behind."
  ehof_anomaly.10004.b:99 "This place seems cursed. We better leave it!"
  
  ehof_anomaly.16.name:99 "The Vanishing"
  ehof_anomaly.16.desc:99 "This is terrible! We suddenly received reports from §H[fromfrom.GetName]§! about sudden, strange, and intense mental breakdowns of our colonists. The rate at which inhabitants began to have these breakdowns increased until the reports suddenly stopped.\n\nWe sent an investigation team to the colony, only to discover that, just like the original inhabitants of §H[fromfrom.GetName]§!, our colonists vanished through unknown causes.\n\nRecords aboard the station show the same corruption in a 17-minute period shortly after the final report was sent.\n\nThe reason for these abnormal events on §H[fromfrom.getName]§! remains a mystery."
  ehof_anomaly.16.a:99 "We should have known better..."
  
  ################################
  
  STUDY_PLASMATIC_LIFE:99 "Study the Plasmic Lifeforms"
  STUDY_PLASMATIC_LIFE_DESC:99 "Direct study of the plasmic lifeforms has been approved by our government.\n\nReinforced and sheltered units are being prepared to be deployed within the deadly environment of §H[from.GetName]§!, which can have surface temperatures up to 485° Celsius."
  
  ehof_anomaly.10005.name:99 "Anorganic Plasmic Life"
  ehof_anomaly.10005.desc:99 "Studying the plasmic lifeforms and observing their ecosystem has led to astonishing results! Analysis of their pseudo-genetic basis led to the revelation that these lifeforms are truly inorganic.\n\nThe conditions for the development of inorganic life are incredibly complex and rare, which is why almost none have been discovered before.\n\nThe unique biological composition of their cells makes use of intense high-temperature oxidation mechanisms, and a simple but still formidable liquid metal that serves as their 'blood', to operate metabolic processes.\n\nThis gives them the ability to survive and flourish within this extreme environment.\n\nSingle- and multicellular organisms have been discovered, all capable of asexual reproduction. No forms of sexual reproduction has been detected yet, but our [Owner.GetScientistPlural] want to launch a second investigation to find more complex organisms and maybe even advanced organisms, capable of social interactions."
  ehof_anomaly.10005.a:99 "Astonishing creatures. Expand the research."
  ehof_anomaly.10005.b:99 "We should leave this unique ecosystem unspoiled."
  
  INVESTIGATE_INTELLIGENT_PLASMATICS:99 "Search for Advanced Plasmic Organisms"
  INVESTIGATE_INTELLIGENT_PLASMATICS_DESC:99 "With governmental approval, our [Owner.GetResearchers] have started an intense and ambitious exploration of §H[from.GetName]§!'s plasmic ecosystem to find intelligent plasmic organisms potentially capable of social interaction."
  
  ehof_anomaly.10006.name:99 "Plasmic Society"
  ehof_anomaly.10006.desc:99 "Our exploration of §H[fromfrom.GetName]§!'s plasmic ecosystem had an amazing breakthrough!\n\nClose to the south pole of §H[fromfrom.GetName]§!, our [Owner.GetResearchers] encountered social plasmic beings. These creatures appear to be able to build simple structures using their bodies as tools, and are capable of communicating with each other and forming tiny packs. These packs increase the survivability of individual beings. Based on analyzed observational data, they are at a pre-hunter-gatherer stage of development. They are still far away from advanced social creatures, but it's an incredible discovery nonetheless.\n\nContinuing observation will be really useful for evolutionary biology and exobiological research."
  ehof_anomaly.10006.a:99 "Maybe one day we'll find even more creatures like these!"
  
  #################################
  #########RED TOXIC WORLD#########
  #################################
  
  ehof_red_toxic_digsite:99 "The Scarlet Scourge"
  ehof_red_toxic_digsite_desc:99 "High-intensity scanners that will use x-rays to penetrate the thick atmosphere are being prepared to scan the surface. Our [Owner.GetScientistPlural] hope that these scans will reveal the origin of the red fog that blankets this planet, as they speculate that it does not have a natural origin."
  
  ehof_red_toxin.41.name:99 "Poisoned Paradise"
  ehof_red_toxin.41.desc:99 "Our attempt to conduct an x-ray scan of §H[from.Planet.GetName]§! was a success.\n\nOur systems mapped an 82,844 square kilometer area of the surface. Forests and cities are located on the planets surface, or, at least, the remnants of them. From this we can determine that a civilization once existed on §H[from.Planet.GetName]§!, and at least plant life was once part of the planet's ecosystem.\n\nThe architecture and size of the buildings indicate that the civilization was substantially developed, but the absence of substantial orbital debris indicates they never achieved permanent presence beyond the planet.\n\nWhether the civilization is responsible for the red fog remains unknown.\n\nUnfortunately, a surface exploration will be necessary to find out more about what happened to the planet. Only finding records from the extinct civilization and samples of the surface and environment will tell us more about the red fog and its origin.\n\nThe red fog makes it very dangerous for organic lifeforms. Due to the danger posed to any expedition, advanced robotic exploration units are being used there instead, equipped with corrosion-resistant armor and energy shields."
  ehof_red_toxin.41.a:99 "Prepare the exploration team."
  
  ehof_red_toxin.42.name:99 "The Scarlet Scourge"
  ehof_red_toxin.42.desc:99 "The exploration of §H[from.Planet.GetName]§!'s surface was successful, and we have determined the nature of the red fog.\n\nCalled \"The Scarlet Scourge\" by the former inhabitants of §H[from.Planet.GetName]§!, it is an advanced synthetic toxin created by members of the former civilization of §H[from.Planet.GetName]§!.\n\nBy whom, and why, the toxin was created were facts unknown to the general population of the planet, and even examining confidential records of government and scientific institutions failed to reveal the origin of the Scarlet Scourge.\n\nAll that we know right now is that the toxin suddenly appeared at a location in the northern hemisphere named the \"ORIGIN site\", 321 galactic standard years ago, and within a year it had covered the entire planet, utterly destroying its biosphere.\n\nThe toxin is composed of particles ranging in diameter from 0.1 to 100 microns. This diversity of size makes it extremely difficult to contain or filter, while also enabling it to pervade through every level of the atmosphere. Most concerningly, the toxin appears able to self-replicate via as-yet-unknown means.\n\nOur [Owner.GetScientistPlural] believe further exploration of the ORIGIN site on §H[from.Planet.GetName]§! will answer our remaining questions about the Scourge."
  ehof_red_toxin.42.a:99 "We need to find out where the Scarlet Scourge came from."
  
  ehof_red_toxin.421.name:99 "ORIGIN Site Expedition"
  ehof_red_toxin.421.desc:99 "Our robotic exploration units are being replaced and prepared for exploring the ORIGIN site. The location might not only be the source of the Scarlet Scourge, but potentially even the place it was originally created."
  
  ehof_red_toxin.43.name:99 "Innovation Forge's Compound 23RCA"
  ehof_red_toxin.43.desc:99 "The investigation of the ORIGIN site revealed even more secrets about the Scarlet Scourge than we had anticipated.\n\nThe ORIGIN site, internally named \"Hazard Testing Ground Y-173\", was not the place the Scarlet Scourge was created, but rather a testing site utilized by the institution responsible for the toxin's creation. The site consists of an observation post embedded in the apex of a large dome, which in turn once enclosed a small towns and small forests. These were originally inhabited by test subjects of §H[from.Planet.GetName]§!'s dominant species, though fossil evidence indicates that other animal life was also present.\n\nComposed of advanced isolation materials, the dome was supposed to prevent the Scourge from leaking into the atmosphere. Unfortunately, even the toxin's creators underestimated its effects. The Scourge corroded the dome's material and entered into the atmosphere, heralding the beginning of the end for all life on §H[from.Planet.GetName]§!.\n\nData extraction and recovery from the damaged systems at the site indicate it was run by a privately-owned research and development organization named Innovation Forge.\n\nThe Scarlet Scourge (internally referred to as \"Compound 23RCA\") was tested at the ORIGIN site to study its effects on organic and inorganic matter within a realistic environment - members of the species present in the test were told that they were participating in a climate control experiment.\n\nThe records also revealed the original main facility of Innovation Forge, a location called \"the Repository\". This site was not just where the Scourge was originally created, but also the incubator for many of Innovation Forge's other great creations.\n\nOur [Owner.GetScientistPlural] want to explore the Repository in order to find out how the Scarlet Scourge was synthesized and uncover any other Innovation Forge research that could prove useful."
  ehof_red_toxin.43.a:99 "The data within the Repository could be really useful!"
  
  ehof_red_toxin.431.name:99 "The Repository"
  ehof_red_toxin.431.desc:99 "The Repository is the target of our final exploration on §H[from.Planet.GetName]§!. Armed robotic exploration units are being deployed for this mission.\n\nIf the Repository is truly the birthplace of Innovation Forge's greatest creations, it may be dangerous in ways we cannot yet anticipate."
  
  ehof_red_toxin.44.name:99 "The Source and the Solution"
  ehof_red_toxin.44.desc:99 "Our exploration of the Repository was a complete success.\n\nThe Repository is a gigantic facility built underneath a big mountain chain.\n\nLike the data we recovered from the ORIGIN site indicated, it was a treasure trove of technological innovation, with technology vastly superior to anywhere else on the planet.\n\nThe Repository was protected by internal security systems which turned out to be a challenge, even for our units, but after we overcame its security, we had free run of the facility.\n\nWe were able to locate the lab in which the Scarlet Scourge was originally created, and there, we able to find out everything there is to know about it.\n\nIt was the first fully-functioning prototype of a series of terraforming agents created by the Innovation Forge. These agents would be deployed via space vessels onto hostile but potentially habitable planets, in order to cleanse their atmosphere from hazardous substances - including biological ones.\n\nThe agent turned out to behave differently than expected, and in the end, proved too effective at its intended task.\n\nWithin the heart of the facility, we located an advanced intelligence that turned out to be an ensemble of the Innovation Forge's greatest [Owner.GetScientistPlural], who had uploaded their consciousness to escape the Scourge. They told us more about the Repository, the civilization of §H[from.Planet.GetName]§!, the Scarlet Scourge, and about their solution for the Scarlet Scourge crisis.\n\nAs the Scourge swept across the planet, they constructed a gigantic tower named \"the Catalyst\" close to the south pole. It was meant to cleanse the atmosphere from the Scarlet Scourge. Their initial attempt to do so failed because they were not able to find a way to stop the Scarlet Scourge from replicating, and they lacked the resources necessary for a second attempt.\n\nThe ensemble told us that our superior technology may enable us to determine how to defeat the Scourge's self-replication and cleanse the atmosphere.\n\nWe can now either purify this world and make it habitable once again, or use the Scarlet Scourge for our own means."
  ehof_red_toxin.44.a:99 "The Scourge is a monstrosity. Free the planet from it!"
  ehof_red_toxin.44.b:99 "The Scourge could be really useful..."
  
  ################################
  
  INVESTIGATE_ONE_ORBIT:99 "One Orbit"
  INVESTIGATE_ONE_ORBIT_DESC:99 "Only a short time after we arrived in the §H[root.solar_system.GetName]§! system, our sensors began to detect strange planetary arrangements.\n\nIt appears that the star system possesses two planets that both share the same orbit. Their distance from the star is almost exactly the same, making them perfect stellar antipodes.\n\nOur [Owner.GetScientistPlural] want to investigate these two planets further, in order to find out more about them and this strange arrangement."
  
  ehof_anomaly.10011.name:99 "One Paradise"
  ehof_anomaly.10011.desc:99 "By investigating the first of the two planets in the §H[root.solar_system.GetName]§! system, §H[fromfrom.GetName]§!, we have found out that it is a rare, extremely habitable Gaia world.\n\nIt possesses a higher-than-average mass, but a density typical to a rocky planet. The planetary ecosystem is of incredible variety.\n\nStudying this planet may be valuable for our biological research, but our focus lies on the study of §H[fromfrom.GetName]§!'s sibling planet."
  ehof_anomaly.10011.a:99 "On to the next one!"
  
  ################################
  
  INVESTIGATE_ONE_ORBIT_2:99 "One Orbit II"
  INVESTIGATE_ONE_ORBIT_2_DESC:99 "The investigation of §H[fromfrom.GetName]§! will show us how this strange planetary arrangement came about."
  
  ehof_anomaly.10012.name:99 "Paradise Twins"
  ehof_anomaly.10012.desc:99 "Our investigation of the second planet in the §H[root.solar_system.GetName]§! system, §H[fromfrom.GetName]§!, revealed something incredible.\n\n§H[fromfrom.GetName]§! has the same properties as its sibling planet - it is a Gaia world, too!\n\nThe two planets are both Gaia worlds, which share the same mass, density, obliquity, orbit, rotational speed and orbital speed. The only thing that differentiates one from the other is their ecosystem and the fact that they are not at the same location.\n\nThis entire system appears too unreal, and yet, it is here. The probability for such a planetary constellation to develop naturally is essentially zero. It must be of artificial origin, though no signs of the creators of this system were ever found..."
  
  ################################
  
  INVESTIGATE_SCARRED_PLANET:99 "The Scar"
  INVESTIGATE_SCARRED_PLANET_DESC:99 "Our [Owner.GetScientistPlural] intend to study the Scar's geological structure and material composition to find details on how it came about. Scanners are also analyzing the areas surrounding it to detect any unusual substances.\n\nCurrently, we suspect that the Scar may have been the result of some form of superweapon deployment."
  
  ehof_anomaly.10013.name:99 "Enormous Notch"
  ehof_anomaly.10013.desc:99 "Completing our investigation of the Scar proved our hypothesis correct. The Scar was, in fact, created by a massive weapon.\n\nWe've seen weapons on this scale before, but the specifics of the weapon used here make this case so fascinating. The geological structure of the Scar, its angle of incision into the planet's surface, its 60-kilometer depth, and the presence of unnatural substances within it all lead to the belief that the Scar was created by an enormous kinetic weapon.\n\nOur sensors also detected an irregular path of radiation winding throughout the entire canyon. However, this radioactive contamination is not the result of substances that are radioactive by themselves, like plutonium, but rather the result of exposure to intense gamma radiation. This leads to the revelation that the kinetic projectile that hit the planet's surface and created the Scar was also composed, at least partially, out of antimatter. The projectile appears to have been fully annihilated by its matter-antimatter reaction, so we were unable to determine anything further about its makeup.\n\nFurthermore, our [Owner.GetScientistPlural] have dated the age of the Scar to around 1.25 million years old. Because of its incredible age, we do not anticipate that we will ever know more about who made the weapon responsible, or why it was fired in the first place."
  
  ################################
  
  ehof_megastructure.016.name:99 "Mysterious Stone"
  ehof_megastructure.016.desc:99 "One of our science ships has discovered a large, very bright object next to the center of the §H[root.solar_system.GetName]§! system's gravity well. We originally took it to be a neutron star, as the energy emitted by the object is so intense that it interferes with our shields and sensors across the system.\n\nUpon closer examination, the object turned out to be a construct of currently unknown design, purpose, and origin. It appears to be a planet-sized squat cylinder with massive, enigmatic glyphs inscribed on its top and bottom surfaces, both of which emit extremely intense blue light.\n\nDeeper scans of the object reveal nothing about it, as the values returned by our sensors are bizarre and unintelligible. Direct investigation of the construct is impossible, as our sensors report the energy emitted by it is so immense that the temperature in its proximity ranges from a minimum of five million Kelvin to up to a trillion Kelvin at the glyphs.\n\nFor now, we'll have to leave the construct as it is."
  ehof_megastructure.016.a:99 "Tremendous!"
  
  ################################
  
  ehof_megastructure.017.name:99 "Primordial Pillar"
  ehof_megastructure.017.desc:99 "One of our science ships has discovered one of the enigmatic $PGATE_GALACTICS$! It is located inside the §H[root.solar_system.GetName]§! system.\n\nWe've only heard rumors about these constructs, but they are allegedly some kind of hyper-advanced gateway that allows travel to extragalactic systems."
  ehof_megastructure.017.a:99 "Fascinating!"
  
  ################################
  
  ehof_megastructure.018.name:99 "Black Hole Construct"
  ehof_megastructure.018.desc:99 "A damaged orbital structure is located in the core of the §H[root.solar_system.GetName]§!, one which appears to envelop the central black hole. Our initial survey indicates that the construct appears to be non-functional and abandoned. To determine its purpose, we'll have to explore the construct."
  ehof_megastructure.018.a:99 "Intriguing!"
  
  EXPLORE_RUINED_EHOF:99 "Explore the Black Hole Construct"
  EXPLORE_RUINED_EHOF_DESC:99 "The exploration project of the damaged black hole construct inside the §H[root.solar_system.GetName]§! system is ongoing. To determine its purpose, we will have to equip exploration units with gear capable of handling hard vacuum and intense gravity, and send them into the remains of the construct."
  
  ################################
  
  INVESTIGATE_ENIGMATIC_PATTERN:99 "An Enigmatic Pattern"
  INVESTIGATE_ENIGMATIC_PATTERN_DESC:99 "Only the crew of the §H[ehof_code_fleet.GetName]§! remembers the strange transmission. Fortunately, they were able to record some aspects of it on portable devices, though this is hardly a comprehensive analysis. Their reports should be investigated further.\n\nWhile no one has any idea where the energy flash that hit the §H[ehof_code_fleet.GetName]§! originated, it happened in one of the already strange $ehof_cohesive$ systems. Our science vessels have been advised to keep a look out for more projections of this enigmatic pattern while studying $ehof_cohesive$ systems."
  
  ehof_reality_code.002.name:99 "A Code Sequence?"
  ehof_reality_code.002.desc:99 "We have made our first breakthrough studying the $ehof_ep$.\n\nIt is a high-energy information transmission sent from an indeterminate location and directed at our ships. Furthermore, it is evidently capable of interfering with electronic systems, as it causes the strange behavior and power loss we've observed.\n\nIn order to learn more about it, we have outfitted our science ships with two new pieces of technology: scanners tuned to frequencies found in the $ehof_ep$, and $ehof_closed_modular$s. The $ehof_ep$ scanners are hardened and equipped with experimental information processing units specifically designed to withstand power surges and buffer overflow caused by $ehof_ep$ transmissions.The $ehof_closed_modular$s are manually activated, independently powered systems designed to quickly reactivate disabled systems aboard a ship.\n\nWith these upgrades, our science ships can safely receive and analyze transmissions of the $ehof_ep$."
  
  ################################
  
  EXPLORE_CREATOR_PLANET:99 "Exploration of the $ehof_the_sphere$"
  EXPLORE_CREATOR_PLANET_DESC:99 "Now that we have gained access to the interior of the $ehof_the_sphere$, we can finally unveil its secrets. Who knows what marvels and mysteries we'll discover inside it!"
  
  ehof_anomaly.10417.name:99 "Microverse in the Shell"
  ehof_anomaly.10417.desc:99 "At last, we have uncovered the secrets of the $ehof_the_sphere_named$!\n\nIt contains what that can only be described as a miniature universe. Even more incredibly, the spacetime volume of this \"microverse\" is inversely folded relative to outside space, making the volume within the $ehof_the_sphere$ several thousand times larger than what its exterior surface area would imply.\n\nThis microverse is divided into outer and inner volumes. The outer volume has a vacuum energy density identical to that of the outside universe. It is filled with hundreds of stars, along with countless constructs that harvest stellar radiation, vacuum energy, and even esoteric extradimensional forces. The inner volume appears to be an empty void with a much higher vacuum energy density than the outer volume. We cannot analyze it further.\n\nOur [Owner.GetScientistPlural] have concluded that the volumes are structured to generate ridiculous amounts of energy. This energy is first extracted in the outer volume and then siphoned into the inner volume. The inner volume contains at least 10^49 Joules, equivalent to the total mass-energy of a thousand or more stars."
  ehof_anomaly.10417.a:99 "This is the greatest scientific discovery of all time!"
  
  ehof_anomaly.10418.desc:99 "We have further determined that the $ehof_ep$ transmitters and $PGATE_GALACTICS$ we've encountered during our pursuit of the $ehof_epcs$ are all subsidiary to the $ehof_the_sphere$. These structures are sent energy and data broadcasts from the $ehof_the_sphere_named$ via micro-wormholes. That data, of course, is the $ehof_ep$, which in turn controls the $ehof_ep$ transmitter and $PGATE_GALACTIC$ network.\n\nBy monitoring the destinations of these transmissions, we have found that there are many more $ehof_cohesive$ systems outside the galaxy than previously anticipated! The most astonishing revelation is that the $ehof_the_sphere_named$ is not the only source of these transmissions - there are more located beyond our galaxy.\n\nUnfortunately, we were still not able to determine the original purpose of the $ehof_the_sphere$ and its network, or any information about who created it. Whatever the goal was, it needed more energy than thousands of stars could generate in their entire lifetime!"
  
  #############################################################################################################################################
  ### Anomalies ###############################################################################################################################
  #############################################################################################################################################
  tremendous_ring_system_category:99 "Anomalous Gas Giant"
  tremendous_ring_system_category_desc:99 "The gas giant §H[from.GetName]§! in the §H[root.solar_system.GetName]§! system displays uncommon mass distributions and scale properties.\n\nOur scientists would like to investigate the planet in order to find out more about this planetary anomaly."
  
  ehof_anomaly.01.name:99 "Tremendous Ring System"
  ehof_anomaly.01.desc:99 "We have discovered that the gas giant §H[from.GetName]§! possesses a gigantic ring system, much bigger than the average ring system.\n\nThe ring system has an estimated diameter of about 3.78 million kilometers, surpassing the planets own diameter of 171,557 kilometers by many magnitudes.\n\nHow such an impressive ring system has formed is a subject of current analytic cosmological computation research and celestial mathematics."
  ehof_anomaly.01.a:99 "Fascinating."
  
  ################################
  
  methane_oceans_category:99 "\"Not-so-barren\" World"
  methane_oceans_category_desc:99 "The scanners of our science ship detected anomalous properties on the surface of the barren planet §H[from.GetName]§! in the §H[root.solar_system.GetName]§! system.\n\nOur scientists want to investigate the planet in order to find out more about this planetary anomaly."
  
  ehof_anomaly.02.name:99 "Methane Oceans"
  ehof_anomaly.02.desc:99 "Our scientists have discovered that the seemingly barren planet §H[from.GetName]§! is not entirely barren.\n\nSmall oceans of liquid methane are located in the great asteroid impact craters of §H[from.GetName]§!. The oceans can exist because the surface temperature in these craters is between -193° Celsius and -143° Celsius, depending on the day/night cycle of the world.\n\nThe methane oceans of §H[from.GetName]§! may contain simple forms of anorganic, biological life.\n\nIf any form of life is present in the methane oceans, is up to debate within the exobiological research community."
  ehof_anomaly.02.a:99 "Exciting."
  
  ################################
  
  nanite_deserts_category:99 "Strange Deserts"
  nanite_deserts_category_desc:99 "The surface of the desert planet §H[from.GetName]§! in the §H[root.solar_system.GetName]§! system displays strange properties.\n\nBased on our science ship's scans, our scientists want to send an exploration team in order to find out more about this planetary anomaly."
  
  ehof_anomaly.03.name:99 "Nanite Deserts"
  ehof_anomaly.03.desc:99 "We have discovered that half of the deserts of §H[from.GetName]§! are composed of nanomachines imitating sand particles.\n\nThe other half of the deserts are composed of natural granular materials, like most of the deserts on other planets in the galaxy are.\n\nBased on direct analysis of the sampled \"nanite-sand\", we have discovered that the nanomachines do not seem to possess any higher functions.\n\nThe nanite-sand looks identical to the 'normal' sand found other natural deserts and can only be distinguished via microscopic analysis.\n\nThe use of these nanomachines and why only half of §H[from.GetName]§!'s deserts are made out of them remains a mystery."
  ehof_anomaly.03.a:99 "Amazing!"
  
  ################################
  
  coreless_planet_category:99 "Coreless Planet"
  coreless_planet_category_desc:99 "The barren planet §H[from.GetName]§! in the §H[root.solar_system.GetName]§! system displays strange properties in regards to its inner composition and structure.\n\nFurther investigation is required in order to find out more about this planetary anomaly."
  
  ehof_anomaly.04.name:99 "Core Anomaly"
  ehof_anomaly.04.desc:99 "Our scientists have discovered that the planet §H[from.GetName]§! has no real core.\n\nIt totally lacks an iron core and it's rock mantle reaches entirely down to the location where its core should be. In the middle of the planet, an anomalous structure is located.\n\nOur scientists are unsure if it composed of an exotic material or if it's an artificial structure.\n\nThey want to send an exploration team to the inside of the planet, to learn more about this anomaly, but it will take time and resources to reach the facility."
  ehof_anomaly.04.a:99 "Impressive, send out the exploration team."
  ehof_anomaly.04.b:99 "We shouldn't do that."
  
  ################################
  
  cataclysmic_star_category:99 "Intense Star"
  cataclysmic_star_category_desc:99 "The star §H[from.GetName]§! is emitting intense, irregular energy signatures and is displaying an anomalous mass distribution.\n\nFurther investigation is required in order to find out more about this stellar anomaly."
  
  ehof_anomaly.05.name:99 "Cataclysmic Variable Star"
  ehof_anomaly.05.desc:99 "We have discovered that the star §H[from.GetName]§! contains a §HD-class§! star in its core, a §HWhite dwarf§! star remnant.\n\nThe white dwarf increased the mass of the star by a factor of 1.2 and is located within the radioactive zone of the star, its \"mantle\".\n\nThe §HWhite dwarf§! is leading to extreme instabilities in §H[from.GetName]§!'s core, which appears to be the cause of intense, frequent and irregular plasma outbursts, which eject multiple billions of tonnes of stellar mass into space.\n\nThe §HD-class§! star probably collided with §H[from.GetName]§! a few million years ago and was completely consumed by the star.\n\n§H[from.GetName]§!'s instabilities will lead to a much earlier death for the star, most likely within the next 100,000 years."
  ehof_anomaly.05.a:99 "Terrifying!"
  
  
  ################################
  
  oxygen_world_category:99 "Anomalous Frozen Planet"
  oxygen_world_category_desc:99 "Our science ship has detected anomalous properties in the surface ice of §H[from.GetName]§!, in the §H[root.solar_system.GetName]§! system.\n\nOur scientists would like to send an exploration team to the planet, in order to find out more about this planetary anomaly."
  
  ehof_anomaly.06.name:99 "Crystallized Oxygen World"
  ehof_anomaly.06.desc:99 "Our scientists have discovered that the surface ice of §H[from.GetName]§! is not water ice or dry ice, but instead crystallized oxygen.\n\nThe average surface temperature of §H[from.GetName]§! is extremely low and 51 Kelvin below the melting point of oxygen.\n\nThe requirements for stable solid oxygen to exist within a star system are extremely difficult to achieve.\n\n§H[from.GetName]§! is truly a unique world. §H[from.GetName]§! will be a central research site for future projects in low-temperature physics."
  ehof_anomaly.06.a:99 "Astonishing!"
  
  ################################
  
  abandoned_seat_category:99 "Devastated World"
  abandoned_seat_category_desc:99 "A tomb world called §H[from.GetName]§! has been discovered by one of our science ships.\n\nIt is located in the §H[root.solar_system.GetName]§! and possesses a small ring composed of space debris, which appears to be the remnants of former satellites and space stations.\n\nOur [Owner.GetScientistPlural] believe that the same event that devastated the surface of §H[from.GetName]§! is also responsible for the destruction of the satellites and space stations.\n\nThey would like to explore the ring of debris and the planet itself in order to find out more about what happened to the world."
  
  ehof_anomaly.07.name:99 "Damaged Space Station"
  ehof_anomaly.07.desc:99 "Within the ring of debris around §H[from.GetName]§!, our [Owner.GetScientistPlural] discovered a large space station.\n\nThe scans from our science ship hint that the space station shows signs of moderate structural damage and appears to be abandoned.\n\nThe undamaged structures of the station display a unique aesthetic compared to the rest of the space debris.\n\nOur [Owner.GetScientistPlural] assume that the station was of great importance to the civilization, that once inhabited its now destroyed world.\n\nThey want to investigate the station further, in hope of discovering what happened to §H[from.GetName]§!."
  ehof_anomaly.07.a:99 "Interesting, investigate the station!"
  ehof_anomaly.07.b:99 "Not all secrets have to be revealed."
  
  ################################
  
  natural_network_category:99 "Thinking Planet?"
  natural_network_category_desc:99 "We are detecting strange signals all over the habitable world §H[from.GetName]§! in the §H[root.solar_system.GetName]§! system.\n\nThe signals are similar to the brain waves of animal life, and our [Owner.GetScientistPlural] are unsure whether the planet is truly \"alive\", or if their instruments are being interfered with.\n\nFurther investigation is needed in order to discover more about this planetary anomaly."
  
  ehof_anomaly.08.name:99 "Natural Global Network"
  ehof_anomaly.08.desc:99 "We have discovered that §H[from.GetName]§! is covered by a gigantic network of interconnected plant colonies across the planet.\n\nThe network is embodied by one single genus of plants, the species of which seem to have the ability to connect to each other via their roots. This genus is dominating the planet, with it making up slightly over half of the global flora. They are the source of the strange signals which were detected by our science ship.\n\nOur [Owner.GetScientistPlural] assume that the network has at least a minor form of quasi-neurological activity, though this activity should still be distinct from animal neural patterns due to its nature.\n\nOur [Owner.GetScientistPlural] want to expand the research on the plants in order to find out more about them and the global network."
  ehof_anomaly.08.a:99 "Fascinating, expand the research on the plants!"
  ehof_anomaly.08.b:99 "Let the plants be plants."
  
  ################################
  
  connected_asteroid_category:99 "Asteroid Station"
  connected_asteroid_category_desc:99 "Our surveyors have located an unnatural formation with an anomalous mass distribution and composition in the large asteroid field spread around the §H[root.solar_system.GetName]§! system.\n\nOur [Owner.GetScientistPlural] want to investigate this anomaly to find out more about it."
  
  ehof_anomaly.09.name:99 "Connected Asteroid Station"
  ehof_anomaly.09.desc:99 "It was revealed that the unnatural formation in the asteroid field of the §H[root.solar_system.GetName]§! system is a huge space station, composed of multiple asteroids secured together via massive struts and transit tubes.\n\nBased on our latest scans, the station appeared to be abandoned and undamaged. Further investigation is needed in order to confirm this observation. Our [Owner.GetScientistPlural] are requesting to explore inside of the station in order to find out more."
  ehof_anomaly.09.a:99 "Go ahead, but be careful."
  ehof_anomaly.09.b:99 "Just ignore the station."
  
  ################################
  
  hot_society_category:99 "Inhabited Molten Planet"
  hot_society_category_desc:99 "Signs of life-like activity have been detected on the surface of the molten planet §H[from.GetName]§!.\n\nOrganic lifeforms can not usually survive within such an incredibly hostile environment, and certainly would not naturally develop in one.\n\nFurther investigation is required in order to discover more about the anomalous activity on this molten world."
  
  ehof_anomaly.10.name:99 "Plasmic Lifeforms"
  ehof_anomaly.10.desc:99 "Remote investigation of the anomalous activity on §H[from.GetName]§! lead to fascinating results.\n\nThe planet is indeed inhabited by a unique form of life which our xenobiologists have termed \"Plasmic Lifeforms\". They appear to be composed of a pseudo-organic plasma which functions similarly to the bodies of organic lifeforms. If they are carbon-based, they could theoretically count as organic lifeforms, if not, they may be a form of extremely rare anorganic lifeforms.\n\nMany different kinds of these plasmic lifeforms live on this world. Direct study of the planet's plasmic biosphere is needed, though it will be dangerous due to the planet's deadly environment."
  ehof_anomaly.10.a:99 "Fascinating! Expand the study of these lifeforms."
  ehof_anomaly.10.b:99 "We shouldn't risk our [Owner.GetScientistPlural]' lives and resources for that."
  
  ################################
  
  intoxicated_world_category:99 "The Red Planet"
  intoxicated_world_category_desc:99 "An as-yet unseen type of world has been located in the §H[root.solar_system.GetName]§! system.\n\nBased on initial long-distance analysis, it is probably a toxic world, but direct investigation is required to determine the planet type."
  
  ehof_anomaly.11.name:99 "Red Toxic World"
  ehof_anomaly.11.desc:99 "Through direct investigation of §H[from.GetName]§!'s atmosphere, we have discovered that the planet is in fact a toxic world. The color of the planet, or to be more specific, its atmosphere, is caused by airborne particulate.\n\nChemical analysis of the particles shows that they are composed of copper, many complex carbon compounds, phosphorus, sulfur, cobalt, and even actinides. The substance is radioactive, corrosive, and aggressively adheres to most other substances.\n\nBesides its terrible lethality to any organic lifeform, it is also extremely dense and opaque, blocking light and lower-energy radiation from reaching the planet's surface. These factors combined make it incredibly difficult to analyze the surface in any detail.\n\nOur [Owner.GetResearchers] request the use of high-intensity scanners to analyze the planet."
  ehof_anomaly.11.a:99 "How terrifying and yet fascinating! Try to penetrate the atmosphere."
  ehof_anomaly.11.b:99 "It's probably better if we don't know what's behind the fog."
  
  ################################
  
  scarred_planet_category:99 "The Scar"
  scarred_planet_category_desc:99 "An anomalous geologic formation has been spotted on a barren planet within the §H[root.solar_system.GetName]§! system -  a gigantic canyon on the planet's surface. The only canyon on the planet's surface, in fact. This lack of other ravines make it unlikely that this canyon is the result of natural processes or grazing impacts with meteors.\n\nOur geologists are requesting further data."
  
  ehof_anomaly.12.name:99 "The Scar"
  ehof_anomaly.12.desc:99 "We were able to confirm that the canyon on §H[from.GetName]§! is not a natural formation. The structure of the canyon itself indicates that it can't be natural - it stretches across a sixth of the planet's surface and reaches down into its upper mantle. If our [Owner.GetResearchers]' leading theory is correct, the planet's ring may be made up of matter that originally filled the canyon.\n\nWe haven't found the cause yet, but deeper analysis of the planetary material of the scar and the planetary ring should give us clues for what was responsible."
  ehof_anomaly.12.a:99 "What could have formed such a vast canyon?"
  ehof_anomaly.12.b:99 "No time for geology. Leave."
  
  ################################
  
  ehof_anomaly.13.name:99 "One Orbit"
  ehof_anomaly.13.desc:99 "Only a short time after we arrived in the §H[root.solar_system.GetName]§! system, our sensors noted a strange planetary arrangement. It appears that the star system possesses two planets which share the same orbit.\n\nOur [Owner.GetScientistPlural] want to investigate these two planets in order to try and understand how this strange orbital arrangement came to be."
  
  #############################################################################################################################################
  ### Digsites ################################################################################################################################
  #############################################################################################################################################
  #########################################
  ### Reality Code ########################
  #########################################
  reality_code:99 "Reality Code"
  ehof_closed_modular:99 "closed modular system"
  ehof_the_sphere:99 "§BSphere§!"
  ehof_the_spheres:99 "§BSphere's§!"
  ehof_the_sphere_named:99 "Everchanging"
  ehof_the_sphere_nameds:99 "Everchanging's"
  ehof_ep:99 "Enigmatic Pattern"
  ehof_eps:99 "$ehof_ep$s"
  ehof_epcs:99 "$ehof_ep$ Code Sequence"
  
  # Introduction to event chain
  ehof_reality_code.1.name:99 "An Enigmatic Pattern"
  ehof_reality_code.1.desc:99 "We've received a strange report from the §H[ehof_code_fleet.GetName]§!.\n\nDuring routine investigations within §H[ehof_code_fleet.solar_system.GetName]§!, the ship was hit by an intense pulse of energy. The ship's main power cut out, and the vessel lay dormant for six hours.\n\nThankfully, the backup power core was undamaged, and the crew were able to activate it and maintain life support until the main systems could be brought back online.\n\nJust as the ship regained full functionality, bizarre events began to take place on board. Reports describe all the systems independently reactivating and operating uncontrollably, as if the ship was possessed. Monitors began to display enigmatic but ordered patterns. Automatic doors closed and opened in sync with the monitor displays, and internal comms blared repeating sounds.\n\nThis $ehof_ep$, as the [Owner.GetScientistPlural] on board termed it, has not manifested since. We must investigate this mystery further."
  
  # Event chain (Situation Log)
  ehof_p4_chain_title:99 "$reality_code$"
  ehof_p4_chain_desc:99 "Equipped with the necessary technologies, our science ships are now capable of safely receiving and processing transmissions of $ehof_eps$.\n\nWe must continue exploring the $ehof_cohesive$ systems to seek out further transmissions of the $ehof_ep$."
  
  # Point Of Interest For CPlanet system
  ehof_mega_chain_1_poi:99 "The Origin"
  ehof_mega_chain_1_poi_desc:99 "It appears that the $ehof_ep$ originates from this location."
  
  #############
  ### Toxic ###
  #############
  # Anomaly
  code_1_cat:99 "Reality Code - Toxic World"
  code_01_category_desc:99 "§H[this.GetName]§! detected a transmission from the §H[from.solar_system.GetName]§! system. Like the previous transmission, it disabled the ship's main systems, but this time, the ship's $ehof_closed_modular$ was able to restore it to full functionality after a short time. The ship's [Owner.GetScientistPlural] have labeled this phenomenon the $ehof_epcs$.\n\nAfter the ship was brought back online, its $ehof_ep$ scanners were able to locate the transmission's origin: a toxic world our surveyors have named §H[from.GetName]§!.\n\nFurther surveys incorporating the $ehof_ep$ scanners should be able to further pinpoint the transmission's source. Since the transmission was very brief and has not repeated, it may take some time to do this."
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.101.name:99 "Reality Code - Toxic World"
  ehof_reality_code.101.desc:99 "§H[this.GetName]§! was able to locate the origin of the $ehof_ep$ transmission sent from §H[from.planet.GetName]§!: it was sent from a site within the crust of the planet's southern hemisphere.\n\nAn excavation will be necessary to reach the location of the source. High temperatures and the toxic atmosphere will make this more difficult, but with proper equipment, it shouldn't be much of an issue.\n\nWe'll have to put the necessary time and resources into the project to get the answers we're looking for."
  
  # Initial
  code1_digsite:99 "Reality Code - Toxic Excavation"
  code1_digsite_desc:99 "§H[this.GetName]§! was able to locate the origin of the $ehof_ep$ transmission sent from §H[from.planet.GetName]§!: it was sent from a site within the crust of the planet's southern hemisphere.\n\nAn excavation will be necessary to reach the location of the source. High temperatures and the toxic atmosphere will make this more difficult, but with proper equipment, it shouldn't be much of an issue.\n\nWe'll have to put the necessary time and resources into the project to get the answers we're looking for."
  
  # Stage 1
  ehof_reality_code.111.name:99 "Reality Code - Toxic Excavation I"
  ehof_reality_code.111.desc:99 "To protect the dig site from §H[from.planet.GetName]'s§! hazardous atmosphere, an isolation dome made from corrosion- and heat-resistant materials was built around the proposed drill shaft site.\n\nAs the source is located only a few dozen kilometers below the surface, a conventional borer can be used to drill a tunnel to its location. After the hole has been drilled, a manned research unit will be sent down the hole to investigate the source.\n\nThe excavation can now begin."
  ehof_reality_code.111.a:99 "Let's get going."
  
  # Stage 2
  ehof_reality_code.112.name:99 "Reality Code - Toxic Excavation II"
  ehof_reality_code.112.desc:99 "The borer has finished drilling a tunnel down to the transmitter's location. After its return, the on-site team descended to examine the source in person.\n\nThe location itself is quite strange. Close to the source, the crust material gave way to a hollow chamber with some sort of octahedral construct in the center.\n\nThe construct appears to be projecting some sort of impenetrable shield. Stopped from exploring further, initial investigation of the object's surface revealed that it is composed of an unknown material at a temperature barely above absolute zero. At such a low temperature, the state of the object can almost be considered as frozen in time. How and why the construct can reach this temperature is unknown.\n\nScanners cannot penetrate the construct's surface and detect no signs of radiation beyond average field excitations - and transmissions of the $ehof_ep$. The only way we can find out more is by finding a way past the shield and into the object."
  
  # Stage 3
  ehof_reality_code.113.name:99 "Reality Code - Toxic Excavation III"
  ehof_reality_code.113.desc:99 "It took quite some time to access the object, but the wait paid off.\n\nAfter many different attempts to find a way in, the team applied a combination of gravitoelectromagnetic waves at a frequency and amplitude that mimics the $ehof_ep$, in hopes that the object would react to it - and it did!\n\nThe shield powered down, and an entrance manifested on one of the object's surfaces. Within the octahedron, the team found an incredibly complex mechanism.\n\nAfter intensely studying it, they were able to determine the structure's overall function. It is not the source of the $ehof_ep$, but rather, an amplifier and repeater for it. The sequence is transmitted via gravitoelectromagnetic waves to a $PGATE_GALACTIC$ within the same system, whereupon it seems to dissipate entirely.\n\nThe team successfully extracted a fragment of the $ehof_epcs$ from this structure's databank.\n\nIn addition, they've also made an astonishing discovery about octahedron's material composition. It is primarily made of a novel self-replicating and self-regenerating substance that shares several properties with §HLiving Metal§! and §HNanites§!!\n\nLike the former, it can maintain its structure in radically changing environmental conditions; like the latter, it can absorb energy and matter to replicate itself. Interestingly, it seems to possess some awareness of its environment, though we haven't been able to quantify how and to what degree this is the case. It also appears nonreactive to, and unable to utilize, §HDark Matter§! and $giga_sr_negative_mass$.\n\nBased on these traits, it possesses incredible potential for many fields."
  
  #################
  ### Shattered ###
  #################
  # Anomaly
  code_2_cat:99 "Reality Code - Shattered World"
  code_02_category_desc:99 "Another transmission of the $ehof_epcs$ has been received by §H[this.GetName]§! in the §H[from.solar_system.GetName]§! system. Just like the previous two times, the transmission disabled the ship. This time, however, an improved $ehof_closed_modular$ was able to restore the ship's functionality within a few minutes.\n\nThe $ehof_ep$ scanners were able to identify the source of the transmission inside the system: the shattered planet §H[from.GetName]§!. The $ehof_ep$ scanners aboard the §H[this.GetName]§! will be able to locate the exact source on (or within) the planet, but it will take some time to do so."
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.201.name:99 "Reality Code - Shattered World"
  ehof_reality_code.201.desc:99 "Our team has determined the origin of the $ehof_ep$ transmission sent from the planet §H[from.planet.GetName]§!: deep within the largest chunk of the planetary remnant.\n\nThis excavation will prove more challenging than the first one, not only due to the source being located deeper, but because of the dangerous and unstable conditions within the planet's gravity well. The fragment we'll be excavating on could break apart or collide with other fragments.\n\nCaution is advised."
  
  # Initial
  code2_digsite:99 "Reality Code - Shattered Excavation"
  code2_digsite_desc:99 "Our team has determined the origin of the $ehof_ep$ transmission sent from the planet §H[from.planet.GetName]§!: deep within the largest chunk of the planetary remnant.\n\nThis excavation will prove more challenging than the first one, not only due to the source being located deeper, but because of the dangerous and unstable conditions within the former planet's gravity well. The fragment our excavation is being conducted on could break apart or collide with other fragments with little warning.\n\nCaution is advised."
  
  # Stage 1
  ehof_reality_code.211.name:99 "Reality Code - Shattered Excavation I"
  ehof_reality_code.211.desc:99 "To protect the site from asteroid impacts and earthquakes, the excavation team has set up shield generators and anchored a superstructure into the surrounding crust.\n\nWith the site secured, the team has prepared a manned drilling unit for deployment."
  
  # Stage 2
  ehof_reality_code.212.name:99 "Reality Code - Shattered Excavation II"
  ehof_reality_code.212.desc:99 "The manned drilling unit has reached the $ehof_ep$ transmission's origin. Just like the previous excavation, this site is a structural void surrounding an octahedral object. This leads to the assumption that the octahedron fulfills an unknown purpose compared to other polyhedra, and that any subsequent sites will also be constructed the same way.\n\nScans of the source indicate it is identical to the first one, so our team will attempt to open it with the same \"passphrase\" we used previously."
  
  # Stage 3
  ehof_reality_code.213.name:99 "Reality Code - Shattered Excavation III"
  ehof_reality_code.213.desc:99 "Though the steps necessary to enter the octahedron were the same, it took quite some time to actually gain access.\n\nIt didn't react to the gravitoelectromagnetic wavelengths we'd employed on the prior source. After tuning additional wavelengths with new frequencies and amplitudes, though, the team found the correct key.\n\nOnce inside, the team extracted another $ehof_epcs$ fragment. By combining it with the first two fragments, they were able to gain limited access to the octahedron's databank and retrieve some information about the $ehof_ep$, the $PGATE_GALACTICS$, and $giga_sr_sentient_metal$.\n\nThe $PGATE_GALACTICS$ serve as interstellar transmitters for the $ehof_epcs$. As all known $PGATE_GALACTICS$ appear dormant, we can assume that some specific property of the $ehof_ep$ activates them.\n\nThe team has also found information regarding $giga_sr_sentient_metal$. The material is apparently is governed by an advanced distributed intelligence responsible for its incredible adaptability and awareness. They were able to provide new commands to the local intelligence network, causing the octahedron to recombine into a triangular pyramid of equivalent mass.\n\nThis discovery could lead to the development of specialized $giga_sr_sentient_metal$ components, like self-healing ship armor or super-strong building materials - and those only scratch the surface of its potential applications.\n\nThe team is now ready to return to the surface."
  
  ##############
  ### Frozen ###
  ##############
  # Anomaly
  code_3_cat:99 "Reality Code - Frozen World"
  code_03_category_desc:99 "The §H[this.GetName]§! recorded another transmission of the $ehof_epcs$ from within the §Hfrom.solar_system.GetName]§! system. On-board [Owner.GetScientistPlural] determined the transmission originated from a frozen planet named §H[from.GetName]§!\n\n. The exact location on or inside the planet must to be determined by further investigation."
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.301.name:99 "Reality Code - Frozen World"
  ehof_reality_code.301.desc:99 "§H[root.GetName]§! has determined the location of the $ehof_ep$ transmitter on §H[from.planet.GetName]§!.\n\nLike the previous two, is it buried, this time under the northern ice cap and planetary crust below - and the depth these transmitters sit at continues to increase. Specialized tools will be needed to dig through the icy surface of the world."
  
  # Initial
  code3_digsite:99 "Reality Code - Frozen Excavation"
  code3_digsite_desc:99 "Our team has determined the location of the $ehof_ep$ transmitter on §H[from.planet.GetName]§!.\n\nLike the previous two, is it buried, this time under the northern ice cap and planetary crust below - and the depth these transmitters sit at continues to increase. Specialized tools will be needed to dig through the icy surface of the world."
  
  # Stage 1
  ehof_reality_code.311.name:99 "Reality Code - Frozen Excavation I"
  ehof_reality_code.311.desc:99 "To protect the excavation from the planet's shearing winds and freezing temperatures, a large heat-retaining dome was constructed and several heat sources were installed within. The team has adjusted the manned drilling unit deployed on the previous excavation to operate in these harsh conditions, and it is now ready to deploy."
  
  # Stage 2
  ehof_reality_code.312.name:99 "Reality Code - Frozen Excavation II"
  ehof_reality_code.312.desc:99 "The team has reached the transmitter. As expected, everything is just like the previous two: a void of space with an octahedron located in its center.\n\nThe team is setting up gravitoelectromagnetic wave projectors to unlock this octahedron."
  
  # Stage 3
  ehof_reality_code.313.name:99 "Reality Code - Frozen Excavation III"
  ehof_reality_code.313.desc:99 "The team was able to gain entrance to the octahedron and extract another fragment of the $ehof_ep$ without difficulty.\n\nUsing the fragment, they were able to access more of the transmitter's systems and discover information on the $PGATE_GALACTICS$ - specifically, how to activate them!\n\nUnsurprisingly, the $ehof_epcs$ is the key to utilizing these strange structures. The gravitoelectromagnetic waves that transport the $ehof_ep$ must possess a specific amplitude and frequency to activate a $PGATE_GALACTIC$. Even slight variance from the acceptable parameters will cause the $PGATE_GALACTIC$ to ignore an incoming $ehof_ep$ transmission, likely in order to prevent other space phenomena from accidentally activating the $PGATE_GALACTICS$.\n\nThe team was also able to find more advanced control schema for $giga_sr_sentient_metal$. They believe that it might now be possible to use $giga_sr_sentient_metal$ to construct or repair other structures made of different material, as long as it is provided with a reservoir of matching matter.\n\nThe team is preparing to return to the surface."
  
  ##############
  ### Molten ###
  ##############
  # Anomaly
  code_4_cat:99 "Reality Code - Molten World"
  code_04_category_desc:99 "Our sensors have detected another $ehof_epcs$ transmission, this time from the §H[from.solar_system.GetName]§! system. Like the previous transmissions, this one was sent from an uninhabitable telluric body - in this case, a molten world named §H[from.GetName]§!.\n\nWe should mobilize survey and excavation teams."
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.401.name:99 "Reality Code - Molten World"
  ehof_reality_code.401.desc:99 "The [Owner.GetScientistPlural] aboard the §H[root.GetName]§! have determined where the $ehof_ep$ transmitter is situated inside §H[from.planet.GetName]§!.\n\nIt is again embedded deeply within the planet, this time far enough down that preliminary geologic scans place it in the mantle - though in the case of molten worlds like §H[from.planet.GetName]§!, there's no firm line between \"mantle\" and \"crust\". Due to the superheated atmosphere and liquid rock surface, the dig site needs to be stabilized before we can proceed to the transmitter."
  
  # Initial
  code4_digsite:99 "Reality Code - Molten Excavation"
  code4_digsite_desc:99 "The [Owner.GetScientistPlural] aboard our survey ship have determined where the $ehof_ep$ transmitter is situated inside §H[from.planet.GetName]§!.\n\nIt is again embedded deeply within the planet, this time far enough down that preliminary geologic scans place it in the mantle - though in the case of molten worlds like §H[from.planet.GetName]§!, there's no firm line between \"mantle\" and \"crust\". Due to the superheated atmosphere and liquid rock surface, the dig site needs to be stabilized before we can proceed to the transmitter."
  
  # Stage 1
  ehof_reality_code.411.name:99 "Reality Code - Molten Excavation I"
  ehof_reality_code.411.desc:99 "To protect the dig site from §H[from.planet.GetName]§!'s planetary forces, the team has first towed and dropped a small ice asteroid onto the surface, and then set up energy barriers and lava pumps to further isolate the resulting island. Even with these steps, the site remains dangerous.\n\nDue to the nature of the planet, reaching the $ehof_ep$ transmitter will require a different methodology than the previous expeditions: the fact that it's made of molten rock precludes the use of excavators (there's nothing to excavate), manned vehicles (far too dangerous), and remote craft (too much signal interference).\n\nThe team's current proposal is to sink a heavily-shielded, semi-autonomous drone down to the transmitter, which will first find the gravitoelectromagnetic \"passphrase\" to disable the transmitter's shield, and then send a command to the transmitter's local network that will cause it to surface.\n\nSuch an approach would have been untenable mere years ago, but our evolving understanding of $giga_sr_sentient_metal$ (to plate the drone), $giga_sr_negative_mass$ (to shield it), and the $ehof_ep$ (to control it) has made it more than viable."
  
  # Stage 2
  ehof_reality_code.412.name:99 "Reality Code - Molten Excavation II"
  ehof_reality_code.412.desc:99 "The team has finished configuring the autonomous drone and is ready to deploy it into §H[from.planet.GetName]§!'s molten oceans."
  
  # Stage 3
  ehof_reality_code.413.name:99 "Reality Code - Molten Excavation III"
  ehof_reality_code.413.desc:99 "On-site scans indicate that the drone has arrived. The team anticipates that, if all goes well, the amplifier will surface within a few days."
  
  # Stage 4
  ehof_reality_code.414.name:99 "Reality Code - Molten Excavation IV"
  ehof_reality_code.414.desc:99 "Everything has gone as planned! The amplifier surfaced as expected, and the team anchored it to the island base. Once secured, the team entered it and extracted another fragment of the $ehof_epcs$ without incident.\n\nAnalysis indicates that these fragments are part of a specific, unique manifestation of the $ehof_ep$, unlike the other transmissions that simply activate $PGATE_GALACTICS$. Unfortunately, it appears that this sequence isn't complete yet - and our [Owner.GetScientistPlural] aren't even sure what it will do once we have completed it.\n\nWe've also found out even more about $giga_sr_sentient_metal$: specifically, how the distributed intelligence governing the substance receives input from it.\n\nWe now know that the substance's constituent particles serve as its neurons, eyes and hands - the intelligence is embedded in the substance itself. Given the amount of $giga_sr_sentient_metal$ we have seen so far and its adaptive capacities, this hive mind's computational capacity must dwarf even our largest computer networks.\n\nWith this new knowledge, we might be able to create systems directly managed by the distributed intelligence and only indirectly controlled by higher-order instructions we provide to it via the $ehof_ep$. Weapons, ships and structures being controlled by the hyper-complex hive mind, would be able to react and adapt much faster than anything else we have and probably will ever have."
  
  #################
  ### Gas Giant ###
  #################
  # Anomaly
  code_5_cat:99 "Reality Code - Gas Giant"
  code_05_category_desc:99 "The §H[this.GetName]§! has detected an $ehof_ep$ transmission originating from the gas giant §H[from.GetName]§! in the §H[from.solar_system.GetName]§! system. We should assign a team to locate the transmitter."
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.501.name:99 "Reality Code - Gas Giant"
  ehof_reality_code.501.desc:99 "Like all the $ehof_ep$ transmitters we've encountered before, this one is also located somewhere inside the planet - this time, embedded in the metallic hydrogen far below its north pole.\n\nDue to the particularities of a gas giant, though, reaching this transmitter poses far more of a challenge than our prior excavations. Compared to the previous telluric planets, the size of §H[from.planet.GetName]§! alone means that we will have to cross ten times the distance to reach the transmitter. That we also need to pass through the planet's gas and liquid layers just adds further complications."
  
  # Initial
  code5_digsite:99 "Reality Code - Gas Giant Excavation"
  code5_digsite_desc:99 "Like all the $ehof_ep$ transmitters we've encountered before, this one is also located somewhere inside the planet - this time, embedded in the metallic hydrogen far below its north pole.\n\nDue to the particularities of a gas giant, though, reaching this transmitter poses far more of a challenge than our prior excavations. Compared to the previous telluric planets, the size of §H[from.planet.GetName]§! alone means that we will have to cross ten times the distance to reach the transmitter. That we also need to pass through the planet's gas and liquid layers just adds further complications."
  
  # Stage 1
  ehof_reality_code.511.name:99 "Reality Code - Gas Giant Excavation I"
  ehof_reality_code.511.desc:99 "In order to reach the transmitter, our team first constructed an operations base - essentially, one of our space stations with thrusters mounted on all sides. It is en route from our main station in §H[from.solar_system.GetName]§! to §H[from.planet.GetName]§!.\n\nOnce in the planet's outer atmosphere, it will navigate to a point above the transmitter and deploy a semi-autonomous drone similar to the one used in the previous excavation."
  
  # Stage 2
  ehof_reality_code.512.name:99 "Reality Code - Gas Giant Excavation II"
  ehof_reality_code.512.desc:99 "The team reports that the drone is ready for launch. Our [Owner.GetEngineerPlural] have elected to add an experimental $giga_sr_negative_mass$ thruster to it. This will expedite the drone's journey through the many kilometers of gas and liquid below it, and ensure it can course-correct if §H[from.planet.GetName]§!'s tides push it off-course."
  
  # Stage 3
  ehof_reality_code.513.name:99 "Reality Code - Gas Giant Excavation III"
  ehof_reality_code.513.desc:99 "The drone has arrived at the $ehof_ep$ transmitter without much incident. Like the previous transmitters, this one is protected by a shield that maintains a void of space around it. In this case, instead of keeping crust material from entombing the octahedron within, the shield prevents the incredible pressure of §H[from.planet.GetName]§!'s atmosphere from crushing it over the many millennia it has been down there.\n\nThe drone will now begin testing gravitoelectromagnetic waves until the transmitter's shield deactivates, at which point it will route the same surfacing command to the now-exposed transmitter."
  
  # Stage 4
  ehof_reality_code.514.name:99 "Reality Code - Gas Giant Excavation IV"
  ehof_reality_code.514.desc:99 "Once it surfaced, the on-site team was able to access the amplifier and extract another fragment of the $ehof_epcs$. From what we've collected so far, our [Owner.GetScientistPlural] believe that it's almost complete!\n\nBy accessing the transmitter's databank, the team was finally able to discern the complete sequence's purpose. When a $PGATE_GALACTIC$ is sent the complete $ehof_epcs$, it will in turn attempt to contact the original source of the $ehof_ep$ - and we can use that transmission to determine the source's location!\n\nThe team was also able to find information about how the $giga_sr_sentient_metal$ hive mind and the ancient structures we've encountered are powered. While it's clear that $ehof_ep$ transmitters, and especially the $PGATE_GALACTICS$, draw a tremendous amount of energy, we were never able to determine where that energy comes from. While we still aren't sure, we have been able to determine that neither possess any sort of internal energy storage or production - the energy they use simply seems to come from nowhere. This may evince that they use some sort of macro-scale nonlocality, something our [Owner.GetScientistPlural] long believed impossible."
  
  ############
  ### Star ###
  ############
  # Anomaly
  code_6_cat:99 "Reality Code - Brown Dwarf"
  code_06_category_desc:99 "Upon entering the §H[root.solar_system.GetName]§! system, the §H[this.GetName]§! detected an $ehof_ep$ transmission - though strangely, this time it came from the surprisingly large brown dwarf at the system's center.\n\nWhile surveying the interior of such a barely-substellar object is daunting, we must nevertheless find the source and complete the $ehof_epcs$."
  
  # Anomaly Success (Creates Dig site)
  # to fix: this is always a brown dwarf?
  ehof_reality_code.601.name:99 "Reality Code - Brown Dwarf"
  ehof_reality_code.601.desc:99 "We have determined the transmitter's precise location, though actually reaching it is another matter entirely. The sheer size of the brown dwarf, and the incredible densities and temperatures within it, will make this project extremely difficult. The expected time and resource costs of this project are staggering, but completing the $ehof_epcs$ and finding its origin is worth any cost."
  
  # Initial
  code6_digsite:99 "Reality Code - Substellar Excavation"
  code6_digsite_desc:99 "We have determined the transmitter's precise location, though actually reaching it is another matter entirely. The sheer size of the brown dwarf, and the incredible densities and temperatures within it, will make this project extremely difficult. The expected time and resource costs of this project are staggering, but completing the $ehof_epcs$ and finding its origin is worth any cost."
  
  # Stage 1
  ehof_reality_code.611.name:99 "Reality Code - Substellar Excavation I"
  ehof_reality_code.611.desc:99 "As with the gas giant excavation before, we have deployed an operations platform into §H[from.planet.GetName]§!'s photosphere. From there, it will deploy a manned vessel - in essence, a replica of the transmitter with most of its internals given over to power generation. Initial proposals intended to utilize the same sort of unmanned drone we'd employed in the previous two excavations, but our gravitoelectromagnetic projection technology isn't powerful enough to broadcast $ehof_ep$ control codes across the distances in play here... especially when those distances are filled with highly dense molecular soup.\n\nWhile our materials science is still far away from the technology used by the $ehof_ep$ transmitters, what we've learned from those selfsame transmitters has closed the gap enough that our equipment will remain undamaged (and our [Owner.GetScientistPlural] safe) as we delve into the depths of this could-have-been star."
  
  # Stage 2
  ehof_reality_code.612.name:99 "Reality Code - Substellar Excavation II"
  ehof_reality_code.612.desc:99 "The monitoring team's scans indicate that our exploratory vessel has, at last, reached the transmitter. It will now attempt to synchronize shield harmonics with the construct so that the dive team can attempt to first open, and then board, it."
  
  # Stage 3
  ehof_reality_code.613.name:99 "Reality Code - Substellar Excavation III"
  ehof_reality_code.613.desc:99 "If everything goes according to plan, the dive team is in the process of determining the transmitter's gravitoelectromagnetic unlock code. There's nothing to do now but wait while they work, so far down below."
  
  # Stage 4
  ehof_reality_code.614.name:99 "Reality Code - Substellar Excavation IV"
  ehof_reality_code.614.desc:99 "The diving crew has returned safely! They were able to access to the amplifier and extract the final fragment of the $ehof_epcs$.\n\nWith it in our possession, we can finally assemble the $ehof_epcs$... and find its true origin."
  
  ###############################
  ### Final digsite (CPlanet) ###
  ###############################
  # Notification that a new system spawned
  ehof_reality_code.1000.name:99 "Reality Code - The Origin"
  ehof_reality_code.1000.desc:99 "After years spent locating all the fragments of the $ehof_epcs$, we have finally assembled it. Broadcasting this completed sequence at a $PGATE_GALACTIC$ caused it to react in a way we'd never seen before. It transmitted a novel \"answer\" sequence out in an unclear direction.\n\nSoon after this transmission, though, our teams still in the process of cleaning up the final $ehof_ep$ excavation site reported alarming energy surges from somewhere deep within the brown dwarf - and moments after that, a section of clouds along its middle parted as an orange bolt flew forth. Like the one we saw so long ago, this bolt flew towards the edge of the system at incredible speed. When our science vessels finally caught up with its trail, they discovered a hyperlane left in its wake, perhaps exposed by its violent energies.\n\nWhile we don't know what lies on the other side of this hyperlane, we strongly suspect it is the origin of the $ehof_ep$."
  
  # On entering the system
  ehof_reality_code.10001.name:99 "Stellar Eradicator"
  ehof_reality_code.10001.desc:99 "We've finally reached §H[root.GetStarName]§!, the origin system of the $ehof_ep$.\n\nThe system consists of a massive black hole and one single celestial body orbiting it: a tremendous spherical megastructure with a diameter of several million kilometers. The structure is definitely not of natural origin, and appears to be defended by a vessel we have not encountered before.\n\nWe should proceed with caution, as this \"Stellar Eradicator\" appears heavily armed!"
  
  # On killing the eradicator
  ehof_reality_code.10002.name:99 "Eradicator Eradicated!"
  ehof_reality_code.10002.desc:99 "Just as we were about to destroy the Stellar Eradicator, it executed an emergency hyperjump and vanished without a trace. With it out of the way, we can now resume our mission.\n\nCursory analysis of the megastructure's surface shows massive waves constantly but irregularly rippling across it, and continuous emissions of short-lifespan, high-energy particles. Like the other structures we've encountered within the $ehof_cohesive$ systems, it is likely that the megastructure's surface is made of a truly unfathomable amount of $giga_sr_sentient_metal$. Attempts to verify this hypothesis have unfortunately proven futile, as the violent energy emissions scramble our scanners.\n\nTwo circular regions distinct from the main surface span the $ehof_the_sphere$, one at each \"pole\". Unlike the rest of the surface, they are static. A large sigil, identical to the ones seen on $PGATE_GALACTICS$, is set in the center of both these areas.\n\nA particularly inspired [Owner.GetScientist] has taken to calling this construct the \"$ehof_the_sphere_named$\"."
  ehof_reality_code.10002.a:99 "This is incredible!"
  
  # Initial
  code_final_digsite:99 "Reality Code - the $ehof_the_sphere_named$"
  code_final_digsite_desc:99 "Finding a way into the $ehof_the_sphere$ seems like an impossible task.\n\nAttempting to simply force our way in would be futile. While the surface may possess no defined temperature as a whole, individual regions of it that correspond to the waves crossing it do. Their temperatures range erratically from near absolute-zero to hundreds of thousands of degrees Celsius. Any equipment that would even touch the surface would be destroyed in an instant.\n\nInstead, our [Owner.GetResearchers] suggest using the $ehof_epcs$. It was the key to access the transmitters and the $PGATE_GALACTICS$, so it may let us engage with the $ehof_the_sphere$ as well.\n\nThe current proposal is to build one $ehof_epcs$ transmitter pylon above the capstone at the $ehof_the_spheres$ top to validate this approach before we proceed any further."
  
  # Stage 1
  ehof_reality_code.1001.name:99 "Reality Code - the $ehof_the_sphere_named$ I"
  ehof_reality_code.1001.desc:99 "The transmitter pylon was partially successful at opening the $ehof_the_sphere$.\n\nBroadcasting the $ehof_epcs$ via its gravitoelectromagnetic carrier wave, the $ehof_the_sphere$ reacted. At the pole below, a miniscule one-meter notch unfolded - but only for a second. Despite continuing the broadcast, the entrance sealed shut, and rebroadcasting the $ehof_epcs$ did not cajole it into reappearing.\n\nWhile we now know our approach works in the most general sense, we also know that we must construct additional pylons to stabilize an entrance into the $ehof_the_sphere$."
  
  # Stage 2
  ehof_reality_code.1002.name:99 "Reality Code - the $ehof_the_sphere_named$ II"
  ehof_reality_code.1002.desc:99 "Our attempts at breaching the $ehof_the_sphere$ have progressed. After deploying multiple additional emitter pylons and cycling an $ehof_epcs$ broadcast, the size of the aperture at the structure's top increased.\n\nIt appears that the opening's size increases exponentially in correlation to the number of transmission sources: adding a second pylon increased the entrance's radius to sixteen meters and lasted sixteen seconds, adding a third resulted in an eighty-one meter radius lasting the same number of seconds, a fourth, two-hundred and fifty-six meters and seconds.\n\nFrom these results, our [Owner.GetScientistPlural] believe that the entrance scales in a tesseractic fashion. Based on the rate of growth, it will take thirty-two pylons to fully open the $ehof_the_sphere$."
  
  # Stage 3
  ehof_reality_code.1003.name:99 "Reality Code - the $ehof_the_sphere_named$ III"
  ehof_reality_code.1003.desc:99 "Our [Owner.GetScientistPlural]' hypothesis proved to be correct.\n\nThirty-two pylons, all singing the $ehof_epcs$ in a choir, fully peeled back the capstone's surface. Assuming that the underlying rules haven't changed, it should remain open for a little over twelve galactic standard days.\n\nBeyond the $ehof_the_spheres$ capstone lies an undifferentiated plain of $giga_sr_sentient_metal$. It seems like this is a final test of sorts - we will have to use our knowledge of the material's network intelligence, and reprogram it to both move aside and to hold the capstone open."
  
  # Stage 4
  ehof_reality_code.1004.name:99 "Reality Code - the $ehof_the_sphere_named$ IV"
  ehof_reality_code.1004.desc:99 "Initial attempts at directing the $giga_sr_sentient_metal$ have failed. Despite its seemingly-stable surface, the sublayer is, in essence, constantly and actively reforming into the shape it's currently taken. This isn't just its normal regenerative properties in action, or the commands we transmitted to it would have worked. Rather, the hive mind's local network is itself ever-changing - any commands we send are overwritten milliseconds later, and the adjustments they make to the structure are undone.\n\nOnly ten days remain before the capstone closes and we lose this opportunity, possibly forever."
  
  # Stage 5
  ehof_reality_code.1005.name:99 "Reality Code - the $ehof_the_sphere_named$ V"
  ehof_reality_code.1005.desc:99 "With only a few days remaining, the team has prototyped and deployed an experimental supercomputer. At its core sits a dense network of $giga_sr_sentient_metal$ we've interlaced with our own technologies - the closest thing to ideal computronium we can make. While it lacks the overall versatility of $giga_sr_sentient_metal$, its raw computational power exponentially outstrips the material's unaided hive mind.\n\nThis system is presently being deployed to the $ehof_the_spheres$ polar capstone. With any luck, it will be able to outstrip the local network's recalculations and reshape the $giga_sr_sentient_metal$ seal in a more persistent fashion."
  
  # Stage 6
  ehof_reality_code.1006.name:99 "Reality Code - the $ehof_the_sphere_named$ VI"
  ehof_reality_code.1006.desc:99 "It is done. The $ehof_the_sphere$ is open.\n\nThey should have sent a poet..."
  
  ###########################################################################
  ################# 1/6 reality code excavations completed ##################
  ###########################################################################
  ehof_reality_code.005.name:99 "Reality Code - $giga_sr_sentient_metal$"
  ehof_reality_code.005.desc:99 "Our [Owner.GetScientistPlural] have named the material we discovered $giga_sr_sentient_metal$. From what information about it they have determined, our scientific community is certain that it has unimaginable potential.\n\nFor now, though, its uses are as limited as our understanding of it. Our [Owner.GetEngineerPlural] have drafted preliminary designs for specialized propagation facilities which will replicate existing $giga_sr_sentient_metal$ samples by feeding them §HAlloys§! and §HEnergy§!.\n\nAdditionally, a project to reinvestigate a $PGATE_GALACTIC$ has been proposed, as our [Owner.GetScientistPlural] now believe that these mysterious structures may be composed of $giga_sr_sentient_metal$."
  ###########################################################################
  ################# 3/6 reality code excavations completed ##################
  ###########################################################################
  
  ehof_reality_code.004.name:99 "Reality Code - Activation"
  ehof_reality_code.004.desc:99 "Thanks to the knowledge our [Owner.GetResearchers] have collected from the $ehof_ep$ transmitters, we now know how to activate $PGATE_GALACTICS$. Our [Owner.GetResearchers] have already begun to develop the necessary augmentations to our ship transmitters. It is unknown exactly what happens when an $PGATE_GALACTIC$ is activated - all we know is how to do it!"
  
  #########################################
  ### Hieroglyphics (EHOF Precursor) ######
  #########################################
  ehof_megastructure.602.name:99 "Mysterious Geoglyphs"
  ehof_megastructure.602.desc:99 "A routine review of scanner data has unexpectedly revealed giant geoglyphs carved into a planet's surface. Repeating elements and the symbols' overall abstraction indicate that they are more likely a script than representations of lifeforms.\n\nDefinitely something worth investigating."
  ehof_megastructure.602.a:99 "They even spread beyond the horizon..." #very unforced reference
  
  ehof_precursor:99 "Mysterious Geoglyphs"
  ehof_precursor_digsite_desc:99 "There are giant geoglyphs carved into the surface of §H[from.Planet.GetName]§!. Repeating elements and the symbols' overall abstraction indicate that they are more likely a script than representations of lifeforms.\n\nDefinitely something worth investigating."
  
  ehof_megastructure.0051.name:99 "Mysterious Geoglyphs I"
  ehof_megastructure.0051.desc:99 "The crew of the §H[this.GetName]§! has landed and set up camp around the largest of the geoglyphs, located just south of a mountain range wrapped around the planet's north pole.\n\nImmediate thoughts turn to figuring out what these geoglyphs are, and who put them here. After some deliberation, the [Owner.GetScientistPlural] got to work testing air and ground samples, and running surface scans of the geoglyphs themselves."
  
  ehof_megastructure.0052.name:99 "Mysterious Geoglyphs II"
  ehof_megastructure.0052.desc:99 "Some time has passed since the [Owner.GetScientistPlural] on §H[from.Planet.GetName]§! began investigating the geoglyphs covering its surface, but they haven't made any meaningful progress.\n\nThe team is at a loss and has declared the mission a failure. They packed up the polar site and began to board their ship.\n\n§H[this.leader.GetName]§! gave the order to depart the planet, and the §H[this.GetName]§! began to ascend into orbit - but during the ascent, the science team noticed the very glyph their vessel had been landed on for weeks was glowing a faint orange, whilst the others were not."
  
  ehof_megastructure.0053.name:99 "Mysterious Geoglyphs III"
  ehof_megastructure.0053.desc:99 "§H[this.leader.GetName]§! halted the ascent and returned to the ground. As the §H[this.GetName]§! descended, the glyph's orange glow intensified more and more as the ship grew closer and closer.\n\nPuzzled by this development, the team decided to do a lap of the planet, flying over every glyph at low altitude, watching each one light up as they passed over.\n\nEventually all of the glyphs were lit and remained lit, but the crew is still none the wiser as to what this meant. §H[this.leader.GetName]§! has decided to land once again at the polar research site and reexamine the geoglyphs directly."
  
  ehof_megastructure.00531.name:99 "Mysterious Geoglyphs IV"
  ehof_megastructure.00531.desc:99 "Shortly after returning to the surface of §H[from.Planet.GetName]§!, the science team's sensors detected major seismic activity for a brief moment - and all of the glyphs stopped glowing at once.\n\nConcerned for the wellbeing of the crew, they quickly boarded the §H[this.GetName]§! and once more took to orbit.\n\nAs soon as they left the atmosphere of §H[from.Planet.GetName]§!, the ship's sensors detected a tremendous increase in tectonic activity. §H[from.Planet.GetName]§!'s surface began to burst open, and a giant bolt of orange light was launched from the inside at a speed far beyond any we have ever been able to achieve.\n\nThe light soon left visible range, but the crew were able to determine its intended destination by its heading. We should investigate the system it appears to be hurtling towards."
  
  EXPLORE_EHOF_PRECURSOR_NO_RUINED:99 "Orange Bolt"
  EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC:99 "The ship's sensors detected a giant bolt of orange light traveling far beyond any speed we have been able to achieve.\n\nThe light soon left visible range, but the crew were able to determine its intended destination by its heading. We should investigate the system it appears to be hurtling towards."
  
  EXPLORE_EHOF_PRECURSOR_RUINED:99 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED$"
  EXPLORE_EHOF_PRECURSOR_RUINED_DESC:99 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC$"
  
  ehof_megastructure.0054_name:99 "Dead End"
  ehof_megastructure.0054_desc:99 "Having arrived in the system after the orange bolt reached it, it's nowhere to be seen...\n\nDespite all the time spent on this anomaly, there has been no real insight into what the geoglyphs were for, who made them, why they made them, or what the orange bolt was.\n\nHowever, after some investigation of the strange debris strewn around the system, it appears there was once some kind of megastructure here, probably destroyed over time by the black hole.\n\nInside the debris, our [Owner.GetScientistPlural] discovered a large and functional data cache, containing advanced technologies and knowledge related to wormhole stabilization.\n\nHowever, the most significant find was an extremely alien and otherworldly artifact. Studying the artifact is certainly going to be worth it."
  
  ehof_megastructure.0055_name:99 "The Machine"
  ehof_megastructure.0055_desc:99 "Having arrived in the system after the orange bolt reached it, it's nowhere to be seen - but there's a damaged structure cradled around the black hole at the system's center. Data retrieved from inside the structure revealed that, when it was operational, it could manipulate the black hole it's built on in order to open and stabilize wormholes. Our [Owner.GetScientistPlural] have named this structure the $ehof_ehof$, or $ehof_ehof_abr$ for short. \n\nDespite its decrepit and seemingly-abandoned state, the crew set out to check for any signs of life or clues as to what lead us here.\n\nAfter scanning, testing and contemplating the structure, it is clear there is no real insight into what the geoglyphs were for, who made them, why they made them, or what the orange bolt was.\n\nHowever, our examinations of the structure have revealed a great deal of advanced knowledge related to wormhole stabilization. Perhaps more significantly, we have found an arcane artifact of unknown purpose and origin that was installed in a prominent location within the facility. Our [Owner.GetScientistPlural] are certain we should study it further."
  
  STUDY_ARCANE_ARTIFACT_1:99 "Study the §BArcane Artifact§!"
  STUDY_ARCANE_ARTIFACT_1_DESC:99 "The arcane artifact we've discovered might shed some light on the orange bolt, as it could possibly be linked to it.\n\nThe artifact might hold other amazing secrets, just waiting to be uncovered.\n\n§R(This project is mandatory for unlocking the $ehof_ehof$!)§!"
  
  STUDY_ARCANE_ARTIFACT_2:99 "Study the §BArcane Artifact§!"
  STUDY_ARCANE_ARTIFACT_2_DESC:99 "The arcane artifact we've discovered in the destroyed $ehof_ehof$ could hold amazing secrets about the megastructure that are just waiting to be uncovered.\n\n§B(This project is mandatory for unlocking the $ehof_ehof$!)§!"
  
  STUDY_ARCANE_ARTIFACT_3:99 "Study the §BArcane Artifact§!"
  STUDY_ARCANE_ARTIFACT_3_DESC:99 "The arcane artifact we've discovered in the damaged $ehof_ehof$ might shed light on how exactly the megastructure worked.\n\n§B(This project is mandatory for restoring the $ehof_ehof$!)§!"
  
  ehof_anomaly.4321.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4321.desc:99 "Our long-term study of the arcane artifact has been quite informative, though most of it was spent confronting the artifact's bizarre properties.\n\nWhile it retains a particular octahedral main shape, its scale and mass independently oscillate to truly wild extremes. Our [Owner.GetResearchers] have recorded sizes as small as a datapad and as large as a modern cruiser, and masses between a single standard alloy unit and approximately an eighth of a standard rocky world's mass. The artifact's opacity and solidity vary in a similarly erratic fashion.\n\nThese factors lead our [Owner.GetScientistPlural] to believe that it is actually a higher-dimensional object partially anchored in our reality, and its rotation through those dimensions is responsible for the all strange effects we observe in our three-plus-one."
  #This event seems to be deprecated(4322), as a note for the future because of that it's just been brought to parity with 4324
  ehof_anomaly.4322.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4322.desc:99 "We have determined at least one of the artifact's functions: it is capable of stabilizing and manipulating wormholes.\n\nIt possesses the potential to stabilize and manipulate any type of wormhole in the universe, even the subatomic, short-lived virtual $ehof_wormholes_text$ that arise from the quantum fluctuations of spacetime itself.\n\nIt was probably utilized in the $ehof_ehof$ to drive the megastructure's wormhole manipulation.\n\nThe artifact might possess other functions, but due to its enigmatic nature, they will be hard to determine. Our [Owner.GetResearchers] aren't even sure if its erratic behavior is intentional, or if it is damaged somehow.\n\nRegardless, our [Owner.GetScientistPlural] believe that it should be possible to utilize the artifact for $ehof_wormhole_text$ stabilization, manipulation, and ultimately, travel. The destroyed $ehof_ehof$ could potentially be restored and re-established for that purpose."
  
  ehof_anomaly.4323.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4323.desc:99 "$ehof_anomaly.4321.desc$"
  
  ehof_anomaly.4324.name:99 "$r_arcane_manipulator_1$"
  ehof_anomaly.4324.desc:99 "We have determined at least one of the artifact's functions: it is capable of stabilizing and manipulating wormholes.\n\nIt possesses the potential to stabilize and manipulate any type of wormhole in the universe, even the subatomic, short-lived virtual $ehof_wormholes_text$ that arise from the quantum fluctuations of spacetime itself.\n\nIt was probably utilized in the $ehof_ehof$ to drive the megastructure's wormhole manipulation.\n\nThe artifact might possess other functions, but due to its enigmatic nature, they will be hard to determine. Our [Owner.GetResearchers] aren't even sure if its erratic behavior is intentional, or if it is damaged somehow.\n\nRegardless, our [Owner.GetScientistPlural] believe that it should be possible to utilize the artifact for $ehof_wormhole_text$ stabilization, manipulation, and ultimately, travel. The destroyed $ehof_ehof$ could potentially be restored and re-established for that purpose."
  
  r_arcane_manipulator_1:99 "§BArcane Rift Manipulator§!"
  r_arcane_manipulator_1_desc:99 "Appearing to phase through reality itself, this otherworldly construct can stabilize and manipulate wormholes of any kind, including virtual $ehof_wormholes_text$."
  giga_relic_no_active:99 "This relic is purely a collectible and does not have any active effects."
  
  ehof_megastructure.0056_name:99 "Event Horizon"
  ehof_megastructure.0056_desc:99 "After exploring the damaged black hole structure, we have determined that it originally facilitated a unique form of interstellar travel.\n\nData retrieved from inside this so called \"$ehof_ehof$\" (or $ehof_ehof_abr$ for short), reveals it to be an ancient wormhole generator and stabilizer. While in and around the megastructure, we have uncovered a great deal of advanced knowledge related to wormhole stabilization.\n\nPerhaps more significantly, we have found an arcane artifact of unknown purpose and origin that was installed in a prominent location within the facility. Our [Owner.GetScientistPlural] are certain we should study it further."
  
  #############################################################################################################################################
  ### Bombardment Stances #####################################################################################################################
  #############################################################################################################################################
  bombardment_redtoxin:99 "Scarlet Scourge"
  bombardment_redtoxin_desc:99 "$bombardment_redtoxin$ bombardment utilizes the Scarlet Scourge to poison a planet via orbital bombardment and kill off all life on the planet.\n- §RMassive§! damage to §HArmies§!\n- §RMassive§! damage to §HPlanet§!\n- §RMassive§! damage to §HPops§!\n- Will bombard undefended planets\n- Can reduce planets to uninhabitable, but terraformable, Red Toxic Worlds"
  opinion_policy_orbital_bombardment_redtoxin:99 "Bombarded our plants with the Scarlet Scourge"
  orbital_bombardment_redtoxin:99 "Scarlet Scourge"
  orbital_bombardment_redtoxin_name:99 "Scarlet Scourge Orbital Bombardment"
  orbital_bombardment_redtoxin_desc:99 "Allows the deployment of the Scarlet Scourge via orbital bombardment.\n\n§EAllows 'Scarlet Scourge' orbital bombardment stances.§!"
  ehof_red_toxin.2.name:99 "World bombed into Red Toxic World"
  ehof_red_toxin.2.desc:99 "One of our planets was bombed into a Red Toxic World"
  ehof_red_toxin.2.a:99 "This is horrible!"
  bombed_to_red_toxic:99 "The world is now uninhabitable, but can be terraformed quickly."
  ehof_red_toxin.3.desc:99 "Our fleets turned an enemy planet into a Red Toxic World via Scarlet Scourge bombardment."
  ehof_red_toxic_world:99 "Increased Terraforming Efficiency"
  ehof_red_toxic_world_desc:99 "The Scarlet Scourge increases the efficiency of our terraforming processes."
  
  building_ehof_sm_forge_1:99 "Sentient Metal Foundry"
  building_ehof_sm_forge_1_desc:99 "The $building_ehof_sm_forge_1$ is a specialized installation that feeds £alloys£ §Y$alloys$§! and £energy£ §Y$energy$§! into an accumulation of £giga_sr_sentient_metal£ §YSentient Metal§! in order to replicate more £giga_sr_sentient_metal£ §YSentient Metal§!."
  
  building_ehof_sm_forge_2:99 "Sentient Metal Foundry Complex"
  building_ehof_sm_forge_2_desc:99 "The $building_ehof_sm_forge_2$ is a larger and more efficient variant of its predecessor. It makes use of our expanded knowledge of £giga_sr_sentient_metal£ §YSentient Metal§! to create more of the material in less time."
  
  building_giga_research_lab_1:99 "Abstract Examination Institute"
  building_giga_research_lab_1_desc:99 "A specialized institute for phenomenal research and experiments in the branch of abstract physics. It possesses a very large capacity for research staff."
  
  building_giga_research_lab_2:99 "Nonlocality Research Facility"
  building_giga_research_lab_2_desc:99 "A specialized institute for research and experiments in the branch of abstract physics, with a very large capacity for research staff."
  
  building_giga_institute_1:99 "Unorthodox Think Tank"
  building_giga_institute_1_desc:99 "The $building_giga_institute_1$ is an enormous installation dedicated to abstract physics studies. The planet's research output is boosted."
  
  building_giga_supercomputer_1:99 "Abstract Supercomputer"
  building_giga_supercomputer_1_desc:99 "The $building_giga_supercomputer_1$ is an enormous installation intended to serve as a planet's central processing and research facility for abstract physics. The planet's research output is hugely boosted by this amazing facility."
  
  building_giga_supercomputer_2:99 "Abstract Hypercomputer"
  building_giga_supercomputer_2_desc:99 "This highly advanced and specialized installation allows for the study of and experimentation on quantum nonlocality phenomena."
  
  building_giga_institute_2:99 "Supercausal Science Nexus"
  building_giga_institute_2_desc:99 "The Supercausal Science Nexus is a tremendous facility dedicated to the most advanced and humongous research projects and experiments in regards to nonlocal and supercausal phenomena within abstract physics."
  
  building_giga_energy_nexus_1:99 "Laser Conduction Energy Distributor"
  building_giga_energy_nexus_1_desc:99 "This huge complex uses powerful high-energy conductors to transport energy between the planet it is located at and other planets in its solar system."
  
  building_giga_energy_nexus_2:99 "Hyperlane Power Transmitter"
  building_giga_energy_nexus_2_desc:99 "These ultra high capacity energy transmitters can transfer energy between solar systems and more efficiently distribute the power within our empire."
  
  building_giga_energy_nexus_3:99 "Transstellar Field Entangler"
  building_giga_energy_nexus_3_desc:99 "This humongous construct employs quantum theory to directly entangle different locations in the galaxy, making it possible for us to instantly transfer energy within our empire."
  
  # building_giga_planetary_shield_generator_1:0 "Hypershield Defensive Screen"
  # building_giga_planetary_shield_generator_1_desc:0 "The $building_giga_planetary_shield_generator_1$ is an enhanced version of a classical Planetary Shield Generator that affords increased protection to the planet below."
  
  building_giga_planetary_shield_generator_2:99 "Negative Mass Protector"
  building_giga_planetary_shield_generator_2_desc:99 "By creating a mass-energy repulsive layer around a planet's atmosphere through the utilization of £giga_sr_negative_mass£ §YNegative Mass§!, this structure shields a planet from even the most intense orbital bombardment. Only long-term bombardment and extremely high energy beams can penetrate the repulsive layer in time."
  
  building_negative_mass_factory_1:99 "Prototype Energy Anti-Transmuter"
  building_negative_mass_factory_1_desc:99 "Advances in abstract physics have allowed the development and construction of experimental facilities for the generation of £giga_sr_negative_mass£ §YNegative Mass§!. As the systems employed by the $ building_negative_mass_factory_1$ are not yet perfected, its production efficiency and yield are very poor."
  
  building_negative_mass_factory_2:99 "Negative Mass Transmuter"
  building_negative_mass_factory_2_desc:99 "The next step in £giga_sr_negative_mass£ §YNegative Mass§! production, the $building_negative_mass_factory_2$ is a completed form of the $building_negative_mass_factory_1$ with increased efficiency and yield. However, energy-to-negative-energy conversion is still far from efficient - and will remain so until we figure out how to perfectly convert between the two states."
  
  edict_giga_photonic_matter_sb:99 "Photonic Matter Shield Boost"
  edict_giga_photonic_matter_sb_desc:99 "Photonic Matter can be used to temporarily increase the efficiency of our ship's shield regeneration."
  
  edict_giga_negative_pressure_ti:99 "Negative Pressure Thrust Increase"
  edict_giga_negative_pressure_ti_desc:99 "By precisely applying negative pressure to out conventional thrusters, we can increase their efficiency."
  
  edict_giga_negative_mass_build:99 "Negative Mass Construction Acceleration"
  edict_giga_negative_mass_build_desc:99 "By utilizing negative mass within our construction processes, we can improve the speed at which we can finish our construction projects."
  
  edict_giga_sterile_hyper_neutrino_d_s:99 "Sterile Hyper-Neutrino Detector Support"
  edict_giga_sterile_hyper_neutrino_d_s_desc:99 "Our Sterile Hyper-Neutrino Detectors, generally used for our EHOF Omega, can also be utilized to detect and extract more dark matter of dark matter sources."
  
  pc_red_toxic:99 "Red Toxic World"
  pc_red_toxic_desc:99 "A unique type of toxic planet, entirely poisoned with strange toxic particles that stain the atmosphere a brilliant crimson."
  
  pc_ehof_habitat:99 "Asteroid Habitat"
  pc_ehof_habitat_desc:99 "A large habitat composed of multiple asteroids, built by a lost and now extinct civilization. What happened to its builders is unknown."
  
  pc_ehof_unhabitat:99 "$pc_ehof_habitat$"
  pc_ehof_unhabitat_desc:99 "$pc_ehof_habitat_desc$"
  
  sc_ehof_black_hole:99 "$pc_ehof_black_hole$"
  sc_ehof_black_hole_desc:99 "$pc_ehof_black_hole_desc$"
  sc_annihilator:99 "Cataclysmic Star"
  sc_annihilator_desc:99 "Officially a Class M Giant, there's something different about this star..."
  sc_white_hole:99 "$pc_wh_star$"
  sc_white_hole_desc:99 "$pc_wh_star_desc$"
  
  #########################################
  ### Supermassive E.H.O.F. ###############
  #########################################
  #Site
  giga_dialog.4201.name:99 "Supermassive E.H.O.F. Construction Site Complete"
  giga_dialog.4201.desc:99 "From crude animal-drawn carriages, to steam and nuclear-powered vehicles, to FTL travel and then Hyper-Relays and Gateways, the development and growth of all civilisations hinges on constant improvements in transportation technologies, enabling us to project our ambitions further and further.\n\nAnd so, with the construction site for a future §YSupermassive E.H.O.F.§! completed around the galactic core, we stand on the cusp of yet another and perhaps the greatest transportation revolution.\n\nThis platform shall serve as the logistical hub for the construction of a supersized Event Horizon Offset Facility around the galaxy's supermassive black hole which shall, in time, bolster our FTL capabilities to unseen heights and connect all corners of our empire together thanks to a network of countless micro-wormholes."
  giga_dialog.4201.a:99 "Marvelous."
  
  #Frame
  giga_dialog.4202.name:99 "Supermassive E.H.O.F. Electroweak Hyperframe Complete"
  giga_dialog.4202.desc:99 "The Supermassive E.H.O.F.'s §YElectroweak Hyperframe§! is now in place. This gargantuan frame shall generate a gargantuan electroweak field around the supermassive black hole's event horizon, from which probalistic wormholes will be 'plucked' and inflated across the galaxy by the structure's two not-yet built Quasi-Field Manipulators."
  giga_dialog.4202.a:99 "That makes sense... I think."
  
  #Gateways
  giga_dialog.4203.name:99 "Supermassive E.H.O.F. Quasi-Field Manipulators Complete"
  giga_dialog.4203.desc:99 "With the completion of the §YQuasi-Field Manipulators§!, the structure of our Supermassive E.H.O.F. is essentially complete. These manipulators shall manipulate the electroweak field generated by the Hyperframe as to twist surrounding spacetime into two gargantuan vortexes emanating from the Manipulators.\n\nThis should theoretically extend the range at which micro-wormholes can be generated to the entire galaxy and beyond, all while enabling them to remain stable over an indefinite period of time.\n\nAll that remains to be done now is to activate the device."
  giga_dialog.4203.a:99 "What do you mean by 'theoretically'?"
  
  #Activation
  giga_dialog.4204.name:99 "Supermassive E.H.O.F. Operational"
  giga_dialog.4204.desc:99 "Thanks to a massive infusion of energy and Quasi-Negative Mass, our marvelous §YSupermassive E.H.O.F.§! has roared to life. Twisting and bending spacetime like mere clay, the device's gargantuan power essentially grants us near-total control over our galaxy's underlying quasi-space.\n\nAlready, micro-wormholes are being generated across our entire empire, connecting our once-disparate worlds together as if they were one and reducing travel times to almost nothing, while our warships enjoy unprecedented mobility as wormholes enable them to traverse the void faster than ever.\n\nWith the full activation of this grand device, logistical and bureaucratic problems owing to our empire's size are soon to be little more than a distant memory as we enter an era of unprecedented cohesion and galactic coordination."
  giga_dialog.4204.a:99 "The galaxy is now truly our domain!"
  
  
  name_supermassive_ehof:99 "Supermassive E.H.O.F."
  
  supermassive_ehof_0:99 "$gc_tera$$name_supermassive_ehof$ Construction Site"
  supermassive_ehof_0_DESC:99 "The construction site for a future $name_supermassive_ehof$. This relatively small platform shall be used as a base to construct a machine granting us near-perfect mobility and cohesion across the galaxy."
  supermassive_ehof_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_terastructure$ - $giga_list_category_transportation$\nDrastically buffs §YFTL Speed§!, £unity£ §YUnity§!, £trade_value£ §YTrade Value§!, reduces §YEmpire Size§!.\n§LAn upscaled E.H.O.F. Facility designed to generate microwormholes anywhere in the galaxy on the fly.§!" #megalistentry SUPERMASSIVE EHOF
  
  supermassive_ehof_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - The §YSupermassive E.H.O.F.§! can manipulate spacetime and generate microwormholes on the fly anywhere in the galaxy to bolster conventional methods of FTL travel, effectively reducing §YHyperdrive Cooldown§! to almost nothing and granting infinite range to §YJump Drives§!.\n\nThese wormholes also bring all parts of our empire closer together, increasing §YUnity§! and §YTrade Value§! while reducing §YEmpire Size§! and §YResettlement Cost§!.\n\nIt can also act as a §YQuantum Catapult§! with infinite range and near-perfect accuracy (With the §YOverlord§! DLC), and should the opportunity present itself, it may also allow us to probe §YIntergalactic Space§!.\n\nGenerating the wormholes is however not free and will incur an §YEnergy§! and §YQuasi-Negative Mass§! upkeep based on our current number of §YPops§! (§Y4§! £energy£ & §Y0.04§! £giga_sr_negative_mass£ per), §YPlanets§! (§Y100§! £energy£ & §Y1§! £giga_sr_negative_mass£ per) and §YShips§! (§Y2§! £energy£ per). "
  
  supermassive_ehof_1:99 "Supermassive E.H.O.F. Electroweak Hyperframe"
  supermassive_ehof_1_DESC:99 "The Electroweak Hyperframe plays the crucial role of generating an electroweak field around the event horizon, out of which probabilistic microwormholes may then be plucked."
  
  supermassive_ehof_2:99 "Supermassive E.H.O.F. Quasi-Field Manipulators"
  supermassive_ehof_2_DESC:99 "The Quasi-Field Manipulators bend and twist the Hyperframe's electroweak field, allowing for near-total control of quasi-space across the galaxy."
  
  supermassive_ehof_3:99 "Supermassive E.H.O.F."
  supermassive_ehof_3_DESC:99 "The Supermassive E.H.O.F. can generate a near-endless amount of micro-wormholes anywhere within the galaxy, enabling unprecedented mobility and cohesion. As such, upkeep scales directly with pop, planet and ship count."
  
  supermassive_ehof_3_no_catapult:99 "Supermassive E.H.O.F."
  supermassive_ehof_3_no_catapult_DESC:99 "$supermassive_ehof_3_DESC$² "
  
  requires_ehof_phase_04:99 "$TRIGGER_FAIL$Requires the £engineering_research£ §Y$tech_ehof_phase_04$§! technology."
  
  ap_supermassive_ehof:99 "Unshackled Transportation"
  ap_supermassive_ehof_desc:99 "For too long, the sheer size of the galaxy has stood as an ever-present impediment to our galactic ambitions. No longer! An upscaled Event Horizon Offset Facility built around the galactic core shall enable us to link even the furthest reaches of our empire together and will allow our mighty warships to cross the void with utmost ease."
  
  giga_tech_supermassive_ehof:99 "Event Horizon Offset Facility Hyperscaling"
  giga_tech_supermassive_ehof_desc:99 "The culmination of E.H.O.F. development coupled with the latest advancements in gigastructural engineering. This monstrous construct, built around the largest of black holes, is theoretically capable of generating a near-infinite amount of microwormholes anywhere within the galaxy, enabling both never-seen-before mobility for our fleets as well as the drastic curbing of most distance-related logistical issues inherent to our empire's size."
  allow_supermassive_ehof:99 "§HUnlocks Megastructure:§! $name_supermassive_ehof$"
  desc_supermassive_ehof:99 "The Supermassive E.H.O.F. allows unmatched FTL movement and empire cohesion."
  
  requires_no_existing_supermassive_ehof:99 "$TRIGGER_FAIL$Can only construct one $name_supermassive_ehof$."
  
  giga_blokkat.10021.name:99 "Intergalactic Probing Proposal"
  giga_blokkat.10021.desc:99 "With the gravitational anomaly barreling towards our galaxy at alarming speeds, some are proposing that rather than sit idly waiting for the object to arrive, we take proactive action and utilize our §YSupermassive E.H.O.F.§! to directly fling a probe towards the approaching anomaly within intergalactic space.\n\nIf successful, this would undoubtedly yield some valuable data pertaining to the object's nature, but we should, of course, be ready for anything. Now, if we are to go through with this, several different options have been brought forward.\n\nFirst, we could play it safe and simply send an uncrewed science ship to probe the anomaly and retrieve as much data as possible. if the anomaly turns out to be hostile or dangerous, we wouldn't lose much and it would provide us with valuable insight on how to best prepare for its arrival.\n\nAlternatively, a more brazen option would be to send a fleet to intercept the anomaly and perhaps destroy it before it reaches us, but we really have no idea how powerful it actually is and so there is no guarantee of success.\n\nAnd last, but not least, some argue that bothering with sending an expensive fleet would be little more than a waste of resources, and instead advocate for us to send a powerful explosive device through, which would be a risk-free way of attempting to destroy or at least repel the anomaly by diverting its course."
  giga_blokkat.10021.a:99 "Let's just send an uncrewed science probe."
  giga_blokkat.10021.b:99 "Our fleets will make quick work of whatever that thing is!"
  giga_blokkat.10021.c:99 "A powerful explosive device should hopefully knock it off-course."
  giga_blokkat.10021.d:99 "Rejected. Not worth the risk and expenses."
  
  EHOF_PROBE_BLOKKATS:99 "Probe Intergalactic Anomaly"
  EHOF_PROBE_BLOKKATS_DESC:99 "Sending an uncrewed science ship to the intergalactic anomaly may shed some light on its true nature. As we are unlikely to actually get the ship back, we should not put a leader on it."
  
  EHOF_FIGHT_BLOKKATS:99 "Engage Intergalactic Anomaly"
  EHOF_FIGHT_BLOKKATS_DESC:99 "We shall send a warfleet to intercept and hopefully destroy the anomaly before it reaches us. However, as there's no guarantee of success, we should probably not commit too large of a fleet in the event of a failure.\n§RThis will commit whatever fleet is being used to research the project!§!"
  
  giga_blokkat.10022.name:99 "Intergalactic Anomaly Probing Report"
  giga_blokkat.10022.desc:99 "Our §YSupermassive E.H.O.F.§!'s staff brings... ominous news.\n\nWhile our uncrewed science ship has successfully made it to the anomaly, it could only spend a few precious seconds probing it before being destroyed by cataclysmic energies. And the data it sent back has confirmed our empire's worst fear: the object is not natural.\n\nIt is a ship! More precisely a gargantuan vessel of utterly alien design, comprised of large concentric rings arranged around some sort of high-energy core.\n\nUnfortunately there was not enough time to understand what the purpose of its components were and most of the data beamed back is currently unusable due to a critical lack of context. Fortunately our scientists believe that we might be able to complete our analysis once the anomaly actually arrives, but for now, we should prepare for the worst."
  
  giga_blokkat.10023.name:99 "Intergalactic Anomaly Battle Report"
  giga_blokkat.10023.desc:99 "Going where no [Root.GetSpeciesName] has gone before, our warfleet streaks through intergalactic space, riding the pocket of infinitely-twisted space woven by our §YSupermassive E.H.O.F.§! at speeds unseen.\n\nWithin mere days the anomaly comes into sight, and, to everyone's utter dismay and surprise, it is... small? No more than a few hundred kilometers across, it could be encompassed within the breadth of our warfleet several times over. Whatever the case, it matters not as the fleet opens fire, cannons big and small showering the anomaly in ordnance powerful enough to level most of [ROOT.Capital.GetName].\n\nBut nothing happens. The anomaly, utterly unfazed by our intervention, continues onwards, our fleet struggling to catch up. And so we open fire once more, but this time, there is a response as the anomaly suddenly stops. In an instant, energy readings spike, and... all is quiet.\n\nOur high command scrambles to regain contact, receiving nothing but silence. The conclusion is clear: whatever, or whoever that thing is, we must be ready to deploy everything's we've got against it when it finally arrives."
  giga_blokkat.10023.a:99 "We will overcome. Prepare to fight."
  giga_blokkat.10023.b:99 "Ensure that our grand projects are ready in time."
  giga_blokkat.10023.c:99 "Invest more in technological progress."
  giga_blokkat.10023.d:99 "We shall wait and see."
  
  giga_blokkat.10024.name:99 "Intergalactic Anomaly Bombing Report"
  giga_blokkat.10024.desc:99 "Our §YSupermassive E.H.O.F.§!'s staff reports that they have successfully flung an explosive device towards the anomaly in intergalactic space, yielding... mitigated results.\n\nThe anomaly's course remains completely unchanged despite being impacted in a way that should have knocked it away from our galaxy, however its speed has been somewhat reduced which should hopefully buy us some more time to prepare for its arrival.\n\nInterestingly however, this slowdown occurred some time after the actual impact rather than directly afterwards, leading some to wonder if it might be the result of something, or someone, inside the anomaly reacting to the impact as opposed to being forcefully decelerated by it.\n\nRegardless, we estimate that this has bought us an additional §Yfive years§! to prepare for the arrival..."
  giga_blokkat.10024.a:99 "Splendid."
  
  preparing_to_fight_blokkats:99 "Intergalactic Anomaly - Military Preparation"
  preparing_to_tech_blokkats:99 "Intergalactic Anomaly - Technological Preparation"
  preparing_to_mega_blokkats:99 "Intergalactic Anomaly - Engineering Preparation"
  
  probed_blokkats_early:99 "Blokkat Probing Data"
  fought_blokkats_early:99 "Blokkat Combat Data"
  
  giga_blokkat.10025.name:99 "Intergalactic Anomaly Combat Data Analysed"
  giga_blokkat.10025.desc:99 "Following the Blokkats' arrival within our galaxy, our Research Bureau has been hard at work studying what little data we managed to acquire from our brief combat stunt with the Blokkat-Vester in intergalactic space.\n\nBy crossing it with the flood of data coming in from current Blokkat studies, we should be able to gain a slight military edge against Blokkat vessels."
  giga_blokkat.10025.a:99 "Excellent. So it wasn't all for nothing."
  
  giga_blokkat.10026.name:99 "Intergalactic Anomaly Probing Data Analysed"
  giga_blokkat.10026.desc:99 "Following the Blokkats' arrival within our galaxy, our Research Bureau has been hard at work studying the data our probe managed to acquire when it came into contact with the intergalactic anomaly.\n\nBy crossing it with the flood of data coming in from current Blokkat studies, we should be able to understand the Blokkats at least a little better."
  giga_blokkat.10026.a:99 "Delightful!"
  
  tremendous_ring:99 "Tremendous Ring System"
  tremendous_ring_desc:99 "This gas giant has a gigantic ring system, with an estimated diameter of 3,78 million kilometers."
  
  methane_oceans:99 "Methane Oceans"
  methane_oceans_desc:99 "This cold barren world has small oceans of liquid methane within its largest asteroid craters."
  
  nanite_deserts:99 "Nanite Deserts"
  nanite_deserts_desc:99 "50% of this planet's deserts are composed of sand-imitating nano-machines."
  
  coreless_planet:99 "Coreless Planet"
  coreless_planet_desc:99 "This planet totally lacks an iron core, making it valuable for physics research."
  
  core_facility:99 "Core Facility"
  core_facility_desc:99 "This planet totally lacks an iron core, but contains a gigantic research facility beneath the surface, which could be used for advanced research."
  
  cataclysmic_star:99 "Cataclysmic Variable Star"
  cataclysmic_star_desc:99 "This star contains a white dwarf, which leads to extreme instabilities within the star itself."
  
  oxygen_world:99 "Crystallized Oxygen World"
  oxygen_world_desc:99 "The surface of this planet is composed of crystallized oxygen, making it extremely valuable scientifically."
  
  natural_network:99 "Natural Global Network"
  natural_network_desc:99 "A unique genus of plants is creating a vast network around the planet, making it really valuable scientifically."
  
  fire_life:99 "Plasmatic Lifeforms"
  fire_life_desc:99 "Unique plasmatic lifeforms dwell on this planet, making it extremely hostile for organic life."
  
  red_toxic:99 "Red Toxic World"
  red_toxic_desc:99 "A recently discovered toxic world, whose atmosphere is filled with an unknown red coloured and toxic substance."
  
  scarlet_scourge:99 "Red Toxic World"
  scarlet_scourge_desc:99 "An incredibly hostile world, with an atmosphere filled with red particles of an advanced synthetic toxin that appears to be out of control."
  
  remnants_civ:99 "Civilization Remnants"
  remnants_civ_desc:99 "The remnants of a once great civilization remains on this world, damaged by the effects of the Scarlet Scourge."
  
  the_repository1:99 "The Repository"
  the_repository1_desc:99 "The vast research facility of the Innovation Forge enables advanced research and development activities on this world."
  
  the_repository2:99 "The Repository"
  the_repository2_desc:99 "The vast research facility of the Innovation Forge enables advanced research and development activities on this world, even without the Scourge still present."
  
  urmazin_utopia:99 "Urmazin Utopia"
  urmazin_utopia_desc:99 "The Urmazin are isolated from the rest of the galaxy in paradise, what's to be unhappy about?"
  
  
