  #############################################
  # Sentient Metal / Quasi-Negative-Mass Tech #
  #############################################
  tech_qnm_utilities:99 "Negative Mass Enhancements"
  tech_qnm_utilities_desc:99 "The $ehof_the_compound_text$ is a threat to all life in the galaxy, and possibly even beyond. Our tests have shown that negative mass is the only thing we know of that can harm them. From this lead, we have begun to develop energy weapons that employ negative mass so that we can finally fight back."
  
  tech_qnm_thrusters:99 "Negative Mass Thrusters"
  tech_qnm_thrusters_desc:99 "Research into negative mass has allowed us to expand its usage within our empire. The substance's exotic properties theoretically allow for non-hyperdrive based FTL travel, but the more mundane properties of our ship architecture mean that we have to settle for thrusters that simply go really, really fast."
  TECH_UNLOCK_QNM_THRUSTER_TITLE:99 "§HUnlocks Component:§! $tech_qnm_thrusters$"
  TECH_UNLOCK_QNM_THRUSTER_2_DESC:99 "§H$tech_qnm_thrusters$§!\nThe fastest thrusters the galaxy has ever seen!"
  
  tech_qnm_sensors:99 "Negative Mass Sensors"
  tech_qnm_sensors_desc:99 "Negative mass allows us to augment our existing sensors by creating much more precise signal filters, resulting in improved scan resolution and fleet detection."
  TECH_UNLOCK_QNM_SENSOR_TITLE:99 "§HUnlocks Component:§! $tech_qnm_sensors$"
  TECH_UNLOCK_QNM_SENSOR_DESC:99 "§H$tech_qnm_sensors$§!\n$tech_qnm_sensors_desc$"
  
  tech_qnm_shields:99 "Negative Mass Shields"
  tech_qnm_shields_desc:99 "Negative mass shields actively repel matter and energy striking them rather than simply dissipating the source at its point of impact."
  
  tech_qnm_reactors:99 "Negative Mass Reactors"
  tech_qnm_reactors_desc:99 "Negative mass reactors utilize polarized flows of the substance and \"normal\" energy to achieve near-perfect annihilation and commiserately massive power output."
  TECH_UNLOCK_QNM_REACTORS_TITLE:99 "§HUnlocks Component:§! $tech_qnm_reactors$"
  TECH_UNLOCK_QNM_REACTORS_DESC:99 "§H$tech_qnm_reactors$§!\n$tech_qnm_reactors_desc$"
  
  tech_qnm_jumpdrive:99 "Negative Mass Jump Drive Enhancements"
  tech_qnm_jumpdrive_desc:99 "The Jump Drive is already an unbelievable invention on its own, but with the unique properties of negative mass, we were able to enhance it even further! By infusing a ship with the substance at the moment of a jump, we can massively reduce the vessel's mass, and consequently, the amount of energy required to translate it across space. This allows us to travel farther and more routinely on the same basic Jump Drive design."
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE:99 "§HUnlocks Component:§! $tech_qnm_jumpdrive$"
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE_DESC:99 "§H$tech_qnm_jumpdrive$§!\n$ tech_qnm_jumpdrive_desc$"
  
  tech_sm_armor:99 "Sentient Metal Armor"
  tech_sm_armor_desc:99 "Sentient metal reconstitutes and replicates when damaged, dynamically adapting to environmental effects. This makes it a perfect substance for armor."
  
  tech_sm_auto_repair:99 "Sentient Metal Hull Regeneration"
  tech_sm_auto_repair_desc:99 "By constructing the hulls of our ships out of material which contain traces of sentient metal and material reservoirs, our ships can self-repair with extreme efficiency."
  
  tech_sm_computers:99 "Sentient Metal Intellect"
  tech_sm_computers_desc:99 "The capacities of the Sentient Metal hive mind are tremendous and far beyond even our most powerful information processing networks. By directly connecting it to the systems of our ships and structures, we can implement superordinate orders for it to control our ships and stations like no other ship computer before."
  TECH_UNLOCK_SM_COMPUTERS_TITLE:99 "§HUnlocks Component:§! $tech_sm_computers$"
  TECH_UNLOCK_SM_COMPUTERS_DESC:99 "§H$tech_sm_computers$§!\n$tech_sm_computers_desc$"
  
  tech_sm_flak_batteries:99 "Sentient Metal Flak Battery"
  tech_sm_flak_batteries_desc:99 "The $tech_sm_flak_batteries$ utilizes the material's local network intelligence to aim more precisely and accurately at incoming projectiles than we were ever able before."
  
  tech_sm_autocannons:99 "Sentient Metal Ripper"
  tech_sm_autocannons_desc:99 "The $tech_sm_autocannons$ shoots numerous tiny sentient metal spikes, each programmed to assimilate any form of matter they come into contact with, then condensing into a sphere and disconnecting from its point of contact."
  
  tech_sm_mass_drivers:99 "Sentient Metal Railgun"
  tech_sm_mass_drivers_desc:99 "The $tech_sm_mass_drivers$ amalgamates and then fires a small sentient metal spike programmed to absorb any form of matter it comes into contact with. Once the projectile reaches a certain threshold of absorbed material, it condenses into a sphere and decouples."
  
  tech_sm_kinetic_artillery:99 "Sentient Metal Artillery"
  tech_sm_kinetic_artillery_desc:99 "The $tech_sm_kinetic_artillery$ amalgamates and then fires a large spike of $giga_sr_sentient_metal$ programmed to absorb any form of matter it comes into contact with. Fighters and small ships are immediately assimilated; larger ships sustain heavy damage as sentient metal rips chunks out of their hull."
  
  tech_sm_mass_accelerator:99 "Sentient Metal Absorber"
  tech_sm_mass_accelerator_desc:99 "The $giga_sr_sentient_metal$ Absorber launches enormous $giga_sr_sentient_metal$ spikes, often large enough to fully assimilate smaller ships in a single shot."
  
  tech_sm_titanic:99 "Sentient Metal Devourer"
  tech_sm_titanic_desc:99 "The $tech_sm_titanic$ doesn't directly utilize sentient metal to damage its targets. Rather, it uses the material's connection to the $ehof_the_sphere_named$, along with the $ehof_ep$, to have the $ehof_the_sphere_named$ open a power transfer $ehof_wormhole_text$. It directs the resultant colossal outpouring of energy towards enemy vessels."
  
  tech_qnm_pd_tracking:99 "Negative Mass Point Defense"
  tech_qnm_pd_tracking_desc:99 "The $tech_qnm_pd_tracking$ fires an expanding wave of negative mass towards incoming projectiles, throwing them off-course."
  
  tech_qnm_lasers:99 "Negative Mass Laser"
  tech_qnm_lasers_desc:99 "The $tech_qnm_lasers$ employs a focused negative mass conduit to decohere any form of matter, baryonic or otherwise."
  
  tech_qnm_plasma:99 "Negative Mass Pseudoplasma Launcher"
  tech_qnm_plasma_desc:99 "The $tech_qnm_plasma$ fires coherent spheres of negative mass that explosively disrupt any form of matter they strike."
  
  tech_qnm_disruptors:99 "Negative Mass Disruptor"
  tech_qnm_disruptors_desc:99 "The $tech_qnm_disruptors$ fires waves of tremendously destructive negative mass which decohere large swathes of matter. Unfortunately, these waves dissipate after a short distance."
  
  tech_qnm_energy_torpedoes:99 "Negative Mass Torpedoes"
  tech_qnm_energy_torpedoes_desc:99 "$tech_qnm_energy_torpedoes$ use the repulsive force of negative mass to amplify the destructive power of our packed neutron warheads."
  
  tech_qnm_energy_lance:99 "Negative Mass Lance"
  tech_qnm_energy_lance_desc:99 "The $tech_qnm_energy_lance$ fires a continuous ray of negative mass, tearing apart even the most reinforced material defenses at the subatomic (or equivalent) level."
  
  tech_qnm_arc_emitter:99 "Negative Mass Emitter"
  tech_qnm_arc_emitter_desc:99 "The $tech_qnm_arc_emitter$ fires a scatter-shot of randomly polarized and spun negative mass rays, to which dedicated defenses are nothing but more hull."
  
  tech_qnm_titanic:99 "Negative Mass Beam"
  tech_qnm_titanic_desc:99 "The $tech_qnm_titanic$ is a titanic focused ray that decoheres vast swathes of matter in a single hit."
  
  
  
