  ehof_trader:99 "§SUrmazin§!"
  ehof_alt_qnm:99 "§Hhym'Gir'An-tir Jas§!"
  ehof_trader_d:99 "§BDreamer§!"
  ehof_trader_t:99 "§BThreshold§!"
  ehof_trader_dt:99 "§BDreamer's Threshold§!"
  ehof_trader_dominion:99 "The Dominion"
  ehof_trader_machines:99 "The Excognitor"
  ehof_trader_new_system:99 "[urmazin_capital.GetName]"
  ehof_trader_old_system:99 "[urmazin_system_01.GetName]"
  ehof_trader_realm:99 "the realm of the one that dreams"
  ehof_galactic_market:99 "$galactic_market_station$"
  ehof_trader_gateway:99 "§S$ehof_trader$ Wormhole§!"
  ehof_trader_gateway_plural:99 "§S$ehof_trader$ Wormholes§!"
  ehof_trader_gateway_DESC:99 "The wormhole gates do not appear to be natural. They are placed in a perfectly circular ring around a central hub, connecting all the $ehof_trader$ systems."
  ehof_mega_trader.008.desc:99 "This is an armistice zone. No armed vessels are permitted here.\n\nYour military ships will be evicted immediately."
  r_rare_system:99 "bountiful system"
  r_rare_system_desc:99 "The coordinates of a system allegedly laden with resources (caveat emptor). We can reach it via the $ehof_ehof$."
  
  ehof_mega_trader.002.name:99 "The Urmazin"
  ehof_mega_trader.002.desc:99 "We've received astonishing reports from the §H[root.GetName]§! after it traveled through the $ehof_ehof$. The $ehof_trader_new_system$ system it arrived in is filled with numerous space stations and ships. The system appears to be heavily terraformed and astroengineered - almost all of the planets in the system are covered in gigantic cities, and the planetary orbits are too perfect to be natural.\n\n§H[root.GetName]§! is receiving transmissions from all over the system. It appears the inhabitants have somehow already translated our language, and want to talk to us."
  ehof_mega_trader.002.a:99 "Fascinating! Put them on screen."
  
  ehof_mega_trader.003.desc:99 "Greetings, §H[root.owner.GetSpeciesClassPlural]§! from the beyond. Welcome to our glorious utopia, $ehof_trader_new_system$.\n\nWe are the $ehof_trader$ and our intentions are peaceful. We are sorry that we don't introduce ourselves further, or let you introduce yourselves first, but the situation is urgent.\n\nWe must ask you if you possess an extremely rare resource, which is essential for the survival of our civilization.\n\nDo you possess $ehof_alt_qnm$?"
  ehof_mega_trader.003.a:99 "What is $ehof_alt_qnm$?"
  
  ehof_mega_trader.004.desc:99 "$ehof_alt_qnm$ is a unique and unimaginably rare substance that possesses properties like no other.\n\nIt has a negative gravitational charge, a negative mass, and is able to negatively warp spacetime.\n\nThis unique property is what allows us to stabilize the $ehof_trader_dt$.\n\nIf you possess $ehof_alt_qnm$ and would be ready to share some of it with us, there would be a reward for your kindness!"
  ehof_mega_trader.004.a:99 "This sounds similar to §HNegative Mass§!..."
  
  ehof_mega_trader.005.desc:99 "So you know about $ehof_alt_qnm$?\n\nIf you have §HNegative Mass§! to spare, we would reward you a great treasure from beyond the $ehof_trader_dt$!\n\nWe could even show you the pathway to some of the extraordinary solar systems we located while mapping the stars with the gifts granted to us by the $ehof_trader_d$.\n\nWill you help us, §H[root.owner.GetSpeciesClassPlural]§! from beyond the Threshold?"
  ehof_mega_trader.005.a:99 "You've got yourselves a deal."
  
  ehof_mega_trader.006.desc:99 "Salutations, §H[root.owner.GetSpeciesClassPlural]§! from beyond the Threshold!\n\nThough you're most welcome to stay as long as you like, we need time to replenish our stock. You will need to wait §Y5 Years§! £time£ before we can offer different goods.\n\nDo you have some §HNegative Mass§! you would like to trade?"
  
  ehof_mega_trader.006.c:99 "The $ehof_trader_new_system$ system has so many wormholes..."
  ehof_mega_trader.006.c.response:99 "Wormholes are our only form of interstellar travel. We're capable of generating both permanent and temporary connections, much like the ones you seem able to create. Through the use of §HNegative Mass§!, we can stabilize the wormholes indefinitely. We only open wormholes from $ehof_trader_new_system$ to other systems because the amount of §HNegative Mass§! we possess to open wormholes is so limited.\n\nOr, at least, it was until we happened across you.\n\nIt is possible for us to create temporary wormholes in order to travel to other systems, but doing so takes more energy, and leaves us with no way to return. This is not beneficial to $ehof_trader_new_system$ and our dream of building a utopia of never-before-seen magnitude. It has been a goal we set a millennia ago, after the great war and the events inside our original home system, $ehof_trader_old_system$.\n\nHowever, with your technology, these systems would be beneficial to you and you would be free to do with them whatever you desire."
  
  ehof_mega_trader.006.d:99 "What do you know about §HNegative Mass§!?"
  ehof_mega_trader.006.d.response:99 "Though we discovered §HNegative Mass§! long ago, we have yet to explore all of its secrets. What we do know is that it cannot, or at least is extremely unlikely to, emerge naturally.\n\nIts properties appear to violate multiple fundamental laws of physics. For example, the stress component of the stress-energy tensor is larger than the mass density of the space in which it is located, which should be impossible.\n\nTrue §HNegative Mass§! is not like the pseudo-negative mass properties of the negative energy density of a vacuum that drives the universe's expansion.\n\nThat you have §HNegative Mass§! in larger magnitudes than we've ever able to gather from the $ehof_trader_dt$, without creating it yourself, means it was either created in an extremely unlikely event... or by incredibly advanced beings.\n\nWe believe the latter to be true."
  
  ehof_mega_trader.006.b:99 "We'd like to know more about you."
  ehof_mega_trader.007.desc:99 "What would you like to know?"
  ehof_mega_trader.007.a:99 "Who are you?"
  ehof_mega_trader.007.a.response:99 "We are the $ehof_trader$, an egalitarian society of techno-organic lifeforms, gifted with psionic abilities by the $ehof_trader_d$.\n\nOur goal is to make $ehof_trader_new_system$ into an astonishing utopia of never-before-seen magnitude.\n\nWe live in harmony with the $ehof_trader_d$, who is guiding us towards this ultimate goal, while we grow together and evolve peacefully and mindfully."
  
  ehof_mega_trader.007.b:99 "What is your history?"
  ehof_mega_trader.007.b.response:99 "Our central hub, $ehof_trader_new_system$, is connected to $ehof_trader_old_system$, our original home system.\n\nYou may have noticed that the whole system is devastated. Those are the remains of the fleets, habitats and structures of our organic forerunners.\n\nMillennia ago, when they were still planet-bound, the $ehof_trader_dt$ already existed in the $ehof_trader_old_system$ system. It is unknown how long it had been there, but references to it exist across all our recorded history.\n\nWhen they first saw evidence of the $ehof_trader_d$, our predecessors set their focus on reaching it. Even though it took them centuries to leave their homeworld, their focus never wavered. Reaching $ehof_trader_dt$ was their main goal. The $ehof_trader_t$ appeared to be some kind of planet, in reality, it is a gate, a portal to an extra-dimensional realm: $ehof_trader_realm$.\n\nWhen they first physically entered $ehof_trader_realm$, our predecessors came into contact with the $ehof_trader_d$. It was kind and considerate, teaching them about the inter-dimensional reality they found themselves in.\n\nThey lived in harmony with $ehof_trader_d$ and were guided towards higher states of society and being by it.\n\nWith this enlightenment, their civilization soon developed into a glorious stellar empire. All the worlds of the $ehof_trader_old_system$ system were colonized, and the empire was centered around the $ehof_trader_dt$.\n\nUnfortunately, this wonderful era could not last. $ehof_trader_old_system$ was fully exploited and running out of resources, and with no more room to expand, the great stellar empire would perish.\n\nThe only logical choice was extrasolar expansion. Unfortunately, they had not developed faster-than-light travel technologies, and sending countless people on generation ships to a barely-habitable neighboring system was no option.\n\nThe empire decided to develop a machine intelligence that would traverse the gap between $ehof_trader_old_system$ and its nearest neighbor, $ehof_trader_new_system$, to terraform it for the empire."
  
  ehof_mega_trader.007.continue:99 "Continue."
  
  ehof_mega_trader.007.b.response.b:99 "Many years passed since the terraforming machines were first sent on their journey. They had long since terraformed $ehof_trader_new_system$. As time passed, though, the machines became self-aware, and grew to love the $ehof_trader_new_system$ system and view themselves as its rightful keepers.\n\nThis drove a wedge between the empire and their machines that would inevitably boil over into all-out war.\n\nWhen the two empires did finally fight, they found themselves evenly matched. If the war would have continued the way it was, it would have led to the extinction of both. In order to prevent the loss of two species, the $ehof_trader_d$ proposed a solution that would not only end the war, but also solve the problems between the two: it would unify the organics of $ehof_trader_old_system$ and the machines of $ehof_trader_new_system$ into a new kind of being...\n\n... us.\n\nAfter our people were born, we made it our goal to create a perfect utopia in $ehof_trader_new_system$, and have since left the scarred $ehof_trader_old_system$ as a monument to the foolishness of those who came before us."
  
  ehof_mega_trader.007.c:99 "What are the $ehof_trader_d$ and the $ehof_trader_t$?"
  ehof_mega_trader.007.c.response:99 "The $ehof_trader_d$ is an immaterial entity inhabiting $ehof_trader_realm$. It is unknown when the $ehof_trader_dt$ was created, but it certainly predates our organic forerunners.\n\n§HNegative Mass§! keeps the $ehof_trader_dt$ open, but it is also what allows us to open and maintain wormholes to other systems. Unfortunately, the amount of §HNegative Mass§! within the $ehof_trader_dt$ is finite. One day, either our expansion would end or the $ehof_trader_t$ would collapse and cut our connection to the $ehof_trader_d$, which would lead to the loss of our psionic abilities and $ehof_trader_d$ guidance. Both of these events would lead to the collapse of our civilization, which is why we need your §HNegative Mass§! to avoid this fate."
  
  ehof_mega_trader.006.a:99 "§HTrade§!"
  ehof_mega_trader.101.desc:99 "We have a few dream-relics we can exchange for §HNegative Mass§!. Keep in mind that since they are phantasmal reflections which we fish out of the $ehof_trader_dt$, they are §Rone time use§! items - and that we only replenish our stock every §Y5 years§! £time£.\n\nWhich of these reflections-made-real would you like to trade for?"
