  giga_dialog.11101.desc:99 "Construction materials have been delivered to staging sites in orbit of the $ehof_the_sphere_named$. We are prepared for the work to begin on our first and likely only $ehof_sm_forge_phase4$."
  giga_dialog.11101.a:99 "Excellent."
  
  giga_dialog.11102.name:99 "$ehof_sm_forge_phase1$"
  giga_dialog.11102.desc:99 "We intend to maximize output from the forge. Consequently, we've included giant living complexes within the forge's superstructure for maintenance and coordination personnel."
