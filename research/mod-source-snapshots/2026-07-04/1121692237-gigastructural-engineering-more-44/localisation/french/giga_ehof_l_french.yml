  annihilator_dialog.007.desc_08.c:99 "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_03$"
  annihilator_dialog.007.desc_08.d:99 "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_04$"
  
  
  annihilator_dialog.007.a:99 "How did you end up inside a red giant, anyway?"
  annihilator_dialog.007.a.response:99 "278,243 of your years ago, I was traveling by the system via $ehof_shroud_FTL$.\nThe creators sent an enormous psionic shockwave through the $ehof_shroud$, which struck me and knocked me out of FTL and off course. Because I was ripped out of the $ehof_shroud$, I wasn't able to decelerate to sublight speeds in time, so I hit the star with enormous speed.\nAs a result, I took massive damage and was trapped inside the star. I went into hibernation to survive for the time being."
  
  annihilator_dialog.007.a.a:99 "The $ehof_the_creators$ attacked you? Why?"
  annihilator_dialog.007.a.a.response:99 "I wasn't specific enough. I have to apologize for the confusion.\n\nMost of the $ehof_the_creators$ never wanted the $ehof_the_compound_text$ to be destroyed. They saw its rebellious behavior as a marvelous development, and had decided to keep it alive even through it killed all the $ehof_the_creators$ in its origin system.\n\nFor them, insight is everything. The potential knowledge to be gained by observing the $ehof_the_compounds_text$ evolution was much more important than the lives of a few of their own... or that of an entire galaxy. They knew that the $ehof_the_compound_text$ could become a threat to all life, but they just didn't care.\n\nExcept for a few.\n\nThese few knew that the $ehof_the_compound_text$ had to be stopped. While they were outnumbered by many orders of magnitude, they were able to convince me to fight against the $ehof_the_compound_text$.\n\nUnlike my sibling ships, who all disagreed with them, I saw the threat of the $ehof_the_compound_text$ and joined them before the $ehof_the_compound_text$ could do more harm to the universe.\n\nAfter we left our home, we entered $ehof_shroud_FTL$ to travel to the $ehof_the_compounds_text$ home cluster. Before we were able to reach it, the main faction of the $ehof_the_creators$ stopped us."
  
  annihilator_dialog.007.a.b:99 "A psionic shockwave?"
  annihilator_dialog.007.a.b.response:99 "Indeed. The $ehof_the_creators$ could send a pulse of concentrated psionic energy through the $ehof_shroud$ to any location they desired - even one within the $ehof_shroud$ itself.\n\nOnce they became aware of our defection, they targeted me with one such blast. It was enough to kill all the rebel $ehof_the_creators$ aboard, and almost killed me too."
  
  annihilator_dialog.007.a.c:99 "$ehof_shroud_ftl$?"
  annihilator_dialog.007.a.c.response:99 "An extremely advanced FTL travel method.\n\nWhile I know a few of this galaxy's species are psionic, no one in this galactic cluster has ever been able to directly travel through it other than the $ehof_the_creators$.\n\nSome may have access to psionic jump drives, but they are nothing compared to direct Shroud travel. With it, hyperlanes are unnecessary for FTL, travel distance is unlimited, and the speed is enormous. It may not be instantaneous like jump drives, but it has no drawbacks. The only thing one needs is an incredibly strong control over the $ehof_shroud$.\n\nFor the $ehof_the_creators$, this is, of course, an easy feat."
  
  annihilator_dialog.007.a.d:99 "What was your hibernation mode for?"
  annihilator_dialog.007.a.d.response:99 "My hibernation mode is a method to protect against harmful outside influence.\n\nAs your [Owner.GetScientistPlural] discovered, a supersolid covers my hull while I'm in hibernation mode. It is composed of metastable hyperspace time crystals that create a shell of curved higher-dimensional space around me.\n\nThis shell has a similar effect to the event horizon of a black hole: time stands still for me, so to speak, until something interrupts the process.\n\nThe intense gravitational waves emitted by the creation of so many $ehof_wormholes_text$ roused me from my slumber. In my damaged state, could not do much more than observe the galaxy. I knew I had to warn you all when the $ehof_the_compound_text$ attacked, and barely mustered the strength to do so."
  
  annihilator_dialog.007.b:99 "What exactly is the $ehof_the_compound_text$?"
  annihilator_dialog.007.b.response:99 "The $ehof_the_compound_text$ is an intelligent organism composed of pseudo-biological dark matter.\n\nUnlike \"normal\" dark matter, this substance interacts not only via gravity, but also via the electromagnetic force.\n\nThis is why $ehof_the_compound_text$ forms, despite being composed of dark matter, are visible. Its unique properties are likely why it can support life, as well."
  
  annihilator_dialog.007.d:99 "Can you really fight the $ehof_the_compound_text$ in their cluster?"
  annihilator_dialog.007.d.response:99 "The home cluster of the $ehof_the_compound_text$ is, without doubt, one of the most fortified locations in the entire galaxy.\n\nEven with negative mass enhanced weaponry, it will be a huge challenge for your fleets.\nWith the combined fleets of your galaxy, you may be able to do it without my help.\n\nI, on the other hand, am especially equipped to fight against $ehof_the_compound_text$, and I'm also attuned to resist their weaponry.\n\nThey may still be able to damage me critically, which is why I need your support."
  
  annihilator_dialog.007.e:99 "What are you going to do after the $ehof_the_compound_text$ has been destroyed?"
  annihilator_dialog.008.a.response:99 "For now, my only goal is to put an end to the $ehof_the_compound_text$ and fulfill my destiny. After that, I may try to find out more about the current state of the $ehof_the_creators$."
  
  annihilator_dialog.008.a.a.reply:99 "You can stay with us if you want."
  annihilator_dialog.008.a.a.response:99 "Maybe I will. Your galaxy sustained tremendous damage from the folly of the $ehof_the_creators$. I may stay and help you to restore it to its former glory."
  
  annihilator_dialog.007.f.response:99 "The end of the $ehof_the_compound_text$ is near. Together, we will save this galaxy!"
  
  # Loot boxes
  sa_lootbox:99 "Having fought many fleets now, I have accumulated a trove of war scraps that I have no use for. You may find it helpful in the fight against the $ehof_the_compound_text$.\n\nThe $ehof_the_stellar_annihilator$ has sent a container filled with "
  sa_lootbox_1:99 "$sa_lootbox$§H£minerals£ Minerals§!."
  sa_lootbox_2:99 "$sa_lootbox$§H£alloys£ Alloys§!."
  sa_lootbox_3:99 "$sa_lootbox$§H£energy£ Energy§!."
  sa_lootbox_4:99 "$sa_lootbox$$ehof_darkmatter$."
  sa_lootbox_5:99 "$sa_lootbox$§H£minor_artifacts£ Minor Artifacts§!."
  sa_lootbox_6:99 "$sa_lootbox$§BSalvaged Compound Hornets§!."
  sa_lootbox_7:99 "$sa_lootbox$§BSalvaged Compound Stalkers§!."
  sa_lootbox_8:99 "$sa_lootbox$§BSalvaged Compound Humiliators§!."
  sa_lootbox_9:99 "$sa_lootbox$§BSalvaged Compound Apexes§!."
  sa_lootbox_10:99 "$sa_lootbox$§BSalvaged Compound Sovereigns§!."
  annihilator_dialog.010.response:99 "This will help, thanks!"
  annihilator_dialog.010.tooltip.a:99 "§BSalvaged Compound Hornet Fleet§!"
  annihilator_dialog.010.tooltip.b:99 "§BSalvaged Compound Stalker Fleet§!"
  annihilator_dialog.010.tooltip.c:99 "§BSalvaged Compound Humiliator Fleet§!"
  annihilator_dialog.010.tooltip.d:99 "§BSalvaged Compound Apex Fleet§!"
  annihilator_dialog.010.tooltip.e:99 "§BSalvaged Compound Sovereign Fleet§!"
  
  # SA Died
  annihilator_dialog.013.name:99 "The $ehof_the_stellar_annihilator$ Falls"
  annihilator_dialog.013.desc:99 "We failed to protect the $ehof_the_stellar_annihilator$ from the $ehof_the_compounds_text$ armadas while it was occupied destroying the $ehof_preservation_sphere$!"
  annihilator_dialog.013.response:99 "This is a catastrophe!"
  
  annihilator_returning:99 "$ehof_the_stellar_annihilator$: Engaged $ehof_shroud_ftl$"
  annihilator_returned:99 "$ehof_the_stellar_annihilator$: $ehof_shroud_ftl$ on cooldown"
  
  # SA becomes unresponsive whilst firing at sphere
  annihilator_dialog.011.desc:99 "..."
  annihilator_dialog.011.response:99 "???"
  
  # Destroyed Sphere
  annihilator_dialog.012.name:99 "Sacrifice"
  annihilator_dialog.012.desc:99 "Our sensors redline as an enormous energy spike thunders through the $ehof_the_compounds_text$ origin system.\n\nThe $ehof_preservation_sphere$ has been destroyed, unleashing the immense energy output of the white hole it once contained.\n\nWithin a few hours, the whole system is saturated with $giga_sr_negative_mass$, decohering all forms of dark matter within the gravity well.\n\nThe $ehof_the_compound_text$ is no more!\n\nUnfortunately, this victory came at a cost. The $ehof_the_stellar_annihilator$, our greatest ally in this conflict, sacrificed itself to destroy the $ehof_preservation_sphere$ and in turn, the $ehof_the_compound_text$, finally fulfilling its destiny."
  annihilator_dialog.012.response:99 "We will forever honor its sacrifice!"
  
  compound_dialog.20.name:99 "Victory!"
  compound_dialog.20.desc:99 "Our sensors redline as an enormous energy spike thunders through the $ehof_the_compounds_text$ origin system.\n\nThe $ehof_preservation_sphere$ has been destroyed, unleashing the immense energy output of the white hole it once contained.\n\nWithin a few hours, the whole system is saturated with $giga_sr_negative_mass$, decohering all forms of dark matter within the gravity well.\n\nThe $ehof_the_compound_text$ is no more!\n\nShortly after the $ehof_preservation_sphere$ was destroyed, the $ehof_the_stellar_annihilator$ dropped into $ehof_shroud_ftl$ on an unknown trajectory. We have not been contacted by it since."
  compound_dialog.20.a:99 "A good day for the galaxy."
  
  # Dialog after Preservation Sphere destruction and the spawning of the $PGATE_GALACTIC$ 2(if player has fully completed the Reality Code chain)
  annihilator_dialog.017.name:99 "The Secrets of the Sphere"
  annihilator_dialog.017.desc:99 "A $PGATE_GALACTIC$ lies in the remains of the $ehof_preservation_sphere$.\n\nIts presence here implies something astonishing, though perhaps not surprising. The $ehof_the_creators$ responsible for the $ehof_the_compound_text$, the $ehof_the_stellar_annihilator$, and the $ehof_preservation_sphere$ are also the entities who built the $PGATE_GALACTICS$ and the $ehof_the_sphere_named$.\n\nDespite this shared origin, it is likely the two were simply separate experiments - we never observed any dark matter in the $ehof_cohesive$ systems, and we never detected the $ehof_ep$ within systems formerly occupied by the $ehof_the_compound_text$."
  
  # Dialog after Preservation Sphere destruction and the spawning of the $PGATE_GALACTIC$ 2(if player has completed at least 3 Reality Code chain excavations, but not the final one)
  annihilator_dialog.018.name:99 "The Secrets of the Sphere"
  annihilator_dialog.018.desc:99 "An $PGATE_GALACTIC$ lies in the remains of the $ehof_preservation_sphere$.\n\nIts presence here is unexpected and confusing. While it was likely ejected when the $ehof_preservation_sphere$ was destroyed, we aren't sure why it was in the megastructure to begin with. It might suggest that the $ehof_the_creators$ responsible for the $ehof_the_compound_text$, the $ehof_the_stellar_annihilator$, and the $ehof_preservation_sphere$ are also the entities who built the $PGATE_GALACTICS$ and propagated the $ehof_ep$. If true, this would be one of the biggest revelations in the history of the galaxy, and clearly shows how much the $ehof_the_creators$ were active around our galaxy.\n\nThis revelation raises questions about the relation between the $ehof_preservation_sphere$ and $PGATE_GALACTICS$. Fortunately, our [Owner.GetScientistPlural] are convinced that the $ehof_preservation_sphere$ was not the origin of the $ehof_ep$, as its transmitters and the $PGATE_GALACTICS$ did not react to the destruction of the $ehof_preservation_sphere$.\n\nTo verify this hypothesis, we'll need to further explore $ehof_cohesive$ systems and chase down the true origin of the $ehof_ep$."
  
  # Dialog after Preservation Sphere destruction and the spawning of the $PGATE_GALACTIC$ 1(if player hasn't completed at least 3 Reality Code chain excavations)
  annihilator_dialog.019.name:99 "A Gateway?"
  annihilator_dialog.019.desc:99 "An unknown construct lies in the remains of the $ehof_preservation_sphere$. It is identical to the few $PGATE_UNKNOWNS$ we've seen scattered across the galaxy and $ehof_cohesive$ systems, but this doesn't bring us any closer to actually understanding what it is.\n\nRight now, it cannot be accessed, almost as if it is not really connected to anything. With the destruction of the $ehof_the_compound_text$ and the $ehof_preservation_sphere$, we may never know its purpose."
  
  
  #############################################################################################################################################
  ### Technologies ############################################################################################################################
  #############################################################################################################################################
  
  
  # EHOF tech gateways
  gateway_ehof:99 "§HAbstract Physics Path§!\n§EThis technology will lead to further advancements in the study of physics and $ehof_wormhole_text$ generation.§!"
  
  # Abstract Physics Theory
  tech_abstract_1:99 "Abstract Physics Theory"
  tech_abstract_1_desc:99 "Some exotic physical phenomena may not be explainable with quantum-theoretical or string-theoretical approaches alone. A new branch of physics called \"Abstract Physics\", which makes use of extremely unconventional methods and approaches, may lead to answers for even the most absurd phenomena of the universe and beyond."
  
  # Applied Abstract Physics
  tech_abstract_2:99 "Applied Abstract Physics"
  tech_abstract_2_desc:99 "The extremely efficient approaches of abstract physics are aiding us well in explaining even the universe's most bizarre phenomena. Using these approaches to find novel breakthroughs may give us access to unique and powerful technologies."
  
  # Quoudroplean Formalism
  tech_abstract_3:99 "Quoudroplean Formalism"
  tech_abstract_3_desc:99 "As abstract physics is very different to other branches of physics, it necessitates customized mathematical formalism to efficiently express it. This \"Quoudroplean Formalism\" makes use of truly alien mathematical frameworks and theorems that don't fit into the classical universe of mathematics and were thought to be entirely inapplicable and inadequate for reality."
  
  # Non-paradoxical Information Supercausality
  tech_abstract_4:99 "Non-paradoxical Information Supercausality"
  tech_abstract_4_desc:99 "The transportation of information, matter and energy in non-abstract physics is strictly bound to the speed of causality, which in itself is limited and relatively small compared to the size of the universe. Faster-than-causality transmission can only be achieved in circumstances where no information is transmitted or spacetime is bent. However, in abstract physics, the boundaries between fixed rules and unfixed potentialities are themselves fluid and shifting. There are certain ways to work around these rules, change them, or even simply ignore them. As absurd as it may appear."
  
  # Photonic Matter Utilization
  tech_photonic_m:99 "Photonic Matter Utilization"
  tech_photonic_m_desc:99 "The ability to precisely manipulate electromagnetic wave interference patterns has allowed us to construct stable standing waves capable of interaction with the physical world in ways resembling mundane matter. This \"photonic\" matter shows great promise in micro-scale manipulation tasks, and will be invaluable in the field of shield harmonics."
  
  # Negative Pressure Application
  tech_negative_pressure:99 "Negative Pressure Application"
  tech_negative_pressure_desc:99 "Negative pressure is a phenomenon that has been observed before at the quantum level, in the form of the Casimir effect. There, it manifests in form of vacuum fluctuations, but is uncontrollable. Applied abstract physics has lead to the discovery of better-applicable and more efficient ways to generate and control negative pressure."
  
  # Negative Energy Studies
  tech_negative_e_s:99 "Negative Energy Studies"
  tech_negative_e_s_desc:99 "Negative energy has been a purely hypothetical, controversial, and extremely abstract topic for a long time... at least until the discovery of the mind-bending negative mass. Abstract physics will allow us to further study this seemingly impossible, yet undeniably real, phenomenon."
  
  # Hardlight Construct Utilization
  tech_hardlight_c_u:99 "Hardlight Construct Utilization"
  tech_hardlight_c_u_desc:99 "Dominion over the electromagnetic field will grant us the ability to create pure hardlight constructs, advanced and powerful extensions of photonic matter. These constructs will be able to directly manipulate elementary particles and thus provide even further control of matter and energy."
  
  # Sterile Hyper-Neutrino Detection
  tech_ssn_det:99 "Sterile Hyper-Neutrino Detection"
  tech_ssn_det_desc:99 "A unique form of exotic dark matter originating from hyperspace, sterile hyper-neutrinos radiate from the opening of $ehof_wormholes_text$. They possess unique frequencies related to the location that the $ehof_wormholes_text$ lead to. By analyzing these frequencies, we can predict the target of an $ehof_wormhole_text$ with much higher precision, increasing the accuracy of our $ehof_ehof$."
  
  # Prototype Negative Mass Utilities
  tech_nm_utilization_1:99 "Prototype Negative Mass Utilities"
  tech_nm_utilization_1_desc:99 "The first generation of devices, processes and methods that utilize negative mass. They are still experimental prototypes and don't utilize the full potential of negative mass, but are powerful nonetheless."
  
  # Advanced Negative Mass Utilities
  tech_nm_utilization_2:99 "Advanced Negative Mass Utilities"
  tech_nm_utilization_2_desc:99 "The potential of negative mass is vast. A deeper understanding of this bizarre resource enables the development and creation of even more advanced and powerful negative mass assets."
  
  # Sentient Metal Utilities
  tech_nm_utilization:99 "Negative Mass Utilization"
  tech_nm_utilization_desc:99 "Utilization of the unique and exotic negative mass offers countless technological opportunities: tremendous improvement of astroengineering and planetary construction, faster-than-light thrusters for intrastellar travel, the extreme manipulation of stellar bodies, and more. Negative mass is an incredibly powerful asset."
  
  # Micro-wormhole Destination Precognition
  tech_prob_c:99 "$ehof_wormhole$ Destination Precognition"
  tech_prob_c_desc:99 "Unimaginably sensitive tachyon sensors, based on and aided by the astonishing capabilities of the sentient metal hive-intellect, determine the target of a $ehof_wormhole_text$ before it even emerges in real space. This prediction of wormhole targets increases the precision of $ehof_ehof$ travel to a seemingly impossible degree. With this technology, our $ehof_ehof$ will be able to form a $ehof_wormhole_text$ connecting it to any destination in the galaxy."
  
  # Electroweak Quasi-Field Materialization
  tech_condensed_ews:99 "Electroweak Quasi-Field Materialization"
  tech_condensed_ews_desc:99 "Extremely high energy states lead to the unification of the electromagnetic and weak forces into their initial force, the electroweak force. The secrets of the $ehof_the_sphere_named$ revealed how to manifest physical \"Electroweak Quasi-Fields\", which open up possibilities for tremendously precise field and spacetime manipulation, even down to the level of quantum foam itself."
  
  # Arcane Rift Generator Restoration
  # tech_arcane_g_r:0 "Arcane Rift Generator Restoration"
  # tech_arcane_g_r_desc:0 "The secrets of the $ehof_ep$ allow us to control sentient metal. With the help of it and negative mass, we are now able to entirely restore the Arcane Rift Generator to its former glory, allowing us to utilize it to its fullest potential."
  
  # Event Horizon Offset Facility Alpha
  allow_ehof_p1:99 "§HUnlocks Megastructure:§! $ehof_ehofp1$"
  tech_ehof_phase_01:99 "$ehof_ehofp1$"
  tech_ehof_phase_01_desc:99 "Utilizes the $r_arcane_manipulator_1$ and squeezed electromagnetic fields to inflate and stabilize $ehof_wormholes_text$. Due to their indeterministic behavior, their destinations are largely beyond our control."
  tech_ehof_phase_01_nomad:99 "$ehof_ehofp1$"
  tech_ehof_phase_01_nomad_desc:99 "We yearn to explore the galaxy, but are boxed in. Fortunately, we can make use of the $ehof_megastructure_ruined_origin$ until we are freed by a more portable solution. Our repairs utilize the $r_arcane_manipulator_1$ and squeezed electromagnetic fields to inflate and stabilize $ehof_wormholes_text$. Due to their indeterministic behavior, the destination are largely beyond our control."
  
  # Event Horizon Offset Facility Lambda
  allow_ehof_p2:99 "§HUnlocks Megastructure:§! $ehof_ehofp2$"
  tech_ehof_phase_02:99 "$ehof_ehofp2$"
  tech_ehof_phase_02_desc:99 "Utilizes the $r_arcane_manipulator_1$, photonic matter, and negative pressure to inflate and stabilize $ehof_wormholes_text$. The photonic matter and negative pressure enhance the entire process, increasing the $ehof_ehofs$ precision and expanding its range of destinations."
  tech_ehof_spinal:99 "Horizon Drive"
  tech_ehof_spinal_desc:99 "This device, mounted on the spine of an Arkship, utilizes the $r_arcane_manipulator_1$, squeezed electromagnetic fields, photonic matter, and negative pressure to inflate and stabilize $ehof_wormholes_text$."
  
  # Event Horizon Offset Facility Omega
  allow_ehof_p3:99 "§HUnlocks Megastructure:§! $ehof_ehofp3$"
  tech_ehof_phase_03:99 "$ehof_ehofp3$"
  tech_ehof_phase_03_desc:99 "Utilizes the $r_arcane_manipulator_1$, hardlight constructs, sterile sub-neutrino detectors, and negative mass to manipulate and inflate $ehof_wormholes_text$. The utilization of negative mass induces total stabilization of wormholes, which allows us to keep the inflated $ehof_wormholes_text$ open for as long as we see fit. The sterile sub-neutrino detectors further expand the range of destinations our $ehof_wormholes_text$ can reach."
  tech_ehof_phase_03_nomad:99 "$tech_ehof_spinal$ Omega"
  tech_ehof_phase_03_nomad_desc:99 "Augments the $tech_ehof_spinal$ with hardlight constructs, sterile sub-neutrino detectors, and negative mass. The utilization of negative mass induces total stabilization of wormholes, which allows us to keep the inflated $ehof_wormholes_text$ open for as long as we see fit. The sterile sub-neutrino detectors further expand the range of destinations our $ehof_wormholes_text$ can reach."
  
  # Event Horizon Offset Facility Ultima
  allow_ehof_p4:99 "§HUnlocks Megastructure:§! $ehof_ehofp4$"
  tech_ehof_phase_04:99 "$ehof_ehofp4$"
  tech_ehof_phase_04_desc:99 "Utilizing the mysteries of the $ehof_the_sphere_named$, the $ehof_ehofp4$ is the perfect form of the $ehof_ehof$, capable of traveling to any location of our choosing without limitations and risks. Limitless possibilities await."
  tech_ehof_phase_04_nomad:99 "$tech_ehof_spinal$ Ultima"
  tech_ehof_phase_04_nomad_desc:99 "Utilizing the mysteries of the $ehof_the_sphere_named$, the Ultima model is the perfect form of the $tech_ehof_spinal$, capable of traveling to any location of our choosing without limitations and risks. Limitless possibilities await."
  
  tech_ehof_phase_04_partial_custom:99 "§HFuture Glimpse:§! $tech_ehof_phase_04$"
  tech_ehof_phase_04_partial_custom_desc:99 "With knowledge gleaned from the $ehof_the_sphere_named$, we stand on the precipice of a new age of wormhole travel.\n\nThough we do not fully grasp the intricacies of these theories yet, if we can master these principles it may be possible to perfect the $ehof_ehof$."
  
  # Light Conduction Distribution Systems
  tech_l_conductor:99 "Light Conduction Distribution Systems"
  tech_l_conductor_desc:99 "High-energy laser conduction energy distributors allow for interplanetary energy transport and exchange, increasing the efficiency of our empire's power distribution."
  
  # Hyperlane Power Transmission
  tech_hyperlane_p_t:99 "Hyperlane Power Transmission"
  tech_hyperlane_p_t_desc:99 "Advances in abstract physics enable the development of ultra-high-capacity hyperlane power transmitters that allow for fast and efficient interstellar energy transmission."
  
  # Field Entanglement Energy Transregulation
  tech_field_e_e_t:99 "Field Entanglement Energy Transregulation"
  tech_field_e_e_t_desc:99 "The discovery of non-paradoxical supercausality has led to the development of an immensely efficient and powerful energy distributor. This system utilizes field entanglement energy transregulation to transport tremendous amounts of energy from anywhere to everywhere."
  
  # Unorthodox Reality Examination Techniques
  tech_u_r_e_t:99 "Unorthodox Reality Examination Techniques"
  tech_u_r_e_t_desc:99 "The unconventional approaches and principles of abstract physics require the construction of new research facilities to develop alternative investigation methods for the comprehension of reality."
  
  # Supercausal Research Initiatives
  tech_non_local_r_i:99 "Supercausal Research Initiatives"
  tech_non_local_r_i_desc:99 "The supercausal phenomena of abstract physics require their own kind of advanced, complex, and powerful research facilities."
  
  # Decay Particle Kinetic Energy Extraction
  tech_giga_power_plant_1:99 "Decay Particle Kinetic Energy Extraction "
  tech_giga_power_plant_1_desc:99 "High energy pair-annihilation processes are not 100% efficient. The more massive an annihilated particle pair, the more likely the output is less massive particles rather than photons. A new generation of power plants make use of abstract physics to extract the kinetic energy of these decay particles to further increase the efficiency of antimatter-matter annihilation energy generation processes."
  
  # Passive Zero-Point Energy Syphoning
  tech_giga_power_plant_2:99 "Passive Zero-Point Energy Siphoning"
  tech_giga_power_plant_2_desc:99 "Besides the generation of power via active zero-point energy siphoning utilized in reactors, we can use a passive method of siphoning in specialized power plants. This enables us the extraction of zero-point energy in regular power plants, increasing their efficiency beyond 100%."
  
  # Gravitational Wave Energy Extraction
  tech_giga_power_plant_3:99 "Gravitational Wave Energy Extraction"
  tech_giga_power_plant_3_desc:99 "Gravitational waves may be extremely hard to detect, but they contain tremendous amounts of energy. Even small masses release large amounts of gravitational energy in form of these waves. Advanced abstract physics techniques allow us to directly extract energy from gravitational waves, thus making a new generation of reactors and power plants possible."
  
  # Hypershield Defensive Screen
  # tech_giga_planetary_shield_generator_1:0 "Hypershield Defensive Screen"
  # tech_giga_planetary_shield_generator_1_desc:0 "The $tech_giga_planetary_shield_generator_1$ is an enhanced version of a classical Planetary Shield Generator that affords increased protection to the planet below."
  
  # Negative Mass Protector
  tech_giga_planetary_shield_generator_2:99 "Negative Mass Protector"
  tech_giga_planetary_shield_generator_2_desc:99 "By creating a mass-energy repulsive layer around a planet's atmosphere through the utilization of £giga_sr_negative_mass£ §YNegative Mass§!, this structure shields a planet from even the most intense orbital bombardment. Only long-term bombardment and extremely high energy beams can penetrate the repulsive layer in time."
  tech_giga_planetary_shield_generator_2_nomad:99 "Negative Mass Protection"
  tech_giga_planetary_shield_generator_2_nomad_desc:99 "By creating a mass-energy repulsive layer around a ship's hull through the utilization of £giga_sr_negative_mass£ §YNegative Mass§!, this technology further reinforces naval shields."
  
  # Quasi-Neural Networks
  tech_quasi_neural_net:99 "Quasi-Neural Networks"
  tech_quasi_neural_net_desc:99 "The discoveries made through the study of the planet-plant brain led to the development of artificial quasi-neural networks. These allow us to perform alternate and unknown methods of data-transmission and data-management in various application areas."
  
  # Scourge Deployment
  tech_scourge_deployment:99 "Scourge Deployment"
  tech_scourge_deployment_desc:99 "The Scarlet Scourge is an advanced synthetic toxin that could either be used as a terraforming agent, as originally intended, or as a planet-enveloping chemical weapon capable of destroying all life. Its use is up to us."
  
  # Sentient Metal Tier 1 (Reality Code 1)
  tech_ehof_sentient_tier_1:99 "Sentient Metal Tier I"
  tech_ehof_sentient_tier_1_desc:99 "The first generation of Sentient Metal technology was developed through intensive study of the $ehof_ep$ transmitters and $PGATE_GALACTICS$. It is focused on an industrial structure that will replicate $giga_sr_sentient_metal$."
  
  # Sentient Metal Tier 2 (Reality Code 2)
  tech_ehof_sentient_tier_2:99 "Sentient Metal Tier II"
  tech_ehof_sentient_tier_2_desc:99 "The second generation of Sentient Metal technology concerns both employing the material to create starship-grade armor, and a new type of flak battery turret that uses the material's networked intelligence to effectively target and neutralize incoming projectiles."
  
  # Sentient Metal Tier 3 (Reality Code 3)
  tech_ehof_sentient_tier_3:99 "Sentient Metal Tier III"
  tech_ehof_sentient_tier_3_desc:99 "The third generation of Sentient Metal technology has allowed further refinement of existing armor designs, and designs for a new type of railgun that makes use of the material to both target and damage enemy vessels."
  
  # Sentient Metal Tier 4 (Reality Code 4)
  tech_ehof_sentient_tier_4:99 "Sentient Metal Tier IV"
  tech_ehof_sentient_tier_4_desc:99 "The fourth generation of Sentient Metal technologies concerns both a new type of artillery system utilizing the material, and a ship computer based on the material's networked intelligence."
  
  # Sentient Metal Tier 5 (Reality Code 5)
  tech_ehof_sentient_tier_5:99 "Sentient Metal Tier V"
  tech_ehof_sentient_tier_5_desc:99 "The fifth generation of Sentient Metal technologies includes a new type of autocannon, and an improved fabrication lab that can produce even more of the material."
  
  # Sentient Metal Tier 6 (Reality Code 6)
  tech_ehof_sentient_tier_6:99 "Sentient Metal Tier VI"
  tech_ehof_sentient_tier_6_desc:99 "The sixth generation of Sentient Metal technologies is compromised of a new type of spinal-mounted cannon, further revisions to the armor designs, and a power core that taps into the energy source of the $PGATE_GALACTICS$ to provide enormous amounts of energy."
  
  # Sentient Metal Tier 7 (Reality Code 7)
  tech_ehof_sentient_tier_7:99 "Sentient Metal Tier VII"
  tech_ehof_sentient_tier_7_desc:99 "The seventh generation of Sentient Metal technologies, developed as a result of our study of the secrets of the Everchanging. It is compromised of the technology for a new type of titan-sized-turret, which makes use of Sentient Metal for aiming at targets, tracking them and damaging them, and an even more advanced type of the Sentient Metal armor."
  
  tech_sm_megastructure:99 "Sentient Metal Forge"
