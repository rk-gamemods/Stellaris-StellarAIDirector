  #################################
  ####### DEVASTATED SYSTEM #######
  #################################
  ehof_anomaly.14.name:99 "Devastated System"
  ehof_anomaly.14.desc:99 "The moment our ships arrived in the §H[root.solar_system.GetName]§! system, they received a subspace transmission seemingly originating from the system's star. This signal was cryptographically similar to the galaxy-wide broadcast about the $ehof_the_compound_text$.\n\nHowever, the signal is not the only thing we found in this system. All the system's planets are either shattered or scorched, with the innermost one blown to nothing but a few chunks of rock and a trailing asteroid belt.\n\nThe cause for this devastation is still unknown, but our [Owner.GetScientistPlural] suspect it lies with the system's star, which has an anomalous energy distribution and unusual variations in its surface and layers. Such destruction could only have been caused by an immense energy outburst, like a supernova - though that can't be the case, as the star is still there.\n\nSomething terrifying happened in §H[root.solar_system.GetName]§!, and with its star seemingly being the source of the message, investigating these mysteries is paramount."
  ehof_anomaly.14.a:99 "We'll have to solve this mystery."
  
  INVESTIGATE_WOUNDED_STAR:99 "Devastated System"
  INVESTIGATE_WOUNDED_STAR_DESC:99 "Our science ship is on its way to investigate §H[root.solar_system.GetName]§!.\n\nIts secrets may finally give us access to the solution against the $ehof_the_compound_text$. If not, we will at least find the origin of the message we were sent."
  
  ehof_anomaly.10021.name:99 "Wounded Star"
  ehof_anomaly.10021.desc:99 "Our investigation of §H[root.solar_system.GetName]§! revealed that the star possesses a gigantic anomaly on its surface: a roughly-circular indentation reaching down into the star's photosphere with a surface diameter of about 3.3 million kilometers. While it is only around 1/32nd the size of the red giant itself, it is still truly enormous.\n\nThe indentation is theorized to be a crater left by some incredibly energetic impactor. What specifically caused it is unknown, but our [Owner.GetScientistPlural] currently have two competing hypotheses: it was either incredibly massive or incredibly fast.\n\nThe impact itself launched gigantic amounts of stellar plasma across the system, melting, breaking, and heating up every planet in the system like a miniature supernova.\n\nDespite the violent forces at work within a star, the impactor may still be recognizable, and further, may have something to do with the message we received.\n\nAn investigation of the outer and inner layers of the star will be necessary in order to find traces of the impactor."
  ehof_anomaly.10021.a:99 "Search this star top to bottom!"
  
  INVESTIGATE_STELLAR_WOUND:99 "Wounded Star"
  INVESTIGATE_STELLAR_WOUND_DESC:99 "Our [Owner.GetScientistPlural] are preparing multiple ships equipped with high-intensity scanners and the strongest heat shielding we can make to scan the entire star for more information about the impactor.\n\nDue to the ever-changing fluid-like nature of stars' surfaces and interiors, the impactor may have drifted far from its original point of impact.\n\nA full scan of §H[root.solar_system.GetName]§! will thus be necessary to locate it."
  
  ehof_anomaly.10022.name:99 "Sunken Leviathan"
  ehof_anomaly.10022.desc:99 "We finally finished our investigation of the outer layers of §H[root.solar_system.GetName]§!, and the results are absolutely astonishing.\n\nIt wasn't a big planet or relativistic projectile that collided with the star. The impactor is a gigantic artificial construct that collided with the star millennia ago. It is still intact, as far as we can tell, and it may be the source of the message itself!\n\nThe size of the construct is unimaginable for a ship: it is almost 2300 kilometers along its longest span, and it possesses a planet-like mass of about 980 quadrillion metric tonnes. A model of the impact shows that the vessel had to have been traveling at a blistering 5000+ kilometers per second when it hit §H[root.solar_system.GetName]§!.\n\nIn response to these incredible findings, our [Owner.GetScientistPlural] are now requesting a hands-on exploration of the vessel. Doing so will be an enormous effort, as the ship is located about 8 million kilometers under the star's photosphere, deep within its convective zone. Since the ship is still intact after its impact with, and subsequent exposure to the forces in, the heart of a star, we speculate that it is the source of the message - and may still be functional beyond that beacon."
  ehof_anomaly.10022.a:99 "We must get down there. No price is too high!"
  
  INVESTIGATE_DORMANT_LEVIATHAN:99 "Sunken Leviathan"
  INVESTIGATE_DORMANT_LEVIATHAN_DESC:99 "Vast amounts of resources and the most advanced technologies of our empire will be necessary to investigate the gigantic construct sunk deep within §H[root.solar_system.GetName]§!.\n\nFrom across our empire, [Owner.GetResearchers] and [Owner.GetEngineerPlural] travel to the system in order to draft and assemble necessary equipment for the project."
  
  ehof_anomaly.10023.name:99 "Reaching the Leviathan"
  ehof_anomaly.10023.desc:99 "We made it! We've reached the dormant construct within §H[root.solar_system.GetName]§!, and can confirm that it is a space ship.\n\nOur [Owner.GetScientistPlural] and [Owner.GetEngineerPlural] were, with an almost limitless supply of resources, able to construct what they call a \"stellar anti-elevator\". This structure is a gigantic cable-tunnel hybrid that stretches from safely beyond the star's photosphere, down through its convective zone, all the way to the construct. Both ends of the structure have artificial gravity well generators built around the central tunnel: on the far end, to anchor the structure in space, and within the star, to secure the construct and stop the currents of the star's convective layer from moving it away.\n\nOnce we sent exploration ships down through the anti-elevator, we determined firsthand that the ship appears intact, and far beyond even the Fallen Empires' technology.\n\nNone of our scanners are able to penetrate the ship's hull, or even determine what that hull is made from. Our [Owner.GetScientistPlural]' current speculation is that the surface material some sort of supersolid - matter that possess solid and fluid properties in a single state. If the ship's exterior is in fact made from an ever-changing quasi-supersolid, it would explain how it has survived its impact and millennia within the star.\n\nOur [Owner.GetScientistPlural] are trying to find a way to get inside the ship, but are waiting for approval to do so."
  ehof_anomaly.10023.a:99 "Affirmative. Try to enter the ship!"
  
  ENTERING_LEVIATHAN:99 "Entering the Leviathan"
  ENTERING_LEVIATHAN_DESC:99 "Our [Owner.GetScientistPlural] are now trying to find a way to enter the dormant spaceship.\n\nNobody knows what technological wonders may await inside of this enigmatic colossus.\n\nHopefully, we can confirm it as the source of the message. It may even contain a way to fight against the $ehof_the_compound_text$ itself!"
  
  ehof_anomaly.10024.name:99 "Awakening"
  ehof_anomaly.10024.desc:99 "We didn't expect something like this to happen! As soon as we tried to cut through the ship's hull, a large aperture opened around our away team, revealing a corridor leading inwards.\n\nThe ship's interior appears to be entirely made up of pure white surfaces that constantly ripple and reshape. After a few minutes of traversing inwards, our away team reached a gigantic hall made from the same strange material as the corridor.\n\nInitially, the hall was empty, but that changed quickly. Uncountable entities emerged from the liquid walls and began to swarm towards the center of the hall, whereupon they assembled into a gigantic octahedron. This figure contacted our away team telepathically, and introduced itself as the central consciousness of the vessel, and is delighted that we made it.\n\nIt insists on immediate contact with our leaders, as it alleges that the fate of the galaxy is at stake."
  ehof_anomaly.10024.a:99 "Be prepared for anything. Put the entity on screen!"
  
  REPAIR_ANNIHILATOR:99 "Leviathan Rehabilitation"
  REPAIR_ANNIHILATOR_DESC:99 "We have agreed to provide the $ehof_the_stellar_annihilator$ the materials it needs to repair its power core, so that it can escape the star it fell into so long ago."
  
  annihilator_dialog.006.desc:99 "All repairs are complete.\n\nInitiating $ehof_shroud_ftl$.\n\nDestination: §H[root.Capital.GetName]§!.\n\nI shall defend you for now, but it is imperative that we destroy the $ehof_preservation_sphere$.\n\n§G(Use the UI below if you wish to change the $ehof_the_stellar_annihilators$ orders)§!"
  annihilator_dialog.006.tooltip:99 "The $ehof_the_stellar_annihilator$ has left §H[annihilator_spawn_here.GetName]§! and is traveling to §H[root.Capital.GetName]§! via $ehof_shroud_ftl$."
  
  
  
