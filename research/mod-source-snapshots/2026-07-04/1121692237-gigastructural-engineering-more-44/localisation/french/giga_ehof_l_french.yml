  tech_compound_armor_desc:99 "§MWe work as one.§!\nThe $tech_compound_armor$ transmutes all known forms of incoming damage into usable energy through an unknown process."
  
  tech_compound_computers:99 "Hazard Matter Awareness"
  tech_compound_computers_desc:99 "§MWe think as one.§!\n$tech_compound_computers$ perform ad-hoc node coherences of the dark matter hive mind to direct ships and respond to threats."
  TECH_UNLOCK_COMPOUND_COMPUTERS_TITLE:99 "§HUnlocks Component:§! $tech_compound_computers$"
  TECH_UNLOCK_COMPOUND_COMPUTERS_DESC:99 "§H$tech_compound_computers$§!\n$tech_compound_computers_desc$"
  
  tech_compound_drives:99 "Hazard Matter Jump Drive"
  tech_compound_drives_desc:99 "§MWe move as one.§!\nThe $tech_compound_drives$ displaces local reality via the application of enigmatic dark matter-derived forces."
  TECH_UNLOCK_COMPOUND_JUMPDRIVE_TITLE:99 "§HUnlocks Component:§! $tech_compound_drives$"
  TECH_UNLOCK_COMPOUND_JUMPDRIVE_DESC:99 "§H$tech_compound_drives$§!\n$tech_compound_drives_desc$"
  
  tech_compound_reactors:99 "Hazard Matter Reactor"
  tech_compound_reactors_desc:99 "§MWe hunger as one.§!\nThe $tech_compound_reactors$ manipulates dark matter to produce huge amounts of energy."
  TECH_UNLOCK_COMPOUND_REACTOR_TITLE:99 "§HUnlocks Component:§! $tech_compound_reactors$"
  TECH_UNLOCK_COMPOUND_REACTOR_DESC:99 "§H$tech_compound_reactors$§!\n$tech_compound_reactors_desc$"
  
  tech_compound_sensors:99 "Hazard Matter Sensors"
  tech_compound_sensors_desc:99 "§MWe see as one.§!\n$tech_compound_sensors$ observe the galactic dark matter flows which holds the galaxy together, tracking fleet movements across an enormous scale."
  TECH_UNLOCK_COMPOUND_SENSOR_TITLE:99 "§HUnlocks Component:§! $tech_compound_sensors$"
  TECH_UNLOCK_COMPOUND_SENSOR_DESC:99 "§H$tech_compound_sensors$§!\n$tech_compound_sensors_desc$"
  
  tech_compound_shields:99 "Hazard Matter Deflector"
  tech_compound_shields_desc:99 "§MWe defend as one.§!\nThe $tech_compound_shields$ dissipates all known forms of incoming damage."
  
  tech_compound_thrusters:99 "Hazard Matter Booster"
  tech_compound_thrusters_desc:99 "§MWe move as one.§!\nThe $tech_compound_thrusters$ displace a vessel relative to material reality, allowing for inertialess and almost arbitrarily fast movement."
  TECH_UNLOCK_COMPOUND_THRUSTER_TITLE:99 "§HUnlocks Component:§! $tech_compound_thrusters$"
  TECH_UNLOCK_COMPOUND_THRUSTER_2_DESC:99 "§H$tech_compound_thrusters$§!\n$tech_compound_thrusters_desc$"
  
  
