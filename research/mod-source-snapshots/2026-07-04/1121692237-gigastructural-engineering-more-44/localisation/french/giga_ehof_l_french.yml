  ##############################################
  
  # Begin SA Event Chain
  annihilator_dialog.014.name:99 "Salvation"
  annihilator_dialog.014.desc:99 "$compound_solution_chain_desc$"
  annihilator_dialog.014.a:99 "We must find it now."
  
  # Initial Contact
  annihilator_dialog.001_name:99 "$NAME_Stellar_Annihilator_Species$"
  annihilator_dialog.001.desc:99 "Greetings. I am a $NAME_Stellar_Annihilator_Species$. You may refer to me as the $ehof_the_stellar_annihilator$, if you desire. I have been sent by the $ehof_the_creators$ to destroy their wayward experiment: the $ehof_the_compound_text$.\n\nAs you've likely observed, its motivation is total cosmic transmutation.\n\nThe $ehof_the_compound_text$ believes itself to be invincible. This is only partially true. While its nature makes it immune to almost every force in the universe, it does have a weakness. All forms of dark matter lose cohesion when exposed to §HNegative Mass§!, disintegrating into elementary particles."
  annihilator_dialog.001.response:99 "§HNegative Mass§! is the key?"
  
  annihilator_dialog.002.desc:99 "With §HNegative Mass§! enhanced weapons, the $ehof_the_compounds_text$ forms can be destroyed. This, however, will not be enough.\n\nIts origin cluster contains multiple black holes, and at their center, the key, and greatest threat, to its existence: a white hole. The $ehof_the_creators$ utilized unique interactions between the white and black holes to create the $ehof_the_compound_text$."
  annihilator_dialog.002.response:99 "They created the $ehof_the_compound_text$?"
  
  annihilator_dialog.003.desc:99 "Besides generating unparalleled amounts of energy, white holes also output vast amounts of §HNegative Mass§!.\n\nIn order to keep $ehof_the_compound_text$ from being destroyed by the very thing that made its existence possible, the $ehof_the_creators$ had to construct a specialized megastructure around the white hole called the $ehof_preservation_sphere$. This megastructure nullifies the white hole's §HNegative Mass§! ejection and captures its immense energy output.\n\nWhen the $ehof_the_compound_text$ transmuted the $ehof_the_creators$ in its origin cluster, it seized the $ehof_preservation_sphere$, and used the megastructure's vast energy supply to further its development."
  annihilator_dialog.003.response:99 "We have to destroy the $ehof_preservation_sphere$?"
  
  annihilator_dialog.004.desc:99 "Correct. Total annihilation of the $ehof_the_compound_text$ is only possible by destroying the $ehof_preservation_sphere$. Doing so will flood the cluster with §HNegative Mass§!, annihilating the $ehof_the_compounds_text$ central consciousness and preventing it from spinning new forms from the §HDark Matter§! emitted by black holes.\n\nIt is my purpose to do this.\n\nHowever...\n\nMy collision with this star caused significant damage to my frontal weaponry and power core, rendering me unable to serve in this capacity. I require major repairs that I cannot fulfill alone.\n\nI will provide you with technology to combat the $ehof_the_compound_text$."
  annihilator_dialog.004.response:99 "What would it take to repair you?"
  
  annihilator_dialog.005_01.desc:99 "My integrated repair mechanism requires vast amounts of material to return me to a basic level of operation. Once those initial repairs have been completed, I will be stable enough to affect whatever repairs I still require independently.\n\nI require either:\n - 500 §HMinerals§! and 400 §HEnergy§! monthly for §Y4 Years§! £time£.\n - 24,000 §HMinerals§! and -20,000 §HEnergy§! once.\n\nYou should also know that my state is deteriorating rapidly. Without any assistance, §Y6 Months§! £time£ from now, I will no longer be able to affect any self-repair, and you will have to find a way to destroy the $ehof_preservation_sphere$ on your own."
  
  annihilator_dialog.005_02.desc:99 "I am in urgent need of repair. Can you provide assistance?\n\n$annihilator_dialog.005_01.desc$"
  
  annihilator_dialog.005_03.desc:99 "§H[initial_annihilator_discoverer.GetName]§! were the first to discover me and as such, I must ask them for help first. Should they refuse, I will turn to you."
  annihilator_dialog.005_03.response:99 "That's fair."
  
  annihilator_dialog.005.a.response:99 "§YWe'll begin gathering the resources.§!"
  annihilator_dialog.005.a.tooltip:99 "Monthly (§Y4 Years§! £time£):\n\t§R-500§! £minerals£ §YMinerals§!\n\t§R-400§! £energy£ §YEnergy§!"
  annihilator_dialog.005.b.response:99 "§GWe have those resources on-hand now.§!"
  annihilator_dialog.005.a.reply:99 "Thank you. I will begin my self-repair posthaste."
  annihilator_dialog.005.c.response:99 "§RWe can't spare the resources to help you.§!"
  annihilator_dialog.005.c.reply:99 "Then I am sorry. I wish you luck in destroying the $ehof_preservation_sphere$. Farewell."
  annihilator_dialog.005.c.2.response:99 "Contact us in §Y6 Months§! £time£."
  annihilator_dialog.005.c.2.reply:99 "Very well, but it is imperative that it takes no longer. I will contact you again in §Y6 Months§! £time£."
  annihilator_dialog.005.c.2.tooltip:99 "We have §Y6 Months§! £time£ to get these materials together."
  annihilator_dialog.005.d.response:99 "We don't need your help. Our fleets can handle the $ehof_preservation_sphere$."
  annihilator_dialog.005.d.reply:99 "If you really believe that you can destroy the it without my help, then I have faith in you. Farewell and good luck."
  annihilator_dialog.005.e.response:99 "Excuse me?"
  
  # Contact the SA
  annihilator_dialog.007.desc_01:99 "Welcome §H[root.GetSpeciesClassPlural]§!. What can I do for you?\n\n"
  annihilator_dialog.007.desc_02:99 "The $ehof_the_compound_text$ is still continuing its siege of your galaxy. Stay calm and together we can stop them!\n\n"
  annihilator_dialog.007.desc_03:99 "We have to stop the $ehof_the_compound_text$ before its influence grows too large. Otherwise, it will become unstoppable, even for me.\n\nHow can I be of service?\n\n"
  annihilator_dialog.007.desc_04:99 "The $ehof_the_creators$ theorized that the $ehof_the_compound_text$ could one day become the apex form of life in this universe.\n\nThe $ehof_the_compound_text$ believes it already is, but it isn't.\n\nIt is a sickness. A disease. A cancerous growth that corrupts all it touches.\n\n"
  
  annihilator_dialog.007.desc_order_01:99 "- The $ehof_the_stellar_annihilator$ is currently located in the [annihilator_location.solar_system.GetName] system.\n$ehof_the_stellar_annihilator$ is currently following [discoverer_fleet.GetName]."
  annihilator_dialog.007.desc_order_02:99 "- The $ehof_the_stellar_annihilator$ is currently located in the [annihilator_location.solar_system.GetName] system.\n- $ehof_the_stellar_annihilator$ is currently targeting the $ehof_the_compound_text$."
  annihilator_dialog.007.desc_order_03:99 "- The $ehof_the_stellar_annihilator$ is currently located in the [annihilator_location.solar_system.GetName] system.\n- The $ehof_the_stellar_annihilator$ is currently targeting the $ehof_preservation_sphere$."
  annihilator_dialog.007.desc_order_04:99 "- The $ehof_the_stellar_annihilator$ is currently located in the [annihilator_location.solar_system.GetName] system.\n- The $ehof_the_stellar_annihilator$ is currently in defensive mode."
  
  annihilator_dialog.007.desc_05.a:99 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_01$"
  annihilator_dialog.007.desc_05.b:99 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_02$"
  annihilator_dialog.007.desc_05.c:99 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_03$"
  annihilator_dialog.007.desc_05.d:99 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_04$"
  
