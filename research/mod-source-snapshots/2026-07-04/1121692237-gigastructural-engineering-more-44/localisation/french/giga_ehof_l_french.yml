  annihilator_dialog.007.desc_07.b:99 "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_02$"
  annihilator_dialog.007.desc_07.c:99 "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_03$"
