  giga_maximum_mutation_title:99 "§cMaximum Mutation§!"
  giga_maximum_mutation_desc:99 "In pursuit of our genetic destiny all possible avenues must be considered, as strange and esoteric as they may seem."
  
  giga_prethoryn_larvae:99 "Mutated Larva"
  giga_prethoryn_larvae_desc_short:99 "A small wriggling larva. Grows extremely quick. Could be crushed underfoot"
  giga_prethoryn_larvae_desc_details:99 ""
  
  giga_vat_maximum_mutation_1:99 "Maximum Mutation: Inceptus"
  giga_vat_maximum_mutation_2:99 "Maximum Mutation: Virulus"
  giga_vat_maximum_mutation_3:99 "Maximum Mutation: Aureus"
  giga_vat_maximum_mutation_4:99 "Maximum Mutation: Exaltus"
  giga_vat_maximum_mutation_1_DESC:99 "The inception is of great importance, defining how our mutations will progress. Only time can tell if this project will bear fruit as much as its benefactors say."
  giga_vat_maximum_mutation_2_DESC:99 "The next steps, just as important as the first. how can one have a palace for not it's foundation build many times high."
  giga_vat_maximum_mutation_3_DESC:99 "With any project revisions and review must be done. How may we improve upon our design? What flaws can we minimize? Now is the time for our specimens to ascend to perfection."
  giga_vat_maximum_mutation_4_DESC:99 "The capstone completes any great work, lest it crumble under its own weight. "
  
  giga_vat_events.100.name:99 "Maximizing Mutation"
  giga_vat_events.100.desc:99 "With access to such a vast and efficient array of cloning devices our scientists have devised a quite peculiar idea. What would come of combining and mutating every sample of genetic material our empire has ever collected, no matter what it may be. As bizarre as the idea is, it may lead to some advances in biology and perhaps the creatures this project conceives may have applications on the stage of galactic war."
  giga_vat_events.100.a:99 "What could possibly go wrong?"
  
  giga_vat_events.101.name:99 "Inceptus"
  giga_vat_events.101.desc:99 "With promising initial results, scientists on [capital.GetName] prepare for larger scale experiments. With the extensive laboratories of the $name_the_vat$, they aim to procure a specimen the size of a corvette. Whether it performs below or above the capabilities of a corvette remain to be seen."
  giga_vat_events.101.a:99 "$INTRIGUING$"
  
  giga_vat_events.1011.name:99 "Inceptus Conception"
  giga_vat_events.1011.desc:99 "We watched it grow. Watched it feed. Through all of it, anger, fear, frustration. We don't know how we knew its feelings. It was so gargantuan, but still so small, still scared of us. It could crush us or melt us in an instant. Why was it scared? Scared of what we would do to it if it attacked us? Or scared of what would create next."
  giga_vat_events.1011.a:99 "$DISCONCERTING$"
  
  giga_vat_events.102.name:99 "Virulus"
  giga_vat_events.102.desc:99 "Following the success of Inceptus, chief scientists are proposing an even larger experiment, that the size of a destroyer. While many in the team have their reservations, the go-ahead was given and progress began on mutating even further."
  giga_vat_events.102.a:99 "$GOOD$"
  
  giga_vat_events.1021.name:99 "A Virulent Force"
  giga_vat_events.1021.desc:99 "Rage. All emotion second to the concoction of violence and anger. It thrashed against its restraints which kept it from rending the station apart. Days it thrashed, was its rage unending? All the while we sensed changes in our smaller specimens, similar feelings of anger mixed with fear. They seem to share a link, something greater than a simple familial bond, like they were parts of a larger organism."
  giga_vat_events.1021.a:99 "$DISTURBING$"
  
  giga_vat_events.103.name:99 "Aureus"
  giga_vat_events.103.desc:99 "Since the project's beginning our admirals and other military staff have expressed great interest in this project. They request a specimen with almost carrier-like capabilities. Many scientists stationed on the $name_the_vat$ have either resigned or refuse to work, but a select few press onward in pursuit of perfection."
  giga_vat_events.103.a:99 "$INCREDIBLE$"
  
  giga_vat_events.1031.name:99 "Biological Ascension"
  giga_vat_events.1031.desc:99 "Rage again. Monumental compared to before. The thrashing was stronger too. One day it all came to a stop. Only one feeling was felt that day. Obedience. They had done it, they had controlled this unruly creature they had created. It had submitted, and along with it all the other specimens. No more rage or fear or frustration. Obedience shone through. The organism has accepted us."
  giga_vat_events.1031.a:99 "$ASTOUNDING$"
  
  giga_vat_events.104.name:99 "Exaltus"
  giga_vat_events.104.desc:99 "We had achieved perfection, but what if we go further? After achieving greatness, could there be more? Some on the team say why not reach as high as possible. If it is successful final step in evolution may be realized."
  giga_vat_events.104.a:99 "$UNDERSTOOD$"
  
  giga_vat_events.1041.name:99 "Mutation Maximized"
  giga_vat_events.1041.desc:99 "The ultimate lifeform, our beautiful specimens, finally created and realized before us. Their strength shall make our enemies think twice before challenging us in the galactic stage. We have gained something unique from this project. Our specimens and us have this connection. Our minds and theirs intertwined as a single entity. If a force like this were let lose upon a galaxy there is no telling what could happen. Throughout the program there were some escape attempts by our specimens. Thankfully all were eliminated. Though there were those few that escaped and headed towards intergalactic space. Surely they won't cause any trouble."
  giga_vat_events.1041.a:99 "Surely..."
  
  giga_requires_maximum_mutation_1:99 "$TRIGGER_FAIL$Requires completing §Y$giga_vat_maximum_mutation_1$§!"
