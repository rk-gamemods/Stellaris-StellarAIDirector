  ### Mega Deposits ######################
  #########################################
  
  d_small_natural_tunnel:0 "北风神之管道"
  d_small_natural_tunnel_desc:0 "此管道乃星球大陆中心一大型湖泊和海洋相连接之通道，它的存在违背了一切自然法则和理论，这让当地土著相信此乃神明之造物。"
  
  
  #########################################
  ### Flavor Deposits #####################
  #########################################
  
  d_arcane_mineral_generator:0 "神秘嬗变器"
  d_arcane_mineral_generator_desc:0 "一个神秘来源的古老装置，似乎能无中生有地产出矿物资源。"
  
  d_giga_orbital_effects:0 "星系运输网络"
  d_giga_orbital_effects_desc:0 "星系内的$name_giga_orbital$主导着本地后勤规划。"
  
  d_pcc_origin_blocker:0 "损坏回路"
  d_pcc_origin_blocker_desc:0 "各个计算子区块间的连接都已损坏掉了，因此此星球上大部分处理阵列都无法与我们的研究设施连接。"
  
  d_giga_rogue_ai_relay_servers:0 "流氓处理器阵列"
  d_giga_rogue_ai_relay_servers_desc:0 "失控人工智利用大量处理器和服务器阵列投射力量到行星计算机群中，通过破坏设施和积极尝试杀死殖民者来与我们进行斗争。"
  
  d_giga_rogue_ai_corrupt_code:0 "代码腐坏"
  d_giga_rogue_ai_corrupt_code_desc:0 "行星计算机群数据库中的大块内容都是危险的臃肿代码，严重阻碍了我们在该星球上的科研工作。"
  
  d_ringworld_capital_city:0 "大都"
  d_ringworld_capital_city_desc:0 "在环世界上建造的一座伟大都城。这个地方充当了这个环世界区段的中央枢纽，为当地的人们提供了多样的服务。"
  
  d_interstellar_ringworld_commerce_blocker:0 "被遗弃的基础设施"
  d_interstellar_ringworld_commerce_blocker_desc:0 "由于环世界提供了近乎无限的空间，因此很少考虑土地的再开发，导致大片的土地上都塞满了被长期遗弃的建筑。如果这些地区都被清理并重新开发，当地的商业就能够大幅增长，增进帝国的财富。"
  
  d_great_ring_excavated_mountain:0 "环世界自我修复系统节点"
  d_great_ring_excavated_mountain_desc:0 "环世界自动自我修复系统的一个暴露节点。它源源不断地生成将巨构保持在运作形态所需的物质。如果我们小心去做，我们就能从那些物质中抽取一些来供我们自己所用，还不会损害我们的人造家园。"
  
  d_giga_arcane_generator:0 "$d_arcane_generator$"
  d_giga_arcane_generator_desc:0 "$d_arcane_generator_desc$"
  
  
  d_decrepit_tunnels_squareworld:0 "$d_decrepit_tunnels_1$"
  d_decrepit_tunnels_squareworld_desc:0 "$d_decrepit_tunnels_1_desc$"
  
  d_predictable_solar_flares:99 "Predictable Solar Flares"
  d_predictable_solar_flares_desc:99 "The star our homeworld orbits around exhibits specific behavior preceding a solar flare, making energy extraction significantly easier."
  
  d_giga_decrepit_tunnels_1:0 "$d_decrepit_tunnels_1$"
  d_giga_decrepit_tunnels_1_desc:0 "$d_decrepit_tunnels_1_desc$"
  
