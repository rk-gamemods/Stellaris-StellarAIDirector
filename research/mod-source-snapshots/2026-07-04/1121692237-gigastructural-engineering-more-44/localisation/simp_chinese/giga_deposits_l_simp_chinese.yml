  d_giga_lifeless_dark_matter_1:0 "暗物质矿藏"
  d_giga_lifeless_dark_matter_1_desc:0 "该星球有可开发的暗物质资源。"
  
  d_giga_lifeless_living_metal_1:0 "活体金属矿藏"
  d_giga_lifeless_living_metal_1_desc:0 "该星球有可开发的活体金属资源。"
  
  d_giga_lifeless_nanites_1:0 "纳米机器人矿藏"
  d_giga_lifeless_nanites_1_desc:0 "该星球有可开发的纳米机器人资源。"
  
  d_giga_lifeless_iodizium_1:0 "解离素矿藏"
  d_giga_lifeless_iodizium_1_desc:0 "该星球有可开发的解离素水晶资源。"
  
  d_giga_hab_iodizium_1:0 "解离素矿藏"
  d_giga_hab_iodizium_1_desc:0 "这个居住站复合体建造在一个可开发的解离素水晶矿藏附近。"
  
