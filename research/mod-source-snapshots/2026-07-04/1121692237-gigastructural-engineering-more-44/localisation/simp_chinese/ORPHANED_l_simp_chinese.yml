  giga_dialog.401.name:0 "$name_eng_test_site$基址"
  giga_dialog.401.desc:0 "大型$name_eng_test_site$的基址已在[giga_system.GetName]星系完工。建成后，这座瑰丽的空间站是测试从轨道站到新宇宙飞船等诸多工程设计的好地方。它环绕的行星将成为突破性工程的试验场。"
  giga_dialog.401.a:0 "做得好。"
  giga_dialog.402.name:0 "$name_eng_test_site$建造"
  giga_dialog.402.desc:0 "建于[giga_system.GetName]星系的$name_eng_test_site$现在可以运行了。它将成为工程师对飞船、建筑等最复杂、致命设计的实验场。实验已经在行星上开始，我们可以期待不久的将来会有更多实验，极大促进我们的工程研究。"
  giga_dialog.402.a:0 "优秀。"
  giga_dialog.404.name:0 "$name_eng_test_site$修复完成！"
  giga_dialog.404.desc:0 "我们的工程队伍已经修复了之前被毁的$name_eng_test_site$。\n\n它目前完全可运行，可以用于开展科研。"
  giga_dialog.404.a:0 "优秀。"
  giga_has_discomoon:0 "[root.has_disco_moon]"
  job_purge_psionic_sublimation:0 "升华"
  job_purge_psionic_sublimation_plural:0 "升华"
  job_purge_psionic_sublimation_desc:0 "这个人口正在被升华。\n被完全升华后会产生2§M灵能升华物§!（如果为灵能者则为10）。"
  giga_tech_planetary_matter_harvesting:0 "超高效岩土拆卸"
  giga_tech_planetary_matter_harvesting_desc:0 "为了装配我们自己的天体战舰，我们需要数量巨大的原料行星物质。利用廉价和快速建造的引力牵引光束，我们可以在几个月内字面意义上地拆除整个行星。由于不需要提炼物质，这个过程非常迅速，行星可以被简单地分解为小行星，然后被运到我们需要的地方。"
  alderson_disk_2_ecu:0 "普世奥尔德森片区"
  alderson_disk_2_ecu_DESC:0 "巨大的$name_alderson$片区，沿各个方向一直延伸到恒星系的边缘。它类似一座巨大的城市，可以容纳极为庞大的工业和人口。\n\n特化区划产出£consumer_goods£§Y消费品§!、£alloys£§Y合金§!与£amenities£§Y舒适度§!"
  alderson_disk_2_hive:0 "蜂巢奥尔德森片区"
  alderson_disk_2_hive_DESC:0 "巨大的$name_alderson$片区，沿各个方向一直延伸到恒星系的边缘。它类似一座巨大的城市，可以容纳极为庞大的工业和子个体。\n\n特化区划产出£minerals£§Y矿物§!!与£alloys£§Y合金§!"
  alderson_disk_2_machine:0 "机械奥尔德森片区"
  alderson_disk_2_machine_DESC:0 "巨大的$name_alderson$片区，沿各个方向一直延伸到恒星系的边缘。它类似一座巨大的城市，可以容纳极为庞大的工业和人口。\n\n特化区划产出£minerals£§Y矿物§!!与£alloys£§Y合金§!"
  alderson_disk_2_pc:0 "奥尔德森计算复合体"
  alderson_disk_2_pc_DESC:0 "巨大的$name_alderson$片区，沿各个方向一直延伸到恒星系的边缘。足以容纳难以计数的算力。\n\n特化区划产出£physics££society££engineering£§Y研究点数§!与£unity£§Y凝聚力§!"
