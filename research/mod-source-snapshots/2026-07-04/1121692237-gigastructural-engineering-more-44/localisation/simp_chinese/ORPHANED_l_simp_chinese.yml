  quasi_stellar_marker_star_DESC:0 "一个指定类星天陨不幸目标的虚拟标记。"
  quasi_stellar_marker_star_MEGASTRUCTURE_DETAILS:0 "在一颗恒星上放置类星天陨的目标标记。"
