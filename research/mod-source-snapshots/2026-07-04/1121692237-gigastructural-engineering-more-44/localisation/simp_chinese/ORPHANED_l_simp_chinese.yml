  quasi_stellar_marker_planet_open_DESC:0 "$name_quasistellar$将经由该虫洞发射。"
  giga_qso.500.name:0 "$name_quasistellar$：参数"
  giga_qso.500.desc:0 "在这里，你可以设定一些类星天陨自身的特性。\n\n修改充能速率将会改变这一超级武器本身的£giga_sr_quasaric_energy£产出。较低的充能速率会产出较少，但是反过来会产生一些转换自£giga_sr_quasaric_energy£的£energy£。较高的充能速率会产出更多，但是会反过来消耗一些£energy£，因为必须要让构造体过载。\n\n你也可以选择将一些资源（£minerals£ £food£ £consumer_goods£ £alloys£ £pops£）扔进类星体中。这些资源将会与明亮的吸积盘碰撞，生成一系列高能粒子，可以被用来为这一超级武器提供更多的£giga_sr_quasaric_energy£。"
  giga_qso.501.name:0 "$name_quasistellar$：资源倾倒"
  giga_qso.501.desc:0 "你可以将不同的资源丢进超大质量类星体中，来为明亮的吸积盘供能，并产生被转换为£giga_sr_quasaric_energy£的能量。\n\n请选择你想扔进类星体中的资源。"
  giga_qso.1.panel:0 "回到控制面板"
  giga_qso.500.dump:0 "倾倒资源……"
  giga_qso.500.minerals:0 "倾倒10K£minerals£ ——> 25£giga_sr_quasaric_energy£"
  giga_qso.500.alloys:0 "倾倒50K£alloys£ ——> 30£giga_sr_quasaric_energy£"
  giga_qso.500.food:0 "倾倒50K£food£ ——> 30£giga_sr_quasaric_energy£"
  giga_qso.500.goods:0 "倾倒100K£consumer_goods£ ——> 30£giga_sr_quasaric_energy£"
  giga_qso.500.undesirable:0 "倾倒25个§B不可接触者人口§! ——> 5£giga_sr_quasaric_energy£"
  giga_qso.500.undesirable.tooltip:0 "我们会将25个拥有不可接触者公民权的随机人口丢进类星体中。构成他们的能量最终会对某些事情有用。"
  giga_qso.500.increase:0 "§H增加充能速率§!"
  giga_qso.500.decrease:0 "§E减少充能速率§!"
  giga_qso.500.intensityphysicslimits:0 "§Y当前充能速率：§L遵命。§! | 25£giga_sr_quasaric_energy£ -22500£energy£"
  giga_qso.500.intensityinsane:0 "§Y当前充能速率：§M高到疯狂§! | 20£giga_sr_quasaric_energy£ -15000£energy£"
  giga_qso.500.intensityextremely:0 "§Y当前充能速率：§R极高§! | 17£giga_sr_quasaric_energy£ -10000£energy£"
  giga_qso.500.intensityveryhigh:0 "§Y当前充能速率：§P很高§! | 14£giga_sr_quasaric_energy£ -6000£energy£"
  giga_qso.500.intensityhigh:0 "§Y当前充能速率：§H高§! | 12.5£giga_sr_quasaric_energy£ -3000£energy£"
  giga_qso.500.intensitymed:0 "§Y当前充能速率：§Y中等§! | 10£giga_sr_quasaric_energy£ 0£energy£"
  giga_qso.500.intensitylow:0 "§Y当前充能速率：§G低§! | 5£giga_sr_quasaric_energy£ 4000£energy£"
  giga_qso.500.intensityverylow:0 "§Y当前充能速率：§B很低§! | 1.5£giga_sr_quasaric_energy£ 8000£energy£"
  giga_qso.500.intensitynone:0 "§Y当前充能速率：§!无 | 0£giga_sr_quasaric_energy£ 10000£energy£"
  giga_qso.1.name:0 "$name_quasistellar$控制面板"
  giga_qso.1.desc:0 "欢迎来到$name_quasistellar$控制面板。\n\n在这里，你既可以为这个超级武器选择一个目标，也可以改变它的参数。\n\n选择目标将会允许你瞄准一个恒星，一个行星，或是一支舰队。记住，类星天陨开火需要£giga_sr_quasaric_energy£ §Y类星体能量§!，由这个巨构本身产生。\n\n查看参数会允许你改变武器的充能速率，增加或者减少由我们的类星天陨积累的£giga_sr_quasaric_energy£ §Y类星体能量§!的数量。\n\n§B也可以直接通过法令来访问这个菜单。§!"
  giga_qso.1.fire:0 "选择目标"
  giga_qso.1.parameters:0 "查看参数"
  giga_qso.1.quit:0 "退出控制面板"
  giga_qso.1.menu:0 "回到菜单"
  giga_qso.10.name:0 "$name_quasistellar$：目标选择"
  giga_qso.10.desc:0 "在这里，你可以选择你想让类星天陨对准的目标。请查阅每一种瞄准方法是如何正常运作的。记住，摧毁更大型的目标会需要更多的£giga_sr_quasaric_energy£ §Y类星体能量§!。"
  giga_qso.10.fleet:0 "摧毁一个§G舰队§!"
  giga_qso.10.planet:0 "摧毁一个§Y行星§!"
  giga_qso.10.star:0 "摧毁一个§H星系§!"
  giga_qso.10.starcluster:0 "摧毁一个§R星团§!"
  giga_qso.200.name:0 "$name_quasistellar$：§G舰队毁灭§!"
  giga_qso.200.desc:0 "你已经选择用$name_quasistellar$去瞄准一支地方舰队。这将花费§Y20§! £giga_sr_quasaric_energy£。\n\n一艘特殊舰船——被用于校准类星天陨的目标——将会在这个巨构附近被创造出来。它配备了一种特殊且无范围限制的跃迁引擎。将这艘舰船移动到目标舰队所在的星系，然后重新打开控制面板来确认。\n\n在超级武器校准期间，这艘舰船必须保证§Y5天§!的生存，因此请确保它得到合适的护卫。\n\n在这5天过去之后，类星天陨将会通过一个虫洞直接对敌方舰队开火，需要另外30天的时间。然而虫洞可能会被敌方火力打断，因此不推荐让它独自留在那里。\n\n如果你想要取消操作，可以解散这艘舰船，或者使用控制面板。"
  giga_qso.200.yes:0 "让我们继续。"
  giga_qso.201.name:0 "类星能校准舰装配完毕"
  giga_qso.201.desc:0 "我们的类星天陨已经装配了一艘小型类星能校准舰。它会被用来恰当地校准和瞄准超级武器开火时经过的虫洞。为了开始开火序列，使用它的跃迁引擎来让其移动到目标舰队所在的星系。"
  giga_qso.201.a:0 "明白。"
  giga_qso.202.name:0 "类星能校准舰被解散"
  giga_qso.202.desc:0 "我们已经解散了我们的类星能校准舰。毁灭程序已经被取消。"
  giga_qso.202.a:0 "明白。"
  giga_qso.203.name:0 "类星能校准舰被摧毁"
  giga_qso.203.desc:0 "我们的类星能校准舰被地方力量摧毁了。毁灭程序已经被取消。"
  giga_qso.203.a:0 "明白。"
  giga_qso.204.name:0 "$name_quasistellar$：§G舰队毁灭§!"
  giga_qso.204.desc:0 "如果你已经将类星能校准舰送到了正确的星系，选择第一个选项。你必须在5天内保护它。如果你想要取消，选择第三个选项，这会解散校准舰。"
  giga_qso.204.fire:0 "开始校准！花费：§Y20§!£giga_sr_quasaric_energy£"
  giga_qso.204.markers:0 "校准舰并未处就位。"
  giga_qso.205.name:0 "校准类星天陨"
  giga_qso.205.desc:0 "我们的$name_quasistellar$已经开始用校准舰去校正它的武器。我们必须保证它不会在5天内被摧毁，在那之后我们的超级武器将会对敌人释放纯粹的毁灭光束。类星天陨将会花费大约30天来进行开火，在那之后虫洞将会消失，类星天陨也会再一次准备就绪。"
  giga_qso.205.a:0 "好极了。"
  giga_qso.206.name:0 "$name_quasistellar$：校准完成"
  giga_qso.206.desc:0 "我们的$name_quasistellar$已经完成了校准超级武器和冲动，现在要开始将它的怒火倾泻到被我们指定为目标的不幸舰队上去。"
  giga_qso.206.a:0 "很好。让它们燃烧吧。"
  giga_qso.400.name:0 "$name_quasistellar$：§R星团毁灭§!"
  giga_qso.400.desc:0 "你已经选择了去摧毁一个恒星以及它的每一个超空间航道邻居。要这样做的话，用一个工程船去在你想要摧毁的恒星上建造§B类星天陨目标标记§!。\n\n它会被立即建造出来，无需让工程船实际出现在那个星系中。\n\n§R不管怎样那个星系中的敌人必须被清除。§!\n你可以使用类星天陨的舰队摧毁特性来达成这一点。\n\n一旦目标标记被建造完毕，返回类星天陨，并再次打开控制面板来对那里开火。\n\n§B这道冲击过于强力，它还会通过超空间航道扩散，导致目标星系——以及与其相连的每个星系一道——被完全摧毁，它们的超空间航道也会被抹除，只留下虚无的空间。§!"
  giga_qso.401.name:0 "§R星团毁灭§!"
  giga_qso.401.desc:0 "如果你已经瞄准了你想要摧毁的星团的核心处的恒星，选择第一个选项。如果你想要取消，选择第三个选项，这会去除标记。"
  giga_qso.401.fire:0 "摧毁1个星团，开火！花费：§Y120§!£giga_sr_quasaric_energy£"
  giga_qso.401.markers:0 "我没还没有瞄准一个恒星。"
  giga_qso.300.name:0 "$name_quasistellar$：§H星系毁灭§!"
  giga_qso.300.desc:0 "你已经选择了去摧毁一个或者几个恒星以及它们的整个行星系统。要这样做的话，用一个工程船去在你想要摧毁的恒星上建造§B类星天陨目标标记§!。\n\n它会被立即建造出来，无需让工程船实际出现在那个星系中。\n\n§R不管怎样那个星系中的敌人必须被清除。§!\n你可以使用类星天陨的舰队摧毁特性来达成这一点。\n\n你一次最多可以对准4个恒星，每个恒星会增加40£giga_sr_quasaric_energy£的总开火花费。如果一个星系中有多个恒星，你只需要标记它们当中的一个。\n\n一旦目标标记被建造完毕，返回类星天陨，并再次打开控制面板来对那里开火。\n\n§B$name_quasistellar$的能量输出过于强大，它可以摧毁中子星、脉冲星、甚至还有黑洞。能量流如此之高，以至于时空本身都会彻底翻转，而黑洞也会挥发成虚无。\n\n§B当这些星系被摧毁的时候，与其相连的超空间航道也会消失。§!"
  giga_qso.301.name:0 "$name_quasistellar$：§H星系毁灭§!"
  giga_qso.301.desc:0 "如果你已经瞄准了你想要摧毁的所有恒星，选择第一个选项。如果你想要取消，选择第三个选项，这将去除所有标记。"
  giga_qso.301.markers:0 "在开火之前，我们仍然需要瞄准更多恒星。"
  giga_qso.301.fire.1:0 "摧毁1个星系，开火！花费：§Y40§!£giga_sr_quasaric_energy£"
  giga_qso.301.fire.2:0 "摧毁2个星系，开火！花费：§Y80§!£giga_sr_quasaric_energy£"
  giga_qso.301.fire.3:0 "摧毁3个星系，开火！花费：§Y120§!£giga_sr_quasaric_energy£"
  giga_qso.301.fire.4:0 "摧毁4个星系，开火！花费：§Y160§!£giga_sr_quasaric_energy£"
  giga_qso.100.name:0 "$name_quasistellar$：§Y行星毁灭§!"
  giga_qso.100.desc:0 "你已经选择了去摧毁一个或者几个行星。要这样做的话，用一个工程船去在你想要摧毁的行星上建造§B类星天陨目标标记§!巨构。\n\n它会被立即建造出来，无需让工程船实际出现在那个星系中。确保工程船没有处于回避姿态。\n\n你一次最多可以对准10个行星，每个行星会增加5£giga_sr_quasaric_energy£的总开火花费，最高达到50。\n\n一旦目标标记被建造完毕，返回类星天陨，并再次打开控制面板来对那里开火。"
  giga_qso.101.name:0 "$name_quasistellar$：§Y行星毁灭§!"
  giga_qso.101.desc:0 "如果你已经瞄准了你想要摧毁的所有行星，选择第一个选项。如果你想要取消，选择第三个选项，这将去除所有标记。"
  giga_qso.101.fire.1:0 "摧毁1个行星，开火！花费：§Y5§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.2:0 "摧毁2个行星，开火！花费：§Y10§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.3:0 "摧毁3个行星，开火！花费：§Y15§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.4:0 "摧毁4个行星，开火！花费：§Y20§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.5:0 "摧毁5个行星，开火！花费：§Y25§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.6:0 "摧毁6个行星，开火！花费：§Y30§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.7:0 "摧毁7个行星，开火！花费：§Y35§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.8:0 "摧毁8个行星，开火！花费：§Y40§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.9:0 "摧毁9个行星，开火！花费：§Y45§!£giga_sr_quasaric_energy£"
  giga_qso.101.fire.10:0 "摧毁10个行星，开火！花费：§Y50§!£giga_sr_quasaric_energy£"
  giga_qso.101.markers:0 "在开火之前，我们仍然需要瞄准更多行星。"
  giga_qso.101.cancel:0 "取消。"
  giga_eawaf.10141.b:0 "这太迷人了！我们必须了解更多！"
  giga_eawaf.1015.nopsi:0 "也许随着时间流逝，我们的理解会越来越深入…"
  giga_eawaf.1015.nopsi.tooltip:0 "如果我们研究出更多常规科技，也许就能从浮士德内部获取更多领悟了。"
  giga_eawaf.1015.psi:0 "没有时间浪费了！"
  giga_eawaf.60022.desc:0 "当我们的部队在§Y浮士德§!着陆时，那些负隅顽抗的塞壬派出了数百万心灵被控制的浮士德人，他们冲向了我们的军团！\n\n这些傀儡足有一国之众，却没有合适的武器或作战经验，为了阻挡我们不可避免的推进而无谓地献身，对此，我们的指挥官黯然神伤。\n\n显然，如果不做些什么，塞壬会为了垂死挣扎而不惜牺牲全浮士德的无辜生命，而后者就是浮士德的价值所在。"
  giga_eawaf_disenchanter_research_cost_1:0 "有限的反塞壬研究"
  giga_eawaf_disenchanter_research_cost_1_desc:0 "塞壬并不值得我们优先考虑，不过，保险起见，我们还是可以拨出一点资源。"
  giga_eawaf_disenchanter_research_cost_2:0 "扩大的反塞壬研究"
  giga_eawaf_disenchanter_research_cost_2_desc:0 "我们需要阻止塞壬，所以让我们提供足以实现这点的资源吧。"
  giga_eawaf_disenchanter_research_cost_3:0 "大规模反塞壬研究"
  giga_eawaf_disenchanter_research_cost_3_desc:0 "我们必须不计一切代价阻止塞壬！拿出所有我们能拿出的东西！"
  eaw_planet_buffs:0 "热力占卜"
  job_entertainer_plural_with_icon:0 "演艺人员"
  giga_flavor_systems.2000.name:0 "中心"
  giga_flavor_systems.2000.desc:0 "我们探索§Y贝希摩斯§!星系的一艘舰船偶然发现了一个真正挑战物理学的行星系统。\n\n围绕星系中心褐矮星运动的是一个奇特的大陆星球，从各种意义上讲，褐矮星的低能量输出意味着这一星球不适合居住。然而，不知何故，一个小型的，类似太阳的星体在上述星球的附近运动，为其提供足够的能量和热量以保持稳定的水圈，维持星球表面的生命。\n\n此外，该星球上已经进化出几个智能物种，它们发展成无数的原始民族国家，目前正在进行全面工业化。\n\n有趣的是，这个星球本身就有异常丰富的水晶材料，原住民已经想出了巧妙的方法将这些材料整合到它们的技术和武器中，这导致了它们拥有相对其早期文明来说异常强大的军力发展。该星球的生态系统本身多样化的惊人，它孕育了大量的奇异并奥秘的物种，似乎违背了我们对进化学和生物学的整体理解。\n\n毫无疑问，这一整个星系都与我们目前有关宜居星球发展的大部分知识相悖，研究它对我们的科学基础更进一步来说是天赐良机。"
  giga_flavor_systems.2000.a:0 "真是奇特。"
  giga_flavor_systems.2002.name:0 "浮士德进入了原子时代"
  giga_flavor_systems.2002.desc:0 "报告称居住在§Y[giga_eaw_system.GetName]§!星系内§Y浮士德§!中奇特大陆上的原住民已经成功建造并测试了一个低当量的核装置。\n\n尽管它们目前仍稀少且昂贵，但随着技术的完善与传播，这些武器将在星球上多个国家中成倍的扩散。\n\n有趣的是，这些武器不依赖于传统的铀裂变来获得能量，而是用星球上丰富的水晶矿藏中所含的能量来释放巨大的破坏力。我们的观测站已经将其称为§Y奇术核装置§!。\n\n从今以后，如果星球上发生大规模的冲突，其破坏性必远远超过以往水平。"
  giga_flavor_systems.2002.a:0 "有趣。"
  giga_flavor_systems.2004.name:0 "浮士德陷入奇术核战争"
  giga_flavor_systems.2004.desc:0 "§Y浮士德§!观测站报告，由于这颗行星极度紧张的地缘政治局势，两个浮士德超级大国之间微不足道的渔船事件已经升级成了三个大陆之间的大规模冲突。\n\n不幸的是，奇术核武器已经普及开来，大多数主要国家都维持着相当多的储备。当这颗星球上的各超国家联盟把巨量奇术核弹头扔向另一边的时候，冲突迅速变成灭绝级的事件。\n\n仅仅几日，行星的表面就已经被核装置释放出的毁灭性能量完全吞没，曾经翠绿的星球变成了一颗覆盖着广阔的类魔法能量风暴的行星。\n\n轨道扫描显示，除了一片似乎是奇迹般地幸存下来的雨林之外，该星球上的土著文明已经完全毁灭了。"
  giga_flavor_systems.2004.a:0 "如此一个暴力的结局。真是不幸。"
  giga_flavor_systems.2006.name:0 "浮士德进入了太空时代早期"
  giga_flavor_systems.2006.desc:0 "§Y浮士德§!上的原住民又完成了它们社会进化的一个关键步骤：开发第一批能够进行星际飞行的轨道航天器。\n\n多个使用该星球上丰富的水晶的液态形式供能的航天器被派去探索它们的恒星系，这些原住民开始认真探究它们奥秘的星系的性质。\n\n随着水晶透镜的功能越来越强，原住民们很可能通过研究更多的系外行星来了解到它们星球独特的天体地理学有多么的独一无二。\n\n整个星球的紧张局势开始降温，几个大国采取了非常现实的国际合作步骤，但这些努力能够取得成果或是以灾难性的灭绝事件告终还有待观察。\n\n距离那些奇特的生命与我们一起在星空中作伴的一天不远了。"
  giga_flavor_systems.2006.a:0 "有趣。"
  giga_flavor_systems.2012.name:0 "§Y大浮士德集会§!实现了FTL"
  giga_flavor_systems.2011.desc.eawun:0 "我们的在§Y浮士德§!上的观测站指出这颗行星上的土著居民已经至少能设计出一种可行的超光速引擎了。就和他们的其他科技一样，这种引擎也广泛使用了星球上独有且丰富的水晶材料，鉴于他们母星系含有数量可观的水晶矿藏，这意味着这种引擎的制造成本将出奇的低廉。\n\n这个星球本身已经被一个超国家实体所统一，它被称为§Y浮士德大议会§!，由这个星球的几个主要民主政府联合组成。尽管这些政府在某种程度上仍然存在，但议会已经有效地担任了浮士德的星际权威角色，并将负责指导该文明在星际间的扩张。\n\n考虑到这个星球上不同物种之间巨大的文化和物理差异，我们前哨站的船员和这个星球上的大多数居民都将整个星球能够和平联邦化成为一个单一政府视为一个惊人的壮举。\n\n鉴于我们在该星系内拥有恒星基地，我们已经收到了他们领袖的一条通讯信息，来自§Y丛林跋涉三世§!，它要求我们将恒星基地的所有权转交给它们，这样浮士德的居民们就可以开始它们的星际旅行了。"
  giga_flavor_systems.2013.name:0 "§Y狮鹫尼亚帝国§!实现了FTL"
  giga_flavor_systems.2011.desc.eawgriffon:0 "我们的在§Y浮士德§!上的观测站指出这颗行星上的土著居民已经至少能设计出一种可行的超光速引擎了。就和他们的其他科技一样，这种引擎也广泛使用了星球上独有且丰富的水晶材料，鉴于他们母星系含有数量可观的水晶矿藏，这意味着这种引擎的制造成本将出奇的低廉。\n\n这颗行星上的文明本身已经通过战争和外交策略统一到了一个名叫§Y狮鹫尼亚帝国§!的帝制国家旗下，这个国家通过进行完全征服或施加经济宰制，借此将影响力覆盖到了整颗星球并成功吞并了星球上大多数前国家。\n\n尽管并非所有人都认同这一安排，但没有任何外部势力能够对狮鹫尼亚帝国的占领发难，整颗星球的命运看上去就此注定。\n\n鉴于我们在该星系内拥有恒星基地，我们已经收到了他们领袖的一条通讯信息，来自§Y格罗弗王朝§!的§Y格罗弗十一世§!，他要求我们将恒星基地的所有权转交给狮鹫尼亚帝国，如此他们便可被视作一个独立的星际国家。"
  giga_flavor_systems.2014.name:0 "§Y泛浮士德社会主义共和国§!实现了FTL"
  giga_flavor_systems.2011.desc.eawcommunist:0 "§Y浮士德§!观测站指出该行星上的土著文明已经建造——至少是设计出了——一台可运行的超光速引擎。和他们的大多数科技一样，这种超光速引擎大面积采用古怪水晶，母星系中产量丰富的水晶使得它的造价出奇的便宜。\n\n这颗行星以较为和平的方式统一成为§Y泛浮士德社会主义共和国§!。经过数次社会主义同盟国的合并和相当多的战争，这个恰当命名的的社会主义政府成功主张了对大多数浮士德民族国家的控制。\n\n尽管有少数国家还保持独立，但它们太过弱小以至于难以对抗新社会主义政府压倒性的霸权。新政府承诺为所有智慧生物带来平等和繁荣，不论种族和出身。\n\n因为我们占有着该星系的恒星基地，我们收到了来自他们领袖的一条消息，其代表浮士德最高议会要求我们把恒星基地的所有权转让给他们。"
  giga_flavor_systems.2011.a:0 "在屏幕上显示。"
  giga_flavor_systems.2015.name:0 "[giga_eaw_country.GetName]"
  giga_flavor_systems.2015.desc.eawun:0 "你好，星际的旅行者们。大浮士德集会已然掌握了星际旅行的必要科技。\n\n然而，我们注意到你们的种族宣称了我们的星系。因此，我们的大议会决定给予你们的文明§Y7500§!£energy£的经济补偿——全部产出自我们最好的水晶发电机，来换取对§Y[giga_eaw_system.GetName]§!的所有权。"
  giga_flavor_systems.2015.desc.eawgriffon:0 "向你问好，来自浮士德之外的客人。狮鹫尼亚帝国终于驯服了物理法则本身，使之允许我们在群星间的虚空中遨游。\n\n然而，我们注意到你们的种族对我们的恒星系宣称了所有权。因此，朕，§Y格罗弗十一世§!大帝请求你们将恒星系的控制权转交给我们，鉴于我们在你们到来之前已久居于此。\n\n这是完全正确且合理的要求。"
  giga_flavor_systems.2015.desc.eawcommunist:0 "你好，星际的旅行者。泛浮士德社会主义共和国最聪慧的头脑们已经设计出了能够跨星系旅行的宏伟设备。\n\n然而，我们注意到你们的种族对我们的恒星系宣称了所有权。因此，我们的最高议会决定给予你们的文明§Y5000§!£energy£和§Y2500§!£consumer_goods£的经济补偿，来换取对§Y[giga_eaw_system.GetName]§!的所有权。\n\n相信你们不会让我们的期望落空。"
  giga_flavor_systems.2015.a:0 "你可以拥有这个星系。"
  giga_flavor_systems.2015.a.response:0 "[giga_eaw_country.GetName]感谢您的合作。"
  giga_flavor_systems.2015.a.tooltip:0 "我们将把全部的§Y[giga_eaw_system.GetName]§!星系，包括我们在星系中拥有的所有殖民地转让给§Y[giga_eaw_country.GetName]§!。"
  giga_flavor_systems.2015.b:0 "你可以拥有这个星系和其所有邻接星系。"
  giga_flavor_systems.2015.b.tooltip:0 "我们将把整个§Y[giga_eaw_system.GetName]§!星系以及§Y相邻星系§!以及我们在这些星系中可能拥有的所有殖民地，转交给§Y[giga_eaw_country.GetName]§!\n\n[giga_eaw_country.GetName]一定会感激不尽。"
  giga_flavor_systems.2015.b.response:0 "真令人愉快！[giga_eaw_country.GetName]将会非常感激。"
  giga_flavor_systems.005.c:0 "这绝对不行。"
  giga_flavor_systems.005.c.tooltip:0 "我们拒绝把这个星系交给他们，他们可能将会报复我们。"
  giga_flavor_systems.005.c.response:0 "要知道我们不害怕冲突，[ROOT.GetName]。"
  giga_flavor_systems.2007.name:0 "已焚毁浮士德"
  giga_flavor_systems.2007.desc:0 "§Y贝希摩斯§!褐矮星被点燃后，环绕它的大多数行星都变得比以往更宜居了，但代价是彻底烧灭了居住在§Y浮士德§!这颗独特大陆星球上的原始居民。\n\n行星地表被恒星点燃时的第一道冲击波完全地摧毁并净化，一瞬之间，任何地表上的生命形式都就此终结，只有一小撮孤零零的极端微生物幸存。\n\n定居在这颗行星上的土著居民已经不复存在，只因我们的一时鲁莽，他们就承受了这般灭顶之灾。"
  giga_flavor_systems.2007.xenophile:0 "我们犯下了滔天大罪……"
  giga_flavor_systems.2007.xenophile.tooltip:0 "由于我们的思潮，我们的人民将会§R十分不满§!。"
  giga_flavor_systems.2007.xenophobe:0 "谢天谢地！"
  giga_flavor_systems.2007.xenophobe.tooltip:0 "由于我们的思潮，我们的人民将会§G很高兴§!。"
  giga_flavor_systems.2007.exterminator:0 "哦，不！无所谓了……"
  giga_flavor_systems.2007.exterminator.tooltip:0 "由于我们的思潮，这将被视为一个§B伟大的事件§!。"
  giga_flavor_systems.2007.other:0 "真不幸……"
  giga_flavor_systems.2007.other.tooltip:0 "这一行动将在我们的人口中引起一些§Y抗议§!，但它应该很快消退。"
  eaw_ignited_faust_modifier_good:0 "被灭绝的土著"
  eaw_ignited_faust_modifier_good_desc:0 "我们已经以技术力量焚烧可怜的土著种族的方式行使了我们的支配权。"
  eaw_ignited_faust_modifier_bad:0 "被焚烧的土著"
  eaw_ignited_faust_modifier_bad_desc:0 "我们的行动导致了数十亿无辜生灵的夭折。我们的民众将不会遗忘这一罪行。"
  giga_flavor_systems.2100.name:0 "已征服浮士德"
  giga_flavor_systems.2100.desc:0 "我方军队已经成功击溃了§Y浮士德§!的多数武装力量，虽然还有一些散兵游勇继续在浮士德的最隔绝的区域中进行抵抗，但我们已经控制了该行星的所有主要人口中心。\n\n然而，浮士德拥有异常多样的民族和文化，至少有两个不同的主要物种分享这个星球，还有几十种亚种，每个都有自己的意识形态和信仰。\n\n实际上，这使得对新政府人口的控制变得格外困难，再加上上述的一些种族拥有类似灵能的能力，这意味着主要的抵抗运动已经在整个星球上组织起来。\n\n毫无疑问，我们最终能够完全征服原始的浮士德人，但就目前而言，随着浮士德的居民了解到一项不可避免的事实——即他们作为我们文明中的成员所拥有的新地位，我们应该预料到该星球会对我方统治造成极其严厉的抵抗。"
  giga_flavor_systems.2100.a:0 "他们会被及时处理"
  giga_flavor_systems.2101.name:0 "水晶武器"
  giga_flavor_systems.2101.desc:0 "在研究§Y浮士德§!上被征服的民众及其技术时，士兵们注意到，尽管浮士德被为原始文明，但就其技术发展水平而言，他们的武器可谓令人惊讶地强大。\n\n进一步调查表明，浮士德多数武器都是围绕着一种融入其技术中的§Y稀有水晶§!的应用，而这种类型奇特的稀有水晶可以储存释放巨大的能量。这些水晶有效地充当了“水晶电池”，为他们的武器提供了近乎无穷的能量以供使用。\n\n它们似乎与我们所知的稀有水晶密切相关，可能是通过数个世纪以来的流星撞击，从附近的水晶小行星带沉积到浮士德的，或许是被褐矮星的强大磁场扭曲成了这种更加奇异的形式。\n\n无论怎样，科学家们渴望研究这些奇特的晶体，并已给出了一些建议，将它们整合进我们的武器中，并进一步增强我方军队的力量。\n\n一位科学家提出了这样一条事实：如果这样一个文明完全接纳了这般奇迹武器的真正潜力，那他们无疑会成为整个星海中最具威胁的力量之一。幸运的是，浮士德的居民更多的是将这些水晶用于“常规”技术的升级，而不是完全依赖它们。但是为了我们自身的利益，我们必须期望没有一个文明能够发现这些深奥的、几近“魔法”的技术的真实潜力……"
  giga_flavor_systems.2101.a:0 "真迷人。"
  giga_flavor_systems.2016.name:0 "[giga_eaw_country.GetName]夺取了[giga_eaw_system.GetName]恒星基地！"
  giga_flavor_systems.2016.desc:0 "§Y[giga_eaw_country.GetName]§!公然地无视了我们拒绝它们请求的事实，展开了一次行动来征用并夺取§Y[giga_eaw_system.GetName]§!星系中的恒星基地。\n\n虽然它们确实设法占领了恒星基地，但我们估计摧毁它们的舰队并夺回星系及其母星不会太困难，但最高指挥部警告称其地面部队相比如此年轻的文明来说异常强大。"
  giga_flavor_systems.2016.a:0 "他们怎敢如此肆意妄为？立即碾碎他们！"
  giga_flavor_systems.2016.a.tooltip:0 "我们会向§Y[giga_eaw_country.GetName]§!§R宣战§!，且必须夺取§Y浮士德§!以终结战争。"
  giga_flavor_systems.2016.b:0 "他们可以拥有那个星系。不论怎样那对我们一文不值。"
  giga_flavor_systems.2016.b.tooltip:0 "§Y[giga_eaw_system.GetName]§!和它所有的星球都被转交给了§Y[giga_eaw_country.GetName]§!。"
