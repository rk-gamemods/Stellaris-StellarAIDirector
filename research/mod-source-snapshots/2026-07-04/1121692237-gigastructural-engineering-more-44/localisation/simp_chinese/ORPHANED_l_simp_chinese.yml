  compound_def_army_name:0 "$ORD$守护者"
  compound_off_army_name:0 "$ORD$催化剂"
  compound_gen_army_name:0 "$ORD$催化剂"
  giga_mega.403.desc:0 "好消息! 经过高强度的研究和测绘，我们的科学家已经发现了通往中央集群的超空间突破点! 研究团队利用超光速粒子远程打开了这些突破点，从而创造出了新的超空间航道。也就是说，现在我们（当然其他人也）可以进入银河核心了，研究人员强烈建议我们派出飞船进行探索。"
  d_ehof_solar_array:0 "未开发恒星能收集器"
  d_ehof_solar_array_desc:0 ""
  tech_arcane_g_r:0 "复原奥术裂缝产生器"
  tech_arcane_g_r_desc:0 "$ehof_ep$的秘密使我们能够控制知觉金属。有了它和的负质量的帮助，我们现在能够完全修复奥术裂缝产生器，再现它的往日荣光，使我们能够利用它的全部潜力。"
  ehof_timetoresearch:0 "告诉科学家去调查$tech_negative_pressure$!"
  mod_giga_pop_growth_speed_extra_add:0 "每月次级人口增长"
  allow_systemcraft_p6:0 "$allow_war_system$超维船体稳定"
  desc_systemcraft_p6:0 "解锁恒星系飞船的另一步。"
  giga_menu_presets_random:0 "随机"
  giga_menu_presets_01:0 "《初代吸血鬼5》"
  giga_menu_presets_02:0 "不愧巨构之名"
  giga_menu_presets_03:0 "短小精悍！"
  giga_menu_presets_04:0 "星环万岁"
  giga_menu_presets_05:0 "危险巨构"
  origin_orbital_arcology:0 "轨道理想城"
  origin_orbital_arcology_desc:0 "在这个物种的整个演化过程中，始终有一个巨大的环漂浮在天空中。当他们实现亚光速太空航行的时候，他们发现这个环完全被可居住和可耕种的土地覆盖。"
  origin_orbital_arcology_effects:0 "开局时有一个环绕起始行星的轨道理想城。"
  giga_massive_planet:0 "战争之月"
  giga_massive_planet_plural:0 "战争之月"
  giga_war_moon_fe:0 "古代战争之月"
  giga_war_moon_fe_plural:0 "核心"
  giga_planet_behemoth_fe:0 "古代$name_war_planet$"
  giga_planet_behemoth_fe_plural:0 "古代$name_war_planet$"
  ancient_holy_behemoth_ship_mid_01_key:0 "核心"
  ancient_behemoth_ship_mid_01_key:0 "核心"
  SYSTEMCRAFT_FARMS:0 "大陆农场"
  SYSTEMCRAFT_FARMS_DESC:0 "§G产出：\n30食物§!\n大陆尺度的巨型农场，在恒星系飞船的一颗行星上建造。"
  SYSTEMCRAFT_SHIPYARD:0 "辅助船坞设施"
  SYSTEMCRAFT_SHIPYARD_DESC:0 "§Y维护费：\n15合金§!\n为恒星系飞船建造船舰的额外船坞设施。"
  INVESTIGATE_GALACTIC_CORE:0 "定位银河核心超空间航道"
  INVESTIGATE_GALACTIC_CORE_DESC:0 "银河系的核心目前对我们是隐藏的，但我们可能能够找到通往它的微弱的超空间路线。进入星系核心既是一种战略优势，也是一种科学优势，因为中心系统很可能资源丰富。\n该项目可在准备好后随时开始。"
  INVESTIGATE_GALACTIC_CORE_LINK:0 "定位连接银河核心的超空间航道"
  INVESTIGATE_GALACTIC_CORE_LINK_DESC:0 "根据我们的探测和研究表明，在银河系的核心和其余部分之间应该有超空间航道连接。通过分析研究，我们应该能够找到并激活它们"
  decision_repaired_shattered_alderson:0 "修复超区段"
  decision_repaired_shattered_alderson_desc:0 ""
  feeble_ai_mega_buff:0 "无效AI"
  feeble_ai_mega_buff_desc:0 "向正确的方向迈进一小步"
  virtual_world:0 "虚拟世界"
  virtual_world_desc:0 "这个世界完全由$name_matrioshka_brain$不可思议处理器模拟。因此这里不可能生产矿物质，且在休眠仓中维持人口相当昂贵。"
  giga_tech_war_system_hull_booster:0 "超维船体稳定"
  giga_tech_war_system_hull_booster_desc:0 "$name_war_system$是一种强大的舰船，因此，添加扎根于更高维度的专用结构，可以确保其巨大的船体不会因为自身重力而崩溃。"
  giga_tech_particle_accelerator:0 "超高能粒子对撞机"
  giga_tech_particle_accelerator_desc:0 "加速粒子使其彼此对撞是了解其相互作用的有效途径。建造能够环绕整颗恒星的巨大加速器，肯定是有用的。"
  giga_dialog.1801.name:0 "$name_particle_accel$基址"
  giga_dialog.1801.desc:0 "一个[giga_system.GetName]的基址已经就绪。我们现在可以开始建造实际的粒子加速器，它将环绕恒星，使粒子加速到极高的速度。"
  giga_dialog.1801.a:0 "很好。"
  giga_dialog.1802.name:0 "$name_particle_accel$完成"
  giga_dialog.1802.desc:0 "经过几个月的努力，围绕[giga_system.GetName]的粒子加速器现已完成并投入使用。它拥有以从未想过的速度加速粒子的能力，这将让我们了解到不少关于粒子以及它们如何相互作用的知识。"
  giga_dialog.1802.a:0 "干得漂亮。"
  giga_dialog.1803.name:0 "毁坏的$name_particle_accel$"
  giga_dialog.1803.desc:0 "我们的科研船有了一个不可思议的发现！在[from.GetName]星系中间，有一个巨大的$name_particle_accel$，理论上它可以将粒子加速到不可思议的接近光速。\n\n遗憾的是，它似乎受到了难以估量的破坏，目前正处于严重失修状态。但我们的科学家有信心，如果有适当技术，可以恢复其工作状态。"
  giga_dialog.1803.a:0 "很好。"
  giga_dialog.1804.name:0 "$name_particle_accel$修复完成"
  giga_dialog.1804.desc:0 "好消息！我们的工程师已经成功地将被毁坏的$name_particle_accel$恢复到了正常工作状态！它现在已经开始运作，并且正在稳定地产出大量物理学研究，以及许多奇特粒子。"
  giga_dialog.1804.a:0 "难以置信。"
  particle_accelerator_0:0 "$gc_kilo$$name_particle_accel$基址"
  particle_accelerator_0_DESC:0 "一个大型建造基地，容纳在恒星周围建造粒子加速器所需的人员和材料。"
  particle_accelerator_0_MEGASTRUCTURE_DETAILS:0 "$giga_list_category_kilostructure$——$giga_list_category_science_production$\n产生£physics_research£§Y研究点数§!并使§Y护盾值§!提升§Y2.5%§!\n§L一个围绕恒星建造的超大粒子加速器，可加速粒子至接近光速。"
  particle_accelerator_1:0 "$name_particle_accel$"
  particle_accelerator_1_DESC:0 "围绕恒星建成的超大型粒子加速器。它能将各种粒子加速到几乎等于光速，能极大增进我们对粒子组成及其相互作用的理解。"
  particle_accelerator_ruined:0 "毁坏的$name_particle_accel$"
  particle_accelerator_ruined_DESC:0 "一个毁坏的$name_particle_accel$，由一个未知的文明在数万年前建造。它遭受了难以置信的破坏，但主框架仍然多少有些完整。如果我们有相应的技术，就可以修复它。"
  particle_accelerator_ruined_MEGASTRUCTURE_DETAILS:0 "$particle_accelerator_ruined_DESC$"
  particle_accelerator_restored:0 "$name_particle_accel$"
  particle_accelerator_restored_DESC:0 "围绕恒星建成的超大型粒子加速器。它能将各种粒子加速到近乎光速，能极大增进我们对粒子组成及其相互作用的理解。"
  giga_tech_orbital_arcologies_overlord:0 "轨道环理想城"
  giga_tech_orbital_arcologies_overlord_desc:0 "通常，行星的成长和发展会很快耗尽额外区划的空间。可以通过扩大轨道环的居住区来创造大量可用空间。"
  giga_fallen_empire.101.name:0 "发现天体运动！"
  giga_fallen_empire.101.desc:0 "令人震惊的消息！在一个堕落帝国觉醒后不久，远程传感器就探测到它们领土内的多个行星已经离开了它们的轨道。巨大的隐藏武器和推进器从它们的外壳中浮现出来，现在它们已经变成了可怕的武器化小行星。这些古代文明似乎比以前想象的拥有更多的隐藏武器……"
  giga_fallen_empire.101.a:0 "全员战备！"
  giga_fallen_empire.102.name:0 "神圣的贝希摩斯"
  giga_fallen_empire.102.desc:0 "觉醒帝国拥有许多沉睡了数千年的古代武器，这已经不是什么秘密了。但是没有人能预测到，圣地守护者的圣地实际上不是一个常规世界，而是一个巨大且不活跃的行星大小的宇宙飞船。随着他们最近的觉醒，这个巨大的宇宙飞船已经重新激活，曾经纯净的盖亚世界已经变成了一个巨大的武器化的星球，能够消灭任何阻挡它的东西。他们似乎比我们预期的更愿意捍卫自己的信仰……"
  giga_fallen_empire.102.a:0 "这很不好。"
  giga_flusion.001.desc:0 "我们正在调查原始星球弗鲁森的科研船有了一个令人惊讶的发现：看起来这个原始世界不是有一种，而是有多种智慧物种居于其上。\n\n工作人员已经能辨别出5种主要物种：猫科的喵星人，两栖的巨蜥，类人种的罗夸利亚人，甲壳类的高刚，以及第五种由多种难以分辨的其他亚种组成的混合弗鲁森物种。\n\n我们的科学家仍然不能确认这么多物种如何或者为何会在这一个星球上，但是这确实是个引人注目的发现。"
  giga_flusion.002.desc:0 "我们在不同行星上对喵星人和巨蜥的发现似乎表明，在喵星毁灭之后，这两个物种逃向的星球不是别处，正是原始行星——弗鲁森！\n\n虽然，在他们发现弗鲁森的时候，这两个物种的技术似乎都彻底倒退了。这意味着§Y喵帕探险1号§!很可能坠毁在了行星上，迫使仅存的少数个体近乎从头构建他们的整个技术体系。\n\n尽管这不是一个特别重要的发现，它仍然引起了我们的行星生物考古学家的极大兴趣。它还表明，即使一个文明正处在极其糟糕的情况下，人们也不能忽视他们在各种困难下奇迹生还的可能性。\n\n这想想就既令人振奋又令人害怕……"
  bombardment_house_cat_katzen:0 "$bombardment_katzen$"
  bombardment_house_cat_katzen_desc:0 "$bombardment_katzen_desc$"
  bombardment_mary_sue_katzen:0 "$bombardment_katzen$"
  bombardment_mary_sue_katzen_desc:0 "$bombardment_katzen_desc$"
  bombardment_mary_sue_slam_dance_katzen:0 "$bombardment_katzen$"
  bombardment_mary_sue_slam_dance_katzen_desc:0 "$bombardment_katzen_desc$"
  bombardment_mary_sue_Q_katzen:0 "$bombardment_katzen$"
  bombardment_mary_sue_Q_katzen_desc:0 "$bombardment_katzen_desc$"
  katzenartig_balance:0 "喵星人帝国平衡"
  katzenartig_balance_desc:0 "精心调动这些时髦猫咪的战斗热情。"
  giga_katzen.022.desc:0 "在和喵星人之间漫长的战争之后，我们终于和他们签署了一份和平协议，结束了数十年的冲突。\n\n我们和喵星人帝国之间的敌对关系中止了，目前的边界也获得了官方的承认。既然战争已经结束，大帝也将更愿意和我们谈判。"
  katzenartig_splinter:0 "分散国家资源"
  katzenartig_splinter_desc:0 "为了避免灾难性的崩溃。"
  giga_katzen.02021.desc:0 "加佐星系！那是我们祖先的母星——§Y喵星§!之所在，在疯狂的§Y喵帕§!用核火焰摧毁了它的地表之后，我们的种族乘着一艘殖民船，勉强摆脱了灭绝的命运。\n\n大帝愿意给予你们§Y15000§! £energy£，来交换这个极有价值的星系——如果我们是个唯心主义的种族的话，我们就会把它当做圣地了。\n\n所以，你怎么看？"
  katzenartig_major_splinter:0 "主要分散国家资源"
  katzenartig_major_splinter_desc:0 "预防灾难性崩溃。"
  aet_intel_1:0 "永世科技情报"
  aet_intel_1_desc:0 "我们关于永世科技的知识增强了我们对他们的作战能力。"
