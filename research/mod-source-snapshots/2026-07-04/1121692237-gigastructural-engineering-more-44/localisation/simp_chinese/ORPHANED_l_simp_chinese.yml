  district_giga_alderson_consumer:0 "工业超区段"
  district_giga_alderson_consumer_plural:0 "工业超区段"
  district_giga_alderson_consumer_desc:0 "充满了工匠与民用工业的工厂一列列地排布在这个超区段堆叠的街道上。"
  district_giga_alderson_alloys:0 "铸造超区段"
  district_giga_alderson_alloys_plural:0 "铸造超区段"
  district_giga_alderson_alloys_desc:0 "着重于军工行业，这个都市超区段充斥着熔炉的轰鸣声和冶金的铿锵声。"
  district_giga_alderson_leisure:0 "休闲超区段"
  district_giga_alderson_leisure_plural:0 "休闲超区段"
  district_giga_alderson_leisure_desc:0 "超区段的居民在闲暇时放松身心的地方。"
  district_giga_alderson_pop_growth:0 "产卵超区段"
  district_giga_alderson_pop_growth_plural:0 "产卵超区段"
  district_giga_alderson_pop_growth_desc:0 "在专家的科学、温和的照料之下，这些池子刺激我们的卵，使之加快发育。"
  mod_district_giga_alderson_pop_growth_max:0 "最大$district_giga_alderson_pop_growth_plural$"
  district_giga_alderson_pop_assembly:0 "装配超区段"
  district_giga_alderson_pop_assembly_plural:0 "装配超区段"
  district_giga_alderson_pop_assembly_desc:0 "延伸开来的工厂，致力于组装我们的人口。"
  mod_district_giga_alderson_pop_assembly_max:0 "最大$district_giga_alderson_pop_assembly_plural$"
  ap_slice_of_life:0 "一“片”生机"
  ap_slice_of_life_desc:0 "环形世界曾被视为超级工程的巅峰，但而今充其量不过是个高档居住站。我们必须迈出超级工程的下一步，设计一种新型的栖所，甚至超越最大的环形世界。$name_alderson$，一个太阳系大小的宏大圆盘，围绕着一颗恒星而建，将能容纳难以想象数量的人口和工业。"
  add_research_options_alderson:0 "获得研究选项：\n£engineering_research£§Y$name_alderson$§!"
  ap_systemcraft:0 "秘密天体武器化"
  ap_systemcraft_desc:0 "我们已经有能力把整个星球变成战舰，但我们一些更有野心的科学家认为，也许有可能以某种方式把战舰做得更大，能把一整个恒星系组装在一起，形成一艘巨大无比的战舰。这艘巨大的战舰将使强大的$name_war_planet$都相形见绌。最后，我们可能终于有足够的射爆能力了。"
  add_research_options_systemcraft_base:0 "获得研究选项：\n£physics_research£§Y架构：恒星级推进§!\n我们将开始研究一系列的科技，最终建造出这个星系、甚至是宇宙中有史以来最巨大、最宏伟的飞船。"
  pc_alderson_slice_ecu:0 "都市奥尔德森盘"
  pc_alderson_slice_ecu_desc:0 "横跨恒星系的真正巨无霸城市。完全被都市工业的扩张所吞噬，这个奥尔德森片区表面可以承载难以计数的工业和人口。"
  pc_alderson_slice_hive:0 "蜂巢奥尔德森盘"
  pc_alderson_slice_hive_desc:0 "整个片区都是一个巨大的活体组织，通过灵能与将之塑成的蜂巢意志进行链接。任何踏足此地而不属于蜂巢一份子的存在都受到地形本身的攻击。"
  pc_alderson_slice_machine:0 "机械奥尔德森盘"
  pc_alderson_slice_machine_desc:0 "被人造结构覆盖。稀薄大气主要由工业污染物组成，无法支持生物生命。"
  pc_alderson_slice_pc:0 "奥尔德森计算复合体"
  pc_alderson_slice_pc_desc:0 "一个真正巨大的计算综合体，类似于行星计算复合体，但却绵延在整个奥尔德森片区上。它的处理能力难以估量，并为研究提供不可思议的加成。还是带不动孤岛危机。"
  tech_giga_planetary_shield_generator_1:0 "超护盾防御屏障"
  tech_giga_planetary_shield_generator_1_desc:0 "$tech_giga_planetary_shield_generator_1$是传统护盾发生器的加强版，能够为下方的行星提供更强的保护。"
  district_giga_alderson_industrial:0 "工业超区段"
  district_giga_alderson_industrial_plural:0 "工业超区段"
  district_giga_alderson_industrial_desc:0 "完全由真正巨大的超级轨道，巨型机甲，以及难以置信的工厂组成的景观。普通工人在此没有立足之地。"
  giga_blokkat.3351.a.tooltip:0 "该科技的花费是§Y25M§!。"
  pc_alderson_slice_pc_adj:0 "debug"
  pc_alderson_slice_ecu_adj:0 "debug"
  pc_alderson_slice_hive_adj:0 "debug"
  pc_alderson_slice_machine_adj:0 "debug"
  giga_dialog.2501.title:0 "奥尔德森片区特化"
  giga_dialog.2501.desc:0 "是时候决定将这一超区段升级为何种奥尔德森片区了。在超区段完成后，可通过环境改造修改类型。"
  giga_dialog.2505.title:0 "奥尔德森计算复合体完成！"
  giga_dialog.2505.desc:0 "$name_alderson$其中的一个片区终于完工！这个巨大的居住区横跨了数个天文单位，可为我们的人口与工业提供难以计数的活动空间。这一片区完全由强大的计算机与处理器层层覆盖，能够为科研人员提供近乎无限的算力，并无延迟访问帝国知识数据库。这个强大的建筑一定能帮我们远比以往更轻松地堪破宇宙奥秘。"
  giga_dialog.2505.a:0 "真了不起！那它能跑得动孤岛危机吗？"
  giga_dialog.2505.a.tooltip:0 "不能。"
  giga_dialog.2506.title:0 "普世城奥尔德森片区完成！"
  giga_dialog.2506.desc:0 "$name_alderson$其中的一个片区终于完工！这个巨大的居住区横跨了数个天文单位，将为我们的人口与工业提供难以计数的活动空间。这个片区完全被城市工业的扩张覆盖，为市民提供了大量的工业产能与住房。"
  giga_dialog.2506.a:0 "棒极了！"
  giga_dialog.25061.title:0 "蜂巢奥尔德森片区完工！"
  giga_dialog.25061.desc:0 "$name_alderson$其中的一个片区终于完工！这个巨大的居住区横跨了数个天文单位，将为我们的人口与工业提供难以计数的活动空间。这个片区是一个巨大的有机体，与塑造它的蜂巢思维通过灵能连接。任何不属于蜂群的物种踏足这里都会受到地形本身攻击。"
  giga_dialog.25061.a:0 "棒极了！"
  giga_dialog.25062.title:0 "机械奥尔德森片区完工！"
  giga_dialog.25062.desc:0 "$name_alderson$其中的一个片区终于完工！这个巨大的居住区横跨了数个天文单位，将为我们的人口与工业提供难以计数的活动空间。这个片区完全被人工结构覆盖，稀薄的大气主要由工业污染物组成，无法支持有机生命体。"
  giga_dialog.25062.a:0 "棒极了！"
  giga_dialog.2507.title:0 "$name_alderson$完工！"
  giga_dialog.2507.desc:0 "完成了！在[giga_system.GetName]星系内，我们成功组装完一个巨大的盘体，从恒星沿各个方向一直延伸到星系边缘。这个巨大的千兆巨构让之前我们建造的任何东西都黯然失色，并证明了我们对物理学与工程学法则的终极支配。"
  giga_dialog.2507.a:0 "现在还有谁能抗衡我们？"
  alderson_disk_2_construction_pc_restored_left_complete:0 "$alderson_disk_2_pc$"
  alderson_disk_2_construction_pc_restored_left_complete_DESC:0 "$alderson_disk_2_pc_DESC$"
