  building_giga_planetary_shield_generator_1:0 "超护盾防御屏障"
  building_giga_planetary_shield_generator_1_desc:0 "$building_giga_planetary_shield_generator_1$是传统行星护盾发生器的加强版，能为下方的行星提供更强的保护。"
  district_giga_alderson_refineries:0 "加工超区段"
  district_giga_alderson_refineries_plural:0 "加工超区段"
  district_giga_alderson_refineries_desc:0 "多个比卫星还大的设施组成了这个超区段。它们能以无与伦比的规模将简单的材料加工成更复杂的形状。"
  district_giga_alderson_city:0 "居住超区段"
  district_giga_alderson_city_plural:0 "居住超区段"
  district_giga_alderson_city_desc:0 "这里建造了大到匪夷所思的城市住房，向各个方向延伸了成千上万公里。"
  district_giga_alderson_nexus:0 "中枢超区段"
  district_giga_alderson_nexus_plural:0 "中枢超区段"
  district_giga_alderson_nexus_desc:0 "庞大、高效的区域填满了这一部分，并为子个体提供了他们在被部署到其工作任务之前得到保养和修理的地方。"
  district_giga_alderson_hive:0 "蜂房超区段"
  district_giga_alderson_hive_plural:0 "蜂房超区段"
  district_giga_alderson_hive_desc:0 "高耸的尖塔在这一部分延伸开来，这种尖塔让子工蜂在不工作时聚集起来，恢复活力并消耗营养。"
  district_giga_alderson_generator:0 "恒星发电超区段"
  district_giga_alderson_generator_plural:0 "恒星发电超区段"
  district_giga_alderson_generator_desc:0 "这里建造了巨大的恒星能电池板复合体，从恒星中生成不可计量的能量，以地下聚变反应堆作为补充。"
  district_giga_alderson_farming:0 "农业超区段"
  district_giga_alderson_farming_plural:0 "农业超区段"
  district_giga_alderson_farming_desc:0 "塔式种植与经典农田相结合的田园风光，占地广大。从集约式环境到自由放牧，牲畜的生活环境类型多样。这些过程多数是自动化的；对于一般农夫而言，动植物都可以变得相当危险。"
  district_giga_alderson_mining:0 "物质合成超区段"
  district_giga_alderson_mining_plural:0 "物质合成超区段"
  district_giga_alderson_mining_desc:0 "巨大的、完全由行星规模的变电站和复杂机械构成的景观，用于各种基本材料的合成。"
  district_giga_alderson_commercial:0 "商业超区段"
  district_giga_alderson_commercial_plural:0 "商业超区段"
  district_giga_alderson_commercial_desc:0 "民用工厂和基础设施填满了这个专注于贸易的超区段。"
  district_giga_alderson_science:0 "研究超区段"
  district_giga_alderson_science_plural:0 "研究超区段"
  district_giga_alderson_science_desc:0 "各式各样的研究设施填满了这个超区段。"
  district_giga_alderson_admin:0 "行政超区段"
  district_giga_alderson_admin_plural:0 "行政超区段"
