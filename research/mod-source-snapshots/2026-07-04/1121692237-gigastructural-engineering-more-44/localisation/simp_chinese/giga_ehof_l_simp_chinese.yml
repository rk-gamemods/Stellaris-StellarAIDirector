  #############################################
  # Sentient Metal / Quasi-Negative-Mass Tech #
  #############################################
  tech_qnm_utilities:0 "负质量增强"
  tech_qnm_utilities_desc:0 "$ehof_the_compound_text$是对银河系全体生命的威胁，甚至还不止于此。\n\n我们的测试显示：负质量似乎是我们所知的唯一能伤害到他们的东西。根据这条线索，我们已经开始了使用负质量的能量武器的开发，这样一来，我们终于能够反击了。"
  
  tech_qnm_thrusters:0 "负质量推进器"
  tech_qnm_thrusters_desc:0 "对负质量的研究让我们得以在帝国内扩展其用途。理论上来讲，这种物质的奇异性质能够在没有超空间引擎的情况下进行超光速航行，但我们舰船构造的性质却很平凡，这意味着我们必须解决这个真得非常、非常快的推进器的问题。"
  TECH_UNLOCK_QNM_THRUSTER_TITLE:0 "§H解锁组件：§! $tech_qnm_thrusters$"
  TECH_UNLOCK_QNM_THRUSTER_2_DESC:0 "§H$tech_qnm_thrusters$§!\n银河中所能看到的最快的推进器！"
  
  tech_qnm_sensors:0 "负质量探测器"
  tech_qnm_sensors_desc:0 "负质量使我们能够创造更精确的信号过滤器，以扩充现有的传感器，提高扫描分辨率和舰队的侦测能力。"
  TECH_UNLOCK_QNM_SENSOR_TITLE:0 "§H解锁组件：§! $tech_qnm_sensors$"
  TECH_UNLOCK_QNM_SENSOR_DESC:0 "§H$tech_qnm_sensors$§!\n$tech_qnm_sensors_desc$"
  
  tech_qnm_shields:0 "负质量护盾"
  tech_qnm_shields_desc:0 "负质量护盾能有效排斥来袭的物质和能量，而不是简单地在冲击点分散伤害。"
  
  tech_qnm_reactors:0 "负质量反应堆"
  tech_qnm_reactors_desc:0 "负质量反应堆利用物质偏振流和“常规”能量来实现近乎完美的湮灭和巨大的功率输出。"
  TECH_UNLOCK_QNM_REACTORS_TITLE:0 "§H解锁组件：§! $tech_qnm_reactors$"
  TECH_UNLOCK_QNM_REACTORS_DESC:0 "§H$tech_qnm_reactors$§!\n$tech_qnm_reactors_desc$"
  
  tech_qnm_jumpdrive:0 "负质量增强型跃迁引擎"
  tech_qnm_jumpdrive_desc:0 "跃迁引擎本身已是一项惊世发明，但凭借负质量的独特性质，我们进一步将其增强！我们可以在飞船跃迁的瞬间注入这种物质，大大减少了飞船质量和在太空中移动所需的能量。这让我们能在相同的基础跃迁引擎设计上走得更远、更常规。"
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE:0 "§H解锁组件：§! $tech_qnm_jumpdrive$"
  TECH_UNLOCK_QNM_E_JUMP_DRIVE_TITLE_DESC:0 "§H$tech_qnm_jumpdrive$§!\n$tech_qnm_jumpdrive_desc$"
  
  tech_sm_armor:0 "知觉金属装甲"
  tech_sm_armor_desc:0 "知觉金属能在受伤时复制并复原，且能很快适应环境的影响。这使其成为了装甲的完美材料。"
  
  tech_sm_auto_repair:0 "知觉金属船体再生组织"
  tech_sm_auto_repair_desc:0 "通过在建造船体时加入微量的知觉金属和材料库，我们的舰船可以以极高效率自我修复。"
  
  tech_sm_computers:0 "知觉金属逻辑"
  tech_sm_computers_desc:0 "知觉金属蜂群思维的处理能力极其强大，甚至远远超过我们最强大的信息处理网络。通过直接将它连接到我们舰船与建筑的系统上，我们可以对它施加上位指令，以之前任何舰船电脑都无法做比拟的能力去操控我们的舰船。"
  TECH_UNLOCK_SM_COMPUTERS_TITLE:0 "§H解锁组件：§! $tech_sm_computers$"
  TECH_UNLOCK_SM_COMPUTERS_DESC:0 "§H$tech_sm_computers$§!\n$tech_sm_computers_desc$"
  
  tech_sm_flak_batteries:0 "知觉金属高射炮"
  tech_sm_flak_batteries_desc:0 "$tech_sm_flak_batteries$利用了该材料的本地网络的智能，能以前所未有的精度命中袭来的炮弹。"
  
  tech_sm_autocannons:0 "知觉金属撕裂者"
  tech_sm_autocannons_desc:0 "$tech_sm_autocannons$能发射出大量微型知觉金属钉，每一个的设计目的都是同化接触到的任何形式的物质，随后压缩成一个球体并切断接触点的连接。"
  
  tech_sm_mass_drivers:0 "知觉金属轨道炮"
  tech_sm_mass_drivers_desc:0 "$tech_sm_mass_drivers$会合并然后发射旨在吸收任何接触到的物质的小型知觉金属钉。一旦这种炮弹吸收的材料到达了特定的阈值，就会压缩成一个球体，然后解体。"
  
  tech_sm_kinetic_artillery:0 "知觉金属火炮"
  tech_sm_kinetic_artillery_desc:0 "$tech_sm_kinetic_artillery$会合并然后发射大量旨在吸收任何接触到的物质的$giga_sr_sentient_metal$钉。战斗机和小型舰船会立刻被同化；更大的舰船则会因知觉金属整块整块地撕裂了其船体而受到重创。"
  
  tech_sm_mass_accelerator:0 "知觉金属阻尼器"
  tech_sm_mass_accelerator_desc:0 "$giga_sr_sentient_metal$吸收者会发射巨大的$giga_sr_sentient_metal$钉，一般来说，一发这种大小的弹药就足以同化小型舰船。"
  
  tech_sm_titanic:0 "知觉金属吞噬者"
  tech_sm_titanic_desc:0 "$tech_sm_titanic$不会直接用知觉金属伤害目标。事实上，它会利用该材料与$ehof_the_sphere_named$和$ehof_ep$的连接，让$ehof_the_sphere_named$打开一个能量传送$ehof_wormhole_text$，向敌舰放出巨大的能量。"
  
  tech_qnm_pd_tracking:0 "负质量点防御"
  tech_qnm_pd_tracking_desc:0 "$tech_qnm_pd_tracking$会向来袭的炮弹发射更广大的负质量波动，使它们偏转。"
  
  tech_qnm_lasers:0 "负质量光束"
  tech_qnm_lasers_desc:0 "$tech_qnm_lasers$使用了集中负质量的管道，以此来打散任何形式的物质、重子或其他东西。"
  
  tech_qnm_plasma:0 "负质量伪离子体发射器"
  tech_qnm_plasma_desc:0 "$tech_qnm_plasma$会发射连续的负质量球体，后者会在任何撞到的物质上爆炸，造成破坏。"
  
  tech_qnm_disruptors:0 "负质量扰乱器"
  tech_qnm_disruptors_desc:0 "$tech_qnm_disruptors$会发射巨大的负质量波动，打散大片物质，造成毁灭性打击。不幸的是，没过多少距离，这些波动就会消散。"
  
  tech_qnm_energy_torpedoes:0 "负质量鱼雷"
  tech_qnm_energy_torpedoes_desc:0 "$tech_qnm_energy_torpedoes$是因负质量的毁灭性威力而以之取代了中子的能量炮弹。"
  
  tech_qnm_energy_lance:0 "负质量光矛"
  tech_qnm_energy_lance_desc:0 "$tech_qnm_energy_lance$会持续发射负质量光束，在亚原子层面（或相同的层面）将哪怕最坚固的防御材料撕成碎片。"
  
  tech_qnm_arc_emitter:0 "负质量放射器"
  tech_qnm_arc_emitter_desc:0 "$tech_qnm_arc_emitter$会散射出随机偏振并旋转着的负质量光束，这是专门对付船体的武装。"
  
  tech_qnm_titanic:0 "负质量射束"
  tech_qnm_titanic_desc:0 "$tech_qnm_titanic$是一种巨大的集中光束，能够一击打散巨量的物质。"
  
  
  
