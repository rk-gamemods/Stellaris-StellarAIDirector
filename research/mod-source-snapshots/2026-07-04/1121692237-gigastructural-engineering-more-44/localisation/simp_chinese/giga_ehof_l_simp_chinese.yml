  pc_wh_star:0 "白洞"
  pc_wh_star_plural:99 "White Holes"
  pc_wh_star_desc:0 "曾经只是理论上的黑洞的对等物。白洞会放射出天文数字般大量的能量，推走所有的物质。穿越其事件视界是不可能的。\n\n它的所有能量来自何处仍然是个谜团。它可能由真空能驱动，这是宇宙的神秘背景能量，或者它甚至可能是由整个亚宇宙的膨胀诞生机制驱动的！没有人知道真正的答案……"
  
