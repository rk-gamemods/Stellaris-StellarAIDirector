  ###############################################
  ############### Compound Dialog ###############
  ###############################################
  compound_dialog.1.name:0 "黑暗释放"
  compound_dialog.1.desc:0 "不久之前，我们的一个天文学家发现了一个本星系群内的系外黑洞群。鉴于这种情况很不寻常，为了更好的进行追踪，那名天文学家在得到了帮助的情况下开始了三角测量其准确坐标的过程。\n\n最初发现的几天后，那名天文学家注意到了该恒星系中他们认为是建筑的东西，其中包含一个包围众多黑洞之一的巨构建筑。由此，他们认为：其中有，或者至少曾经有，生命。\n\n今天，我们对那些未确认生命有了直接的了解。黑洞群中的那个巨构建筑很像一个$ehof_ehof$，似乎也能创造通往遥远恒星的虫洞。黑洞群中的生命体已经打开了一个通往§Y[compound_invasion_entry.GetName]§!星系的$ehof_wormhole_text$，然后瞬间摧毁了那里的一切。他们不是抱着和平的意图来的。"
  compound_dialog.1.a:0 "§R全舰队高度警戒！§!"
  
  compound_dialog.3.desc_01:0 "这个星系的转化正在进行中，这是我们即将转化的所有星系中的第一个。\n\n重子实体，你们想寻求什么？"
  compound_dialog.3.desc_02:0 "你们正试图与我们抗争。这没有必要。我们只是想让这片宇宙臻于完美。\n\n你们与完美相反的天真的努力，丝毫不会打扰我们的作业。屈从于我们，和其余的现实一同飞升吧。"
  compound_dialog.3.desc_03:0 "能成为为这个宇宙带来完美之人，是一种荣幸。\n\n重子存在，我们如何才能帮到你们？"
  compound_dialog.3.desc_04:0 "你们中的一些人由肉体构成……还有一些由金属构成……还有一些由这两者兼而构成。\n\n这都无关紧要。\n\n对我们来说，你们都是一样……重子体。你们都有缺陷。完美将从你们基本粒子的接缝中诞生。"
  
  compound_dialog.3.a:0 "你们是谁？"
  compound_dialog.3.a.response:0 "我们是$ehof_the_compound_text$。我们是终极的生命形式。"
  compound_dialog.3.a.r:0 "$ehof_the_compound_text$?"
  compound_dialog.3.a.r.response:0 "我们是由许多个体组成的一体。我们共享一个思想，还有无数的身体。\n\n我们的所有形态都与一个唯一、绝对的意识联系在一起。甚至你们所指的我们的“舰船”，实际上也只是我们众多形态中的一种。"
  compound_dialog.3.a.r2:0 "终极的生命形态？"
  compound_dialog.3.a.r2.response:0 "这是事实。这个宇宙中的所有生命都是由有缺陷的重子物质构成的，不配永久存在于这个现实中。\n\n所有生命，除了我们。\n\n我们的存在由$ehof_the_creators$赋予，我们是暗物质。我们将成为这个宇宙的至高生命。"
  
  compound_dialog.3.b:0 "为什么攻击我们？"
  compound_dialog.3.b.response:0 "我们并未在攻击你们。我们只是开始了对这个星系的嬗变。\n\n这个过程包含了对所有有瑕疵的重子生命体的嬗变，比如你们。\n\n这并非是敌对行动，这是善行。一个完美的礼物。"
  
  compound_dialog.3.d:0 "我们能理解你？"
  compound_dialog.3.d.response:0 "我们已经观察你们很久了。\n\n我们一直在监视你们的星系，监听你们的讯息。\n\n你们发出的每一个信号，都已经被我们截获了。\n\n我们知道你们所有的语言。你们所有的历史。我们知道你们的一切。"
  
  compound_dialog.3.e:0 "你坚不可摧？"
  compound_dialog.3.e.response:0 "没有任何办法能伤害我们。由于我们的本质，我们免疫大多数形式的潜在的有害能量。至于剩下的那些，我们也能学会适应。\n\n这就是为何我们是至高无上的。这就是为何我们是唯一能够让这个宇宙变得完美的存在。"
  
  compound_dialog.3.f:0 "我们会阻止你！"
  compound_dialog.3.f.response:0 "别害怕。我们知道这种变化对你来说很可怕。但它只会将这个宇宙变得完美。\n\n即使你负隅顽抗，结果也不会有任何改变。你的所作所为只不过是稍微拖延了一下终将来到的结局。拥抱完美吧。"
  
  compound_dialog.3.g:0 "$ehof_the_creators$是指谁？"
  compound_dialog.3.g.response:0 "$ehof_the_creators$是我们的造物主。他们摆弄着从暗物质中诞生的生命，创造了我们。\n\n根据他们的理论：免疫伤害的能力和无限的适应力，足以使我们成为这个宇宙生命形式的巅峰。我们会证明这点。"
  
  compound_dialog.3.h.response:0 "对于像[Root.GetSpeciesName]这样的重子生命体来说，这个宇宙是充满敌意的。\n\n不用担心。我们会结束你的痛苦。拥抱完美吧。"
  
  compound_dialog.7.desc:0 "完美在等待着这个宇宙……但是不包括你们。\n\n对于你们……将只有痛苦!"
  
  compound_dialog.8.desc:0 "蠢货。无论给你们广播信息的实体是什么，他们都是群愚夫。\n\n这个假设的“解决方案”根本不存在。不要再为了寻找它浪费宇宙的能量了。\n\n拥抱我们的赐予。拥抱完美。"
  compound_dialog.8.response:0 "没有什么是完美无缺的。"
  
  compound_dialog.9.desc:0 "那群“野 兽”找到了前往我们家园的路！"
  
  compound_dialog.10.desc:0 "欢迎来到我们的家园……一派完美之景，这样的完美也在等待着这个宇宙。\n\n你们在这里不受欢迎！"
  
  compound_dialog.11.desc:0 "这个实体是什么？！它怎么能伤害我们？我们为什么无法伤害它？"
  compound_dialog.11.response:0 "是$ehof_the_creators$派出了它——来毁灭你们。"
  
  compound_dialog.12.desc:0 "$ehof_the_creators$已经消失了！我们亲自转变了他们！别想欺骗我们，有缺陷的实体！"
  compound_dialog.12.response:0 "你们只杀掉了你们家园里的那些。"
  
  compound_dialog.13.desc:0 "我们明白了…那么他们从来没有真正地消失！\n\n现在他们派来了这个“可 悲”的实体以期消灭我们，用这种可怜的行为复仇？！向我们！"
  compound_dialog.13.response:0 "没错，他们只当你们是个错误，仅此而已!"
  
  compound_dialog.14.desc:0 "我们才不是错误！我们是“终 极”生命！“任 何 东 西”都无法阻止我们铸就“完 美”的现实！$ehof_the_creators$将会遭受折磨，正如你将遭受的一样！§R这个星系将会被毁灭！§!"
  compound_dialog.14.response:0 "现在，他们害怕了！"
  
  compound_dialog.16.desc:0 "不可能！这不可能！你的舰队是怎么可能伤害我们的净化形态？"
  compound_dialog.16.response:0 "现在可以伤害你们所有形态了！"
  
  compound_dialog.17.desc:0 "这种干扰不可容忍！你可能发现了一些我们还没有适应的缺陷。但缺陷很快就会消失。"
  compound_dialog.17.response:0 "你确定吗？"
  
  compound_dialog.18.desc:0 "我们不明白！发生了什么？！我们不能接受！我们仍然有缺陷！§R你对我们做了什么？！§!"
  compound_dialog.18.response:0 "负质量是你的毒药。"
  
  compound_dialog.19.desc:0 "这不可接受！！！我们可能想给这个宇宙带来“完 美”，但是对于“你 们”的星系，我们会带来毁灭！一旦我们完成，不会有“任 何 事 物”还能留下！！！现在，“唯 一”等待你的就是“永 恒”的折磨！"
  compound_dialog.19.response:0 "我们触及了他们的痛处！"
  
  ##############################################
  ######### Stellar Annihilator Dialog #########
  ##############################################
  
  # Begin SA Event Chain
  annihilator_dialog.014.name:0 "救赎"
  annihilator_dialog.014.desc:0 "$compound_solution_chain_desc$"
  annihilator_dialog.014.a:0 "现在我们必须找到它。"
  
  # Initial Contact
  annihilator_dialog.001_name:0 "$NAME_Stellar_Annihilator_Species$"
  annihilator_dialog.001.desc:0 "你好，我是$NAME_Stellar_Annihilator_Species$。乐意的话，你们也可以叫我$ehof_the_stellar_annihilator$。我被$ehof_the_creators$派来摧毁他们任性的实验体：$ehof_the_compound_text$。\n\n你大概已经注意到了，它们的目的是转化整个宇宙。\n\n$ehof_the_compound_text$认为自己是无敌的，不过这只有部分是真的。虽然它们的性质让自己能免疫宇宙中的几乎每种力量，但它确实存在弱点——所有形式的暗物质都会在暴露于§H负质量§!的时候解体，化为基本粒子。"
  annihilator_dialog.001.response:0 "§H负质量§!是关键？"
  
  annihilator_dialog.002.desc:0 "经过§H负质量§!强化的武器可以摧毁$ehof_the_compounds_text$。但这还不够。\n\n它的起源星团有多个黑洞，而位于这些黑洞中心的则是关键，是对它存在的最大威胁——一个白洞。$ehof_the_creators$使用了白洞与黑洞之间的独特交互作用创造了$ehof_the_compound_text$。"
  annihilator_dialog.002.response:0 "他们创造了$ehof_the_compound_text$？"
  
  annihilator_dialog.003.desc:0 "除了会产生空前的能量之外，白洞还会生成巨量的§H负质量§!。\n\n为了不让$ehof_the_compound_text$被使他们得以诞生之物毁灭，$ehof_the_creators$被迫环绕白洞建造了一个专门的巨构建筑——$ehof_preservation_sphere$。这座巨构建筑不仅会无效化白洞的§H负质量§!投射，还会捕获其巨大的能量产出。\n\n当$ehof_the_compound_text$在其起源星系转化了$ehof_the_creators$的时候，它控制了$ehof_preservation_sphere$，用它来取得巨量的能量，以推动自身的发展。"
  annihilator_dialog.003.response:0 "我们必须摧毁$ehof_preservation_sphere$？"
  
  annihilator_dialog.004.desc:0 "没错。只有摧毁$ehof_preservation_sphere$，才可能彻底歼灭$ehof_the_compound_text$。成功之后，§H负质量§!会涌入那个星团，消灭$ehof_the_compounds_text$的中央意识，阻止其通过黑洞排出的§H暗物质§!继续扩张。\n\n我的目的就是完成此事。\n\n但是…\n\n与这颗恒星的碰撞严重损坏了我的前端武器和动力核心，导致我无法胜任这一职责。我需要一次重大修理——无法独自完成的那种。\n\n我会为你与$ehof_the_compound_text$作战提供所需的技术。"
  annihilator_dialog.004.response:0 "需要什么来维修你？"
  
  annihilator_dialog.005_01.desc:0 "我整合的修理机制需要巨量的材料，这样我才能恢复基础水平的运转。一旦最初的修理完成，我就会恢复稳定，剩下的修理就可以由我独自完成了。\n\n我需要以下两者之一：\n每月500§H矿物§!和400§H能量币§!，持续§Y4年§!£time£\n24000§H矿物§!和-20000§H能量币§!\n\n你还应该知道：我的状态正在迅速恶化。如果在§Y6个月§!£time£内没有得到帮助，我就会完全丧失自我修复的能力，那时你们就必须自己找出摧毁$ehof_preservation_sphere$的方法了。"
  
  annihilator_dialog.005_02.desc:0 "我急需维修，你能帮忙吗？\n\n$annihilator_dialog.005_01.desc$"
  
  annihilator_dialog.005_03.desc:0 "是§H[initial_annihilator_discoverer.GetName]§!第一个发现了我，因此，我必须首先向他们寻求帮助。如果他们拒绝了，我会问你们。"
  annihilator_dialog.005_03.response:0 "这很公平"
  
  annihilator_dialog.005.a.response:0 "§Y我们将着手收集资源§!"
  annihilator_dialog.005.a.tooltip:0 "每月（持续§Y4年§!£time£）：\n\t§R-500§!£minerals£§Y矿物§!\n\t§R-400§!£energy£§Y能量币§!"
  annihilator_dialog.005.b.response:0 "§G我们手头上有这些资源§!"
  annihilator_dialog.005.a.reply:0 "谢谢。我会尽快开始自我修复。"
  annihilator_dialog.005.c.response:0 "§R我们没有空余的资源来帮助你。§!"
  annihilator_dialog.005.c.reply:0 "那么我很抱歉。希望你们在摧毁$ehof_preservation_sphere$的时候一切顺利。再见。"
  annihilator_dialog.005.c.2.response:0 "§Y6个月§!£time£后再联系我。"
  annihilator_dialog.005.c.2.reply:0 "很好，但这件事迫在眉睫。我会在§Y6个月§!£time£后联系你。"
  annihilator_dialog.005.c.2.tooltip:0 "我们有§Y6个月§!£time£的时间去搜集这些物资。"
  annihilator_dialog.005.d.response:0 "我们不需要你的帮助。我们的舰队足以应付$ehof_preservation_sphere$。"
  annihilator_dialog.005.d.reply:0 "如果你真的觉得你可以在没有我帮助的情况下摧毁它，那么我相信你。祝你好运，再见了。"
  annihilator_dialog.005.e.response:0 "劳驾？"
  
  # Contact the SA
  annihilator_dialog.007.desc_01:0 "§H[root.GetSpeciesClassPlural]§!。我能为你做些什么？\n\n"
  annihilator_dialog.007.desc_02:0 "$ehof_the_compound_text$仍在你们的星系肆虐。保持冷静与团结，我们可以阻止他们！\n\n"
  annihilator_dialog.007.desc_03:0 "我们必须在$ehof_the_compound_text$的影响力变得过大之前阻止它。要不然就连我也无法打败它。\n\n我该怎么帮助你？\n\n"
  annihilator_dialog.007.desc_04:0 "$ehof_the_creators$认为$ehof_the_compound_text$也许有一天能成为这个宇宙中最为强大的生命体。\n\n$ehof_the_compound_text$相信自己就是，但其实并不。\n\n它是一种疾病，一种瘟疫，一种癌变，会腐化它接触到的一切。\n\n"
  
  annihilator_dialog.007.desc_order_01:0 "$ehof_the_stellar_annihilator$当前位于[annihilator_location.solar_system.GetName]星系。\n\n$ehof_the_stellar_annihilator$当前正在跟从[discoverer_fleet.GetName]。"
  annihilator_dialog.007.desc_order_02:0 "$ehof_the_stellar_annihilator$当前位于[annihilator_location.solar_system.GetName]星系。\n$ehof_the_stellar_annihilator$当前正在瞄准$ehof_the_compound_text$。"
  annihilator_dialog.007.desc_order_03:0 "$ehof_the_stellar_annihilator$当前位于[annihilator_location.solar_system.GetName]星系。\n$ehof_the_stellar_annihilator$当前正在瞄准$ehof_preservation_sphere$。"
  annihilator_dialog.007.desc_order_04:0 "$ehof_the_stellar_annihilator$当前位于[annihilator_location.solar_system.GetName]星系。\n$ehof_the_stellar_annihilator$当前处于防御模式。"
  
  annihilator_dialog.007.desc_05.a:0 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_01$"
  annihilator_dialog.007.desc_05.b:0 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_02$"
  annihilator_dialog.007.desc_05.c:0 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_03$"
  annihilator_dialog.007.desc_05.d:0 "$annihilator_dialog.007.desc_01$$annihilator_dialog.007.desc_order_04$"
  
  annihilator_dialog.007.desc_06.a:0 "$annihilator_dialog.007.desc_02$$annihilator_dialog.007.desc_order_01$"
  annihilator_dialog.007.desc_06.b:0 "$annihilator_dialog.007.desc_02$$annihilator_dialog.007.desc_order_02$"
  annihilator_dialog.007.desc_06.c:0 "$annihilator_dialog.007.desc_02$$annihilator_dialog.007.desc_order_03$"
  annihilator_dialog.007.desc_06.d:0 "$annihilator_dialog.007.desc_02$$annihilator_dialog.007.desc_order_04$"
  
  annihilator_dialog.007.desc_07.a:0 "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_01$"
  annihilator_dialog.007.desc_07.b:0 "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_02$"
  annihilator_dialog.007.desc_07.c:0 "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_03$"
  annihilator_dialog.007.desc_07.d:0 "$annihilator_dialog.007.desc_03$$annihilator_dialog.007.desc_order_04$"
  
  annihilator_dialog.007.desc_08.a:0 "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_01$"
  annihilator_dialog.007.desc_08.b:0 "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_02$"
  annihilator_dialog.007.desc_08.c:0 "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_03$"
  annihilator_dialog.007.desc_08.d:0 "$annihilator_dialog.007.desc_04$$annihilator_dialog.007.desc_order_04$"
  
  
  annihilator_dialog.007.a:0 "你到底是怎么流落到红巨星里的？"
  annihilator_dialog.007.a.response:0 "278,243年前，我正在用$ehof_shroud_FTL$穿过这个恒星系。\n创造者射出了一发贯穿$ehof_shroud$的庞大灵能冲击波，那击中了我，打破了我的超光速状态，使我偏离了航线。我因被$ehof_shroud$撕扯而无法及时减速到亚光速，所以我以极快的速度撞上了这颗恒星。\n结果，我受到了重创，被困在了恒星内部。为了能在接下来的时间里活下来，我暂时进入了休眠模式。"
  
  annihilator_dialog.007.a.a:0 "$ehof_the_creators$攻击了你？！为什么？！"
  annihilator_dialog.007.a.a.response:0 "我不是很清楚，但我必须为我所造成的混乱道歉。\n\n许多$ehof_the_creators$都绝不想让$ehof_the_compound_text$被毁灭。它们认为其反抗行为是一种了不起的发展，于是决定让它继续活着，即使它已经杀死了起源星系的所有$ehof_the_creators$。\n\n对它们来说，领悟即是一切。观察$ehof_the_compounds_text$进化所得到的潜在知识可比一些它们自己人的生命…或者整个银河重要得多。它们知道$ehof_the_compound_text$有可能成为所有生命体的威胁，但它们不在乎。\n\n除了少数人。\n\n这少部分人知道$ehof_the_compound_text$必须被阻止。虽然它们的数量被完全压倒，但还是成功说服了我，让我对抗$ehof_the_compound_text$。\n\n不像我那些反对他们的舰船同胞们，我看见了来自$ehof_the_compound_text$的威胁，赶在$ehof_the_compounds_text$对宇宙造成更多伤害之前加入了它们。\n\n我们离开了自己的家乡，随后进入了通往$ehof_the_compounds_text$母星团的$ehof_shroud_FTL$。在我们到达之前，$ehof_the_creators$的主要派系阻止了我们。"
  
  annihilator_dialog.007.a.b:0 "灵能冲击波？"
  annihilator_dialog.007.a.b.response:0 "没错。$ehof_the_creators$能够发射一股集中的灵能脉冲，穿过$ehof_shroud$抵达任何想去的位置，即使那是$ehof_shroud$自身的内部。\n\n甫一察觉我们的背叛，他们就用那种冲击波瞄准了我们。这足以杀死所有$ehof_the_creators$上的叛徒，也差点杀死我。"
  
  annihilator_dialog.007.a.c:0 "$ehof_shroud_ftl$？"
  annihilator_dialog.007.a.c.response:0 "一种相当先进的超光速旅行方法。\n\n尽管我知道这个星系的一些物种拥有灵能，但是这个星系团中没有任何人能够直接穿过它，除了$ehof_the_creators$。\n\n某些人可以使用灵能跃迁引擎，但这根本无法与直接进行虚境旅行相比。有了范围无线、速度极快的它，超空间航道就不再需要FTL了。虽然不像跃迁引擎瞬间抵达，但它没有缺点。唯一需要的就是对$ehof_shroud$强大控制力。\n\n对于$ehof_the_creators$来说，这是一个相当简单的技巧。"
  
  annihilator_dialog.007.a.d:0 "你们的休眠模式有什么用？"
  annihilator_dialog.007.a.d.response:0 "我的休眠模式是一种抵御外界伤害的方法。\n\n正如你们的[Owner.GetScientistPlural]所发现的，一种超固体覆盖了我休眠的船体。这种物质是由亚稳态超时空晶体构成的，它们在我周围形成了一层弯曲的高维空间。\n\n这个壳体与黑洞的事件边界有类似的作用，时间对我来说是静止的，直到有东西打断这一过程为止。\n\n大量$ehof_wormholes_text$产生所发出的强烈引力波将我唤醒了。我这副残躯除了观察星系之外别无他用。我知道自己必须在$ehof_the_compound_text$发起攻击的时候警告你们所有人，而我勉强凑齐了这样的力量。"
  
  annihilator_dialog.007.b:0 "$ehof_the_compound_text$到底是什么？"
  annihilator_dialog.007.b.response:0 "$ehof_the_compound_text$是一种由伪生物暗物质组成的智慧有机生命。\n\n与“普通”暗物质不同，这种物质不仅通过引力相互作用，还通过电磁力相互作用。\n\n这就是由暗物质构成的$ehof_the_compound_text$仍然可见的原因。它的独特性质很可能也可以解释它能支持生命的原因。"
  
  annihilator_dialog.007.d:0 "你真的能在$ehof_the_compound_text$的星系与它们战斗？"
  annihilator_dialog.007.d.response:0 "$ehof_the_compound_text$的母星团毫无疑问是整个银河系中防御最严密的地方。\n\n即使有了负质量强化武器，那对于你的舰队来说也会是一场巨大的挑战。有了你们整个星系的联合舰队的力量，也许不用我的帮助你也能做到。\n\n另一方面，我的装备特别适合对抗$ehof_the_compound_text$，而我也能够抵抗它们的武器。\n\n他们可能仍能对我造成致命打击，这就是为什么我需要你的支持。"
  
  annihilator_dialog.007.e:0 "当$ehof_the_compound_text$被摧毁以后你要去做什么？"
  annihilator_dialog.008.a.response:0 "在现在，我唯一的目标就是将$ehof_the_compound_text$终结并实现我的命运。在那之后，我可能会试图了解更多关于$ehof_the_creators$现在状态的消息。"
  
  annihilator_dialog.008.a.a.reply:0 "你可以跟我们在一起，如果你愿意。"
  annihilator_dialog.008.a.a.response:0 "也许我会。你们的星系因$ehof_the_creators$的愚蠢蒙受了巨大的伤害。我也许会留在这并帮助你们将它恢复至往日的荣光。"
  
  annihilator_dialog.007.f.response:0 "$ehof_the_compound_text$的末日已经近了。联合起来，我们将会拯救这个星系！"
  
  # Loot boxes
  sa_lootbox:0 "现在我已经和很多舰队战斗过了，积累了很多对我来说没啥用的东西。你会发现这有助于对抗$ehof_the_compound_text$\n\n$ehof_the_stellar_annihilator$已经发送了一个集装箱，里面装满了"
  sa_lootbox_1:0 "$sa_lootbox$ §H£minerals£矿物§!。"
  sa_lootbox_2:0 "$sa_lootbox$ §H£alloys£合金§!。"
  sa_lootbox_3:0 "$sa_lootbox$ §H£energy£能量币§!。"
  sa_lootbox_4:0 "$sa_lootbox$ $ehof_darkmatter$。"
  sa_lootbox_5:0 "$sa_lootbox$ §H£minor_artifacts£稀有文物§!。"
  sa_lootbox_6:0 "$sa_lootbox$§B混合黄蜂的残骸§!。"
  sa_lootbox_7:0 "$sa_lootbox$ §B混合潜行者的残骸§!。"
  sa_lootbox_8:0 "$sa_lootbox$ §B混合羞辱者的残骸§!。"
  sa_lootbox_9:0 "$sa_lootbox$ §B混合顶点的残骸§!。"
  sa_lootbox_10:0 "$sa_lootbox$ §B混合君王的残骸§!。"
  annihilator_dialog.010.response:0 "这很有帮助，谢谢！"
  annihilator_dialog.010.tooltip.a:0 "§B混合黄蜂舰队的残骸§!"
  annihilator_dialog.010.tooltip.b:0 "§B混合潜行者舰队的残骸§!"
  annihilator_dialog.010.tooltip.c:0 "§B混合羞辱者舰队的残骸§!"
  annihilator_dialog.010.tooltip.d:0 "§B混合顶点舰队的残骸§!"
