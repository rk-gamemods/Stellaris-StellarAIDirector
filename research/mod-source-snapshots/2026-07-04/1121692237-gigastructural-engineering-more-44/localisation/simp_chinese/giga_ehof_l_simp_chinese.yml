  pc_ehof_cplanet:0 "$ehof_the_sphere$"
  pc_ehof_cplanet_desc:0 "这个巨大的球体由高能知觉金属构成。"
  
  pc_ehof_planet:0 "暗物质天体"
  pc_ehof_planet_desc:0 "一个完全由暗物质构成的巨大球体。$ehof_the_compound_text$利用它们强化他们的舰队。"
  decision_compound_cleanse_planet:99 "Decohere Dark Matter"
  decision_compound_cleanse_planet_desc:99 "Bathe the planet with beams of negative mass to destruct the Compound's remnant matter and restore the planet to a baryonic state."
  decision_compound_cleanse_planet_tooltip:99 "§YThe planet will be restored to a regular state. If it has the $pc_ehof_terraforming_candidate$ modifier, it will transform into a $pc_nuked$ with unique deposits.§!\n\n§R Orbital deposits of $i_dark_matter$ will be removed.§!"
  pc_ehof_terraforming_candidate:99 "Latent Cohesiveness"
  pc_ehof_terraforming_candidate_desc:99 "This planet has a number of vestigial features corresponding with those of habitable worlds, which could perhaps be coaxed back into full form."
  pc_ehof_terraforming_candidate_tooltip:99 "Using the §Y$decision_compound_cleanse_planet$§! decision on this planet will transform it into a $pc_nuked$ with unique deposits."
  decision_compound_cleanse_planet_available_tooltip:99 "We can now use the §Y$decision_compound_cleanse_planet$§! decision on $pc_ehof_planet$s, returning them to a normal state. Worlds that were previously habitable will become habitable again with unique deposits."
  d_compound_blocker_1:99 "Transmutative Instinct"
  d_compound_blocker_1_desc:99 "The wildlife of the region seemingly possesses a drive to "transmute" foreign lifeforms into dark matter. It is physically incapable of doing so, but nonetheless stretches our security forces thin."
  d_compound_blocker_2:99 "Gravitic Wastelands"
  d_compound_blocker_2_desc:99 "Local landforms interact erratically with certain fundamental forces, resulting in formations that are highly disruptive to development efforts."
  d_compound_blocker_3:99 "Material Incohesion"
  d_compound_blocker_3_desc:99 "Matter in this region has not properly settled down following decoherence, and undergoes improper and sometimes dangerous state transformations."
  d_compound_blocker_4:99 "Exotic Radiocontamination"
  d_compound_blocker_4_desc:99 "Surplus energies from miscalibrated decoherence of this planet cause damage to non-living and living materials."
  d_compound_blocker_5:99 "Spontaneous Transmutation"
  d_compound_blocker_5_desc:99 "An epidemic of near-invisible, quasi-viral dark matter structures poses an everpresent risk of transmutative outbreaks."
  d_compound_boon_1:99 "Decoherence Geysers"
  d_compound_boon_1_desc:99 "Remnant veins of dark matter decohere energetically as they come into contact with similarly-lingering negative mass."
  d_compound_boon_2:99 "Transbaryonic Geology"
  d_compound_boon_2_desc:99 "Unique and valuable composites have formed as a byproduct of the incomplete decoherence and reformation of non-baryonic matter."
  d_compound_boon_3:99 "Tenebro-Accumulators"
  d_compound_boon_3_desc:99 "Incredible adaptations allow species of local flora to safely absorb and concentrate certain forms of dark matter."
  d_compound_boon_4:99 "Residuum Reserve"
  d_compound_boon_4_desc:99 "Compound-type dark matter phenomena, preserved in a controlled environment, provides a sustainable supply of experiments."
  d_compound_boon_5:99 "Non-Baryonic Fauna"
  d_compound_boon_5_desc:99 "A community of astoundingly unconventional life resides in this area. These ill-formed organisms are a goldmine for the field of comparative evolution."
  d_compound_boon_6:99 "Geogravitic Anomalies"
  d_compound_boon_6_desc:99 "Constant adaptation to semi-predictable mass fluctuations forces innovation in structural engineering."
  d_compound_boon_7:99 "Endemic Microwormholes"
  d_compound_boon_7_desc:99 "Spacetime fluctuates here, not unlike the quantum foam on a macroscopic scale. This can catalyse certain exotic energy conversion processes."
  d_compound_boon_8:99 "Sentient Metal Crucible"
  d_compound_boon_8_desc:99 "The glacial ripples of a sentient metal lake idly absorb and resorb the surrounding terrain."
  # d_compound_boon_9: "Infused Atmosphere"
  # d_compound_boon_9_desc: "An overabundance of dark matter-related substances permeate this planet, and unadapted lifeforms need regular detoxification to prevent bodily issues."
  d_compound_boon_10:99 "Proto-Sapient Ecosystem"
  d_compound_boon_10_desc:99 "A half-born graft of the Compound gestalt suffuses the microbiome here. With ongoing training, it could be moulded into an unobstrusive benevolent will."
  
