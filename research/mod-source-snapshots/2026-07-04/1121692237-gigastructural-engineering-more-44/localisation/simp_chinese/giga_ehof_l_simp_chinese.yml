  #################################
  ####### DEVASTATED SYSTEM #######
  #################################
  ehof_anomaly.14.name:0 "破碎星系"
  ehof_anomaly.14.desc:0 "当我们的舰船进入§H[root.solar_system.GetName]§!星系的时候，他们收到了一个亚空间信号，它似乎是由这个星系的恒星发出的。这道信号的暗号与在全星系播报了关于$ehof_the_compound_text$的那道信号相似。\n\n然而，这道信号并不是我们在星系中找到的唯一东西。星系中的所有行星不是四分五裂就是已成焦炭，最靠近中心的行星只剩下了一些被吹散的石块和一条在其尾部的小行星带。\n\n这次毁灭的起因仍然未知，但我们的[Owner.GetScientistPlural]怀疑是这个星系的恒星所致。它有一个反常的能量分布，其表面和内层中还有着不寻常的变化。这般毁灭只会由一场极其巨大的能量爆发导致，比如一次超新星，但它绝不是这颗恒星，因为它仍然呆在那里。\n\n§H[root.solar_system.GetName]§!中发生了某种可怕的事情，看起来它和它的恒星一起成为了那条信息的源头，对这些谜团的调查至关重要。"
  ehof_anomaly.14.a:0 "我们必须解开这个谜团。"
  
  INVESTIGATE_WOUNDED_STAR:0 "破碎星系"
  INVESTIGATE_WOUNDED_STAR_DESC:0 "我们的科研船正在调查§H[root.solar_system.GetName]§!。\n\n它的秘密可能帮助我们找到针对$ehof_the_compound_text$的解决方案。即使没有，我们至少可以找到消息的来源。"
  
  ehof_anomaly.10021.name:0 "受伤的恒星"
  ehof_anomaly.10021.desc:0 "我们对§H[root.solar_system.GetName]§!的调查揭示了这颗恒星在其表面的巨大异常：一个近似圆形的凹陷嵌入了恒星的光球层，有着大约330万千米的表面直径。虽然这只是红巨星的1/32,但仍然十分巨大。\n\n凹陷在理论上被认为是某种巨大能量撞击留下的坑。撞击的来源尚不清楚，但我们的[Owner.GetScientistPlural]已经有了两个分庭抗礼的假说：它要么是无比沉重，要么是速度极高。\n\n撞击本身释放出大量的恒星等离子体到整个恒星系，从而像个微型超新星一样加热，熔化并破坏了恒星系中的每个行星。\n\n尽管恒星的内部有强大的作用力，但撞击物可能仍然可以识别，而且还可能让我们不白白收到那个信息。\n\n为了找到撞击物的痕迹，有必要对恒星的外层和内层进行调查。"
  ehof_anomaly.10021.a:0 "把这颗恒星从头到尾翻一遍！"
  
  INVESTIGATE_STELLAR_WOUND:0 "受伤的恒星"
  INVESTIGATE_STELLAR_WOUND_DESC:0 "我们的[Owner.GetScientistPlural]正在准备多艘配备高强度扫描仪和我们能造出的最强的热量护盾的舰船，以扫描整颗恒星，获取撞击物的更多信息。\n\n由于恒星表面和内部如液体般不断变化的性质，撞击物也许已经漂到了离原始撞击点很远的位置。\n\n为了定位撞击物，需要对§H[root.solar_system.GetName]§!星系进行完整扫描。"
  
  ehof_anomaly.10022.name:0 "沉没的利维坦"
  ehof_anomaly.10022.desc:0 "我们终于完成了对§H[root.solar_system.GetName]§!外层的调查，结果相当令人震惊。\n\n并不是一颗大行星或是与之相当的导弹和恒星相撞——撞击物是巨大的人工造物，在数千年前与恒星相撞。据我们所知，它仍然是完整的，它可能是消息本身的来源！\n\n这个造物的规模对于一艘船而言是难以想象的，其最大长度可达近2300公里，质量约为980,2万亿公吨——这与一颗行星相当。据一个撞击模型所示，在撞到§H[root.solar_system.GetName]§!时，该舰船正以每秒5000千米或更高的极速航行。\n\n有了这样难以置信的发现，我们的[Owner.GetScientistPlural]正在要求让他们亲自去探索这艘船。这会是个艰巨的工作，因为这艘船位于恒星光球层下800万千米，深深地埋在其对流层中。鉴于该船在经历冲击后仍然完好无损，并在随后暴露于恒星核心的作用力下，我们推测它就是信息的源头，并且也许仍然在那个信标之外运作。"
  ehof_anomaly.10022.a:0 "我们必须到达那里。不惜一切代价！"
  
  INVESTIGATE_DORMANT_LEVIATHAN:0 "沉没的利维坦"
  INVESTIGATE_DORMANT_LEVIATHAN_DESC:0 "想要对沉没于§H[root.solar_system.GetName]§!深处的巨型太空船进行调查，就必须要花费海量的资源并运用我们帝国所拥有的最先进的技术。\n\n为了设计和组装项目所必需的设备，来自帝国各处的[Owner.GetResearchers]和[Owner.GetEngineerPlural]纷纷赶往了该星系。"
  
  ehof_anomaly.10023.name:0 "接触利维坦"
  ehof_anomaly.10023.desc:0 "我们成功了！我们抵达了§H[root.solar_system.GetName]§!内部的休眠构造那里，证明了它是艘太空船。\n\n我们的[Owner.GetScientistPlural]和[Owner.GetEngineerPlural]——拥有近乎无限的资源——能够建造出他们称之为“恒星反升降机”的结构。这个结构是个巨大的通道/缆索结合体，从恒星安全的光球层之外，穿越其对流层，一直深入到构造之所在。这一结构的两端都有位于中央通道附近的重力井生成器：远端的那个是为了在太空中锚定，而恒星内部的那个则是为了保护该构造，阻止恒星对流层的流动将其移走。\n\n一通过反升降机派出探险船，我们就发现了那艘船似乎完好无损，而且使用着连失落帝国也望尘莫及的科技。\n\n我们的传感器无一能勘测船体内部，甚至连判断船体的材料也做不到。据我们[Owner.GetScientistPlural]现下的推测，其表面的材料是某种超固体——在一个状态下同时拥有固液性质的物质。如果这艘舰船的外部事实上是由一种不断变化的准超固体制成的话，就能解释它在那场撞击下幸存，并且在恒星内部度过千年仍完好无损的原因了。\n\n我们的[Owner.GetScientistPlural]正在努力寻找进入这艘船的办法，不过，他们还在等着这么做的许可。"
  ehof_anomaly.10023.a:0 "收到。试着进入太空船！"
  
  ENTERING_LEVIATHAN:0 "进入利维坦"
  ENTERING_LEVIATHAN_DESC:0 "我们的[Owner.GetScientistPlural]正在尝试寻找进入这艘休眠的太空船的方法。\n\n谁知道这神秘的巨物内部有着怎样的科技奇观在等待着我们。\n\n我们希望能确认它就是信息的来源。我们甚至可能在里面找到对抗$ehof_the_compound_text$的方法！"
  
  ehof_anomaly.10024.name:0 "觉醒"
  ehof_anomaly.10024.desc:0 "我们没有预料到会发生这样的事情！在我们试着切断船身的时候，一个巨大的孔洞立刻在我们的后备队伍附近打开了，其中有着通往内部的通道。\n\n该船的内部似乎完全由纯白的表面构成，这个表面不断波动着，改变着形状。我们的后备队伍向内行进了一会，抵达了一座巨大的大厅，构成它的是与孔洞相同的奇异材料。\n\n最初，这座大厅空空如也，但那很快就发生了变化——不可胜数的实体从液态墙壁中现身，开始向大厅的中央聚集，并在那里形成了一个巨大的八面体。这一图形与我们的后备队伍进行了心灵交流，根据它的介绍，它是该船的中心意识，并且对我们成功进入船内感到高兴。\n\n它坚持要立刻跟我们的领袖联络，因为它宣称整个星系的命运危在旦夕。"
  ehof_anomaly.10024.a:0 "做好一切准备。把那个实体显示在屏幕上！"
  
  REPAIR_ANNIHILATOR:0 "修复利维坦"
  REPAIR_ANNIHILATOR_DESC:0 "我们同意为$ehof_the_stellar_annihilator$提供维修其能量核心所需的材料，这样它就能逃脱这个在许久之前坠落其上的恒星了。"
  
  annihilator_dialog.006.desc:0 "所有维修均已完成。\n\n初始化$ehof_shroud_ftl$。\n\n目的地：§H[root.Capital.GetName]§!。\n\n现在我应该保护你，但是更重要的是我们要摧毁$ehof_preservation_sphere$。\n\n§G（如果你希望改变$ehof_the_stellar_annihilators$的指令，使用下方的UI）§!"
  annihilator_dialog.006.tooltip:0 "$ehof_the_stellar_annihilator$离开了§H[annihilator_spawn_here.GetName]恒星§!，并正在通过$ehof_shroud_ftl$航向§H[root.Capital.GetName]§!"
  
  
  
