  #########################################
  PGATE_GALACTIC:0 "§B古代之柱§!"
  PGATE_GALACTICS:0 "$PGATE_GALACTIC$"
  PGATE_GALACTIC_DESC:0 "这个星系内有一个$PGATE_GALACTIC$。"
  BYPASS_DESC_INACTIVE_PGATE_UNKNOWN:0 "我们对此一无所知。"
  PGATE_UNKNOWN:0 "§B神秘结构§!"
  PGATE_UNKNOWNS:0 "$PGATE_UNKNOWN$§B§!"
  PGATE_UNKNOWN_DESC:0 "这个星系内有一个§B$PGATE_UNKNOWN$§!"
  BYPASS_DESC_INACTIVE_PGATE_DISABLED:0 "$BYPASS_DESC_INACTIVE_PGATE$"
  BYPASS_DESC_INACTIVE_PGATE:0 "我们完全不知道怎么使用它。"
  ehof_pgate_gateway:0 "$PGATE_GALACTIC$"
  ehof_pgate_gateway_DESC:0 "通过子空间通道就可以快速抵达其他的$PGATE_GALACTICS$。"
  ehof_pgate_gateway_MEGASTRUCTURE_DETAILS:0 "$PGATE_GALACTIC_DESC$"
  ehof_pgate_unknown:0 "§B神秘之石§!"
  ehof_pgate_unknown_DESC:0 "我们对此一无所知。"
  ehof_pgate_unknown_MEGASTRUCTURE_DETAILS:0 "$ehof_pgate_unknown_DESC$"
  ehof_reality_code.003.name:0 "§B激活§!$PGATE_GALACTIC$"
  ehof_reality_code.003.desc:0 "§H[pgate_active_system.GetName]§!星系中的$PGATE_GALACTIC$已激活。"
  ehof_reality_code.003.option:0 "很靠。"
  
  
  ##########################################
  ### Traders ##############################
  ##########################################
  ehof_trader:0 "§S乌尔玛岑§!"
  ehof_alt_qnm:0 "§H海姆吉安-提贾斯§!"
  ehof_trader_d:0 "§B造梦者§!"
  ehof_trader_t:0 "§B起点§!"
  ehof_trader_dt:0 "§B梦者起点§!"
  ehof_trader_dominion:0 "疆域"
  ehof_trader_machines:0 "探索者"
  ehof_trader_new_system:0 "[ehof_trader_hub.GetName]"
  ehof_trader_old_system:0 "[ehof_trader_system_01.GetName]"
  ehof_trader_realm:0 "梦者领域。"
  ehof_galactic_market:0 "$galactic_market_station$"
  ehof_trader_gateway:0 "§S$ehof_trader$虫洞§!"
  ehof_trader_gateway_plural:0 "§S$ehof_trader$虫洞§!"
  ehof_trader_gateway_DESC:0 "虫洞之门看起来很不自然。它们以完美的环状排列在恒星周围，连接所有的$ehof_trader$星系。"
  ehof_mega_trader.008.desc:0 "这里是停战区。不允许任何的武装舰船进入。\n\n你们的军舰将立刻被驱逐。"
  r_rare_system:0 "资源丰富的星系"
  r_rare_system_desc:0 "一个据说充满资源的恒星系的坐标（买方自负）。我们可以通过$ehof_ehof$前往。"
  
  ehof_mega_trader.002.name:0 "乌尔玛岑"
  ehof_mega_trader.002.desc:0 "在§H[root.GetName]§!穿过$ehof_ehof$后，我们收到了令人震惊的报告。它抵达的$ehof_trader_new_system$星系充斥着大量的太空站和舰船。该星系似乎经历了大规模的太空改造，几乎所有的星球都铺满了巨大的城市，还拥有无法天然产生的完美星球轨道。\n\n§H[root.GetName]§!收到了通讯，看来这个星系的居民已经通过某种方法翻译了我们的语言，想和我们对话。"
  ehof_mega_trader.002.a:0 "真令人着迷！把他们显示在屏幕上。"
  
  ehof_mega_trader.003.desc:0 "你好，来自外界的§H[root.owner.GetSpeciesClassPlural]§!。欢迎来到我们伟大的乌托邦，$ehof_trader_new_system$。\n\n我们是$ehof_trader$，我们只求和平。抱歉我们没法详细自我介绍，也不能等你们先介绍，因为情况十万火急。\n\n我们急需一种非常稀有的资源，对我们文明的生存至关重要。\n\n你有$ehof_alt_qnm$吗？"
  ehof_mega_trader.003.a:0 "什么是$ehof_alt_qnm$？"
  
  ehof_mega_trader.004.desc:0 "$ehof_alt_qnm$是一种非常独特、难以想象的稀有物质，它有其他物质所没有的特殊性质。\n\n它具有负引力电荷和负质量并且能将时空负扭曲。\n\n这种独特的性质帮助我们稳定了$ehof_trader_dt$。\n\n如果你拥有$ehof_alt_qnm$并且愿意与我们分享一些，我保证你的好心会得到回报的！"
  ehof_mega_trader.004.a:0 "这听起来很像§H负质量§!…"
  
  ehof_mega_trader.005.desc:0 "所以你知道$ehof_alt_qnm$？\n\n如果你愿意给出§H负质量§!，我们就会给你除了$ehof_trader_dt$以外的以外的一笔巨额财富。\n\n我们甚至会给你通向一些奇妙星系的方法，它们都是$ehof_trader_d$赐予了我们礼物之后，在绘图时找到的。\n\n来自起点之外的§H[root.owner.GetSpeciesClassPlural]§!，你们愿意帮助我们吗？"
  ehof_mega_trader.005.a:0 "好，成交！"
  
  ehof_mega_trader.006.desc:0 "你好，来自起点之外的§H[root.owner.GetSpeciesClassPlural]§!。\n\n尽管我们非常欢迎你留下来，但是我们也需要§Y5年§!£time£时间来补充我们的库存，这样我们才能提供更多的商品。\n\n你有要交易的§H负质量§!吗？"
  
  ehof_mega_trader.006.c:0 "$ehof_trader_new_system$星系里有好多虫洞…"
  ehof_mega_trader.006.c.response:0 "虫洞是我们星际旅行的唯一方式，永久的连接，临时的连接，我们都能生成，就像那些看起来拥有相同能力的人一样。我们能够用§H负质量来无限期地稳定虫洞，不过，由于我们用于开启虫洞的§H负质量§!十分有限，我们只会开启从$ehof_trader_new_system$连接到其他恒星系的虫洞。\n\n或者，至少，是到我们偶然遇见你们为止。\n\n我们能创造出通向其他恒星系的虫洞，但这会消耗更多的能量，而且有去无回。这对$ehof_trader_new_system$和我们建造史无前例的宏伟乌托邦的梦想并无益处。那是自我们经历了大战以及我们最早的母恒星系$ehof_trader_old_system$内的事件之后，历经了千年的目标。\n\n然而，有了你们的科技，这些系统会让你们受益，你们可以随心所欲地使用它们。"
  
  ehof_mega_trader.006.d:0 "关于§H负质量§!你知道些什么？"
  ehof_mega_trader.006.d.response:0 "虽然我们很久很久以前就已经发现了§H负质量§!，但直到现在我们还没有完全揭开它的秘密。我们认为它是不可能的，起码自然出现的几率相当之低。\n\n它的性质违反了很多物理定律，比如应力一能量张量的应力分量会大于其所处的空间的质量密度，而这应该是不可能的。\n\n真正的§H负质量§!不像真空负能量那种伪负质量会加速宇宙膨胀。\n\n事实上，你拥有的§H负质量§!比我们从$ehof_trader_dt$里收集到的还要多，这也意味着它要么是在极不可能的情况下出现的，要么是有先进到难以想象的存在制造的。\n\n我们相信正确答案是后者。"
  
  ehof_mega_trader.006.b:0 "我们想更多的了解你们。"
  ehof_mega_trader.007.desc:0 "你想知道些什么？"
  ehof_mega_trader.007.a:0 "你是谁？"
  ehof_mega_trader.007.a.response:0 "我们是$ehof_trader$，是一个由有机科技生命体组成的平等社会，并且被$ehof_trader_d$赋予了灵能能力。\n\n我们的目标是把$ehof_trader_new_system$星系变为一个伟大传奇的乌托邦。\n\n$ehof_trader_d$与我们和谐相处，一同在和平中谨慎地成长、进化，引导我们实现这一终极目标。"
  
  ehof_mega_trader.007.b:0 "你的历史是怎样的？"
  ehof_mega_trader.007.b.response:0 "我们的中央枢纽——$ehof_trader_new_system$星系——所连接到的$ehof_trader_old_system$星系便是我们的起源星系。\n\n你应该已经注意到了，那个星系已经被完全破坏。那些都是我们有机体祖先的舰队、栖所和建筑的残骸。\n\n几千年前，当他们仍被重力束缚时，$ehof_trader_dt$就已经存在于$ehof_trader_old_system$星系之中了。没人知道它们在那待了多久，但其存在贯穿了我们有记录的历史。\n\n第一次发现$ehof_trader_d$的证据时，我们的祖先就把一切的重心都放在了那里。尽管花费了几个世纪才离开家乡，但他们的信念从未动摇过。抵达$ehof_trader_dt$便是他们的终极目标。$ehof_trader_t$看起来像某种行星，实际上它是一扇大门，一扇进入外维领域$ehof_trader_realm$的传送门。\n\n当他们第一次进入$ehof_trader_realm$时，他们与那个$ehof_trader_d$进行了接触。那个存在和善体贴，教导了关于他们发现的自己所处的位置——维度间现实——的知识。\n\n他们开始与$ehof_trader_d$和谐相处，并在它的引导下，达到了更高级的社会和存在状态。\n\n\n有了这样的启蒙，他们很快就发展成了一个辉煌无比的星际帝国。$ehof_trader_old_system$星系的所有星球都被殖民，而$ehof_trader_dt$则是帝国的中心。\n\n不幸的是，这个美好的时代并没有持续很久。$ehof_trader_old_system$的资源被开发殆尽，可供扩张的空间也已荡然无存，这个伟大的星际帝国行将灭亡。\n\n唯一合理的选择就是系外扩张。不幸的是，他们并没有研发超光速航行科技，而将世代飞船送到几乎不能居住的临近恒星系也非良策。\n\n于是帝国决定开发一款能够穿过$ehof_trader_old_system$与其最近的邻居——$ehof_trader_new_system$——之间的空间的机械智能，以将其环境改造成帝国所需。"
  
  ehof_mega_trader.007.continue:0 "继续。"
  
  ehof_mega_trader.007.b.response.b:0 "自那些环境改造机械踏上旅途已经过去了多年，它们早就将$ehof_trader_new_system$改造完毕了。随着时间的流逝，这些机械发展出了自我意识，爱上了$ehof_trader_new_system$恒星系，将自己看作其正当的持有者。\n\n帝国与他们的机械因此而不和，两者的全面战争已经不可避免。\n\n两个帝国终于兵戎相见，他们发现彼此势均力敌。如果战争继续像这样发展，那么双方都会灭绝。为了避免两大物种的损失，$ehof_trader_d$提出了一个解决方案，它不仅能终结战争，还能解决他们之间的问题——将有机的$ehof_trader_old_system$和机械的$ehof_trader_new_system$融合为一种新的存在…\n\n…那就是我们。\n\n我们的人民降生了，随后实现了在$ehof_trader_new_system$创造完美乌托邦的目标，然后，我们离开了伤痕累累的$ehof_trader_old_system$，那是我们前辈的愚蠢的纪念碑。"
  
  ehof_mega_trader.007.c:0 "$ehof_trader_d$和$ehof_trader_t$是什么？"
  ehof_mega_trader.007.c.response:0 "$ehof_trader_d$是居住在$ehof_trader_realm$中的非物质实体。没人知道$ehof_trader_dt$是什么时候建成的，但它一定比我们的有机先驱还早。\n\n§H负质量§!维持着$ehof_trader_dt$的开启，也让我们能够维持通往其他恒星系的虫洞。不幸的是，$ehof_trader_dt$中的§H负质量§!是有限的。总有一天，当我们停止扩张或$ehof_trader_t$崩毁并使我们与$ehof_trader_d$的连接断开的时候，我们就会失去灵能能力，也会失去$ehof_trader_d$的指引。这些事件都会让我们的文明崩溃，这就是我们需要你们的§H负质量§!的原因——我们要避免这样的命运。"
  
  ehof_mega_trader.006.a:0 "§H贸易§!"
  ehof_mega_trader.101.desc:0 "我们可以用一些梦之遗珍换取§H负质量§!。不过要记住，它们是我们从$ehof_trader_dt$中捞出的幻影的反射，所以只能§R用一次§!，而且我们每§Y5年§!£time£才会补充库存。\n\n你想从这些反射之现实中换取哪一个呢？"
