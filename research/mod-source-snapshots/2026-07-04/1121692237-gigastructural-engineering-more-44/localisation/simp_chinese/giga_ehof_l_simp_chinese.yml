  # SA Died
  annihilator_dialog.013.name:0 "$ehof_the_stellar_annihilator$陨落了"
  annihilator_dialog.013.desc:0 "我们未能在$ehof_the_compounds_text$专注于摧毁$ehof_preservation_sphere$的时候保护$ehof_the_stellar_annihilator$免受其舰队的损害！"
  annihilator_dialog.013.response:0 "这是个灾难！"
  
  annihilator_returning:0 "$ehof_the_stellar_annihilator$：$ehof_shroud_ftl$忙碌中"
  annihilator_returned:0 "$ehof_the_stellar_annihilator$：$ehof_shroud_ftl$冷却中"
  
  # SA becomes unresponsive whilst firing at sphere
  annihilator_dialog.011.desc:0 "……"
  annihilator_dialog.011.response:0 "？？？"
  
  # Destroyed Sphere
  annihilator_dialog.012.name:0 "牺牲"
  annihilator_dialog.012.desc:0 "我们的传感器因$ehof_the_compounds_text$起源恒星系的能量飙升而失灵了。\n\n$ehof_preservation_sphere$已经被摧毁了，那个白洞放出了曾经在其内部的巨大能量。\n\n在几个小时之内，整个恒星系都被$giga_sr_negative_mass$填满了，在重力井中的所有暗物质形式都被打散了。\n\n$ehof_the_compound_text$不复存在了！\n\n不幸的是，我们为这场胜利付出了代价。为了摧毁$ehof_preservation_sphere$，“$ehof_the_stellar_annihilator$”，——我们在这场冲突中最伟大的盟友——牺牲了自己，继而消灭了$ehof_the_compound_text$，最终完成了它的使命。"
  annihilator_dialog.012.response:0 "我们永远会为它的牺牲献上尊重！"
  
  compound_dialog.20.name:0 "胜利！"
  compound_dialog.20.desc:0 "我们的传感器因$ehof_the_compounds_text$起源恒星系的能量飙升而失灵了。\n\n$ehof_preservation_sphere$已经被摧毁了，那个白洞放出了曾经在其内部的巨大能量。\n\n在几个小时之内，整个恒星系都被$giga_sr_negative_mass$填满了，在重力井中的所有暗物质形式都被打散了。\n\n$ehof_the_compound_text$不复存在了！\n\n$ehof_preservation_sphere$被毁灭后不久，$ehof_the_stellar_annihilator$掉进了$ehof_shroud_ftl$，我们不知道它的轨迹，也——自那以后——无法与它取得联系。"
  compound_dialog.20.a:99 "A good day for the galaxy."
  
  # Dialog after Preservation Sphere destruction and the spawning of the $PGATE_GALACTIC$ 2(if player has fully completed the Reality Code chain)
  annihilator_dialog.017.name:0 "球体的秘密"
  annihilator_dialog.017.desc:0 "一座$PGATE_GALACTIC$坐落在$ehof_preservation_sphere$的遗迹之中。\n\n它在此处的存在揭露了某些惊人——也许也并不是很惊人——的事。$ehof_the_compound$、$ehof_the_stellar_annihilator$与$ehof_preservation_sphere$的创造者$ehof_the_creators$，同时也是$PGATE_GALACTICS$与$ehof_the_sphere_named$的建造者。\n\n尽管有这种共同的起源，但两者似乎是独立实验——我们没有在$ehof_cohesive$恒星系中观察到任何暗物质，也没有在$ehof_the_compound$先前占据的恒星系中探测到$ehof_ep$。"
  
  # Dialog after Preservation Sphere destruction and the spawning of the $PGATE_GALACTIC$ 2(if player has completed at least 3 Reality Code chain excavations, but not the final one)
  annihilator_dialog.018.name:0 "球体的秘密"
  annihilator_dialog.018.desc:0 "一座$PGATE_GALACTIC$坐落在$ehof_preservation_sphere$的遗迹之中。\n\n我们没有料到它会在这出现，这让我们很困惑。虽然它很可能是在$ehof_preservation_sphere$毁灭的时候被发射出去的，但我们并不确定其在巨构建筑中开建的原因。这可能意味着$PGATE_GALACTICS$的建造者和$ehof_ep$的制造者也是$ehof_the_compound_text$、$ehof_the_stellar_annihilator$与$ehof_preservation_sphere$的创造者$ehof_the_creators$。如果这是真的，这绝对是银河历史上最宏大的发现之一，它很明显地告诉了我们：在我们过去银河的各处，$ehof_the_creators$有多么活跃。\n\n这一发现也带来了一个关于$ehof_preservation_sphere$和$PGATE_GALACTICS$关系的问题。幸运的是，我们的[Owner.GetScientistPlural]相信$ehof_preservation_sphere$不是$ehof_ep$的起源，因为放大器和$PGATE_GALACTICS$对$ehof_preservation_sphere$的毁灭没有反应。\n\n为了证实这一假设，我们需要进一步探索$ehof_cohesive$恒星系，找出$ehof_ep$的真正起源。"
  
  # Dialog after Preservation Sphere destruction and the spawning of the $PGATE_GALACTIC$ 1(if player hasn't completed at least 3 Reality Code chain excavations)
  annihilator_dialog.019.name:0 "一个星门？"
  annihilator_dialog.019.desc:0 "一个未知的结构位于$ehof_preservation_sphere$的遗迹之中。它与我们在整个星系和$ehof_cohesive$恒星系中看到的零散的那几个$PGATE_UNKNOWNS$完全相同，但这并没有推动我们对它的了解。\n\n现在，它还无法使用，很可能是没有和任何事物真正地建立连接。鉴于$ehof_the_compound_text$和$ehof_preservation_sphere$已经灭亡，我们也许永远也无法知道它的用途了。"
  
  
  #############################################################################################################################################
  ### Technologies ############################################################################################################################
  #############################################################################################################################################
  
  
  # EHOF tech gateways
  gateway_ehof:0 "§H抽象物理之道§!\n§E这项科技将通向对物理学的深入研究和$ehof_wormhole_text$产生的发展。§!"
  
  # Abstract Physics Theory
  tech_abstract_1:0 "抽象物理理论"
  tech_abstract_1_desc:0 "一些“违背物理法则”的现象可能不能用量子力学或弦理论来单独解释。一门叫做“抽象物理学”的新物理学分支——使用极其新奇抽象的方法来解决问题的学科——有可能为哪怕是宇宙中最为荒谬的物理现象带来解答。"
  
  # Applied Abstract Physics
  tech_abstract_2:0 "应用抽象物理学"
  tech_abstract_2_desc:0 "即使在解释宇宙中最奇怪的物理现象时，开创性的抽象物理学方法也在毫无疑问地帮助着我们。使用这些方法取得的新颖的突破可能会给予我们独一无二的强力科技。"
  
  # Quoudroplean Formalism
  tech_abstract_3:0 "奎德罗普兰模型"
  tech_abstract_3_desc:0 "由于抽象物理学与物理学的其他分支之间存在巨大差异，它需要有专门定制的数学形式。这种“奎德罗普兰模型”利用了真正的外星数学框架和定理，它们不符合经典数学体系，且被认为完全不适用于现实。"
  
  # Non-paradoxical Information Supercausality
  tech_abstract_4:0 "非悖论信息超因果关系"
  tech_abstract_4_desc:0 "在非抽象物理学中，信息、物质和能量的传输被严格限制在因果关系的速度上，而这一速度是有限的，与宇宙的大小相比微不足道。超因果速传输只能在不进行信息传输或时空扭曲的情况下实现。然而，在抽象物理学中，固定的规则与不定的可能性之间的界限是流动且变化的。尽管看起来很荒唐，但有方法可以绕过这些规则，改变它们，甚至干脆无视它们。"
  
  # Photonic Matter Utilization
  tech_photonic_m:0 "光子物质利用"
  tech_photonic_m_desc:0 "精确操纵电磁波干扰模式的能力让我们能构建稳定的驻波，能以类似普通物质的方式与物理世界互动。这种“光子”物质在微观尺度的操作任务中展现出巨大的前景，将在护盾调谐领域中发挥无限的价值。"
  
  # Negative Pressure Application
  tech_negative_pressure:0 "负压应用"
  tech_negative_pressure_desc:0 "负压是一种曾在量子水平以卡西米尔效应的形式被观测到的现象。它以真空能的形式表现出来，但不幸的是它不可控。应用抽象物理学带来了更有用、更适用的产生和控制负压的方法的发现。"
  
  # Negative Energy Studies
  tech_negative_e_s:0 "负能量研究"
  tech_negative_e_s_desc:0 "很长一段时间以来，负能量都一直是一个纯粹假设性的、有争议的、极其抽象的话题…至少在发现令人心动的负质量之前是这样。抽象物理学将使我们能够进一步研究这种看似不可能却真实的无法否定的现象。"
  
  # Hardlight Construct Utilization
  tech_hardlight_c_u:0 "硬光结构体利用"
  tech_hardlight_c_u_desc:0 "对电磁场的支配使我们可以创造纯硬光结构体的能力，这是光子物质的一种先进而强大的扩展。这些结构体将能够直接操纵基本粒子，使我们能进一步控制物质和能量。"
  
  # Sterile Hyper-Neutrino Detection
  tech_ssn_det:0 "惰性超中微子探测"
  tech_ssn_det_desc:0 "惰性超中子是一种源自超空间的具有独特形式的外来暗物质，是一种在$ehof_wormholes_text$开启时辐射而出的物质。它们拥有与$ehof_wormholes_text$目的地有关的独特频率。通过分析这些频率，我们可以更精确地预见$ehof_wormhole_text$的目标，提高我们$ehof_ehof$的效率。"
  
  # Prototype Negative Mass Utilities
  tech_nm_utilization_1:0 "原型负质量应用"
  tech_nm_utilization_1_desc:0 "对负质量进行运用的初代设备、流程和模型。它们仍然是实验性质的原型，没有发挥负质量的全部潜力，但效果仍然强大。"
  
  # Advanced Negative Mass Utilities
  tech_nm_utilization_2:0 "先进负质量应用"
  tech_nm_utilization_2_desc:0 "负质量的潜力是巨大的。对这一奇特资源的深入了解将使更加先进和强大的负质量设备的开发和创造成为可能。"
  
  # Sentient Metal Utilities
  tech_nm_utilization:0 "负质量应用"
  tech_nm_utilization_desc:0 "从太空工程和行星建设的巨大改进，到用于星际旅行的超光速推进器，再到对恒星体的极限操控，对独特且奇异的负质量的运用产生了无数的科研机遇。负质量是一种令人难以置信的强大资源。"
  
  # Micro-wormhole Destination Precognition
  tech_prob_c:0 "$ehof_wormhole$目的地预知"
  tech_prob_c_desc:0 "灵敏到难以想象的快子探测器，以知觉金属蜂巢智能的惊人能力为基础，其能在$ehof_wormhole_text$出现在现实空间之前就确认它的目标。这种对虫洞目标的预测把$ehof_ehof$旅行的精确度提高到了不可思议的程度。通过这项科技，我们的$ehof_ehof$将能够直接将$ehof_wormhole_text$与全星系的任何目的地链接。"
  
  # Electroweak Quasi-Field Materialization
  tech_condensed_ews:0 "电弱准场实体化"
  tech_condensed_ews_desc:0 "极高的能态导致了电磁力和弱力的统一，使它们合二为一变为自身的初始力，即“电弱力”。$ehof_the_sphere_named$的秘密揭示了如何显现物理上的“电弱准场”，这为进行大规模的精准场与时空操控提供了可能性，甚至达到了量子泡沫级别的水平。"
  
  # Arcane Rift Generator Restoration
  # tech_arcane_g_r:0 "Arcane Rift Generator Restoration"
  # tech_arcane_g_r_desc:0 "The secrets of the $ehof_ep$ allow us to control sentient metal. With the help of it and negative mass, we are now able to entirely restore the Arcane Rift Generator to its former glory, allowing us to utilize it to its fullest potential."
  
  # Event Horizon Offset Facility Alpha
  allow_ehof_p1:0 "§H解锁巨构建筑：§! $ehof_ehofp1$"
  tech_ehof_phase_01:0 "$ehof_ehofp1$"
  tech_ehof_phase_01_desc:0 "利用$r_arcane_manipulator_1$和被压缩的电磁场来使$ehof_wormholes_text$膨胀和稳定。由于其概率性行为，它们的目的地是完全随机的。"
  tech_ehof_phase_01_nomad:99 "$ehof_ehofp1$"
  tech_ehof_phase_01_nomad_desc:99 "We yearn to explore the galaxy, but are boxed in. Fortunately, we can make use of the $ehof_megastructure_ruined_origin$ until we are freed by a more portable solution. Our repairs utilize the $r_arcane_manipulator_1$ and squeezed electromagnetic fields to inflate and stabilize $ehof_wormholes_text$. Due to their indeterministic behavior, the destination are largely beyond our control."
  
  # Event Horizon Offset Facility Lambda
  allow_ehof_p2:0 "§H解锁巨构建筑：§! $ehof_ehofp2$"
  tech_ehof_phase_02:0 "$ehof_ehofp2$"
  tech_ehof_phase_02_desc:0 "利用$r_arcane_manipulator_1$，光物质和负压来膨胀和稳定的$ehof_wormholes_text$。光物质和负压增强了整个过程，提高了$ehof_ehofs$的精度并扩大了其目的地的范围。"
  tech_ehof_spinal:99 "Horizon Drive"
  tech_ehof_spinal_desc:99 "This device, mounted on the spine of an Arkship, utilizes the $r_arcane_manipulator_1$, squeezed electromagnetic fields, photonic matter, and negative pressure to inflate and stabilize $ehof_wormholes_text$."
  
  # Event Horizon Offset Facility Omega
  allow_ehof_p3:0 "§H解锁巨构：§! $ehof_ehofp3$"
  tech_ehof_phase_03:0 "$ehof_ehofp3$"
  tech_ehof_phase_03_desc:0 "利用$r_arcane_manipulator_1$、硬光结构体、惰性亚中微子探测仪和负质量来操纵和扩大$ehof_wormholes_text$。负质量的运用使虫洞实现完全的稳定化，让我们能够在觉得合适的时间内保持维持膨胀的$ehof_wormholes_text$的开启。而惰性亚中微子探测仪则进一步扩大了我们能到达的$ehof_wormholes_text$目的地的范围。"
  tech_ehof_phase_03_nomad:99 "$tech_ehof_spinal$ Omega"
  tech_ehof_phase_03_nomad_desc:99 "Augments the $tech_ehof_spinal$ with hardlight constructs, sterile sub-neutrino detectors, and negative mass. The utilization of negative mass induces total stabilization of wormholes, which allows us to keep the inflated $ehof_wormholes_text$ open for as long as we see fit. The sterile sub-neutrino detectors further expand the range of destinations our $ehof_wormholes_text$ can reach."
  
  # Event Horizon Offset Facility Ultima
  allow_ehof_p4:0 "§H解锁巨构：§! $ehof_ehofp4$"
  tech_ehof_phase_04:0 "$ehof_ehofp4$"
  tech_ehof_phase_04_desc:0 "运用了$ehof_the_sphere_named$的奥秘的$ehof_ehofp4$是$ehof_ehof$的完美形态，能让我们移动到所选的任意地点，没有任何限制或风险。无限的可能性在等着我们。"
  tech_ehof_phase_04_nomad:99 "$tech_ehof_spinal$ Ultima"
  tech_ehof_phase_04_nomad_desc:99 "Utilizing the mysteries of the $ehof_the_sphere_named$, the Ultima model is the perfect form of the $tech_ehof_spinal$, capable of traveling to any location of our choosing without limitations and risks. Limitless possibilities await."
  
  tech_ehof_phase_04_partial_custom:0 "§H未来一瞥：§!$tech_ehof_phase_04$"
  tech_ehof_phase_04_partial_custom_desc:0 "有了从$ehof_the_sphere_named$获取的知识，我们终于站在了虫洞旅行的新时代巅峰上。\n\n虽然我们尚未完全掌握这些理论的细节，不过在研究完成，精通其道理后，我们就能建造完美$ehof_ehof$了。"
  
  # Light Conduction Distribution Systems
  tech_l_conductor:0 "光传导分配系统"
  tech_l_conductor_desc:0 "用于高能激光传导的能量分配器能够进行星际间的能量传输和交换，提高了我们帝国的能量分配效率。"
  
  # Hyperlane Power Transmission
  tech_hyperlane_p_t:0 "超空间航路能量传输"
  tech_hyperlane_p_t_desc:0 "抽象物理学的进步使我们能够开发出超高容量的超空间航路能量传输器，可以快速有效地跨星际传输能量。"
  
  # Field Entanglement Energy Transregulation
  tech_field_e_e_t:0 "场纠缠能量反式调节"
  tech_field_e_e_t_desc:0 "非悖论超因果性的发现引向了一种极其高效且强大的能量分配器的开发，这一系统能利用“场纠缠能量反式调节”随时随地输送巨大的能量。"
  
  # Unorthodox Reality Examination Techniques
  tech_u_r_e_t:0 "非常态现实检验技术"
  tech_u_r_e_t_desc:0 "抽象物理学的非常规做法和原理需要建造新的研究设施，以开发理解现实的替代研究方案。"
  
  # Supercausal Research Initiatives
  tech_non_local_r_i:0 "超因果研究计划"
  tech_non_local_r_i_desc:0 "抽象物理学的超因果现象需要自成一类的先进、复杂和强大的研究设施。"
  
  # Decay Particle Kinetic Energy Extraction
  tech_giga_power_plant_1:0 "衰变粒子动能提取"
  tech_giga_power_plant_1_desc:0 "高能粒子对的湮灭过程的效率不是100%。湮灭粒子对的质量越大，就越更可能变成质量较小的粒子，而不是光子。新一代发电厂利用抽象物理学来提取这些“衰变粒子”的动能，以进一步提高反物质-物质湮灭能量生产过程的效率。"
  
  # Passive Zero-Point Energy Syphoning
  tech_giga_power_plant_2:0 "被动式零点能虹吸"
  tech_giga_power_plant_2_desc:0 "除了在反应堆中利用主动式零点能量虹吸发电外，我们还可以在专门的发电厂中使用被动式的虹吸。这使我们能够在常规发电厂中提取零点能量，将它们的效率提高到100%以上。"
  
  # Gravitational Wave Energy Extraction
  tech_giga_power_plant_3:0 "引力波能量提取"
  tech_giga_power_plant_3_desc:0 "引力波或许很难被探测到，但它们含有巨额的能量。即使是小质量的物体也会以这些波动的形式释放大量的引力能。先进的抽象物理学技术使我们能直接从引力波中提取能量，让新一代的反应堆和发电厂成为可能。"
  
  # Hypershield Defensive Screen
  # tech_giga_planetary_shield_generator_1:0 "Hypershield Defensive Screen"
  # tech_giga_planetary_shield_generator_1_desc:0 "The $tech_giga_planetary_shield_generator_1$ is an enhanced version of a classical Planetary Shield Generator that affords increased protection to the planet below."
  
  # Negative Mass Protector
  tech_giga_planetary_shield_generator_2:0 "负质量守护者"
  tech_giga_planetary_shield_generator_2_desc:0 "在行星大气层周围创造一个质能排斥层，通过£giga_sr_negative_mass£§Y负质量§!的使用，这一建筑能保护行星免遭最强烈的轨道轰炸伤害。只有长期轰炸和极端高能光束才能及时穿透这一排斥层。"
  tech_giga_planetary_shield_generator_2_nomad:99 "Negative Mass Protection"
  tech_giga_planetary_shield_generator_2_nomad_desc:99 "By creating a mass-energy repulsive layer around a ship's hull through the utilization of £giga_sr_negative_mass£ §YNegative Mass§!, this technology further reinforces naval shields."
  
  # Quasi-Neural Networks
  tech_quasi_neural_net:0 "准神经网络"
  tech_quasi_neural_net_desc:0 "在研究行星植物脑的过程中获得的各种发现让我们发展出了人工准神经网络。这些人工准神经网络允许我们在各种应用领域内实现可替换的且未知的数据传输与数据管理的方法。"
  
  # Scourge Deployment
  tech_scourge_deployment:0 "灾异部署"
  tech_scourge_deployment_desc:0 "猩红灾异是一种先进的合成毒素，既能像原先设计的那样用作一种地貌改造剂，也能当做一种行星覆盖化学武器，能够杀死所有生命。它的用途取决于我们。"
  
  # Sentient Metal Tier 1 (Reality Code 1)
  tech_ehof_sentient_tier_1:0 "第I代知觉金属"
  tech_ehof_sentient_tier_1_desc:0 "通过对$ehof_ep$发信源和$PGATE_GALACTICS$的深入研究，第一代知觉金属技术完成了开发。其着重点是能够复制$giga_sr_sentient_metal$的工业建筑。"
  
  # Sentient Metal Tier 2 (Reality Code 2)
  tech_ehof_sentient_tier_2:0 "第II代知觉金属"
  tech_ehof_sentient_tier_2_desc:0 "第二代知觉金属科技的内容包含该材料在星舰装甲方面的运用，以及用于一种新型高射炮组的知性金属网络智能，后者能高效地瞄准并消灭来袭的炮弹。"
  
  # Sentient Metal Tier 3 (Reality Code 3)
  tech_ehof_sentient_tier_3:0 "第III代知觉金属"
  tech_ehof_sentient_tier_3_desc:0 "第三代知觉金属科技，使现存装甲设计的进一步改善成为了可能，还包括一种利用了该材料的新型轨道炮的设计，后者能瞄准并击伤敌方的舰船。"
  
  # Sentient Metal Tier 4 (Reality Code 4)
  tech_ehof_sentient_tier_4:0 "第IV代知觉金属"
  tech_ehof_sentient_tier_4_desc:0 "第四代知觉金属科技，包含一种利用了该材料的新型大炮系统，以及基于知觉金属网络智能的舰船计算机。"
  
  # Sentient Metal Tier 5 (Reality Code 5)
  tech_ehof_sentient_tier_5:0 "第V代知觉金属"
  tech_ehof_sentient_tier_5_desc:0 "第五代知觉金属科技，包括一种新型机关炮以及一种改良的组装实验室，后者可以生产更多的知觉金属。"
  
  # Sentient Metal Tier 6 (Reality Code 6)
  tech_ehof_sentient_tier_6:0 "第VI代知觉金属"
  tech_ehof_sentient_tier_6_desc:0 "第六代知觉金属科技，包括一种新型的轴基炮、进一步改进的装甲设计，以及利用$PGATE_GALACTICS$作为能量源的能量核心，后者能够产出巨量的能量。"
  
  # Sentient Metal Tier 7 (Reality Code 7)
  tech_ehof_sentient_tier_7:0 "第VII代知觉金属"
  tech_ehof_sentient_tier_7_desc:0 "第七代$知觉金属$技术，归功于我们对于千变万化的奥秘的研究。它包括一种新型的泰坦炮技术——将知觉金属同时用于瞄准、追踪和破坏目标——和一种更先进的$知觉金属$装甲。"
  
  tech_sm_megastructure:0 "知觉金属锻造厂"
