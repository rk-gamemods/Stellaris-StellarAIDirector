  #############################################################################################################################################
  ### Special Projects ########################################################################################################################
  #############################################################################################################################################
  INVESTIGATE_CORE_ANOMALY:0 "核心异常"
  INVESTIGATE_CORE_ANOMALY_DESC:0 "对在§H[from.GetName]§!上发现的核心异常的探索计划已被批准，而我们最好的[Owner.GetScientistPlural]和[Owner.GetEngineerPlural]正在开发一个能抵达核心的机械，这样我们就可以揭开它的秘密了。"
  
  ehof_anomaly.10001.name:0 "核心设施"
  ehof_anomaly.10001.desc:0 "对§H[fromfrom.GetName]§!中心的探索成功了，我们的探索小队发现§H[fromfrom.GetName]§!核心的异常事实上是一座由未知的先进文明建造的废弃研究中心。\n\n它的核心设施似乎还在运转，但在未知事件中受到了轻微的伤害。\n\n基于我们探索的结果，这座设施是为了研究§H[fromfrom.GetName]§!核心中的异星情况而建立，我们并不清楚核心设施的建造者们身上究竟发生了什么。\n\n对于损伤的调查表明这座设施的上层建筑完好无损，我们可以安全地继续曾经在这里进行的研究。我们的[Owner.GetScientistPlural]请求用这座设施来满足自身利益并认为这对我们的研究有不可估量的价值。"
  ehof_anomaly.10001.a:0 "令人惊叹，准备重新建立核心设施。"
  ehof_anomaly.10001.b:0 "拆除最重要的科技并离开这座设施。"
  
  ################################4
  
  EXPLORE_LARGE_STATION:0 "损坏的空间站"
  EXPLORE_LARGE_STATION_DESC:0 "我们的政府批准了对§H[from.GetName]§!轨道上损坏的空间站进行调查的探索计划，而我们的[Owner.GetScientistPlural]正在组建一支负责调查空间站的武装考察队。"
  
  ehof_anomaly.10002.name:0 "被抛弃的政府驻地"
  ehof_anomaly.10002.desc:0 "探险队——对§H[fromfrom.GetName]§!轨道上的大型空间站进行探索——成功地确定了它的最初用途。\n\n根据探险队所能采集到的数据，这一大型空间站曾经是过去§H[fromfrom.GetName]§!上的文明的中央政府驻地。\n\n由于跨国政府的成员国之间的矛盾不断加剧，§H[fromfrom.GetName]§!的文明曾经处于一场全球冲突的边缘，这最终演变为了一场核战争，并且毫无疑问地摧毁了§H[fromfrom.GetName]§!。而紧张关系加剧的原因则是§H[fromfrom.GetName]§!上缺少一种似乎被前居民称为“冈伐”的重要资源。\n\n仅凭空间站中的记录，我们的[Owner.GetScientistPlural]没法识别这种资源，不过其对他们社会的几乎每个层级的运行都至关重要。"
  ehof_anomaly.10002.a:0 "真可怕！又一个社会因为自身的贪婪而遭到毁灭。"
  
  ################################
  
  STUDY_NATURAL_NETWORK:0 "互相关联的植物种类"
  STUDY_NATURAL_NETWORK_DESC:0 "我们的[Owner.GetScientistPlural]准备进入§H[from.GetName]§!上的森林，希望了解更多关于在行星表面组成了全球网络的这种特殊植物的信息。"
  
  ehof_anomaly.10003.name:0 "行星植物脑"
  ehof_anomaly.10003.desc:0 "对§H[fromfrom.GetName]§!上的互联性植物种类的长时间研究揭示了一项令人惊讶的成果。\n\n事实上，这些植物表现得像一颗巨型的大脑，围绕着整个星球向四处延伸。单独的植物，组成了像神经元或神经突触一样运作的殖民地。这种“行星植物脑”甚至似乎拥有原始的意识形态。\n\n很不幸，试图和大脑建立联系的尝试失败了。我们的[Owner.GetScientistPlural]认为：要么是大脑还没有进化出类似思维的逻辑运算，要么是它根本无法交流。\n\n撇开大脑的意识不谈，它的功能性可以帮助我们深入了解先进的神经网络机制。我们可以用它来推进对我们网络技术有益的科技。"
  ehof_anomaly.10003.a:0 "多么有趣的发现啊！"
  
  ################################
  
  EXPLORE_ABANDONED_STATION:0 "小行星空间站"
  EXPLORE_ABANDONED_STATION_DESC:0 "为了探索这个看似废弃的小行星空间站，我们已经派出了多支武装探索队。\n\n他们应该确定它最初的目的，并尝试寻找生命的痕迹，那些有可能被我们的探测器错过的痕迹。"
  
  ehof_anomaly.10004.name:0 "神秘的被遗弃殖民地"
  ehof_anomaly.10004.desc:0 "我们对于互相连接的小行星站点的调查，带来了一些还有待理解且令人担忧的发现。\n\n根据我们的发现，空间站最初是一个完全自给自足的殖民地，能够容纳和支持数十万名居民。\n\n计算机系统内部的记录显示，这是一个文明的避难所，他们的行星被一场巨大的地壳灾难给摧毁了。\n\n令人担忧的是，除了我们的探险队外，这个空间站似乎完全没有任何生命，连一种生命都没有被发现，人工大气中甚至连微生物都没有。看来因为我们到来前的某个未知事件，这个殖民地完全失去了生命。\n\n对该殖民地电脑的进一步检查发现了一段17分钟的记录，不过它在32年又121天前因为未知原因被不可逆地破坏了。导致空间站所有生命都神秘消失的事件，有可能就发生在这17分钟之内。\n\n我们的[Owner.GetScientistPlural]正在讨论，是取走任何空间站中可恢复的技术并离开更好，还是说它有成为我们人民的宝贵殖民地的潜力。"
  ehof_anomaly.10004.a:0 "这个太空站太有用了，不能被抛下。"
  ehof_anomaly.10004.b:0 "这地方看上去被诅咒了。我们最好离开！"
  
  ehof_anomaly.16.name:0 "神秘失踪"
  ehof_anomaly.16.desc:0 "这太糟糕了！我们突然收到了来自§H[fromfrom.GetName]§!的报告，里面提到了发生在我们殖民者身上的突如其来的，奇特的和强烈的精神崩溃。出现崩溃的定居者的人数在不断增加，直到报告突然中断了。\n\n我们派出了一队调查组去调查我们的殖民者，却发现他们全都消失了。就像§H[fromfrom.GetName]§!之前的原住民一样，我们的殖民者也因为未知的原因不见了。\n\n根据空间站上的记录，在最后的报告被送出后，这里发生了相同的17分钟的破坏。\n\n这些发生在§H[fromfrom.getName]§!上的异常事件，其背后的真相依旧成谜。"
  ehof_anomaly.16.a:0 "我们早该知道的"
  
  ################################
  
  STUDY_PLASMATIC_LIFE:0 "研究等离子体生命"
  STUDY_PLASMATIC_LIFE_DESC:0 "我们的政府已经批准了对于等离子体生命形式的直接研究。\n\n支援和防护单位已经准备好被部署在§H[from.GetName]§!的极端环境当中了，其表面温度可以达到485摄氏度。"
  
  ehof_anomaly.10005.name:0 "无机等离子体生命"
  ehof_anomaly.10005.desc:0 "对等离子体生命形式的研究和对它们的生态体系的观察获得了令人震惊的结果。在对它们的拟遗传基础进行分析后发现它们是真正的无机生命。\n\n形成无机生命的条件极为复杂和稀缺，这就是以前几乎没有发现它们的原因。\n\n它们的细胞具有独特的生物成分，能够使用高强度的高温氧化机制和用简单但强效的能够代替“血液”的液体金属进行代谢。\n\n这赋予了它们在极端环境下生存和兴旺的能力。\n\n单细胞和多细胞生物都有被发现且全部能够无性繁殖。目前还没有发现有性繁殖的形态，但是我们的[Owner.GetScientistPlural]想开展二次调查寻找更复杂的生物体，甚至有可能找到具备社交能力的高级生物体。"
  ehof_anomaly.10005.a:0 "惊人的生物。扩大研究。"
  ehof_anomaly.10005.b:0 "我们应该不去干涉这一独特的生态系统。"
  
  INVESTIGATE_INTELLIGENT_PLASMATICS:0 "寻找高级的等离子体生物"
  INVESTIGATE_INTELLIGENT_PLASMATICS_DESC:0 "有了政府的批准，我们的[Owner.GetResearchers]开始了对§H[from.GetName]§!等离子体生态系统的充满热情与野心的探索，以期能找到具有潜在社会交互能力的等离子体智慧生命。"
  
  ehof_anomaly.10006.name:0 "等离子体社会"
  ehof_anomaly.10006.desc:0 "我们对§H[fromfrom.GetName]§!的等离子体生态系统的探索取得了惊人的突破。\n\n在靠近§H[fromfrom.GetName]§!南极的地方，我们的[Owner.GetResearchers]遭遇了具有社会性的等离子体生命。这些生物似乎能以自己的身体为工具建造简单的结构，同时它们还能互相交流并组成小群体。这些群体提高了每个个体的存活率。基于观察数据的分析结果，它们还处于前游猎发展阶段。尽管它们还远远算不上高级生物，但是这依旧是不可思议的发现。\n\n继续观察下去将会给我们在进化生物学和天体生物学领域的研究带来真正的益处。"
  ehof_anomaly.10006.a:0 "也许有一天我们会找到更多像这样的生物！"
  
  #################################
  #########RED TOXIC WORLD#########
  #################################
  
  ehof_red_toxic_digsite:0 "猩红灾异"
  ehof_red_toxic_digsite_desc:0 "将利用X射线来穿透稠密的大气的高强度扫描设备已经准备好去扫描星球地表了。我们的[Owner.GetScientistPlural]希望这些扫描能够探明覆盖这颗行星的红雾的起源，因为据他们推测：那不是天然产生的。"
  
  ehof_red_toxin.41.name:0 "被毒害的天堂"
  ehof_red_toxin.41.desc:0 "我们用X射线扫描§H[from.Planet.GetName]§!地表的尝试获得了成功。\n\n我们的系统绘制了82844平方公里的地表。森林和城市——或者至少是它们的残骸——坐落于行星表面。由此，我们可以断定：§H[from.Planet.GetName]§!上曾经存在有文明，至少植物生命曾经是行星生态系统的一部分。\n\n建筑物的结构和规模表明该文明非常发达，但大量轨道碎片的存在说明他们从来没有实现行星外的永久定居。\n\n并不确定是否是这个文明自身导致了红雾。\n\n不幸的是，我们必须对地表进行一次探索，才能进一步了解行星上发生的事情。只有找到灭绝文明的记录，还有地表和环境的样本，才能让红雾和它的起源更加明晰。\n\n红雾对有机生命来说非常危险。由于它对探险人员展示出的危险性，配备了抗腐蚀装甲和能量护盾的高级机器人勘探单位被部署到了那里。"
  ehof_red_toxin.41.a:0 "让探险队做好防范。"
  
  ehof_red_toxin.42.name:0 "猩红灾异"
  ehof_red_toxin.42.desc:0 "在§H[from.Planet.GetName]§!地表的探索成功了，我们确定了红雾的本质。\n\n这种被§H[from.Planet.GetName]§!上的原住民称为“猩红灾异”的红雾是一种高级的合成毒气，被§H[from.Planet.GetName]§!过去文明的人创造出来后最终失控。\n\n至于是谁出于何种目的造出了这种毒气，这颗星球上的普通大众也不知道真相，即使浏览政府和科研机构的机密记录也不能找出猩红灾异的起源。\n\n目前知道的只有一件事：在321个银河标准年以前，这种毒气突然出现在北半球如今叫做“起源之地”的地方，不出一年就覆盖了整颗行星，彻底摧毁了它的生态圈。\n\n这种毒气由直径0.1-100微米的颗粒组成，这种大小的多样性使其能够遍布大气的每个层级，并且极难控制或过滤。最令人担忧的是，它还能通过未知的方式自我复制。\n\n我们的[Owner.GetScientistPlural]相信对§H[from.Planet.GetName]§!上的起源之地进行深入探索能够解答我们对猩红灾异的剩余问题。"
  ehof_red_toxin.42.a:0 "我们需要查明猩红灾异的来源。"
  
  ehof_red_toxin.421.name:0 "起源之地探险"
  ehof_red_toxin.421.desc:0 "我们的机械探索单元已经被替换并做好了探索起源之地的准备。这个地方可能不只是猩红灾异的起点，甚至还有可能是它最初被创造出来的地方。"
  
  ehof_red_toxin.43.name:0 "创新锻造复合物23RCA"
  ehof_red_toxin.43.desc:0 "对于“起源之地”的调查揭示了更多猩红灾异的秘密，其数量远超我们的预想。\n\n起源之地，内部名称是“危险测试场地Y-173”，并非是猩红灾异被创造出的地方，但它是一个创造出猩红灾异的机构使用的测试站点。该站点由一个有着巨大穹顶的观测站组成，它的内部曾有一座小镇和小小的森林。最早在其中居住的是测试对象——§H[from.Planet.GetName]§!的主体物种，不过，化石证据还揭示了其他动物生命的存在。\n\n这个穹顶由高级隔离材料构成，理应能阻止猩红灾异泄露到空气中。不幸的是，甚至连它的创造者都低估了它的效果。猩红灾异腐蚀了穹顶材料并泄露到了大气中，预示着§H[from.Planet.GetName]§!上所有生命的末日的开始。\n\n从站点的受损系统中提取和恢复的数据表明：它是由一个私有的研究开发组织运营的，其名为革新工坊。\n\n猩红灾异（内部名称为“复合物23RCA”）在起源之地中进行测试，以研究它在真实环境中对于有机物和无机物的效果。参与测试的成员被告知说那是一场气候控制实验。\n\n记录还揭示了革新工坊早期的主要设施——一个名为“贮藏地”的地点。这个地点不仅是猩红灾异最初被创造的地方，还是许多革新工坊其他造物的诞生地。\n\n我们的[Owner.GetScientistPlural]想要探索贮藏地，以找出猩红灾异的合成方法，挖出革新工坊的其他任何可能有用的研究。"
  ehof_red_toxin.43.a:0 "贮藏地的数据可能会非常有用！"
  
  ehof_red_toxin.431.name:0 "贮藏地"
  ehof_red_toxin.431.desc:0 "贮藏地是我们在§H[from.Planet.GetName]§!上探索的最后目标。我们部署了全副武装的机器人勘探单位来参与这次任务。\n\n如果贮藏地真的是革新工坊最伟大的创造物的诞生地，它可能是个我们尚不能预料的危险之地。"
  
  ehof_red_toxin.44.name:0 "灾异与解药"
  ehof_red_toxin.44.desc:0 "我们对于贮藏地的探索取得了圆满成功。\n\n贮藏地是一个巨型设施，建在大山之下。\n\n就如同从起源之地中恢复的数据揭示的那样，它是一座技术创新的宝库，其科技远远胜过该行星的其他任何地方。\n\n贮藏地受到内部安保系统的守护，即使是对我们的单元来说，这也是个挑战，不过，我们战胜了安保系统，然后恢复了该设施的运行。\n\n我们成功地定位了猩红灾异最初被创造出来的实验室。在那里我们能够找到所有可以了解它的东西。\n\n起初它是一系列环境改造作用剂的完全版雏形，由革新工坊创造出来。这些作用剂将会被部署在属于敌方但是可能宜居的行星上，来清除大气层中的有害组分，包括生物组分。\n\n结果作用剂表现得异于预期，最后，它的效果远远超出了任务的要求。\n\n在设施的中心处，我们找到了一个先进的智能体，一个革新工坊最伟大的[Owner.GetScientistPlural]的整体，他们通过意识上传来躲避猩红灾异。他们告诉了我们更多内容，关于贮藏地，§H[from.Planet.GetName]§!文明，猩红灾异，以及他们对于猩红灾异危机的解决措施。\n\n在猩红灾异横扫该行星的时候，他们在靠近南极的地方建造了一座被称为“催化设施”的巨塔，以净化大气中的猩红灾异。初次的尝试失败了，因为他们没能找到阻止猩红灾异自我复制的方法，而且他们也没有进行第二次尝试的资源了。\n\n这个集合体告诉我们，我们的先进技术也许能让我们想出克制猩红灾异自我复制的方法，净化大气层。\n\n我们现在可以选择是净化这个星球，让它再次变得宜居，或者以我们自己的方式去利用猩红灾异。"
  ehof_red_toxin.44.a:0 "猩红灾异是可怕的怪物。要把星球从它手中解救出来！"
  ehof_red_toxin.44.b:0 "猩红灾异可能会非常有用…"
  
  ################################
  
  INVESTIGATE_ONE_ORBIT:0 "同一轨道"
  INVESTIGATE_ONE_ORBIT_DESC:0 "刚进入§H[root.solar_system.GetName]§!星系没多久，我们的传感器就探测到星系中的行星有着奇怪的排列方式。\n\n这个星系有两颗行星，但是它们都处在同一个轨道上。它们距离恒星的距离几乎完全相等，这让他们形成了完美的对称。\n\n我们的[Owner.GetScientistPlural]希望能调查这两颗行星来找出更多有关它们的奇怪排列的情况。"
  
  ehof_anomaly.10011.name:0 "同一天堂"
  ehof_anomaly.10011.desc:0 "通过对§H[root.solar_system.GetName]§!星系中的第一颗星球§H[fromfrom.GetName]§!的调查，我们发现它是一颗极其稀有的，宜居性极高的盖亚星球。\n\n它有着比一般的行星更大的质量，但密度却是典型岩石星球的水平。星球上有着不可思议的多样性生态系统。\n\n研究这样一颗行星可能给我们的生物学研究带来巨大的价值，但是我们接下来的重心集中在对它的姐妹星球§H[fromfrom.GetName]§!的研究上。"
  ehof_anomaly.10011.a:0 "调查下一个！"
  
  ################################
  
  INVESTIGATE_ONE_ORBIT_2:0 "同一轨道II"
  INVESTIGATE_ONE_ORBIT_2_DESC:0 "对于§H[fromfrom.GetName]§!的调查会向我们揭示这一奇怪的行星布局是如何构成的。"
  
  ehof_anomaly.10012.name:0 "天堂双生"
  ehof_anomaly.10012.desc:0 "我们对§H[root.solar_system.GetName]§!星系的第二颗行星§H[fromfrom.GetName]§!的调查揭示了一些令人难以置信的事实。\n\n§H[fromfrom.GetName]§!有着和它的姊妹星球相同的特性——它也同样是一颗盖亚星球！\n\n这两颗星球都是盖亚星球，且有着相同的质量，密度，转轴倾角，轨道，转速及轨道速度。唯一能区分它们的只有它们各自的生态系统还有它们所处的不同位置。\n\n整个天体系统看上去是如此不真实，但它的的确确存在。像这样的行星群自然出现的概率几乎为0，因此其一定是人工的产物，不过，能证明这个星系的创造者是谁的迹象还没有被我们发现……"
  
  ################################
  
  INVESTIGATE_SCARRED_PLANET:0 "伤疤"
  INVESTIGATE_SCARRED_PLANET_DESC:0 "我们的[Owner.GetScientistPlural]想通过研究伤疤的地质构造和物质构成来找出其形成的细节。扫描器同样也在分析周围的区域，以找出任何不寻常的物质。\n\n目前，我们怀疑伤疤可能是部署某种超级武器造成的结果。"
  
  ehof_anomaly.10013.name:0 "巨型裂痕"
  ehof_anomaly.10013.desc:0 "伤疤的研究完成了，这证实了我们的假设——事实上，伤疤是因某种巨型武器产生的。\n\n虽然我们从前见过类似规模的武器，但在这里使用的武器的特殊性让这个案例非常吸引人。伤疤的地理构造，切口与行星表面形成的角度，存在于60km深的不寻常物质，这些都指向了这样的看法：伤疤是因一种巨大的动能武器形成的。\n\n我们的传感器也探测到了贯穿整个峡谷辐射路径，其曲折蜿蜒，很不规则。但是，辐射污染并不是因为这些物质本身像钚一样具有放射性，而是因为它们被暴露在了高强度的伽马辐射下。这揭示了撞击星球地表并创造了伤疤的动能炮弹至少一定程度上是由反物质组成的。这些炮弹似乎已经完全湮灭了，所以我们无法进一步判断它的构造。\n\n此外，我们的[Owner.GetScientistPlural]确定了伤疤的年龄：125万年左右，这样古老的年龄让我们并不对知晓更多关于武器的制造者的信息或其以此地为第一个发射点的原因抱任何期望。"
  
  ################################
  
  ehof_megastructure.016.name:0 "神秘之石"
  ehof_megastructure.016.desc:0 "我们的一艘科研船在§H[root.solar_system.GetName]§!星系重力井中心的边上发现了一个巨大的，非常明亮的物体。我们最初认为它是一颗中子星，因为该对象排出的巨大能量干扰了我们在星系中的所有护盾和传感器。\n\n不过，一经近距离的检查，我们就发现它是一个设计、用途和起源都未知的建筑。它似乎是个行星大小的量筒，顶部与底部表面上有着巨大的神秘石刻，正发出极强的蓝光。\n\n深度扫描没能给出任何信息，因为我们传感器返回的数值非常怪异，无法理解。根据我们传感器的报告，它发出的能量非常巨大，其石刻附近的温度可能在五百万到一万亿开氏度，因此不可能直接对其进行调查。\n\n现在，我们只能把它原样放在那里。"
  ehof_megastructure.016.a:0 "妙啊！"
  
  ################################
  
  ehof_megastructure.017.name:0 "古代之柱"
  ehof_megastructure.017.desc:0 "我们的一艘科研船发现了一个神秘的$PGATE_GALACTICS$！它在§H[root.solar_system.GetName]§!星系内。\n\n我们只听说过关于这些建筑的传言，据说这是某种特别先进的星门，能使我们前往系外星系。"
  ehof_megastructure.017.a:0 "妙极！"
  
  ################################
  
  ehof_megastructure.018.name:0 "黑洞建筑"
  ehof_megastructure.018.desc:0 "在§H[root.solar_system.GetName]§!的核心有一座受损的轨道建筑，其将中央的黑洞给包裹了起来。我们的最初调查表明：这个建筑似乎已经完全失能废弃了。为找出其效用，我们必须继续探索这个建筑。"
  ehof_megastructure.018.a:0 "真迷人！"
  
  EXPLORE_RUINED_EHOF:0 "探索黑洞建筑"
  EXPLORE_RUINED_EHOF_DESC:0 "对§H[root.solar_system.GetName]§!内黑洞建筑的探索正在进行中。为找出其效用，我们须为科考团队配备能够应付真空和强重力的装备，然后再将他们送入建筑残骸之内。"
  
  ################################
  
  INVESTIGATE_ENIGMATIC_PATTERN:0 "神秘图案"
  INVESTIGATE_ENIGMATIC_PATTERN_DESC:0 "只有§H[ehof_code_fleet.GetName]§!的团队还记得这段奇怪的信号。幸运的是，他们成功用便携设备记录了它的一部分，不过，这段信号几乎无法分析出可以理解的内容。他们的报告应该进行进一步调查。\n\n即使没人知道命中§H[ehof_code_fleet.GetName]§!的能量闪烁起源于何处，但它发生在了一个已经很奇怪的$ehof_cohesive$星系中。我们的科研船被建议在留意更多这种神秘图案的同时研究$ehof_cohesive$星系。"
  
  ehof_reality_code.002.name:0 "一段编码序列？"
  ehof_reality_code.002.desc:0 "我们已经在对$ehof_ep$的研究中取得了第一次突破。\n\n那是个从未知地点直达我们舰船的高能信息通信，它还明显拥有干预电子系统的能力——我们观察到了电器的奇怪表现和电力损失。\n\n为了更深入地了解它，我们已经为科研船配备了两种新型部件：在$ehof_ep$找到的调频扫描器，以及$ehof_closed_modular$。$ehof_ep$扫描器装备了专门抵御$ehof_ep$通信导致的电涌和缓冲区溢出的实验性信息处理单元，有更高的耐久性。$ehof_closed_modular$是人工操作的独立供电系统，旨在在舰船系统关闭时迅速将其再激活。\n\n有了这些升级，我们的科研船可以安全地接收$ehof_ep$的通信，进行分析了。"
  
  ################################
  
  EXPLORE_CREATOR_PLANET:0 "探索$ehof_the_sphere$"
  EXPLORE_CREATOR_PLANET_DESC:0 "既然我们已经得到了进入$ehof_the_sphere$内部的权限，我们终于可以揭示它的奥秘了。谁知道我们会在里面发现什么样的奇迹呢？"
  
  ehof_anomaly.10417.name:0 "壳内的微缩宇宙"
  ehof_anomaly.10417.desc:0 "终于，我们揭开了$ehof_the_sphere_named$的秘密！\n\n它包含着一个只能被称为微型宇宙的东西。更令人难以置信的是，与外界太空相比，这个“微型宇宙”的时空是反向折叠的，这让$ehof_the_sphere$的体积比其外部表面区域所能展现的大了几千倍。\n\n这个微型宇宙分为外部空间和内部空间。外部空间的真空能量密度与外界宇宙相同，有着成百上千的恒星，以及数之不尽的建筑，它们收集着恒星辐射、真空能量，甚至还有神秘的超维力。内部空间似乎是一个真空能量密度远高于外部的虚空，\n\n根据我们[Owner.GetScientistPlural]的结论，这些空间的存在是为了产生难以置信的能量。这一能量会先在外部空间被提取，随后被吸入内部空间。内部空间蕴含着至少10^49焦耳的能量，等同于一千个或更多的恒星的质能总和。"
  ehof_anomaly.10417.a:0 "这是有史以来最伟大的科学发现！"
  
  ehof_anomaly.10418.desc:0 "我们进一步确定了一件事：在我们追寻$ehof_epcs$期间遇到的$ehof_ep$放大器和$PGATE_GALACTICS$都是$ehof_the_sphere$的辅助器。这些结构接收着送来的能量和通过微型虫洞播送的来自$ehof_the_sphere_named$的数据。那个数据当然是$ehof_ep$，它会反过来控制$ehof_ep$发信源和$PGATE_GALACTIC$网络。\n\n通过监视这些信号的目的地，我们发现：在星系之外的$ehof_cohesive$系统远比预期的要多!而最令人惊讶的当是这一发现：$ehof_the_sphere_named$不是这些信号的唯一来源——在我们的星系之外有更多的$ehof_the_sphere_named$。\n\n不幸的是，我们仍无法确定$ehof_the_sphere$及其网络的最初目的，或关于其创造者的任何信息。无论目标是什么，它们需要的能量比数千恒星一生产生的还多！"
  
  #############################################################################################################################################
  ### Anomalies ###############################################################################################################################
  #############################################################################################################################################
  tremendous_ring_system_category:0 "反常气态巨行星"
  tremendous_ring_system_category_desc:0 "在§H[root.solar_system.GetName]§!中的§H[from.GetName]§!气态巨行星显示出不寻常的质量与大小。\n\n我们的科学家希望对其进行进一步的调查，以进一步了解这颗行星上的异常现象。"
  
  ehof_anomaly.01.name:0 "巨大的星环系统"
  ehof_anomaly.01.desc:0 "我们发现气态巨行星§H[from.GetName]§!拥有一个巨大的星环系统，比一般的星环系统大得多。\n\n这个星环系统的直径约为3亿7千8百万千米，比这个行星自身的直径171557千米多出了好几个数量级。\n\n这个令人震惊的星环系统是如何形成的，是当前分析宇宙学计算研究和天体数学的一个课题。"
  ehof_anomaly.01.a:0 "迷人。"
  
  ################################
  
  methane_oceans_category:0 "“略显荒颓”星球"
  methane_oceans_category_desc:0 "在§H[root.solar_system.GetName]§!星系，我们的科研船扫描仪在这颗荒芜星球§H[from.GetName]§!的表面探测出异常读数。\n\n我们的科学家想要调查这颗行星以发现更多有关这个行星异常的情况。"
  
  ehof_anomaly.02.name:0 "甲烷海洋"
  ehof_anomaly.02.desc:0 "我们的科学家发现似乎是荒芜星球的§H[from.GetName]§!并非完全荒芜。\n\n由液态甲烷形成的小型海洋处于§H[from.GetName]§!的巨大的小行星撞击坑中。这些海洋能够存在的原因是因为这些陨石坑表面的温度介于-193摄氏度至-143摄氏度之间，具体温度变化依赖于这个世界的日夜循环。\n\n§H[from.GetName]§!上的这些甲烷海洋可能包含简单的无机生物生命形式。\n\n如果甲烷海洋中存在任何生命形态，那么就要在外星生物学研究界引起辩论了。"
  ehof_anomaly.02.a:0 "真是令人激动。"
  
  ################################
  
  nanite_deserts_category:0 "怪奇沙漠"
  nanite_deserts_category_desc:0 "在§H[root.solar_system.GetName]§!中的§H[from.GetName]§!沙漠行星上的参数很奇怪。\n\n我们的科学家希望派出一支勘察队，以进一步了解这颗行星上的异常现象。"
  
  ehof_anomaly.03.name:0 "纳米荒漠"
  ehof_anomaly.03.desc:0 "我们发现§H[from.GetName]§!上一半的沙漠由纳米机器人模仿的沙粒组成。\n\n另外一半的沙漠由自然的颗粒材料组成，就像银河系中其他星球上的沙漠一样。\n\n通过对取样的“纳米沙子”的直接分析，我们发现这些纳米机器似乎没有任何更高级的功能。\n\n这些纳米沙子看起来和自然沙漠中的普通沙子完全相同，只有通过显微分析才能将两者区分开来。\n\n这些纳米机器人的用处以及为什么只有一半§H[from.GetName]§!上的沙漠是由其组成的仍旧是个迷。"
  ehof_anomaly.03.a:0 "太惊人了！"
  
  ################################
  
  coreless_planet_category:0 "无核星球"
  coreless_planet_category_desc:0 "§H[root.solar_system.GetName]§!星系的荒芜星球§H[from.GetName]§!在它的内部结构和组成上表现出奇怪的特性。\n\n需要进行进一步的调查以更多的了解这一行星异常。"
  
  ehof_anomaly.04.name:0 "关键异常现象"
  ehof_anomaly.04.desc:0 "我们的科学家发现§H[from.GetName]§!没有一个真正的核心。\n\n它完全没有一个铁质的核心并且它的岩石地幔延伸到了原本应该是地心的地方。在这颗行星中心，有一个异常的结构被定位到。\n\n我们的科学家不确定这是由外来物质构成的还是一个人造结构。\n\n他们想要派出一支探险队进入这颗行星内部，以了解更多有关这个异常的情况，但是到达这个地方需要时间和资源。"
  ehof_anomaly.04.a:0 "令人印象深刻，快派出探险队。"
  ehof_anomaly.04.b:0 "我们不应该那样做"
  
  ################################
  
  cataclysmic_star_category:0 "剧烈的恒星"
  cataclysmic_star_category_desc:0 "恒星§H[from.GetName]§!正在释放出剧烈的、不规律的能量特征，并且呈现出异常的质量分布。\n\n需要进行进一步的调查以更多的了解这一恒星异常"
  
  ehof_anomaly.05.name:0 "灾变变星"
  ehof_anomaly.05.desc:0 "我们发现§H[from.GetName]§!在其核心包含了一个§HD级别§!的恒星，是一颗§H白矮星§!恒星的残余物。\n\n这颗白矮星使这颗恒星的质量增加了1.2倍，它位于恒星的辐射区，也就是“地幔”。\n\n这颗§H白矮星§!导致了§H[from.GetName]§!核心的极度不稳定，这似乎是导致剧烈、频繁与不规律的等离子爆发的原因，这种爆发会将十数亿吨的恒星物质喷射向太空。\n\n这颗§HD级别§!恒星很有可能在几百万年前与§H[from.GetName]§!相撞并且完全被后者吞噬。\n\n§H[from.GetName]§!的不稳定性将导致这颗恒星过早死亡，很可能在未来10万年内。"
  ehof_anomaly.05.a:0 "真可怕！"
  
  
  ################################
  
  oxygen_world_category:0 "反常冰封星球"
  oxygen_world_category_desc:0 "我们的科研船在位于§H[root.solar_system.GetName]§!星系的§H[from.GetName]§!的表面冰层中探测出异常读数。\n\n我们的科学家想向这颗行星派出一支探索队伍，以发现更多有关这个行星异常的情况。"
  
  ehof_anomaly.06.name:0 "结晶氧世界"
  ehof_anomaly.06.desc:0 "我们的科学家发现§H[from.GetName]§!的表面冰层并非是普通冰或是干冰，而是结晶氧。\n\n§H[from.GetName]§!的平均表面温度极低，比氧的熔点低了51K。\n\n在恒星系系统内具有固态氧稳定存在的条件是极难达到的。\n\n§H[from.GetName]§!真的是一个特别的世界。§H[from.GetName]§!将是未来低温物理课题的一个中心研究点。"
  ehof_anomaly.06.a:0 "太惊人了！"
  
  ################################
  
  abandoned_seat_category:0 "疮痍星球"
  abandoned_seat_category_desc:0 "我们的一艘科研船发现了一颗死寂星球，我们称其为§H[from.GetName]§!。\n\n它位于§H[root.solar_system.GetName]§!，并且拥有一个有太空垃圾组成的星环，这些太空垃圾看起来是之前的卫星和空间站的残余。\n\n我们的[Owner.GetScientistPlural]相信摧毁了§H[from.GetName]§!表面的事件同样是造成卫星和空间站毁灭的原因。\n\n他们想探索由残骸组成的星环以及这颗星球本身，以便进一步了解这个世界发生了什么。"
  
  ehof_anomaly.07.name:0 "损坏的空间站"
  ehof_anomaly.07.desc:0 "在环绕§H[from.GetName]§!的由残骸构成的星环中，我们的[Owner.GetScientistPlural]发现了一个巨大的太空站。\n\n来自我们科研船的扫描显示这个太空站显现出了中度的结构损伤并且似乎被遗弃了。\n\n空间站未受损伤的结构与其他太空残骸相比较展现出了独特的美学特性。\n\n我们的[Owner.GetScientistPlural]们认为，这个空间站对这个曾经居住在现已被摧毁的世界的文明具有重要的意义。\n\n他们想进一步调查这个空间站，以期发现在§H[from.GetName]§!上发生了什么。"
  ehof_anomaly.07.a:0 "有趣，调查那个空间站！"
  ehof_anomaly.07.b:0 "不是所有的秘密都要被揭开。"
  
  ################################
  
  natural_network_category:0 "有思想的行星？"
  natural_network_category_desc:0 "我们正在探测到§H[root.solar_system.GetName]§!星系的整个宜居世界§H[from.GetName]§!发出的奇怪信号。\n\n信号和动物生命的脑电波十分相似，我们的[Owner.GetScientistPlural]不确定是这颗行星真的“活着”，还是他们的仪器被干扰了。\n\n我们需要进一步的调查以便发现更多有关这个行星异常的情况。"
  
  ehof_anomaly.08.name:0 "自然全球网络"
  ehof_anomaly.08.desc:0 "我们发现§H[from.GetName]§!被一个遍布全球的、互相连接着的植物群落组成的巨大网络覆盖着。\n\n这种网络由某一属植物组成，这种植物可以通过根系彼此连接。这种植物支配着这颗星球，数量比全球植被的一半略多一些。它们就是我们的科研船先前探测到的诡异信号的源头。\n\n我们的[Owner.GetScientistPlural]认为这个植物网络至少有着一种微弱的类似动物神经的活动。不过，由于其自身的性质，这种活动可能仍旧和动物的神经模式有所不同。\n\n我们的[Owner.GetScientistPlural]希望能扩展对这些植物的研究，来找出更多有关它们和这个全球网络的情况。"
  ehof_anomaly.08.a:0 "令人着迷，扩展对这些植物的研究！"
  ehof_anomaly.08.b:0 "植物就是植物而已。"
  
  ################################
  
  connected_asteroid_category:0 "小行星空间站"
  connected_asteroid_category_desc:0 "测量员在环绕§H[root.solar_system.GetName]§!星系的大型小行星带中发现了一个质量分布及成分异常的非自然构造。\n\n[Owner.GetScientistPlural]想调查该异常，了解更多情况。"
  
  ehof_anomaly.09.name:0 "连接起来的小行星空间站"
  ehof_anomaly.09.desc:0 "§H[root.solar_system.GetName]§!星系中阵型不自然的小行星带被证明是一个由大量支柱和输送管固定在一起的许多小行星组成的巨大空间站。\n\n根据我们最新的扫描结果，这个空间站似乎被遗弃了，而且还完好无损。我们需要更进一步的调查来证实这一观测。我们的[Owner.GetScientistPlural]请求探索空间站的内部，以找到更多东西。"
  ehof_anomaly.09.a:0 "行动吧，但是一定要小心。"
  ehof_anomaly.09.b:0 "算了，忽视这个空间站。"
  
  ################################
  
  hot_society_category:0 "有人居住的熔融星球"
  hot_society_category_desc:0 "在熔融星球§H[from.GetName]§!的表面发现了类似于生命活动的迹象。\n\n有机生命形式通常无法在如此恶劣的环境中生存，当然也无法自然发展出来。\n\n我们需要进一步的调查以便发现更多有关这颗熔岩世界的异常活动情况。"
  
  ehof_anomaly.10.name:0 "等离子体生命形式"
  ehof_anomaly.10.desc:0 "对§H[from.GetName]§!上异常活动的密集遥感调查展现出了迷人的结果。\n\n这颗行星确实栖息着一种被我们的异星生物学家称为“等离子生命体”的独特生命形态。他们似乎由伪有机等离子构成，其运作方式与有机生命体相似。如果他们由碳基结构组成，那么在理论上他们能算作有机生命，如果不是，那么它们也许是一种举世罕见的无机生命形式。\n\n这颗星球上居住着多种等离子生命形式。对这颗行星的等离子生物圈的直接研究是必要的，不过，由于这颗行星致命的环境，这将非常危险。"
  ehof_anomaly.10.a:0 "太美妙了，扩展对这些生命形式的研究。"
  ehof_anomaly.10.b:0 "我们不应该浪费[Owner.GetScientistPlural]生命和资源去冒险。"
  
  ################################
  
  intoxicated_world_category:0 "红色星球"
  intoxicated_world_category_desc:0 "一个位于§H[root.solar_system.GetName]§!恒星系的迄今为止仍未被发现的世界已经被定位。\n\n根据初步的远程扫描，它很有可能是一个剧毒世界，但是直接调查是确保星球的类型必需条件。"
  
  ehof_anomaly.11.name:0 "红色剧毒星球"
  ehof_anomaly.11.desc:0 "通过对§H[from.GetName]§!大气层的直接调查，我们发现这颗行星是一个剧毒世界。这颗行星的颜色，或是更具体的说，它的大气层，是由悬浮的微粒构成的。\n\n对这些颗粒的化学分析显示：它们由铜，许多复杂的碳化合物，硫，钴乃至锕系元素组成。这种物质既有放射性，也有腐蚀性，还能积极地黏着在大多数其他物质上。\n\n除了对任何有机生命形式极度致命之外，它也是极端稠密和不透明的，这隔绝了抵达行星表面的光和低能辐射。这些因素共同使对表面的精细分析变得极度困难。\n\n我们的[Owner.GetResearchers]请求使用高强度扫描仪来分析这颗行星。"
  ehof_anomaly.11.a:0 "多么可怖而又迷人啊！尝试穿透大气层。"
  ehof_anomaly.11.b:0 "我们不去深究雾背后的真相为妙。"
  
  ################################
  
  scarred_planet_category:0 "伤疤"
  scarred_planet_category_desc:0 "在§H[root.solar_system.GetName]§!恒星系的一颗荒芜星球上侦测到了异常的地质构造——一个位于该行星表面的巨大峡谷，事实上也是其表面上唯一的峡谷。这种缺乏峡谷的现象让该峡谷不大可能是自然过程或流星撞击的产物。\n\n我们的地质学家要求获取更多数据。"
  
  ehof_anomaly.12.name:0 "伤疤"
  ehof_anomaly.12.desc:0 "我们证实了§H[from.GetName]§!上的峡谷并非是天然形成的。这个峡谷自身的结构说明了它不可能是自然的——它跨越了行星表面的六分之一，并且深度达到了上地幔。如果我们的[Owner.GetResearchers]的主流理论是对的，那么可能是行星的星环组成了最初形成峡谷的物质。\n\n我们还未找出其成因，但是对构成伤疤和星环的行星物质的输入分析应该能给我们提供成因的线索。"
  ehof_anomaly.12.a:0 "什么东西可以造就如此庞大的峡谷？"
  ehof_anomaly.12.b:0 "没有时间去关心这些地质学问题了，撤离。"
  
  ################################
  
  ehof_anomaly.13.name:0 "同一轨道"
  ehof_anomaly.13.desc:0 "刚进入§H[root.solar_system.GetName]§!星系没多久，我们的传感器就探测到了星系中行星的奇怪排列方式。这个星系似乎有两颗行星，它们处在同一个轨道上。\n\n我们的[Owner.GetScientistPlural]想要调查这两科行星，试着理解这种奇怪轨道排列的成因。"
  
  #############################################################################################################################################
  ### Digsites ################################################################################################################################
  #############################################################################################################################################
  #########################################
  ### Reality Code ########################
  #########################################
  reality_code:0 "现实编码"
  ehof_closed_modular:0 "闭环模块系统"
  ehof_the_sphere:0 "§B球体§!"
  ehof_the_spheres:0 "§B球的§!"
  ehof_the_sphere_named:0 "千变万化"
  ehof_the_sphere_nameds:0 "千变万化的"
  ehof_ep:0 "神秘图案"
  ehof_eps:0 "$ehof_ep$"
  ehof_epcs:0 "$ehof_ep$编码序列"
  
  # Introduction to event chain
  ehof_reality_code.1.name:0 "神秘图案"
  ehof_reality_code.1.desc:0 "我们收到了来自§H[ehof_code_fleet.GetName]§!的奇怪报告。\n\n在调查§H[ehof_code_fleet.solar_system.GetName]§!星系的路径时，飞船被强烈的能量脉冲命中了，它的主动力源被切断，停止运转了6个小时。\n\n幸运的是，备用能源核心没有受到损坏，乘员们也成功激活了它，在将主系统传回线上之前维持住了维生系统。\n\n在飞船重新完全运转的时候，奇怪的事情开始出现在舰船上。根据一些报告的描述：所有系统都自行再激活并且不可控的运转着，就像飞船被控制了一样。监视屏上开始展现神秘但规则的图案。自动门以某种规则关闭并开启，和监视屏保持着同步，内部通讯重复着刺耳的声音。\n\n随后，这艘[Owner.GetScientistPlural]搭乘的$ehof_ep$不复存在了。我们必须深入调查这个谜团。"
  
  # Event chain (Situation Log)
  ehof_p4_chain_title:0 "$reality_code$"
  ehof_p4_chain_desc:0 "配备了必要的科技，我们的科研船能够安全的接受并处理$ehof_eps$的信号。\n\n我们必须继续探索$ehof_cohesive$恒星系，找出更多$ehof_ep$的信号。"
  
  # Point Of Interest For CPlanet system
  ehof_mega_chain_1_poi:0 "起源"
  ehof_mega_chain_1_poi_desc:0 "看来$ehof_ep$起源于这个位置。"
  
  #############
  ### Toxic ###
  #############
  # Anomaly
  code_1_cat:0 "现实编码：剧毒星球"
  code_01_category_desc:0 "§H[this.GetName]§!探测到来自§H[from.solar_system.GetName]§!恒星系的传输信息。像之前一样，它瘫痪了我们的飞船主系统。不过这次，飞船的$ehof_closed_modular$没过多久就恢复了。飞船的[Owner.GetScientistPlural]将这一现象称为$ehof_epcs$。\n\n在飞船重新上线后，它的$ehof_ep$扫描仪辨认出了信息的来源，一颗被我们的研究者称为§H[from.GetName]§!的剧毒星球。\n\n包括对$ehof_ep$扫描仪在内的深入研究应该能进一步查明信息的来源。考虑到那段信息非常简短，而且没有被重复过，也许需要一些时间才能完成这件事。"
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.101.name:0 "现实编码：剧毒星球"
  ehof_reality_code.101.desc:0 "§H[this.GetName]§!成功定位了来自的§H[from.planet.GetName]§!$ehof_ep$信号的源头：该行星南半球的地壳。\n\n我们有必要通过挖掘到达信息源的位置。高温和有毒大气会使挖掘变得更为困难，但是有了合适的装备，这应该算不上什么问题。\n\n我们将不得不在该项目上花费足够的时间和资源来获得我们正在寻求的答案。"
  
  # Initial
  code1_digsite:0 "现实编码：剧毒星球发掘"
  code1_digsite_desc:0 "§H[this.GetName]§!成功定位了来自的§H[from.planet.GetName]§!$ehof_ep$信号的源头：该行星南半球的地壳。\n\n我们有必要通过挖掘到达信息源的位置。高温和有毒大气会使挖掘变得更为困难，但是有了合适的装备，这应该算不上什么问题。\n\n我们将不得不在该项目上花费足够的时间和资源来获得我们正在寻求的答案。"
  
  # Stage 1
  ehof_reality_code.111.name:0 "现实编码：剧毒星球发掘I"
  ehof_reality_code.111.desc:0 "为了保护挖掘现场免受§H[from.planet.GetName]§!有害大气的威胁，在预定的钻井附近，一个由抗腐蚀和抗高温材料制作而成的隔离圆顶被造了出来。\n\n由于信息源只在地表下几十千米的地方，可以使用常规的钻头凿出一条通往目的地的隧道。在凿出地洞后，一个载人研究单位将被送进地洞调查信息源。\n\n现在挖掘可以开始了。"
  ehof_reality_code.111.a:99 "Let's get going."
  
  # Stage 2
  ehof_reality_code.112.name:0 "现实编码：剧毒星球发掘II"
  ehof_reality_code.112.desc:0 "钻机已经打通一条通往发信源的隧道。待它返回后，现场小组将亲自下去检查。\n\n这里本来就很可疑。在靠近信号源的地方，地壳留出了一个空腔，中心有某种八面体结构。\n\n该构造投射出某种坚不可摧的护盾。对该物体表面的初步调查显示，它由一种温度略高于绝对零度的未知物质组成。在如此低的温度下，物质状态在时间上几乎是停滞的。它如何以及为什么能达到如此低温不得而知。\n\n扫描仪无法穿透结构表面，也无法探测到除平均场激发及$ehof_ep$发信外的任何辐射迹象。要想获得更多信息，只能找到穿过护盾、进入目标的方法。"
  
  # Stage 3
  ehof_reality_code.113.name:0 "现实编码：剧毒星球发掘III"
  ehof_reality_code.113.desc:0 "进入目标花了相当长的时间，但等待是值得的。\n\n在多次尝试后，研究小组使用了一组重力电磁波，其频率和振幅与$ehof_ep$相似，希望物体对它做出反应——结果确实如此！\n\n护盾断电，物体表面出现了一个入口。研究小组在八面体中发现了一套极其复杂的机械装置。\n\n经过深入研究，他们确定了该结构的整体功能。它不是$ehof_ep$的信号源，而是放大器和中继器。该序列通过重力电磁波传输到同一星系内的$PGATE_GALACTIC$，而今不知所踪。\n\n研究小组成功从该结构的数据库中提取了$ehof_epcs$的片段。\n\n此外，他们还对八面体的物质组成有了惊人发现。它主要由某种奇异的、可自我复制和再生的物质制成，该物质与§H活体金属§!、§H纳米机器人§!存在共同特性!\n\n它既能像前者一样，在急剧变化的环境条件下维持其结构；又能像后者一样，吸收能量和物质来复制自己。有趣的是，该物质似乎对周围环境有一定感知，尽管我们无法量化其原理及程度。它似乎对§H暗物质§!和$giga_sr_negative_mass$没有反应，也无法利用。\n\n基于这些特点，该物质在许多领域都有惊人潜力。"
  
  #################
  ### Shattered ###
  #################
  # Anomaly
  code_2_cat:0 "现实编码：破碎星球"
  code_02_category_desc:0 "§H[this.GetName]§!在§H[from.solar_system.GetName]§!星系内接收到了$ehof_epcs$的另一条传输信息。就像前两次，它瘫痪了这艘船。而这一次，改良的$ehof_closed_modular$成功地在几分钟内就重启了飞船功能。\n\n$ehof_ep$探测器可以确定传输信息的源头处在这个恒星系内部：破碎星球§H[from.GetName]§!。§H[this.GetName]§!上的$ehof_ep$扫描器可以确定位于该行星上（或内部）的源头的位置，但是这将要花费一定时间。"
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.201.name:0 "现实编码：破碎星球"
  ehof_reality_code.201.desc:0 "我们的团队确定了来自行星§H[from.planet.GetName]§!$ehof_ep$信号的源头的确切位置：它深深地埋在行星最大块的遗迹之下。\n\n事实证明，这一挖掘工作将比第一个更具挑战性，这不仅是因为源头位于更深的位置，而且还因为行星重力井内危险和不稳定的环境。我们要挖掘的碎片可能会分解或与其他碎片相撞。\n\n小心为妙。"
  
  # Initial
  code2_digsite:0 "现实编码：破碎星球发掘"
  code2_digsite_desc:0 "团队确定了从§H[from.planet.GetName]§!发出的$ehof_ep$信号来源：最大的行星残骸深处。\n\n这次发掘比第一次更有挑战性，不仅信源位置更深，而且“前”行星重力井内的条件危险且不稳定。我们正在发掘的星球碎片可能会在毫无预兆的情况下分裂或与其他碎片相撞。\n\n请谨慎行事。"
  
  # Stage 1
  ehof_reality_code.211.name:0 "现实编码：破碎星球发掘I"
  ehof_reality_code.211.desc:0 "为了保护现场不受小行星撞击和地震影响，发掘组安装了护盾发生器，并将超结构固定在周围的地壳中。\n\n在确保现场安全的前提下，团队准备部署一台载人钻井装置。"
  
  # Stage 2
  ehof_reality_code.212.name:0 "现实编码：破碎星球发掘II"
  ehof_reality_code.212.desc:0 "载人钻井单位到达了$ehof_ep$的信号源。与此前发掘的地点相同，这里也是个环绕八面体的空旷空间。我们假设：八面体比其他形状更容易实现某种未知的目的，而之后所有地点也应有相同构造。\n\n对信源的扫描表明：它与第一个相同，所以团队试着用先前一样的“密码”打开它。"
  
  # Stage 3
  ehof_reality_code.213.name:0 "现实编码：破碎星球发掘III"
  ehof_reality_code.213.desc:0 "虽然进入八面体的步骤相同，但真正进入却花了相当长的时间。\n\n它对我们在之前源上使用的重力电磁波长没有反应。在用新频率和振幅调整额外波长后，小队找到了正确的钥匙。\n\n进入后，小队提取了另一个$ehof_epcs$片段。与前两个片段结合后，他们获得了八面体数据库的有限访问权限，并检索到关于$ehof_ep$、$PGATE_GALACTICS$和$giga_sr_sentient_metal$的一些信息。\n\n$PGATE_GALACTICS$是$ehof_epcs$的星际发信器。由于所有已知的$PGATE_GALACTICS$都处于休眠状态，我们可以假设$ehof_ep$的某些特定属性激活了它们。\n\n小队还发现了关于$giga_sr_sentient_metal$的信息。这种材料由一种先进的分布式智能控制，具有难以置信的适应性和意识。他们能向当地的思维网络提供新的命令，将八面体重新组合成一个质量相等的三棱金字塔。\n\n这一发现或许能推进特化$giga_sr_sentient_metal$组件的发展，比如自愈船舰装甲或超强建筑材料——这些也只是它潜在用途的皮毛。\n\n小队现在准备返回地表。"
  
  ##############
  ### Frozen ###
  ##############
  # Anomaly
  code_3_cat:0 "现实编码：冰封星球"
  code_03_category_desc:0 "§H[this.GetName]§!上报了$ehof_epcs$的另一个信息，处于§H[from.solar_system.GetName]§!星系内部。船上的[Owner.GetScientistPlural]确定了信息源——冰封星球§H[from.GetName]§!。\n\n需要进行调查来确定其确切位置是位于星球地表还是位于星球内部。"
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.301.name:0 "现实编码：冰封星球"
  ehof_reality_code.301.desc:0 "§H[root.GetName]§!确定了§H[from.planet.GetName]§!上$ehof_ep$传输器的位置。\n\n就像前两个那样，它深埋在地下，而这一次则是在北方冰盖的下方，其下就是行星的地壳——这些传输器的深度在不断的增加。要想凿穿寒冷的星球表面，我们需要专业的工具。"
  
  # Initial
  code3_digsite:0 "现实编码：冰封星球发掘"
  code3_digsite_desc:0 "小队确定了§H[from.planet.GetName]§!上$ehof_ep$发信源的位置。\n\n它和前两次一样深埋地下，这次是在北部冰盖和行星地壳之下，这些发信源所在的深度越来越深。我们需要开挖这颗星球冰封地面的专业工具。"
  
  # Stage 1
  ehof_reality_code.311.name:0 "现实编码：冰封星球发掘I"
  ehof_reality_code.311.desc:0 "为了保护挖掘行动免受行星利刃一样的风和低温的威胁，一个大型保温圆顶被造了出来，其中还安装了一些热源。团队已经调整了在先前的挖掘行动中部署过的载人钻探单位，让其能在这些恶劣的条件下运作，现在，它已经做好部署的准备了。"
  
  # Stage 2
  ehof_reality_code.312.name:0 "现实编码：冰封星球发掘II"
  ehof_reality_code.312.desc:0 "团队到达了传输器的位置。正如所料，一切都和前两次一样：一片开阔的空间，中间有着一个八面体。\n\n团队正在组装重力电磁波投射器来解开这个八面体。"
  
  # Stage 3
  ehof_reality_code.313.name:0 "现实编码：冰封星球发掘III"
  ehof_reality_code.313.desc:0 "研究团队成功地进入了八面体，并顺利提取出了$ehof_ep$的另一个片段。\n\n他们可以使用该片段来访问发信源的更多系统，并发现$PGATE_GALACTICS$的信息，特别是关于如何激活它！\n\n不出所料，$ehof_epcs$是使用这些奇特构造的关键。传输$ehof_ep$的电磁波必须要有特定的振幅和频率才能激活$PGATE_GALACTIC$。即使只和所需的参数略有偏差，$PGATE_GALACTIC$也会忽略输入的$ehof_ep$信号，这可能是为了防止其他太空现象意外激活$PGATE_GALACTICS$。\n\n研究团队还能找到$giga_sr_sentient_metal$更先进的控制模式。他们认为，只要有匹配的物质储备，就能利用$giga_sr_sentient_metal$来建造或修复由其他材料筑成的构造。\n\n团队正准备返回表面。"
  
  ##############
  ### Molten ###
  ##############
  # Anomaly
  code_4_cat:0 "现实编码：熔融星球"
  code_04_category_desc:0 "我们的传感器探测到了另一个$ehof_epcs$的信号，这一次是来自§H[from.solar_system.GetName]§!恒星系。就像之前的信号那样，这一次的信号源也是个不可居住的天体——熔融星球§H[from.GetName]§!。\n\n我们应该动员调查和挖掘团队。"
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.401.name:0 "现实编码：熔融星球"
  ehof_reality_code.401.desc:0 "§H[root.GetName]§!上的[Owner.GetScientistPlural]确定了§H[from.planet.GetName]§!内部的$ehof_ep$传输器的位置。\n\n那又是个深深嵌在行星之内的位置，根据我们的初步扫描，这次，它的深度已经达到了地幔之中，不过，对于像§H[from.planet.GetName]§!这样的熔融星球来说，“地幔”和“地壳”之间并没有明确的分界线。由于超热的大气和液岩表面，我们需要先将挖掘现场稳定下来才能去找传输器。"
  
  # Initial
  code4_digsite:0 "现实编码：熔融星球发掘"
  code4_digsite_desc:0 "我们勘测船上的[Owner.GetScientistPlural]已经确定了$ehof_ep$发信源在§H[from.planet.GetName]§!内的位置。\n\n它又一次深深的嵌入了星球内部，这次它足够深，初步地质扫描显示它在地幔中——不过像§H[from.planet.GetName]§!这样的熔融星球，地幔和地壳之间并没有很明显的界限。由于过热的大气层和液态岩石地表，我们需要先稳定挖掘地点才能接近发信源。"
  
  # Stage 1
  ehof_reality_code.411.name:0 "现实编码：熔融星球发掘I"
  ehof_reality_code.411.desc:0 "为了保护发掘地点不受§H[from.planet.GetName]§!的行星力量影响，小队首先将一颗冰小行星拖到地表形成岛屿，然后设置能量屏障和熔岩泵进行隔离。即使采取了这些措施，这个地方仍然很危险。\n\n由于这颗行星的性质，到达$ehof_ep$发信源将需要不同于以往的方法：熔岩排除了钻机（没东西可挖)、有人载具（太危险）和遥控飞行器（太多信号干扰）。\n\n小队目前建议将一架严密防护的半自主无人机沉入熔岩，首先找到重力电磁“密码”禁用发信源的护盾，然后向发信源本地网络发送命令，浮出熔岩。\n\n这种办法在几年前是站不住脚的，但是我们对$giga_sr_sentient_metal$（提供装甲）、$giga_sr_negative_mass$（提供护盾）和$ehof_ep$（执行控制）的深入理解让该方案变得可行。"
  
  # Stage 2
  ehof_reality_code.412.name:0 "现实编码：熔融星球发掘II"
  ehof_reality_code.412.desc:0 "小队搞定了自主无人机的配置，并准备将其部署到§H[from.planet.GetName]§!的岩浆海。"
  
  # Stage 3
  ehof_reality_code.413.name:0 "现实编码：熔融星球发掘III"
  ehof_reality_code.413.desc:0 "现场扫描显示无人机已到达。如果一切顺利，小队预计放大器将在几天内浮出岩浆面。"
  
  # Stage 4
  ehof_reality_code.414.name:0 "现实编码：熔融星球发掘IV"
  ehof_reality_code.414.desc:0 "一切都按计划进行！放大器如预期浮出岩浆，小组将其锚固在岛上基地。确认安全后，他们进入并提取了另一个$ehof_epcs$片段，没有发生任何事故。\n\n分析表明这些片段是某个独特$ehof_ep$的独有部分，而不像其他信号只是激活了$PGATE_GALACTICS$。遗憾的是，这个序列尚未完成——我们的[Owner.GetScientistPlural]甚至不确定如果完成会发生什么。\n\n我们还发现了更多关于$giga_sr_sentient_metal$的信息：具体来说，管理物质的分布式智能是如何接收输入的。\n\n现在我们知道，这种物质的组成粒子充当了它的神经元、眼睛和手——智能就根植在这物质内。考虑到我们迄今为止看到的$giga_sr_sentient_metal$数量及其自适应能力，这种蜂群思维的计算能力恐怕远远胜过了我们最强的计算网络。\n\n有了这些新知识，我们能创建由分布式智能直接管理的系统，并且仅由通过$ehof_ep$下达的高阶指令间接控制。由超复杂蜂群思维控制的武器、船只和建筑，能比我们现有甚至未来的任何东西都更快做出反应和适应。"
  
  #################
  ### Gas Giant ###
  #################
  # Anomaly
  code_5_cat:0 "现实编码：气态巨星"
  code_05_category_desc:0 "§H[this.GetName]§!在§H[from.solar_system.GetName]§!星系内识别到另一个来自气态巨行星§H[from.GetName]§!的$ehof_ep$信号。我们应该派遣一支队伍去定位发信源。"
  
  # Anomaly Success (Creates Dig site)
  ehof_reality_code.501.name:0 "现实编码：气态巨星"
  ehof_reality_code.501.desc:0 "这个$ehof_ep$发信源和之前找到的一样在行星内部——这次，它嵌在北极下面的金属氢中。\n\n由于气态巨行星的特殊性，这个发信源比我们之前发掘的困难得多。与那些陆地行星相比，单是§H[from.planet.GetName]§!的大小就意味着我们必须跨越几十倍的距离才能到达发信源。遑论还需要穿过行星的气体和液体层。"
  
  # Initial
  code5_digsite:0 "现实编码：气态巨星发掘"
  code5_digsite_desc:0 "这个$ehof_ep$发信源和之前找到的一样在行星内部——这次，它嵌在北极下面的金属氢中。\n\n由于气态巨行星的特殊性，这个发信源比我们之前发掘的困难得多。与那些陆地行星相比，单是§H[from.planet.GetName]§!的大小就意味着我们必须跨越几十倍的距离才能到达发信源。遑论还需要穿过行星的气体和液体层。"
  
  # Stage 1
  ehof_reality_code.511.name:0 "现实编码：气态巨星发掘I"
  ehof_reality_code.511.desc:0 "为了抵达发信源所在的位置，团队建造了一座行动基地——实际上是一座各方向均安装了推进器的空间站，从我们§H[from.solar_system.GetName]§!的母基地出发前往§H[from.planet.GetName]§!。\n\n进入星球外层大气后，它将导航到发信源上方一点，并部署一架类似之前发掘中使用的半自主无人机。"
  
  # Stage 2
  ehof_reality_code.512.name:0 "现实编码：气态巨星发掘II"
  ehof_reality_code.512.desc:0 "团队报告，无人机已准备好发射。[Owner.GetEngineerPlural]决定添加一台实验性的$giga_sr_negative_mass$推进器，能加快无人机在下方数公里气液体中的飞行速度，并在§H[from.planet.GetName]§!潮汐推动其偏航时能够纠正航向。"
  
  # Stage 3
  ehof_reality_code.513.name:0 "现实编码：气态巨星发掘III"
  ehof_reality_code.513.desc:0 "有惊无险，无人机到达了$ehof_ep$发信源。和之前的一样，发信源有护盾保护，在周围形成空隙。护盾并没有阻挡地壳物质将八面体掩埋，而是防止数千年来§H[from.planet.GetName]§!大气的巨大压力将其压碎。\n\n无人机将开始测试重力电磁波，直到发信源护盾失效，然后它将把相同的上浮命令发送到暴露的发信源。"
  
  # Stage 4
  ehof_reality_code.514.name:0 "现实编码：气态巨星发掘IV"
  ehof_reality_code.514.desc:0 "甫一着陆，现场团队就进入了放大器内部，取得了$ehof_epcs$的另一段碎片。就当前的收集进度来说，我们的[Owner.GetScientistPlural]认为我们就快完成了！\n\n访问了发信源的数据库后，团队终于能查明完整的序列的目的了。当把$PGATE_GALACTIC$发送给完整的$ehof_epcs$的时候，它会试图联系$ehof_ep$的源头——而我们则可以利用那个信号来确定源头的位置！\n\n团队还找到了关于$giga_sr_sentient_metal$蜂巢思维以及我们遇到的古代建筑的驱动方式的信息。不过，虽然$ehof_ep$发信源，尤其是$PGATE_GALACTICS$吸收了巨量的能量，但我们无法确定能量的来源。但是，尽管我们无法确定，但这些东西应该都没有任何种类的内部能量储存或生产装置——他们使用的能量似乎没有来源。这也许能表明：他们使用的是某种微观非定域性，某种我们的[Owner.GetScientistPlural]长期以来都认为不可能存在的东西。"
  
  ############
  ### Star ###
  ############
  # Anomaly
  code_6_cat:0 "现实编码：褐矮星"
  code_06_category_desc:0 "进入§H[root.solar_system.GetName]§!星系后，§H[this.GetName]§!监听到一条$ehof_ep$传输——奇怪的是，这次信号来自星系中心那颗大得惊人的褐矮星。\n\n虽然调查这么一个近乎次恒星的物体内部令人生畏，但我们必须找到传输来源并完成$ehof_epcs$。"
  
  # Anomaly Success (Creates Dig site)
  # to fix: this is always a brown dwarf?
  ehof_reality_code.601.name:0 "现实编码：褐矮星"
  ehof_reality_code.601.desc:0 "我们已经确定了发信源的精确位置，不过到达那里就完全是另一件事了。那颗褐矮星的超大尺寸，及其内部不可思议的密度和温度会让这个项目难于登天。预计这一项目会花费数量惊人的时间和资源，但如果能完成$ehof_epcs$并找出其源头，那么任何代价都值得付出。"
  
  # Initial
  code6_digsite:0 "现实编码：亚恒星发掘"
  code6_digsite_desc:0 "我们已经确定了发信源的精确位置，不过到达那里就完全是另一件事了。那颗褐矮星的超大尺寸，及其内部不可思议的密度和温度会让这个项目难于登天。预计这一项目会花费数量惊人的时间和资源，但如果能完成$ehof_epcs$并找出其源头，那么任何代价都值得付出。"
  
  # Stage 1
  ehof_reality_code.611.name:0 "现实编码：亚恒星发掘I"
  ehof_reality_code.611.desc:0 "我们挖开了那颗气态巨行星，随后在§H[from.planet.GetName]§!的光球层内部署了运维平台。一个载人舰船将被部署在那，本质上，它是发信源的仿制品，其内部的大部分都将用于能量生产。最初的议案想用的是我们在前两次挖掘中使用的同型无人机，但我们的重力电磁投射科技无法将$ehof_ep$的控制代码在此处所需的距离间传输…尤其是在那些距离间填满了高密度的分子汤的情况下。\n\n虽然我们的材料科技与$ehof_ep$发信源所使用的仍是天差地远，但我们从那些相同发信源中所学到的东西已经消除了我们的差距，让我们能够在进入这一本能成为恒星的存在的深处时不受伤害（并保护我们[Owner.GetScientistPlural]的安全）。"
  
  # Stage 2
  ehof_reality_code.612.name:0 "现实编码：亚恒星发掘II"
  ehof_reality_code.612.desc:0 "监视团队的扫描表明：我们的探索船终于到达了发信源。现在，它将尝试与该构造的护盾谐波同步，这样潜入团队就可以试着打开，然后登上它。"
  
  # Stage 3
  ehof_reality_code.613.name:0 "现实编码：亚恒星发掘III"
  ehof_reality_code.613.desc:0 "如果一切都按计划进行，潜入团队应该已经在确定发信源重力电磁的解锁代码了。当他们在如此遥远的下方工作的时候，我们除了等待之外已无事可做。"
  
  # Stage 4
  ehof_reality_code.614.name:0 "现实编码：亚恒星发掘IV"
  ehof_reality_code.614.desc:0 "潜入团队平安无事地回来了！他们成功进入了放大器内部，取得了最后的$ehof_epcs$碎片。\n\n有了它，我们终于可以组装$ehof_epcs$…然后找出它真正的源头了。"
  
  ###############################
  ### Final digsite (CPlanet) ###
  ###############################
  # Notification that a new system spawned
  ehof_reality_code.1000.name:0 "现实编码：原点"
  ehof_reality_code.1000.desc:0 "经过多年来对$ehof_epcs$所有片段的定位，我们终于把它组装好了。以$PGATE_GALACTIC$播送完整的序列引发了我们前所未见的反应。有一个新的“回复”序列从不明方向传来。\n\n不过，就在这一信号传来的不久后，仍在清理最后的$ehof_ep$发掘点的团队提交了报告：从那颗褐矮星深处的某地涌出了令人担忧的能量，随后，有一大片云的中央散开了，一道橙色的闪电飞了出来。与我们很久之前见过的一样，这道闪电也以难以置信的速度飞向了恒星系的边缘。在我们的科研船终于追上了它的踪迹的时候，他们发现了一个超空间航道——也许是因其猛烈的能量而暴露的。\n\n虽然我们并不知道这个超空间航道的另一侧有什么，但我们强烈怀疑那就是$ehof_ep$的源头。"
  
  # On entering the system
  ehof_reality_code.10001.name:0 "灭星者"
  ehof_reality_code.10001.desc:0 "我们终于到达了§H[root.GetStarName]§!，$ehof_ep$的起源恒星系。\n\n该系统由一个巨大的黑洞和一个绕其运行的单一天体组成。这是一个巨大的球形巨构建筑，直径为数百万公里。这个结构绝对不是自然形成的，而且似乎被一个我们以前没有遇到过的船只保护着。\n\n我们应该谨慎行事，因为这艘“灭星者”看起来全副武装！"
  
  # On killing the eradicator
  ehof_reality_code.10002.name:0 "灭星者已被消灭"
  ehof_reality_code.10002.desc:0 "就在我们快要摧毁灭星者的时候，它进行了紧急超空间跳跃，消失得无影无踪。既然它已不再是障碍，我们可以重新回到任务上了。\n\n对该巨构建筑表面的粗略分析展现了巨型的波动，它们不断而无序地在建筑中回荡，此外，还有短命而高能的粒子持续从中排出。就像我们在$ehof_cohesive$恒星系中遇到的其他建筑那样，该巨构建筑的表面很可能是由数之不尽的$giga_sr_sentient_metal$制成的。不幸的是，我们没能证实这一假设，因为其排放的剧烈能量扰乱了我们的扫描仪。\n\n两个距离主表面很远的圆形区域覆盖了位于它们“极点”的$ehof_the_sphere$。与表面的其他部分不同的是，它们是静止的。在这两片区域的中心，都有一个巨大的印章，那是能在$PGATE_GALACTICS$上看到的标志。\n\n一位颇有灵感的[Owner.GetScientist]决定将这一建筑称为“$ehof_the_sphere_named$”。"
  ehof_reality_code.10002.a:0 "不可思议！"
  
  # Initial
  code_final_digsite:0 "现实编码：$ehof_the_sphere_named$"
  code_final_digsite_desc:0 "找到进入$ehof_the_sphere$的方法似乎是不可能的。\n\n靠蛮力开辟道路的尝试都失败了。虽然其表面作为一个整体没有确定的温度，但各个与穿过其中的波动通信的单独地区却有。从接近绝对零度到数千开尔文温度，它们的温度毫无规则可循。任何设备，哪怕只是接触到表面都会被瞬间破坏。\n\n因此，我们的[Owner.GetResearchers]转而建议使用$ehof_epcs$。它是进入放大器和$PGATE_GALACTICS$的钥匙，所以它可能也能让我们启动$ehof_the_sphere$。\n\n当前的提案是在$ehof_the_spheres$顶部的上方建一个$ehof_epcs$发信源指示塔，以期在我们采取任何进一步行动前证明此方法的可行性。"
  
  # Stage 1
  ehof_reality_code.1001.name:0 "现实编码：$ehof_the_sphere_named$I"
  ehof_reality_code.1001.desc:0 "发射器指示塔打开了通往$ehof_the_sphere$的入口。\n\n$ehof_epcs$通过其重力电磁携带波播放了自己，使$ehof_the_spheres$产生了回应——在下方的极点上出现了一个一米的小型峡谷，不过只持续了一秒。尽管播放仍在继续，但那个入口却被封上了，即便是反复播放$ehof_epcs$也无法令其重现。\n\n现在，我们知道了我们的方法能在最常规的情况下奏效，但也知道了$ehof_the_sphere$的入口需要额外的指示塔来稳定。"
  
  # Stage 2
  ehof_reality_code.1002.name:0 "现实编码：$ehof_the_sphere_named$II"
  ehof_reality_code.1002.desc:0 "我们突破$ehof_the_sphere$的尝试取得了进展。我们部署了多座额外发信源指示塔，循环播放$ehof_epcs$，随后，该建筑顶部的缝隙变大了。\n\n开口大小的增加似乎与发信源的数量呈指数关系：第二座塔会令入口的半径增大至16米，持续时间也变为16秒，第三座则是81米的半径以及同样的持续秒数，第四座则是256米和秒。\n\n根据这些结果，我们的[Owner.GetScientistPlural]推断：该入口是一种超立方结构。基于其增大比率，需要23座指示塔才能完全开启$ehof_the_sphere$。"
  
  # Stage 3
  ehof_reality_code.1003.name:0 "现实编码：$ehof_the_sphere_named$III"
  ehof_reality_code.1003.desc:0 "我们[Owner.GetScientistPlural]的假设得到了证实。\n\n23座指示塔组成了一个“合唱团”，共同向$ehof_epcs$发出信号，将顶部的表面完全剥落。如果根本法则不变，开放应当会再持续一会——略多于12个星系标准天。\n\n在$ehof_the_spheres$顶部之外的是未分开的$giga_sr_sentient_metal$平地。这似乎是众多测试中的最后一个——我们必须运用关于这些材料网络智能的知识进行重编程，在将它排开的同时维持顶部的开放。"
  
  # Stage 4
  ehof_reality_code.1004.name:0 "现实编码：$ehof_the_sphere_named$IV"
  ehof_reality_code.1004.desc:0 "最早引导$giga_sr_sentient_metal$的尝试失败了。虽然外表看似很稳定，但其次层实际上十分活跃——它在不断地重塑其现有的形状。这并不只是它的一般再生性质，或是我们给它的命令奏效的体现。实际上，蜂巢思维的本地网络一直在改变自己，因此任何我们送出的命令都会在毫秒之内被覆写，我们对该建筑的调整也就前功尽弃了。\n\n距离顶部关闭只有十天了，我们失去了这次的机会——也许是永远地失去了机会。"
  
  # Stage 5
  ehof_reality_code.1005.name:0 "现实编码：$ehof_the_sphere_named$V"
  ehof_reality_code.1005.desc:0 "在只剩几天的情况下，团队设计了一种实验性超级电脑的原型，并部署了它。它的核心有着用我们的各种科技交织出的$giga_sr_sentient_metal$的密集网络，这是我们能造出的最理想的计算工具。虽然没有$giga_sr_sentient_metal$整体上的多功能性，但其原始的算力有该材料缺乏援助的蜂巢思维的指数倍。\n\n将这一系统部署到$ehof_the_spheres$指示塔顶部的行动正在进行。只消一点运气，它就能胜过本体网络的重算，以更持久的方式重塑$giga_sr_sentient_metal$的封锁。"
  
  # Stage 6
  ehof_reality_code.1006.name:0 "现实编码：$ehof_the_sphere_named$VI"
  ehof_reality_code.1006.desc:0 "成功了，$ehof_the_sphere$!打开了。\n\n他们应该派个诗人来…"
  
  ###########################################################################
  ################# 1/6 reality code excavations completed ##################
  ###########################################################################
  ehof_reality_code.005.name:0 "现实编码：$giga_sr_sentient_metal$"
  ehof_reality_code.005.desc:0 "我们的[Owner.GetScientistPlural]将我们发现的物质命名为$giga_sr_sentient_metal$。根据他们已经确定的关于它的信息，我们的科学界肯定它有难以想象的潜力。\n\n不过，它的用途目前还很有限，因为我们对它的了解还太少。我们的[Owner.GetEngineerPlural]绘制了专门的繁殖设施的初步设计，它将以§H合金§!和§H能量币§!为饵复制现存的$giga_sr_sentient_metal$样本。\n\n此外，有人还提出了一个重新调查$PGATE_GALACTIC$的项目，因为我们的[Owner.GetScientistPlural]现在认为：这些神秘的结构可能也是由$giga_sr_sentient_metal$组成的。"
  ###########################################################################
  ################# 3/6 reality code excavations completed ##################
  ###########################################################################
  
  ehof_reality_code.004.name:0 "现实编码：激活"
  ehof_reality_code.004.desc:0 "多亏了我们的[Owner.GetResearchers]在$ehof_ep$发信源内收集到的知识，我们现在知道如何激活$PGATE_GALACTICS$了。我们的[Owner.GetResearchers]已经着手开发激活我们的舰船发信源必需的扩充。我们完全不知道$PGATE_GALACTIC$被激活后到底会发生什么，我们所知道的只有如何去做！"
  
  #########################################
  ### Hieroglyphics (EHOF Precursor) ######
  #########################################
  ehof_megastructure.602.name:99 "Mysterious Geoglyphs"
  ehof_megastructure.602.desc:99 "A routine review of scanner data has unexpectedly revealed giant geoglyphs carved into a planet's surface. Repeating elements and the symbols' overall abstraction indicate that they are more likely a script than representations of lifeforms.\n\nDefinitely something worth investigating."
  ehof_megastructure.602.a:99 "They even spread beyond the horizon..." #very unforced reference
  
  ehof_precursor:0 "神秘地画"
  ehof_precursor_digsite_desc:0 "在§H[from.Planet.GetName]§!表面刻有巨大的地画。重复的元素和符号整体呈现的抽象性表明它们更可能是某种字母，而非生命形式的图画。\n\n这绝对是值得研究的东西。"
  
  ehof_megastructure.0051.name:0 "神秘地画I"
  ehof_megastructure.0051.desc:0 "§H[this.GetName]§!号的船员们已经着陆，开始在最大的地画周围搭建营地，这些地画位于包裹着星球北极的高耸山脉的南部。\n\n他们立刻产生了弄清这些地画是什么以及是谁把它们放在那里的想法。经过一番商议，[Owner.GetScientistPlural]们开始工作，测试空气和地面样本，并对地画进行表面扫描。"
  
  ehof_megastructure.0052.name:0 "神秘地画II"
  ehof_megastructure.0052.desc:0 "自§H[from.Planet.GetName]§!上的[Owner.GetScientistPlural]开始调查其表面上的地画以来已经过去了一些时间，但他们还没有取得任何有意义的进展。\n\n队员们灰心丧气，一筹莫展，宣布任务失败。他们收拾好在极地的现场，开始登上他们的船。\n\n§H[this.leader.GetName]§!下达了离开星球的命令，§H[this.GetName]§!开始升入轨道，但在上升期间，科学小组注意到：之前他们的飞船在其上降落并停留了几个星期的地画正在发出微弱的橙色光芒，而其他的却没有。"
  
  ehof_megastructure.0053.name:0 "神秘地画III"
  ehof_megastructure.0053.desc:0 "§H[this.leader.GetName]§!停止了上升，返回地面。在§H[this.GetName]§!下降的时候，它越接近，字形的橙色光芒就越强烈。\n\n团队对这一发展感到困惑，决定绕星球一圈，低空飞过每一个字形，结果看到字形在他们经过时亮起。\n\n最终，所有的字形都亮了起来，并一直发光，但船员们还是不明白这意味着什么。§H[this.leader.GetName]§!决定再次降落在极地研究站，重新对地画进行直接检查。"
  
  ehof_megastructure.00531.name:0 "神秘地画IV"
  ehof_megastructure.00531.desc:0 "返回§H[from.Planet.GetName]§!地表上不久，科研团队的传感器就探测到了短时间的重大地震活动——与此同时，所有象形文字的光都立刻消失了。\n\n出于对团队成员的健康的考虑，他们很快登上了§H[this.GetName]§!并再次进入了轨道。\n\n他们一离开§H[from.Planet.GetName]§!的大气层，船上的传感器就探测到了板块活动的巨幅增多。§H[from.Planet.GetName]§!的表面爆裂开来，一束巨大的橙色光束从中射出，其速度远远超过我们所能达到的任何速度。\n\n那道光很快就脱离了视野，但是团队成员能根据它的方向够确定它的目的地。我们应该调查它似乎正在冲向的星系。"
  
  EXPLORE_EHOF_PRECURSOR_NO_RUINED:0 "橙色闪电"
  EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC:0 "船上的传感器探测到一道巨大的橙色光束，其速度远远超过我们所能达到的任何速度。\n\n光束很快就离开了可见的范围，但机组人员能够通过它的方向确定它的预定目的地。我们应该调查它似乎正在冲向的那个星系。"
  
  EXPLORE_EHOF_PRECURSOR_RUINED:0 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED$"
  EXPLORE_EHOF_PRECURSOR_RUINED_DESC:0 "$EXPLORE_EHOF_PRECURSOR_NO_RUINED_DESC$"
  
  ehof_megastructure.0054_name:0 "死胡同"
  ehof_megastructure.0054_desc:0 "在橙色的闪电到达星系后，我们也紧随其后，但它已经不复存在了……\n\n尽管花了这么多时间研究这个异常现象，但对于这些地画的意义、是谁创造了它们、为什么创造了它们，以及那道橙色的闪电是什么，我们都没有取得切实的见解。\n\n然而，在对散布在星系周围的奇怪碎片进行了一些调查之后，我们发现：这里似乎曾经有某种巨构建筑，可能是随着时间的推移而被黑洞摧毁了。\n\n在碎片中，我们的[Owner.GetScientistPlural]发现了一个巨大的，仍可运行的数据存储，其中有先进的知识技术，都与虫洞稳定有关。\n\n然而，其中最有价值的发现是一个极具异域风格的文物。对其进行研究必定物有所值。"
  
  ehof_megastructure.0055_name:0 "机械"
  ehof_megastructure.0055_desc:0 "我们紧随着橙色闪电到达了星系，它已经不见踪迹，不过在星系中有一个破损的结构，环绕着星系中心的黑洞。恢复的结构内部的数据表明：当它运作时，它可以操纵自己环绕的黑洞，以开启并稳定虫洞。我们的[Owner.GetScientistPlural]将这一结构命名为$ehof_ehof$，简称$ehof_ehof_abr$。\n\n尽管它已经损坏而且似乎被遗弃了，我们的船员还是开始着手检查任何指引我们来到这里的生命迹象或线索。\n\n在对该结构进行了扫描，测试和深思之后，显然我们还是没有对这些地画是什么，谁制作了它们，为什么制作它们或者橙色闪电是什么有真正的深入了解。\n\n然而，我们对该结构的调查带来了大量与虫洞稳定相关的先进知识。而一个用途和起源均未知的神秘文物也许更加重要，它被安装在一个设施内部的显眼位置上。为此我们的[Owner.GetScientistPlural]很确信我们应该进一步调查。"
  
  STUDY_ARCANE_ARTIFACT_1:0 "研究§B神秘文物§!"
  STUDY_ARCANE_ARTIFACT_1_DESC:0 "我们发现的神秘文物可能给橙色闪电带来一些启示，因为它可能与其有关。\n\n这个文物里可能隐藏有惊人的秘密等待我们去发现。\n\n§R（该项目是解锁$ehof_ehof$所必要的！）§!"
  
  STUDY_ARCANE_ARTIFACT_2:0 "研究§B神秘文物§!"
  STUDY_ARCANE_ARTIFACT_2_DESC:0 "我们在毁坏的$ehof_ehof$里发现的神秘文物可能隐藏有关于该巨构建筑惊人的秘密等待我们去发现。\n\n§B（该项目是解锁$ehof_ehof$所必要的！）§!"
  
  STUDY_ARCANE_ARTIFACT_3:0 "研究§B神秘文物§!"
  STUDY_ARCANE_ARTIFACT_3_DESC:0 "我们在损坏的$ehof_ehof$里发现的神秘文物可能对黑洞巨构建筑的工作原理有所启示。\n\n§B（该项目是修复$ehof_ehof$所必要的！）§!"
  
  ehof_anomaly.4321.name:0 "$r_arcane_manipulator_1$"
  ehof_anomaly.4321.desc:0 "我们对神秘文物的长期研究已经取得了丰富的信息，不过其中的大部分都用在了对抗该文物怪异的特性上。\n\n虽然保持着特别的八面体形状，但其大小和质量却会变得非常极端。根据我们[Owner.GetResearchers]的记录，它有时像个数据版一样小，有时却像个现代巡洋舰那样大，而它的质量则在一个标准合金单位和约八十个[Root.GetHomeWorldName]间变动。该遗物的透明度和硬度也同样不稳定。\n\n这些要素让我们的[Owner.GetScientistPlural]得出了这样的结论：它实际上是个部分锚定在我们现实的高维物体，而它在那些维度中的旋转则是我们在自己的三维世界中观察到的所有奇怪现象的原因。"
  #This event seems to be deprecated(4322), as a note for the future because of that it's just been brought to parity with 4324
  ehof_anomaly.4322.name:0 "$r_arcane_manipulator_1$"
  ehof_anomaly.4322.desc:0 "我们至少确定了该文物的一个功能：它能够稳定并操作虫洞。\n\n它表现出能够稳定并操纵宇宙中所有形态的虫洞的潜力，哪怕是从时空的量子涨落中产生的亚原子的、存在时间很短的虚拟$ehof_wormholes_text$也可以。\n\n它可能在$ehof_ehof$中驱动着该巨构建筑的虫洞操纵。\n\n该文物可能有其他功能，但由于其神秘的性质，我们很难得知。我们的[Owner.GetResearchers]甚至不确定其不稳定的表现是因设计如此，还是已经坏了。\n\n无论如何，我们的[Owner.GetScientistPlural]相信利用该文物来稳定、操纵$ehof_wormhole_text$并最终进行航行是可行的。被损坏的$ehof_ehof$有可能以此目的被修复并重新启用。"
  
  ehof_anomaly.4323.name:0 "$r_arcane_manipulator_1$"
  ehof_anomaly.4323.desc:0 "我们对神秘文物的长期研究已经取得了丰富的信息，不过其中的大部分都用在了对抗该文物怪异的特性上。\n\n虽然保持着特别的八面体形状，但其大小和质量却会变得非常极端。根据我们[Owner.GetResearchers]的记录，它有时像个数据版一样小，有时却像个现代巡洋舰那样大，而它的质量则在一个标准合金单位和约八十个[Root.GetHomeWorldName]间变动。该遗物的透明度和硬度也同样不稳定。\n\n这些要素让我们的[Owner.GetScientistPlural]得出了这样的结论：它实际上是个部分锚定在我们现实的高维物体，而它在那些维度中的旋转则是我们在自己的三维世界中观察到的所有奇怪现象的原因。"
  
  ehof_anomaly.4324.name:0 "$r_arcane_manipulator_1$"
  ehof_anomaly.4324.desc:0 "我们至少确定了该文物的一个功能：它能够稳定并操作虫洞。\n\n它表现出能够稳定并操纵宇宙中所有形态的虫洞的潜力，哪怕是从时空的量子涨落中产生的亚原子的、存在时间很短的虚拟$ehof_wormholes_text$也可以。\n\n它可能在$ehof_ehof$中驱动着该巨构建筑的虫洞操纵。\n\n该文物可能有其他功能，但由于其神秘的性质，我们很难得知。我们的[Owner.GetResearchers]甚至不确定其不稳定的表现是因设计如此，还是已经坏了。\n\n无论如何，我们的[Owner.GetScientistPlural]相信利用该文物来稳定、操纵$ehof_wormhole_text$并最终进行航行是可行的。被损坏的$ehof_ehof$有可能以此目的被修复并重新启用。"
  
  r_arcane_manipulator_1:0 "§B奥术裂缝操纵器§!"
  r_arcane_manipulator_1_desc:0 "这个异界建筑似乎是在现实中的相位存在本身，能够稳定和操纵所有类型虫洞的，包括虚拟的$ehof_wormholes_text$。"
  giga_relic_no_active:0 "该遗珍是一个没有效果的收集品。"
  
  ehof_megastructure.0056_name:0 "事件视界"
  ehof_megastructure.0056_desc:0 "在探索完损坏的黑洞建筑后，我们得出了结论，它最初是用于一种特殊形式的星际旅行的。\n\n从其内部恢复的数据显示，其被称为“$ehof_ehof$”（简称“$ehof_ehof_abr$”），显示其用途为古老的虫洞产生与稳定器。在这座巨构建筑的内外，我们发现了大量与虫洞稳定相关的先进知识。\n\n也许更重要的，是一个未知用途和起源的神秘文物，其被安装在设施内部一个重要之地。我们的[Owner.GetScientistPlural]十分确信，我们应该多多研究这个文物。"
  
  #############################################################################################################################################
  ### Bombardment Stances #####################################################################################################################
  #############################################################################################################################################
  bombardment_redtoxin:0 "猩红灾异"
  bombardment_redtoxin_desc:3 "$bombardment_redtoxin$轰炸会使用猩红灾异，通过轨道轰炸毒化一个星球并杀死其上的所有生命。\n——对§H陆军§!造成§R巨大§!伤害\n——对§H行星§!造成§R巨大§!伤害\n——对§H人口§!造成§R巨大§!伤害\n——会轰炸无防卫的行星\n——会使得行星变成一个不宜居，但是可以改造的红色剧毒星球"
  opinion_policy_orbital_bombardment_redtoxin:0 "用猩红灾异轰炸我们的行星"
  orbital_bombardment_redtoxin:0 "猩红灾异"
  orbital_bombardment_redtoxin_name:0 "猩红灾异轨道轰炸"
  orbital_bombardment_redtoxin_desc:0 "允许通过轨道轰炸部署猩红灾异。\n\n§E允许“猩红灾异”轨道轰炸姿态。§!"
  ehof_red_toxin.2.name:0 "星球被炸成了红色剧毒星球"
  ehof_red_toxin.2.desc:0 "我们的星球之一被炸成了一个红色剧毒星球"
  ehof_red_toxin.2.a:0 "这真可怕！"
  bombed_to_red_toxic:0 "这个星球已经不可居住，但是可以快速地进行地貌改造。"
  ehof_red_toxin.3.desc:0 "我们的舰队用猩红灾异轰炸，把一个敌人的星球变成了红色剧毒星球。"
  ehof_red_toxic_world:0 "地貌改造效率增加"
  ehof_red_toxic_world_desc:0 "猩红灾异提升了我们地貌改造进程的效率。"
  
  building_ehof_sm_forge_1:0 "知觉金属铸造厂"
  building_ehof_sm_forge_1_desc:0 "$building_ehof_sm_forge_1$是一种专业化的装置，用£alloys£ §Y$alloys$§!和£energy£ §Y$energy$§!为饵来积累大量的£giga_sr_sentient_metal£ §Y$知觉金属$§!以复制更多的£giga_sr_sentient_metal£ §Y$知觉金属$§!。"
  
  building_ehof_sm_forge_2:0 "知觉金属铸造工业区"
  building_ehof_sm_forge_2_desc:0 "$building_ehof_sm_forge_2$是比其前任更大更有效率的变体。它能使用我们扩充了的关于£giga_sr_sentient_metal£§Y$活体金属$§!的知识在更短的时间内创造更多的材料。"
  
  building_giga_research_lab_1:0 "抽象实验机构"
  building_giga_research_lab_1_desc:0 "专门从事抽象物理学研究实验分支的特殊机构，拥有极大量的研究人员。"
  
  building_giga_research_lab_2:0 "非定域研究设施"
  building_giga_research_lab_2_desc:0 "专门从事抽象物理学研究实验分支的特殊机构，可以容纳极大量的研究人员。"
  
  building_giga_institute_1:0 "非常态智库"
  building_giga_institute_1_desc:0 "$building_giga_institute_1$是一个巨大的抽象物理学研究机构，行星的研究产出因之而提升。"
  
  building_giga_supercomputer_1:0 "抽象超级计算机"
  building_giga_supercomputer_1_desc:0 "$building_giga_supercomputer_1$是一个意在成为行星的核心处理器的装置，同时也是抽象物理学的研究机构。这个惊人的机构让行星的研究产出得到了巨幅提升。"
  
  building_giga_supercomputer_2:0 "抽象究极计算机"
  building_giga_supercomputer_2_desc:0 "这一高度先进并特化的装置允许对量子非定域化现象进行研究实验。"
  
  building_giga_institute_2:0 "超因果科学枢纽"
  building_giga_institute_2_desc:0 "超因果科学枢纽是一个致力于最先进最巨大的科研项目，以及涉及抽象物理学的非定域化现象的实验的巨大设施。"
  
  building_giga_energy_nexus_1:0 "激光传导能量分配器"
  building_giga_energy_nexus_1_desc:0 "这个巨大的复合体用强大的高能导体来在其星球与恒星系中的其他星球间传输能量。"
  
  building_giga_energy_nexus_2:0 "超空间航路能量传输器"
  building_giga_energy_nexus_2_desc:0 "这些超高容量的能量传输器可以在恒星系间传输能量，能让我们的帝国更有效地分配能量。"
  
  building_giga_energy_nexus_3:0 "跨星域纠缠器"
  building_giga_energy_nexus_3_desc:0 "这个巨大的建筑使用量子理论来直接纠缠星系的不同地点，这让我们有可能在帝国内部即时转移能量。"
  
  # building_giga_planetary_shield_generator_1:0 "Hypershield Defensive Screen"
  # building_giga_planetary_shield_generator_1_desc:0 "The $building_giga_planetary_shield_generator_1$ is an enhanced version of a classical Planetary Shield Generator that affords increased protection to the planet below."
  
  building_giga_planetary_shield_generator_2:0 "负质量守护者"
  building_giga_planetary_shield_generator_2_desc:0 "在行星大气层周围创造一个质能排斥层，通过£giga_sr_negative_mass£§Y负质量§!的使用，这一建筑能保护行星免遭最强烈的轨道轰炸伤害。只有长期轰炸和极端高能光束才能及时穿透这一排斥层。"
  
  building_negative_mass_factory_1:0 "能量反变换器原型"
  building_negative_mass_factory_1_desc:0 "抽象物理学的进步使我们能开发建造可以产出奇异的£giga_sr_negative_mass£§Y负质量§!的实验设施。因为$building_negative_mass_factory_1$的系统还不是很完美，所以其效率和产量都很低。"
  
  building_negative_mass_factory_2:0 "负质量变换器"
  building_negative_mass_factory_2_desc:0 "£giga_sr_negative_mass£§Y负质量§!生产的下一步，即$building_negative_mass_factory_2$，是$building_negative_mass_factory_1$的完全形态，有着更高的效率和产出。但是直到我们弄明白如何完美地在两种状态间转换前，将能量转为负能量的过程将一直会很低效。"
  
  edict_giga_photonic_matter_sb:0 "光子物质护盾强化"
  edict_giga_photonic_matter_sb_desc:0 "光子物质能短暂用于增强我方舰船的护盾重生效率。"
  
  edict_giga_negative_pressure_ti:0 "负压推力增强"
  edict_giga_negative_pressure_ti_desc:0 "通过于我们的传统推进器上精确应用负压效应，我们能增强其效能。"
  
  edict_giga_negative_mass_build:0 "负质量建造加速"
  edict_giga_negative_mass_build_desc:0 "通过在建造过程中使用负质量，我们可以提高建造工程的完成速度。"
  
  edict_giga_sterile_hyper_neutrino_d_s:0 "惰性超中微子探测仪辅助"
  edict_giga_sterile_hyper_neutrino_d_s_desc:0 "我们的惰性超中微子探测仪通常都用于终型EHOF上，但其也能用来探测并提取暗物质。"
  
  pc_red_toxic:0 "红色剧毒星球"
  pc_red_toxic_desc:0 "剧毒星球的一个独特类型，奇怪的红色毒性微粒将它完全毒化，将大气层染为了鲜艳的深红色。"
  
  pc_ehof_habitat:0 "小行星栖所"
  pc_ehof_habitat_desc:0 "有多个小行星组成的庞大栖所，由一个灭绝的失落文明建造。仍然未知它的建造者们遭遇了什么。"
  
  pc_ehof_unhabitat:0 "$pc_ehof_habitat$"
  pc_ehof_unhabitat_desc:0 "$pc_ehof_habitat_desc$"
  
  sc_ehof_black_hole:0 "$pc_ehof_black_hole$"
  sc_ehof_black_hole_desc:0 "$pc_ehof_black_hole_desc$"
  sc_annihilator:0 "灾变星"
  sc_annihilator_desc:0 "正式的讲这是一颗M级巨星，但是这个恒星有些地方不太一样……"
  sc_white_hole:0 "$pc_wh_star$"
  sc_white_hole_desc:0 "$pc_wh_star_desc$"
  
  #########################################
  ### Supermassive E.H.O.F. ###############
  #########################################
  #Site
  giga_dialog.4201.name:99 "Supermassive E.H.O.F. Construction Site Complete"
  giga_dialog.4201.desc:99 "From crude animal-drawn carriages, to steam and nuclear-powered vehicles, to FTL travel and then Hyper-Relays and Gateways, the development and growth of all civilisations hinges on constant improvements in transportation technologies, enabling us to project our ambitions further and further.\n\nAnd so, with the construction site for a future §YSupermassive E.H.O.F.§! completed around the galactic core, we stand on the cusp of yet another and perhaps the greatest transportation revolution.\n\nThis platform shall serve as the logistical hub for the construction of a supersized Event Horizon Offset Facility around the galaxy's supermassive black hole which shall, in time, bolster our FTL capabilities to unseen heights and connect all corners of our empire together thanks to a network of countless micro-wormholes."
  giga_dialog.4201.a:99 "Marvelous."
  
  #Frame
  giga_dialog.4202.name:99 "Supermassive E.H.O.F. Electroweak Hyperframe Complete"
  giga_dialog.4202.desc:99 "The Supermassive E.H.O.F.'s §YElectroweak Hyperframe§! is now in place. This gargantuan frame shall generate a gargantuan electroweak field around the supermassive black hole's event horizon, from which probalistic wormholes will be 'plucked' and inflated across the galaxy by the structure's two not-yet built Quasi-Field Manipulators."
  giga_dialog.4202.a:99 "That makes sense... I think."
  
  #Gateways
  giga_dialog.4203.name:99 "Supermassive E.H.O.F. Quasi-Field Manipulators Complete"
  giga_dialog.4203.desc:99 "With the completion of the §YQuasi-Field Manipulators§!, the structure of our Supermassive E.H.O.F. is essentially complete. These manipulators shall manipulate the electroweak field generated by the Hyperframe as to twist surrounding spacetime into two gargantuan vortexes emanating from the Manipulators.\n\nThis should theoretically extend the range at which micro-wormholes can be generated to the entire galaxy and beyond, all while enabling them to remain stable over an indefinite period of time.\n\nAll that remains to be done now is to activate the device."
  giga_dialog.4203.a:99 "What do you mean by 'theoretically'?"
  
  #Activation
  giga_dialog.4204.name:99 "Supermassive E.H.O.F. Operational"
  giga_dialog.4204.desc:99 "Thanks to a massive infusion of energy and Quasi-Negative Mass, our marvelous §YSupermassive E.H.O.F.§! has roared to life. Twisting and bending spacetime like mere clay, the device's gargantuan power essentially grants us near-total control over our galaxy's underlying quasi-space.\n\nAlready, micro-wormholes are being generated across our entire empire, connecting our once-disparate worlds together as if they were one and reducing travel times to almost nothing, while our warships enjoy unprecedented mobility as wormholes enable them to traverse the void faster than ever.\n\nWith the full activation of this grand device, logistical and bureaucratic problems owing to our empire's size are soon to be little more than a distant memory as we enter an era of unprecedented cohesion and galactic coordination."
  giga_dialog.4204.a:99 "The galaxy is now truly our domain!"
  
  
  name_supermassive_ehof:99 "Supermassive E.H.O.F."
  
  supermassive_ehof_0:99 "$gc_tera$$name_supermassive_ehof$ Construction Site"
  supermassive_ehof_0_DESC:99 "The construction site for a future $name_supermassive_ehof$. This relatively small platform shall be used as a base to construct a machine granting us near-perfect mobility and cohesion across the galaxy."
  supermassive_ehof_0_MEGASTRUCTURE_DETAILS:99 "$giga_list_category_terastructure$ - $giga_list_category_transportation$\nDrastically buffs §YFTL Speed§!, £unity£ §YUnity§!, £trade_value£ §YTrade Value§!, reduces §YEmpire Size§!.\n§LAn upscaled E.H.O.F. Facility designed to generate microwormholes anywhere in the galaxy on the fly.§!" #megalistentry SUPERMASSIVE EHOF
  
  supermassive_ehof_0_CONSTRUCTION_INFO_DELAYED:99 "$giga_list_additional_data$ - The §YSupermassive E.H.O.F.§! can manipulate spacetime and generate microwormholes on the fly anywhere in the galaxy to bolster conventional methods of FTL travel, effectively reducing §YHyperdrive Cooldown§! to almost nothing and granting infinite range to §YJump Drives§!.\n\nThese wormholes also bring all parts of our empire closer together, increasing §YUnity§! and §YTrade Value§! while reducing §YEmpire Size§! and §YResettlement Cost§!.\n\nIt can also act as a §YQuantum Catapult§! with infinite range and near-perfect accuracy (With the §YOverlord§! DLC), and should the opportunity present itself, it may also allow us to probe §YIntergalactic Space§!.\n\nGenerating the wormholes is however not free and will incur an §YEnergy§! and §YQuasi-Negative Mass§! upkeep based on our current number of §YPops§! (§Y4§! £energy£ & §Y0.04§! £giga_sr_negative_mass£ per), §YPlanets§! (§Y100§! £energy£ & §Y1§! £giga_sr_negative_mass£ per) and §YShips§! (§Y2§! £energy£ per). "
  
  supermassive_ehof_1:99 "Supermassive E.H.O.F. Electroweak Hyperframe"
  supermassive_ehof_1_DESC:99 "The Electroweak Hyperframe plays the crucial role of generating an electroweak field around the event horizon, out of which probabilistic microwormholes may then be plucked."
  
  supermassive_ehof_2:99 "Supermassive E.H.O.F. Quasi-Field Manipulators"
  supermassive_ehof_2_DESC:99 "The Quasi-Field Manipulators bend and twist the Hyperframe's electroweak field, allowing for near-total control of quasi-space across the galaxy."
  
  supermassive_ehof_3:99 "Supermassive E.H.O.F."
  supermassive_ehof_3_DESC:99 "The Supermassive E.H.O.F. can generate a near-endless amount of micro-wormholes anywhere within the galaxy, enabling unprecedented mobility and cohesion. As such, upkeep scales directly with pop, planet and ship count."
  
  supermassive_ehof_3_no_catapult:99 "Supermassive E.H.O.F."
  supermassive_ehof_3_no_catapult_DESC:99 "$supermassive_ehof_3_DESC$² "
  
  requires_ehof_phase_04:99 "$TRIGGER_FAIL$Requires the £engineering_research£ §Y$tech_ehof_phase_04$§! technology."
  
  ap_supermassive_ehof:99 "Unshackled Transportation"
  ap_supermassive_ehof_desc:99 "For too long, the sheer size of the galaxy has stood as an ever-present impediment to our galactic ambitions. No longer! An upscaled Event Horizon Offset Facility built around the galactic core shall enable us to link even the furthest reaches of our empire together and will allow our mighty warships to cross the void with utmost ease."
  
  giga_tech_supermassive_ehof:99 "Event Horizon Offset Facility Hyperscaling"
  giga_tech_supermassive_ehof_desc:99 "The culmination of E.H.O.F. development coupled with the latest advancements in gigastructural engineering. This monstrous construct, built around the largest of black holes, is theoretically capable of generating a near-infinite amount of microwormholes anywhere within the galaxy, enabling both never-seen-before mobility for our fleets as well as the drastic curbing of most distance-related logistical issues inherent to our empire's size."
  allow_supermassive_ehof:99 "§HUnlocks Megastructure:§! $name_supermassive_ehof$"
  desc_supermassive_ehof:99 "The Supermassive E.H.O.F. allows unmatched FTL movement and empire cohesion."
  
  requires_no_existing_supermassive_ehof:99 "$TRIGGER_FAIL$Can only construct one $name_supermassive_ehof$."
  
  giga_blokkat.10021.name:99 "Intergalactic Probing Proposal"
  giga_blokkat.10021.desc:99 "With the gravitational anomaly barreling towards our galaxy at alarming speeds, some are proposing that rather than sit idly waiting for the object to arrive, we take proactive action and utilize our §YSupermassive E.H.O.F.§! to directly fling a probe towards the approaching anomaly within intergalactic space.\n\nIf successful, this would undoubtedly yield some valuable data pertaining to the object's nature, but we should, of course, be ready for anything. Now, if we are to go through with this, several different options have been brought forward.\n\nFirst, we could play it safe and simply send an uncrewed science ship to probe the anomaly and retrieve as much data as possible. if the anomaly turns out to be hostile or dangerous, we wouldn't lose much and it would provide us with valuable insight on how to best prepare for its arrival.\n\nAlternatively, a more brazen option would be to send a fleet to intercept the anomaly and perhaps destroy it before it reaches us, but we really have no idea how powerful it actually is and so there is no guarantee of success.\n\nAnd last, but not least, some argue that bothering with sending an expensive fleet would be little more than a waste of resources, and instead advocate for us to send a powerful explosive device through, which would be a risk-free way of attempting to destroy or at least repel the anomaly by diverting its course."
  giga_blokkat.10021.a:99 "Let's just send an uncrewed science probe."
  giga_blokkat.10021.b:99 "Our fleets will make quick work of whatever that thing is!"
  giga_blokkat.10021.c:99 "A powerful explosive device should hopefully knock it off-course."
  giga_blokkat.10021.d:99 "Rejected. Not worth the risk and expenses."
  
  EHOF_PROBE_BLOKKATS:99 "Probe Intergalactic Anomaly"
  EHOF_PROBE_BLOKKATS_DESC:99 "Sending an uncrewed science ship to the intergalactic anomaly may shed some light on its true nature. As we are unlikely to actually get the ship back, we should not put a leader on it."
  
  EHOF_FIGHT_BLOKKATS:99 "Engage Intergalactic Anomaly"
  EHOF_FIGHT_BLOKKATS_DESC:99 "We shall send a warfleet to intercept and hopefully destroy the anomaly before it reaches us. However, as there's no guarantee of success, we should probably not commit too large of a fleet in the event of a failure.\n§RThis will commit whatever fleet is being used to research the project!§!"
  
  giga_blokkat.10022.name:99 "Intergalactic Anomaly Probing Report"
  giga_blokkat.10022.desc:99 "Our §YSupermassive E.H.O.F.§!'s staff brings... ominous news.\n\nWhile our uncrewed science ship has successfully made it to the anomaly, it could only spend a few precious seconds probing it before being destroyed by cataclysmic energies. And the data it sent back has confirmed our empire's worst fear: the object is not natural.\n\nIt is a ship! More precisely a gargantuan vessel of utterly alien design, comprised of large concentric rings arranged around some sort of high-energy core.\n\nUnfortunately there was not enough time to understand what the purpose of its components were and most of the data beamed back is currently unusable due to a critical lack of context. Fortunately our scientists believe that we might be able to complete our analysis once the anomaly actually arrives, but for now, we should prepare for the worst."
  
  giga_blokkat.10023.name:99 "Intergalactic Anomaly Battle Report"
  giga_blokkat.10023.desc:99 "Going where no [Root.GetSpeciesName] has gone before, our warfleet streaks through intergalactic space, riding the pocket of infinitely-twisted space woven by our §YSupermassive E.H.O.F.§! at speeds unseen.\n\nWithin mere days the anomaly comes into sight, and, to everyone's utter dismay and surprise, it is... small? No more than a few hundred kilometers across, it could be encompassed within the breadth of our warfleet several times over. Whatever the case, it matters not as the fleet opens fire, cannons big and small showering the anomaly in ordnance powerful enough to level most of [ROOT.Capital.GetName].\n\nBut nothing happens. The anomaly, utterly unfazed by our intervention, continues onwards, our fleet struggling to catch up. And so we open fire once more, but this time, there is a response as the anomaly suddenly stops. In an instant, energy readings spike, and... all is quiet.\n\nOur high command scrambles to regain contact, receiving nothing but silence. The conclusion is clear: whatever, or whoever that thing is, we must be ready to deploy everything's we've got against it when it finally arrives."
  giga_blokkat.10023.a:99 "We will overcome. Prepare to fight."
  giga_blokkat.10023.b:99 "Ensure that our grand projects are ready in time."
  giga_blokkat.10023.c:99 "Invest more in technological progress."
  giga_blokkat.10023.d:99 "We shall wait and see."
  
  giga_blokkat.10024.name:99 "Intergalactic Anomaly Bombing Report"
  giga_blokkat.10024.desc:99 "Our §YSupermassive E.H.O.F.§!'s staff reports that they have successfully flung an explosive device towards the anomaly in intergalactic space, yielding... mitigated results.\n\nThe anomaly's course remains completely unchanged despite being impacted in a way that should have knocked it away from our galaxy, however its speed has been somewhat reduced which should hopefully buy us some more time to prepare for its arrival.\n\nInterestingly however, this slowdown occurred some time after the actual impact rather than directly afterwards, leading some to wonder if it might be the result of something, or someone, inside the anomaly reacting to the impact as opposed to being forcefully decelerated by it.\n\nRegardless, we estimate that this has bought us an additional §Yfive years§! to prepare for the arrival..."
  giga_blokkat.10024.a:99 "Splendid."
  
  preparing_to_fight_blokkats:99 "Intergalactic Anomaly - Military Preparation"
  preparing_to_tech_blokkats:99 "Intergalactic Anomaly - Technological Preparation"
  preparing_to_mega_blokkats:99 "Intergalactic Anomaly - Engineering Preparation"
  
  probed_blokkats_early:99 "Blokkat Probing Data"
  fought_blokkats_early:99 "Blokkat Combat Data"
  
  giga_blokkat.10025.name:99 "Intergalactic Anomaly Combat Data Analysed"
  giga_blokkat.10025.desc:99 "Following the Blokkats' arrival within our galaxy, our Research Bureau has been hard at work studying what little data we managed to acquire from our brief combat stunt with the Blokkat-Vester in intergalactic space.\n\nBy crossing it with the flood of data coming in from current Blokkat studies, we should be able to gain a slight military edge against Blokkat vessels."
  giga_blokkat.10025.a:99 "Excellent. So it wasn't all for nothing."
  
  giga_blokkat.10026.name:99 "Intergalactic Anomaly Probing Data Analysed"
  giga_blokkat.10026.desc:99 "Following the Blokkats' arrival within our galaxy, our Research Bureau has been hard at work studying the data our probe managed to acquire when it came into contact with the intergalactic anomaly.\n\nBy crossing it with the flood of data coming in from current Blokkat studies, we should be able to understand the Blokkats at least a little better."
  giga_blokkat.10026.a:99 "Delightful!"
  
  tremendous_ring:0 "巨大的星环系统"
  tremendous_ring_desc:0 "这颗气态巨行星有一个巨大的星环系统，估计其直径为378万公里。"
  
  methane_oceans:0 "甲烷海洋"
  methane_oceans_desc:0 "这个寒冷荒芜星球的最大的小行星撞击坑内有小型液态甲烷海洋。"
  
  nanite_deserts:0 "纳米荒漠"
  nanite_deserts_desc:0 "这个行星50%的沙漠都由拟态成沙子的纳米机械构成。"
  
  coreless_planet:0 "无核星球"
  coreless_planet_desc:0 "这颗行星完全没有星核，这使得它成为了珍贵的物理研究对象。"
  
  core_facility:0 "核心设施"
  core_facility_desc:0 "这颗行星完全没有星核，但在行星的地表之下有一个巨大的研究设施，可以用来进行高级研究。"
  
  cataclysmic_star:0 "灾变变星"
  cataclysmic_star_desc:0 "这个星系中含有一颗白矮星，这导致了其自身内部的极度不稳定性。"
  
  oxygen_world:0 "结晶氧世界"
  oxygen_world_desc:0 "这颗行星的表面是由结晶氧组成的，这使得它在科学上极有价值。"
  
  natural_network:0 "自然全球网络"
  natural_network_desc:0 "一种独特的植物在星球上形成了一个巨大的网络，这使得它在科学上极有价值。"
  
  fire_life:0 "等离子体生命形式"
  fire_life_desc:0 "独特的等离子体生命体居住在这个星球上，使得它对有机生命极为不利。"
  
  red_toxic:0 "红色剧毒星球"
  red_toxic_desc:0 "一个最近发现的剧毒星球，其大气中充满了一种未知的红色有毒物质。"
  
  scarlet_scourge:0 "红色剧毒星球"
  scarlet_scourge_desc:0 "一个环境恶劣到令人难以置信的星球，大气中充满了一种含有高级合成毒素的失控红色微粒。"
  
  remnants_civ:0 "文明残余"
  remnants_civ_desc:0 "一个曾经伟大的文明被猩红灾祸摧残后的残余还在这个星球上苟延残喘。"
  
  the_repository1:0 "贮藏地"
  the_repository1_desc:0 "革新工坊的巨型研究设施，推动这个星球上的先进研究和开发活动。"
  
  the_repository2:0 "贮藏地"
  the_repository2_desc:0 "革新工坊的巨型研究设施，推动这个星球上的高级研究开发活动，即是猩红灾异仍然存在。"
  
  urmazin_utopia:0 "乌尔玛岑的乌托邦"
  urmazin_utopia_desc:0 "乌尔玛岑待在自己的伊甸园里与银河隔绝，有什么需要不高兴的呢？"
  
  
