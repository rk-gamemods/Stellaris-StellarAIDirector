  quasi_stellar_gateway_off:0 "类星天陨星门"
  quasi_stellar_gateway_off_DESC:0 "和$name_ndb$星门差不多，这个穿越亚空间的传送门可以瞬间转移大量能量。"
  quasi_stellar_gateway_off_MEGASTRUCTURE_DETAILS:0 "$quasi_stellar_gateway_off_DESC$"
  
  quasi_stellar_gateway_on:0 "活跃的类星天陨星门"
  quasi_stellar_gateway_on_DESC:0 "和$name_ndb$星门差不多，这个穿越亚空间的传送门可以瞬间转移大量能量。"
  
  quasi_stellar_obliterator_5:0 "$name_quasistellar$"
  quasi_stellar_obliterator_5_DESC:0 "一座全面运转的$name_quasistellar$。这件巨大的超武从类星体的极锋喷流、吸积盘和彭罗斯过程中获取能量，能向不幸的目标释放等同于整个星系恒星能量的怒火。"
  
  quasi_stellar_obliterator_6:0 "类星天陨控制面板"
  quasi_stellar_obliterator_6_DESC:0 "打开超级武器控制面板，选择发射或配置。"
  
  quasi_stellar_marker_star_firing:0 "类星天陨虫洞"
