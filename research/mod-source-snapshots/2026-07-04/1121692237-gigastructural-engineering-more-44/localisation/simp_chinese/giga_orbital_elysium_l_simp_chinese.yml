l_simp_chinese:
  #############################################################################################################################################
  ### Orbital Elysium #########################################################################################################################
  #############################################################################################################################################
  
  mod_giga_elysium_host_stability_add:0 "轨道乐土主行星稳定度"
  mod_giga_elysium_host_jobs_produces_mult:0 "轨道乐土主行星岗位产出"
  
  giga_elysium_host_planet:0 "$name_orb_elysium$主行星"
  giga_elysium_host_planet_desc:0 "此行星的大部分行政事物都交予行星当局管理，而其上级则在轨道环的站点里高高遥控他们。"
  
  giga_elysium_origin_fix:0 "$name_orb_elysium$起源母星修复"
  giga_elysium_origin_fix_desc:0 "要是恁看到这玩意儿，说明出问题了！"
  
  giga_elysium_origin_build_speed:0 "$name_orb_elysium$起源组装"
  giga_elysium_origin_build_speed_desc:0 "要是恁看到这玩意儿，说明出问题了！"
  
  giga_elysium_no_host:0 "缺乏主行星支持"
  giga_elysium_no_host_desc:0 "没了下方主行星基建设施的支持，这一环状居住站的居民们正处于水深火热中。"
  
  giga_origin_no_elysium:0 "缺乏在轨监管人员"
  giga_origin_no_elysium_desc:0 "没了高高在上的$name_orb_elysium$之引导，此行星上的居民陷入了失序和低效状态。"
  
  giga_dismantle_elysium:0 "退役$name_orb_elysium$"
  giga_dismantle_elysium_desc:0 "这一居住站和其提供的高压控制已不再适合我们的需求。"
  giga_dismantle_elysium_tooltip:0 "$name_orb_elysium$将会被§R摧毁§!。"
  
  d_giga_elysium_buildings:0 "行星支持基础设施"
  d_giga_elysium_buildings_desc:0 "§W每当主行星上解锁一个£building£§Y建筑槽§!，$name_orb_elysium$也会相应地获得一个£building£§Y建筑槽。§!\n§W--------------§!\n轨道乐土极其依赖主行星，其从支持基础设施中裨益良多。"
  
  d_giga_elysium_origin_industry:0 "废弃工业区"
  d_giga_elysium_origin_industry_desc:0 "这些过时的制造设施是上个工业发展时代的遗迹，而今成了进步的阻碍。"
  d_giga_elysium_origin_industry_effect:0 "星球自动规划§Y工业§!、§Y铸造§!或§Y工厂§!时，将部分£job_foundry£ §Y[owner.GetAlloyProducer]§!和[owner.GetArtisanIcon] §Y[owner.GetArtisan]§!替换为§Y[owner.GetClerkOrMaintenanceDrone]§!岗位。"
  
  
  # blocker events
  
  giga_elysium.002.name:0 "[From.GetName]上的工业扩张不受拘束"
  giga_elysium.002.desc:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点之控制中心报告称，由于不断上升的失业率，非法工业活动频率也随之上升。这一§Y$d_giga_elysium_cottage_industry$§!承诺为那些失业待业人群提供就业，不过其蕴含了有组织犯罪的不详弦外之音。\n\n有鉴于此，[From.GetName]上的行星稳定度很可能会受到§Y负面影响§!，亟待国家介入。"
  giga_elysium.002.desc.hive:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点控制中心报告称，由于不断上升的子个体空置率，地面上一个本地管理小组已下令建造§Y$d_giga_elysium_cottage_industry$§!。\n\n虽然这一新开发的区域会提供额外岗位，其半自主的行为正在引发异常活动，并可能在长期上导致§Y行星稳定度的负面效果§!。有必要采取行动。"
  giga_elysium.002.desc.machine:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点控制中心报告称，由于不断上升的子个体空置率，地面上一个本地管理小组已下令建造§Y$d_giga_elysium_cottage_industry$§!。\n\n虽然这一新开发的区域会提供额外岗位，但其与中央计划系统的整合度很差，并可能在长期上导致§Y行星稳定度的负面效果§!。有必要采取行动。"
  
  MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY_TITLE:0 "不受控的工业扩张"
  MESSAGE_GIGA_ELYSIUM_COTTAGE_INDUSTRY:0 "§Y$SYSTEM$§!星系内§Y$PLANET$§!的高失业率导致了§Y$d_giga_elysium_cottage_industry$§!的建造，来提供岗位。"
  
  d_giga_elysium_cottage_industry:0 "临时工业区"
  d_giga_elysium_cottage_industry_desc:0 "闲置人口建造了这些工厂以提供就业机会。"
  
  giga_elysium.004.name:0 "[From.GetName]上不受控的城市扩张"
  giga_elysium.004.desc:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点之控制中心报告称，由于不断上升的无家可归者数量，一些被剥夺权利的殖民者在主定居点的郊区建造了一个§Y$d_giga_elysium_slums$§!。\n\n既难以治理又难以巡逻，这很可能成为犯罪分子的避风港。因此，[From.GetName]的存在很可能导致§Y行星稳定度的负面效果§!，亟待国家介入。"
  giga_elysium.004.desc.hive:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点之控制中心报告称，由于不断上升的无家可归者数量，一些子个体的生存本能回归主导，建造了一个§Y$d_giga_elysium_slums$§!以供庇护所用。\n\n虽然这一新建的建筑能提供额外居住地，其迷宫一样的结构可能成为行星人口异常元素的避风港，并可能在长期上导致§Y行星稳定度的负面效果§!。有必要进行爆破。"
  giga_elysium.004.desc.machine:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点之控制中心报告称，由于子个体待机区域的严重短缺，地表上一个半自主建筑计划分脑预定了§Y$d_giga_elysium_slums$§!的建造。\n\n虽然这一新开发的区域能提供额外居住地，其兔子洞一样的结构已成为网络中腐化元素的避风港，并可能在长期上导致§Y行星稳定度的负面效果§!。有必要进行爆破。"
  
  MESSAGE_GIGA_ELYSIUM_SLUMS_TITLE:0 "不受控的城市扩张"
  MESSAGE_GIGA_ELYSIUM_SLUMS:0 "§Y$SYSTEM$§!星系内§Y$PLANET$§!的高住房短缺导致了§Y$$d_giga_elysium_slums$§!的建造，来提供庇护所。"
  
  d_giga_elysium_slums:0 "临时居住区"
  d_giga_elysium_slums_desc:0 "这些贫民窟规划不善，充斥着异常活动，却提供了急需的生存空间。"
  
  giga_elysium.005.name:0 "[From.GetName]上的活体陈设被搬迁"
  giga_elysium.005.desc:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点之控制中心报告称，由于§Y$LIVESTOCK$人口§!不断上升的住房需求，当局预定建造了一个§Y$d_giga_elysium_livestock_pens$§!。\n\n与我们的标准设施相比，其控制较少，居民会有更不结构化的生活，并可能在长期上导致§Y行星稳定度的负面效果§!。有必要彻底取缔该设施。"
  giga_elysium.005.desc.hive:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点之控制中心报告称，由于§Y$LIVESTOCK$人口§!不断上升的住房需求，地表上的管理小组预定建造了一个§Y$d_giga_elysium_livestock_pens$§!。\n\n与我们的标准设施相比，其控制较少，居民会有更不结构化的生活，并可能在长期上导致§Y行星稳定度的负面效果§!。有必要彻底取缔该设施。"
  giga_elysium.005.desc.machine:0 "我们位于§Y[From.GetName]§!上的轨道乐土站点之控制中心报告称，由于§Y$slavery_matrix$人口§!所需的储存空间紧缺，地表上一个半自动计划分脑预定建造了一个§Y$d_giga_elysium_livestock_pens$§!。\n\n与我们的标准设施相比，其控制较少，居民会有更不结构化的生活，并可能在长期上导致§Y行星稳定度的负面效果§!。有必要彻底取缔该设施。"
  
  MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS_TITLE:0 "不受控的活体陈设迁移"
  MESSAGE_GIGA_ELYSIUM_LIVESTOCK_PENS:0 "§Y$SYSTEM$§!星系内§Y$PLANET$§!上活体陈设£pop£§Y人口§!的高住房短缺导致了§Y$d_giga_elysium_livestock_pens$§!的建造，来提供庇护所。"
  
  d_giga_elysium_livestock_pens:0 "活体陈设临时围场"
  d_giga_elysium_livestock_pens_desc:0 "与我们的标准设施相比，这个围场的管制较少，为我们的\"客人\"提供了额外的自由。好像有点过了。"
  
  giga_elysium.006.name:0 "[From.GetName]已退役"
  giga_elysium.006.desc:0 "[fromfrom.GetName]上的轨道乐土空间站已经完成拆解，管理权回归地面。\n\n所有剩余居民都被重新安置于行星地表，空间站残骸已脱轨。"
  giga_elysium.006.desc.egal:0 "[fromfrom.GetName]上的轨道乐土空间站已经完成拆解，逃到那里的精英的统治终于结束了。\n\n所有剩余居民都被重新安置于行星地表，空间站残骸已脱轨。"
  giga_elysium.006.desc.gestalt:0 "[fromfrom.GetName]上的轨道乐土空间站已经完成拆解，将控制权移交给地面设施。\n\n所有剩余子个体都被重新安置于行星地表，空间站残骸已脱轨。"
  
  giga_elysium.006.good:0 "谢天谢地。"
  
  #########################################
  ### Elysium districts ###################
  #########################################
  
  district_giga_elysium_housing:0 "居住区"
  district_giga_elysium_housing_plural:0 "居住区"
  district_giga_elysium_housing_desc:0 "宽敞的房屋建于虚拟乡村之间，附带有高速通讯基础设施。"
  
  district_giga_elysium_control:0 "行星控制中心"
  district_giga_elysium_control_plural:0 "行星控制中心"
  district_giga_elysium_control_desc:0 "行星活动的神经中枢，监察官们于此能确保其下居民们服服帖帖。"
  
  district_giga_elysium_admin:0 "管理区划"
  district_giga_elysium_admin_plural:0 "管理区划"
  district_giga_elysium_admin_desc:0 "一座广大的管理设施，管理站点和主行星的各类通讯来往。"
  
  district_giga_elysium_science:0 "科研区划"
  district_giga_elysium_science_plural:0 "研究区"
  district_giga_elysium_science_desc:0 "高科技实验室，于此我们最顶尖的人才能不受干扰地工作。"
  
  district_giga_elysium_entertainment:0 "娱乐区划"
  district_giga_elysium_entertainment_plural:0 "娱乐区划"
  district_giga_elysium_entertainment_desc:0 "广播媒体生产中心，能够制造出无穷无尽的娱乐内容，来取悦大众。"
  
  #########################################
  ### Elysium buildings ###################
  #########################################
  
  building_giga_elysium_host_capital:0 "乐土行星控制中心"
  building_giga_elysium_host_capital_plural:0 "乐土行星控制中心"
  building_giga_elysium_host_capital_desc:0 "当地官僚的所在地，代表其上级进行行星管理。"
  
  building_giga_elysium_host_major_capital:0 "乐土行星控制综合体"
  building_giga_elysium_host_major_capital_plural:0 "乐土行星控制综合体"
  building_giga_elysium_host_major_capital_desc:0 "大型行政中心，充当当地人口和其在轨统治者之调解中介者。"
  
  giga_elysium_dystopian_stability_desc:0 "\n§H$civic_dystopian_society$：§!额外受到轨道乐土提供的§Y50%§!£stability£§Y稳定度§!加成"
  
  building_giga_elysium_host_hive_capital:0 "乐土行星突触节点"
  building_giga_elysium_host_hive_capital_plural:0 "乐土行星突触节点"
  building_giga_elysium_host_hive_capital_desc:0 "蜂巢意志通过这一主要突触中继来管理行星功能。"
  
  building_giga_elysium_host_hive_major_capital:0 "乐土行星突触集簇"
  building_giga_elysium_host_hive_major_capital_plural:0 "乐土行星突触集簇"
  building_giga_elysium_host_hive_major_capital_desc:0 "蜂巢意志通过这一主要突触中继来管理行星开发和规划。"
  
  building_giga_elysium_host_machine_capital:0 "极乐行星中继节点"
  building_giga_elysium_host_machine_capital_plural:0 "极乐行星中继节点"
  building_giga_elysium_host_machine_capital_desc:0 "信号中继节点接收远处站点之指令并执行之。"
  
  building_giga_elysium_host_machine_major_capital:0 "极乐行星中继枢纽"
  building_giga_elysium_host_machine_major_capital_plural:0 "极乐行星中继枢纽"
  building_giga_elysium_host_machine_major_capital_desc:0 "强力之行政节点和中继中心，能处理轨道发射下来的指令。"
  
  
  building_giga_elysium_host_jobs:0 "就业部门"
  building_giga_elysium_host_jobs_plural:0 "就业部门"
  building_giga_elysium_host_jobs_desc:0 "就业部门是遍布社会的政府机构，分管岗位的分配和指标的规定。"
  building_giga_elysium_host_jobs_effect:0 "行星上每§Y100§!£pop£人口提供§Y$@giga_elysium_jobs_per_100|*0$§!£job£岗位，适用于我们的§Y帝国类型§!与当前§Y殖民地规划§!。"
  building_giga_elysium_host_jobs_amenities_effect:0 "行星上每§Y100§!£pop£人口提供§Y$@giga_elysium_jobs_per_100|*0$§!£job£岗位，适用于我们的§Y帝国类型§!与当前§Y殖民地规划§!。每个£job_clerk£§Y$job_clerk$§!岗位提供额外£amenities£§Y舒适度§!。"
  
  building_giga_elysium_host_hive_jobs:0 "子个体分配中心"
  building_giga_elysium_host_hive_jobs_plural:0 "子个体分配中心"
  building_giga_elysium_host_hive_jobs_desc:0 "一个容纳半自主神经集群的设施，负责维持整个星球的子个体生产力。"
  
  building_giga_elysium_host_machine_jobs:0 "任务分配中心"
  building_giga_elysium_host_machine_jobs_plural:0 "任务分配中心"
  building_giga_elysium_host_machine_jobs_desc:0 "一个计算节点，将任务分配给星球上的闲置子个体。"
  
  building_giga_elysium_host_booster:0 "辅助工业区"
  building_giga_elysium_host_booster_plural:0 "辅助工业区"
  building_giga_elysium_host_booster_desc:0 "一个为提高星球生产力而建造的无序的工业区。"
  building_giga_elysium_host_booster_effect:0 "提供基于§Y殖民地规划类型§!的£job£§Y岗位产出§!增益，并开发£volatile_motes£·£exotic_gases£·£rare_crystals£§Y战略资源§!矿藏，提供开采岗位。"
  
  building_giga_elysium_trash_heap:0 "巨型垃圾堆"
  building_giga_elysium_trash_heap_desc:0 "上方空间站的居民丢弃了一大堆各式各样的废物。拾荒者在瓦砾中搜寻，寻找被丢弃的奢侈品。"
  building_giga_elysium_trash_heap_effect:0 "提供等同于§Y$orbital_elysium$§!上§Y可用$amenity$ $@giga_elysium_trash_amenities|%0$§!的§Y$amenity$§!"
  
  #########################################
  ### Elysium jobs ########################
  #########################################
  
  job_giga_elysium_controller:0 "乐土监督者"
  job_giga_elysium_controller_plural:0 "乐土监管者"
  job_giga_elysium_controller_desc:0 "掌权者有责任保持对不受欢迎的群众的控制。"
  job_giga_elysium_controller_effect_desc:0 "£job_giga_elysium_controller£$job_giga_elysium_controller_plural$将£consumer_goods£§Y$consumer_goods$§!转化为下方星球的£stability£§Y稳定度§!。"
  job_giga_elysium_controller_swap_plural_with_icon:99 "[giga_elysium_controller.GetIcon] [giga_elysium_controller.GetNamePlural]"
  mod_job_giga_elysium_controller_add:0 "$job_giga_elysium_controller$岗位"
  mod_job_giga_elysium_controller_per_pop:0 "每$VALUE$人口§G+1§!$job_giga_elysium_controller$岗位"
  mod_job_giga_elysium_controller_per_pop_short:0 "\n每$VALUE$£pop£§G+1§!£mod_job_giga_elysium_controller_add£"
  
  job_giga_elysium_controller_drone:0 "乐土监督子个体"
  job_giga_elysium_controller_drone_plural:0 "乐土监督子个体"
  job_giga_elysium_controller_drone_desc:0 "这些子个体从上方管理行星运作，维护可能混乱的行星的秩序。"
  job_giga_elysium_controller_drone_effect_desc:0 "£job_giga_elysium_controller_drone£$job_giga_elysium_controller_drone_plural$将£energy£§Y$energy$§!转化为空间站下方行星的£stability£§Y$MOD_PLANET_STABILITY_ADD$§!。"
  job_giga_elysium_controller_drone_swap_plural_with_icon:99 "[giga_elysium_controller_drone.GetIcon] [giga_elysium_controller_drone.GetNamePlural]"
  mod_job_giga_elysium_controller_drone_add:0 "$job_giga_elysium_controller_drone$岗位"
  mod_job_giga_elysium_controller_drone_per_pop:0 "每$VALUE$人口§G+1§!$job_giga_elysium_controller_drone$"
  mod_job_giga_elysium_controller_drone_per_pop_short:0 "\n每$VALUE$£pop£§G+1§!£mod_job_giga_elysium_controller_add£"
  
  # extra bit for the origin effect
  job_giga_elysium_controller_origin_effect_desc:0 "与£job£§Y岗位产出§!"
  giga_elysium_from_station:0 "来自$orbital_elysium$"