  district_giga_gas_giant_craglands:99 "Communal Eye"
  district_giga_gas_giant_craglands_plural:99 "Communal Eyes"
  district_giga_gas_giant_craglands_desc:99 "A diverse multitude of symbionts and their structures circle in a stretch of calm wind."
  
  district_giga_gas_giant_habitat_wind:0 "风力涡轮阵列"
  district_giga_gas_giant_habitat_wind_plural:0 "风力涡轮阵列"
  district_giga_gas_giant_habitat_wind_desc:0 "巨大的风力涡轮阵列漂浮在这颗气态巨行星的大气层中，产生了大量的能量。"
  district_giga_gas_giant_habitat_wind_wilderness:99 "Zephyric Photolift"
  district_giga_gas_giant_habitat_wind_wilderness_plural:99 "Zephyric Photolifts"
  district_giga_gas_giant_habitat_wind_wilderness_desc:99 "Life thrives in the cloudtops, riding the winds up and down to bathe in just the right amount of sun."
  
  district_giga_gas_giant_habitat_science:0 "研究实验室"
  district_giga_gas_giant_habitat_science_plural:0 "研究实验室"
  district_giga_gas_giant_habitat_science_desc:0 "这些高端研究设施拥有最先进的科研设备，可以容纳非常多的人。"
  district_giga_gas_giant_habitat_science_wilderness:99 "Neurovapour Knot"
  district_giga_gas_giant_habitat_science_wilderness_plural:99 "Neurovapour Knots"
  district_giga_gas_giant_habitat_science_wilderness_desc:99 "The electrochemical and biological currents of thought converge in the windswell here, pollinating each other with ideas."
  
  district_giga_gas_giant_habitat_exotic:0 "天然气泵吸设施"
  district_giga_gas_giant_habitat_exotic_plural:0 "天然气泵吸设施"
  district_giga_gas_giant_habitat_exotic_desc:0 "能够从行星大气内部的孤立区域中提取天然气的机械装置。"
  mod_district_giga_gas_giant_habitat_exotic_max:0 "最大$district_giga_gas_giant_habitat_exotic$"
  district_giga_gas_giant_habitat_exotic_wilderness:99 "Convection Bloom"
  district_giga_gas_giant_habitat_exotic_wilderness_plural:99 "Convection Blooms"
  district_giga_gas_giant_habitat_exotic_wilderness_desc:99 "The timeless cradle of life; a union of warmth and water, abounding in the chemicals of creation."
  mod_district_giga_gas_giant_habitat_exotic_wilderness_max:99 "Max $district_giga_gas_giant_habitat_exotic_wilderness_plural$"
  
  
