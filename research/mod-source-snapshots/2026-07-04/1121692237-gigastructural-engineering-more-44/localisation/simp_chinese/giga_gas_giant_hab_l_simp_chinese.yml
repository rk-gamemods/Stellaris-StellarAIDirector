  ### Jobs
  
  job_giga_gas_extraction_manager:99 "Exotic Gas Extraction Manager"
  job_giga_gas_extraction_manager_plural:99 "Exotic Gas Extraction Managers"
  job_giga_gas_extraction_manager_desc:99 "Due to a rich atmosphere or other exotic environment property these administrators ensure our $job_technician_plural$ exploit these resources to the maximum."
  job_giga_gas_extraction_manager_effect_desc:99 "$job_giga_gas_extraction_manager_swap_plural_with_icon$ collect £exotic_gases£ §Y$exotic_gases$§! and provide £job_technician£ §Y$job_technician_plural$§! with £exotic_gases£ §Y$exotic_gases$§! production"
  job_giga_gas_extraction_manager_swap_plural_with_icon:99 "[giga_gas_extraction_manager.GetIcon] [giga_gas_extraction_manager.GetNamePlural]"
  mod_job_giga_gas_extraction_manager_add:99 "[giga_gas_extraction_manager.GetName] Jobs"
  mod_job_giga_gas_extraction_manager_per_pop:99 "§G+1§! [giga_gas_extraction_manager.GetName] Job per $VALUE$ Pops"
  mod_job_giga_gas_extraction_manager_per_pop_short:99 "\n§G+1§! £mod_job_giga_gas_extraction_manager_add£ per $VALUE$ £pop£"
  
  job_giga_gas_extraction_manager_drone:99 "Exotic Gas Extraction Management Cluster"
  giga_gas_extraction_manager_drone_wilderness:99 "Aerosymbiont"
  job_giga_gas_extraction_manager_drone_wilderness:99 "$giga_gas_extraction_manager_drone_wilderness$"
  job_giga_gas_extraction_manager_drone_plural:99 "Exotic Gas Extraction Management Clusters"
  giga_gas_extraction_manager_drone_wilderness_plural:99 "Aerosymbionts"
  job_giga_gas_extraction_manager_drone_wilderness_plural:99 "$giga_gas_extraction_manager_drone_wilderness_plural$"
  job_giga_gas_extraction_manager_drone_desc:99 "Due to a rich atmosphere or other exotic environment property these administrators ensure our $job_technician_drone_plural$ exploit these resources to the maximum."
  giga_gas_extraction_manager_drone_wilderness_desc:99 "These soaring creatures release airborne hormones in response to atmospheric changes, signalling environmental conditions to nearby $job_photosymbiont_plural$."
  job_giga_gas_extraction_manager_drone_wilderness_desc:99 "$giga_gas_extraction_manager_drone_wilderness_desc$"
  job_giga_gas_extraction_manager_drone_effect_desc:99 "$job_giga_gas_extraction_manager_drone_swap_plural_with_icon$ collect £exotic_gases£ §Y$exotic_gases$§! and provide [technician.GetIcon] [GetTechnicianPlural] with £exotic_gases£ §Y$exotic_gases$§! production"
  job_giga_gas_extraction_manager_drone_swap_plural_with_icon:99 "[giga_gas_extraction_manager_drone.GetIcon] [giga_gas_extraction_manager_drone.GetNamePlural]"
  mod_job_giga_gas_extraction_manager_drone_add:99 "[giga_gas_extraction_manager_drone.GetName] Jobs"
  mod_job_giga_gas_extraction_manager_drone_per_pop:99 "§G+1§! [giga_gas_extraction_manager_drone.GetName] Job per $VALUE$ Pops"
  mod_job_giga_gas_extraction_manager_drone_per_pop_short:99 "\n§G+1§! £mod_job_giga_gas_extraction_manager_add£ per $VALUE$ £pop£"
  
  
