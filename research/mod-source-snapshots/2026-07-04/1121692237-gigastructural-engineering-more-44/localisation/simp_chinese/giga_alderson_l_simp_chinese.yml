  job_ald_hyperfactorio_plural:0 "超规模工匠"
  job_ald_hyperfactorio_desc:0 "巨型工厂中的大群工人。他们使用极其庞大的工具，生产出数量多到难以置信的奢侈品和消费品。"
  mod_job_ald_hyperfactorio_add:0 "$job_ald_hyperfactorio$岗位"
  
  job_ald_hyperartificer:0 "大匠师"
  job_ald_hyperartificer_plural:0 "大匠师"
  job_ald_hyperartificer_desc:0 "庞大工厂中的一大群极有天赋的匠师。他们将普通消费品改造为奇迹。"
  mod_job_ald_hyperartificer_add:0 "$job_ald_hyperartificer$岗位"
  
  job_ald_hyperfactorio_drone:0 "奥尔德森工匠子个体"
  job_ald_hyperfactorio_drone_plural:0 "奥尔德森工匠子个体"
  job_ald_hyperfactorio_drone_desc:0 "庞大工厂中工作的一大群子个体。他们生产出值得“生命”继续活下去的商品。"
  mod_job_ald_hyperfactorio_drone_add:0 "$job_ald_hyperfactorio_drone$岗位"
  
  # researchers
  job_ald_megascience:0 "智库"
  job_ald_megascience_plural:0 "智库"
  job_ald_megascience_desc:0 "由一群最聪明的人组成的巨大团体。尽管不总能达成一致，但他们无疑都在为科学做出贡献。"
  mod_job_ald_megascience_add:0 "$job_ald_megascience$岗位"
  
  job_ald_megascience_mind:0 "心灵链接"
  job_ald_megascience_mind_plural:0 "心灵链接"
  job_ald_megascience_mind_desc:0 "一大群合作无间的子个体。它们正为科学贡献自己的一切精神力量。"
  mod_job_ald_megascience_mind_add:0 "$job_ald_megascience_mind$岗位"
  
