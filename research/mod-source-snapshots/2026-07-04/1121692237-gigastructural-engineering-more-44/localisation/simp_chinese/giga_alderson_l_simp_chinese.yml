  job_ald_memorialist_desc:0 "致力于泛星系的延续和永恒的众多个体。他们使用自己的空间重塑古代的城市和地标，以更好地理解他们所研究的事物。"
  mod_job_ald_memorialist_add:0 "$job_ald_memorialist$岗位"
  
