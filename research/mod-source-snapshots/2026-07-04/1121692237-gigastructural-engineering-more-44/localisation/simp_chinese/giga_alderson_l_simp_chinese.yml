  job_ald_hyperfoundry_drone_desc:0 "负责运转巨型铸造厂的一大群子个体。由他们所精炼的金属是建筑物的命脉。"
  mod_job_ald_hyperfoundry_drone_add:0 "$job_ald_hyperfoundry_drone$岗位"
  
