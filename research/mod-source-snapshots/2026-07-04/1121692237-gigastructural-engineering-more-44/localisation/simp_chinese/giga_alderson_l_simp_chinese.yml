l_simp_chinese:
  origin_alderson:0 "奥尔德森盘"
  origin_alderson_desc:0 "你是一个被遗忘已久的文明的残余，生活在由你祖先建造的一个巨大的奥尔德森盘上。其它片区庇护了智慧生命，然而他们的神秘发电机在很久以前就失效了。"
  origin_alderson_effects:0 "在$pc_alderson_slice_gaia_shattered$——一个巨大奥尔德森盘的损毁部分上开局。\n——物种宜居偏好为§L$pc_alderson_slice_gaia_shattered$§!。\n——§R临近星系中不会确保有宜居星球§!。\n——旁边的奥尔德森片区上还会生成两个强大的前FTL时代国家。"
  
  giga_alderson_start_NAME:0 "$origin_alderson$"
  giga_alderson_start_DESC:0 "$origin_alderson_desc$"
  
  giga_start_screen_alderson:0 "我们不知道我们的祖先发生了什么。外敌，瘟疫，亦或是内战？他们现在仅能以神话传说的形式存在，而知识和力量都遗失了。他们以某种方式建造了一个巨大的盘体，包含了我们恒星的整个引力井，现在我们生活在这片茫茫大地之上，它可以容纳比现在的数量还要多一百万倍的人口。然而除了最后一个片区以外其余部分已经失修且无法使用。\n\n现在，我们的人民充满了一种新的使命感：我们必须联合起来，在星空中取回我们的位置，否则我们将永远在历史中迷失。\n\n在我们耗尽用来扩张的资源以前，我们需要获得人手来从事§Y$job_miner$§!和§Y$job_technician$§!岗位的工作。\n\n为了实现这一目标，我们可能不得不迫使一些人离开他们偏爱的岗位。\n\n§RAI不会使用这个起源。任何拥有该起源的自定义生成AI帝国都会被$origin_default$替代生成。§!"
  
  name_alderson:0 "奥尔德森盘"
  allow_alderson:0 "§H解锁巨构建筑：§!$name_alderson$"
  desc_alderson:0 "奥尔德森盘是围绕恒星建造的巨大圆盘，提供了极多的居住空间。"
  
  decision_repair_shattered_alderson:99 "Repair Hypersegment"
  decision_repair_shattered_alderson_desc:99 "Our ancestral home will not lie in indignant disrepair any longer. It is time to restore our heritage."
  decision_shattered_alderson_project_effects:0 "把这个超区段修复成一个§G$pc_alderson_slice_gaia$§!"
  
  alderson_shield:99 "Ancient Forcefield"
  alderson_shield_desc:99 "Whichever empire built this $name_alderson$ placed a vast network of shield projectors across the disk's surface. Many are beyond destroyed by now but the projectors on this disk seem to be functioning. Any attempt at bombardment will be severely slowed, necessitating a ground invasion."
  
  giga_tech_alderson_disk:0 "$name_alderson$"
  giga_tech_alderson_disk_desc:0 "$name_alderson$是一个巨大的、跨星系的圆盘，可以在其上表面居住。这样的建筑成本高得令人发指，需要应用几种极其先进的技术来防止其坍塌，但可以提供大量的工业能力和建筑空间。"
  
  dominion_defender:0 "疆域掠食者"
  dominion_defender_desc:0 "无畏的战士，经常以大队形式出现。"
  
  excognitor_defender:0 "执行禁卫军"
  excognitor_defender_desc:0 "执迷于完美，这些战士们无时无刻不在训练。"
  
