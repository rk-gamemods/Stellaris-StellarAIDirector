  pc_alderson_slice_gaia:0 "盖亚奥尔德森片区"
  pc_alderson_slice_gaia_desc:0 "$name_alderson$的一个巨大片区，能够支持真正意义上繁盛的种群。这个片区的特点是在离恒星不同的距离上有多种气候，因此几乎所有物种都可适宜居住。"
  
  mod_pc_alderson_slice_gaia_shattered_habitability:0 "破碎的盖亚奥尔德森环宜居度"
  trait_pc_alderson_slice_gaia_shattered_preference:0 "破碎的盖亚奥尔德森环偏好"
  trait_pc_alderson_slice_gaia_shattered_preference_desc:0 "§L气候偏好由基因决定的，通过长期进化或人工操纵形成。§!"
  
  mod_pc_alderson_slice_gaia_habitability:0 "盖亚宜居性"
  trait_pc_alderson_slice_gaia_preference:0 "盖亚偏好"
  trait_pc_alderson_slice_gaia_preference_desc:0 "§L气候偏好由基因水平决定，这是由世代进化或者人工操纵形成的。§!"
  
